body:
  text: 五月十七日癸未琅玕奏言前准李侍堯札會奏撥浙省米石業於杭州等府屬酌撥倉榖碾米十萬石運赴閩省兹又採買米六萬石俟小暑節後風順派員分起押送由乍浦赴厦門泉州二處交收奏入上命軍機大臣傳諭李侍堯琅玕曰前因閩省內地及臺灣支給口糧撫恤難民均須米石應用是以諭令琅玕於撥運米十萬石外再行察看情形寬為籌偹今該撫又於杭嘉二府地方採買米六萬石派員陸續運閩是浙省所辦米石不為不多現在臺灣𠞰捕逆匪已可將次蕆事且尚有江西採辦之米運往接濟儘足敷用况閩省本年麥收豐稔內地民人自不虞乏食著李侍堯務須撙節辦理不可恃鄰省協助無虞匱乏致有糜費上又命軍機大臣傳諭常青李侍堯曰昨據福建委員將林家齊一犯解到當令軍機大臣審訊據供林爽文作事仗族弟林泮主謀並有軍師陳奉先及董姓等若不能得勝即逃往內山投奔生畨處藏匿又大里杙後二十餘里就是生畨地方該犯與林爽文等家口仍在阿必羅莊居住林爽文怕官兵查拏派人把守等語現在常青自己統領大兵廓清後路直搗賊巢與藍元枚等會合夾攻但林家齊供有林爽文預商逃往生畨之語大里杙距生畨地方止二十餘里易於竄入不可不嚴行防堵常青統兵到彼務須將大里杙莊四面圍繞嚴密搜捕毋使逆犯得以乘間竄匿又須向生畨處查拏不致要犯漏網常青務即遵奉昨降諭㫖令明白通事曉諭生畨如林爽文等逃入內山即生擒獻出必當奬賞花紅布匹使生畨貪利樂從不致收留藏匿此為最要其林爽文林家齊等家屬將來皆應緣坐必須按名搜捕今據林家齊供出皆在阿必羅莊居住常青亦務須逐一搜捕查拏盡净不可稍留遺孽至林爽文之謀主林泮陳奉先及董姓俱係緊要逆犯擒獲後必須派員解京盡法懲治以彰國法上又諭內閣曰武職大員如或心存私見於所屬辨兵有需索不遂及挾嫌專戮情事不但當革職治罪即豫以抵償亦所應得若行軍之際紀律專在嚴明緑營惡習最為可惡平時則强取民物臨陳則恇怯退回此而不誅其何以昭軍令而肅戎行柴大紀將臨陳退縮之辨兵立正典刑並將私取民物之兵丁亦按軍法從事是以將辨兵丁共知警懼而郝壯猷駐守鳯山不惟不能䇿勵士卒抵禦賊匪且畏怯幸生從而逃回是以身伏刑誅朕於軍務從來信賞必罰其奮勇出力者必從優甄録而畏葸退縮者亦必重治示懲國家纍洽重熙兵可百年不用不可一日無偹前於甘省𠞰捕逆回蕆事後曾命軍機大臣會同該部將行軍紀律擇其緊要數條頒發各營操演講習乃尚有郝壯猷等之畏葸偷生者著將柴大紀用法嚴明得邀奬叙郝壯猷怯懦逃回按律正法之處補行載入通行訓諭各營伍俾專閫大員曉然於敵愾大義共矢藎忱而將偹兵丁人人有勇知方恪遵軍紀盡成徑旅以副朕整飭戎行諄切告誡之至意臣等謹案行軍之道全在紀律嚴明斯辨兵等整肅用命我皇上特命將嚴整之員邀叙怯懦之員重懲補載入行軍紀律昭示營伍信賞必罰所以䇿勵之方無微不至故辨兵等感惕奮興戰無不捷也二十日丙戌李侍堯奏言恆瑞所帶滿兵一千於四月二十九日全抵厦門登舟浙兵即隨滿兵之後由蚶江配渡之二千名於本月初七日已經全到提臣藍元枚已於初六日赴蚶江帶兵配渡尚餘浙兵一千昨准將軍常青札稱南路賊匪甚多是以臣亦令由厦門前往臺灣府城計初八日可至厦門登舟總兵梁朝桂已先在厦門待渡一得順風兩路官兵俱可速到至臺灣近日情形臣參核各官所禀自四月初十日賊匪莊大田等攻撲府城被官兵殺退之後十五日草店尾三坎店兩處又有與賊打仗之事莊大田又率衆至府城外十五里之南潭莊窺伺欲待天雨官兵難施鎗炮即來攻城適粵兵四千已到常青正欲先𠞰南潭而二十五日賊又來攻小東門及草店尾桶盤棧等處被官兵殺退此府城四月二十五日以前情形也諸羅一帶三月二十九日賊首林爽文率衆來攻總兵柴大紀親率辨兵衝出直追殺至火燒莊地方因日暮兵單始回四月初十十二十八等日林爽文又來攻擾俱被殺退常青又於十六日令參將潘韜前往助𠞰潘韜因陸路賊多不能前進回至府城由海路前往於二十日到諸羅其鹿仔港一路自三月二十以後林爽文留賊目陳泮林慶守大里杙虎仔坑等巢自率羣賊南攻諸羅是以鹿仔港稍得寧息近日常青因柴大紀報稱林爽文尚團聚於大埔林斗六門等處飭令普吉保與柴大紀夾攻普吉保即於四月二十六日帶兵前往今藍元枚又帶浙兵赴鹿仔港接濟正覺事機相及再查該道府所禀府城一處但請支給鄉勇雇價未有撫恤難民之條鹿仔港一路則請難民照災賑之例支給口糧并聲明本折兼支令其兼買畨薯凑食其鄉勇則請照出征兵丁每日給米八合三勺鹽菜錢十文另加給錢三十文挑選壯丁以偹征戰是府城只應解銀鹿仔港應銀米兼解但米石一項臣到任後當即派閩省各州縣碾運米十五萬餘石合之原派四萬五千石共成二十萬石之數繼又因臺米到少恐將來有需平糶等事復奏請撥運浙省米十餘萬石在案因閩省各州縣運米有山溪之阻是以所派二十萬石雖屢次嚴催到泉厦者僅十二萬餘石餘俱未到而所撥浙米由海道解運亦非一時所能猝到現在泉厦兩倉僅存米五萬石自宜留偹兵糧今府城與鹿仔港各解銀十萬兩前往查該道府等所請銀十萬兩原非專為府城鄉勇另有夫價等項亦在其內得此銀兩一切俱覺寬裕而鹿仔港難民臣前已米薯兼辦兹復有銀十萬兩以作賑恤之資及鄉勇雇價俱聽其或米或薯自行買食則鄉勇難民均可贍濟其泉厦兩倉現貯及將來續到各州縣所解並浙省運來之米俱留偹兵糧及地方平糶如此則臺地鄉勇難民可不至乏食而接濟軍糈民食亦俱不至缺少同日藍元枚奏言臣於五月初五日到泉州浙兵亦於是日抵泉初六日到蚶江配船臣亦即配船候風放洋均奏入上命軍機大臣傳諭常青李侍堯藍元枚曰臺灣近日情形業據該總兵將打仗殺賊之處奏報已明降諭㫖將柴大紀交部議叙至四月二十五等日賊匪復攻府城經常青率領官兵堵禦𠞰殺情形尚未據該將軍奏到彼時臺灣新調官兵尚未到齊常青等督率將辨尚能將窺伺賊匪奮勇殺退此時各路官兵全數到彼聲勢更為壯盛常青等統領進𠞰必當勢如破竹其鹿仔港一路據李侍堯奏賊首林爽文率羣賊南攻諸羅該處稍得寧息現在藍元枚於本月初五日帶浙兵二千名在蚶江配渡該提督揚帆直逹該處聲勢益覺聨絡自可會同柴大紀普吉保將大埔林斗六門等處賊匪先行殱戮俾南北道路廓清至常青派令潘韜帶兵一千名前往諸羅助𠞰該參將因陸路賊多兵少由海道繞至諸羅尚無不是與其輕率前進致有挫失自不若繞道行走雖到彼稍遲而添兵協𠞰更為得力也至李侍堯奏撥解銀米前赴臺灣一摺自應如此辦理此項銀米若該道府等果有冒濫將來事竣後李侍堯自能嚴行查核據實參處此時惟當照彼所請如數給與若過於靳惜則承辦之地方官有所藉口而難民口食無資勢必去而從賊豈非藉冦兵而資賊勢耶又現在臺灣戍守兵丁經常青等帶領追𠞰正當得用之時若應輪届换班遽行撤回轉將未厯行陳之兵派往更替於事實屬無益自應俟事竣後再行照例辦理二十三日己丑李侍堯徐嗣曽同奏言閩省內地米榖近因臺灣商販稀少漳泉府屬市價稍增經臣李侍堯於浙省籌撥米十萬石並酌籌平糶兹復仰䝉聖諭必須多為籌畫有偹無患現准浙江撫臣琅玕咨稱該省可以及時採買臣等一面咨會浙省妥為籌偹約以十萬石為率一面委員前往會同該處地方官妥協辦理由海道陸續運回所需米價應請即向浙省動支發值既免解運之煩復省氷腳之費更覺便益至閩省籌辦米石固多多益善而浙省春收雖稔秋成尚逺誠恐販運過多致該處市價增昻亦不可不為慮及現在臺灣軍威壯盛可期尅日蕆功臣等飭令該委員到浙省後不拘買運多寡一得此地捷音即停止採買庶於浙省糧價不致有妨而閩省民食亦足資接濟奏入報聞二十四日庚寅常青奏言粵省官兵惟總兵梁朝桂路逺未到此外鎮將辨兵俱已先後到齊兵數較前已增乃賊匪醜類衆多自府城十里之外如虎尾寮嵌頂埔布袋尾崙仔頂大穆降等莊先已被賊盤踞到處焚劫雖經派撥將辨帶兵搜捕猶敢恃衆抗拒於四月二十五日辰刻南路之賊約有萬餘圍攻城外東南北三處營盤其小南門外之桶盤棧營盤有賊四五千人來攻臣在小南門城樓指示調遣分撥副將官福逰擊蔡攀龍率領辨兵鎗炮齊發戰至午刻賊人敗退其大南小東大北各門俱有賊千餘人俱被鎗炮打回共計是日鎗炮打死賊匪四百餘人奪獲賊械三十餘件又於二十九日卯刻賊復糾衆來攻城外三營盤臣仍照前在小南門城樓指示分撥堵殺將辨兵民奮勇夾擊至巳刻賊衆敗退是日鎗炮打死賊約計四五百人奪獲鎗炮刀牌等項官兵義民傷亡者俱一併記功賞恤注冊臣查賊人初起為數有限故大兵未到之前賊來犯郡義民鄉勇尚能保護乃數月以來賊人黨羽日積日多蔓延肆擾臣察看現今府城八門周圍堆卡並城外三處營盤勢必留兵防禦原調現存及挑出鳯山潰回各兵內除撥給柴大紀一千一百餘名外酌留分派駐守只有粵兵四千名於進剿事宜尚覺不敷應用計算恆瑞所帶之兵旬日之內即可到臺灣臣一俟滿兵一千名到時即同恆瑞起兵前赴南路跟踪搜𠞰督臣李侍堯奏撥浙江兵一千名隨到即趕赴軍營則兵力益厚軍威愈壯南路之賊定可迅速殱除至滿兵未到之先仍派奮勇將辨酌帶兵二千餘名在府城附近搜捕賊夥再諸羅屢有賊擾亦被柴大紀督率官兵殺退但諸羅彰化淡水等處因道路未通兵分力薄故柴大紀普吉保等尚未能進搗賊巢直擒首惡臣將南路掃除净盡即乘勢星赴諸羅一帶併力合攻自可一舉蕆事同日柴大紀奏言四月十六日寅刻賊匪萬餘分作兩路來攻諸羅城東北二門營盤臣飭令官兵義民堵禦自寅至已賊尚不退隨將大炮聨絡轟擊打死執紅旗騎馬賊一人及賊匪數十名賊始披靡臣復親率逰擊楊起麟守偹邱能成陳明德楊彲把總蔡開祥署諸羅縣陳良翼并武舉陳宗器黃奠邦等各官兵義民奮勇追殺守偹偹邱能成望見騎紅馬賊認為林爽文急欲生擒帶兵衝入賊隊兵丁邱文俊胡得長放鎗打倒賊馬賊即墜地把總蔡開祥羅勇趕上認非林爽文隨將賊砍死餘匪被鎗炮打死者約有七八十名賊衆潰逃官兵隨至牛稠溪邊賊衆先將上流溪水築住官兵追至時賊衆已將上流溪水盡發官兵不能過隨收兵回營其衝入賊隊內之右營兵丁沈朝佐周振綱等十名義民蔡羣一名俱被賊殺死生獲賊陳候林允二名殺獲賊首四十二顆奪獲馬匹旗號弓箭藥鉛竹牌等項將獲匪二名審明正法十八日黎明北邊賊匪數千蜂擁前來臣督辨兵奮勇迎敵與賊對放鎗炮自卯至未賊匪被大炮打死者百餘人賊稍退去正在率軍往追見東邊有賊匪千餘突出西邊亦有賊匪數百隨飛飭逰擊林光玉李隆併各義民一齊出戰賊匪被鎗炮打死併殺死者甚多至申刻三處賊匪俱皆奔竄追過牛稠溪日暮收軍殺獲賊首三十一顆奪獲子炮二門火藥一桶綿被二條大小旗杆竹牌半斬刀等項惟是首惡林爽文糾衆復來侵犯臣臨陳未能即獲不勝忿恨現經查探該犯實在潛居何處一得確信自當竭力擒拏並飛移總兵普吉保速即撥兵會拏奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰看來南路賊匪蜂屯蟻聚勢尚蔓延常青發摺時只有粵兵四千名於進剿事宜似不敷用計此時恆瑞所帶滿兵一千名及李侍堯奏撥浙江兵一千名早抵臺灣兵力益厚軍威愈壯常青恆瑞親督率前赴南路跟踪收𠞰廓清後路並揀派得力將偹於賊匪出沒各要隘駐兵守禦防其繞出來犯鳯山郡城之路最為緊要至賊匪日積日多蔓延滋擾皆無藉貧民迫脅從賊一將林爽文擒獲自必紛紛潰散所謂聚易散亦易也至鄉勇義民隨同官兵晝夜防範奮勇殺賊實屬可嘉其陳亡受傷者前經降㫖照兵丁之例加倍恤賞本日柴大紀摺內有武舉陳宗器黃奠邦等率領義民奮勇殺賊此等武舉義民非辨兵可比能打仗出力更應格外優奬著即查明將陳宗器等拔補千總等官以示鼓勵其有奮勇出衆者即超擢守偹亦無不可並著常青一體查明義民向有實在出力者必須迅速嘉奬破格拔擢庶伊等共知奬勸用命爭先於剿捕更為得力其署諸羅縣知縣陳良翼堵禦賊匪甚屬奮勉即著實授柴大紀普吉保果能將賊首林爽文生擒解京其功甚大必邀不次之賞但該總兵等若自審兵力尚單不能率兵冞入搗穴擒渠亦應持重不可冒昧輕進究應俟常青統領大兵到時會合夾攻為是其逆犯王芬首級既據常青查究明確所有砍殺王芬之義民鄭岱等俱應酌量奬賞同日李世傑奏言請於蘇州松江等屬常平倉貯項下動撥榖二十萬石碾米十萬石由松太一帶海道運閩省泉州聽候撥用以濟軍需奏入上命軍機大臣傳諭李侍堯李世傑閔鶚元曰昨據李侍堯等奏委員前往浙省購辦米石不拘多寡一得捷音即令停止採買是浙省續辦之米尚可偹而不用又何須江省動撥倉榖碾米運閩惟是閩省糧米向藉臺灣接濟今臺灣賊匪滋擾小民耕種失時不但該處所産之米不能運至內地且漳泉等屬因商販稀少市價稍有加增兼以臺灣支給口糧撫恤難民等事需用浩繁轉須由內地運往此時或不妨寬為籌偹俾民食兵糈益資充裕現在江省倉榖業經李世傑等動撥出碾且毋庸配渡起運著李侍堯察看情形如兵糧民食足敷應用不須鄰省協濟即咨會李世傑等停止起運倘閩省糧米尚有未敷必須廣為儲偹亦即一面咨會李世傑等令其委員押運一面奏聞二十六日壬辰上命軍機大臣傳諭常青李侍堯藍元枚柴大紀普吉保曰現令軍機大臣審訊林小文供林爽文所居之大里􅳥莊縱橫皆約有五里可容萬餘人此內林姓聚族而居共有三千餘丁莊內以大毛竹為墻垣墻外有溪水環繞等語將來擒獲首犯剿滅賊巢後所有林姓各犯三千餘人俱係黨惡附逆必須搜捕净盡不可使一名漏網但據供大里杙莊以毛竹為墻垣周圍又有溪水環繞且賊匪盤踞已久其防守自必周密常青到彼時務須四面圍繞設法攻砍此等毛竹圍墻當以火攻為上䇿所有應用火藥不可不多為預偹設有不敷即當由內地調取至籌偹軍械火藥等項源源接濟著交李侍堯專辦倘有短絀惟該督是問至林爽文屢次攻擾諸羅似因柴大紀任臺灣總兵日久稍有威望是以專力侵犯使柴大紀不能抵禦為其所圖則此外諸人更可不以為意得以肆行無忌柴大紀能悉力堵禦奮勇殺退甚屬可嘉常青令參將潘韜帶兵一千餘名前往協剿助其聲勢甚合窽要但普吉保駐劄鹿仔港距諸羅甚近自亦必有賊匪來擾斷無坐守之理何以未據該鎮奏及著普吉保即將近日鹿仔港有無賊匪滋擾及堵禦截殺情形據實速奏藍元枚帶領浙兵前抵鹿仔港固不可冒昧向大里杙賊巢進攻但諸羅彰化斗六門大武隴等處南北通衢皆為賊人占踞藍元枚至彼當會合普吉保整頓兵力先至諸羅幫同柴大紀設法殱擒以便常青將南路賊匪除净直由中路北路進抵大里杙不致中途少有阻撓方為上䇿至本日解到四犯皆係義民擒獲又解到賊匪蔡綱供稱跟隨賴樹打仗夥黨共五六百人後遇義民四五千前來攻剿即被殺散拏獲等語是鄉勇義民不僅奮勉可嘉而且較之官兵數多著常青即行查明加意奬勵破格賞擢俾伊等益知激勸於剿捕更為有益欽定平定臺灣紀略卷十八
