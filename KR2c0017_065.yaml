  text: 欽定四庫全書欽定平定臺灣紀略卷六十五
  hash: sha256:8d71345a449c9ff9e02c9999bc78cb898164a93f220d4e3fee9a048c6a5fd17b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_065-1a, image: WYG0363/WYG0363-0799c.png}
body:
  text: 十月十二日庚子徐嗣曽奏言因查辦叛産犯屬檢齊將軍參贊提鎮及各地方官先後拿獲匪犯凡奏明詳報有案者計一千五百餘名開列名單發交該地方官等核對辦理據署嘉義縣張森禀稱柴大紀所奏正法及戮尸各犯內有許懷等三十五名尚在訪係柴大紀誤拏經前任知縣陳良翼審屬良民據保釋放復扶同揑報等語查許懷等既經審非賊夥取保釋放何以柴大紀竟奏稱正法戮尸陳良翼復又聽從揑報其舛錯荒謬實出情理之外隨親赴嘉義查辦許懷等三十五名內已經該縣張森傳喚到案者九名臣抵境後自行投到者十五名逐一嚴訊許懷等供稱上年正二月內嘉邑甫經收復或因官兵初到出城迎看或因遷避他處回至縣城探視途中誤被捉拏並有肩挑販賣及在店生理遇不肖之兵丁義民强買搶取與之較論轉被誣拏者實無從賊情跡訊之原保人等堅稱當日縣城初復緝匪務嚴如城內遇有賊匪我等正要擒獻究治豈肯轉為容隱惟因稔知許懷等實係良民方敢出結等語伏思縣城當甫復之時正嚴緝餘匪之際兵丁義民等見有形迹可疑者從而掩捕甚至貪功妄報挾嫌誣拿皆所不免兹臣甫抵嘉義所有案內應訊之人不待查拏俱各自行投到察其詞色確非附賊情虛者可以詭托且內有張海已年逾八旬翁送來年甫十五素患瘋病之陳應避難流離之畨婦留娘其衰弱疲癃勢難從賊更可一望而知而原保人等或身列衣襟或曽充義民以及鋪户耆老俱以數人而保一人且于臣審訊時原保之外更有出具保狀情願質證者數十餘人俱皆衆口同聲以許懷等前被誤拿若非陳知縣審釋必皆死于非命環欣瀝陳情詞迫切是許懷等三十五名委係平民並非賊黨實屬可信隨訊據陳良翼供上年柴大紀克復嘉義之後凡遇官兵義民有報獲之犯不論在何處拿獲即以臨陳生擒賊夥若干名遽行入奏一面發縣取供録報先後共有二百餘名除訊明實係匪黨俱經正法外其許懷等三十五名實係被人誤拿向柴大紀回明省釋柴大紀以事已具奏並經咨報各處必欲按名正法我又率教諭江浩巡檢邵宗堯前往力爭並告以民心初定若再駢戮無辜恐致激變等言痛切指陳柴大紀云已奏明係拿獲匪犯萬難更改爾若要開釋必須照依原奏通報立案我就不管否則必要將伊等正法等語誠恐再與違拗必至將許懷等提到軍營處決所以就照他録供通報始將許懷等釋放等語是柴大紀于此案貪功混報回護朦朧實屬辜負聖恩玩視民命除柴大紀現已請㫖即行正法外查陳良翼率衆守城于柴大紀已經奏報之匪犯訊明實係良民力爭釋放不致枉戮多命現據案內各士民等翕然同辭尚以陳良翼能保全無辜感激流涕出于至誠設使陳良翼並無揑報一節于此案不但無罪而且有功乃以已經保釋之民人仍作為正法戮尸之匪犯扶同柴大紀混行通報又不及早據實稟明至此時查辦緣坐始行情急呈稟實屬昏憒背謬事關軍務未便以柴大紀奏報在前稍寬其罪陳良翼應擬斬監候再查叛産犯屬必以正犯之名姓為憑其正犯之名姓當以奏案為根據乃現經查出柴大紀奏案內許懷等委係良民並非正犯即應于匪犯名單內扣除凡從前單內所開均須詳慎稽核且賊匪狡獪百出恐尚有詭托假名及一人而有數名一名而有數人者至如臨陳殱戮之賊全無名姓可考但此等敢于出陳抗拒之犯最為凶惡未便以姓名未著轉滋縱漏臣飭諭各屬于履勘所到遇有田園荒蕪無人收管者向莊耆地保人等細加訪察如遇賊人之産概行標記入官即可根究姓名緝拿犯屬如此四面搜訪務使名單之內不致有舛誤株連名單之外不致有幸逃踈漏以期兩無枉縱現奉諭㫖各犯在內地所置田産不必概行入官著于各該犯族衆均勻分賞該犯等族衆益當激發天良安分為善臣實不勝忭頌欽服查內地叛産必先就臺灣查明各該犯籍貫住址及有無親屬財産彚齊開列名單密咨本籍查辦以免紛擾而防隱匿臣現飭該地方官及委員等按名詳細訪查核實辦理不得以遽咨內地了事致啓草率諉卸之弊各屬稟報已獲犯屬共有三百餘名已查出叛産共有一萬餘畝其解到犯屬臣俱面加詳審以防訛混現已起解男婦計六十餘名年未及嵗之男犯計三十餘名其餘再陸續審明起解仍嚴飭將未經查獲之叛産犯屬趕緊妥辦彚冊具報再護臺灣道楊廷理在嘉義平埔山邊將黃天養拿獲委軍需局員錢受椿審訊據供莊大畏與該犯曾在梅子坑內山洞藔躲避隨即親帶丁役馳赴內山將莊大畏拿獲臣等逐加研訊據黃天養供稱為莊大田管種田畝從賊攻城一次于上年十一月內聞大兵到畏懼逃避內山結藔居住本年四月內莊天畏尋到山藔一同藏匿八月間出外探聽消息遂即被拏莊天畏供稱係莊大田幼子本年正月內與莊大田失散後逃入內山偷挖地瓜度日欲到台斗坑尋訪黃天養及族叔莊潭不知路徑途遇蕭然引帶前往在蔣潭家潛往三日後聞四處查拿甚嚴將我送至黃天養山寮藏匿旋即被獲各等語現將該二犯派員解京莊潭蕭然將首逆之子窩留容隱照例擬斬立決奏入上諭內閣曰柴大紀自到諸羅後恇怯畏葸每次奏報禦賊情形妄稱俘馘多名以掩其株守不前之罪即義民兵丁緝獲匪犯亦俱稱臨陳生擒飾詞入告種種詐妄不實已出情理之外兹復查出許懷等三十五名被兵民誤拏尚在羈禁候訊柴大紀先已開單具奏混開正法七名戮尸七名及該縣陳良翼訊明實係良民柴大紀必欲回護原奏按名正法爭執再三復令該縣扶同揑報始准釋放是柴大紀妄奏冒功朦混回護幾令無辜良民數十人陷于重辟情節尤為可惡柴大紀已于前案正法核其所犯貪詐之罪必須將伊子一併懲治方蔽厥辜從前甘省冒賑案內因王亶望等贓私狼藉拖纍多人釀成巨案罪浮于法是以查明伊等之子發往伊犁今柴大紀貽悮軍機失陷地方又復挾詐欺罔拖陷無辜尤非王亶望等之止于貪婪玩法者可比著將柴大紀之子查明發往伊犁給與兵丁為奴以示懲警餘著該部核擬具奏上又諭內閣曰莊天畏係莊大田之子被大兵剿散遁入內山據福康安具奏訊問拿獲匪犯等雖供稱業被生畨殺死所供究不足信仍應交該地方文武通行嚴緝以淨根株其黃天養一犯係為莊大田管種田畝之犯亦應一併飭拿務獲今徐嗣曽督飭各屬嚴密查拿楊廷理錢受椿俱能認真緝捕跟究踪跡將要犯按名拿獲實屬可嘉徐嗣曽楊廷理錢受椿均著交部從優議叙至莊天畏黃天養二犯即著該撫遴派妥員小心解京審辦莊潭蕭然膽敢容留逆屬即與黨惡無異應如該撫所擬即行處斬以示懲創十一月十二日庚子徐嗣曽奏言淡水磺山封禁之後恐該處仍有私行偷採及官吏等庇縱透漏情事臣嚴飭文武員辨選撥兵役隨時巡緝查拿兹據署淡水都司林登雲巡查海口在八里岔見有船隻寄泊形跡可疑即帶領兵役飛往擒拿獲犯紀品歐冬林評陳里四名驗明該船並無牌照搜出硫磺五百餘斤私鹽三十餘擔訊據供稱船內磺斤係將私鹽與在地民人換得等語臣以磺山現當封禁乃該處民人膽敢勾通偷載私鹽船隻換給硫磺至五百餘斤之多顯有私採透漏情弊且恐不止此一船一次必須將換賣磺斤之犯拿獲徹底根究隨批飭嚴拿復據訪獲王義一名歸案審訊俟解犯到日審明從重定擬至大兵剿匪時奪獲賊械及義民所用軍器經福康安及臣節次追繳現據臺灣府冊報已收過大小炮四百六十二位鳥鎗八百六十四桿刀矛鈎串等項三萬五千一百五十五件臣移知總兵普吉保查明遺失軍械件數于收繳各項內揀選撥補有損壞者量為修整以省製造糜費其器械不合營製者概行改鑄農器按照該民等所繳件數之多寡分别給賞臣再行嚴飭實力查追務期繳銷淨盡使民間無敢私藏軍器得歸實用以肅營務而安海疆至現屆農隙之時各處應建工程正可趕緊辦理查前奏府治城垣近海西面一帶有礙工程之處應遷移鋪户民居約千餘間兹臣細加相度尚可省折民房數百間于城工丈尺亦並無增減已傳齊該商民等諭令遷移每間給豫工費銀三兩該商民不致失所甚為踴躍趨事月內即可興工建築再據署臺灣府徐夢麟稟稱該員于淡水同知任內㑹同將辨等帶領兵民分路剿禦賊匪與營員熟商須添造火器以資戰守該員自行捐資收買民間農具廢鐵鑄成九節炮二百四十位到處用以轟擊甚為得力除損失外現在尚存炮二百二十三位俱屬整固已移交後任收庫留為捍衛地方等情查炮位為營中利器臺灣各沿海口岸及城郭汛地俱應相度形勢添設炮位以資守禦現有官兵義民繳存炮四百六十二位合之該府捐造之炮共六百八十五位擇其堅固厚重試放堪用者安設各處計已有盈無絀餘剩炮位分撥各㕔縣妥為收貯每年㑹同營員演洗一次以免鏽廢逐任造冊交代毋許遺失于防範海疆要區更為周密奏入報聞十三日辛丑徐嗣曽奏言續獲匪犯黃俊黃代胡嘪莊開陳轎蔡松饒小川陳露余軍等九犯嚴鞫均係賊中股頭並無受封僞職或從賊攻城打仗或殺害官兵義民據各供認不諱法無可寬臣于審明後即行正法照謀叛例查拏各犯家屬分别緣坐奏入上命軍機大臣傳諭福康安徐嗣曽曰徐嗣曽節次奏到各摺俱係單銜該處道員乃係巡撫所轄萬鍾傑雖已到任自不便與巡撫聯銜奏事至普吉保係總兵大員一切事務皆應幫同巡撫辦理乃總未見其與徐嗣曽聯銜奏事可見其不能振作有為若竟令其在彼専辦一切殊難勝任現在萬鍾傑已抵臺灣該員以臬司辦理臺灣道事有奏事之責將來徐嗣曽內渡後所有應奏事件俱當令鎮道㑹銜具奏以重責成至魏大斌前因帶兵救援嘉義縣不能殺賊解圍降㫖革職後以其隨同打仗尚為出力復加恩以遊擊補用今于緝捕洋盜能率領兵役上船拿獲尚屬奮勉著傳諭福康安遇有該處參將缺出即以魏大斌題補以示奬勵二十一日己卯上命軍機大臣傳諭福康安曰上年福康安前赴臺灣特賞給右旋白螺帶往是以渡洋迅速風靜波恬咸臻穩順今思閩省總督將軍巡撫提督等每年應輪往臺灣巡查一次來往重洋均資靈祐特將班禪額爾德尼所進右旋白螺發交福康安于督署潔净處敬謹供奉每年督撫將軍提督等不拘何員赴臺灣時即令帶往渡海俾資護祐俟差竣內渡仍繳回督署供奉至前往巡查大臣亦不必因有白螺冒險輕涉總視風色順利時再行放洋以期平穩十一月二十五日癸未徐嗣曽奏言戍兵曽忠良一名于上年八月內赴援鹿仔草被賊衝散潰逃在各處打柴割草度口經守備吳大瑞拿獲又戴得生一名于五十年十二月內避賊逃匿各處替人肩挑度活經營兵葉廷輝拿解又陳明璉林長永鄭廷瑞三名各在嘉義彰化等處防守當逆匪猖獗之時被賊拿去脅令守營煮飯等事至上年十二月賊匪逃散後赴鹿仔港軍營投到又顔略一名于彰化失守逃匿各處偷揠地瓜度日至上年八月內赴營投首又征兵林桭萬一名于上年九月間因該管官給發餉銀令其換錢買物途中遺失銀兩不敢回營在野地草藔內躲匿至十月內遇見素識之義民引帶投回以上各犯由臺灣道府等陸續審擬招解查曽忠良戴得生二名遇賊恇怯潰逃雖嚴加刑訊並無從賊情事但當蕩平日久尚不悔罪投出情殊可惡陳明璉林長永鄭廷瑞三名久陷賊中甘為役使至逆匪將次撲滅之時始行投出法難寬貸均未便稍稽顯戮審明後即已按名正法顔略林振萬二名逃後並未從賊在軍務未竣以前自行投首均應發伊犁等處給種地兵丁為奴其餘未獲潰兵仍嚴飭各地方文武及海口員辨認真跴緝稽察並出示曉諭村莊百姓毋得縱隱容留致干重罪俟有續獲及投出之犯再行分别嚴辦再查逆案內賊目股頭除臨陳痛加殱戮及蕩平後節次生獲正法外復經福康安及臣于南北各路四處訪查餘匪姓名開列名單通飭各屬嚴拿隨獲隨辦惟是臺灣刁悍成風民多健訟或不肖兵役藉端訛詐或閩粵漳泉之人挾嫌誣揑動輒以緝匪為名訐爭不已甚至羅織多人株控無辜臣于審訊時俱經細察虛實遇犯嚴懲斷不因防有弊端轉致懈于緝匪但思蕩平已久未便以漫無區别紛紛海捕遷延時日致閭閻或有擾纍查從前所訪匪犯名單非得受僞職之賊目即糾約多人之股頭自係著名黨惡與被賊脅從者不同核計已獲者十之七八其餘未獲之犯八十餘名雖據獲到各犯供稱或被官兵生畨殱戮或業經病故但賊夥供詞狡獪斷難憑信未經生獲仍當按名查拿審明嚴辦務絶根株使惡黨不留餘孽臣現在飭行各屬並出示曉諭兵役義民人等此後查辦餘匪總以單內所開為憑勒限上緊嚴緝酌豫勸懲毋使一名漏網此外更不得搜拿以杜訐告而息紛擾則逆案可期速結要犯亦不致幸逃再上年冬間遭風擊破船十七號除林合順等齎遞公文外其餘十三號俱係裝載軍米內蔡球琳等六船有搶出撈起米石並淹斃水手自屬可信其曽長鑑等七船船米俱失亦委係遭風失水並非揑飾是該船等委因猝遇颶風人力難施致遭沉失實屬可信所有共沈失軍米三千六百七十餘石可否准豫豁免奏入上諭內閣曰海洋風信不常船隻破溺在所不免且運送軍米事屬因公今既據該撫查明實因猝遇颶風人力難施致遭沈失淹斃多人殊堪憫惻所有各船內淹斃水手兵丁著該督等查明照例賞恤其沈失軍米三千六百七十餘石俱著全行豁免以示軫恤上又命軍機大臣傳諭徐嗣曽奎林萬鍾傑曰向來臺灣一切案件有應歸總兵辦理者有應歸道員辦理者事權分隸文武衙門或致日久互相推諉將來徐嗣曽內渡後所有臺灣應辦事件俱著責成奎林萬鍾傑二人㑹同辦理如有應行具奏者即著聯銜具奏不得岐分文武彼此諉卸奎林萬鍾傑惟當加意整頓㑹商妥辦遇有案件從嚴辦理庶奸宄咸知斂跡地方益臻寧謐十二月初二日己丑圖薩布奏言拏獲天地㑹匪犯陳丕訊供䆒出傳㑹之僧人提喜籍隸福建漳浦縣住在髙溪鄉觀音亭又同㑹之陳彪住在平和縣雲寮鄉趙明德住在漳浦縣雲霄城北門內倉邊巷已飛咨閩省嚴拏務獲現將陳丕確審定擬奏入上命軍機大臣傳諭福康安曰天地㑹匪前經福康安拏獲嚴烟時即供有傳㑹之僧人及陳丕陳彪趙明德等犯兹據粵省拏獲陳丕一犯䆒出僧人提喜陳彪趙明德各犯住址下落均在閩省漳浦平和縣地方務當按名拏獲正法以絶根株計此㫖到時福康安自早已抵任著傳諭福康安即督飭所屬按照該犯住址嚴密查拏務獲毋令聞風逃竄十二月初八日乙未徐嗣曽奎林同奏言查明叛産入官酌定一切章程一匪犯名下查出田園應核實征租以杜隱射也查臺地抄封田産舊案每甲報徴租數止于六石或八石不等惟此案賊産與尋常犯産逈不相同緣臺灣業户開懇田園召佃承種即將所費工本收回名犁頭錢每甲得銀一二百兩每嵗止抽分租六石至八石不等又有佃户自行開懇者因村黎未諳科則倩城市殷實之家充當業户代為經理納糧亦祇抽給租數石名為田面租其佃户承耕之後又覔雇工人代耕牛犁籽種悉係工人自備佃户與分租息每年每甲可得數十石名為田底租此業户得租數少佃户得租數多其田雖係業戶出名而實歸佃户承管也從前抄封案內如翁雲寬楊光勳等俱係業户犯事與佃户本無干涉是以每年止徴業租並未查及佃産今查此案逆匪糾聚佃戶從賊者多業户從賊者少業户從賊如陳泮蔡綱之類其佃户無有不從賊者固應一例查抄至于佃户從賊其業户雖未從賊而不能約束舉報已難辭咎且業户前已得交犁頭錢即與賣業無異今佃産既有入官更未便于官租之內轉行抽給業户此案除雇工人作賊其産本非所管應免查抄外如業户佃户從賊則其産概當入官若僅照舊案辦理但有業租而無佃租但論其田面而不及田底適為蠧胥等中飽舞弊臣已徹底查明是以此案議租加逾數倍庶公項不致隱漏而匪案亦足昭懲警一查核田園嵗收租額應分别各路情形以定等次也查彰化淡水田皆近溪一年兩熟約計每田一甲可産榖四五十石至七八十石不等豐稔之年上田有收至百餘石者旱園較水田次之嘉義鳯山田園距溪較逺聞有單收者較彰淡次之臺邑沙地居多多係單季收成較嘉鳯又次之此各路田園嵗收不同也所有入官叛産招募殷户佃種完納官租應確勘田園之肥瘠分别上中下三等以年嵗收租額除酌給佃户租榖撥貼牛具籽種及每年修理田圳工本外淡水彰化二處每甲上等田可收官租榖三十二石中等田可收榖二十六石下等田可收榖二十石上等園如中等田中等園如下等田下等園可收榖十八石其零星荒埔最為瘠薄者較下等園再折半征收嘉義鳯山兩縣較彰淡約可收官租榖十分之九臺灣一縣較彰淡約可收官租榖十分之七臣等細加體察别肥磽之等酌豐歉之中以為定額總使細民工本之外嵗有嬴餘現在採訪輿情已多踴躍應募期於承種官田可垂永久一田園既有等次不得援照賦則率以下等園地納租也臺地報墾升科于乾隆九年欽奉上諭照同安則例分上中下則檢查數十年來民間報率係下則並無以上中升科者竊思臺灣生齒日繁土田日闢叠奉恩㫖蠲租薄賦此時固不值因叛産一事將全郡民田賦則紛紛查勘改增但現在田園既經查明內有上中等則未便任其以舊定賦額本係下則為詞致使入官叛産與民間賦額同科且使膏腴之産與瘠薄竟無區别則實在瘠薄者轉見偏枯不足以昭平允現飭該道府等詳加確核務使等則分明據實區别倘地方官不行查實或致吏胥髙下其手立即嚴揭請參從重究辦一嵗入官租除扣出應完正賦仍徴本色外其餘租應令徴收折色以杜弊而便民也地方官徴納租糧辦理不善弊竇叢生最為閭閻之害臺灣吏治廢弛雖大加懲創之後現在各㕔縣尚知警惕但恐日久玩生難保無掯勒浮收情弊此案完納官租榖較多至此時立法之初必須通盤籌畫永絶弊端臣等詳查此等叛産多在近山距縣城數十百里不等每户完納租榖數十石至數百石不等若令各完本色肩挑車運費用倍增且民租就田分收俱係鄉斗毛榖較之官斗交倉必須乾圓潔淨者不同又園地之中率皆種植地瓜甘蔗雜糧等項民租向係折交業户今若槩令買榖完納佃力似恐難支查此項租息加貼戍兵本須支給銀兩若令糶榖易銀輾轉出入徒滋浸扣虧那之弊此官租徴粟不如折色征銀之為便也臺灣舊例充公田園及莊息護租變價報銷案內每榖一石變銀六錢及六錢二分五分不等照依時價未免嵗有參差所有此案折色應照閩省部定榖價每石折銀七錢以歸畫一一官租折色銀兩應酌充貼補戍兵之用也臺灣換防兵丁前奉恩㫖令將入官叛産酌量撥給幫貼兹又經軍機大臣奏准照新疆換防之例議給行糧坐糧仰見聖主軫念戎行有加無已至意竊思戍兵眷屬在內地支領銀米貼補養贍已沐格外恩施惟臺地食物昻貴恐該兵等本身用度尚有不敷易滋貿易營私等弊兹所議增加銀兩應請就臺地支給本身以資貼補查上年滿漢征兵鹽菜口糧俱于常例外加給四錢現在臺灣各項戍兵于每月應得錢糧外均請即照四錢之數按名加給該兵等得項更屬寬餘感激天恩自必倍加奮勉通計臺屬兵丁每嵗共需加給銀六萬三千三百餘兩現據查出各路叛産已有三萬三千八百餘畝除扣徴正供外餘租折色約可收銀三萬二三千兩此外有續行查出者應再加入併算又從前械鬬案內之翁雲寬㑹匪案內之楊光勳等抄産前本議給熟畨作為屯田現查該畨等有埔地五千餘甲田面田底俱歸承種每一名受田一甲可得榖三四十石已屬寬餘足敷分撥臣等查出此項嵗收租息每年約可得榖三萬石可變價銀三萬三四千兩應請一體歸入兵糧項內如尚有不敷再于臺灣府鹽埕項下查出溢額盈餘充補計戍兵加貼所需有嬴無絀可無庸另籌經費于便民充公兩有禆益奏入上從之同日徐嗣曽奎林同奏言據按察使兼臺灣道萬鍾傑詳稱乾隆五十一二等年應行造補綏字八號等三船又届期應修平字六號等十八船又收厰未修平字五號等十船共船三十一隻因值辦理軍務不能趕造逮蕩平後經永福移交護道楊廷理亦因乏料尚未興工現在例限久逾即當趕緊造竣以應營需惟查修造戰船應需臺地樟木紅柴碇舵等料俱産南北兩路山場召匠蓋藔均需時日秋冬間在山採製各料須俟明年夏間溪水漲發始能順流運至海口配船一時難于齊集至應需內地桅木龍骨油丁棕鐵等項均由各處採買運厦附搭商艘來臺近因臺灣初定商船到臺稀少內地料件不能迅運兼之現辦城垣營防各項工程需用匠夫既多各路歸莊民人又須蓋屋以安棲止再四籌維應修應造船三十一隻勢難同時趕辦請自明嵗開工分作兩年修造報竣等情臣等查臺澎各營額設戰船共八十一隻除應行修造三十一隻外現有存營船五十隻足敷操防于營務可無貽誤據該司所詳集料鳩工需候時日一時難以備辦均屬實在情形應請准其分作兩年趕緊修造完竣交營收管再查臺灣向例凡徒流以上案件俱解送內地由司審轉核辦臣到臺以來清釐積案即就近提審辦理叠經奏蒙聖鑒兹臣內渡後竊思臺地緊要案犯仍當立示懲創未便拘泥事例輾轉稽遲除一切尋常案件照例招解內地外如逆黨餘匪命盜重案以及悍兵蠧役擾害地方情罪重大者應即由臬司萬鍾傑㑹同鎮臣奎林一面審辦一面奏聞又臣在臺時所辦題案業經臣審明定擬其各案內人犯亦毋庸再解內地應候部覆到日歸臬司分别辦理臣現為臺灣懲治地方起見酌籌變通如一二年後民俗大有轉移凡一應案件仍當照舊例解送內地審勘以歸畫一至臺郡改建土城已于十月二十七日興工東南北三面均照舊址興修所有舊栽䓶竹仍應留存環繞城垣並疏浚深壕以資捍衛其近海西面一帶收進一百五十餘丈應拆動民房數百間已遷移東北隙地妥為安頓小民不致失所適奏調來臺之耒陽縣知縣成明亦已抵郡一切程式做法令其悉心經理與各委員等分段督辦查郡城所用工料前經工部侍郎臣德成勘估約需銀十二萬四千六十餘兩尚有細數估冊例應造具題報後興修但臺灣逺隔重洋未便輾轉守候致稽時日是以臣即令趕緊興工總以德成所估之數為限不得稍資浮濫仍飭該道府等核實確估造就細冊再行送部查核其召募民夫工價嚴飭該地方官留心稽察毋許胥役等稍有浸漁科派致纍閭閻並于每日例價三分之外酌量寬為賞給務使小民踴躍趨事工程鞏固至嘉義舊有土城須增髙加厚委員夫役等不能同時兼顧應俟郡城報竣後再行興築此外如彰化鳯山淡水等處城圍仍用䓶竹栽插繞城加浚深壕添設石卡及各屬衙署學宫倉厫監獄等項工程並令成明㑹同地方官逐一勘估興修另行造冊題報再查臺灣自軍興至蕩平以後凡守城撫恤辦理軍需報銷以及查勘工程叛産等事在在需人委用臺屬地方各官不敷差遣是以從前將軍等隨帶過臺及押送銀米各員並廢員中情願報效尚堪驅策之人多有留臺差委者又經福康安奏調丞倅等十六員來臺専辦撫恤事竣後另有委用亦大半未經內渡臣現將報銷各案帶至內地核辦除向在局中承辦之員酌帶數人回省外其餘留臺差遣者尚有二十餘員統俟城工報銷等項俱行報竣後核其在臺之久暫勤惰分别等第另行具奏奏入報聞欽定平定臺灣紀略卷六十五
