  text: 欽定四庫全書欽定平定臺灣紀略卷四十七
  hash: sha256:e7656a2a4edc3ef1158c6b551a89be00a8ed5aac518b50839bf8d632538c8a4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_047-1a, image: WYG0363/WYG0363-0558a.png}
body:
  text: 十二月初四日丁酉孫士毅奏言聞福康安從鹿仔港親身統兵進剿於十月初七八行扺元長莊殺賊無數賊匪大敗四處潰逃福康安仍即統兵前進同海參贊一齊打進諸羅城又總兵梁朝桂在鎮平莊攻剿賊匪連獲勝仗腳上受傷各等語如此信果真則將軍福康安等已痛加剿殺直扺諸羅軍威大振不獨諸羅之圍已解並逆犯林爽文等自必魄驚膽喪立見掃除奏入報聞初八日辛丑上命軍機大臣傳諭福康安海蘭察李侍堯徐嗣曽曰前據李侍堯孫士毅等奏福康安海蘭察前抵諸羅縣城諒屬確實福康安或因初到縣城接濟糧餉調度一切未及即時拜摺一二日後自當馳報捷音今已閲旬日總未據福康安有摺奏到殊不可解朕因臺灣剿捕賊匪未即迅速蕆事宵旰焦勞福康安所深知今既直扺縣城與柴大紀㑹合福康安自應將統兵前進沿途剿殺賊匪及抵縣城後如何布置會兵進剿並如何接濟諸羅被困兵民糧食各情形即時詳晰馳奏且孫士駐劄潮州係屬隔省亦經具摺奏聞何以福康安自前月初五日在鹿仔港發摺後距今一月有餘並未據續有奏報而舒亮帶兵赴大里杙㑹同進剿此刻自已得有勝仗亦未據奏及即或因海洋風阻臺灣奏摺未能如期遞送內地而李侍堯現在蚶江厦門一帶自必得有地方官禀報何以亦未據續奏李侍堯在彼不過照料過兵運米等事有何忙迫而亦不暇繕摺馳奏耶至梁朝桂前在鹽水港帶兵奮勇曽經賞給巴圖魯名號與賊打仗受傷後加恩賞戴花翎伊前在金川軍營屢著勞績此次剿捕賊匪又能奮勇出力實為祿營鎮將中出色之員但前據柴大紀接到梁朝桂咨內以所帶征兵不敷攻剿靣禀恆瑞於各營盤酌量抽調再行前進並稱凡事皆由恆瑞主持事之能行與否不能自專等語已降㫖令福康安查詢具奏今看梁朝桂打仗受傷情形是伊頗能勇往直前身先士卒前此禀請恆瑞抽撥官兵攻打前進之語自係急欲援應柴大紀而恆瑞不能用彼或竟有心忌梁朝桂先往得功故為掣肘之處著再傳諭福康安切實訪查並詢問梁朝桂及隨營將辨恆瑞有無此等情節據實覆奏十二日乙巳李侍堯奏言本月十七日以後總未續得臺灣信息將軍等既無奏摺過境各官亦無稟報連日海洋風􅰆甚大蚶江厦門兩處俱未有船進口無從詢訪想此時福康安等當已有奏摺在途尚未遞到或已經得手勢有可乘欲竟待大有尅獲一併具奏亦未可定再貴州總兵許世亨帶領官兵二千已於本月二十二日在蚶江放洋前往鹿汓港臣所𣲖本省兵一千往常青處者亦已於二十五日在厦門放洋湖南兵現亦陸續入閩約計十二月初十日內可抵蚶江沿途夫役俱已早為偹辦不致有誤俟一到蚶江臣即照料配渡奏入上命軍機大臣傳諭李侍堯曰旬日以來總未據福康安奏到捷音但揆度情形自斷可無意外之慮福康安海蘭察統兵進剿聲威壯盛所帶巴圖魯侍衛章京等俱趫健絶倫一以當百且川省屯練及貴州兵屢經徵調最為得力而廣西湖南兵亦俱係生力徑旅自可乘鋭奮剿其恆瑞普吉保所帶之兵雖駐守日久不無氣餒但見有新到徑兵數千壯其聲勢亦自當振奮是福康安等抵縣城後自必會合攻剿所向克捷即賊匪欲逞其故智於官兵進縣城後復行攔截而福康安等亦必預有布置相機堵禦斷不至墮其術中計其所發之摺此時諒已在途想因風信所阻未能速達今觀李侍堯之奏風􅰆甚大亦合朕度量之意惟俟風定福康安奏摺進口即飭沿途星飛馳遞以慰厪切十三日丙午孫士毅奏言數日以來臣分遣辨員於各海口上緊探訪風聞福康安殺散賊匪之後分兵前進直剿大里杙現在賊衆驚惶已有解散之勢奏入上命軍機大臣傳諭福康安海蘭察常青李侍堯孫士毅曰孫士毅所奏情形係得商販傳聞自屬確實想福康安奏報之摺竟因風阻滯未能速達朕於臺灣軍報晝夜縈懷福康安素所深知今既得勝仗與柴大紀㑹合攻勦即使軍務紛繁亦豈有不速行馳奏以慰朕懷之理看來福康安於扺縣城後㑹兵進勦聲勢壯盛賊匪自必紛紛潰散返顧巢穴而舒亮又與徐鼎士於大甲一路進兵夾攻大里杙之背此時賊勢窮蹙自必聚集一處希圖保護巢穴今大兵四面環攻正可聚而殱擒諒此釡底遊魂斷不能久支時日惟大里杙係屬賊巢聞賊人負嵎恃險竭力防護築有城堡刨挖溝濠圍以䓶竹以為抵死抗拒之計此時福康安統兵進攻若能即時摧破無須用炮轟擊固屬甚善倘察看情形該處亦與金川之勒烏圍噶喇依相仿官兵攻搗或需時日不若用炮轟摧更為得力此皆福康安經過之事著福康安或將軍營所帶小炮改鑄大炮施放攻打可期一舉摧破賊巢迅速集事目下已屆年節正迎禧集祉之時福康安等務須倍加奮勉尅期蕆事十四日丁未福康安海蘭察鄂輝同奏言初六日帶兵起程赴援諸羅途中分起行走防偹賊人抄截初七日申刻行抵元長莊於普吉保營前數里安營查閲該鎮所帶官兵內挑選可用者隨行計新舊兵丁共有六千餘名又挑義民千餘名一併帶往查元長莊以南處處皆賊匪屯聚攔截援兵之路而諸羅日被攻圍危在旦夕援救稍遲必有疏失必須不避艱險深入賊中直抵縣城方能得手即將各兵分為五隊臣福康安與海蘭察鄂輝普爾普穆克登阿普吉保額爾登保及巴圖魯侍衛章京等分隊帶領凡遇賊莊即行勦洗並預為約定各隊互相援應將義民分為兩翼跴探道路村莊如遇賊人抄出即可分投堵截部署已定遂於初八日寅刻發兵褁帶口糧前進黎明時行抵崙仔頂地方賊匪多人潛於竹圍內施放鎗炮一齊擁出我兵屹立不動鎗箭齊發臣楅康安海蘭察帶巴圖魯侍衛衝入賊中賊匪抵敵不住退入竹林兩旁竹圍蔗田內及崙仔尾等處各莊賊匪或數百人或千餘人蜂擁前來抗拒並從中橫截官兵希圖斷我後路臣已預為布置調遣令鄂輝穆克登阿帶領屯練降番扼住右首東莊溪橋普爾普侍衛普寧恭將吳宗茂等帶兵堵截左首各莊賊衆並遣義民分投焚斫竹圍蔗田及各處草藔當將崙仔頂莊崙仔尾莊打通維時已交巳刻恐被賊人攔阻不能迅抵諸羅臣等一面迎頭勦殺一面商令海蘭察酌帶巴圖魯侍衛總兵普吉保及奮勇官兵長驅先進臣福康安以沿途賊匪甚多必須將各處賊莊盡力攻勦使其奔命不暇海蘭察方可直前無阻乘隙遄行隨連攻埤長莊柴林腳新莊仔西勢潭莊游厝莊三塊莊本㕔莊天錫莊灰磘雙溪口上崙莊海豐莊過溝仔莊等處賊無不克捷并將房屋全行燒燬以防賊人散而復聚其莊民耆老持衣出迎及丁壯情願隨行者分别酌加賞恤以廣招徠而海蘭察等沿途奮勇打仗殺賊所向披靡進至牛稠山地方距諸羅約有六七里賊匪阻溪自固在山梁屯劄山後數里即係圍城竹栅賊見官兵將至四面圍褁不下萬餘海蘭察帶同巴圖魯侍衛官兵直越溪河衝過賊陳我兵人人思奮東西攻擊無不一以當百搶上山梁攻克竹栅賊匪紛紛逃竄即於酉刻入城臣福康安所帶官兵處處攻戰天色向暮又值雷雨交作本應暫為歇息但兵機最貴神速未便稍有稽遲隨催兵連夜前進復攻克北社尾台斗坑牛稠莊等處賊莊痛殺賊衆城中義民踴躍出迎歡聲震地即帶兵入城撫慰奬賞守城義民頭目接見襟耆人等宣諭聖恩仍回牛稠山擇其形勝地方安營駐劄一靣出示撫輯𣲖員曉諭良民各安生業城中人被圍已久飢困情形極為可憫現在賊莊所存糧石頗多足資接濟令民人儘數搬運入城現在米價頓減數倍民情歡慶附近一帶並無賊人踪跡初十日臣等出城搜剿賊莊至大崙地方適恆瑞亦帶兵打通半天厝等莊前來㑹合鹿仔草等處賊匪業已全行逃散此次日夜打仗共計殺死賊匪八百餘名鎗斃騎馬賊目六名奪獲賊人鎗炮器械旗幟等物無算生擒賊匪七十餘名訊非賊目即行正法伏查賊匪自滋事以來從未大加懲創經此次痛勦之後業已聞風膽落聞林爽文現已遁往大埔林或云至斗六門與賊目李七㑹合尚未得有確信臣等現𣲖官兵各處搜莊不使賊匪潜行誘聚一俟將村莊搜盡探明各路賊匪情形酌𣲖官兵義民往通諸羅至郡城大路即行相度機宜進搗賊巢跟踪追捕且賊巢逼近內山深林密箐尤當計出萬全設法堵截以期妥速蕆事再軍營糧餉最關緊要擬給臺灣餉銀五十萬兩鹿仔港餉銀五十萬兩淡水餉銀二十萬兩寬為儲偹即賊匪尅日蕩平亦可留為撫恤難民及修建城池之用臣已移咨李侍堯照數撥給迅委妥員解送以應急需又十七日夜間聞賊目林棟黃孔等同賊夥三千餘名在大排竹一帶屯聚查大排竹地方距軍營四十餘里為諸羅迤南近山要路並有僻徑越過縣城直達斗六門巢穴今賊匪潜匿該處與斗六門遙相響應恐不無窺伺縣城之意必須先行洗勦大軍北向方無後顧之虞十八日海蘭察恆瑞鄂輝帶領巴圖魯侍衛分路前往進攻臣福康安督催各隊官兵一同前往甫過馬椆後莊即有賊匪若干排列旗幟見我兵將到一齊退據山梁於逺近竹圍內處處施放鎗炮又欲如從前誆誘官兵希圖從中抄截臣等探明竹圍潛匿之賊俱係虛張聲勢令海蘭察恆瑞自山梁進攻臣福康安鄂輝帶兵直前衝殺賊匪即行敗竄追至大排竹地方該莊係賊匪屯聚之地預恐巴圖魯等馳馬衝突將莊外舊有溝磡刨挖寬深各處要路俱搭蓋草藔安設賊卡􅍆死拒守並於溪河下流築堤壅水深及馬腹巴圖魯侍衛越溝過溪甚為勇往即一面决放溪水我兵得以同時並濟將賊藔全行焚燬殺死賊匪一百餘名擒拿活賊四十三名餘俱四散奔逸上山時已昏暮道路叢雜未便窮追即行撤兵回營稍為休息定於二十日赴斗六門進勦其諸羅至府城一帶屯聚賊匪前𣲖普爾普等由茅港尾進剿十六日遇賊四五千人普爾普烏什哈達分為兩路夾攻衝殺賊匪紛紛奔潰我兵奮勇直前追趕二十餘里奪獲器械百餘件殺賊三百餘名擒拏活賊二十四名訊非要犯業經正法因天晚即在灣裡溪暫駐十七日帶兵沿途搜查村莊民人投出者甚多俱經妥為撫慰行抵三坎店地方距府城十餘里知府楊廷理遵檄率領義民㑹合一處道路均已開通現在各處匪徒俱已聞風膽落逃竄入山臣等赴斗六門後自不敢復至諸羅滋擾但賊人素甚狡黠詭計最多亦不可不嚴行防範現在舊存之兵全數並未撤動令柴大紀在城外西南扼要之地劄營蔡攀龍在城駐守相為犄角加意嚴防不可稍涉大意以困進兵後路再義民內素悉賊情之人有情願密購賊中黨羽接應官兵擒獻賊首者臣已許以重賞令其前往或可生致首逆但所言是否確信未必可侍此時惟當整頓兵力奮勇進攻以期搗穴擒渠迅速蕆事再據鄭國卿禀稱義民首廷元等在鹽水港附近樹林頭朴仔腳等處村莊搜捕餘匪殺賊二十二名擒獲活賊二名業經正法等語並將奪獲賊匪鎗炮鉛子繳送前來查鹽水港義民向稱出力前𣲖莊廷元招撫村莊數十處甚為妥協今復能殺賊奪械亦屬奮勉臣已酌加奬賞鼓勵至諸羅一帶地方距山不遠路徑叢雜竹林深密賊匪隨處可以藏匿亦隨在可以奔逃必須嚴搜餘孽以清後路臣等分帶官兵并熟悉路徑之義民首黃奠邦王得祿陳宗器等在賊人舊時屯聚之地詳加搜捕共搜獲賊匪一百餘名並據義民首千總藍應舉在水掘頭莊追殺餘匪焚燬草藔奪獲火藥十二桶攻城大車二輛其餘莊耆鄉民每日擒獻者紛紛不絶臣俱酌加奬賞并將送出賊匪審明正法其並非賊黨為鄉民誤拏之人亦即釋放以杜漳泉民人藉端報復之弊連日以來各莊投出者甚衆即近賊莊等處亦來請示歸莊隨遣義民首陳大用楊梅等招出後璧苦棟腳等四十五莊妥為安輯以離賊黨現在諸羅餘匪漸已搜盡軍營糧餉藥鉛等項𣲖員自鹿仔港鹽水港運來均可源源接濟臣等即日帶兵往斗六門進剿直搗賊巢其舒亮一路據稱十五日前往大肚進剿有賊匪萬餘迎敵我兵過溪剿殺鎗炮斃賊數百名牛罵頭義民由大肚山壓下襲擊賊後奮勇夾攻賊匪潰敗攻破北大肚南大肚王田莊瀨湑莊內灣中灣林仔莊渡船頭莊仔莊大肚社腳新莊仔鼻山囉嘶莊半山莊坑子莊等處十五莊已𣲖兵駐劄北大肚要路即日進攻烏日莊等語查舒亮打仗兩次所有𣲖留巴圖章京二員及將偹官兵義民等均屬奮勇現已酌加奬賞容查出力人員再行具奏再查舊駐諸羅鹽水港鹿仔草兵丁素非經厯行陳之人又因患病傷亡兵力愈形疲乏閩省新兵又復未曽訓練可用者更少現於鹽水港等處滿漢官兵內逐加挑選擇其精壯者隨營聽調並撥交普爾普帶領往通郡城大路其諸羅守城兵丁饑困已久打仗亦不得力仍全數留於該縣以資防守至郡城現存之兵雖未親見然其疲頓餒怯情形大扺與諸羅等處存兵不相上下昨接常青扎稱擬帶兵一千餘名往剿鳳山賊匪等語竊以南路賊勢雖衰出沒仍屬無定常青於行軍之事調遣非其所長防守尚為嚴密臣已覆知令其酌量情形倘或稍不放心毋寧倍加慎重將來大軍進攻大里杙巢穴既傾南路黨羽即可不攻自潰再查逆匪滋事以來到處焚掠莊舍迫脅良民臺灣南北兩路無不被其擾害農民失業甚多情形極為可憫且現在軍聲大振賊黨逃潰其中附和脅從之人紛紛投出亟宜妥為安輯應𣲖專員管理查臺灣各官均有防守城池管理糧餉之責武職官員練事者少俱係帶兵打仗不能紛投差遣臣已咨明李侍堯酌𣲖閩省同知通判二員知縣四員州同州判各二員縣丞四員迅赴軍營專辦撫恤安插各事宜並咨㑹該督照數𣲖撥現任厯練人員如閩省候補人員不敷委署應令該督或於浙省通融檄調或奏請㨂發總期於軍營要務有禆而地方亦無貽悮再按察使李永祺自郡城來諸羅由海道行走于本月十五日已抵軍營一切撫恤安插事宜即令該司總司其事臣仍不時稽察使民人等均沾實惠不致稍有浮冒奏入上命軍機大臣傳諭福康安海蘭察常青柴大紀李侍堯曰官兵自抵縣城後屢戰得勝賊匪聞風膽落已成破竹之勢至賊匪潜匿大排竹地方與斗六門互相應合心存窺伺縣城今經福康安等先行剿洗從此大軍進攻斗六門可無後顧之虞所辦甚好而縣城至府城一帶屯聚賊匪亦經福康安𣲖普爾普等由茅港尾進剿遇賊打仗奮勇衝殺賊匪奔潰已抵三坎店地方距府城不過十餘里知府楊廷理遵檄率領義民㑹合一處是縣城至府城道路均可開通其舒亮一路亦由大肚進𠞰攻破賊莊駐劄要路即攻烏日莊看來官兵剿捕賊匪於南北道路要隘已經推廓賊勢日就窮蹙而軍營糧餉火藥鉛彈等項已由鹿仔港等處源源接運又義民等奪獲賊匪火藥甚多並將賊人存貯糧食運入縣城是軍需民食均為充裕現在貴州官兵昨據李侍堯奏於十一月二十二日已由蚶江放洋自已早抵軍營湖南兵亦於本月初十日內可抵蚶江亦即日可到官兵聲勢更為壯盛福康安等統領進剿乘勝長驅諒此么䯢草竊豈能久支時日惟福康安等摺內稱聞林爽文現已遁往大埔林或云至斗六門與賊目李七㑹合等語逆首林爽文糾衆肆擾狡詐百出今見官軍勢盛跟踪追捕自必急思逃竄若林爽文回顧巢穴逃入大里杙賊莊則官兵四面環攻正可盡數殱擒其事轉易辦理惟當防其竄入內山一路至斗六門距海甚近在在道路可通若林爽文窮迫之際或由海道潛逸官兵追捕不無稍需時日福康安等務宜留心防範於進攻時先將通海道路預行堵截船隻皆令其遠岸勿使乘間逃逸總期將林爽文莊大田等設法生擒解京盡法處治方快朕意耳再前據李侍堯奏賊目李七有歸順之意又私賣糧米接濟嘉義兵民今林爽文欲逃往伊處李七若能乘逆首窮蹙之時設法擒獻即係有功之人不但可以免罪必當格外加恩賞給官職倘不及時省悟立功自贖將來擒獲林爽文後必至一同受戮悔將無及如此示以利害密為開導李七或竟將賊首擒獻更為美事但是否即係招諭之李七著福康安訪查確實並將如何辦理之處即行具奏常青此時若能將莊大田擒獲收復鳳山固屬甚善萬一兵力不敷自應倍加慎重相機妥辦固守府城至縣城一帶村莊民人每日擒獻賊匪其並非賊黨為鄉民誤拏之人福康安於審明後即行釋放所辦甚是此等誤拏之人既非賊黨審明釋放可以安輯衆心又可以解散賊黨現在附近賊莊民人紛紛請示歸莊賊勢日就潰散更無難剋期蕆事至福康安現在咨調內地官員前赴軍營辦理一切撫恤安插事宜李侍堯即𣲖委速令前往以資委用再前因恆瑞普吉保二人俱在中途觀望節經降㫖令福康安查明參奏總未據福康安奏及今看伊二人情節普吉保自鹿仔港進兵以後雖未能直扺縣城但究能收復笨港進抵元長莊又自該處移營距縣城不遠特因兵力不敷尚非有心延玩而恆瑞率領多兵駐劄鹽水港一味株守並無寸進現在福康安等已攻透賊圍直達縣城恆瑞不過乘勢帶兵到縣因人成事並非恆瑞自能奮勇前進是恆瑞之罪較普吉保為重著福康安秉公查核據實具奏並將恆瑞於到後隨同打仗能否自知罪戾奮勉出力抑仍係隨衆行走應遵前㫖令其回京之處一併秉公據實具奏楅康安不可因係親戚稍為瞻狥上又諭內閣曰逆匪林爽文糾集賊黨滋擾嘉義縣城圍攻數月經常青等屢次𣲖兵往援俱被賊匪阻截柴大紀在城內率領官兵義民悉力保護若援兵再遲十日縣城即難固守福康安海蘭察能督率將辨官兵鼓勇直進並不俟貴州湖南續調兵丁到齊即將現有兵民分為五隊𣲖鄂輝等分隊帶領沿途勦殺賊匪俱能奮勇直進不避險阻越過溪河將各處村莊屯聚之賊匪痛加殱殺直抵縣城數月之圍應手而解城內數萬生靈均獲更生之慶並將賊人存貯糧米運入縣城軍糈民食益資充裕此皆福康安等調度有方振作士氣用能克敵致果迅奏捷音自應優加寵錫福康安海蘭察俱現係侯爵著晉封公爵各賞紅寶石帽頂四團龍補掛以示優異其鄂輝舒亮普爾普等及巴圖魯侍衛章京並在事出力之鎮將辨員等俱能率領兵民鼓勇奏績著查明咨部一併從優議叙十五日戊申福康安海蘭察恆瑞鄂輝同奏言諸羅賊匪人數衆多從山麓以至海濱大半占據諸羅圍解時官兵奮勇截殺賊匪潰逃連日搜𠞰自縣城迤西至濵海村莊全已收復餘賊多在近山一帶潛匿諸羅東門北門外距山甚近即相度地勢安設營卡俾聲勢互相聫絡並差義民首黃奠邦密遣妥人偵探賊踪所至跟踪追剿痛加殱戮使賊匪望風畏懼而附和脅從者潛消反側之心不敢復行嘯聚賊黨可漸期解散隨商令海蘭察鄂輝普爾普六十七帶領巴圖魯人等沿十四甲山一路搜查賊莊復令恆瑞帶兵接應臣福康安率同巴圖魯侍衛總兵袁國璜督催各隊官兵以僃往東剿殺行至興化店地方探有賊匪五六千人在該處屯劄見官兵將至齊出山墈排立旗幟甚多臣等將所帶兵分為三隊海蘭察普爾普帶領巴圖魯侍衛在前恆瑞鄂輝帶兵及義民首黃奠邦等在旁協剿臣福康安帶巴圖魯及屯練降番居中調度有騎馬賊目多人執旗往來指揮同賊衆一齊自山墈撲下我兵奮勇迎敵用鎗箭立斃賊目十餘人海蘭察鄂輝恆瑞普爾普及巴圖魯侍衛等一齊衝出賊匪不能抵敵登時潰亂臣福康安帶領各隊官兵盡力追趕鎗箭如雨殺死賊匪五百餘名大炮鳥鎗刀矛旗幟遍地遺棄俱為我兵所得情形極為狼狽自興化店至員林等處賊莊均已焚燒查從前官兵惟以支持堵禦為事即偶得勝仗亦不能乘勝窮追以致賊匪蔓延日久散而復聚今連次追尋賊人屯聚處所痛加殲戮賊始知官兵勢盛潛逃近山地方招集餘黨據守斗六門大埔林菴古坑等處抗拒官兵并恐黨羽離散將賊眷悉行搬入巢穴以堅其心看來斗六門等處為賊匪險要之地可以東走水沙連北通大里杙若從此窮蹙奔逃歸入巢穴不出逆回死守石峰堡之故智轉可聚而擒戮迅速蕆功是攻𠞰斗六門一路實為此時要著查南路賊勢漸衰已咨㑹常青令其固守郡城酌量兵力相機剿撫一面𣲖普爾普烏什哈達酌帶鹽水港舊存之兵前往郡城打通道路并留梁朝桂鄭國卿帶兵仍駐鹽水港鹿仔草兩處柴大紀仍駐諸羅各處戰守機宜均已有偹惟大軍前赴斗六門之路山徑雜出賊莊甚多後路恐有阻截又不能在在留兵零星𣲖守惟有探明村僻路徑先行嚴密搜查方可長驅徑進至臺灣民人奸良相混驟難區别其中附從賊黨者多視官兵强弱以為去就今見軍聲振作請示歸莊者紛紛不絶臣恐賊匪冒充混入其中乘隙竊發即責成義民有身家者保結再令歸莊安業其賊中頭目聞亦有悔罪來投之信臣密訪與賊目素識之人持示前往諭令設法擒獻賊首或帶賊衆來歸許照莊錫舍之例賞給職官使其內自相圖亦解散賊黨之一法再臺灣素不産馬前經李侍堯預偹馬匹俱已解往郡城此次巴圖魯侍衛等打仗殺賊往來馳射最為賊匪所畏現雖囑其愛惜馬力善為喂養究恐日久漸疲無可更換已飛咨常青將厦門解到馬匹交侍衛果爾敏色於打通道路後即行解送軍營應用又據舒亮報稱自鹿仔港帶兵起程初九日行至竹腳中藔適遇田中央大肚溪賊匪數百人前來抗拒經官兵殺退奔逃過溪復有溪邊賊匪三千餘人抄截舒亮督率官兵分路剿殺鎗斃賊匪百餘名餘黨敗竄因該處竹林茂密溪水甚深現擬斫竹搭橋前進等因臣查舒亮一路進逼大里杙牽綴賊勢今既得有勝仗若能直搗賊巢與徐鼎士等夾攻固屬甚善但該處山深林密賊匪自諸羅竄逸後回顧巢穴聚集甚多尤應持重辦理不可稍存大意即日大軍北向聲勢壯盛舒亮乘隙進攻可期得手臣已將進兵機宜行知舒亮令其相機妥辦從前常青自南趨北定於八月十三日起程賊匪聞知四出攻擾官兵不能前進今恆瑞於八月二十二日救援諸羅不能由旱路行走情形自屬相仿其由海道至鹽水港時賊匪攻圍晝夜不息兵力已疲若不顧後路突圍徑進又為魏大斌等之續徒損兵力無益於事並恐鹽水港海口有失所關非細是以恆瑞不敢輕進及復鹿仔草樹林頭後令義民首莊廷元招撫沿海之京林等處五十餘莊令義勇自為守禦並撫緝投出之朴仔腳等十五莊以清後路原擬勦撫兼施連營前進無如過於持重轉涉遲延總由未經軍旅不諳機宜尚無有心畏葸避賊不前情事又蔡攀龍到諸羅後在西門外劄營彼時兵力已疲祗能防守並無復自諸羅殺出打通道路之事前因郡城消息阻隔知府楊廷理率以傳聞之辭具禀李侍堯即稱諸羅圍解據禀入告今臣確切查明復傳蔡攀龍面加詰詢因係損失多兵賊圍仍不能解蔡攀龍即據實陳明懇請革職觀其人尚奮勉且籍𨽻泉州情形亦頗熟悉可否將蔡攀龍酌留海壇鎮總兵原任令其在軍營出力再革職總兵魏大斌人本平常在臺灣出兵又無勞績現在於軍營令其戴罪效力以觀後效至諸羅被圍數月終未失陷者實衆民一心奮勉方能保守伊等又略得餉銀接續與昔日希波軍營被圍時直斷糧餉之景象逈乎不同柴大紀人本詭詐甚染緑營習氣不可倚信是以仍使伊屯駐諸羅將來事竣陛見自難逃聖明洞見同日李侍堯徐嗣曾同奏言船戶錢泰來自鹿仔港回至厦門詢稱伊在鹿仔港時聞得福康安於前月十七八兩日攻得斗六門即進攻大里杙先期出示曉諭附近賊巢之人多有來降者大里杙內亦有欲降之人尚被賊攔阻二十四日官兵進攻鎗炮齊放內中願降者知大兵已到即行殺出官兵乘勢追殺內外夾攻已將大里杙打破等語初三日又有回至蚶江之船戶林任興據稱前月初八九兩日將軍等殺進諸羅柴大紀從諸羅殺出兩下㑹合道路已通十七八日將軍往攻斗六門有老民帶數百人出來投降十九二十等日又往攻南投社二十一二等日由南投社進攻大里杙又有官兵由牛罵頭一路進攻二十三日兩路兵㑹合將近賊巢即與賊打仗二十五日攻進大里杙賊衆俱已逃走從前鹿仔港米價每石五千二百文前月二十七以後頓減每石只賣三千五百文等語查該二船戶所供進兵大里杙情莭雖有小異而賊巢已經攻克則大概相同正在繕摺具奏間有福康安奏摺進口查係初十日在嘉義縣所發是嘉義之圍已解該船戶所供已屬符合則初十日以後情形福康安雖尚未有奏摺過境而該船戶所稱攻克大里杙之處自亦必確實可信又有船戶金際泰陳恆裕二船自鹿仔港回厦稱前月二十四日將軍等攻克大里杙後二十七八等日即有大里杙附近莊民運米到鹿仔港來賣并有送官穀來交倉者是福康安等攻克大里杙賊匪潰散其送榖交倉想係脅從之民懼與賊黨同誅特以此自别為良民此皆是極好消息又閩省本年錢糧漳泉二府已奉㫖緩徵其餘過兵各州縣雖未據報全完然亦有已經徵收者若於本年錢糧內分别蠲緩恐徒滋官吏侵挪情弊而已完之戶不沾實惠應請於乾隆五十三年錢糧內分别加恩兹據藩司覺羅伍拉納詳稱泉州府之晉江南安惠安同安漳州府之龍溪漳浦海澄詔安等八縣應付浙粵滿漢官兵及四川湖南貴州各兵兼之糧餉軍裝鉛藥等項絡繹過境差務最繁所有錢糧應請蠲免十分之三其浦城崇安建陽建安甌寧南平古田閩縣侯官福清莆田仙遊等十二縣所有浙江四川湖南各兵俱由各該縣經過並軍裝餉鞘等項差使亦多實為次繁應請蠲十分之二福鼎霞浦福安寧德羅源連江等六縣應付過浙兵二千名其浙省撥米運裝火藥亦多由此路行走又光澤一縣雖無過兵差使而江西湖廣撥運米石均由該處經過所需竹篾船隻以及灘師縴夫亦有資用民力之處惟此七縣較之漳泉等處差使究屬稍簡所有錢糧毋庸議蠲應請緩至五十四年麥熟後徵收至屯米一項凡遇普蠲之年例不准免應仍照例完納臣等覆核似屬允當如此辦理則皇仁既得均沾而按其出力之輕重量為區别亦屬毋濫毋漏又詳稱臺灣府屬應徵錢糧項下尚有本年兵穀一十九萬九百餘石係供支駐臺灣班兵及解運內地營兵口糧又有應徵耗羡莊租雜稅等項計銀六萬九千餘兩粟一千八百餘石係留臺支銷官員養亷公費之用均應按期徵收以備供支苐查各處村莊經賊匪蹂躪之後多至流離失所現在雖已寧貼而被難歸莊之民搭藔棲止買穀補種其生理尚屬艱難惟鳳山縣南之粵民各莊未經賊擾但比戶糾集晝夜堵禦亦甚費資力兼有義民千餘到郡隨征此時猶未遑耕種臺灣府屬各㕔縣應完正供錢糧已䝉蠲免所有本年應徴兵穀及耗羡莊租雜稅等項並請分年帶徵俾民力益臻寬裕至臺灣班兵口糧請於現在解運軍需米內撥出支給其應行解供內地兵糧於各倉穀內支給所有官員養亷公費查有司庫積存臺灣各年餘租折徴等銀堪以支給等因臣等伏思應徵兵穀等項例本不應蠲惟是賊匪滋擾以來生民究多拮据懇聖慈俯將本年兵穀耗羡雜稅等項分作四年帶徵俾閭閻更得寬裕均奏入上命軍機大臣傳諭福康安海蘭察李侍堯等曰本日福康安奏摺係十一月十二日拜發俱在昨日遞到十六十九兩次奏摺以前情形又據李侍堯奏到詢之船户各情形自當確實看來臺灣𠞰捕事宜大局已定惟李侍堯摺內稱犬衆逃入山內之語賊匪經官兵屢次殲戮窮蹙奔逃若由海道竄逸官兵乘船追捕轉不免稍需時日如果逃入山內該處俱係生番居住若畨衆等畏其逼處竟將賊首擒獻固屬甚善即或容其潛匿不肯獻出亦可趂官軍全勝之勢直入內山分兵搜捕即將助逆生番一併𠞰戮亦非難事福康安等務須迅速搜捕將賊首設法生擒勿令久匿稽誅為要至大里杙所獲之犯自必經福康安訊有供詞想此時奏摺業已在途即日可到再賊匪現在勢已換散其黨羽自必紛紛解體今諭令將賊首擒獻許以官職使其彼此相圖更可離散賊黨又據奏恆瑞帶兵援應途中觀望各情節以恆瑞過於持重致涉遲延總由不諳機宜辦理不能得手所論甚公至蔡攀龍前此應援入城雖未能帶兵出城剿殺賊目但伊屢次與賊打仗奮勇出力業已加恩擢用提督其過尚可寬免至所有遺失兵丁是否實係陳亡抑係逃散從賊之處必當嚴切查究若隨征兵丁不顧主將臨陳逃散此而不加以懲警將來何以用兵此內從賊之兵其罪更甚於從賊之民福康安於查辦時尤當嚴加區别從重辦理不可稍存姑息之見其臺灣應徴本年兵穀耗羡雜稅等項竟皆寬免欽定平定臺灣紀略卷四十七
