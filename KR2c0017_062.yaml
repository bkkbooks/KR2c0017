  text: 欽定四庫全書欽定平定臺灣紀略卷六十二
  hash: sha256:c8e50fa06343bb82e6c207b5a1709ea55a18b806c47488472bd60c9ccf528373
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_062-1a, image: WYG0363/WYG0363-0761c.png}
body:
  text: 六月初三日甲午上命軍機大臣傳諭福康安李侍堯徐嗣曽曰從前平定伊犁回部大小金川皆於太學立碑以示武功臺灣不過亂民聚衆海島一隅雖不值刋碑太學而此次辦理迅速首夥生擒亦不可無紀實之作朕現在駐蹕熱河欲將此次平定臺灣事迹御製記文於熱河文廟大成門廡內嵌石刋刻俾振武敷文盛軌永昭上塞俟紀文製就後當一併發與福康安等在臺灣厦門等處配建碑亭勒石所有前次發去之御製文三篇著福康安等暫緩鐫刻俟此次記事文發往後一同敬謹摹勒庶規模丈尺咸歸晝一足以壯觀瞻而垂久逺同日福康安魁綸徐嗣曽奏言熟畨募補屯丁悉心酌議章程一屯丁人數應按畨社酌挑令其就近防守也全郡熟番通共九十三社臺灣縣屬畨社較少淡水彰化近山地方畨社最多鳯山嘉義次之每社畨民自數百户至數十户不等約可挑選壯健畨丁四千名分為十二屯大屯四處每處四百人小屯八處每處三百人作為額缺毋庸另設屯所即令在本社防守地方稽查盜賊其户口較少之社或數社併作一社或附入近處大社庶畨民等不致逺違鄉井而較驗調派亦易於齊集至各屯相距之地道里難以適均臺灣縣所屬畨社不過數處不能多設屯丁然臺灣縣地界本狹郡城設有重兵足資彈壓惟南北兩路近山險要甚多淡水一廳尤為遼濶原撥熟畨在隘口搭藔防守名為隘丁零星散處不能得力應酌量地勢情形按照畨社多寡分别設屯與各處營汛官兵聲勢聯絡則稽察巡防自可倍加嚴密一各屯畨丁宜設立屯辨以資管轄也四川屯練兵丁額設土守偹千總把總外委等官一百餘員今臺灣畨屯辨目無需似此之多祇應仿照其例量為設立查各社原有民人充當通事管理一社之事代為交納社餉但此等通事積年充役係地方官簽派本非畨人同類未便用為辨目應於畨社頭目內擇其曽經打仗出力及社番素所信服者如岸裡社潘明慈之類揀選拔補於南北兩路額設屯千總二員統領畨衆屯把總四員分管各屯大小各屯每處設屯外委一員花名圖册交理畨同知稽核仍將各屯事務交北路協副將南路營參將就近管理該畨等素嫻妓藝非招募新兵可比應請照川省屯練之例毋庸歸營操演點驗屯兵拔補屯辨等事統歸臺灣鎮總兵臺灣道管轄詳報督撫給與劄付報部存案經管六年後如果董率有方曽著勞績由鎮道核明詳報督撫加一等賞給職銜以示奮勵倘所管內有生事廢業之人及苦纍畨衆情弊即行咨革究處遇有事故出缺仍揀選畨社恱服之人詳報拔補一屯丁屯辨毋庸籌給月餉應酌撥近山埔地以資養贍也臺灣東界內山本多曠土乾隆十五年暨二十三年節經勘定界址奏請禁民越墾準令熟畨等打牲耕種以資生計無如遊民聚處日多越界佃耕漸成熟業以致爭奪滋事控案甚多前經富勒渾奏明專委鎮道確切勘丈尚未勘明詳報即值逆匪滋事現經臣等提奏核查共計丈出已墾埔地一萬一千二百甲每田一甲合內地民田十一畝三分一釐均應查明民墾畨墾分别升科辦理此外尚有未墾荒埔五千四百四十一甲又四十八五十一等年漳泉械鬬及互控結會案內抄沒翁雲寬楊光勳等入官埔地三千三百八十餘甲統計抄沒未墾及入官荒廢埔地八千八百餘甲均屬界外之地逼近內山任其荒廢地利既屬可惜而愚民趨利如鶩亦難保無越境私開情弊應請將新設屯丁四千名每名撥給埔地二甲千總每員十甲把總每員五甲外委每員三甲令其自行耕種責令地方官勘定界址造册繪圖載明四至段落通報立案以偹稽查屯丁出缺即挑其子弟充補承受田畝如有私行典賣者照律治罪追賠契價充公其地仍歸畨社冉查臺灣各社向例交納社餉所種田畝租賦蒙恩概免征收所有撥給埔地應照畨田之例免其納賦以示體恤即毋庸另行籌給月餉一清查已墾埔地以定界址也查臺灣東面倚山地方寬廣從前因淡水彰化二處墾闢日增另行畫定界限設立土牛禁止姦民越界占墾免滋事端乃因生聚日繁民人私向生熟畨黎佃地耕種價值稍輕者謂之租贌價值稍重者謂之典賣熟畨等歸化日久漸諳耕作祇因業經典賣與民無由取贖是以各處畨地不特嘉義以南多有侵越即淡水等處續定土牛之界亦成虛設臣福康安追勦賊匪時周厯全郡所過近山地方良田彌望村落相聨多在輿圖定界之外舊設土牛並無遺址可尋從前設立時不過築土作堆潦草塞責本非經久之計此時若不將埔地徹底清釐事過境遷界址必仍滋淆混臣等悉心籌酌除未墾荒埔五千四百四十餘甲撥給新募屯丁外其已墾之一萬二千餘甲自應分别辦理查臺灣征糧則例仰蒙皇上優恤海外民畨於民田則薄征租賦於畨業則槩免征科兹查民人租贌之地無多原係民為佃户畨為業主自應同畨社田畝一體免科其業經賣斷與民者既非畨業即應令民户一體報升苐民買畨地之後所費開墾工本原多又有每年抽給畨租之例若再征收本色民力未免拮據應照同安縣下沙科則按甲計畝征銀免其納粟仍出示曉諭畨社使知租額無虧俾得永資生計民人等藉有納賦明文世守其業亦可永杜弊端其集集埔虎仔坑三貂琅嶠等處接壤生畨私墾田畝甚多此等偷越民人本應逐加懲治惟念開墾以來與生畨日久相安並無事故一經驅逐沃土既須拋荒而遊民又無歸宿應請照新定民賣畨地之例一概升科免其查究此時正值農忙之際未便紛紛履勘應令該處民畨將租贌典賣地畝先行呈報一俟刈穫登場臣徐嗣曽專委大員前往抽查並將此外有無續墾地畝一併查明分别辦理咨部存案自此次清查之後即以所墾地方為界竪立界石詳開立界年月地方大書深刻俾人一望而知仍交與巡視臺灣之將軍督撫提督及地方官等不時周厯巡查如有越界私墾即行從重治罪失察之地方文武各官一併嚴參究處一屯丁習用器械應令自行制偹報官點驗也畨民打牲捕鹿所用鏢鎗鳥鎗竹箭器械不一均屬犀利即如岸裏社畨善用鳥鎗隨同官兵打仗殺賊最為賊匪所畏一切器械均可無庸製給但現在嚴禁民間私藏軍器屯丁所用鎗箭亦應官為點驗以偹稽查所有新設屯丁四千名不必照緑營之例拘定鳥鎗兵若干名弓箭兵若干名祗以該畨習用器械為凖呈報總兵逐加印絡編號偹查每年令總兵巡查之後點驗一次如無火烙印記即照民人私藏軍械之例一體治罪一屯丁徭役酌與優免以恤畨力也臺灣各社熟畨質朴醇良最堪憐憫從前文武員辨出差巡察無不調撥畨民背運行李其餘各地方興築遞送公文等事亦皆社畨應役其勞苦急公之處較之臺灣民人不啻數倍今既挑補屯丁各令在要隘地方分屯防守遇有搜捕盜賊等事又須聽候征調所有一切徭役應請免其承應其未補屯丁之畨民亦秖令遞送公文不得以私事役使倘地方文武及理畨同知不加體恤有苛派擾纍之事令該鎮道實力查訪嚴行參究奏入上從之初六日丁酉福康安徐嗣曽同奏言辦理賑務原應支放本色或銀米兼散以濟小民口糧惟查臺灣自軍興以來截至本年二月由內地撥到軍米共計三十二萬餘石除撥過兵糧等項外存米七萬餘石其續撥軍米因海洋風信靡常尚未運到維時凱旋官兵陸續分起內渡尚未全撤且各路米價均極昂貴必須廣為平糶以減時值俾通郡商民皆足以資接濟計算所存米石僅可為兵糧平糶之需不敷散賑而臺地貧民向藉畨薯雜糧同米搭湊糊口得銀便於零買又因米價貴至三兩以外恐一時未能平減難民買食仍未免拮據請旨每石給豫三兩但按之舊例實覺過多未便遽行擅給是以仍飭各屬先照向例給發二兩恭候批示到日察看田禾市價情形再行補給嗣因三月下旬以後糧價有減無增連次得有透雨禾苖暢茂可望豐收即照向例折給實已足敷接濟毋庸於每石二兩之外再議加增兹查臺灣府屬一廳四縣被難民畨男女共四十四萬八千八百七十八口小口共二十一萬八千九百七十口共放過賑銀十六萬七千五百八兩九錢內有煢獨殘病等口並極貧難以度日應展賑一月現已查明大口共十四萬一千九百六十八口小口共八萬六千九百七十二口共應給銀五萬五千六百三十六兩二錢又各難民歸莊之前無處棲止給銀苫蓋草藔共九萬八千五十間共銀二萬四千五百十二兩五錢通共需賑恤銀二十四萬七千六百五十七兩六錢現飭造具户口花名清册送部核銷至臺灣官吏侵漁成習不可不嚴行查察臣福康安現駐郡城籌辦一切善後事宜釐剔弊端尤為切要况地方賑務如有侵帑殃民情罪至為重大斷不肯稍任欺隱此次所辦賑恤時刻留心訪察實無預圖冒銷情弊臣徐嗣曽前自北路以至郡城屢經親赴各村莊抽查户口並面諭義民首及業户人等據實呈報使胥吏等無從舞弊至散給銀兩先經出示曉諭查明户口後按名照數發給仍隨時密訪親查斷不使官吏稍有侵扣及浮冒開銷至逆案內入官田産南北兩路處處皆有現就各犯供詞並業户鄉耆人等遍加訪察遴委妥員分赴各處村莊履勘畝數界址以免混淆遺漏自應凜遵恩旨逐一查明酌量撥給戍兵作為恆産惟是兵丁等各有操防之責不能自行耕種且定例往來挨戍若令招佃收租又易起掯欠侵挪之弊應請將此項田畝交與地方官經理征租會同各處駐劄營員當堂按名散給通報查考以資戍兵當差之用其應撥畝數及每兵每年應給若干銀數之處容臣徐嗣曽查明叛産另行分晰具奏再現在臺灣澎湖兩處補額及新添戍兵俱於本有征兵內挑補該兵等調撥渡洋已逾一載衣履等項不無缺損其舊存戍兵等隨同勦賊祇領月餉月米並無鹽菜銀兩體察情形均不免于拮據臣等公同商酌所有新舊戍兵請先按名賞借銀二兩計兵一萬三千二百名共需銀二萬六千四百兩即於軍需欵內供支散給仍俟將來撥給叛産征收租息扣還歸欵又陳泮一犯前經投出情願訪拿賊首贖罪當將該犯家屬留於軍營準令前往續據拿獲股頭匪夥黃富等數名投解復行入山跴緝及林爽文就獲大兵南下該犯並未旋回臣抵郡城後差人查訪業經潛逃當將伊母及妻子等監禁一面分派官兵義民各處搜拿一面諭知內山水沙連生畨堵截于四月二十六日將陳泮拿獲二十九日在嵌頂地方並將吳領拿獲一并解送查陳泮與蔡福何有志陳秀英等黨惡助逆分管北路賊夥最為林爽文信用當賊匪窮蹙之時自行投出復敢乘間潛逃希圖漏網實屬怙惡不悛吳領雖未受封偽職但屢次抗拒官兵最為凶橫均應派委妥員解京審辦至林石係林爽文族長居住阿罩霧莊王芬等招同林爽文拒捕時林石再三勸阻將林爽文藏匿山內糞箕湖地方不許滋事匪夥等復來糾約遂決意聚衆謀逆林石年逾六旬總在本莊居住並未從賊打仗得受偽職上年十二月內拿獲該犯到營嚴行訊問並將所供情節質之賊首賊目等供亦相符臣復查該犯林石雖與林爽文各莊居住未曽從賊打仗又有勸阻謀逆之事但究係林姓族長未便輕貸應從重歸入緣坐人犯內辦理至董喜一犯前據賊首所供在集集埔病斃之語原不足信復據搜獲正法之匪犯林乾供亦相同並稱病斃後即於集集埔山墈下掩埋伊所親見業經派員赴集集埔查勘並無尸身可據訊之董喜妻弟凃允並屢次派員分路查拿並無蹤迹連日細加察訪又有竄往蕂口社一帶之信查臺灣地方人情虛詐屢次搜拿匪犯妄報信息者甚多未可盡為憑凖但既有此信亦不可不嚴行查緝已派賞給同知銜之教諭郭廷筠都司莊錫舍義民首劉繩祖黃衮等帶領熟悉路徑義民等直入畨界搜查並諭知社丁王和江如海生畨頭目斗蠻等派撥生畨在內山協拿若未伏冥誅自不能逺揚漏網又莊大田之子莊天畏雖據獲犯供稱已被生畨殺死但亦不可憑信仍應與代管莊大田地畝之黃天養一體嚴拿務獲報解至投出賊目本非良善特見官兵勢盛相率歸誠希圖自尋生路臣亦欲藉此離散賊黨示以寬大免究前罪為一時權宜允準之計兹賊匪業已蕩平不便仍留臺灣令其歸莊安業自應分别遷徙內地他省酌加安插查西北各省道途遙逺解送為煩中途或有脫逃更屬不成事體江浙廣東等處濱海地方皆有海道徑達臺灣不便派往此外惟貴州湖南廣西等省堪以安插臣等將投出賊目等詳加查核除脫逃復獲之陳泮一犯仍即解京審辦外其應行遷徙之人查阮和等九名自投誠以來隨同打仗殺賊官兵入山追勦時帶領路徑偵探賊蹤並屢次擒獻賊匪察看情形實為認真出力雖與莊錫舍於滋事之初首先投出者不同而核其勞績竟與莊錫舍無異應將阮和等九名遷往內地安插查延平建寧府皆非沿海地方應即交與各該鎮總兵令其入伍食糧藉資約束如能始終奮勉再以把總外委等官拔補若敢稍不安分即行加等治罪至李祖生等一百餘名俱請發往湖南貴州廣西煙瘴地方分縣安插交與該地方官嚴加管束如敢稍滋事端報明督撫即行正法臣等酌商定議後即行面加曉諭以爾等曽經附逆原屬罪在不赦仰蒙皇上法外施仁因爾等於大兵進勦之時即知悔罪自行投出隨營效力尚有一線可原但爾等於從賊時騷擾居民若即釋令歸莊居民必不相安轉恐紛爭滋事今將爾等遷入內地即應搬取眷屬一同配渡該賊目等俱願遷移情形極為感懼業已陸續搬眷來郡隨到隨令登舟酌令十餘人為一起即於撤回之廣東福建都司守偹等官內順便帶同辨兵管押前赴內地交李侍堯查明指定省分分起解送人數既少沿途小心護送自不致稍有疏虞現在送往內地者已有四起其餘臣徐嗣曽陸續解送再逆匪滋擾時海岸港汊地方多被占據安平協水師在鹿耳門鹿仔港兩處要隘防守其餘通海溪河甚多照料難於周密經李侍堯派撥護提標遊擊事守偹李德勝帶領千總二員把總五員外委二員水師兵丁一千二十四名駕船八隻於臺灣澎湖洋面往來巡查自上年六七等月起至本年三月止照例每月祇領口糧並無支給鹽菜銀兩日用所需未免拮據是以于軍需項下照征兵鹽米銀數酌量借給共借過銀七千五百六十餘兩應在各官兵養亷錢糧內扣還歸欵第查此項官兵雖未至軍營打仗但究自內地調派前來且於洋面梭織巡邏堵截逸匪涉厯風濤已逾半載亦曽經奪獲賊船炮械奮勉出力實與征兵無異自應一體支給鹽菜請照征兵之例一併準令開銷再查參將那穆素里都司世襲騎都尉羅光照學習難廕守偹黃喬隨同郝壯猷在鳯山縣守禦嗣因鳯山失守經常青將那穆素里等三員奏參革職千總盧思聰等十四員咨部斥革又參將周世佐守偹衛覲光把總鐵柱因失察延燒火藥亦經革職又失陷鹿仔草案內遊擊劉越降為都司遊擊董秉璨降為守偹守偹林士元革職各在案以上各員均經常青等奏明留於軍營效力以觀後效今軍務告蕆自當確加查核據實奏聞查那穆素里同丁朝雄收復東港擒獲賊目吳豹等審明正法羅光照屢在南潭嘉義打仗身中鎗傷鉛子未出復拿獲賊目楊臺選王是二名黃喬在東港堵禦經丁朝雄派往收燬賊藔數百間均能奮勉出力其盧思聰等十四員打仗殺賊俱屬勇往內有千總盧思聰外委姚登二員現已陳亡至周世佐衛覲光鐵住三員派往南路同副將五達色侍衛果爾敏色勦賊屢得勝仗俱能圖功贖罪應請將那穆素里周世佐羅光照黃喬衛覲光送部引見其千總以下等官各降一等給豫職銜歸營效力如能奮勉再以實缺咨補鹿仔草失陷案內降革各員除劉越一員隨臣等打仗頗為出力業經奏請留任外董秉璨林士元二員在鹽水港守禦不過隨衆行走業經降革應請毋庸置議再革職遊擊藍田玉奉旨革職令在臺灣府城永逺枷號示衆彼時正值用兵之際既經參奏自當從嚴辦理以肅軍紀惟因此次諭旨本年二月始行奉到上年臣至嘉義時該員懇請隨往北路勦賊常在前敵隨同海蘭察打仗極為奮勇查藍田玉由兵丁出師雲南金川厯升遊擊賞戴花翎曽帶五處鎗傷三處石傷其左股鎗傷之處已成漏瘡至今未愈該員遺失軍器之罪雖無可逭但業經革職已足蔽辜且同往嘉義之魏大斌特克什布張萬魁劉唐等所帶兵丁器械多有遺失何以柴大紀並未究問獨將該員移咨常青指參臣等審辦柴大紀時亦曽將此一節向其訊問據供魏大斌等因賊匪攔截器械多有遺失我查問遺失數目各員未能即刻查明登答言語尚有情理惟藍田玉一員既未將數目查報又恃其屢次出兵諳習打仗心存輕忽出言不遜我所以稟揭常青不想常青就據咨參奏等語可見柴大紀揭報之處未為公允仰懇俯念藍田玉久著勞績此次打仗殺賊又屬奮勇免其永逺枷號再臣查安平左營外委鄭廷棟前於鹿耳門巡哨見把總髙大捷畏賊脫逃即向盤詰設法拘留飛稟該參將拿獲立正典刑俾衆共知警懼實屬能事可嘉已傳詢鄭廷棟面加奬諭先賞結千總頂帶交與普吉保遇有千總缺出即行拔補又淡水廳幕友夀同春係浙江諸暨縣監生年已七十餘嵗在臺灣作幕年久熟習民情地勢當竹塹城失陷時同知程峻先已被害夀同春親赴各莊招集義民於五十一年十二月內同官兵恢復竹塹城擒獲賊目王作等四名五十二年十月內徐鼎士等渡大甲溪進勦夀同春帶領義民駐劄烏牛欄初十日出哨進逼三十張犁地方賊匪設伏衝突義民潰散夀同春馬蹶被擒罵賊不屈被賊支解又廣東嘉應州監生李喬基當林爽文倡亂之初即在彰化縣岸裏社地方首先倡義捐資招募民畨分設七堆並分撥義勇協守鹿仔港海口接候官兵與賊打仗數十次殺賊甚多五十二年正月內親督義民進攻大里杙直逼賊巢西門焚燬竹圍被賊大炮轟擊未能攻克二月十二日在牛罵莊打仗被賊擒去迫降不屈慘遭磔死又查同知劉亨基有未嫁幼女滿姑年十七嵗賊陷彰化搶入劉亨基公館家屬紛紛逃避惟滿姑依戀伊父不肯外走賊匪擁進內房劉亨基被害滿姑奔投屋後水池水淺不能即死號哭痛罵賊匪割其口鼻罵不絶聲遂遭殺害夀同春年逾七旬本無職守始則協同收復城池繼則奮勇深入賊莊致遭支解李喬基為義倡始疊著勞績被賊擒獲誘降仗義不屈而劉滿姑以弱女罵賊抗節捐軀志節均屬可嘉而死難尤為慘烈實堪憐憫懇飭部贈恤旌表以示彰勸至義民等殁於行陳亦應照陳亡兵丁議恤現據各地方官陸續造報臣徐嗣曽咨部辦理再賊匪滋擾嘉義時教諭江浩招集義民守禦頗為出力俸滿巡檢吳元隨同知縣陳良翼督率義民固守被賊鎗傷丁艱典史李爾和在彰化巡防遇賊身受鎗鋛重傷曽經常青詢明具奏查江浩本無地方之責吳元李爾和業經俸滿丁憂各已離任因值逆匪滋事均能黽勉出力禦賊受傷末秩微員尚堪嘉奬相應奏明開具伊等勞績咨部議敘至應行議恤官員兵丁等自乾隆五十二年十一月初八日臣等進兵時起至五十三年二月初五日止節次打仗並在各處搜山共陳亡傷亡漢屯官辨兵丁四百七十八員名又自五十一年十一月起至五十二年十一月初七日止陳亡傷亡官辨一百四十八員滿漢兵四千九十五名一併造册送部又隨同臣等打仗及常青等督兵時受傷之官辨兵丁等亦分别等次咨部照例辦理再查俸滿南投縣丞周大綸署斗六門巡檢羅漢門縣丞陳聖傳署鳯山縣教諭葉夢苓訓𨗳陳龍池署貓霧棟巡檢渠永諟淡水巡檢張芝馨彰化縣典史馮啓宗諸羅縣典史鍾燕超鳯山縣典史史謙皆係循分供職之員賊匪滋事時該員等以微末官員力不能支即以身殉殊堪憫惻合無仰懇皇上天恩勑部照例議恤以示勸勵至魁綸自到郡城一月以來留心學習於一切情形已能諳悉將來輪赴臺灣巡查地方可資經理查該將軍本任亦關緊要應令先行內渡已于四月二十八日由鹿耳門登舟候風梁朝桂蔡攀龍均係提督大員內地營伍乏人所有挑補兵丁查辦臺灣營伍等事均已告竣亦令梁朝桂先赴本任蔡攀龍係水師提督臺灣是其專轄應令與普吉保分往南北兩路及澎湖地方將安設水陸各汛逐一查勘再行赴任至巴圖魯侍衛等不服水土患病者甚多現在趕緊調治痊愈令副都統翼長六十七帶領一起於臣起程之前先行配渡其暫留臺灣之廣東兵一千名亦多患病現無應用之處交與原帶將偹張朝龍等帶領撤回本省至生番既知慕義自應廣示招徠民畨等得以共慶升平相安無事臣曽遣熟悉畨情之貢生張維光至畨社曉諭酌令生畨頭目數人照四川屯練土司之例進京瞻仰天顔使化外畨民優霑聖澤而海疆荒僻之地咸得被服聲教永慶敉寧兹據張維光稟報生畨等極為欣恱情願前往如蒙俞允請俟天氣涼爽交與徐嗣曽妥協辦理派員帶領於年前至京臣現在已無應辦之事即於五月初九日由鹿耳門登舟初十日獲有順風揚帆行至日暮抵黑水洋地方距澎湖內澳二十餘里風息不能前進測量該處海水甚深碇索長至六七十丈總未沉底難以寄泊即在洋面往來飄蕩十二日午風浪大作竟夜不止船隻雖覺欹側幸而安穩無虞行程甚速十三日晚間至大擔門外溜逼山根礁石並未觸損船隻十四日由厦門港口登岸臣上年赴臺灣勦捕疊次被風吹回及徴調各兵到齊風色即為轉順自崇武澳放洋一帆即達鹿仔港兵船百餘號同時並到為從來未有之事此次凱旋內渡途次雖遇風暴瀕危獲安此皆仰賴我皇上誠敬感孚神明默祐並蒙恩賜右旋白螺渡海得以益臻穩順登岸後即至廟拈香瞻禮敬謝神庥上年由崇武澳徑渡鹿仔港風帆恬利因於鹿仔港寬厰處所恭建天后廟宇今駐防兵丁等即在該處港口被風遇危獲安疊徴靈異請將奉到御書匾額交徐嗣曽即在鹿仔港新建廟內敬謹懸挂現在巴圖魯侍衛及隨從官員俱已陸續到大擔門一俟登岸後即起身前赴泉州與李侍堯會晤將應行面商事件另行會摺具奏至厦門一帶早禾現俱結穗顆粒充盈豐收可卜現在糧價不昂民情極為歡慶奏入上命軍機大臣傳諭福康安曰海洋風汛靡常五月間向已多風福康安此次凱旋內渡雖遇風浪即獲安穩行程順速其餘巴圖魯侍衛人等俱陸續登岸朕心深為欣慰著賞給玉如意大小荷包以示優眷上又諭內閣曰臺灣軍營出力人員厯經降旨著福康安查明交部議敘兹據奏軍營出力之侍衛章京官員將辨等現經秉公查核分别等第造册咨部其應行議恤之官辨兵丁等亦一併造册送部著即照福康安咨到各册詳加核對除業經給與議敘恤典者毋庸再行議給外其餘俱著照福康安册內所開照例議敘議恤又賊匪滋擾嘉義時教諭江浩巡檢吳元典史李爾和等俱各遇賊守禦身受重傷亦著該部一體照例議敘以示奬勵上又諭內閣曰長庚湯大奎王雋早經降旨交部議恤所有縣丞周大綸陳聖傳教諭葉夢苓訓導陳龍池巡檢渠永諟張芝馨典史馮啓宗鍾燕超史謙平時尚皆循分供職及賊匪滋事時又以身殉難殊堪憫惻俱著交部照例議恤以示奬勸夀同春李喬基俱著賞給知縣職銜並著該督撫等查明伊二人子嗣內可以造就者候朕酌量加恩劉亨基之女滿姑雖伊父居官玩縱以致釀成事端而其女抗節捐軀亦不忍令其淹沒著交該部照例旌表並入該處烈女祠以昭褒奬忠節不遺微末之意臣等謹案崇奬忠貞所以為世道人心之勸我皇上扶植綱常維持名教薄海咸曉然於大義匪獨守土之責勵在臣僚即如夀同春李喬基者以流寓之國學諸生猶能召集鄉民誓同殺賊至於酷羅膊磔奮不顧身而劉滿姑以深閨弱質乃亦復輕生重節視死如歸豈非德教之入人者深歟軫恤恩綸重申載錫造就爰及於其嗣而爼豆不祧於其鄉猗歟盛矣所謂崇奬忠貞者洵蔑以加於此矣欽定平定臺灣紀略卷六十二
