body:
  text: 二月初一日甲午福康安海蘭察鄂輝同奏言賊首逃入內山經臣等分派官兵堵截要隘令各番社生番在內山一體截拏兹據社丁杜敷報稱林爽文帶領匪衆六七千人在埔里社至埔尾沿溪山溝內逃走因東南一帶鑾鑾等社生番堵截嚴密不敢竄往南路現已向北逃去等語臣親往各處隘口沿山搜查並催調糧餉雇夫背運入山以為追賊官兵之用一面飛飭通事王松帶領獅子頭社番於要路迎頭堵截一面商令海蘭察鄂輝帶同舒亮普爾普恆瑞普吉保袁國璜穆克登阿許世亨及巴圖魯侍衛等由歸仔頭內木柵各隘口分路進山連夜追趕臣往來各路督催官兵何處緊要即於何處帶兵䇿應於二十五日至麻著社一帶聞林爽文於二十四日夜間在東勢角地方被生番截殺四百餘人餘衆沿山北去查看賊人蹤迹係兩路逃走隨將官兵分為兩路海蘭察舒亮恆瑞穆克登阿許世亨袁國璜由東勢角前進鄂輝普爾普普吉保由朴仔離東山前進山徑險窄穿林越箐不能乘馬均屬徒步登陟官兵等沿山搜捕殺死賊匪二千餘名拏獲活賊四十餘名奪獲大小炮位及鎗桿刀矛七百餘件二十七日行至獅子頭社見山溝內賊尸縱橫遍地數里不絶而河內淹斃之賊亦多據王松及生番等稟稱林爽文於二十五日到獅子頭地方賊匪等因日夜行走腿腳俱已發腫過河淹斃者一千餘名社內生番堵截去路又殺死賊匪二千餘名止剩賊一二百人過山逃去大約從貓裡社逃往三貂地方生番等不認得林爽文不知可曽殺死等語隨將各生番所獻首級並拏獲活賊逐一認識俱非林爽文仍即分路帶兵馳往追捕臣查臺灣以東皆係大山越過大山數十重東面仍屬瀕海三貂社在淡水極北轉東逼近海岸與蛤仔欄社相近本係番界間有貧民前往租地耕墾今林爽文在內山逃往三貂必由蛤仔欄經過前經臣檄調副將徐鼎士同知徐夢麟帶領生熟番衆至蛤仔欄邀截徐夢麟已於本月二十五日同都司徐機至八堵地方屯劄查八堵距蛤仔欄不過二百餘里層巒疊嶂山徑陡峭步行前進約有三四日程途且該處俱係生番居住必須熟悉情形之人方能前往前已訪明居住三貂之吳沙許天送及生番通事張光彩等最為熟悉復示以重賞令其遍諭該處生番擒獻逆匪並即帶領官兵入山堵截查逆首竄逸內山隨行賊匪尚有數千官兵追趕及生番邀截業已誅戮殆盡沿途餓斃者又有千餘名現在四路圍逼逆首已無存身竄迹之地一經追及即可成擒惟獅子頭社所殺賊匪首級俱被生番割去其中不無有名頭目自應逐加識認而生番性嗜殺人所得首級皆携回巢內以誇武勇不肯全行獻出驗過者不過數百顆兹已將出力生番按名給賞諭令將首級呈驗認非賊目再行給還庶知賊目何人被殺何人逃逸按名緝獲以期盡絶根株不留遺孽又正月初一日至各仔社一帶內山殺死奔逃賊匪二百餘名拏獲假扮林爽文之賴達一名活賊四十餘名訊據賴達供稱林爽文自獅子頭社痛𠞰之後隨行賊夥又被沿途官兵生番殺散所剩無多林爽文原欲向北逃竄見山內官兵圍截嚴密又聞三貂等處亦有兵番截拏不敢前往在打鐵藔一帶山溝樹林內藏匿尚無一定去向等語官兵等遂至打鐵藔追捕由蝦骨社合歡社直至炭窑地方又搜獲零星賊匪百餘名查炭窑與南港仔山口相通出山不逺即係海岸惟恐林爽文被山內官兵追急潛行出山向海口逃逸復派各營官兵由復壠至中港又自竹塹至桃仔園沿山密布臣福康安海蘭察鄂輝舒亮普爾普恆瑞許世亨普吉保袁國璜穆克登阿特勒登徹六十七春寧及巴圖魯侍衛將辨人等各分隘口四路圍截該處草深樹密溝磡甚多大隊官兵恐難於隱僻地方逐處查到致有遺漏兼恐逆首見官兵追至驚懼自戕不能生獲因揀巴圖魯侍衛二十員貴州廣東屯練兵丁數百名改裝易服扮作民人同淡水義民差役及社丁通事等分投搜緝於初四日在老衢﨑地方將逆首林爽文賊目何有志一同擒獲現在搜查逃竄餘匪又拏獲林琴陳傳吳萬宗賴其瓏等四名均係有名頭目一俟搜查淨盡並令入山各兵休息數日即行統率大兵肅清南路至南路賊匪情形現猶屯聚大武隴赤山保大穆降水底藔等處聞官兵蕩平北路心懷畏懼黨羽漸離特恐義民截殺不敢相率投誠而被脅村民亦以賊未解散不敢遽行倡義經臣分遣熟悉南路賊情之舉人郭廷機廪生王維清等賫示撫諭村民離間賊黨並以大武隴等處與諸羅接壤行知柴大紀及參將李隆張萬魁知縣陳良翼將投出之人妥為安輯兹據柴大紀等報有賊目何北海一名賊匪魏振元等十六名自行投出內有蕭盛賴育二名拏獲賊匪林靴林旺贖罪陳良翼報有賊匪吳雲林壓等四十八名均已自行投出又舉人郭廷機帶出南路投誠賊目許參陳送期陳吾春顔院林快士黃充來營並據賊目郭照髙為遣郭敬同來稟稱林爽文三弟林勇帶同賊夥在大武壠潛匿情願設法擒獻再行投出臣俱已免究前罪令其拏賊自效看來南路賊匪黨羽已解散大兵一到無難刻日殱除其賊目李七早有歸誠之信前經拏獲該犯家屬伊兄李水情願入山找尋至今並未投到兹已在內山拏獲該犯係賊中著名頭目不思早行投出仍隨林爽文逃入內山未便因其原有投誠之心稍為輕縱兹已嚴行看守同拏獲賊目等另行派員解京審訊又官兵攻克大里杙後有被賊拘禁之原署南投縣丞洪智投赴軍營據供賊匪到南投搶劫因該處並無城池汛兵九十餘名又分在各處汛地不能抵禦即時被賊攻陷隨帶兩子到民人王生家欲尋自盡王生救住送到豹尾莊廖全家居住林爽文聞知拏到大里杙呌何從龍勸降不從就帶到觀音亭交林繞看守又呌劉懷清威逼幫辦事件自刎兩次都被劉懷清將刀奪去手上現有奪刀傷痕可據等語訊之何從龍劉懷清供亦相符昨拏獲賊目林繞一名即係在大里杙看守洪智之人亦稱洪智屢被林爽文迫脅實未從賊復傳到王生等隔别研訊均非虛揑但洪智身係職官被賊人拘禁日久兩次自刎未死仍復􅌤顔視息究屬偷生無恥未便因該犯員未經從賊稍為寬貸應請即行正法奏入上命軍機大臣傳諭福康安海蘭察鄂輝曰福康安等統率大兵分駐各隘口嚴密堵截搜拏使首逆無從逺竄復恐林爽文見官兵勢盛驚懼自戕隨派巴圖魯侍衛及貴州廣東屯練兵丁改裝易服同差役社丁通事等分投搜緝將逆首生獲福康安等辦理妥協可謂用心周到甚屬可嘉至林爽文逃匿後固須多派兵民分頭搜捕而當其搜獲之時必有最為出力首先下手之人其人應優加奬賞著福康安將林爽文究係何人首先擒獲查明名數據實具奏候朕另降恩旨至洪智身為職官被賊拘禁不能捐軀盡節固屬罪有應得但念該犯曾兩次自刎為賊匪劉懷清將刀奪去手有奪刀傷痕可據與􅌤顔從賊偷生者有間著加恩恕其一死發往伊犁充當苦差又前奏賊目陳泮投出後將其家屬扣留仍令伊入山勒限擒獻林爽文係被官兵搜獲而陳泮作何下落未據奏及該犯既不能將林爽文擒獻自未便因其曾行投出稍縱末減此外尚有吳領等亦係有名頭目均難寬縱並著福康安迅速按名查拏解京審辦毋令逺揚漏網上又命軍機大臣傳諭福康安李侍堯孫士毅曰據臺灣解到匪犯劉懷清林茂等供劉懷清在大里杙隨同林爽文之偽軍師董喜辦事一切聽其調度衆人稱為董仙林茂係董喜糾同入夥又據供賊人頭目林水素為林爽文信用諸事皆其主謀現封提督將來欲封作宗人府伊二人俱隨林爽文逃入內山等語董喜為賊匪軍師林水亦係林爽文信用偽封提督雖非莊大田之著名者可比但係助惡為首之犯未便任其潛逃漏網現在首逆林爽文已經拏獲董喜林水二人係隨同逃竄之人如業經就獲自己隨同解京倘尚未拏獲著福康安務將該二犯嚴密搜查務獲若臺灣查無蹤迹計該犯等非逃入福建內地潛匿即由海道竄入粵省並著李侍堯孫士毅一體飭屬嚴拏以期必獲解京審辦毋任其兔脫稽誅再此等黨惡要犯如本日解到之蔣挺劉懷清林茂何從龍四犯及供出之董喜林水俱係為賊主謀並得受偽職罪惡甚重其家屬俱應緣坐著福康安李侍堯等即行遵照查明辦理將來拿獲各犯有似此情節重大者俱著照此查辦再柴大紀蔡攀龍二人前據福康安奏於抵嘉義縣殺賊解圍後即留柴大紀蔡攀龍在縣城防守伊二人俱受厚恩如果思出力自效自應懇求福康安隨同帶兵打仗乃本日訊問押解匪犯到京之侍衛額爾登保據稱柴大紀蔡攀龍二人並未懇求一同帶兵前往𠞰賊似此􅌤顔安處全不思奮勉出力並懇求虛詞而無之伊等畏懼懦怯全無人心已可概見又蔡攀龍經福康安派令招致李七乃蔡攀龍並未能設法招致可見坐辦之事尚不認真安望其能隨營打仗奮勇殺賊著福康安即傳旨詢問蔡攀龍令其自行據實明白回奏至柴大紀於福康安自嘉義進兵時並未懇請前往一節亦著福康安一併嚴切訊問據實覆奏上又諭內閣曰福康安自鹿仔港進兵後督率將辨奮勇攻𠞰連次克捷前於嘉義縣破賊解圍業經降旨將福康安海蘭察晉封公爵賞給紅寶石頂四團龍褂以示優奬今逆首林爽文經福康安等設法生擒辦理周妥實屬可嘉特親解御用佩囊二個分賜福康安海蘭察用昭恩眷所有在事出力之將辨並著福康安查明咨部議敘其隨征兵丁並著福康安分别奬賞至辦理此事朕先事運籌決機發䇿自逆匪滋事以來大學士阿桂留京辦事續又差往河工及江南勘河本未承辦書諭大學士和珅始終承旨書諭於一切清漢事件巨細無遺懋著勤勞自應特加優賞和珅本係一等男爵著照從前大學士張廷玉之例晉封為三等伯大學士阿桂王杰尚書福長安董誥夙興夜寐一體宣勤俱著交部議敘其滿漢軍機章京並著軍機大臣查明實在出力者交部分别議敘至此次辦理軍務孫士毅以鄰省總督一聞逆匪滋事之信即親赴潮州駐劄節次派調兵丁撥運軍餉火藥鉛丸等項源源接濟迅速周妥甚為出力孫士毅業經錫豫宫銜並賞戴雙眼花翎仍著照從前大學士蔣廷錫之例賞給輕車都尉世職以示嘉奬李侍堯自調任閩浙總督後於照料過兵及運送糧餉等事亦尚妥速本欲俟蕆功之日將伊原襲伯爵給還但李侍堯前抵閩省已及一年於柴大紀在總兵任內骫法營私廢弛營伍種種貪劣欵迹自已早有見聞乃竟緘默不言並不及早據實參奏經朕節次降旨詢問李侍堯始行具摺陳奏明係有心徇隱豈可再膺懋賞且伊業經賞戴雙眼花翎晉加宫銜毋庸復行給還伯爵仍著交部照例議敘至柴大紀前因其固守嘉義不肯出城一節念其勤苦出力是以特封為義勇伯今據福康安李侍堯等先後遵旨查奏柴大紀在總兵任內貪劣各欵俱已確實並守城亦非其功其前奏忍飢固守之處竟係義民等不肯放出伊轉揑詞欺飾已明降諭旨革職拿問交福康安逐欵審明治罪矣至兵部承辦軍報之員外郎盛保在良鄉縣駐守俟候馳遞尚為奮勉本日擒渠捷報即係該員親自賫遞著加恩賞戴花翎並在京捷報處各員俱著交部議敘又此次軍報往來直𨽻山東江蘇浙江福建沿途各驛站馳遞並無貽誤所有沿途督撫辦理一切軍需均屬出力及驛站遞送文報之文武員辨並著查明交部分别議敘其驛站兵丁亦著酌量給賞初二日乙未上諭內閣曰黃仕簡任承恩上年朝審勾到並經格外加恩免其一死現在大功已屆蕆事所有黃仕簡任承恩二犯俱著加恩釋放但伊二人身獲重愆經朕曲加矜宥全其軀命若仍􅌤顔安居輦轂之地有何面目對人俱著勒回原籍閉戶靜居思過臣等謹按黃仕簡任承恩専閫受寄恇怯逡巡實干軍律我皇上曲貸餘生俾得圜扉偷息已屬施恩格外及臺灣大功告竣復蒙矜宥釋還此非聖恩之獨優於黃仕簡任承恩兩人也祇以黃仕簡乃黃芳度之孫任承恩乃任舉之子方康熙十三年逆匪鄭錦之亂芳度闔門殉節而任舉實效命於金川之役兩人者之祖父皆以忠節著聞是故一線可原特從曠典為臣工者益欽服聖主之權衡刑賞不假秋毫惟當激發藎誠咸知法鑒萬一重愆自蹈茍非如黃仕簡任承恩之猶有可原必不能幸邀肆赦而效忠如黃芳度任舉者雖延賞已逾百年或數十年尚足以庇其獲咎之子孫一罪一功昭然不爽載諸簡册洵足以永垂激勸云爾上又諭內閣曰此次臺灣逆匪滋事劫縣戕官肆行不法至一年之久福康安等帶兵渡洋旬月之間即將賊匪痛加殱戮搗穴擒渠各村莊得以安堵如舊該處地隔重洋五方雜處風俗素稱刁悍經此一番懲創若不明示武威恐民人等事過即忘不足令其怵目警心常思安分畏法將來事竣後如福康安海蘭察及鄂輝普爾普舒亮等之勇略最著者應於臺灣郡城及嘉義縣兩處共建生祠塑立像貌俾該處民人望而生惕日久不忘上又命軍機大臣傳諭福康安李侍堯徐嗣曾曰前因黃仕簡帶兵渡洋並不奮勇𠞰賊惟安坐郡城因循株守以致逆匪蔓延日久曾經諭令李侍堯等將來事竣時所有多延時日糜費軍需銀兩應於黃仕簡名下責令分賠以示懲警李侍堯何以尚未覆奏現在逆首林爽文業已生擒剿捕事務即日蕆功黃仕簡釋放回籍既邀格外寬宥而臺灣逆匪滋事年餘一切軍餉費用不資皆黃仕簡因循貽誤所致若復令坐擁豐饒無以示懲著李侍堯於黃仕簡名下罰令繳出銀二十萬兩以備賠補軍需之用至昨據福康安奏訊據林爽文之父林勸供稱伊祖父墳墓在於義塜地內埋葬並無木牌難以辨認等語該犯祖墓雖埋葬義塜自可查訪而知著李侍堯於林爽文本籍漳州一帶嚴密查訪不可稍涉紛擾致伊支族驚疑更不可因匪犯揑飾竟致之不辦徒事顢頇也初四日丁酉上諭內閣曰柴大紀既貪縱釀變於前復狡詐欺罔於後其前此接奉諭旨不肯出城一節自係因郝壯猷前在鳯山棄城逃回即於軍營正法柴大紀心懷畏懼恐罹重辟是以不敢輕離該處設非朕嚴申軍紀於鳯山失事時即將郝壯猷按律辦理則柴大紀深染緑營習氣怯懦畏葸未必不為郝壯猷之續今既查明種種劣迹自應徹底嚴辦昨已明降諭旨將伊革職拏問交福康安嚴行定擬具奏矣朕於臣下功罪惟視其人之自取一秉大公至正而於用兵之際有功即賞有罪即罰尤務嚴明從不絲毫假借至辦理軍務宵旰焦勞從前平定凖部回部大小金川無不炳燭幾先預􅋵成算此次林爽文等紏衆滋事雖係么髍草竊亦並不心存忽視一本敬天凝命之念孜孜勿懈是以仰邀昊眷刻期奏績逆首生擒即如恆瑞妄請添兵數萬一摺設不斷以乾綱如宋明庸主遇事輒令廷臣聚議衆論紛紛迄無定見征調紛煩緩不濟急寧不如金世宗所云南朝集議既成北兵已可渡河之語其何以握勝算而奏鴻捷耶著將前後辦理緣由通諭中外知之臣等伏讀御製遲速論曰兵事宜速而要於敬天明理不敬不明未有不致僨事者至哉皇言誠足以揭萬幾之要立千古之極矣夫以林爽文之糾衆滋事不過么髍草竊耳而我皇上宵旰焦勞悉本凝命之思孜孜勿懈即遲速論所云敬天也以恆瑞恇怯之見妄請添兵數萬而斷以乾綱斥其謬議即遲速論所云明理也是惟敬天明理乃無不炳燭幾先預操成算以迅奏膚功蓋於兵事有明徴焉而豈獨於兵事然哉欽定平定臺灣紀略卷五十三
