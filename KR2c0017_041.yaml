  text: 欽定四庫全書欽定平定臺灣紀略卷四十一
  hash: sha256:b7aec3022fed6ede74999a9abffa1786f541864b9679a050d840047b6c1562e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_041-1a, image: WYG0363/WYG0363-0475a.png}
body:
  text: 十月二十四日福康安奏言十一日清晨臣見風勢略平強令放船行未十數里仍被逆風打回至臺灣情形日來總未據常青柴大紀恆瑞等具奏殊不可解適有自鹿仔港放回船隻即傳船户蔡順利詢問據供聞得總兵普吉保於九月半前親自帶兵前往諸羅曽否打仗得勝我不能知道等語據該船戶所言普吉保久已帶兵前往諸羅恆瑞若由鹽水港併力進攻收復鹿仔草彼此聲勢聨絡諸羅尚可無虞查諸羅久被圍困屢次救援皆未得手臣再四酌籌自應令柴大紀仍前固守與恆瑞普吉保內外應合殺賊解圍似未便輕委縣城奏入上命軍機大臣傳諭福康安李侍堯曰海洋風信頂阻未能尅期開駕正是蒼默佑天妃助靈俾福康安得以等候新兵揚帆同渡未始非極好機㑹朕方轉愁為慰福康安惟當益加敬感切勿因放渡稽遲稍存尤怨也笨港距諸羅聲息相聞與鹽水港相距三十里兵勢已為聨絡是諸羅鹽水港兩處俱可無虞且撿查恆瑞前奏鹽水港有賊匪滋擾係九月初四五兩日情形而普吉保昨日奏到先復笨港係九月十六日之事是鹽水港一路已壯聲援常青處自守有餘亦可無慮賊擾至普吉保一路既已得手柴大紀等自可內外應合併力㑹攻所有前後寄信諭㫖俱毋庸給與閲看再普吉保昨日奏到之摺是否由蚶江登岸抑係由厦門轉發何以福康安未經相值李侍堯亦未得有信息著李侍堯將普吉保此次奏摺係由何路馳遞之處便中查明具奏此後軍營奏報均應於遞到何處即由何處迅速轉遞勿得因有此㫖拘泥令其轉至厦門以致耽擱方為妥善至此次福康安發摺時尚在守風待渡是由厦門至鹿仔港係屬頂風而由臺灣至內地當係順風何以常青處亦未據有遞到奏報並著李侍堯一俟常青文報遞到即飭驛站加緊迅速馳遞為要二十五日乙未普吉保奏言李化龍於八月二十五日進港臣隨將北路一帶賊勢及一切設偹防禦各情形詳細告知而李化龍以曽經出師金川即欲帶兵前往臣以李化龍甫經到港一切地勢賊情未能深悉自應在鹿仔港固守堵禦仍將各路留駐官兵統交經理臣得以長驅可免返顧之虞其原設各營盤均關緊要仍妥為安設留兵五千六百餘名責令副將格綳額穆騰額參將福蘭泰逰擊裴起鰲張㑹元陳士份等加意防範所有添調粵省兵三千名自八月初六二十二至九月初十日始行陸續抵鹿仔港內尚有兵船一隻配帶兵丁七十九名係把總鄭廷斌管帶未經進口臣一面酌帶漳州兵二千名廣東兵二千名又在陳兵內挑撥曽經打仗者一千五百名併帶領護理副將遊擊琢靈阿參將張朝龍遊擊海亮夏承熙葉有光都司馬元勳等分飭管領查署理畨同知黃嘉訓於事頗為熟悉總理糧務隨營辦理一切臣分派妥協定期於本月初四日親率各官兵本擬於東螺西螺一帶進攻緣聞諸羅縣城被賊圍困事至危急臣即遣妥人密為偵探道路若經由東螺西螺進攻斗六門賊匪不無設備剿洗恐稽時日今查笨港離縣城二十餘里離鹽水港三十里雖係賊匪屯踞若大兵由沿海一帶猝然驟至賊必喪膽潰亂我兵乘勢進攻既可速解諸羅之危而於克復笨港後分撥官兵守禦糧餉藥鉛等項於海道運送更為便益臣一面帶兵相機前進一面密行知㑹柴大紀由縣城統兵接應互相堵殺務期打通道路即可與將軍臣常青等大兵㑹合進攻大里杙一帶賊巢同日李化龍奏言統領粵兵二千名於二十五日到鹿仔港隨㑹商普吉保乘此新兵鋭氣臣即欲親帶官兵進剿而普吉保留臣在鹿仔港駐鎮以固地方臣因署提臣普吉保既係統領閩浙粵官兵則一切機宜自應聽其調度業經禀請將軍臣常青參贊臣恆瑞一俟派有大員前來經理指示機宜臣即統兵接應分路進剿痛殱渠逆均奏入上命軍機大臣傳諭福康安普吉保李化龍曰普吉保李化龍二人同係領兵大員當此逆匪滋擾亟須剿捕之時伊二人俱欲帶領官兵親往剿賊均屬奮勉可嘉但普吉保在彼日久於該處地勢賊情較為熟悉伊以李化龍甫到鹿仔港恐未能深悉該處情形令其帶兵駐守普吉保親統官兵督率前進所辦甚是此次普吉保李化龍奏到之摺係九月初四初六等日拜發而普吉保於九月十七日具奏克復笨港之摺已先行奏到業經降㫖將普吉保交部議敘並賞給搬指荷包以示奬勵至李化龍一抵鹿仔港即向普吉保面詢機宜欲親自帶兵進剿其急公勇往之心亦甚可嘉奬李化龍著賞給大荷包一對小荷包二對該鎮倍當奮勉督率留駐官兵悉力堵禦俾普吉保長驅直入可無後顧之憂即日福康安前抵鹿仔港兼有添派之廣西川黔等省兵陸續齊集軍威壯盛尅期進𠞰正在需人統領李化龍當隨福康安奮勇殺賊尅期立功自效至普吉保稱若由沿海一帶猝然前往賊必聞風潰散之處所見尤合機宜不料普吉保竟能如此現在普吉保已將笨港收復殱戮賊匪焚燬附近賊莊而該處村莊民人一聞官軍踵至歡聲動地正可乘勝攻𠞰昨據該鎮一面咨㑹柴大紀恆瑞定期三路夾攻柴大紀恆瑞自必督率將辨兵民內外應合併力夾攻可期集事著即迅速馳奏二十六日庚申普吉保奏言逆首林爽文率領夥黨又於二十二二十四等日在元長莊一帶蜂擁前來經臣親督官兵奮力殺退賊衆仍屯踞附近村莊密遣妥人偵探得實即於二十四夜分派官兵鄉勇預為埋伏二十五日黎明賊衆由溪墘厝到雲厝土庫東莊等處前來逼近營盤臣親率官兵奮勇直殺鎗炮打死賊匪甚多逰擊海亮都司馬元勳從白沙墩橫衝賊陳用連環鎗炮打死賊匪一百餘人署副將琢靈阿參將張朝龍逰擊夏承熙從無底潭環攻其背署同知黃嘉訓鼓勵鄉勇從水磨莊堵禦截殺自邜至未賊衆大潰共計鎗炮轟斃賊匪數百名奪獲器械賊旗多件文武員辨甚為奮勇出力兵丁鄉勇亦有陳亡受傷者現在查明分別賞恤惟是賊匪經大敗之後仍於附近村莊嘯聚實為可恨必得設法剿洗臣若竟帶兵丁前進糧道後路最關緊要是以叠禀參贊將軍臣恆瑞參贊提督臣柴大紀三路夾攻方易剿洗淨盡兹於二十五日接准恆瑞來札知鹽水港一帶海口要道賊匪不時出沒現在所帶之兵僅敷堵禦必俟續帶府城之兵到日方可前來並接據柴大紀札稱林爽文等賊於本月十五十六兩日復攻諸羅敗陳聞官兵至笨港該賊目帶匪徒數千團聚於大客莊等語是兩處均有難以輕動之勢現在籌度機宜多方密探一俟機有可乘即奮勇前進痛加剿洗又二林地方為鹿仔港沿海一帶門户前經藍元枚派撥官兵八百名以資防守旋因續到漳州之兵二千名亦經藍元枚分派二林以偹進攻斗六門調遣緣原帶漳州官兵只有逰擊夏承熙守偹宋國興二員實不敷管帶適遊擊葉有光奉督臣李侍堯委令管押哨船來巡查洋靣藍元枚見伊係同安人語音與漳州相通且為人遇事奮勉是以飭令同帶漳州官兵駐劄二林即將原駐兵丁八百名撤回鹿仔港九月初九日臣督率官兵駐劄二林察看形勢實為海口要道且為我兵糧道後路特令逰擊葉有光帶兵八百名暫駐二林一面飛咨鎮臣李化龍將原設之兵來駐二林更換葉有光之兵俾得前進攻剿兹於九月二十一日突遇賊匪焚燒大城厝菜菴藔等莊來犯二林逰擊率領官兵往前堵禦鎗炮攻擊賊衆敗退正在燒燬賊占之揚賢莊鋪心仔等處不意賊匪突從竹圍內衝出繞截後路攪殺一處逰擊督率官兵奮力衝殺賊匪始行退散陳亡千總湯國寶把總曽超羣外委沈揚芳兵丁三十三名照例恤賞同日李化龍奏言自鎮臣普吉保帶領官兵起程進剿之後即親往各營盤察看地勢情形諄諭將偹加意防範並傳集義民首林凑等訓示奬諭令其保守村莊協力堵禦苐查現在賊匪注意專攻諸羅正可乘機進擊以分賊勢隨於九月十八日密令逰擊穆騰額帶領官兵由畨仔溝進至大肚溪一帶以作疑兵臣親率逰擊裴起鰲署遊擊陳士份守偹徐大鵬帶領辨兵義民首許伯逹等引道由八卦山直抵柴坑仔賊匪蟻聚拒敵即令施放鎗炮賊始漸退隨焚燬草藔二十餘間賊人恃衆竟復擁至臣率領官兵向前戮殺鎗炮打死賊匪百餘人賊即奔逃正欲追殺因見該處竹林叢雜溝圳甚多未便輕進暫且收軍生擒賊匪何華歐倚二名奪獲鳥鎗刀械賊旗等件二十日親率官兵義民前赴中藔地方審察地勢偵探賊踪猝遇賊匪數百前來迎敵隨令施放鎗炮打死賊匪十餘人賊始退走二十二日聞大肚溪賊匪出擾莊民臣隨即帶領官兵義勇前往堵禦施放鎗炮自辰至午打死賊匪約有二百餘名賊匪紛紛潰散奪獲賊旗皮牌長鎗竹鋛挑刀等件義民內陳亡二名加厚恤賞受傷八名給銀兩醫治至賊匪何華歐倚二名審係賊黨即在軍前正法均奏入上命軍機大臣傳諭福康安李侍堯普吉保李化龍曰笨港業經普吉保克復屢敗賊衆連日賊人不敢窺伺而鹿仔港一路又經李化龍在柴坑仔中藔等處乘間攻擊奮勇殺賊賊人望風奔潰是官軍聲勢皆可聨絡已為大振足令賊人膽寒此時福康安自早得有順風揚帆徑渡前抵鹿仔港正值賊人屢經潰敗之後福康安惟當乘此好機㑹督率將辨㑹合各路鼓勇直前於初次打仗時即將賊匪痛加殱戮俾賊人聞風喪膽無難一舉掃擒至普吉保在笨港一帶雖屢敗賊衆但據奏賊匪仍在附近村莊嘯聚該鎮帶兵前進其糧餉運道後路最關緊要仍應加意防範又李化龍於柴坑仔中藔等處乘機進擊以分賊勢固屬奮勇但鹿仔港係沿海重地逼近賊巢李化龍尤須隨處留心實力防守不可但知鋭意直前轉致附近賊匪潛出後路滋擾此為最要陳亡千總湯國寶把總曽超羣外委沈揚芳及兵丁三十三名俱著咨部優恤上又諭內閣曰普吉保由鹿仔港進攻督率辨兵奮勇殺賊既已攻復笨港今復能偵探賊踪預為埋伏令將辨等從旁衝截賊隊從後環攻賊背前後殺死賊匪數百餘人奪獲器械等件甚多實為奮勇可嘉普吉保已經交部議敘著再賞給蟒袍一件以示奬勵李化龍因普吉保帶兵進攻留駐鹿仔港防守今能探察賊情乘虛進擊奮勇攻剿殺賊多人奪獲器械賊匪望風奔潰李化龍亦屬奮勇可嘉著交部議敘所有此次普吉保李化龍派出隨同打仗殺賊之文武員辨等均為出力並著查報將軍咨部議敘以示嘉奬同日孫士毅奏言招募新兵四千名飭令入伍訓練並知㑹撫臣圖薩布關支糧餉務使各兵技藝嫻熟以收實用萬一軍營現兵不敷搜剿再須添調臣愚似應新舊參用於其中挑選材技出衆者赴臺剿捕較為得力再查粵東赴臺官兵其子弟作為餘丁隨往者共一千二百餘人軍營遇有兵丁缺出足資拔補至此外續有應募臣擬仍令各該營陸續登冊暫緩入伍毋庸一概給以糧餉以節糜費同日圖薩布奏言黔兵二千名現分四起行走於十月初七八九十等日陸續到省立即更換船隻將應給口糧各項照例給足隨到隨行諭令文武員辨小心護送晝夜趲行沿途俱極安靜並未片刻停留臣仍移咨惠州提臣髙瑹駐潮督臣孫士毅一體飭令沿途地方文武加緊催趲務期迅速赴閩同日舒常奏言湖南應偹之兵二千早經照數挑定一面移知提臣俞金鰲速赴鎮筸接署鎮篆並令鎮臣尹德禧先赴總路查㸃帶領以専責成查原派副將伊當阿曽經出師西路金川其餘將偹多係曽經出師之員均經飛飭作速起程臣赴長沙㑹同撫臣浦霖督辦一切軍行事宜并分地查㸃督催俾各起官兵安靜迅速出境不致稍有延緩所有鎗炮火藥鉛彈等項寬為預偹飭派専員解送同日何裕城奏言川省委員先後押米二十萬石接續到境經該地方官迎護尾催於十月十二日全數出江西境隨飛咨安徽撫臣一體飭屬儧催星速前進均奏入報聞二十七日辛酉常青奏言八月二十七日探得賊目莊大田復約首逆林爽文之弟林三共紏匪衆欲來犯郡臣一靣知㑹郡城辨員留心防範一面派撥江寧將軍永慶侍衛烏什哈逹總兵梁朝柱等於二十八日黎明帶領辨兵二千名前往迎擊方出營盤里許據報賊衆已從中州來犯大營東南二面並分夥黨約二千人先攻府城大南門小南門外之桶盤棧當經在城之司道等率領民兵施放鎗炮打死賊三十餘人賊即由竹箐深處竄逸其大營東南兩面約有賊五千餘人蜂擁而來臣即親自督率永慶烏什哈逹梁朝桂等奮勇進剿賊人對放鎗炮滿漢官兵排開隊伍子母聨環鎗炮叠發併施自辰至午賊人敗逃官軍乘勢追趕剿殺至七八里前抵大溪河邊收兵回營計共斃賊約二百餘人奪獲大炮二門官兵義民割獻新留髮之首級十一顆當即奬賞注冊官兵義民並無傷損至前次摺內聞賊目來投之語彼時因有山猪毛義民首舉人曽中立差人赴道禀稱賊目許光來囑令民人黃嵩到堆探問如擒送莊大田得以免罪否隨諭以不但免罪而且有功等語以後並未有投出之信但臣具摺時未將賊目姓名各緣由聲敘明悉實屬疏忽同日恆瑞奏言李侍堯所派兵三千名尚未到齊現在鹽水港附近村莊俱有賊人屯聚賊中火藥糧食甚多難以前進且於附近左右藏匿明係欲俟官軍前進將後路截斷又賊匪於民人所種糧食十分中抽取二三分其附賊民人驟難解散即安分之民亦多心懷兩端均奏入上命軍機大臣傳諭福康安常青柴大紀曰前曽有㫖以常青自駐守府城以來未能前進尺寸伊究係年老留在軍營無益而恆瑞年力正壯尚可以資驅策是以令福康安到彼察看將恆瑞留彼聽候調遣令常青即行回京今日閲伊二人奏到各摺因思常青在府城駐守雖未能前進但一切調度尚俱妥協又聞知諸羅鹽水港兩處被賊滋擾先後派兵接應且伊在府城亦經屢次與賊打仗是常青雖屬年老尚能料理軍務且福康安到鹿仔港由北路統兵進剿其南路及府城一帶亦須有大員駐劄督辦常青在彼日久於該處情形較為熟悉應仍令其留駐府城督率剿捕至恆瑞在鹽水港被賊攔阻一籌莫展轉於摺內將賊匪情形張大其詞茫無主見似此怯懦無能即留於軍營亦屬無益著福康安於鄂輝到後即傳㫖將恆瑞解任令其自偹資斧來京候㫖其福州將軍員缺即著鄂輝調補令其統領恆瑞原帶辨兵妥力剿捕鹽水港一帶賊匪接應諸羅至常青此次覆奏之摺既得有福康安到彼接辦之信該處兵民聞之如何踴躍振奮其賊匪聞有大軍將到情形若何俱應於摺內詳晰聲敘乃並無一字奏及且常青自經委任不能稍著功績今聞簡派福康安前往接辦亦應將伊在彼半年毫無出力愧悚難安而於彼處情形自為熟諳情願留於該處隨同剿賊以贖前愆之處於摺內叙及乃亦竟無一語著常青自行明白回奏恆瑞既知賊人於附近處所潛匿欲圖乘間邀截正應督率官兵將鹽水港附近左右藏匿賊匪奮力搜捕以清肘腋豈有坐待之理即如福康安現在統兵到彼沿途遇有賊匪自即隨處剿殺亦斷無因慮賊匪潛截後路遂按兵不動乃恆瑞惟知坐守漫無籌畫伊究竟在彼所辦何事豈竟與賊相持待其自斃又將欲效魏大斌之到諸羅徒糜廪給耶著福康安嚴加詰訊據實具奏至常青所奏賊目許光來囑令民人探問擒送莊大田是否得以免罪一節常青諭以不但無罪且可有功其措詞尚為得當臺灣賊匪本屬一時烏合其附從夥黨見逆首尚在負嵎抗拒自未必肯將賊首賊目即行擒獻即日大兵雲集四路攻剿賊首等勢窮力蹙退無所歸此等嘯聚匪徒豈真有恩信相結其附賊夥匪一見官兵勢盛首逆指日就擒或希圖自謀生路竟將賊首賊目擒縳獻出乃事理之必有著福康安於進剿時即行廣為曉諭使脅從之徒自相解體彼此猜疑則賊匪烏合之衆可期不攻自散又現在賊匪四出滋擾迫脅村莊民人抽分糧食村民等畏其戕害自不得不勉強聽從將來福康安統兵進剿於所過地方尤應妥為安撫再前此諭令柴大紀如諸羅守禦力實難支不妨帶兵殺出縣城另圖進取乃係因彼時諸羅被賊滋擾情形較為緊急各路援兵未能即至而柴大紀係提督大員稍有疏虞殊為不值是以曲加軫念今普吉保已帶兵克復笨港與諸羅相距止二十里聲勢聨絡兵氣已振而柴大紀在彼堵禦屢經殺賊是諸羅保守無虞已逾半載此時豈可轉委之而去且諸羅義民委之於賊亦甚可憫所有前降諭㫖即可毋庸給與閲看乃常青已差人賫送前往殊屬失之拘泥但柴大紀素有謀略固守諸羅已經數月當賊匪猖獗之時尚能悉力堵禦奮勇殺賊况今賊勢日衰伊接奉前㫖自斷不肯委垂成之功而去惟當倍加奮勉㑹剿奏績二十八日壬戌徐嗣曽奏言臺灣自用兵以來車運軍裝夫腳並給發義勇口糧在在需用錢文以致錢價增昻即內地亦有日增之勢恐將來逐漸增昻於民用官需均有滯礙不可不急籌調劑閩省寶福局鼓鑄錢文嵗額祇四萬三千餘串僅敷搭放且雲南買銅轉運稽遲赴緊加鑄亦屬緩不濟急與督臣商酌擬從鄰省撥濟以平市價但思陸路腳價浩繁轉滋糜費惟查川米五十萬現由江蘇上海轉運莫如即於米船內附搭來閩較為妥便仰懇敕下浙江江蘇撫臣每省各偹錢十餘萬串附搭米船解閩江蘇錢文即於滸墅太平等關稅銀內扣撥歸欵浙省錢文即於現撥餉銀內扣抵一併發至上海轉運所需運費均由江浙二省核銷閩省得此接濟則制錢各處流通於軍需民用大有禆益但江浙現在市價情形難以懸擬所請每省十餘萬之數或仍聽江浙撫臣酌量增減毋致此盈彼絀奏入上命軍機大臣傳諭李世傑閔鶚元琅玕徐嗣曽曰閩省辦理剿捕事宜一切運送軍裝夫價以及給發口糧需用錢文較多以致錢價昂貴自應鄰省撥濟以平市價但江浙兩省現在錢價是否平減局銅是否敷用若因協撥閩省以致該二省錢價增昂局銅不敷亦多未便著李世傑閔鶚元琅玕即行妥為籌酌如該二省能照數協撥固屬甚善即各備錢十餘萬串解閩否則減半撥濟亦無不可所有協撥錢文即著附搭米船一併撥至上海轉運閩省備用二十九日癸亥李侍堯奏言普吉保往笨港時軍裝糧餉俱在元長莊大營有賊乘虛來犯經同知黃嘉訓及逰擊夏承熙殺退又九月十二日有虎仔坑賊首陳泮帶領四五千賊夥下山來擾經副將格綳額督率官兵義民奮勇殺退是賊覘知普吉保進兵又思乘虛從後路來襲一則擾普吉保之糧餉一則擾埔心莊營盤以圖牽制則鹿仔港正需兵接濟而本月十四日風勢已平將軍參贊及粵兵俱由大擔放洋如風􅰆平順不過兩三日即可抵鹿仔港適川省屯練第一起已於十六日到蚶是以臣亦即自厦星赴蚶江料理配渡現皆隨到即登舟配渡又查恆瑞普吉保既已訂期夾攻普吉保所駐之元長莊離諸羅僅二十餘里恆瑞所駐之鹽水港離諸羅亦僅四十里兩路齊進計此時必與柴大紀㑹合而將軍參贊巴圖魯侍衛等及粵兵三千又齊抵鹿仔港川兵隨後繼進黔兵到來臣亦當料理速發奏入上命軍機大臣傳諭福康安常青李侍堯曰福康安同海蘭察及巴圖魯侍衛章京等於十四日俱由大擔放洋不過兩三日可抵鹿仔港計到彼後今已及旬餘自已督率將辨乘鋭進剿至虎仔坑賊首陳泮覘知普吉保進兵又思乘虛潛出繞截甚屬可恨料此等賊匪罪惡貫盈久為天理所不容此時大兵雲集四路攻圍斷不能茍延殘喘賊匪等肆逆不法罪不容誅其逆首林爽文及莊大田陳泮吳領等必須生擒解京盡法處治方足以泄神人之恨著福康安於統兵進剿時如逆首等膽敢親出抗拒被官兵臨陳殱戮固亦足以伸國法然究不若按名生致處以極刑方可彰憲典而快衆忿福康安務須預為布置設法籌辦俾渠魁首惡悉數生擒更為妥善朕心方愜也副將格綳額於賊首陳泮帶領賊夥下山滋擾時督率兵民將賊匪殺退甚屬奮勇前因出有溫州鎮總兵一缺諭令福康安於帶兵出力之副將內如徐鼎士謝廷選等保舉一員奏明升補著將格綳額亦歸入出力副將內一併察看比較何人最為奮勇即行奏明補用以示鼓勵欽定平定臺灣紀略卷四十一
