body:
  text: 四月初一日戊戌徐嗣曽奏言自興化泉州馳抵厦門一帶察看緊要口岸即㲼港紛岐處所亦皆派撥員辨帶領兵役梭織巡查臣又隨處傳集濱海耆民及澚中漁户面加奬勸該居民等咸知踴躍現復據漳浦縣羅澤坤禀報盤獲臺灣逃回匪犯林壬即陳壬一名解赴督臣李侍堯審辦臣於三月十四日回至省城擬將一切事件速行趕辦再赴緊要口岸親往搜拏又因調派廣東兵四千名由厦門蚶江分渡㑹𠞰臣昨往來泉州將應行事宜面同督臣商酌督臣擬赴厦門一帶巡查即料理粵兵東渡臣巡閲口岸亦以興化泉州一帶為最要計粵兵之由蚶江前進者正在其時臣即暫駐蚶江督率照料務俾妥速飛渡俟粵兵開船後趕回省城辦理秋審及一切事件亦不至誤至於應需糧餉等項布政使伍拉納及鹽法道戚蓼生現在泉州隨同督臣辦理已節次委員齎銀前往接濟臺灣本係産米之區一面委員就地採辦一面運米前赴支放仍令各屬動碾倉榖運貯泉州聽候撥用藥鉛等項亦已籌備充裕奏入報聞初二日己亥上命軍機大臣傳諭常青李侍堯曰康熙年間奸民朱一貴聚衆滋擾經提督施世驃統領大兵悉由厦門進𠞰不及一月即已收復蕆功蓋因大兵㑹合一路由厦門進攻聲威壯盛賊匪望風膽落故能一舉殱滅此次賊匪起事之初黃仕簡任承恩領兵進𠞰分路配渡其餘將辨又各由别路陸續進發已覺兵勢稍分伊二人一抵臺灣即應彼此㑹合厚集兵力直搗賊巢將首惡擒縛餘黨自必瓦解乃黃仕簡任承恩僅派撥將備零星打仗四處堵禦以致賊匪從而生心得由山徑繞道蔓延各處嘯聚官兵轉為所牽掣兵分而力見單幸而賊匪不過么䯢草竊並無謀計設遇狡黠奸徒逞其鬼域伎倆豈不又蹈木果木之覆轍耶著常青抵臺灣後即將各路官兵調集㑹合一處其添調粵兵遵照前㫖全歸常青統率以期兵威壯盛士氣振奮專力全赴賊巢搜𠞰斷不可又蹈黃仕簡任承恩故轍輕分兵力觀望遲延俾賊匪得以四散牽掣蕆事致稽時日也初三日庚子黃仕簡奏言總兵郝壯猷柴大紀等馳赴南北二路𠞰匪郡城為全臺根本不可無大員彈壓且附郡之大穆降本縣莊岡山羅漢門等處介在南北之中均離府城不逺各處有賊匪往來出沒臣親督官兵居中堵禦搜捕并為兩路軍兵接應聲援此在郡未敢遽離之情形但臣前奏未能詳細聲明實屬糊塗之至逮諸羅鳯山先後克復賊匪復於附近村莊潛聚滋擾臣派撥官兵嚴密擒捕而諸羅之大武壠礁吧哖各莊仍有匪黨聚集該處山路最為險峻現在整兵進𠞰日內督臣常青到臺灣臣即親率官兵到處𠞰捕掃除之後隨赴諸羅督同總兵柴大紀進攻斗六門水沙連等處繼至彰化㑹同總兵普吉保等攻𠞰大里杙賊巢務期生擒逆首林爽文解京究辦併𠞰盡匪夥斷不敢稍有遷延觀望自取罪戾至臣染患風症前在內地時發時愈自到臺灣因機務焦迫心神倍加恍惚氣力日見頽憊惟念職任海疆只當竭盡駑駘是以未敢將症病據實奏明兹節次欽奉上諭訓飭臣感激涕零悚惶無地惟有躬率士卒奮勉𠞰匪淨盡根株以期尅日蕆事同日李侍堯奏言官兵前往臺灣𠞰捕逆匪所有糧餉等項固須接濟無誤尤防冒濫多支致將來按例報銷或至追賠懸宕臣於到任後即飭司查核兹據伍拉納彚查自上年十二月起至臣到任以前共撥藩庫銀三十三萬餘兩臣意用兵未久何至如許之多及閲所開各欵有鹽菜等項例應支給者有預支俸餉等項數月內即可扣還者有過兵地方借領以應差務將來除核銷外應繳還者亦有解往臺郡備用正在途次該道府具禀時尚未接到者緣倉猝調兵務期迅速應付以利遄行且臺郡逺隔重洋往返動需時日不得不多為預備是以動撥較多但近據臺灣等縣開報雇用夫價等項已有例不准銷者臣以軍務緊急之時固不便一一駁核致地方官轉得藉口或至貽誤但一任濫付將何所底止隨即嚴行檄飭將來著落賠補外仍一面通飭各屬嗣後一切欵項均須查照部頒軍需則例動支其則例所未載而事在必需如海運水腳等項則酌量先行應付其餘概不得濫給庶軍務無遲誤之虞而帑項亦不致有多糜之弊至臺灣府縣本各有倉庫其三縣雖已殘破而府城保守無虞尚應實貯據藩司查明府庫應存銀二十五萬餘兩倉榖應存十二萬餘石乃接據臺灣道府禀稱銀榖俱已用盡並未將作何動用之處詳悉開報隨嚴飭該道府等逐一查明到日核辦現值軍務緊要自當先以接濟糧餉為急臣惟有隨時酌量應付以期無誤昨據署臺灣府楊紹裘禀稱逆匪林爽文與各賊黨將大里杙一帶掘濠放水復築土牆安設炮位是現在賊黨方盤踞穴巢併力拒守未經大創斷不肯自行潰散則此時尚不慮逸匪竄入其附船入口者類多被難之人窮無所歸思回本籍而各口岸兵役藉有稽查之名遇此等渡海來者留難勒索難保其必無是以臣嚴飭各員務宜分别良歹不得藉端擾纍現據各口岸委員盤獲數起如逃兵汪中鯉等四名臣已按律辦理其餘被難之人檄令各州縣訊明如確有證據立即釋回庶奸匪不致幸逃而難民亦不致受纍至將來攻破賊巢時匪黨四散逃入內地者必多尤當上緊擒捕毋使一名漏網又不得以此中或有難民稍存姑息又提臣任承恩委辨押解賊目林家齊一犯前來咨稱該犯係逆首林爽文族長去冬曽誆哄彰化文武官願將林爽文帶來投到以致猝不設備釀成巨案等因臣查該犯既係林爽文同謀之逆黨自應解京審訊隨派委巡檢程鏜把總姚世貴將該犯押解於二十日起程均奏入上命軍機大臣傳諭常青李侍堯曰黃仕簡不過因遷延日久連奉諭㫖嚴飭為此飾詞以掩其退縮之罪幸而朕先事預籌派令常青前往督辦黃仕簡得有所藉口若使朕不派常青前抵臺灣黃仕簡又將何辭豈竟思久坐郡城以待賊之自斃乎況林爽文既歸巢穴其餘附近賊匪不過么䯢草竊如易連陳邦光等皆可堵截搜捕又豈專賴提督大員坐擁重兵以防其復來滋擾之理即總兵柴大紀郝壯猷等收復二縣城後自應統領官兵直抵大里杙賊巢奮勇𠞰除乃該鎮等即以防守為名並不上緊追捕截拿任其竄伏團聚以致賊匪得以繞道蔓延官兵轉為所牽掣是該鎮等效尤觀望畏葸不前即郝壯猷之罪亦與柴大紀之失陷城池漫無籌畫者不相上下現據李侍堯奏逆匪林爽文與各賊黨將大里杙一帶掘濠放水復築土牆安設炮位等語賊黨盤踞穴巢以圖併力拒守看其光景别無他圖竄匿之計轉可聚而殱戮其事尚屬易辦恐大兵雲集四路圍攻賊匪計窮力蹙或竄入內山希圖茍延殘喘搜捕轉稽時日不可不預為籌辦著常青抵臺灣後即將各路官兵調集㑹合一處揀派精鋭親行帶領直赴大里杙奮力圖𠞰務將首惡林爽文一鼓擒獲餘黨殱除淨盡其堵截賊後路不使竄入內山一事專派柴大紀帶兵在內山路口嚴密堵禦並著常青詳悉曉諭柴大紀伊係臺灣總兵致賊滋事失陷城池已屬有罪之人且收復諸羅後效尤觀望其咎亦與黃仕簡任承恩無異念其從前守禦郡城尚屬出力姑令帶罪圖功現在大兵進𠞰賊匪竄入內山之路最關緊要即責成該鎮專力堵截若能將賊首拏獲餘黨不使一名竄逸不但宥其前罪並當仍録其功倘再不能實力奮勉立功自贖以致賊首林爽文從伊防守之地竄逸及餘匪復有逃入內山等事則惟柴大紀是問恐伊不能當此重罪也再據李侍堯奏附船入口者類多被難之人而各口岸藉有稽查之名不無留難勒索等語緑營此等惡習實為可惡俟事竣後當嚴查處治以示懲警又臺灣倉儲庫貯額數不為不多府城又復保守無虞何以未及數月即已用盡地方遇有此等事件該處官員即使各出已資設法防護亦所當然況閭巷小民尚有好義急公之舉若地方官竟有藉辦軍需為名浮用冒銷飽其私槖則是天良昧盡即立置重典亦所應得但現在正值㑹兵進𠞰之時若遽行查辦恐伊等各懷畏懼辦公更多觀望著常青李侍堯俟事竣後徹底嚴查如果有侵欺情弊即嚴參重治想昧良之輩天理難容亦無所逃罪也初四日辛丑常青奏言二十三日至厦門登舟因春令北風甚少在料羅寄碇三月初六日風順開洋初九日由澎湖進鹿耳門登岸抵臺灣府城面晤提臣黃仕簡即以欽奉上諭與看令其回奏並詢以𠞰賊機宜黃仕簡語言不甚明白更兼步履艱難是病憊屬實及臣接見在城員辨訪問臺灣近日情事復悉心體察𠞰捕事宜詎料與該提督等從前咨報逈不相符緣臺灣地廣人稠游手者衆自逆首林爽文攻縣戕官各處奸徒皆效尤搶劫然大兵初到賊衆聞風逃散此時兩提臣乘其鋭氣自有破竹之勢因黃仕簡惟坐郡城任承恩惟守鹿仔港而分派鎮將亦皆觀望遷延不思爭先賈勇臣在泉州時以重洋阻隔盻望情殷聞收復彰化攻克諸羅而鳯山又尅日可復臣一時欣幸意謂大勢已定即請將浙閩兩省備用之兵撤回以省糜費今臣親至臺灣得諸目擊始知彰化諸羅鳯山等縣被賊攻陷焚劫已空而又以栽竹為牆無險足據故賊聞官兵將至即捨城而爭險要之地官兵既已入城因即以克復城池咨報如柴大紀一到諸羅賊仍占據斗六門使我兵南北兩路至今不通並聞普吉保帶兵前赴彰化中途被劫車輛則道路梗塞較前更甚任承恩帶兵由鹿仔港登岸後既不駐扎彰化縣城以逼賊巢又不與柴大紀夾攻斗六門惟知退守鹿仔港近聞賊人仍往來彰化城中是何得謂之克復至郝壯猷係正月間經黃仕簡派往南路在大湖扎營月餘於二月二十一日據報克復鳯山乃臣於三月初九日到臺灣之時已聞初八日郝壯猷所帶兵丁二千餘名被賊沖散該總兵及副將以下等員先後奔回止存敗殘兵四百餘名又副將徐鼎士前到淡水未見寸功因距府路逺尚無實信兩月以來折兵糜餉應請將遲誤之提督黃仕簡任承恩總兵郝壯猷柴大紀普吉保分别治罪臣在泉州不能覺察並請將臣交部嚴加議處但黃仕簡患病衰頽在軍無益應令其仍回厦門任承恩雖未能向前但北路避賊人民俱在鹿仔港若遽撤動恐賊乘虛柴大紀雖不能將斗六門一帶打通然上年在府城外堵禦尚屬奮力普吉保係後到之員調往北路未久俱仰懇暫令伊等帶罪督兵以觀後效至郝壯猷等自鳯山敗回是否賊多兵少致被沖散抑係畏葸脫逃並前此鎮將等咨報克復縣城以及攻莊殺賊各情節有無藉事鋪張容臣一併嚴查明確再行請㫖務令功罪分明軍威復振但臺灣賊匪從前止有逆首林爽文王芬等數人從賊者亦止附近賊巢數千人今則南路險要各處有賊首莊大田莊錫舍王坑郎藍九榮陳靈光陳建平等北路險要各處賊首林爽文之外又有陳泮吳領蔡福葉省等或為林爽文羽翼或效林爽文所為自立旗號肆出滋擾凡稍可踞占之民莊盡為賊人所有惟府城鹿仔港笨港沿海三五處亦屢有賊來攻擾尚能共相保護故避難者偕來聚處但將來亦恐有人滿乏食之虞而逆首林爽文等狡猾異常復將所掠錢米廣為散給要結人心以致無食游民盡皆從賊查臺灣額駐兵丁經三縣被陷傷亡已多尚未據該鎮查報實數然約略存剩之兵似不堪用其內地調到兵萬餘各路打仗又多損失當此賊勢蔓延必須添調重兵方能痛加𠞰洗現在鳯山復陷賊更鴟張已到府城十里之外臣派遊擊蔡攀龍帶兵往桶盤棧堵禦並督率道府永福楊廷樺同知楊廷理等各帶義民固守郡城可保無虞再令普吉保速與柴大紀夾攻斗六門以通南北之路飭署守備陳邦光保守鹿仔港催任承恩前赴彰化先將附近縣城賊夥殱除即相機攻搗林爽文大里杙賊巢並飛檄徐鼎士㑹同署都司易連將北路新莊艋舺等處賊匪𠞰盡漸次自北而南與任承恩㑹合併力搜捕此時不必僅以收復空城為得計而必以爭據險隘攻搗賊穴殱擒賊目為先除嚴飭提鎮副將等員各思激發天良出力報效外一面飛咨督臣李侍堯將原備南澚金門銅山海壇各營兵一千名再調同安營兵四百名海壇鎮兵三百名金門鎮兵三百名又調原備廣東兵三百名浙江兵二千名再挑幹練勇往之逰擊守備等十員配船渡海俱由鹿耳門進口㑹齊臣即親自統領必不再行分撥致減兵力先儘南路鳯山縣境以至諸羅彰化淡水席卷而前務期將逆首林爽文並其餘賊目一併生擒不使賊一名漏網又查臺灣府城雖係插竹為牆而各門城樓磚土砌就亦頗髙大臣隨出城外細看地方形勢防範尚為周密謹將恩㫖蠲免臺灣府全屬本年地丁錢糧謄黃遍諭各處復傳喚士紳商民當面曉諭各紳士義勇人等莫不感激踴躍現在府城內外街市貿易照常再查該提鎮等咨報克復三縣其彰化並無官兵駐守鳯山現已復陷惟諸羅一縣自柴大紀駐扎之後賊人尚知畏避居民亦漸次回歸臣因柴大紀不能打通南北道路是以一併參奏但其能守諸羅非若彰化鳯山之既克而不能保守者可比是柴大紀功過原不相掩臣仍遵㫖先行嘉奬再觀後效又逆首林爽文前據該鎮禀聞被炮打傷之語原無確據現聞大里杙莊一帶竪立旗號及僞帖告示寫有順天字樣並自稱盟主大元帥此等悖逆不法寸磔不足蔽辜至義民等獻出王芬首級係何人所殺是否真實義民等在先曽否附賊挑斷腳筋之楊禮等十一犯有無搶奪容臣逐一查明核辦同日黃仕簡奏言二月初九日有南路辨兵紛紛來至郡城臣隨飭遊擊孫全謀詢問據稱初八日賊匪從鳯山縣東南門放火擁入官兵接戰抵敵不住以致衝散初十日總兵郝壯猷到郡據稱初四日參將瑚圖禮禀報自山猪毛被賊攔截不能過溪該總兵派令遊擊鄭嵩帶兵六百名前往又派官兵三百名接應午刻鄭嵩回稱行至硫磺溪遇賊圍截衝散官兵未回甚多未刻賊匪來攻營盤併攻縣城東門初六日該總兵將城外官兵移駐城內初七日賊四面攻城初八日賊匪益見加增攻城更急午刻賊由南面進城四處放火攻殺以致官兵衝散等語查南路自克復鳯山總兵郝壯猷等原帶官兵合計有三千餘名在該處防守縣城足資堵禦接應何致賊匪衝散官兵現在督臣常青於三月初九日到臺灣府城臣差查南路官兵存亡確數另報統聽督臣查核辦理均奏入上命軍機大臣傳諭常青恆瑞李侍堯徐嗣曽琅玕曰據常青奏到臺灣後查明官兵遲誤據實指參及添調兵丁情形所辦俱合機宜惟任承恩身為提督乃畏葸不前既不駐劄彰化縣城以逼賊巢又不與柴大紀夾攻斗六門其罪奚辭豈可復留該處再令帶兵仍滋貽誤著遵前㫖將任承恩一併拿問解京治罪柴大紀一到諸羅不能將斗六門賊匪搜除淨盡開通道路實有應得之罪但前此守禦郡城尚能奮勉且駐劄諸羅後賊人頗知畏避居民亦漸回歸常青所稱該鎮功罪不相掩自屬公論所有陸路提督一缺著加恩暫令柴大紀署理並著常青傳諭該鎮令其戴罪圖功以觀後效若伊玩誤不前必當二罪俱發至郝壯猷守衛鳯山即賊多兵少亦當效命捐軀國家自有優恤乃竟棄城逃回怯懦已極軍律斷難姑容已明降諭㫖即於軍前正法以肅戎行其所遺海壇鎮總兵員缺著常青於現在帶兵將備內詳加體察實有奮勇出衆人員則不拘階級之崇卑即奏請破格超擢以示奬勵如此賞罰嚴明自必人人感奮可期鼓勇集事至常青現在飛咨添調本省及廣東浙江兵共七千名俱由鹿耳門進口㑹集即親自統領必不再行分撥致減兵力之處所見甚是粵東潮碣二鎮兵丁前據李侍堯等奏業經檄調四千名已較常青所調者多一千名於三月十六日自粵省分起起程即可陸續到彼至浙省兵向來柔懦更遜閩省且距閩稍逺此時徴調亦緩不濟急著傳諭琅玕竟可停止派撥現於常青原調兵數止少一千名朕思福建駐防滿兵雖不能如京師健鋭火器等營徑旅所向無前究屬心力堅定較之緑營恇怯尚為得力況常青曽任福州將軍駐防兵皆其舊屬呼應自靈著恆瑞於滿營內挑選一千名并派得力之協領佐領等官分起管帶恆瑞即親身統領前赴臺灣㑹合進𠞰所有兵丁口糧配渡各事宜即著徐嗣曽妥為料理其福建續調之緑營兵二千名即著藍元枚親身統領前往臺灣㑹𠞰內地亦不可無提督彈壓所有水師提督事務著漳州鎮總兵常泰暫行署理現有粵省添調兵丁四千名及本省續調之內地官兵自己陸續至厦門㑹齊著李侍堯妥速料理即令其配渡常青於新調官兵未到之前固不宜冒昧輕進然坐待稽延恐賊匪又生别計亦非良䇿自應將現有官兵內詳加挑選擇其壯健者派令奮勇將備帶領先至南路鳯山一帶搜捕賊匪逐一殱除淨盡俾後路肅清將來大兵往北攻𠞰不致有反顧之憂較為妥善至鳯山駐守兵丁三千餘名何至遇賊即行潰散現據常青奏先後奔回之兵止存四百餘名餘兵皆向何往豈有俱從賊之理著常青俟事定後嚴查為首之人從重辦理其現在退回之兵按照兵法俱應概豫駢誅但念人數衆多究係領兵將辨不能首先奮勇以致兵氣不振姑暫貸其一死著常青明白曉諭該兵丁等令其激發天良奮勉自效上又諭內閣曰郝壯猷係派往南路𠞰捕大員既經收復鳯山縣城自應一面派兵設卡防守一面親率將辨追𠞰賊匪乃安坐營盤既聞瑚圖里被賊攔截不即親往接應以致賊匪乘勢攻圍縣城復陷況該總兵所帶之兵計有三千餘名當賊匪來犯時兵丁等畏賊退避該總兵即應立時正法數人使知警懼同心抵禦何至紛紛潰散即或賊多兵少勢不能支亦應奮不顧身殺賊而死甚至無能自刎庶不失城亡與亡之義從前征戰緬甸時如明瑞觀音保扎拉豐阿皆因緑營兵丁恇怯不能勝敵今日適有松潘鎮總兵穆克登阿來京陛見經朕詢問據稱伊等在彼跟隨明瑞等打仗目擊彼時情事將軍等非不可以退出而明瑞等僉言受恩深重兵散勢窮寧死於賊不死於法即或退出後幸邀寬典亦何忍靦顔視息是以不肯生還等語朕聞其言猶欲為之墮淚明瑞等能知大義咸以身殉其身後既邀優恤世職復豫專祠子孫至今受恩弗替歿有餘榮郝壯猷以專閫大員寧不聞知乃亦效緑營兵丁恇怯惡習自罹重辟且日前因郝壯猷收復鳯山縣城尚為出力曽諭令常青查明如果郝壯猷堪勝提督即行奏明候朕簡放今似此畏怯幸生若不明正典刑其何以肅戎行而昭軍紀常青接奉此㫖即將郝壯猷在臺灣郡城傳集衆將辨將伊正法並將前㫖本欲用為提督及現在又因其棄城潛回是以按軍法從事各緣由向其宣諭俾知賞罰分明禍福惟其自取郝壯猷即身伏刑誅亦當死而無怨至瑚圖里身係滿洲前於賊匪滋擾鳯山時乘馬馳歸郡城已有應得之罪苐念其究因倉猝兵散所致與自行脫逃者有間是以仍令帶罪效力今據黃仕簡奏該參將又於山猪毛地方被賊攔截不能過溪若係賊人踞守溪河險隘尚屬可原倘竟係該參將畏懼賊勢借詞躲避亦如郝壯猷之逃回則其罪更無可逭著常青即查明此次瑚圖里如果有畏葸逃回情事亦即一面奏聞一面將該參將正法示衆至柴大紀普吉保姑念其從前奮勉現令帶罪自贖暫著從寬交部嚴加議處以觀後效常青從前率據黃仕簡等咨報冒昧入告咎亦難辭但念其逺隔重洋未能得知確信且該督現在臺灣督辦本日奏到各摺悉合機宜常青著加恩免其議處此事現交常青督辦常青即著授為將軍恆瑞藍元枚著授為參贊俾事權歸一軍威益振以期迅奏蕩平綏靖海疆上又諭內閣曰前因李侍堯奏南北兩路提督各有牽掣不免坐費時日已降㫖將任承恩革職拿交刑部治罪黃仕簡撤回厦門候㫖矣伊二人抵臺灣後並不親臨行陳定期㑹攻一南一北互相觀望果不出朕所料以致賊匪日久蔓延迄今未能撲滅其玩延貽誤厥罪維均即或黃仕簡因年老患病不能親身帶兵及任承恩到彼後不能不零星堵禦抑或賊匪衆多兵力實有不敷𠞰辦之處伊二人早應隨時據實直陳候朕指示籌辦乃伊等並無一字奏及是其種種貽誤實無可置喙而黃仕簡係水師提督臺灣乃其專轄現在𠞰捕事宜又經朕特交督辦乃如此畏葸因循更無怪任承恩之意存推諉其罪視任承恩為尤重任承恩既經革職拏問黃仕簡亦難豫寬宥昨已降㫖將黃仕簡撤回內地俟伊到厦門時著李侍堯即傳㫖將伊一并革職拿交刑部治罪所有福建水師提督員缺著藍元枚調補其陸路提督自當擢用現在臺灣出力總兵柴大紀於林爽文等滋事不能預為防範到諸羅後又不能進勦斗六門賊匪本不當復邀升擢但念其防守郡城尚為奮勉出力功罪自不相掩所有陸路提督員缺著加恩令柴大紀暫行署理以觀後效欽定平定臺灣紀略卷十二
