body:
  text: 六月二十日丙辰上命軍機大臣傳諭常青藍元枚曰閲藍元枚所進圖內該參贊等駐劄之鹿仔港迤南東螺社麥仔竂二處在紅線外近海邊處所有賊巢二處現在鹿仔港一帶一切軍糧文報皆由海靣通達幸而賊匪無能未于此處占踞倘賊匪於東螺溪等通海口岸私設船隻攔截隘口使軍糧文報及官兵來往俱被阻隔所關非細或賊匪勢窮力竭由此入海而逃更難追捕朕意現在藍元枚等剿捕柴坑仔大里杙一帶賊匪若未能即時廓清尚需兵力厚集則莫若趁此添調各兵未到之前統領將辨先將東螺社麥仔寮二處賊巢盡力剿毁或于往來海口安設官兵𣲖員把守毋使賊匪得以竊踞亦先事預防之一法著藍元枚等相機籌畫遵照辦理至臺灣府城一帶有常青等率領重兵在彼足資抵禦但附近城外在在皆有賊匪屯聚鹿耳門為一郡咽喉文報兵糧往來要隘恐賊匪狡黠未必不心生窺伺常青等不可專注意南路稍存大意仍當酌派妥當將備加意防守為要再此時賊匪鴟張勢雖衆多但究係一時迫脅烏合之徒易于潰散著傳諭藍元枚等遵照昨降諭旨務需諄切出示即稱遵旨曉諭各莊社被脅從之衆皆知悔罪自新則賊黨自當解體仍著藍元枚等將近日剿賊情形並海口要隘有無賊匪屯聚阻隔之處據實迅速覆奏上又命軍機大臣傳諭福康安勒保曰常青本由都統將軍甫經簡授總督更事未多今自到臺灣後一切調度尚能妥協已出意料之外但伊究竟年逾七旬精神未能周到而恆瑞又係年輕未曾更事之人殊不可恃且常青等昨奏請派一大員到臺灣督辦軍需其意未必非自揣難以勝任欲朕另簡大臣前往督辦軍務不可不預為籌及朕思此事自應阿桂前往督辦但念伊亦年逾七十之人不忍令其逺涉重洋和珅又現在不時手足舊疾復發且朝夕扈從承旨書諭難以分身將來派出之領兵大臣如海蘭察等亦非常青李侍堯所能統轄駕馭者因思福康安年力富強於軍旅素為諳練又能駕馭海蘭察等若以之前往督辦足資倚任現在甘省亦無緊要應辦之事著福康安接奉此旨即帶印由驛起程前來行在陛見預備差遣所有陜甘總督著勒保赴甘省署理福康安於途次遇見勒保時即可將印信交接尤為便捷若常青等續有奏報剿捕賊匪業已得手不難剋期集事即馳諭福康安仍可於途次回甘肅本任勒保亦回晉撫之任臣等謹按將軍臣常青等因賊勢猖獗奏請添兵而于逺隔數省鞭長莫及竟未暇深籌自係猝見賊多兵少不免心存惶惑我皇上已于鄰近省分如數撥付而猶慮常青年逾七旬未能周到恆瑞又少未更事恐不能迅掃賊氛因特諭陜甘總督臣福康安馳驛前往行在預偹差遣逮後賊匪日久稽誅遂星馳前往一舉蕆功良由睿算先操神機豫定也二十一日丁巳李侍堯奏言閩省軍糈現在鄰省協濟之米已覺充裕但近接常青知會以賊匪甚多又請添兵𠞰捕則米糧自以多偹為要兼以臺灣支給鄉勇撫恤難民等項需米甚多又近日漳泉一帶雨澤較少晚禾尚未栽插將來不免平糶等事則閩省籌偹米石自以多多益善臣再四籌酌江蘇省既偹碾米十萬石似應即令陸續委員運閩以裕儲偹又常青既請增調官兵是以臣將豫偹在泉厦之閩兵二千名即令配渡前往並兩廣督臣孫士毅亦有預偹在潮之兵二千名想接常青咨調即先令此兵前來惟所調黔楚之兵似覺太逺聖明自有指示而征兵既增則一切糧餉火藥及過兵各事宜俱須預為籌偹現在米糧銀餉火藥三項俱已寬裕其由粵入閩過兵各站既有前次章程可以照辦至由浙入閩之路亦扎致撫臣徐嗣曾酌定章程檄飭各州縣預偹惟船隻一項厦門蚶江本港船不過七八十隻近因差使較多已飭沿海州縣協雇今既增添大兵則船隻亦須增備查浙省現有運米到閩之船臣現飭蚶厦兩廳擇其可赴臺灣者暫行雇留先賞給口糧臨時再從優給以雇價其未熟臺灣海路者則代雇舵工水手駕駛各船户等俱甚樂從其餘一切事宜臣惟有悉心籌度以期無誤奏入上命軍機大臣傳諭李侍堯李世傑保寧閔鶚元曰前因閩省需用米石有浙江江西二省採買三十餘萬石足敷儲偹是以李世傑奏請碾米十萬石運閩諭令且毋庸配船起運並諭李侍堯察看情形如閩省糧米尚有未敷再咨會李世傑等委員押運今臺灣𠞰捕賊匪現又添調兵共一萬一千名則軍糈自應預為寬偹兼以臺灣支給鄉勇撫恤難民並預偹漳泉平糶等事所需米石不妨多多益善著李世傑閔鶚元即將前次碾出倉穀偹運米十萬石迅速派員配船起運以濟急需再川省素為産米之區連嵗收成豐稔積儲較裕並著保寧速將川米偹辦二十萬石即由川江迅速運至江南交李世傑閔鶚元一併委員運赴閩省於軍糈民食更為寬裕李世傑閔鶚元務須將船隻預行偹辦齊集一俟川米運到即可星速配船陸續起運毋又若何裕城之推諉遲緩致誤要需李侍堯接奉此旨不妨將現在又於江南川省運米數十萬石前來接濟之處先令閩人知之俾軍民口食有資市價不致踊貴方為妥善上又命軍機大臣傳諭李侍堯曰朕以湖廣貴州等省兵丁與福建相隔數省未免緩不濟急已降旨派調附近閩省之粵浙二省駐防滿兵三千名及粵兵六千名合之李侍堯現在配渡之二千名已足該將軍等所請之數足敷攻剿今李侍堯奏黔楚之兵似覺太逺是李侍堯業已見到及此適與朕意吻合而常青並未能計慮及此看來常青見賊匪衆多未免著忙胸中略無主見為此甚憂之至所請京兵朕未嘗不早為籌及此時若即令前往不但伏暑炎歊長途跋涉未免延緩并慮迹涉張皇且京兵調動則派出之領兵大臣亦必須重臣統率常青昨奏請𣲖大員到臺灣辦理軍需其措詞雖為督辦軍需起見而其意未必非自揣難以勝任欲朕另派大臣前往督辦軍務是此事恐非常青等所能辦理完結是以昨已密諭福康安令其馳驛前來行在陛見彼時若常青等剿捕賊匪不能得手其勢必須調撥京兵即可令福康安統領前往督辦如日內該將軍等續有奏報剿賊得勝之信即令福康安于途次仍回本任原可偹而不用此朕慮事于先之苦心也著將此先諭李侍堯知悉再李侍堯奏蚶江港船本少現將浙省運米到閩之船擇其可赴臺灣者暫行雇留等語所辦甚是預行籌偹臨期方可遄渡不至稽遲至此添調兵丁內有廣東浙江二省駐防滿兵各一千五百名此項兵丁雖不能如京兵之驍勇然較黔楚緑營自為得力且與閩省接壤道路較近可以早抵該處以資攻剿之用李侍堯于各該省續調兵到遵照昨降諭旨以九千名撥往常青處以二千名撥往藍元枚處帶領進剿總以愈速愈妙再前據孫士毅奏林爽文之母聞己自縊其父亦已潛逃等語前解到賊犯林家齊亦有伊父勸誡不從畏纍自盡之供自非無因總未據常青奏及李侍堯駐劄厦門耳目較近自必亦有所聞著即將此事詳加訪問無論虛實即據該督所聞具奏二十三日己未李侍堯奏言前在漳州時據臺灣各官稟稱賊中米糧火藥將盡逆首林爽文蓄髮親丁亦十去五六意謂大兵一出即可勢如破竹昨忽接將軍常青等咨會五月二十四五等日出城遇賊互有勝負並奏請增兵一萬一千以資協剿殊勝駭異是從前各官所稟賊勢稍衰之處即係賊匪布散流言以懈我師而非實在情形也今南路賊首莊大田于官兵未出之先預約賊首林爽文來援林爽文先遣伊弟帶二三千賊至三坎店又自帶衆賊欲先攻鹽水港即會攻府城則常青等出城所遇之賊想係南北兩路賊匪已經會合併力抗拒又府城北面三十里外之麻豆社為薪米入城之路有十餘莊向未殘毁近亦被賊焚掠一空而普吉保於五月初間甫至土庫欲與柴大紀會剿又聞賊乘間來擾鹿仔港之埔心莊等處遂急回兵救援而沿途所過之棋盤厝等莊又被賊焚搶是賊直欲將各處不從賊之莊盡行搶虜使芻薪等項俱無所出前據柴大紀奏報諸羅城外已有賊匪截路禁薪炭入城之語近又據副將格綳額稟稱鹿仔港近地無可樵採柴薪甚是難得是賊即不與官兵接仗而官兵已為所困况現在賊勢昨見藍元枚奏稱漳化北門外遇賊七八千普吉保在快官莊遇賊二三千守備張奉廷在大肚溪亦遇賊千餘恆瑞札稱府城外來抗之賊實有萬餘而埋伏各莊者更不計其數又存留府城之兵因水土不服病者千餘是目下南北兩路俱有賊多兵少之勢今不從賊之莊已被殘燬所存祗府城諸羅鹿仔港數處所關非細惟有仰懇添派大兵用全力痛加殱除庶可及早蕆事查閩兵存營無幾未便再調惟漳州鎮有兵四千上年因林爽文賊夥多係漳人是以獨未調用然派往藍元枚處俾漳人統漳兵或未必不得力而以之派往常青處臣亦不敢無慮况賊既鴟張漳州聲息相通臣現在風聞有逆首林爽文密遣人來內地勾結會匪之説雖語出無稽而現據仙遊縣盤獲自臺灣渡回十三人內有陳班一名驗係半截髮辮頭有傷痕形迹可疑現飭提犯來泉審究是漳屬一帶亦不可不預為防偹臣擬再調浙江兵二千名到泉州厦門駐劄以示形勢而備緩急奏入上命軍機大臣傳諭常青李侍堯藍元枚曰賊勢甚為猖獗且播散流言懈我軍心尤為可恨看來常青處兵力不敷急須添兵助剿前于常青等奏到時即降旨添派已足一萬一千名之數並令各該督等迅速挑撥發往又據李侍堯奏接恆瑞札稱府城外來抗之賊實有萬餘埋伏各莊者更不計其數等語前常青同恆瑞統領將辨出城分隊剿賊是恆瑞與常青同在一處如有札會該督事件自應聫名咨逹何以此次李侍堯所接之札祇係恆瑞出名豈恆瑞與常青又分為兩路抑或係常青年老偶患疾病未能會辦亦未可定朕心甚為懸注若李侍堯另有所聞即行據實覆奏再前日普吉保已將回至鹿仔港會同藍元枚剿賊情形奏聞而柴大紀剿賊之處尚未據該鎮奏到今據李侍堯奏諸羅城外有賊匪截路不令薪炭入城又據格綳額稟稱鹿仔港近地無可樵採柴薪難得是賊匪甚屬鴟張而藍元枚於二十三四等日進兵打仗剿殺賊匪後亦未據續有奏到著李侍堯即將藍元枚柴大紀等連日如何堵禦攻剿打仗得勝情形一得地方官稟報即隨時迅速加緊馳奏又據李侍堯奏閩兵存營無多未便再調惟漳州鎮兵四千前因林爽文賊夥多係漳人未經調用然以派往藍元枚處以本籍之人帶領本籍之兵未必不得力所慮甚是自當如此辦理至漳泉一帶會匪甚多賊首林爽文遣人勾結之説雖得自風聞不可不留心防範總以靜鎮為要至該督擬調浙兵二千名到泉州厦門駐劄一節浙兵向來怯懦無用即調駐漳泉亦不得力徒勞跋涉更致虛縻且需時日朕意閩人素稱獷悍且遊手無藉者更多不若即在閩省就近召募俾食錢糧以充營伍伊等自必樂從可以一呼而集較之浙兵既屬勇健可恃且遊手無藉之徒亦可收以為用不致為匪實屬兩有禆益李侍堯接奉此旨即在該省先儘漳泉一帶速行召募并不必拘定額數即多募數千以備巡防調撥之需亦無不可如恐經費不敷即速行奏明再由鄰近省分撥運解往應用並著常青藍元枚亦各就郡城鹿仔港一帶廣行招募即曾經被賊迫脅附從者一經應募投到不妨即令充伍不必以曽經從賊過為區别疑而不用以安反側如此辦理不但兵力可以日增且官軍中多得一人即賊匪少一黨惡既可以充實營伍又可以解散賊黨常青藍元枚等務須迅速妥辦以期兵數倍增可免逺省調動之費又收化莠為良之益同日孫士毅奏言接準將軍臣常青參贊臣恆瑞知會如潮州有挑偹兵丁即先遣發一千名由厦飛渡來臺隨後再偹二千名候旨到日續行遣發查前次粵兵四千名赴臺會剿俱在附近潮州等營挑撥臣恐辨兵抽撥已多不足以資堵緝是以先經與提臣高瑹商酌選派督標兵一千名提標左翼鎮標水師兵各五百名共兵二千名並派定帶兵將辨及一切軍裝器械火藥鉛彈俱令携帶足數分駐海陽潮陽等縣各海口嚴密巡防查拏竄匪稍補前次抽撥之數今既接到閩省來咨必須添調即將此項預偹堵緝之水陸兵二千名即日飛飭迅速啓程臣親赴黃岡點驗出境以五百名為一起接連前進不復間日行走計六月十三日粵兵二千名全數俱入閩境其後調之二千名現在一面𣲖撥一面行調目下盛夏大雨時行如溪河通達即由水路來潮可節沿途糜費至臺地既請添兵火藥必須寬裕臣即于此次各兵隨身携帶火藥外復就附近各營抽撥三萬斤隨後解赴閩省撥用仍札飭藩司許祖京催辦硝磺趕緊補額並預偹裹帶一月口糧運送厦門支發至臣前將臺灣連得勝仗並風聞逆匪窮蹙情形冒昧入告兹常青恆瑞咨調粵兵赴臺會剿是前次探聽未確實深惶悚臣現聞五月二十六日與賊打仗官兵踴躍爭先是日陳亡守備千把共有四人均係粵省員辨是粵東官兵頗肯勇往向前奮不顧身尚為得力所有常青等令臣聽候諭旨再行飭令起程之二千名仰懇準豫調臺協剿庶于軍營有禆奏入上命軍機大臣傳諭孫士毅曰前據常青奏到派調粵兵一摺已降旨諭令該督先將挑備兵二千名速行赴閩再續調兵四千名共足六千名之數又派駐防滿兵一千五百名一體派撥尅期配渡計此時該督已接奉前旨即行辦理矣該將軍等奏請派調官兵朕豈有不撥之理原可不必候旨除從前挑備之兵二千名該督已據咨令其分起行走此刻自早入閩境其餘粵兵四千駐防滿兵一千五百名該督亦須先期預偹船隻派員照料起身莫致遲誤愈速愈妙至該督奏於此次各兵隨身携帶火藥外復就近各營抽撥三萬斤隨後解赴閩省偹用之處火藥為行軍利器自應多為籌偹所辦好實屬可嘉至粵東距臺灣逺隔重洋傳聞不實亦屬事理之常該督即據所聞入告頗見急公又何妨礙耶嗣後如得有信息總當隨時迅速具奏以收兼聽並觀之益即偶有不甚確實之處朕亦不加之責備也上又命軍機大臣傳諭常青李侍堯舒常曰常青現在臺灣督辦軍務其湖廣總督之任雖經舒常署理而常青係正任自有應得廉俸等項但現在閩省既不支給而湖廣又不便專差賫送該將軍在臺灣一切用度何所仰給著李侍堯將常青應得湖廣總督分例養廉即在閩省庫內按數給支以備盤費之用將來或由楚省遇便搭解撥還原欵或即在閩省藩庫內開銷俱無不可二十四日庚申上命軍機大臣傳諭常青李侍堯曰逆匪林爽文等糾衆不法劫縣戕官實由該地方官平時貪黷廢弛殃民斂怨以致姦民有所藉口釀成事端除現在文武各員俟該將軍等于事竣後查參嚴辦外其此次被害各員內前據閩省獲犯供稱同知董硌埏劉亨基官聲狼藉最為地方之害而長庚湯大奎則據該將軍等查明遇賊不屈被害因思該員等平日居官操守若何有無擾纍地方情節及遇賊時孰為抗節捐軀孰為貪縱激變該省官民自有公論著常青李侍堯確切訪查若有居官素稱亷謹尚不擾纍地方及到任不久賊衆倡立匪會並非其任內之事而遇賊時實能激發忠義仗節自殉者具奏到日自當降旨仍豫議恤其貪黷不職斂怨激變而遇賊時猝然被戕並非出於義憤以身殉難者即當停止議恤以警貪劣而示彰疸業將已經具題議恤者暫行停給其未經咨部者概從緩辦統俟該將軍等查奏到日另降諭旨至林爽文糾合匪徒煽誘百姓皆以地方擾纍為辭該處民人被其用威迫脅以致日聚日衆但被脅民人具有天良常青等此時當遵旨愷切曉諭以林爽文罪大惡極勢雖猖獗祗屬烏合之衆指日即就殱除至附從百姓本屬安分良民不過被賊威脅無奈聽從並非出於本願且伊等即因地方官平時不無擾纍激成事端但俱已身被戕害已足伸伊等怨忿之心况朕惠愛黎元休養生息臺灣雖逺隔重洋撫綏軫惜從無岐視伊等身被深仁渥澤天良難昧又何所顧忌必欲始終從賊而不速行悔罪自新乎若執迷不悟大兵雲集必至玉石俱焚悔將何及伊等務須熟思利害及早自新若能即行投出毋論從賊與否皆屬子民不但可免治罪且仍得安業歸耕入伍食糧如伊等能將有名逆首頭目擒縛獻出不但無罪而且有功從前莊錫舍投出立功即賞給守備得邀頂帶之榮此乃衆所共知者如此詳悉開導曉諭俾從賊百姓紛紛投出不但賊黨可以解散且使賊中頭目自相猜疑于剿捕實屬有益再現在常青等統領官兵攻剿賊匪糧餉火藥俱由內地陸續撥解將來添調各兵到後應需運往者更多此等糧餉軍火最關緊要著李侍堯於派員押解時務須加意慎重遴選妥幹之員小心押送並給兵丁防護倘於途次或有被賊邀截之事豈非資寇兵而齎盜糧此事所關非小著傳諭該督必當慎之又慎加意辦理以期無誤要需臣等謹案臺灣吏治廢弛不肖之員任意貪婪殃民斂怨於結黨倡會巨案並不嚴究痛懲以致姦宄無所警惕釀成叛逆姦謀及賊匪起事被戕若仍得一體邀榮褒恤竟無殊於仗節抱忠實不足為貪墨者戒我皇上録善必歸核實特命督臣常青等嚴查其平日居官之政迹兼恭以輿論之品評以定豫奪斯恩榮不得濫叨而彰善疸惡舉錯咸宜愈足以肅官方而勵人心矣欽定平定臺灣紀略卷二十二
