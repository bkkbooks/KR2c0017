  text: 欽定四庫全書欽定平定臺灣紀略卷五十六
  hash: sha256:5954800b1ee97e55a56ac68741718ccbd69bf03d291597c183c9116e8945ac49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_056-1a, image: WYG0363/WYG0363-0675c.png}
body:
  text: 三月初一日癸亥上命軍機大臣傳諭福康安李侍堯徐嗣曽曰臺灣戍守兵丁將來自仍應分班輪换此等兵丁籍𨽻漳泉者居多若分撥營汛時漳泉兩處莊民即以同籍之兵𣲖往防守則伊等鄉貫熟習自必連為一氣即間有作奸犯科者兵丁等未必肯舉發自應令籍𨽻泉州之兵在漳州民人村莊附近一帶防守其籍𨽻漳州之兵即以防守泉州各莊庶彼此互相紏察可以防微杜漸而他府之兵與之互相錯處不動聲色於撫綏防範俱有禆益著將此密行傳諭福康安與徐嗣曽妥定章程熟籌辦理上又命軍機大臣傳諭福康安李侍堯曰柴大紀前在嘉義縣防守未經帶兵出城一節經福康安等查明防守嘉義縣俱係義民之力其未經出城亦係義民不肯將伊放出伊亦畏賊不肯帶兵出城柴大紀前次所奏全不足信是柴大紀恇怯無用又復狡展欺􅎖並守城亦無寸功足録矣且此案匪逆滋事由伊釀成激變是其罪較之黃仕簡任承恩之僅止因循貽誤者為尤重著福康安將此一節向柴大紀嚴加審訊即行定擬迅速據實具奏上又諭內閣曰此次臺灣剿捕逆匪該處義民隨同官軍打仗殺賊甚為出力業經降㫖將廣東泉州等莊賞給褒忠旌義里名用示奬勵至漳州民人雖與賊匪籍貫相同但其中隨同官兵打仗殺賊者亦復不少若不一體加恩轉似於伊等有所岐視不足以示勸勵所有漳州民人各莊著賞給思義村俾該民人等咸知顧名思義勉為國家良善守法奉公以副朕一視同仁之意臣等謹按漳泉民人各分氣類動以雀角鼠牙細故輒尋私憤林爽文籍𨽻漳州竟至於誘集匪徒肆行滋亂究之涵濡德澤同仇敵愾之義民所在皆是我皇上復不分畛域凡義民之為粵人為泉人者固已特示褒嘉而漳人之不黨於賊踴躍從軍者亦錫以思義嘉名特為表異初不因其與逆匪同籍靳以旌揚斯真海涵天覆之量無所不包而該民人等顧名思義勉為善良則一視同仁之中即寓默化潛移之道者歟初三日乙丑上諭內閣曰前因臺灣剿捕逆匪需用軍糧應行寬為籌偹又福建漳泉二郡上年偶因缺雨糧價較昻節次諭令浙江江蘇四川江西湖廣各省撥運米石以資接濟經各督撫𣲖員督辦沿途接護運送到閩甚為妥速業降㫖將各該督撫交部議叙現在首逆林爽文莊大田生獲臺灣全郡平定大功告蕆各省陸續運到米石足敷應用其未經運到之米無須再行運往亦已諭令各該督撫即行截留分年隨帶運通至各該省承辦運米之員一經𣲖委俱知以公事為重恪守功令上緊趕運源源相繼軍糈民食並資充裕今仰荷上倉眷佑南北兩路賊氛盡掃魁渠首惡悉就生擒深愜朕意所有各省承運米石之文武員辨俱著該督撫查明咨部議叙其護送之兵丁等俱著酌量加賞再此次軍報往來馳遞無悮其各省驛站文武員辨亦已有㫖交部議叙至現在逆首林爽文解赴行在沿途管押護送甚為迅速所有各省𣲖出押解逆犯及沿途接護之文武員辨並著交部議叙其護送兵丁人等均著查明分别酌賞朕賞罰一秉至公雖微末辨兵稍知出力亦不肯沒其微勞內外大小臣工惟當倍加感奮益矢慎勤初四日丙寅李侍堯奏言臺灣被賊戕害各員臣詳加區别惟彰化縣俞竣到任未及兩月居官尚無劣蹟而被難實屬因公似應照例議恤又理番同知長庚當賊攻入彰化時該員出拒手刃數賊為賊所害鳳山縣知縣湯大奎雇募鄉勇守城因衆寡不敵即行自刎其子湯荀業同時亦為賊所戕署理畨同知王隽在任十月降調內渡上年解餉過臺𣲖往鳳山隨營支放當賊匪再攻縣城該員在石佛頭地方被害此三員平日居官尚無狼籍之聲而起事情形亦似堪憫惻可否一併仰邀議恤其他如臺灣府知府孫景燧在任三年臺防同知劉亨基先後在任八年原任臺灣縣知縣程峻先後在任五年署諸羅縣事原任臺防同知董啓埏在任三年有餘署諸羅縣唐鎰在任十月以上聲名俱屬狼籍而劉亨基董啓埏唐鎰三員為尤甚此五員平日既貪黷斂怨其被害亦由於自取若復濫邀恤典無以昭懲勸而警官邪應請毋庸置議奏入上諭內閣曰前因臺灣逆匪滋事時被賊戕害各員內或有平日居官亷謹實能抗節捐生亦有在任貪黷廢弛殃民斂怨遇賊猝被戕害者若概行給豫恤典不足以示彰疸而警官邪因諭令李侍堯查明被害各員平日居官及死事情節據實具奏再行分别核辦今據李侍堯所奏甚屬公當地方官有守土牧民之責如果居官勤慎亷隅自矢及事起倉猝能以身殉是其在任並無劣蹟而死事實屬因公自應加恩議恤以示旌奬若其平日貪汚肆行剝削以致衆怨沸騰激而生變此等劣員設其身尚在必當明正刑誅豈可因其被賊戕害俾得濫邀恤典所有此次臺灣被賊戕害各員除居官貪黷之孫景燧劉亨基程峻董啓埏唐鎰五員不准議恤其俞峻長庚湯大奎王隽均著交部照例議恤上又諭內閣曰臺灣孤懸海外逺隔重洋民情刁悍奸徒易於滋事向來祇𣲖御史前往巡視職分較小且不能備悉該處情形殊屬有名無實著將請𣲖巡臺御史之例停止令該督撫及水師陸路兩提督每年輪值一人前渡臺灣嚴行稽察如地方文武有骩法營私擾纍兵民之事即可就近查眀據實參奏福州將軍亦係該省大貟自應一體輪𣲖至海洋風信靡常前已降㫖令該督撫等祇須視風信平穩時配船前往不必拘定時日但逺渡重洋究係涉險如該將軍督撫提督內有年逾七十者著免其前往以示體恤臣等謹按臺灣民習剽悍不肖之吏又往往以孤懸海外滋為奸利是以有巡臺御史之設所以馴民風肅吏治者固為周至苐御史品秩威稜於臺灣道府既不足以相懾且不能久駐於閩輶軒所至不過一經涉厯又安在其能整飭哉我皇上罷御史之遣特命該省將軍督撫暨水陸提臣嵗以一人往視相嬗而周著為令甲夫督撫諸大臣既為道府以下之所畏憚而皆久駐於閩輪往巡視則以平日之所聞核諸巡視時之所見稽察尤易為功較之御史之設不更法良意美乎而為督撫諸大臣者當必有以仰體聖𠂻俾海外之民風吏治蒸蒸日上也夫上命軍機大臣傳諭福康安李侍堯曰前諭令阿桂訊問富勒渾在總督任時於柴大紀貪黷營私種種劣蹟何以置之不辦據富勒渾供稱在總督任時曽節次密札臺灣道府令其時時查訪倘有廢弛營伍等事即密行飛禀查辦若通同狥隱别經發覺必將不行禀報之道府一併嚴恭俱有案可查該道府等俱可詢問等語柴大紀任意侵貪該道府等近在同城豈無聞見自當據實禀報何以並未有人舉發著福康安即將富勒渾前此札據吊查閲看並詢問該道府等如果富勒渾所供屬實則柴大紀種種劣蹟竟係道府等通同徇隱即使該處地方官接到密札後富勒渾旋經調任亦應將柴大紀欵蹟禀明接任之雅德常青等乃始終並無揭報除孫景燧已被賊戕害永福在臺灣最久身係滿洲又任道員於此事實難辭咎著福康安即查明該道有無揭報及如何通同徇隱之處據實嚴行參奏再臺灣應辦善後事宜已節次諭令福康安㑹同徐嗣曽熟籌妥辦今思此次搜捕逆匪該處熟番尚為得力將來臺灣换班兵丁前已有㫖諭令酌留一半即在臺灣募補毋庸更换今此等熟番向化日久馴熟可用或即照四川屯練楚省苗民之例酌量挑選即於應在臺灣募補兵數內將此項熟番恭半充補既可防範地方又足以示綏戢而出力社番得有錢糧於生計益資饒裕似為兩有禆益著福康安等是否可以如此辦理之處即行詳悉妥商據實具奏如不可行亦不可拘泥遵㫖又昨訊據林爽文有夥犯董喜帶病跟伊逃至集集埔地方因官兵追殺不能相顧各自逃竄董喜實在身死與否並未親見等供前經福康安訊據林爽文供稱董喜業經病故當即以所供不足深信諭令福康安查明覆奏今嚴訊林爽文並未親見董喜身死是林爽文前在軍營所供自係護庇黨惡並未確實著再傳諭福康安將董喜一犯嚴切查究下落務得確據毋任幸逃漏網初五日丁卯閔鶚元奏言先准閩省咨㑹委員都司張爾魁押解臺匪內林躍興一名在閩省南平縣地方因病重先行正法其林侯林棍林琴劉德即林德龍張回賴子玉林水林玉賴敖黃富等十名於二月二十六日解到吳江之橫江溪地方林棍一犯患病沉重即飭令臬司康基田馳往驗明凌遲處死其林侯等九犯飛速小心護解前進奏入報聞初六日戊辰上諭內閣曰閩省地方文武員辨辦理軍需解運糧餉火藥照料兵丁配渡等事尚俱妥速並無貽誤現在大功告蕆除該督撫已邀甄叙外其在事出力之文武員辨著李侍堯詳晰查明分别等第咨部議叙初七日己巳福康安海蘭察鄂輝同奏言臣等將莊大田嚴訊緣莊大田籍𨽻福建漳州平和縣於乾隆七年隨伊父莊二來臺灣原住嘉義遷居鳳山縣䔍家港地方種田度日乾隆五十一年十二月內林爽文滋事差陳天送到南路紏人謀逆莊大田同族弟莊大韭聽紏入夥到阿里港搶劫逼勒鋪户攢凑番銀三千圓並向布鋪搶布數十匹製造旗幟要到北路投奔林爽文衆人因道逺不肯前往莊大韭欲自為頭目衆人不服遂推莊大田為首自稱洪號輔國大元帥以簡添德為軍師許光來為副元帥與林爽文遙相應和而攻擾村莊僞封官職亦不聽林爽文調遣十二日攻陷鳳山知縣湯大奎被害二十日往攻郡城至二十五日聞廣東義民燒莊即行撤回二十七八等日林爽文來攻府城遣賊夥前往幫助總未攻開五十二年正月鳳山被官兵收復於三月初八日又往攻陷殺害官兵一千餘人以後總在中洲南潭大穆降大武壠居住時來府城外攻圍滋擾總未得手大兵到後將大武壠噍吧哖阿里山等處凡可通南路各隘口俱被官兵嚴密防守信息不能相通至本年正月半後在本縣庒始知北路賊匪蕩平退守大武壠意欲調集人衆抗拒官兵又想自行投出正在遊移官兵已到自牛莊大武壠大穆降南潭中洲岡山新園枋藔水底藔等處連次扺禦俱經殺敗即由畨界繞山逃至琅嶠被官兵直扺畨界四面圍截於柴城外被擒此南路賊匪附和林爽文肆逆之大槩情形也至該犯等本係天地㑹內之人此㑹起於何日何地有何識别記認意欲何為反覆研訊惟稱天地㑹名目相沿已久不知起自何人入㑹者拜盟結義遇有搶奪打降互相幫助見面時只說五㸃二十一以為暗號别無記認莊大田所稱洪號二字即係㑹頭名色等語所供起㑹根由較北路賊匪稍詳亦不能十分確鑿因俱係解京要犯而莊大田又素有吼喘病症被官兵追趕於樹林內黑夜墮馬跌傷頸項及拏獲時又復驚嚇不便遽加刑訊此次拏獲賊目甚多審明並非首逆要犯即於軍前正法毋庸解送其賊目莊大田及著名頭目莊大韭莊大麥許光來簡添德許尚陳牙林漢等𣲖委總兵袁國璜翼長六十七解交常青暫行收禁普爾普迅速直至郡城即帶同巴圖魯侍衛克升額等十員及守偹李自昌率領辨兵迅速押解赴京一面令普吉保前往大武壠山內嚴密緝拏餘匪至嘉義縣地方賊匪雖已搜查净盡但安撫歸莊民人彈壓地方不可無大員駐劄今柴大紀業經拿問即飛行蔡攀龍移駐該處並將臺灣鎮總兵印送交新任總兵普吉保接收任事其水師提督員缺請㫖即行簡放奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯徐嗣曽曰前因福康安攻克大里杙賊巢後不即帶兵直入畨境搜捕僅懸立重賞令生畨將逆首擒獻辦理未免失之遲緩恐逆首得以乘間逺揚不得不加以䇿勵今賊首林爽文已生擒解京並將南路肅清賊目莊大田一併生獲該處生番等幫助官軍分路搜緝不料其竟能如此出力現在臺灣全郡賊氛掃蕩無遺籌辦一切均屬周密詳妥深慰朕懷實堪嘉許辦理亦未為遲至從前請將恆瑞仍留軍營效力一節彼時福康安因未奉到節次諭㫖故爾冒昧陳奏今既飭令立即回京亦可毋庸置議福康安現係有功之人一切過失皆可不問且其功大而過小豈有轉加有功之人以罪之理此時軍務業經告蕆計德成早已渡洋前扺臺灣所有應行改建城垣福康安自己㑹同相度形勢詳悉妥辦此外如清釐地界添設官辨各事宜福康安惟應與徐嗣曽等悉心籌畫酌定章程以期一勞永逸即有一二無關緊要零星逸犯亦可交徐嗣曽普吉保二人在彼督拏自不難全行緝獲刻下新任福州將軍魁綸已可渡海前抵臺灣現在大功已竣福康安酌留楚黔官兵一二千在彼彈壓將善後諸務大局料理妥協即可帶兵起程回京惟向來四月間海洋風信靡常不無涉險之慮福康安此時凱旋回京尤宜慎重不得冒險前進竟不妨於五六月間俟風信順利再行內渡方為穩妥即途次亦不必過於儧程於八月萬夀前赴熱河瞻覲亦不為遲也再莊大田等供內有黃天養莊樹二犯現未拏獲著福康安李侍堯即於內外各處嚴緝務獲毋任漏網又據莊大田供林爽文曽差陳天送到南路紏合夥黨有莊大田族弟莊大韭聼從入夥等語現訊之林爽文據供並不知有陳天送其人所供恐不足信著福康安即查眀陳天送下落務將該犯拏獲毋任兔脫十一日癸酉上命軍機大臣傳諭福康安李侍堯曰此次剿捕臺灣逆匪軍書籌筆宵旰焦勞一切緊要機宜朕思慮所及隨時指示福康安等禀承方略擘畫周妥仰賴上蒼眷佑于三月之間生擒二逆首全郡賊氛掃蕩無遺現届大功告蕆所有辦理此事顛末曽親製紀事語二篇及平定臺灣功臣像贊序一篇偹述用兵機要及賞功罰罪諸大端而一本于敬天勤民孜孜不怠之一心宜勒之貞珉以昭彰疸著將御製文三篇用清漢字書寫發交福康安李侍堯于臺灣府城及厦門二處建碑碣三座照依尺丈慎選石工妥為鎸刻俾巖疆海徼咸喻朕勤政愛民眀慎用兵之意十二日甲戌上命軍機大臣傳諭福康安曰該處熟畨協同官軍搜剿賊匪俱屬急公奮勉而生畨等自逆首窮戲逃竄之後經福康安明白曉諭各社生畨咸知順逆幫同官兵義民分路堵截賊匪林爽文莊大田無處逃匿現在二逆首俱已先後就擒所有打仗出力之熟畨等著賞給效順匾額交福康安仿照各村莊義民之例於所居畨社一體頒賞以示旌奬至生畨等雖與內地語言不通亦不能辨識文字但伊等素性好利如內地布匹鹽茶等物皆所嗜好著福康安查眀幫同搜拏逸賊之生畨等就其所好內地物件酌量從優賞給俾伊等益加感激蒸蒸向化十三日乙亥上命軍機大臣傳諭福康安李侍堯徐嗣曽曰前因臺灣剿捕賊匪官軍節次打仗據該提鎮等奏報不知存亡者甚多屢經降㫖交福康安等嚴查此項兵丁作何下落尚未據查眀具奏兵丁等奉𣲖出征如果臨陳捐軀或為賊所害事後查明不特應行賞恤並當將其子弟等挑補兵缺俾資飬贍如遇敵潰散除投回軍營仍復隨同官兵打仗者免其查究外若事定後始行逃回查無從賊情節尚可貸其一死倘竟甘心從賊甚至助賊打仗今見賊匪平定私行逃回或被拿獲即當立行正法雖其子孫等將來亦不准挑補兵缺以示懲警從來用兵之道貴在賞罰嚴明現在大功雖已告竣但兵可百年不用不可一日無備此事如福康安業已查眀即遵照前㫖分别嚴辦若因人數衆多福康安回京以前不及查奏即著交與李侍堯徐嗣曽各在內外逐一嚴查辦理毋得稍事姑息十四日丙子常青徐嗣曽同奏言總兵袁國璜健鋭營翼長六十七將莊大田解到臣常青徐嗣曽察看該犯病勢已就奄息又飭醫診治亦說難以再生不便任其因病而斃幸逃顯戮隨將莊大田綁赴市曹凌遲梟示郡城內外民人觀者不下一二萬人同聲歡忭同日李侍堯奏言領隊大臣普爾普帶同侍衛辨兵押解匪犯林勇林漢莊大麥莊大韭許光來許尚簡添德陳牙等八名由厦門入口臣查林勇係首逆林爽文之胞弟其餘許光來等亦皆有名賊目屢與官兵打仗之犯均應慎速解京除已專𣲖文武護解外並嚴飭沿途地方官小心護送一面知㑹前途一體防護以期妥速行走冉侍郎德成前往臺灣勘估城工於本月十八日抵蚶江登舟二十六日得有順風即帶同司員等開駕放洋均奏入報聞十六日戊寅上命軍機大臣傳諭福康安李侍堯曰據福康安委員解到從賊匪犯內蕭晤天供上年五月內被賊目水沙連監軍林舊拏去入夥等語林舊為林爽文招集匪徒黨逆助惡亦係緊要賊目未據拏獲具奏著福康安即將該犯迅速查拏務獲毋任漏網稽誅至各犯家屬均例應緣坐現據賴應供稱伊父賴箋母張氏妻林氏子賴際㑹俱在平和縣內地居住著李侍堯嚴飭該地方官查拏辦理其林順石南林良胡真各犯家屬雖據供稱在臺灣地方被兵冲散究難慿信並令福康安李侍堯於內外地方飭查務得各該犯等家屬實在下落按名查拏照例辦理十七日己卯李侍堯奏言運送軍米船隻前後遭風失水者共十七號內蔡球琳等六船有搶出撈起米石並淹斃水手自屬可信其餘曽長鎰等七船船米俱失而船户水手並未據報淹斃恐有盜賣揑飾情事現移咨撫臣就近提訊又外委蔡永勝從九品官正邦二員於轉遽軍報畏怯風濤逗遛灣泊以致耽延現咨部斥革枷號示懲奏入上命軍機大臣傳諭李侍堯徐嗣曽曰運送軍米如並未遭風揑報沉失自應查眀治罪但海洋風􅰆不常船隻破溺在所不免且船户等運送軍米事屬因公今遭風沉破並有一船淹斃水手十七名殊堪憫惻著傳諭李侍堯等即將淹斃人口照漕船失風淹斃之例賞恤其餘送遞文報等船如有因風淹斃者亦照此賞給以示軫恤至蔡永勝等因畏怯灣泊耽延軍報怠玩已極非發遣不足以蔽辜俟枷號滿日即發往伊犁烏魯木齊等處充當苦差欽定平定臺灣紀略卷五十六
