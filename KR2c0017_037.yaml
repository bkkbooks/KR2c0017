  text: 欽定四庫全書欽定平定臺灣紀畧卷三十七
  hash: sha256:2c6c6596f41dadd9195ffec06baf0065e3fd3dd9340596095dda60f32b3fb4d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_037-1a, image: WYG0363/WYG0363-0423a.png}
body:
  text: 九月十四日戊寅李侍堯奏言諸羅被圍日乆前接将軍常青來札知又遣副将貴林蔡攀龍叅将孫全謀䓁帯兵一千六百名前往應援嗣於二十四五等日接䑓灣各官禀報因八月以來暴風頻作各兵由水路沿海往塩水港去而復回兼有失風耗損者八月十四日尚未到齊柴大紀等在諸羅尚在固守惟糧食已無甚為竭蹶劄塩水港之遊擊楊起麟先僱畨民四人各帯火藥二十五觔畨銀四五十圓晩間伏地而進後又僱十一人如前運送俱得到諸羅擬再多雇暗運接濟十五日以後風勢稍息貴林蔡攀龍等料可俱抵塩水港該道永福又令塩水港隨營之縣丞徐英䓁多僱義民𢾗千協力前進諒必打通道路二十九日有舡到厦詢知蔡攀龍等已於二十前後到塩水港查該處及鹿仔草夲有府城遣往運送糧餉之夫役五六千名今該道又在塩水港僱義民𢾗千協同前進是兵力亦已厚集且塩水港鹿仔草亦俱有兵駐劄蔡攀龍等見前此魏大斌等輕進被截自必步步為營接續前進不至為賊所誘定可打通道路奏入上命軍機大臣傳諭福康安李侍堯曰諸羅雖被賊圍糧餉火藥不無短缺經楊起麟僱畨民運送接濟實為出力可嘉楊起麟前已䧏㫖遇恭将缺出即令補用矣至賊人夥黨雖衆止係一時廹脅現據李侍堯奏䑓灣道永福已令塩水港隨營之縣丞徐英䓁雇覔義民𢾗千人恊力勦賊可見該處百姓皆知賊匪立就殄滅無不急公投効若大兵一到或剿或撫賊黨自必紛紛觧散日就窮蹙諒此等被脅民人豈有不願為良善子民而轉肯為賊出力之理且藍元枚未經患病之先朕早已令福康安前赴臺灣督辦軍務機宜凑合實為成功先兆福康安尤當深信不疑恃以無恐至将來柴大紀調補水師提督後所有陸路提督一缺朕因蔡攀龍由逰擊甫擢副将即陞總兵不過𢾗月若即用為提督未免稍驟今思該處帯兵總兵如李化龍等俱不若蔡攀龍之奮勇而蔡攀龍係本省人在閩最乆該處情形較為熟諳自不若即以蔡攀龍補用陸路提督更為得力著福康安李侍堯留心察看如蔡攀龍果能奮力破賊即先将蔡攀龍傳㫖補授以示鼓勵冄徐鼎士前此約㑹藍元枚由大肚溪進兵伊由大甲溪進兵夾攻大里杙賊巢本為佳策藍元枚未即前往即己身故現在該處䆒竟作何籌辦接應徐鼎士是否尚在淡水抑已與李化龍等㑹同進兵大甲溪總未據續有奏報並著福康安李侍堯各将徐鼎士一路近日攻剿情形迅速覆奏同日常青奏言山猪毛義民臣前次未将該處設堆堵禦共有義民八千除保守本庄外又挑出一千餘人俱各安頓家室公議各緣由詳晰聲叙實属錯謬兹擬扵剿捕南路即順便令伊等各回本庒又副将貴林蔡攀龍恭将孫全謀䓁帯領官兵一千六百名已於十九日自塩水港起行前往諸羅現在未接柴大紀等文報但恭賛恒瑞又帯滿漢大兵三千名于二十二日起行聲勢更甚諸羅定可無虞道路自必通暢至浙省滿兵俱已到齊亦已陸續前來臣惟有乗新兵鋭氣速擒南路賊首荘大田即趨赴北路㑹攻賊首林爽文大里杙賊巢必不敢因循貽悮自干重咎奏入上命軍機大臣傳諭福康安常青李侍堯曰常青仍令山猪毛廣東義民各回本庒所辦又属拘泥既自知前此聲叙未明係属錯謬而於奉到續䧏諭㫖之後又欲将該義民等送囘本庒何不曉事體若此該庒人衆心齊既自能防禦而挑出隨營之一千餘人又能激發義憤願隨官兵助剿常青正當聼從所請令其隨同殺賊立功正可以助官軍聲勢今復行拘泥遣囘豈不阻伊等急公投効之心着常青於接奉此㫖即派瑚圖里前往該庒傳㫖嘉奨並諭以此事係属常青辦錯現已有㫖申飭該義民等仍當前赴軍營隨同官軍征剿如能殺賊立功即當邀恩得賞官職俾該義民等益加踴躍從事更可得力所有義民副理劉䋲祖並即着一體賞給官職以示奨勵現在接應柴大紀之蔡攀龍等據常青奏已於八月十九日自塩水港起行自已即日前抵諸羅恒瑞又帯兵續往是該處軍勢壮盛不但諸羅之圍已觧而塩水港鹿仔草一帯亦無可虞今常青乗官兵新到鋭氣親自統領先将南路屯佔賊匪剿殺無遺擒拿荘大田此亦先清後路一策常青務須奮力搜剿以清肘腋現在蔡攀龍已由塩水港前抵諸羅若恒瑞彼時由陸路前往正可将鹿仔草沿途一帯賊匪迎頭截殺打通道路㑹合柴大紀乃轉由海道行走豈不紆迴遲緩此時恒瑞自己由塩水港前進而柴大紀處已得蔡攀龍接應之兵若與恒瑞合力攻擊先将塩水港以南府城以北一帯賊匪痛加殱戮廓清道路俾中間毫無梗阻固属甚善否則或竟合兵一處徑搗大里杙賊巢擒拏首惡亦可期迅速集事其如何定計前往攻剿之處着即速行馳奏鹿仔港一路藍元枚扵上月十八日病故後無大員統領恐賊匪生心窺伺殊深懸切但鹿仔港果有賊滋擾李侍堯自必業已奏到今並未㨿該督奏及是鹿仔港諒亦無虞福康安即當直抵諸羅速奏擒渠掃穴之績同日舒常姜晟同奏言川省運閩米二十萬石分装舡六十二隻於七月十九日自重慶開帮八月二十八九䓁日陸續到漢臣等𣲖糧道連柱帯同漢陽府縣并委雜職等官照料川省委員等盤量過載計楚舡五十七隻足敷装載於九月初四日自漢口陸續開行臣等仍派委巡檢把搃四員協同䕶送出境其二運米舡抵漢者現已過半亦将取次過載三四運米舡據原任荆宜施道陳大文及宜昌府縣等禀報已均入楚境啣尾遄行當亦隨後抵漢換舡過載不至遲逾至楚北運閩米十萬石亦分四運自八月初十日頭運米舡開行每間五六日後啓行今頭批米舡已扵九月初一日齊抵徳化縣轉送前進二批亦到過半均應扵吳城鎮換舡過載業經江西撫臣委員照料臣等亦仍嚴飭押運各員催儧前行務扵江西本省米石運竣赶𦂳接運不至守候躭延冄川省自宜昌府巴東縣入楚境至黄州府黄梅縣出境計程二千二百里應設水臺一十九處臣等遴派正印官分赴各府属沿江地方每隔一百二三十里不等可以灣泊舡隻之處搭棚安站一面預偹牛羊米麺油茶等項以便臨期贍給其入境後宜昌荆州一路業已派有府道㑹同宜昌鎮率帯文武員弁分叚照料弹壓一俟抵漢換舡臣等即親至漢陽督同妥為辦理並於例得供支之外量加賞賚務令屯練等踴躍歡欣遄行無滯仍飭藩司陳淮前往黄梅縣照料出境再本月初二日接准恊辦大學士福康安咨開四川屯練兵丁自九江由江西玉山常山徑至衢州較近一千餘里自應改從此路以期速逹閩省當即飛咨江西撫臣何裕城查照迅速妥偹至漢口為各省商販聚集之所如雇偹舡隻之事辦理不善恐有妨於商民舡户或致各貨阻滯長價不可不通盤籌議前經出示曉諭所有不合用舡隻毋許封雇今雇偹轆轤應運之舡計足敷用除守空給與飯食開行照例給價外復将舡𢾗已敷毋庸封雇縁由出示張貼今商民人等販貨往來一概聼便并嚴查胥役人等留難阻滯是以漢口地方需用舡隻為𢾗雖甚繁多而商民舡户等均極寧貼如常同日孫永清奏言黔兵如須調遣應由黔省古州丙妺一帯入粤西之懐逺縣出蒼梧縣入廣東之封川縣境計程雖一千八百餘里俱係水路順流直下最為便㨗所有各兵沿途支應口糧塩菜等項均經宻飾經過各地方官一律准備並派委右江道陸蒼霖馳赴黔粤交界之梅寨地方督同該府縣弹壓照料桞州一帯派委䕶塩法道李鏡圖督送潯州府一帯派委左江道楊雄業督送一俟接有黔兵起程之信即分飾馳赴各站董率妥辦臣仍前赴梧州府親行㸃送出境至需用舡隻現值粤西官兵赶𦂳啓行即黔兵接續過境舡隻亦儘可敷用又於八月二十五日接准督臣孫士毅咨稱現准将軍常青咨㑹奏請添調粤西官兵三千名赴臺灣恊剿若恭候硃批未免緩不濟急自應飭令即日起程等因當即飛咨提臣令飾原派各營将弁立即帯兵自營起程扣算路途逺近勒限均到梧州彚齊分起啓行并委䕶塩道李鏡圖馳赴平樂左江道湯雄業前往分頭督催照料其桞州府一帯即令右江道陸蒼霖就近督催務期迅速䟎行俾早行一日則軍營早收一日之效至粤西各標恊營現存預儲三年火藥共二十七萬有零為𢾗頗多臣現在札商提臣三徳冄添撥二萬斤共成五萬並配就鎗子鉛弹於官兵行走之後委員觧赴潮州聼侯督臣轉觧赴閩偹用均奏入報聞十五日己邜上命軍機大臣傳諭福康安李侍尭曰魏大斌到諸羅後已越月餘而鹿仔草被截糧餉火藥尚未能運送到縣魏大斌自應親帯官兵出城将諸羅至鹿仔草一帯賊匪奮力往來剿殺開通道路接應糧餉火藥方可稍贖前愆乃惟知株守城中安然坐食專待他人救援伊竟袖手旁觀一籌莫展試思魏大斌前往諸羅係為何事且伊係總兵非若偏禆将弁必聼柴大紀調度派委者可比似此一味株守又安用該總兵前往援應耶福康安到諸羅後切寔查明将該鎮恇怯貽悮之處即行據實恭奏至魏大斌所帯官兵損失至一千一百名之多此項兵丁未必皆係陣亡恐其中臨陣脱迯甚至有潰散從賊者不可不查明嚴辦又前此鳯山潰散兵丁未經投出者甚多俱着福康安於事定後詳細查察並著李侍堯飾属於内地沿海一帯嚴宻查拏如有潰散逃囘及從賊者即應訊明分别按律嚴辦勿致倖逃法網十六日庚辰琅玕奏言四川屯練兵丁從川江順流而下由湖北先至江西必由九江府行走該處有兩路俱係由浙入閩通行大道一自九江府由安徽江南浙江至衢州府計水程二千三百餘里自衢州西安至閩省浦城縣旱路二百四十餘里一自九江府湖口縣至玉山水程九百餘里自玉山經浙江常山至閩省浦城縣旱路四百二十餘里川省屯練兵丁改由江西行走較為便㨗因将軍臣福康安到浙靣同商酌福康安亦深以為然即飾沿途地方一體預偹查自衢州至閩陸路一切過兵事宜先俱委令杭嘉湖道清泰㑹同金衢嚴道玉徳督率各該地方官辦理已有章程惟常山一路並未經過兵差現仍委令該道清泰前往妥協偹辦務使行走迅速不至稍有遲悮再海蘭察等帶領侍衛章京拜唐阿等已扵二十二二十五二十九等日出境将軍臣福康安帯領侍衛章京各員於九月初四日入閩省浦城縣界奏入上命軍機大臣傳諭福康安常青李侍堯曰海蘭察等與福康安先後出浙江境入閩想海蘭察等抵蚶江時自必等候福康安一同配渡齊抵鹿仔港激勵将士整頓兵力軍威振作壁壘一新即日前抵諸羅合兵進剿惟是常青一路現在統兵搜剿南潭鳳山一帯賊匪擒拏賊目莊大田該處帯兵鎮將如蔡攀龍等已經常青派令援應諸羅恒瑞亦已接續前往其餘将弁恐無奮勇可恃之人應於所帶巴圖魯侍衛等酌派一二十人令其前赴南路交常青派委帯兵擒拏賊目莊大田更為得力但福康安初抵鹿仔港時該處至府城道路或尚未通順難以派令遄往應於前抵諸羅殺散賊匪與柴大紀㑹兵一處後冄行派往巴圖魯侍衛等亦可迅速前進不虞梗阻至福康安抵諸羅後若常青尚未将荘大田拿獲福康安不可因常青尚未得手轉置大里杙而先赴南路攻剿舍近就逺使賊首得以負固稽誅此為最要徐鼎士處前曽諭李侍堯添撥兵一千名徐鼎士又招集義民熟畨𢾗千人正可乘機攻擊福康安亦應於所帶巴圖魯侍衛内酌派𢾗人前往帮同帶兵合剿更可期得力至常青自三月初間抵臺灣後在彼已閲半載較之黄仕簡在彼止有兩月躭延更為日久且黄仕簡止帶兵二千餘名前渡臺灣而常青渡臺灣時所帶之兵已有五千餘名今又陸續添調多兵是兵力較之黄仕簡多至數倍若此時常青能将荘大田拿獲收復鳯山俾南路肅清即属常青之福尚可将功抵罪倘福康安等已将大里杙賊巢攻破首惡就擒而常青尚未能拿獲荘大田收復鳯山仍須福康安統兵前往剿捕蕆事則常青之罪甚重恐難邀寛宥至福康安與李侍堯面晤後於何日配渡前抵鹿仔港及李侍堯得有軍營禀報各情形即行迅速馳奏十七日辛巳李侍堯奏言初四日接楊廷理禀稱中秋前後連接柴大紀來文并外間偵探消息知諸羅尚在固守硝可取土熬煎米亦尚有出處十七日貴林蔡攀龍等到塩水港十九日領兵前進二十日貴林楊起麟邱能成為頭隊蔡攀龍孫全謀為二隊一路前剿正遇大雨賊又乘勢包圍幸柴大紀帶兵接應入城兵民尚無大折又探得到諸羅之兵於二十二日仍復自諸羅打出以通道路至恒瑞所統兵三千因舡少不能盡載二十二日即先往一千六百名餘亦連日續進䓁語查諸羅被圍已逾两月兹據楊廷理所禀則是道路已通即途次尚有賊匪伺間出擾而蔡攀龍等已可往來剿殺斷不至如魏大斌之再入圍中適恒瑞所帯兵三千名又已續到兵力既可接濟軍勢亦益壮盛數日内恒瑞與柴大紀等自必㑹同靣商先将諸羅城外之賊剿洗即可尅期直攻大里杙再接據帶兵鎮将等禀稱去冬及本年春夏間調往各官兵所帶帳房經夏秋雨淋風刮已俱破爛難以棲止懇即製給更換等因自係實在情形兼有随帯火藥等項尤須遮蔽嚴宻不至潮濕方可得用又舊時駐䑓班兵本無帳房今亦有隨征者並應給與帳房以免露宿是以臣飭司道㑹同營員按照軍装則例先製造一千架分觧䑓郡及鹿仔港等處以供配給其近日所派一萬一千之滿漢官兵及本省増調向東港鹿仔港塩水港之進剿各兵甫經派往所帶帳房毋庸添補奏入上命軍機大臣傳諭福康安常青李侍堯曰福康安等剿捕賊匪除臨陣殱戮不計外其拿獲首逆及有名大頭目自應觧京盡法處治其賊人小頭目及夥匪等若概行觧京長途押送未免徒勞馹傳着福康安李侍堯於獲犯後酌量輕重将賊匪助惡大頭目可偹䆒訊者派員觧京若不過隨同夥犯即着在該處審明正法以免煩擾至厦門地方為拏獲臺灣匪犯觧送經過要地不可無滿兵弹壓着李侍堯派調閩省駐防滿兵一千名或五百名前往但五百名恐兵少不足以示威重竟應調撥一千名為是朕為軍旅要務曉夜思維凡所以代為籌畫之䖏無微不到李侍堯自能仰體朕意遵照妥協辦理也十八日壬午上諭内閣曰福建水師提督員缺着柴大紀調補其陸路提督員缺即著蔡攀龍補授並著授為恭賛至副将貴林等俱属奮勇可嘉亦應加恩陞擢前此常青派令縂兵魏大斌接應諸羅中途遇賊攔阻及抵諸羅後又祗知坐守縣城並未能帶兵出城勦賊實属畏葸無能魏大斌着革職交福康安留于軍前効力贖罪所遺浙江温州鎮縂兵員缺即著貴林補授貴林所遺廣東羅定協副将員缺即著孫全謀補授孫全謀所遺廣東大鵬營叅将員缺即著楊起麟補授其游擊邱能成著交福康安遇有恭将缺出即奏請陞補除蔡攀龍貴林已賞花翎外孫全謀楊起麟邱能成俱着賞戴花翎用示鼓勵上又命軍機大臣傳諭福康安常青李侍堯柴大紀蔡攀龍曰蔡攀龍等帶兵直扺縣城自必乘勢将諸羅以南府城以北沿途屯佔賊匪悉數殱除肅清道路而諸羅迤南附近村庄義民更可安輯柴大紀等自必妥為撫慰整頓軍威以圖進取計此時福康安已應由鹿仔港前抵諸羅自可合兵進剿但柴大紀蔡攀龍於剿散沿途賊匪後自即應定計統兵徃北直攻大里杙賊巣以為掃穴擒渠之舉柴大紀蔡攀龍現在彼此相啇作何籌畫著即将辦理情形迅速具奏至楊起麟既與蔡攀龍等同抵諸羅其鹿仔草存貯糧餉火藥等項㫁無尚留該䖏是否官兵運送諸羅縣城又前㩀柴大紀奏諸羅被賊侵擾時有紳耆舖民挑送飯米凉水分給官兵已有㫖令福康安等查明首先倡率之義民頭目酌賞官軄至幫同官兵固守諸羅縣城之義民頭目及義民等亦應酌量加恩並著柴大紀查明首先倡率及實在出力者奏明分别酌賞職銜以示奨勵至該䖏既得有勝仗兼之道路已通何以尚未見柴大紀奏報蔡攀龍現已擢任提督授為恭賛是伊儘有奏事之責該叅賛在彼如何定計攻剿打仗殺賊之䖏亦著隨時迅速具奏至楊起麟現已陞補廣東恭将但伊係閩省人在臺灣日久打仗出力于該䖏情形自為熟悉将来即應留于臺灣更為得力着福康安俟大功告竣後遇有臺灣恭将缺出即行調補以収駕輕就熟之益十九日癸未普吉保奏言前以鹿仔港統理乏員闗係甚大不得不俟将軍派撥之員来港然後進發今鎮臣李化龍既經帯兵前來是統理有人臣一俟伊到即可共為籌度相機進剿苐該鎮臣李化龍初到鹿仔港於地勢賊情難以深悉臣一面将此地情勢詳悉告知乗此兵力已足應㽞該鎮在鹿仔港固守調度臣即親帯官兵前往西螺斗六門一帶奮力勦賊奏入上命軍機大臣傳諭福康安李侍堯普吉保曰鹿仔港一路前因藍元枚病故後深恐賊匪聞知生心窺伺而普吉保於藍元枚将官兵移交該鎮管束後並未将該䖏情形及如何籌辦進剿之䖏詳悉具奏是以降㫖飭諭今據奏一俟李化龍前抵鹿仔港普吉保即帯兵徃西螺斗六門一帯攻勦所奏較合機宜殊覺改觀是鹿仔港現属安静無虞賊擾現在福康安已即日前抵鹿仔港又有李化龍在該䖏駐守普吉保自應乗粤兵新到親督将弁速徃西螺斗六門一帯奮勇攻剿力圖自効至福康安到臺灣正值秋凉晴爽道路已乾添調之兵陸續到齊亟應趂此機㑹以期尅日蕆事仝日李慶棻奏言預偹黔兵臣即㑹同提臣保成飛檄原派各營将偹限文到即日帯兵起程并知㑹搃統威寕鎮搃兵許世亨迅速馳赴古州帯領分起前進其一切支應各事宜責成署布政使陳大文署按察使張繼辛督理妥辦所有下遊古州鎮逺二鎮標并清江協營共兵五百名距廣西較近作為第一起現委貴東道尼堪富什渾㑹同古州鎮總兵馬詔蛟照料催䟎出境臣撫標及貴陽都匀二營共兵五百名作為第二起即于九月初八日起程上游提標及定廣長寨協營共兵五百名作為第三起大定平逺黔西遵義四協營共兵五百名作為第四起現委糧儲道索諾木札木椘㑹同營員沿途督催彈壓提臣保成即日可以抵省前赴交界地方䕶送出境臣俟上游官兵經過省城即馳赴古州縂滙之地親身督率照料其火藥鉛弹均係加倍擕帯軍装俱属整齊至經過各州縣應付人夫船隻等項業經預偹齊全不致稍有停滯奏入報聞二十二日丙戌何裕城奏言據江西省各縣驛禀報近有常青等奏摺報匣二起先後逓過俱附有両廣督臣孫士毅傳牌内開因係海船被風打至潮州海岸是以即從筠門嶺逓至江西省前進等因查江西交界至筠門嶺本非驛路先因孫士毅駐劄潮州府辦事一切文報若照常由廣東省城轉逓路徑紆廻惟于筠門嶺至贑縣驛站大路止計程六百三十里暫設臺站六十四處深山小路不能馳馬募偹人夫按程接逓在案現今軍營報匣既有從筠門嶺一路逓到者誠恐交冬風信不常復有船抵潮州海岸經由此路逓到之報匣且正值福康安統領大兵一舉蕩平之時驛逓奏章更闗𦂳要該䖏新設之站雖經分段派委雜職文貟専司管理但重山複嶺道路綿長若無駐彼縂理之貟不足以資稽查而明慎重酌委署贑州府通判徐寳麟贛州城守營都司石致逺馳赴筠門嶺一帯駐劄督率稽查遇有軍營報匣加𦂳馳逓并飭按察使額勒春督率該地方官添募壮徤人夫在站伺候以期迅速不致稍有遲悮一俟凱旋即行停撤奏入報聞二十三日丁亥李侍堯奏言聞李化龍已到鹿仔港該二鎮面啇定議李化龍㽞在鹿仔港駐守普吉保帯領粤兵二千浙兵五百漳兵二千泉建兵一千定于初六日起程由西螺進攻斗六門查南北兩路半年以来俱係堵禦並未進勦而斗六門南接諸羅北通大里杙尤為賊匪徃来要隘今普吉保因粤兵漳兵已到即統領前進及鋒而用必能得手而諸羅之南現有蔡攀龍等打通道路恒瑞又統兵三千前徃剿殺是兵力已俱集諸羅一帯不日定當㑹合進攻賊巣至北淡水為大里杙之背調兵一千由五虎門出口往徐鼎士䖏接濟八月十五日已經放洋嗣因各船在洋遭風有漂泊各口岸者今到淡已有七百餘名查徐鼎士䖏本有兵一千八百名食粮民番七八千名今更得此兵一到聲勢益壮是以臣飛飭該副将星速進攻以期乗虚搗穴勿得稍有觀望再查本年正月中柴大紀自府城領兵克復諸羅時係由陸路進發後于何時梗阻之䖏並未見各官禀報苐查四月中常青遣恭将潘韜帯兵赴諸羅協守時因陸路不通改由海道坐船進塩水港至鹿仔草上岸陸行二十餘里始至諸羅是四五月間府城至諸羅已不能從陸路直達惟塩水港鹿仔草兩䖏有柴大紀所派逰擊楊起麟邱能成等分兵駐守是以水路尚無踈虞嗣後魏大斌田藍玉張萬魁及蔡攀龍等四次前徃應援諸羅之兵俱由府城乗舡至塩水港而鹿仔草至諸羅之陸路二十餘里則已俱為賊人佔㩀非復如潘韜前徃之時尚無阻碍魏大斌等赴援與賊接仗即在此二十餘里之内其外委段昭明等賫囬柴大紀之摺想乆在鹿仔草守候迨魏大斌等進兵時随同前徃被賊殺害以致遺失至柴大紀送出之奏摺文報多係僱募社畨從間道黑夜到鹿仔草轉逓其文書率係小字宻封大僅寸許尚易得出至夾板奏摺益難賫送是以五月二十三日之摺至六月二十日方至厦門六月初八日之摺并至七月十九日始行到厦昨又據楊廷理禀稱六月初三日柴大紀僱社畨三人到郡内賫摺一人被賊冲散人摺俱失惟二人得至等語則柴大紀文報遺失者必多惟皇上所頒諭㫖皆係逓到臺灣郡城再由塩水港鹿仔草轉逓從前路既未通楊起麟等必不敢輕率逓送昨蔡攀龍楊起麟等已于八月二十日殺入諸羅二十二日又行殺出是道路已通自必賫交柴大紀矣至内地發往臺郡之諭㫖及𦂳要文書從前係由厦門同知遣家人衙役䓁配舡报送臣以事闗𦂳要惟恐復有差失特派佐雜千縂八貟轉流更替押送臺郡所有此次交臣轉寄柴大紀之㫖已派妥弁賫送查蔡攀龍等既打通諸羅道路恒瑞又領兵三千前徃自必将沿途賊匪更加勦洗可無虞梗阻奏入上命軍機大臣傳諭福康安常青李侍堯柴大紀蔡攀龍曰本日李侍堯之摺係九月初十日拜發朕意其時福康安早應行抵厦門與李侍堯㑹晤定期配渡何以摺内並未提及再自府城至諸羅陸路未能直逹塩水港鹿仔草兩䖏有柴大紀所𣲖楊起麟邱能成等分兵駐守是以水路尚無阻隔蔡攀龍等得由海道前往援應諸羅打通道路此皆由柴大紀能先時籌及預行派員駐守何以常青並未能籌及由府城派委官兵前往防守耶至恒瑞帶領多兵由海道繞往轉避賊鋒非懦怯而何前諭福康安于抵諸羅時查明恭奏但此等情節朕于披覧奏章之下其功罪已属昭然何待查奏始能明乎朕厯年辦理軍務于萬里之外時刻留心今恒瑞之畏葸無能情節顯著即令恒瑞将来自行陳奏亦属無可置喙此事原不待福康安再行查詢也欽定平定臺灣紀畧卷三十七
