  text: 欽定四庫全書欽定平定臺灣紀略卷十一
  hash: sha256:c1c6b03e3c80f23a694cc45808d5e7f62acb075c39956dc18ca84d17345df9ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_011-1a, image: WYG0363/WYG0363-0119c.png}
body:
  text: 三月二十一日己丑李侍堯奏言接副將丁朝雄等具報郝壯猷收復鳯山之信竊意南路自此廊清可用全力向北路㑹剿巢穴及接黃仕簡抄録摺稿稱尚需駐兵搜捕未敢遽離府城是黃仕簡既坐守郡治而郝壯猷亦不能撤兵往北路㑹剿可知至北路之兵雖據黃仕簡奏任承恩普吉保柴大紀及徐鼎士所帶共有七千餘名查柴大紀收復諸羅後以四旁尚多賊匪仍駐諸羅近又請兵協助而徐鼎士在淡水北又以艋舺等處民人懇求留駐尚在禀商兩提臣􅊾示任承恩普吉保在鹿仔港雖據報屢有堵殺而以賊尚鴟張不敢輕進又咨商黃仕簡撥兵㑹攻是該提鎮等各有牽掣不免坐費時日殊無可恃惟望常青到彼大加振作方可制勝常青臨去時其氣甚壯到臺灣後如遂能大勝一二次使賊黨潰散即可不必增兵如實係賊多兵少則與其曠日持久收功緩而費轉多不如量為增調以期迅速蕆事但閩兵除先後𣲖調外各營存留較少且兵律久弛增調亦不得用即如臺灣額設戍兵本有一萬餘名當林爽文猝起時僅柴大紀帶一千數百名在鹽埕橋堵守而保護府城尚係兵民兼用臣于二月十九日即咨詢黃仕簡柴大紀等令其查明缺額以便撥補又屢次札催至今尚未覆到是舊有之戍兵已屬有名無實現在所用祗內地調往之一萬一千餘名而兩月以來情形又如此將怯卒惰已可概見是閩兵竟不必更調臣前在兩廣時知潮州碣石二鎮兵尚屬可用且地近泉厦調遣亦便臣于接印後恐將來有需接濟之處曽密札孫士毅預􅊀兵數千以待緩急昨接孫士毅札已密選四千并稱南澳鎮陸廷柱情願帶領前往可即𣲖為總統大員其餘將辨亦已預行選𣲖等語臣現飛札常青察看如果必須增兵一靣具奏一面即飛咨孫士毅調遣起程可不至稽緩再常青于二月三十日申刻已經放洋嗣因風􅀈不順屢出屢回據厦防同知劉嘉訓本月初五日具報尚在料羅暫泊臣心不勝焦急惟有敬詣天后宫行禮祈求順風俾得速渡再厦門同知劉嘉㑹解到桐山營逃兵汪中鯉王正榮二名緣上年十二月初七日隨同守􅊀董得魁在中港抵禦被賊衝散私自逃回赴水師恭將衙門揑報董得魁差令往臺灣鎮求救因陸路被賊阻隔由大雞籠搭船遭風飄至桐山隨經飭查實係逃回即將該二犯正法至許阿協所供邀入㑹者係賴阿邉賴阿立二人賴阿恩林阿俊所供邀入㑹者係梁阿步一人而賴阿恩之子賴娘如林阿俊之子林阿真俱在梁阿步戲班內唱戲孫士毅行知閩省緝獲臣到泉州該府縣已將各該犯拿獲先後解到臣以此案人犯未經查拏自當緩辦既經獲解又不便遲留隨委司道府等嚴訊據各犯堅供不過素相認識並無䋅約入㑹情事臣以事關重案該犯等或因許阿協等俱在粵省無慿質對是以串供狡賴委員將賴阿邉賴阿立梁阿步賴娘如林阿真五犯解赴粵省孫士毅現駐潮州自可就近審理一經質訊即當水落石出以成信􅀈本日又准孫士毅咨稱續拏林功裕一犯又供出賴阿德洪李桃張阿和李九陶林三長朱洪德張攀桂六名俱係閩省天地㑹內人犯是閩省為此教之淵藪無疑惟是漳泉一帶民情輕慓去冬已多訛言近日漸覺寧貼則正可以相安于無事若四處查拏恐又增一畨惶惑或别滋事端臣謹將孫士毅所咨人犯靣諭地方官密為存記統俟臺灣剿匪事竣後辦理并知㑹孫士毅將粵省獲犯暫行監禁緩辦奏入上命軍機大臣傳諭常青李侍堯孫士毅曰李侍堯亦看出黃仕簡任承恩二人貽誤情形但所奏未免略遲現在惟望常青到彼大加振作方可制勝如該督到彼即將賊匪一鼓殱擒自屬甚善如賊匪負嵎抗守剿捕稍需時日自應量為增調兵丁以期迅速蕆事但閩省之兵存營者已少且該省兵律久弛現在𣲖往臺灣者零星打仗又復氣餒更恐不能得力不如就近于粵省挑選預偹李侍堯籌慮及此已咨孫士毅密為調􅊀尚為周到惟粵省所偹之兵既有四千名恐陸廷柱一人不能照料髙亷鎮梁朝桂曽在軍營打仗於軍務自為熟悉著孫士毅即密劄該鎮速赴閩粵交界處所駐劄聼候調遣至臺灣額設兵共有一萬餘名林爽文滋事時作何調撥堵禦何以柴大紀在鹽埕橋拒守亦止帶兵一千數百名此外兵丁又在何處柴大紀此次保護郡城雖為出力近日以來漸覺觀望不前常青到臺灣後一併查明據實具奏又據李侍堯奏漳泉一帶民情輕慓近日漸覺寧貼所有粵省咨拏天地㑹各犯現密為存記俟事竣後辦理等語所辦甚是著孫士毅即照李侍堯所奏將現獲各犯暫行監禁俟事竣後再為辦理上又諭內閣曰臺灣逆匪林爽文等䋅衆滋事水陸兩提督帶兵分路進𠞰並不親臨行陳定期㑹攻致賊匪日久未就撲滅節經降㫖嚴飭並諭令常青據實嚴審查參兹據李侍堯奏到軍務情形摺內稱南北兩路該提鎮等各有牽掣不免坐費時日等語果不出朕所料黃仕簡承恩最久向來辦事尚屬黽勉乃於剿捕逆匪一事漫無籌畫因循玩悮本即應拏問治罪姑念其年老且係病後著常青將黃仕簡即遵前㫖送回厦門內地候㫖水師提督著郝壯猷暫署至任承恩經朕屢加拔擢用至提督且係自請前赴臺灣剿賊伊年力正強理應加倍奮勉乃亦逡巡畏葸與黃仕簡互相諉卸實屬辜負朕恩即著傳㫖革職拏問交刑部治罪其陸路提督員缺前因柴大紀保守郡城尚為出力本欲將伊擢用但柴大紀于林爽文等滋事之先不能預為防範且臺灣原設兵額一萬餘名該鎮督率守城之兵不過一千餘名此外兵丁現作何用並未據柴大紀奏及實有應得之咎所有福建陸路提督員缺即著藍元枚調補二十二日庚寅上命軍機大臣傳諭常青李侍堯曰昨經降㫖將任承恩革職拏問黃仕簡撤回厦門其水師提督員缺即令藍元枚調補所有陸路提督員缺除柴大紀另看其如何奮勉將功抵罪其餘總兵郝壯猷普吉保二人現在臺灣帶兵打仗尚屬黽勉常泰雖未帶兵前往𠞰賊然在漳州一帶彈壓地方亦為鎮靜有方該鎮係朕簡調之人著傳諭常青李侍堯于郝壯猷普吉保常泰三人內察看孰為出力並才具堪勝提督者保舉一人一靣將陸路提督印務令其署理一面㑹同據實具奏候朕簡放二十三日辛卯李侍堯奏言柴大紀在諸羅咨請兩提臣撥兵協助任承恩在鹿仔港又檄徐鼎士帶兵㑹攻徐鼎士復以艋舺民人懇求留駐尚在未行各情形是任承恩柴大紀等非惟不能合𠞰大里杙并諸羅彰化間道路亦未疏通又羅禮璋巡查至扈尾莊被賊數千圍住徐鼎士聞知遣兵併力抵禦賊始退去是徐鼎士亦未能即往任承恩處㑹合看來各提鎮等彼此相待坐廢時日固不待言而處處被賊牽掣官兵不敷調用加以相持日久賊黨益多兵氣漸餒亦屬實情而黃仕簡於二月二十七日續調澎湖兵二百赴臺灣則南路又似有需添兵之處常青至府城即欲向北路㑹𠞰看來已無兵可帶亦必不能不請增兵該處逺隔重洋風􅀈不常動需時日若俟常青咨㑹到臣始行調集往返又輒月餘臣既確見實在情形不敢稍有遲緩致悮事機昨據孫士毅札稱已選兵四千并將辨等亦密行揀𣲖而總兵陸廷柱曽任臺灣情願帶兵前往臣一面知㑹常青一面飛咨孫士毅迅將預𣲖之將辨兵丁尅日起程一由厦門赴鹿耳門一由蚶江赴鹿仔港由厦門者令陸廷柱帶往查南路郝壯猷尚在鳳山常青無大員同行陸廷柱到時正可資臂指之助由蚶江者令將備帶往聼任承恩普吉保等驅䇿似於兩路俱有禆益而兵事可以迅速奏功再常青楊廷樺俱于初六日戍刻在料羅放洋又南澳鎮係閩粵兩省兼轄向例委署總兵閩粵兩省督臣輪流𣲖委此次陸廷柱帶兵前往臺灣所有總兵員缺輪届閩省委署閩省將領出征者多無員可委臣一併咨明孫士毅聼其酌量委員署理奏入上命軍機大臣傳諭常青李侍堯孫士毅曰臺灣初起事時朕即不願任承恩前往者恐二人不相統屬未免有推諉觀望之事因將李侍堯調補閩浙總督並令常青前往臺灣督辦以防緩不濟急幸而事事預為布置否則該處止有常青一人既不能分身前往而黃仕簡任承恩今竟如此因循貽悮賊匪日久蔓延設乘間别生枝莭致蹈從前朱一貴滋擾故轍或竟如木果木之失事尚復成何事體耶今李侍堯果看出該提鎮彼此觀望坐廢時日賊黨益多兵氣漸餒不俟常青知㑹即飛咨粵省令預𣲖之將辨兵丁尅日起程籌辦甚為周到動合機宜頗慰朕懷惟粵省預偹之兵既有四千名恐陸廷柱一人不能照料昨已有㫖令梁朝桂赴閩粵交界處所聼候調遣著孫士毅即飛劄梁朝桂速行前往帶兵赴鹿仔港勉力㑹𠞰從前賊匪初起時孫士毅調發辨兵前往䇿應朕以本省兵力已厚是以降㫖諭令撤回今復須徵調雖似多一畨往返之勞然竟實受撤回之益設使彼時粵兵早抵臺灣不過分屬任承恩黃仕簡二人帶領仍𣲖令零星打仗該兵丁見閩兵不能得利自必日漸氣餒徒使有用之兵亦歸無用此畨新調之兵初抵臺灣聽常青帶領其鋭氣方盛正可資其生力轉於軍務有禆至黃仕簡任承恩玩悮緊要軍務之罪均應按律正法但念黃仕簡年老又係病後且伊從前辦事尚屬黽勉姑貸其一死令其退廢家居自思咎戾所有公爵仍加恩令伊長孫承襲至任承恩之父任舉前在金川陳亡任承恩又現無子息朕軫念前勞不忍令捐軀殉忠者絶嗣任承恩俟刑部照例定擬具奏時尚可加恩貸其一死但老師糜餉之罪伊二人百身難贖若使幸免餘生之人坐享豐厚不足以示廢弛軍旅之戒將來事竣後所有多延時日糜費之軍需銀兩均應於黃仕簡任承恩名下追賠以示懲警至常青于初六日放洋現在早抵臺灣務照節次所降諭㫖悉心籌畫妥速督辦二十四日壬辰上命軍機大臣傳諭常青李侍堯曰徐鼎士于上年十二月即經常青徐嗣曽𣲖令帶兵一千五百名赴臺灣進𠞰乃該副將所帶之兵屢稱因風阻滯直至二月初旬始據禀報陸續前赴淡水已不免遲延及到鹿仔港總未報其𠞰殺一賊現經任承恩檄令帶兵㑹攻復以艋舺民人懇求留駐並未前往㑹𠞰看來竟係有心逗留畏懦不前藉詞支飾不可不嚴行查辦行軍之道全貴紀律嚴明信賞必罰若將辨臨陳出征心懷怯懦惟恐遇賊接仗而畏葸退避者即可幸免無事使人人效尤則將辨兵丁又孰肯奮勇直前致命效死耶著常青即嚴查該副將前赴臺灣曽否稽遲及現在任承恩檄調何以不行前往若徐鼎士果有畏縮逗留託詞規避之處即應立行拿問據實恭奏當按軍法從重辦理俾在事兵辨咸知警畏並著李侍堯一體嚴切訪查據實恭奏至柴大紀自𣲖往諸羅以後于𠞰捕一切不能如從前之出力並著常青一併查奏二十六日甲午上命軍機大臣傳諭常青李侍堯曰黃仕簡任承恩於本月十二十四等日奏到之後迄今將届半月何以並未將𠞰捕情形隨時奏報况朕因黃仕簡畏縮不前是以特𣲖常青前往督辦伊二人一聞此信苟稍有人心即當自知愧懼趂常青未到之前親帶辨兵迅速進剿以冀將功抵罪乃竟閲多日並未將如何剿捕情形具摺馳奏可見伊二人竟係自甘頽惰觀望玩延其貽誤之罪更無可逭著該督即將黃仕簡任承恩於前次拜發奏摺後此十餘日內在彼辦理何事何以並無一字奏及之處據實查明參奏二十七日乙未李侍堯奏言接到海防同知楊廷理禀報較臣所訪更為詳悉所云現在兵數合之則多分之則少尤覺切中窽要并稱臺郡與鳳山連界之水底藔等處尚有莊大田等賊出沒焚掠則南路之兵似不能盡撤致府城有單薄之虞查臺灣合各路現有之兵僅一萬三千有餘看來常青欲往北路㑹𠞰祗能于府城及南路兵內抽調一千餘名到諸羅後再增柴大紀之兵千餘名力量尚覺未厚臣奏調粵兵內檄令以二千五百名由鹿耳門進口常青得此庶覺軍勢壯盛至任承恩處旬日以來久不得信茲據該同知另禀有鹿汓港船戶來郡詢知二月十三賊匪來攻大營任承恩普吉保等大加𠞰殺賊匪死傷無算等語又有解餉之經歷鄒貽詩禀亦相同但未見任承恩等奏報過境想因風水不順阻擱在途臣謹抄録原禀及所繪圖一併進呈奏入上命軍機大臣傳諭常青李侍堯曰本日李侍堯奏到臺灣情形一摺並抄録海防同知楊廷理原禀據稱賊匪滋事以來大兵僅屬固守皆以兵單難於逺捕為辭如彰化早經恢復而任承恩駐兵鹿仔港普吉保駐兵埔心莊諸羅收復月餘而柴大紀駐兵城外鳳山甫經收復郝壯猷分駐四門靜守黃仕簡駐守郡城以致賊匪各路嘯聚現在臺灣之兵統計一萬三千有餘合之則多分之則寡等語該同知所禀各情形早在朕遙度之中可見兵力以分而見單伊等貽誤實由於此昨經降㫖將任承恩革職拿問尚以黃仕簡年老有病僅令革職撤回內地今伊等如此玩悮則二人厥罪維均黃仕簡亦難稍為寬宥著李侍堯一俟黃仕簡回厦門即傳㫖一併革職拿交刑部治罪至該提督等株守玩延致令將辨等效尤觀望不能早擒賊首俾賊匪得轉相嘯聚逼脅平民其中不肖之徒勢必與賊烏合日積日衆滋擾蔓延昨經李侍堯奏添調粵兵四千名一由厦門赴鹿耳門一由蚶江赴鹿仔港等語看此情形常青處所有之兵尚未免單薄著傳諭李侍堯如粵兵尚未分路配渡即檄令全赴鹿耳門直抵臺灣府城俾常青處兵力壯盛足資調遣如業經分路配渡前進著常青於粵兵將抵鹿仔港者亦即調來合為一處常青親帶勇往將辨徑赴大里杙賊巢鼓勵辨兵務將首惡林爽文一鼓擒獲其餘賊衆不難撲滅净盡又閲該同知原禀內現在府城諸羅彰化之間各處皆有賊人屯集常青經過地方中途遇有賊匪抗拒正可痛加殱戮俾賊匪聞風膽落路途無阻直指賊巢此事惟仗常青遵照節次指示悉心籌辦紓朕南顧不致復蹈黃仕簡任承恩故轍也其柴大紀郝壯猷普吉保因二提臣觀望不無效尤今二提臣已拿問其柴大紀三人效尤之罪且赦不問令其效力帶兵贖罪如伊等亦有畏葸觀望情事或不可令其效力即著常青據實恭奏毋得稍有徇隱同日孫士毅奏言赴惠潮一帶海口督拏竄犯搜捕㑹匪途次接准閩浙督臣李侍堯密札臺灣賊匪尚多南北兩路未能㑹𠞰常青到彼或須酌量增兵以期一舉蕆事向知潮州碣石二鎮兵尚可用囑臣慎密預偹查來咨雖稱此次兵丁果否徴調尚在未定但既有酌量增兵之語自應迅速預偹以便剋期就道臣一面密飭潮州碣石水陸二標及附近各營共挑足四千之數迅即𣲖定分起來潮兹臣於三月初七日抵潮提臣髙瑹亦巡查到此一切預偹事宜現在㑹商妥辦再閩省尚須集兵搜捕似內地查拏㑹匪一事尚宜慎密臣與閩省現已彼此關㑹存記俟一舉蕩平再行從嚴辦理又南澳鎮總兵陸廷柱統領官兵赴臺遺缺請以澄海協副將鄭元好護理其澄海協員缺請以廣海寨逰擊張天宿護理又香山協謝廷選羅定協貴林肇慶協官福現亦領兵請以左翼鎮逰擊黃鍚侯護理香山協印務督標前營參將新泰署理羅定協印務督標水師營參將劉天爵兼署肇慶協印務至查察惠潮一帶沿海口岸汛地尚屬整肅臣俱面諭該管文武密為偵伺果有踪跡可疑者方許立時盤詰解究不得一味驚擾以致商民褁足據饒平縣續獲㑹匪陳阿塔余阿緒二名余阿緒供係徐阿畨勾引入㑹其所傳暗號歌訣均與前獲之許阿協等大略相同其供出夥黨俱密為存記至前此許阿協等供出閩省勾引入㑹之梁阿步賴阿邉等經李侍堯因該犯等堅不承認解粵質審臣俟該犯等解到彼此畫一密辦奏入報聞二十八日丙申孫士毅奏言此次密𣲖官兵俱已酌定起數預為妥偹今定于三月十六日即令頭起官兵自潮起程每起二百五十名間一日行走自粵省黃岡入閩省詔安境相去止數十里自詔安至厦門蚶江等處亦止數日可到照依李侍堯𣲖定數目以二千五百名赴厦門一千五百名赴蚶江配船渡海臣與提臣髙瑹往來彈壓稽查沿途𣲖令惠潮道圖畢赫潮州府孫泳惠州府顧聲雷督率經過之各州縣妥協照料催䟎前進並多偹火藥及褁帶一月口糧俾資接濟其辨兵應得分例量為借給俟將來閩省定有章程再行畫一辦理奏入上命軍機大臣傳諭常青李侍堯孫士毅曰據孫士毅奏是該省官兵全數在潮起程已在四月中旬加以配渡放洋計四千名陸續全抵臺灣極早亦須至四月下浣常青于三月初六啓碇放洋不過初十內外業抵臺灣若必俟粵兵到日始行進𠞰則蕆事之期竟須至五月豈不曠日持久著傳諭常青體察情形若臺灣現有之兵一經鼓勵覺屬可恃即擇其精壯者親身帶至大里杙賊巢痛加殱戮將首逆林爽文擒獲其餘附從自紛紛瓦解固屬甚善如該處之兵實不可恃必須接濟或俟粵省數起官兵到後酌量足敷𠞰捕即帶同前往俾新舊間用庶新到者勇氣方張舊存者心有可恃亦自必旌斾改觀不可拘泥必待粵兵到齊始行辦理致再遲延或臺灣現有之兵其氣已餒必須全仗粵兵到齊方能前往𠞰捕之處常青亦不可因有此㫖稍存輕率之見務在相機妥辦動出萬全以副委任至粵省未經起程官兵著孫士毅即另行籌酌令其併起行走並先知㑹李侍堯預偹渡船其已入閩境官兵著李侍堯飛飭沿途催䟎前進李侍堯即當親至厦門料理隨到隨渡至此事總由黃仕簡任承恩二人互相觀望以致久稽蕆事其罪實無可逭孫士毅駐劄潮州相距不逺其於黃仕簡任承恩玩悮之處自必有風聞著該督即將所聞據實覆奏勿稍回護欽定平定臺灣紀略卷十一
