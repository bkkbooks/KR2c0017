body:
  text: 十月初八日壬寅孫士毅奏言委守偹沈德清千總莊大進帶同兵丁三十二名將赴臺兵丁綿衣鞋袴帳房等項分載兩船運送厦門九月初五日在粵東澄海縣開行九月十八日接護南澳鎮副將鄭元好禀稱前赴閩省銅山沿海一帶巡查至虎仔㠘收泊沈德清等船隻亦收至虎仔㠘告知於十五日灣泊銅山營仔汛港三更有賊船四隻每隻數十人前來行劫千總莊大進船內裝載鞋褲帳房等項被劫去一百餘簍並失去隨帶兵器數件千總戳記一個因賊多兵少兵丁三名被打落水千總及各兵均各受傷其守偹沈德清船內裝載綿衣未曽被劫等因臣查該護鎮鄭元好既在閩省銅山沿海一帶巡哨何至一任盜賊充斥毫無顧忌其銅山營汛是否該護鎮所轄抑另有專管之員應聽閩省查明參辦外臣現於粵東境內各海口一體委員上緊跴緝嚴密查拏奏入上命軍機大臣傳諭李侍堯孫士毅徐嗣曽曰鞋褲帳房等項俱係運送臺灣軍裝物件被劫至一百餘簍之多看來竟係林爽文夥匪在洋靣潜出邀劫不可不嚴拏究辦此案被劫係在閩省洋靣李侍堯自應飭屬一體嚴拿但該督駐札厦門辦理軍務照料官兵配渡事務繁多無暇兼顧徐嗣曽現在省城並無經辦要件竟著責成該撫督率所屬實力查拏務期按名弋獲毋使漏網徐嗣曽于臺灣剿捕事務初時尚知留心隨時陳奏後見賊匪肆擾日久一時未能辦結未免心存畏難轉似置身局外緘默不語若與己無干者徐嗣曽係本省巡撫何得漠不相關若此著傳㫖嚴行申飭同日保成奏言黔省頭起官兵距古州水次較近是以咨㑹古州鎮總兵馬詔蛟即將頭起官兵㑹同貴東道尼堪富什渾先行㸃驗開行總兵馬詔蛟親至丙妹照料嗣臣趕赴古州即將二起官兵查㸃開行隨親督前抵丙妹撫臣李慶棻於遵義大定平逺黔西官兵過省亦即親赴沿途督催鉛彈等項俱加倍帶往以資偹用奏入報聞初九日癸邜孫士毅奏言黔兵赴閩計程雖逺而自貴州一帶至廣西梧州府均係溪河急水順流而下無需多日其自梧州至廣東省城水勢亦順不致稽遲唯自廣州至惠州老龍地方逆水居多自老龍過山之後如遇溪河水勢不致過淺亦止數日可到潮州查廣西栁州以上提臣三德在彼督催撫臣孫永清現駐梧州照料其入粵東境後撫臣圖薩布提臣高瑹於廣惠兩處上緊催䟎其自老龍過山青溪下船至潮臣妥為料理中間復派委文武大員分假催查務期加緊遄行斷不令稍有遲滯至粵西兵三千分作六起其頭起五百名即日可到黃岡㸃送入閩其餘五起因營分較逺於九月初十日以前由梧州全數起程約計月盡月初亦由黃岡全數出境奏入報聞十四日戊申恆瑞奏言鹽水港附近民人多有從賊九月初四日有賊匪二三千猝至經恆瑞督令岱森保屢次堵禦初五日早又有賊萬餘前來滋擾恆瑞督率富克精額奮力勦殺賊匪人數衆多官兵不能抵禦富克精額被炮打傷陳亡恆瑞欲進不能即欲棄鹽水港退回常青處亦不能達現在續到兵五百名唯有悉力固守鹽水港奏入上命軍機大臣傳諭福康安常青海蘭察恆瑞李侍堯孫士毅柴大紀曰該處賊勢尚在猖獗恆瑞兵力有限未免進退掣肘幸所帶之兵又續到五百名可資接應恆瑞此時亦不必過于焦急唯當在鹽水港悉力固守以待福康安到若賊匪衆多勢難守禦不妨竟棄鹽水港回至常青處再圖進取亦是一䇿但用兵之道以攻擊為先著堵禦為後著今官兵所到轉被賊人攻擾我兵日以抵禦為事是官兵祗辦接應著著落後而賊人轉得占先客主之勢豈不倒置恆瑞此時既不能帶兵前抵諸羅又不能回至府城亦斷無在彼株守之理况恆瑞在彼賊匪不時滋擾仍須堵禦勦殺不得休息與其賊來始應何若偵探附近賊匪何處單弱有隙可乘即帶兵直前攻勦使賊人救應不暇以成反客為主之勢豈不甚善恆瑞當察看光景酌量妥辦亦不必過於拘泥遵㫖也至福康安自九月二十四日在大擔門發摺後迄今未據續有奏報前於陛辭時曽令到厦門後察看情形如臺灣府城及諸羅設有疏虞福康安應俟添調官兵到齊再行放洋前進計此時福康安自早得有順風徑渡鹿仔港但現在鹽水港有賊滋擾恆瑞勢不能支倘此㫖到日福康安尚在守風待渡竟當俟川黔等省官兵到齊再行開駕若已得風配渡前抵鹿仔港不妨稍為等候俟川黔粵西官兵陸續到彼再行統領進勦或先赴鹽水港一帶勦殺賊匪援應恆瑞或徑由鹿仔港直攻大里杙賊莊使賊人回顧巢穴前後牽綴則鹽水港等處賊匪自必紛紛解散其圍不攻自解福康安唯當審度機宜不可畏難亦不可冒險輕進總以持重為要至福建廣東二省召募新兵未經訓練若即用以剿賊難期得力著傳諭李侍堯孫士毅如遇福康安續有添調之處先將各營練習之兵派令前往其新募之兵留於該省巡查防守仍一靣督飭將辨上緊訓練務期精熟可用庶於戰守均為有益又徐鼎士處未據續有奏報就目下情形而論如賊匪盡往南路大里杙賊莊祗係家屬老弱則徐鼎士自應由大甲溪乘虛進搗賊巢以分賊勢若北路賊匪屯聚尚多徐鼎士且勿輕進福康安到鹿仔港後距彼更近自悉該處確信其應如何籌辦之處即當􅊾知徐鼎士遵照辦理上又命軍機大臣傳諭李侍堯舒常俞金鰲何裕城浦霖曰前經降㫖令浦霖於湖南挑選兵二千名以偹徴調自己預為挑偹今臺灣勦捕逆匪尚未蕆事現須添兵協勦該省兵丁從前調赴金川軍營於馳陟山險較為便捷今調往臺灣助勦自更得力著舒常浦霖即將挑偹兵二千名派鎮筸鎮總兵尹德禧為總統並著於副將內曽經身歷行陳者酌派一二員隨同帶兵前往亦照運米路徑由江西一路迅速赴閩聽候福康安調用所有軍裝火藥等項俱著妥協偹帶勿致稍有缺乏至湖南鳯凰㕔地方前因苗匪滋事甫經該鎮尹德禧搜捕净盡該處係苗疆緊要必須大員在彼駐札以資彈壓著俞金鰲即行前往該處駐劄兼理總兵印務並著何裕城於兵丁抵境時妥為料理儧程前進十五日己酉上命軍機大臣傳諭福康安常青海蘭察恆瑞李侍堯曰福康安統兵進𠞰所帶官兵多係𣲖調徑旅其閩省本地兵丁屢經挫失自不能如川黔兵丁之得力但現在臺灣統兵大員內如蔡攀龍等即籍𨽻閩省其餘偏禆千把籍𨽻本省者諒復不少福康安仍當加以䇿勉鼓勵俾伊等各思振奮勉圖出力不可因現帶巴圖魯侍衛章京等皆驍勇絶倫所調各兵俱係生力可恃遂置閩省官兵於不齒致阻伊等效用之心况現在各省調往兵力雖多於該處路徑民情未能熟悉亦須本省兵丁為之向導福康安務須隨時留意於閩省將辨兵丁中視其出力者鼓勵數人以作其氣而收其用不可稍存岐視也再前據常青等奏官兵與賊打仗屢因遇雨路窄不能擺列隊伍但我兵因路窄難行不能整隊豈賊人獨能悉衆全來坦行無阻且我兵因雨水泥濘難以前進何以賊衆獨不避雨水泥濘時出滋擾殊不可解福康安到彼詳悉查明該處實在情形悉心籌畫務出萬全臣等謹按閩省兵丁當屢經挫失之後其氣已餒我皇上特簡巴圖魯侍衛章京等及調集川黔徑旅皆驍勇絶倫可期迅速集事尚垂念閩省辨兵執殳隨行不肯稍存岐視以阻其效用之心特命於將辨兵丁內視有出力者録用數人以作其氣俾得人人自效踴躍爭先斯真天地之量而為鼓勵人才之極則歟十六日庚戌福康安奏言臣此次由鹿仔港進勦必須南北兩路併力攻圍使賊匪處處防偹疲於奔命賊勢既分軍威壯盛不難一鼓殱擒現已繕就咨文俟放洋時差人乘坐哨船知㑹常青恆瑞柴大紀蔡攀龍等約計臣到鹿仔港之時各路大舉進攻鹿仔港大兵即可乘機迅發直抵諸羅將沿途賊匪痛加剿殺一靣撫諭附近被脅民人令其各保村莊殺賊自效不必零星派撥逐處留兵道路自無虞梗阻中路既通聲勢益加聨絡然後整兵進逼大里杙約㑹淡水官兵由烏日莊夾攻另派巴圖魯侍衛數員帶兵在牛罵快官等莊杜其奔竄之路巢穴既傾南路賊勢益孤殱擒更易為力臣遙揣情形似應如此辦理到彼後如有應行布置之處再當相機妥辦同日李侍堯奏言閩省駐防滿兵除恆瑞帶領一千赴臺郡外尚有一千五百餘名省城地方亦屬緊要若分撥八百名來駐厦門亦足資彈壓隨飛移副都統鄂嶽令其如數調派並明諭各兵以將軍現赴臺灣恐將來或需派撥是以先調至厦門預偹至厦後仍飭隨時操演既不稍露端倪亦已足壯聲勢至將軍福康安既赴鹿仔港將來解送要犯或由蚶江入口該處附近泉州有陸路提標兵自足彈壓可毋庸分撥滿兵駐札其漳州一帶地方尤當靜鎮是以臣諸事只照常辦理不露形迹再密飭平和縣查訪林爽文祖墳據禀林姓各支多者千餘丁少亦數百丁現在進士林屏南稱康熙年間有林恪者隻身渡臺營生後即家於大里杙乾隆四十年屏南之堂姪林任觀往臺販易寓大墩林訪家曽有大里杙人林爽年約二十以內常來閒遊詢係林恪之孫現在造逆之林爽文或即是此人但事隔多年彼此不通信息是否的係此人不能知其確實等語查漳泉土風往往人名有兩字者只呼一字以便稱謂今林任觀所遇之林爽既居大里杙當即係現在之逆匪林爽文則伊祖林恪以上墳墓即應刨掘但據林任觀所供林恪之孫與現在逆匪是一是二尚未有的據該姓支族甚多方且各懷畏懼未便因疑似之間遽行辦理恐遂致驚疑不安容再行密訪務得確切根據辦理均奏入上命軍機大臣傳諭福康安常青海蘭察恆瑞柴大紀蔡攀龍李侍堯曰福康安所奏籌辦勦捕事宜與朕莭次所降諭㫖雖有大同小異然已俱得領要現在添調川省屯練兵不過七八日即可前抵厦門若福康安在大擔門守風尚須數日放洋則此項兵丁當已陸續到彼福康安即可帶領一同渡洋即福康安已得順風先行開駕而屯練兵隨後配渡計其前抵鹿仔港亦不過於福康安到後一二日即可到齊其貴州廣西兵亦當接續全到且福康安前此原請添調四川湖南貴州兵各二千今湖北之兵雖因路逺未經調發但朕已預為籌及派調廣西兵三千現又添派湖南兵二千而川黔之兵於福康安未經奏調之先亦俱預為調派此時俱可絡繹前抵該處正資進勦何慮不所向克捷耶唯恆瑞在鹽水港有被賊滋擾之信該參贊前日奏到之摺係由廣東轉遞福康安未經啓閲自尚未得信已降㫖詳諭一切就此時情形而論自先以援救諸羅為要福康安到鹿仔港後等候川黔廣西兵齊到即直抵諸羅柴大紀蔡攀龍在彼日久于該處情形自為熟悉福康安當與之悉心籌畫至臺灣府城現有常青在彼看來雖未能進取而自守尚屬有餘即使府城守禦難支或竟有踈虞之事亦不難再為收復福康安不必因身當重寄不能為郡城保全即為有負任使心懷疑慮以致顧此瞻彼轉不能併力一處决機制勝朕亦不怪福康安之不救也所帶巴圖魯侍衛章京等皆係久經行陳于行軍機要皆能熟悉統兵進剿時其旁路後路或有賊匪潜出滋擾伊等自能隨時察看預行防範不致墮賊狡計至林爽文祖墳未得確據自未便因疑似之間概行刨挖轉致林姓支族聞信驚疑應俟查有確切根據再行辦理即使一時未能查出亦無甚關係不妨稍從緩辦同日何裕城奏言四川屯練降畨兵二千三十一名先於九月二十六日全抵江西九江府境嗣接奉諭㫖飭令加緊兼程行走又飛飭各地方官并添派文武大員分布各站莭節儧催而該官兵等亦各踴躍爭先由南康南昌饒州廣信等府行抵河口鎮經藩司李承鄴率同府縣等在彼經理分起過鉛山縣之分水嶺至初八日全抵閩省之崇安縣迅速前進奏入報聞十七日辛亥孫士毅奏言前因諸羅急需應援即一靣知㑹粵西兵起程來潮一面於粵東再凑調一千名實屬失當至粵西兵三千于十月初四日全數照料入閩黔兵二千名計日應抵粵東境內奏入上命軍機大臣傳諭福康安常青李侍堯孫士毅徐嗣曽曰今臺灣勦捕賊匪尚未能剋期竣事正需兵力則孫士毅預行𣲖撥以聽調遣殊為得用甚資其力何必引以為罪耶此時屯練兵二千已抵該處粵西兵三千亦已早抵厦門合之鄭國卿候風待渡之兵又有八千生力雄兵加以鹿仔港原有之漳州兵二千廣東兵三千以及義民畨社而以巴圖魯侍衛章京等分領進勦何向不克但恐將來大功垂成賊匪勢窮力絀之時此輩狡猾性成斷不肯束手待斃或思由海道搶船避竄笨港鹽水港鹿仔草一帶俱曽被賊匪焚搶此等處均係通海口岸將來賊匪避竄時其大里杙巢穴留存家屬甚多賊人顧戀家室自必思搶船隻同載逃逸若逃往洋面則大海廣濶踪跡匪易豈有福康安亦駕船追捕之理福康安等務須預行留心今兵力既多如沿海口岸一經將賊殺散即揀𣲖水陸辨兵嚴行看守並留一二大員往來稽察勿被賊人搶占若有商販船隻亦當全行調開勿令近岸其運載軍需兵米等項船隻於到後即令原船仍回內地使賊人無船可奪絶其逃竄入海之路方為妥善再漳泉各屬向藉臺灣運米接濟今臺灣被賊滋擾雖米石不能源源運送但該撫現稱內運無多則是臺灣地方小民尚能耕種有米運至內地且昨據福康安奏常青在府城與賊打仗情形其信息即係得之船戶可見該處商販雖少尚有船隻往來其臺灣産米是否常有運送內地者為數約計若干現在臺灣南北兩路何處尚照常耕種並著福康安李侍堯於便中訪查據實具奏十九日癸丑上命軍機大臣傳諭福康安李侍堯曰臺灣地方奸民糾衆械鬭之事非止一次皆由該處多係漳泉二郡及廣東民人在彼居住而漳泉兩郡民人素有嫌隙及與廣東民人彼此不睦其里居田土互相錯處往往紛爭搆釁械鬭滋事而地方官並不實力查辦惟思將就完案以致奸民無所警畏因而釀成事體此次林爽文等倡亂不法劫縣戕官亦即因糾衆昌㑹而起今福康安等統領大兵鼓勇進勦自可剋期蕆事惟該處刁民惡習相沿已久若將來撤兵之後未免故習復萌辦理匪易現經此畨大加懲創不可不悉心籌辦妥為經理以期一勞永逸因思廣東漳泉三處民人互相搆釁若能令其彼此分處各不相涉自屬甚善但伊等在彼居處多年各有田産安土重遷一時概令離折勢有所難將來賊匪蕩平後福康安應酌量情形設法妥辦如義民內住居山猪毛廣東莊者久經官給懷忠里效忠里匾額該處義民最為奮勇急公自應令其照舊安居各守本業此外各處義民實在隨同官兵打仗殺賊者既經奮勉出力豈可轉令遷徙失其世業若賊匪莊業例應入官當召募别處良善之民居處至各近處村莊民人雖無從逆實跡而與賊匪同住一莊心持兩端者究不可信或趂此兵威將該處村莊民人酌為遷徙其籍貫分𨽻廣東漳泉者令其各為一莊俾相離較逺以杜爭端至臺灣府城為五方雜處之區自難逐一清釐轉滋煩擾况鎮道大員俱駐府城原可隨時彈壓無虞滋事則不必辦及至臺灣南北各處村莊多被賊焚燬民人俱遭戕害並賊人頭目及被賊脅從之衆所遺田土房産既未便仍撥給漳泉之民令其徒享利益且恐遊手無藉之徒從而聚處又致滋事自應將其田産查明入官另行分撥因念該處熟番向化日久此次逆匪滋事熟畨並無從賊者且淡水等處現在招集畨勇甚多莫若將此項入官田産如四川屯練之例即給與熟畨耕種按則升科令其安居管業自為守護既可以示綏戢又可招撫生畨豈不一舉兩得再諸羅彰化等處地方遼濶亦須酌量添設兵丁以資防禦該處止設知縣一員恐職分較小不能彈壓或應酌添丞倅將辨在該處駐劄更為有益著福康安等歸入善後事宜酌辦不必過於拘泥將來應行籌辦之事甚多若令李侍堯渡洋前往辦理恐內地乏人而常青於此等要務未經諳練恐亦不能籌辦裕如福康安既逺涉重洋於該處整頓地方戢暴安良一切善後事宜正應乘此大兵得勝之後妥為區畫不必急於回京至海蘭察及巴圖魯侍衛章京等事竣後自應令其先回不妨酌留數人以資臂指其閩浙駐防滿兵亦應令其各回本處惟屯練黔兵既經逺調到彼將來辦理善後事宜或有應須兵力鎮撫之處亦不妨暫留該處於諸事辦完後應撤回時再行撤回也二十日甲寅徐嗣曽奏言四川屯練降畨二千名調赴來閩二起兵五百名於初四日入境其頭起兵已於今日到省先准督臣咨㑹調撥駐防滿兵駐劄厦門偹調經酌派八百名分起前往臣與副都統臣鄂嶽商同料理趂川兵未到之時先令滿兵兩起於初八初十日起身此時川兵已到應先儘該屯練等逐起過竣後再遣後起滿州前進臣親赴沿途照料彈壓火藥鉛彈均已備貯泉厦兩處經臣酌定川兵由蚶江配渡赴鹿仔港已飭總辦局司道於泉州存貯軍火內就近按數撥給以資帶往至廣西兵三千名據報三四起已抵厦門貴州兵二千名計已可抵粵境俟各兵到時即可迅速配渡奏入報聞二十一日乙卯孫永清三德同奏言黔省官兵二千名分四起行走頭起官兵於九月二十一日入粵西之梅寨界第二三四起俱間日前來自梅寨至蒼梧出境共水程一千八百餘里每多灘淺難行之處先期飭令各地方官多備人夫在灘伺候兵船一到立即拉送毋許片刻停留並飭沿途督護各員辨加緊嚴催俾各起接續行走兹於十月初三日至初六日四起兵船已全數出境入廣東封川縣界交明廣東道府員辨押護前進其統領各兵之總兵許世亨并各將辨均能約束兵丁安靜守法並無生事滋擾之處奏入上命軍機大臣傳諭福康安李侍堯曰現在川黔廣西等省兵丁即日陸續前抵鹿仔港伊等逺涉數省行走奮勉安靜自應酌加奬賞以示鼓勵此內屯練兵丁屢經調派素為得力但此次甫經新到尚未與賊打仗獨著勞績既未便先加恩賞轉使他省調撥之兵不無觖望且臺灣節次所調粵東浙江及閩省滿漢官兵甚多久經在彼防守堵勦其中傷亡病故及疲弱不能得力者一時亦難分晰查明普行給賞自應核其功過分别賞罰用示勸懲著福康安到彼後於打仗時務須隨時留心查察至新舊派調各兵有打仗出力者亦有怯懦不前者福康安於進𠞰時應將各該省中奮勉驍健之兵臨時查明酌加賞賚庶出力者倍加感奮而怯懦者亦知所激勵爭先效用於𠞰捕機宜方可收臂指之效二十三日丁巳李侍堯奏言九月以來海風連作臺灣久無文報本月初九日始接同知吳元琪九月初六日來禀內稱初一日柴大紀有信至府城稱蔡攀龍等援兵惟蔡攀龍孫全謀帶兵七八百名及運送糧餉之義民三千名到諸羅其貴林楊起麟杭富俱在正音莊陳亡賊在諸羅城十數里外周圍邀截使道路不通米糧不入現在米價甚貴且無買處又聞近縣各莊田禾正熟賊與莊民分收運歸斗六門官兵常出城截用似尚可支持恆瑞在鹽水港連日打仗常青又添派梁朝桂謝廷選帶兵一千前往應援等語是諸羅仍未解圍而鹽水港又多賊匪滋擾梁朝桂等到彼雖可增助兵力萬一賊益鴟張將鹽水港水口截斷則恆瑞等進退兩難或有疏失益不成事體是以臣飛札常青速派水師鳥鎗兵數百名駕船數十號往鹽水港倘賊由水路來擾即行截殺務當保住水口兼可作萬一退步之用臣因風帆不順特令厦防㕔選募舵工水手將此信冒險折創前往但未知是否必能迅速送到至粵西兵三千現已到齊登舟緣東風甚大不能放洋福康安等亦尚在大擔候風川省屯練本月初二日頭起兵亦已入閩境此項兵係從江西取道省城而來應即從蚶江配渡其船隻亦已預偹妥當俟將到時臣即前往蚶江料理貴州兵聞已在途想亦迅速可到福康安等一得順風自當即行開駕同日普吉保奏言臣帶領官兵於九月初六日由大突溪前往笨港分路𠞰捕留遊擊葉有光帶兵八百名防守糧道後路十三日行抵麥子藔有賊衆數千苛派良民銀米民苦不能應賊剋期次日燒莊百姓驚惶無措適官兵踵至賊衆奔逸百姓歡聲動地是日劄營該處仍一面分兵偵探追逐十五日劄營元長莊離笨港八里密探賊匪均屯集笨港及前途一帶村莊至夜賊匪暗放火號繼以炮聲并聞諸羅一帶炮聲徹夜不絶臣當飭將辨嚴為戒備四鼓將兵分作三隊臣帶領都司馬元勳由中路直衝賊巢遊擊海亮由西路夾攻護副將卓靈阿為之接應參將張朝龍帶領守偹宋國興署守備沈勇雲從東路橫衝賊衆蜂擁迎敵臣督率官兵奮勇攻殺鎗炮并施打死賊匪數百人生擒賊夥楊意蘇媽張固三名審明正法獲器械三十餘件鞭炮二門米榖薯乾約計百餘石當分散出力各官兵鄉勇焚燒坂頭厝等賊莊七處火烟起後諸羅炮聲亦遂不聞查遊擊海亮奮力督兵復用鎗炮打斃逃散賊匪數人正在收軍據報有賊匪數百人乘大路前進由崙仔頂一路來犯大營經署同知黃嘉訓督率鄉勇㑹同遊擊夏承熙帶領官兵奮勇堵禦殺賊十餘人當將崙仔頂賊莊燒燬賊衆退散查笨港地方分南北二港離諸羅二十餘里離鹽水港三十里離海口三十里自五月失陷後北港竟成片土南港一帶搭蓋草藔約計二百餘間悉係賊巢賊匪得以肆行無忌今頓遭焚殺賊衆未必不為喪膽若徑乘勢直追至諸羅似覺便捷苐恐賊匪詭計多端一俟我兵前進在後繞襲阻隔糧路貽害非輕故仍劄住元長莊并可以覘賊匪動靜臣一靣親督官兵焚燒一路賊莊痛加𠞰殺廓清後路一面密遣妥人移咨恭贊臣恆瑞柴大紀訂期三路㑹合併力夾攻均奏入上命軍機大臣傳諭福康安常青李侍堯恆瑞柴大紀普吉保曰笨港離諸羅止二十餘里離鹽水港亦止三十里該處經普吉保帶兵收復與諸羅密邇聲息相聞是諸羅縣城儘可無慮而鹽水港亦距笨港甚近恆瑞處有續到之閩兵一千五百名又經常青派令梁朝柱等帶兵一千名前往援應則鹽水港一路軍勢亦已大振至常青處既能分兵援應鹽水港看來府城自必防守裕如計福康安此時諒已順風前抵鹿仔港其四川廣西兵自己與福康安先後放洋福康安統領多兵及巴圖魯侍衛章京等前往督𠞰又經笨港收復之後軍聲倍振帷當督率將辨相機進𠞰再該處民人被賊匪勒索銀米焚燒住莊不堪其苦一聞官兵到彼喜獲更生可見賊匪經過地方其附從民人本非甘心從賊特因賊匪逼迫無奈聽從即如麥仔藔地方幸官兵前往該處民人得所倚仗否則必至被賊脅從是前此業經從賊民人其中為賊所迫勉强附從者自復不少福康安此時尤應將安分良民妥為撫慰安戢即已經從賊者亦應設法招徠分别辦理不可因已從賊概豫殱除轉致阻其自新之路堅其助逆之心此為最要其貴林所遺溫州鎮總兵員缺著福康安於帶兵勇往之副將中如徐鼎士謝廷選並此外奮勇出力者保舉一員奏明升補又遊擊海亮署同知黃嘉訓督率兵民鼓勇殺賊均屬奮勉亦著福康安查明酌量升用以示奬勵再朕恭閲雍正年間實録舊例閩粵民人往臺灣耕種者所有妻眷一概不許擕帶止許隻身居住臺灣而全家仍住本籍嗣經高其倬疏請將在臺灣墾田耕種及有房屋民人准其搬眷居住經九卿議駁自因臺灣係海洋重地是以不令內地民人挈眷前往今臺灣民人俱有家屬與前定之例不符其准令攜帶眷屬起於何時著福康安李侍堯查明具奏即如現在林爽文等糾衆滋事設其家屬俱在內地賊首等自必有所牽顧何致敢於肆逆若此是臺灣民人禁止搬眷居住未必非杜漸防微之一法將來事定後應如何趁此兵威酌定章程妥協辦理抑或從來已久有所不能之處並著李侍堯歸入善後事宜一併妥議上又諭內閣曰貴林楊起麟同都司杭富因𠞰捕賊匪臨陳捐軀殊屬可憫貴林著照總兵例議恤楊起麟前在鹽水港一帶堵禦防守尤為出力著加等照副將之例議恤其都司杭富亦著照例議恤以示憫恤上又諭內閣曰臺灣逆匪林爽文等糾衆不法肆行滋擾搶占村莊實為罪大惡極今普吉保督率將辨兵丁由大突溪一路偵探賊踪奮勇𠞰殺焚燬賊藔生擒賊夥奪獲器械銀米甚多收復笨港實為出力可嘉普吉保著交部議叙出力兵辨著福康安查明咨部一體議賞欽定平定臺灣紀略卷四十
