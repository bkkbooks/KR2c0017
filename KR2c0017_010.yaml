  text: 欽定四庫全書欽定平定臺灣紀略卷十
  hash: sha256:2f7eda366c0d143a3b29d3d9d052373d83141e0a9d0f2a83c8367498a7773a4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_010-1a, image: WYG0363/WYG0363-0109a.png}
body:
  text: 三月十一日己卯李侍堯奏言旬日以來尚未續得臺灣信息惟於進口商船密為探訪據稱賊匪出沒無常尚時來滋擾等語今常青於二十二日已至厦門一得順風即當開駕至所取兵糧軍械係臣之責必須使軍前事事應手方可尅期􅟹事查臺灣府城固屬根本而任承恩在鹿仔港普吉保徐鼎士又帶兵前往㑹剿所有軍糧器械若解至府城再行轉解此數百里內既費運腳又慮疏虞是以臣委員分路進送在厦門澎湖者徑解府城在泉州者即由蚶江解往鹿仔港務期陸續接濟不致缺悮再接任承恩來咨知十三日將賊匪大加剿殺並搜出賊尸所帶結盟底稿及糾約攻劫等字共五紙移送前來謹封呈覽但任承恩摺移稱有五紙今查原包內只有四紙合併申明至楊廷樺補授臺灣府知府現已隨同常青前往臺灣又許阿協等在漳州被誘入夥可見天地㑹邪教閩省內地亦早有之此等匪徒私立㑹黨為時已久勾引必多目下若即跟查民間又增一畨驚擾臣當預為訪察存記俟臺灣逆匪辦完後與緣坐家屬之在內地者一同辦理並訊明此㑹實係何年創始即將厯來失察官員逐一查恭並通查各屬有無控告搶奪而地方官沉擱不辦之案另行參奏至上年辦理楊光勛等案內所稱添弟㑹明係換以同音之字意欲化大為小臣細查此案原卷有臺灣鎮總兵柴大紀臺灣道永福奏稿一件臺灣府知府孫景燧禀一扣俱係添弟字樣但該守在上年閏七月十七日禀出而該鎮道已先一日具摺入奏則該鎮道斷不得諉為不知又卷內有照抄該犯記名號簿雖已寫明添弟二字然簿內不過數十人明係就現獲人犯揑造成簿是改換字樣惟應于該鎮道是問今該鎮道俱在臺灣辦理剿匪之事應亦請俟事竣確查何人主見據實恭奏再上年十二月十二日有臺灣竹塹營外委虞文光兵丁王元浩搭船到泉州向提臣任承恩求救因無牌票移咨前督臣常青查辦兹據該提鎮移咨及守偹董得魁禀內有外委虞文光查無下落之語是該辨等實係臨陳逃回揑同掩飾臣提訊據供上年十二月初七日該辨隨同守偹董得魁到中港堵禦被賊衝散因與同鄉兵丁王元浩商同逃回內地又恐日後事發有千重罪遂到提督衙門揑稱奉差求救等語並訊據兵丁王元浩亦供認不諱隨將該二犯正法又閩省調撥官兵進剿臺灣逆匪所有副將恭遊多奉𣲖出師今內地各營僅存恭將七員遊擊七員或一人兼署數缺甚至汀州金門二鎮現以守備而代辦總兵之事既于體制非宜且彈壓地方亦無以示嚴重閩浙兩省俱係臣所統轄今擬于浙省副將恭遊內酌𣲖四五員飭速來閩備供委署要缺一面移咨提臣陳大用就近酌量調撥造冊送部俟臺灣剿匪事竣後仍飭各回本任緣係隔省調用武職人員理合奏明奏入上命軍機大臣傳諭常青李侍堯孫士毅曰黃仕簡自三月初一日奏報之後又閲十餘日未據續有奏報該提督所辦何事至任承恩竟安坐鹿港意欲因人成事殊出情理之外郎如搜出賊尸所帶結盟底稿及糾約書信自應隨摺進呈乃轉行咨送總督其信稿五紙又只有四紙足見其悮事不小再柴大紀于賊匪起事時保守郡城尚能奮勇近亦不能如前次之奮勇出力又一向並無奏摺自係因該提督等互相觀望該鎮等亦心生懈怠是黃仕簡任承恩之咎更無可諉著常青一抵臺灣即遵照節次諭旨嚴切查恭毋得稍存瞻徇至閲搜出賊匪所帶書信內有由休生等門㑹齊之語賊匪么䯢烏合尚知八門遁甲之法然此亦不過鬼蜮伎倆藉以煽惑人心官兵以順討逆以正祛邪母難朴滅净盡此事惟在常青相機調度以期迅奏膚功又閲搜出賊匪書稿內有廣東鳯花亭髙溪菴馬溪廟洪二房和尚及朱姓人犯曽諭令孫士毅密速查拏前據該督覆奏加緊嚴緝至今曽否拏獲未據續行奏報此係要犯著孫士毅務須嚴飭所屬設法跴緝毋任逺揚漏網十二日庚辰任承恩普吉保奏言八卦山一帶賊匪不時出沒窺伺臣等密商必須出其不意即行痛剿以挫其勢隨即分𣲖官兵于二十一日即到賊境賊衆遍山漫野抗拒官兵臣等即令施放鎗炮傷斃賊匪數百名賊衆奔潰臣普吉保親督署逰擊唐昌宗乘勢搶上八卦山扼賊來路臣任承恩親督副將林天洛遊擊穆騰額清查彰城內外窩藏賊匪正在查拏間附近山凹之賊約有七八千人蟻聚四出臣普吉保即在山梁督率官兵開放鎗炮斃賊甚多乘勝壓下臣任承恩督兵分處夾攻殺賊無數擒獲賊犯二十七名奪獲賊馬五匹鳥鎗七桿賊旗三十二桿藤牌挑刀長鎗竹串多件時已傍晚不便劄營仍行撤回各營所獲人犯內林家齊一犯審係林爽文族長且訪聞該犯前曽誆哄彰化文武官願將林爽文帶來投到以致猝不設偹釀成巨案實為此案要犯應即解送督臣審辦餘犯即行正法至陳亡帶傷各兵丁鄊勇分别記功奬賞事竣之日彚冊造報臣等正待諸羅淡水兩路兵到籌辦㑹剿二十三日據臺灣鎮臣柴大紀咨以諸羅賊匪張看葉省屯聚斗六門應須攻剿所帶各官兵即在諸羅嚴加防守搜捕又副將徐鼎士等禀稱淡水賊匪負險猖獗現帶官兵分路進攻各等因查賊匪尚在蔓延南北官兵未能㑹合一面咨報督臣常青核示仍飛商水師提臣黃仕簡籌辦㑹剿奏入上命軍機大臣傳諭常青李侍堯曰任承恩一味遷延觀望直至此時始同普吉保親往帶兵進剿但此次攻剿賊匪亦因普吉保親督遊擊等進攻南關口八卦山各賊莊柵而任承恩不過于西門一路從後策應彰化城內外搜查窩藏賊匪並未親至賊巢其所稱出其不意𣲖兵痛剿蓋亦係普吉保之意任承恩但因人成事如許多日所辦何事且該提督前此既存心恇怯則此次所稱親督官兵分路夾攻之處恐亦未可盡信况賊匪既屢經官兵剿殺而此次任承恩所奏摺內又稱官兵奮力殺賊無數是賊匪幾于殱戮靡遺何以摺內又稱賊勢尚在蔓延南北官兵未能㑹合看來皆由緑營將辨飾詞謊報既可掩其恇怯又可藉以冒功所言殊不可信著常青即將任承恩曽否親自帶兵赴八卦山打仗及所報殺賊數目是否確實秉公嚴查如有揑飾虛報情節即行據實恭奏同日孫士毅圖薩布同奏言查究天地㑹邪教自拏獲許阿協等訊供後即密咨閩省訪查勾引入㑹之漳州人賴阿邊梁阿步等續據饒平縣程煥又查獲該縣林功裕一犯訊係閩省平和縣林邊鄊人林三長于五十年六月間勾引入㑹又惠來縣地方盤獲陳琴等七名潮陽縣地方盤獲林海瑞等二十九名均係福建漳州府屬人氏雖訊據堅供欲赴西洋噶喇吧地方謀生因遭風駛船至粵並不知有為匪結㑹情事但正值臺灣逆匪滋事之時該犯等膽敢糾約多人偷越出口形迹可疑臣亦密咨閩省存記統俟事定後分别辦理至前准閩省咨拏臺逆案內供出夥匪有張隆生一犯籍𨽻廣東大埔縣當飭該縣查稱張隆生在臺生長原籍並無的屬并另行訪有張慶捷張興生亦在臺灣又與逆犯張隆生同籍同姓有無逆均未可㝎具其族人張永玉張丹成張崇秀亦俱在臺難分良歹臣等現在不露圭角密行存記再閩省續獲從逆匪犯鍾祥等七名內劉實及林天球二名俱係廣東饒平縣人恐原籍尚有應行緣坐之犯現在慎密飭查未據查明稟覆至後溪鳯花亭洪朱二犯尚未查有實在下落臣等督率惠潮各州縣嚴密訪拏不敢稍涉張皇致無實際再查天地㑹根源如果起于粵東惠潮二屬案犯必多應需大員専司辦理其時新補惠潮道圖畢赫尚未到任是以奏明行調臬司姚棻赴潮督緝兹圖畢赫業已到任察其才具頗覺靜細安祥現值秋審將届臬司係主政之員必須在省公同商酌臣等已將緝匪之事詳諭圖畢赫不動聲色就近督率密查札調臬司姚棻回省辦理秋審奏入報聞十三日辛巳李侍堯奏言北路鹿仔港等處兩月以來雖據報連次打仗俱有斬獲但於賊匪來擾時盡力堵殺尚未能直入賊巢痛加剿洗今南路已克復鳯山軍聲益壯北路賊匪自必聞風震懾如鳯山無須重兵彈壓又可用全力専注北路以期迅速掃除常青已於二月三十日起碇放洋即日到彼鼓勵振作自必易于奏捷又查出正月內守偹董得魁稟送逆匪林爽文僞示三紙閲之不勝髮指該犯于光天化日之下膽敢私立此等悖逆名號真乃罪大惡極謹封固呈覽奏入上命軍機大臣傳諭常青李侍堯曰官兵已將鳯山縣城收復是南路賊匪業經潰散竄逃無難收剿净盡黃仕簡即應督率將辨迅赴北路㑹合任承恩分路夾攻以期一舉蕆事乃竟仍安坐郡城按兵不舉而任承恩亦惟於賊匪來擾時𣲖撥辨兵零星堵禦並未親身帶兵直抵賊巢李侍堯心思周到自早已看出伊二人之悮事但以黃仕簡承襲公爵久任提督素昔恩遇較優而任承恩係任舉之子朕軫念伊父前勞特加録用擢至提督不免為之稍留地步是以不肯直奏但該提督之因循貽悮朕于數千里外尚早經洞燭况李侍堯駐劄泉州耳目較近而所屬文武員辨內亦必有議論及此併探聽情形禀報者現已節次降旨令常青嚴行查辦李侍堯如果有所見聞即據實具奏不必稍為瞻徇諱飾也至逆匪林爽文竟敢自稱年號其悖逆之處罪大惡極覆載不容俟將來逆首生擒必當嚴行盡法以申國憲而快人心此時常青惟當申明紀律鼓舞士氣俾壁壘一新人人用命以期擒拏首夥迅速蕆功臣等謹案兵貴神速二月二十一日任承恩有八卦山之捷郝壯猷亦以此日收復鳯山兩提臣正可乘此鋭氣親率將士打通南北道路㑹剿賊巢乃任承恩因柴大紀徐鼎士兩路之兵不能㑹合即遷延不前而黃仕簡又以收復鳯山為已功不思乘機剿賊以致逆匪復肆鴟張我皇上不以得有勝仗恢復城池為有功而益明著其觀望之罪賞罰嚴明皆出于先幾獨斷益仰睿慮之無所不周也同日徐嗣曽奏言二十八日任承恩咨稱本月十二日與普吉保分督官兵殺賊甚衆是該處兵力已足此開通道路即可與總兵柴大紀合兵㑹剿內地堵拏逆匪尤為緊要臣于二十八日前赴福州府屬之福清長樂及興化一帶沿海口岸細查兩月以來各該處並無臺灣海船進口臣恐漁户小船或有貪圖微利在於海邊接渡逸匪並恐荒嶼淺灘賊匪附搭海船經過偷越登岸細加訪察現在實無竄逸內渡之人兹于三月初二日興化途次聞官兵收復鳯山賊匪四散奔竄鳯山距澎湖甚近厦門一帶尤為緊要臣即星馳前赴厦門等處親督查拏凡有逆匪偷渡立即擒拏務獲不使一名漏網奏入報聞十四日壬午黃仕簡奏言總兵郝壯猷於二月初九十二等日帶兵剿捕各庒鎗炮打死賊匪數百人奪獲刀械等項查岡山崙仔頂小新園大湖各處俱係賊藪勢甚猖獗臣於十三日添遣官兵分擊夾攻而臺灣道永福亦𣲖撥義民隨赴大湖一帶協同剿捕自十三日未刻起殺賊連宵達旦鎗炮打死賊匪數百人十五日官兵分路直搗賊巢奮勇追殺生擒賊夥併將賊巢草藔燒燬臣又遣福寧鎮標逰擊延山帶兵五百名併義民隨郝壯猷進攻鳯山之北遣臺灣水師逰擊鄭嵩帶兵五百名由海道至打狗山繞攻鳯山之南二十三日據總兵郝壯猷等報稱二十日行至橋仔頭鎗炮打死賊匪甚多二十一日􅔰鳯山極力攻城逰擊鄭嵩亦到㑹合夾攻賊匪由北門奔逃併拾獲盔炮硝磺鉛子等項臣隨飛檄該總兵等飭令將辨加緊防守縣城綏集民人各歸安業又聞下淡水之新園水底藔三角湖姑婆藔九腳桶等處賊匪猖獗連日出沒攻戰不息臣隨飛咨郝壯猷速即𣲖撥官兵併令逰擊鄭嵩赴新園剿匪該處道路一通則署都司邵振綱即可帶兵馳出合攻水底藔三角湖等處臣察看各處賊勢雖被官軍叠次剿戮而餘匪東徙西奔四處皆有賊踪竄匿更訪聞中路之大武隴一帶山路綿亘現有賊夥遁聚日內亦即遣官兵馳往剿捕務必除盡根株不遺餘孽再總兵柴大紀咨報訪聞林爽文等在大里杙南投沙連斗六一帶糾匪衆多併有賊夥在諸羅附近之打猫大埔林等莊滋擾須添兵前赴各莊勦匪臣隨飛檄副將徐鼎士將帶到兵丁一千五百名除酌留五百名在上淡水防守外其餘一千名該副將帶領晝夜兼程赴諸羅與柴大紀㑹兵北剿二月二十一日柴大紀咨報十二月日訪查大坪頂有賊匪復聚夥黨隨帶領官兵前赴圍拏施放鎗炮打死賊匪三百餘人殺死者亦多擒獲賊匪蔡慶等七名併奪獲刀械牌旗等項又陸路提臣任承恩扎稱總兵普吉保帶領官兵已齊到鹿港一面分駐各要隘一面㑹籌進剿各賊巢等因臣緣南路鳯山甫經克復官兵尚未撤回現在存郡兵少府城緊要未可遽離致有意外疏虞俟南路檄兵回郡之日即馳赴北路一帶與任承恩㑹辦業先密札任承恩速應擒渠搗穴但該處附近生畨勢必竄入內山應令理番同知令通事土目傳諭內山生畨及沿界熟畨一體堵截擒獻示以重賞仍於四路出沒要口分布官兵嚴緊偵擒如日內柴大紀剿捕附近諸羅餘匪淨盡更可與普吉保㑹同該提臣圍擒逆首併殱除匪夥匪致兔脫奏入上命軍機大臣𫝊諭常青李侍堯曰黃仕簡奏報剿洗南路賊匪尅復鳯山縣城一摺其所陳功案俱係罪案且一味飾詞推托即如該提督摺內既稱南路之岡山崙仔頂等各處俱係賊藪勢甚猖獗亟應一舉撲滅何不親率辨兵前往剿捕乃惟添遣官兵飛檄該鎮將等進攻似此東堵西禦疲于來往適足為賊所輕么䯢草竊自然毫無顧忌日聚日多至逰擊鄭嵩等分路進攻鳯山收復城池時伊仍安然坐守又不親往是誠何心又摺內稱官兵叠次剿賊餘匪東徙西奔四處皆有賊踪等語黃仕簡並不能親赴賊巢將首逆擒獲致賊夥蔓延團結乃尚稱除盡根株不留餘孽伊試自思數月之久所辦何事賊勢尚如此鴟張惟與任承恩互相推委非伊二人貽悮而何尚靦顔為此語乎且大兵雲集各縣俱已次苐收復豈臺灣郡城轉慮其有意外踈虞之理乃黃仕簡仍稱守城明係藉詞掩飾以文其遷延觀望之罪著將黃仕簡原摺發交常青閲看向黃仕簡逐一嚴審詰訊至黃仕簡任承恩始終貽悮緊要軍機其咎甚重必須拏問常青到臺灣後遵照前旨先將伊二人摘去花翎任承恩令其由北路回至內地厦門勿令伊二人同在一處致有彼此關照通同揑飾之事並著李侍堯于任承恩到後即行委員解京黃仕簡留厦門候旨常青李侍堯此時且當慎密不可稍露端倪另候諭旨辦理想亦不久待常青奏到即有旨諭矣至常青現在自已抵臺灣應照節次所降諭旨悉心籌畫統率各路官兵親赴賊巢一鼓剿滅以期迅奏􅀢功臣等謹按黃仕簡以收復鳯山空城鋪張調度攘為己功而於各處賊藪惟遣兵進攻又自藉口保固郡城以掩其畏葸不前之咎皇上以陳功之案俱係罪案嚴旨詰責令其詳悉登答竟無可置喙而猶以老病貸其一死聖天子法外施仁何所不至歟十五日癸未孫仕毅奏言續獲天地㑹匪犯林功裕供出之朱洪德洪李桃等與閩省從前究出之洪二和尚及朱姓形迹相同或即係洪朱二犯亦未可定奏入上命軍機大臣傳諭李侍堯孫仕毅徐嗣曽曰此等倡㑹結盟煽惑人心首犯不可不嚴緝務獲跟究黨羽以盡根株現據所供姓名住址俱在閩省且有記號歌訣轉相糾約搶奪財物是該犯等在閩省結㑹滋事竟係明目張膽毫無忌憚其黨羽必多無難跟踪緝獲徹底究辦李侍堯現駐劄蚶江籌辦軍糧一切及善後事宜自不能分身前往徐嗣曽在漳泉一帶海口督查尚無緊要事件著該撫即親赴各該處將朱洪德洪李桃二犯嚴緝務獲訊明夥黨一面按名查拿一面即𣲖委幹員將二犯迅速解京歸案審辦該撫務須不動聲色嚴密妥速辦理毋任奸徒漏綱十六日甲申郝壯猷奏言初九十二等日帶兵前往各莊剿捕俱遇賊匪數千人隨督率官兵向前追殺鎗炮打死賊匪數百人十三日賊匪復來攻營臣自未刻對敵連宵達旦至十四日午刻賊始敗走官兵奮勇追殺鎗炮打死賊匪數百餘人十五日𣲖撥官兵分路直搗崙仔頂賊窠將草藔數百間盡行燒燬十七日由阿公店一路剿捕二十日行至橋仔頭又遇賊匪千餘人前來堵截隨督率辨兵施放鎗炮打死賊匪甚多二十一日由橋仔頭進攻至午刻直底鳯山鎗炮齊發適水師提臣黃仕簡另𣲖逰擊鄭嵩帶兵由海道前來夾攻賊匪不能抵敵由北門奔逃追獲盔炮硝磺鉛子等項隨𣲖逰擊蔡攀龍入城安民加緊防守併令臺灣府經厯羅倫進城總理一切臣即就城外劄營督率官兵嚴加搜獲賊夥跟緝賊首併令辨兵不許擾害良民所有官兵奮勇衝鋒殺賊內有陳亡受傷者查明員名造冊呈送督提二臣辦理奏入報聞欽定平定臺灣紀略卷十
