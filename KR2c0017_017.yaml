  text: 欽定四庫全書欽定平定臺灣紀略卷十七
  hash: sha256:a48af0b7f5e861e6dc4e6d1d8258d3389e67c34702fa802ff6f0de9a2b04039d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_017-1a, image: WYG0363/WYG0363-0188c.png}
body:
  text: 五月十一日丁丑上命軍機大臣傳諭常青李侍堯藍元枚曰昨據李侍堯奏黃仕簡任承恩業經委員起解伊二人既經送回內地而藍元枚未抵臺灣所有水師陸路兩提督印務是否遵照前旨分交柴大紀普吉保二人署理何以前此常青摺內未經奏明又閲常青初到臺灣奏到情形摺內稱任承恩雖未能向前但北路避賊人民俱在鹿仔港若遽行撤動恐賊人乘虛竊發請暫留任承恩帶罪督兵等語常青既因鹿仔港緊要欲留任承恩在彼嗣因接奉諭旨即將任承恩解任送回內地是該處止有普吉保一人勢力單薄何以常青于送回任承恩時並未將如何傳旨將伊解任是否需人協助之處籌畫奏及且閲李侍堯摺內稱接據普吉保咨稱但能于打仗出力至調度籌畫實非所長是普吉保亦自知限於才力不能獨當一面等語又似常青令彼暫署任承恩之印矣朕早經慮及該鎮到任未久于地方情形未能熟悉且不通閩省語音遇有調遣官兵及曉諭鄉勇義民等事恐多未便是以諭令藍元枚不必在漳浦留滯速即前赴鹿仔港今藍元枚尚未奏報放洋日期而該處止有普吉保一人鹿仔港距大里杙賊巢最近恐賊匪聞而生心乘虛竊發深為厪念已節次降旨令藍元枚星速前赴鹿仔港以資守禦昨又念及藍元枚所統領之浙省兵丁素性脆弱殊不足恃特諭藍元枚到鹿仔港時止須會同柴大紀普吉保整頓兵力遙為聲援牽綴賊勢總俟常青到彼定期夾攻藍元枚務須凛遵前旨迅赴鹿仔港審察遲速緩急機宜養精蓄鋭以期併力會剿再常青前奏賊匪占踞斗六門我兵南北兩路信息梗阻此事最關緊要藍元枚尤應會同柴大紀普吉保先將斗六門大武隴等占踞之賊匪盡力殱除以通南北大路庶常青統兵前進全無阻隔可成破竹之勢再常青前次奏到之摺有彰化諸羅鳯山等縣被搶掠一空聞官兵將至即捨城而去官兵既已入城即以克復城池咨報並聞彰化城中仍有賊人往來何得謂之克復等語所奏自屬實在情形鳯山一縣得而復失業將郝壯猷治罪而彰化諸羅前此柴大紀陳邦光等亦俱稱率領兵民奮勇殺退賊匪克復城池亦不免有冒功謊報情事矣但現在該二縣究竟有無賊匪往來占踞况從前陳邦光恢復彰化後自必領兵在彼駐劄兹常青查奏該處尚有賊匪往來是陳邦光恢復後又捨此何往斷無與賊同在一城互相坐視之理該鎮將等從前有無藉事鋪張揑飾之處常青何以尚未據覆奏若此時該鎮將等皆知過奮勇效力又當以功贖罪總在常青善為駕馭鼓勵用之而已再副將徐鼎士前經常青等派令帶兵剿賊而該副將復以艋舺民人懇求留駐尚在未行曽諭常青嚴查該副將有無托詞規避之處亦未據查明具奏著常青一併詳查不可稍存姑息之見十二日戊寅上命軍機大臣傳諭常青李侍堯藍元枚普吉保曰常青初扺臺灣存城兵數無多賊匪分路攻犯府城常青親率官兵鄉勇迎捕截殺斬獲甚多賊匪敗退續調官兵未到以前尚能如此連得勝仗現在大兵雲集軍威壯盛常青統領廓清後路無難將竄聚賊黨盡數殱除是此時南路情形儘可無慮惟北路鹿仔港一帶前據常青奏稱避賊難民俱在該處恐賊人乘虛竊發欲留任承恩在彼帶罪督兵今既將任承恩遵旨送回內地則該處止有柴大紀普吉保二人恐兵勢單薄難以支持且兵民人等見提督解任送回內地未免心生疑懼而鹿仔港距大里杙賊巢最近深慮賊匪聞而生心乘虛竊發著傳諭藍元枚速赴鹿仔港會同柴大紀普吉保整頓兵力遙為聲援牽綴賊勢藍元枚未到以前北路係専交柴大紀普吉保二人在彼辦理柴大紀普吉保皆係總兵大員雖調度籌畫非其所長而臨陳打仗情形亦應隨時奏報何二人近來無一摺奏耶况前據常青奏柴大紀駐劄諸羅屢有勝仗賊匪既至諸羅滋擾柴大紀與之打仗普吉保駐劄鹿仔港與大里杙賊巢尤近自亦必有賊匪來擾斷無互相坐視之理何以俱未據該鎮等奏及著再傳諭柴大紀普吉保將現在北路堵剿及賊匪曽否在鹿仔港滋擾暨官兵有無剿殺打仗情形各行迅速據實奏聞十六日壬午常青奏言四月十九日將郝壯猷押赴軍前正法在軍將辨無不警懼并飛劄柴大紀普吉保令其戴罪圖功奮勉出力以郝壯猷為前鑒至鳯山退回之兵其初止存四百餘名現奉恩旨貸其一死盡皆感戴輸誠願效死力其餘尚有未回官兵是否陳亡抑係潰散躲避容即逐一確查辦理從此軍令益明士氣倍奮現在南北賊匪稍知斂迹但察看各路鎮將遇賊侵犯尚能殺獲取勝而俱未能掃穴擒渠固由從前彼此觀望亦由道路未通勢分力薄兹福州將軍恆瑞提督藍元枚親身領兵前來臺灣會合進剿俱各授為參贊大臣正可與之悉心籌畫惟立定主見不以零星打仗致稽時日惟俟粵省兵四千名及駐防滿兵一千名不日到齊後即親自統領厚集聲勢嚴整紀律一鼓作氣從南路以至中路北路務期乘勝長驅尅期蕆事再查逰擊鄭嵩在鳯山殺賊陳亡此外尚有逰擊延山在南門山埔禦敵被賊圍害原任同知王雋在鳯山之石佛頭地方罵賊被害理合附奏至總兵普吉保自調赴北路後在八卦山打仗尚知出力柴大紀保守諸羅屢據該鎮稟報賊衆來攻該鎮親督將辨帶領兵丁義民將賊殺退臣覆查無異是柴大紀普吉保尚無畏葸情事副將徐鼎士前抵淡水經任承恩調赴鹿仔港以艋舺民人懇留未行查淡水地方遼廓亦有賊匪嘯聚現無文武大員在彼則該處民人請留彈壓尚係實情臣到臺灣後節經札查兹于四月十九日副將徐鼎士逰擊吳秀等稟報三月初二二十一等日在淡水屬之三貂金包裹等處與逰擊易連護參將羅禮璋等帶領官兵義民剿殺賊匪俱各得有勝仗等情自是由淡水至臺灣府城南路梗塞所以稟報稽遲但淡水距府既逺所報打仗殺賊尚須確查如有揑飾定按軍法懲治再調赴臺灣之粵兵四千名總兵陸廷柱所帶之二千五百名已到派往鹿仔港之一千五百名檄令全赴鹿耳門現已陸續改赴已到一千三百餘名其一百餘名以及總兵梁朝桂俱計日可到臣現於舊存及散回各兵內挑其壯健可用者間入新兵令勇往之將辨各帶領數百名于附近府城賊匪往來之處先行逐一搜捕除俟添調內地官兵到後立即起程進剿同日柴大紀奏言自本年正月二十二日克復諸羅賊匪四散竄匿當將城內安撫隨劄營北門外田洋就附近村莊遍處搜捕至二月初八日有姦匪張慎徽假充義民先將與逆首林爽文不和之偽先鋒吳聰擒交武舉黃奠邦解獻以為憑信是日帶匪夥三十八名前來求在軍前效力希圖內應臣見其形迹可疑令張慎徽一人進見餘人俱住營外詢其言語枝梧隨密飭將備將匪夥盡行擒獲臣將張慎徽擒拏研訊據供實係謀為內應隨將該犯等盡押教場梟首示衆當差把總李春魁帶兵並縣役林秀等往該犯家中拏獲該犯之母吳氏妻董氏子張振傳女隨娘併幼子一口搜出林爽文約單一紙內開速撥勇夥一千名候齊攻取諸羅字樣隨將該犯家屬人等發交署諸羅縣收禁又十二日探得賊匪聚集二千餘人離諸羅縣城二十里之大坪頂隨飭逰擊楊起麟林光玉守備陳明德邱能成帶兵八百名又武舉陳宗器黃奠邦帶領義民臣帶兵二百名隨後接應于十二夜五更起行黎明齊赴大坪頂圍拏殺斃賊匪多名生擒蔡慶翁月等七犯又義民縣役獲賊黃専等共十七名除蔡慶一名傷重旋即身死其翁月等十六名審明隨賊打仗燒莊即行正法又二十五夜二十六日賊匪蔡福約會南路賊匪陳靈光兩路夾攻諸羅蔡福賊衆先來攻北門營盤臣督率官兵義民奮勇力戰自亥至卯賊被鎗炮打死者數百殺獲首級三十餘顆生獲賊匪張淡等二十三名搶獲行營炮一門百子炮二門餘匪逺逃正在追趕間適南路賊匪陳靈光等數千人來攻東南門營盤隨即將兵收回與逰擊李隆林光玉合兵一處協力剿殺自未至酉賊匪被鎗炮打死者百餘人餘賊四散奔逃生獲賊匪林洗謝蒲許進三名因近黑夜不敢逺追其許進被鎗傷重解至軍營身斃梟首示衆兩處獲賊張淡林洗等共二十五名其張淡林洗黃潤胡炎張力吳道王沈周春楊輔王玉周文謝蒲等十二犯解送提臣究辦其黃光興陳洪盧力盧罕李圭林硯陳光弼等七犯因受傷重越日身死戮尸又三月初二日探賊目李阿七併南路賊目陳靈光等率衆數千人聚集牛稠山北勢莊臣酌留逰擊林光玉仍守營盤督率逰擊楊起麟李隆守備邱能成等帶領兵丁義民前往剿拏鎗炮打死賊匪數百名殺死者亦多內殺死騎馬賊一名搜出偽輔國帥印一顆餘匪四散奔逃生獲賊匪張炎等十七犯審明正法其偽印暫存另解再三月初八日南路鳯山縣復被賊陷逆首林爽文復肆鴟張于三月二十九日紏衆數萬分路復攻諸羅臣飛飭駐劄東門外逰擊林光玉駐劄南門外逰擊李隆實力防禦又派署把總蔡開祥孫朝亮帶領鎗炮兵丁赴西門外要路截拏臣親督逰擊楊起麟守備陳明德楊彲邱能成等仍在北門外田洋堵禦賊衆將近營盤臣率將辨兵丁向前抵禦連放大炮轟擊自卯至未打死賊匪甚多賊衆奔逃隨率將備兵丁義民乘勢追過兩條溪至火燒莊地方因日暮收軍奪獲百子炮一門火藥一桶布帳房一架斬獲賊首八十六顆生獲賊匪蔡瑞等一十名又諸羅縣役生獲賊匪蕭光明一名審明正法再四月初四日逆匪林爽文等紏衆數萬分作三路來攻東北西三門營盤臣督率將辨兵丁齊放鎗炮自卯至午打裂大炮二門賊匪雖被鎗炮打死數百名尚冒死前來臣親率楊起麟邱能成飭將大炮往前上緊連轟官兵並各義民及壯畨一齊奮勇沖殺賊始敗退追至白石莊賊被鎗炮打死者數百賊匪奔逃又南門外草店尾賊匪數千來攻即收兵帶赴南門督率官兵義民向前力戰打死賊匪百餘名賊匪逃遁追至火燒莊因天晚收軍畨民阿里稍被傷吧咆陳亡奪獲炮一門器械等項斬獲賊首三十餘顆生獲賊匪陳全陳立吕憲等三名審明正法再安平右營兵丁陳恩成私往雲霄厝強取民人張陳氏衣服拏解研訊屬實隨將衣服追出給還張陳氏領去即將該兵丁正法示衆併將管束不嚴之署把總黃春陽捆責示警又四月初十日卯刻賊匪萬餘人分作三路來攻東西北三處營盤臣督令各營官兵義民抵敵自卯至未我兵連放大炮數十門打死賊匪數百名賊尚恃衆不退臣率逰擊楊起麟守備邱能成等併武舉陳宗器黃奠邦監生徐宜玉貢生楊振魁武生王得祿等各義民壯畨一齊向前力殺連放大炮打死騎白馬賊一名騎紅馬賊一名餘賊被炮打死甚多賊衆向北飛逃臣分兵三路直前追殺殺死賊匪數十名追至牛椆山後賊匪四散逃竄將賊匪所搭草藔盡行焚燒因營盤空虛未便逺追隨即收軍查鎮標外委劉欽兵丁程忠吳森三名遇賊懼怯不放鎗炮即行逃回以致賊沖入隊兵丁鄭得洪林義傳起龍張應選李日全等五名被賊殺死當經逰擊楊起麟把總陳洪猷等奮勇殺賊隊伍得以不亂似此臨陳退縮之辨兵若不速正典刑無以警戒將來隨將劉欽程忠吳森等三名在軍前正法將首級遍逰各營示衆奪獲大小旗十五桿鉛子一簍帳房二架牛皮牌竹牌半斬刀等項斬獲賊首五十八顆生獲賊匪蕭全劉科郭元林清元等四名審明正法十二日寅刻賊衆萬餘復來攻西北二處營盤先放鎗炮臣督令將備官兵義民與賊對放鎗炮自寅至午賊被大炮打死百餘名我兵奮勇前進又打死騎馬賊二名內一名身邉搜出偽單一紙寫股頭陳葛名字賊隨退怯臣督率將辨官兵義民向前追殺至火燒莊地方賊匪四散飛奔又據報南邉賊匪數千來攻南門臣見北路賊衆逃去已逺隨將兵收回趕赴南門督令奮勇力戰齊放鎗炮賊被大炮轟死甚多督飭逰擊李隆等帶領兵丁義民前往追趕至八奬溪賊匪遁逺日暮收軍奪獲馬蹄炮一門鉛子一包牛皮牌竹牌長鎗等項斬獲賊首四十八顆生獲賊匪陳諧洪乾郭苞劉淺李俊黃魯吕送李報又縣役拏獲簡宗一名共九名審明正法伏思諸羅地居臺灣之中為南北要區逆匪林爽文復紏南路賊目陳靈光等日來侵犯雖經臣疊次殺敗乃匪徒尚多諸羅陸續收到潰回兵丁五百餘名俱無器械惟就地設法製辦長鎗配用臣所帶之兵共止一千九百餘名若統帶北剿誠恐縣城難守如酌留守城則臣之兵亦覺單薄難以剿捕現已呈請督臣常青撥兵來守諸羅縣城隨即督兵長驅直前會合總兵普吉保併剿賊巢擒獲渠惡以期迅速蕆事又臺灣額兵併外委額外共一萬二千一百六十八名內北路協中左右上淡水等四營額兵共三千零二十二名當逆匪滋擾之時該四營兵丁自守不敷南路營下淡水營兩營額兵共一千五百一十四名北路既被賊擾南路亟宜防備惟有飭該兩營嚴加守禦所有兵丁難以抽調鎮標中左右三營額兵共二千五百四十五名內先經調撥鎮標中營逰擊耿世文等帶兵三百名赴彰化查緝續又撥鎮標左營逰擊李中楊千總蘇明耀魏大鵬等共帶兵六百名往諸羅接濟又臣帶本標兵三百名在鹽埕橋堵禦外尚有兵一千三百四十五名臣前奏調度水陸官兵四面守禦俱係離城稍逺之各總要處所劄營而城內地方遼濶亦不得不再加防範城守兩軍額兵共九百三十二名內派撥左右兩軍守備帶兵五百名駐劄小東門外舊萬夀亭尚有兵四百三十二名不敷分守東西南北大小八門且府城周圍所安水柵原屬稀踈每根俱離數寸處處可以偷鑽當與臺灣道永福相啇飭署中營逰擊守備王夭植會同左右營將辨將鎮標三營所存兵丁一千三百四十五名除管理火藥軍裝外俱令添防各城門併于城內挨靠木柵節節安兵晝夜嚴守臺協水師三營額兵共二千二百九十七名內逰擊楊起麟林光玉共帶兵七百名跟隨臣在鹽埕橋營盤又逰擊鄭嵩帶兵一百名在郡城巡查彈壓外尚有兵一千四百九十七名分防鹿耳門併北路鹿仔港南路打狗東港等處各洋面口岸均關緊要澎湖協兩營額兵共一千八百五十八名內調逰擊蔡攀龍帶兵七百名來臺灣駐劄南門外桶盤棧餘兵仍守澎湖上年十二月臣在鹽埕橋禦賊實僅有兵一千餘名此實在情形也當時急忙未將臺灣原設兵額一萬餘名奏明現作何用實屬糊塗咎無可辭兹蒙總督臣常青轉飭理合明白具奏均奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰柴大紀駐守諸羅在大里杙賊巢之南普吉保駐守鹿仔港在大里杙賊巢之北若柴大紀一俟添兵到彼即率領進剿直搗賊巢設賊匪一面負嵎死守一面分布黨羽從山僻小路繞出官兵之後復滋擾諸羅則柴大紀前後受敵退無所歸兵心未免惶惑于事大有關係不可不慮前經有旨諭令藍元枚一到鹿仔港祇須會同柴大紀普吉保整頓兵力作為進攻大里杙以牽綴賊勢無庸急于進兵想常青亦見及此矣此時柴大紀即有常青續撥官兵來到諸羅仍應固守該處或會同普吉保先將南北通衢斗六門大武隴等處之占踞賊匪剿除廓清總俟常青統領大兵到時合力直搗賊巢無難一舉集事不可冒昧輕進置諸羅于不顧行軍之道有欲速而反遲似緩而轉急者該鎮不可不審度機宜權衡悉當也現在審訊賊夥林家齊有賊首林爽文事勢窮蹙欲逃往內山生畨不愛銀兩只愛花紅布匹之語雖係賊匪混供不足憑信但賊匪將來勢窮力極明知一經官兵擒獲萬無生理或竄入內山勾結生畨希圖茍延殘喘亦事理所有不可不預行籌辦生畨伏處內山性同禽獸未必通曉理義但利害或知所趨避常青即可先趂此時懸立賞格令其縳獻首夥各犯即給以花紅布匹生畨貪圖貨利自必踴躍樂從並廣行出示開誠曉諭該生畨以賊匪數千人竄入爾境必將占踞爾之地界侵奪爾之牲畜日久受其擾纍若能擒獲獻出既可得受恩賞花紅布匹又可免賊人侵害如此令明白通事愷切宣諭生畨自為生計貪圖利便自不致容留藏匿常青仍應揀派奮勇能事將領帶兵于通內地各要隘處所嚴密防堵將來進兵時四路截拏更可一鼓殱擒搜捕淨盡不留餘孽至鳯山潰回兵丁常青處前後有一千一百餘名柴大紀處又稱有潰回兵五百餘名想來自係在鳯山敗逃之數如果該兵丁等逃後仍敢去而從賊查獲自當即行駢誅今竟尚知大義不敢從賊仍自行投到隨同官兵打仗出力尚有一線可原自可貸以一死今其戴罪圖功至副將徐鼎士所稟被百姓留于艋舺剿捕賊匪之處是否確實統俟事竣之後查明如有揑飾再行參處尚可從緩非此時之急務也再柴大紀摺內稱所獲賊匪張淡等犯解送提督黃仕簡究辦黃仕簡曽否審訊明確作何辦理並著常青查明據實覆奏上又諭內閣曰柴大紀駐守諸羅兩月有餘賊匪屢次滋擾連得勝仗斬獲甚多並能識破內應姦匪擒拏正法柴大紀前此保衛郡城及此次駐守諸羅堵禦賊匪始終奮勉出力朕心深為嘉奬並將私往村莊強取民人衣物之兵丁陳恩成審明正法衣物給還原主所辦尤為得當柴大紀著交部議敘並賞大小荷包仍賞常青恆瑞奶餅各一匣藍元枚柴大紀普吉保奶餅共一匣著各查明打仗出力將備官員分散賞給俾得均沾恩賚以示鼓勵至常青所奏逰擊鄭嵩延山在鳯山殺賊陳亡又委解兵餉之原任同知王雋一員罵賊被害俱屬可憫鄭蒿延山王雋均著交部照例賜恤又柴大紀連次打仗所有陳亡受傷辨兵俱著該部查明照例賞恤至鄉勇義民隨同官兵晝夜防範奮勇殺賊實屬可嘉其陳亡受傷者俱著遵奉前旨照兵丁之例加倍恤賞以示鼓勵又畨民吧咆被賊炮打死阿里稍被炮受傷較之鄉勇義民更當優賞著常青分别妥為賞恤其隨同柴大紀打仗出力之武舉陳宗器黃奠邦亦著常青酌量奬賞具奏欽定平定臺灣紀略卷十七
