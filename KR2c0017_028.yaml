  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_028-1a, image: WYG0363/WYG0363-0307c.png}
body:
  text: 七月二十八日癸巳上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰副將林天洛參將廖光宇病故貟缺業經委員署理但現在臺灣勦捕逆匪正在需人之際若由部推補前抵臺灣朱免稽遲而且于打仗出力人貟不足以示鼓勵著常青即於軍營帶兵人貟內擇其奮勇出力者不拘廣東浙江及福建本省即遴選二貟補授行軍之際全在得人不妨通融拔補以示鼓勵原不必拘定本省也即嗣後遇有缺出常青等俱應就隨征出力人員酌量揀補俾勇敢貟辨知所奬勸再昨據常青等奏賊匪將道路削小田水堵滿賊人屯劄之所俱有蔗園深溝阻礙去路等語道路既經削小官軍人馬難行則賊匪行走自亦不易乃數月以來賊人四出侵犯動稱數萬是皆由何道而行乎而官兵輒以道窄沙淤為辭豈賊能行而官軍即不能行有是理乎况行軍之道貴在隨宜制變即遇﨑嶇險阻而亦當設法開道直前摧破豈得因小有阻隔即株守坐待之理若因賊匪鬼蜮伎倆削小道路放水淤陷即束手無䇿則從前平定金川時跬步皆山又將何以進兵破賊耶常青等務宜悉心籌畫設法前進以期迅速蕆事斷不可因循坐待以致師老力疲為要同日李世傑閔鶚元同奏言初次撥運川米二十萬石約需用海船三百數十隻先經竭力雇備除撥運江省兩起米石配用外尚餘可用船一百二十餘隻又浙省除續押送到船一百隻尚不敷船一百數十隻今次續撥川米三十萬石約需用船五百數十隻通計共尚需雇備海船七百隻始足敷用臣等同司道悉心籌議查由江浙運米至閩必需往來閩鹿之船方得熟悉海道沙線情形而每年秋冬兩季北風司令粵閩貿易海船由江浙而往閩粵者較多由閩粵而來蘇者甚少且此時閩省辨理軍務需用船隻必多此次江浙兩省運米赴閩之船計有四百餘隻若閩省盡行截留恐現需配載川米之船未能尅期辦足或致轉運停留殊有關係臣等現在飛移閩省督撫通盤籌酌或雇令商販之船趕緊來赴江浙或江浙運米赴閩之船配給水腳交與江浙委員押回以裕配載川米之用臣等仍同琅玕將各海口續到之船實力搜查儘數截留並酌給守空飯食銀兩以俟川米一到隨即配載起運如此寬為雇備庶可不致稍遲奏入上命軍機大臣傳諭李世傑閔鶚元琅玕曰閩省米石關係軍糈要務所有運米海船自應預為封雇不致臨時遲誤但該督等惟當核計應運米石所需船隻先時籌備足敷運載即毋庸多為封雇此等海船俱係裝載貨物各處售賣若截留太多致商賈聞風裹足將來天津等處商船稀少必致百貨騰貴於京師日用所需大有關礙且摺內稱現在督率府縣於海口趕緊多方搜羅毋得隱匿私放辦理固屬認真但恐不肖州縣一任胥吏從中借端需索滋擾以致各商船户從而受纍更致裹足尤屬不成事體不可不嚴行查察管束著李世傑閔鶚元琅玕務需悉心籌酌招集海船足資運送即可停止封雇并隨時嚴行稽察毋使商販等稽延守候吏胥乘間擾纍方為妥善二十九日甲午徐嗣曽奏言浙江滿兵一千五百名由浦城陸路送至蚶江登舟赴鹿耳門較為便捷臣派委糧道凌廣赤及署臬司戚蓼生分赴建寧延平等處往來彈壓兹頭起兵二百五十名據報於十三日已到延平約十八日可抵省城以後各起俱間日接續而至臣接送一二起後即先馳赴蚶江料理配渡以期迅速前進至閩省粵省先經預調兵四千名已經全抵臺灣其續調粵兵五千五百名本月下旬俱可到厦當此大兵雲集糧餉火藥等項甚關緊要臣嚴飭各屬勒限轉運不致遲誤其浙江餉銀已過省者二十萬米石已到泉厦者七萬有餘火藥鉛彈等項亦俱源源而至臣於陸續到省時親加照料迅飭押運前進江西米石由光澤縣灘河撥載現飭延建邵道元克中在該處専司督辦兵威倍加壯盛軍需亦甚充裕近據副將徐鼎士淡防同知徐夢麟等稟報訪知白石湖山內姦良錯處官兵往捕始初竟敢擲石抗拒該副將等商同勦撫並用先為剴切示諭隨即派委文武貟辨帶領義民人等步行上山開誠撫慰即有扶掖歸順者三千餘人細詢情形始知賊本不多見百姓下山餘匪奔竄當即擒獲要犯彭喜等數名又於鹿藔金包裹等處招出難民千餘人護送歸莊趕種晚禾徐鼎士現已帶兵前駐大甲溪搜勦彰化賊匪等情經督臣飭撥餉銀五萬兩解往為賞恤義勇難民之用至鹿仔港難民聚集甚多自五月初旬運到米薯設厰煮粥陸續賑給所全活者不下數萬人復經提臣藍元枚就難民內勇壯者挑作義民以助戰守實屬一舉兩得奏入上命軍機大臣傳諭李侍堯藍元枚曰白石湖山內賊匪經徐鼎士等帶兵搜捕並令兵役義民人等開誠撫慰即有扶掖歸順者三千餘人鹿藔金包裹等處又招出難民千餘人俱經該副將送歸各莊安業可見賊黨雖衆如果能設法招徠勦撫互用無難即行解散此事徐嗣曾既得該副將稟報則李侍堯駐劄厦門豈有不得信息之理何以並未據該督奏及又藍元枚前于六月二十五日奏到摺內只稱據徐鼎士稟報淡水白石湖賊本無多已經拏獲從賊之參革守備彭喜解送督臣究辦賊匪逃入金包裹後山等語而于該副將招撫歸順之三千餘人及鹿藔金包裹難民千餘人護送歸莊之處並未奏及該參贊駐劄鹿仔港距淡水更近何於此等情形並未詳晰陳奏著李侍堯藍元枚將曾否續得徐鼎士稟報何以未經具奏及此後南北各路有無續行投順民人一併據實覆奏至徐鼎士帶兵駐大甲溪搜勦彰化賊匪前已諭令李侍堯撥兵一千名接濟徐鼎士所撥兵丁於何日配渡前往及近日鹿仔港大甲溪等處勦捕殺賊情形並著迅速馳奏臣等謹按賊首林爽文到處脅迫附賊之衆出於勉強者居多我皇上洞燭民隱節次諭令將軍等廣為招徠無論從賊與否一經棄械投誠即可赦罪安業並恐僻地未及周知又令出示愷切曉諭睿慮實無微不至兹撫臣徐嗣曾奏副將徐鼎士於白石湖山招撫三千餘人鹿藔金包裹等處又招出難民千餘人可見設法招徠賊黨自易解散而海外剿匪機要早不出聖明指示中矣同日薑晟奏言詳查江西之五福地方與福建光澤縣接壤入閩境後由邵武延平等府取道福州省城仍由海運始達漳泉似不若長江順流由江南出口海運便可徑至泉厦因即與藩司陳淮熟商查得湖北米石用大船裝載至鎮江换船到上海再换海船起運如該處海船不敷則浙有乍浦商船聚集亦可由此出口並查得米船運抵鎮江并或不入內河竟由外洋而行另换崇明船及江南簰子沙船駛至上海乍浦二處换船竟出大洋前赴泉厦更為簡便隨於十六日飛咨李世傑閔鶚元琅玕詳悉熟商如何方為妥善之處迅速移覆以便照辦一面飭藩司催據各屬將所碾米石陸續碾就在省城上遊者運至漢口彚齊其在省城下遊者如黃州所屬各縣則撥船前往即委運員兊收起運並調集各委貟一俟江西江浙各省撫臣咨會到楚核明江西一路實在有無礙難辦理及江浙出口海運究由何路迅妥之處詳細酌定即分起運行奏入上命軍機大臣傳諭李侍堯李世傑保寧舒常閔鶚元琅玕何裕城薑晟浦霖徐嗣曾曰昨據徐嗣曾奏浙省米石運到泉厦者已七萬有餘是閩省此時巳有米石接濟其江南江西續運之米亦當接踵而至可以無虞缺乏若因各省米石皆須由江南浙江出口船隻不能應手一時紛紛封雇擾纍商民轉多未便著李世傑閔鶚元琅玕務須量其緩急酌籌妥辦次第起運所有江南本省及湖北四川運閩之米止須隨到隨辦使之源源不絶俾船隻流通足敷裝載不必一時齊運將船隻全行截留封雇致商販守候稽時吏胥從中滋弊方為妥善其湖南應運米石並著舒常浦霖亦由該處徑運江南海口交李世傑等接續配運毋庸咨商江西省轉致耽擱至川省續運之米該督務須妥協辦理陸續接運竟由川江順流而下亦由江浙海運抵閩可也同日阿桂奏言臺灣地方西臨大海東憑大山大山之東係生畨居住為民人所不到大山迤西之麓則現為賊匪占據官兵進剿勢須仰攻無由察其虛實而賊衆居髙臨下且其中如水沙連虎仔坑六斗門等處南北又在在可通足以伺官兵之隙前邀後截四出滋擾若徒撥兵堵禦則山徑叢雜不但現有之兵不敷分派即再添一倍仍恐不能一一盡堵現在惟有將緊要地方如郡城諸羅鹿仔港等處先為駐兵防守而防守之兵必察其力能保固實可無虞再選擇可戰之兵二三萬進逼賊人巢穴搗其要害或兩路夾攻或全力専注但得官兵連勝一兩次賊人膽落其黨夥附從當不攻而自潰惟臺灣現有兵丁除分守府城等處外似尚不敷剿捕且其中亦少可用之兵在初辦時若深悉賊匪情形就本省兵略為多調趂賊情惶惑之際未嘗不可即就撲滅今則賊人已漸知戰守臺灣復被占據過半從賊者為數已多實又有不得不增添兵力之勢此事現令福康安前往督辦福康安經厯軍務聲威已著各省兵丁情形均所深悉似應令福康安先行通盤籌畫臺灣現有兵丁若干尚需添兵若干及何省兵丁於山路﨑嶇之地用之方可得力雖隔逺一兩省者亦準其檄調備用或竟調慣于跋涉山路之黔楚兵各一萬合之粵兵萬餘兵力充裕賊必指日授首雖目下似稍遲一兩月而功成反速同日保寧奏言川省辦米二十萬石運交江南轉運閩省業經臣飭委川東道黃軒總理督率重慶府縣等會同總運敘州府知府施光輅雅州府知府葉書紳妥速辦理現據該道等稟各處已買米三萬石連各州縣碾運先到之米湊足頭運五萬石之數兊交運貟定于七月十九日開行等語又據各屬具稟碾出起運之米俱可陸續到渝其二三四運亦可銜尾前進約計八月初即可全數開行查川江秋水方盛順流東下雖風水靡常舟行總屬迅速其自漢口而下川船素未經行必須换船前進臣已飛咨湖廣督撫飭備船隻過載運赴江南並咨江南安徽撫臣轉飭經過地方官一體催趲並偹船酌撥配運不致遲誤再查運送米糧等項定例順水每百里每石應給水腳銀七釐自重慶至漢口計程二千九百七十里每石應給水腳銀二錢七釐九毫乾隆十八年辦運江南米石其時船户水手食物人工器用等項皆屬平賤節省辦理每石止給銀一錢六分至四十三年協濟江南米石辦理已甚竭蹶今又閲十年一切加貴是以五十一年浙江辦運川米經前督臣李世傑奏明浙省委貟在川借領銀兩雇用船隻該委貟自行支發自重慶至漢口每石給水腳銀二錢二分方能承運查今昔情形不同船户等勢難賠纍業經飭照定例每石以二錢七釐九毫發給再臣欽奉諭旨再行採買米三十萬石即與司道悉心籌酌各州縣倉儲俱屬充實尚敷撥用至採買市米雖似便易但川省民間素鮮蓋藏目下早稻甫經收割未能集輳一時採買多米市價或致騰踴若倉穀則取之于官亦可不動聲色而立辦即將來買補辦理甚屬從容且新米往帶潮濕不若倉穀乾潔可無黴變之虞臣現已飭司道查明各屬倉穀額數將水次所貯接續動碾趕辦惟上遊水次之米必用小船運至重慶换裝大船由川江東下前辦運米二十萬石各處小船俱已載米運赴重慶恐缷載後四散他往臣已分委大小文武貟辨四路查雇押令速赴原處受載仍運重慶並飭川東道黃軒督率重慶府縣等多雇妥諳大船預偹承運計碾米三十萬石分為五運每運米六萬石一面飛調現任知縣五貟佐雜十貟分起領運並派雅州府知府葉書紳為總運直送江南兊交計前運米二十萬石掃幫開行後此次續辦米石亦可接續起運不致遲誤至漢口應换船隻仍咨明湖廣督撫飭屬雇備其自漢口至江南水腳亦即由楚省照例給發均奏入報聞八月初一日丙申藍元枚奏言自到鹿仔港諸羅縣屬之鐵線橋等莊俱已被賊燒燬彰化縣之東螺西螺亦被賊占踞臣屢經札商柴大紀相機夾攻緣道途梗塞由海道遞至鹽水港轉遞諸羅至今尚未接準柴大紀覆札鹿仔港係四面受敵自五月至今賊雖不敢直擾鹿仔港屢就各處小莊滋擾焚燒意在斷鹿仔港應援之路臣細查各賊巢內約有一二十萬人多係漳州及同安之人內中情願作賊者不及十分之一其餘或被脅相從或貪圗跟隨賊夥焚燒村莊搶掠財物是以每處蟻聚至一二萬人臣于六月二十六日奉到上諭敬謹録出遍行張挂曉諭數日之後有耆老人等陸續從各賊巢出來求見哭訴並無從賊止因家屬被賊拘留未能遽出臣皆逐細開𨗳令其遍諭衆人俟官兵一到大里杙各賊巢務須協同擒殺賊匪立功自效各人無不歡欣踫頭知有再生之路但鹿仔港附近賊巢若大兵徑赴斗六門恐道路阻塞一時難與柴大紀會合并慮賊匪乘虛滋擾臣是以奏懇添兵五千名計七月半後官兵自可陸續到鹿仔港兵力既厚便可分作二路一由埤頭攻殺東螺賊匪劄營二八水一由二林攻殺西螺賊匪就該處劄營自西螺至斗六門僅十餘里即可乘勢攻擊斗六門似于事機有濟再七月初二日聞賊目林領從諸羅來紏王田犁頭店等莊賊夥初三日要來焚燒阿棟等社隨知會總兵普吉保帶遊擊裴起鰲兵八百名在阿夷莊遙為聲援堵禦以防快官莊賊匪出來攔截臣親帶遊擊琢靈阿穆騰額兵八百名由阿棟社前去堵殺行至中藔溪見賊匪千餘人攔途抗拒續有王田莊賊匪千餘人亦來一處抵敵臣親率官兵奮勇向前施放鎗炮自辰至未賊匪始從犁頭店逃散因犁頭店一帶俱是賊巢未便逺追計鎗炮打斃賊匪約百餘人官兵俱無傷損又埤頭莊經臣派撥官兵設卡帶同鄉勇一千名防守亦于初三日有賊目莊好紏東螺賊一千餘人到埤頭焚搶村莊兵民用鎗炮打斃十餘人殺死七人似此賊匪雖蔓延肆擾但鹿仔港周圍村莊均已聫絡設卡官兵義民亦皆奮勇向前每逢攻殺俱得勝仗臣惟隨時相度機宜務期迅滅賊匪再臣于六月二十一日親帶官兵鄉勇由番仔溝鹿仔厝一帶巡查捕捉賊匪行至大肚溪遇賊數百人隨令官兵鄉勇施放鎗炮賊即退走打斃賊匪十餘人生擒鄭球姚蹇二名訊非賊目即行正法示衆同日李侍堯奏言柴大紀在諸羅自六月中旬被賊攻圍日夜拒守以少擊衆節經常青遣魏大斌田藍玉張萬魁等帶兵往援而藍元枚杪録摺稿稱官兵未能直達諸羅是以先攻大肚溪以分賊勢是藍元枚亦尚未將諸彰道路疏通近日臺灣各官稟報甚少惟同知楊廷理稟稱郡城北路運道稍通薯檢大麥間有數船俱自北淡水載來是以糧價稍減探得賊攻諸羅有頭目蔡福被炮擊死又賊用枋車來攻蒙以濕被亦被炮擊破數輛等語查蔡福混號遼東仔最為凶悍前據胡畨供稱林爽文曾封為提督軍門是該匪係逆首得力之人今既中炮身死而所用枋車又被擊破是賊衆雖屢次急攻實俱遭殺敗恃其烏合之多尚未退散魏大斌等併力前進日內想已打通道路又據北淡水同知徐夢麟稟稱彰邑附近賊巢各莊均有良民被賊箝制不得已許以所收田稻加二抽分始免殺戮今聞官兵義民齊集大甲多有私自奔來請求等語是各莊良民甚多即伊等已被脅從預恐官兵破賊巢後難以分剖先來請援以見其並非從賊亦可見民情皆知賊終必破是以早自投明又據稟稱拏獲陳賀一名係被賊逼脅入夥在大里􅍻代㫪城墻求林爽文之父來至軍工寮討欠臨出時有林旺托伊代接家眷進大里杙居住等語是從賊之人亦惟恃大里杙巢穴為茍延旦夕之計此皆極好消息今續調之粵兵四千已先到一千于本日放洋前往臺郡漳兵二千亦已登舟不日可到鹿仔港其餘浙粵之駐防滿兵三千及粵省緑營兵三千計月內總可到齊配渡前往均奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰彰化等處賊匪屯聚雖據稱有一二十萬人但係被賊用威迫脅勉強聽從不過烏合之衆今經藍元枚傳旨曉諭即有民人從賊巢投出自訴並非賊黨該參贊詳加開𨗳諭以擒殺賊匪立功自效皆知歡欣鼓舞共慶更生是賊匪雖衆易聚亦易散若能設法招徠自當紛紛投出賊黨日就解散至藍元枚與柴大紀札商會攻因道路阻隔尚未得有覆信鹿仔港兵力稍單未能前進但藍元枚所請添調五千名早經如數撥往前據李侍堯奏漳州有眷屬兵二千已經配渡其餘兵三千此日自已陸續全抵該處藍元枚當乘此兵力厚集速行進剿以此時情形而論當以打通諸羅接應柴大紀為急務至常青處已莭次降旨令一人速統大兵直趨北路會合進剿今南北兩路添調官兵自己陸續到齊正應乘其鋭氣及鋒而用常青竟當令恆瑞督率兵民駐守營盤悉力捍衛府城牽綴賊勢該將軍親自統領大兵自南而北徑趨諸羅藍元枚亦應令普吉保固守鹿仔港親統大兵自北而南則東螺西螺斗六門之賊皆可順便剿滅接應柴大紀與常青會合一處使聲勢聫絡以大兵全力奮勇夾攻若渠魁就獲則其餘賊匪自可紛紛解散而被脅從賊民人更當相率投誠不呼而集常青藍元枚此時固當持重但於進剿機宜不可坐失又柴大紀駐劄諸羅督率官兵義民竭力堵禦賊匪屢次攻擾縣城俱被官兵殺退擊破枋車殱賊甚多並將賊首林爽文用事頭目蔡福等用炮擊斃賊首為之奪氣此事前據常青等業經奏到但常青等所派魏大斌田藍玉接應之兵此時自己打通道路併力前進柴大紀得此兵力援應自更為得力近日如何殺賊攻剿情形著柴大紀迅速馳奏至漳州府近賊巢莊民一聞官兵到彼即自行投出奔請救援可見民情皆知賊匪雖衆終歸撲滅自為極好機會該將軍參贊急當妥為撫馭廣行招集並開誠曉諭令其殺賊立功同日李世傑奏言接湖北咨會擬將楚省所辦運閩米十萬石亦由長江運至江南海口轉運等因查現在江南尚須預雇川省米船七百隻若再添雇楚省米船未免竭蹶若由江西新城五福陸路運至閩省水口止八十里旱路即山徑﨑嶇亦計日可到若照來咨即令楚米亦由海運不特船隻一時莫辦且恐欲速反遲奏入上命軍機大臣傳諭李世傑舒常閔鶚元薑晟何裕城曰李世傑係指川楚兩省應運米六十萬石同時並運而言殊不知川楚之米亦不能同時運到川楚米共六十萬石若分作三起撥運則每起不過二十萬石所需船隻較少即易于雇用不特商船可得往返流通轆轤運載而米石亦可接踵而往足敷接濟李世傑請將楚米仍歸江西陸道豈非存諉缷之見向來總督兼轄兩省者雖同係所屬地方往往就駐劄省分意存偏袒此係外省習氣使然今該督現駐江南未免意存袒護豈能逃朕洞鑒耶所有現在湖北及將來湖南運閩米石均著由長江順流歸入江南及浙江等海口陸續轉運欽定平定臺灣紀略卷二十八
