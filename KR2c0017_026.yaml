  text: 欽定四庫全書欽定平定臺灣紀略卷二十六
  hash: sha256:584d0ac96a338d8563499cef1779c12ea64d5caabfbaa00c002304d570449b97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_026-1a, image: WYG0363/WYG0363-0286a.png}
body:
  text: 七月十七日壬午孫士毅奏言粤省先調兵丁二千名已於六月中旬陸續抵厦此時應已全數到臺至續調二千名内督標及増城恵來營一千名七月初五六等日即可出境右翼鎮標一千名距潮較逺七月二十日外亦可㸃送赴閩所有現在添調二千名因計期稍後臣尤加𦂳飛調並於營分略近者量為抽撥足數計程月抄月初亦可由黄岡出境一切軍裝器械及鉛彈火藥並褁帶一切口糧臣前此恐閩省軍營續有徴調俱預為宻飭部署一俟檄調文到各該營均可即日起程左翼鎮李化龍曽經出師金川派委統領其餘帶兵將弁俱挑選諳練勇往並有曽經打仗者至駐防兵一千五百名想日内存泰博清額會同圖薩布挑選停妥不日即可啟行臣仍一面星飛咨㑹一面派員馳往前途彈壓到潮毋許稍有滋事再近年外洋商船均係以貨易貨其新到洋錢比前較少愚民無知竟與紋銀一様行使是以市價稍昻現在軍營需用孔亟自未便較論成色多寡致有遲悞經撫臣在省迅速趕辦得有數萬兩先行起解因思上年清查倉糓案内有潮屬州縣徴出糓價銀二十餘萬兩提貯藩庫内洋錢居多現與撫臣札商將此項洋錢凑足四十萬兩委員分起解送赴閩即可應用無悞奏入上命軍機大臣傳諭孫士毅曰孫士毅添派征兵催䟎赴臺所辦甚為迅速實屬可嘉昨又降㫖令於粤東挑撥兵一千名速行派赴閩省應用該督務須妥恊派往愈速愈妙及據稱撥銀易換洋錢通融如數撥解所辦亦屬妥協至孫士毅現在駐劄潮州且因照料官兵出境馳赴黄岡該處與閩省較近聲息相通現在臺灣𠞰賊情形該督自必有所聞知並著得有何信即行随時速奏十八日癸未李侍堯奏言閩兵二千名於前月十九二十等日俱到臺郡粤兵先來之二千於前月二十四五等日放洋計目下應亦到齊至分兵二千前往藍元枚軍前之處若論道里則浙省滿兵到泉州即可由蚶江配渡但該提督係漢人㕘賛而永慶係滿洲將軍同在一處恐不得臂指相使之用臣擬令永慶帶滿兵赴常青處俟粤兵來時分撥二千往鹿仔港似覺兩處俱呼應得靈較為有益惟是該提督昨寄來摺稿亦有請添閩粤兵五千之奏今増兵二千似尚不敷所請之數臣前奏明漳州鎮兵獨未調用因札詢該提督去後兹於本月初四日接據札稱漳鎮兵内平和漳浦二營難保無㑹匪在内其詔安雲霄二營兵最為勇健得用鎮標中右二營及城守同安二營亦俱可得力保無他虞倘得此等兵五千不獨可以禦賊即相機進𠞰似亦不難等語該提督係本地人自必確有所見是以臣即照伊所指營分咨會常㤗并宻令挑取有家眷之兵二千名尅日前往以資應用查南路賊匪既多若俟常青由南而北正需時日今該提督増此閩粤兵四千不必俟常青南來㑹合即可進勦賊巢庶𠞰滅逆匪較得迅速再逆匪林爽文之母自縊及其父搬入内山之信五月初間據同知楊紹裘禀曽有此語并謂係三月中事臣随訪之内地文武各官則稱二月初間已有此傳聞是此信恐未必確是以臣未敢率行入告但今賊勢日益蔓延則無論此事未真即果屬實而該匪行同梟獍其父母已不足繫其心惟有解散其黨羽痛殲渠魁始可蕆事至於江浙數省撥運米石之外又令川省撥米二十萬石前來接濟尤屬臣等意計所不到現在漳泉一帶天氣久晴晚禾尚未栽挿將來必需平糶川米到時正資應用臣現在先行傳播非惟人心俱有所恃而山􅑍海澨得聞此信無不感戴聖主顧復之恩再臺地向無馬匹厯來駐班官員各自帶馬一二匹載往以資乘騎縁海船艙底甚深馬匹不能上下僅可於篷板底毎船附載三四匹一遇風浪尚多驚跳不寧是以載往甚難所有節次調往征兵非特緑營馬兵俱屬歩行即恒瑞帶往滿兵亦照軍需例折給此次増調浙粤二省駐防滿兵應亦照此辦理惟滿漢官員似不可無馬昨據粤省領兵之總兵梁朝桂等咨請兩廣督臣酌撥馬數十匹以資將備乘騎現准孫士毅分解前來今又増調多兵則將備需用又多應請滿漢各員三品以上准帶馬二匹五品以上准帶馬一匹其驍騎校千總以下概不准帶馬以省裝運之艱奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰常青處已節次指示機宜諭令舍南趨北今又有續到閩粤兵四千名兵力更為厚集正當及鋒而用若分投堵禦零星打仗何日始能進𠞰且緑營怯懦習氣動稱賊有萬餘及數十萬試思賊匪雖到處逼脅亦不過臺灣地方一處民人況又未必盡皆從賊又何至各處賊匪動有數萬果如此之多又何所得食豈賊人亦有錢糧散給之耶此乃事理之顯而易見者該將軍等豈可坐待株守以一兵禦一賊之理藍元枚處現在已據李侍堯派撥漳州兵二千其續調粤省兵二千亦當陸續前赴鹿仔港該叅賛亦當令普吉保留守鹿仔港親自領兵由北而南與常青柴大紀㑹合一處使我兵聲勢聨絡軍威壯盛不可徒為賊所牽綴以致師老力疲坐失事機再據李侍堯奏賊勢日益蔓延必須南北並舉以期軍務早竣此等賊匪不過烏合之衆總因官兵與賊相持曠日持久轉與賊人以暇以致處處牽掣我兵若辦理得其要領賊匪焉能日聚日多肆行屯聚且該督稱賊匪蔓延之語亦係緑營恇怯訛傳從何而得所指何處並著李侍堯據實覆奏同日何裕城奏言准福建撫臣徐嗣曽札稱臺灣軍營需用火藥雖已於浙江廣東二省調撥協濟但有續調官兵必須寛為籌備江西省是否現有存貯火藥堪以撥濟等因查軍營火藥甚闗𦂳要臣已在各營額備火藥内酌提六萬觔裝貯完固臣詣局㸃騐派委員弁領解即於七月初十日自省城接續起程由陸路入閩省之崇安縣解送前進一面札覆徐嗣曽并飛咨閩浙總督臣李侍堯派員接收交局應用奏入報聞二十日配常青恒瑞同奏言據現駐鹽水港之遊擊楊起麟禀稱十七日魏大斌等帶兵至鹽水港因鹽水港兵單留都司羅光炤帶兵五百名在港防禦魏大斌即帶兵前往諸羅一帶𠞰捕又據魏大斌來禀領兵于十七日到鹽水港賊匪暫退即到鹿仔草劄營于十八日同副將詹殿擢遊擊邱能成武舉陳宗器等帶領官兵義民至埔心大崙等庄與賊打仗自己至未鎗砲打死賊匪不計其數詎料四面賊庄羣起蜂擁竟有萬餘將前後隊官兵圍住官兵施放連環鎗砲奮勇抵敵至申刻殺出重圍收囬鹿仔草營盤乞迅撥員弁領兵赴援㑹𠞰是日陣亡把總麥逢春武成烈劉聨陞額外外委包定邦四員兵丁六十六名受傷遊擊邱能成守備蔡國忠二員兵丁十一名未知存亡千總黄殿臣把總陳世棟陳彪三員兵丁二百二十一名陣亡義民四名各等情查鹿仔草距諸羅二十五里該鎮等自應預先通知柴大紀内外應合則攻打較易何至多損弁兵而軍火器械又未聲明料所失亦復不少但柴大紀等自初十日㑹禀請援之後至今尚無文報則現在賊勢充斥阻隔音信自屬實情急需添兵前往臣等當派撥遊擊田藍玉帶兵一千名即于二十六日仍由水道飛赴鹿仔草随魏大斌併力攻𠞰速達諸羅統聴柴大紀調遣再六月二十一日據㕘將瑚圖里都司邵振綱禀二十日自山猪毛帶兵六百餘名廣東義民一千四百餘名由小路翻山至南潭攻𠞰賊匪臨時懇求接應等語臣等於二十二日黎明派令革職㕘將那穆素里前往哨探復派令翼長烏什哈達都司杭富㕘將特克什布帶兵五百名前至二層瀘山脚下接應約至巳刻那穆素里回報㕘將瑚圖里都司邵振綱甫經下山賊匪四出烏什哈達等將隊伍排開賊匪見有官兵接應登即退去㕘將瑚圖里都司邵振綱見賊懼退趂勢帶同官兵義民向前追趕廣東義民奮勇争先現擒獲賊匪陳順等五名臣等查山猪毛汛與廣東庄相連賊人數次侵犯俱被官兵義民殺退又官兵前經被困數月並無糧餉俱係廣東義民助糧接濟實屬義勇可嘉随面加奬勵酌賞六品頂帶貢監生員周敦紀等九人八品頂帶民人曽秀等十三人又每名賞銀二兩者九十名賞銀一兩者一千二百八十二名仍照土兵例給與口糧鹽菜其瑚圖里邵振綱所帶兵亦准分别補給糧餉鹽菜以示鼓勵至山猪毛汛現有把總葉琪英帶兵五百餘名同義民防守奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰據常青恒瑞奏加派官兵應援諸羅一摺所辦著著皆錯瑚圖里等前因鳯山失事被賊攔截在山猪毛駐守數月幸而賊匪無能不致將山猪毛搶佔該將軍等因中間道路阻隔無從知彼處信息以致日久並未遣兵救援今瑚圖里既于六月二十日從山猪毛小路翻山進攻南潭聲勢可得聨絡自屬極好機㑹該將軍等一得禀報即應親統大兵直往南潭一帶合力夾攻則賊目莊大田可期就獲南路即可乘勢肅清即使常青恒瑞不能一同前往亦應酌留一人駐守營盤或常青或恒瑞帶領侍衛章京將備等親身統領以大力多兵直趨南潭奮力攻擊方合機宜伊二人又有何不能分往處縱使伊二人俱難以分身亦應于鎮將中如蔡攀龍之奮勇可恃者多派官兵令其帶往𠞰捕乃常青等計不出此僅派那穆素里烏什哈達等帶兵五百名接應於事何益且官兵前在山猪毛被困數月既全藉廣東庄義民助糧接濟此次瑚圖里等回至大營其廣東義民自應令其留守本庄自為捍衛乃竟帶同來至大營伊等之意不過為添此千餘義民可以稍添兵力但山猪毛仍須留兵防守又豈若令義民在彼自為守禦之得力也今將伊等帶回大營令其随營征𠞰該義民等既繋戀室家心懸兩地不能得力且使賊匪聞知該義民等随營助𠞰必心懷忿恨將其村庄焚燬家屬殺戮義民轉致受累灰心似此措置乖張豈用兵之道且常青等統兵往北路進勦到處俱有義民協助若見廣東營之義民投營出力轉致家屬房産被賊摧殘是随同官兵打仗止有吃虧于彼無益不但不能招徠鼓舞轉使義民等望而生畏豈非驅之從賊所闗匪細觀之實生憤懣著常青等即傳㫖將現在山猪毛義民俱令速回本庄自行守護家屬田産並曉諭義民等現奉諭㫖以此事係該將軍等辦理錯悞特令義民仍回本處自為守禦或仍令瑚圖里親自帶領義民等回至山猪毛並酌添兵護送以安其心而資守禦常青等前赴北路時遇有義民投到者皆應令其各在本庄自行防禦如有賊匪侵擾即悉力堵𠞰以助官兵聲勢庶義民等無所瞻顧踴躍從事招徠更易此為最要至柴大紀現在諸羅被賊匪糾合夥黨攻踞鹽水港四處斷絶糧道又請添兵救援常青等即應領將備親身速統大兵前往接應乗我兵全力打通道路前赴諸羅㑹合柴大紀方為得力乃僅派魏大斌等帶兵一千五百名已不足以資𠞰殺而魏大斌又不曉事復留兵五百名防守鹽水港止帶兵千名前往諸羅以致兵力益單遇賊擁至不能抵敵𠞰殺收回鹿仔草營盤仍不能前抵諸羅且官兵義民多有受傷陣亡者既徒損兵力及魏大斌請援常青等又止派遊擊田藍玉帶兵一千名赴鹿仔草援應似此零星派撥何濟於事而伊等在府城又何曽殺戳多賊能進尺寸之地哉且常青等見魏大斌請援即撥兵一千前往接應若他處復有求救者又撥兵援應似此各處派撥分投堵禦則大營即有多兵亦必所存無幾豈又將屢請添兵而不已耶常青恒瑞何漫無布置辦理錯謬若此俱著嚴行申飭看來該將軍等此時竟茫無主見一錯百錯於𠞰捕機宜竟不能得有把握増朕南顧之憂為今之計該將軍等惟有遵照節次所降諭㫖直赴諸羅藍元枚亦應自北而南與常青柴大紀㑹合一處全力捜捕庶期搗穴擒渠其餘黨夥無難殱盡該將軍等勿再株守坐待以致老師糜餉坐失事機自取重戾上又諭内閣曰劉峩奏前准常青咨拏臺灣賊匪髙文麟等供出從賊之各犯姓名開單移知令於沿海各港口嚴宻堵緝當即飛飭各屬一體查拏兹查有福建來津之糖船内有水手趙榮林光二名與髙文麟等所供夥匪姓名相同随訊該水手等據趙榮供我係同安縣人原名歐陽煥林光供我係彰化縣人原名魏寵其趙林二姓係造船時報官姓名厯年換照均係頂認並不添改原籍俱有住址親屬可問並有天津行舖人等見該水手到過天津十數次情願具結等因現飛咨閩督查照所供是否屬實再行核辦等語所謂愈細愈逺殊屬不成事體常青等一正賊未獲而用心於無用之地可笑可鄙今之大臣等行事率多如此實増愧懣也且臺灣逆匪滋事其夥黨即或竄逸不過在厦門附近一帶海口潜匿斷無逺逾數省直至天津之理無論趙榮等係屬悞拏即或實係逸匪伊二人逃至天津又何能滋生事端況船户等俱係身家殷實天津行舖皆為出結更屬可信乃劉峩率行拘訊殊為失當此等船隻皆係裝載貨物投行售賣若如此混行查拏將來商販未免畏累褁足不前必至百貨騰貴於閭閻日用大有闗係況該督及天津道府等於所屬地方現有劉權之眷船被刧一事並未能將盗犯拏獲轉因數千里外閩省咨緝之案紛紛查究劉峩何不曉事至此著交部嚴加議處並將水手趙榮林光二名即行釋放不得再行拖累並曉諭該船户等以此二人實係悞拏業經奉㫖即行釋放該督亦治罪矣嗣後各安商業不必心存疑懼至常青現在𠞰捕賊匪於應行㑹合夾攻之處不能妥速前進乃於餘匪竄逸咨緝至數省之逺徒滋煩擾實屬不知事體輕重著傳㫖申飭常青既逺咨直省於海口查拏逸匪則浙江等省自己早有咨㑹並著李世傑琅玕於沿海各口㟁止須飭屬宻行訪拏逸匪遇有商船不得如劉峩之遇事捜求累及無辜以致商販聞風裹足臣等謹按查拏逸匪固宜嚴宻然累及無辜使商販畏懼不前更増地方之累天津所到糖船内有水手與逸匪姓名相同督臣劉峩即據咨查辦及審明並非賊夥尚待行咨閩省核覆所辦實屬失當我皇上降㫖交部議處並令各省沿海口㟁不得藉口拏匪過事捜求俾商賈不致望風裹足聖天子明無不照緝暴安良務求其實故天下無倖逃之罪亦無不白之寃也同日孫士毅奏言續調粤兵六千名内除預備貼防之二千名已于六月十三日全數俱入閩境其常青續調之二千名内一千名現於七月初五初六兩日已抵閩境尚有三千名未經到潮内一千名已在途次約於七月十七八等日可以赴閩其最後添調之二千名係於七月初一日飛檄行調營分逺近不一自七月二十一二日起定可陸續到潮即最逺之羅定協兵三百名七月盡亦可赴閩至駐防滿兵一千五百名係副都統博清額帶領計程七月二十日後亦可抵閩至需用船隻等項經撫臣圖薩布與臣節次札商寛為預備滿漢官兵儘敷乘坐省城經撫臣派督糧道吳延瑞護送至恵州所屬地方妥為照料臣復派恵潮嘉道圖畢赫迎至恵州所屬彼此交代加𦂳催䟎斷可不致遲悞同日閔鶚元奏言江西省運閩米石先經何裕城咨㑹已全由五福陸路運送經臣同督臣李世傑酌商川省之米由大江順流南下其來迅速且閩廣等船向來秋冬間因北風較多來江南者甚少必需將現在陸續到來之船儘數截留以便侯川米一到即可次第配運並經闗㑹浙省一體趕辦現准浙撫臣琅玕知㑹亦儘力截送來江以資濟運再江蘇省撥運米石分作二次趕運兹據松太道張銘等禀報頭運米五萬石業經於七月初七日自上海啟行臣一面飛移閩省督撫派員在泉州厦門查收並豫行移知浙撫臣通飭沿海汛地一體撥䕶前進再第二運米石已據各州縣運赴上海所需船隻亦以次辦齊現在趕𦂳修艌盤交過載俟報到開行日期另行恭報奏入報聞二十一日丙戌上命軍機大臣傳諭李侍堯曰常青前值林爽文等滋事不法調遣將弁派撥兵丁及解送糧餉火藥等事亦尚有條理旋因黄仕簡任承恩貽悞軍機就近派赴臺灣督辦彼時朕本不甚意滿及常青到彼鼓勵義勇撫䘏難民及一切調撥頗覺井井有條朕心出於望外乃為之稍慰方以該將軍等為可倚恃足資委任數月以來節次奏到各摺屢次打仗雖未見出竒制勝大加勦洗尚無措置乖方錯悞顯然之處至昨日所奏魏大斌前赴諸羅應援至埔心庄遇賊未能前進常青聞信並不親領大兵㑹合進𠞰又僅派田藍玉帶兵一千前往接應似此零星派撥於事何濟又將廣東庄義民留營助勦辦理錯謬無甚於此看來常青等此時毫無主見於𠞰捕機宜竟不能得有把握朕因此實増南顧之憂常青恒瑞二人俱未曽經厯軍務而恒瑞又復少不更事此時随同常青辦理軍務恐其因職分相等又以身係宗室稍存矜貴習氣且未免有袒䕶滿洲兵丁之意於商辦一切事務未能和協亦未可定用兵全在主將和𠂻方能集事若各不相下心存意見以致諸事多有掣肘所闗匪細李侍堯現在駐劄厦門見聞較切且該督久任封彊受恩最為深重伊平日於該將軍等𠞰捕機宜原不應有所軒輊至現在常青等辦理諸務動多錯悞朕日夕焦急特行降㫖詢問該督自應將常青與恒瑞有無意見不和彼此牽掣及該將軍等能否辦理此事可期完竣之處據實覆奏毋得稍存瞻顧再現已有㫖令福康安速赴行在面授機宜令其前往臺灣更换常青督辦軍務但軍中屢易主帥亦非所宜特恐常青等不能了結此事以致因循日久不克蕆功轉不若及早更换尚可保全之為愈此實朕無奈之計也並著李侍堯酌量情形就其所見是否必須如此辦理一并據實速奏上又命軍機大臣傳諭常青恒瑞曰常青等自駐劄府城止於桶盤棧一帶結營株守並未能𠞰殺多賊挪移尺寸之地而於諸羅請兵援救則派魏大斌前往及魏大斌請救又派田藍玉接應似此各處派撥分投堵禦即再添兵一萬亦不敷爾等零星派往之用而爾等仍坐守郡城成何事體此係該將軍曽經具奏之事已如此錯謬不一而足其未經具奏者辦理失當之處恐更不知凡幾何以紓朕南顧之憂該將軍等此時於𠞰捕事宜處處失算不可不急思變計以收桑榆之效為今之計惟有遵照節次諭㫖舍南趨北與柴大紀藍元枚㑹合一處以大兵全力擒拏賊首林爽文搗其巢穴勿再因循貽悞坐失事機以致自干重咎此朕與爾等以救過之路不可不慎朕于用兵賞罰嚴明爾雖未經軍旅豈無聞見不可不知也上又命軍機大臣傳諭劉峩曰現令福康安前來行在陛見俟其到熱河後即令帶領侍衛章京拜唐阿等由驛前赴臺灣督辦𠞰捕事宜所有需用車輛馬匹著劉峩先行預備並派出藩司梁肯堂妥為照料計福康安所帶侍衞章京拜唐阿等不過百人需用車馬等項為數不多該督等務須妥協辦理毋得稍渉張皇致有擾累二十二日丁亥上諭内閣曰兵部奏福建省應行添設站夫未將道里逺近事務繁簡分别聲明難以懸議請勑交該督查明具奏一摺現在臺灣正在𠞰捕賊匪之時所有文報往來最為𦂳要自應酌量添設驛站以便迅速接逓朕早經想及未及降㫖而李侍堯亦並未先行具奏僅咨部辦理未免遲緩此時該省軍務繁多若俟來往行查更需時日所有福建省應行添設站夫即著照該督所咨辦理其各省驛站須有大員専司督辦直𨽻省著派梁肯堂山東省著派繆其吉江蘇省著派通恩浙江省著派歸景照福建省著派伍拉納照料查察毋致遲延貽悞欽定平定臺灣紀畧卷二十六
