  text: 欽定四庫全書欽定平定臺灣紀略卷四十九
  hash: sha256:db2ec4bfc541f3fbeeba1c7481a01db9488cea5e84efc742abe415e680802b65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_049-1a, image: WYG0363/WYG0363-0589c.png}
body:
  text: 十二月二十七日庚申福康安海蘭察恆瑞鄂輝同奏言二十二日大兵至水沙連山口並無賊匪蹤迹臣福康安鄂輝由山右搜入海蘭察恆瑞普爾普由山左搜入渡過大溪見沙上車轍縱橫必係賊人搬眷入山之路遂率領巴圗魯侍衛章京等跟蹤追趕見賊匪千餘擁護車輛行走山梁上另有數千屯劄官兵左右圍繞鎗箭斃賊一百餘名護車賊匪奔上山梁有騎馬賊目一人執旗往來指揮賊衆據險放鎗當令廣東兵及屯練降畨於蕉林竹圍內攀緣先上急欲生得賊目訊問賊蹤海蘭察即直前馳射賊目腿中箭傷登時就獲詢係賊目蔣挺巴圗魯侍衛等復趕殺賊衆二百餘名山下賊眷車牛中炮驚逸自相踐踏死者不可勝計詢據蔣挺供稱林爽文已回大里杙巢穴質之投出村民所言亦屬相符臣等伏思官兵攻剿所向克捷乘勢立搗賊巢已如摧枯拉朽途中若稍有需遲轉恐使賊人從容修補查水沙連山內逸賊雖多祗係零星賊匪不值深入窮追致稽時日况所帶兵丁祗此數千未便逐處派留致分全力因撤調埔心二林舊存之兵移駐水沙連山口臣等即一面向大里杙進殺沿途焚剿虎仔溪萬丹莊南投北投等處賊莊甚多不能悉數二十四日申刻至平臺莊距大里杙迤南五里先商令海蘭察恆瑞普爾普帶同巴圗魯侍衛等往察看地勢情形大里杙東倚大山南繞溪河砌築土城密排大炮內設竹柵兩重城外溝墈重疊防守極為謹密臣福康安將所帶官兵義民分布整齊即令海蘭察恆瑞鄂輝普爾普率領巴圗魯侍衛等進至溪邊賊人於城上施放大炮不敢上前接仗因溪河水勢正深臣等馳馬先渡較步兵行走疾速賊人乘我兵尚未到齊自城內擁出萬餘三面圍褁捨命前撲巴圗魯等鎗箭如雨廣東廣西屯練兵丁亦即趕到爭先涉河攪殺一處斃賊甚多而賊人詭譎異常屢敗不退維時天色昏暮即令官兵在田墈溪邊分隊排開抵敵擬於次日探明路徑合圍堵截並預飭各兵整齊行列不可稍動聲色靜俟賊來剿殺移時果有賊匪潛來攻擾見官兵屹立不動鎗炮大震旋即敗走未逾數刻又自沿溪分路抄截撲至墈邊有賊目一人擊鼓儧催蜂擁前來勢頗凶惡賊目被我兵鎗斃始稍退散如此往返撲壓五六次官兵奮勇攻擊此處賊匪竄回彼處又復踵至逮至丑刻攻擾愈力短兵相接殺死賊目賊匪數百名臣福康安海蘭察恆瑞鄂輝普爾普往來督催分投策應自日暮直至次日黎明官兵力戰一夜痛殱賊衆鎗箭均無虛發而我兵受傷者不過數人二十五日卯刻派兵一面與賊接仗臣等即率同巴圗魯侍衛等由賊巢西南西北兩門分路進攻一擁而入殺死賊目張大林素林成林快江近許三江陳及不知姓名騎馬賊目二十餘名賊衆二百餘名生擒賊目劉懷清林茂二名另行解京審辦隨將劉懷清嚴加訊問跟究林爽文下落據供林爽文原思固守見官兵長驅直入軍威壯盛料難抵敵遂於夜間迎拒官兵時潛回城內帶同眷屬由東首僻路進入大山等語查林爽文本一無賴小民肆為大逆掠邑戕官必當生擒解京盡法處治此次官兵進搗賊巢附近莊民多被賊人褁去無從細詢路徑甫到大里杙臣等即親往查看地勢原擬籌畫攻圍生擒首惡無如連夜打仗營壘未立不及層層進逼拏卡掘壕林爽文即已乘夜入山潛蹤延喘當即分派官兵入山分投搜捕其內山生畨隘口前令徐夢麟諭知屋鰲等社把守要隘兹據該社頭人雅維思畢岱等來營謁見臣已面加慰諭賞賚即令前往大里杙東北內山搜拏逸匪惟水沙連等社生畨在大里杙東南向未與外社相通現已尋覔熟諳畨情之人前往曉諭加以重賞令其一體堵截復嚴飭各處海口添派員辨實力稽查林爽文已成釡底逰魂斷不致稽誅漏網其投出難民臣已分委妥員加意撫輯無不歡欣鼓舞歸莊安業此次攻克大里杙起獲大小炮一百六十餘位鳥鎗二百三十餘桿穀二千餘石牛八百餘隻旗幟刀矛不可勝計惟銀錢等項林爽文向係勒派各莊隨時攢湊是以並無存積現將城堡平燬房屋焚燒鎗炮器械交彰化縣運往鹿仔港封貯並將稻穀散給義民作為口糧牛隻及零星衣物分賞官兵屯練再二十二日賊匪七八千攻圍大肚溪營盤守備丁士偉及新投熟畨奮力抵禦舒亮親率兵丁義民前往接應並令參領扎拉芬七十九等埋伏後路舒亮親帶官兵與賊接仗鎗箭斃賊甚多賊匪等登時敗竄退上大肚山追至半山復有賊衆數千抄截後路扎拉芬等分投攻擊共殺死賊匪四百餘名擒拏活賊十二名即行正法並據徐鼎士徐夢麟稟稱分派官兵義民分作三路與護參將敏祿護逰擊潘國材進剿豬髙莊賊匪數千迎拒潘國材官兵三面被圍經敏祿帶兵䇿應朱龍章等奮勇擊賊立時潰散官兵焚燬賊莊七處殺賊數百名等語兹於二十五日舒亮及徐鼎士徐夢麟由烏日莊豬髙莊兩路至大里杙軍營會合又查逆匪滋事以來所過村莊無不被其擾害而愚民無知被賊人威脅附和順從者在在皆是如大里杙牛稠山菴古坑大埔林中林南投斗六門鹿仔溪烏日莊田中央豬髙莊等處為賊首賊目巢穴屯聚日久官兵從未進攻是以相率附從每遇攻掠地方糾合動至數萬約計諸羅彰化兩縣烏合賊衆不下數十萬人荷蒙恩旨凡脅從之人自行投出者無論從賊與否一槩免其追究自諸羅解圍後附近村莊投出者紛紛不絶惟近山一帶道路未通尚不能家喻户曉及大軍進搗賊巢屢次克捷居民等震懾兵威不敢仍前抗拒其籍𨽻漳州之人自與賊首同鄉尚深疑懼男婦老幼逃入山中藏匿者共有數萬户此項人數甚衆誅之不可勝誅若一嚴行查辦恐堅其從逆之心又益賊人黨羽且臺灣械鬬成風人情剽悍聚衆一處必致更滋事端急應妥為安撫以定民心現在臣嚴密查察訊明村莊户口逐名散給手票斷不虞賊中頭目混入其中稍有疏漏數日內將難民全行招出遣散歸農內山賊勢愈孤不能復行煽動至內山生畨素不與外社相通惟畨社通事間往交易林爽文滋事之初即預為逃竄地步勾結生畨往來稔熟官兵進逼賊巢一經敗竄即入內山臣已選派官兵於進山隘口分投搜捕並諭知屋鰲等十八社生畨協同堵截其水沙連至大里杙山後一帶生畨從未歸化林爽文必在該處潛藏冀延殘喘當此大兵屢捷之後非不可直入畨界攝以兵威但內山路徑﨑嶇林深菁密向來人迹不到軍行糧運跋涉維艱與山外地方可以長驅深入者情形實有不同臣前自元長進兵直至大里杙晝夜趲行沿途打仗原因賊勢猖獗已久利在速平萬一延至春初臺灣天氣炎熱雨水連綿辦理彌形棘手是以乘新兵鋭氣奮勇直前今賊巢已傾惟首惡遁往畨社若不探明賊蹤所至仍前冒險輕進恐搆釁生畨海捕終難弋獲欲速反遲於事殊多未便臣現已尋覔熟諳畨情通事前往剴切曉諭各社該生畨雖係化外之人諭以利害購以重賞即可供我驅遣如此四面布置官兵畨社協力搜拏林爽文所往皆窮斷不能逺揚漏網至南路賊匪雖未全行解散但賊巢業已掃平自不能仍前肆擾臣已屢次知會常青令其相機剿撫擒拏莊大田如兵力不敷仍應倍加慎重一俟首逆就擒臣即帶兵速驅南路至撫恤難民事宜臣已咨調內地官員前來臺灣幫辦兹各莊投出者紛紛不絶而內山逃竄難民為數更多務於撫恤之中密寓稽查姦匪之意較之尋常撫恤尤應倍加周妥其餘無業遊民又可於建城垣時以工代賑藉資口食是撫恤難民估計城工實為此時要務亟須預行籌畫其清查叛産搜拏賊犯家屬等事頭緒繁多亦關緊要臬司李永祺人雖穩妥一人實難兼顧臺灣民情刁悍當甫經平定之後亦非一臬司及道府等所能彈壓必須辦事精細大員方可董率料理撫臣徐嗣曽與臣會晤時曽言臺灣軍務未竣不敢安坐省城情願赴軍營效力稍贖罪戾觀其情詞甚為懇切現在省城並無要務湖南官兵計期已可過省將來撤兵各項事宜有李侍堯駐劄厦門泉州等處足資經理亦毋庸徐嗣曽在彼幫辦應請令徐嗣曽速渡臺灣辦理各項事宜悉心籌酌可期妥協惟查海洋風信靡常難計時日若俟奏摺回後再行移會未免稍遲臣已於拜摺後咨明該撫即行起程由蚶江徑渡鹿仔港所有巡撫印務即交藩司伍拉納暫行兼護再臺灣逆匪滋事以來地方官奮勉趨事義民等踴躍急公自應擇其尤為出力者酌加奬勵臣到軍營後留心察看查有同知徐夢麟原在淡水一帶同副將徐鼎士堵禦賊匪徐鼎士本屬中材從前夾攻賊巢之䇿即係該丞籌畫此次攻克豬髙莊等處該丞率領義民協同官兵打仗尤為勇往且能熟悉畨情派令曉諭岸裡屋鰲等社生熟畨衆搜捕逸匪辦理均能妥協又知縣黃嘉訓於乾隆五十一年十二月運糧至臺灣拏獲偽官劉志賢旋因另案降調經常青奏留署理諸羅縣知縣該員現在護理理畨同知印務隨同普吉保督率兵民收復笨港嗣經臣檄委搜捕西螺餘匪及隨往元長剿賊實為勤幹能事臣已令徐夢麟戴用花翎以示鼓勵且使畨人瞻視呼應更靈其黃嘉訓一員核其勞績本應一體賞給但究係降調人員未免過優仰懇先行賞與同知職銜如果能始終奮勉再行請旨至義民守備職銜武舉黃奠邦捐資招集義民固守諸羅千總職銜林湊率領義民在鹿仔港實力堵禦賊匪此次大兵進剿該義民首等偵探賊情打仗殺賊實屬奮勇可嘉臣均已賞給藍翎面加奬諭其餘各處義民首等有捐資辦公保莊拒賊及奉委招集義民者容俟逐一查明另行分别具奏又林爽文逃逸入山經臣等分派官兵搜捕並面諭屋鰲等社生畨在內山分投堵截令於搜過之處在山頂舉放煙火為號連日見大里杙東北及東面山上煙焰甚多初一日有獅子沙里心生畨社長劉阿里帶領生畨頭人社畨三十六名來營稟稱業已帶領畨衆在山內遍搜並無賊匪蹤迹該生畨等踴躍急公甚為恭順臣已面加曉諭賞以銀牌煙布等物仍令入山搜捕頃復探聞近山阿罩霧平林仔地方現有多人聚集即行派兵前往查係被賊褁去難民而平林仔祗存空莊並無民人居住當將難民等招出歸莊並搜出零星逸賊一百二十三名嚴訊實非賊目亦不知林爽文去向訊明後俱已即行正法查彰化諸羅兩縣地方東倚大山內一層重巒疊嶂皆係生畨居住外一層與生畨隘口地勢交錯多有民人墾種埔地如大坪頂集集埔平林仔鯽魚頭八仙頂等處村落相望道路甚屬叢雜該處地近內山藏姦最易又有逃往難民數萬餘户林爽文雖勢窮力竭遁迹逺揚未必不復思煽聚惟有一面加意招徠散其黨羽一面曉諭賊中頭目令其自行擒獻贖罪立功查有賊目杜敷陳泮二人與生畨最熟見官兵勢盛俱有自行投出之信臣已遣素與杜敷陳泮等相識之人前往剴切曉諭貸其一死如果能將林爽文及家屬等全行縳獻再加優賞諒此烏合匪徒原無恩信見利相圗勢所必至惟林爽文逃入畨社尚無實在下落連日以來招撫難民又不下二萬餘人擇其明白誠實者隔别訊問或云林爽文由火焰山直入畨社或云集集埔大坪頂等處有賊人據險潛聚傳聞均各不同一俟訪得確音如林爽文復由畨社潛赴大坪頂等處臣等即行帶兵前往跟蹤追捕現在貴州官兵陸續到營者已有一千四百餘名其餘不日亦可到全湖南官兵尚無到鹿仔港之信自因風信不順未得放洋此時賊勢雖衰而山內賊匪尚未搜剿淨盡南路遺孽亦須兵力掃除未便將楚省兵丁遽行停止若日內林爽文莊大田全行就獲鳯山一帶俱已肅清再行飛咨李侍堯停其配渡以省煩擾至閩粵二省續行備調兵丁臣已咨明李侍堯孫士毅毋庸挑備并令傳知各營以定人心再前獲賊目蔣挺劉懷清林茂三名因劉懷清患病頗重蔣挺箭傷未愈未即起解今又搜獲賊目何從龍一犯訊係經管賊人硝帳不肯認供受過偽職亦應解京審辦臣已將蔣挺劉懷清林茂何從龍四犯一併交侍衛額爾登保帶同廣西緑營官辨并兵丁二十名令於本月初四日押解起程一面飛咨李侍堯及沿途督撫遴選員辨兵丁小心解送並面諭額爾登保如劉懷清病勢加重不能到京即於途中正法不使幸逃顯戮又諸羅淡水等處民情漸已寧謐被脅之吳天等俱赴梁朝桂軍營投到情願招撫村民贖罪連日以來鹿仔草拏獲賊匪凃同等四名諸羅拏獲賊匪林鑿等八名淡水拏獲賊匪劉雙慶等四名臣已飭行梁朝桂訊明吳天等實係被脅良民免其追究飭諭歸莊仍行分遣妥員設法招徠安輯其各處搜獲賊匪除審係賊目即解赴軍營嚴訊外餘犯俱在各該處即行正法又義民首廩生王維清情願赴鳯山地方招出被脅村民保莊拒賊生員劉宗榮熟諳中路畨情遣令曉諭生畨堵截逸匪旋經義民李光藝帶同來營臣面加詢問大武壠山後即係內攸八社生畨俱與劉宗榮稔熟派往曉諭自可得力查莊大田在南路一帶滋擾與林爽文狼狽為姦互相響應頃接常青札會亦稱府城附近賊匪雖多而民間聞北路官兵屢次得勝人心較前甚為安定是現在南路賊勢已孤而莊大田所住之大武壠地方逼近內山不可不預防竄逸臣已遣王維清前往鳯山曉諭村民並令劉宗榮即赴內攸畨社堵截莊大田入山之路不使逺揚漏網再知府楊廷理原帶義民在三坎店駐劄兹於道通後前來軍營查府城防守事宜現有道員永福等在彼足資料理臣已令該府隨營辦理糧餉撫恤事宜又賊目陶烏帶領賊匪五百餘人投出泣請出力贖罪應免其追究若果能立功自劾再當照莊錫舍之例酌加奬賞以廣招徠同日常青奏言前派守備莊錫舍隨同副將丁朝雄前赴東港剿捕其時廣東莊義民不與會合臣遵旨曉諭嗣後總宜奮力抒忠協同剿賊不必心存岐視不日泉粵等莊且有欽頒匾額用嘉義勇該義民等盡皆感激鼓舞歡忭異常當有粵莊義民募集二千餘人暫時不能來府恐賊人侵擾該莊臣以東港駐兵無多諭令該莊選撥壯健前赴東港協助守禦該港雖近南仔坑等處賊巢現可固守無虞至府城營盤臣內外稽察加意嚴防近日北路賊首潰敗南路賊夥聞風震懾各處潛竄覔食偷生時伏時出十一月三十日又有匪衆一二千來擾營盤當經派撥官兵迎剿計鎗炮擊斃並追殺者共百餘人餘皆奔散兹準李侍堯添派督撫等標兵一千名陸續來臺尚未到齊府城一帶自更足敷堵剿再前經東港獲賊吳豹一名據臺灣府訊非賊目已於十月內正法均奏入上命軍機大臣傳諭福康安常青李侍堯曰生畨頑獷性成貪利而無信福康安當大兵攻克賊巢聲勢百倍逆首窮竄之際正當趂此兵威及鋒而用即勒兵直壓生畨地界諭以禍福則生畨等震懾兵威貪得奬賞自必將林爽文即時獻出實為此事緊要機宜從來用兵之道惟以威勝歷觀前史禦敵之道無不全資兵力即至講和修好納降亦必陳師壓壘使敵人畏威懾伏然後盟約可堅操縱自我即如近來擒獲燕起一事前者燕起已為布魯特葉爾體拜所獲因彼時見無官兵遂仍將燕起釋放此次老格帶領官兵前往直壓要隘始據布魯特部落將伊擒獻可見兵力強盛辦理易於完事此即近事之明證福康安寧未之知何以擒拏林爽文轉不乘得勝兵威鎮懾畨衆今祗差人曉諭生畨懸立重賞則生畨等惟利是視設林爽文窮竄該處將所掠財帛廣為賄結較懸賞之數更多生畨等利其重賂或竟將林爽文私行藏匿不肯擒獻福康安等豈將委之不辦且現據福康安所奏招集畨社止有屋鰲等十六社其水沙連等二十四社外尚有無數畨社若皆購線往招設生畨等私將林爽文放逸而以逃往他社藉口此數十畨社中互相推卸既不能不豫以重賞又仍不能藉生畨之力擒獲賊首有何禆益豈有官兵在彼久住經年纍嵗候其縳獻之理且似此展轉稽延倘林爽文暗中勾結復從內山潛行煽惑别滋事端豈不更費兵力若生畨等受其賄賂揑稱已死亦將信其誑詐遽為完事乎總之福康安等剿捕賊匪雖已攻破巢穴尚未足為功此案逆首林爽文罪大惡極為覆載所不容豈可任其漏網稽誅必須將首逆生擒解京盡法處治方可謂之蕆事前曽有旨令福康安等於剿捕完竣善後事宜交常青等接辦福康安海蘭察等明春趕赴天津加以宴賞今首逆林爽文尚在潛匿搜捕不免多需時日計明嵗巡幸天津時福康安等斷不能趕赴行在竟毋庸遵照前旨急於前來如逆首林爽文拏獲即令海蘭察押帶先行進京福康安於擒獲賊首廓清北路後仍當統領官兵馳赴南路會合常青將賊目莊大田及黨夥各要犯悉數擒拏掃除餘孽收復鳯山將一切善後事宜酌定章程再行起程回京亦未為遲至福康安等摺內稱將擒獲賊目四犯派侍衛額爾登保押解進京審訊一節尤屬無謂此案總以林爽文莊大田為渠魁首惡一經拏獲自應迅速解京若此等賊目並非要犯有何究訊之處又何必派令額爾登保解送况現值搜拏逆首之時正須巴圗魯等在彼奮力進捕乃令其解送此等無關緊要之犯該處豈不轉少一奮勇得力之人今既已起程即令其迅速押解來京以備詢問一切此後如拏獲林爽文莊大田應於海蘭察鄂輝二人內酌定一人押帶前來其餘並非首逆正犯止須審明後即在該處正法毋庸派員解送以省煩擾至恆瑞前已有旨革去將軍並屢諭福康安切實查明參奏令其自備資斧回京候旨今福康安不但不將恆瑞據實劾參令其回京轉於屢次摺內將恆瑞列名在鄂輝之前並於聲敘打仗之處屢將恆瑞露名以見其出力為恆瑞免罪見功地步看來竟係瞻顧親戚有心為之開釋非曰愛之其實害之矣福康安不應如此著傳諭嚴行申飭並著即飭令恆瑞來京候旨無庸留於軍營以免瞻顧又此時逆首林爽文尚在潛逃內山地方路徑叢雜貴州湖南之兵皆係生力素稱趫捷正可資其搜捕現已陸續渡洋前抵軍營自毋庸停止也至柴大紀如祗係小有侵漁私圗肥槖此等劣迹臺灣文武官吏皆所不免朕於他人尚不加深究况柴大紀係有功之人今柴大紀廢弛營伍甚至私令兵丁渡回內地貿易牟利以致存營兵少而於賊匪起事之初柴大紀正值巡閲各營並不即時前往查辦轉回至府城及賊匪距城三十餘里尚不思帶兵出城剿捕此三事是柴大紀最重之案是賊匪日漸猖獗蔓延滋擾竟由柴大紀釀成則伊雖有守城之功而其激變貽誤之罪斷難輕貸將伊按例正法亦所應得即將來核辦時念其不肯出城一節尚堪憐憫亦祗可如黃仕簡任承恩貸其一死而於朝審勾到時仍應綁赴市曺以示懲警斷不能置之不辦顢頇了事福康安李侍堯如查明柴大紀欵迹屬實即嚴行參奏降旨拏問送京治罪又常青接奉諭旨敷衍陳奏並未能帶兵剿殺匪黨擒拏賊目現在福康安已將賊匪巢穴攻克軍威丕振常青正宜督兵進剿肅清南路乃摺內所奏情形僅能自守殊覺無謂常青既不能帶兵奮𠞰竟當固守府城於各海口嚴密巡防預截賊人逃竄之路此事即専交常青辦理上又命軍機大臣傳諭徐嗣曽曰徐嗣曽本係漢員由科甲出身朕因其辦理地方事務尚能循分妥協是以擢用巡撫朕平日信任委用原非若福康安李侍堯可比但以柴大紀如此欵迹昭然在浙江既有聲聞福建自更有物議徐嗣曽豈毫無聞見著該撫即將柴大紀各欵迹詳晰查明確實並此外有無别項劣迹一并據實參奏該撫已往之咎朕已不加深究今經特旨詢問若再有徇隱之處則是自取重戾恐不能再邀曲貸上又命軍機大臣傳諭琅玕曰柴大紀種種欵迹德成自浙江回京傳聞既有確據琅玕身膺巡撫於柴大紀鄉評輿論豈竟毫無風聞且該撫身係覺羅尤非他人可比閩浙本屬毗連聲息相通一有外邊議論即當據實奏聞方為不負任使何以竟未奏及著琅玕將因何不奏之處明白回奏上又諭內閣曰現在臺灣剿捕事宜剋日蕆功所有一切善後事宜俱須大員籌辦徐嗣曽現在省城並無要務即湖南官兵計期已可料理過省而厦門泉州一帶有李侍堯在彼駐劄足資經理徐嗣曽計此時已前赴臺灣著將撫恤難民估計城工及清查叛産搜拏賊屬等事悉心籌辦務期妥協所有巡撫印務著伍拉納暫行護理二十八日辛酉上命軍機大臣傳諭福康安曰福康安等頓兵大里杙欲待生畨將逆首自行擒獻實屬過於持重且據福康安奏稱面諭屋鰲等社生畨內山分投堵截令於搜過之處在山頂放煙為號連日見大里杙東北及東面山上煙焰甚多等語所辦亦未妥協生畨等於搜過地方舉放煙火為號有何辨别福康安所見煙焰安知非林爽文所放是此種號記仍屬有名無實福康安等當官兵直搗巢穴鋭氣方盛時即令一鼓作氣直抵畨境擒拏賊首則官兵等乘此全勝之勢踴躍直前自無難將賊首即時擒獲今頓兵不進則將士等屢勝之後一經歇息未免心存散懈再令其鼓勇奮振其鋭氣必不如前豈能得力福康安等自應親統大兵直壓畨境並聲言官兵即日入山搜捕一面遣人前往曉諭以林爽文現在逃入山內官兵不難直入分路搜捕特以生畨等俱係無罪之人若官兵即往搜山恐致蹂躪擾纍是以稍緩進兵先行曉諭該生畨等若能將逆首林爽文擒獻即當豫以重賞倘助逆黨惡私行藏匿並不即時獻出天兵一到四路剿捕生畨等必致同罹誅戮如此明白曉示諭以禍福俾生畨等既貪得重賞復震懾兵威自必將首逆擒獻可期迅速完事若似此瞻顧遲徊此等頑獷生畨不知禮法官軍久駐何日始能將賊首拏獲耶至福康安此時惟當専以擒拏逆首為要務其柴大紀種種劣迹不妨從緩查辦柴大紀如果有實在欵迹一經查訪無難得實若查辦太急或致柴大紀聞知畏罪自戕轉似福康安忌其有功有心逼迫豈不使造言生事之人妄生議論以為屈害有功之人耶福康安惟當熟籌妥辦二十九日壬戌李侍堯奏言本月十二日侍衛和隆武額爾登保等押解陳獲之逆犯林茂等四名進京自鹿仔港放洋因風駛至厦門登岸詢知福康安破大里杙後本月初五日移營水沙連地方有賊目陳泮前來投誠并將妻子入質自願帶同生畨限初八日以內擒拏林爽文來獻福康安擬以一得林爽文後即從嘉義縣至郡城一帶安撫民畨剿洗餘賊等語查賊目中向聞有陳泮吳領二人為逆爽保守大里杙虎仔坑等處最稱驍悍如果陳泮情願擒逆贖罪看來自必可成兼以南北道路已通是賊匪多已潰散逆首一擒即勢如破竹剿撫並用旦夕可以竣事奏入上命軍機大臣傳諭福康安李侍堯曰賊目陳泮向助林爽文為逆固屬黨惡不法今自謀生路到營投誠若能將逆首林爽文即時擒獻以完此案將來查辦逆黨時陳泮尚可寬一線免其死罪但不可仍留臺灣應酌量發遣新疆陳泮與林爽文同惡相濟必知林爽文逃竄蹤迹今既請限擒獻自必易於拏獲正當加以撫諭令其急思自效以圗免罪至陳泮向與吳領同在斗六門虎仔坑一帶助逆首保護巢穴屢出滋擾看其光景似在莊大田之次現在陳泮已經投誠懇請自效而吳領尚未有下落福康安務須嚴訪蹤迹將吳領一併拏獲不可令其漏網欽定平定臺灣紀略卷四十九
