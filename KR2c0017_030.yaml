  text: 欽定四庫全書欽定平定臺灣紀畧卷三十
  hash: sha256:c5489121c366f8205dfc623bdaabaedc6dabf6f4cec20b79cdb8965c0750a982
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_030-1a, image: WYG0363/WYG0363-0332a.png}
body:
  text: 八月初九日甲辰常青恒瑞同奏言南潭中洲各處之賊又紏衆三千餘人三面來攻大營當派侍衛烏什哈達章京岱森寳總兵梁朝桂等各帶弁兵並令臣常青之子希明随同烏什哈達等迅往迎擊施放鎗砲約打斃賊五六十人賊即敗退奪獲賊砲軍械等件因陣雨路滑随各收兵臣等細思南路賊匪屢次失利倘或潛赴北路合擾諸羅則應援之兵必更阻滯不可不預為堵截因於十二日撥兵二千名分左右隊派令烏什哈達希明梁朝桂等分帶由兩路進攻南潭中洲賊人分頭抗拒官兵鎗砲打斃三四十人奪獲賊械六件賊人敗走官兵追至溪邊泥濘收回十四日又派烏什哈達岱森寳等各帶本隊弁兵并郡城及山猪毛各義民臣等親往督陣調度各官兵分作三路由沙沙崗嵌脚北勢前赴南潭先将賊人藉為遮蔽之叢竹宻箐随路砍伐賊人不能藏伏悉出抵禦約有賊五六千人直来迎撲並與官兵對放鎗砲滿漢官軍用連環鎗子母砲進步施放約斃賊百餘人賊各駭奔三路官兵㑹合追趕由車路干殺進康厝洋乃賊人又於山坎結隊抵拒迎戰官兵齊用排鎗直壓賊遂大潰官兵義民追殺直至南潭燒燬賊人草屋蓬藔數百間餘賊紛竄因該處山徑逼仄天色已晚不便深入即将官兵撤回是日除鎗砲斃賊外又殺賊八十餘名擒匪犯髙深楊老二名奪賊砲械七十五件傷亡兵民照例賞䘏查辦臣等查十四日将弁等帶兵打仗協領海星阿副将謝廷選都司杭冨俱能身先士卒洵属勇往内都司杭冨在金川軍營已戴藍翎現今仍能奮勉臣等将海星阿謝廷選杭富三員一併奨給花翎以示鼓勵其餘查明出力之千把外委等貟遇缺即行㧞擢至此次随同打㐲義民人等内山猪毛前来之廣東庄義民實為勇猛盡力殺賊查其有功受傷者臣等面為嘉奨分别賞給銀牌畨元莫不踴躍臣等察看南路賊匪經官兵連日搜𠞰自不能分赴諸羅結黨聚擾臣等俟雨水漸少兵力敷用即乗鋭前驅殄滅醜孽至續添粤兵内未到之八十五名兵船一隻兹已於十五日齊到又接據逰擊邱能成稟三起各應援官兵於十三日辰刻自鹿仔草庄起行前往諸羅各兵軍装係随帶需用所剰藥鉛帳房鑼鍋等項俱存鹿仔草看守俟道路相通另行搬運遊擊即帶駐剳弁兵四百餘名沿途開路䕶送大兵前進施放鎗砲打敗賊匪四散奔逃直至湯圎店地方将隊伍剳住随令武舉陳宗器黄奠邦監生藍應舉名下義民為大兵嚮導䕶送同往約未刻将進諸羅遊擊仍帶弁兵回鹿仔草固守並據臺灣道府轉稟接據随營巡檢邵宗堯稟稱十三日申刻差役在鹿仔草打聴官兵於本日辰刻三起攻𠞰直前殺退逆匪於午刻巳抵縣城所有解縣銄銀随同前進各等語查應援各兵業已齊到縣城既可保固無虞賊人自必伎窮勢蹙俟接有柴大紀魏大斌等咨報㑹𠞰情形再星馳奏報又武舉黄奠邦義民同兵丁䕶解匪犯蘇普陳紀二名鳳山縣義民武生吳鷹揚等䕶解匪犯陳媽球陳接老陳蘓蔡閣四名内除誤拏之蔡閣一名訊非賊夥保釋被脅随行之陳蘇一名擬遣另辦外其陳紀陳接老二犯俱曽随賊攻城殺人當即訊明正法至陳媽球原籍同安縣於三十七年来臺灣與荘大田賊夥張基光熟識上年荘大田攻䧟鳳山該犯投張基光入夥給有旗號手下有洪富洪義等四十多人在大湖與官兵打仗三次本年因攻府城受傷荘大田許做先鋒五月間至東港各庄派飯纔被拿獲蘇普原籍亦係同安在臺灣生長係林爽文夥黨李七於上年十一月間招入天地㑹至十二月初間林爽文攻諸羅時即領旗號同李七攻入西門林爽文封為存城千總随又同李七攻塩桯橋本年二三四月間俱随李七來攻府城因至打苗庄紏人被獲該二犯罪大惡極應請解交刑部再行確審同日孫士毅奏言聞林爽文等狡詐百出指使零星小賊騷擾各處村庄使之不得耕種而於大里杙賊巢之外築起厚墻如城垣光景擋住我兵捜捕之路其中各處山田徧種禾稻雜粮使将来外間乏食窮民不得不迫而入夥又聞賊人缺少火藥其砲子鎗子鑄造不能如法勢難及逺每於我兵施放鎗砲之後滿地撿拾鉄子用以抗拒我兵臣是以每於㸃送粤兵赴臺時面諭領兵将弁必須賊人見面計鎗砲可到方許施放毋令於相距稍逺之地随便施放不能𠞰賊而轉為賊用又聞大里杙後山名曰三湖三湖之後即係生畨地面此内數處生畨已為賊人所戕佔住村落為将来竄伏之地臣思該處内山皆係生畨地面此數處生畨雖為所戕其餘為數尚多似可就近設法宻遣熟畨進山曉諭生畨人等逆賊林爽文與爾等勢不兩立爾等若不再同心協力𠞰除賊匪将来爾等地方勢必盡為所佔剴切諭知則以畨攻賊或者亦可得力又聞逆犯已於水口暗造賊船數十隻希圖危急之時逃入洋面臣係属風聞不知水口確實地名伏思𠞰除賊匪寧可再遲一月半月至一經𠞰除必須生致賊首盡法處治現在既以厚集兵力定可計日成擒應将賊人竄逃詭計先為絶其生路庶為周妥同日藍元枚奏言彰属自條圳塘東螺西螺數十庄約計一萬餘人多係同安彰州民人内中因畏焚殺從賊不少臣随令武生陳大用係同安人武生鍾竒英係漳州人分頭前往詳細曉諭各村庄人等令其保守村庄各安生業旋據稱各庄百姓俱皆感激改悔不敢從賊臣籌度西螺賊匪雖衆係藉該地百姓脅從鳩聚若該地之人不敢附和則林爽文撥来竄踞之賊亦属有限勢易攻殺但西螺離臣營盤五十里若臣帶兵前往恐一聲張則賊匪必先設備於事轉為無益是以派撥守備張奉廷帶兵五百名先去貼防二林於七月十七日宻令該備帶兵同二林義民武生陳大用等自二林由嵌頭厝進攻西螺又令牌頭兵民由條圳塘前進夹攻使賊首尾不能相顧當日西螺一帶賊匪共有千餘人並無防備一見官兵猝至俱鳩集西螺溪旁迎敵被官兵施放鎗砲打斃數十賊人賊見各該地村庄從賊之人俱無出来救應随即逃散生擒賊匪程甫一名奪獲竹牌牛皮牌二十三面大小旗八桿焚毁條圳塘中埔厝等處大小賊庄十三庄因西螺村庄係是廣東良民居住被賊所佔是以未令焚毁以示區别但西螺離斗六門不逺兵力稍单未便剳營該守備仍帶兵駐剳二林嚴加堵截至添調漳州官兵四五日内諒可陸續渡到鹿仔港倘守風未到臣仍統現在官兵相機𠞰捕又臣族中約有二百餘人遷居彰化縣属耕種度活本年七月十四日有藍啓能等男婦共七十九人並無行李自山内漳浦藔前来營盤據稱因臣帶兵在鹿仔港恐賊来迫脅去大里杙是以連夜逃走出来等語其有無從賊殊難慿信當即發交䕶同知黄嘉訓彰化縣宋學灝㑹同研訊據藍啟能等供稱在彰化耕種度活住居漳浦藔山頂離大里杙賊巢四十餘里因係僻逺賊匪所以不来滋擾後聞本族藍提督至鹿仔港恐賊匪聞知怕我們暗通消息必定要逼我們到大里杙去若進大里杙便是賊黨連夜各帶家属從小路下山来三更時候把路賊人攔住我們拼死抵敵當時被賊殺死藍任等三人又拏去藍湖等七人女眷十一口現在不知下落如今求安挿等供查藍啟能等男婦七十餘人俱是空身逃出衣食全無臣一面自行捐給口粮若藍啟能等山路熟識以便随𠞰賊匪較為得力仍一面留心宻訪倘其中有曽經從賊者當即明正典刑斷不敢稍為姑息均奏入上命軍機大臣傳諭福康安常青李侍堯孫士毅藍元枚柴大紀曰本日常青等奏摺僅係派兵𠞰捕情形並未大敗賊冦擒獲賊中有名頭目何足以痛示懲創俾賊黨聞風奪氣且賊目荘大田既在南潭官兵前往𠞰捕時即應偵探賊目所在督率兵民奮力窮追以期一鼓就獲乃屢次俱稱遇雨路窄收兵回營而於荘大田是否尚在南潭一帶藏匿抑係逃往北路之處並未提及實属糊塗著傳㫖嚴行申飭至南潭一帶賊人藉為遮蔽之叢竹宻箐現經常青於搜𠞰時随路砍伐所辦較好且此事早應如此辦理該将軍等統兵前往北路遇有似此深林宻菁處所即應随路砍除廓清道路不使賊人得以潛藏方為妥善又此次随同打仗之廣東荘義民甚為奮勇出力止賞給銀牌畨圎尚不足以酬勞著常青查明實在出力者㧞補武弁數人俾該義民益知踴躍奮勉逰擊邱能成帶兵䕶送火藥軍装等項前抵諸羅亦應陞賞武舉陳宗器黄奠邦監生藍應舉各率義民為大兵嚮導䕶送同往亦属可嘉俱著予以官職用示奨勵至孫士毅所奏具見留心官兵與賊相遇毎於賊人尚逺之時即行随便施放鳥鎗既不打斃賊人而鎗子轉為賊匪撿用最為緑營惡習自應曉諭兵丁如法施放方為得力至賊匪潰敗恐其逃入内山已早經降㫖令該將軍等曉諭生畨奨賞花紅布疋令其縛獻而海口一帶尤應先事嚴防絶其去路著将原摺及朕批示抄寄常青等閲看並著将孫士毅所奏各節即行悉心籌辦庶於𠞰捕有益藍元枚雖調派官兵分路攻𠞰西路賊匪兵威較為振作但尚未能統兵前進擒拏賊首賊目大加斬獲本不應加以賞賚但以族人藍啟能等男婦共七十九人因所住地方離賊巢不逺恐賊匪逼令從賊各帶家屬從小路投出又藍任等三人被賊攔住殺死拏去藍湖等七人眷属十一口不知下落藍任等三人俱着加恩賞䘏至藍元枚所奏投到之藍啟能等若能熟識山路即令随同𠞰賊其中如有曽經從賊者仍請查明正法等語則所辦尤為公當可嘉之至藍元枚著即賞給緙絲蟒袍一件御用大小荷包以示奨勵至藍啟能等挈其老弱自行投訴其畏賊迫脅自屬實情如有熟悉該處路徑者正可用為眼目嚮導令其随同征𠞰更為得力且既自行投出亦當遵照前㫖令其自新從前有無從賊之處可以無庸追究上又命軍機大臣傳諭常青李侍堯琅玕曰逆匪紏結黨夥肆行滋擾如係擒獲助賊頭目闗係𦂳要之犯自應解京確訊盡法懲治至於附從夥黨拏獲後即當随時正法何必紛紛解京現在陳媽球蘓普二犯尚非若廖東連清水等得受偽職者可比徒勞驛傳殊覺無謂此時早至内地即著李侍堯将該二犯立行正法或業經觧至浙江地界即著琅玕查明該犯等觧至何處即在該處正法毋庸觧京滋擾累也同日保寧奏言川省前辦米二十萬石據總理川東道黄軒等具報頭二起共米十萬石已於七月十九二十四日開行其第三四起米十萬石總可以八月初五以内受兑開行至續辦米三十萬石雖為數較多業經飛飭各属接續動碾現在近處亦已具報起運八月初旬即可陸續運至重慶接續過載發運惟查川江船隻上自重慶起下抵楚省之漢口止更迭往来經厯灘險非他處人舟所能經涉據川東道及重慶府㕔縣等稟現在重慶除已雇稳固大船二百八十隻運米二十萬石外其餘現止有大船一百二十隻通查留雇約僅敷載十萬有零恐停米待船不免遲滯一面飭該府等嗣後續到重慶大船槩留雇用外並飭忠䕫等属沿江文武挨查上峽客船催令赶赴重慶交載又查湖北宜昌荆州二處附近川東下峽船隻亦有在彼卸載者已飛咨湖廣督撫一面徑檄宜昌荆州二府查明該處現有之空船墊給工價飯食即押令溯流而上交川省地方官轉押赶赴重慶供用並委員馳赴該處㑹同查辦約計八月内亦可陸續凑集不致乆滯臣又飭委䕫州府知府穆克登布忠州知州巴寧阿㑹同䕫州協副将三音畢里克圖重慶鎮中營遊擊管隆阿自重慶起至湖廣交界沿江一帶分段往来催儧並多撥兵役哨船照料䕶送奏入上命軍機大臣傳諭保寧舒常曰此項運閩米石本為軍儲要需寛為儲備之用止須源源接濟若如該督所奏将川省船隻及湖北宜昌荆州等處船隻紛紛押僱既有累商民且恐不肖州縣及吏胥等從中需索藉端滋事尤為未便况江浙等省全賴川米接濟若将川省湖廣船隻盡行封僱則商販無船装載川米即不能轉運各省米價必致騰貴於民食大有闗係該督何見不及此著保寧務須設法妥辦無庸将川省湖廣商船概行封僱止需陸續撥運源源接濟期於要需無悞而商販仍不致有所妨碍方為妥善臣等謹按川省續辦運閩米石因船隻不敷装載檄飭宜昌荆州二府凡有下峽空船俱令押赴重慶受載固見辦事急公我皇上早籌及閭閻生計若該省盡将船隻封僱則商販無船轉運各省米價必致騰貴而胥吏復得從中需索滋弊聖明所見甚大所慮甚周委曲指示俾得有所遵循故不特軍儲充裕而商民亦均無妨碍也同日孫士毅奏言此次添調滿漢官兵一萬一千名赴臺㑹勦從此自可一舉蕩平斷無庸再行添調苐軍營情事未能懸揣萬一将来因分路勦捕再有續調必需尅期應付查一距潮千里以内一切營分俱須巡防海口現在抽調已多即督提二標亦已調過四千名勢難再撥此外髙亷雷瓊等營均係海疆更闗𦂳要且距潮二千㡬百里旱路居多臣斟酌情形似難議調惟粤西𦂳接粤東較之本省髙亷一帶計程為近又係一水可通倘将軍常青等再行咨調可於粤西附近粤東營分抽撥三千名計數尚不為多再右翼鎮及提標兵共一千五百名於七月十七八及二十日入閩省詔安縣境此時俱已到厦候風開駕查添調之緑營兵六千名計㸃送入閩及已到臺者共有四千五百名尚有一千五百名因與駐防滿兵一千五百名途次相值臣飭令譲過滿兵即在後尾随行走以免擁擠計數日内滿漢兵共三千應均可接續㸃送入閩奏入報聞十一日丙午李侍堯奏言前以本省營兵不敷差防奏請照派往臺灣班兵之數沿海各營先募十之三上遊各營募十之二此苐為内地營伍空虚起見實未計及将来再有調發之處兹節次接奉諭㫖應再廣為召募苐查諸羅現已解圍軍聲日壯近據同知楊廷理吳元琪稟稱本月十四日官兵焚燒南潭見賊藔内只有蕃薯並無米糧又被害之同知王雋家人逃回稱賊目尚有米可吃賊夥惟喫番薯又各賊目不復相睦多有欲投誠者雖賊情狡詐未可盡慿然漸有涣散之勢等語是南路賊勢已衰看来内地可不必再募兵數萬臣前所奏募十之二三約可得三千有餘嗣又増募漳泉兵二千共已得五千有餘今請再於泉州及沿海各營募兵五千約共成一萬之數臣仍以募兵三萬為詞使外間傳説其實分開各營召募外間但見處處増兵固無由知其實數也如察看臺地情形或尚未旦夕可了則随時再行増募以新兵存營訓練而以已練之舊兵派往亦足應手至臣前以東港被陷已兩次配繒船二隻兵二百名派往鹿耳門防範今再派兵前往沿海𠞰殺必須水師而内地水師各營現因米船被刧等事尤須巡緝洋面毎營除防汎外不過存兵三百及數十名不等實無可再調今於陸路各營内凑兵一千名配渡前往移㑹常青留在軍營進𠞰而於在臺之水師兵内換出一千以資沿海𠞰賊之用查臺郡安平港内本有戰船數十號可就近配載或在沿海搜捕或向東港𠞰殺則海面既有防禦而征兵亦不致短少矣其領兵大員查内地總兵副将内多係一人兼署數缺實亦無可再調擬於叅遊内酌派一員帶領前往再查鹽水港係府城由海道赴諸羅之水路現有柴大紀所派遊擊楊起麟帶兵一千駐守魏大斌又留兵五百名協防並未被賊佔㨿該處距府城近而距鹿仔港較逺藍元枚須自鹿仔港出海乗船南行方至該處今賊攻諸羅不利倘乗藍元枚兵出之後来鹿仔港及北淡水等處滋擾則藍元枚又須折回查藍元枚前奏増兵四五千即可直攻大里杙之南或攻斗六門等語今漳兵三千已開洋前往粤兵二千現亦陸續到厦配渡是當責成藍元枚即從前路進攻大里杙斗六門等處既直逼賊境賊必不敢来窺鹿仔港及北淡水即或繞道來窺藍元枚可以就近兼顧似不必赴鹽水港轉須自南而北更覺紆回臣已移會藍元枚仍向大里杙斗六門等處進兵與柴大紀㑹合相機攻𠞰奏入上命軍機大臣傳諭阿桂福康安常青李侍堯藍元枚柴大紀曰據李侍堯奏召募兵丁及臺灣賊匪情形一摺所辦籌畫精詳可嘉之至前因鹽水港賊匪糾衆滋擾思欲斷絶粮道是以諭令藍元枚察看情形帶兵前往鹽水港将賊匪𠞰殺再赴諸羅會合柴大紀今據李侍堯奏鹽水港距府城近而距鹿仔港較逺恐藍元枚帶兵南行賊潛至鹿仔港滋擾藍元枚又須折回即一面具奏一面移㑹藍元枚令其即從陸路進攻大里杙斗六門等處尤合機要用兵之道原當相時而動今該處情形既有不同自不當拘泥辦理也至南路賊匪粮食就盡其夥黨乏食且互相欺奪彼此不睦各情形係臺灣同知等稟報自當確實現在常青藍元枚兩路應添官兵已據李侍堯先後派撥自早已全抵該處常青藍元枚急應乗此軍威壯盛賊匪潰散之時一面妥為招撫一面速赴北路將斗六門等處賊匪𠞰殺廓清道路前抵諸羅與柴大紀㑹合一處直搗賊巢以期一鼓成擒十二日丁未常青恒瑞同奏言連次派兵數千應援諸羅軍中偶染暑濕疾病者又十有二三故南路賊首莊大田等探知消息又糾衆於附近各處潛伏窺伺是以臣等於十二十四等日督兵搜𠞰一使其不敢侵犯府城一截其分助北路賊黨合擾諸羅之路乃敗退後仍未潰散毎有乗間抵隙之虞現在時刻嚴防實未可以暫時鬆放且臣等劄營闗帝㕔與賊打仗屢經得勝凡被脅之人已知賊匪難敵官軍又見莊錫舍所帶投誠數百人以及山猪毛義民皆隨營効用此等脅從之人聞此風聲自不願始終從賊茲據附近各里庄出具互結請給腰牌歸庄者現有千餘人臣等酌量概行發給該里庄等咸以官軍南向隠有所恃若遽舍南趨北既恐近府賊窩又思竊發而已經安業各庄不無惶惑俟暑氣漸減道路漸乾添調之滿兵粤兵亦可到營即當乗鋭前驅一舉集事再赴援諸羅三起官兵於十三日自鹿仔草起行兹於二十日接據邱能成續稟官兵至今並無消息差丁前往諸羅探聴柰道路不通現於十七日賊匪圍攻鹿仔草自辰至未鎗砲斃賊甚多賊始退去但現存鹿仔草軍裝藥鉛等項未便疎虞乞賜添兵前来會同固守倘聞諸邑有鎗砲之聲俾得帶兵前往夾攻等語查應援三起各兵軍装係随帶需用所剰藥鉛等項原存鹿仔草看守不可不加𦂳保䕶且各官兵於十三日前赴諸羅至今尚無文報而賊又回攻鹿仔草則其勢似復猖獗已派撥遊擊董秉燦管帶本標兵四百名由海道趕赴鹿仔草協同防禦奏入上命軍機大臣傳諭阿桂福康安常青李侍堯藍元枚柴大紀曰今日據常青奏到情形則又似南路賊匪仍未潰散尚在窺伺滋擾而於賊匪乏食一節並未奏及以掩飾其不即分兵往北之咎是誠何心且常青等派兵應援諸羅及軍中偶染濕疾之處使賊目等預先探知消息又復糾夥窺伺似此機事不宻誰實當其咎耶况常青等所慮官兵若舍南趨北恐近府賊窩乗間竊發安業各莊不無惶惑一節殊不思常青恒瑞同在府城營盤原令一人統兵前往北路一人留營駐守並非令二人一同前往一兵不留在府城營盤也府城營盤既有兵防守又有大員統率弹壓有何可慮豈得因賊匪牽制並不挪移尺寸之地若云保䕶村庄則各處村庄甚多即數萬之兵亦不足敷零星分撥防守豈又將増添大兵乎况現據常青奏賊匪圍攻鹿仔草遊擊邱能成請兵接應常青又添兵四百名前往等語似此零星派撥於事何益總由常青等並未帶領大兵前往北路是以賊匪猖獗於魏大斌等前赴諸羅之後又復潜出鹿仔草滋擾思欲邀截軍装火藥等項是仍中賊之計也今常青等既知派遊擊帶兵四百名接應何不親統大兵前往痛加𠞰殺廓清路徑似此弁兵四百豈能得力且鹿仔草係僻小村庄前後皆有賊匪此四百官兵應須口粮從何接濟若再有挫失咎将誰任常青於此等事何茫無主見若此又藍元枚處亦屢有㫖令其統兵自北而南直抵諸羅合兵㑹𠞰乃亦並未前進看来常青藍元枚總因持重怯懦畏葸不前常青不免蹈黄仕簡覆轍而藍元枚遷延觀望亦與任承恩相仿伊二人受恩深重非如黄仕簡之老病頽廢任承恩之少不更事者可比若再事因循其獲咎将甚於黄仕簡任承恩矣朕為爾等畏之現在浙粤二省駐防緑營及續調漳州兵早已到齊計此㫖到時節候又届深秋暑氣已减雨水已稀該将軍更復何所藉口惟當乗此兵力厚集新到鋭氣及鋒而用㑹合進𠞰若俟福康安到彼一舉蕆功伊二人将置身何地耶至南路被脅從賊之人已知賊匪技倆難敵官軍附近各庄民人俱請給腰牌歸庄該将軍等即應妥為撫慰設法招集遵照前㫖或令入伍或令歸農俾聞風投出解散賊黨方為妥善至柴大紀處於魏大斌等前抵諸羅後如何攻𠞰殺賊其邱能成所押軍装火藥於何時在鹿仔草殺退賊匪直抵諸羅並著迅速具奏同日舒常姜晟同奏言楚省碾運閩米十萬石自初十日起運頭批為始陸續開行徑從長江運赴鎮江一面飛咨李世傑預偹接運船隻應於何處換載並或由上海或由乍浦出口之處均候李世傑等飭行調度再湖南省運閩米石臣舒常現已咨㑹湖南撫臣浦霖一體遵照奏入上命軍機大臣傳諭舒常姜晟浦霖曰前因江西五福一帯溪河淺窄竹笩撑運遲緩是以諭令楚省省運閩米石俱由江南出口海運旋㨿何裕成奏稱五福濬流修路以來夫役漸衆竹筏亦多楚省米石即可以由江西陸運等語因復降諭㫖将湖北湖南米石一併由江西五福一帶接運赴閩今舒常等自係因未經接奉前㫖乃有此奏著即遵照續降諭㫖由江西陸運較為妥速况江南封僱海船亦覺竭蹷莫若徑由江西陸路以省往返稽遲也同日孫士毅奏言粤東再派兵一千名抽調尚易臣即将潮属各營抽撥一千名速應軍營之用其軍装火藥鑼鍋帳房等項臣俱早令各該營先期預備計檄調文到一日即可集事内除潮州鎮標存城兵距黄岡一百里可以朝發夕至此外近者八月初一二逺者亦不過初五六等日均可㸃送出境至駐防滿兵一千五百名分作四起自省起程七月二十五日頭起已經赴閩計至二十八日四起均可出境至尾随滿兵行走之緑營兵一千五百名臣已預飭地方官多備夫役擡送軍裝即於二十九三十日分作兩起出境至現在添調之一千名八月初即可接續前進再臣思北路又請添兵似𠞰除逆賊尚非旦夕之事所有昨請預偹粤西兵三千名若在西省地方等候計自行文到彼以至抵潮出境至速亦須一月仍屬不能應手惟有調駐閩粤交界處所既可遥壯聲援使逆賊聞之震恐氣懾萬一接咨添調則陸程五日到厦由厦到臺照常不過三四日不出十日軍營已收臂指之用如逆賊即日蕩平則此項兵丁仍由水程囬至粤西沿途所費無幾奏入上命軍機大臣傳諭孫士毅曰據常青等奏𠞰捕事宜已漸次就緒現在各處調派官兵陸續配渡此時巳可齊抵臺灣儘足敷用所有孫士毅奏請預備粤西兵三千名竟可不必以省滋擾欽定平定臺灣紀畧卷三十
