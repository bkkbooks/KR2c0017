body:
  text: 二月初五日戊戌福康安海蘭察鄂輝同奏言將拏獲首逆林爽文賊目何有志及節次拏獲各要犯隔别研訊緣林爽文自幼來臺灣趕車度日交結無賴行竊為匪乾隆五十一年八月十五日林爽文與林泮林領林水返張回何有志等在大里杙山內車輪埔飲酒結盟互相約誓有難相救結黨搶奪適有楊光勳楊媽世倡會械鬪案內逸犯逃在彰化經地方官差役查拏有差役黃姓傅姓訪查曽入天地會之人藉端索詐人心不服林泮王芬林領林里生等起意拒捕招林爽文入夥經伊族長林繞林石等勸阻將林爽文藏匿山內糞箕湖地方林泮復來糾約遂決意聚衆謀逆十一月二十七日副將赫生額逰擊耿世文知縣俞峻帶兵至大里杙查拏在大墩住宿賊匪乘夜劫營全行被害二十九日攻陷彰化縣十二月初六日攻陷諸羅縣其淡水之賊於初七日攻陷竹塹城南路之賊于十二日攻陷鳯山縣四處紛紛響應雖彰化諸羅旋經收復起事之林泮王芬林里生各犯亦被官兵義民殺死無如帶兵各員株守一方不能及時進𠞰賊匪得以從容修備將大里杙地方築城挖壕斗六門菴古坑集集埔水沙連等處要隘亦皆竪立木柵壘砌石墻屯聚糧米勒派農民等分季納租山田按一九抽收水田按二八抽收公然以北路一帶村莊屬其管轄迫脅各莊民人於於辮頂之外留髮一圈以為記認林爽文見黨羽附和日衆自稱盟主偽號順天賊夥內稱林爽文為大哥彼此相稱為兄弟受過偽職之有名賊目等不下數十人令林領林水返據守附近賊巢一帶之烏日莊田中央等處陳傳拈據南北投蔡福占據菴古坑李七占據斗六門劉懷青董喜陳梅為之主謀林爽文自五十一年十二月三十日往犯府城未陷並未再往總在嘉義縣及笨港鹽水港地方滋擾以嘉義為全郡適中之地滋擾更甚圍困數月之久必欲攻陷至上年十一月內嘉義圍解後林爽文連夜奔回賊巢二十二日舒亮一路官兵進至大肚溪劄營林爽文親率賊夥前往攻擾左臂中鎗從前所聞在嘉義牛稠山受傷之處係屬訛傳並無其事及大兵攻克大里杙時逆首由火焰山逃至集集埔以為退守地步並希圗抄截官兵後路旋經大兵併力攻克賊之精壯能打仗者多被殱戮始竄入內山畨界此北路逆匪等起意謀逆及滋擾煽誘先後各情節也其南路逆匪亦係天地會內之人莊大田實為渠魁該犯雖與林爽文附和一氣究係各分黨類不相上下其起釁情節容俟𠞰平南路拏獲莊大田再行訊明具奏惟查林爽文狡黠性成供詞閃爍其所供聚衆滋事商同謀逆各情多有不實不盡而於天地會起自何人之處反覆究詰該犯匿不供吐因係解京要犯未便遽行刑訊其供出助逆賊目等姓名除業經拏獲正法外未獲各犯出示懸賞按名嚴查務期盡絶根株不使稍留餘孽再林爽文等係逆案首犯渡海解京道路遙逺必須大員督解舒亮人甚明幹堪以解送現在𠞰賊大局已定軍營分路帶兵者尚不乏人即將林爽文等一起逆犯交舒亮帶領章京辨兵等押解赴京舒亮於軍營一切情形皆所深悉亦可仰備垂詢其先後拏獲有名賊目二十名首逆眷屬五名口業已分作三起㨂派妥幹員辨解送所有各起逆犯現於鹿仔港登舟徑渡蚶江但恐風信靡常或吹至厦門崇武兩處亦未可定臣已飛咨李侍堯於各處海口地方預行派撥官兵等候不問何處登岸皆有官兵護送不致稍有疏虞又自進兵以來義民首等隨營進𠞰人思自效實為奮勉可嘉其中最為出力者查有嘉義縣義民首黃奠邦鄭天球王得祿元長莊義民首張源勤隨同打仗搜拏賊匪並購線招出賊目等離間賊黨又各差義民假扮賊裝四出偵探賊中情事纎悉皆知得以預為籌畫甚屬勤幹能事再淡水義民王松髙振葉培英東勢角義民首曽應開熟諳內山路徑深悉畨情前經臣委令徐夢麟招致屋鰲獅子等社生畨即係王松等前往曉諭逮賊匪遁入內山之後該義民首等導引官兵進𠞰並於要隘地方嚴密堵截不使首逆逺揚所辦均屬周妥臣已將黃奠邦等八名核其勞績分别賞給翎頂以示奬勵至淡水同知徐夢麟明幹能事熟悉畨情辦理𠞰賊一切事宜甚為出力將迤北一帶生畨全行招出親至三貂險僻之處堵拏賊匪並於所屬淡水地方沿山通海各要口分布義民設卡防守極為周密又南安縣教諭郭廷筠試用鹽大使張均軍需局委員革職通判鄭一桂在厦門招集漳泉義勇隨至臺灣軍營臣以郭廷筠籍𨽻閩省於臺灣情形最為熟悉凡購線擒拏賊眷賊目及撫諭義民訪探賊情等事多交該員辦理實能不辭勞瘁認真妥辦其張均鄭一桂往來督催糧餉鉛藥運送迅速自進兵以來從無貽誤官兵在斗六門𠞰賊時張均因送鉛藥前進適遇賊匪猝至當即殺賊一名拏獲活賊黃褒一名實為奮勉可嘉懇賞給徐夢麟知府職銜郭廷筠同知職銜鄭一桂知縣職銜俟大功告竣再行送部帶領引見至張均以文職官員保護鉛藥親殺賊匪應請令戴用藍翎以示優奬又閩安協副將徐鼎士調赴淡水堵禦賊匪尚為出力自臣到臺灣以來遵檄由大甲溪進兵人雖不能如徐夢麟幹練勤能亦屬奮勉可嘉但業已因公降調懇仍留閩省以副將補用並賞戴花翎以示奬勵又聞南路賊匪多聚鳯山縣水底寮大穆降等處地方近聞官兵𠞰平北路賊匪多在近山一帶潛匿間或至郡城及山外村庒遙放鎗炮亦不敢逼近營盤莊大田等及有名頭目占據大武隴地方為負嵎死守之計該處大山圍繞溪深嶺峻山僻路徑處處皆通中有四十餘莊如礁吧哖街大湖莊樂陶庒后堀臘皆係賊人巢穴而虞莊加拔莊赤山保等處皆有賊人出沒此時進𠞰南路賊匪必先搗大武隴賊巢覆其根本並將該處通往鳯山之路飭令山豬毛義民在旗尾莊畨薯藔要隘堵截一面令永慶帶領總兵陸廷柱巴圗魯侍衛果爾敏色副將官福等就近由府城往攻水底藔牽綴賊勢大武隴西面臣前已派蔡攀龍帶兵駐劄灣裡溪烏什哈達駐劄哆囉嘓梁朝桂駐劄茅港尾鄭國卿駐劄白水溪一帶進逼其東西一帶內山生畨已諭令熟識畨情之貢生張維光生員王宗榮通事黃彥黃三才王和等前往曉諭各社生畨協同堵𠞰並令臺灣縣知縣王露差貢生張維光密諭大武隴內之粵莊畨社招集義勇以為內應一俟各處布置妥協即令烏什哈達帶兵一千名內地同安義民一千名由哆囉嘓前進梁朝桂帶兵二千名繞至阿里港一帶迎頭堵截臣等即統率大兵分路進攻大武隴一破南路賊匪自成瓦解之勢至北路各處村庒民心甫定仍須酌量留兵鎮撫地方搜緝逸匪自應於緊要隘口分劄營盤以聫聲勢酌令普吉保留駐東埔納逰擊夏承熙留駐斗六門都司田智留駐南頭副將徐鼎士留駐大里杙都司陳士紛留駐彰化都司朱龍章留駐淡水北路一帶統共留兵四千八百名足資彈壓其餘各處營盤概行撤去聽候調遣惟鹿仔港鹽水港係近海口岸地方難民寄住者甚多仍令總兵李化龍都司楊拜揚在彼稽查彈壓至淡水極北之三貂蛤仔欄地方道路險逺向為藏匿姦匪之藪臣前因逆首未獲恐其潛行逃往訪知該處有租墾畨地之吳沙許天送二人素與生畨熟悉因諭令密購生畨導引官兵入山搜捕並飭徐鼎士徐夢麟帶領兵丁直入該處堵截兹據報稱已於正月初二日前抵三貂吳沙等帶領生畨出山逺迎詞色甚為真誠並遵諭分派蛤仔欄東西勢等社生畨扮作抽藤打鹿之人分布要路截拏首逆等語現在林爽文雖已就擒但恐逆案內有名逸犯潛逃該處亦未可定復飭知該副將等轉飭吳沙許天送嚴密緝拏並令徐夢麟仍回淡水徐鼎士仍回大里杙搜查餘匪以靖地方再林爽文之二弟林躍興與林爽文同逃入山在打鐵藔失散據淡水兵役於竹塹小坑內搜獲解送訊供後即將該犯歸入第四起應解逆犯內一併解京查林爽文家屬惟伊三弟林勇一名尚在南路潛匿大兵進𠞰時即當設法嚴拏務期必獲以盡根株又古州鎮標都司朱化英等帶領兵丁九十四名配坐陳合興船隻渡洋被風吹回金門鎮地方船隻擊碎淹斃都司朱化英千總陳汝志兵丁六十名其餘辨兵扶板漂流登岸另配船隻現在已到軍營原船內鉛藥器械俱已沈失請將淹斃人等照陳亡例議恤其扶板得生之外委顧大成胡天祥及兵丁等俱已酌量給賞以示體恤再提訊林爽文之父林勸供稱原住平和縣小溪火燒樓地方父母葬在義冢現已將原籍村庒及葬墳處所飛咨李侍堯俟查有確切根據即行刨挖不必將義冢內墳墓概行發掘轉致該處民人聞風驚懼李侍堯自能妥協辦理莊大田係鳯山縣篤家港人訪聞莊大田之父莊二本住嘉義縣屬台斗坑莊置有田畝給與莊民黃畨耕種莊二即葬於該庒附近地方莊大田於莊二故後始遷往鳯山隨令柴大紀帶同知縣陳良翼至圳仔頭山仔頂地方將莊二墳墓掘開骸骨挫焚其所存台斗坑田産照例入官歸于叛産內一併辦理奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰前據福康安奏分派巴圗魯及義民屯練等改裝易服於老衢﨑地方搜獲林爽文但究係何人首先擒獲未據奏及想係軍務匆遽無暇詳及又林爽文之二弟林躍興已於竹塹山坑內搜獲林躍興是何人所獲自應加以奬賞即詳查具奏嘉義縣及淡水等處義民隨同官兵打仗殺賊並購線偵探擒捕匪犯實屬奮勉著福康安即向各義民等詳加詢問如伊等情願頂帶榮身不欲出仕者各聽其便其情願出仕者著福康安量其才具分文武咨送吏兵二部帶領引見候朕酌量補用實缺以示鼓勵又前經溫州鎮總兵缺出曽諭令福康安於帶兵出力之副將徐鼎士格綳額二員內比較何人最為出力即奏請升補兹據奏徐鼎士另案得有降調處分未便遽升總兵請仍留閩省以副將補用並請賞戴花翎自應如所請行其溫州鎮總兵一缺格綳額是否堪以勝任即據實覆奏以便降旨又劉懷青一犯現經解到審訊其為林爽文主謀一節皆諉之董喜林水二犯供詞狡展現仍令軍機大臣嚴行刑詢後即行正法外其供出之林水及現在究出之陳梅等已據奏拏獲均俟解到逐一嚴審至董喜一犯據林爽文供帶病跟到集集埔已經身死所供恐不足信又劉升一犯亦係起意糾衆之人在內山衝散不知下落該犯既起意糾衆亦未便任其漏網著福康安查明董喜是否實因病故劉升曽否續獲毋任􅊵脫又大武隴係南路賊匪巢穴自應先行摧破使賊無所依據現在大兵四路密布莊大田等自不難立就生擒惟該犯見林爽文係在內山生畨地方被官兵拏獲自不敢復逃至內山潛匿惟防其由各路海口竄逸則洋面廣濶官兵乘船追捕恐擒獲有需時日前經屢諭常青令於各海口要隘嚴密巡防著福康安再嚴飭各海口辨兵梭織防守並傳諭徐嗣曽普吉保等不時督率巡察如莊大田等由海道竄逸則惟伊等是問恐不能當此重咎也福康安于擒獲莊大田後即令海蘭察巴圗魯侍衛等先行內渡其應撤各兵即行陸續撤回福康安俟料理一切善後事宜大局已定亦即先行起程其零星未獲無關緊要逸犯即交徐嗣曽普吉保等在彼督率查拏再此次福康安分派鎮將在大武隴附近一帶堵截已將蔡攀龍派入而柴大紀則從未派領帶兵可見蔡攀龍在彼較為出力而柴大紀竟係懦怯狡詐無用為福康安所深憎是以不加派委柴大紀究竟如何貪縱營私廢弛不職並著據實覆奏前因林爽文糾衆肆擾勢正猖獗是以欲將伊祖墳刨挖以泄衆忿今首犯林爽文業就生擒其父母兄弟妻子合家俱被拏獲即其三弟林勇現在逃往南路將來大兵搜捕莊大田自無難一併拏獲是林爽文業罹族誅其祖墳亦不值再行查辦且據供係葬在義冢內難以辨認若因此概行刨挖未免波及無辜或致衆心惶惑著傳諭李侍堯如林爽文祖墳查明確實自應行刨挖若查無確據亦可無須辦理至臺灣姦民倡立天地會起自何人林爽文匿不供吐該犯係屬首逆應解京盡法處治此時福康安自不便加以刑訊閲其供詞內稱常聽得説漳泉兩府設有天地會邀集多人立誓結盟等語漳泉兩處民人素不相睦林爽文原籍漳州其黨羽亦多係漳州人而義民鄉勇等籍𨽻泉州者居多林爽文自係欲借此扳陷以泄其忿看來天地會名色竟係漳州匪犯所倡與泉州無涉俟林爽文解到時嚴行刑鞫自無從狡展臺灣𠞰捕事務剋日完竣該處一交三月氣候即已炎熱各省派調官兵難以在彼久駐節經諭令福康安於辦理善後事宜時祇須留兵數千以資彈壓其餘官兵應行陸續撤回令其各歸本處現在福康安統兵前往南路自可即日蕆功著遵照前旨俟大功告蕆後除臺灣應留額兵外應將素耐炎熱之貴州湖南二省兵丁酌挑數千留彼彈壓其餘次第渡回內地各歸營伍將來大兵凱旋渡洋不但福康安海蘭察及領兵大員等不可冒險輕渡即微末辨兵亦不可輕易涉險總須俟風色順利再行開駕即稍遲時日亦屬無礙總期全臻穩順上又諭內閣曰此次福康安等統率官兵前往臺灣𠞰捕逆匪未及兩月即將首逆林爽文生擒解京大功指日告竣固由福康安等調度有方所向克捷而將辨兵丁等隨同𠞰捕亦俱爭先效命用能掃逆擒渠妥速集事殊屬可嘉前已有旨令福康安查明咨部議敘本日據福康安奏請將出力之侍衛章京將辨等分别賞給巴圗魯名號加升職銜翎頂均照所請行其餘將領等仍著福康安查明咨部一併議敘兵丁等優加賞賚以示朕奬勵戎行至意上又諭內閣曰向來官兵巡洋遇風淹斃俱照陳亡例議恤今都司朱化英千總陳汝志及隨行兵丁等調赴臺灣征𠞰逆匪渡洋遇風以致淹斃多人尤堪憫惻著交部俱照陳亡例從優議敘其扶板得生之外委顧大成胡天祥以及兵丁等並著福康安照落水得生之例從優給賞以示軫恤初六日己亥上命軍機大臣傳諭福康安曰朕閲藍鼎元所撰平臺紀略朱一貴糾衆肆擾經官兵各路追捕朱一貴逃入民家鄉民等設法擒拏解赴施世驃軍前朱一貴昻然而立妄自稱孤藍廷珍命捶其足始與其黨皆跪伏罪請死今福康安將逆首林爽文生擒當縳至軍前之時其語言動作如何情狀曽否跪伏乞死及其黨夥一同請罪抑尚不知畏罪懼刑肆無忌憚如朱一貴情形著福康安詳細覆奏初八日辛丑上諭內閣曰前據福康安奏調赴臺灣協𠞰之貴州吉州鎮標都司朱化英等帶領兵丁配船渡洋被風吹回擊碎船隻淹斃都司朱化英千總陳汝志並兵丁六十名已降旨將員辨兵丁俱照陳亡例從優議恤苐念黔省官兵向來打仗甚為得力今調赴臺灣協𠞰遭風淹斃官兵共六十餘名之多實堪憫惻除官員交部優恤外此內兵丁原額名糧以養家口兹雖得邀優賞而糧缺業經空出其家口養贍無資生計不免拮據著再加恩交該督撫即查明被淹兵丁係馬戰步守何項額缺即照其原缺將伊子孫挑補如無子嗣者即于弟姪內㨂選挑補若係餘丁亦即挑補守兵俾資養贍臣等謹按軍志以致果為毅而奮不顧身殉于戰陳者厥有議恤之例至于徵兵協𠞰泛涉鯨波猝遇颶風之變以視臨陳捐軀者似稍有間而聖慈矜惻特比于陳亡之例而優恤之猶且念其家無仰給之資復命于其子孫內挑補名糧額缺俾得養贍蓋皇仁如此其厚睿慮如此其周也凡我戎行者有不聞而倍生感勵者哉同日李侍堯奏言現在臺灣北路逆首就擒餘匪亦經𠞰除福康安等移兵南路乘勝搜捕莊大田等不日定行擒獲計凱旋之期甚近內地應行籌備事宜臣已督同總局司道次第辦理查本省及各省官兵不下四萬有餘自應分起撤回以免擁擠除咨商福康安于酌留彈壓之外何路官兵由何處開洋內渡酌定咨覆俾得預期備辦其最要者莫如船隻一項臣查福康安過臺時隨帶官兵義民及糧餉藥鉛等項共用船一百三十餘號又渡載貴州湖南官兵并續運糧米鉛藥等項共約計二百餘號是鹿仔港現有船隻已敷配載之用至鹿耳門前此渡載官兵等項船隻前經該處留船三十餘號備用又運送糧米藥鉛等項船約有四十餘號今再撥船六十號前往候渡兩路官兵俱可源源配載又前此賊匪未盡之時內地營兵自不得不寬為儲備今逆首林爽文業已擒獲解京軍務可剋期告蕆即屆征兵歸伍之期所有上年新募兵丁原係暫備差􅋵非為久逺之用其嵗需糧餉遞年計算所費不資自應通盤籌核俾存營無冗設之兵而內地營制繁簡適均本不至有兵單之慮即漳泉厦門一帶係濱海要區俱有提鎮大標其兵數俱足資控衛無須更議增添臣再四籌酌如將新募兵丁一時全行裁汰辦理似覺過驟然俟其出一缺方補一兵未免需時過久仍屬多糜糧餉臣現在已通飭各營遇有額兵缺出毋庸另行招募即以新兵撥補舊額至新兵自陸續募補以來已閲半年有餘如技藝不見長進未臻嫻熟即陸續裁汰至各營所募新兵多寡不同今于新兵較少之營分遇有額兵缺出即於新兵較多之相近營分移撥抵補似亦挹彼注兹之一法其中有不願赴别營就伍者並準其辭退另為撥補臣查上年派往臺灣出征兵丁內傷亡散失約有數千名所帶餘丁甚少本不敷頂補今臣於先後所募新兵二萬名內酌留五千名為抵補征兵額缺之用其餘一千五百名即督率各標營分别兵數多寡酌量辦理如補額無需五千名亦即遞行減退似此辦理自不見有裁撤之迹而兵數仍可符原額即糧餉亦無慮日久多糜奏入報聞初十日癸卯李侍堯奏言被賊脅從之犯陳駐等十三名訊無助賊抗拒官兵情事應給駐防滿兵為奴但福州距該犯等本籍太近擬發江寧駐防兵丁為奴奏入上命軍機大臣傳諭李侍堯曰江寧與閩省亦係一水可通之地各海岸俱有船隻來往易于逃回原籍此等人犯竟應發往吉林黑龍江兩處給兵丁為奴以防其竄逸滋事十一日甲辰福康安海蘭察鄂輝奏言正月十四日分路發兵派普爾普帶領格綳額伊常阿謝廷選等由內山僻徑直趨大武隴北面並令通事曉諭生畨協同堵截鄂輝帶領許世亨烏什哈達六十七等由西南哆囉嘓洗布埤一帶進𠞰復派參將特克什布逰擊葉有光沿山搜查逰擊吳秀在後接應以杜賊匪奔竄之路復探知莊大田及林爽文之弟林勇因大兵將至留賊目等看守大武隴賊巢復在郡城一帶出沒並令牛莊賊匪攻擾灣裡溪村莊希圗截斷郡城要路臣福康安海蘭察恆瑞即帶領袁國璜穆克登阿特勒登徹岱森寶春寧及巴圗魯侍衛等于十五日劄營灣裡溪令蔡攀龍亦就近帶兵前往十六日進至牛庒賊匪二千餘名排列迎拒臣等即分路進攻齊放鎗炮橫衝賊陳賊匪支持良久始行敗走過溪猶恃該處水深溜急阻溪抗拒不肯遽退有騎馬賊目二人往來指揮官兵一擁過溪射死賊目一人項下挂偽印一顆鐫刻定南將軍蘇魁字樣官兵盡力追趕殺賊五百餘名復射死賊目一名擒獲賊目陳獻瑞等四名活賊七十餘名奪獲大小炮位鳥鎗旗幟刀矛器械無算乘勝前進於十九日直抵南潭大穆降一帶有賊匪三千餘名在沿山九社口分劄兩營臣等督率巴圗魯官兵奮勇直前賊即棄營潰散正在追趕忽有賊匪從道傍斜徑抄截官兵分投迎擊復殺賊六百餘名擒拏活賊二百七十餘名常青亦帶兵自沙岡前來會合臣等即在南潭劄營商令常青仍回關帝廳營盤駐守是日有賊目許大花等七名棄械投降據稱莊大田窮蹙竄逸並無定所臣等即令許大花等前往跴探一得確信即行蹤跟搜𠞰設法生擒斷不使逺揚漏網至大武隴山內為賊匪久占巢穴該處粵庒畨社頗知向義前經派令貢生張維光前往曉諭粵民等即同四社畨勇自南仔山小路至噍吧哖街焚燒賊藔數百間殺賊二百餘名賊匪等見民畨效順不敢復在該處屯聚俱退至大武隴山口把截以抗官兵適鄂輝許世亨烏什哈達六十七于十九日帶兵前進賊匪競放鎗炮抵禦我兵撲上山梁先占髙處復從山上壓下攻克本縣莊頭社趕過大武隴河賊匪大敗殺賊三百餘名拏獲活賊一百餘名奪獲大小炮位火藥炮子及鳥鎗刀矛五十餘件是日普爾普一路亦由內山大埔等處搜𠞰至大武隴隘口賊匪抵死抗拒自山溝內分作兩路來攻普爾普帶領格綳額伊常阿謝廷選及劉懷仁李自昌劉越等分路迎出力戰半日殺死賊匪四百餘名拏獲活賊一百二十餘名餘黨即行潰竄查大武隴地方路徑叢雜係賊人占據之地必須多兵𠞰捕方可盡絶根株不致散而復聚因復令鄂輝由南面搜入普爾普由北面搜入臣等即前往岡山一帶迎頭搜捕務將大武隴賊匪盡數殱除則鳯山賊匪益孤無難尅期蕆事其嘉義以北原設各路官兵除柴大紀仍駐嘉義張萬魁仍駐阿里山彈壓地方外其餘相度地勢酌加改派令蔡攀龍駐劄灣裡溪巡防石仔瀨鄭國卿及守備郭朝龍駐劄哆囉嘓巡防十八重溪逰擊黃象新駐劄灣裡渡頭巡防三坎店聫絡聲勢直達郡城維永慶陸廷柱等原擬派往水底藔牽綴賊勢但郡城重地兵力究不可過單而水底藔在臺灣極南負山面海地勢極為險逺以郡城久疲之兵帶往攻𠞰恐難深恃且聞該處賊匪有自行投出之信若派出官兵辦理稍不妥協或致驚揚于事轉屬無益是以暫停派兵前往另行籌辦已分派永慶博清額梁朝桂尹德禧陸廷柱帶兵堵截打狗港竹仔港海口與沿山之山豬毛義民一體截拏逸匪辦理似更為嚴密又接據烏什哈達鄭國卿稟稱初八日有大武隴賊匪阻截十八重溪要路不許居民投出經烏什哈達鄭國卿及都司吳壯圗分路帶領官兵義民熟畨等進勦追過山後殺賊百餘名擒拏活賊二十餘名十三日賊匪又來圍搶畨社被畨勇射死賊匪甚多次日仍來肆擾烏什哈達帶兵前往接應賊匪敗走各等語查鄂輝普爾普等進勦大武隴已將賊匪全行殺散其北面之十八重溪要隘業經臣派兵巡防餘匪不致竄逸又據義民首鄭其仁稟稱水底藔庒民鄭武烈等及附近庒民黃已良楊連等同賊目陳超鄭珠陳天運陳棕陳香自行投出復倡率庒民擒殺賊目賊匪數十名奪獲鎗炮器械收復枋藔北勢各莊情願設法擒獻莊大田立功贖罪等語水底藔等村莊極為險逺今既震懾軍威不敢負嵎抗拒自應準其投誠殺賊自效臣已派副將張芝元伍達色知府楊廷理前往曉諭因該處附近均係粵庒即派廣東兵五百名交張芝元等帶往駐守與粵庒義民互相援應堵截賊匪更可得力至臣帶兵南下沿途察看情形難民等俱搭蓋草藔暫行棲止農田亦有翻犁耕種者各處留駐營盤搜緝逸匪稽查彈壓俱屬嚴密自水沙連至斗六門灣裡溪各處民人俱已歸庒搬移家具貿易往來者相屬于道大兵所過莊民相率跪迎鹽水港鹿仔草等庒亦有耆老逺來迎接地方均為寧謐惟水田山地尚未全行播種其灣裡溪以南一帶村庒悉被賊人焚燬居民逃散現已出示諭令歸庒即行查明撫恤其郡城內外之義民甚屬歡欣踴躍臣已逐加慰諭查明出力者分别賞賚並據山豬毛義民副理事劉繩祖黃衮邱宏章帶領防守郡城之義民前來懇請隨營打仗臣當即傳見親為奬勞先行給賞並留心察看該義民等果係勇敢強壯立心報效實與他處義民不同以之𠞰賊必能得力臣已準其隨營仍劄諭粵庒總理事舉人曽中立等在沿山一帶堵拏賊匪容俟大兵進𠞰鳯山時再當優加奬擢以示勸勵又前因北路已平逆首就獲不須復增兵力隨於初九日移咨李侍堯倘湖南兵船尚在候風即可停其開駕撤回本省兹據總兵尹德禧稟報所帶官兵業于十二日由鹿仔港登岸若令即日撤回亦須至港口候風不能尅期徑渡此時雖大局已定不日可以竣事但南路地方內山與海岸相近水陸要衝均須多兵堵截且當逆匪初平之時官兵日益增多聲勢壯盛更足以鎮定民心是以仍令該鎮帶兵前赴軍營聽候調遣奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰官兵在牛庒地方與賊匪打仗射死賊目項上挂有定南將軍蘇魁偽印一顆射賊者係屬何人著查明具奏官兵一抵南路即屢得勝仗賊匪紛紛逃竄其庒民賊目等又情願為官兵偵探賊蹤縛獻莊大田以贖其罪實屬極好機會而沿山沿海一帶又屢經福康安派兵分路堵截諒莊大田罪惡貫盈斷不能復行脫或此時已將該賊目生擒捷報業經在途不日自可遞到至南路地方內山與海岸相近既須多兵堵截且官兵日增聲勢更為壯盛所有此次湖南官兵自應仍赴軍營俟擒獲莊大田再行撤回亦不為遲况湖南兵丁性能耐熱將來撤兵時即可暫留該處以資彈壓欽定平定臺灣紀略卷五十四
