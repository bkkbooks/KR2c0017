body:
  text: 六月二十五日辛酉藍元枚奏言彰化賊匪時刻窺伺鹿仔港所有田中央南投莊大肚溪三處隘口屯聚賊夥緊守大里杙賊巢皆築堤决水防備官兵進𠞰而諸羅縣屬自五月初七日起陸續焚搶沿海之安溪寮龍船窩鐵線橋等莊計二十餘里以致諸羅彰化道路不能相通其近海民人因賊焚莊多有搬家乘船逃到鹿仔港而鹿仔港居民見賊蔓延未免惶惑致有殷實店戶欲搬家口貨物渡回泉州臣竊思若殷實之人搬回內地則民心愈虛隨即親到街市慰諭禁止令其各安生業并飭護同知黃嘉訓彰化縣宋學灝稽查難民妥為安撫內有勇壯者挑作義民給與口糧交義民首管束在難民得有口糧之資兼可幫助官兵戰守之用民情已漸安貼但鹿仔港周圍村莊現在僅存二十餘里又迫近賊巢不得不加意防守已經派撥官兵義民在畨仔溝馬芝遴兩處險要安設營盤增添堆卡防範已屬周密似可無虞又另撥官兵義民往二林大突沿海一帶堵禦遙為諸羅聲援查有彰化淡水交界之大甲溪岸裡社係附近大里杙之北該處義民熟畨頗知義理不肯從賊經密差幹辨由海道往大甲曉諭義民鼓勵畨衆令其攻迫賊巢以分賊勢臣細察情形如果聲勢得以聨絡便可率兵攻擊大里杙之南再淡水竹塹一帶據閩安協副將徐鼎士等稟報淡水白石湖賊本無多已經拏獲從賊之參革守備彭喜一名解送督臣究辦現在賊匪勢孤逃入金包後山臣即飛飭該副將等速將逃散賊匪𠞰捕務盡根株再查鹿仔港難民雜處稽查尤宜嚴密以防賊匪潜入滋事是以差派辨兵四處偵緝適據辨兵拏到盜犯張凑劉楓經迫勒薛四銀兩并搶奪牛隻又在路上截搶不識姓名婦人物件訊供不諱雖非林爽文賊黨但當擾亂之際截途搶剝必須從嚴懲治俾衆人咸知警畏當即將張凑劉楓正法同日李侍堯奏言笨港為諸羅通海要口自府城海道北至鹿仔港必由笨港經過向來府城諸羅鹿仔港陸路已不通惟恃沿海用小船往來今笨港已失該處船隻必多為賊所得又將在海口攔截滋擾則不惟府城鹿仔港信息益不能通而內地糧餉火藥等項由厦門解至府城由蚶江解至鹿仔港雖係橫海徑渡不從笨港口經過然賊或探伺駕船在海面邀截亦不可不防是以臣酌撥繒船二隻每隻安炮六位水師鎗兵一百名令營員帶往一駐鹿耳門口一駐鹿仔港口彈壓防護庶免踈失至從前原擬浙粵等兵一到臺郡即可席捲而北今常青甫經出城已為賊阻而水陸兩路信息又且中斷則欲待常青由南而北正需時日是目下只可南北各自為戰庶羣賊不至盡萃于一處然臣閲藍元枚摺稿尚須待聫絡熟畨始行舉動伊雖未奏請添兵然至挑選難民協同守禦亦似有賊多兵少之慮令常青方請添兵若又須接濟藍元枚則需兵更多徵調更廣臣查漳州鎮兵四千上年因林爽文黨羽皆係漳人故獨未調撥若派往藍元枚處以漳人統漳兵或可得力之處業經具奏仍一面札詢藍元枚如伊自量可以帶領得用俟覆到日擬將此內選派有眷屬之兵二千前往接濟再藍元枚投文兵丁王德到泉詢以賊中情形據稱賊匪甚多兼有鎗炮臺灣亦出硫磺賊匪在大里杙自行製造並不仰給外來等語隨檢查臺灣府志有硫磺山出産硫磺在淡水㕔北一百八十里焉知非賊匪即由該處私挖製用副將徐鼎士現駐艋舺與硫磺山相近臣已札藍元枚速飭該將前往察看如有賊匪私挖即行擒殺勿使透漏又鳳山縣有硫磺溪或係因該處産磺而名亦札㑹常青令其于南路進兵時一併體察防範同日常青恆瑞同奏言賊匪等于六月初一日辰刻分四路前來臣等親臨行陳督率將辨兵丁向前施放鎗炮打死賊匪約三百餘人奪獲行營炮一尊賊匪狡詭異常正與官軍對壘之時又令黨夥潜犯府城之小南門大北門二處其北門營盤經副將丁朝雄知府楊廷樺等率領兵民各放鎗炮將賊打退其南門桶盤棧營盤有賊二千餘人直來攻撲臺灣道永福親督鄉勇分派義民隨同辨兵並逰擊左淵等各帶兵丁齊赴接應鎗炮打死賊匪約數十人乘勢追趕又殺賊十餘人賊人之受傷者更多即時奔散初二日臣等復派遣鎮將等帶兵向前搜𠞰並先分路埋伏以備從旁截殺賊等恃其人衆仍來抗拒官軍鼓勇前進施放子母連環鎗炮又打死賊數十人賊即敗逃因中路賊人决溪放水道路盡為泥濘即便收軍初三日夜賊人又來偷劫營盤因派有辨兵各處預伏一聞炮響賊遂驚逸初五日早探得賊目莊大田現在南潭令其夥匪千餘人到府城大北門外十五六里蔦松等地方聚黨焚劫臣等帶同副將官福派撥前隊兵一千名令副將蔡攀龍侍衛富克旌額章京官寶等帶領並臺灣道府分派義民交同知楊廷理親帶隨同前往又派撥二隊兵五百名令總兵梁朝桂章京德成額他思哈等帶領又令烏什哈達岱森寶等帶兵一千名在大北門外沙嵌下預備截殺本日立時馳往行至蔦松一齊向前奮擊賊人不及防備倉猝抵禦尚敢力戰官軍鎗炮齊發打死賊約二百餘人義民等殺賊割獻首級耳記髮辮生擒賊匪湯其曽表曽順謝佛邵長等五名奪獲鎗刀旗箭等械又奪獲牛羊米鹽地瓜乾當將該犯交道府等訊明另辦其牛羊鹽米地瓜即分賞義民賊衆俱各逃竄我兵亦間有傷亡者惟是賊匪雖衆如僅嘯聚一二處或與官軍對靣打仗自可剋期决勝今賊人自中路大武隴南至鳳山一帶一百五六十里大小村莊皆被賊人盤踞而現在相近軍營又令其匪夥分踞崙仔頂南潭中洲蔦松等處其地勢路徑既係竹箐叢雜又多曲折低窪若遣兵近迫則蜂擁竊發及結陳逺攻又巧避潜藏是以賊人屢敗不退官兵未得盡力窮追必須多用重兵自可盡殱醜類至臣等現在駐營距府未逺聲息時通且相為犄角斷無後顧之慮又從前鎮將等禀報攻克各縣除鳳山復失外正月間柴大紀收復諸羅縣城復有義民首武舉黃奠邦等協力堵禦是以城內居民得以照舊安業賊雖屢犯俱被殺退陳邦光以署守偹防守鹿仔港泛地止有泛兵五十餘名其能攻克彰化擒拏賊犯係該處義民首林凑等糾募多人始得協同集事緣義民等本住居鹿仔港不能在縣守城且公私積貯焚劫已空並無糧食可支亦非陳邦光一人所能守禦是以將受困官親及居民男婦同回鹿仔港保守是柴大紀陳邦光禀報攻復諸羅彰化尚非謊報冒功至副將徐鼎士現在淡水該處地方遼廓醜孽易聚其民人懇留彈壓亦係實情謹據實覆奏至投誠之莊錫舍臣等已給豫守備職銜並酌請賞戴藍翎其屬下人等又分别其出力之林福生等十六名一概給豫金頂伊等泥首叩謝情願報效此時頑梗之徒聞風定知悔罪但莊錫舍從前雖有二千餘人其中脅從者衆未必盡能臨陳自投順之後有願歸肩挑負販之業者即仍聽其解散現在尚能打仗並訪探賊情熟識路徑者共二百五十餘人俱造冊另記給與口糧隨營聽用又臺灣缺額兵現擬于義民中願充兵者募補惟前在鳳山潰兵之未回者尚多俟事竣確查嚴辦現在府城鹿仔港等處兵民復䝉于內地籌撥銀米並撥運浙江江西二省倉儲源源接濟充裕有資均奏入上命軍機大臣傳諭常青李侍堯藍元枚曰彰化賊匪將沿海各莊陸續焚搶以致諸羅彰化道路不能相通則文報信息必致阻隔前次柴大紀與普吉保在埔心莊訂期進兵因諸羅有賊攻擾即帶兵回縣堵禦今賊匪又將道路梗阻必係賊人素恨柴大紀思欲併力攻圍柴大紀自前月二十八日具奏後至今總未據續奏朕心深為厪念著藍元枚務將該處梗阻道路之賊匪上緊設法打通並一得柴大紀如何堵禦𠞰殺之信迅速加緊馳奏至鹿仔港居民見賊蔓延致有殷實店户欲搬家口貨物渡回泉州藍元枚一經聞信即親到街市慰諭禁止令其各安生業以固民心所辦甚得窽要前經降㫖令常青藍元枚等就郡城鹿仔港一帶廣行招募即曽經被賊迫脅附從者一經應募投到不妨即令食糧充伍今藍元枚于未奉諭㫖之先已將難民勇壯者挑作義民給豫口糧令其幫助官兵自屬得力即豫錢糧入伍均無不可並著常青于該處被難民人亦應一體挑募給糧充伍于𠞰捕更為有益至大甲溪岸里社之義民熟畨不肯從賊現經藍元枚差辨曉諭令其攻迫賊巢分掣賊勢一俟聲勢聫絡藍元枚即率領官兵前赴大里杙之南相機攻𠞰所辦甚合機宜至彭喜一犯曽任守備乃竟敢從賊甚為可惡即著李侍堯于審訊後委員速解赴行在審究昨念及內地解往糧餉火藥等項關係緊要若被賊要截貽悮非小已諭令李侍堯務須遴委妥員小心押解毋致稍有踈虞又鹿耳門及鹿仔港各口岸皆全臺要隘文報兵糧往來梭織恐賊匪狡黠心生窺伺已于數日前降㫖令常青等酌派將備加意防守今李侍堯已能想到及此撥兵分駐甚為妥善又硫磺山出産硫磺著藍元枚即就近飭副將徐鼎士認真稽查如有賊匪私挖等事即行擒殺勿使透漏前常青奏請添調官兵早經降㫖調撥現在賊匪雖四處蔓延但究係烏合之衆並非皆能臨陳打仗之人其勢自易潰散昨已降㫖令常青藍元枚各在府城鹿仔港就近召募現在各該處民人如何踴躍應募及賊匪有無投誠充伍之處著常青等即行具奏此次添調各兵前抵臺灣尚需時日常青等斷無株守坐待之理如遇有可進之機即應乘勢設法進𠞰以期集事看來常青處兵氣已為振作賊匪雖多業經連次𠞰殺紛紛潰散無難漸次殱除常青年逾七十親厯行陳督率侍衛章京將備併力向前人人用命朕心深為嘉奬著賞戴雙眼花領參贊藍元枚自抵鹿仔港以來一切調度合宜打仗得勝伊係藍廷珍之子伊父從前𠞰辦奸民朱一貴收復全臺奮勇克捷聲威久著今藍元枚在鹿仔港統兵進勦能繼家聲實為可嘉亦著賞戴雙眼花翎以示優眷臺灣道永福知府楊廷樺率領義民打仗亦屬奮勉可嘉均著賞戴花翎該將軍參贊等務須督率文武各員倍加勉力奮勇進攻以期搗穴擒渠膚功迅奏昨據孫士毅奏六月初九日將預備在潮州兵二千名分隊起程此時已可抵閩著李侍堯于兵到後即先行撥赴常青軍前應用其粵省續行調撥到緑營兵四千著李侍堯再將二千名令由蚶江配渡前赴鹿仔港接濟藍元枚至預備漳州兵昨據李侍堯奏到已諭令應行派往藍元枚處該兵丁既有眷屬可無他慮李侍堯即當派往原不必札詢藍元枚此㫖到日藍元枚自早覆到此項兵丁想即派令起程前赴鹿仔港矣藍元枚處有此添調兵四千更為充足若往大里杙一帶進攻自屬得力其餘添調滿漢各兵俱著隨到隨即派赴常青處此內廣東浙江駐防滿兵更較緑營得力常青得此多兵聲勢益壯又廣為招募賊勢日見解體自可望剋期蕆事也至鳳山潰兵前據常青奏投回府城有一千一百餘名續據柴大紀奏又稱有潰兵五伯餘名已有㫖許令戴罪圖功是前次鳳山兵丁潰散已回者數目不甚相懸或柴大紀因𠞰賊事務煩促未經咨㑹常青處該將軍止須于柴大紀處核對即可得實在數目至臺灣百姓被賊侵擾焚燬村莊耕種失業該將軍等于收復各路時務妥為安撫俾得盡力補種各安本業既可免其失所更得多獲糧食兩有禆益此為最要二十六日壬戌上命軍機大臣傳諭常青李侍堯藍元枚曰常青等所請添調各兵到彼尚需時日前經降㫖諭該將軍等再行抽撥兵丁數百名擇將備中可恃者飭令帶領在城幫同防守常青等徑統領官兵舍南趨北㑹同藍元枚等打通斗六門一帶進逼大里杙賊巢使賊匪聞知驚惶進退無據以為出竒制勝之計常青等接奉前㫖曽否即行派撥與藍元枚柴大紀等訂期前往倘因附近府城一帶賊匪四處屯聚不能分兵舍南就北朕意現在添調之兵業經李侍堯將預備兵二千先行配渡孫士毅預備兵二千又于六月初九日起程計此㫖到彼此四千兵均可齊抵臺灣是常青處又添生力兵四千聲勢日壯昨據常青等奏賊目莊大田現在南潭又令其夥匪到府城北門外蔦松地方聚黨焚劫而相近軍營賊人又分路崙仔頂中洲等處潜藏竊發是郡城附近四靣皆有賊匪潜聚豈有不思先著待賊人來犯始行剿禦之理况臺灣郡城于未添兵以前久已保護無虞今若再行抽兵撥辨添守自更可無慮該將軍等徑親帶侍衛章京將辨直趨南潭將賊目莊大田屯聚賊匪悉力𠞰殺若能將莊大田擒獲則其餘蟻聚夥匪自即望風而潰設各處夥匪前往南潭奔救更可乘勢聚而殱戮此亦出其不意攻堅擒渠之一策著常青等將是否可以如此辦理之處酌量情形迅速辦理一面具奏固不可冒昧輕進亦不當坐失事機也至李侍堯昨日奏稱笨港被賊占據即撥繒船安放炮位令營員帶同水師鎗兵分駐鹿耳門鹿仔港等處此事最關緊要朕早經慮及已降㫖諭令該督加意防範而李侍堯一聞笨港有失即能慮及于此若能沿海一帶要隘保守無虞將來大功告成時此亦李侍堯之一功也現在海口有無阻滯之處並著李侍堯查明覆奏臣等謹按臺灣逆匪滋擾官兵進𠞰止能于賊來堵禦從未乘勝長驅痛加殱戮故烏合之衆益肆無忌憚我皇上前以常青等奏請添兵曽諭以舍南趨北攻其不備實為出竒制勝之策兹復以賊目莊大田現在南潭即命以防固府城率領將辨直趨南潭悉力𠞰捕擒其首惡分踞夥黨自必驚惶潰散扼要爭先計無逾此神鈐逺燭備示機宜么䯢小醜何能久肆鴟張乎七月初二日丁卯閔鶚元奏言前准何裕城咨查海運情形並無運米實在數目當將江西省由蘇分運之米計若干石及蘇省現辦海運情形飛咨何裕城令其迅速咨覆以便預備旋據李世傑札㑹江西省撥運閩米已酌令八萬石來上海過船起運當即飛飭松太道並移㑹浙省一體加緊凑備船隻應用奏入上命軍機大臣傳諭何裕城閔鶚元曰江西運閩米石何裕城自應查明陸運海運何路近便即令于何路迅速運閩檢查舊案既有改由海運較為便捷之案又何必待江南咨覆始行起撥又不將運米實在數目咨明以致江南難以預備船隻何裕城於軍務要需互相推諉殊屬非是著將此項米石究於何日運至海口裝載起運之處據實覆奏初三日戊辰李世傑奏言前據何裕城咨稱江西省現在碾米十萬石赴閩分作六起委員從建昌府新城縣之五福地方陸行八十里即至閩省光澤縣水口轉運前進又檢查舊卷有由長江載至江南上海關口由海運閩之事應咨明江蘇省現在海船是否充裕可以迅速載運等情臣查事關軍糈至要總以迅速為主緣接到何裕城來咨之時正值浙省運米赴閩海船不敷移咨撫臣閔鶚元在上海口代雇運浙協濟而江蘇省亦奏請撥米十萬石赴閩彼時上海口岸所到閩廣船隻甚少現在江浙雇用已不無竭蹶若再添運江西米石恐一時無船裝運未免求速反遲似不如全由新城陸路運閩可以計日而到當即飛行咨覆旋准何裕城來咨以新城至光澤陸路八十里山徑溪河層層險阻過嶺過渡運送頗艱必須由海道分運方克迅速隨飛行江蘇藩司㑹同松太道務將閩廣船隻速行設法招徠多為預備聽候江西運米到日即行過載開行不許稍有推諉耽延再查江省協濟閩米十萬石現在頭運米五萬石於六月二十五日起運二運米五萬石於六月二十九日起運飛飭文武各運員等務即趕緊開駕前赴閩省兑收不許稍有遲悮奏入上諭內閣曰李世傑素能辦事所奏原委始為詳晰是此事竟係何裕城辦理錯誤軍需米石關係緊要何裕城既查明改由海運較為便捷即一靣將應用米石數目及開行日期飛咨李世傑等預備船隻一面將應運之米運至海口等候以便裝載開行並應以海口船隻倘屬短少或將江浙米石先行運送俟江西之米陸續運赴海口時再行接運之處一併咨明庶李世傑等可以酌量籌辦乃徒事往返札商並不詳晰咨㑹又不詳悉奏明是何裕城不但意存推諉并不知事理輕重實屬糊塗著交部議處上又命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰昨據福建委員解到廖東等四犯當經隔别嚴審連清水認為賊目王周載測字曽經許封僞巡檢阮贊亦供稱向開米店賊到店中搶劫時曽代為煮粥並收受黑旗許封千總等供是其從賊尚為有據業將該二犯先行正法至廖東胡蕃二犯一供係義民挾嫌誣害一供係兵役誤拿均屬一靣之辭殊難憑信若此時即將該二犯一併辦理不足以服其心且從前獲犯時柴大紀或因軍務悾愡未遑審訊而解到常青李侍堯處何以亦未訊取確供從前該將軍等所奏各摺內既未詳晣聲叙實亦無從指質得其真情著該將軍等即將該二犯如何被拏如何供認並將現在該犯等所供各情節確實嚴查據實覆奏再前奏林爽文手下並有蓄髮親丁千餘名今見廖東等頭髮甚長雖據供被拿時係在正二月之間為時已久未能剃髮所致但四五月之間亦不致髮長如許恐係狡飾是否從前被獲即係久已蓄養之髮著一併查明據實覆奏初四日己巳常青恆瑞同奏言初八日卯刻驟雨如注有賊匪三千餘人三路直撲大營臣等令侍衛章京烏什哈逹等八員分派將辨帶領官兵各奮勇爭先冒雨徑戰鎗炮打死賊五六十人至己刻雨止又有續到賊匪接應約五六千人併力來攻官兵鼓勇迎殺賊猶抵死不退官兵等施放排鎗乘勢壓下賊方退走奪獲行營炮一尊鎗刀等械十餘件初十日賊人復來攻營又分賊二千餘人攻小南門之桶盤棧臣等一面派撥在營將辨分路截殺一面飛飭副將丁朝雄等齊赴桶盤棧堵禦臺灣道永福同知楊廷理帶領義民隨後接應兩處打仗鎗炮打死賊一百餘人奪獲賊械二十餘件至午刻賊俱敗退當查出力有功以及傷亡辨兵義民俱照例賞恤注冊再署逰擊黃鳴鳳在鹿耳門內外洋面巡緝初七日巡至卓加海面瞭見賊艘八隻隨率辨兵義民追擒賊船駃逃入港登岸奔逃立帶把總李光顯等追捕時有蕭壠等莊義民陳聰等率衆協同官兵殺賊二十二人其餘逃竄賊船賊寮盡行焚滅當將該將辨等記功以待奬擢義民陳聰等各賞銀牌又查南北沿海各港小口俱可通運糧食如鳳山之東港已被賊人占踞近復于諸羅之笨港鹽水港往來騷擾糧食不通郡城米價漸昂每石錢三千二三百文該道永福現在設法調劑且防範沿海洋面保守郡城臣等酌量各處分兵四五百名并義民數百名前往𠞰禦仍知㑹藍元枚㑹同柴大紀就近速派辨兵齊赴守禦務使港口常通則米糧不致騰貴至賊夥雖衆臣等查看一有變動即乘勢疾擊亦不敢待添調之兵致失機宜同日柴大紀奏言諸羅縣南大排竹地方有賊匪千餘復圖肆擾臣即于初十日黎明親率南澳逰擊李隆鎮標把總蔡國祥羅勇各官兵併署諸羅縣陳良翼帶同武舉黃奠邦各義民等一齊馳至大排竹果見賊泉聚集山上臣即督令官兵義民奮勇上山圍拏連放鎗炮賊匪俱向山後奔逃官兵義民復勇往追殺賊被鎗炮打死者約數十人趕至窠仔厝賊皆四散逺竄值大雨收軍官兵義民俱無損傷生擒賊匪鄭瑞王雕陳竒辨林潑鍾攀石麟賴應林投廖明等九犯審明正法再恆瑞藍元枚日內即可齊到兵力厚集尅期興師由南而北併力勦捕自可一舉蕆事均奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰閲常青等奏到情形是伊等尚劄營駐守因賊匪乘雨攻擾營盤督兵堵禦殺死賊匪僅一百餘人不及十分之一未能乘機進𠞰此次添調各兵計粵省先行調撥兵二千及李侍堯挑備兵二千此時均可前抵臺灣此外添調兵丁尚需時日常青等斷無坐待株守之理前曽諭令該將軍等統領侍衛章京將備徑往南潭擒拏賊首莊大田設餘賊奔救即可聚而殱戮該將軍是否即行派撥直趨南潭若察看情形可以如此辦理業已前往固屬甚善但賊匪出沒無定甚為狡獪若因常青等統兵前往南潭賊匪即糾合夥黨繞截後路亦不可不慮該將軍等務須加意防範或派奮勉將辨斷後使我兵首尾相應不致被其抄襲方好前據李侍堯奏諸羅笨港被賊焚燒已撥派繒船分駐鹿耳門鹿仔港等處復有㫖諭令常青藍元枚於沿海一帶各隘口派員把守並將笨港等處賊匪先速行𠞰除打通道路毋使賊匪得以乘間滋擾今鹿耳門等處果有賊船騷擾之事自應嚴飭官兵於各口岸梭織往來巡查防範毋致稍有踈虞其逰擊黃鳴鳯巡緝認真即以參將擢用至藍元枚接奉前㫖如何設法𠞰散分路防堵及前奏稱大甲溪岸裡社有義民熟畨不肯從賊業經密差幹辨曉諭義民鼓勵畨衆令其攻迫賊巢以分賊勢如果聲勢得以聫絡即可率兵攻擊大里杙之南等語自屬極好機㑹著一并迅速覆奏又賊匪攻擾諸羅動稱千萬而官兵𠞰殺僅止數十人總未見大加勦洗其餘匪是否屯聚各處或遁往山竂之處柴大紀均未分晰奏及著柴大紀務將該處近日打仗攻勦並道路是否不致梗阻各情形據實覆奏欽定平定臺灣紀略卷二十三
