  text: 欽定四庫全書欽定平定臺灣紀畧巻三十二
  hash: sha256:aacad1855b39479efb9286eb1f0d7125a8c4c95d8018fa4f49ad2c2c04bc0b4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_032-1a, image: WYG0363/WYG0363-0358a.png}
body:
  text: 八月二十一日丙辰常青恒瑞同奏言外委段昭眀沈賢齎囘奏摺隨同大兵前往諸羅至老店被賊所害摺亦遺失又魏大斌等禀稱十二日夜接柴大紀札云帶領之兵何􅀢抵諸羅我聞砲即帶兵接應是以於十三日即帶兵二千七百名前行沿途與賊打仗離諸羅尚有四五里我兵正與賊戰之際忽大雨如傾道店湯圓店三坎店等處賊匪蜂擁而來約有二萬餘人圍困我兵不䏻施放鎗砲彼此鏖戰殺死多賊我兵奮勇力戰賊始敗走行近諸羅西門見有叅将潘韜遊擊李隆帶領兵民前來迎接所帶官兵内千總至兵丁傷有一千一百餘名現在雖抵諸羅仍被圍困等情臣等接閲之下不勝焦急伏思應援之兵内外訂期必須彼此熟商不悞時刻乃克有濟今魏大斌雖接柴大紀來札有聞砲接應之語但定於某日某時此從某道而往彼從某道而來亦當從容詳審今於十二日夜接札即於十三日早前往而魏大斌等起程在途之時正柴大紀在縣城禦賊之頃至午後賊退柴大紀聞砲派隊往迎而魏大斌等已為賊阻是雖曽預先闗㑹而仍屬臨事愆期俟該鎮将等将弁兵實在傷亡各數分晰報到另行查辦惟是目前道路梗塞一切軍火糧餉不䏻運送諸羅實闗𦂳急臣等當又派副将蔡攀龍貴林叅将孫全謀帶兵一千六百名仍由水道前往併諭令既抵鹿仔草務必打通諸羅並與柴大紀等悉心籌畫使往來道路不致再有阻塞並飛飭前後調往各鎮将官兵悉聽提臣柴大紀調遣則意見無所參差必可尅期集事至臣等軍營新添本省兵二千潮州兵二千而總計派往諸羅各兵已有七千名即日打通諸羅之後該處亦須分兵堵剿是業經派徃之兵不䏻調囘郡城臣等軍營兵力依然不足仰懇或於江西廣西兩省各撥兵三千臣等並不專候此六千兵到營方圖進剿惟俟現今浙粤滿兵三千以及粤省緑營兵二千到齊即相機前進再查臺灣府城義民協同官兵守城殺賊應行嘉奨但臣等體訪南北路義民情形各有不同則奨賞未䏻一例如諸羅之黄奠邦等鹿仔港之林凑等北淡水之黄世恭等南淡水山猪毛之周敦紀等各統率手下數百人一二千人不等自可将統率之數人按其勞績分别嘉奨惟府城内外原係市㕓之地尤多服教慕義之人上年十二月間賊來犯郡同時倡率各帶手下數十人向前守禦者竟有三百餘人彼此不相統率其出力見功亦大畧相等當飭臺灣道確查共三百四十四名臣等酌量人數若賞概從優轉恐無以示勸而賞或弗及又非所以示公今将武舉給以五品職銜武生給以六品職銜廪生生員貢監給以八品職銜民人俱賞給金頂伊等如願隨營打仗俟有功另請加奨其諸羅鹿仔港北淡水等處義民俟查取履厯功績覆到即行奨賞奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰魏大斌殺散賊匪前抵諸羅而一切軍火糧餉仍不䏻運送入城道路梗阻是不惟柴大紀被圍而魏大斌又在賊圍之中常青等接到禀報自即應親統大兵徑赴諸羅打通道路接應柴大紀方可得力乃僅添派蔡攀龍等帶兵一千六百名前往援應似此零星派撥何益於事不又似魏大斌乎况柴大紀處被圍日乆其勢甚為急迫常青於此時尚不親往救援則豈擁此重兵徒以株守府城營盤為事耶且常青即或因肘腋堪虞未䏻遽離府城亦應帶兵就近先将南路屯佔賊匪廓清剿殺前據常青等奏南潭賊匪被官兵追殺将賊人草屋蓬竂燒燬竹箐砍伐賊匪紛竄則南路賊夥已有潰散之勢正應乗機剿捕擒拿荘大田使南路肅清以便直趨北路可無後顧之虞今據所奏情形則是南路賊匪尚在窺伺而常青又並未領兵前往攻剿即云連日風雨未䏻進兵但官兵處遇有風雨豈賊匪獨無風雨耶况官兵遇雨即鎗砲不䏻施放而弓箭刀矛獨不可用以殺賊耶常青等何以株守無策若此為今之計常青處添調官兵早已齊集竟應留恒瑞駐守府城營盤常青速統大兵直抵諸羅藍元枚若已由大肚溪進兵與徐鼎士訂期夾擊固屬甚善否亦即直赴諸羅㑹合常青柴大紀則得二三萬大兵全力奮勇剿殺進搗賊巢擒拿賊首賊目庶可期迅速集事至川省屯練降畨前已有㫖派調二千人該處兵丁自勝江西廣西逺甚是二千人足抵二萬人之用尤可資以殺賊但屯練降畨到彼尚須時日常青此時不可坐待惟應就現在添調已到之兵迅速帶徃㑹合進剿毋得再事因循致蹈黄仕簡等覆轍自干重戾至福康安在途已兩次啟閲常青李侍堯奏摺該處情形諒已眀悉自必定有主見此時當䟎程前往愈加𦂳急行走於抵厦門後毋庸等候屯練兵到竟先帶同巴圖魯侍衛等星速前渡臺灣即統領該處官兵徑赴諸羅㑹合常青藍元枚柴大紀搗穴擒渠痛加剿殺以期迅奏膚功二十二日丁巳上命軍機大臣傳諭阿桂福康安常青李侍堯藍元枚柴大紀曰昨據常青等奏派兵接應諸羅一摺反復思之常青等辦理此事實屬毫無定見一籌莫展既不䏻舍南趨北又不分一人将南路之賊乗勢殱除徒擁多兵株守郡城而摺内尚稱旬日有餘賊黨知官兵有備不敢來犯豈賊不來犯常青即以為萬幸不思進攻似此與賊相持畧無展布豈在臺灣坐守終老即䏻了事乎常青何並未計及止請於江西廣西添調官兵試思江西廣西之兵與浙江之兵相等豈䏻得力而江西兵尤為緑營中之最無用者若以此等無用之兵付爾等無用之人徒以虚糜糧餉輕試賊鋒而常青又於各處東派西撥於事更屬無益且常青既不北應諸羅又不南剿賊匪究係意欲何為從前黄仕簡株守郡城猶得藉口兵少力单不敷剿捕今常青原帶之兵已較黄仕簡在彼時為多又經陸續添調閩省及粤東浙江緑營駐防兵共計不下二萬兵力如此厚集而復何所藉口常青可不勉圖進取稍贖前愆耶至福康安已屢經有㫖令其䟎程行走一抵厦門不必等候屯練兵到即帶領巴圖魯侍衛等速渡臺灣督率進剿彼時常青處添調各兵早已齊集又有巴圖魯侍衛等百餘人派令帶兵自必軍威倍壯壁壘一新福康安竟當直抵諸羅㑹合藍元枚柴大紀等直搗賊巢擒拿賊首賊目以期迅速集事常青究係年老留於軍營亦屬無益且軍中有將軍二人恐事權不一将弁無所禀承轉多未便福康安到後察㸔情形如有必須留彼帮辦之處即令常青留於軍營亦可若留彼無用即當令其來京陛見總在福康安酌量而行但朕意究以常青可不必留在該處也至恒瑞年力精壯應仍留於軍營聽候調遣福康安帶有欽差闗防即以欽差辦理将軍事務其常青所帶福州将軍印信仍著交與恒瑞可也二十三日戊午常青恒瑞同奏言自七月二十六七八九等日颶風霖雨至八月初一日風雨稍息臣等預揣賊人詭計必乗雨後鎗砲潮濕又來攻犯先於初二日夜密令那穆素里往探賊人動静即派總兵梁朝桂協領海星阿帶兵四百名往正南十三里荘巡哨又派侍衛郭爾敏色遊擊雙徳帶兵四百名往南勢莊巡哨派侍衛雅爾疆阿協領色普星額帶兵四百名往檳榔宅巡哨派岱森寳富克精額他思哈副将丁朝雄等帶兵八百名分巡白崙仔虎仔山兩處至初三日辰刻有賊三四千四路前來臣等帶領中隊迎擊各路巡哨官兵争先邀截鎗砲齊放賊人抵死抗拒臣等預派下之翼長鳥什哈達官福侍衛希眀帶滿漢官兵一千并山猪毛義民千餘從沙崗抄出賊人望見膽怯紛紛逃竄官兵追殺鎗砲斃賊約二三百人至未刻因泥濘収軍初四日接據提臣柴大紀禀稱賊匪於十五二十一二十三並本日叠攻縣城均經官兵義民奮勇殺退苐諸羅被圍兩月糧餉鉛藥一切匱乏外莊之民迫於賊勢粒米不得到縣新到之兵其氣甫挫一時不䏻出剿舊存之兵為數無多只堪力守又二十七日匪衆萬餘復攻縣城同将弁兵民分頭抵禦施放大砲接連轟擊匪勢稍阻隨分撥将弁各帶隊伍義民追殺自夘至午打死逆匪數百人值風雨収軍察㸔情形逆黨恃衆分劄各荘有必䧟諸羅之意又匪黨分屯各荘大出金帛竪旗招人無頼之徒蟻附益衆而孤城坐困深可憂慮就地煮硝製藥所得無幾且米穀一項日見空乏又自二十八日至今連日大風霖雨賊匪仍屯各莊開霽必復攻縣日與代理縣陳良翼設法米糧煎煮硝藥以期力守但煎硝實不敷用兩次飛咨藍元枚發兵救援接到囘札並未提及有無救援之處合再馳禀星刻發兵仍一面飛咨藍元枚尅日起兵由船至笨港來諸羅夾攻再賊匪鴟張務求迅調閩浙兩省兵一萬名來臺灣以便剿洗各等情是諸羅望援甚殷但臣等又派蔡攀龍等帶兵一千六百名前往該提臣等尚未得信計筭一二日内自可前抵鹿仔草一面飭令道府預撥糧餉鉛藥妥速運赴鹽水港轉運接濟一面飛咨叅贊藍元枚現有添撥漳州兵二千名約計已到鹿仔港務即於該處酌撥一二千名派令将弁帶領即由笨港星赴諸羅自可訂期夾功并力打通至臣等軍營官兵於六七月間受濕染病者頗多自祭闗帝㕔以後目下病皆漸愈除前後派赴諸羅兵七千現計軍營兵數除病者不過四千餘名然剿賊並皆奮勇泥水亦不少怯不日溪水稍涸添調粤浙之滿漢兵亦接續到來即無難盡殱匪逆同日李侍堯奏言本月初七八日連接常青抄寄摺稿知其又遣蔡攀龍帶兵前往諸羅救應而蔡攀龍是否已到尚無信息常青仍復坐守軍營並未親往設法觧圍是真不知緩急實不可觧就現在臺地情形而論自當以先救諸羅為第一要務常青摺内稱柴大紀咨請藍元枚由笨港赴救等語查藍元枚處臣所調之漳兵二千乆已開洋雖七月下旬海多大風而日内料已全到其分往鹿仔港之粤兵二千已先有五百前往今續到之一千五百亦已登舟又續調之粤兵一千亦到四百而領兵之總兵李化龍又已先到現催該鎮帶此已到之兵即日開駕再三面囑該鎮務與藍元枚奮勇進攻不可再有觀望此亦赴援觧圍之一路至臣於閩省多行召募原以備續調之用惟尚未操練嫻熟難於驟調然既有新兵及時訓練以實營伍即可将舊兵挑出進剿而新兵内有兵家子弟已䏻演習適用者亦可㕘用是以臣一面将泉州等處酌量新舊兼挑凑足三千名派委大員統領配渡徑向鹽水港進發以免紆折此又赴援觧圍之一路但未知諸羅之力是否尚䏻乆待至常青摺内有増調江西廣西兵各三千之請而聲叙柴大紀咨文又有増兵一萬之請雖覺跡渉張皇然㸔來亦不得不再為接濟與其零星續派自不如儘用大力以期一舉撲滅之功查江西贛州素稱强勁且距閩省路亦近便粤西之兵亦尚可用如照常青所請之數調派三千前來合之臣此次續調之閩兵三千則兵力亦已壯盛惟是統兵全恃主帥常青措置錯謬㸔來竟不䏻完結此事仰懇或如臣前所奏竟令海蘭察前來統領調度庶不至再有貽悞至沿海各口岸恐有臺匪潜入勾結等事固須嚴密查拿若販貨商船則正藉其流通百物自當倍加體卹使其所至如歸商船載有貨物非偷渡之船專載男婦者可比本屬易於識别臣自二三月間即飭各口岸凡遇入口船隻不載貨而但載人者必須盤詰現已獲有數起訊係避難逃歸原籍之人俱有親族隣里保認當即令其領囘安挿不許稍有擾累至於商船俱有本澚甲長認識其出口時但須掛號即行開駕及進口時載有貨物俱有投税起貨查自春間以來尚無留難悞拿等事均奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚曰常青初到臺灣尚有振作之氣及不䏻取勝又見賊多竟致一籌莫展難望其力圖振作此事惟仗福康安迅速到彼督率籌辦以期壁壘一新及早蕆事福康安抵厦門後務即遵照前㫖統領大兵直抵諸羅㑹同藍元枚柴大紀合兵進剿不可過於持重若福康安亦如此恇怯豈不失朕所望乎總之賊夥雖多不過脅從烏合易聚易散止須将其渠魁擒戮夥匪自必聞風瓦觧彼時相機酌辦或剿或撫自無難迅速集事若如常青零星派撥分投堵禦徒使師老力疲毫無寸進轉與賊人以暇俾得肆其狡計惟知奏請添兵豈賊有二三十萬亦将以二三十萬官兵應之有是理乎况如常青所辦即再添多兵亦不過東派西撥仍屬不敷豈䏻添兵不已乎從前伊犁金川等處皆係畨囘部落其人豈止百萬大兵所臨無不摧破克㨗掃穴犁庭悉就平定况臺灣本屬内地林爽文等不過么麽小醜乗間竊發以如許兵力而賊首尚日乆稽誅更復成何事體耶福康安務須胸有定見不可稍事㳺移此為最要并著福康安查眀常青因何株守府城既不帶兵剿殺南路賊匪又不北往将沿途之賊悉力剿除前抵諸羅僅派将弁等由水路前往諸羅接應即該處有不䏻移動之勢何以不将實在情形陳奏之處逐一詢問常青令其眀白登答據實覆奏至李侍堯駐劄厦門聞見自必真切乃并未将常青年老無用辦理竭蹶情形據實陳奏經朕降㫖詢問尚以常青處事眀白可無庸另派更換試思常青近日所辦之事尚䏻望其辦理完結乎㸔來李侍堯惟恐奏眀常青於剿捕事宜不䏻得力必派伊前往臺灣接辦是以含糊其詞不肯直奏此等處亦不䏻逃朕洞鑒其實李侍堯於地方軍糈辦理尚妥而軍旅素未嫻習石峯堡覆轍不逺即往臺灣與常青無異朕亦㫁不派伊前往也本日常青等奏派兵搜剿打仗并接據諸羅文報情形一摺所辦總不成事體柴大紀處賊匪糾衆數萬連日攻圍城中糧餉火藥俱屬不敷其勢甚屬急迫總因常青節次所派魏大斌蔡攀龍等不過帶兵千餘名零星調往策應既不足以資攻剿而火藥鉛彈糧餉被賊截㫁城中徒増喫用之人愈形拮据實為失䇿今常青處無兵可派據奏札令藍元枚撥兵一二千援應諸羅藍元枚處已屢經有㫖令其親自帶兵前往諸羅㑹合攻剿自早已接奉何尚未據覆奏且柴大紀兩次飛咨發兵救援藍元枚何以並未發兵著即眀白囘奏現在諸羅被圍𦂳急藍元枚若䏻進兵大肚溪與徐鼎士夾攻大里杙賊巢使林爽文囘顧巢穴有所牽綴則圍困諸羅之賊自當漸就觧散柴大紀可以捍衛無虞亦是一䇿若未䏻前進藍元枚亟應親統官兵速赴諸羅接應柴大紀毋得稍有遲緩此事總由常青因循貽悞株守無策所致雖據奏稱存營之兵止有四千未䏻前赴北路但現在添調之兵計月内早已齊集更無可藉口常青若䏻先将南路賊匪悉力殱除賊目莊大田拿獲固可稍贖前愆否則速統大兵乗其新到鋭氣直趨北路前抵諸羅亦尚可補過即屬常青之福若惟知株守郡城坐視柴大紀被賊圍困致有踈虞則是常青罪上加罪恐不䏻當此重戾也至江西兵在緑營中最為無用朕所素悉即該省鎮将大員向亦祗将才具中平者酌量簡用兵丁僅可防守營汛若用以剿賊徒令虚糜兵餉輕試賊鋒斷難得力即粤西兵亦屬平常前據福康安奏調川省屯練兵二千朕初意續得㨗音尚應停調今㸔此情形勢難中止現據鄂輝統領前進矣此二千兵最為趫㨗已足當二萬之用而續調閩兵三千即可抵粤西江西兵六千是兵力不為不厚福康安到厦門後倘常青等尚未䏻進抵諸羅而諸羅或有挫失福康安即當在厦門暫駐俟屯練兵到齊軍威壮盛再帶領巴圖魯侍衛等前渡臺灣相機籌辦方為妥善或於巴圖魯中先發去四五十亦可備目下攻剿之用再魏大斌前因其帶兵援應柴大紀殺退賊匪直抵諸羅尚為奮勉是以降㫖賞戴花翎今據常青等節次奏到情形是魏大斌竟係在鹿仔草被賊将糧餉火藥等項攔截難以復囘只得前赴諸羅希圖掩飾且所帶兵一千五百名被賊殺傷一千一百名是魏大斌竟屬有過無功著福康安於到彼後切實查眀如魏大斌實係殺透重圍直抵諸羅尚䏻奮勇殺賊自應仍賞戴花翎若伊係因糧餉等項被賊截斷始行前赴諸羅而兵丁又傷亡過半即據實叅奏李侍堯駐劄厦門聞見自確併著将此情節一併查眀具奏又昨據常青奏派令蔡攀龍等由海道前往諸羅援應似由府城至諸羅之陸路已被賊人梗阻而所接柴大紀咨報稱外委段昭眀沈賢齎摺隨同大兵行走至老店被賊所害摺亦遺失之語則又似往來奏摺俱由陸路齎遞現在發往柴大紀文報究係於何路行走且叚昭眀等齎囘之摺既有遺失而節次發給柴大紀諭㫖總未見覆奏恐亦不免有在途遺失之事若被賊人檢得賊衆内不乏識字之人轉可得知官兵虚實闗係𦂳要此等軍情要務常青李侍堯等何以並未想到查辦及此此後所發柴大紀文報若由臺灣府城齎遞即交常青專差奮勇弁兵遞送若由鹿仔港一路齎遞即交藍元枚專差奮勇弁兵齎遞毋致稍有遺失遲悞此次發交柴大紀諭㫖即著交李侍堯照此辦理並著常青李侍堯将前此所發柴大紀諭㫖奏摺有無遺失是否俱行遞到之處一併查眀覆奏同日鄂輝保寜成徳同奏言川省屯練降畨前經調赴甘省剿捕逆囘辦理已有章程此次仍應照辦臣等即専委三標中軍馳赴雜谷新疆㑹同該管将領檢派屯練一千六百名降畨四百名均挑選曽經打仗壯健之人並𣲖得力土弁木塔爾日朋丹巴西拉布等帶領星赴成都臣等親為㸃驗優加賞賚令其迅速遄行並調素經行陣曽帶畨兵之将備八員率同勇幹千把分起管領查屯練原係維州協專屬該協副将那蘇圖屢經出師人亦眀白勇往現令與懋功協副将張芝元一同管領惟是畨衆二千道經數省必得統領大員以資總理松潘鎮總兵穆克登阿熟諳軍旅才識幹練現派令統率前往方資鎮撫至自成都由水路至重慶需用内江船隻查現在上㳺各屬兩次趕辦米石俱已運竣足敷僱用惟自重慶至楚船隻除前運米二十萬石已掃數開行外其續運米三十萬石現亦接續兑運節經臣保寜設法僱備船隻雖可無缺恐一時難得餘船再副軍行臣等現復嚴飭原委辦船之文武各員将下㳺川船速行趕赴重慶供載倘畨練等行至重慶尚無多餘船隻即将復運三十萬石尾帮之船暫停運米先儘兵行再将續到之船隨後運米亦不致守候稽延至沿途一切供支臣等飛飭水陸地方預備夫馬及鹽茶米麫肉食柴斤等項寛裕應付奏入報聞欽定平定臺灣紀畧巻三十二
