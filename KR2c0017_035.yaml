body:
  text: 九月初五日己巳藍元枚奏言召募兵丁現在踴躍應募者已經陸續挑選勇壯一千餘名照兵丁之例給豫錢糧聞其內即有二百餘名係曾經從賊者但本人自愧知非不肯認此惡名伏思皇上既豫以自新之路貸其一死臣亦姑聽其隱祕惟是此等匪徒亦難遽信其無假冒投誠萬一有變所關匪細仍嚴密稽查防範以保無虞至大甲溪岸裡社義民熟番先經臣差辨前去曉諭鼓勵隨經差辨帶同熟番潘明慈郡乃等八名義民首邱子標等十二名前來各願勉力殺賊臣即賞以銀牌布匹令其同心奮勇禦賊嗣又據該處民番來報有賊攻擾臣經撥兵六百名又飭副將徐鼎士帶兵一千二百餘名又招募義民三千餘名同在大甲溪北駐劄而岸裡社熟番在大甲溪之南聲勢甚是聨絡賊人屢次攻擾俱被官兵等殺退且該處路途頗平可與攻迫賊巢若與鹿仔港兩路夾攻實好機㑹但近聞賊目互相猜疑俱將各賊眷屬押入大里杙居住若官兵攻勦太急勢必抵死守禦一時恐難遽破轉費時日又防賊人占踞斗六門必乘大兵進攻大里杙從西螺來抄鹿仔港難免有後顧之慮况鹿仔港現在西南沿海豐港至鹿場尖山北鋪五十餘里約大小二百餘莊經臣遣人分頭前去曉諭所有被賊焚燬村社亦搭蓋草藔暫行歸莊七月二十七八九連日大雨園地俱栽插畨薯而鹿仔港之東南溪底孩沙等莊離斗六門僅七八里該地民人亦有來求見佇望兵到各願糾集鄉勇跟隨殺賊臣細籌情形明知斗六門係賊要隘勢在必爭必來抵死相拒然際此民心初安向義從官似當先乘此機㑹多帶官兵先劄西螺若斗六門一破正可痛加勦殺使賊人心驚膽裂而我軍便得長驅直進似較大甲溪更為要著臣已飛咨將軍臣常青提臣柴大紀訂期於八月半間㑹同夾攻至漳州兵船經收入鹿仔港有一千三百餘名其未到兵若早晚風順亦必陸續進港臣正在整頓兵力前往攻𠞰斗六門一得勝仗立刻由驛馳奏再查生畨性如猿猴登山涉水便捷如飛但各分種數每種或數十莊社或百餘社不等皆有熟悉畨性之人衆畨皆聽其呼喚臣細訪彰化以北生畨有張鳳華能使生畨信服當即諭令張鳳華前去曉諭各社生畨擒殺賊匪自有重賞於七月二十八日張鳳華親姪張髙飛前來面禀伊叔業經傳諭生畨據衆畨告稱先前係林爽文呌人來說大里杙山邊盡是大官員鹿仔港海邊俱是賊是以呌我去殺賊今知鹿仔港是官員大里杙是賊自然要殺賊該生畨業於七月十二日殺阿罩霧賊三十餘人至彰化以南生畨聞有岸裡社熟畨通事潘明慈為人誠實兼通生畨當令傳諭該通事令其前往諄切曉諭嗣據潘明慈禀稱前往生畨告以利害許賞花紅衆畨社無不喜悅都說從前被賊哄了如今才曉得虎仔港大里杙都是些賊將來必定拏來獻功省得賊來戕害又可以邀重賞等語此等無知蠢類一經曉諭皆知踴躍樂從將見么䯢無藏匿之所不難即日就擒奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚曰諸羅被賊圍困望救甚切經柴大紀兩次請兵往援該參贊自應帶領官兵星速前往策應鹿仔港距諸羅甚近該處被賊圍急藍元枚豈有不知之理况屢有㫖催令自北而南接應諸羅計此時藍元枚早應接到何以摺內未曾提及又不速往援應乃轉稱現在知㑹柴大紀該處此時正在被圍望救焉有餘力與藍元枚㑹合夾攻斗六門之理且藍元枚摺內既稱大甲溪岸裡社義民熟畨聲勢聨絡該處路途頗平可以攻迫賊巢又稱斗六門係賊要隘勢在必爭當多帶官兵先劄西螺進攻斗六門以便長驅直進即應酌定機宜普吉保駐守鹿仔港該參贊親自帶兵前往痛加勦殺以圗進取乃既不由大肚溪進兵與徐鼎士㑹攻又不進赴斗六門奮力攻擊殱除屯占賊匪救援柴大紀而於大里杙賊巢又稱官兵若攻𠞰太急賊人勢必抵死守禦一時恐難遽破是藍元枚竟係中無定見株守鹿仔港徒擁兵自衛並無寸進若鹿仔港果有賊匪攻擾藍元枚不能前進猶得有所藉口該處現在並無賊人滋擾而藍元枚處添調官兵又已厚集乃一味株守瞻前顧後並不挪移尺寸耶看來藍元枚明知諸羅被圍緊急擁兵不救徒以大甲溪斗六門等處轉輾推托以掩飾其株守坐視之罪豈能惑朕藍元枚之祖父藍廷珍以一總兵帶兵前渡臺灣𠞰除賊匪七日之內尅期奏績朕軫念前勞是以將藍元枚屢加拔擢用至提督又以伊係本省人必能深悉賊情畀以𠞰賊之任授為參贊並常戴雙眼花翎藍元枚自應倍加奮勉效法伊祖克繼家聲方為無負委任今自到鹿仔港後遲回觀望一籌莫展即所稱曉諭生畨令其擒賊獻功等事皆不過藉詞文飾以為占腳地步藍元枚受朕深恩何得恇怯委靡若此若再仍前觀望按兵不動則藍元枚即為任承恩之續况尤非若任承恩尚可推兵少也著先嚴行申飭至常青亦屢有㫖令其親統官兵速赴諸羅接應柴大紀乃自數月以來惟知零星添撥奏請添兵並未親往北路决機制勝所辦何事現在諸羅尚未解圍常青藍元枚既經貽誤於前當此兵力厚集之時正該將軍贖罪圖功之日亟應奮勇前進收效桑榆庶不致自罹重咎總之此時諸羅若無挫失即係常青藍元枚之福萬一柴大紀竟有不虞則常青藍元枚更何顔面立於人世不可不慎也再藍元枚奏現在召募食糧民人一千餘名內有二百名曾經從賊者但本人自愧知罪不肯承認雖豫以自新貸其一死但難以遽信等語此事最宜留心若稍有可疑者即應立行誅戮勿使别生事端以保無虞為要至福康安既經啓閲藍元枚所奏情形即應將其支吾掩飾及福康安到彼如何措施之處據實奏明何以並未附摺具奏福康安於此等處豈不能見及若徒然啓閲仍默無一語則亦不必先行閲視矣豈朕委任之意耶福康安到彼著將此次諭㫖內指出各節面向藍元枚嚴加詰詢令其逐一登答仍嚴行查訪有無揑詞支飾據實具奏初六日庚午藍元枚奏言臣於七月二十二日染患痢疾病症至二十五日聞賊人來擾畨仔溝親帶官兵前去堵殺行至中途因賊匪已退亦即回營是日大風猝受感冒漸覺疲倦八月初八日聞賊匪一由竹仔腳一由大肚溪一由柴坑仔三路來犯仍力疾親帶官兵前去堵殺至收兵回營精神愈覺不支現在不能起立飲食頓減伏思鹿仔港為海口要地况現在漳州兵已到一千三百餘名廣東已到四百餘名兵力已足正當迅速𠞰滅首夥之際臣何人何心焉能安卧床褥調攝微軀兹暫將一切官兵移交普吉保管束進剿一面飛咨將軍臣常青速撥大員前來經理臣奉職無狀既不能尅日擒渠又何敢抱疴戀棧伏乞將臣革職軍前效力俟臺匪剿滅交部嚴加治罪奏入上命軍機大臣傳諭福康安李侍堯曰藍元枚昨日奏到之摺係八月初六日拜發馳遞幾及一月因查常青上次所到奏摺係八月初五日拜發已于八月二十三日遞到何以藍元枚此次之摺至一月之久隨飭查沿途掛號發單係在未到蚶江以前海門耽擱十六日之久向來洋面雖以風信為憑即或間被風阻稍稽時日尚屬事之所有何遲至十六日之多海面亦閩省所轄遇緊要文報該督等自必慎選員辨船隻以便駛渡斷無聽其任意遲延之理著交李侍堯嚴切稽查究係何處耽延遲誤是否實係阻風即行據實覆奏此後務須隨時留心稽查嚴飭該管員辨慎選夫船設法星速馳遞毋致稍遲再藍元枚處現據奏稱漳州兵已到一千三百餘名廣東兵已到四百餘名是兵力已盛且賊匪互相猜疑漸有渙散之勢官軍正可乘機進剿乃藍元枚又因患病不能辦理軍務實深焦切鹿仔港一路現駐重兵最為緊要藍元枚既經患病此時常青處亦無人可以派撥前往統轄福康安此刻已抵閩省接奉此㫖即應星夜加倍兼程竟由蚶江配渡迅赴鹿仔港即帶領藍元枚所統官兵奮勇打仗接應諸羅或與徐鼎士㑹合夾攻大里杙惟當相機而行不必俟屯練及貴州兵到齊再行進發彼時若藍元枚病症不能痊愈所有水師提督即令蔡攀龍署理蔡攀龍素為奮勇屢經打仗出力是以特加擢任著福康安先行傳諭蔡攀龍務須倍加奮勉殺賊立功伊現在自己前抵諸羅即當由諸羅帶兵剿殺沿途賊匪打通道路徑赴鹿仔港如彼時福康安尚未到蔡攀龍即督率官兵奮力進𠞰不必等候福康安到彼始行進𠞰至藍元枚自到鹿仔港後辦理一切尚為奮勉後因其擁兵觀望並無寸進又不親往援應諸羅節經降㫖飭諭今藍元枚既稱患病難以支持然猶在畨仔港竹仔腳等處力疾打仗堵殺賊匪如果病症屬實其情殊可憐憫現已頒賞大小荷包以示軫念福康安到彼即傳㫖賞給再藍元枚雖因病不能辦理普吉保自當帶兵進𠞰何得株守坐待並著福康安將普吉保有無畏怯觀望之處一併查明具奏初七日辛未上命軍機大臣傳諭保寧李世傑舒常李慶棻琅玕孫士毅孫永清曰此時川黔兩省之兵自必陸續按起前進但現在臺灣雖有浙閩調撥之兵接濟剿捕而㑹合攻擊急需厚集兵力以期迅奏膚功計福康安此時已可到臺灣督辦一切正須多兵調遣所有調撥四川屯練降畨及貴州之兵著保寧李慶棻務須飭令後起帶兵員辨加緊行走愈速愈妙其川省之兵行過湖北江南浙江等省貴州之兵經過廣西廣東等省俱著各該督撫飭所屬於兵過之時俱妥為照料速令加緊遄行毋使稍有遲緩上又命軍機大臣傳諭福康安李侍堯李化龍蔡攀龍曰前據常青奏派令蔡攀龍帶兵一千六百名由海道前往諸羅援應柴大紀此時蔡攀龍自己早抵該處但計伊接奉前㫖由諸羅前赴鹿仔港尚需時日而藍元枚一路現在漳州兵已到一千三百餘名廣東兵已到四百餘名又賊黨互相猜疑漸有潰散之勢正是甚好機㑹而統兵大員忽值患病反覆思之殊增煩悶因思李侍堯於八月初九日曾奏帶領續調粵兵之總兵李化龍業已先到現催令該鎮帶領已到之兵即日開駕速赴鹿仔港一路協𠞰等語是李化龍此時早已帶兵前抵鹿仔港李化龍人尚明白且曾經行陳如蔡攀龍即時不能前抵鹿仔港即著李化龍署理水師提督事務並著鼓勵將辨等奮勇出力相機攻𠞰不得因循株守致有貽誤其藍元枚現在患病情形勿令賊人聞知致長奸計窺伺此為最要至普吉保與藍元枚同駐鹿仔港藍元枚既經患病又將官兵交伊管束普吉保即應將藍元枚患病光景及現在如何督率官兵𠞰捕事宜詳悉具奏何以並未據専摺奏聞伊雖至愚何至於此等處亦不能見及耶普吉保著傳㫖嚴行申飭現在不患兵少所最要者乃統兵之人福康安到彼不必俟四川屯練及貴州官兵到齊即先奬勵將辨奮勇進𠞰不得因途次知藍元枚現已患病又稍存畏怯疑難之見至鹿仔港現在各副參遊擊等官俱係行伍大員久隨藍元枚調度籌辦已有章程此時提督雖經患病該員等正當各為國家出力勉圖報效之時何未見有一人同普吉保𠞰賊者福康安到彼即應鼓勵在彼將辨統率新到官兵或㑹合徐鼎士直攻大里杙賊巢或竟率領官兵徑赴諸羅救援將沿途賊匪痛加𠞰殺以期道路肅清軍威丕振同日柴大紀奏言逆匪糾合南北賊衆滋擾鹽水港鹿仔草等處圖截通府要路使文報不通糧餉莫運以困諸羅縣城臣經撥遊擊楊廷麟守備黃象新等帶兵一千餘名駐劄鹽水港又撥千總陳邦材帶兵二百名駐防鹿仔草與鹽水港互為犄角又派遊擊邱能成帶兵二百五十名一路巡哨接應兹六月初九日探聞龍船窩莊等處有賊匪焚搶情事楊起麟同黃象新等於初五日黎明帶兵飛赴該處賊匪二千餘人迎敵隨督率辨兵施放鎗炮打死賊匪多人餘賊旋退旋來被大炮打死百餘人賊衆敗走追趕十餘里殺死賊匪亦多奪獲賊旗賊械等項惟畨民怡皆一名受傷六月初七日辰刻賊衆約有二三千人分路圍攻鹽水港楊起麟督率辨民義民施放鎗炮打死賊匪二百餘名賊敗追至後鎮地方殺死賊匪甚多奪獲子母炮一門馬蹄炮一門鹿鎗竹牌及賊旗等項黃象新由南趕至急水溪邉生獲賊匪鄭對一名餘賊奔竄兵民間有傷亡隨將鄭對審明正法初九日千總陳邦材武舉陳宗器報賊匪萬餘聚集附近各莊欲來攻鹿仔草乞撥兵救援隨撥遊擊李隆守備楊彲於初十日黎明帶領辨兵併黃奠邦吳正蘭等各義民飛往應援至竹仔腳大崙莊田洋遇賊匪六七千蜂擁而出亦有鎗炮抗拒官兵李隆督令施放鎗炮賊匪四面攻圍官兵義兵奮勇前禦打死賊匪四百餘名殺死賊匪二百餘名自辰至午打裂大炮二門賊衆抵死冲來官兵義民奮勇鏖戰適遊擊邱能成帶領辨民亦至該處併千總陳邦材武舉陳宗器各帶兵丁義民併來夾攻又打死賊匪數百賊始逃散收軍遊擊邱能成等仍回鹿仔草把總郭得勝李松二員外委蕭富許飛鳳二員陳亡外委陳威一員未知去向陳亡併遺失兵丁陳興髙等共一百三十三名陳亡義民鄭乾等七十名受傷兵丁劉國寶義民吕雲等五十名炸碎大炮一門打裂子母炮一門遺失子母炮四門百子炮四門鳥鎗三十桿腰刀四十八口單刀二口又六月十二日辰刻賊匪五六千人由東勢角來攻鹿仔草遊擊邱能成帶領千總陳邦材併兵丁義民向前抵敵用鎗炮連環轟擊自辰至未打死賊匪多人奪獲子母炮竹營炮共三門鳥鎗令旗竹牌斧頭等件生獲賊匪莊敏等八名即於軍前正法兵民間有傷亡再臣原帶官兵一千九百三十名往諸羅克復城池續於四月二十一日將軍臣常青派撥參將潘韜帶兵一千餘名前來接濟共兵九千二百餘名除分派鹽水港鹿仔草防守以及陳亡外臣營盤止有兵一千餘名兵力單薄賊匪每來侵犯已咨請將軍臣常青再添兵應援又二十日巳刻賊匪萬餘蜂擁來攻諸羅四門營盤隨令官兵義民協力抵敵鎗炮齊轟臣往來各門營盤督戰自己至申打死賊匪計有數百名打裂大炮一門其東南北三處賊匪俱已敗走惟西門外賊衆尚抵死冲來督令官兵竭力鏖戰賊匪退而復來者三次義民似覺稍怯臣隨飛調遊擊林光玉帶兵由東殺來兩處鎗炮齊發用力夾攻各義民亦皆奮勇爭先鎗炮打死賊匪三百餘名內執大旗賊一名騎紅馬賊一名始四散逺竄因天晚收軍兵民傷亡者八十餘名獲大旗一面上寫五個雷字四角寫天地日月字樣又大旗一面奪獲竹牌皮牌等械二十一日撥防鹿仔草遊擊邱能成禀稱溫州鎮魏大斌帶兵一千六百名前往諸羅因大崙埔心等莊有賊匪屯聚截路十八日即帶兵四百名諭令遊擊亦帶水陸官兵併武舉陳宗器等義民隨往該莊剿捕與賊打仗施放鎗炮打死賊匪甚多詎賊衆萬餘四面圍來官兵義民拚命抵敵至申刻殺出重圍遊擊左手中指被賊刀傷見骨坐馬前胸亦被刀傷收兵回鹿仔草魏大斌所帶官兵陳亡千總一員把總二員兵丁遺失一百五十餘名遊擊所帶官兵陳亡把總武成烈劉連升二員外委包定邦一員水陸兵丁陳亡遺失共二百二十九名義民遺失三十餘名逆匪因官兵派守鹽水港鹿仔草諸羅營盤兵力單薄總兵魏大斌接濟之兵又不能到益肆鴟張圖侵縣城愈急臣竊思諸羅係四面受敵之地現今賊多兵少隨㑹商署諸羅縣陳良翼併武舉黃奠邦拔貢鄭天球等環營開溝設險晝夜併工多方鼓勵官兵義民協力堵禦二十四日巳刻賊匪萬餘分攻西北兩門營盤東南亦各有賊匪六七百人察看情形此係賊人詐謀牽掣東南意實専攻西北臣令各營大炮齊發賊炮亦與對放臣往來西北兩處親督鎗炮各兵按定准頭施放打死賊匪約共三百餘人賊衆猶冒死前來臣督率官兵義民奮勇鏖戰北門打死騎馬賊一名又打傷騎馬賊一名打裂大炮一門殺死賊匪七八十名賊敗逺竄西門外賊匪雖被大炮打死二百餘名尚不肯退復親帶鎗隊飛往協力堵殺賊衆恃有鎗炮不特當面對打且分攻右邊畨社其畨社界在西北之間早已撥外委賴連升帶鎗炮手五十名畨弓箭手三十名在竹圍內埋伏賊匪將近鎗炮弓箭齊發傷斃賊匪十餘人賊隨俱攏西門任我鎗炮轟擊竟然抵死不懼查東南賊匪俱經參將潘韜遊擊李隆林光玉等殺退隨飛調遊擊李隆林光玉等帶兵由東殺來併力夾攻殺死賊匪百餘名至黃昏賊始退去定更時賊復逼近營盤與官兵對放鎗炮相持一夜至二十五日黎明賊衆復攻西門臣往來各營盤督戰俱用大炮轟擊南門外打死賊匪數十人其餘俱退東北兩門賊匪被大炮打死各二百餘人打死騎白馬賊一名騎黑馬賊一名隨率官兵義民奮勇追殺賊匪始退惟西門外賊匪愈殺愈多雖經大炮接連打死無數仍然拚命來攻復分作二起一由當面冲來與官兵對殺一由畨仔港擁入學舍傍墻圍內多鑿穴空放鎗打入營盤兵丁義民多受其傷若用大炮轟擊儘可透墻斃賊因文廟伊邇神所憑依未敢施放大炮查南門賊匪已退隨飛調遊擊李隆帶兵前來夾攻鎗炮打死賊匪百餘名打死騎馬賊二名殺死賊數十名申刻賊衆四散奔逃值大雨收軍此兩日一夜與賊打伏官兵不暇造飯俱係城內紳耆鋪民挑飯送各隊伍併挑送涼水兵丁得不饑渴兵民傷亡者約八十餘名奪獲馬匹旗牌長刀等項又二十八日辰刻賊匪萬餘復來侵犯四門營盤臣來往各門督戰飭令官兵義民抵禦至午刻打死賊匪三四百人官兵義民奮勇爭先殺死賊匪百餘名東南之賊先已敗去惟西北門外賊匪不退時臣在北門外有見騎赤馬賊率衆冲來甚是鴟張即令放炮立見人馬俱倒併打死賊匪數十人正欲追趕適參將潘韜守備楊彲等報稱西門外賊勢猖獗數次逼近營盤官兵義民俱有損傷臣隨往援併調遊擊李隆林光玉等均到西門併力夾攻至申刻賊匪被鎗炮打死百餘人打裂大炮一門殺死賊匪數十名賊始四散逺竄生擒賊匪林再何水二名因傷重旋死戮尸獲旗牌長刀等項同日常青奏言八月十六日親帶兵起程因恐賊匪乘間侵擾府城是以密為預備定于十六日起程先令官兵揚言于十三日前往北路此言傳出果有賊匪五六千人潛伏竹箐窺探府城當經帶兵殺散若官兵往北路止留梁朝桂一人帶兵千餘駐守實屬可虞應俟廣東浙江駐防滿兵三千名一到即留一半守城常青恆瑞即帶領一半先剿殺南路賊匪再行往北接應諸羅同日李侍堯奏言諸羅被圍日久芻糧鉛藥日少一日甚為可慮此間滿漢兵登舟者不下八九千總以風信不常連日停泊不能開駕直至十六日始行放洋計目下當可到齊常青得此新兵或當分兵駐守府城率兵前往打通諸羅道路臣前詢問船户陳榮昌據云聞得有牌腹村義民運糧接濟諸羅城中等語若果如此則諸羅尚可堅守待援至鹿仔港一路普吉保劄營在馬鳴山本月初八日有賊來擾即率兵剿禦自辰至未賊猶不退藍元枚遣遊擊琢靈阿帶兵接應賊始敗散官兵乘勝追殺斬獲甚多查漳兵二千久已起程其未到之六百餘名不日亦即可到而左翼鎮總兵李化龍帶領粵兵二千五百亦于十六日放洋兵力驟增正可協力進剿旋接同知黃嘉訓禀稱藍元枚于十八日身故等語藍元枚到鹿仔港後連絡民畨布置似有頭緒一旦身故羣情未免失所倚恃適增調之粵兵漳兵計目下亦必全到則事機尚可相接惟普吉保李化龍兩總兵恐難相統轄府城既有滿漢兵新到想常青自必親自帶領赴援諸羅恆瑞或須留守府城不能分往鹿仔港督率臣一面飛檄普吉保李化龍務當和衷商度酌量一人駐守一人即統兵進剿斗六門等處與柴大紀㑹合勿得各存意見以致誤事想普吉保等亦决不因統率無人遂稍存觀望福康安海蘭察等約計九月初間即可到厦門臣現已預備船隻等項俟一到即可登舟所有糧餉火藥惟有寬裕籌辦上緊運送以期應手不敢稍有遲誤均奏入上命軍機大臣傳諭福康安常青李侍堯柴大紀曰柴大紀所奏情形俱係七月以前之事業經常青李侍堯等先後俱奏而諸羅被賊攻圍以後常青又派蔡攀龍等帶兵往援如何殺賊解圍之處尚未得有確信現在諸羅被困緊急望援甚切常青等自應遵㫖帶兵親赴北路援應柴大紀而伊等又因府城存貯糧餉火藥兼之難民甚多惟恐大兵起程後賊匪乘間侵擾府城請俟浙粵駐防滿洲兵到後酌留一半駐守府城帶領一半洗淨南路所辦亦覺未中肯綮此項駐防兵三千前抵臺灣後軍勢壯盛正當乘其鋭氣以全力直趨北路今又以分派一半駐守府城一半帶往南路剿賊是兵力又以分而見單但此時常青等如已帶兵前赴南路果能將賊匪大加剿殺擒獲莊大田恢復鳳山肅清後路俾無返顧之虞亦屬甚善但必當奮力搜剿將屯占賊匪殱戮無遺庶不虗此一舉不可徒分兵力以致兩處耽延方為妥善又據奏官兵若往北路後府城止留梁朝桂駐守未免可慮一節常青既已見及于此自應令恆瑞同梁朝桂固守府城營盤常青自帶兵徑趨北路自不當祗令一總兵在郡城駐守也此㫖到時竟應遵照前㫖令恆瑞駐守府城常青仍帶兵往援柴大紀為是又據李侍堯奏藍元枚于八月十八日患病身故覽之深為軫惜藍元枚自駐劄鹿仔港以來調度督率均屬奮勉出力後因其久駐鹿仔港未能統兵進剿又未往救諸羅曾經降㫖飭諭此亦策勵之道不得不然今因偶患痢疾仍奮勉打仗竟至身故殊為可憫鹿仔港現駐重兵方圖進剿又賊黨互相猜疑漸有潰散之勢正是極好機㑹而參贊大員忽因病故軍心不無惶怯將辨等不無懈弛觀望並恐賊人聞知藍元枚病故信息生心窺伺最為緊要李侍堯所奏之摺福康安在途次已經啓閲自悉該處情形惟當堅持定見及早馳抵該處整頓兵力奮勇進剿倘福康安尚未能尅日前抵鹿仔港即應先發劄諭以該參贊雖經身故但官兵厚集聲勢壯盛福康安現赴鹿仔港即日可到李化龍普吉保及將辨官兵等務須倍加奮勇努力自效殺賊立功俾軍心鎮定將辨等咸加奮勇其所調屯練及黔省兵現又有㫖催令該督撫等即速派調起程尅期進發以期早抵軍營但此時鹿仔港續調之兵業已陸續到齊兵力已足福康安及海蘭察所帶巴圖魯侍衛等百餘人最為勇健尤足以一當千更可恃以無恐惟當就現有之兵速即統領進剿將來屯練及黔省兵到彼時俱係生力豈不更資剿殺賊匪耶至水師提督業經降㫖令蔡攀龍署理又因蔡攀龍未能即抵鹿仔港是以令李化龍署理以期事權歸一今據李侍堯奏已經檄普吉保李化龍二人應留一人駐守鹿仔港一人帶領兵攻斗六門與柴大紀會合想普吉保等不敢因統率之無人稍存觀望等語自應如此辦理厦門距鹿仔港不逺李侍堯之信早到李化龍普吉保二人中何人駐守何人進剿自已早經商定即行各據實馳奏又前因鹿仔港招集充伍民人內有二百餘名係曾經從賊者難遽信其無假冒投誠之事已有旨諭令留心防範倘有可疑者即先誅之今藍元枚已經病故此事關係緊要並著福康安督同李化龍普吉保等加意嚴防隨事稽查倘有心懷叵測者當即正法毋致别生事端上又諭內閣曰官兵在諸羅城外剿殺賊匪紳耆鋪户挑送飯米涼水兵民得不饑渴又牌腹村民人復運糧接濟諸羅該處民人能各知大義踴躍奉公深堪嘉尚自當特沛恩膏以示奬勵著福康安常青李侍堯即行查明首先倡率之義民頭目一面奏聞一面酌給官職第念該處義民衆多若僅將頭目給官嘉奬恩施猶未普遍前曾降㫖蠲免臺灣本年應徴錢糧著再加恩將五十三年分臺灣府屬應徴錢糧亦概行豁免並著該將軍等即行普貼謄黃俾全郡民人咸知感激倍加奮免急公以副朕優奬義民有加無已至意上又諭內閣曰福建水師營提督藍元枚于臺灣逆匪林爽文糾衆滋事以來屢統領將辨奮勇直前剿殺賊匪并籌畫一切皆有條理特降㫖授為參贊以示奬勵昨據藍元枚奏染患痢症屢次力疾統兵勇往堵禦復降㫖賞給大小荷包用昭體恤兹聞病故深為憫惻藍元枚著贈太子太保並賞銀一千兩以示朕軫念勤勞優恤戎臣之至意所有應得恤典著該部察例具奏欽定平定臺灣紀略卷三十五
