body:
  text: 二月二十九日丁夘常青奏言據蚶江通判陳惇等將拿獲逆匪劉志賢陳傍即陳榜解送到泉臣提犯研訊縁劉志賢即劉鼎鋐又即前獲賊目髙文麟等供出之劉賢士籍𨽻恵安於乾隆三十年往臺充當彰化縣兵房書辦與林爽文王芬曾經認識陳傍原籍漳浦四十六年往臺在彰化縣大肚地方肩挑度日與在臺居住之許溪同縣相熟五十一年十一月初間許溪邀陳傍至王芬家同入天地㑹迨該縣俞峻㑹營查拿林爽文起意抗拒王芬邀陳傍入夥刼營攻城陳傍俱係在塲至劉志賢並非㑹内之人當林爽文攻䧟彰化該犯躱避在家被王芬拿住因係泉民在臺充役年久可以招集泉衆令其入夥劉志賢亦即依從林爽文許劉志賢為偽海防同知刻給木戳一個時有前經拿獲解放之賊匪陳髙往提隨行十二月初四日劉志賢赴鹿仔港住守因傳戱班不到將戯子杖責又將存倉官鹽散賣并勒派船户每隻畨銀二三圓不等嗣陳傍因見事情重大欲圖逃走十二月初六日詭稱避難回籍附搭詔安縣商船於正月初十日至漳浦小銅山地方登岸至舊識之林篤家留住當經漳浦縣兵役拿獲至劉志賢因陳髙拿獲正欲竄匿即經知縣黄嘉訓訪獲報明陸路提臣任承恩解回内地審辦查劉志賢既受偽職當彰城攻䧟之時恐有勾結内應而陳傍既入㑹黨則天地㑹起自何年共有若干人應知確實且有潛入内地探聼信息情事反覆究詰劉志賢堅供並未預為内應陳傍亦供入㑹未久止見林爽文等二十餘人天地㑹名目起自何年共有若干人實不知確實其私渡回漳亦非探聼消息屬實即將劉志賢陳傍二犯正法梟示劉志賢所供之陳髙先經解部容留陳傍之林篤雖據陳傍供明並不知情但係從賊潛回之匪犯並不查明遽行收留飭縣另行究詰犯屬家産查明照例辦理詔安船户不知姓名無從拘提陳傍雖據漳浦縣兵役自行拿獲但小銅山有無口岸飭查到日再行核辦再閩縣商船户陳永泰船隻渡載海壇營官兵一百六十四員名赴臺剿匪於乾隆五十一年十二月二十九日駛至澎湖洋面陡遇狂風船舵刮折漂冲外礁擊碎淹沒把總一員兵丁七十九名巡檢一員跟役三名船户水手扳挾板片得生弁兵八十四名内因傷身故一名受傷病重十七名所載軍械藥鉛等項俱經沉失臣飛飭將得生弁兵給發銀米另配船隻赴臺一面確查淹沒各官兵姓名并打撈屍身及沉失軍械分晰具報同日徐嗣曾奏言連日接閲臺灣文報賊匪林爽文等或云在大里杙庄或云在斗六門或又言在三貂社等語此時賊首要犯多在諸彰北淡之間而竹塹艋舺附近之大姑䧟擺接等處亦有匪党時出肆擾陸路提臣任承恩總兵柴大紀現在鹿港諸羅分路進兵並經提臣黄仕簡添派總兵普吉保等前赴協剿兵力厚集撲滅自易而北淡之宛裏莊賊匪據署守備董得魁稟報督率官兵義民剿捕浄盡擺接等處亦據副將徐鼎士等具稟㑹商進剿是北淡一路已有官兵率領義民協同剿禦釡底遊魂更易洗蕩惟是大里杙等處均係内山倘賊匪潛入生畨勾結滋擾搜捕未免費力臣查署守備董得魁稟報剿捕宛裏庄賊匪之時曾帶有通事瓚瑛及弓箭畨一百名甚得其力此等熟畨之中必有素悉生畨山徑者臣已宻飭徐鼎士督同董得魁等購遣妥幹通事帶領熟畨入山曉諭許以重賞令其遇匪竄入即行縳獻一面飛咨督臣常青及提臣黄仕簡相機搜捕務盡根株同日任承恩奏言二月初五日署都司張奉廷署守備陳邦光李漢升等分巡彰城一帶午刻至大肚山見賊衆屯聚山梁招旗放砲迎拒官兵當令兵丁鄉勇埋伏田坎誘至山脚下三面攻殺鎗砲並施斃賊甚衆並將騎馬一賊馬匹打倒鄉勇陳喜隆乗勢斬獲首級官兵義民并力截殺又擒獲手執紅旗賊目謝華一名賊夥林芳一名奪獲賊械多件當將獲賊二名嚴訊據供俱是林泮上年七月内邀入㑹的曾厯次攻城打仗那被殺的即是林泮是林爽文堂兄手下約有三四百人住在大肚街今日同夥出來在大肚山瞭望堵禦官兵不料抵敵不過就被拿獲等供當將林泮首級梟示該二犯即行正法鄉勇陳喜隆從優奬賞又初六日賊匪潛來放火燒燬海邊漁竂在港望見火起臣即親督官兵由沿海一帶防範分撥遊擊穆騰額守備潘國材署守備陳邦光等同官兵義勇由近海之崙仔頂溪口厝等庄堵禦賊匪擁衆前來將備等即施放鎗砲打敗賊匪兵民奮力追殺斬首二十一顆奪獲賊械鳥鎗竹串刀棍賊旗多件又都司馬元勲守備常萬雄沈勇雲本月初六日黎明聞賊衆在瓦窑庄地方放火隨帶官兵鄉勇前往該處剿殺連放火砲打死賊匪數十人餘賊潰散擒獲匪犯陳鞭何晏二名次日寅刻賊匪數千又來攻擊營盤馬元勲等督同官兵迎敵賊忽散忽聚恃衆擁前官兵用進步鎗砲傷斃賊人無算賊衆大敗奪獲鎗刀等械多件隨將拿獲二犯正法一面咨報督臣常青查核仍督率各將備加意巡防堵禦并㑹商水師提臣黄仕簡籌剿賊窠均奏入上命軍機大臣傳諭常青李侍堯徐嗣曾曰劉志賢一犯前有㫖令該督等派員解京審辦今既據訊明並無𦂳要情節業已先行斬梟自因未接前㫖如此辦理但該犯身充縣書受賊偽職其子嗣未便寛宥即不至擬以重辟亦當發往伊犁給厄魯特為奴以示懲儆著常青於抵臺灣後即查明遵照辦理又據前奏海壇官兵赴臺灣剿賊船至澎湖洋面陡遇狂風淹斃各員弁兵丁等殊堪憫惻著常青查明照例咨部分别議卹其受傷病重者即酌量加賞用示軫恤再前因徐嗣曾等以覆奏事件由六百里馳奏徒勞驛遞曽降㫖飭諭但現在賊匪尚未撲滅著傳諭徐嗣曾如目下得有剿賊㨗音及𦂳要信息仍當由六百里迅速馳奏其㝷常覆奏事件即遵前㫖不必紛紛馳逓以省郵傳至李侍堯由京赴閩後僅於浙江途中拜摺一次雖該督到泉州厦門尚須時日然此時自早入閩境接見屬員及閲看禀報於近日剿賊情形亦必得有信息即當於入境後隨時具奏何以未有隻字奏及豈該督竟不知朕懸盼軍報宵旰焦勞無時或釋耶三月初一日己巳黄仕簡奏言二月初三日接任承恩咨稱現在鹿港分兵進攻賊窠需添兵力查副将徐鼎士帶兵一千五百名已由北路八里坌進口可否酌撥遣用臣隨飛飭徐鼎士如北淡水現在寜貼除酌留官兵防守外其餘帶赴鹿港聼任承恩調度合計北路官兵共有七千名已可併力㑹剿至赴南路剿匪之總兵郝壯猷等即據咨報大湖一帶乃賊匪出沒之所聚散靡常勢甚猖獗應先剿洗正月二十四二十九及二月初二初三連日打仗賊匪被鎗砲打死計數百人併奪獲䥥刀鏢器等因臣查南路賊夥雖叠被官兵剿殺但崗山一帶賊勢尚屬鴟張亟應剿洗浄盡現在派撥官兵即日由崗山後路抄襲與總兵郝壯猷等㑹合夾攻剿洗後立赴鳯山攻復城池又總兵柴大紀收復諸羅後拿獲偽先鋒吴映偽將軍侯辰張請先及賊夥廖東阮贊五名檻解到郡發縣審訊嗣因呉映侯辰張請先三名先後病危即行處决示衆惟是臺地辦理多人實恐不便嗣後拿獲之犯陸續渡海解交督臣訊明正法應行縁坐要犯家屬或在臺灣或在内地查明下落宻為存記隨後㑹同督臣逐一查拿妥辦再南路營恭將瑚圖里因乗馬追賊被賊乗虚入城兵丁衝散之後瑚圖里即到郡城協同堵禦現在總兵郝壯猷前赴南路進剿將來功罪如足相抵事竣後聼督臣查明核辦同日普吉保奏言二月初四日行抵諸羅隨詢柴大紀近日賊匪並未復來侵擾惟前路大埔林一帶有賊匪匿踞是以諸彰路道不通臣面商柴大紀諸羅既係無事但提臣任承恩前報林爽文潛回大里杙勢復猖獗應帶兵赴鹿港㑹同任承恩相機合力進剿則南北聲勢可通隨於二月初七日自諸羅帶兵前進至大埔尾地方有賊匪千餘人迎拒官兵臣即率副將格綳額署遊擊唐昌宗督兵攻剿一面令副將林天洛抄截賊人後路鎗砲打死賊匪甚多擒獲手執紅旗賊目張貴一名賊夥莊光喜林超二名斬獲賊首一十四顆小旗銅鑼刀矛等件又署遊擊唐昌宗奪獲砲一門隨訊拿獲賊人林超供今日拒敵官兵是林爽文令葉省帶領千餘人在此庄内住了七八日此庄内男女不知何時搬去隨飭官兵將庄燒燬初八日行至鹿塲地方劄營黄昏時東面有賊前來在竹林内呐喊放鎗官兵奮勇前攻衆賊敗走活擒賊匪一名初十日行抵鹿仔港隨將沿途所獲賊匪張貴等四名訊明正法現在與提臣任承恩整合兵力併剿賊窠聼候調遣均奏入上命軍機大臣傳諭常青李侍堯曰此時初起時柴大紀止能於郡城扼要處所防守堵禦自不能進搗賊窠悉數擒捕今大兵雲集黄仕簡惟安坐郡城留兵衛已且稱臺灣拿獲之犯本處不便辦理多人更不成話即此足見其畏葸任承恩亦以巡防堵禦為詞分派弁兵零星打仗俱不親身㑹合前往剿捕似此辦理何時事了耶從来用兵之道合則勢盛分則力單黄仕簡任承恩帶兵前往不特官兵不應零星分撥即鄉勇義民等亦應加之鼓舞俾與官兵團聚一處庶伊等見軍威壯盛益加奮勇踴躍從事乃該提督等如此漫無籌畫致兵氣不能振作倘義勇等稍有失利其良善者即不至從賊亦難望其仍前出力其狡黠之徒甚或轉為賊用别滋事端尚復成何事體著將本日硃批普吉保各摺發交常青閲看該督一到臺灣後即將交查黄仕簡任承恩遲誤之處詳細確查並本日批出情節面加嚴審具奏毋稍存迴䕶再任承恩摺内所奏各路之賊動稱數百至數千不等而斬獲賊匪首級不過一二十顆生擒者亦不過一二名看來皆不實在並著常青一體嚴查毋任朦混又昨據徐嗣曾委員將受賊偽職之逆犯髙文麟等三名解到令軍機大臣研審究出林爽文等與通事杜美有勾結生畨希圖將來竄匿内山情事著將原審奏片發交常青閲看令其嚴宻搜查勿致首要各犯遁入内山致稽顯戮事竣後即將内外界址重加勘定以期周宻不至再滋事端其平日防守疎虞之文武員弁一並查叅並將杜美一犯嚴拿務獲解京審辦初四日壬申常青奏言新任督臣李侍堯於二月十七日抵泉臣交卸督將現在辦理事宜向李侍堯詳晰告知并將到臺應辦事務面為商酌後隨於二月二十日自泉起程前赴厦門登舟候風飛渡至臺地情形現又據黄仕簡咨稱賊匪林爽文等因大兵到臺退守窠穴於諸羅之斗六門及大里杙等處羣聚滋擾匪黨衆多任承恩所帶之兵勢覺單薄經黄仕簡又將續到之延建等營官兵内分撥一千六百名派令總兵普吉保副將格綳額林天洛等帶領馳赴諸彰㑹同總兵柴大紀並知㑹任承恩併力剿捕計此日正在搜洗之時臣惟有殫竭駑駘督同黄仕簡悉心調度將首惡林爽文及要𦂳賊目迅速擒拿解京審辦其餘醜類務盡根株並設法預籌不使得與生畨勾結以致日後再有滋擾之事再臣辦理善後事宜需員差遣因酌派泉州府城守營叅將特克什布建寜府同知楊世綸候補布政司經厯葉寳書試用吏目楊兆榮從九品王澤臨五員帶同前往抵臺之後一切文移往來均闗𦂳要并商之督臣李侍堯將福建藩司庫貯巡臺御史闗防一顆佩帶行用以昭信守同日李侍堯奏言於入閩途次接督臣常青來札並抄寄節次摺稿知提督黄仕簡任承恩抵臺後連次攻剿多有斬獲至福州晤撫臣徐嗣曾至泉州晤常青又詳細詢問現在兩提臣南北兩處信息雖已從海邊彼此知㑹而腹地道路尚未相通葢縁任承恩所駐鹿仔港正近大里杙賊窩匪徒最多官兵屢剿尚在抗拒而黄仕簡在南路又有大湖等處賊匪正須剿殺是以尚未聨絡旬日以來雖未續得信息想必又加剿殺數次今常青於本月二十日起程俟到彼宻看情形督率兩提臣視賊所聚處用全力痛剿一二次彼么䯢烏合非素有結約必死之心自當畏死潰散然後分路搜捕不日可以蕆事今内地所以接應者口糧最為𦂳要臣詢常青徐嗣曾已飭各州縣碾米四萬五千石分貯厦門泉州等處現在尚未解到臣一面嚴催以備陸續應用不致有悮至閩省現在情形途次所見極為寜貼秧田已長數寸蓄水翻犁各勤農業又細訪漳泉一帶人情亦皆安静臣但當静以鎮之而宻以稽查口岸為要務不敢稍有疎失再臺匪猝起時所有調兵各事宜自不得不絡繹馳奏今兩提臣已過臺灣常青又往督辦所有軍事業經常青等専摺具奏其知㑹到臣者應請不復再奏如臣另有聞見及常青等所知㑹臣另有商辦者始行馳奏似可稍省馬力均奏入上命軍機大臣傳諭常青李侍堯曰前以賊匪不過烏合之衆無難立時撲滅是以曾諭常青到臺灣後即令任承恩來京常青在彼督同黄仕簡辦理搜捕事宜今任承恩黄仕簡並不帶兵前進甚不如前竟不可恃矣即如常青摺内所稱賊匪退守巢穴於諸羅之斗六門大里杙等處羣聚滋擾任承恩所帶之兵勢覺單薄又李侍堯奏稱現在兩提臣南北兩處信息雖已從海邊彼此知㑹而腹地道路尚未相通等語賊匪既團聚斗六門大里杙等處兩提督如果彼此知㑹奮勇夾攻軍威壯盛自可迅搗賊窠何至賊匪得負嵎團聚文報尚從海邊知㑹伊二人觀望遲悮之咎已無可解免屢經降㫖交常青到彼嚴查恭奏該督此摺自係未接諭㫖時所發計目下該督已可到彼務宜遵照秉公嚴審據實具奏不可稍事姑息至一切剿賊善後事宜全在常青妥協經理該督須於奮勇之中加意持重以期尅期蕆事慰此厪懐其兵丁接應口糧及稽查内地各口岸亦係要務李侍堯向能辦事自能就近妥辦不至貽悮所奏臺灣軍務既由常青専摺具奏李侍堯即不復由驛馳奏所見甚是自應如此以省驛馬之勞初五日癸酉上命軍機大臣傳諭常青李侍堯曰昨據李侍堯奏兩提臣南北兩處信息雖已從海邊彼此知㑹而腹地道路尚未相通等語復查看總兵普吉保摺内則稱由臺灣郡城帶兵先抵諸羅於初十日到鹿港與任承恩併籌勦賊雖該鎮於大埔尾等處曾遇賊打仗然既由郡城直達鹿港並未為賊所阻看此情形自係賊人蟻聚斗六門大里杙等處馳逓文報隻身往來或懼其潛出擾害若帶兵前往亦無虞中途梗阻想李侍堯初入閩境無由即知彼處情形係地方官禀報即據以入奏其所稱道路未通之處本屬未確今普吉保既可帶兵由郡城前往鹿仔港豈黄仕簡任承恩獨不能行乎且黄仕簡帶兵到彼賊人並未再來可見賊知官兵勢盛已畏避不敢復來即使賊人復至郡城黄仕簡正可迎頭截殺不應轉避賊衆豈賊人一日不至黄仕簡寸歩不進乎况昨據解到賊夥楊咏等有林爽文與通事杜美勾結生畨希圖將來竄入内山之供倘賊人竄入内山日久不出黄仕簡任承恩亦終嵗在郡城株守竟不往内山搜捕耶昨據該督奏於二十一日由泉州起身前往若風色順利計此時早到臺灣何以未見具奏此事全在常青妥恊督辦迅奏蕆功朕盼望甚切不可如黄仕簡任承恩之漫無籌畫坐視貽悮也初八日丙子任承恩普吉保同奏言本月十三日寅刻賊匪林爽文帶領賊衆繞道大肚山由畨婆庄來攻鹿仔港臣任承恩即督令遊擊穆騰額等帶領官兵鄉勇前往堵禦臣普吉保帶領副將林天洛等抄截賊後行至畨仔溝見賊勢甚衆正在放火燒庄官兵奮力直前鎗砲並施打倒賊匪甚多賊衆懼退臣普吉保率兵從旁用鎗砲横擊賊匪大敗四竄當即救熄庄房查擒獲匪夥十六名奪獲銅砲大小鐵砲鳥鎗藤牌旗刀矛箭藥鉛多件馬三匹并於賊屍搜獲書信三紙一係結盟底藁餘二紙俱係陳傳代林爽文約夥攻刼鹿仔港埔心等處臣等即將所獲賊犯鄭實等逐加嚴訊據供都是去年林水邀入㑹的二月初六日陳傳寄字與林水齊集衆人往大里杙㑹合初九日我們隨同林水到大里杙十二日林爽文約陳泮周振興陳道等領了三千多人去攻浦心庄我們共有五千多人隨了林爽文來攻鹿仔港林水係頭目騎著紅馬打頭陣林爽文騎白馬在後催人行至畨仔溝正在燒庄不料官兵趕到抵敵不過林水被砲打下馬林爽文先自跑了當令認明林水首級梟示一面將該犯等正法鄉勇從優奨賞又署叅將馬元勲等遇賊匪來攻埔心約有三四千人馬元勲等督同官兵鄉勇施放鎗砲賊人敗退奮力追殺割獲首級九顆耳記辮子共六十二箇在賊屍搜出書信二封奪獲賊旗藤牌鉛藥等項并擒獲女犯一口其書亦係陳傳代林爽文約夥之字當將女犯發訊據供係盧陳氏今年正月裡被賊夥黄七擄去服侍伊妻陳金娘因屢次被官兵鎗砲打死甚多今日陳金娘呌伊露體出陣要厭鎗砲不想就被拿獲等供隨將該犯婦正法賊書五紙咨送督臣常青查核再准提臣黄仕簡咨稱檄令副將徐鼎士酌留官兵駐守淡屬餘兵亦令來彰協力㑹勦等因普吉保兵已全到臣即㑹商先行分劄要地進扼賊吭一俟副將徐鼎士統兵到日即當審察形勢奮勇㑹勦至擒獲賊夥鄭實等十七名應解赴内地審辦苐彰屬地方現乏佐雜人員差委弁兵又在勦賊之際逐起押解實屬乏人久禁恐有疎虞因審明均係餘夥即行正法仍彚供移咨督撫二臣察核奏入上命軍機大臣傳諭常青李侍堯曰林爽文既敢親至鹿港滋擾即係自來就死任承恩正當親帶弁兵迎頭痛加勦殺將首惡擒縛則其餘附和自必紛紛瓦解何以任承恩並不親身擒捕僅派令遊擊等與賊打仗且任承恩與普吉保現在一處普吉保既帶兵剿賊而任承恩竟安坐鹿港豈欲因人成事抑待賊自斃乎殊出情理之外况賊人将所掠婦女逼令露體出陣冀厭鎗砲可見賊勢已窮行徑可笑無難一鼓殱擒乃任承恩一味畏葸遲延不進看此情形現在賊匪尚未撲滅竟係任承恩與黄仕簡始終兩相觀望貽悮𦂳要軍機向來黄仕簡辦事尚知奮勉此次因有任承恩同往致生觀望設任承恩不赴臺灣黄仕簡専辦此事無可推諉轉未必恇怯至此任承恩斷不可再留該處致墮士氣著常青一抵臺灣即傳㫖將任承恩解任飭令即行赴京候㫖其陸路提督員缺前有㫖交郝壯猷暫行署理但行軍之際須將奮勉出力之員加之鼓舞以勵戎行並著常青於普吉保郝壯猷二人内察看孰為出力一面奏聞一面將陸路提督即行交與署理以示鼓勵至黄仕簡如查明貽悮屬實亦不可留於該處即遵前㫖將伊解任送回内地請㫖辦理其水師提督印務即交柴大紀暫署候朕另降諭㫖臣等謹案提臣黄仕簡到臺灣後賊匪已不敢窺伺府城即凡遣兵堵禦之處一經勦殺無不奔竄可知么䯢之衆蜂屯蟻聚本屬無能至使婦人祼體以厭鎗砲其伎倆之窮益見矣如以兩提督親臨行陣官兵義民更必奮勉用力賊衆望風膽落搗穴擒渠自如摧枯拉朽乃竟彼此觀望坐失機宜昩於圖功進取抑亦自貽伊戚者歟欽定平定臺灣紀畧卷九
