body:
  text: 十二月十六日己酉上諭內閣曰恆瑞在鹽水港一味株守毫無寸進實屬無能難勝將軍之任著即來京候旨至福州將軍員缺前曽有旨欲將鄂輝調補因現在保寧已補授伊犁將軍李世傑仍調補四川總督該省地方緊要且毗連西藏統轄畨夷俱有應辦事件李世傑係屬漢人且已年老恐辦理公務精神不能周到鄂輝在川有年於該處事宜較為熟諳將來臺灣事竣後仍令仍回成都將軍原任以資駕輕就熟至常青𠞰捕臺灣逆匪雖未能督率將辨尅期奏績但自駐守郡城以來賊匪屢經攻擾伊已年老尚能臨陳殺賊將郡城保護無虞並節次派撥辨兵援應嘉義調度尚屬有方雖不宜復任總督但伊從前曽任福州將軍熟悉該處情形且以閩浙總督調補該處將來呼應較靈於辦理一切善後事宜更為得力所有福州將軍員缺即著常青補授將來大功告成後即留於臺灣帶同普吉保辦理善後事宜同日孫士毅奏言聞將軍福康安於十一月十七八日攻得斗六門即統兵直抵大里杙賊巢先期遍加曉諭賊黨聞之畏懼當即從大里杙紛紛出降有被賊攔阻者有攔阻不住被賊戕害者亦有竟從大里杙殺出接應官兵者至十一月二十三四等日福康安領大兵奮力殺進已將大里杙賊巢攻破奏入上命軍機大臣傳諭福康安李侍堯孫士毅曰昨據李侍堯奏到官兵攻破大里杙等情與孫士毅所奏大略相同此信自係確實想福康安等奏報之摺業已在途即日可到現在大兵𠞰洗賊巢搜捕逆黨想賊首賊目自無難即日就獲成功蕆事佇奏捷音朕心甚為欣慰孫士毅自辦理調兵運餉諸務以來俱能不分畛域實心經理甚屬可嘉俟大功告竣後當賞給世職著先賞戴雙眼花翎以示優眷至昨據福康安奏柴大紀蔡攀龍守城打仗各情形多不確實一節朕因此事反覆思之竟至徹夜不能成寐向來緑營將辨冒功謊報積習原所不免但以天下之大地方事務在在需人任使遇有軍務勢不能祗仗滿洲官兵竟置緑營於不用此次臺灣逆匪滋事以來該處領兵將辨雖俱未能振作有為然就現在該處將領而論柴大紀蔡攀龍二人尚能奮勇出力柴大紀駐守縣城已經半載經賊百計攻圍時時窺伺柴大紀能督率兵民力為捍衛卒能保護無虞雖伊節次奏報斬獲首級奪取器械等事或間有虛詞謊報此亦緑營積習情事所有但伊困守圍城不辭勞瘁亦當略其短而取其長柴大紀設果如福康安所云為人詭譎取巧則當縣城被圍緊急之時朕曽經降旨諭令柴大紀如力不能支不妨帶兵出城另圖進取柴大紀何難委城而出以為脫身之計即縣為賊所據百姓為賊所得亦得藉口遵旨而行朕亦難治以棄城不守之罪乃柴大紀於奉到前旨後堅持定見竭力固守不忍將城內數萬生靈委之於賊是柴大紀尚知以國事為重朕閲其奏摺為之墮淚豈福康安目擊情形尚不心存憫惻轉事苛求不能以朕之心為心乎即如柴大紀前奏賊匪攻城時用大板木車中藏鎗炮分路攻犯被官兵炮擊碎枋車一節若果是虛詞現在福康安奏到進抵縣城時追殺賊匪奪獲攻城大車二輛又於興化店地方賊匪經官兵追趕大炮鳥鎗遍地遺棄俱為我兵所得等語可見柴大紀前奏賊匪大車架炮攻城之處實有其事並非虛詞之一證又柴大紀所奏縣城糧食匱乏地瓜生花俱盡以油籸充食之語雖縣城被圍時義民等尚有捐助糧米零星接濟兵民未必遽至盡食油籸但當情形緊急之際各路援兵並未即時前進柴大紀目睹縣城糧食垂盡至以日食油籸為詞希冀援兵速到而普吉保恆瑞兩路尚復觀望不進若再實言少有糧米則兩路之救援更緩此時縣城之存亡尚未可知又安怪柴大紀之過甚其詞耶今幸福康安等統兵速進縣城圍解甫獲更生此等措語未實之處朕尚加之寬宥寧福康安不為之原諒耶至蔡攀龍現據福康安到彼查詢於援應柴大紀時進城後仍被賊截斷後路損去多兵未能破解賊圍亦並無自城內殺出打通道路之事但蔡攀龍屢次打仗殺賊曽經常青等保奏頗為奮勇伊帶兵赴援時沿途遇賊接仗督兵力戰究能前抵縣城協同守禦是蔡攀龍在領兵將辨中尚為奮勉朕已加恩擢授提督福康安此時亦可無庸過加責偹即云臺灣逆匪等糾衆倡亂由於地方文武平日貪索擾纍以致激成事端朕非不知但該處百姓休養生聚有年即使地方官貪黷斂怨亦可據實上控豈可公然叛逆况官吏騷擾地方剝削百姓自係文職為多至武職所轄不過營伍兵丁並不經管地方事務縱使從中婪索然較之地方文職所得不過十之一二豈得以此歸咎柴大紀蔡攀龍二人此次破賊解圍官兵會合攻勦固屬福康安海蘭察督率巴圖魯侍衛等奮勇力戰之功該處緑營將辨俱屬懦怯無用但就該處帶兵之員而論其中勇怯不齊亦應潔短較長有所區别豈可一概抹煞即將來平定之後焉能止留滿洲巴圖魯百餘人駐守將緑營將辨概行撤回之理看來柴大紀蔡攀龍二人未免因俱係提督大員且屢經恩旨褒嘉或稍涉自滿在福康安前禮節或有不謹致為福康安所憎遂爾直揭其短乎况柴大紀蔡攀龍俱現任提督水陸將辨兵丁皆所統轄福康安即有不滿伊二人之處然其功究不可泯亦應外示優容若遽加之聲色則所屬將辨兵丁見統轄大員全無顔面未免心存輕視竟至呼應不靈從而解體於事大有關係即使伊二人實有緑營習氣不可信任福康安何妨俟大功告成到京時密為面奏亦不為遲何必於此時遽以此形之奏牘耶朕於柴大紀蔡攀龍二人並非先有成見不過念其守城打仗勤苦出力曲加軫念福康安非他人可比尤當仰體朕心略短取長方得公忠體國之道况柴大紀已加恩封以伯爵蔡攀龍業經超擢提督福康安所奏各情節並無確據又豈可轉沒其功遽加以無名之罪耶總之柴大紀蔡攀龍二人功過自有定論也福康安此時總以坦懷相待不稍露詞色為是臣等謹案福康安𠫭奏柴大紀時未經列欵入奏我皇上念柴大紀在嘉義數月積有微勞不肯因未有指實之言即行查辦降旨訓諭至於再三逮後柴大紀貪縱不職廢弛營伍種種劣迹全行敗露始命福康安李侍堯等查明參奏具見皇仁體恤周至惟恐宣勞效力之臣稍為屈抑凡有人心者宜何如感激圖報乎十七日庚戌李侍堯奏言接福康安來咨調取同知通判知縣雜職等十六員查臺地辦理糧餉等事奉𣲖有各省保舉道府人員及本省丞倅等官交李永祺委用今賊巢已破一切撫綏安插以及承應各項差使自須多員經理臣即遴選妥員如數派往以資差遣其內地各缺現有分發一等舉人可以委署毋庸另請揀發至軍需銀兩除陸續解往臺地各軍營一百六十八萬兩外福康安起程時雖又委員賫解五十萬兩隨往續又撥解府城二十五萬兩鹿仔港二十萬兩但現在用兵正當緊要之時所有軍餉自須寬裕備辦始得應手昨準福康安咨取一百二十萬兩臣現亦照數撥解惟是前後統計共解過臺地三百八十餘萬兩而內地過兵運餉夫價船價以及製備軍裝發給新募兵餉等項支用亦多雖現在尚未用完將來或有需接濟之處再行酌撥以資預備奏入上諭內閣曰現在臺灣𠞰捕逆匪大功即日告竣一切善後事宜需用較多自當寬為儲備以資接濟著户部於附近鄰省內再酌撥銀二百萬兩令該督撫派員迅速解赴閩省交該督等存貯備用二十三日丙辰福康安海蘭察恆瑞鄂輝同奏言二十日黎明進勦斗六門約行十餘里有賊匪萬餘分據大埔林中林大埔尾三莊阻截道路該三莊東西相去各數里而賊之剽悍多聚中林我兵會攻一處賊匪必左右抄截互相救應隨商令恆瑞普吉保等進攻大埔林鄂輝袁國璜等進攻大埔尾左右並進海蘭察帶領額爾登保穆克登阿春寧張朝龍及巴圖魯侍衛章京等専攻中林臣福康安帶領巴圖魯章京特爾登轍等及副將張芝元參將吳宗茂各員往來督催中林賊匪排列莊外蜂湧前來海蘭察即率領巴圖魯侍衛等直前馳射賊匪鎗炮甚多拚死抗拒我兵倍加奮勇不避鎗炮殺散賊匪攻克中林其大埔林大埔尾兩處賊莊經恆瑞鄂輝等奮勇剿殺同時並潰官兵追殺二十餘里賊匪棄城奔逃不能返顧沿途殺賊六七百名鎗斃騎馬賊目十餘人積尸遍野無暇割取首級將器械馬匹全行奪獲日晡時追至庵古坑地方該處係賊目蔡福巢穴周圍挖壕立柵外釘木板內築土牆防守頗堅臣等帶兵直抵柵前見敗逃賊匪紛紛竄入守柵之賊俱露驚惶官兵遂乘勢一齊擁進斫殺賊匪不可勝計維時天色已暮馬力漸疲本應稍為休息但查斗六門距庵古坑三十餘里為適中四達之地得此要隘無難直抵賊巢賊匪當屢經挫衄之後心膽已寒官兵乘勝疾驅勢在必克隨催兵連夜前進途中拿獲活賊據供賊人最畏騎馬衝突現於路口開挖陷坑密布竹籖希圖抗拒臣以賊匪狡計最多不可不防現在稻田收穫泥潦漸乾即繞道由稻田行走二十一日齊至斗六門賊匪聚集甚多并將附近村莊賊黨撤回抵禦我兵四面進攻用利刃長刀斫倒竹圍奪據賊卡轉因其拌死抗拒得以痛加殱戮直至午刻後賊匪抵敵不住四散奔竄遂將斗六門收復該處為賊人久占之地居民皆已從賊除臨陳殺死外村內藏匿者尚有三百餘人業已全數搜出盡行正法連日以來殺賊一千數百名各處村莊震懾軍威扶老挈幼投赴軍前者紛紛不絶西螺民莊畨社亦於是日投出臣妥為撫輯該村民情願充當義勇隨同剿賊臣即派署同知黃嘉訓帶領前往將西螺東螺餘匪搜捕淨盡現在中路一帶業已肅清普爾普亦自郡城開通道路事竣北來臣等即日整兵進搗賊巢擒拿首逆查林爽文自諸羅敗竄後連夜遁回或赴水沙連或赴大里杙尚無確信臣等擬由水沙連至大里杙一帶山路跟蹤追捕並一面行知舒亮徐鼎士徐夢麟由烏日莊等處前來會合此次巴圖魯侍衛章京滿漢屯土官兵等甚為奮勇出力每戰皆勝且臺灣道里遙逺較內地里數不啻加倍官兵等晝夜進攻不遑寢食沿途繞道行走涉溪過墈並未稍形疲乏看此情形將來一到賊巢自可尅期奏捷同日李侍堯奏言據蚶江通判陳惇稟稱將軍於十一月二十五日攻開大里杙後有生畨稟説大里杙左右并後邊都藏有賊人官兵在犁頭店地方劄營二十七日官兵進去搜山三十日生畨又到營稟稱願往拏林爽文獻功等語又據船户紀三回稱在淡水聞説二十五日大兵攻開大里杙賊人都逃入內山國姓埔地方初二日有義民到淡水云將軍諭令義民各自歸莊耕種如今臺灣南北道路都通文報往來無阻北路每米一石賣錢二千五百文等語該兵丁船戶等所言雖係得自傳聞但前後印證攻破大里杙日期俱屬相同而賊已失其所守福康安等乘勝攻剿必能馭用生畨使賊首不致竄逸均奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯曰賊匪經官兵屢次𠞰殺勢力窮蹙望風逃竄斗六門既已攻克逆首林爽文自必逃至水沙連大里杙一帶希圖潛匿現在福康安等乘勝𠞰捕自己跟蹤追獲逆首林爽文等想已就擒前據李侍堯孫士毅先後奏報已聞有二十五日攻克大里杙之信本日李侍堯摺內又有二十七日官兵由犁頭店進去搜山並稱三十日生畨等到營稟稱願拿林爽文獻功等語其信自屬確實此時福康安等想已將水沙連大里杙等處賊莊乘勝攻克但尚未據奏到或係因風阻滯未能速達現在林爽文究於何日擒獲盻望捷音更為殷切賊匪等罪惡貫盈天奪其魄現在大兵四路𠞰捕設逆首林爽文等乘間由海道竄逸則洋面遼濶官兵不慣乘船轉致難于跟尋今幸逃入內山而官兵等於山路坦途兩俱便易况該處生畨又不肯將伊容留懇請擒出獻功此正逆首等自投羅網定可立就擒縳設使生畨等不明順逆私自容留乘此全勝兵威直入內山將逆首擒拿亦屬易事普爾普前經福康安等派往郡城一帶打通道路今業已事竣回至北路而府城外賊目陶烏復帶領匪黨自行投出懇請效力贖罪本日李侍堯奏亦稱臺灣南北道路俱通文報往來無阻北路每米一石賣錢二千五百文等語是南北道路業已打通府城一帶賊匪聞北路官軍連次克捷賊首業經逃竄自有渙散之勢常青此時自當督率將辨將南潭中洲等處賊匪𠞰殺淨盡收復鳳山擒拿賊目莊大田廓清南路上又諭內閣曰斗六門為南北要隘久經賊匪屯占福康安統領官兵將中林大埔尾大埔林各莊同時攻潰乘勝疾驅連夜前進𠞰殺賊匪將斗六門收復官兵奮勇力戰不避鎗炮甚屬可嘉現據李侍堯奏探聞官兵攻破大里杙賊巢賊匪逃入內山生畨等稟稱欲將逆首林爽文擒獲獻出等語想福康安等奏報之摺自已在途即日捷音可到俟大功告竣再行另降諭旨外福康安海蘭察鄂輝恆瑞普吉保袁國璜著先行交部議敘至普爾普現已打通府城道路仍回北路協同進𠞰亦屬出力普爾普著交部議敘所有福康安等奏到格外出力之侍衛章京及鎮將官辨等除賞給巴圖魯名號及升等賞翎各員外其餘在事出力之侍衛章京鎮將官辨等俱著查明一併咨部議敘二十四日丁巳上命軍機大臣傳諭福康安李侍堯曰閲福康安等奏摺內節經派委鎮將等分路攻𠞰而柴大紀蔡攀龍二人祇令其在嘉義縣防守及招安李七等項細事並未派令打仗一次自係福康安於柴大紀蔡攀龍二人意存不滿是以不加委任但伊二人如果狡猾難信亦必實有劣迹可據柴大紀力捍圍城已及半載細思伊平日居官如果貪殘剝削實有取怨於民之處則當縣城被圍緊急時百姓焉肯為之出力死守即柴大紀果有貪迹亦係合郡文武效尤成習未可歸罪於柴大紀一人而伊保守縣城不辭勞瘁于其功豈可盡泯至蔡攀龍援救縣城雖未能殺透賊圍打通道路但伊在臺灣將辨中尚為出力能事亦屬可用且伊前次不過遊擊尚非若柴大紀之職司専閫可比自更難肆其貪虐而伊打仗殺賊素為奮勉前據孫士毅奏粵省之人亦知蔡攀龍為賊所畏即使其才具中平原可核其功罪兩不相掩今福康安於伊二人獨不加以委任不獨柴大紀蔡攀龍自覺無顔即其所轄辨兵見將軍於兩提督大員毫不加以詞色恐致呼應不靈殊有關係著傳諭福康安于柴大紀蔡攀龍二人仍宜加委用令其自效以勵衆心况福康安等督兵打仗屢戰屢捷朕業經懋賞酬庸加封公爵四團龍褂寶石帽頂而福康安竟不能以朕之心為心於柴大紀蔡攀龍之功概行抹耶福康安現在逺涉重洋宣勞著績固深為朕所嘉許但於此事冒昧陳奏朕不得不加以訓誡福康安惟當化其成見勿為人言所惑休休有容以期無負任使况二武夫亦不值福康安留心偏見也再恆瑞自駐劄鹽水港坐擁多兵株守不進並未援應柴大紀而轉以賊多兵少率請添調數萬大兵是其畏葸無能實無可解免是以屢經降旨嚴飭並將伊革去將軍令福康安查參具奏今閲福康安奏到之摺不但不將伊參劾且摺內聲敘伊帶兵打仗之處頗似露其奮勉此時福康安等統領大兵乘鋭深入豈少恆瑞一人且恆瑞若再不一同前進豈復尚有人心倘恆瑞果能奮勉則當福康安未到之先帶兵赴援何以並不見其鼓勇寸進今祇係因人成事即有斬獲亦何足為功乃福康安於恆瑞頗留地步看來福康安于柴大紀等過事吹求而于恆瑞又不免因係親戚曲為瞻徇其何以服衆心而示公正耶至臺灣現在剿捕事務即日告竣所有該處地方官平日廢弛擾纍釀成事端之處亦應確切查辦即如永福臺灣府城協同防守雖有微勞但係道員在彼數年該管地方致有逆匪肆擾伊本不能辭咎其防守府地原屬伊分內之事且賊匪攻擾時有常青在府城督率兵民竭力堵𠞰永福不過隨同守禦伊身係滿洲於賊匪滋擾之際豈有不幫同常青禦賊而轉委城從賊之理即云逆匪滋事由於府縣激成而府縣等皆係永福所屬平日何以漫無管束以致釀成巨案永福在臺灣道任內有無貪黷劣迹著李侍堯確切查訪據實具奏不得姑息即從前被賊戕害各員如孫景燧董啓埏劉亨基長庚湯大奎等雖俱為賊所害但其平日居官實在有何貪縱不職劣迹以致激變之處亦應仍將其實在欵迹逐加查究孫景燧等皆係永福屬員其在任劣迹永福自無不知安有任其激成事端置之不問之理李侍堯當嚴加查訪據實參奏上又諭內閣曰此次福康安等統領將辨𠞰捕臺灣北路逆匪奮勇打仗所向克捷將賊匪屯占要隘各處先後收復屢著勞績其隨同打仗兵丁奮勇力戰不避鎗炮踴躍爭先甚屬出力自應一體加恩賞賚除湖南貴州二省派往兵丁雖已配渡尚未前抵該處外其四川屯練降畨及廣西等省兵丁隨同將領前抵諸羅殺散賊匪及攻克斗六門等處均能打仗出力自應一併加恩用奬勞勩著福康安查明此次隨同打仗兵丁其實在出力者每名賞給一月錢糧其出力稍次者每名賞給半月錢糧以昭鼓勵二十五日戊午上命軍機大臣傳諭福康安李侍堯曰德成自浙江差竣回京召見時偶詢及柴大紀平日居官聲名如何德成在浙有無傳聞據奏風聞柴大紀自復任臺灣總兵以後縱恣自大且居官貪黷較之地方文職尤甚並將臺所轄守兵私令渡回內地貿易牟利駐守之兵所存無幾上年逆匪林爽文等滋事不法其始不過會匪黨夥聽從附和人數不多因存城之兵無幾不能即時搜捕賊匪糾衆肆擾距府城止有三十餘里而柴大紀尚不思前往堵禦經永福催令出城始與賊打仗又因兵少敗衄以致賊匪益肆猖獗不可復制等語果如所奏是柴大紀在總兵任內貪縱不職骫法牟利于賊匪起事之初任意玩視使賊匪得以鴟張蔓延日久竟由柴大紀貪縱廢弛釀激事變其平日劣迹已屬確有可據浙江既有聲聞福建自更有議論而福康安前此奏到之摺竟未言及祇含糊其詞實大不是矣柴大紀自駐守嘉義縣城後賊匪屢次攻擾守護無虞經朕降旨設力不能支不妨率衆出城而柴大紀始終固守其功固不可泯但伊于總兵任內似此藐視法紀貽誤地方則其罪亦難諉卸朕用人行政從無適莫之見有功必賞有罪必懲斷不肯稍涉顢頇為息事老人福康安到彼後于柴大紀種種劣迹自必有所見聞即應訪查明確將其實在欵迹據實參奏乃僅稱其沾染緑營氣習狡詐難信而于柴大紀平日如何侵貪激變之處並未逐欵指出祇含糊具奏豈欲待朕自為揣度耶試思柴大紀係守城有功之人若止憑含糊無據之詞豈能將伊治以無名之罪今朕于召見德成無意中偶然詢及始悉此等情節而德成于朕詢問時初猶以柴大紀屢次邀恩懋賞未肯遽行陳奏經朕再四開導始一一直陳福康安受恩深重非他人可比乃于柴大紀平日罪狀並未列欵入告福康安豈德成之不若耶著傳旨嚴行申飭並著將柴大紀實在欵迹詳悉查明並詢之永福等果否實有前項骫法營私之處即行據實參奏至李侍堯自調任閩浙駐劄厦門于柴大紀平日居官聲名狼籍及廢弛玩悮之處豈無屬員稟報來往傳聞且德成現在浙江已人言藉藉欵迹多端豈有李侍堯近在本省為總督轉無聞見之理况柴大紀籍𨽻浙江而其鄉評如此更非荒唐其事自屬確實李侍堯自應據實劾參即因柴大紀守城有功朕亦自有裁奪乃李侍堯見柴大紀經朕屢加恩奬輒思容隱不言殊不知朕于臣下功罪從不肯絲毫假借即如李侍堯從前歷任總督素能辦事受朕恩眷最優後因在雲貴陕甘任內兩次獲咎即將伊按例治罪今於辦理臺灣軍務頗能奮勉朕仍疊次加恩可見朕于黜陟豫奪一秉至公初無成見即李侍堯所身受者而言已可共證今李侍堯於柴大紀有心瞻顧徇隱實屬辜恩昧良前因李侍堯派撥官兵接運糧餉各事宜經理妥速已疊次加恩晉錫宫銜賞戴雙眼花翎即日大功告竣本欲給還原襲伯爵以示優奬今伊似此心存欺隱看來竟係不深知朕之一切秉公賞罰明斷伊無福承受朕恩豈可再膺懋賞給還伯爵耶朕臨御以來勵精圖治五十二年如一日如福康安李侍堯此等存心行事或在朕九旬百嵗之時妄思朦混或可今清明在躬無逺勿矚即歸政以前猶日孜孜不敢寧息豈肯於一切政務稍涉含糊即諸臣中小有過失朕非不曲加寬假至於用人行政以及關係地方吏治軍國大事則是非曲直從來核實辦理賞功罰罪權衡至當安能任臣下之顢頇了事耶所有德成指出柴大紀各欵及此外有何别項劣迹並著福康安李侍堯各行嚴查密訪據實參奏毋得再有瞻徇致干重咎上又命軍機大臣傳諭李侍堯琅玕曰前經降旨加封柴大紀伯爵並賞給銀一萬兩令琅玕于浙江庫項內支銀五千兩給伊家屬並諭令李侍堯于閩省藩庫內撥銀五千兩解送柴大紀處給豫使用現在另降諭旨訪查柴大紀激變殃民等事所有前項銀兩未便徑行賞給著傳諭李侍堯琅玕接奉此旨將前項銀兩暫停給發另候旨辦理二十六日己未常青奏言近日南路被脅民人聞知北路大兵痛殱賊匪自當各求生路漸次歸莊今查十一月十七十八二十等日尚有賊匪一二千在府城小南門大北門外騷擾臣隨派侍衛雅爾疆阿翼長官福等帶領辨兵分投迎剿鎗炮斃賊甚多又各追趕五六里殺賊十餘名看來俱係脅從之徒易于潰散此時賊黨勢孤必將潛逃竄伏臣現于府城沿山要隘處加意堵禦其沿海要口已有李侍堯派到繒船官辨兵丁在鹿耳門外往來巡邏臣又派江寧將軍永慶副都統博清額總兵陸廷柱輪流前往稽查並據臺灣道永福多備小船選派兵役率同廳縣佐雜分路設立水卡該道仍不時親往督拿倘有賊匪竄至定可立即擒獲必不至有搶奪船隻逃入洋面之事所辦似為周密至于東港一口現在有兵駐劄俾商販糧食得以往來其有避難歸莊者仍飭地方官隨時撫恤再查南路鳯山一帶踞莊抗拒從賊已久之人未免畏罪不前臣現飭令臺灣道永福凡逺近莊民除前經該道給發腰牌各安生理外再行按莊愷切曉諭概許輸誠復業如果通莊俱係良民以後或有賊黨入莊即令該莊人衆立刻拿解併蹤迹莊大田藏匿處所共相擒獻立豫重賞其查出負固不服之莊計李侍堯調來內地兵一千名亦將到營臣臨時妥酌前往搜剿至內山一帶前已飭令臺灣縣知縣王露差人賫札往諭畨社今再令該知縣仍遣熟諳畨情之人前赴各社諭令擒賊許以奬賞不致逆匪潛逸稽誅奏入上命軍機大臣傳諭福康安常青李侍堯曰常青奏到之摺尚無取勝消息不過接奉諭旨敷衍塞責亦何顔為此奏耶看來常青一路兵力本覺單弱李侍堯由內地調往之兵亦屬無多又尚未到而府城原有官兵未免師老力疲其氣已餒今賊匪尚在郡城各門分路滋擾常青此時應酌量情形若有機可乘自當帶兵將附近賊匪悉力搜捕若自揣兵力不敷仍應遵照前旨固守府城現在福康安已攻克斗六門並有攻破大里杙賊巢之信逆首林爽文定可即日就擒其南路賊匪聞北路官軍屢次克捷自必聞風膽落且經常青曉諭各莊民人如遇賊黨入莊即行拿解並蹤迹莊大田藏匿處所共相擒獻給豫重賞當此賊首潰竄之時其餘黨羽日就解散或其夥匪自謀生路竟將莊大田縳獻亦未可定且逆首林爽文之次即係莊大田均為渠魁首惡即日福康安拿獲林爽文後斷無將莊大田竟置不辦之理自應乘屢勝兵威于北路賊匪搜剿淨盡之後前往南路與常青會合一處併力𠞰捕務將賊目莊大田及黨夥各要犯悉數拿獲方可謂之蕆事其洋面一帶仍著常青嚴飭將辨實力巡緝截其逃竄之路勿令賊人得以奪船入海現在常青處兵力不多即未能拿獲莊大田朕亦不加之深責若于海口要隘不能督飭將辨嚴密巡訪實力查緝或致莊大田及他要犯得以由海路逃逸令常青自思伊當得何罪耶本日令軍機大臣提訊任承恩據供曾聞柴大紀操守平常聲名狼藉並不管束兵丁任其遊蕩上年十一月柴大紀巡閲各營本應由彰化至淡水等處查閲因聞林爽文滋事並不前往查辦轉回至府城後來林爽文攻擾府城時聞柴大紀尚在城內經永福催令打仗始帶兵出城在城外十餘里地方駐劄等語與昨日德成所奏大略相同似無虛假柴大紀種種劣迹德成在浙省尚有風聞而任承恩于四十九年到提督任時亦已聞其聲名狼籍廢弛營伍可見人言藉藉已非一日乃福康安李侍堯含糊徇隱即治罪亦所應得今經朕嚴行訓飭福康安李侍堯務將德成指出柴大紀各欵及任承恩所供各情節並此外尚有何劣迹一併據實查參候朕裁酌朕于福康安李侍堯恩眷素優今因此事竟不免煩勞朕心為朕所憎然朕之憎伊二人亦有輕重福康安雖未將柴大紀實在欵迹指出參劾但究已具摺陳奏且福康安甫到臺灣為時未久或未能訪查確實又正值剿捕賊匪之際無暇詳悉聲敘尚可原諒然已屬非是至李侍堯調往閩浙總督已及一年柴大紀種種劣迹久已物議沸騰傳播鄰省即任承恩前在陸路提督任內臺灣非其所轄亦早有所聞而李侍堯並無一字奏及朕之待李侍堯恩施格外乃伊如此瞻徇欺隱實屬昧良負恩無福承受優眷此事雖徐嗣曾亦係該省巡撫未經具奏但伊係漢人平日信任亦非李侍堯可比而李侍堯尚然如此朕亦難怪徐嗣曾之不奏矣著李侍堯即將因何並不據實參奏有心徇隱之處明白回奏欽定平定臺灣紀略卷四十八
