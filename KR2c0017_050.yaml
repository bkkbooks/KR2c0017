  text: 欽定四庫全書欽定平定臺灣紀略卷五十
  hash: sha256:54af8b270358e15d4455844fc81800d1588f40a98f38dd569bd5acd89dcd12a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_050-1a, image: WYG0363/WYG0363-0603a.png}
body:
  text: 正月初四日丁卯上諭內閣曰上年臺灣辦理軍務漳泉等府屬應付浙閩滿漢官兵及四川湖南貴州各兵兼之糧餉軍裝鉛藥等項絡繹過境差務甚繁資用民力之處最多兹屇春祺普錫之時大功即日告竣自宜特沛殊恩以示優恤所有泉州府之晉江惠安同安漳州府之龍溪漳浦海澄詔安等八縣本年應徵錢糧著加恩蠲免十分之三其浦城崇安建安甌寧南平古田閩縣侯官福清莆田仙游等十二縣應徴錢糧著蠲免十分之二至福鼎霞浦福安寧德羅源連江光澤等七縣所有應徴錢糧著緩至五十四年麥熟後徴收俾小民均沾渥澤以副朕惠愛黎元有加無已之至意上又諭內閣曰現在臺灣府㕔縣應行改建城垣德成於工程事務素為熟諳著即馳驛速赴臺灣會同徐嗣曽將該處應辦城工悉心估勘同日孫士毅奏言十二月二十二日船户進口傳稱福康安帶兵搜山分派將辨各路齊進已於十二月初十前將首逆林爽文擒獲且稱十月間賊匪數萬日夜環攻諸羅元長莊等處營盤見賊勢利害不敢帶兵前進幸將軍福康安痛剿賊匪殺進諸羅道旁百姓慶幸更生喜極而泣將軍也在馬上墮淚各等語與臣前此所聞無異其言似確奏入上命軍機大臣傳諭福康安孫士毅曰前據李侍堯奏聞得賊目陳泮懇請定限於十二月初八日以前將林爽文獻出日內盻望福康安奏報擒獲逆首之信正深懸注今據孫士毅詢問進口船户有十二月初十日前生擒首逆林爽文之語此信得自洋面往來商客自屬確實計福康安奏報之摺自已在途不過日內即可奏到實信至摺內稱賊匪攻擾諸羅時元長莊等處營盤見賊勢利害不敢帶兵前進自屬輿情公論又稱福康安一到即親身統兵痛剿賊匪殺進諸羅福康安進縣城時見百姓跪迎在馬上為之墮淚自係該處百姓被圍日久慶得更生福康安目擊情形為之憫惻真是乃心國家之良臣與朕同心至元長莊等處營盤見賊勢利害不敢輕進自係恆瑞普吉保二人畏葸觀望其咎均難解免著福康安將恆瑞普吉保二人罪狀分别輕重據實具奏上又命軍機大臣傳諭徐嗣曾曰臺灣賊匪滋事不法現經福康安等攻破賊巢擒拏逆首該處各村莊投出難民甚多急應撫綏稽察其義民鄉勇亦應安插歸莊徐嗣曾到臺灣後務須與福康安悉心籌酌勉力妥辦俾該處民人共臻寧謐不致失所至臺灣府㕔縣現需改建城垣工程較大非司員所能經理德成於工程事務素為熟諳已降㫖令其馳驛前赴臺灣詳悉勘估該撫務須㑹同妥辦籌估周密以期工歸實際帑不虛縻一勞永逸方為妥善初九日壬申福康安海蘭察鄂輝同奏言前聞林爽文家屬潛匿水裏畨社即遣義民首職員楊振文舉人魯大源曉諭社丁杜敷令其擒獻兹於初十日復遣帶領義民之教諭郭廷筠帶同投出賊目黃寬黃翰陳講前往設法擒拏十二日據杜敷令其弟杜朗同黃寬等來營稟稱杜敷曉諭生畨將林爽文家屬拘留恐其畏罪自戕不便遽行擒縛定於十三日誘令出山逃命官兵即可拏獲等語臣查水裏畨社至大營七十餘里山徑甚屬叢雜林爽文現在潛匿內山若聞知家屬被拏竟在中途邀奪杜敷等人數無多恐難抵禦即派令副將張芝元恭將吳宗茂遊擊王宣守偹鄭元楷馬大雄帶領漢土兵丁一千名直往番社一面曉諭生畨毋庸驚懼十三日黎明張芝元等進入內山約二三十里遇見杜敷帶同生畨百餘人將林爽文之父林勸母林曾氏弟林壘妻林黃氏在途中圍守官兵到後即行按名拏獲恐賊黨仇恨杜敷害其家屬仍令帶領生畨入山自行護衛并令探訪林爽文潛逃踪跡臣等即將林勸等隔别嚴訊跟究林爽文下落據林勸供二十四日夜間林爽文自大里杙潛逃從火熖山後番社行走他就往集集埔把我們留在水裏社居住這十餘日總未見他不知逃往那裏去了等語質之林黃氏林壘供亦相符而林曾氏尤屬狡悍不肯吐實因係應行解京要犯不便刑訊設法開導方能録取實供又拏獲僞軍師僧悟天訊問復供稱林爽文大約逃在柵欄山後一帶地方藏匿供詞亦屬游移未可慿信適有賊目阮和陳泮歐旅等帶同眷屬自行投出該賊目等均係有名頭目既已悔罪歸誠即可令其立功自效臣隨靣加開導留其家屬在營發給執照仍令扮作賊黨入山跴探一俟得有確信即行帶兵前往現在賊首東西奔竄黨羽離心賊目人等皆思自行投出逃匿者亦多被官兵拏獲並據撫輯村莊各員稟報被脅民人歸莊者已有數萬看來賊勢窮蹙已甚不過恃其地勢險僻勾結生番得以苟延殘喘祇須嚴防隘口杜其出山之路一面招致生畨協同堵截縱使弋獲稍遲數日亦不致漏網稽誅再職員楊振文舉人曾大源世居彰化去年賊匪滋擾時屢遣賊黨招致該職員等深知大義不肯從賊棄家避至泉州臣在大擔門候風時詢訪熟識臺灣情形之人即將該職員等帶赴鹿仔港招募義民隨軍進剿此次購線杜敷擒獲賊眷不辭艱險前往畨社曉諭尤為出力而曽大源又曾經遵檄帶領義民隨同舒亮在大肚溪等處打仗均屬奮勉可嘉楊振文係捐納四品職銜加銜未免過優現已賞戴花翎以示鼓勵曽大源係文舉人出身年齒尚輕豫以知縣實缺恐其不諳民社觀其人尚明白文理亦優臺灣風俗以得授京職為榮可否將該舉人以內閣中書補用至杜敷招致生畨拘拏賊眷亦屬出力已賞給千總職銜所有出力辦事及生番人等俱已查明從優奬賞其林爽文家眷同陸續拏獲賊目蕭悟天賴應劉天錫林良林順林祖胡真沈定劉德等現在研取確供另行選派妥員解京辦理再查臺灣地方本無土著以全郡而論漳泉廣東三處民人居其大半而福州汀州興化等府民人寄籍者亦多除郡城縣城及港口鎮集各處俱為五方雜處之區其餘村莊原係自分籍貫各為一莊居住惟因閩莊粵莊彼此交錯田業毗連遂有搆釁相爭之事如能將漳泉廣東村莊酌為遷徙各分界址使其相離較逺固可以稍杜爭端但南北兩路地方寬廣處處清釐廬舍田産皆須互相易換房間之多寡田畝之腴瘠既難適得其平而𣲖往查辦各員又不能不假手胥吏辦理稍有未妥轉恐紛爭滋事若令義民仍守世業查明與賊匪同莊之人即行遷徙又屬難於區别蓋臺灣鬭狠成風又因賊匪蔓延日久愚民畏其凶橫心懷兩端雖漳民中未嘗無向義之人而泉州廣東各莊附賊者亦復不少除山猪毛蕭壠學稼等處始終通莊拒賊外其餘一莊之中或充義民或為賊黨甚至有父兄現係義民子弟復去而從賊奸良相雜實屬不齊即如諸羅受困時賊匪內間有潛賣糧食接濟城中之人而義民被賊褁去者又復中道從賊此等情形可為明證現在被脅投出之人俱已幸獲更生歸莊安業倘於民心甫定之後復行紛紛查辦概令離析勢有所難詳察情形漳泉廣東民人各分氣類固屬風俗不純而閩粵各莊彼此鄰近即偶有為匪之事不能合成一氣轉可互相舉首且民風之淳薄原無一定全視吏治為轉移從前地方官撫輯不得其宜惟知貪圖安逸諸事廢弛甚或遇有械鬭重案意為出入從中取利奸民等全無警懼日久遂釀成大案將來賊匪蕩平之後若府縣皆得其人痛改積習於民間結㑹聚鬭之事有犯必懲秉公辦理嚴加約束自不致别滋事端再舊例內地民人至臺灣不准携帶眷屬止許隻身居住耕種今內地携眷出口者未聞稽查禁止因何開此例禁自有舊案可稽已飭該道府確切查明另行覆奏臣查海洋重地禁止搬眷居住使民人顧戀室家不敢恣意為非舊例原屬妥善但臣經過各處村莊民人等俱有眷屬而查㸃投出難民婦女幼孩尤多該民人等居住臺灣已厯數世勢不能令其仍回內地若僅申明往例止許隻身出口民人等一到臺灣仍可置立家室例禁雖嚴亦屬有名無實至臺灣地方寬廣奸宄易滋臣所到諸羅彰化兩縣地界已極遼濶即如現在進兵劄營之地不但從前剿賊官兵不能搜捕至此即地方官亦未嘗親身經厯居民等恃其險逺恣為不軌遂致無所顧忌自應酌添丞倅將辨以資彈壓臣原擬於事定後將全郡地方自鳳山直至淡水逐處詳加查看將如何建立城池營汛添設官辨兵丁之處歸入善後事宜妥議以期一勞永逸綏靖海疆斷不敢因念切瞻依稍存草率了事之見至海蘭察及巴圖魯侍衛等自應於事竣後先令起程但臺灣地方廣濶民情反側難安必須威望素著大臣帶領巴圖魯等分投巡察方足以資彈壓應俟民情大定將善後事宜酌籌妥協交與鄂輝徐嗣曾從容妥辦再同海蘭察等起程回京所有貴州廣東廣西屯練兵丁最為勇壯出力自當酌留數千以為鎮撫之用苐向來軍營撤兵先後總以道路逺近為凖今將川黔逺省及鄰省兵丁酌留竊恐閩省各兵未免稍存形迹事竣時酌量情形如無需多兵鎮撫即令廣東廣西兵丁一並撤回並通行曉諭各營閩粵官兵隨征一載久著勤勞與川黔各兵甫到臺灣者不同自應先行撤回以示體恤如此明白宣諭歸伍者咸知感悅而所留皆係勇健兵丁臣得藉資指臂不致虛縻廪給實於公務有禆再十二月初一初六等日賊匪攻擾麻豆茅港尾等處經遊擊黃象新擊退殺死賊目徐英打傷賊目陳聘殺賊二百七十餘名初九十二十三等日梁朝桂帶兵巡哨至麻豆莊等處遇賊均經官兵殺退十四日復有賊匪四千餘人分擾麻豆茅港尾官兵奮勇剿殺鎗炮打死賊匪甚多奪獲鉛藥器械無算又烏什哈達探聞大武壠賊匪千餘人在大客莊地方搭藔居住隨於初五日進剿鄭國卿遣都司吳壯圖領兵接應過河直冲賊隊賊即沿山敗走官兵追過山梁十餘里焚燒草藔二百餘間殺賊三十餘名割取耳記二十八件十一日復帶兵前往分路進剿見賊匪在山內分隊排列施放鎗炮官兵奮勇進攻殺死賊匪百餘名割取耳記三十三件奪獲刀矛十七件查麻豆莊大武壠等處均係通往郡城要路南路賊匪當賊勢潰敗之餘尚敢聚衆滋擾實堪痛恨然不過烏合匪衆時出時沒亦不致復行梗阻道路除檄行梁朝桂烏什哈達分投堵剿一俟拏獲首逆大兵南下毋難盡數殱除至鹿仔草一帶村莊節據鄭國卿稟報投出難民俱已歸莊修蓋房屋整理田園民情極為寧謐又查臺灣各處義民多係紳襟鋪户等招集亦有由地方官衙門招募充當者每日口糧或係義民首捐資偹辦或係官為給發各有不同自逆匪滋事以來府城諸羅鹿仔港等處久被攻擾得以固守無虞實藉該義民之力臣到軍營後即行普加賞賚並將義民首黃奠邦林凑奏明賞戴籃翎其山猪毛義民首舉人曽中立最為奮勉出力前已寄諭奬勵並令帶領粵民相機堵剿俟大軍至南路時再行從優奬賞此外隨同官兵打仗及倡義急公捐助軍需之義民等如何分别奬賞之處俟逐一查明另摺具奏其有通莊拒賊始終不懈者請照效忠里懷忠里之例官給匾額以示勸勵再此項義民從前因賊勢鴟張不得不多為招集多增一千鄉勇即減去一千賊夥是以人數衆多不能逐一揀擇用以防守地方尚屬奮勉而打仗進攻究因未經訓練若無官軍帶領亦不能十分得力臣自進兵以來留心察看惟內地帶來義民奮勇可恃其次則黃奠邦林凑張源勤鄭天球名下義民尚能打仗殺賊此外義民僅可稍助官軍聲勢不能獨當一隊現在北路賊匪將次蕩平無須多人防守所有諸羅鹿仔港元長莊等處官給口糧義民臣已大加裁減以省煩費並諭知各義民等散遣歸耕之後器械均無所用即令其逐件繳銷量為給賞所有繳出器械發交地方官改鑄農器查明失業貧民散給庶農民得資耕種而民間亦不致私藏軍械似屬一舉兩得將來剿平南路亦即一體辦理奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰連日以來盻望擒獲逆首之信甚為焦切兹接到奏報祇係拏獲林爽文父母家屬未足為快且摺內稱林爽文家屬潛匿水裡畨社福康安等遣義民社丁令其擒獻曽經繕摺具奏之處此摺亦尚未遞到而本日摺內亦未詳細聲叙殊未明晰此等逆首親屬均係罪不容誅今業經擒獲自應解京辦理但林爽文罪惡貫盈性同梟獍既不知尊君親上豈復顧其父母家屬現雖將伊全家拏獲而林爽文尚未就擒自仍在各畨社潛藏希圖奔竄他處林爽文係首惡渠魁若不生擒解京盡法處治何以彰憲典而快人心福康安等在大里杙水沙連等處駐劄惟招致畨社懸示重賞令其擒拏實屬過於持重况現在所帶巴圖魯等及官兵內之四川屯練貴州等省兵丁最為驍健於登山履險更屬趫捷如林爽文逃入內山生畨等竟敢將伊潛匿何難勒兵直入內山分路搜捕生畨等見官兵已入畨境益加震懾豈有不爭先擒獻之理且據福康安奏南路麻豆茅港尾等處俱有賊匪數千攻擾又大武壠有賊匪千餘搭藔居住是郡城道路雖已開通而該處賊匪尚在窺伺滋擾實屬可恨可惡此等賊匪必係莊大田夥黨現在常青在府駐守兵力不多未必能肅清南路福康安等既經攻克賊巢正當乘勝深入速將林爽文尅期拏獲即移兵南路搜捕莊大田殱除逆黨自成破竹之勢若似此曠日持久安知非林爽文潛匿不出思欲於北路牽綴官兵仍令其夥黨在南路肆擾即現在畨社等擒拏林爽文家屬或亦係藉此搪塞以為緩兵之計仍私將林爽文放逸令其潛行逃竄設林爽文又從內山逃往南路與莊大田㑹合狼狽為奸復行煽聚更復成何事體耶至漳泉廣東民人前原有酌令分莊居住之㫖既而思之其事似屬難行其禁止携眷一節亦因舊有成例是以詢及但臺灣地方户口甚繁即內地民人不准其携眷前往而民人到彼後即在臺灣另置家室亦難禁止此等事祇須於剿捕完竣後將是否可行之處歸入善後酌量妥辦今林爽文尚未就擒何暇辦理及此至現在臺灣官兵為數甚多足資搜剿堵截之用又何須該處義民幫助聲勢福康安等功在垂成轉心存懈弛試令福康安等自思受朕如此重恩乃並不出力自效豈以朕有賞而無罰耶上又命軍機大臣傳諭劉莪長麟李世傑閔鶚元琅玕李侍堯徐嗣曾曰本日福康安遞到六百里加緊夾板一副外有紅旗一面及拆閲奏摺祇係拏獲林爽文之父母家屬尚未將首逆擒獲此次臺灣逆匪滋事不過么䯢烏合之衆易於撲滅即日林爽文就獲亦不值用紅旗奏報况現在首逆尚未拏獲沿途驛站何得混行編寫紅旗同軍報馳遞實非尋常錯誤可比著沿途各督撫於所管驛站逐一查明即將該處地方官及驛站貟辨嚴行查恭治罪再福康安尚有十二月初七日拜發一摺至今尚未奏到自係沿途驛站馳遞耽誤並著各該督撫一併查明覆奏初十日癸酉上命軍機大臣傳諭福康安海蘭察李侍堯曰前據李侍堯奏賊目陳泮前來投誠並將妻子為質自限十二月初八日以內擒拏林爽文來獻今福康安奏到之摺係十二月十三日拜發而陳泮並未將林爽文擒獲獻出是陳泮自請勒限之語不過信口混供並不能立功自贖即應將該賊目拏解來京究辦此等賊人頭目當逆首潰敗奔竄之時惟知偷生逃死保全軀命豈能顧其家屬即如林爽文之父母妻弟俱經拏獲而林爽文仍復潛匿不出可見此等逆匪性同梟獍豈尚有所繫戀自行投到希圖保其父母家屬身命之理是陳泮雖將其家屬留營為質亦不過故為掩飾自圖逃竄之計福康安豈可深信即聽其入山跴探置之不問設使陳泮逃入內山尋獲林爽文轉狼狽為奸告以軍營實情同行逃竄則既不能擒拏逆首適以助其羽翼豈不大錯况頓兵不前曠日持久則生番等見官兵聲勢伎倆不過如此又何所畏憚轉恐為其所輕豈肯將首逆林爽文即時擒拏獻出乎但福康安不可因奉有飭諭心懷畏懼轉致中無把握福康安係朕股肱心膂之臣今膺此重寄本應一力擔當確有定見方為不負任使若既不能辦理妥速而因有申飭之㫖更致遇事游移則其不是更大至柴大紀貪劣各欵並非無據福康安等訪查得實即應列欵嚴恭不必因此時尚在用兵稍為容隱現在剿捕事務雖尚未竣豈辦一柴大紀即慮其去而從賊乎福康安等惟應據實恭奏朕即不肯沒其守城微勞亦自另有裁奪也十一日甲戌福康安海蘭察鄂輝同奏言大里杙一帶現已搜捕净盡惟招出難民甚多應酌留官兵撫輯彈壓平林仔地方係內山要隘亦應派官兵義民等堵拏逸匪臣等即于初四日自平林仔發兵沿山行走探知林爽文帶同賊夥往來水沙連內之集集埔水裡社等處而集集埔為入山要路林爽文預為退守地步於該處臨溪設卡據險死守初五日臣等帶兵前往察看該處山勢南北斜對兩山之中橫繞大溪一道即係虎尾東螺兩溪上游地名濁水溪賊人阻溪自固在陡磡上壘砌石墻橫塞道路並于北山草嶺安設賊卡防守極為嚴密隨派令普爾普許世亨穆克登阿普吉保謝廷選扎爾杭阿張占魁由山路進攻臣福康安海蘭察恆瑞鄂輝帶領巴圖魯侍衛等分路進至溪邊溪流深急賊壘砌築甚長賊匪見官兵將至擊鼓聲喊約有萬餘人于墻內連放鎗炮我兵排鎗前進兼用大炮轟擊已斃多賊而賊匪恃險抵禦不肯即時潰竄海蘭察恆瑞率領巴圖魯侍衛等乘馬浮過深溪臣福康安鄂輝催兵一同前進廣東廣西貴州屯練官兵無不人人奮勇泅水徑渡巴圖魯侍衛等鎗箭齊發斃賊甚多官兵屯練攀援而上推倒賊壘擁入趕殺十餘里將集集埔內賊營全行剿洗並將浩淮角地方草藔一千餘間焚燬共計生獲賊一百餘名殺賊二千餘名逃竄賊匪滚跌下山及趕入溪中淹斃者不可勝計河灘山下賊尸遍地縱橫直追至生畨隘口始行停止普吉保普爾普許世亨穆克登阿等亦攻克草嶺賊卡由山路前來㑹合訊據擒拏活賊供稱賊匪懼官兵趕殺四散奔逃聞林爽文說此一仗若再不支就逃到內山去了並未說有一定地方賊首家眷已搬入水裡畨社居住等語查集集埔一帶大山重叠竹樹茂密路徑甚多處處可以奔竄勢難遍山海捕今賊首當屢敗之後並未由山外僻徑潛赴南路即行逃入畨界竟係賊匪等罪惡貫盈自尋絶地坐待官兵擒獲若惟事尾追恐其聞風驚逸或竟畏罪自戕轉不能生擒解送臣等已探明各處路徑令普爾普駐劄科仔坑普吉保駐劄科仔坑口琢靈阿駐劄林圯埔葉有光駐劄藤湖口謝廷選李自昌陳大恩駐劄流藤坪舒亮駐劄歸仔頭格綳額駐劄清水溝各帶兵丁分頭防守臣等在于東埔納大半天等處近山要路分劄營盤嚴密堵截至東南一面均係生畨地界不能派兵前往已設法傳出水沙連頭社生畨頭目十餘人面加奬賞反覆開導即令傳知各社不得容留匪犯生畨等甚為踴躍願率領畨衆一體搜拏又探知諸羅縣東阿里山內有小路可通南路已派恭將張萬奎帶領官兵義民一千名在彼防守如此處處布置堵其去路賊首等似無從出山竄逸再此次在集集埔等處奪獲大小炮二十六位鳥蹌一百九十七桿刀矛九百四十五件又據遊擊葉有光起獲火藥六桶都司田智起獲子炮二個鉛子四萬八千顆已將鎗炮運赴鹿仔港同前次所獲鎗炮交李化龍妥為收貯其鉛子火藥等項分給官兵配用所有擒拏活賊即于軍前正法審出緊要賊目酌留數人另行解京再賊目吳匣吳添陳溝黃寬黃翰等陸續投赴軍營情詞尚為真切臣逐一留心察看多係愚魯村民擇其稍有才幹者派令擒拏賊黨其餘即行散遣歸莊免究前罪伏思此等投歸賊目本非良善但既已出示招撫不得不寬其一線交地方官存記姓名密加防範若再行按名查辦恐不足取信愚民轉致自相疑懼且現在軍威大振民人擒獻賊匪者紛紛不絶即漳人素有黨護同鄉惡習近亦不敢容留匪犯自行舉首雖臺灣狡詐成風未可深信然經此畨大加懲創之後民情震懾斷不致别滋事端又臺灣瀕海地方除鹿耳門鹽水港鹿仔港淡水港等處海口其餘支河㲼港甚多小船皆可偷渡臣諄切飭知駐守海口之鎮將大員嚴密稽察凡係可以通海之處皆添撥辨兵防守兹據總兵李化龍稟稱都司陳邦光千總楊連升在鹿仔港附近之畨仔挖海口拏獲謝湖船一隻並無執照內載偷渡民人康節等男婦一十九名內有孫兩一名頭上有傷痕四處陳昌李福二名頭上皆有傷痕謝牛一名供認曽經從賊等語又據總兵陸廷柱稟稱汛辨在鹿耳門外拏獲李淡無執照船一隻共載民人張桃等男婦二百四十四名口訊係自內地偷渡來臺灣欲到北路五條港入口遇風飄到鹿耳門等語伏查船隻攬載無執照客民本干例禁况現在搜剿逆匪餘黨潰逃尤應嚴行究辦畨仔挖拏獲船隻載有賊夥已飭委李永祺馳往鹿仔港㑹同李化龍嚴行究辦其鹿耳門所獲船隻私載民人至二百四十餘名之多或竟係賊人夥黨出口潛逃假稱來自內地亦未可定所供殊不足信臣已咨行常青就近親提各犯嚴行訊究從重定擬至恆瑞自到鹽水港以來僅知後路堪虞零星打仗不能痛剿賊衆直達諸羅其咎實無可逭但詢之烏什哈達等僉稱恆瑞在鹽水港時常與賊匪打仗俱係親身帶兵前往每日招撫村莊巡查營卡並未在營坐守及臣等自諸羅進兵恆瑞屢在前敵打仗殺賊頗屬奮勉海蘭察等皆所親見看來恆瑞素未厯練軍務遇事不能堅守思慮過多遂至茫無定見而于帶兵打仗之處尚非心存怯懦畏賊不前臣固不能徇私袒芘亦不敢避親誼之嫌不行據實陳奏轉蹈欺飾可否將恆瑞留於軍營自偹資斧效力贖罪事竣後再行回京再查成都將軍一缺專管土司及新疆屯田各事必須熟諳人員方資經理福州雖係海疆而臺灣平定之後事務較簡自不如成都之缺更關緊要鄂輝久在川省練達老成臣素知其撫輯得宜最為畨人信服今令鄂輝調補福州似難收駕輕就熟之效可否將鄂輝仍留成都將軍之任奏入上命軍機大臣傳諭福康安海蘭察常青鄂輝李侍堯曰福康安奏到之摺係初七日拜發在前日奏到十三日所發奏摺之前該處賊匪阻溪自固壘砌石墻安設賊卡聚至萬人非一朝一夕所能為福康安等於攻破大里杙賊巢後若即統領大兵乘勝追殺則賊匪紛紛逃竄救死不暇豈尚能收合夥黨聚集萬人從容壘砌石墻設卡拒守即使攻破大里杙後或有堵拏餘匪撫輯彈壓事宜亦祗應於將領中酌留數人帶領辨兵在彼儘足以資料理福康安即當親統大兵乘勝突入搜捕賊匪即或逆首逸入內山生畨等懾於軍威亦必及時擒獻乃官兵於十一月二十五日攻破賊巢直至十二月初四日始由平林仔發兵前進計期已閲十日使賊匪得以乘暇收合餘黨於集集埔預為布置臨溪設卡壘堵塞路據險死守幸而衆兵奮勇出力攀援直上將集集埔內賊營全行剿洗而首逆林爽文又經乘間逃竄此皆福康安等辦理遲緩與賊以暇若早至生畨隘口則並可不需此戰或竟將林爽文即時擒獲乃失此機㑹實屬可惜至從賊匪徒雖經遵示投出現在自不得不從寬貸其一死但究非良善之人將來總未便仍留該處應于辦理善後事宜時酌量分别遷徙他省內地安插方為妥善上又諭內閣曰臺灣地土膏腴素稱沃壤向來內地民人或私渡謀食亦所不免但現在臺灣逆匪滋事該處民人遭其擾纍生計維艱尚或因無地可耕紛紛遷避若內地民人前赴該處則不惟口食無資且恐身罹殘害是此時斷不應有偷渡臺灣之事自必係鹿仔港等處沿海賊匪夥黨現經官兵剿捕勢已窮蹙思欲偷生逃死或將入內地潛匿或將由海道逺揚因詭稱內地民人私載船隻以為免脫之計不可不嚴行究辦福康安現在該處搜捕逆首所有偷渡各犯務須嚴行訊鞫跟究得實從重定擬仍一面分派辨兵在鹿仔港鹿耳門沿海各口岸嚴密稽查毋使賊匪夥黨私自竄逸並著李侍堯查明此等私渡船隻係從何口岸逸出即將該地方官及防守各員辨一併查明恭奏欽定平定臺灣紀略卷五十
