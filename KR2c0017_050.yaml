  text: 欽定四庫全書欽定平定臺灣紀畧卷五十
  hash: sha256:6018e94468cfceed476519c7ea6b86b310f551801ec4a56c6e57c5c6c8b65873
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_050-1a, image: WYG0363/WYG0363-0603a.png}
body:
  text: 正月初四日丁夘上諭内閣曰上年臺灣辦理軍務漳泉等府屬應付浙閩滿漢官兵及四川湖南貴州各兵兼之糧餉軍装鉛藥等項絡繹過境差務甚繁資用民力之處最多兹屇春祺普錫之時大功即日告竣自宜特沛殊恩以示優䘏所有泉州府之晉江惠安同安漳州府之龍溪漳浦海澄詔安等八縣本年應徵錢糧著加恩蠲免十分之三其浦城崇安建安甌寧南平古田閩縣侯官福清莆田仙游等十二縣應徴錢糧著蠲免十分之二至福鼎霞浦福安寧徳羅源連江光澤等七縣所有應徴錢糧著緩至五十四年麥熟後徴收俾小民均沾渥澤以副朕惠愛黎元有加無已之至意上又諭内閣曰現在臺灣府㕔縣應行改建城垣徳成於工程事務素為熟諳著即馳驛速赴臺灣會同徐嗣曽将該處應辦城工悉心估勘同日孫士毅奏言十二月二十二日船户進口傳稱福康安帶兵搜山分派將弁各路齊進已於十二月初十前將首逆林爽文擒獲且稱十月間賊匪數萬日夜環攻諸羅元長庄等處營盤見賊勢利害不敢帶兵前進幸將軍福康安痛剿賊匪殺進諸羅道旁百姓慶幸更生喜極而泣將軍也在馬上墮涙各等語與臣前此所聞無異其言似確奏入上命軍機大臣傳諭福康安孫士毅曰前據李侍堯奏聞得賊目陳泮懇請定限於十二月初八日以前將林爽文獻出日内盻望福康安奏報擒獲逆首之信正深懸注今據孫士毅詢問進口船户有十二月初十日前生擒首逆林爽文之語此信得自洋面往來商客自屬確實計福康安奏報之摺自已在途不過日内即可奏到實信至摺内稱賊匪攻擾諸羅時元長庄等處營盤見賊勢利害不敢帶兵前進自屬輿情公論又稱福康安一到即親身統兵痛剿賊匪殺進諸羅福康安進縣城時見百姓跪迎在馬上為之墮涙自係該處百姓被圍日久慶得更生福康安目擊情形為之憫惻真是乃心國家之良臣與朕同心至元長庄等處營盤見賊勢利害不敢輕進自係恒瑞普吉保二人畏葸觀望其咎均難解免著福康安將恒瑞普吉保二人罪狀分别輕重據實具奏上又命軍機大臣傳諭徐嗣曾曰臺灣賊匪滋事不法現經福康安等攻破賊巢擒拏逆首該處各村庄投出難民甚多急應撫綏稽察其義民鄉勇亦應安挿歸庄徐嗣曾到臺灣後務須與福康安悉心籌酌勉力妥辦俾該處民人共臻寧謐不致失所至臺灣府㕔縣現需改建城垣工程較大非司員所能經理徳成於工程事務素為熟諳已降㫖令其馳驛前赴臺灣詳悉勘估該撫務須㑹同妥辦籌估周宻以期工歸實際帑不虚縻一勞永逸方為妥善初九日壬申福康安海蘭察鄂輝同奏言前聞林爽文家屬潛匿水裏畨社即遣義民首職員楊振文舉人魯大源曉諭社丁杜敷令其擒獻兹於初十日復遣帶領義民之教諭郭廷筠帶同投出賊目黄寛黄翰陳講前往設法擒拏十二日據杜敷令其弟杜朗同黄寛等來營稟稱杜敷曉諭生畨將林爽文家屬拘留恐其畏罪自戕不便遽行擒縛定於十三日誘令出山逃命官兵即可拏獲等語臣查水裏畨社至大營七十餘里山徑甚屬叢雜林爽文現在潛匿内山若聞知家屬被拏竟在中途邀奪杜敷等人數無多恐難抵禦即派令副將張芝元恭將吳宗茂遊擊王宣守偹鄭元楷馬大雄帶領漢土兵丁一千名直往番社一面曉諭生畨毋庸驚懼十三日黎明張芝元等進入内山約二三十里遇見杜敷帶同生畨百餘人將林爽文之父林勸母林曾氏弟林壘妻林黄氏在途中圍守官兵到後即行按名拏獲恐賊黨仇恨杜敷害其家屬仍令帶領生畨入山自行䕶衛并令探訪林爽文潛逃踪跡臣等即將林勸等隔别嚴訊跟究林爽文下落據林勸供二十四日夜間林爽文自大里杙潛逃從火熖山後番社行走他就往集集埔把我們留在水裏社居住這十餘日總未見他不知逃往那裏去了等語質之林黄氏林壘供亦相符而林曾氏尤屬狡悍不肯吐實因係應行解京要犯不便刑訊設法開導方能録取實供又拏獲偽軍師僧悟天訊問復供稱林爽文大約逃在柵欄山後一帶地方藏匿供詞亦屬游移未可慿信適有賊目阮和陳泮歐旅等帶同眷屬自行投出該賊目等均係有名頭目既已悔罪歸誠即可令其立功自効臣隨靣加開導留其家屬在營發給執照仍令扮作賊黨入山跴探一俟得有確信即行帶兵前往現在賊首東西奔竄黨羽離心賊目人等皆思自行投出逃匿者亦多被官兵拏獲並據撫輯村庄各員稟報被脅民人歸庄者已有數萬看來賊勢窮蹙已甚不過恃其地勢險僻勾結生番得以苟延殘喘祇須嚴防隘口杜其出山之路一面招致生畨恊同堵截縱使弋獲稍遲數日亦不致漏網稽誅再職員楊振文舉人曾大源世居彰化去年賊匪滋擾時屢遣賊黨招致該職員等深知大義不肯從賊棄家避至泉州臣在大擔門候風時詢訪熟識臺灣情形之人即將該職員等帶赴鹿仔港招募義民隨軍進剿此次購線杜敷擒獲賊眷不辭艱險前往畨社曉諭尤為出力而曽大源又曾經遵檄帶領義民随同舒亮在大肚溪等處打仗均屬奮勉可嘉楊振文係捐納四品職衘加銜未免過優現已賞戴花翎以示鼓勵曽大源係文舉人出身年齒尚輕予以知縣實缺恐其不諳民社觀其人尚明白文理亦優臺灣風俗以得授京職為榮可否將該舉人以内閣中書補用至杜敷招致生畨拘拏賊眷亦屬出力已賞給千總職銜所有出力辦事及生番人等俱已查明從優奨賞其林爽文家眷同陸續拏獲賊目蕭悟天賴應劉天錫林良林順林祖胡真沈定劉徳等現在研取確供另行選派妥員解京辦理再查臺灣地方本無土著以全郡而論漳泉廣東三處民人居其大半而福州汀州興化等府民人寄籍者亦多除郡城縣城及港口鎮集各處俱為五方雜處之區其餘村庄原係自分籍貫各為一庄居住惟因閩庄粤庄彼此交錯田業毗連遂有搆釁相争之事如能將漳泉廣東村庄酌為遷徙各分界址使其相離較逺固可以稍杜争端但南北兩路地方寛廣處處清釐廬舍田産皆須互相易換房間之多寡田畝之腴瘠既難適得其平而𣲖往查辦各員又不能不假手胥吏辦理稍有未妥轉恐紛争滋事若令義民仍守世業查明與賊匪同庄之人即行遷徙又屬難於區别盖臺灣鬭狠成風又因賊匪蔓延日久愚民畏其兇横心懷兩端雖漳民中未嘗無向義之人而泉州廣東各庄附賊者亦復不少除山猪毛蕭壠學稼等處始終通庄拒賊外其餘一庄之中或充義民或為賊黨甚至有父兄現係義民子弟復去而從賊奸良相雜實屬不齊即如諸羅受困時賊匪内間有潛賣糧食接濟城中之人而義民被賊褁去者又復中道從賊此等情形可為明証現在被脅投出之人俱已幸獲更生歸庄安業倘於民心甫定之後復行紛紛查辦概令離析勢有所難詳察情形漳泉廣東民人各分氣類固屬風俗不純而閩粤各庄彼此隣近即偶有為匪之事不能合成一氣轉可互相舉首且民風之淳薄原無一定全視吏治為轉移從前地方官撫輯不得其宜惟知貪圖安逸諸事廢弛甚或遇有械鬭重案意為出入從中取利奸民等全無儆懼日久遂釀成大案將來賊匪蕩平之後若府縣皆得其人痛改積習於民間結㑹聚鬭之事有犯必懲秉公辦理嚴加約束自不致别滋事端再舊例内地民人至臺灣不准携帶眷屬止許隻身居住耕種今内地携眷出口者未聞稽查禁止因何開此例禁自有舊案可稽已飭該道府確切查明另行覆奏臣查海洋重地禁止搬眷居住使民人顧戀室家不敢恣意為非舊例原屬妥善但臣經過各處村庄民人等俱有眷屬而查㸃投出難民婦女㓜孩尤多該民人等居住臺灣已厯數世勢不能令其仍回内地若僅申明往例止許隻身出口民人等一到臺灣仍可置立家室例禁雖嚴亦屬有名無實至臺灣地方寛廣奸宄易滋臣所到諸羅彰化兩縣地界已極遼濶即如現在進兵劄營之地不但從前剿賊官兵不能搜捕至此即地方官亦未嘗親身經厯居民等恃其險逺恣為不軌遂致無所顧忌自應酌添丞倅将弁以資弹壓臣原擬於事定後將全郡地方自鳳山直至淡水逐處詳加查看将如何建立城池營汛添設官弁兵丁之處歸入善後事宜妥議以期一勞永逸綏靖海疆㫁不敢因念切瞻依稍存草率了事之見至海蘭察及巴圖魯侍衛等自應於事竣後先令起程但臺灣地方廣濶民情反側難安必須威望素著大臣帶領巴圖魯等分投巡察方足以資弹壓應俟民情大定將善後事宜酌籌妥協交與鄂輝徐嗣曾從容妥辦再同海蘭察等起程回京所有貴州廣東廣西屯練兵丁最為勇壮出力自當酌留數千以為鎮撫之用苐向來軍營撤兵先後總以道路逺近為凖今將川黔逺省及隣省兵丁酌留竊恐閩省各兵未免稍存形迹事竣時酌量情形如無需多兵鎮撫即令廣東廣西兵丁一倂撤回並通行曉諭各營閩粤官兵隨征一載久著勤勞與川黔各兵甫到臺灣者不同自應先行撤回以示體䘏如此明白宣諭歸伍者咸知感悦而所留皆係勇健兵丁臣得藉資指臂不致虚縻廪給實於公務有禆再十二月初一初六等日賊匪攻擾蔴荳茅港尾等處經遊擊黄象新擊退殺死賊目徐英打傷賊目陳聘殺賊二百七十餘名初九十二十三等日梁朝桂帶兵巡哨至蔴荳庄等處遇賊均經官兵殺退十四日復有賊匪四千餘人分擾蔴荳茅港尾官兵奮勇剿殺鎗砲打死賊匪甚多奪獲鉛藥噐械無算又烏什哈達探聞大武壠賊匪千餘人在大客庄地方撘藔居住隨於初五日進剿鄭國卿遣都司吳壯圖領兵接應過河直冲賊隊賊即沿山敗走官兵追過山梁十餘里焚燒草藔二百餘間殺賊三十餘名割取耳記二十八件十一日復帶兵前往分路進剿見賊匪在山内分隊排列施放鎗砲官兵奮勇進攻殺死賊匪百餘名割取耳記三十三件奪獲刀矛十七件查蔴荳庄大武壠等處均係通往郡城要路南路賊匪當賊勢潰敗之餘尚敢聚衆滋擾實堪痛恨然不過烏合匪衆時出時沒亦不致復行梗阻道路除檄行梁朝桂烏什哈達分投堵剿一俟拏獲首逆大兵南下毋難盡數殱除至鹿仔草一帶村庄節據鄭國卿稟報投出難民俱已歸庄修盖房屋整理田園民情極為寧謐又查臺灣各處義民多係紳衿舖户等招集亦有由地方官衙門招募充當者每日口粮或係義民首捐資偹辦或係官為給發各有不同自逆匪滋事以來府城諸羅鹿仔港等處久被攻擾得以固守無虞實藉該義民之力臣到軍營後即行普加賞賚並將義民首黄奠邦林凑奏明賞戴籃翎其山猪毛義民首舉人曽中立最為奮勉出力前已寄諭奨勵並令帶領粤民相機堵剿俟大軍至南路時再行從優奨賞此外隨同官兵打仗及倡義急公捐助軍需之義民等如何分别奨賞之處俟逐一查明另摺具奏其有通庄拒賊始終不懈者請照効忠里懷忠里之例官給匾額以示勸勵再此項義民從前因賊勢鴟張不得不多為招集多増一千鄉勇即減去一千賊夥是以人數衆多不能逐一揀擇用以防守地方尚屬奮勉而打仗進攻究因未經訓練若無官軍帶領亦不能十分得力臣自進兵以來留心察看惟内地帶來義民奮勇可恃其次則黄奠邦林凑張源懃鄭天球名下義民尚能打仗殺賊此外義民僅可稍助官軍聲勢不能獨當一隊現在北路賊匪將次蕩平無須多人防守所有諸羅鹿仔港元長庄等處官給口粮義民臣已大加裁減以省煩費並諭知各義民等散遣歸耕之後器械均無所用即令其逐件繳銷量為給賞所有繳出器械發交地方官改鑄農器查明失業貧民散給庶農民得資耕種而民間亦不致私藏軍械似屬一舉兩得將來剿平南路亦即一體辦理奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰連日以來盻望擒獲逆首之信甚為焦切兹接到奏報祇係拏獲林爽文父母家屬未足為快且摺内稱林爽文家屬潛匿水裡畨社福康安等遣義民社丁令其擒獻曽經繕摺具奏之處此摺亦尚未逓到而本日摺内亦未詳細聲叙殊未明晰此等逆首親屬均係罪不容誅今業經擒獲自應解京辦理但林爽文罪惡貫盈性同梟獍既不知尊君親上豈復顧其父母家屬現雖將伊全家拏獲而林爽文尚未就擒自仍在各畨社潛藏希圖奔竄他處林爽文係首惡渠魁若不生擒解京盡法處治何以彰憲典而快人心福康安等在大里杙水沙連等處駐劄惟招致畨社懸示重賞令其擒拏實屬過於持重况現在所帶巴圖魯等及官兵内之四川屯練貴州等省兵丁最為驍健於登山履險更屬趫捷如林爽文逃入内山生畨等竟敢將伊潛匿何難勒兵直入内山分路搜捕生畨等見官兵已入畨境益加震懾豈有不争先擒獻之理且據福康安奏南路蔴豆茅港尾等處俱有賊匪數千攻擾又大武壠有賊匪千餘撘藔居住是郡城道路雖已開通而該處賊匪尚在窺伺滋擾實屬可恨可惡此等賊匪必係荘大田夥黨現在常青在府駐守兵力不多未必能肅清南路福康安等既經攻克賊巢正當乗勝深入速將林爽文尅期拏獲即移兵南路搜捕荘大田殱除逆黨自成破竹之勢若似此曠日持久安知非林爽文潛匿不出思欲於北路牽綴官兵仍令其夥黨在南路肆擾即現在畨社等擒拏林爽文家屬或亦係藉此搪塞以為緩兵之計仍私將林爽文放逸令其潛行逃竄設林爽文又從内山逃往南路與荘大田㑹合狼狽為奸復行煽聚更復成何事體耶至漳泉廣東民人前原有酌令分庄居住之㫖既而思之其事似屬難行其禁止携眷一節亦因舊有成例是以詢及但臺灣地方户口甚繁即内地民人不准其携眷前往而民人到彼後即在臺灣另置家室亦難禁止此等事祇須於剿捕完竣後將是否可行之處歸入善後酌量妥辦今林爽文尚未就擒何暇辦理及此至現在臺灣官兵為數甚多足資搜剿堵截之用又何須該處義民帮助聲勢福康安等功在垂成轉心存懈弛試令福康安等自思受朕如此重恩乃並不出力自効豈以朕有賞而無罰耶上又命軍機大臣傳諭劉莪長麟李世傑閔鶚元琅玕李侍堯徐嗣曾曰本日福康安逓到六百里加𦂳夾板一副外有紅旗一面及拆閲奏摺祇係拏獲林爽文之父母家屬尚未將首逆擒獲此次臺灣逆匪滋事不過么䯢烏合之衆易於撲滅即日林爽文就獲亦不值用紅旗奏報况現在首逆尚未拏獲沿途驛站何得混行編寫紅旗同軍報馳逓實非尋常錯悞可比著沿途各督撫於所管驛站逐一查明即將該處地方官及驛站貟弁嚴行查恭治罪再福康安尚有十二月初七日拜發一摺至今尚未奏到自係沿途驛站馳逓躭悞並著各該督撫一併查明覆奏初十日癸酉上命軍機大臣傳諭福康安海蘭察李侍堯曰前據李侍堯奏賊目陳泮前來投誠並將妻子為質自限十二月初八日以内擒拏林爽文來獻今福康安奏到之摺係十二月十三日拜發而陳泮並未將林爽文擒獲獻出是陳泮自請勒限之語不過信口混供並不能立功自贖即應將該賊目拏解来京究辦此等賊人頭目當逆首潰敗奔竄之時惟知偷生逃死保全軀命豈能頋其家屬即如林爽文之父母妻弟俱經拏獲而林爽文仍復潛匿不出可見此等逆匪性同梟獍豈尚有所繫戀自行投到希圖保其父母家屬身命之理是陳泮雖將其家屬留營為質亦不過故為掩飾自圖逃竄之計福康安豈可深信即聽其入山跴探置之不問設使陳泮逃入内山尋獲林爽文轉狼狽為奸告以軍營實情同行逃竄則既不能擒拏逆首適以助其羽翼豈不大錯况頓兵不前曠日持久則生番等見官兵聲勢伎倆不過如此又何所畏憚轉恐為其所輕豈肯將首逆林爽文即時擒拏獻出乎但福康安不可因奉有飭諭心懷畏懼轉致中無把握福康安係朕股肱心膂之臣今膺此重寄本應一力擔當確有定見方為不負任使若既不能辦理妥速而因有申飭之㫖更致遇事游移則其不是更大至柴大紀貪劣各欵並非無據福康安等訪查得實即應列欵嚴恭不必因此時尚在用兵稍為容隱現在剿捕事務雖尚未竣豈辦一柴大紀即慮其去而從賊乎福康安等惟應據實恭奏朕即不肯没其守城微勞亦自另有裁奪也十一日甲戌福康安海蘭察鄂輝同奏言大里杙一帶現已搜捕净盡惟招出難民甚多應酌留官兵撫輯彈壓平林仔地方係内山要隘亦應派官兵義民等堵拏逸匪臣等即于初四日自平林仔發兵沿山行走探知林爽文帶同賊夥往來水沙連内之集集埔水裡社等處而集集埔為入山要路林爽文預為退守地步於該處臨溪設卡據險死守初五日臣等帶兵前往察看該處山勢南北斜對兩山之中横繞大溪一道即係虎尾東螺兩溪上游地名濁水溪賊人阻溪自固在陡磡上壘砌石墻横塞道路並于北山草嶺安設賊卡防守極為嚴宻隨派令普爾普許世亨穆克登阿普吉保謝廷選扎爾杭阿張占魁由山路進攻臣福康安海蘭察恒瑞鄂輝帶領巴圖魯侍衛等分路進至溪邊溪流深急賊壘砌築甚長賊匪見官兵將至擊鼓聲喊約有萬餘人于墻内連放鎗砲我兵排鎗前進兼用大砲轟擊已斃多賊而賊匪恃險抵禦不肯即時潰竄海蘭察恒瑞率領巴圖魯侍衛等乘馬浮過深溪臣福康安鄂輝催兵一同前進廣東廣西貴州屯練官兵無不人人奮勇泅水徑渡巴圖魯侍衛等鎗箭齊發斃賊甚多官兵屯練攀援而上推倒賊壘擁入赶殺十餘里將集集埔内賊營全行剿洗並將浩淮角地方草藔一千餘間焚燬共計生獲賊一百餘名殺賊二千餘名逃竄賊匪滚跌下山及赶入溪中淹斃者不可勝計河灘山下賊屍遍地縱横直追至生畨隘口始行停止普吉保普爾普許世亨穆克登阿等亦攻克草嶺賊卡由山路前來㑹合訊據擒拏活賊供稱賊匪懼官兵赶殺四散奔逃聞林爽文説此一仗若再不支就逃到内山去了並未説有一定地方賊首家眷已搬入水裡畨社居住等語查集集埔一帶大山重叠竹樹茂宻路徑甚多處處可以奔竄勢難遍山海捕今賊首當屢敗之後並未由山外僻徑潛赴南路即行逃入畨界竟係賊匪等罪惡貫盈自尋絶地坐待官兵擒獲若惟事尾追恐其聞風驚逸或竟畏罪自戕轉不能生擒解送臣等已探明各處路徑令普爾普駐劄科仔坑普吉保駐劄科仔坑口琢靈阿駐劄林圯埔葉有光駐劄藤湖口謝廷選李自昌陳大恩駐劄流籐坪舒亮駐劄歸仔頭格綳額駐劄清水溝各帶兵丁分頭防守臣等在于東埔納大半天等處近山要路分劄營盤嚴宻堵截至東南一面均係生畨地界不能派兵前往已設法傳出水沙連頭社生畨頭目十餘人面加奨賞反覆開導即令傳知各社不得容留匪犯生畨等甚為踴躍願率領畨衆一體搜拏又探知諸羅縣東阿里山内有小路可通南路已派恭將張萬奎帶領官兵義民一千名在彼防守如此處處布置堵其去路賊首等似無從出山竄逸再此次在集集埔等處奪獲大小砲二十六位鳥蹌一百九十七桿刀矛九百四十五件又㨿遊擊葉有光起獲火藥六桶都司田智起獲子砲二個鉛子四萬八千顆已將鎗砲運赴鹿仔港同前次所獲鎗砲交李化龍妥為收貯其鉛子火藥等項分給官兵配用所有擒拏活賊即于軍前正法審出𦂳要賊目酌留數人另行解京再賊目吳匣吳添陳溝黄寛黄翰等陸續投赴軍營情詞尚為真切臣逐一留心察看多係愚魯村民擇其稍有才幹者派令擒拏賊黨其餘即行散遣歸庄免究前罪伏思此等投歸賊目本非良善但既已出示招撫不得不寛其一線交地方官存記姓名宻加防範若再行按名查辦恐不足取信愚民轉致自相疑懼且現在軍威大振民人擒獻賊匪者紛紛不絶即漳人素有黨䕶同鄉惡習近亦不敢容留匪犯自行舉首雖臺灣狡詐成風未可深信然經此畨大加懲創之後民情震懾㫁不致别滋事端又臺灣瀕海地方除鹿耳門塩水港鹿仔港淡水港等處海口其餘支河㲼港甚多小船皆可偷渡臣諄切飭知駐守海口之鎮將大員嚴宻稽察凡係可以通海之處皆添撥弁兵防守兹據總兵李化龍稟稱都司陳邦光千總楊連陞在鹿仔港附近之畨仔挖海口拏獲謝湖船一隻並無執照内載偷渡民人康節等男婦一十九名内有孫兩一名頭上有傷痕四處陳昌李福二名頭上皆有傷痕謝牛一名供認曽經從賊等語又據總兵陸廷柱稟稱汛弁在鹿耳門外拏獲李淡無執照船一隻共載民人張桃等男婦二百四十四名口訊係自内地偷渡來臺灣欲到北路五條港入口遇風飄到鹿耳門等語伏查船隻攬載無執照客民本干例禁况現在搜剿逆匪餘黨潰逃尤應嚴行究辦畨仔挖拏獲船隻載有賊夥已飭委李永祺馳往鹿仔港㑹同李化龍嚴行究辦其鹿耳門所獲船隻私載民人至二百四十餘名之多或竟係賊人夥黨出口潛逃假稱來自内地亦未可定所供殊不足信臣已咨行常青就近親提各犯嚴行訊究從重定擬至恒瑞自到塩水港以來僅知後路堪虞零星打仗不能痛剿賊衆直達諸羅其咎實無可逭但詢之烏什哈達等僉稱恒瑞在塩水港時常與賊匪打仗俱係親身帯兵前往毎日招撫村荘巡查營卡並未在營坐守及臣等自諸羅進兵恒瑞屢在前敵打仗殺賊頗屬奮勉海蘭察等皆所親見看來恒瑞素未厯練軍務遇事不能堅守思慮過多遂至茫無定見而于帶兵打仗之處尚非心存怯懦畏賊不前臣固不能徇私袒芘亦不敢避親誼之嫌不行㨿實陳奏轉蹈欺飾可否將恒瑞留於軍營自偹資斧効力贖罪事竣後再行回京再查成都將軍一缺專管土司及新疆屯田各事必須熟諳人員方資經理福州雖係海疆而臺灣平定之後事務較簡自不如成都之缺更闗𦂳要鄂輝久在川省練達老成臣素知其撫輯得宜最為畨人信服今令鄂輝調補福州似難收駕輕就熟之効可否將鄂輝仍留成都將軍之任奏入上命軍機大臣傳諭福康安海蘭察常青鄂輝李侍堯曰福康安奏到之摺係初七日拜發在前日奏到十三日所發奏摺之前該處賊匪阻溪自固壘砌石墻安設賊卡聚至萬人非一朝一夕所能為福康安等於攻破大里杙賊巢後若即統領大兵乘勝追殺則賊匪紛紛逃竄救死不暇豈尚能收合夥黨聚集萬人從容壘砌石墻設卡拒守即使攻破大里杙後或有堵拏餘匪撫輯弹壓事宜亦祗應於將領中酌留數人帶領弁兵在彼儘足以資料理福康安即當親統大兵乗勝突入搜捕賊匪即或逆首逸入内山生畨等懾於軍威亦必及時擒獻乃官兵於十一月二十五日攻破賊巢直至十二月初四日始由平林仔發兵前進計期已閲十日使賊匪得以乘暇收合餘黨於集集埔預為佈置臨溪設卡壘堵塞路據險死守幸而衆兵奮勇出力攀援直上將集集埔内賊營全行剿洗而首逆林爽文又經乘間逃竄此皆福康安等辦理遲緩與賊以暇若早至生畨隘口則並可不需此戰或竟將林爽文即時擒獲乃失此機㑹實屬可惜至從賊匪徒雖經遵示投出現在自不得不從寛貸其一死但究非良善之人将來總未便仍留該處應于辦理善後事宜時酌量分别遷徙他省内地安挿方為妥善上又諭内閣曰臺灣地土膏腴素稱沃壤向來内地民人或私渡謀食亦所不免但現在臺灣逆匪滋事該處民人遭其擾累生計維艱尚或因無地可耕紛紛遷避若内地民人前赴該處則不惟口食無資且恐身罹殘害是此時斷不應有偷渡臺灣之事自必係鹿仔港等處沿海賊匪夥黨現經官兵剿捕勢已窮蹙思欲偷生逃死或將入内地潛匿或將由海道逺颺因詭稱内地民人私載船隻以為免脱之計不可不嚴行究辦福康安現在該處搜捕逆首所有偷渡各犯務湏嚴行訊鞫跟究得實從重定擬仍一面分派弁兵在鹿仔港鹿耳門沿海各口岸嚴宻稽查毋使賊匪夥黨私自竄逸並著李侍堯查明此等私渡船隻係從何口岸逸出即將該地方官及防守各員弁一併査明恭奏欽定平定臺灣紀畧卷五十
