  text: 欽定四庫全書欽定平定臺灣紀畧卷五
  hash: sha256:f0b268c32f143b3ab874cd5182f51b130605a48daafd7060633708957d55dfa5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_005-1a, image: WYG0363/WYG0363-0062c.png}
body:
  text: 二月初六日甲辰孫士毅奏言拏獲匪犯許阿協等四名供上年七月十月在漳州地方被賴阿邊等糾引入天地㑹其㑹起於乾隆三十二年以大指為天小指為地凡入其教者用三指按住心坎為號便可免於搶奪被搶銀兩亦可要回等語奏入上命軍機大臣傳諭李侍堯孫士毅徐嗣曾曰天地㑹名色起自三十二年為時已久且該犯等輙敢轉相糾約暗用記號奪取財物毫無忌憚而許阿協等俱在漳州地方被誘入夥並未渡臺可見此等邪教閩省内地已有尚不止臺灣一處從來倡教立㑹最易煽惑人心為地方之害上年大名糾衆戕官一案段文經亦借立八卦㑹為名互相勾引遂成逆案而閩省匪徒公然立天地㑹名色肆行搶奪較之大名邪教其案更久此總由地方官平時不肯實力查察及遇有犯事者又不能徹底根究以致姑息養奸即如上年臺灣楊光勛一案所立㑹名即係現經查出之天地㑹乃地方官改作添弟二字明屬化大為小希圖規避處分此次林爽文等滋事不法即由從前養癰貽患所致不可不嚴切究辦以浄根株著該督等於事定後宻訪嚴拏痛予懲創勿再稍留餘孽並將三十二年以後失察邪教之督撫及文武大小員弁撤底查明據實㕘奏其辦理楊光勲一案將天地二字改作添弟字様之臺灣地方官其咎更重並著確查嚴㕘以示懲儆至許阿協供出勾引入教之賴阿邊等犯俱籍𨽻漳州該督等俟臺匪辦完後即飭屬嚴緝務獲訊明黨羽按名究辦毋任奸徒漏網初七日乙巳常青奏言賊匪於十二月三十及正月初一等日分路攻逼郡城經鎮道督率文武員弁兵民義勇人等協力剿殺鎗砲打死賊人甚多賊匪四散奔逃又臺灣府知府印務先經飭令福州府同知楊紹裘署理奏入上命軍機大臣傳諭李侍堯常青黄仕簡任承恩曰此次與賊打仗文武官弁及兵民義勇人等協力𠞰殺奮勇得勝保䕶郡城實屬可嘉俟常青抵臺灣於𠞰捕完竣後查明實在出力人員分别奏請交部議叙所有義民鄉勇激發公義協力𠞰賊尤堪嘉奬僅令地方官分别奬賞尚不足以示鼓勵著常青於抵臺灣後查明各義民鄉勇内如係務農經商生理者即酌免交納賦税若係首先倡義紳衿本有頂帶者即開列名单奏明酌予職銜以示優異至黄仕簡任承恩於正月初四初六前後抵臺迄今已一月有餘何以尚未㨿奏報𠞰賊消息該提督等係専閫大員抵臺灣已久即待厚集兵力剋期進攻亦應將賊匪情隨時奏報乃至今總無消息所辦何事黄仕簡任承恩著傳㫖嚴行申飭㸔來黄仕簡任承恩全不諳事理輕重緩急且彼此俱係提督不相統攝竟有互相觀望之意於𠞰捕事宜不能得力近來常青屢次奏報甚有主見籌辦一切頗合機宜此時李侍堯自已抵泉州常青交印後即速渡臺灣督同黄仕簡等𠞰捕賊匪務將賊首林爽文王芬及此外有名頭目擒拏解京盡法懲治不可任其逸入内山原任山東按察使楊廷樺曾任臺灣道且在閩省年久於該處情形自所熟悉其獲咎因監犯越獄究非私罪可比前已有㫖交與李侍堯帶徃差遣委用現值用人之際即著楊廷樺補授臺灣府知府仍帶革職留任並傳諭常青俟李侍堯到閩即令楊廷樺渡臺接印任事臣等謹按林爽文結黨肆虐一時義民鄉勇或首先倡義或應募急公其義憤激發足見小民具有天良我皇上深為嘉予以僅由地方官奬賞不足以示鼔勵特諭令督臣查明農商酌免税賦紳衿給予職銜隆恩逾格彰優異而務普霑宜乎志切同仇倍加感奮也上又命軍機大臣傳諭李侍堯常青曰該匪等私行倡立天地㑹已閲二十年之久在其黨者自必隨同搶奪而被搶者豈有甘心隱忍不行呈控之理乃從未見該督有查辦㑹匪搶奪之案若被搶之人呈控到案該地方官又何所廽䕶竟置不辦其故殊不可解且事歴多年其黨羽必多著李侍堯常青均俟𠞰捕完竣後李侍堯在閩省内地各屬宻訪嚴拏常青在臺灣地方即速嚴行搜緝毋得稍留餘孽仍應不動聲色妥協辦理並將此㑹究係起自何年該省有無被搶控告地方官沉擱不辦之案確查㕘劾同日常青奏言水陸兩提臣到臺日久迄今未得殱賊確信必因南北兩路徃復熟商以籌併力合攻動出萬全不無少需時日但臣盼望逾切夙夜靡寧至臺灣郡城及鹿仔港新莊一帶俱能攻殺賊匪保䕶各境今當大兵四集定可剋期掃滅淨盡又逆匪林爽文等糾衆蔓延佔踞彰化諸羅鳯山等縣守土文武各官或臨敵捐軀或奮身殉節除臺灣知府印務先經飭委福州府海防同知楊紹裘前赴署理今經大兵進𠞰被䧟地方以次收復所有知縣同知各缺均應遴員速徃經理臣隨飭令原任同安縣知縣黄嘉訓前徃署理諸羅縣知縣事務候補知縣宋學灝前徃署理彰化縣知縣事務其鳯山縣缺即以現准調補之張升吉速赴任事又理畨同知一缺委令原任俸滿理畨同知王雋署理淡水同知一缺飭令現准陞署之徐夢麟前徃任事至各㕔縣印信除淡水同知闗防已㨿繳送到泉即發交徐夢麟擕帶備用其餘尚應查追下落先飭將各經歴縣丞印信闗防借給備用俾得各昭信守所遺彰化等屬縣丞廵檢典史各缺亦俱隨時派委前徃至被害武職各官咨令水師提臣黄仕簡即於現在領兵到臺之副將𠫭將都守内就近酌量委用統於事竣之日循例分别題咨辦理再查臺灣府知府孫景燧係在彰化拏賊被害所有印信亦恐遺失已飭署府楊紹裘借用臺灣府經歴印信其内地府經縣丞借用印信闗防俱令布政使暫給木戳以資應用奏入報聞初八日丙午藍元枚奏言二十一日馳抵泉州查鹿仔港及北路之艋舺等處皆有官兵率同義民各相保䕶提臣黄仕簡等俱於初四初六等日進港㑹合𠞰捕臣受兹重任所有地方情形一切事宜凡思慮所及惟有勉竭心力統向督臣常青相商籌辧奏入報聞初九日丁未徐嗣曾奏言連日接㨿臺灣鎮道具報鳯山滋事不法之賊首王啟郎曾錦等亦被拏獲該鎮柴大紀等又偵知賊匪於三十日分路來攻預為準備官兵用鎗砲打死百餘名該道永福等分路捕𠞰殺賊無數蔡攀龍見賊匪由南蜂擁而至復率兵民奮勇截殺鎗砲打死賊匪甚多鄭嵩奮力夾攻追趕十餘里賊俱散退等語是賊匪屢經𠞰殺業已膽落今聞提臣黄仕簡兵到即已紛紛散去加以陸路提臣隨後踵至并力夾攻臣竊計現在官兵㑹𠞰窮搜賊匪必無稽誅之理特恐其潰逃竄逸復又嚴飭沿海地方加意廵防堵緝其賊匪船隻經臣與督臣先後􅊾飭嚴加捜燬並飭臺地文武於商船出口時盤詰稽查毋致夾帶偷渡既杜其逋逃之路復絶其偷越之根自可不致一名漏網至於内地漳民叠次廣為曉諭漳屬民人現有紳士耆民教率子弟族黨於各海口地方宻拏匪犯者當即分别奨勵以示風勸臺灣屢有奸民械鬪之案此次林爽文等竟敢攻犯城池皆由地方官辦理各案止期就案完結並未徹底嚴辦以致刁民肆無忌憚臣查逆匪林爽文所住之大里杙莊從前謝笑械鬪案内即有該莊林姓多人而諸羅縣楊光勲案内逸犯張烈等現因逃入林爽文莊内地方文武往拏遇害可見奸民結㑹樹黨氣類相通仰惟聖明洞鑒實於數千里海外情形瞭如指掌自當凛遵痛加誅𠞰以浄根株又查辦要犯家屬惟有處以鎮静出以縝宻不使稍露端倪令該處民人坦然無疑犯屬自不致兎脱漏網奏入上命軍機大臣傳諭李侍堯常青徐嗣曾曰王啟郎曾錦係鳯山滋事賊首與髙文麟等四犯無異既經拏獲著該督撫等押解來京聴候審辦其遊擊蔡攀龍督率兵民奮勇殺賊尚屬可嘉並著事竣後給咨送部引見此時各路官兵早已齊扺臺灣賊人望風膽落勢必紛紛逃竄各口岸廵防堵緝尤為最要李侍堯於二月初二日經過杭州計日内已可抵泉州常青交印後迅即前往臺灣遵節次所降諭㫖妥協督辦總期迅速蕆事十一日己酉常青奏言接准黄仕簡咨稱帶領官兵於正月初四日到臺經將查辦情形於初五日具奏等因查該提臣所稱初五日具奏一摺並未到泉似係被風阻滯而任承恩由鹿仔港登岸之後迄令尚無進兵確信探聞現駐劄彰化此時南北兩路自必聲息相通軍威益壯至查閩省先後派調官兵共計一萬内兩提臣管帶四千四百名總兵郝壯猷管帶一千五百名普吉保續帶六百名副將林天洛管帶一千名俱已陸續到臺又遊撃延山帶領福寧等兵一千名亦經配渡前進惟副將徐鼎士管帶督撫標兵一千五百名由閩安出口屢被風阻㨿蚶江通判探報十五日到東湧放洋又復因風飄散現止千總陳玉光兵船一隻於十八日自滬尾港登岸其餘各船尚未抵淡但核計到臺官兵已共八千數百名兵力不為不厚所有廣東兵一千名即可令其轉囬其浙省派備兵三千名亦應撤令歸伍以省縻費惟漳州一帶地方𦂳要應將粤省撥赴潮州兵二千名暫行留駐俟臺地𠞰匪事竣再令歸營臣等與署陸路提臣藍元枚商酌意見相同現已分咨廣東浙江督撫各臣查照辦理又接據臺灣鎮於十二月十八二十一二十七等日來禀内稱十二月十四日遊擊楊起麟搜捕各莊獲賊康里等五名十五日遊擊林光玉搜捕竹籠等莊獲賊楊元等八名十六日守備楊彲把總李春魁等搜捕大洲等莊賊匪數千圍攻該鎮督率弁兵飛往攻擊鎗砲打死賊匪百餘人生擒康合等五人十八日守備楊彲等搜捕溪塘各莊獲賊王齊等五名又獲奸細陳老二林保保二名訊供係賊軍師陳天先差令探聴黄仕簡己未到臺及鹽埕營盤有兵若干并以諸彰二縣俱乗大雨攻破亦俟天雨再來刦營攻府等語又接到同知楊廷理札㑹彰化義民張明義等解到賊匪楊牛林活潑等供稱首犯林爽文在鹽埕被砲打傷逃去醫治伊叔林清招匪復圖攻擊隨將陳老二林保保正法十九日午後雷雨賊衆果三靣擁至官兵力戰一夜至二十日辰刻臺灣縣義民亦來助戰兵丁余海首先趕入賊陣放鎗打死一賊各弁兵繼進殺賊百餘名生獲匪陳廷等八名一併解交臺道究辦二十六日賊人又攻鹽埕橋自辰至申鎗砲打死賊匪數百并打死騎馬賊一名賊衆始退隊内兵丁陳成金徐富二名畏葸退後即行梟首示衆餘兵奮勇追趕殺死賊人數十名生獲賊匪林大興等三名就軍前正法等情又將拏獲之匪犯簡鳩陸文朱開劉實即黄實林天球林躭鍾祥等七名提訊鍾祥與逆首林爽文素相熟識張文朱開劉實林天球并林躭之子林萬均係林爽文王芬糾邀入㑹簡鳩原係畫匠並非㑹内之人因與已獲賊目楊振國素識令其畫旗隨同入夥賊匪等當逆首林爽文糾衆刦營攻城之時鍾祥一犯持刀入城遇理畨同知長庚撲捕遂加戕害張文殺死兵丁一人復在城縱放監犯朱開傷害官兵一人劉實林天球二犯㨿供並未傷人惟持木棍隨同附和林躭先充彰化縣役年老黜退其子林萬原屬㑹匪該犯於攻城時主使其子在内接應迫林爽文分攻諸羅淡水派令各該犯在彰化踞守經署備陳邦光率同義民往收彰城將該犯等先後擒獲其天地㑹名目起自何時及入㑹人數多少反覆䆒詰不能指實即將該犯分别凌遲斬决懸首梟示各犯家屬財産分飭各縣照例查辦林躭之子林萬雖據供稱已被義民殺死是否屬實仍飭確查又陳邦光拏獲賊目楊振國等四犯應坐家屬俱在彰化已咨㑹提臣嚴行搜捕嗣後如有續獲要犯其家屬住居原籍者統候𠞰匪事竣㑹同提臣查拏究辦同日黄仕簡奏言郡城為全臺根本週垣廣濶僅係木栅環植本非峻險城隍臣抵臺後加𦂳守禦保固府城初六初九初十十二等日計擒獲賊匪王鍛等二十三名及賊目陳拱福賊夥陳㨗等并奪獲刀械等項審明正法梟示十二日金門南澳銅山等標營官兵續到臣隨遣海壇鎮總兵郝壯猷率同副將丁朝雄㕘將那穆素里遊擊蔡攀龍都司羅光照等帶領兵丁二千三百五十餘名前往南路𠞰匪恢復鳯山又遣臺灣鎮總兵柴大紀率同㕘將潘韜遊擊李隆楊起麟林光玉守備邱能成等帶領兵丁二千二百三十餘名前往北路進𠞰恢復諸羅彰化等處臣帶本標官兵㑹同臺灣道永福在南北路衝要處所堵禦擒捕往來策應以壯聲援仍分遣弁兵往沿海口岸把守堵截飭令在城文武官弁嚴守郡城務期迅殱逆賊恢復各縣城池至府城民居稠宻去冬被賊廹擾未免驚惶臣到臺灣後復出示曉諭安民現在市肆開張商賈貿易如常民情安堵又上年十二月内逆賊林爽文等叠攻府城經臺灣道㕔縣各僱募鄉勇數千守城臺府居民舖户亦募義民數千帮助兵丁敵賊臣到臺之後各加奨賞申明大義人人感戴皇上恩威愈形踴躍均奏入上命軍機大臣傳諭李侍堯常青曰黄仕簡雖係病後但身為專閫大員既抵臺灣理應親身帶兵𠞰賊何得僅以派員前徃了事且彰化縣城久經守備陳邦光收復而該提督摺内何以尚稱令柴大紀前徃收復彰化等處任承恩由鹿仔港登岸係在北路即當知㑹黄仕簡分路夾攻辦理方中窽要乃迄今月餘尚無進兵確信㸔來伊二人竟各不相下心存觀望此即朕於事起時不欲令任承恩去之意今竟不出所料常青不可不迅渡臺灣督率辧理並著常青於到臺後即行秉公嚴查如該提督等實有觀望不前之處即當㨿實嚴㕘不可因業已調任意存廻䕶兩可完事再任承恩似此遲延不奏則該提督及副將徐士鼎前後奏守風待渡之説亦恐不足信並著常青一併㨿實查奏如該督稍有瞻徇將來經朕查出即首領亦不能保不可不慎也至該督雖已調任湖廣但此事究係伊在閩浙任内之事尤宜督同妥速辦竣方可將功補過即李侍堯以現在閩浙總督駐劄泉州凡臺灣𠞰捕等事亦應聴常青就近調度協同帮辦和衷共濟其各弁兵内如有因常青係别省總督呼應不靈致誤機宜者該督不妨竟按軍法從事使士卒咸知儆惕現在帶兵大員有總兵柴大紀郝壯猷普吉保三人足以分路𠞰捕著常青於抵臺後留心察㸔若黄仕簡實係病體未愈即留於彼處亦屬無益可令其回至厦門本任調養又常青審明賊夥正法摺内稱劉實林天球二犯㨿供並未傷人惟擕木棍隨同附合等語此等叛賊豈可復以尋常附和而論况該二犯業於審明後正法摺内又何必為聲説致蹈辦常案故套着該督嗣後於拏獲逆匪時其首要各犯仍遵前㫖派員解京其餘各犯審明後即一靣正法一靣具奏以淨根株上又命軍機大臣傳諭黄仕簡任承恩曰前據常青奏鹿仔港署守備陳邦光帶領弁兵率同泉州粤省義民攻復彰化縣城擒獲賊目髙文麟等四犯又據徐嗣曽奏鳯山滋事不法之賊首王啟郎曾錦等已被拏獲賊人於十二月三十日來犯郡城鎮道親督義民與遊擊等分路𠞰殺賊匪無數各等語是彰化縣城久經陳邦光等收復其鳯山等處亦經柴大紀等派兵分路𠞰捕郡城已無事矣何以黄仕簡摺内僅稱派委總兵等分赴南北二路進𠞰恢復縣城竟似該處軍情全未知悉者㸔來黄仕簡竟思安坐郡城並不親赴各該處督率𠞰捕大屬非是提督為專閫大員領兵是其専責黄仕簡深受朕恩現帶兵𠞰賊雖係病後理宜奮勉出力乃於𠞰捕事宜奏報遲延全不得行軍要領該提督所司何事試思臺灣郡城經賊人屢次攻犯該鎮道等當大兵未𠞰之先尚能保䕶無虞焉有此刻又添提督所帶大兵轉須協同守禦之理豈黄仕簡竟欲以守䕶郡城為名遷延坐視耶黄仕簡著傳㫖嚴行申飭至任承恩由鹿仔港登岸即應將該處賊匪情形及辦理𠞰捕事宜先行具奏乃日久並未據有奏報現據常青摺内稱該提督尚無進兵確信探聞現在駐劄彰化等語任承恩係自請前赴臺灣𠞰賊既由鹿仔港一路進兵即應督同陳邦光等上𦂳追捕殺賊並知㑹黄仕簡分路㑹合夾攻何以駐守彰化漫無籌畫其心何居任承恩亦著傳諭嚴行申飭欽定平定臺灣紀畧卷五
