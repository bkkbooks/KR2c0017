  text: 欽定四庫全書欽定平定臺灣紀略卷四十四
  hash: sha256:3b842f3c97ca255e53d1f056e0803fe3e49a58c97eb780757127f8aae318e822
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_044-1a, image: WYG0363/WYG0363-0517c.png}
body:
  text: 十一月初八日辛未福康安奏言臺灣賊匪蔓延日久官兵氣餒總未蕆功䝉將屯練貴州廣西兵丁預為調遣各兵俱係生力鋭氣方盛進剿必能得力臣適因風信不順守候數旬粵西兵業俱到齊屯練已有至泉州之信貴州官兵不久亦可入閩雖守風稍覺稽延而軍聲更為壯盛俟到軍營後督率奮勇官兵連得數次勝仗將賊匪盡力殱除即舊存之兵皆可轉怯為勇用命爭先又有閩粵各省兵丁隨征子弟拔補額缺兵力亦藉可增添似未便因此時鹽水港一帶賊勢滋蔓即於閩粵等省紛紛徴調致涉張皇且軍營添調一兵須得一兵之用京兵素稱徑勇而臺灣水土蒸溽似不相宜將來即使添兵京兵竟可毋庸調遣其餘緑營兵丁除貴州湖廣等省外惟廣西及江蘇狼山等處並崇眀水師各營素稱訓練有方似為可用若閩粵新募之兵人數衆多難保無充數應名之弊昨據孫士毅札㑹稱廣西兵丁存營精壯可得二千餘名其廣西召募之兵尚須訓練又恆瑞所奏之內亦有閩省新兵須於暇時操演技藝之語是新募者技藝較疏不能十分出力即此已可概見臣此時前抵軍營察看情形萬一必須添兵大舉即將擬調得力官兵據實奏聞如兵力業已足敷義民勇往出力亦即酌量情形具奏毋庸添調以省擾纍臣于入閩途次聞有南安縣教諭郭廷筠商人李光雲于該處情形最為熟悉隨傳該教諭進見詢以臺灣事務應對眀晰即飭其尋覓籍𨽻臺灣之人聽候差遣旋據禀報現有避難來厦之諸羅縣舉人郭廷機彰化縣舉人曾大源職員楊振文監生林文㑹等均為臺灣民人素所信服家中庒佃甚多可以設法遣人離間賊黨臣復傳郭廷機等優加奬賚密令分途前往妥辦並將途中預偹告示數千張著傳人乘坐小船持往南北兩路張貼剖晰利害剴切曉諭令被脅民人及早自行投出凡歸莊安業者不許官兵絲毫擾纍以安其心其情願充當義民者亦即廣為招集以偹隨營剿賊之用至器械為行軍要需必須加倍堅利臣于候風時將應用一切軍器妥為製偹又聞賊匪居住草藔圍以䓶竹復多偹火彈及厚背利刃斫刀預偹臨時應用現在各項器械俱已製偹齊全已交載兵船內運送前往再查泉州民人素與漳人有隙凡係臺灣之泉人多有充當義民者殺賊保莊倍加勇往因思泉州地方風俗剽悍若此時招集泉州鄉勇既可隨同剿賊又可安戢地方臣于到閩時先遣妥人密辦及行過泉州即有鄉勇多人懇請隨征進剿當經靣加撫諭飭委同安縣知縣單瑞龍教諭郭廷筠揀選身家殷實之人互相保結臣于此內擇其精壯者二千四百餘名商同李侍堯酌賞安家口食銀兩令其隨往又恐內地漳人聞知疑慮復遣妥員招集漳州鄉勇百餘人以泯形跡但該鄉勇義民等雖屬健壯究不能諳曉紀律復檄調熟悉情形通曉閩音之副將李威光並臣奏請帶赴臺灣之恭將李芳園等數員委令管轄隨時教演以收實用又十四日得有順風與海蘭察同舟放洋駛行半日風色又轉東北船户即欲在料羅地方暫泊臣仍令折創開行無如側帆迎借旁風往來轉折水道紆回不能迅速二十二日已至外海大洋日暮大風陡起不及落帆水深又不能寄碇隨風折回至二十三日卯刻望見崇武大山將近泉州惠安縣洋靣維時風信愈烈詢據船户僉稱現值暴期三四日方能平順當令收入崇武澳中灣泊普爾普舒亮及巴圖魯侍衛等船隻先後隨至臣遣人赴各船看視皆因不慣乘舟又遇風濤傾簸頭暈嘔吐不能飲食間有患病者臣以現在灣泊候風並須添帶淡水該侍衛等既多疾病不必在船坐守即令暫時登岸稍為歇息一遇順風即刻開船徑渡查崇武地方與鹿仔港隔海斜對若風色轉順一日可達軍營今因風暴頂阻守候羈遲又不得臺灣賊匪情形確信下懷焦急適惠安縣將驛遞常青恆瑞寄臣摺稿呈送查閲各摺郡城一帶賊匪漸次退散義民投效甚多丁朝雄等所帶之兵已到東港南路漸有轉機惟恆瑞稱諸羅賊匪愈聚愈多日在鹽水港滋擾該參贊盡力堵禦未能進抵諸羅其普吉保一路自到笨港元長莊後亦未能與恆瑞㑹合看來賊匪探知有十餘萬大兵渡臺之信未免心生畏怯妄意諸羅圍困日久兵力稍疲可以乘虛窺伺將南路賊匪撤回諸羅在鹽水港一帶四出滋擾是以南路賊雖覺解散而諸羅情形更為急迫必須臣親督大兵迅抵軍營相度機宜將賊之羽黨痛加剿殺殱擒賊首賊目無難尅期集事臣已與李侍堯靣商並咨㑹鄂輝令由蚶江竟赴鹿仔港無庸前往厦門以期迅速再前在厦門守風據原任副將騎都尉陳大恩原任湖南守偹李天貴江西南昌營守偹廣惠因解送火藥到營俱呈懇隨往軍營聽候差委查陳大恩李天貴廣惠俱曾在金川出征年力尚壯自應准其所請帶往軍營差遣其廣惠守偹員缺即咨眀江西撫臣遴員署理奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯柴大紀普吉保曰福康安海蘭察等逺涉重洋備嘗辛苦而普爾普舒亮及巴圖魯侍衛章京等皆生長北方未厯風濤之險今因乘舟不慣偶有患病覽奏甚為軫念即日風色順利自當安穩渡洋伊等此時勤勞出力雖不免風濤驚險指日奏績蕆功朕必酬庸格外受恩之日正長當倍加奮勉鼓勇直前以期迅速集事共膺懋賞昨因恆瑞奏到之摺稱賊多兵少過于張皇恐福康安不免為其所惑是以降㫖詳晰開示今閲福康安奏到籌辦機宜諸凡皆妥井井有條是福康安于接到恆瑞摺稿後竟能胸有定見不為其言所奪覽奏深為慶慰至柴大紀設遇縣城萬難守禦之時自必帶領兵民出城赴普吉保處合為一勢克復易于反掌即使普吉保一路亦難駐守伊二人竟可同赴福康安軍營㑹合一處以圖收復然此係過慮乃必無之事且普吉保到笨港後昨據李侍堯奏已移營月眉莊距縣城不過十餘里伊一聞縣城被困緊急自必星速赴援即僅如魏大斌之帶兵入城而城中添此兵力亦可以壯聲勢是柴大紀普吉保均不致或有挫失即恆瑞在鹽水港雖不能稍進尺寸伊帶兵數千亦尚能自守斷不至將鹽水港棄去計此時福康安早得有順風徑渡鹿仔港自己親統大兵相機進剿惟日夕盻望捷音為急耳初九日壬申柴大紀奏言諸羅居臺灣南北之中其縣城四靣堆土種竹為圍並無磚石既薄且矮本難為守正月克復之時即相度形勢分兵劄營于縣城四門外要害之處逮六月杪賊復猖獗遂環營開溝並堆短墻各處共安大炮二十八尊內三千餘斤者六尊營盤甚屬堅固是以賊衆數萬叠次來犯俱被我兵殺退若一旦棄而他去其城池營盤大炮均為賊踞將來克復甚難且現今恭贊臣恆瑞之兵七千名已在鹽水港離諸羅四十里總兵普吉保之兵五千五百名駐元長莊離諸羅三十里臣諸羅之兵雖受餓疲乏而三方鼎峙聲勢尚壯惟有速催兩路進兵不獨解諸羅之圍而㑹剿斗六搗穴擒渠在此一舉事機萬不可失若帶兵殺出縣城賊勢益張恐鹽水港元長莊兩路之兵均難駐守而府城以外直至鹿仔港數百里地方勢必仍為賊踞欲再圖進取甚屬不易關係匪輕况諸羅城廂內外住居百姓二萬有餘又加各莊避難入城者不下二萬自春至今協力守禦並捐助軍糈均屬急公向義實不忍將此數萬生靈盡付逆賊毒手但官兵乏糧已久餓病相兼現在菜色而火藥惟以久年泥牆下假二三尺之土拆取煎銷每日所得有限更加本月初五六七八九十等日賊匪晝夜環攻官兵義民忍餓堵殺賊雖暫退仍聚于附近各莊臣審時度勢尚覺人心固結惟有竭力保守以待援兵再諸羅自六月初十日被賊圍困文報不通糧餉莫運七月間臣摺差中途遇害八月十六日復募雇義民遊永盛等賫摺由山徑小路迂途赴郡禀領餉銀仍由原路回縣往返三次俱無遺失共收到餉銀四千六百圓九月二十八日復差遊永盛等二十名仍由山路赴縣請領餉銀將軍常青發畨銀六千五百圓付遊永盛等帶至赤山六甲莊遇賊寡衆不敵阮阿生等四人帶畨銀八百圓逃脫回縣交繳其游永盛等一十六名人銀文書俱被賊拿去又游擊邱能成因傷重身死逰擊林光玉病故義民黃觀等十名亦因傷重身故十月初四日探得賊匪將諸羅縣南八奬溪之道爺埤用土石壅塞决溪水泛濫于老店大崙莊鹿仔草一帶田洋使來援諸羅大兵一路難行隨于初四日飭逰擊李隆帶領官兵義民前往開通賊千餘來拒當經殺退賊匪將埤挖開水由八奬溪順行併將入口之溝用土填滿雖遇雨溪漲水亦不能冲入上流既斷下流易涸大兵便于前進初五六七等日逆賊林爽文復紏衆萬餘不分晝夜接連來犯南北西三處營盤臣同侍衛德成額恭將特克什布等往來督戰緣火藥不足不能多用大炮惟飭各營鳥鎗藤牌併各義民俱伏溝內短墻下靜以待動俟賊將近鳥鎗照定凖頭連環叠放打死賊匪甚多賊衆怯退官兵義民一齊並出趕殺多匪初八九十等日賊衆復各帶稻草一把妄想填溝冲進又用大板木車中藏鎗炮每車運以四牛分西南北三路晝夜來攻臣等督率官兵用大炮將木車擊碎北門打死騎馬賊一名南門外打死騎馬賊一名各營盤官兵義民奮勇向前力戰三處打死賊共計數百名所有連日打仗西北之賊俱逃入十四甲中莊紅瓦磘西南之賊皆逃入三苞竹埤堵等莊總因藥火不足兵力枵腹收軍回營獲竹牌旗械等項義民林宗䕃于初五日殺死股首一名搜出木印一顆刻僞鎮守中路征西驃騎大將軍張旋印字樣令旗一靣書僞先鋒股首吳昆字樣林宗䕃能于陳前殺死股首當即賞給頂帶以示鼓勵惟是諸羅被困四月糧餉久乏兵民皆以花生地瓜野菜芭蕉根薯藤薯葉雜煎充饑人多食繁即地瓜野菜等物亦將罄盡勢屬危急而總兵普吉保恭贊恆瑞兩處大兵均無來援日期諸羅日夜被賊侵犯官兵義民恐日餓日餒難以支持已再募差賫咨力懇將軍常青嚴催恭贊臣恆瑞總兵普吉保兩路大兵迅速來援臣惟有竭力固守以俟大兵齊集以圖併力剿捕同日常青奏言臣營盤內有兵四千雖兵力不敷進剿斷不敢拘泥坐守是以前𣲖副將丁朝雄等帶領辨兵前赴東港現駐港口並該處義民幫同剿捕臣于附近府城賊莊亦漸次剿盡茲查近日南路民人情願充當義民隨營剿賊者甚多現在酌籌若可得此等義民三四千人臣即酌留兵將防守營盤保護府城帶兵一千五百名南路進剿再恆瑞帶兵三千初到鹽水港恐兵力不足先派梁朝桂帶去兵一千名又派千總王國志等兵二百名帶同府城義民二千前往協助令內地調赴鹽水港本省兵三千現俱陸續前往是恆瑞處已有兵七千所有義民二千及王國志帶去兵二百名仍撤回郡以偹府城防守均奏入上命軍機大臣傳諭福康安常青海蘭察柴大紀曰柴大紀真不愧古來名將朕披覽之餘不覺為之墮淚柴大紀自駐守縣城經賊匪屢次滋擾俱能激勵將辨兵民悉力堵禦保護無虞柴大紀接前㫖時正值該處賊匪晝夜攻圍城中糧餉將盡勢在急迫若即遵㫖帶兵出城未為不可乃柴大紀以該處係臺灣要隘恐一旦棄去難于收復並以城內居民數萬協力守禦不忍委之于賊現在督率兵民忍餓保守以待援應所見甚正柴大紀激發忠良兵民感動上天必加鑒佑縣城自可保無事即日福康安統領大兵迅抵鹿仔港破賊立功當在旦夕柴大紀不過固守數日福康安大兵一到即可一同勉圖奏績承受重恩至恆瑞普吉保兩路聞柴大紀處被圍緊急糧餉火藥將次用盡兵民忍饑固守自應星速赴援即如常青在府城距諸羅較近一聞縣城被圍之信尚知派撥官兵先後前往䇿應况恆瑞普吉保駐兵處所距縣城甚近何以觀望遷延並不即行前進又未分遣將辨帶兵救援即使伊二人領兵入城又如魏大斌前次赴援時後路被賊截斷再設法剿除亦當先其急而後其緩城中竟可多添兵力且兵丁等俱有携帶火藥糧餉亦可勻出分用以資接濟乃伊二人計不出此徒知株守自立于無過之地可乎著福康安到彼將伊二人何以頓兵不進之處查眀嚴行恭奏但恆瑞普吉保二人其咎稍有區别恆瑞在鹽水港係屬海口地方距縣城較近且該處關係緊要恆瑞未敢輕動尚可藉口至普吉保駐劄元長莊後業已移營月眉莊距縣城不過十里尤為聲息相聞况笨港非鹽水港可比即稍有疏虞亦于大局無礙且普吉保即使賊匪潜截後路亦可知㑹恆瑞令其互為䇿應是普吉保尤宜奮勇直前速往援應乃亦按兵不救其咎較之恆瑞為重福康安應分晰詳查據實恭奏此時福康安自己早抵鹿仔港現在柴大紀處被圍緊急惟當督率將辨乘官兵新到鋭氣鼓勇直前由普吉保一路速抵縣城至常青在府城日久未能前進今若酌量兵力足敷防守伊竟帶兵前往南路固屬一䇿但究不如先救柴大紀為是且福康即日前抵鹿仔港常青若督率將辨兵民與福康安等㑹合進攻自于剿捕更為得力至柴大紀處在縣城守禦出力文武員辨著福康安詢明柴大紀一併咨部從優議叙其殺死賊人股頭之義民林宗䕃已經柴大紀賞與頂帶如該義民才具可用即給與實缺亦可所有打仗傷亡之官兵義民俱著福康安查眀咨部分别給豫恩恤義民等運送畨銀被賊截住其賫銀到縣之阮阿等四名著各即賞給頂帶至游永盛等十六人如係被賊戕害亦著查明即照陳亡例優加賞恤以示奬勵上又諭內閣曰柴大紀以縣城一切守禦事宜久經布置周密且因縣城內居民甚多不忍將數萬生靈委之于賊立意堅守以待援應是其保護合縣民人與朕軫念義民多方愛護之意適相吻合所為我君臣各盡其義也柴大紀力捍圍城且能乘間殺賊已屬奮勇可嘉今被圍日久心志益堅勉勵兵民忍饑固守惟知以國事民生為重古之名將何以加之本欲俟大功告竣後優加封賞今伊能如此係念生民忠良激發為國家出力尤堪嘉奬柴大紀著即封為一等義勇伯世襲罔替並著淅江巡撫琅玕賞給伊家屬銀一萬兩用示朕軫念勳勞鍚爵酬庸之至意上又諭內閣曰嘉義縣城被賊攻圍已閲半載而民人共知大義幫同官兵奮力把持久而益堅實堪嘉尚除節經降㫖將臺灣府屬本年及五十三年應徴錢糧豁免著再加恩將嘉義縣五十四年應徴錢糧再行豁免以示朕優加忠義有加無已至意初十日癸未上諭內閣曰嘉義縣隨營守禦兵丁同心協力奮勇打仗固守城池亦應一體加恩賞賫除已降㫖將打仗傷亡之官兵義民等分别給豫恩恤外所有現在守城打仗出力兵丁著各賞給兩月錢糧以示奬勵同日李侍堯奏言接據常青柴大紀各摺稿知諸羅尚在固守臣查恆瑞初到鹽水港具奏時正當蔡攀龍等被截鹿仔草被陷恆瑞所帶之兵亦未到齊是以甚覺緊急後梁朝桂等所領官兵義民陸續前往已足守住港口是以恆瑞寄來九月下旬摺稿稱俟鄭國卿之兵全到即約普吉保照柴大紀所指之路訂期並進援應諸羅令觀柴大紀本月望前摺稿則恆瑞等尚未能進想鄭國卿尚未到鹽水港是以恆瑞暫待查鄭國卿已于本月十三日入鹿耳門一二日必到鹽水港則恆瑞自當分兵駐守一靣知㑹普吉保尅期並進現在貴州頭起兵已入閩境湖南兵當亦可繼黔兵之後接續前來其本省召募新兵雖尚未可繼黔兵之後而既有新兵以供差操即可換出舊兵調往進剿除泉州及金厦等營與漳州相近應留偹防範奸匪之用其餘各營臣已預偹兵三千以俟調遣總之臺灣兵事必須趁今冬眀春辦定大局方可次第招輯安頓未便再有稽延是以渡兵運餉等項更須事事應手至徐鼎士處亦據稟本月初六日過大甲溪與賊打仗在牛罵頭劄營初七日與逰擊吳秀都司敏祿等分路進攻豬篙莊初十日進攻麻園十二日進攻大肚溪殺賊甚多辨兵亦有損失現因鹿仔港無兵夾攻未便獨進仍擬回駐大甲等語看來該地情形須福康安到就近察看方有調度再將軍福康安之船隻被風吹至該縣之崇武澚暫行收泊臣隨令藩司覺羅伍拉納前往照料奏入上命軍機大臣傳諭福康安李侍堯柴大紀曰現據李侍堯奏到之摺係二十七日拜發福康安尚未得風開洋計其前抵鹿仔港尚需數日柴大紀處望援甚急殊深厪念此時普吉保若能帶兵奮勇前進直抵縣城則柴大紀得此兵力接濟等待福康安大兵赴援則普吉保尚可將功補過但不知究於何時帶兵前進現在貴州兵已入閩境湖南兵亦可繼黔兵之後接續前進兵力實為厚集福康安究於何時在崇武澳開洋俱著李侍堯迅速馳奏十一日甲戌福康安奏言鄭國卿所帶閩兵業經李侍堯撥往南路所有鹿仔港官兵除普吉保帶兵五千五百名赴援諸羅外該處約存三千餘名現在新到之粵西兵三千名屯練二千名俱已配船候渡又加臣招集泉州漳州義勇二千餘名雖係未經行陳而踴躍隨征意氣頗為振奮亦可抵得力官兵一千之數是現在臣等帶往鹿仔港兵丁共有六七千名軍聲已屬壯盛其貴州兵丁已札飭許世亨催令䟎行並咨明李侍堯偹船在蚶江配渡約計月底可入閩境若配渡迅速不過十一月初間可抵鹿仔港臣一得順風不必俟黔兵到齊即行開駕至臺灣賊匪情形間隔重洋總無確信前據地方官稟稱郡城一帶莊民從賊郡城亦在圍中又稱諸羅糧餉火藥尚可設法運送斗六門賊目李七有投書之信今接閲常青摺稿又稱郡城賊匪漸次稀少而恆瑞柴大紀奏報之摺俱言諸羅被圍緊急賊勢鴟張糧藥一切匱乏堪虞可見各員探訪之詞先後不符好否俱未確實况賊匪技倆詭譎異常多使其黨羽布散流言或云某處賊勢蔓延故示矜張餒我士氣或云某處賊黨渙散故示嬴弱懈我軍心若觀聽稍為所惑每致中其狡計即如臣在厦門時聞賊首林爽文莊大田等各有形貌衣服相類者數人自係希圖窮戲時為乘隙潜逃之計雖為傳聞之詞亦應預為防範臺灣固不乏認識賊首之人究恐賊黨串通難以慿信臣已密行寄信李侍堯令于漳泉民人及曾在彰化一帶換班駐守兵丁內酌派素識林爽文莊大田者一二人送往軍營作為眼目以偹臨時識認庶免岐誤現在新兵雲集鋭氣方新適于臣候風之頃陸續到齊事機又屬凑合茲復添派湖南官兵二千名聲勢更當百倍臣到軍營後惟有步步留心相度情形併力進剿雖不敢過于持重坐失機宜亦不敢急于見功冒險輕進若能連得勝仗廓清後路剿撫兼施自必勢如破竹所向披靡且賊中黨羽雖多半係脅從臣已多發告示赦其從逆之罪廣示招徠並密遣熟悉賊情之人用為間牒如能擒獲賊首賊目來獻者優加奬賞授官職使其黨羽內離渠魁更易就獲再查各省添調生力之兵現已陸續到齊即軍營現有之兵有所倚恃亦可轉怯為勇合力進攻若能迅掃賊氛自可毋庸添調萬一諸羅稍有疏虞勢須多兵集事亦應多調得力官兵方足以振軍聲而收實用查閩粵營伍是否整飭臣亦未能深悉但詢據臺灣遞摺差辨多稱閩省本地兵丁屢經挫失廣東兵丁較閩省略優亦非徑旅且該二省調派已多存營者半係新兵充伍山海汛防在在均關緊要以臣愚昧之見將來即須添兵亦毋庸在閩粵各營添兵再賊目莊大田現有潛至諸羅㑹同林爽文併力合攻之語雖得自臺灣各官禀報未可深信但南路賊匪日漸退散而丁朝雄所帶之兵已到東港若乘勝進剿鳳山等處未嘗不可望其收復止以常青本非諳習軍旅之人坐守尚屬有餘進攻恐難得手且郡城迤北一帶通往諸羅之路又多係賊人占據萬一常青逺出賊匪又復窺伺府城實為可慮臣已札覆常青令其駐劄府城悉力固守同日徐嗣曽奏言二十八日福康安拜發奏摺後風順隨於申刻登舟開駕不及繕摺囑臣代為奏報臣詢之土人船户等俱稱風色甚好必可速到鹿仔港並見各船連帆銜尾而進甚為安穩適接臺灣同知吳元祺禀報聞得諸羅脅從之賊貪得錢文私將米糧賣給百姓而近縣庒民懼賊不敢眀助間有用袋裝米埋于空曠處所遺字與營中自行往取等語是諸羅百姓中多有曉義急公者柴大紀等固守支持或亦稍資接濟臣以賊情及民志揆之大兵一到鹿仔港後當必重圍立解所有貴州官兵現已據報頭起五百名于本月二十四日抵漳州府屬之詔安縣境臣復飛飭蚶江一帶務將預偹船隻妥為齊全以速配渡均奏入上命軍機大臣傳諭福康安常青海蘭察柴大紀普吉保李侍堯曰崇武澳至鹿仔港海道徑直不過半日可逹今福康安已得順風連帆穩渡二十九日定可前抵該處臺灣賊匪本係么麼烏合今見福康安統領如許徑將強兵聲威壯盛自必聞風膽落正可乘鋭長驅奮力進剿而普告保一路自亦倍加振作此時惟應先令普吉保星速帶兵直抵縣城而福康安即以大兵接踵遄征與柴大紀等併力剿捕以收搗穴擒渠之績更可不須預籌添調官兵矣現在南路賊匪雖已撤動但府城現存兵力既屬無多而府城倉庫衙署户口自較嘉義縣數倍尤不可委之而去自應令常青在彼駐劄委以守城之事至賊目莊大田既聞其有潜赴林爽文處併力攻擾縣城之語林爽文莊大田分路滋擾官兵剿捕未免稍需時日今若聚為一處正可趂大兵全力一鼓殱擒轉屬極好機㑹林爽文等于紏衆滋擾之時預為改裝逃竄之計可見天奪其魄已自知其破滅不逺為此等鬼蜮伎倆即日大兵雲集四路攻剿自當尅期就縳訪察真情斷不致漏網也嘉義縣附近莊民私將米糧賣與百姓埋藏空曠處所令兵民自行往取是該處百姓曉義急公甚屬可嘉而縣城得此米糧接濟更可一心固守果有此事否即查明奏聞至福康安與海蘭察得風穩渡諸凡吉祥如意特賜福康安海蘭察玉如意各一柄並各賞大小荷包以志慶慰鄂輝普爾普舒亮俱逺涉重洋勤勞出力著各賞大小荷包並共賞奶餅一匣另奶餅三匣著分賞隨同出力之渡洋官辨等用示奬勵欽定平定臺灣紀略卷四十四
