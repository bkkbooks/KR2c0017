  text: 欽定四庫全書欽定平定臺灣紀略卷三
  hash: sha256:9e673bb156b243a90ab0e235a66b578485816072341a7715b1dd0ed2167ce3f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_003-1a, image: WYG0363/WYG0363-0038c.png}
body:
  text: 正月十五日甲申常青奏言十二月二十七日接到署守偹陳邦光兩稟一稱林爽文等於十一月二十七夜搶劫大墩營盤遊擊耿世文等全軍俱陷二十九日即攻入彰化縣城知府孫景燧理畨同知長庚前署彰化縣事俸滿同知劉亨基署典史事鹿仔港巡檢馮啓宗北協中營都司王宗武及辨兵數十人俱被殺害復來犯鹿仔港并分擾淡水諸邑賊黨蔓延難以抵禦懇即興師救援一稱十八日有咳咍等莊賊匪謀犯鹿仔港陳邦光傳㑹泉粵義民預先埋伏隨令義民百餘誘賊至埋伏處所兩頭夾攻殺賊百餘名焚燬咳咍湳仔內灣二八水等處賊莊又約牛馬頭等莊義民於二十日辰刻由沙轆進攻水裡大肚茄投等賊巢并率義民襲後追逐至猫霧㨂賊匪退踞烏日莊緣該處有大溪阻隔不能飛渡各等情又於十二日午刻率同各義民從鹿仔港抵彰賊匪聞知隨出西門外施放鎗炮陳邦光令義民分為兩隊攻殺賊人退走當即擒獲執旗之僞副元帥楊振國僞協鎮高文麟僞先鋒陳高僞辦理水師軍務楊軒等四名殺死賊夥百餘名奪獲馬二匹炮位刀械八十餘件餘賊四散奔逃陳邦光入城查看有參革前任彰化縣知縣張貞生丁憂典史李爾和教諭王梁訓導陳琔被羈未釋并居民鋪户受困在內因彰城逼近賊巢民心驚惶各義民又無糧食可支難以駐劄隨護衛受困官親及居民男婦一同回至鹿仔港保守又將擒獲僞官楊振國等四名押回鹿仔港裝入檻車交丁憂典史李爾和受傷之北協外委許瑪分撥兵丁配船解送泉州聽候勘訊又續據陳邦光禀稱二十三日林爽文黨羽陳泮吳領等燒燬泉粵民莊隨率義民前往追捕殺死賊夥三十餘名拾獲紅旗器械四十餘件查陳泮吳領與林爽文同惡相濟均應一並𠞰滅以絶根株但南北投虎仔坑等處阻隔溪河必得三靣夾攻方能克勝今各義民俱肯奮力捕匪惟因利器無多且鹿仔港地方距虎仔坑尚有七八十里現在鼓舞衆義民同守鹿仔港彰城一靣出巡查捕等情查該署偹節次撲捕賊匪及義民等同心協力俱屬奮勇可嘉俟分别查明請㫖優奬據解逆犯四名臣現委員飛赴迎提即於泉州審明辦理再查漳匪作孽泉粵之人素與為仇到處俱有義民共相抵禦不獨現在足資保護即將來收拏匪犯亦可得力臣於淡水鹿港鹿耳俱已發有簡明告示派員分赴各處遍貼曉諭以勵衆志而固人心至水師提臣黃仕簡自金門收泊料羅續於二十八日又自料羅放洋計期兩三日內即可前抵鹿耳陸路提臣任承恩係由蚶江出口亦於二十八日放洋旋因風雨驟作寄泊臭塗澳外該處與鹿仔港相對一俟風定即可揚帆直達惟是賊情猖獗到處蔓延自澎湖至鹿耳門係屬臺郡咽喉尤宜厚集兵力臣前經續調督撫標兵一千名原令由南臺出口前往鹿耳以備策應苐恐海道紆回風汛難定適預備之延建兵一千名亦已分起前來因令督撫標兵仍駐省城防守將延建兵一千名派委延平協副將林天洛管帶由陸路兼程赴厦並派先經調來之汀州鎮總兵普吉保統率登舟又於水師提標五營內預備兵丁六百名派令興化協副將格綳額帶領亦從厦門配船飛渡均由鹿耳赴臺隨同水師提臣協力進𠞰至續派之福寧鎮及銅山羅源等營共兵一千名亦催令陸續繼進奏入上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽曰賊匪敢用鎗炮攻犯城池罪大惡極不特首惡之父兄妻子應行緣坐即如現在拏獲之楊振國等四犯俱曾受僞職並與官兵抗拒者亦應一例緣坐該犯等係漳州民人其家屬想仍在內地若此時遽行查辦恐漳民聞而生駭轉多未便著常青俟楊振國等四犯解到時訊明各要犯家屬下落密為存記俟黃仕簡等在臺搜捕賊匪事竣大兵撤回時按名查拏辦理自無虞其兔脫漏網至署守備陳邦光督率兵民殺退賊衆並擒獲賊目解送內地審辦尚屬奮勇可嘉著常青於事竣後查明給咨送部引見其義民鄉勇等亦著分别旌賞以示奬勵至賊匪滋擾鳯山時參將瑚圖里乘馬追賊轉被賊人乘虛朴入城內兵丁衝散瑚圖里由南而去不知下落是該參將之不能抵禦賊衆由於兵散與臨陳退縮者不同此時尚可不治以委城而去之罪若該參將能收集兵民再行出力殺賊則其功罪足相抵統俟常青於事竣後查明具奏到日再行核辦其知縣湯大奎雖未能堵賊守城但既經自刎究屬可憫亦應查明議恤至黃仕簡與任承恩因海洋風色不順難涉險輕進朕亦不責以遲延計此時各路大兵俱已早到黃仕簡等務宜督率兵辨分路㑹𠞰奮勇𠞰賊速奏蕆功上又命軍機大臣傳諭李侍堯曰謀逆首犯與各要犯家屬均當一律緣坐但該犯等俱係漳州民人其家屬想仍在內地著將常青奏到之摺并所降諭㫖抄録一分寄與李侍堯閲看以便該督到閩時遵辦其署守偹陳邦光如何出力及參將瑚圖里作何下落之處如李侍堯到彼常青未及查辦著該督查明分别具奏十八日丁亥孫士毅奏言聞臺匪紏衆滋事已將調撥辨兵等事料理停當兼程赴潮並密札該處鎮將等暗行訪查凡在漳泉等處游食民人有回潮形跡可疑者一靣盤詰一靣拘管無許輕易釋放奏入上命軍機大臣傳諭孫士毅曰現在臺灣𠞰捕賊匪即有粵東義民在彼幫同官兵出力殺賊者此時如有回潮民人正係不肯從賊及避亂回籍之人該督應令地方官收恤安撫何得轉令拘管不准釋放是毆良民轉令從賊更屬不成事體著傳㫖嚴行申飭該督係軍機司員出身曽經隨同出兵非若未經軍務者可比乃於事體輕重毫無定見適足為朕所輕矣孫士毅當於該處明白曉諭以此事辦理錯誤現奉諭㫖訓飭所有回潮民人仍俱各安生業毋許拘管俾該處民人安居樂業不致驚疑設遇有漳州臺匪餘黨竄匿粵省自應訪拏究辦臣等謹按督臣孫士毅因搜訪逸匪並令遇有回潮民人概行拘管止知緝捕為亟而不覺失於太過設臺灣被難之人聞信不敢回籍誠如聖諭良民或轉致從賊更復成何事體䝉皇上傳㫖嚴飭並明示以回潮之民正係不肯從賊其避難回籍者應令地方官收恤安撫聖慈寬大如覆載之無所不容粵莊義民等所由聞風感勵協同官兵𠞰捕始終不懈益徴德化之入人者深也二十日己丒常青奏言據臺地文武將賊目高文麟等管解到泉親提研訊緣高文麟楊軒素與逆首林爽文往來楊振國即楊咏係彰化縣差役陳高係與逆黨劉賢士認識逆犯林爽文住居彰化大里杙莊恃其山路險僻丁族衆多平日窩賊搶竊擾害居民並恐官府訪拏樹黨結㑹共相幫護凡入㑹者令其對天跪地立誓並不寫帖立簿只以舉指為號經彰化知縣俞峻訪聞差役楊咏往拘因林爽文先曾犯竊被獲即係楊咏得錢賣放該縣將楊咏責比收禁并訪知楊光勳案內逸犯張烈等五名亦逃避林爽文莊內該縣以各犯恃衆負固稟知鎮道帶兵搜拏林爽文乘莊衆驚懼遂起意拒官紏合同㑹莊衆殺害知縣副將遊擊兵役多人復思攻占縣城可與官兵抵禦即於沿路紏邀無賴匪徒三四千人於十一月二十九日攻破彰化林爽文即得縣城自稱盟主大元帥并搶奪店鋪綢布竪立旗號書寫順天字樣其現獲之楊咏林爽文念其從前賣放之情許為副元帥高文麟許為總爺楊軒委辦軍務各賊即分路往攻諸羅淡水留高文麟等帶同匪黨數百人保守彰化旋經鹿仔港守偹陳邦光並泉州義民林凑林文濬黃奠邦許伯達等募集鄉勇同往攻殺賊衆紛散將逆犯高文麟等四名擒獲押解來泉該犯等膽敢從賊肆擾攻戰城池領受僞職實屬罪大惡極不容一刻稽誅但案關大逆應請交刑部再行確審因解送省城交撫臣徐嗣曽遴委妥員管解並飭沿途倍加防護以保無虞其押犯來泉之典史李爾和外委許瑪情願仍回臺地協力𠞰賊將來視其功績另豫優叙義民林文濬協同押犯洵屬可嘉臣當即賞給花紅銀兩以示鼓勵並令回臺傳示各義民共加感奮又向該犯等詰問天地㑹起於何時在㑹共若千人據楊咏楊軒同供天地㑹是五十年十二月內有漳州平和縣人莊烟即嚴烟過臺來興起的聽得嚴烟說及起㑹的根源是廣東有姓洪的和尚呌洪二房同一姓朱的人起的洪二房和尚居住後溪鳯花亭不知是何府縣地方姓朱的年才十五六嵗不知呌什麼名字也不知住在那裡等語臣因該犯等既經嚴烟告知起㑹根由豈有未得詳細之理再四詰其鳳花亭實在何處朱姓實係何名堅稱不知查該犯等狡惡異常情詞閃爍四人本籍多在彰屬其中自難保無勾連串結情事但現在該處民情尚屬寧靜若一涉張皇轉恐驚疑四起惟有密飭該鎮道等悉心訪察加意嚴防俟臺匪蕩平以次查辦靣飛咨提臣即於臺地追究嚴烟下落再加確究至所稱廣東之和尚洪二房及朱姓等尤關緊要臣隨派心腹妥辨帶領咨文飛投廣東督撫二臣務期不動聲色密查辦理水師提臣黃仕簡於十二月二十九日已抵澎湖風信順利三十日即可由鹿耳門進口陸路提臣任承恩暨所領官兵俱於初四日在崇武澳得有順風一齊放洋奏入上命軍機大臣傳諭常青徐嗣曾曰常青辦理此事初時未免稍涉矜張嗣據該督等節次奏到調度進𠞰各事宜辦理漸有主見至所獲匪犯朕意本欲令其解京今該督於獲犯審明後即請解京審辦並鎮靜辦理各事宜皆與朕意適合不意常青竟能如此甚屬可嘉至嚴烟籍𨽻漳州不難即時擒獲並著常青於拏獲該犯後一併妥速解京前因該處善後事宜緊要恐常青究係初任因思李侍堯外任有年較為諳練是以降㫖調任令其前往辦理此時該督惟應督率辨兵於應行辦理之事悉行調度以期迅速蕆事朕必加恩嘉奬更不必以調任縈心稍存疑畏轉於𠞰捕無益現在黃仕簡任承恩自必已到臺灣厚集兵勢合力𠞰捕賊匪自無難立就殱滅一得捷音迅速馳奏上又命軍機大臣傳諭孫士毅曰臺灣逆匪倡立㑹名戕官占城實屬罪大惡極至所供起㑹根由係和尚洪二房並姓朱的俱是廣東人朱姓只十五六嵗何能紏衆匪徒興起㑹名輒敢有謀叛等事恐係洪二房依附朱姓名目從中煽誘又如從前朱一貴謀逆情事皆未可定不可不嚴行根究著孫士毅查明後溪鳯花亭究在何府州縣即將和尚洪二房並朱姓嚴密跴緝迅速查拏一經緝獲到案訊得確情即一併派委妥幹員役迅速解京歸案審辦並著飭令沿途地方一體小心押送毋得稍有疏虞同日汀州鎮總兵普吉保奏言前接撫臣來咨酌調汀州邵武官兵前赴汀州府屬之永定上杭二縣駐劄聽候進𠞰即於汀標三營派撥兵丁五百名自汀起行一面飛調邵武都司定柱帶兵三百名駐劄上杭臣已前抵永定彈壓督臣調臣赴泉密商機務隨即日起身途次復接督臣來文鳯山縣亦被賊匪攻陷望救孔急飛調臣統領建寧延平二處兵丁一千名水師提標兵六百名由厦門配船飛渡鹿耳門進𠞰臣於正月初三日到泉查延建官兵尚未到隨與督臣面商臺郡現在危急不可稍待臣即於初四日由泉星馳赴厦將水提標兵六百名先行配船飛渡其延建官兵飛催接續赴厦渡臺統領合𠞰奏入報聞二十一日庚寅上命軍機大臣傳諭李侍堯曰臺灣地方自康熙年間始𨽻版圖因逺隔海洋該處府㕔各縣俱未建立城垣後經朱一貴聚衆滋事平定後總督滿保曽議建城惟時以地處海外無城雖難於防守然失之易復之亦易是以未經建立以節煩費但該處久成郡縣與內地無異而城圍尚相沿用竹木編插不足以垂久遠且此次林爽文紏衆猝起縣城遂被砍破究由朿竹不能防禦所致朕意與其失之復取既煩我兵力又駭衆聽聞何如有城可守而勿失更為有偹無虞乎况方今國帑充盈該處郡城㕔縣不過五處即建立城垣動用不過百萬何惜而不為至建城時如該處可立窑座或用外磚內土之法如窑座不便該處遍地皆山即開綵石料以代磚工更為鞏固著李侍堯於臺匪蕩平之後詳細熟商歸入善後事宜案內一併妥議勘估繪圖具奏上又命軍機大臣傳諭劉峩長麟閔鶚元琅玕徐嗣曽曰高文麟等係臺匪案內領受僞職要犯必須解京嚴行究訊盡法懲治著沿途各督撫於該犯等到境時務須遴委妥員多派兵役小心防範迅速解京毋致中途稍有疏虞致干咎戾二十二日辛邜徐嗣曾奏言准督臣咨商將臣預調之延建兵一千名及督臣續調福寧各鎮營兵一千名俱令由陸赴厦徑進鹿耳門為提臣黃仕簡一路接應俱經陸續到厦總兵郝壯猷於十二月二十二日放洋副將徐鼎士等於十二月二十二日自南臺下船至閩安屢次放洋俱被風阻臣於初八日親赴督催該副將等已先於初七日放洋臣親至五虎門瞭望一帶洋面並無船隻停擱閩安等處地方緊要臣即順道將沿海各口岸逐一履看其汛兵單少之處先經臣於省標內派兵二百名前赴增駐以資截拏現在巡防甚為嚴密昨據興泉道萬鍾傑稟報差探賊分南北二路攻犯臺灣郡城適澎湖遊擊蔡攀龍領兵到臺自十八九至二十二連日打仗得勝二十五日夜賊自北來攻柴大紀督同護安平協林光玉等施放大炮賊俱退避等語兹提臣黃仕簡任承恩各路官兵先後抵臺烏合之衆自必立就撲滅特𠞰捕之時若逃入臺地內山官兵長圍攻逼搜拏不患不净惟海洋瞬息千里倘賊匪竄逸內渡或恐漏網現已飛咨水陸提臣及領兵鎮將一靣𠞰殺賊匪一靣即於沿海汊港搜拏賊船先行燒沉净盡預絶其逺揚之路而漳州一屬係賊匪原籍誠慮有勾串連結情事臣密札該道朱芫㑹知府黃彬不動聲色妥為防範復㑹同督臣出示曉諭以賊匪雖係漳人其在臺滋事與原籍親屬毫無干涉惟藏頓隱匿例應同罪將來賊匪潛逃回籍即捕獲首報并懸賞格剴切示諭至渡臺官兵配坐戰船之外需用商船皆係厚價催備應給兵糧亦皆動碾食穀惟漳泉一帶民食素資臺米今商販不繼恐致糧價稍昻現在設法招商運赴下游糶濟其過兵處所俱飭令大員妥為經理並無絲毫擾纍民間體訪輿情各俱安貼奏入上命軍機大臣傳諭李侍堯常青徐嗣曾曰地方偶有聚衆滋事之處總督既經前往巡撫自當在省靜鎮不應輕離㑹城以致人心疑駭昨孫士毅奏親赴潮州彈壓今徐嗣曽復有前往閩安之奏惟知出力急公而不權事體之輕重緩急朕並不嘉其不辭勞苦轉為朕所鄙矣此時各路官兵自早已分頭㑹𠞰賊匪無難立就殱滅惟竄匿賊黨恐有逃至內者當於各海口不動聲色嚴行防範截拏此則徐嗣曾應辦之事該撫務督飭所屬嚴行妥辦不可張皇疏忽如得有𠞰賊情形信息仍著由驛迅速具奏二十三日壬辰南澳鎮總兵陸廷柱奏言前准福建提臣黃仕簡札酌派南澳左營兵丁預偹調用隨即就每營飭挑偹戰兵丁各三百名預偹調遣應援嗣又准兩廣總督札將先派水師一千名帶領竟由陸路直抵厦門聽候閩浙總督調遣等因隨即􅊾調署澄海協就近扺澳彈壓地方并飛飭各官兵星夜兼程赴厦臣即於初六日戌時登舟渡海前往厦門聽候調遣奏入報聞二十四日癸巳孫士毅奏言途次接准閩省咨㑹令粵省派兵二三千名於本省交界處所駐劄預備徴調臣思水師一項若待徴調始行就道恐海洋風信靡常守候稽延是以擬將派定附近潮州之水師兵一千名先委將辨統領徑由閩省詔安縣陸路前抵厦門聽候閩浙督臣常青調遣此外水師五百名陸路一千五百名照依閩省來咨調集交界地方俟有徴調再行起程至碣石鎮標水師五百名南澳右營及澄海海門水師五百名分起接續前進署提臣彭承堯護惠潮道顧聲雷已於正月初八日先赴黃岡地方稽查彈壓臣即於正月初九日親赴閩粵交界處督率照料㸃送出境按照兵數每名令其裏帶一月口糧以備緩急應用其水師一千名應得出兵分例臣於藩庫內支項酌給統俟蕆事後照例核實報銷此外現在交界處等候之水路兵二千名尚未赴閩每日給以口糧其應得出兵分例暫緩給領再臣風聞有福建泉州興化及廣東潮州之在臺貿易客民聚衆數千人隨同官兵奮力拒賊彼此互有殺傷等因臣即乘機出示剴切曉諭潮民俾知感動仍暗加密訪如有潮屬民人在臺入夥從逆究出姓名即與叛逆奸匪一律從嚴辦理緣潮郡民人在臺貿易者頗多如此分别良歹明示懲勸庶幾將來知所趨向并俟兵事略蕆臣即咨㑹閩省督撫分晰查明移知粵省辦理再臣派撥南澳各營水師兵一千名先赴厦門聽候調遣署提臣彭承堯咨商請以南澳鎮總兵陸廷柱統領前往臣以南澳緊接臺灣地方緊要該鎮未便逺離是以飛調左翼鎮李化龍領兵仍令陸廷柱留營督率防範兹接據該鎮陸廷柱呈報先已禀知閩浙督臣自願赴臺𠞰賊復准署提臣彭承堯咨調領兵之文即於正月初六日馳赴厦門聽候等語是該鎮未接改委文行一聞調派星速起程尚屬勇往且該鎮曾任臺灣彼處情形熟悉軍營多一得力之人更為有益南澳營務現有署澄海協廖光宇前往代理臣與署提臣往來潮州黃岡澄海等處距南澳不遠足資彈壓奏入上命軍機大臣傳諭孫士毅常青李侍堯李世傑徐嗣曽琅玕曰閲孫士毅摺內接准閩省咨㑹原不過令其預偹何嘗有徴調之語乃該督不揆事理輕重率行派委將辨紛紛帶兵即赴厦門實屬非是辦一烏合匪犯遽行令廣東浙江江南等省紛紛徴調成何事體外省習氣非失之懈弛即過於矜張偶遇地方此等事件率奏請親往以見其急公勉力為站腳地步全不計事體之緩急輕重及騷動地方甚無謂也試思粵省巡撫現未回任該督又逺赴潮州海疆重地關係緊要茭塘沙灣附近省垣該督如此辦理張皇萬一有一二奸匪乘勢鼓動又將何以應之乎孫士毅接奉前㫖即星速回駐省城其所派水師一千名既已起身聽閩省督提調遣若事已定即令撤回其續派之兵俱著撤回本營總以鎮靜地方安戢人心為要臣等謹按奸民倡亂之初若地方大吏稍涉張皇百姓易生疑懼或恐别滋事端皇上諄諄告誡屢諭督撫提鎮等不動聲色處以鎮靜俾良善自安所由軍行之際閣境安堵無驚洵綏戢之至計也二十五日甲午常青奏言官兵出口屢被風阻收泊各澳兹據報黃仕簡於十二月二十八日放洋由鹿耳門前進任承恩於正月初四日放洋由鹿仔港前進其由閩安出口之總兵郝壯猷及副將徐鼎士等亦因風􅰆不順迄今並無抵淡水信息現在福寧延建各兵亦俱接踵繼進臣并令調來之汀州鎮總兵普吉保添帶水師兵六百名由厦門出口並准兩廣督臣孫士毅派撥粵兵一千名到厦協同進𠞰兵力已屬厚集計此時兩提臣亦自必到臺分路攻𠞰至臺郡情形接據探差禀報自十二月十八十九至二十等日賊人往犯郡城經柴大紀同澎湖遊擊蔡攀龍等帶兵打仗屢加殱戮城內聚集義民鄉勇協同抵敵義民並不受值鄉勇日給錢文人心甚固可保無虞其鹿仔港一路已據署守備陳邦光率同全粵義民殺退賊人協力固守又淡水新莊之艋舺一帶亦經署都司易連召募義民共相保護官兵到日義民響應自必倍加奮勇即可剪除净盡至內地各境俱皆寧謐其餘沿海口岸嚴飭文武員辨實力巡查已據漳浦縣羅澤坤禀報盤獲匪犯陳樵一名現在飭提確究再查漳化縣俞峻係上年十月甫經抵任實因緝拏賊匪致被戕害並無别項劣蹟奏入報聞欽定平定臺灣紀略卷三
