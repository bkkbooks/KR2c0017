塞道路官兵踴躍用命蟻附而上殺死賊匪百餘人賊始竄回柵内投石放鎗抵死抗拒普爾普率先領屯練兵丁攀倒木柵賊匪登時潰散各兵盡力追殺鎗斃賊目十餘人生擒賊目五人殺賊二百餘人将士官兵屢次奮勇攻堅實属可嘉使福康安前次即乗勝迅追餘黨豈能復聚為列柵固壘之計而逆首當早就擒官兵又何用如此陟險力攻是直領兵者自取勞苦而其咎亦無可辭也並行賞與飭期速奏功全上元鐙詞有序璇霄寳月燭先天圓體圍三綺席華鐙暎不夜元音隔八每以撫時抒咏例成排嵗為編溯開什於攝提逮昨年之協洽積叠經三十七次自丙寅始作鐙詞至昨嵗丁未凡三十七篇春色冝人迤邐為四六八章丙寅初唱八章後間有四章六章者自辛未以來每嵗例作八章嵗華紀麗大抵申祝慶占豐之念亦以通酉瀛北漠之情播為豳籥之音譜入象胥之譯多雖益善數恐不鮮兹者豐㮊迎年申堅肇吉環周六甲開首祚於嵗朝今嵗元旦甲子規滿一輪候圓靈扵元夜十五日望雪封犢背田間之嘉兆五行浪帖鯤身海表之軍聲三㨗人向光音天裏詩宜鈞樂奏中爰發在心之言因為屈指以計嵗紀尚三之二届堯典之倦勤大衍得萬有千合羲經之積數分章序卦繼歲連吟平廿一而鉢速響時仄四三而珠嵌字裏六十四卦中平聲二十一皆押為韻仄聲四十三則於詩中見本字難因見巧䴡不涉纎梁簡文之詠卦名偏非全舉宋嚴羽之臚詩體古未前聞竒畫今開乾至比而成嵗哉生始兆弦漸望以都圓或能符羲文周孔之全經惟仰頼天地祖宗之純佑易生生而大備律八八以相成維五十三年之春際三五初摛鐙詠羅六十四卦之目裁四六乃製弁言屈指倦勤餘八年鐙詞六十四應全每嵗八章是恰應成六十四章也每章擬以卦名什副望恩惟待昊乾上元每歲例西園同樂新疆及舊藩詎為去聲怡情賞烟月曰厪深意奠乾坤及時膏澤可教屯光武寜當學閉門弗藉舌人通譯語乾隆八年始習䝉古語二十五年平回部遂習回語四十一年平兩金川畧習畨語四十五年因班禅來謁兼習唐古忒語是以每嵗年班䝉古回部畨部等到京接見即以其語慰問無藉通譯元夕命新舊諸畨入同樂園随觀鐙火並燕笑聨情用示柔逺之意華鐙聨席共歡論元宵恰值望宵中上元本以正月十五得名而置望亦有在十六七者今嵗元宵恰值月望更副嘉名賞集東瀛西大䝉近年上元鄞錫晏觀鐙朝鮮使臣亦令與晏去嵗以該國有世子之事命該使臣扵元旦朝賀後起程回國今年仍令隨同新疆外藩入班與晏際此逺來及近悦敢誇化洽與功崇飛空星㸃逹斯湏火樹銀花燦萬株占得羲經卦之五雲天晏樂曰惟需千尋貫斗蛾輝䴡八照流虹鶴燄丹恐涉矜張深自訟勝分敬怠慎其端臺灣耆定逮班師休養羣黎命妥為臺灣自逆匪滋事以来良民逃避失業深堪憫惻去嵗已莭次降㫖将五十二三年臺灣全郡並嘉義縣五十四年地丁錢粮概予豁免今逆犯林爽文父母家屬俱已拏獲該犯亦窮蹙竄入埔裡社埔尾一帶番社等協同圍截擒拏不難尅期蕆事而被難羣黎正當加意體養一靣命地方大吏妥為安輯以副軫念今夕春臺賞烟火那能南望免遐思流雲㸃綴幻晴晦時有飛花落碧空建國親侯比去聲之吉順時行慶月惟中上元後一日疊去嵗小晏廷臣詩韻保障由來勝繭絲任人憤事愧難怡臺灣地土豐饒福建漳泉廣東惠潮等郡民人錯處其間各分黨與往往以私怨小忿聚衆吏械鬪官斯土者祇顧肥其私槖不以職守為念封疆大遇有陞調缺出更或用其私人每致貪婪無藝醸成事端甚至起立㑹名潛相煽誘而地方官又復習為欺飾顢頇了事以至有林爽文戕官肆逆之事此皆地方官平日不能為保障而為繭絲所致任用不得其人竊用自愧㨗音切盼達軍報翼莭那能快賦詩咨爾簮纓委珮者體予焦旰憤宵時今朝小晏權教罷意弗紓兼慚執規洗巢執屬連稱勝自福康安海蘭察率領巴圖魯等渡海以後旬日之間諸羅圍觧旋即攻克賊巢拏獲林爽文父母家属所向克㨗頗快人意惟是内山遁首囚福康安於𠞰洗大里杙以後未即乗勝追捕以致逆匪潰而復聚連次扵集集埔小半天山列柵抗拒雖官兵亦即奮勇攻克而逆首遁入埔裏社埔尾一帶日内尚未得生擒㨗音為之焦急未可網三施博愛竟當芥一浄遺憂安民和衆詳畫䇿徳道禮齊多恧羞七字兩章詎容闕拈毫聊付壁間㽞節後萬夀山名山逰節後佳景攬春初雖未芳菲若已看誾藹如蕪茵依緑染栁緑向黄舒憂樂無定處仍斯盼㨗書自上元前一日福康安奏於上年十二月十八日攻克小半天山後逆首林爽文逃往埔裏社埔尾一帶生畨頭目等現在協力擒拏諒無漏網之理但距今旬餘尚未逓到㨗書為之盼切耳福康安摺奏生擒逆首林爽文信至詩以誌事大里灰摧破巢穴頻繁馳諭戒逍遥福康安扵上年十一月二十五日攻破大里杙賊巢後止云畨社等協力緝拏未曾奏及速即帶兵乗勝追捕誠恐事機少緩生畨等不知畏懾未必肯上𦂳恊拏是以頻降諭㫖深以遲緩為戒撫降緝衆日無暇執訊招畨井有條兹得生擒林爽文㨗音奏至據另摺奏稱該處民人投出者絡繹不絶皆妥為撫輯又於所執賊目追究逆首去路及招出各社生畨嚴切曉諭令其協同堵截擒獻又令巴圖魯二十員屯練兵丁數百名改装易服扮作民人同淡水義民及社丁通事等分投捜緝遂於正月初四日在老衢﨑地方将林爽文並賊目何有志等一同擒獲現在捜查餘孽不遺所辦俱井井有條可謂弗辜簡用者矣究得生擒盡美善不教餘孽伏根苖移師南指如破竹又據奏俟将北路捜查浄盡令各兵少為休息即統率大兵肅清南路擒拏賊目莊大由等語賊首就擒先聲奪氣自當勢如破竹想續奏㨗音亦祇在早晚間耳待㨗音惟暮與朝仲春朔日重華宫茶晏廷臣及内廷翰林等以平定臺灣聫句並成四律將謂東廂聨句抛福康安等扵上年十一月初一日抵鹿仔港旬日内收復諸羅旋即攻破賊巢林爽文逃入内山意謂不日即可生擒爰擬於新正九日重華宫茶晏廷臣即以平定臺灣聨句乃遲至十六十九等日未得㨗音適以奏社祭經筵諸典還宫今日未刻恰扵重華宫得軍營㨗仍即於東廂命諸臣入晏依例賞賚㨗聞獲孽浄三苞正逢嵗以二月朔符合師之六五爻仍此接茵試清茗無湏列几置豐肴泰中恒凛不驕意損滿益謙兩語包臺郡弹丸稱要地外通海國内閩疆康熈始用廟謨定雍正繼稽吏治詳然以流民多雜處遂教奸匪叛無常臺灣流寓本多福建漳泉廣東恵潮無業之民各分黨翼械鬪成風以至糾衆不法如往時朱一貴呉福生及近年黄教林耀楊光勲之徒不時竊發然朱一貴而外未若此畨林爽文就擒直待經年之乆也即予五十年中屢未若斯畨賊燄狂天地改云添弟㑹外官可恨善為欺渡洋涉險不知懼牟利忘公總計私向例臺灣道府㕔縣缺出本應督撫慎揀才守兼優之人調往然逺涉重洋人情多懼近乃㢘知不肖之員貪其地土豐饒不以涉險為虞轉以得調為幸而督撫亦不問其才具若何率多用其私人比輩莅任後利慾熏心遂置地方公事於不問更或聼㫁徇私侵婪任意小民無可告訴每致私相搆怨聚衆忿争地方官又復化大為小将就了事甚至奸民倡立㑹名醸成巨業滋事戕官實有由來富勤渾雅徳之抵罪以此及至事張難掩飾徒稱兵少竊嗟咨地方遇有奸匪嘯聚文武各員果能乗其勢熖未張急為擒拏不難立時撲滅乃始則心存諱飾及事不可掩又復諉於兵少不能𠞰除以致賊勢蔓延良民遭其荼毒斧柯之尋深為可恨然自古以来致乗除易姓者率出於此而其君不知是可畏也致兹抑是誰之過吾過吾惟自訟之界進生畨本異倫窮踪厯險備嘗辛自林爽文竄入生畨界内福康安海蘭察等分路窮追所向克㨗賊匪所剰黨羽漸次殱戮殆盡及聞林爽文逃竄打寮一帶於山溝樹林内藏匿福康安令官兵由後壠至中港又自竹塹至桃仔園窮踪厯險嚴宻堵截使賊匪等不致漏網稽誅可謂備嘗辛苦矣埋根踴躍資羣力執首綢繆頼一人此次所派巴圖魯侍衛等及屯練黔楚官兵等無不踴躍争先奮勇出力實属可嘉之至至福康安慮逆首驚懼自戕不能生致因派巴圖魯侍衛二十人及屯練兵丁數百人改装易服同淡水義民及社丁通事等分投捜緝遂於正月初四日在老衢﨑地方将林爽文並賊目何有志等先後擒獲是其預事綢繆辦理更為周至浄北已知無後慮𠞰南應易洗前塵福康安等奏俟将北路捜查浄盡即統率大兵向南路擒拏莊大田想渠魁既已就擒餘匪亦當䘮膽肅清南路更當勢如破竹統計福康安渡海以後自鹿仔港官兵觧諸羅圍打通斗六門道路磯大里杙賊巢攻克集集埔拏獲林爽文父母家屬又攻克小半天山並此次生擒林爽文未及三月可謂神速矣七聞鴻㨗叨天祐自二十二年後平凖夷定回部收大小金川焚王倫殱蘇四十三梟田五並此次俘林爽文三十二年之中凡七聞㨗報俱仰荷成畏上蒼眷佑屢蕆膚功今予年近八旬經事既多遂事與億兆同我太平惟兾此後更無用兵之事益當感激鴻慈日深兢惕耳感激惟深勵惕寅平定臺灣聨句有序海不掦波奏凱入東風之律春宜湑露銘勲聨左个之吟厪籌三㨗之軍書撮紀一編之方略則有瀛壖外郡閩嶠南區水帶澎湖山環畨社濤雖甚壮門穿鹿耳之雙沙縦能飛嶼剗鯤身之七古未登於圖牒境嘗限以要荒自明季之多虞初勝白羽漸海邦之越禁中據紅毛逮鄭氏豺虎一方傳克塽貙羆三世天寛地小始雖示以招徠颶息颱消終究歸於寧謐欽惟仁祖平以廟謨開一千里郡縣之封經百五年涵養之澤蔗霜稻雨地富畬耕線路沙更人私舶渡莠稂或雜芽蘖其間分漳泉鬪蠻觸之軍指天地刑犬雞之㑹屬畺吏有乖於撫馭遂奸徒益嘯其譸張初啟嚢封即為燭照並班水陸連雞早䇿其退飛相望北南拏馬果貽扵中敗先遴能事往易制軍命舊督以臨疆俾壹權而守土王鈇以律必嚴僨帥之誅晋版不沉益鼓義民之氣獨任同心之弼兼叅常勝之英百将掄雄萬人足敵逆能轉順義本取於恵安速乃因遲吉適符乎崇武澳名在恵安縣境一日一夜而遄飛鷁首十盪十決而旋觧蟻封梟晝暗而竹焚馬宵凌而溪渡斗欹門壊杙㫁里殘竭虎尾之上流杵真投臼遮獅頭之窮境網已周阹涸鮒空㳺水裏社逃埔裏社竄猿無路大半天連小半天合父母妻一家之逆屬全俘舉生熟野諸畨而軍威知懾越海喜傳露布擒渠果致檻車欣臻成事之全益顯投機之順維二月初吉佳莭適届乎中和先去聲三日之齋昊貺式昭扵右社是役也發粟米鏐泉以餉徵川湘黔越之師民不知兵價翻減市蠲賦三年之外酬勲五等之加堅城剏百雉之墉大吏巡雙熊之軾殊民宅里察吏蠧良始完洗甲之功乃入歌鐃之曲迴憶天山二部雪嶺兩金昔皆耆定以鴻成今豈示誇扵烏合然而八旬紆䇿五夜決㡬軒皇教戰而霧不迷光武發兵而鬚為白信賞必罰是為馭將之方衆志一心彌騐入人者厚禁中頗牧八旗之子弟多材澳外風潮萬靈之神祇胥佑兵糧所過嵗未失豐縣里更名事超聞喜師行而已籌善後警聞而預度㡬先米聚滄溟籥週春臘皆宜臚茲鈐䇿被以宫商用授簡分第頌之茶佇返旌勞飲至之酒爾諸臣箴恬熈而奉上毋啻侈韓愈淮蔡之文予一人篤敬戒以恵南豈徒效周宣江漢之雅也哉御製不意妖氛煽海壖擒兇蕆事逮經年臺灣逆匪林爽文滋事據常青以前嵗臘月二十八日奏到俟福康安於今年正月初四日已将林爽文擒獲么䯢小醜自初𠞰以至蕆事盖已經年矣漸仁摩義慚惟我發慮出謀幾在先平定臺灣一事誤事皇上預料黄仕簡任承恩必致適李侍堯以湖廣總督於上年正月初十日入覲即渡臺命其前往總督閩浙辦理軍儲而命常青飛灣專司𠞰捕八月間復大振命福康安為将軍調李勁旅前往經理軍聲勢如破竹賊衆潰散林爽文旋即就擒自始事以迄蕆功無不由功迅睿謨黙運決䇿㡬先故能底定海氛成奏襟帶南溟廼閩省依毗外郡曰臺員臺灣在東南大海中距福州府省城一千餘里與漳泉二府相直明閆嬰東畨記訛稱臺灣為臺員盖南音也肇開荆棘㓂伏莽臺灣自古不𨽻版圖記載無考明嘉靖間流㓂林道乾掠近海地為都督俞大猷所敗追至澎湖道乾遁入臺灣旋即棄去至占城是為臺灣伏莽之始臣阿桂旋據荷蘭水跕鳶臺灣為海中畨島自林道乾遁後海㓂顔思齊於明神宗時復據有其地鄭芝龍附之恩齊剽掠海上倚為巢窟乃有中國民人寄居之其後荷蘭夷人取其地因築赤嵌城即今之安平鎮也䜟應雞鳴雖島竊王士禎池北偶談載明崇禎庚辰嵗閔僧貫一掘地得古甎刻古𨽻四行其文曰草雞夜鳴長耳大尾云云末曰庚小熙皥太和千紀凡四十字識者謂雞酉字也加草頭長耳大尾鄭字也以為應鄭芝龍及子成功竊據及本朝提督施琅克取臺灣鄭克塽乞降之䜟盖自明季至我家清朝康熈二十二年海氛一朝盪滌此固國寜悠乆之福而天數已預定扵古䜟矣武成犀射竟波平為本朝順治十八年鄭成功内犯江寜我師大敗而歸又經王師破其厦門舊巢遂退逐荷蘭據有臺灣設郡縣康熈二十一年總督姚啟聖謀取之明年靖海将軍施琅攻克澎湖鄭克塽降臺灣蕩平百年有五天瞻斗康熈癸巳初平臺灣至上年丁未厯百五年沐盛朝生息教養之恩共深愛戴臣嵇璜一府𨽻三星列躔臺灣克取之後康熈二十三年廷議開設府一日臺灣領縣三曰臺灣鳯山諸羅至雍正元年因諸羅距淡水㕔道里遼澗乃復分諸羅縣北半線社地方增設彰化縣治土沃産豐饒粟蔗臺灣以海土肥沃生殖滋豐種植稻糓並栽畨薯甘蔗等物不事耘耡坐享大有不但本地足食并可資贍内地壓蔗汁為糖嵗產二三十萬商船購售各省兼旁資日本吕宋諸國人龎奸雜長蚔蝝自鄭氏挈内地數萬人外徙迨後閩之彰泉粤之潮恵相携寄居無藉逰民往往偷渡私墾近畨隙地地方官又置之界外不能設法稽察以致習扵械闘遂開弄兵之漸倡邪張魯訛添弟邪教設㑹結盟最為地方之害前年臺灣楊光勲等滋事所立㑹名即係現今查出之天地㑹起扵乾隆三十二年以大指為天小指為地凡入其教者用三指按心為號乃彼時地方官改作添弟二字化大為小規避處分以致養癰貽患一經臣和聖明指出真洞燭隐微矣珅投溺盧循妄得仙琯動葭灰竿始揭林爽文倡㑹聚衆自外生成扵前年十一月二十七日嘯聚起事臘霑麥雪牘來傳是何蠢爾竟敢爾臣王杰御製即以未然知必然提督黄仕簡聞匪犯滋事即帶兵渡海任承恩亦自請帶兵進𠞰朕閲其奏報情形殊覺張皇盖由黄仕簡病後精神昏瞀任承恩少不更事早決其不能妥協辦理刻期蕆事仕簡黄病昏已上聲弗奏承恩任觀望彼遲前黄仕簡任承恩渡海之後莭次據奏分兵堵禦並不埋根首進及常青至彼始知黄仕簡果以老病昏憒一籌莫展又不自行陳奏候予調度而任承恩株守鹿仔港一南一北互相觀望遂致坐失事機府城遂梗南北路鳯山於二月内收復之後總兵郝壯猷尋又愜怯敗歸黄仕簡在南路安坐不救任承恩又不能整頓兵力自北而南扵是賊匪肆出南北道梗賊勢翻搘左右甄賊首林爽文等聞官軍頓兵不進復團聚斗六門謀犯諸羅而賊匪莊大田等復滋擾鳯山一帶窺伺府城五六十里間蜂屯蟻聚官兵反為牽制諸將懈心權忌貳軍營将弁因黄仕簡任承恩互相觀望無所稟承亦遂懈弛不能上𦂳追捕多兵分背氣難聨征𠞰臺灣兵丁一萬三四千名經黄仕簡等分統零星派撥不相㑹合乃以兵單固守為辭坐失事機諸臣僨轅之咎實無可逭軍樞屢諭洞觀火上深鍳諸将事權不一恇怯摧諉屢頒誡諭以觀後効逺隔重洋之外洞若觀火墉臣劉師律一新甚改絃黄仕簡任承恩莭次奉㫖督飭乃始終坐守遷延不能奮勉因罪以命将二人革職拏問觧京治伸軍律誠負重恩老且􅉵猶矜先志世仍延黄仕簡任承恩獲罪重辟實所應得乃皇上猶念黄仕簡力疾渡洋其按兵株守實由老病昏憒至任承恩之父任舉前在金川陣亡伊兄任承緒亦因救火傷斃父子皆歿扵王事承恩又尚無子嗣是以俱従寛不予勾決能臣瀕厦旌麾駐李侍堯既奉劄籌命督閩即馳赴厦門駐辦兵餉臣綽克托舊督臨疆莭制専常青既交督篆即渡洋至臺灣郡城督率将士分路進𠞰錫舍賞因占面革賊目荘錫舍帶領二千餘人悔罪投誠殺賊自効因司職賞給守備職銜嗣後屢次随征受傷晉擢都銜以示奨勵壯猷誅盍誓軀捐官兵既復鳯山總兵郝壮猷領兵守衛自當効命捐軀乃以賊多兵潰敗回郡城怯懦已極因即勇知命扵軍前正法並申諭緑營将士俾有方臨障奮往係累匪目危城復臣董誥保障羣心士氣全常青抵臺灣後意欲先清南路再往北路㑹𠞰乃賊計狡黠佯為窺伺府城實則倂力攻逼諸羅圍城至半載之久兵民一心悉力守禦城頼以全立礟四門雷隐隐堯復諸羅時即相度形勢分兵劄營扵縣城四門外要害之處安營設立礟位賊衆叠次攻犯俱為官兵擊敗決溪一道浪濺濺時賊将八奨溪用土石壅塞激水泛溢以阻援兵來路官兵挖通填溪之土放水順流殺賊無算攻嚴力擬慿蹄躈賊用大木車中装鎗礟挽以四牛分路衝突俱為官兵設法抵禦臣徳保御製戰鋭民皆具粥饘諸羅被圍日久兵食漸乏城内外紳耆舖民挑送飯米涼水供給軍士又牌腹村義民亦運粮接濟其急公踴躍甚屬可嘉屢經降㫖褒賞拜井欲同耿恭矣呼庚何異叔儀焉諸羅久困數月軍粮日形匱缺而魏大斌等所運火藥銀粮又復彼賊攔截不能前進城中軍民忍饑堵殺矢死固守較之昔人拜并呼庚更為迫切兩軍屢勅為速救諸羅待援甚急恒瑞普吉保二人以鹽水港笨港地方𦂳要且虞後路無繼不可輕離為辭因再四剴切馳諭令其速統大兵往救接濟粮餉鉛藥以觧圍城之急乙覧來章動軫憐諸羅被圍久捍衛上諭柴大紀酌量情形難支不妨整隊而出義民毋致為賊戕害不必執城存與存城亡與亡之義柴大紀覆奏以城内數萬生靈不忍委賊毒手立志堅守忍待救援上披章為之堕淚即降勵忠㫖封為義勇伯前以示軫䘏之恩後以藎之氣大聖人大公至正因時因事不俟權衡而無不悉協魏大斌援圍未觧先是魏大斌帶兵援應諸羅在鹿仔草被賊攔截其後雖沿路𠞰殺得以前抵縣城而一切粮餉火藥未能同時運到路途仍復梗阻魏大斌庸懦無能轉為諸羅増添食口因即與罷斥㽞扵軍營効力贖罪蔡攀龍㨗信俄遷魏大斌既不能攻克諸羅之賊常青又令蔡攀龍帶兵往救前據李侍堯奏稱蔡攀龍等分隊進𠞰直抵縣城復自賊中殺出府城至諸羅道路已通等語孰意竟属訛傳盖海上風聞來能得實也地𤓰且啖饑腸奮諸羅城中乏食兵民皆以地𤓰花生蕉根野菜油籸充饑猶能忍餓殺賊意氣彌奮臣福長安䓶竹終完望眼穿臺灣郡縣向無城垣皆以宻編䓶竹為之而諸羅終能固守御製詩有望眼已穿待援來之句大義夙明褒爾衆深恩已久入人堅獲嘉聞喜縣名誌民員上以諸羅義弁官兵激發忠義同心固守實堪嘉奨臣彭特㫖改縣名嘉義以示風勵元瑞通徳旌賢里額懸接濟上以廣東及泉州義民随同官兵殺賊軍粮深知大義賜廣東義民額曰褒忠泉州義民額曰旌義各頒額懸其里門但觧貪財售賊米據李侍堯奏諸羅雖尚梗阻各荘民人貪利乗夜運米入城糶賣其賊營脅從之人亦有私将粮食賣給百姓之事可知賊匪多由迫脅並非出於本願也預加施恵免民錢耕種上念該處民人被賊擾累不能及時生計維艱莭次加恩不特本年應徴錢粮免其輸納並将來年錢粮亦概予蠲除令将軍總督等徧貼謄黄務使家喻户曉濟師請使遥情爥臣喀寜阿籌将知人睿慮淵常青奏請添兵並請派大員督辦軍需之意上鍳知其自恐不勝任欲另簡大員督師因令其念福康安久嫻軍旅堪當此任即降将軍㫖馳赴行在親授方畧命為前往督辦召募渙其羣授䇿壤毗上以粤東與福建境連水土相宜降㫖令李侍堯孫士毅扵漳泉潮州等處廣為召募既可就近聼撥而附近㳺手無藉之人得以充伍食粮不至被煽為匪最為要䇿脅從赦勿治騰箋逆匪糾衆肆擾本属罪不容誅苐其中被脅民人原非本願駢誅上念其踐土食毛均為國家赤子不忍悉予申諭脅從罔治以安反側戎行起粤黔湖蜀先是常青以賊勢猖獗必須厚集兵力莭次奏請福康安亦以為言因南兵命先後揀調四川屯練二千廣西兵三千湖二千貴州兵二千陸續分起前赴軍營協𠞰臣胡季堂御製儲糈浮江漢海川臺灣向來産米最多内地資其接濟近因賊匪滋事轉藉内地運送軍粮因念閩省米必昻貴降㫖令江南浙江四川江西湖廣先後運米百餘萬石俾民食充盈市價平减熟計事難庸旅了改圖功俾重臣肩百巴圖魯馳驍將朕既命福康安海蘭察迅赴軍營仍帶同巴圖魯百餘人前往萬林爽文空鶻拳古稱勇士一以當百今巴圖魯皆係選鋒勁旅久經行陣又得奮勇帶兵之人是巴圖魯百人即可敵林爽文萬人而有餘矣矧彼鴟張烏合伍逞於蚓穴螘封邊偽官䕶駕猴新沐義民王守等擒獲賊黨廖東捜出黄旗一面上書獲駕大将軍偽職字様臣金簡廢弁都司蜴善縁賊黨彭喜曽任澎湖守備署都司以軍政黜革素與賊匪林小文相識遂糾約入黨扵淡水之白湖抗拒官兵為副将徐鼎士所執坐即索錢原慣蠧彰化縣蠧役劉士賢因事革退受偽職為海防同知遂坐據官署横索諸富户錢物尋為義民等緝獻跛惟運米亦憐蚿匪夥王坑郎跛一足賊目荘大田以其不能履陣且曽為鳯山縣徵粮胥役乃令専司運米幻談測字口召禍有達清水者素以測字為庄賊䧟鳯山時遂從賊為偽軍師及俘獲觧至叠加訊鞫祇自承為賊測字云臣阿掦阿詭託畫符女起祅畨婦金娘向習畫符治病林爽文糾之入黨偽封為女軍師一品夫人詭稱能以符呪召役神鬼助戰不受鎗礟每扵賊中鳴鼓持劍口念呪語以誑賊衆旗子虚分二百桿據金娘供稱荘大田黨夥共有萬餘人分設旗二百餘桿畨銀箕歛一千圓王坑郎嘗為賊目荘大田歛畨銀一千圓以資其用蟲沙立化辜咸伏自偽将軍廖東以下各賊匪先後俘送至京咸置之法臣李綬魁首陣羈法置駢賊目頼樹受偽職為順天北路大将軍拒官兵扵淡水之新荘擒獲扵陣與彭喜等俱檻送至京伏誅巨斾啓行金氣肅福康安召至魯侍行在具授方略即由京師率巴圖衛章京等啟行時在八月之初長纓破浪汐程便祥符崇武鷁中艤福康安配渡放洋後復又在崇武澳守風澳名崇武適符破賊吉兆臣恵齡御製賜予平安螺右旋福康安逺涉重洋為國宣力特将内府所藏右旋白螺賜令携帶前往俾吉祥安稳用資利涉秋發冬臻曉並夜舟登風候海連天視如遲乃欣成速福康安於八月初旬自京起程九月内由厦門登舟開駕旋於大擔門守風比至開行又因風阻未能徑渡收泊崇武澳至十月底始由崇武澳放洋一晝夜即抵鹿仔港雖守候稍遲而放洋後平安迅速詢之船戸僉云向來所未有止本齊還到匪偏前經派調四川屯練及廣西貴州湖南等省兵陸續前往福康安在舟守風旬日四川廣西之兵已先後齊抵厦門即随福康安同時渡海其貴州湖南之兵亦接踵而至是福康安候風待渡正可俟官兵齊集即此足為成功預兆云表楔天妃靈肹蠁此次往臺灣官兵及粮餉火藥均由海道配渡仰頼天妃助順靈貺聿昭特䝉縣及御書聮額二分扵卦天妃本籍興化厦門海口廟宇懸以荅神佑登壇大將壁新鮮福康安扵十一月初一日抵鹿仔港即将舊駐營盤擇地遷剳號令嚴肅軍中壁壘頓為改觀用材職吏與鄉舉諸羅縣舉人郭廷機彰化縣舉人曽大源職員楊振文監生林文㑹等因避賊至厦門素為臺灣民人所信其家中荘佃甚多可以設法遣人離間賊黨福康安扵抵厦門時即傳見郭廷機等優加奬賞帶往軍營諭令妥宻辦理功成後許以請叙㫖優加録臣謝墉利器厚刀偕火鉛福康安扵候風時将應用一切軍噐妥為製偹復多製火弹及厚背利刃斫刀以資攻燬賊寮之用八卦山初及鋒試廿人哨早已旗搴八卦山在彰化縣城之西地勢較髙距大里杙三十餘里為前往賊巢必經之地福康安到被預籌進兵道路先令海蘭察帶領巴圖魯侍衛章京等二十餘人至八卦山一帶詳悉跴探徑至賊卡迎殺賊匪四散奔逃海蘭察率領巴圖魯等鎗箭齊發斃賊數名生擒賊一名餘賊潰逸又經預派土守偹色穆里雍中等帶領屯練降畨在竹圜埋伏遇有賊匪執械下山當經屯練等擒獲割取首級是日賊匪見官兵甫到即能以少擊衆屢有斬獲無不聞風震懼即此已有摧祜拉朽之勢矣化龍守壘遮防宻福康安自鹿仔港進兵即派總兵李化龍在彼駐守嚴防後路俾無後顧之慮臣逹椿舒亮尋巢聲勢牽先是徐鼎士擬由北淡水大甲溪一路夾攻大里杙福康安到鹿仔港即派舒亮帶兵往㑹徐鼎士聲言直攻賊人巢穴以牽綴賊勢大兵乗鋭直抵諸羅所向克㨗五隊埋根龍豹合大兵援應諸羅分為五隊福康安與海蘭察鄂輝普爾普穆克登阿普吉保額爾登保及巴圖魯侍衛章京等分隊帶領互相應援将義民分為兩翼跴探道路村荘遇有賊人抄出即分投截殺部署甚為周宻兩莊掎角鸛鵝翩十一月初六日黎明進兵福康安海蘭察帶領巴圖魯侍衛章京等衝入賊中賊匪退入竹林復扵崙仔尾等庄糾集數百人或千餘人蜂擁前來抗拒從中横截官兵福康安已預為布置令鄂輝穆克登阿帶領屯練降畨扼住右首東庄溪橋普爾普春寜等帶兵堵截左首各庄賊衆力戰良久遂将道路立時開通雙溪口三塊厝惟荒土臣伊齡阿㳺厝灰磘少剰椽福康安一面啇令海蘭察酌帶巴圖魯侍衛章京等及奮勇官兵長驅先進直抵縣城一靣将沿途賊荘盡行攻𠞰遂攻克雙溪三塊等處數十賊荘并将房屋寮􅕆燒燬浄盡危境頓安歡以迓褒言纔聴感而漣海蘭察等沿途奮勇殺賊所向披靡進至牛椆山賊匪阻溪自固官兵直越溪河衝過賊陣搶上山梁攻克竹栅賊匪紛紛逃竄即於十一月初八日酉刻至諸羅縣城福康安所帶官兵連夜前進復連克賊荘痛殺賊衆城中義民踴躍出迎歡聲振地福康安帶兵入城撫慰将守城義民等優加奨賞撫輯良民各安生業數月之圍一朝而觧官民等無不共慶更生此時始得聞莭次褒嘉下諭㫖感激或至泣西沿洋盡經收盪諸羅賊匪人數衆多從山麓以至海濵大半佔據諸羅圍觧時官兵奮勇截殺自縣城迤西至瀕海村荘全已收復賊衆掃蕩無遺臣阿彌逹御製北入山應㨗翦䖍諸羅圍觧後餘賊多在迤北近山一帶潜匿經福康安海蘭察等分兵捜捕跟蹤殱戮斃賊無算遂将興化店至員林等處賊荘悉數攻克斫柴焚寮迅頃刻駭麕伏雉看駢闐諸羅至斗六門一帶中有大排竹等路荘係賊匪屯聚之地賊人扵各處要搭盖革寮安設柵柴抵死抗拒經大兵分路追𠞰将賊人柴寮全行焚燬賊衆四㪚奔逸後路為之廓清門開斗六逼大里斗六門為賊人久據之地十二月二十日福康安海蘭察等帶兵分隊進𠞰将中林大埔林大埔尾等荘同時攻破追殺二十餘里遂由菴古坑直至斗六門賊匪聚集甚多悉力抵禦官兵四面進攻斫倒竹圍痛加殱殺賊衆紛紛逃竄當将斗六門收復即日整兵為進搗大里杙賊巢之計街越螺雙搤水連斗六門收復後各處村庄畨社震懾軍威投出者甚衆並願随同𠞰賊經福康安派員帶領前往將西螺街東螺街捜捕餘匪浄盡賊首林爽文自諸羅敗竄福康安等即由水沙連至大里杙一帶山路跟蹤追捕逆眷躪牛塵亂轍官兵自水沙連過大溪見沙上車轍縱横知係賊人搬眷入山之路窮追見賊數千䕶車行走官兵痛加𠞰戮車牛中礟驚逸自相踐踏死者不可勝計叛徒躍馬落驚弦賊目蔣挺在山梁上騎馬執旗指揮放鎗據險海蘭察直前馳射中其髀獲之沿途倐浄平臺近官兵向大里杙進發沿途𠞰虎仔溪萬丹荘南投北投等處十一月二十四日至平臺荘距賊巢五里臣阿肅徑渡何虞帶水潺大里杙南溪河水勢甚深将軍䇿馬直渡兵弁等俱争先渉水奮勇攪殺竹柵土城猶紙耳賊巢倚山繞河築土城内設竹柵二重其外溝磡層叠為守禦之計官兵初到賊於城上放礟乗我兵尚未到齊擁出萬餘捨命前撲巴圖魯等鎗箭交發屢敗不退往返五六次短兵相接剪戮賊匪甚衆昬鏖旦剗乃殱旃自二十四日申刻輙夜力戰矢無虚發殱賊無筭官兵傷者僅數人至二十五日夘刻官兵與賊一面接仗将軍率巴圖魯侍衛章京扵西北兩門分路進攻一擁而入将大里杙全荘洗蕩林爽文以夜拒官兵時潜携逆孥宵遁擒偽職劉懐清何從龍林茂等獲礟百六十餘鎗二百五十餘粮六千石牛八百頭溪横濁水夷千壘逆首林爽文自大里杙竄後由畨社逃竄集集埔大坪頂一帶往來水沙連内之水裏社等處而集集埔為入山要路林爽文預為退守地步臨溪設卡據險死守福康安扵十二月初五日至其地形勢斜狭南北兩山中横大溪一道即虎尾東螺兩溪上㳺地名濁水溪賊阻溪自固在斗磡上壘石墻塞路即派普爾普等由山路進攻福康安海蘭察帶巴圖魯等分路至溪邊賊萬餘蔽墻發火噐官兵排鎗前進兼用大礟轟擊相持良久海蘭察等乗馬浮過官兵奮勇泅渡鎗箭齊發斃賊甚多官兵屯練攀援而上直摧賊壘賊潰追殺十餘里将集集埔賊營𠞰浄並燬浩淮角草寮千餘間擒斬及滚溪之賊不可勝計進追至生畨隘口臣胡髙望天半髙山碎一卷據奏稱跴探賊蹤之社丁杜敷及投出賊目阮和等禀林爽文逃後餘孽尚不下二千人蟻聚小半天山頂拒險死守福康安随領巴圖魯等扵十八日分進丁夜繞過大山至小半天山麓時已黎明該處樹宻草深路徑逼窄攀藤方可登陟賊扵山頂立木柵壘石墻並伐大樹横塞徑路官兵攀援進至半山賊衆壓下勢甚豨突将軍傳諭以山路險惡無可駐足地至此仰攻有進無退官弁等俱踴躍用命不避鎗礟蟻附而上打死賊匪百餘名餘賊抵死抗拒攻至已刻普爾普率官兵等拉毁木柵先登賊衆即時潰散追殺賊目十餘人生擒五人殺賊二百餘人奪獲器械鎗礟鉛藥馬牛米榖無算産逆坐為梟種累林爽文賊巢既破竄入埔裏社埔尾一帶其父母家属遁入水裏畨社福康安令社丁杜敷設法弋獻果即按名擒獲觧京忍因上先諭逆首之父林勸雖律應縁坐然䆒不子而罪及其父尚可法外施仁貸其一死續據奏林勸亦曽啇同把守隘口抗拒官兵且林爽文曽将義民首黄殿邦祖父墳墓發掘使其父林勸早故亦應與其祖先墳墓一并發掘挫骨掦灰况現在同係謀逆之人其罪自無可寛經軍機大臣法司定擬具奏林勸應依律凌遲處死當即奉㫖依議仰見用法明允至權衡當替身空仗兎謀顛先據福康安奏林爽文每日易衣換馬並預求面貌相似者數人以為替代脱身之計及官兵分路窮追擒獲假装林爽文之頼逹訊出該犯本欲向北逃竄見圍截嚴宻潜往打鐡寮一帶山溝樹林内藏匿是逆犯詭謀兎脱轉露行踪天理昭彰洵為不爽張羅直到畨窮社福康安既得賊踪遂由打鐡寮追至炭窰地方又詢知該處出山即係海岸慮其入海潜逃派兵由後壠至中港竹塹桃仔圍沿山宻佈幾於人跡罕到之地可為周宻矣臣吉夣熊易服真疑賈列㕓福康安令巴圖魯将弁等分路圍截復恐逆首情急自戕因揀巴圖魯二十員屯練兵丁數百名改装易服作民人啇賈同義民差役社丁等分投捜緝喜報遂聞成檻縶自逆匪竄入内山福康安等四路窮追並派熟諳路徑之義民入山跴緝一面曉諭獅子頭社以北三蛤仔欄社以南各生畨協捕該犯已成釜底逰魂逃竄無地正月初四日於老衢﨑地方将林爽文並賊目何有志擒獲尋又獲林琹陳傳呉萬宗頼其龍等四名均係有名頭目固由其罪惡貫盈難逃顯戮實乃聖主仰契天眷機順事全遂得生擒逆首檻縶來京按律伏法以彰國憲而快人心孚人争看用徽纒恭讀丙申首生御製平定金川受俘詩真首亟呈非或人組縶是孚人之句並論俘馘二字義以馘字從或從首或者疑辭亟首以獻真偽在疑似之間至俘字從孚從人孚者信也執人以來實為可信六書㑹意具有深義一經幸闈析昭若發䝉今林爽文生擒就俘尤深慶堪嗔僣號同一貴臺灣逆匪屢見滋事不過械鬪拒捕旋即伏辜惟林爽文與朱一貴二賊敢行僣號真神人共憤天理所不容也臣葉觀國御製最快生俘異道乾海㓂始扵林道乾與林爽文逆賊同姓而敗遁逋誅由明軍政多踈異於今日之它國威而崇實債也撇捩允資衆軍勇勤勞實藉兩人賢前此臺灣進𠞰之兵不為不多特以領兵不得其人皆致懦怯是易将以來轉怯為勇新調之兵更為生力一皷作氣聲勢倍増巴圖魯等首先摧䧟克成大㨗是役在事兵将均堪嘉奨而調度有方奮勇無敵則福康安海蘭察二人實為首功愧無遑那築京觀役弗淹誰阻瀬船並自侯封俾爵晉福康安海蘭察等至鹿仔港不俟貴州湖廣之兵到齊即先鼔勇罙入諸羅圍困數月一朝而觧城中數萬生靈慶獲更生自應厚加封賞二人本係候爵福康安晉封一等嘉勇公海蘭察晉封三等超勇公以示寵異疊加勇號待功竣軍營将弁中奮勇出力如梁朝桂袁國璜穆克登阿官福等二十餘人已莭次告竣賞給巴圖魯名號其餘出力員弁俟大功再令福康安查奏交部優叙四團服采榮頒衮福康安海蘭察等攻克大里杙之信先據李侍堯探聞馳報當經奉圑龍㫖將福康安海蘭察二人優奨並先賞給四補褂紅寶石㡌頂嗣福康安奏至即加晉公爵懿臣王修再暈冠翎寵珥蝉常青初至郡城調度一切甚為妥協柴大紀力捍圍城不辭勞瘁李侍堯孫士毅料理調派官兵及運送粮餉等事周安訊速梁朝桂前在金川帶兵奮勉此次𠞰捕逆匪復打仗出力並先後䝉恩賞戴雙眼花翎以示嘉奨職領武文巡莭莅現在逆匪蕩平地方弹壓及吏治戒行皆資整頓特奉諭㫖令該省督撫及水陸兩提督每年輪值一人前往稽察著為定例任需道府御屏銓向來臺灣道府缺出俱由督撫奏調該督撫等因其地土豐饒每有瞻狗私情不問属員才具能否舉請調補俾得侵漁肥槖所調之員不以涉險為虞轉以得調美缺為喜扵吏治大有闗係現今奉請臨時㫖嗣後臺灣道府員缺均由吏部㫖簡放仰見澄叙官方至意漳泉分籍田兮宅臺灣地方屢有奸民聚衆械鬪之案皆由彼處多係漳泉兩郡民人居住兩郡之民素有嫌隙其里居田土互相錯處往往紛争搆釁醸成事端前經奉諭預令福康安扵辦理善後事宜時除各處義民随同官兵打仗殺賊者毋庸遷徙外其賊匪荘田業經入官應召募居民及與賊匪同住一荘民人雖無從逆實蹟而心持兩端者或趂此兵威酌為遷移令籍𨽻漳泉之人各為一荘俾免争兢臣茅元銘郡縣増城石或甎臺灣郡縣城圍向用竹木編挿不足以垂久逺康熙年間朱一貴滋事平定後總督滿保首議及建城維時以其地處海外無城雖難以防守然失之易復之亦易是以未經建立以省煩費此次林爽文糾衆猝起攻刼彰化縣城究由䓶竹不能防禦所致兵力聖意以當日未及建城與其失而復取徒煩曷若設城固守更為有備無患曽保障諭令扵事定後将郡城㕔縣酌量建城以資或設立窰坐用外磚内土之法如式砌造或就彼處開採石料以代磚工尤為便易繡使罷差臺制改向例每三年一次奏派滿漢御史各一員巡視臺郡御史職任較小且由京派往未能備悉地方情形易為欺蔽未免有名無實特奉諭停止冬卿銜命土功涓灣府上以工部侍郎徳成諳練工程現在臺㕔縣應改城垣令其馳赴該處㑹同巡撫徐嗣曽勘估辦理牛區外界詢前事雍正時總督滿保著有經畫疆里一書内稱臺灣地土廣饒糠榖利溥冄過四五十年内山山後皆將為良田羙宅若劃定疆界不許往來耕種勢難禁止等語自近年楊景素議立界限之後將界外良田羙産轉畀生畨生畨不事耕種内地無業㳺民竊渡偷墾地方官諉之界外不復稽察扵是奸匪尤易藏匿因傳之事諭福康安李侍堯等取書内所論確中利弊不妨参酌採擇務使歸扵盡善臣錢棨蟫拂東征鑒舊編逆匪上偶閲藍鼎元東征集扵康熈年間平定朱一貴時謂諸羅地方遼濶應添設官弁以資防守至雍正二年始分設彰化縣増鬪上以該處迄今又閲六十年土地户口日加酌量情形後應湏添設文武員弁控制無馭之處侍堯諭令福康安𠞰賊竣事後相度形勢㑹同李等籌酌並查藍鼎元履厯仰見觸處皇上好察邇言寸長必録而幾餘披覧貴穿非尋章摘句所能仰窺萬一知徹微彰爻繫藴自臺灣用兵以來凡命將䇿兵籌餉蹙賊諸事皆由皇上乙夜精勤先事知幾内得大功耆定復念周易繫辭所云知㣲知彰知柔知剛之義平日用之内以正心外以勅政而更慎扵用兵之際盖文王扵豫之卦辭是取扵建侯行師而周公扵六二爻辭則曰介于石不終日貞吉孔子繫辭曰是幾而作不俟終日三聖人義藴無所不通而行師之貴知幾尤為明切者避暑山莊正殿後室議之地聖祖題為依清曠實上年籌機宣因扵外簷額以四知書屋更扵寄情山水之中有㑹扵熈政詰戎之本闡義作記煌煌大文羲畫軒韜理通一貫矣理徵遲速典謨篇速蕆御製識事文詳述自逆匪滋事以及大功中間遲速之機莫不炳照幾先洞徹事後所謂遲在任事之外臣而速在籌䇿之予心二語與御製遲速論相為引伸至維敬與明秉公去私為用兵之本弗啻典謨矣希聞自古機操劵臣嚴福御製更願從今燧息烟兵不易言用至不得已而用之惟信賞必罰示以至公授䇿量能本扵至明而且午夜捜章辰朝盻㨗尤必輔之以勤方能集事盖知其不易而慎之而後可以言兵可以息兵予嘗有從今更願無滋事之句近作識事語指歸此意盖慎之也逭賦蠲租施後恵上年春間念臺灣地方遭賊匪滋擾小民必誤耕作九月後據柴大紀奏諸羅義民踴躍急公情形先後命將臺灣全郡五十二年五十三年應㣲錢粮概免征輸十二月復據李侍堯奏臺灣各属本年應徵兵糓十九萬九百餘石及耗羡租税銀六萬九千餘兩粟一千八百餘石請分作四年帶徵亦令全行寛免近又念漳泉等府属應付官兵及粮餉軍裝等項雖俱動用官帑不無有藉民力並降㫖將泉州府属之晉江等四縣漳泉府属之龍溪等八縣應徵錢粮蠲免十分之三其浦城崇安建陽建安甌寜南平古田閩縣侯官福青莆田仙逰等十二縣蠲免十分之二至福鼎霞浦福安寜徳羅源連江光澤等七縣應徵錢粮緩至五十四年麥熟後徵收俾閭閻間境已安全而澤餘休養以示有加無已至意殃民縱吏悔前愆臺灣逺隔重洋地土沃饒向來地方官既以牟利為心而督撫即藉為市恵之地全不以地方公事為念甚至聴㫁徇私貪婪無藝扵是奸匪得以藉口滋事刼縣戕官醸成巨案此固由厯任督撫任用匪人所致而予亦不能不自引咎也聨吟誌過非誌喜誌鬯國威萬里宣欽定平定臺灣紀畧卷首四欽定四庫全書欽定平定臺灣紀畧卷首五御製詩仲春社稷壇禮成述事祈固重於謝勤春每闕秋每嵗以秋獮幸避暑山莊是以仲秋吉戊未得躬承祀典然祈重於報春祭每親詣行禮春膏叨厚澤上冬各直省雪澤俱優惟近畿得雪數次未為霑渥上元節前大雪盈尺心實為慰秋穫籲豐收晋玉攄心悃繫縲俘首囚不堪陳獻典古者振旅畢大幣獻集以祭社兹逆首林爽文雖已就執檻送來京然以么䯢小醜罪貫滿盈自應伏辜豈堪舉陳遄速獻典惟仰荷惕神庥得以蕆事實深感總是沐鴻庥仲春瀛臺即景右社躬禋蕆禮成遂臨西苑祭衣更載陽仲月欣佳景素尚䨇文仰聖情素尚齋數典避暑山莊事於皇祖所題額是日傳膳視此隄栁梳風黄欲緑盆梅培雪澤為榮驛章裁奪那知倦今日接福康安奏審訊林爽文及籌徃南路擒挐莊大田情形並各省奏摺頗繁纎細俱經裁奪雖批閲移時而矢願孜孜亦不以為倦也纎細胥存公與明李侍堯奏報臺灣情形詩以誌慰北路賊已靖南路師方進軍郵隔十日復盼佳音信兹接督臣章吏民胥致聞李侍堯奏據同知楊紹裘正月二十七日禀稱現在府城附近各鄉已無賊匪惟南路水底竂金京潭等處尚有潛匿官兵分投捜捕所有附郡義民俱令歸莊耕種等語𠞰賊連得勝寇已逺城郡民廻耕其田夏秋望以瞬李侍堯又奏二月初六七等日據船戸自鹿港囬至蚶江者稱自林爽文拏獲之後鹿港各廟社演戲謝神殆無虚日附近田畝已種一半其被難歸莊之民現亦及時播種等語轉瞬夏收臺灣民氣可以少甦矣復接署撫奏春膏獲稱順麥苗已暢發可卜收成牣又據䕶廵撫伍拉納奏各屬禀報自上年十二月初三四以後各得雨三四次又建安甌寧浦城建陽等縣十二月二十二三日得雪積厚二三寸不等其福州興化二府屬於正月中旬亦得雨甚為霑足當此二麥長發之際有此渥澤滋培是閩省内地收成亦可預卜大兵之後豐登有望感沐天庥彌深兢惕兵後嵗獲登䝉天庥益慎翹思擒次兇㨗布至惟迅崇禧觀瞻禮崇禧古觀枕津河一紀春秋此重去聲過愜意䝉庥錫海晏月初據福康安奏已将逆首林爽文生擒檻繫來京固已仰荷天庥尚冀南路並将莊大田亦即拏獲以靖海疆而安黎庶耳肅躬瞻禮籲時和藐予深感恩騈叠上帝髙居示欎羅萬物有心天普鑒固難天在人人心中隨方示象議祠宇之各處多有也難拘禮議畤祠多福康安奏報生擒荘大田信至詩以誌喜正殷㨗信盼連朝忽接佳音至自遥鹿耳鯤身防海逸莊大田在鳳山一帶距海甚近初慮該匪情急遁入海内追捕更難得手轉不如林爽文竄至内山者尚覺人力可施也柴城瑯嶠獲山跳此次福康安多方籌辦令巴圖魯等各帶官兵分隊自山梁挨次排下而烏什哈逹所帶水師兵丁適值順風連檣齊至沿海宻佈水陸並進四靣合圍遂将荘大田及有名頭目四十餘名全數擒獲又殺賊二千餘名其餘逃入生畨者被柴城瑯嶠各畨社縳献三百餘人未及兩月南北二兇悉行俘獲全郡俱已平定實深嘉悦一之為甚竟致再鴟既成擒豈赦鴞永靖瀛壖揚國武益深兢業昊恩昭李侍堯奏截停各省運閩米石詩以誌事軍務昨年恐弗完籌粮百計每從寛上年因臺灣軍務未即蕆事節次諭令江南浙江江西四川湖廣等省撥米一百餘萬石又有台州等九幇以守凍不及受兑之米並令陸續運徃閩省俾軍儲民食悉臻寛裕蕆功却至用不竭截運誠教慰以歡兹據李侍堯奏現在軍務告竣将各省撥運之米除籌備應用外尚多米四十餘萬石所有台州等九帮及未抵閩境之湖南四川二省米石飛咨各省俱可毋庸續運一體截留等語進𠞰福康安坐謀李侍堯力各盡宵衣旰食意差安雖然敢即云無事惕息為君敬識難天津廻鑾之作到來日報大田擒又值訊俘恊衆忱天津駐蹕六日初至即得生擒荘大田之報将廻鑾復值林爽文觧到親加鞠訊衆情胥快數日之内諸事頗為順意似此諸般皆順意祗殷一雨獨縈心廻思春雪虞孤負深究盈虚凛酌斟新年雪澤甚優嗣後得雨總未霑足豈因諸事順意敢懈此祈年望雨之意哉安福艫窻靜拈句却欣漸逺管絃音上巳日賜御前大臣侍衛等食海嶠首俘至行宫一日停廵幸津門原定於上已日廻鑾因逆首林爽文等於初二日晚間解到次日廷訊復停蹕一日重三逄令節上已溯前型左右嘉勤扈笙歌合與聼如云較馬射豈彼足相形閲武輕輿清曉過南山閲武旌勞未可刪所媿躬倡平聲未乘騎昔年閲武必乘馬至教塲或親御弧矢示之身先之道固應如是近以年近八旬雖精力尚徤亦宜節勞以從衆願遂乘輕輿以徃究用自媿云敢忘衆力近平蠻自立香山健鋭營以來屢𣲖出征屢有成效上年臺灣逆匪滋事先𣲖翼長等八人前徃領兵打仗後簡𣲖巴圖魯百人隨福康安等進𠞰果能迅奏膚功實為奮勇出力然予心益深兢惕詰戎之念未敢一日忘也益當克詰訓惟懋並視等差賞以頒莫謂例行託遊豫無非事也政胥關實勝寺叠去嵗韻實勝寺每兆寔勝䝉天恩不可無記匪予始乃自太宗松杏山攻率子弟敬述此事用此名崇徳六年八月太宗以偏師破明總督洪承疇兵十三萬於松山杏山歸而建實勝寺於盛京以紀功績予於己巳嵗以金川凱旋亦就西山舊寺葺新之名曰實勝自是平定伊犂回部兩金川無不名副其實逺紹前光即以敬修武備也西域金川早如志以為是後應偃武與民休息可無事不意丙午嵗之冬臺灣邪教萌逆計兩提臣乃互觀望不敢首進更退避上年逆匪林爽文初滋事時黄仕簡任承恩以兩提督率兵渡海若能奮勇𠞰殺不難立時撲滅不意黄仕簡安坐郡城任承恩株守鹿仔港以致賊勢蔓延攻城擄社日肆猖獗迨予繼命常青為将軍過臺灣籌𠞰而賊衆日増已難措手非二人養癰之咎何以至此以此養癰賊蔓延攻城擄社猖獗至更命重臣徴勁兵百巴圖魯嫺師律叶功客夏予燭照事㡬非遣重臣前徃不能迅速蕆於是命福康安海蘭察等於八月初率巴圖魯百餘人帶領續調川黔楚粤勁旅近萬人赴閩此百餘人皆素嫺師旅無不一以當百賊衆聞之已皆膽落屡戰屡勝擒二䜿三月功成亂反治福康安等於十月底自崇武澳放洋一晝夜間揚帆逹鹿仔港軍威所至勢如振槁未及三月而二䜿就擒妖氛悉靖闔郡之民咸安袵席成功之速無以踰此兹予駐蹕香山頋瞻寺額幸而無辱前名此皆仰賴上蒼眷佑用是益深敬畏耳幸哉未致辱前名不然何以掩斯愧勝亭口號攬勝因之號勝亭操符信有契山靈成功勇将聫翩至連日海蘭察普爾普分領巴圖魯侍衛章京等自臺灣回京嘉其迅掃妖氛復閔其逺涉重洋自應亟加慰勞以示寵眷前席閔勞覲蹕停悉故臺灣逆匪靖海嶠期永固因留福康安諸政資展佈臺灣自朱一貴肆逆之後嗣如呉復生及近年黄教林耀揚光勲輩不時糾衆滋事雖即伏法蕩平而一切善後事宜未能熟籌妥辦是以奸民罔知畏懼猶復乘間竊發此畨大加懲創不可不熟籌良策永固苞桑因命福康安暫留彼處商辦建城移縣増設駐防分募戍兵及撫戢熟畨經畫疆土諸大政善後俾乆奠勘前覈宿誤兹乃具奏聞一一悉其故諸吏懈文治各弁弛武務加以事苞苴胥弗勤民慮近據福康安奏臺灣奸民滋事之由向日文員懈於化導武職踈於操防已不能整頓地方加以利其地土肥饒肆意侵隐若知府孫景燧同知劉亨基董啟知縣唐鎰程峻等居官聲名狼籍總兵柴大紀縱兵牟利於是奸徒得以藉口益無所忌惮矣即如緝邪教無備行又遽善惡未分明燒屋如刼擄叶天地飾添弟化大猶巧訴前年閩省辦理楊光勲械鬭奪犯一案該郡文武各員如果将倡㑹起釁縁由徹底究理並将逸犯嚴切則根株自必早能净絶且此等邪教匪徒祗㦄上𦂳緝拏即有拒捕情形亦不妨當時格殺究非若𠞰捕逆賊所當焚其巢穴者可比乃署彰化令劉亨基於案犯善惡尚未分明輙任胥役等燒其房屋是地方官緝捕奸民之事竟至形同刼擄以致林泮等逼令林爽文謀逆滋事又於天地㑹名目改為添弟二字有意化大為小巧詞掩飾乃道員永福臬司李永祺復存将就之見率轉完案迨林爽文等聚衆抗官恣為猖獗該署令亦束手無策被其戕害此其貽悞醸變之由厯厯如繪不可不嚴加懲治以為貪吏殘民激變者戒以此奸賊煽抗官乃弗懼遂致恣披猖賊首乆失捕重臣率精兵三月成功速叶鍳前並飭後官方大籌度叶楚福康安等率巴圖魯等百人及川粤黔勁兵雖未及三月而二兇就擒餘黨悉皆捕誅然良民無慮數萬遭賊荼毒殊堪憫惻兹既鍳於醸事之由不得不為弭變之計是以令福康安籌度善後事宜惟冀此後官方整飭文武各員皆以綏靖地方為念則奸頑自化而海疆庶可永靖耳庶幾靖瀛疆萬民安寐寤命晉増天后徽稱詩以昭靈誌謝尊封天后自先朝輔昊晏瀛恩乆饒近以臺灣靖兵燹益知海舶佑神昭臺灣自用兵以來官兵配渡及裝載糧餉鉛藥船隻率多安稳至福康安於上年十月二十八日申刻在崇澳放洋一晝夜間駛行千里所有兵船百餘隻於二十九日申刻齊扺鹿仔港尤為從來渡海所罕聞今春大兵凱旋海蘭察普爾普等分領巴圖魯等並川粤黔楚領兵大員各帶本省官兵由鹿耳門鹿仔港兩處配渡俱即揚帆利渉惟福州駐防一起官兵内有領催蘇楞額等三十三名於三月初七日乘坐哨船已至港口未上大船陡起風暴抛碇不住吹折蓬桅前鋒徳福等四名跳過别船蘇楞額等二十九名未及過船隨風飄至大洋兩日兩夜幸不覆溺初九日於黒水洋地方適遇許長發船自澎湖駛至於是兵丁等遇救過船俱得無恙深天后昭靈顯佑益欽感飛來異鳥安無事據福康安奏蘇楞額等船隻飄至大洋正在危險之際忽有異鳥一䨇赤喙赤足眉作金色飛集船頭頗甚馴熟船戸等謂得神佑必可無虞既而果得遇救全生過後詢之官兵船戸等言之鑿鑿並奏上年自崇武澳開船後即聞船戸等傳説有靈異之事等語向聞海上船隻遭風其䝉救者有飛鳥紅􅀈來船即知萬無一失之語以今騐之洵為不爽云渡後大魚忽有飄又奏領催兵丁等於遇救過船之後將軍装搬運甫竟見原坐哨船下有數丈大魚浮出水靣船隻登時沉没是呼吸之頃數十人之性命得以保全神之佑助更爲靈異四字徽稱晋伸悃年天后靈應垂庥佑民福國康熈十九濟封䕶國庇民妙靈昭應𢎞仁普天后乾隆二年加封福佑群生四字二十二年加封誠感咸孚四字此次用兵仰荷神庥屢昭助順允宜増益順徽稱褒崇封號因敬加顯神賛四字以隆妥侑而抒悃忱永資福錫萬民邀福康安奏臺灣地方寧謐情形詩以誌慰地經兵燹撫為難特勑良臣善後觀臺灣賊匪滋事福康安等於數旬之内生擒二逆𠞰除餘黨固稱迅奏膚功然民間以兵燹之餘耕種失時田畆荒廢撫卹為亟並一切善後事宜轉湏從容料理是以特命福康安暫留彼處次第詳籌為永靖海堧之計府一縣三農事起導和禁闘戸民安據福康安等奏該處難民漸次歸荘正東作方興之際因即酌借籽種令其各歸農業民間修復水道繕葺房屋亦已漸復舊觀現在通衢市集負販流通徃來如織府城内外演劇酬愿者甚衆地方日就寧貼人心實已大定並曉諭地方官嚴禁爭闘之風隨時化導務在有犯必懲當不致更滋事端銷兵鑄耒知謀永又稱前後收繳刀矛及各項噐械數千件俱改鑄農噐給與貧民以資耕種仍嚴禁工匠不得私置軍噐亦可遏絶械鬪刁風縳匪獻逃莫匿奸現在緝拏餘匪不但地方官俱各上𦂳捜捕即村民亦皆實力查緝嗣又捜獲賊目九名並殺害同知王雋之逆犯張烈一名匪衆陳意等二十八名俱已審明正法凡逃入村荘者無不即時擒拏且有該匪犯父母親屬自行献出者可見民知畏法雖至親亦不敢隐匿賊匪根株無難捜查净盡矣福康安此次辦理一切安詳周到俱能得其要領不特征𠞰之時海嶠畨民服其威勇已也海嶠威揚人服勇豈知為政更操端夏日齋居昨曉為霖隨快霽晚風陣雨送行雲自前月下旬霑渥之後麥田将届收獲即大田亦資長發又宜晴曬而數日内間有駛雨猶若隂晴未定惟昨日曉雨旋霽将晚陣雨片刻今早天氣晴朗漬雲净歛為之欣慰碧天今日纎翳净廣厦細旃峭爽生農務莫教縈萬慮人心那得有恒情齋居政簡偏非簡報閲臺灣費細評齋居幾務當簡今早接福康安奏報臺灣招募戍防安設屯政及嚴緝賭博潰兵諸善後事宜詳酌指示至申酉不以齋居懈勤政也夏至日北郊禮成述事土徳欣逢四戊年戊月是日己卯五行又屬土黄壇大祀呈㣲躬䝉眷佑厚貺錫安貞去嵗方鞠旅上年此時正調遣官兵進𠞰臺灣逆匪林爽文等今嵗春初已生擒逆首掃滅餘黨海疆綏定安貞之吉非䝉眷佑何以至此今春早洗兵忖修何以遇怵惕鞏䖍誠至避暑山荘即事成句曉蹕乘凉喜快晴廣仁嶺過見巖城青衿迎駕蔚文教自丙申嵗陞熱河㕔為承徳府以所屬六㕔為州縣乃剏建文廟増置學額府學六名所屬各四名並予鄉試中額一名於是絃誦之士日益衆多兹正值學臣金士松試畢率諸生道左迎鑾文教蔚興為之快慰赤子填街豫衆情休養恒為計衣食詰戡卒爾罷經營去嵗駐蹕山荘以臺灣逆首尚未就擒籌治軍書時勤宵旰今嵗春間大功幸已告蕆即福康安經理善後事宜亦将次完竣無須訓示駐此饒有清暇惟盈滿之戒不能不兢惕於懐耳今年避暑饒清暇惟益䕫䕫戒滿盈永佑寺瞻禮叠辛丑詩韵臺灣逆賊煽居居惡也見爾雅駐此正籌鞠旅初上年駐蹕山荘時臺灣首逆尚未就獲惟於瞻拜方略神御之下䖍祈也黙佑於是日治軍書指授不敢少自踈懈揚我國威黙籲祖靖其瀛嶠肯踈予一心盼㨗秋連夏三月成功疾弗徐去夏予早慮及常青未能蕆事即馳諭福康安入覲山荘旣而自夏徂秋賊勢果益猖獗隨命福康安等前徃籌𠞰未及三月連擒首惡殄滅妖氛成功之速無以踰此詳見平定臺灣聨句詩注自非皇祖皇考在天之靈啟牖予衷曷克臻此則予之感恩當為何如永佑信哉䝉福庇紀恩七字壁間書署福建廵撫伍拉納奏雨水田禾情形詩以誌慰兵後多凶年此語古所有臺灣雖海外省同應共受以此恒關心為祝逢年阜春雨早報霑麥收七分富叶省閩天氣融和麥收較早前據䕶撫伍拉納奏報三月杪已届二麥成熟之候各屬除臺灣一府尚未據報到外其内地六十州縣收成八分有餘者連江羅源寧化歸化夀寧等五縣八分者長樂福清屏南永福仙遊将樂沙縣尤溪永安建陽崇安松溪政和邵武光澤建寧㤗寕長汀清流連城上杭武平永定福鼎直𨽻永春州並所屬徳化大田直𨽻龍巖州並所屬漳平寧洋等三十州縣七分有餘者安溪一縣七分者閩縣侯官古田閩清莆田晋江南安惠安同安龍溪漳浦海澄南靖長㤗平和詔安南平順昌建安甌寕浦城霞浦福安寧徳等二十四州縣合計通省麥收七分有餘該省當臺灣用兵之後收成益為厪念兹雖未稱上熟猶屬中豐仰沐深昊慈實感謝兹復馳奏章時若利田畝禾苗愈長發蔬薯胥暢茂兹又據奏時届首夏髙阜地畝因晴霽半月又在望雨隨於四月十五十六等日連獲優霑禾苗愈見滋長園蔬番薯亦俱暢茂覧奏真堪慶幸南瞻慶同民不禁頻額手納稼其尚遥慎戒滿招咎永恬居八韻片雲收宇外逺界露峯尖曲棧輕輿進翠㣲樸屋瞻琴書伴憇息林壑入吟拈廻憶昨年况正籌海冦殱兩臣一忠效百勇萬軍兼上年駐此時正值籌𠞰臺灣逆匪慮常青不能蕆事因令福康安馳赴山荘親授方略命為将軍並命海蘭察為叅賛率巴圖魯侍衛章京百餘人又調遣川粤黔楚勁兵近萬人前徃二人果能同心共濟未及三月生擒林爽文荘大田二首逆餘匪亦殱戮殆盡於是海疆底定人慶更生何莫非得成陟降之靈黙為祐相俾功如是之速耶三月功成速五爻利執占祖恩賴呵䕶民務叶寛嚴臺灣近年以來文武各員並不實心經理民事是以奸頑屢有騷動此次大加懲創之後不得不令福康安在彼熟籌善後良謨為一勞永逸之計節次據奏建城移縣撫戢熟畨設立屯田以及定界址員弁諸事宜無不寛嚴允當經久可行自此千里瀛堧苞枽孔固仰瞻皇祖御書永恬奎額期與彼民副此至願云敬仰奎文意瀛疆佑永恬福康安奏報抵厦門登岸並巴圖魯侍衛等皆平安渡海凱旋詩以誌慰徃征進旅遲成速福康安於上年十月在惠安縣之崇武澳候風十餘日似乎遲滯乃當此停泊之際所調四川屯練二千及廣西兵三千先後到彼而風亦旋利遂於二十八日申刻放洋至二十九日申刻所有兵船已齊抵鹿仔港因即乗鋭長驅未及三月而全臺平定因遲而轉以成速神之佑助已為靈異廻渡登舟危得安兹又據福康安於囬抵厦門後具奏渡海情形云於五月初十日獲有順風揚帆行至日暮抵黒水洋距澎湖内澳僅二十餘里風息不能前進碇索長至六七十丈猶未至底難以寄泊即在洋面徃來飄蕩十二日午後風浪大作竟夜不止船隻雖覺欹側幸而安稳無虞十三日晚間即抵大擔門所有隨從巴圖魯侍衛等俱於十四日登岸此次用兵徃來配渡船隻大槩俱各安順而福康安廻渡頻危得安尤昭天神䕶要亦忠信之忱得邀佑為之感慶可識臣忠天必佑益欽神䕶衆胥歡除兇旋凱事全蕆旰慮宵縈念始寛自顧何修叨助順持盈惟勵慎君難福康安徐嗣曽奏清查臺灣積弊並酌籌善後事宜詩以誌事善後瀛疆命重臣臺灣逆匪此次大加懲創不可不詳籌善後事宜以期永臻寧謐福康安不特勇略夙著堪以掃蕩賊氛而平日體國公忠亦予所深信是以大功告蕆之後特命暫駐數月詳查厯年積弊際此一切改弦庶可永絶弊竇並教宣撫渡由閩福康安酌籌善後惟一切弊端究異地方專責撫臣徐嗣曽在閩乆任藩司剔釐固其任内之事是以預令渡海俟福康安𠞰補事竣㑹商妥辦付之海外弊叢舊臺灣地土本屬膏腴又經我朝百餘年休養生息物産益饒居民日庶祗以逺隔重洋文武各官僅以肥槖為心不以整飭在念而督撫大吏又不一至其地於是百弊叢生盖已匪朝伊夕爾合以時宜政改新十六條胥飭文武兹據福康安徐嗣曽奏清查臺灣積弊酌定善後事宜十六條内如稽查􅍾演按期廵哨嚴飭閩兵𣲖累禁止離營貿易裁革四項目兵互騐換防戍兵清查安設砲位嚴禁搶奪械闘捜查戸口逸犯禁止私造噐械懲治賭博惡風開八里坌海口便商嚴禁大小港私渡設立餔逓船隻十四條自屬整頓營伍綏戢地方要務又如責成大員渡海廵查准令道員奏事二條則俱係預先有㫖之事因令大學士九卿㑹議具奏将來文武各員果皆激發天良實力遵行則僻逺之區政令一新風氣潜移瀛堧自當永靖矣萬千户永晏民人貪官劣将致僨事逆匪林爽文等無一倖逃法網固皆孽由自作然節據福康安李侍堯𠫭奏總兵柴大紀縱兵牟利廢弛戎行知府孫景燧同知劉亨基董啟埏知縣唐鎰程峻等肆意貪婪不恤民隱以致奸頑既無畏忌轉得藉口日乆醸成大案原其僨事之由殊堪憤恨然而事後方加整飭殊愧以前之失於覺察矣事著方知愧亦真賜凱旋将軍福康安恭賛海蘭察等宴即席成什去年此際未登程蕆績今朝凱宴迎來徃算仍先一月福康安於上年八月初旬由山荘奉命前徃督𠞰今以七月望後凱旋來此復命計期尚未及一年驅馳真是賴羣英國威海嶠揚維烈祖徳山荘佑實明廻憶旰宵斯擘畫不徒勞耳慰猶誠慰中豈不自懐慙何致愚民蹈法甘論武邊防乃就弛曰文諸吏率為貪臺灣設立總兵道府大員如果皆能實心整頓奸匪何由匿跡乃武職不以操防為事文職專以肥槖居心於是彼此牟利遂致吏治兵防日以廢弛而逆匪無所顧忌竟至於醸成大案僨轅方悉誠吾過伏鑕奚辭信彼堪逆首林爽文等滋事之始總兵柴大紀始則以回郡調兵為辭繼則遷延不即前徃𠞰賊方以困守諸羅邀予憐憫及福康安等至彼方悉其僨事之由已經革職拿觧治罪彼實不能巧言置辨也善後雖云大端定有餘厪念望東南福康安於平定臺灣後命留彼詳酌善後事宜大端已定惟是有治人無治法因思普吉保於臺灣總兵名望未足以資弹壓而奎林獲咎尚輕其操守訓練乃所深信即令徃代普吉保為總兵庶可望其整勵戎行俾東南海隅永臻寧謐善後詳陳十六條用斯兩月駐成遥臺灣善後事宜必得福康安之忠誠明練方可籌畫及詳陳事宜十六條果皆悉中弊源命廷臣集議准行而福康安歸期以此遂遲兩月紓猷山海安萬姓錫宴君臣㑹一朝念汝父當愜懐永視如子合受恩饒受恩饒處人知否不嗜殺徼天惠昭逆匪林爽文等固屬罪大惡極然亦有良民被其廹脅者悉予駢誅亦屬可憫瀕行時因即諄誡以脅從罔治之義而福康安果能體予之心專意生擒渠魁惟抗拒者痛加𠞰洗凡歸降者概從寛貸即此不嗜殺一念乃其克膺恩眷者也西域金川宴紫光臺灣凱席值山荘敢稱七徳七功就予自即位以來弗敢輕言用兵然前此平伊犂定回部收金川誅王倫剪蘇四十三洗田五及兹俘林爽文而七要皆不得已而用之故皆仰邀功則天鑒俱獲成功若唐太宗之侈陳七徳以為已實自恧耳又報一歸一事償徃嵗𬗟甸之役亦由事非得已彼時将計日蕆事予以水土惡劣憐我将士多受病者適緬甸亦籲求貸罪遂令撤兵乃二十年來業已置之度外近據雲南督臣富綱奏新掌緬甸國事孟隕進貢稱臣是此一事雖未就於當年而此日之歸誠亦可償予夙願矣戒滿持盈増惕永安民和衆繫懐長養年歸政應非逺益此孜孜勵自强事定事定閒廻事始思慎哉惟是在行師要於不爽鑒人品上年黄仕簡渡䑓灣𠞰捕逆匪林爽文等乃以病後昏憒株守府城毫無謀略若非予於上年正月間命李侍堯代常青為總督而以常青代黄仕簡安知黄仕簡不且為賊裹去及常青至彼亦未即能尅期𠞰洗因於八月間復命福康安海蘭察等率領巴圖魯百餘人及川楚黔粤之兵前徃生擒逆首迅速成功然常青在彼數月當賊勢猖獗之時尚能保守府城不至僨事是以此時來京仍令為都統予於諸臣功過鑒别悉本至公權衡不肯以私亦弗曽輕受彼欺總兵柴大紀在諸羅數月屢奏被圍忍飢固守情形初亦深加憐憫恩賜伯爵以示寵眷乃無意之間於徳成自浙勘堤囬京復命之際詢悉其居官聲名狼籍隨命福康安李侍堯等查訪亷得其平日種種貪婪廢弛營伍以致賊匪得以肆逆及在北路閲兵一聞林爽文滋事不即調兵殲賊轉回郡城嗣兵既調齊又復怯懦延挨不進情事此亦天理昭彰悉令敗露因命拿解來熱河廷訊後即行正法究亦不致受其欺蔽也此日已經成凱宴昨年猶未啟程時福康安於上年八月初間在山荘始奉命前徃兹於七月十六日回山荘凱宴計期尚未及一年海疆耆定誠神速天眷躬承勵惕寅命於臺灣建福康安等功臣生祠詩以誌事三月成功速且竒紀勲合與建生祠垂斯琬琰忠明著消彼萑苻志黙移臺地期恒樂民業海灣不復動王師曰為曰毀似殊致近年以各省建立生祠最為欺世盗名惡習因令嚴行飭禁並将現有者概行毀去若今特命臺灣建立福康安等生祠實因臺灣當逆匪肆逆以來荼毒生靈無慮數萬福康安等於三月之内掃蕩無遺全郡之民咸登袵席此其勳績固實有可紀且令奸頑之徒觸目警心亦可以漸消狼戾是此舉似與前此之禁毀跡雖相殊而崇實斥虚之意則原相同孰能横議且勵大小諸臣果能實心為國愛民確有美政者原不禁其立生祠也崇實斥虚政在兹欽定平定臺灣紀畧卷首五
