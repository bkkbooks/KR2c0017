body:
  text: 提要臣等謹案欽定平定臺灣紀畧七十卷乾隆五十三年奉勅撰臺灣孤懸海外自古不入版圖然寔閩粤兩省屏障明代為紅毛所據故外無防禦倭患蔓延後鄭芝龍據之亦負嵎猖獗誠重地也聖祖仁皇帝七徳昭宣削平鯨窟命靖海侯施琅等俘鄭克塽而郡縣其地設官置戍屹為海上金城徒以山箐叢深百産豐溢廣東及漳州泉州之民争趨其地雖繁富日増而姦宄亦因以竄迹故自朱一桂以後針蝟斧螳偶或竊發然旋亦撲滅惟林爽文莊大田等逆惡鴟張凶徒蟻附致稽藳街之誅仰頼神謨指揮駕馭乃渠首就檻炎海永清盖始由官吏之貪黷司封疆者未察繼由將帥之觀望議攻守者多岐致賊得招聚逋逃葺營巢穴而其所以蕩平者則仰藉皇上坐照幾先扵鮫室鯨波視如指掌事事皆預為䇿及早設周防又睿鑒精詳物無匿狀申明賞罰百度肅清弛者改而奮怯者改而勇並凛凛天威近猶咫尺而重臣宿將乃得以致力其間生傳䝟㺄以申國憲威棱所慴併内臺生畨亘古未通中國者亦先驅效命助翦元凶稽首闕廷䖍修職貢中外臣民跽讀御製紀事語二萹咸以手加額謂軒轅之戮蚩尤猶親在行間武丁之克鬼方非路經海外今皇上運籌九天之上而坐照萬里之外亘古聖帝明王更無倫比至江漢常武諸什僅在近地者更無足道矣奏凱之後廷臣敬録諭㫖批荅奏章分析月日編排始末勒成是編以垂示萬古臣等回環跽讀仰見聖神文武經緯萬端雖地止一隅而險阻重深委曲籌畫寔與伊部回部金川三大事功烈相等載筆之下彌覺歌頌之難罄也乾隆五十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書欽定平定臺灣紀畧卷首一御製文𠞰滅臺灣逆賊生擒林爽文紀事語平伊犁定回部收金川是三事皆關大政各有専文勒大學誅王倫翦蘇四十三洗田五是三事雖屬武功然以内地懷慙弗薌其説至於今之𠞰滅臺灣逆賊生擒林爽文則有不得不詳紀顛末以示後人者向之三予惟深感天恩䝉厚貺次之三予實資衆臣之力得有所成若兹臺灣逆賊之煽亂乃卒然而起兵出於不得已而又不料其成功若是之易也葢自康熈二十二年平定臺灣之後厯雍正迨今乾隆戊申百餘年之間率鮮卅嵗寧静無事而其甚者惟朱一貴及兹林爽文朱一貴已據府城僭年號林爽文雖未據府城然亦僭年號矣朱一貴雖據府城藍廷珍率兵七日復之不一年遂平定全郡林爽文雖未據府城亦将一年始獲首渠平定全郡則以領兵之人有賢否之殊故曰事在人為不可不慎也林爽文始事之際一總兵率千餘兵㓕之而有餘及其蔓延猖獗全郡騷動不得不發勁兵命重臣則予遲速論所云未能速而失於遲予之過也然而果遲乎則何以成功葢遲在任事之外臣而速在籌策之予心故始雖遲而終能成以速非誇言也葢紀其實而已若黄仕簡任承恩初遲矣而予於去年正月即命李侍堯速往代常青為總督辦軍儲常青往代黄仕簡藍元枚往代任承恩司𠞰賊之事而郡城與仕簡弗致失於賊手是幸也是未遲也黄仕簡任承恩既至臺灣南北互相觀望兩月餘遂至與賊以暇日以滋蔓幸予於正月初旬值李侍堯入覲即命往代常青為總督而命常青代黄仕簡又隨令藍元枚代任承恩是以郝壮猷于三月初八日自鳯山棄城敗歸立即置之于法常青適于初九日到郡整頓兵威屢挫賊鋒郡城得以無失使常青不即到則郡城必失守仕簡或被賊獲皆未可知是始雖遲而實未為遲也既而常青祇能守郡城藍元枚忽以病亡是又遲矣而天啟予衷於六月即自甘省召福康安來熱河授之方畧八月初即命福康安海蘭察率百巴圖魯及各省精兵近萬往救諸羅是又未遲也常青雖固守郡城未能親統大兵往救諸羅藍元枚正籌㑹𠞰旋以病亡又幸予于六月内早令福康安來覲熱百河即命于八月初二日同海蘭察率巴圖魯侍衛章京餘人馳赴閩省並預調川湖黔粤精兵近萬人分路赴閩維時諸羅被圍日久粮餉火藥道梗不能運送若非濟事天啟予衷及早命重臣統勁旅前往幾至緩不是常青等救諸羅雖遲而予所辦亦未為遲也福康安等至大擔門開舟阻風風畧定而啟行又風遮至崇武澳不能進是又遲矣然而候風之際後調之兵畢至風平浪静一日千里齊至鹿仔港是仍未遲也福康安到厦門於十月十一日自大擔門開船被風打回十四日得風駛行半日又以風轉遮至崇武澳渟泊似覺滯遲然當此候風之際四川屯練二千廣西兵三千俱至而風亦適利遂于二十八日申時放洋至二十九日申時兵船齊抵鹿仔港千里洋靣一㠶直達其餘之兵亦陸續配渡福康安率此生力之兵旬日内頓解諸羅之圍繼克賊巢生擒逆首是未渡以前若遲而計其成功又未可謂遲也夫遲之在人而天地神明䕶佑每以遲而成速視若危而獲安有如昔年開惑論所云者予何脩而得此於天地神明之錫祉哉如是而不益深敬畏勤政愛民明慎用兵則予為無良心者矣予何敢抑又何忍乎夫用兵豈易言哉必也凛天命屏已私見先幾懷永圖方寸之間日日如在三軍前而又戒掣肘念衆勞且予老矣老而精神尚徤不肯圖逸以遺難於子孫臣庶藉以屢成大勲此非天地神明之佑乎亦豈非弗失良心得䝉天鑒乎福康安等解圍殱賊以及生擒賊渠諸功績已見聨句之詩之序兹不贅言獨申予之不得不用武又深懼用武之意如是以戒後世占驗家以正月朔旦值剥蝕為兵戈之象逺者固莫考自漢至明屢逢其事然亦有驗有弗驗元旦日食自漢迄明有四十七其本係政治廢弛及僭竊偽朝無論已如唐之太宗宣宗元旦日食其年俱寧静無事至宋仁宗四十餘年之中元旦日食者四最後嘉祐四年亦無事此其弗騐者也惟寳元元年元昊反康定元年元昊寇延州皇祐元年廣源州蠻儂智髙寇邕州又元代世祖至元二十九年元旦日食是年廣西上思州土官黄聖許結交趾為援冦陷忠州江州及華陽諸縣此其有驗者也若昨丙午可謂有騐矣以予論之千嵗日至可坐而致剥蝕亦可笇而定也既定矣其適逢與不逢原在依稀戃怳之間且亦乏計預使之必無也若使之無是為詐也不惟不能避災或且召災故史載宋仁宗朝第二次康定元年春正月朔當日食司天楊惟徳請移閏於庚辰嵗則日食在正月之晦帝曰閏所以正天時而授民事其可曲避乎不許夫日食必當在朔可知古稱月晦日食者見移閏曲避之説耳至於不得已而用兵惟在見幾而作先事以圖遲不失於應機速不失於不達惟敬與明秉公無私信賞必罰用兵之道其庶幾乎夫行此數端甚不易矣知不易而慎用兵又其本乎凡軍旅事必當有方畧之書書成即以此語冠首篇亦不更為之序矣福康安奏報生擒荘大田紀事語昨生擒林爽文則𠞰滅逆賊事可稱蕆大端兹生擒荘大田則肅清臺灣事方稱臻盡善二逆狼狽為奸得一而不得二餘孽尚存慮其萌芽且彼既聞首禍被獲則所以謀自全而倖逃生入山固易追赴海則難捕矣是以先事周防屢申飭諭荘大田在南路距海甚近不慮其入山而慮其入海則追捕甚難因屢次降㫖令福康安等慎防其入海之路思慮所及隨時預飭兹福康安盡心畫策凡港口可以入海者無不移舟設卡因聞荘大田帶同匪衆俱在柴城初二日欲往蚊率社經畨衆極力抵禦復行退回初五日黎明官軍由風港發兵越箐穿林遂有賊匪突出拒敵我兵迎擊海蘭察率領巴圖魯侍衛奮勇齊攻殺賊三百餘生擒一百餘追至柴城賊愈衆多然恐攻撲過急荘大田或臨陣被殺或乘間竄逸轉不能悉數成擒福康安分兵數隊以徐合攻自山梁佈陣抵海岸適烏什哈達所率水師得順風連檣齊至沿海進圍水陸合𠞰自辰直至午刻殺賊二千餘羣賊奔潰投水屍浮海如雁鶩而獨荘大田伏匿山溝以致生擒是豈人力哉天也二逆以么䯢小民敢興大亂殺害生靈無慮數萬使獲一而逃一未為全美斯皆生致闕下正國法而快人心反側潛消循良樂業福康安海蘭察等畫謀奮勇不負任使固不待言然非天祐我師俾獲萬全豈易致此耶更查康熈六十年四月朱一貴於臺灣起事提督施世驃總兵藍廷珍於五月由澎湖進兵至六月収復臺灣府城計閲七日於閏六月始擒獲朱一貴計閲一月餘至雍正元年四月而餘黨悉𠞰盡自朱一貴起事至臺灣全郡平定始末閲兩年兹林爽文於五十一年十一月起事其黄仕簡等前後悞事經一年福康安等於上年十一月由鹿仔港始進兵其間解諸羅縣之圍克斗六門攻破大里杙賊巢至本年正月獲林爽文計閲四十二日繼獲荘大田計閲三十二日自林爽文起事至臺灣全郡平定始末共閲一年三月是較之藍廷珍等成功更為迅速矣夫逆賊入内山生番非我臣僕性情不同語言不通其遵我軍令與否未可知也福康安示之以兵威使知畏給之以賞項使知懷其經畫周宻賢于施世驃藍廷珍逺甚又得海蘭察率百巴圖魯攻堅陷鋭遂得前後生獲二囚且李侍堯悉心董理軍儲毋悞行陣使不以李侍堯易常青之總督則軍儲必悞不以福康安易常青之将軍則成功必遲兹盡美盡善以成功於三月之間則上天之所以啟佑藐躬俾以望八之年而獲三捷之速則予所以深感昊慈豈言語之所能形容也哉自斯以後所願洗兵韜甲與民休息保泰持盈日慎一日以待歸政之年庶不遠矣雖然仔肩未卸必不敢以娛老自怠所為猶日孜孜仍初志耳御製四知書屋記楊震四知千古以為名言而予以為書屋之名者非襲其跡也彼其却王宻之賄亷則亷矣然而小哉為人君者亦無其事予之所謂四知者葢引孔子繫辭知微知彰知柔知剛之義内以正心外以勑政而更慎於用兵之際朱子䟽此以為釋豫六二爻義且文王繫卦則曰利建侯行師周公繫六二之爻則曰介于石不終日貞吉是三聖人之意胥示以明慎用兵見幾而作不俟終日之義可不審乎予昔著遲速之論雖約畧言之而未闡三聖人之訓行師貴知幾親切著明若是也葢微柔隂也彰剛陽也陽動而隂静動無不由静彰無不由微然而柔能制剛微能揜彰静能勝動此又聖人扶陽抑柔之本義正心勑政以及用兵者不可不深知所謂見幾而作不俟終日者宜何如其凛凛哉因思避暑山荘正殿後室皇祖題之為依清曠于楣間者實理事召見羣臣之所去嵗籌畫臺灣諸務日或三四覲軍機大臣於此兹幸賴天祐彰國威定海澨實因先事知幾得以有成不可不識其事且御筆祗題屋内楹間其餘檐實無額名因即以四知書屋之名額之檐間更思依清曠似寄山水之意無涉熈政詰戎之為而予則亦有説焉夫水澄然而清故明山廓然而曠故公公與明非熈政詰戎之本乎由知幾而推為四知又豈外清與明曠與公乎是則奎文三字非示萬世以熈政詰戎之大法乎則予題四知於書屋之檐不亦宜乎御製平定臺灣告成熱河文廟碑文昨記平定臺灣生擒二兇之事亦既舉平伊犁定回部收金川為三大事専文勒太學其次三為誅王倫翦蘇四十三洗田五以在内地懷慙弗薌其事而平定臺灣介其間固弗稱勒太學然較之内地之次三則以孤懸海外事經一年命重臣發勁兵三月之間擒二兇定全郡斯事體大訖不可以不紀因思熱河文廟雖承徳府學耶而余每至山荘必先展拜廟貌秋仲丁祭常遣大學士行禮則亦天子之庠序矣且予去嵗籌臺灣之事日於斯天祐予衷命福康安海蘭察率百巴圖魯以行及簡精兵近萬亦發于斯而諸臣涉重洋冐艱險屢戰屢勝不數月而生擒二兇且無一人受傷者是非上蒼黙佑海神助順曷克臻斯則予感謝之誠兢業之凛亦實有不能已於言者籌于斯發于斯臻于斯文廟咫尺我先師所以鑒而呵䕶者亦必在于斯記所謂受成告成正合于是地也則平定臺灣告成熱河文廟所為禮以義起非創實因且予更有深幸於衷而滋懼於懷者予以古稀望八之歳五十三年之間舉武功者凡六七胥善成其一惟征𬗟之事以其地卑濕瘴癘我軍染病者多因其謝罪求罷兵遂以振旅是其事究未成也近據雲南總督富綱奏報緬甸謝罪稱臣奉貢之事命送其使至熱河将以賜宴施惠是則此事又以善成於斯矣夫奉天治民百王誰不為天子而予以凉薄仰賴祖宗徳施受天地恩眷獨厚近八旬之天子蕆八事之武功於古誠希示後有述使一事尚留闕欠予之懷慚終不釋也自今以後益惟䖍鞏持盈與民休息敢更懷佳兵之念哉夫天地天子之父母也子於父母之恩不可言報中心感激弗知所云而已繫之辭曰瀛壖外郡閩嶠南區厥名臺灣古不入圖神禹所畧章亥所無本非扼要棄之海隅朱明之世始聞中國紅毛初據鄭氏旋得恃其險逺難窮兵力每為閩患訖無寧息皇祖一怒遂荒南東郡之縣之闢我提封一年三熟蔗薯収豐漸興學校頗晉生童始之畏途今之樂土大吏忽之恣其貪取臺灣逺隔重洋風濤冐涉其始陞調之員原以為畏途既以該郡物産豐饒頗獲厚利調任之員不以涉險為慮轉且視為樂土如近日福康安等㕘奏文職自道員以至㕔縣武職自總兵以至守備千總巡查口岸出入船隻于定例収取辦公飯食之外婪索陋規每年竟至盈千累萬而督撫大吏輒委之耳目難周不能詳查于是益無忌憚兹據𠫭奏不可不分别嚴加懲治以儆官邪而申國憲既嬉其文復恬其武匪今伊昔叛亂屢覩向辛丑年昨丙午載一貴爽文其亂為最地方文武既皆習于恬嬉則文員祗知飽慾壑豈復以撫字為心武員甚至縱兵離營牟利自總兵以下各衙門設立四項聼差名目多者三百人少者亦三十餘人存營之兵無幾又豈復以操練為事以致奸民既得藉口更無畏心煽誘愚民屢形叛亂其甚者如康熈辛丑年之朱一貴及昨丙午嵗之林爽文糾衆戕官據城僭號更為罪大惡極水陸提督發兵於外奈相觀望賊勢張大林爽文滋事之始水師提督黄仕簡陸路提督任承恩一同帶兵渡海謂可即時撲滅不意南北互相觀望遂致賊勢日益披猖天啟予衷更遣重臣百巴圖魯勇皆絶倫川湖黔粤精兵萬人水陸並進至海之濱上年正月雖燭于幾先命李侍堯代常青為總督而以常青為将軍専司征𠞰常青究未經行陣祗能保守府城不能奮加𠞰殺幸天牖予衷六月内即諭令福康安入覲熱河繼而常青亦請㫖令簡重臣來閩隨於八月初命福康安為将軍海蘭察為𠫭贊帶巴圖魯侍衛章京等百人並預調四川屯練二千廣西兵三千湖南兵二千貴州兵二千水陸並進以待福康安至彼領𠞰至海之濱崇武畧駐後兵到齊恬波徑渡一日千里以遲為速叶百舟齊至神佑之故福康安等至厦門于十月十一日自大擔門開舟連次遇風阻回復在崇武澳守候逾旬適四川屯練與廣西之兵踵至而風亦轉利遂于二十八日申刻放洋至二十九日申刻兵船共百餘隻齊抵鹿仔港千里洋靣一日而達其始似覺遲滯而既渡之後所向無前轉得迅蕆大功信非神靈佑助何以至是馳救諸羅羣賊蜂擁列陣以待不值賈勇如虎摶兔案角隴種頃刻解圍義民歡動維時賊匪久圍諸羅聞大兵既至亦蜂擁迎拒福康安海蘭察及巴圖魯等即日統兵前進𠞰殺無算立即解圍義民等無不歡忻踴躍出城迎師斗六之門為賊鎖鑰大里之杙更無巢落長驅掃蕩如風捲籜夜攜眷屬内山逃託斗六門為賊門户最為險要官兵乘鋭立抜隨即搗其大里杙巢穴林爽文膽落連夜攜其家屬逃至埔裏社埔尾一帶遂成釡底遊䰟矣生畨化外然亦人類怵之以威賚之以惠彼知畏懷賊竄無地遂以成擒爽文首繫先聞林爽文計窮即欲逃入内山而生畨徂獷未必能喻利害或将逆首蔵匿則難速蕆預命福康安既怵以威復賚以恵生畨等果即傾心効命協同官兵社丁人等竟于正月初四日在老衢﨑地方将林爽文生擒解京俾元惡不致漏網可知凡有血氣無不各知自為顧所以經理者得當否耳狼狽為奸留一弗可自北而南如上臨下叶海口遮羅山塗闗鎖遂縛大田畧無遺者叶林爽文逃入内山勢已成擒荘大田在鳯山一路窺伺府城慮其事急遁海而逸乃福康安悉心籌畫預令烏什哈達帶水師兵丁絶其去路而分巴圖魯等為六隊各自山梁挨次排下四靣合圍適值順風烏什哈達水師兵丁連檣而至沿海宻佈荘大田逃竄無路立即就擒并其頭目四十餘人無一脱者又殺賊衆二千餘名又有逃入柴城瑯嶠各畨社者三百餘人被生畨等立即擒獻伏誅於是賊匪一時殱戮殆盡合郡頓稱平定二人同心其利斷金曰福康安智超謀深曰海蘭察勇敢獨任三月成功勲揚古今既靖妖孽當安民庶善後事宜康安並付定十六條諸弊袪故永奠海疆光我王度此次臺灣用兵其始不能滅賊非盡由士卒怯懦之故亦由領兵者不得其人遂致稽延時日若福康安之智謀算無遺策海蘭察之勇敢所向披靡可謂一時無兩而又同心共濟以此士卒用命勢如破竹未及三月而大功告成洵能不負任使至于平定之後不可不亟籌善後之方以為永靖之計嗣據福康安奏定祛除積弊十六條俱能悉心籌酌切中肯綮已令大學士九卿議行以後地方文武實力遵守海疆庶可永慶安恬矣凡八武成䝉佑自天雖令耄耋敢弛愓乾如曰七徳實無一焉惟是敬勤勵以永年欽定平定臺灣紀畧卷首一欽定四庫全書欽定平定臺灣紀畧卷首二御製贊平定臺灣二十功臣像贊有序近著勦滅臺灣賊匪生擒林爽文紀事語以為伊犁回部金川三大事各有耑文王倫蘓四十三田五次三事不足薌其功若兹林爽文之勦滅介於六者間雖弗稱大事而亦不為小矣故其次三訖未紀勲圖像而兹福康安海蘭察等渡海搜山竟成偉勲靖海疆吁亦勞矣不可湮其功而弗識故於紫光閣紀勲圖像一如向三大事之為然究以一區海濵數月底績故減其百者為五十而朕親製賛五十者為二十餘命文臣擬撰一如上次之式夫用兵豈易事哉昔漢光武有云每一發兵頭鬚為白况予古稀望八之年鬚髩早半白而拓土開疆過光武逺甚更有何兾而為佳兵之舉誠以海疆民命不得不發師安靖所為乃應兵非佳兵也然亦因應兵非佳兵幸邀天助順而成功速此予所以感謝鴻貺不可以言語形容而又不能已於言者也昔人有言滿洲兵至萬横行天下無敵今朕所發巴圖魯侍衛章京等纔百人已足以當數千人之勇綠營兵雖多怯而無用兹精選屯練及貴州廣東湖廣兵得近萬人統而用之遂以掃巢穴縛逆首是緑營果無用哉亦在率而行之者為之埋根倡首有以鼓勵之耳若福康安未渡海以前臺灣綠營已共有四萬餘兵何以不能成功則以無率而行之者豈不然哉且臺灣一嵗三收蔗薯更富朕若微有量田加賦之意以致民變天必罪之不能如是成功速也後世子孫當一此意毋信浮論富國之言愛民薄斂明慎用兵庶其恒承天眷耳近日以宫商三百逐章饜飫其義竟如㓜年書室學詩之時然彼時但知讀其章句而今則究其義味因思采薇出車諸章乃上之勞下其義正斯為正雅祈父北山諸什乃下之怨上其義變斯為變雅夫上勞下可也下怨上不可也何則下之怨上固在下者不知忠義然亦必在上者有以致之斯則大不可也我滿洲舊風以不得捐軀國事死于牖下為恥其抱忠知義較祈父北山之怨上為何如是則綠營之多恇怯思家伊古有之無足多怪矣然為上者不可不存采薇出車之意更不可不知祈父北山之苦如其一概不知而但欲開疆擴土是誠佳兵黷武之為望其有成豈非北轅而適越乎故因為功臣圖賛而申其説如此以戒奕葉子孫並戒萬世之用兵者大學士一等誠謀英勇公阿桂勘外守中未恒亮功馳咨軍務志毎予同歸朝㐮賛剪逆除兇三登紫閣福厚功崇去歳在山荘籌辦臺灣軍務其時阿桂留京辦事七月又命往河工㑹辦堵築事宜是此次軍務阿桂並未辦理惟間有指示方畧諭令閲看覆奏每多意見相同及後報㨗之時阿桂甫得差竣回京是以一體予以議叙且以班次在前故列為功臣之首云大學士三等忠㐮伯和珅承訓書諭兼通清漢旁午軍書惟明且斷平薩拉爾亦曽督戰賜爵勵忠竟成國榦大學士王杰典學七閩肅正士風臺灣民俗頗悉心中山海險夷參畫具通有佐樽爼圖貌紀功協辦大學士吏部尚書陕甘總督一等嘉勇公福康安金川領兵已著偉名幾處封疆吏肅政成解圍擒逆能人不能崇封殊爵嘉爾忠誠領侍衛内大臣三等超勇公海蘭察勇弗知書謀勝智士匹馬彎弓賊不敢視欲致活口射勿令死進爵錫服言難盡美工部尚書福長安父兄及已胥國勲親英年習政其心孔純承㫖㕘議有見敬申忠良之報並得圖麟户部尚書董誥舊例軍務多用清文兹或用漢綠營海濵治以馬上亦頗効勤堪同福将閣上書勲閩浙總督李侍堯以恒入覲命往閩疆戰固老矣謀猷允長渡兵濟餉井井有方不誤軍儲其績孔臧兩廣總督一等輕車都尉孫士毅粤閩接境唇齒相依資鄰守已均合時機向任部員曽隨出師文武榦才超錫允宜福建巡撫徐嗣曽宣撫之任守土安民一應軍務責成督臣佐之賛之竭慮攄勤渡海籌疆亦可稱勲成都将軍法什尚阿巴圖魯雲騎尉鄂輝無前出力屯練之兵将軍鄂輝實率以行覆穴摧壘到處功成勇而有謀亶國之英䕶軍統領穆騰額巴圖魯雲騎尉舒亮金川之役已為領隊事定功成統軍歸内搜捕逸賊不遺醜輩生致逆渠其能不昧䕶軍統領沙爾瑪海巴圖魯三等奮勇男雲騎尉普尔普隨父入都甫十餘嵗既長能勇曉兵有制既救諸羅通路府際先登拔柵圖容兩逮福建水師提督健勇巴圖魯蔡攀龍臺灣戰将巨擘惟兹向嘉大紀乃被所欺上年因柴大紀在諸羅被圍日久曽諭令酌量如實不能支不妨保䕶義民全師而出另圖進取而柴大紀覆奏不忍将數萬生靈委之賊手仍督率兵民忍飢固守以待援應覽奏為之墮淚是以特沛殊恩封伊伯爵並賞銀一萬兩以示優眷嗣據福康安奏其為人狡詐予猶不忍以空言遽加之罪其後徳成自浙江差竣復命細詢之遂将伊居官聲名狼藉之處逐一面陳因命福康安李侍堯琅玕各據實查奏則其貪劣醸成逆案種種竟有確據且當賊匪起事之初柴大紀正值廵察彰化不即帯兵剿捕轉托稱派兵回郡及聞彰化失陷仍復觀望不前遲至數日始行以致逆匪蔓延其罪尤不可逭因即令革職拏問其水師提督員缺即以蔡攀龍調補盖前此未有人摘發其私予焉肯為逆詐億不信之見迨既經敗露則不得不明其賞罸以示勸懲是柴大紀之前後功罪予惟協於至公更無所容心於其間也賞罰各當弗濫弗遺惟明克允奉三無私福建陸路提督奮勇巴圖魯梁朝桂金川剿逆埋根進首鹽水恒瑞未免掣肘及防蔴豆禦賊堅守受創力戰嘉哉鮮偶浙江提督堅勇巴圖魯許世亨黔省之兵素稱勇敢率以赴軍半天衝險嬰之者斷當之者斬不愧丈夫一身是膽四川松潘鎮總兵奮圖禮巴圖魯穆克登阿斗六里杙排竹為城直斫而入大敗賊兵隴種鹿埵内山遁形搜擒首惡林林衆英四川建昌鎮總兵札敦巴巴圖魯張芝元金川隨征超熊羆旅兹領畨兵以通畨語賊属生縛賊路嚴禦卒獲生俘厥功允巨臺灣鎮總兵冲傑巴圖魯普吉保攻克笨港本有微功未解諸羅賊衆難通賈勇贖過奮不顧躬扼科仔坑逸賊路窮散秩大臣賛巴巴圖魯四川土守備穆塔爾金川降畨功難屈指兹領軍隊有進無止衆志成城妖氛净洗晉秩中朝同仁一視附後三十功臣像賛吉林副都統法福禮巴圖魯烏什哈達金川領隊不畏嶫岌領水師兵豈亦所習連檣海口合勢圍急大田就擒志堅功立署正白旗䝉古副都統布隴巴圖魯岱森保初至著績塩水港營移師南路爰靖海鯨率先鼓勇有将提兵牛荘罙入克壮軍聲江南狼山鎮總兵堅勇巴圖魯袁國璜夙習行陣兹督部隊志勇而堅望風賊潰偵蹤歴險遂搜山内分兵扼要是用嘉賚南澳鎮總兵誠勇巴圖魯張朝龍金川之役錫翎褒績載樹殊勲截途飛鏑抵菴古坑乘勝鷹擊奨勵有加悃忱倍激原副都統銜總管舒克丹巴圖魯特爾登徹索倫勁手箭無虚發躍馬突陣縱横倐忽視力窮追猛氣咆勃再炳丹青用旌偉伐副都統銜頭等侍衛呼嵩額巴圖魯博賓蝟集榛莽路截﨑嶇經一晝夜頓闢通衢突騎衝擊賈勇長驅全軍直達摧朽折枯廣東肇慶協副将庫爾庫巴圖魯官福隨征金川秩以功超兹率粤兵鼓鋭揚船所向披靡震電馳飈轉斾而南克水底竂頭等侍衛和隆武巴圖魯額爾登保中林効績健㨗過人星馳飛鏃操刺罕倫直前披擊衝壘奮身龍驤備衛是謂虎臣頭等侍衛費揚阿巴圖魯春寧惟爾祖父捐軀鍪鎧爾稍踰閑抑之有待鳳山禦賊不致蹈海功以盖愆勗哉嘉乃頭等侍衛佐領能登額巴圖魯穆爾塔努力行間奮殱賊黨轉戰益厲英資颯爽氣之所至已呑伏莽寵命執㦸國章懋賞健鋭營前鋒𠫭領斐靈阿巴圖魯賽崇阿闞如虓虎薄彼林叢賊燄既銷隊整羆熊守據險要豨突計窮痛加殱戮亦藉爾功䕶軍𠫭領錫林巴圖魯碩允保進兵救援弗避矢石䇿馬前驅千人辟易軍中著勇霜林逸翮克䕶軍威壯哉斯役䕶軍𠫭領喀爾春巴圖魯萬廷惟彼中林衝陣孔棘奪隘毁巢追奔逐北踔厲無前搜捕潜匿協奏膚功嘉兹勇力蘭州城守𠫭将果勇巴圖魯吳宗茂重圍既解勦大埔林尾追賊衆躬厯嶇嶔小半天山聳躍雲岑分軍繞後勢已成擒副前鋒𠫭領發拉薩台巴圖魯錫津泰賊非勍敵此怯彼張似兹勇戰果勁孰當馳禦南北迅復村荘有勲必録附載旂常副前鋒㕘領哲布鏗額巴圖魯彦津保菴古坑前跳梁竄逆破其危巢災其柴柵披堅斫陣驚心奪魄鶻入鵶羣罔不手搤吉林佐領噶爾薩巴圖魯五徳趫衝賊圍激厲勁屬鎗礟兼施烏合蝟縮踰越山梁飛梯著足表績宣勞為有功勗三等侍衛達春巴圖魯三音庫整隊疾馳殱兹草竊林落蠭屯連宵薙滅兵威震驚賊膽碎裂似兹猛士允副嘉悦三等侍衛什勒敏巴圖魯屯保箭斃鎗殪兵氣逺揚援師嘉義自元長荘鋪敦直入武人洸洸入險出險績著戎行三等侍衛竒成額巴圖魯哲克奮力宣威破圍奪路剪削羣兇㒺有脱兔雨集雲屯勢難負固矯矯虎臣賊人驚怖三等侍衛額爾克巴圖魯薩寧阿遇險出竒騰躍前進援壁扳林折衝蜂陣鯢目鯨身悉膺鎗刃敵愾効誠威名亦震三等侍衛額騰伊巴圖魯克陞額勤劬致果率克籬籓星夜馳逐至斗六門潜踪盡發殱戮無存聿彰勇鋭共受殊恩三等侍衛伯竒圖巴圖魯薩克丹布率衆攻堅奮擒獟悍毁柵截途殺賊無算火燄騰山力窮䑕竄潰彼蟻封資爾勇榦三等侍衛能登巴圖魯博綽諾克士皆用命奮勇同心路分南北追險入深虺除彗掃併力殱擒衝鋒陷陣氣幹堪任三等侍衛珠勒星額巴圖魯特勒登額戰酣易騎㒺分晝夜電閃火攻風馳逐射窮冦捕誅夔魈躪藉披覽軍書如聞叱咤三等侍衛揚桑阿巴圖魯巴彦泰遇賊累萬領隊爭先至大里杙力戰攻堅追躡宻箐縱躍峰巔壮心鋭氣突将堪傳三等侍衛瑚東阿巴圖魯定錫鼐力宣驃營威揚武畧入虎仔坑士氣倍作殱厥醜類收復村落奨勵維均聫標紫閣三等侍衛錫特洪阿巴圖魯阿哈保賊首窮蹙遁入内山搜捕殫力絶頂躋攀爽文就縛何有茅菅錫巴圖魯壮士増顔屯練二等侍衛多布蔵巴圖魯丹拜錫拉布才不擇地矧介胄士昔得勇名兹賞及子勸能酬庸不忘薇杞蕆事凱旋均昭錫祉屯練守備扎克布巴圖魯阿忠練習勇藝無堅弗摧逖矣西土亦自呈材海疆讋服衆武恢恢數符大衍邁彼雲臺欽定平定臺灣紀畧卷首二欽定四庫全書欽定平定臺灣紀畧卷首三御製詩一命免臺灣府本嵗正供詩以誌事本嵗葢嵗在丁未無端孽種聚苻萑刼掠村莊害及官福建臺灣逆匪林爽文等創立天地㑹名目煽誘匪徒謀為不軌刼掠村庄及知府孫景燧知縣俞峻等往捕轉被戕害當此光天化日之下聚衆猖獗不法已極不可不大加懲創以靖海疆不得已而用兵𠞰莫非勤以俾民安因思亂後閭閻困合令當前賦税寛據總督常青提督黄仕簡任承恩等先後奏報連次用礟擊殺逆匪甚衆並有義民鄉勇數千隨同𠞰殺甚屬可嘉除俟事定後自當從僾分别賞賚因念臺灣良善百姓當此逆匪肆擾之際驚懼逃避不免受其荼毒深堪憫憫因馳降諭㫖令將臺灣一府四屬今嵗錢糧槩免徴輸以示軫念良民至意徳化未臻寧靳澤一為南望一心寒迴蹕至圓明園作夜半濃雲佈晨凌細雨霏無何妬風作遂覺亂塵飛徒復成虚望惟慚勅萬㡬待郵兼待澤臺灣逆匪等因黄仕簡任承恩互相觀望以致首犯林爽文至今未獲已飭常青到彼督辦佇盼馳奏以慰懸念又連日雨意頗濃而每為風散盼望成虚亦為之不愜愁度徃和歸福建巡撫徐嗣曾奏春雨田功情形詩以誌慰臺灣有事討奸民臺灣逆匪林爽文等滋事不法屢經官兵斬獲而首惡尚未就擒前因黄仕簡任承恩觀望誤事令常青到彼相㡬督辦日来盼望馳報以慰厪懷未免發兵近自閩軍餉寜辭供内地田功最要利三春晴資麥壠卜登圃雨足稻塍起墾畇據徐嗣曾奏閩省去冬雨水調勻麥苖滋長開嵗以來據通省各属禀報自正月初四五六及十八九二十暨二十七八等日屢得春雨到處普霑二麥倍加暢發園蔬雜種無不茂盛現值東作方興更得及時翻犂播種閭閻安堵民情等語佇待飛章報擒逆閭閻安堵樂熈淳三月二十九日遣悶雜言九十春光減兩日今春正月三月俱小建侵尋速至三月盡明當首夏從頭數韶冶去付東流允嵗除前日雪優霑華滋景物殊常婉孟春猶稚仲春麗御園花事争妍𦂳我已畧厪望雨心肯以賞花間去聲民隐季春上中下之澣日甚一日旱象引昨看弄田麥苖緑及時嘉􅉈豐猶凖十日不雨恐無之難言大田已播畛御園内所種之麥田青翠可愛若十日内得有透雨尚可冀豐収至瀕河水田秧針已出則由於引水灌注之力不得謂大田已播望雨未殷也近每生雲隨散風嗟哉膏澤懼尚逺况經㨗信盼臺灣庸臣失律增懣憤臺灣逆匪林爽文等滋擾已逾三月餘尚未殱滅盡净黄仕簡任承恩二人觀望誤事之罪實無可逭已將伊二人革職治罪惟望常青速抵臺灣整頓兵力旗鼓一新刻日進𠞰蕆事耳雜言遣悶弗成章莫勝其慚辭亦窘致逺齋題句致逺題名久駐園理事處非闗攬景曠惟慎勑幾務適接閩中章𠞰匪悉真故按兵而不舉庸懦二人誤臺灣賊匪林爽文等紏衆不法黄仕簡任承恩帯兵𠞰捕日久未能殱滅蕆事朕料伊二人必有遷延觀望懦怯誤事之處已將伊二人革職治罪令常青過臺灣督辦兹據常青奏到黄仕簡安坐郡城並未親率官兵進𠞰又復調遺失宜任承恩駐守鹿港當賊匪林爽文回巢之際亦並不奮勇𠞰賊種種貽誤之咎果不出朕所料殊為憤懣先事遣重臣甫到攄謀慮整頓作士氣旗鼓新軍律叶可黄仕簡任承恩二人觀望逗㽞與賊以暇其罪實無逭幸而朕早已料及先令常青前往並授為將軍復以福州將軍恒瑞提督藍元枚為恭賛並諭揀𣲖福州駐防兵一千名帯領飛渡臺灣協同𠞰捕其失機之總兵郝壯猷即降㫖於軍前正法以激勵將士茲莭次據常青奏稱整頓現有兵力訓飭將弁并請添調廣東浙江兵七千名俱由鹿耳門進口不必再行分撥且俟兵到三四千之後即親自統領先將南路賊匪撲滅後再行自南而北務期迅速擒獲賊首平定海疆所辦皆合機宜佇盼㨗音以慰懸注易將更調兵埋根弗迴顧獨是海外遥風信難定遽亦惟盡我心籌畫勤寐寤聞㨗尚需時傍徨盼朝暮閲武徤鋭營兹駐今將四十年雖安不忘耳得力則誠然戊辰嵗於香山置健鋭營訓練八旗兵丁素稱精鋭從前平定凖夷回部大小金川屢經徴調實為得力詎獨驍騰㨗所嘉心意堅滿洲兵臨陣以退縮為恥不似緑營懦怯惡習往往有兵不顧將脱逃之事兹臺灣逆匪林爽文等糾衆不法調兵進𠞰乃因黄仕籣任承恩二人觀望誤事以致賊勢鴟張總兵郝壯猷所帯兵丁遇賊潰散退回郡城其畏葸失律罪無可逭若緑營弁兵俱能如八旗勁旅奮勇堅心埋根前進自當早獲渠魁撲滅蕆事矣閒因示戎詰亦以寓恩宣香山地逺京城健鋭營列五萃處無外誘習氣故能操練精熟每駐蹕此地必親臨閲視分别頒賞其中技勇超衆者加倍恩賚以示鼓勵實勝寺實勝寺建山之陽置健鋭營早有記乾隆戊辰夏用兵金川以彼恃碉之險攻久未克因憶敬觀者不列朝實録開國之初我旗人躡雲梯肉薄而登城可屈指數以此攻碉弗克因命於西山之陽設碉而簡佽飛之士習之未逾月得精其技者二千人命大學士公傳恒為經畧統之以行逮平定金川後即就碉傍舊寺易其名曰實勝昔我勝太宗破明兵十三萬於松山杏山之間歸而建實寺以紀勲兹防其例合成功之旅立為健鋭雲梯營並于寺之左右建屋居之詳見己巳嵗御製實勝寺碑記以遵家法宣國威實頼八旗兵子弟平定西域及金川無不成功慶如志自立健鋭營後所習雲梯馬歩射鳥鎗諸技訓練精熟趫㨗勇往嗣平定西陲及大小金川得其力居多何意海外邪教輩俾兩提臣誤軍事上年十一月臺灣逆匪林爽文等倡立邪教天地㑹滋事不法水陸兩路提督黄仕簡任承恩帯兵前徃𠞰捕不意伊二人互相觀望貽誤之罪實無可逭一南一北自株守與賊以暇賊生計緑營恇怯惡習成遇敵猖狂即退避以致蔓延恣梟張三月待久㨗未至黄仕簡頓兵郡城任承恩株守鹿港一南一北遷延不進與賊以暇致令蔓延竊發甚至總兵郝壯猷恇怯無能遇賊奔漬已經三月有餘尚未殱滅蕆事幸予慮早遣將臣一新旗鼓申軍律叶稍待調兵抵臺灣殱賊安民整吏治賊匪事起於去年冬至月黄仕簡任承恩既到臺灣候至彌月未見奏至攻剿情形即慮彼二人必至誤事幸早見及此命李侍堯為閩浙總督往辦軍需而令常青飛渡臺灣授為將軍督兵剿賊並將失律之郝壯猷于軍前正法以警將士常青到彼後查奏貽誤情形果不出朕所料其籌畫整頓兵力進剿諸務頗合機宜申明紀律旗鼓一新惟以現有之兵因黄仕簡等調遣失宜未免氣綏奏請添調廣東浙江兵七千名侯到有三四千名即先行帯領自南而北以期生致逆賊首犯其餘么䯢小醜無難一鼓殱戮浄盡綏靖海疆俾被難羣黎復安生業現在尚湏厚集兵力不得不少遲時日盼望捷音殊深縣厪此事總由用黄仕簡任承恩二人不當所致而誤用二人則朕之過實為慚憤耳用人之失我實當畧叙其詳不勝愧題含浮堂六韻别墅梵宫近堂為聖化寺别墅康熙年間所建堂額乃聖祖御書林深佳䕃攅經年來閲武香山之徤鋭營與茲所閲西頂之火噐營率經年一閲所以均賞賚校武藝遂為常例云便道憩傳餐兩字奎章仰千秋治法觀持盈誠不易返樸更云難庶政胥勤理軍書更細看今早於此傳膳辦事適接常青報到奏稱三月二十二二十三及二十六二十七等日逆匪竞敢率衆直逼郡城常青令逰擊蔡攀龍等領兵並率同義民奮勇擊殺先後殱戮甚衆並有賊目莊錫舍等悔罪投誠殺賊等語常青辦理甚合機宜此時消息已轉不難計日蕆事因加奬諭並授其子為三等侍衛賣恩賜玉佩囊等物前赴軍營者視以示優眷并允所請將蔡攀龍超陞副將又特賞給花翎其義民之陣亡者亦諭令照兵丁之例加倍賞恤盖行軍之道非信賞必罰不足以鼓勵戎行而每當接到軍書之際更不可不詳細閲看以定其功過也亦惟明賞罰敢不慎其端見㡬嘗讀繫辭傳見㡬曰君子設其俟終日毫釐謬千里馳驛易閩督徃臺灣經理上年冬至月臺灣逆匪林爽文等糾衆滋事黄仕簡任承恩帯兵前往𠞰捕莭次據奏分兵堵禦零星殺賊並不知埋根首進直搗賊巢予即慮伊二人必有互相觀望畏縮貽誤之事于正月初十日適李侍堯陛見來京即將伊調任閩浙總督馳赴福建辦理一切軍需事宜而令常青飛渡臺灣專畀以督率剿辦賊匪之任甫於到臺灣前一日事否鳯山得復失三千軍敗北叶稱常青于三月初九日到臺灣即奏總兵郝壯猷帯兵𠞰捕南路賊匪遇賊攻圍衝截官兵竟至潰㪚鳯山縣城已經収復旋又失守郝壯猷退回郡城所帯兵丁三千名潰曰者僅止七百餘名郝壮猷及敗殘兵於初八日陸績至郡城此總由黄仕簡安坐郡城調遣失宜郝壯猷不能督率奮勇以致敗衂其罪實無可逭并查叅黄仕簡任承恩二人一南一北株守遷延漫無籌盡種種誤事之處果不出朕先㡬所料因降㫖將郝壯猷於軍前即行正法以為玩悞退縮者戒其黄仕簡任承恩俱行拏問治罪即授常青為將軍令恒瑞藍元枚二人為恭賛俾事權歸一得以迅奏膚功賊勢益猖狂欲攻郡城邇設非常青至事不可知矣自鳯山復失後賊勢益為猖獗乗勢竟犯府城相距十里之外設非常青即時到彼則黄仕簡尚在彼以其老病昏懵一籌莫展必致為賊人所刦否則以身殉之尚復成何事體雖么䯢小醜終不難辦理蕆事但曠日持久臺郡地方良民為賊蹂躪益不可問矣幸藉老成臣鼓勵士氣起今日接飛章戕賊新壁壘賊黨悔罪投用以殺賊匪常青年逾七旬而精力勇往到臺灣後莭次所奏經理調度頗有方畧據稱南路賊匪攻擾郡城官兵義民等奮勇𠞰殺斬獲二千餘名經此畨大加截殺賊勢披靡郡城安固無事并有賊目莊錫舍帯領二千餘人悔罪投降常青恐其或有挾詐情事因令殺賊自效方准其降所辦持重甚合機宜一俟續調粤兵到日先即統率将南路賊匪掃浄合并直洗大里杙賊剿務將林爽文及賊目一併生擒以正刑誅覧奏顧為欣慰此時消息已轉㡬㑹甚佳自可計日告蕆迴思此事轉移之㡬實頼惟信上蒼黙佑俾予燭及事前早為調置得以無悞予賞必罰慎重嚴明仰承助順佇盼㨗音以靖海疆耳郡城得以安羣賊㪚披靡惟待調兵至賈勇賊巢洗迴思轉移間實頼見機耳見幾豈易哉昊貺䝉佑啓貞吉天助慎誠明傳合㫖繫辭下傳曰知㡬其神朱注以為釋豫六二爻義其爻曰介于石不終日貞吉朱注又以為其徳安静而堅確盖訓石之義引而未發也予則以為石喻不動乃訓誠也中庸曰誠則明明始能見㡬不動而誠則介石實為見幾之本若夫石之堅確不動似與不俟終日之速有􅘅然而不􅘅也㡬者動之㣲吉㓙之先見茍見㡬矣無以應之是謂失時則又予遲速論所謂兵事宜速之義然而不基以誠而出於明其失又可勝言哉由是觀之子思可謂知易矣向釋上傳第五章亦以為與中庸首章有相合者兹因賦見㡬之什故復闡其義而申論之永佑寺瞻禮用辛丒詩韻延薫致爽復來居延薰山館烟波致爽皆避署山莊三十六景中皇祖賜題也瞻拜穹樓例奉初仁顯憲承昭自昔徳明威畏愧惟予么䯢煽值猖而獗臺灣林爽文等本以么䯢邪教煽衆跳梁其始由黄仕簡任承恩互相觀望貽悞于前其繼又由郝壯猷不能奮勇督率官兵為賊衝潰而郝壯猷奔回郡城遂致鳯山得而復失於是賊勢益復猖獗僨事之咎二人實無可逭撻伐張籌速與徐幸余燭于㡬先命李侍堯為閩浙總督令常青為將軍飛渡臺灣督剿莭次奏到所辦俱合機宜此即余遲速論所謂兵事宜速之義辛丑甲辰跡畧似那辭勞重去聲治軍書辛丑甘肅撒拉爾畨回肆逆及甲辰新教逆回田五等糾衆滋擾俱在山莊駐蹕時籌治軍書茲臺灣逆匪首犯尚未就擒連日馳諭方畧與向二年跡畧相似予惟敬承皇祖皇考謨烈之昭垂徳威並用以期速蕆膚功豈敢復辭勞勩也遣悶十韻仕簡黄承恩任兩提督一南一北互盤旋上年十一月賊匪林爽文等肆逆黄仕簡任承恩過臺灣𠞰捕意謂么䯢小醜不難立時擒獲不意黄仕簡任承恩二人一南一北互相觀望遷延數月殊深憤懣與之暇乃賊生計乏出竒因軍久懸黄仕簡任承恩彼此觀望不思激勵將士出竒制勝轉與賊以暇俾得從容生計抗拒官軍曠日持久未及蕆功以致鳯山得而失鳯山於二月二十一日已經收復後賊匪復來侵擾而總兵郝壯猷恇怯無能敗回郡城兵丁潰㪚黄仕簡安坐郡城此南路之悞也徒稱鹿港守之専任承恩在路北即應整頓兵力自北而南合同黄仕簡設法擒捕賊首乃株守鹿仔港藉詞守禦此北路之悞也社敺烏合路梗塞港聚蜂屯野蔓延賊首未得即時就擒遂致黨匪得以肆出侵掠迫脅良民於是大肚社二林社蔴豆社大武壠社笨港鹽水港竹仔港東港等處賊勢蔓延南北通衢俱為梗塞僨事自應示明勅耆功爰更易英賢行軍之道貴於賞罰嚴明黄仕簡任承恩遷延誤事因令拏問解京治罪郝壯猷敗逃於迴郡亦即扵軍前正法明罰勅法不得不爾又幸予燭㡬先於新正即調李侍堯為閩浙總督馳往辦理軍需特授常青為將軍恒瑞藍元枚為恭賛飛渡臺灣督率増兵相機進𠞰請兵莫不速簡往常青扵三月初九日抵臺灣目擊賊匪猖獗勢湏厚集兵力莭次奏請添調官兵随令先後揀調廣東浙江福建駐防滿兵共四千名緑旗兵共一萬四千名不但如數調往且扵所請之外復添調漳州兵二千名廣東兵一千名分往常青藍元枚二處以冀尅期奏凱綏靖海疆盖責人以𠞰賊成功而不與之兵朕豈為之但逺隔重洋恐調遣需緩為之焦急底績惟期奏凱還西禦東防非上䇿掄精選鋭在䃺堅常青至臺灣後意欲廓清南路拏獲賊目莊大田再往北路㑹𠞰林爽文乃賊計狡黠見大兵俱在府城諸羅軍弱故作窺伺府城以牽綴官兵實欲攻逼諸羅而常青等西禦東防亦非善䇿因屢次申諭常青酌㽞將備兵丁堅守郡城竟當簡率精鋭直趨北路沿途剿殺打通斗六門一帯與柴大紀㑹聚其鹿仔港正令普吉保固守藍元枚帯兵亦自北而南與常青等合兵一處則兵力既厚軍聲益壯直攻大里杙為擒渠搗穴之計迨林爽文一經拏獲其餘賊黨無難立時殱滅矣軍機曉夜重籌畫驛牘海山遥望牽予因臺灣之事已經半載雖常青等屢得勝仗殺獲賊匪而大局尚未克定為之宵旰籌畫盼得捷音惟海道遥逺軍報不能速逹未免時切繨念耳要以安民蠲賦普臺灣自逆匪滋事後閭閻未免避賊遷徙有悞農功早於二月内即降㫖將臺灣府四屬本年應徴地丁錢糧普行蠲免用示軫䘏矣仍虞貴糴運糧連臺灣素稱産米之區漳衆各府向資接濟今年賊匪肆擾轉藉内地運送軍糧因念閩省必有貴糴之虞莭次降㫖令江南浙江江西四川運米九十餘萬石並據舒常姜晟籌辦湖北米十萬石陸續運送至閩俾民食益臻充裕糧價不至増昻任人予誤將誰諉紀實聊成遣悶篇出伊遜崖口至張三營行宫作伊遜平聲由進復由還伊遜河名即崖口是也鹿柴盖設於此半月風光眨眼間向暖面㸔迎緑樹經霜背指别蒼山恩頒獵騎都鳬藻每嵗獵罷出哨苐一程東道則於此張三營西道則於阿穆呼朗圖賜從獵之䝉古王公台吉等及所部兵丁等食并頒賞縀疋銀兩有差令其各歸所部稔穫農村鮮鵠顔日盼官軍殱逆㓂問郵午夜未心閒常青等𠞰捕臺灣逆匪林爽文等尚未蕆事來往木蘭半月餘日盼㨗音為之繾念不置迴蹕至避暑山莊即事有詠時蒐此復轉山莊景物深秋又異常潦盡溪波黄變緑霜濃林葉緑為黄雖云心志如前壯究覺馳驅遜昔强斯去斯來増愧處軍書籌畫旰宵忙諸羅圍解大紀柴復諸羅乃在春之首諸羅前被賊匪林爽文糾衆搶佔經柴大紀帯兵攻擊於正月二十二日由田洋進兵賊人閉城堅拒邱能成奮勇先登攻開城門我兵乗勢追趕入城賊人由北門而逸柴大紀入城安撫賊勢少却侵尋未掃穴翻被圍之久維時黄仕簡任承恩互相觀望不能督兵奮剿於是賊衆復合繼而常青等渡海之後奏請増調官兵亦未能决䇿制勝以致柴大紀被圍數月皆數人因循貽悞之咎也督飭速觧救降㫖頻煩有大斌魏率兵往半被賊所取時荘大田於南路牽綴官兵林爽文等専力環攻諸羅頻經降㫖催飭常青等統率大兵直趨北路救援乃常青祗令魏大斌帶兵一千五百名往救中途接戰不利轉傷官兵一千餘名不勝憤懣所嘉柴大紀勇而謀更富叶能聫軍民情同心為固守壯士奮戰鬬義民資糧糗以此佈大恩預免明年賦叶枋先是據柴大紀奏稱賊匪攻犯縣城並扛抬車圍攻西北兩門柴大紀督同官兵義民奮力𠞰殺設法堵禦用砲擊碎枋車數座打死賊人數百賊始退㪚迨後賊匪屢次圍攻柴大紀悉力捍禦得保無虞其時魏大斌所帯火藥銀糧被賊攔截不能前進城内紳耆舖民挑送飯米凉水以給軍營又有牌腹村義民亦運粮接濟該義民等踴躍急公圴屬可嘉春間業經降㫖將臺灣全郡本年錢粮蠲免因冄將五十三年分應徴錢粮預行豁免以示優奬茲因蔡攀龍𠞰進敗羣醜進而復出攻梗路資通透叶不似魏大斌入城増食口常青聞魏大斌失利之信復遣總兵蔡攀龍帯兵一千六百名由鹽水港往援兹接李侍堯奏據署臺灣府知府楊廷理禀報八月十七日蔡攀龍等到鹽水港於十九日領兵前進副將貴林逰擊楊起麟邱能成為頭隊蓁攀龍恭將孫全謀為二隊柴大紀亦帯兵接應入城軍威大振而蔡攀龍等於二十二日復自諸羅打出以通道路實属奮勇可嘉較之魏大斌既損折官兵大半所餘數百名兵入城一無所為不惟無濟諸羅而諸羅反増食口其功過正自昭如黑白矣諸羅之圍解焦愁釋心紐賞罰示勸懲惟公明以剖重臣將至彼百將掄雄﨣此次諸羅解圍在事出力諸人柴大紀捍禦有方謀畧素著蔡攀龍帶兵援應最為奮勇伊二人已擢用提督賞帯花翎特加賜玉韘佩囊用示恩眷其副将貴林即擢用總兵叅將孫全謀即擢用副將逰擊邱能成楊起麟俱擢用𠫭將並賞戴花翎一體恩賫至魏大斌畏怯無能即立予罷斥仍令在軍營効力贖罪如此賞罰公明將士等自必倍加感激奮勵現在令將軍福康安𠫭賛海蘭蔡帯領巴圖魯侍衛章京百餘人馳往蚶江飛渡至鹿仔港相機直搗賊巢今諸羅之圍已解先兆已佳即日福康安到彼統領大兵奮𠞰自當勢如破竹佇盼捷音馳到耳先兆已報佳大功成在後佇待縛二兇露布星飛走普吉保奏報収復笨港詩以誌慰向稱諸羅圍之解誰知隔海傳信訛官軍入城雖及半其餘仍被賊遮羅更惜捐軀兩勇弁為之扼腕興咨嗟柴大紀於春正克復諸羅後旋復被賊屢次圍攻常青等初次令魏大斌帶兵一千五百名前往救援中途接戰不利二次令總兵蔡攀龍副將貴林逰擊楊起麟等帯兵一千六百名往援乃官兵入城方僅及半而賊衆又復遮羅不得前進其時李侍堯據署臺灣府知府楊廷理禀報奏稱蔡攀龍等於八月十九日分起前進柴大紀接應入城蔡攀龍復自諸羅打出以通道路等語方為欣慰詎意竞属訛傳兹據普吉保奏収復笨港并稱副將貴林逰擊楊起麟已於彼時臨陣捐驅二人屢著戰績聞之更為憤惜因降㫖貴林即照總兵議邱楊起麟加一等照副將議卹以示垂軫加以海上八九月風􅰆不利無舟過一月有餘望信至旰宵焦急徒延睋自接常青等奏報後已一月有餘未得續奏日夜為之焦急盼望相傳海上風􅰆向來八九月不利即商旅船隻亦不能駕駛交十月後小陽春莭便可往來迅速矣茲值十月亥當律小陽春令迴陽和曉來驛章逓佳信普吉保報殱賊多焚燬賊莊獲賊械收復笨港安民家東諸羅西鹽水港近五十里非遥遐聲氣既通約期㑹三路進取賊巢窠普吉保奏九月初六日帯領官兵由大突溪前往笨港援應諸羅十一日行扺麥仔寮有賊數千在彼處苛𣲖銀米百姓正值驚惶無措聞官兵踵至歡聲動地賊衆奔逸普吉保分作三隊直前冲殺連次打死賊匪數百人生擒三人奪獲噐械米穀無筭并焚燒板頭厝等賊庄七處收復笨港安集良民現在又與恒瑞柴大紀訂期三路合攻該處東距諸羅僅二十里西距鹽水港僅三十里聲息宻邇又常青聞恒瑞在鹽水港被賊攔阻𣲖總兵梁朝桂副將謝廷𨕖帯兵一千名前徃䇿應恒瑞處原有兵三千并力㑹𠞰自當勢如破竹茲以重臣率勇將久經勲績凌烟磨待風縦覺遲數日新兵齊到翻為嘉前命福康安海蘭察帯領巴圖魯侍衛章京百餘人前往據李侍堯奏尚在大擔門候風渡洋雖覺少遲數日而新調之廣西兵三千已抵厦門其四川屯練二千貴州湖南兵四千亦接踵可到又鄭國卿所帶閩兵三千亦將次配渡統計生力兵萬人福康安帯此勁兵飛渡鹿仔港相幾㑹𠞰直搗賊巢掃穴擒渠一舉蕆事佇待㨗音之至以慰厪念聲勢既壯破賊膽不難靖逆揮天戈却以安民為要務叮嚀訓諭慎莫苛臺灣民人附賊本非甘心多因迫脅所致隨馳諭福康安到彼尤應將安分良民妥為撫慰安戢即已經從賊者亦應設法招徠分别辧理不可因其業已從賊概予殱除阻其自新之路堅其助逆之心也屈指兵至鹿仔港重新旗鼓殱么䯢耆定武功奠海澨七閩閉戸昇平歌水師提督柴大紀奏固守諸羅信至即加恩封為一等義勇伯詩以誌勸正月諸羅克復纔結營牆築更溝開柴大紀扵正月克復諸羅之時即相度形勢分兵劄營於縣城四門外要害之處迫六月杪賊勢猖獗遂環營開溝並堆築短墻安設大砲二十八尊以為禦賊之計營盤甚屬堅固是以賊衆叠次攻犯俱為官兵所敗旋聞夏杪賊猖獗竟敢城攻恣擊豗以少勝多筞其壯聫孤為衆志猶恢節次柴大紀奏稱逆賊林爽文紏象萬餘不分晝夜接連来犯營盤並將八奬溪用土石壅塞决水泛溢以阻援兵來路又用大板木車中藏鎗炮挽以四牛分路冲突俱為柴大紀設法抵禦令人挖通填溪之土放水順流並用大砲擊碎木車殺死賊匪無算皆由柴大紀調不度有方聨絡義民之心故能衆志成城以少勝多屹然動如此為國宣勞實為難得每於披閲來摺嘉奬之意真不可名言也義民勇士感誠䔍禦壘輸粮弗懈頽柴大紀激勵將士義民人皆感激思奮當諸羅被圍日久軍糈漸乏而魏大斌所帯火藥銀糧復被賊攔截不能前進城内外紳耆舖民挑送飯米凉水接濟軍營厯久弗懈甚為嘉軫有㫖相機計求别直陳固守志毋迴前因賊衆窺伺諸羅百計攻擾而常青先後所𣲖援之兵總未能即至惟恐柴大紀激於忠憤堅守與城俱亡之義固守勿出則反失一賢臣是以降㫖令其酌量情形如力有難支不妨率領官兵整隊而出并慮義民受賊戕害於心有所不忍諭令設法捍衛出城再圖進取乃柴大紀接奉此㫖覆奏縣城一切守禦久經佈置周宻且城内數萬生靈不忍委賊毒手立意堅守以待救援與予軫念義民多方愛䕶之意適相脗合批覧之下為之墮涙似此忍饑固守心志益堅惟知以國事民生為重雖古之名將何以加之析骸為㸑雖未至望眼已穿待援去聲來督飭進兵莫遲耳優頒加爵寔宜㢤據柴大紀奏諸羅情形兵民皆以花生地𤓰野菜充饑尚能忍餓堵殺賊匪柴大紀叠次移文將軍常青轉催恒瑞普吉保迅速救援而二人以鹽水港笨港地方𦂳要且虞後路無繼不可輕離為辭未念柴大紀待援甚急不可少緩因即馳諭普吉保令其速統大兵往救接濟粮餉鉛藥以保無虞柴大紀力捍危城忠肝義膽發於至性其在臺灣𠞰殺賊匪勞績㝡著即此守城一莭堅志不移尤為難得應加恩封一等義勇伯世襲罔替並賞銀一萬兩俟大功告竣後再行優加封賞所有諸羅義民員弁官兵激發忠義同心固守實堪嘉奬昨已降㫖將縣名改為嘉義再將五十四年閤縣地丁錢粮全行蠲免並令查明出力員弁咨部優叙其隨營兵丁賞給兩月錢糧以示奨勸現在福康安迅抵鹿仔港兵威壯盛士氣百倍自當即日破賊解圉擒𠞰首逆林爽文等共奏膚功以靖海疆而安黎庶耳臣等謹按柴大紀奉有率衆出城之㫖仍奏稱情愿死守嘉義以待大兵之至上為動容封以伯爵製詩嘉奬迨福康安解嘉義圍始聞固守事由義民非出大紀意宻陳其所奏多不實上猶心重大紀功勿竟其事及侍郎徳成使浙還始奏所聞大紀不法事下李侍堯琅玕察核遂盡發其貪縱廢弛狀命福康安審訊得實九卿請論如律奉㫖逮繫至京盖猶將緩其死也廷訊時復誣詆徳成在臺灣時捜求其事無所得冀以自觧而案無左騐上怒其狡詐始誅之臣等㳟讀御製賜大紀詩盖在初披死守嘉義之奏所謂不逆詐不億不信君子可欺以其方而其後以次敗露終伏厥辜也又所謂國人皆曰可殺然後察之見可殺焉然後殺之者乎臣等益仰見我皇上聖度如天而人臣之㒺上不忠即邀倖欺飾於一時非但衆論有所不容鬼神亦將隂奪其魄也冬至南郊禮成述事陽迴黍谷值生寅是日寅正一刻十四分冬至亞嵗天恩惠在人五十二畨欽陟降自乾南郊太祀典禮至重隆元年至今五十二年每嵗必躬親行禮以昭誠敬六旬初願矢躬親予自即位之初籲天矢願如得䝉年佑至乾隆六十年即當歸政然自今數至乾隆六十雖祗餘八年而予乃自七十八以至八十五也心不敢懈力之能與不能仍冀上蒼垂佑耳璧呈青篚循周典律應黄鍾奏夏鈞時值官軍平海㓂福康安海蘭察率巴圖魯侍衛章京等統領各路大兵萬餘人於前月二十八日渡海計此時已早抵諸羅一帯大加音勦戮賊匪益籲上蒼鴻禧眷祐速蕆大功速聞㨗兾垂鴻佑㨗聞頻福康安奏大𠞰諸賊開通諸羅並進攻斗六門賊勢潰㪚信至詩以誌慰因改賜諸羅縣名為嘉義用旌士民守城之善笨港雖攻取諸羅仍艱進前據李侍堯奏據臺灣府知府楊廷理稟報蔡攀龍等于八月中旬將諸羅道路打通之信不意竟属傳訛嗣據普吉保奏九月十三日收復笨港與恒瑞訂期前進旋以後路無繼不敢輕離為辭不知救兵如救火豈可少緩湏㬰乃柴大紀忍饑待援而普吉保等懦怯無能仍未能直抵諸羅殺賊觧圍幸早續發兵重臣威名震勇將選以百新兵强夙振渡海雖遲日以遲翻成迅幸予燭於㡬先於八月即命福康安海蘭察等帯同巴圖魯侍衛等百餘人前徃又調四川屯練及貴州廣西湖南等省精鋭之兵䟎行前進福康安於十月十一日自大擔門開船被風打回十四日得風駛行半日風色又轉復在崇武澳停泊候風似覺稽滯然當此候風之際四川屯練兵二千及廣西兵三千先後到彼風色轉順遂于二十八日申刻放洋至二十九日申刻所有兵船齊抵鹿仔港千里洋面一㠶即逹為從來渡海罕有之事此實仰頼上天賜惠海神靈佑而福康安帯此新兵乗鋭長驅即舊存兵丁及義民等亦有所倚恃踴躍争先是渡海雖遲而事機轉為迅速也齊力遂渡海一日風資順進由鹿仔港三日倐臨陣大克崙仔頂一當百以奮蔗田及草寮蹂躪率稱盡叶即解諸羅圍資賊糧胥運兹據福康安奏十月初六日與海蘭察等帯兵赴援凡遇賊庄即行𠞰洗初八日黎明行扺崙仔頂賊匿多人潜伏竹圍施放鎗砲一齊擁出官兵屹立不動衝入賊中所向披靡及崙仔尾等各庄賊匪前来抗拒福康安預令扼其左右要路並焚斫竹圍蔗田及各處草尞繼進至牛椆山地方賊匪阻溪自固屯劄山梁待官兵將至四面圍裹不下萬餘海蘭察等直越溪河衢過賊陣𠞰殺無算官兵無不一以當百於是賊匪紛紛逃竄福康安等即於酉刻入城城中義民争先出迎歡聲動地福康安入城慰諭並將賊庄所存粮石令民人儘數搬運米價頓减數倍民情無不歡慶勞軍及義民懽呼逭饑饉全活數萬命旌功恩不吝彰善樹風聲嘉義名新晉諸羅被圍日久饑困情形深堪憫惻福康安海蘭察等不俟貴州湖廣之兵到齊即先鼓勇罙入立觧重圍城中數萬生靈藉以全活因改賜諸羅縣名為嘉義以旌士民此皆由調度有方振作士氣用能克敵致勝自宜厚加寵錫福康安海蘭察俱即晉封公爵各賞紅寳石㡌頂四團龍補掛以示優異其鄂輝舒亮普爾普等及巴圖魯侍衛章京與在事出力之將弁等並令查明咨部從優議叙至此次大加痛𠞰賊人胆落已成破竹之勢福康安等隨即籌至斗六門一帯擒獲首逆林爽文等迅奏㨗書慰予盼望不難指日以俟耳籌攻斗六門破竹應觧刄佇𠞰大理杙賊首生擒訊指日以俟之速逓大㨗信降㫖豁免臺灣應徴兵穀詩以誌事臺灣經賊燹正供免兩嵗春間廑念臺灣良民因逆匪之擾未免有誤耕作九月復據柴大紀奏諸羅義民踴躍急公情形先後命将臺灣全郡本年及明年應徴錢粮槩免正輸至諸羅百姓激厲忠義同心固守降㫖將縣名改為嘉義並將五十四年闔縣錢糧亦行蠲免用示奬勸兵穀繫軍糈弗免乃恒例督撫廑民艱今朝奏章至不敢竟乞免帯徴四年計嗟嗟無辜民沙蟲苦受偹兹幸功近成庶得耕耘遂兹據李侍堯等奏請將臺灣各嵗本年應徴兵穀及耗羡租税銀米分作四年帯徴等語目下福康安等帯領大兵已扺諸羅沿路𠞰殺賊衆潰散旋往斗六門一帯捜捕逆首大功不日告成然地方被賊蹂躪之後艱苦備至來春方事南畆安有盖藏因加恩將該郡四屬應徴兵穀十九萬九百餘石及耗羡租税銀六萬九千餘両粟一千八百餘石全行寛免俾民漸獲蘇息以副惠爱被難編氓有加無已至意忍令帯徴糓其糓何由致概命豁免之明嵗資蘇息叶兾漸元氣復南望饒憐意福康安奏報攻克斗六門詩以誌事斗六門攻克今朝至㨗音遲聞因海上兹據福康安奏十一月二十一日與海蘭察等分據大埔林中林大埔尾三庄沿途殺賊六七百名鎗斃騎馬賊目千餘人將噐械馬匹全行奪獲直攻開斗六門即日已進搗賊巢惟其摺遲至月餘始到是此時擒獲賊匪佳音想亦在途總以海上風信不常不能速至也别信逼山隂又據李侍堯奏探聞官兵已攻破大里杙賊匪逃入内山生番等禀稱願将林爽文擒獲獻出等語百戰雄皆勝諸臣嘉不禁福康安海蘭察鄂輝恒瑞普吉保袁國璜等此次奪㨿石卡奮勇𠞰殺百戰皆勝甚屬可嘉已先行交部議叙至普爾普打通府城道路及分外出力之侍衛章京並鎮將官弁等除賞給巴圖魯名號及陞等賞翎各員外凡在事出力之員弁令一併查明咨部議叙所有打仗出力之兵丁亦令酌量分别賞給錢糧以示嘉奬東南望翹企實報首兇擒福康安奏報攻克大里杙賊巢詩以誌事斗六門既取直前扺賊巢躍溪飛馬渡掃穴短兵交福康安等奏官兵於十一月二十一日攻克斗六門之後次日即檄調埔心二林舊存之兵移駐水沙連山口一面向大里杙進發因大里杙東倚大山南繞溪河水勢甚深福康安等馳馬先渡賊匪乗官兵尚未到齊自城内擁出萬餘人三面圍裏捨命前撲巴圖魯等鎗箭如雨四川屯練及廣東廣西兵丁亦即争先渉水攪殺一處斃賊甚多天色昏暮於溪邊整齊行隊以待移時果有賊匪來攻擾官兵屹立不動鎗炮大震賊匪旋即敗走逾刻又沿溪來撲如此徃返五