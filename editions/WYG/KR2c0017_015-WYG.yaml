  text: 欽定四庫全書欽定平定臺灣紀略巻十五
  hash: sha256:2f4fcbd1573c72a898af7d3f4126aeb644008c000af138b573b3aca59690dd68
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_015-1a, image: WYG0363/WYG0363-0163a.png}
body:
  text: 四月二十七日甲子常青奏言近因鳯山復䧟約潰散兵二千名遺失鳥鎗一千有零砲五十門賊益肆無忌憚時有來犯府城之信臣查府城西臨海口出入自可嚴防其小南門外之桶盤棧大東門外之草店尾大北門外之柴頭港俱屬衝要派有遊擊蔡攀龍孫全謀黄象新等各帶兵七八百名分劄營盤相機堵剿三月二十二二十三等日有賊三四千人分路來攻各門營盤臣親率官兵出城堵殺將弁用命義民爭先鎗砲打死賊三四百人生擒魏彩王正二名即在軍前斬梟并奪獲旗鎗刀牌三十餘件至二十六日賊衆五六千人直撲府城東南二門恭將特克什布遊擊蔡攀龍孫全謀等督兵勇戰自辰至未鎗砲打死五六百人割獻首級髪辮奪獲九節砲一位是日晚據臺灣道永福知府楊廷樺同禀有賊目莊錫舍係泉州人宻遣親丁莊登來郡悔罪投誠訊據莊登供稱莊錫舍委係莊大田廹脅欲將全家殺害無奈曲從二十七日逆首莊大田等帶賊匪萬餘人四面來攻府城其中能打仗者不過一半現派莊錫舍攻大南門莊錫舍早已堅意投順故呌我先來投信現在莊錫舍帶有二千餘人俱愿投降明日臨陣不敢與官兵抗拒莊錫舍親入投誠等語臣初到臺灣即聞南路賊目有莊大田莊錫舍等姓名今據道府等所訊莊登供詞恐忽來投首誆騙入城以作内應之詭計諭令莊錫舍殺賊自効方准投降二十七日辰刻賊果圍攻各門營盤併小東門約有八九千人恭將特克什布遊擊蔡攀龍同知楊理等出力截殺時莊錫舍在大南門一路盡令衆人棄械安頓城外單身入城來降該道府諭以大義莊錫舍掽頭涕零情詞懇切臣觀其降出至誠諭令如果實心投首即應帶手下人一同殺賊方見誠心投順是日莊大田攻小南門桶盤棧營盤莊錫舍隨同蔡攀龍特克什布楊廷理隊伍果能奮力勇往殺賊衆數十人賊見莊錫舍反戈横擊即時閧亂官兵乗機施放鎗砲直至申刻賊衆敗逃莊錫舍隨即禀明帶領手下人等飛往竹滬等處截殺莊大田等併招集泉州義民見功即行飛報是日鎗砲約計打死賊匪六七百人割獻首級三十一顆耳記二十五個髪辮四十二個奪獲鎗刀牌箭一百餘件二十八二十九四月初一等日各門營盤尚有賊來攻犯俱被官兵義勇協力剿殺又經鎗砲打死賊二三百人生擒賊夥謝讓陳榮陳爾三名亦即在軍前正法賊衆盡皆敗逃查連日打仗其有功之官弁兵民立即奬賞記功惟遊擊孫全謀微受砲傷已經醫治平復遊擊邱維揚中砲子陣亡又陣亡把總余壽王澤髙二員陣亡兵丁一百餘名受傷者一百餘名以及傷亡義勇人等均俟查明賞恤照例辦理再臣前因臺灣急需添兵䇿應恐内地各營之兵未能速到是以就近檄調澎湖兵四百名厦門水師兵六百名兹接督臣李侍堯札稱已調廣東省兵四千名由厦門配船飛渡俟一到臺灣仍令澎湖厦門兵各回本汛奏入上命軍機大臣傳諭常青李侍堯曰賊目莊錫舍悔罪投誠帶領所屬二千餘人隨同官兵殺退賊匪並飛往竹滬等處截殺莊大田等招集泉州義民立功贖罪自係真心投順著常青即賞守備職銜其屬下人等有奮勇出力者並酌量分别給予千把總外委職銜以示鼔勵而廣招徠匪徒甘心從逆原不過希圖偽職今見伊夥黨投順者即有頂帶之榮自必聞風嚮慕悔罪輸誠即籍𨽻漳州者亦未必始終附賊似亦臨事行權解散賊黨之一法並著常青明白曉諭莊錫舍等果能奮勉出力將賊首林爽文及有名賊目擒獻必大加恩擢優賞較大職銜如此愷切諭知伊等自必鼓舞踴躍或能擒獻首惡亦未可定再前據李侍堯奏續調粤兵四千名全由厦門配渡齊赴府城此時自已陸續到齊昨據恒瑞奏駐防滿兵均已分起配渡起程想必指日可到常青即可親自率領將南路賊匪掃除即統率大兵往北路㑹剿直搗賊窠務將賊首林爽文生擒解京審辦餘黨殱除净盡至鳯山復䧟後遺失鳥鎗砲位甚多皆由郝壯猷失機僨事前已有㫖將伊於臺灣正法諒常青此時自已接到遵㫖辦理矣至柴大紀駐劄諸羅屢有勝仗戰守得宜前已有㫖令伊署理陸路提督如果始終奮勉俟剿賊事竣常青查明據實奏到朕必加恩擢用其餘有功出力人員均著常青查明註冊俟事定後分别奬擢再常青自三月二十一日發摺後直至四月初三日始將堵殺賊匪情形具奏固因籌畫調度督兵臨陣刻無寜晷但朕盼望信息宵旰焦勞無時或釋嗣後常青當仰體朕懐於督兵攻剿時務將該處情形於十日之期隨時奏報同日常青又奏言澎湖水師右營遊擊蔡攀龍於上年冬間帶領澎湖兵丁渡海應援適賊匪圍攻郡城該員督率弁兵奮勇截殺保䕶無虞厯經打仗無不身先士卒且能審度機宜弁兵用命義民悦服是以屢次均獲勝仗殱賊甚多洵屬功績最著之員以之陞補北路協副將實於地方營伍有益仰懇逾格擢用以示奬勵再臺灣各路拿獲賊匪應行解京之犯業飭道府等派委員弁押解内地聼督臣李侍堯審明起解其餘各犯經臣在臺灣府城並柴大紀在諸羅縣訊非賊首賊目亦無授有偽職等情事俱於各該處正法梟示又據義民等掲繳偽示二張恭呈御覽再臺灣府城義民鄉勇自上年十二月以來原經臺灣道永福募僱三千名近經知府楊廷樺新募千餘名又有城内泉州五大街居民自願挑選壯丁千餘名裹糧協助以上新舊義民約五六千名隨同官兵晝夜防範賊來迎戰實屬可嘉連日殺賊見功者頗多亦有臨陣傷亡者均即分别記功賞䘏並先註冊俟事竣查辦又查臺防同知楊廷理協同保䕶郡城並親帶義民勇往剿捕實屬得力人員亦先予記功註冊現在南路賊匪經此畨截殺勢漸消退北路諸羅縣城有柴大紀駐劄屢有勝仗戰守得宜彰化淡水一帶臣已宻札總兵普吉保副將格綳額等留心堵剿惟因兵力稍單是以尚未得有與柴大紀夾攻㨗報臣一俟添調官兵到日掃平南路俾肘腋無患即統率大兵前往諸羅等處各賊窠合兵㑹剿奏入上命軍機大臣傳諭常青李侍堯曰莊錫舍悔罪投誠常青恐其挾詐誆諞入城或有内應情事先令殺賊自効方准投降所辦持重甚合機宜已降㫖賞給莊錫舍守備職銜其餘賊目酌量賞給千把總外委職銜令其隨營効用並著常青曉諭賊衆如能誠心投順擒獻賊匪頭目者即照莊錫舍之例分别擢用倘更能擒獻首逆林爽文自必另加優擢顯職投出賊人亦須先令打仗殺賊騐其誠詐方可受降如此辦理始足以堅投誠向化之心而賊黨益可離散但細思臺灣民情慓悍反側不常此時進剿之際兵不厭詐固宜示以優異設法招徠將來事定後如莊錫舍等究不可留於該處又致故智復萌别滋事端著常青李侍堯俟辦理善後事宜酌量將莊錫舍等投誠賞職之人酌調内地别省各營備弁其所帶降人亦令陸續渡回内地分别他省安挿為是但此時且勿稍露端倪致賊黨聞之轉足堅其負固死守之心該督等接奉此㫖宻為存記遵照辦理惟當慎之又慎也臣等謹案賊目莊錫舍悔罪投誠此即賊黨解散之機我皇上不究其從賊之罪即賞以守備職銜并其屬下人等亦擇其出力者酌給以千把總外委等銜重賞出其意外踴躍感奮自倍尋常且足以廣招徠之路而又宻諭將來調往内地别省以杜後慮而靖人心時措咸宜之妙用豈淺見所能窺測乎上又諭内閣曰此次賊匪有侵犯府城之信常青預先設法防堵於桶盤棧等衝要地方預派令遊擊蔡攀龍等各帶兵分劄營盤相機堵剿籌畫調度俱合機宜逮賊匪分路攻犯府門常青率官兵鄉勇迎捕截殺斬獲甚多常青年逾七旬尚能如此勇往督戰朕心深為嘉奬伊係年老之人宣力海疆無親子在旁侍奉殊堪繫念著將伊子刑部筆帖式希明賞給三等侍衛馳驛前往臺灣省視並將賞給常青之御用玉搬指等件即著伊子帶往以示優眷常青感激朕恩益思奮勇迅能剿除賊匪永靖海疆朕必格外加恩也至遊擊蔡攀龍前據孫士毅奏稱聞伊帶兵打仗頗為賊匪所畏今據常青奏稱該遊擊於防守郡城厯經打仗無不身先士卒且能審度機宜弁兵用命義民悦服是以屢次均獲勝仗殱賊甚多甚屬奮勇出力宜加恩擢蔡攀龍著照常青所請即超補臺灣北路協副將仍加賞戴花翎若再能感激奮勇打㐲俟續有總兵缺出常青即奏請陞補以示奬勵其陣亡遊擊邱維揚把總余壽王澤髙及陣亡受傷各兵丁均查明照陣亡例賞卹至鄉勇義民隨同官兵晝夜防範為國家禦賊實屬可嘉其殺賊立功者應遵照前㫖㧞補千總實缺其陣亡受傷者均著照兵丁之例加倍卹賞以示鼓勵此事總由黄仕簡任承恩二人互相觀望以致各鎮將效尤玩悮久稽蕆事幸而朕及早料及預令常青前往臺灣督辦得以及時整頓並將失䧟城池私自回至郡城之總兵郝壯猷正法如此賞罰嚴明自必壁壘一新士氣振奮所有添調各處官兵日内諒已陸續到齊軍威壯盛料此么䯢草竊無難一鼓殱擒膚功迅奏二十九日丙寅李侍堯奏言三月二十日接常青來札知臺灣急需兵接濟但查閩省營兵甚少又將弁多已出征惟有增調浙兵以資接濟即於三月二十二日奏請増調浙兵四千一面知㑹琅玕陳大用迅速料理起程在案兹接奉諭㫖應即令浙兵停止但浙兵先起程者已陸續入閩若行文停止再回本省延建各營調撥轉致緩不及事至漳泉一帶現在情形不特洋面盗案頻聞而臺灣到米日少糧價驟貴人情輕慓已有結夥搶刼械鬪之案臣正在查辦並另籌平糶等事不可不量留官兵以備緩急苐現奉諭㫖增調本省駐防滿兵一千則浙兵四千殊覺過多臣一面知㑹浙撫提臣將在途之陸路兵一千名及水師兵已起程者亦約有二千名令其催䟎前來尚有未起程者即行截留一千名不必前進至滿兵一千恒瑞自即星速挑選臣一面知㑹徐嗣曾就近料理起程計月内俱可到泉州惟常青所奏增調官兵齊赴府城之處臣再四思維現在粤兵到府城者已有二千五百名其續至之一千五百名亦已登舟不日可到是府城兵已不少現據柴大紀咨稱前月二十九日逆匪林爽文率領大隊賊夥來攻諸羅柴大紀力戰竟日始行退去鹿仔港正近賊巢不能必其不來滋擾則普吉保兵力殊覺單薄可慮臣扵浙兵到泉州時仍先撥二千由蚶江配渡前往不惟足資堵禦兼可先行攻剿以牽掣賊勢其滿兵一千及後到之浙兵一千仍由厦門前赴府城則常青處已有新兵六千加以舊有之兵幾及滿萬已足敷用可將南路賊匪迅速掃除而北路先有重兵在彼攻剿迨常青向北夾攻時更易於搗破賊巢擒捕逆首再臣自厦門回至泉州後風聞漳浦平和一帶有奸匪滋事之信隨宻札提臣藍元枚以巡查口岸為名就近訪察本月十四日接提臣札稱三月中有呉姓林姓械鬪傷斃數命本月初四五等日又有浮山社民許朴許忽許潛等糾集匪黨多人移尸各村藉端搶奪等因查此事地方文武官俱未申報提臣到彼始行訪出除嚴飭各該員弁上𦂳查拿並取諱匿不報各職名恭奏外已札提臣在彼酌量情形宻拿妥辦至常青處現有恒瑞前往叅贊兼之陸廷柱梁朝桂等大員亦多似足供驅䇿今内地尤屬𦂳要臣謹札知提臣暫留漳浦如此案可以不動聲色即行竣事則仍令其速赴臺灣倘稍需時日臣即一面前往督辦并懇提臣留於該處商酌調度較為得力再先據臺灣道府等禀稱鹿仔港一帶難民咸來避匿不下十萬餘人請撥米十萬石銀十萬兩照灾賑例賑卹等因臣以臺灣逺隔重洋碾運維艱亦恐支用浮濫如果事在必需應就近禀請常青察核咨覆到日辦理是以駁飭但賊匪肆擾各路村庄俱遭焚搶農民不能耕種鹿仔港一帶較為寜謐咸來避匿臣於往來船户細加訪詢其中竟有嗷嗷待哺亟須撫卹者若不速籌調劑轉恐無以仰副愛民如傷之盛心查閩地民人向食畨薯其切片成乾者一斤可抵數斤加米煮粥即可度日隨飛飭司道先在泉州採買一萬斤撥米二千石委員運解鹿仔港交與地方官務查實在貧難男婦照依灾賑粥厰之例設厰煮粥散食仍在於上游延建一帶産有畨薯地方再採買數萬斤酌配米石陸續運往接濟如此量為調劑不日剿匪事竣難民復業耕種自可不致失所奏入上命軍機大臣傳諭常青李侍堯藍元枚琅玕何裕城曰前於初四日接到常青添調浙兵之奏朕因浙兵向來柔懦不若福建駐防兵較為得力是以降㫖將浙兵停止派撥令恒瑞於駐防滿營内挑選一千名親身統領其福建續調之緑營兵二千名即令藍元枚統領赴剿次日復據李侍堯奏到閩省各營存兵無幾未便再撥請於浙省兵協調四千名隨經降㫖令琅玕陳大用於温衢等鎮揀派兵三千名赴閩合之閩省駐防兵一千名以足原調四千名之數嗣又據琅玕奏所調浙兵業將提標及鎮海營兵停其調派其温衢黄巖鎮兵三千名業已起身又據陳大用奏停派之提標鎮海營兵俱已在途現令將備緩行候㫖各等語朕以征剿賊匪及分防要隘需用兵丁甚多不妨多多益善因降㫖令琅玕等所有此項兵一千名倘已行入閩境即令前赴厦門交與李侍堯酌量派撥不必拘泥迴䕶是浙兵現已陸續赴閩李侍堯發摺時未經接奉續降諭㫖致有此奏耳現在浙兵已到閩李侍堯奏請先撥二千名前往鹿仔港其閩省滿兵一千及後到之浙兵一千仍由厦門前赴府城之處俱屬妥協至前據李侍堯奏臺灣道府稟請撥銀十萬兩米十萬石該督恐支用浮濫駁飭不准之處所見錯謬已經降㫖詳悉飭諭今李侍堯以鹿仔港難民嗷嗷待哺酌籌調劑事宜是李侍堯知過能改並不稍存迴䕶惟不及朕先見之速耳所奏採買畨薯一萬斤並撥米二千石為數無多恐不敷用著該督酌量情形多為預備陸續採辦運往以資口食設有不敷即再酌撥銀米速行不可仍前惜費致悞事機也現在兵數陸續加增鄉勇義民人數亦衆皆需按日支給口食現又有投順者二千餘人以及無食難民待哺情殷均不可不量給養贍自應寛裕接濟前已有㫖令該督將該道府等所請銀米如數解運並令琅玕一體籌辦撥米十餘萬石由乍浦海運至閩今思江西素稱産米之鄉且與閩省接壤著何裕城將該省倉榖即行碾米十餘萬石派員迅速運往福建應由何路運往及閩省由何處接收方為妥便之處並著何裕城札商李侍堯妥協酌量一面辦理一面奏聞其動撥倉榖於秋收後再行買補還倉至浙省現在撥運米十餘萬石如尚可設法購辦並著琅玕察看情形妥為籌畫一面咨㑹李侍堯陸續運往一面具奏俾兵糧民食均資寛裕再臺灣向來一嵗三熟是以産米甚饒足敷内地民食今林爽文等滋事不法民皆失業農未歸耕以致米無所出常青於所過地方務須督令該道府等妥為安輯詳悉曉諭該處百姓於收復處所即令其先行儘力補種仍可有收即不能接濟内地於本處民食亦屬有益藍元枚前有㫖授為叅贊令其前赴鹿仔港督兵㑹剿該處現在只有普吉保一人在彼且正近賊巢最闗𦂳要其漳浦匪徒現在如已辦竣固屬甚善倘尚須時日即著李侍堯前赴漳浦督辦自無難迅就弋獲此時當以剿捕臺灣賊匪為重藍元枚自當迅赴鹿仔港無庸在漳浦留滯也臣等謹案督臣李侍尭訪知難民嗷嗷待哺情形即撥米與畨薯運往足資賑卹之用我皇上猶慮不敷所需預令陸續解運深以惜費為戒恫癏在抱愛䕶之殷有加無已又以現在添兵并鄉勇等皆須支給口食復傳諭江西省亦撥米協濟並令浙江再為設法購辦睿算精詳無不燭照數計故軍糈民食先時籌備悉寛裕有餘也五月初一日丁夘李侍堯奏言現在浙兵由浦城入閩者係衢州鎮兵一千名由福寜入閩者係温州黄巖二鎮兵二千名適符諭㫖酌留温衢兵之數尚不致浮多惟浙兵留閩協防仍挑閩兵進剿之處查閩兵在臺灣澎湖駐防既調用一萬二千上年又調一萬一千前往征剿内地營兵實已無多此時零星攅凑兵力轉覺碎薄且領兵將弁益不敷用至常青到臺灣後所指調之金門銅山等營兵二千縁尚未得先調粤兵之信但取其地近厦門易於調集其實此等營分存兵甚少且係挑剰之兵若再於短中抽長轉恐不如浙省預挑備戰之兵較為得力又各營俱係沿海現因洋面盗案繁多飭令出洋分頭巡哨若換以浙兵則人地生疎語音不通難以稽察是謹遵令臣酌用之諭㫖仍催調温衢等處官兵前來配渡進剿至提臣藍元枚前因訪出林呉二姓械鬪及浮山社許姓搶奪等事暫留漳浦查辦今據札稱許姓糾衆搶奪被害者數村然不過無賴棍徒尚易辦理械鬪案内多有天地㑹之人牽連長泰平和等縣奸匪此時若即搜捕恐激成事端似宜暫且緩辦擬先將搶奪一案辦完後星即趕來正可帶浙江後到之兵前赴鹿仔港等語械鬪案内既多奸匪相連提臣所商暫緩之處亦甚有斟酌且浮山等社係其本鄉一切查訪搜拿較為真確便㨗伊既稱搶奪一案易於辦理即應令就近查辦至浙兵全數到泉州尚需時日計提臣當已辦結仍可帶兵前赴鹿仔港如尚不能速竣臣即親往督辦仍令提臣到蚶江配渡亦不致遲悮奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀普吉保曰李侍堯所奏雖與朕昨降諭㫖稍合但李侍堯之意尚欲俟械鬪之案辦完再令藍元枚帶領後到浙兵前赴鹿仔港為期不免過緩此時總以剿捕臺灣賊匪為要林爽文一經拿獲此等内地宵小餘匪辦之甚易現在臺灣北路止有柴大紀在諸羅普吉保在鹿仔港駐劄雖二人打仗尚知奮勉然普吉保到任未久於地方情形未能熟悉且不通閩省語音遇有調遣官兵及曉諭鄉勇義民之處恐多未便不如藍元枚之籍𨽻漳州又熟諳情形較為得力著藍元枚即遵前㫖迅速前赴鹿仔港無庸在漳浦留滯如該處械鬪人犯尚未辦完李侍堯親往辦理自易於完結可無藉提督之力也至所奏閩省内地各營存兵甚少且係挑剰之後若再於短中抽長轉恐不如浙省挑備戰兵可期得力之處所見亦是况浙省兵丁不闇閩省情形若派令沿海巡哨人地生疎語言不通於稽察洋面尤屬無益自不如逕令配渡進剿再現在臺灣額兵征兵陣傷脱亡者不少所有缺額何不趂此時即在内地召募充補使兵數足額巡捕既資充裕而該處游手好閑之徒亦可收歸卒伍更為一舉兩得李侍堯何以見不及此著該督即遵照妥辦或臺灣義民中願充兵者常青亦可召募補臺灣缺額之兵至常青尚須廓清後路再搗賊巢目下北路係専交柴大紀普吉保二人在彼辦理從前黄仕簡任承恩身為提督一南一北互相推諉以致遷延貽悞柴大紀普吉保未免因之觀望幸伊二人未敢效尤已甚得免重戾今柴大紀現署水師提督普吉保現署陸路提督非前此總兵可比昨據常青奏柴大紀駐劄諸羅屢有勝仗並宻札普吉保等相度機宜留心堵剿等語賊匪既至諸羅滋擾鹿仔港與大里杙賊巢尤近自亦必有賊匪來擾普吉保如何打仗殺賊何以俱未據隨時奏及著傳諭柴大紀普吉保此時北路剿捕事宜係伊二人専責務須和衷商酌奮勉辦理一俟常青統領大兵到後㑹同犄角夾攻一舉蕆事毋得稍滋貽悮致蹈郝壯猷之覆轍臣等謹按閩省赴剿之兵已二萬有餘其挑剰存營者甚少又各海口洋面需兵巡緝未便以浙省人地生疎之兵易調自屬實在情形苐内地缺額甚多征兵之陣傷逃亡者亦不少現當剿匪未竣急宜設法補額我皇上宵旰焦勞無事不勤睿慮特諭督臣召募充補不特巡捕有資而游手之徒收之卒伍即可為輯寜地方之計並令臺灣缺額亦即在義民鄉勇中召補洵一舉兩得勵戎行而輯奸暴計莫善於此也欽定平定臺灣紀略卷十五
