  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_060-1a, image: WYG0363/WYG0363-0728a.png}
body:
  text: 五月十六日丁丑福康安鄂輝魁綸徐嗣曽同奏言臺灣戍兵向由内地各營分撥換班但郡屬㕔縣地勢廣濶生聚日繁照額酌留一半即於本處募補既免徃來調换逺涉海洋而遇有戍兵缺出隨時即可補額不致日久曠懸閭里壯丁又得以食糧充伍於生計尤為有益查戍兵就地召募以目前而論自應先儘義民挑補惟義民本屬編氓因值逆匪肆擾各村庄自為聚集藉以保衛鄊閭雖帯同打仗守城亦知奮勇究因軍紀全未曉諳不能十分得力若遽令充伍教練仍復需時届今賊匪甫平汛防均闗𦂳要以未經訓練之兵撥令防禦終不相宜且臺灣本無土著大約漳泉兩府之人居多既在本地募補則凡係廣東及漳泉民人自應一併挑補方足以示平允計内地換防兵内原派陸路漳泉各營二千餘名而水師兵丁除閩安數營外悉係漳泉之人今在臺灣招募一半戍兵以閩粤民人均匀挑補應募漳泉兵四五千名其新増兵丁一千二百名招募一半又應募漳泉兵四五百名即將應派漳泉陸路各兵悉行停止而以就地招募及換防水師兵丁統算籍𨽻漳泉者已及大半似屬非宜前奉諭㫖令將漳州兵丁在泉州村庄防守泉州兵丁在漳州村庄防守互相稽察查臺灣民人多係内地無藉游民渡洋覔食其中强徤者不安本分武㫁一方名為羅漢脚若以充補營兵則逃伍生事之弊勢所必然其有眷屬身家之人即使情愿食糧各有室家繋戀不能將南路者派徃北路村居者派徃城中各令逺離鄊井若即附近村庄易地防守又恐因平日小嫌藉端滋事察看粤東漳泉各庄情形均屬相同雖閩省内地營兵亦非勁旅但究係入伍有年技藝均所諳習自較新募者為優且可使籍𨽻漳泉兵丁不致多於他處因地制宜似亦控制海疆之道臣等於内地征兵内詳加挑選照依戍兵額數令其頂補分派異籍各庄互相防守不致與本地民人通同一氣再常青將義民挑補新兵四百餘名一時權宜辦理不能詳加㨂選兹臣等公同挑擇不堪充伍者甚多伊等隨征一載若此時概行裁汰未免心存觖望因就其中稍有勞績者酌挑一百八十餘名漢仗均屬可觀交營管束差操其餘情愿歸農之人酌加賞賚俱行散遣所有存留各兵仍俟將來陸續出缺仍以戍兵補額以歸畫一至臺灣熟畨向化日久此次賊匪滋事岸􅂻社茄藤社霄閭社畨民打仗殺賊頗為出力此項熟畨多在沿山居住向來戍兵駐守地方佈置固為嚴宻但近山一帯道里遼濶畨社交錯稽察究屬難周今若招募熟畨設立屯丁雖不能逺離本社亦可在相近地方與營伍互相聯絡實於廵防有禆惟是兵額糧餉俱有定制未便於額外招畨致滋繁費查臺灣近山平埔本係荒蕪之地民人開墾名為埔地臣等帯兵入山捜勦查看南北兩路如集集埔水沙連國信埔小楠仔仙枋藔等處彌望良田已成熟業其餘堪以開墾荒地尚多應即於此項埔地内撥與畨民自行耕種毋庸另給糧餉仿照屯田之例將壯徤熟畨挑作屯兵設立屯弁以埔地之畆數定屯地之多寡計數目可得四五千人田畆漸闢人數尚可増多畨性樸實强壯能嫻技勇可期得力無事則各力田疇防守隘口如有越界滋事民人及逃竄盗賊匪類皆可派令緝捕所有撥給該畨丁等埔地令其自行開墾照臺灣畨田定例概免陞科以示體䘏再臺灣地方民俗敝玩賭愽成風一切作奸犯科皆從此起自逆匪滋事以來民人等遷徙流離不遑寧處其未經蹂躪之處亦俱保庄守城充當義民無暇暏博及至地方平定恐其故智復萌屢經示禁嚴飭查挐遇有賭愽隨時懲治已不敢公然聚賭到郡後復嚴督文武員弁日夜輪查經派委廵查之都司額爾亨額馬元勲訪聞水仙宫口民人許班家内約同許髙等夜間私賭該員等當即改裝徃拏許班喊同孫嚴拒捕兇毆並用菜刀劃傷額爾亨額手指旋據該員等拏獲觧送當此嚴禁之時尚敢私行聚賭公然拒捕情屬可惡若非立置重典不足以儆兇頑而懲惡習隨於審明後將許班一犯即行正法其餘在塲人犯悉予枷號三個月示衆至孫嚴係帮同拒捕之犯非僅在塲賭博者可比現用重枷示衆期滿擬發新疆給種地兵丁為奴邇日各處民人聽聞許班伏法咸知畏懼賭風頓為歛戢地方極稱寧謐又潰兵等䝉法外施仁貸其一死是以鳳山嘉義等處潰囘兵丁經常青奏明収伍在案續有大墩潰兵二十一名投赴藍元枚軍營尚未收伍臣等覆加查核該兵丁等當賊匪等猖獗之時冲散後不肯甘心從賊即行間道脱歸與鳳山潰囘之兵相同自應一例辦理惟王得賜一名因賊匪逼令喂馬即行奪馬騎囘後隨同官兵打仗出力毋庸追究外其呉勝得一名曽經為賊服役未便因早為投出一概從寛應發徃伊犁充當苦差至於逃匿日乆潰兵直至賊匪將次撲㓕之時始行投出仍當從嚴究辦臣等自統兵進勦以來陸續投出潰兵六十五名訊據王文彪等三十一名供係被賊匪拏去服役並未隨賊打仗抗拒官兵但各兵久䧟賊中甘為服役不思及早投出較之吴勝得尤為可惡審明後俱已按名正法又陳選得三十三名俱係冲散後在義民村庄藏匿因道路梗塞不能投出實無從賊情事應請貸其一死發徃伊犁充當苦差至潰散無着人數今已分晰查明彰化嘉義淡水鳳山各處及崗山營汛被賊攻䧟共潰散無着戍兵八百八十二名郝壯猷在鳳山失事共潰散無着戍兵八十九名征兵一千二百九十二名魏大斌等赴援嘉義千總陳邦材等隨同前徃潰散無着戍兵七十一名楊起麟邱能成隨蔡攀龍再援嘉義潰散無着戍兵三十八名所有赴援嘉義兵丁因賊匪四靣圍裹兩次陣亡共二千二百四十二名故潰散之數較陣亡為少竊思此項潰兵未曽經歴行陣當賊匪肆擾之時紛紛四散帯兵將弁各不相顧内有被賊戕害者該將弁等因未親見不敢冐昧開報亦俱歸入遺失數内臣等自進勦以來投出者祗有王文彪等六十餘名此外並無拏獲潰兵惟恐濵海地方港􅆜叢襍乘此撤兵之際或有夾帯潛逃隨經飭派妥幹員弁分赴各海口嚴宻盤查並令帯兵内渡各將領等留心稽察據川省都司張占魁拏獲潰兵陳得喜一名供係被賊拏去服役事後思欲逃囘内地訊明亦即正法餘皆禀報並無潛竄現在全郡平定零星逆匪村庄尚不敢容留此項潰兵多至二千餘名似難全行藏匿而福州等府兵丁與臺灣土音逈異更屬易於辨識且叠經訊據拏獲賊匪供稱攻䧟城池及攔截援兵時凡係失䧟兵丁多被戕害賊首林爽文自誇强横曽屢次張掛偽示告知夥黨賊目莊大田亦有攻陷鳳山時殺害官兵一千餘名之供均可為潰兵被害之一証但行兵紀律不可不嚴該處兵丁等既無陣亡實據則從賊偷生之事難保必無仍應通行查緝從嚴究辦已飭造清册移咨李侍堯及隣省各督撫嚴飭地方官一体上𦂳查拏飭行粤省臺灣各海口員弁認真盤詰於何處拏獲即於何處審明分别嚴辦以為臨陣潰逃者戒又據各委員及義民首等陸續報獲賊目張語秀鄧理黄岱莊田林藉洪眼陳信陳光珽温基王喜陳天運洪湖生十二名逆匪林顔領等九十八名隨經核明將有名逆匪提訊或係隨賊打仗或係聽從紏約擾害村庄當押赴市曺正法其淡水彰化等處距府較逺所有報獲餘匪即飭該㕔縣訊取切供詳報確核即於該處令同營員正法示衆現在查對案内指緝各犯未獲者已屬無㡬又林爽文偽印業經捜獲莊大田亦有偽刻木印一顆兹據義民潘瑞鳳在南路大湖地方田邊溝内檢出係洪號輔國四字應與林爽文偽印遇便一併觧交軍機處銷燬至臺灣水營各營戍兵建有兵房給與居住其衝途要隘設兵廵察之處亦俱安設塘汎墩臺以聯聲勢乾隆三十七年鎮標三營兵房因年乆間有倒塌經原任總督鐘音具奏勘估興脩三十九年二月工竣其南北路各營兵房亦動支間欵銀兩脩葺盖造並未全竣海濵沙土鬆浮􅄓風時發各處舊存兵房塘汛漸次坍塌即新脩處所亦多傾圯並不隨時粘補延至四十九年全行倒壊歴任鎮道各員均未詳報辦理經富勒渾屢次札行嚴查始據該鎮道查明應脩兵房營汛一千三百七十餘間詳請脩理偏僻汛地亦未議及富勒渾以所估工料浮多駁令再行確勘雅徳接任後因鎮標及各營脩理歴年未久何至坍塌如此著再加確勘方准造銷文禀徃來動稽時日直至五十一年地方官自應賠脩甫將鎮標兵房建盖十餘間即值逆匪滋事復又停工臣等自進兵以來沿途親見塘汛墩臺僅有舊時基址依稀可辨留心察看情形其被賊人焚毁者尚少竟多係平時坍塌統計全郡兵房營汛二千四百餘間除安平左營尚存十間鎮標三營尚存十餘間此外房屋並無一瓦一椽以致兵丁等藉稱無可棲身在外散處任意營生貿易置操防於不問經富勒渾雅徳屢次嚴飭而地方文武各官恃有重洋之隔一味支延徃返駁查動至經年累月此種外省惡習已屬可惡况臺灣孤懸海外營制尤闗𦂳要乃敢積久玩悮任意餙延實堪痛恨自應分别賠脩現在戍兵全數挑齊分撥各營未便令其露處若令租賃民居又恐陷從前包差陋習臣等公同商酌先令支架帳房撘盖草寮飭該兵等按營分汛居住防守臣徐嗣曽照例估計立即借動欵項㑹同普吉保上𦂳購料興工仍查明三十八年以後臺灣鎮道府㕔縣歴任各員在任久暫咨部分别着追歸欵再各營原設兵房並未按照兵數建盖以致有兵多之處營房不敷居住而兵少之處房屋轉有空閒總由從前添兵設汛時未能悉心經理以致多有恭差此次另行脩建臣徐嗣曽㑹同普吉保詳查兵數多寡相度地勢妥為辦理俾無盈絀之虞再查有福建閩安恊左右兩營都司二缺廣東惠來營遊撃一缺應行揀補又澄海恊中軍都司一缺前以惠州恊右營守備麦瑞奏陞今麦瑞業經掣補三江口都司其澄海恊都司員缺需遴請補用以上遊撃都司共計四缺均應於打仗出力人員内補用苐查軍營出力人員俱已陸續奏請陞補其餘閩粤官員已帯該省兵丁分起配船内渡臣現已分别移咨李侍堯孫士毅查照即於各營照例揀員題補奏入上命軍機大臣傳諭福康安李侍堯魁綸徐嗣曾曰前因臺灣戍守兵丁向内地各營分撥前徃逺渉海洋紛紛更調且義民出力者甚多是以諭令福康安等於辦理善後時察看情形或酌留一半即在臺灣募補以歸簡便原係朕厪念海疆思慮所及即行隨時指示並非謂必當如此辦理今據福康安等體察輿情若先儘義民挑補既恐未諳軍紀不能得力又恐招募漳泉之人太多請於内地征兵内詳加挑選照依戍兵額數令其頂補自屬實在情形原不妨據實奏明毋庸拘泥前㫖辦理其熟畨既可招募並請將集集埔等處空餘田地撥給畨民自行耕種仿照屯田之例將壯徤熟畨挑作屯丁設立屯弁管束之處自應如此辦理至臺灣無藉游民不安本分武㫁一方名為羅漢脚此等惡習最為可惡與四川􅀈嚕匪犯無異現經大加懲創之後不可不實力查拏隨時嚴辦務使奸徒歛跡盡絶根株不復有此項名目方為妥善此事福康安起程後交李侍堯等嚴飭該處鎮道及地方文武官弁認真查察隨犯嚴懲以期海疆永靖毋得日久玩生致干咎戾又查辦賭愽拒捕一案該處甫經大兵懲創之後福康安等尚在臺灣大兵未盡全撤而不法奸民已敢肆無忌憚拒捕傷官將來大兵全撤後此等奸民更復何所儆畏尤不可不認真嚴辦此事福康安起程後亦着交李侍堯飭屬嚴查隨時懲創毋得稍有疎縱上又諭内閣曰潰兵等雖據訊明因道路梗塞不能投出尚無從賊情節但該兵等派出隨征於遇賊打仗時即紛紛潰散不顧主將冲散後又不即時投出轉在村莊藏匿雖與曾經從賊者情罪有間但僅發伊犁充當苦差不足示懲着改發伊犁兵丁為奴以昭烱戒同日福康安鄂輝魁綸徐嗣曾同奏言臺灣澎湖兩處額設水陸官兵例由内地各營更調防戍自逆匪滋事以來陣亡缺額者甚多因在行軍之時數目未能清查均未調撥充補班滿者亦未撤囘臣等初抵軍營即令柴大紀將戍兵數目詳晣查報維時道路甫通戍兵分撥各處未據查開實數臣等以柴大紀廢弛營伍或係兵丁本有缺額一時難以登覆恐將傷亡遺失數目任意加增希圖掩餙因於撤兵囘郡後傳集各營將弁及帯兵各員詢問並調齊檔册文卷逐一上𦂳撿查此項換防兵丁自内地撥來俱係實數總因臺灣營伍廢弛兵丁多不差操以致存營兵少其實並無短缺通計各營戍兵實在陣亡傷亡無着病故革退等項及㧞補弁目遺缺共計未補兵丁四千八十五名其餘現存兵内有班滿應換者四千四十九名挑出班雖未滿傷殘病廢者二百七十二名所遺各缺除將派來換班尚未歸伍兵四百四十四名及常青招募新兵内酌挑一百八十七名頂補外其餘均應挑補若照例咨調内地營兵徃返重洋動稽時日應即於征兵内挑留補額該兵丁等器械齊全以原配器械隨帯廵防更為便易臣等於撤兵時即將内地壯徤征兵逐一挑選其李侍堯所募新兵漢仗均多可觀亦擇其隨同打仗出力者一併挑留統挑補舊設戍兵額缺共七千八百八名又挑補新增汛防戍兵一千二百名惟向例臺灣戍兵係由福建通省水陸各營内匀派毎營皆有定額到臺灣後自當各按原營安設以資約束乃向來並不按營編伍率以一營之兵分作數處零星派撥兵弁不能相識尤屬難以稽查此項挑留之兵係就現在征兵内選擇營分本不能齊全又祗擇其年力精壯者留補毎營挑出之處或多或寡並未拘定例額其安設地方俱係指定某營之兵派徃某處即歸原營官弁管轄不致如從前参差混淆所管備弁就近㸃騐差操更屬得力嗣後即照新定章程俱令按營分設所有此次挑留兵丁换防年限均以調到臺灣之日為始照例扣算辦理至陣傷亡故戍兵今已查明寔數該兵丁等所出内地本營之缺咨明李侍堯將上年新募兵丁及換囘各兵内挑補其有傷殘病廢者即可酌加减汰如此則兵數適符原額而新兵補缺迅速亦不致多糜費糧餉再臺灣戍兵向係内地各營挑撥更换應得月餉銀俱在臺灣支給其本籍眷口於該兵餉銀之外毎名毎年給銀三兩零米一石二斗以資養贍今新添戍兵一千二百名計需養贍銀三千九百餘兩米一千四百石換防時尚有應給徃來盤費銀兩若再將新添戍兵於内地召募又需在常額之外多增餉銀一萬八千餘兩米四千三百餘石是以祗就内地各營通融抽撥毋庸另行添設核計内地各營現兵五萬餘名調出兵一千二百名於十分之中尚不及一分之半似與營制無碍再臺灣吏治廢弛奸民無所顧忌以致釀成逆案此畨整頓之後丞倅州縣等官如有必需添設即應逐一酌籌詳晣具奏但體察閤郡情形原設㕔縣分治地方經制均為妥善果能盡心撫宇綏輯得宜自可永臻寜謐若多設官員不能盡得其人轉於地方無益惟分駐佐雜官員各有稽查奸匪之責其中今昔情形不同自應悉心調劑量為改移即如南路鳳山縣城現請移建埤頭街其舊城地處海濱議以鳳彈汛弁兵移駐應將下淡水廵檢一員移至鳳山舊城駐劄至下淡水在東港上㳺南逹水底藔枋藔最闗𦂳要應將阿里港縣丞一員移駐下淡水其阿里港地方即與新移鳯山縣之埤頭街相近一切均歸知縣管理又北路斗六門地當衝要原設廵檢一員官職太卑不足以資治理應於該處添設縣丞一員歸嘉義縣管轄又大武壠山内村庄甚多最為險要現已安設汛防撥兵駐守亦須文員彈壓應將原設斗六門廵檢一員移駐大武壠其隨帯弓兵衙役毋庸另議至添設縣丞一員應增俸薪役食並移建添建衙署及鑄給印信各事宜臣徐嗣曾逐加查明照例分别題咨辦理再向例調任臺灣各員三年俸滿即行調回内地該㕔縣身任牧民責成綦重若在任未久一切風土人情尚未諳熟竊計􅆶期將届鮮不茍且自安祗圖塞責地方人民亦以官長不久去任未免心存玩狎甚有不肖官吏不以渉險為慮惟知貪利營私延至滿任即可卸責而去即有認真辦事之人正資清釐整頓而俸秩已滿遽易生手亦不能竟其設施查臺灣道府向係三年俸滿四十九年改為五年應請將各該㕔縣照道府之例一體改為五年報滿俾得多歴嵗時盡心民事倘敢日久玩生廢弛公務請交廵視臺灣之將軍督撫等就近考核從嚴恭究再查降畨弁目儹拉浞浸兩處額設土守備六員土千總九員土把總十六員土外委四十六員此次隨征臺灣派來土弁等帯領降畨甚為出力今降畨業有定額均照屯練兵丁之例加給日餉所有儹拉浞浸土弁等請援屯練土弁定例分别賞給錢糧至臺灣原定營制本無馬兵雍正二年改設馬兵三百名嗣於雍正七年因籌添塘汛守兵將馬兵裁撤是以全郡戍兵盡係步粮即官弁亦無馬匹日久相沿騎射均不講習此次進勦逆匪臣等率同巴圖魯侍衛章京馳驟徃來奮勇衝殺最為賊匪所畏屢次克㨗實藉馬力為多兹當更定營伍之時若請照前例改設馬兵三百名彈壓地方似足以昭嚴肅馳報𦂳急公事亦可不致稽遲於營伍殊為有禆苐查臺灣地方平原寛廣處處皆有水草原非不能畜牧惟因天氣過於炎熱從前裁減馬兵案内即有難於喂養之語臣等帯兵勦匪適值冬末春初水土平和馬匹頗能臕壯若至夏秋蒸溽之時養馬究恐非宜再四籌酌先於巴圖魯侍衛及各官員交囘馬匹内酌留一百匹飭交臺灣鎮總兵照例給發馬乾試養一年如果喂養得力俟閩省督撫廵察臺灣之便就近查騐據實奏聞再於臺灣鎮標改設馬兵一百名北路恊標改設馬兵一百名作為定制班兵更換留馬易人所有應需馬匹即在内地各營抽調除延平建寜福州長福興化泉州城守等營地當孔道毋庸抽調外其餘偏僻標營均有馬一百三四十匹至一百七八十匹不等毎營不過調撥十餘匹即可足二百匹之數並將馬兵數目於戍兵内改撥核計粮餉馬乾均無增減海疆營伍防範更為周宻再臺灣一郡負山面海外控澎湖地勢袤延幅􅊷廣濶其間要隘甚多原設臺灣澎湖水陸兵丁一萬二千一百七十六名除水師兵四千一百六十三名外南北兩路共兵八千零十三名分撥防汛佈置已為嚴宻惟是今昔情形畧有不同數十年來仰䝉聖澤濡㴠生齒繁盛從前荒廢之地日闢日增西至海濵東至山麓村落相連野少曠土自大雞籠以至枋藔南北綿亘一千餘里里數較内地加倍不啻有二千餘里之遥近山一帯地方如大里杙水沙連大武壠水㡳藔等處最稱險逺溪深嶺峻僻徑紆迴外則畨社環居内則流民雜處向因人迹罕至未設汛防而各縣城内兵力亦覺稍单不足以資防衛今擬於各處𦂳要地方及通衢大路毎處添兵一百數十名至二三十名不等並將各海口水師量為移撥務使分派得宜聲勢聯絡駐守足資彈壓㑹哨亦易稽查海外巖疆庶可永臻寧謐查臺灣郡城原設鎮標三營城守左右軍一營除去分防之數存城兵丁尚有二千七百餘名足稱重鎮毋庸另議增添其北路彰化縣城原設兵一百一十四名該處地當衝要係副將大員駐劄兵力較少擬添兵一百八十六名以足三百名之數縣城迤東之八卦山地勢最髙可以遥瞰城中現擬於山上設立卡座應添設兵四十名外委一員帯領駐守所有山旁通徃柴仔港烏日庄犁頭店大里杙要路均可藉以稽查大里杙係逆首巢穴雖經大兵勦洗净盡城堡亦已燬除但係阨要之地直逹彰化南北投又與内山相近應添設外委一員兵丁五十名水沙連與畨界交錯山嶺重叠地方更為遼濶應添千總一員兵丁一百名在集集埔駐劄頂地方接壤水沙連而附近之虎仔坑尤為奸宄出没之地應添設外委一員兵丁三十名稽察更為周宻又磺山地産硫磺向係封禁逆匪滋事時曽經李侍堯派守偹羅禮璋帯兵看守該處山嶺重叠逼近海岸山外砲臺塘汛設兵本少且距磺山道里太逺稽察難周查石門地方係磺山出山要路又有港口通洋應於該處添兵三十名外委一員防守又中路一帯嘉義縣城原設兵三百七十七名係北路左營守備帯領弁目駐守該處為全郡適中之地最闗𦂳要添兵一百二十三名以足五百名之數並擬改設都司一員其原設守備一員即移於斗六門要隘駐劄查斗門四逹通衢向稱險固賊匪佔據一載始行攻克今既將守備移駐該處原設之千總一員兵五十名不敷防守應再添外委一員兵一百三十名即歸新設之都司管轄以資控制大武壠村庄甚多路徑叢雜外霄閭庄在大武壠山内本縣庄為西北面入山要口應設千總一員添兵一百名駐劄外霄閭庄再添外委一員分出兵丁二十名在本縣庄防守元長庄近海地方寛廣應設外委一員添兵二十名大埔林西螺鹿仔草等處均係要地額設弁兵太少難資防守即平時稽察村庄緝拿奸匪亦不敷用應於原設弁兵之外大埔林添設兵十五名外委一員西螺添兵二十名外委一員鹿仔草添兵十名以壯聲勢其大排竹蔴豆庄係嘉義縣至府城大路三坎店茂功庄係大武壠西南面要口應於大排竹添兵二十名外委一員蔴豆庄添兵三十名外委一員茂功庄添兵二十八名外委一員三坎店祗添兵二十名毋庸另設汛弁即歸大武壠千總管轄又南路一帯崗山汛原係守城左軍守備千總帯兵一百三十五名駐守再添四十五名原設備弁毋須更易鳳山縣城原駐恭將一員千總把總外委共八員兵四百六十二名今縣城改建埤頭地方將弁均未移駐毋庸另行增設惟添兵三十八名以足五百名之數其鳳彈一汛即在埤頭附近應行裁減將該汛原設兵丁内撥兵一百一十六名添設千總一員移駐鳳山舊城在擬建卡座之龜山上安設鳳山極南之水底藔地方最為險僻應移撥鳳彈汛原設守備一員把總一員兵一百名仍再添兵五十名在該處駐守其畨薯藔係近山要隘自大武壠山内通徃鳳山小路皆由該處經過應添兵二十名額外外委一員以資防範而重廵防統計此次添設都司一員千總三員經制外委十四員額外外委二員兵丁一千二百名除添設都司應行揀員調補其弁目兵丁均照例於福建内地各營酌量抽撥換防用歸簡易查閩省額兵通共六萬三千一百一十九名扣去臺灣戍兵一萬二千一百餘名内地當存兵五萬九十餘名通盤計算再抽出新添戍兵一千二百名分在各營調派所撥亦屬無多内地兵丁尚不致於短絀但各營兵數多寡不一應如何分别衝僻地方酌量分撥之處容俟囘至泉州與李侍堯面加商酌再行㑹摺具奏再查安平恊水師原設三營駐劄安平為海疆要隘但該處内依郡城外接澎湖聲勢已屬聯絡駐兵未免稍多惟北路鹿仔港最為𦂳要口岸係臺灣水師左營汛地原駐備弁兵丁不足以資廵守應將該協左營内逰撃一員千總二員把總二員外委三員額外外委三員兵丁三百七名戰船九隻移駐鹿仔港即以原駐鹿仔港之守備一員把總二員兵丁一百一十五名戰船二隻移駐笨港以笨港原駐之把總一員兵丁七十五名戰船二隻移在原未駐兵之新店海口其安平恊水師右營之東港一汛原設把總一員兵丁一十五名亦覺過少應再於該營内撥兵三十五名添設該處如此一轉移間沿海營汛仍歸本營管轄毋庸增設新兵而於𦂳要海口哨探廵防亦可倍加嚴宻奏入上從之欽定平定臺灣紀畧卷六十
