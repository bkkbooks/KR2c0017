  text: 欽定四庫全書欽定平定臺灣紀畧卷十四
  hash: sha256:f3841a3f5234f7eebb1dc1ab885abd630d8c0f305d21ea811bb0516d867e0890
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_014-1a, image: WYG0363/WYG0363-0152c.png}
body:
  text: 四月十三日庚戌上命軍機大臣傳諭富勒渾雅徳曰沿海盜賊最為商民之害今閩省蚶江一帶刧案甚多並未將首夥即時拏獲而嶼仔尾地方僅距厦門十餘里盜賊竟敢行刼兵船可見該省政務廢弛已非一日地方官怠玩諱飾遇有刼案僅以尋常械鬭將就完結以致釀成巨案且臺灣逺隔重洋㝡闗𦂳要道府㕔縣必須才守兼優之員方能勝任朕乆聞該省督撫遇有臺灣缺出不問屬員才具是否相宜多以私人調補而得缺之員従不以冒險渡海為慮反視為利藪又安望其整頓地方實心辦事此等劣員若到臺灣無所津益何視為美缺而其津益非取之商民何従而得則致民怨滋事刼縣戕官實有由來矣従前厯任督撫已多身故難以追究至雅徳由該省巡撫擢用總督在閩最乆非若富勒渾之尚藉口在浙江辦理海塘者可比今貽悞地方至于此極着令其自思罪狀激發天良自揣如何贖此重戾一並明白回奏若稍有不實不盡無難將伊拏回照黄士簡任承恩一律治罪雅徳不能似彼二人之尚可寛一線也至富綱在閩撫任内雖未及雅徳之乆在任亦有二年而于地方事務緝盜安民全未整頓實難辭咎其如何贖罪之處一並據實明白回奏上又命軍機大臣傳諭常青李侍堯曰兵丁奉派出征不能奮勇効命乃遇敵即行潰散緑營恇怯惡習最為可恨此而不嚴加懲治其何以昭軍紀而肅戎行従前金川潰逃兵丁一經拏獲即行正法此次逃亡之兵亦應按照此例従嚴辦理但此時軍務未竣未便遽行查辦致滋疑畏著常青李侍堯俟事定後嚴查實在逃逸者即照金川逃兵之例辦理以儆將來其逃回軍營仍復打仗對敵者不在此例又常青昨奏摺内稱遊擊鄭嵩被鎗傷陣亡該遊擊如果臨陣捐軀自應議卹但據何人所報於何處禦賊陣亡摺内亦未聲叙明晰著常青再行詳查明確據實覆奏常青前次奏摺係三月十三日拜發而此次奏摺則係二十一日拜發相隔已有八日此數日内賊匪曾否攻犯郡城官兵作何堵禦截殺㫁無坐視之理著即將如何籌畫調度情形由驛迅速奏聞十四日辛亥上命軍機大臣傳諭李侍堯閔鶚元李世傑琅玕曰此次臺灣𠞰捕賊匪未經簡派御前乾清門侍衛前往者因常青素非内廷行走大臣恐呼應不靈轉不能得力是以於侍衛章京内檢選派往常青現已授為將軍即如領侍衛内大臣加意管轄方妥若該員等打仗出力著有勞績即據實保奏倘有不遵約束率意妄行者即嚴行㕘辦不可稍存瞻顧該員等起程時已令軍機大臣面行訓諭俟伊等到彼並著常青將此㫖曉諭傳知俾各敬凜至此等侍衛章京皆係武職恐見小貪利沿途或有需索亦未可定不可任其所求過於優待常青李侍堯琅玕均係滿洲大臣又皆閩浙督撫常青李侍堯或每人資助百金琅玕或每人資助五十金尚無不可然不可来往皆與之其徐嗣曾及藩臬以下並沿途督撫則均可毋庸餽送伊等果䏻𠞰賊立功朕自優加恩賚設該員等不知自愛沿途經過稍有額外需索該督等一經查出即行據實恭奏朕必將該員等加倍治罪以示懲創十七日甲寅上命軍機大臣傳諭李侍堯徐嗣曽琅玕曰向來閩省内地民食全賴臺灣稻田豐熟得以源源接濟現在賊匪林爽文等糾衆滋事農民未能及時栽種朕心深為軫念通省民食闗係𦂳要必須預為籌畫俾糧食充裕市價不致翔踴方為妥善淅省温處一帶與閩省毗連従前該省商販往往由海道運至閩省接濟現距秋收之期尚逺或彼時閩省竟無須隣省接濟固屬甚善倘民食稍有未敷尤應設法早為調劑俾得有備無患李侍堯統轄閩浙兩省著㑹同徐嗣曽悉心酌議預行知照浙省届期如有必須接濟之處即委員採買務令裒多益寡民食無虞缺乏至閩省因有臺灣之事内地糧價自不免稍昻倘有奸商乗機囤積居奇射利最為可惡著該督等飭屬密訪嚴查一經拏獲即應従重懲辦一二以儆其餘不可稍存姑息臣等謹接閩省糧食向賴臺灣接濟自林爽文滋擾各莊本處不能耕種運赴内地者必少閩省市價自漸致昻貴我皇上於撫臣奏報春收之時早慮及秋收期逺不待奏請先諭令於浙省通融採買酌盈劑虚俾得有備無患益仰見念切民依周詳肫勢且無時或釋也十八日乙夘孫士毅奏言髙亷鎮總兵梁朝桂現已星飛檄調俟到潮即飭令趕赴閩省帶兵㑹𠞰至總兵陸廷柱於三月二十八日帶兵到閩計此時將配船渡臺查粤省水陸兵丁四千名現在入閩境者已經過半計四月初十日前全數俱入閩省又火藥為行軍利器此時臺逆既未蕩平火藥亦應添備臣於粤兵隨身攜帶三萬斤外復另備五萬斤運送閩省以資接濟奏入報聞二十日丁巳李侍堯奏言臺灣逺隔重洋運送兵丁糧餉等項俱係雇覔民船應用查部頒軍需則例但有内河運脚而海運並無明文上年黄仕簡任承恩等帶兵前往臺灣倉猝僱用但以所載兵數約畧給值各船大小不同自渡送官兵之後凡差員前往及解銀運糧等項僱價已不能畫一今𠞰匪尚未竣事需船正多若不酌定章程則目下辦理既不免參差將來並難於造報查部頒水運條例内開運糧水脚順水每石每站三分六厘逆水每石每站七分等語海運本無順水逆水之分但以風之順逆為進止凡遇開駕必趁順風應即以順風抵内河順水之價自厦門至鹿耳門十二站蚶江至鹿仔港九站閩安口至北淡水八站概以每石每站三分六釐給價其未聞洋以前之守候及運到之後回空俱不另支口粮如此酌定僱價較之内河逆水僱價可節省一半有餘而各船戸亦不致有苦累其内地各州縣碾米運至泉厦兩倉者除内河照部例支銷外自内河出口後亦有應由海運之處並照此計程核給至送兵解銀及官員奉差往來難以石數記者則就船之大小可載若干石之數照此記算以歸畫一又數日内連接常青來劄稱鳯山再失之後賊匪益肆滋擾臺灣府城亟須添兵因奏調之兵尚需時日先調澎湖兵四百及水師提標兵六百前來助守又據臺灣道永福知府楊廷樺稟稱府城内外僅存兵三千餘名現在添僱鄉勇萬餘人以資守禦三月二十二三等日賊漸逼府城督臣常青親帶官兵鄉勇躬自臨陣多有斬獲又據臺防同知楊廷理禀稱北路賊連日焚刦各莊涵西港為米糧通郡之路被賊梗塞府城米價益昻南路賊又沿村迫脅日積日多督臣雖堵𠞰二次而賊匪遍地滋擾彌覺増多是臺灣府城目下需兵甚急而粤兵自前月二十二日起陸續至厦門臣令隨到隨即登舟總兵陸廷柱亦於本月初二日到厦緣連日東南風大難以放洋兹於初六日得有順風陸廷柱即帶已到之粤兵一千七百餘名楊帆飛渡計兩三日可直抵臺灣查常青札稱目下但得千餘兵到即可鎮定人心今一千七八百兵連踪而至且知隨後尚有粤兵浙兵續到合郡士庶不惟頓解驚惶並當勇氣百倍至鹿港一路據都司陳邦光稟稱林爽文現踞大里杙烏日莊等處又有陳泮呉領踞虎仔坑南北投等處欲進攻林爽文則陳泮等無人可禦欲進攻陳泮等又慮林爽文乗間而來是鹿仔港亦需兵甚急現在常青已奏將任承恩解任普吉保䕶理正當新舊更替之際人心尤易驚疑臣前所調粤兵原奏明以一千五百名赴鹿港今亦將次入閩是以臣由厦回至泉州向蚶江料理配渡昨奉㫖以粤兵四千陸廷柱一人難于統率令梁朝桂前來分領陸廷柱已在厦門先渡則梁朝桂應至蚶江領兵前往但該鎮自髙州起程恐路逺不能即至如粤兵全數已至蚶江而該鎮尚未趕到未便令各兵守候應即令帶兵之副㕘等先行東渡俟該鎮到時再行續往又先據署臺灣府知府楊紹裘等詳稱運送兵糧等項夫役繁多府庫無項動撥懇于藩庫撥銀十萬兩支應事竣造銷又據臺灣道永福知府楊廷樺稱鳳山諸羅彰化淡水四㕔縣倉庫悉空府城倉穀無多懇解米十萬石分路接濟彰化縣屬僅存鹿仔港一處尚在固守各村莊男女老幼咸來避匿不下十萬餘人無處得食似應倣照灾賑之例量為賑卹至鄉勇口糧向係義民公捐今為日已乆義民告匱難令再捐鄉勇無食必然解散擬照出征兵丁每名日給米八合三勺鹽菜錢十文另加給三十文挑選壯丁以備攻𠞰事竣報銷其加給錢文就臺灣文武官員匀捐補欵各等因臣查軍糈𦂳要固不可稍有遲誤而一應動支尤須核實自上年十二月起陸續解往銀已二十萬餘兩米一萬九千餘石又委員賫銀三萬兩前往買米計可得一萬數千石近又准常青咨取銀十萬兩並淡水同知徐夢麟帶往銀一萬兩以上銀米二項以現兵及續調之粤浙兵計算約可供十個月餉銀五個月口糧乃該道府等于官兵糧餉之外又添出鄉勇難民二項查鄉勇本義民所僱固屬急公向義實亦自衛身家義民力雖稍乏亦應勸諭鼓勵使黾勉終事俟大兵一到即可息肩若照該道府所稟每名每日支給錢米且較官兵所支更多現在府城鄉勇已不下萬人他處亦動須鄉勇若非數萬石米數十萬兩銀不敷支應至避難男婦亦祇應於𠞰匪事竣後量為安插撫卹此時軍務為急固無項可支兼亦無官員為之料理是以臣諭令司道等將常青咨取銀十萬兩如數解往而該道府等之另請銀十萬兩米十萬石概行議駁如有例外必需之處仍飭該道府稟請督臣常青就近核示庶帑項不致濫支而軍務亦不致貽誤又臣前以澎湖戍兵一千八百餘名經黄士簡兩次調派一千名赴臺灣應用澎湖甚覺兵少曽奏明將駐劄永定縣候調之汀州兵五百名調往澎湖駐守各兵已經起程尚在途次今常青又調澎湖兵四百前往臺灣則澎湖僅存四百餘名益覺單薄適汀州兵亦於初六日晚間到厦隨飭厦防㕔照例發給糧餉催令開駕同日琅玕奏言接李侍堯咨調撥浙省原備兵三千名再於距閩附近各營添派兵一千名由陸路赴閩聽候調遣當經臣飛行提臣及各鎮臣將原備兵三千名迅速調齊由陸路分起儧程前進並于附近衢州鎮標添派兵一千名派員統領尅期先行起程兹欽奉諭㫖浙省止須調兵三千名令臣等于温衢二鎮所屬各營檢派速為料理查浙省原調兵三千名係温州黄嚴鎮各一千名提標及鎮海營一千名其添派之衢州鎮兵一千名離閩省最近現已據報于初九日全數出境而温州黄嚴鎮兵俱跟接行走亦可尅日前抵閩境若再為撤回另派恐有稽時日是以即咨㑹提臣飛行統兵之温洲鎮臣魏大斌迅速䟎行所有提標及鎮海營兵一千名係由寧波起程離閩省較逺計算尚未出境已知㑹提臣行令撤回歸伍至䕶送各兵臣委藩司顧學潮杭嘉湖道清泰分往各路沿途督辦均可不致遲誤同日陳大用奏言温衢二鎮原派兵二千名均陸續出境黄嚴鎮兵一千名亦距閩較近現在飛咨領兵鎮將立即䟎行前進其提標並鎮海營兵一千名係在飭派三千之外俟奉到硃批應行應止飛飭遵辦再總兵魏大斌副將詹殿擢臣因伊等曽任臺灣是以分派統領應否留閩差遣之處咨㑹督臣李侍堯聴其酌量辦理均奏入上命軍機大臣傳諭常青李侍堯琅玕陳大用曰現在賊匪勢尚猖獗竟敢攻犯府城常青親率官兵鄉勇臨陣多有斬獲此時粤東兵丁陸續到彼常青得此自可鼔其精鋭迅速進攻李侍堯在厦門一帶籌辦照料當以催兵速渡接運軍儲糧餉濟用為要餘可徐論乃李侍堯摺内鰓鰓慮及多用錢糧恐事竣後難于報銷止將常青咨取銀十萬兩解往而該道府等之另請銀十萬兩米十萬石概行議駁仍飭將用過欵項一一報查所見甚屬錯謬所有該道府請發銀十萬兩米十萬石即著李侍堯速行照數運往以備接濟并著常青就近先行酌量如有多餘兵糈或米或穀散給貧民務使不致逃散方為妥協不然非去而従賊即窮極攘奪皆足僨事况鄉勇義民既為國家禦賊兼可衛其資産是以為我出力今致日乆賠墊既有陣傷亡故又不能保其所有亦必逃散従賊兵丁弁備尚難望其枵腹従事而况此衆民乎封疆大吏遇此要務惟應以速行𠞰賊不誤軍行為念何必慮及賠累此輩無知百姓轉令其竭資自効始終忠義自守㫁不能也李侍堯平日心思尚為周到不應不識大體若此前據常青奏稱賊匪將所掠錢米廣為散給要結人心以致日積日衆豈閲時未乆該督遽致忘懐耶葢慮將來難以開銷恐致賠累私見固結于中是以為此拘迂之奏該督受恩深重不應存此私心見小幾乎貽誤大事著傳㫖嚴行申飭前已降㫖酌撥粤東鹽課闗税銀三四十萬兩解赴閩省備用李侍堯若恐不敷不妨于廣東浙江二處不拘何項一面飛咨撥解一面隨報具奏不可稍存惜費之見致有貽誤總宜寛裕籌備接濟軍需最為𦂳要即有冒濫亦不必預行駁飭轉使承辦之員有所藉口總俟事竣後另行核實查辦即使報銷時格于部例有不應准銷者朕亦不肯令李侍堯事後接任之員稍有遺累當于貽誤軍機之黄仕簡任承恩及道府各員名下分别酌賠朕臨時自有斟酌或酌量加恩均未可定此總係事竣後辦理之事非此時之急務該督何所用其瞻顧而為驅民資賊之舉耶然此事更宜慎密不可稍有洩漏致滋隠寄至賊匪于三月二十二三等日攻犯郡城何以未據該將軍奏報朕盻望捷音甚為懸切再前經降㫖因浙省兵力脆弱停調兵一千名又添調閩省駐防兵一千名以足原調四千名之數今兵丁如已撤回即令各歸營伍倘已行入閩境即令其前赴厦門交與李侍堯酌量調撥多多益善即留于内地巡防亦無不可惟在該督等相度事機辦理總期不誤公事為要臣等謹按臺灣自林爽文滋事難民不得耕作糧米自必短少乃督臣于道府請給糧米之稟預為奏銷賠累之慮概行議駁竟不慮及難民無以為生必將去而従賊所闗甚大皇上嚴行申飭立命照數發往復委曲曉諭以明其非而該督臣旋亦訪聞切實速籌調劑所以該處難民不致流離失所而鄉勇義民亦始終感奮不倦也二十三日庚申孫士毅奏言挑備粤兵四千名分起赴閩嗣復經李侍堯札催其隨後續到之兵臣即令并起前進所有粤兵四千名現於四月初十日全數俱入閩境昨據總兵陸廷柱自厦門申報三月二十二日起至四月初二日止粤兵到厦已有一千八百名其配渡船隻先經李侍堯親赴厦門備辦齊全先後配船出港若遇順風四月初十日前即可到臺此外尚有七百名亦可接續到厦配船東渡其派赴蚶江一路由鹿仔港進𠞰共兵一千五百名并作三起亦于本月初十全數抵閩臣在黄岡㸃送各弁兵俱剴切曉諭察視將弁兵丁頗皆踴躍奮興再臣聞賊匪每逢大雨前來刼掠我兵平日習慣驕惰不耐雨淋往往喫虧又聞有蔡逰擊帶兵打仗頗為賊匪所畏臣得之風聞謹據實陳明再接據潮州鎮標都司王雄稟稱三月二十二日有粤東赴閩第二起征兵由海澄下船赴厦夜間有兵丁曽得髙等八名共坐一船忽遇賊船二隻約有二十餘人乗夜搶奪該兵丁内六人受傷失去鳥鎗等物查該兵等派令赴閩𠞰除臺逆無論白日昏夜均應整肅軍容使人望而難犯今遇内地賊匪一二十人雖事起倉猝隨身俱有器械儘可奮力格殺若擒拏一二匪犯交閩省追出夥黨即可従此徹底究辦乃並不傷獲一犯反將鎗刀失去數件且被打落水竟成狼狽情形臣飛檄統領鎮將查明該兵八名係何弁員帶領嚴飭此次到臺果能奮勇殺賊尚可將功折罪仍恇怯無能立即斥革従重懲治俾軍營弁兵共知儆惕奏入報聞二十四日辛酉李侍堯奏言前接常青調普吉保帶兵往攻斗六門之信恐任承恩兵力不支鹿仔港或有疎失是以擬分粤兵一千五百名前往協助今任承恩已經常青㕘革普吉保自必仍在鹿仔港不復分兵則鹿仔港可以放心今將此兵全赴府城以裕攻𠞰之用甫入閩境臣即檄粤省領兵各官一直赴厦門配渡仍檄不必俟全數到齊但遇順風即行開駕梁朝桂如不能趕到則令其隨後續往至鹿仔港一路現在究亦𦂳要普吉保見任承恩以遷延獲咎自必思刻期進𠞰但恐兵力尚不敷用所調浙兵四千本月二十内外陸續可到泉州擬將先到之二千亟赴鹿仔港後到之二千仍赴府城惟目下鹿仔港與府城南北相隔常青雖係總統而呼應尚不甚便捷恐浙兵到彼無所稟承臣一面嚴飭普吉保俟浙兵到時務當視同一體均勞共苦勿得稍存岐視速即親自督率閩浙兩省弁兵直攻大里杙等處使北路之賊不能赴援南路之賊則常青在南益易𠞰除可迅速向北夾攻矣再現在増調官兵糧餉尤當多備閩省各營兵糧向係臺灣各縣解運穀石供支今臺地無穀可解又須内地倉穀動支且漳泉民食向恃臺米販來接濟今臺米稀少内地糧價漸増將來恐不免平糶則倉儲不敷應用查前嵗浙省歉收奏撥閩省米石運往平糶今閩省需用亦可彼此通融前已札商撫臣琅玕據稱可撥十餘萬石由乍浦海運較省脚價臣思與其臨時辦撥或致遲悞不如預籌儲備以資接濟即米已到閩而軍事已竣仍可留作營兵口糧及地方平糶之用將米價歸還浙省均屬有益謹一面具奏一面知㑹浙撫臣委員陸續由乍浦海運前來奏入上命軍機大臣傳諭李侍堯琅玕曰向來閩省内地民食全頼臺灣稻田豐熟商販流通得以源源接濟今賊匪林爽文等糾衆滋事臺灣米石内渡者必少内地糧價自較増昻朕正為此縈念早經降㫖令該督預為籌畫並諭琅玕一體籌備想該督等此時尚未接奉前㫖兹據奏札商琅玕覆稱可撥十餘萬石由乍浦海運至閩較省脚價所辦與朕前㫖恰合著琅玕即速派員如數陸續運往俾兵糧民食充裕儲備方為妥善欽定平定臺灣紀畧卷十四
