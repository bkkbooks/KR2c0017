  text: 欽定四庫全書欽定平定臺灣紀畧卷三十三
  hash: sha256:63cb95ef3b3e8c73d347d8f6e4e43adc202c9fb34310f250978641bde4712cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_033-1a, image: WYG0363/WYG0363-0368c.png}
body:
  text: 八月二十四日己未福康安奏言拆閲常青等所奏摺内僅稱賊匪旬餘未敢來犯郡城並不能直前進勦是南北兩路官兵尚未得手常青親在臺灣較李侍堯據屬員禀報之詞自為確切所稱兵力不足似屬實在情形林爽文自上年滋事以來陸續徴調各省滿漢官兵不為不多何以閱時已久尚不能掃穴擒渠揆厥所由固屬該將軍等零星堵禦以致兵分力薄亦因久未蕆功士氣日形懦怯現在雖有添調之浙省粤省官兵陸續配渡前往苐該兵丁等向未出征恐不能十分得力前據李侍堯奏請先將内地各營存兵内派撥即令新兵充補但閩省各營兵丁挑赴臺灣者已多存營之兵諒非精壯且閩省地方山海交錯在在需兵汛防彈壓此時若將内地兵丁調往而概以新兵充補亦屬非計必須增調得力兵丁乗其初到鋭氣痛加勦殺賊匪見官兵日益增多自必心存畏懼黨羽漸離渠魁更易就獲今該將軍等又以郡城兵单奏請添調廣西江西兵六千名但前奉諭㫖令貴州湖北湖南等省各挑兵二千名聽候檄調此時自己預備齊全查貴州兵丁屢經行陣在綠營中最為勇㨗湖廣地方與閩省一水可通與其另調他省莫若仍將貴州湖廣未調之兵即令分起啟程較為妥速至四川屯練降畨派撥二千名速行赴閩此項屯練兵丁想已行走在途將來前抵軍營較他省更為迅速若復中途停止未免徒勞往返况臺灣地方多係深林宻箐屯練兵丁登山趫㨗用以搜捕匪犯必能得力仰懇仍准其調發臣惟恐緩不濟急一面咨㑹保寧飛催前進再魏大斌赴援諸羅中途被賊圍截雖據稱賊衆二萬猝至又適遇大雨不能施放鎗砲彼此鏖戰殺死多賊仍遺失兵一千一百餘名等語但綠營往往有謊報惡習魏大斌是否張大其詞以掩其遺失多兵之咎而此項損失之兵有無潰散從賊之處均須徹底查究容抵臺灣後再行查明核辦至柴大紀力捍孤城坐困已及兩月現在賊匪鴟張更甚城中存兵無多火藥糧餉又已匱乏設有疎虞所闗匪細雖據常青等派令蔡攀龍等帶兵一千六百名前往但尚未得有到彼信息且所帶兵力無多賊勢正在猖獗恐難即時進勦竊思南路賊匪屢經官兵搜捕賊勢漸衰此時郡城一帶較之諸羅被困情形不甚著重自應令常青舍南趨北於郡城各營迅發多兵前往援救但賊人狡計百出若見大兵全集諸羅又恐乗虚在郡城滋擾郡城為全臺根本重地若留兵過少不足以備勦捕應援之兵臣通盤籌畫所有現在請調各省官兵懇飭各督撫速行派撥趕𦂳赴閩聼候調用再臺灣不産馬匹向來俱由内地帶往此次巴圖魯侍衛等前往進勦帶兵打仗追拿賊匪必須乗騎馬匹方能得力已札知李侍堯速行備馬二三百匹先期派員送往臺灣應用同日孫士毅奏言臺灣地處海中深秋後早晚寒冷棉衣在所必需凡先後赴臺兵丁似應各給一件至衫袴鷂鞋等項先調之四千名到臺已閲數月領兵鎮將目擊將次破爛自應製備解往其續調之七千名甫經赴閩係屬完好毋庸一體添給查鷂鞋套袴軍裝内例應製備准在各營公費項下開銷其棉衣及貼身衫袴應由各營家屬自備官為觧送苐該兵不能盡有家室若令自行備辦恐遲速不齊有無不一其中難免向隅查出征將弁兵丁例有賞借二項其兵丁項下馬兵賞銀十兩借銀十兩步兵賞銀六兩借銀六兩此次派撥赴臺勦匪近在隣省非比出口大舉臣意止應照例准借凱旋後分年扣還其賞銀一項應俟到軍前奮勇勦賊聽候將軍叅賛隨時酌賞以示鼓勵若槩於起程時照例賞給轉使勇怯不分不足以昭激勸臣是以止辦准借一項至此次派出馬兵因地隔重洋並未携帶馬匹現係一律步行臣於各兵起身時普照步守兵准借六兩之例每兵先借銀三兩使不致任意花消扣存三兩官為製辦棉衣衫袴核計尚有餘剰本係該兵等應借之項臣即咨明閩省准其禀知領兵鎮將就近請借為軍營添補之用再鷂鞋套褲已據各本營陸續解送到潮其棉衣一項連餘丁共須一萬二千餘件臣就近在潮飭令地方官備料鳩工並經潮州鎮臣彭承堯多派營匠趕𦂳督辦不日即可完竣除現在後起赴閩兵丁已令隨身携帶外其餘解交厦門同知衙門附便搭解軍營按名散給又接據梁朝桂等禀稱逆匪潰逃之後將備督率追捕必資馬力請於附近潮州各營借撥一百匹解往乗騎查將備起程時只預支三月養亷按月坐扣其應借治裝銀兩凱旋後分年扣還一項未經具領應請即於此内扣出馬價交各營買補等語臣查粤兵先後赴臺灣一萬一千名所有領兵官自總兵至將備共數十員今請給馬一百匹畧有浮多然臺灣地屬﨑嶇馬力易乏似應寛給數匹俾資追捕已如所請令官兵陸續順帶過臺其官員應借治裝銀兩臣現咨詢閩省畫一辦理至駐防領兵官員現按照品級隨帶馬匹其棉衣一項詢之副都統博清額據稱現交秋令各兵均已備帶毋庸另製再現在正值勦匪𦂳要之時兵數既多火藥尤宜寛裕臣先期飭備復經潮州鎮臣彭承堯在本營加𦂳配製又於額外趕備火藥四萬斤即隨此次官兵之後接續運閩計兵丁隨身携帶及三次委員額外運送共火藥二十萬斤均在粤省年額之外内十萬斤係額外辦出尚有十萬斤係於預備三年火藥内抽撥解往臣嚴飭藩司許祖京務須剋期採辦硝磺分給各標營即日領回配製前接閩省撫臣來札借用粤東火藥將來製就解還臣思閩粤同一辦公無分畛域况閩省現在用兵正須火藥應用粤東撥解之項即可在粤配製報銷無庸閩省解還徒糜運脚至駐防兵一千五百名分作四起經撫臣添派臬司姚棻運司徳爾炳阿肇羅道阿彰阿送至惠州老隆一帶地方副都統博清額自省統領行走於七月二十五六七八等日齊入閩境其續調綠營兵六千名内除四千五百名蚤經配渡到臺外尚有在滿兵後接續前進一千五百名臣本定期於七月二十九三十日㸃送出境内有順徳新㑹營兵四百名遲到兩日於八月初二日纔到黄岡當即㸃送入閩又欽奉諭㫖添調一千名八月初三日先㸃四百名出境其餘六百名計程極遲八月初五六等日必到閩省詔安縣境今於初六初八兩日纔到黄岡亦即同㸃送出境查順徳新㑹及羅定營兵俱遲到數日臣㑹同提臣髙瑹傳齊衆兵分將領兵備弁各加重責使凛遵紀律不致稍有遲誤計該兵等到閩配船東渡如風色較順此最後之一千名亦可於八月二十前齊赴軍營再商民挾貲營運利於迅速往來本年因臺匪滋事商船不免心存疑畏已覺比前稀少若再盤詰過嚴必致聞風褁足商販不通百貨騰貴即閭閻隠受其害是以臣嚴諭守口弁員如將毫無可疑之客船槩行留難盤問立即據實叅革重治其罪現在入口商船視春間較多從此轉可暗中物色良歹設法偵探是一任商船往來無阻於稽查奸匪尤為有益至南路賊匪尚未十分懲創何至忽爾紛紛逃竄北路梗塞雖通然賊匪鬼蜮多端其中恐有别情未可深恃且又聞逆匪林爽文將無食貧民招入賊巢挑取年壯者厚給衣食教以技勇抗拒官兵其怯弱者盡數趕出聽其所之以免養活無用之人其奸惡至此臣每向粤省帶兵將備論及鎗砲為行軍利器固須演放純熟然聞逆賊近因官兵鎗砲利害不能抵禦竟敢練出一夥亡命奸徒伏在賊匪隊内抵死直犯我兵倘不預為整備恐臨時轉致喫虧必須於鎗手後𦂳接短兵如賊匪已在百步之内即令短兵直前撲殺有反顧者將兵從後砍之如此痛勦一兩陣殺賊數千賊無計可施當成瓦解之勢再臣聞賊匪最短火藥蓄心搶奪我兵存貯火藥處所尤宜防䕶又聞林爽文胞弟為鎮臣柴大紀用砲擊斃莊大田之子為人割取首級出獻未知是否確實再部議將粤海闗五十二年分應徴税銀撥運二十萬兩解閩備用已移知廣東撫臣圖薩布㑹同監督臣佛寧撥出迅速委員眼同弹兑裝鞘運交閩浙督臣李侍堯存貯入於軍需項下備用均奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚曰前因常青等辦理勦捕事宜怯懦因循茫無定見是以特派福康安前往更換督辦軍務福康安非常青可比朕方倚以集事今閲奏到之摺看來福康安竟不免為常青所惑畧有畏難之意福康安雖更事未久但軍旅之事屢曾經歴寧不知臺灣賊匪止係烏合之衆夥黨雖多易聚亦復易散惟在殱其渠魁則脅從當不攻自破現在常青處兵力雖經零星派撥止存現兵四千名但添調之浙粤駐防緑營兵五千名業經陸續配渡又經李侍堯於閩省泉州各營派撥兵三千名早應接續到彼加以川省屯練兵二千名昨已令鄂輝帶領星速前往是添調之兵不為不多况福康安帶領巴圖魯侍衛等百餘人皆屬屢經行陣趫徤可用以如許兵力而又得奮勇帶兵之人更何必於此時先為鰓鰓過計乎且用兵之道全在乎將如運籌制勝得宜原可以少擊衆斷無賊有一二十萬即須以官兵一二十萬應之之理若以一兵當一賊即再調多兵亦屬不足豈有添兵不已之理乎現在賊匪以全力圍攻諸羅其勢甚重福康安到彼自應統領大兵徑趨北路打通道路聨絡聲勢㑹合進勦方可使軍威振作壁壘一新鼔勇直前令賊人望風奔潰若先存瞻前顧後之見何以集事况就福康安所慮如恐大兵往北賊人乗虚滋擾郡城試思賊匪等如由諸羅一路攻擾郡城則賊人來路即福康安常青等北去之路正可迎頭截殺賊人焉能逼近郡城若慮賊從閒道山徑潛出滋擾我兵豈不可堵其出路若慮南路之賊攻擾郡城則常青在彼數月添兵未及到齊尚能保守無虞豈福康安與海蘭察等同往各路増調之兵萬餘又已到齊且有巴圖魯侍衛等百餘人轉慮其乗虚滋擾之理即使常青於福康安未到之前業已帶兵前赴北路而郡城營盤尚有恒瑞帶兵駐守豈不足以捍禦福康安又何所顧慮而先存畏怯之意甚不滿朕所望矣至常青摺内所稱柴大紀請添兵一萬之語自因柴大紀被賊攻圍兩月道路阻塞文報不通於陸續添調各省之兵共計一萬六七千名之處並未得有信息又因被困甚急不無恇怯是以有添兵一萬之請今福康安已知添調多兵正當乗其鋭氣及鋒而用一振從前委靡畏葸之習乃於途次即已奏請添兵轉比常青奏請之數較多豈非畏難多慮乎福康安身為統帥軍中俱視其意嚮若福康安先有示怯之意則以下將弁等更必心存懦怯士氣豈能振奮耶况即如請添調貴州湖廣等兵亦非指日可到必須兩月之久方能到彼諸羅稍有意外之虞已屬緩不濟急於現在勦捕援應機宜有何禆益耶福康安務須堅持定見胷有成算相機妥辦不可稍渉游移若福康安亦不免畏難過慮朕又將何所倚恃總之此事全在得其窽要决機制勝以期鼓勇直前朕厪念軍務早已通盤籌畫今不妨為福康安明白宣示使之安心若此時常青等勦捕得有轉機早晚㨗音奏至即前此調備之黔楚兵竟當停止徴調福康安自應速渡臺灣督兵奮勦萬一常青等仍前株守諸羅勢竟不支甚或至臺灣全郡揺動則其事必須大辦且將調用京兵及各省兵并不止於調派貴州湖廣之兵而已朕豈大意不審事體之人然以天理人情論之未必至此决裂福康安不必先事畏懼也彼時自應令福康安駐劄厦門俟大兵齊集再圖進取必不令福康安止帶屯練兵二千冒昧前進何必於此時先存疑難畏怯之見乎福康安接奉此㫖更當安心鎮定勉圖剋㨗毋負朕委任之意再現在臺灣勦捕賊匪添兵甚多將來進攻大里杙賊巢尤須用砲轟擊火藥鉛弹最闗𦂳要且賊人此時所搶火藥漸已用盡若運送軍營時或被賊人乗間邀截搶奪貽誤非細著常青李侍堯藍元枚等務須加派弁兵小心押運加意防範倘稍有疎虞惟伊等是問同日李慶棻奏言黔省原有挑備戰兵二萬名平日勤加訓練以備調遣今接奉諭㫖隨宻飭各標營即於戰兵内復加挑選擇其勁勇出色者如數預備並飛咨督臣富綱暨提臣保成將曾經行陣奮勇幹練之將備公同揀派令其帶領管束至黔省軍裝向俱整齊火藥亦屬充裕一俟續奉諭㫖或福康安檄調文書到日即可分起迅速前進奏入報聞二十五日庚申上命軍機大臣傳諭福康安曰昨據福康安奏稱添派官兵一摺已降㫖詳悉開導指示今反覆思之竟至徹夜不能成寐福康安受恩多年最為深重非他人可比因其才具歴練是以特令前往臺灣督辦軍務前福康安陛辭之時朕曾經詳悉面諭福康安由驛前往如途次啟閲常青等奏報勦捕事宜辦理得手已與藍元枚柴大紀㑹同即應迅渡臺灣督同進勦倘常青柴大紀或不能得勝而臺灣全郡竟有意外之虞福康安自應駐劄厦門等候官兵調齊再渡臺灣相機妥辦所諭機宜至為明晰朕臨御五十餘年於一切重大事務經歴不知凡幾無不通盤籌畫熟慮機先今委福康安以勦捕之任豈有令其冒險前進之理無論福康安久經簡任寄以股肱心膂事無鉅細無不休戚相闗斷不肯置伊於險地即常青藍元枚柴大紀等身歴戎行皆係為國家出力亦皆體恤周至圖其萬全下至蔡攀龍徐鼎士及大小將弁朕亦無不時加軫念弗令陟險豈有福康安為朕所親信倚任之人轉不為之計出萬全耶福康安非不曉事者何至不能仰體朕意忘朕面諭之語轉為常青等奏摺所惑耶况朕即不為福康安一身之計寧不為朕一身國家軍旅重務熟思籌畫耶朕厪念軍務早夜思維揆之天理則朕子惠黎元於臺灣百姓一視同仁並無額外徴求之事而以人事言之則林爽文以無藉細民負嵎蟻聚止係么䯢小醜即云不肖官吏貪黷斂怨亦俱被伊戕害且肆其荼毒地方良民受害者更復不少實為覆載所不容亦斷無不速就撲滅之理福康安於金川軍旅大事亦曾經練豈轉於此等么䯢小醜竟至委靡不振耶况我國家荷䝉上蒼眷佑軍興之際即偶遇危難無不轉敗為功如從前兆惠之在錫箔阿桂於木果木温福挫失之後亦曾屢經危險旋俱克成大勲况回部金川本其部落用兵撻伐猶不無戰勝闢土之心至臺灣本屬内地林爽文止係編氓適以自取其死臨以大兵有不如摧枯拉朽速就殄滅者乎且柴大紀現在雖被賊匪攻圍勢在急廹而常青業已派委蔡攀龍帶兵往援柴大紀蔡攀龍素為賊所畏惮亦皆奮勇可恃日内常青接奉前㫖若即舍南趨北諸羅自己解圍軍威振作㨗音踵至亦未可定福康安何必遽請添調多兵為此徒亂人意之舉乎且福康安於清江地方發摺距厦門甚逺豈能一蹴而至途中自必續接常青等奏報即使諸羅勢將不支必須増添兵力常青已經具奏福康安原可駐劄厦門等候官兵齊集再渡臺灣相機督勦况續添滿漢官兵正在到齊軍威增壯更可無慮福康安此時前抵厦門尚需時日又何必預存畏難過慮之見耶從前康熈年間奸民朱一貴糾衆滋事臺灣全郡俱䧟經總督滿保派令藍廷珍以一總兵帶兵前往即能剋期撲滅况現在派如許重兵有福康安等帶同巴圖魯侍衛督率進勦又何難迅奏膚功盖此等刁捍匪徒一時蟻聚緩則彼此相助急則彼此相圖無論林爽文等罪惡貫盈斷無不立遭誅殛即為萬一之慮逆匪等竟將臺灣全郡搶佔而其黨惡匪夥如莊大田等亦斷不肯甘心屈服自必争為雄長自相戕害其勢必至内潰從前朱一貴佔據臺灣後即有呉姓賊人互相争鬬之事此即前事之証是林爽文等縱使大肆猖獗臺灣全郡為賊所佔亦無難設法圖之指日授首况此時賊人佔據要隘我兵前往攻勦在賊匪或得以逸待勞若賊匪竊據臺灣官兵分路進攻則匪徒四處守禦其力亦必難支此乃反客為主之勢辦理更不致棘手福康安寧未算及此乎朕之待福康安不啻如家人父子恩信實倍尋常福康安亦當以伊父傅恒事朕之心為心竭力奮勉克紹箕裘並揆度事機騐之天理人心努力堅定副朕體恤周至宵旰焦勞之意一力擔當若遇事輙先涉張皇不特朕將何所倚恃而伊亦將置身何等耶且在京大臣中為朕所倚信素能辦事者如阿桂久經軍旅但已年逾七旬自難令其逺陟重洋和珅朝夕扈從在朕前承㫖書諭亦難暫離此外即令福康安自思更有何人堪能勝任者福康安簡任有年為國家屈指可數之人若伊復有疑難不能肩此重寄朕又將簡用何人亦斷無為此小事派福康安前往復令阿桂和珅續往又豈有朕親征之理乎就目前情形而論福康安屢膺軍旅聲威素著今領兵前往賊人計大兵必前抵臺灣郡城自亦專注該處以圖抵禦而此處係久經保守駐兵之所可保無虞福康安竟不必前赴府城應帶領巴圖魯侍衛等由蚶江配渡直抵鹿仔港若藍元枚業已前抵諸羅援應福康安即接續前進在後督率㑹合攻勦如藍元枚尚未前往福康安即當㑹同藍元枚并檄知徐鼎士或竟前赴大里杙賊巢夾攻乗虚直搗俾賊人聞知自必回顧巢穴眷屬則諸羅之圍可不攻而自解而南路賊匪亦必聞風驚潰紛紛解散此為聲東擊西之計使其首尾不能相應必成擒矣福康安務須安心鎮定出竒制勝勉圖奏㨗上又命軍機大臣傳諭孫士毅李侍堯曰調派臺灣兵丁所需棉衣等物其借給工料銀兩原應照例歸欵但該兵丁等調赴軍營如果能奮勇出力將逆匪即行勦滅迅速蕆功則借支欵項即加恩賞給免其扣還亦無不可著孫士毅李侍堯即將此㫖宣諭各兵丁等俾感激歡欣倍加踴躍同日李侍堯奏言閩省增募新兵今據各營具報已募得一萬有餘其餘尚在廣為招募查各處情形亦有不同如南澳左營派募四百名現僅募得二三十名經臣嚴行申飭令其速為召募尚未據報其上㳺延建一帶亦祗兵家子弟應募而民人入伍者甚少是各鎮協營不能預定額數均匀配募只可於易募之處多增新兵以備應用閩省惟泉漳二府民皆好勇尚氣情願入伍者多且調發赴臺亦最近便自應於此二府多行召募但細加體訪漳州民情究不可信縁泉漳久分氣類現在逆匪林爽文莊大田等俱係漳籍是以臺地漳人多為賊所誘脅而拒賊者皆係泉人内地聲息相通泉民聞募兵殺漳人尚俱踴躍若募漳人往勦勢必不能得力且漳人入募難保無㑹匪混入其中而既令食糧將來事定後或須量加裁減更有難於辦理之處通盤計算與其多募漳兵自不如多募泉兵是以臣所募兵内漳州所屬僅照藍元枚所指營分共募兵一千其餘多在泉州及金門厦門等處招募至兵數既增則軍械尤須多備鳥鎗一項臣前查奏内地各營遺失及不適用者七千餘桿又因上年臺匪猝擾及本年鳯山失事約畧共損失三四千桿現已動項於福州福寧泉州漳州厦門分設五局派文員㑹同營員上𦂳製補一萬桿今新募多兵每一兵即須一械就現募兵數又須添製鳥鎗六七千桿刀鎗籐牌二三千件一併嚴飭各局晝夜趕造計兩月内俱可齊全餘俟續募得兵若干一面配製亦可應手至所募新兵現將舊兵鎗械通融應用使之早為演習俟新製鎗械齊備則各兵技藝亦可嫻熟得用再軍營各兵自應預籌禦寒之具臣已飭藩司即於軍需項内動支分交各營趕𦂳製備除舊派戍兵本係駐防業有貯備無庸給予其續派之征兵應各製給長袖布厚棉馬褂一件单布套褲一雙搭船解往所用工料價銀統俟凱旋後於各該兵丁月餉銀内寛以月日陸續扣除歸欵奏入報聞欽定平定臺灣紀畧卷三十三
