  text: 欽定四庫全書欽定平定臺灣紀畧卷五十五
  hash: sha256:e6ea459a6e580591b9815db318bfd221ab3a3c67a81eac21ff731729810fa803
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_055-1a, image: WYG0363/WYG0363-0667a.png}
body:
  text: 二月十九日壬子上命軍機大臣傳諭福康安鄂輝李世傑成徳曰此次福康安等帶領官兵勦捕逆匪由鹿仔港一帶進兵解圍攻破賊巢擒獲賊首經過各𦂳要地方賊匪據險抵拒經官兵奮勇攻撲所向克捷此等處山川形勢自必極為險要著福康安即將北路一帶險要隘處所如平林仔小半天集集埔斗六門水裡社水沙連大里杙及逆首林爽文被擒之老衢﨑等處地形山勢詳悉繪圖呈覽以誌戰功即日擒獲莊大田其南路險要地方亦照此辦理再四川屯練䧏畨屢經調𣲖此次隨同官兵征勦更為出力現已有㫖令軍機大臣酌議將川省額設土外委四十名照從前金川之例每名每年加給銀二兩其屯練兵丁即將此次隨征之一千五百名作為定額今該督等按每名每月給銀五錢其餘一千五百名俟有缺出以次㧞補並將此次隨征之降番五百名作為新屯練每名每月給銀五錢其餘番丁亦以次挑補俱作為定例俾出力兵丁得以永邀恩賞着傳諭鄂輝即將現在加恩之處傳集該屯練降番明白宣示咸使聞知俾益加感激踴躍思奮並著李世傑成徳于川省土弁降番一體曉諭知悉以示鼓勵二十日癸丑上命軍機大臣傳諭福康安鄂輝曰隨征屯練降番履次打仗或有陣亡者尤堪憫恤着福康安鄂輝傳集該番衆等俟回川後于軍機大臣議准二千額數之外再將陣亡人等子弟各賞給一兩錢糧一分以示格外體恤若伊等家屬在省先有聞知未免哀悼總俟將來撤兵後再行傳諭李世傑等遵照辦理二十一日甲寅李侍尭奏言台灣勦捕逆匪自前年十二月至今先後撥運過米四十餘萬石銀四百四十餘萬両為數繁多前次當軍務喫𦂳之時内地秪將銀米源源觧送府城及鹿仔港北淡水等處以期無悞軍行但各該員于某項照何例支放若干均未隨時具報即間有禀及者亦無細數清冊亦難作為報銷之底案且查動用各項除鹽菜口糧外尚有夫價車價駁船運價等項多係例内所無并有過于浮濫之處雖屢奉駁查兼經司道等莭次移行催令造具清冊以便核算報銷作何支用之處均未將細數明晰開呈現在蕆功伊邇經臣節次飭局移催迄今仍未據開報臣思臺灣造報之員即係經手支用之員若任其浮濫開銷勢必輾轉駁查而地隔重洋文檄往還動須累月未免更形遲滯撫臣徐嗣曽早抵鹿仔港應請將動支欵項即交撫臣就近督同臬司李永祺逐欵核實以憑報銷其内地供支一切粮餉及夫船運脚等項臣現在嚴飭總局司道府等上𦂳核辦按欵詳請題銷不致宕延又二月初六七等日有船户揚興利等稱自林爽文拏獲之後鹿仔港各廟社演戯謝神殆無虚日附近田畝已種一半其被難歸庄之民現亦及時補種將軍叅贊帶領官兵往南路勦賊連得勝仗現在鳯山尚未收復初九日同知楊紹裘禀稱現在府城附近各鄉已無賊匪惟南路水底藔金京潭等處尚有􅅗匿將軍叅贊帶領鎮將等分投搜捕但賊首莊大田逃匿何處尚未得確信所有附郡義民俱令歸庄耕種而各庄多已被賊殘燬現在亦有修葺各等語查閲福康安摺稿官兵往南已在大武壠大穆降等處殺散大夥賊匪則水底藔等處雖尚未净盡料不過逋逃潛伏茍延喘息莊大田想亦在此等賊夥中决不能另有藏身之處大兵一到勢如破竹計該同知具禀時距今又已十日此時賊夥自已潰散賊首賊目亦當漸次就擒聞撫臣尚在北路部署一切不日想亦前往府城一帶料理安挿各庄民人自亦可次第復業奏入報聞二十七日庚申福康安海蘭察鄂輝同奏言十九日殺散南潭大穆降賊匪擒拏活賊甚多逐加訊問俱稱莊大田向南奔竄鄂輝普爾普拏獲賊匪所供亦属相同隨將匪犯正法即帶領官兵南下行至岡山之大林庄鄂輝亦自大武壠山内新豐里搜勦前來據普爾普報稱十九日夜間在大武壠隘口駐劄有賊匪􅅗來劫營普爾普已早有准備帶兵冲出殺賊一百餘名生擒七十餘名二十一日與鄂輝在東勢庄相遇仍帶兵往北靣山内搜查等語臣等至下埤頭一帶探知各處餘匪紛紛奔逃南下俱在枋藔聚集並據派往水底藔安撫之副將張芝元知府楊廷理等禀稱官兵未到水底藔之前有逃來賊匪數千人復將該處佔據隨商令海蘭察鄂輝恒瑞帶兵進勦臣福康安沿途搜查賊庄隨後接應二十六日海蘭察遇賊二千餘人沿山抄截官兵後路一靣令穆克登阿梁朝桂副將岱徳叅將張朝龍防備南來賊匪一靣令許世亨六十七烏什哈逹帶兵迎擊海蘭察等率領巴圖魯侍衛等由蔗園内出其不意横冲賊陣射死賊目陳建平曽大逹及不知姓名騎馬賊目十餘人奪獲賊馬三十餘匹殺死賊匪三百餘人乘勝追趕匪衆多人俱在海岸排列因無船不能偷渡復來拚死迎拒官兵奮勇直前殺賊一千餘名自行投海及儕入海中淹斃者不計其數所棄鎗砲器械甚多俱經官兵奪獲所有臨陣生擒賊目藍九榮等十九名賊匪二百餘名業經正法至海口一帶莭經𣲖兵防守並將大小船隻驅出外港嚴行封禁常青復添𣲖弁兵自鹿耳門直至東港梭織廵查辦理極為嚴宻再此次官兵奮勇殺賊帶傷陣亡者甚少惟義民首鄭其仁引導先行遇賊陣亡殊堪憫惜臣已將該義民首家属給與銀兩以資收斂查鄭其仁係恩賞守備職銜並令以實缺補用之員應請即照守備之例議䘏再查鳯山縣自賊匪復陷之後衙署義民房屋及䓶竹圍城皆被焚燬大兵進勦南路時該處並無賊人屯聚現已分𣲖官兵前往駐守再臣等在枋藔打仗殺賊時探知敗逃賊匪尚有數千人在極南之瑯嶠􅅗匿莊大田亦由山内竄往該處路徑﨑嶇樹木深宻若不籌截去路官兵一到必致驚竄逺颺緝捕又稽時日查琅嶠地方山内十八社皆係生番直通傀儡大山其山外之柴城隴巒等處逼近海岸亦有閩粤民人居住隨宻諭該處民人務將逃來賊匪偽為容留毋令聞風驚散一面傳出瑯嶠各社生番面加曉諭在沿山隘口處處嚴宻堵截又有山猪毛義民首曽中立招集傀儡山生番一千名聴候調遣各處佈置已定𣲖令烏什哈逹帶領福建水師及廣東兵丁乘舟由海道前往海蘭察鄂輝等帶領大兵由山路進發臣福康安督催各兵前進于二月初四日行抵風港據柴城民人報稱莊大田帶同匪衆俱在柴城欲往蚊率社經番衆極力抵禦復行退回現在居民等宻相約㑹官兵到彼賊匪斷難逃逸等語初五日黎民由風港發兵越箐穿林道路極為逼窄凡遇險要地方俱酌量留兵扼守以備接應約行二十餘里賊匪多人從樹林内突出前隊之侍衛博斌副將岱徳叅將張朝龍都司張占魁等帶兵迎擊海蘭察鄂輝率領巴圖魯侍衛奮勇齊攻殺賊三百餘名生擒一百四十三名追至柴城賊匪人數衆多惟恐我兵攻撲過急賊目莊大田或臨陣被殺匪夥等或乘間竄逸轉不能悉數成擒因𣲖令穆克登阿帶領屯練降番為一隊許世亨岱徳帶領貴州官兵為一隊梁朝桂張朝龍帶領廣東官兵為一隊恒瑞王宣帶領廣西官兵為一隊山猪毛義民副理事劉繩祖帶領粤庄義民為一隊都司莊錫舍北路義民首黄奠邦鄭天球張元懃藍應舉各帶所管義民共為一隊自山梁挨次排下直抵海岸烏叶哈逹所帶水師兵丁適值順風連檣齊至將船隻沿海宻布四面合圍水陸並進海蘭察鄂輝帶同六十七袁國璜及巴圖魯侍衛奮勇往來勦殺臣福康安照料督催令各隊層層圍逼自辰至午殺賊二千餘名賊匪情急相率投海被水師兵丁放鎗擊斃及投水擒殺者屍浮海面不計其數賊目等拚死衝突不能逸出重圍俱在樹林山溝内伏匿隨督令官兵義民等分投搜捕將莊大田及有名頭目莊大韮許光來簡添徳許尚等四十餘名全數擒獲並搜獲莊大田之母莊黄氏一口此外又生擒賊匪八百二十餘名柴城民人及各社生番縳獻賊匪三百餘名俱即于軍前正法捜獲大小砲鳥鎗刀矛籐牌旗幟無算查逆匪林爽文莊大田肆為不法滋擾一載有餘兹首逆兇渠悉行俘獲即日解京審辦盡法處治其餘零星逸匪並莊大田家属臣等仍分𣲖官兵各處搜查務期净絶根株不留遺孽奏入上諭内閣曰賊目莊大田等於逆首林爽文就擒之後尚敢竄匿山林抵死抗拒經官兵四路攻圍勢窮力蹙或竟情急自戕及投海斃命俱属事之所有今乃負嵎死守被官兵義民層層圍逼將賊目莊大田及有名頭目悉數擒獲此皆由上蒼眷佑將士用命而福康安等調度有方佈置周宻是以南北兩路賊首賊目悉就俘擒臺灣全郡平定實堪嘉奬特親解本日手帶漢玉扳指一個小荷苞一個賜福康安又親佩小荷包一個賜海蘭察以示優眷福康安海蘭察鄂輝著俱交部從優議叙所有許世亨梁朝桂穆克登阿袁國璜及在事出力之大小將弁等著福康安查明咨部從優議叙其隨征兵丁並著福康安查明一併分别奬賞至此次勦捕逆匪該處義民等隨同官兵打仗出力現在擒獲賊目莊大田義民首等帶領各莊民人分隊堵截尤属可嘉此内義民首曽中立前因屢次奮勇已賞給同知職銜今又招集生番聴候調遣著福康安即將曽中立酌量補以實缺其餘義民劉繩祖鄭天球張元懃藍應舉等並著福康安查明如何加恩或補以實缺或加賞職銜之處分别具奏以示奬勵至前在下埤頭一帶勦賊之義民首鄭其仁遇賊陣亡鄭其仁前已賞給守備職銜著交部加一等照都司職銜議䘏該義民家属並著福康安從優賞給養贍上又命軍機大臣傳諭福康安海蘭察鄂輝曰此次官兵義民分投搜捕將賊目莊大田擒獲其首先擒拏者究属何人著福康安查明據實具奏現在大兵告竣臺灣地方一交三月氣候即已炎熱屯練兵丁素不耐熱計此㫖到時已属三月下旬即應早行撤回著傳諭鄂輝即令原帶屯練之總兵將官率領屯練等先行内渡取道回川鄂輝亦著由驛來京陛見其巴圖魯侍衛章京等即令海蘭察普爾普等仍分起帶領回京至此外應撤各兵著福康安遵照節降諭㫖次第令其渡回内地各歸營伍此時臺灣全郡平定其餘零星逸匪陸續搜查計三月内自可全竣但應辦善後事宜最為𦂳要常青現已革職毋庸交辦著福康安與徐嗣曽悉心籌酌將改建城垣清釐地畝添設官弁等事妥為經理務期一勞永逸綏靖海疆且不必急于來京瞻覲務將善後一切事宜料理妥協於八月萬夀節前到熱河瞻覲亦不為遲且福康安此次凱旋内渡非如前此進勦時闗係𦂳急不得不冐險遄行者可比亦應候風色平穏方可渡洋勿冐險輕渉並内渡之各省將弁兵丁均不可令其冐險以副朕體恤眷念至意二十八日辛酉上命軍機大臣傳諭福康安李侍尭徐嗣曽曰現在臺灣全郡平定大功告蕆一切善後事宜最闗𦂳要李侍尭現駐厦門照料撤回官兵内渡及核辦軍需各欵項事務繁多自未能前渡臺灣㑹同籌辦昨已有㫖令福康安同徐嗣曽悉心籌酌將改建城垣清釐地界添設官弁等事妥協經理徐嗣曽係福康安奏請帮辦之人且係本地廵撫一切事宜有福康安在彼㑹同商辦自能斟酌妥善一勞永逸至李侍尭係該省總督如有應行㑹辦之處原可彼此札商熟籌妥辦再臺灣逆匪滋事一案前因柴大紀在總兵任内骫法營私廢弛激變福康安並未將其種種劣欵指出叅奏李侍尭常青亦並未據實直陳是以將福康安嚴飭李侍尭交部嚴加議處常青即予罷斥並將前任督臣富勒渾雅徳革職拏問俟解到時並按律治罪至徐嗣曽身任廵撫臺灣營伍雖非所轄但伊在閩年乆於柴大紀縱令兵丁私回内地貿易牟利及廢弛營伍不加訓練種種釀變貽怡之處平日豈無聞見乃竟視同膜外緘黙不言將來自有應得之咎並著徐嗣曽明白回奏又臺灣道永福在府城率領兵民協同防守雖有㣲勞但該處地方官平日貪黷斂怨釀成事端皆係永福所属已不得為無罪且柴大紀近在同城種種貪劣不職如永福曽經掲報督撫而督撫置之不辦應令據實指出自當専治督撫以狥隠之罪若永福並未揭報則不能因其有守城㣲勞稍為寛貸倘伊平日亦有營私之處則更不必言矣著福康安即向永福切實訊問據實覆奏務使功罪兩不相揜以昭平允至楊廷理原係同知各州縣非其専管於此案尚無大過且以在府城帶領義民等悉力守禦一得官兵打仗殺賊信息即隨時禀報李侍尭尚為􅌺速著福康安查明楊廷理如才具尚属可用即據實保奏候朕酌量加恩録用二十九日壬戌上諭内閣曰柴大紀在任兩年之内已婪索金銀五六萬之多且因臺灣逆匪滋事預行寄信家中囑伊子先為防備現據琅玕在其屋後地平之下起出金錠銀兩可見柴大紀居心狡詐任意貪黷若非私令兵丁渡回内地貿易牟利並勒索所屬剥削兵民焉能擁有鉅貲是柴大紀骫法營私貪婪激變種種欵蹟已確鑿可據柴大紀業經革職拿問應俟觧到後交部按律定擬明正其罪向來朕辦理庻務一秉大公至正賞功罰罪尤務嚴明從無成見如柴大紀在嘉義縣時被圍𦂳急曽諭令不妨保䕶義民全師而出柴大紀覆奏不忍將數萬生靈委之賊手仍督率兵民忍饑固守朕以其甚有良心覽奏為之墮淚是以即加封伯爵賞給銀兩而其種種貪劣捏飾之處彼時尚未有人摘發所謂君子可欺以其方者此也迨柴大紀在任各劣蹟節次敗露前經福康安奏其為人狡詐不可信福康安方抵該處自未知其實在劣欵必因人言藉藉故為此奏後因徳成復命朕詢出前情莭經諭飭查詢始據李侍尭遵㫖逐欵查明属實陸續恭奏因即降㫖將柴大紀革職拏問可見朕於臣下功罪惟視其人之自取有功即賞有過即罰從不稍存適莫之見此天下後世所可共喻者是以得邀上天眷佑五十三年以來屢集大勲開疆拓土未必不由此敬天勤民之念有以啟之也上又命軍機大臣傳諭李侍尭毓竒琅玕何裕城曰各省撥運米石原以接濟軍糈今臺灣全郡平定大功告蕆各省業經運到閩境之米既足敷應用其未經運到者自可毋庸再行撥運所有浙江台州等九帮及湖南第二三四起川省第二三四五起米石俱著停止起運内川省應行截留米石現在面詢書麟據稱該省倉儲充足無須買補是此項米石亦可無須截留江蘓著同浙江湖南二省停運米石一體分年隨帮洒帶運通如米數較多不能于下年全數帶交即分作二三年陸續洒帶亦無不可該督撫必須飭属加意收貯勿致霉變方為妥善欽定平定臺灣紀畧卷五十五
