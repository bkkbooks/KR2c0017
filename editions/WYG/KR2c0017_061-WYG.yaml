  text: 欽定四庫全書欽定平定臺灣紀畧卷六十一
  hash: sha256:e9447914695c06f4913c58416f1364c48d30481ddaca2bb8a7a8d48941ce06a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_061-1a, image: WYG0363/WYG0363-0742c.png}
body:
  text: 五月十七日戊寅上命軍機大臣傳諭李侍堯曰向來臺灣換班戍兵籍𨽻漳泉兩處之人居多此次逆匪滋事亦由漳泉民人不和以致林爽文乘間滋擾而防守戍兵俱因係屬同鄉互相狥隠此次從賊者漳州民人雖多但其中泉州民人亦非盡屬義民亦有隨賊黨抗拒官兵者現在臺灣換班兵丁若僅在督撫標及福州恊陸路提標等營兵丁内挑補是督撫兩標充伍食糧者當係福州民人而陸路提督駐劄泉州其兵丁自多係籍𨽻本地者調往臺灣仍係漳泉之人居多恐将來日乆未免勾結滋弊若竟将漳泉兵丁概置不調又恐轉致猜疑更屬不成事體不若於福建通省内如興化延平建寧邵武等處各營内酌量均匀派撥而漳泉兩處兵丁亦攤入其中使該兵丁等知挑補換防無分畛域自必不生疑怯此係該督分内優為之事務湏行所無事或告以離别家室逺涉重洋未便獨令漳泉兵丁向隅自當均匀調撥以歸平允之言使之知是體恤不生猜畏如此不動聲色潜移黙化庶於撫綏防範兩有禆益方為妥善並令記此㫖厯任總督永逺留心再黄仕簡帶兵渡洋並不奮勇勦賊安坐郡城因循株守以致賊匪蔓延罪無可逭朕因其年老多病免其一死釋放回籍而逆匪滋事年餘一切軍餉費用不貲皆黄仕簡因循貽悞所致是以前經傳諭李侍堯於黄仕簡名下罰令繳出銀二十萬兩以偹賠補軍糈之用何以至今未據覆奏著李侍堯查明此次所用軍需共有若干黄仕簡原籍財産是否罰繳裕如之處即行迅速覆奏二十一日壬午上命軍機大臣傳諭福康安李侍堯徐嗣曽曰磺斤採自山中如果開採時毫無透漏則該省民人製造花爆以及打取牲畜配用火藥又從何而來即此次賊人鎗砲内用火藥不少豈盡由搶奪所得可見開採磺山雖派員駐劄仍不能保無透漏此事惟在該督撫等平日嚴加查察總期先於軍火無虧即或民間舖户之所需不能悉行禁絶亦當防其太甚至臺灣地方向産磺斤前據逆犯林爽文供稱将墻上年乆石灰煎煑成硝在北路生畨山􅂻私換硫磺配作火藥等語生畨山􅂻既産硫磺則奸民不但可以向其私換或帮同偷採亦未可定現據福康安奏将臺灣民間私用鳥鎗繳回銷燬改鑄農噐而私換硫磺及偷採之弊尤應嚴切查禁着福康安務飭該地方官嚴宻稽查勿任仍前踈縱並著李侍堯徐嗣曽各於内外時刻留心查察不得日乆生懈滋弊生事二十三日甲申李侍堯奏言拿獲張破臉狗研鞫據供向無行業以開場窝賭為生於四十六年夏間有廣東人趙明徳陳丕陳棟三人曽到該犯家内聚賭趙明徳等告以在廣東曽入天地㑹已傳有四五十人勸令亦入此㑹該犯即行聼從及詰以結㑹後有何好處據供一入此㑹就有同㑹之人相䕶開賭便不怕人攪擾其傳授暗號只是喫茶喫烟俱用三指如有人問及有無兄弟答左右俱有兄弟便知是㑹中人該犯又轉傳同縣人鄭成徐炎及平和人鄭詩張普四人至詰其髙坑菴馬坑廟等處俱係傳㑹之所據供該處地方俱因趙明徳等到過即有入㑹者實無另有為首之人訊以趙明徳等年貌住處據供趙明徳係潮州府大埔縣人在東門外下寮鄉住年約五十餘嵗陳丕陳棟亦係大埔人年俱約三四十嵗其住居細址未曽問得至陳彪實不知係何處人四十八年趙明徳復來家内住宿多日後回廣東乆未再到雲霄實不知在何處嚴烟亦曽到過該犯家内等供查該犯所供情節核之福康安訊問供詞並臣前獲㑹匪審究情形大概相同趙明徳陳丕陳棟三犯現在廣東大埔縣地方臣已飛咨兩廣督臣孫士毅嚴宻查緝並飭漳浦平和等縣查拿該犯所傳之鄭成等到案再行質訊奏入上命軍機大臣傳諭李侍堯孫士毅曰據李侍堯所奏是天地㑹竟係起自廣東傳至福建張破臉狗供出之趙明徳等三犯為首先在閩傳教之人必當嚴緝務獲著孫士毅即速飭屬嚴宻查拿按名務獲勿任兎脱漏網其鄭成等四犯並著李侍堯飭拿到案質訊明確分别辦理上又命軍機大臣傳諭李侍堯徐嗣曽曰各省地方官建立生祠非違道干譽即倚勢力賄求最為陋習必應飭禁此次特令建立建勲諸臣之生祠乃因臺灣地隔重洋民風慓悍逆匪等紏衆滋事肆行不法福康安等帶兵前徃勦捕未及三月即已擒渠蕆事該處民人經此一畨懲創暫知歛戢苐恐日乆復忘是以許在彼建立福康安等生祠明示武威使之怵目儆心望而生惕此為綏靖海隅因地制宜起見但福康安辦理善後各事宜完竣即湏回京且伊亦無自辦生祠之理自應該督等承辦何以未據李侍堯徐嗣曽奏及著再傳諭該督等止湏遵照前㫖於臺灣郡城嘉義縣兩處建立生祠至此次帶兵大臣内惟福康安海蘭察鄂輝普爾普舒亮功績較著職分亦大應行入祠祠内設立木牌書寫伊五人官階其餘各員威望俱輕未便一體列入徐嗣曽現在臺灣此事即交與該撫妥辦從前該省耿藩肆逆時范承謨效忠殉節曽勅建祠宇非同創設該撫可仿照辦理上又諭内閣曰常青於柴大紀貪黷不法一案狥隠不奏前曽降㫖将伊革職交福康安審訊經福康安奏請交部治罪固屬咎由自取但念常青由将軍簡用總督在任未乆即值臺灣逆匪滋事非富勒渾雅徳厯任年乆因循貽悞諱飾袒庇者可比其到臺灣後於柴大紀種種劣蹟固易訪查但彼時正值辦理軍務匆促其不即查叅之咎尚屬可原且伊年逾七旬帶兵駐守郡城保䕶無虞其功過尚可相抵常青著加恩免其交刑部治罪俟到京後候朕酌量加恩另降諭㫖朕辦理庶務一秉至公罪之輕重固視其人之自取而於功過相抵之處亦必斟酌其平不肯稍有畸輕畸重即編户小民尚不使一夫寃抑何况封疆大吏轉不為之經意乎富勒渾雅徳亦當慚服并自知悔懼也二十八日己丑孫士毅奏言上年接准閩省知㑹有天地㑹匪起於洪二房和尚及朱姓等語因並無州縣名色當即㑹同撫臣圖薩布宻飭通省遇有洪姓形跡可疑者俱行徹嚴嚴查解報旋據查出洪姓和尚數名經臣逐一訊供實與天地㑹匪一無交涉惟查有嘉應州法名洪朗洪科二僧與俗家朱姓十七八嵗僧人立嵩同住靈峯寺内當即将三人嚴切訊究堅不承認臣於抵潮後復委惠潮嘉道圖畢赫親徃勘查該寺雖離城三十餘里烟户頗多並非偏僻地方訪訊附近村隣俱稱寺僧耕種焚修從未出外亦從無徃來交接之人並據族隣鄉保出具聨名甘結臣以姓名適合未便遽信其必無為匪情事将闔寺僧人七名一併觧潮臣親提究詰並察㸔語言動止俱係樸野山僧其非起㑹匪犯實屬可信惟因名姓相符未敢據行省釋仍發嘉應州収管在案查洪朗洪科兩僧伊俗家並非洪姓但俱以洪字為名與洪二房之義適合且有十七八嵗朱姓僧人同住雖就臣細加察訪實與天地㑹匪毫無影响但恐日乆弊生不法匪徒又以該僧等洪朱名目互相煽惑不可不防其漸自不應仍留内地臣仍㑹同撫臣圖薩布宻飭通省務将起㑹之洪朱二姓正犯跟緝務獲辦理奏入上命軍機大臣傳諭李侍堯孫士毅曰趙明徳陳丕陳棟三犯俱籍𨽻廣東大埔且有住址年貌非若洪朱二姓尚無的確籍貫住址可比無難尅期弋獲著孫士毅即速選派妥幹員役嚴宻查拿務令全行拿獲毋致要犯得以逺颺漏網至洪朱二姓正犯並著李侍堯仍在漳泉一帶飭屬留心訪查務獲毋任兎脱二十九日庚寅福康安魁綸徐嗣曽同奏言提集柴大紀案内人証逐一嚴訊縁柴大紀於乾隆四十八年十一十二等月前赴南北兩路查閲各營員備辦人夫擡送行李漸至折送酒席下程等項銀數無多亦無一定柴大紀因有舊習即令按營定數繳送統名夫價嘉義彰化北淡水等營毎處畨銀六百圓竹塹鳯山下淡水等營毎處畨銀四百圓共計畨銀三千圓俱係各營都守以至千把總按照亷俸擬派彚繳内有當時未經収取之處即留伊弟柴大經在營催取轉交先後廵查四次計得受畨銀一萬二千圓又得受所過㕔縣餽送盤費並折送下程酒席銀兩毎員二百餘圓及三百餘圓不等共取畨銀七千三百餘圓又毎年収過各營員生日節禮畨銀三千七百餘圓五十年廵查彰化時副将赫昇額以營員不堪苦累曽向柴大紀争論不允都守畏懼總兵仍照數備送現據廵捕鄭名邦等供吐確鑿又鹿耳門海口例派逰撃千總按季輪流駐守凡係出入船隻掛號稽查船户向俱送給陋規如有例帶米石之外多帶米糧仍湏格外加送管理海口将弁係總兵派管将所得陋規按季分送搃兵春季向止繳送九百七十二圓柴大紀以春季船隻較多令毎月加増畨銀二百圓春季共畨銀一千五百七十餘圓夏季九百七十餘圓秋季九百餘圓冬季九百七十餘圓尚有鹿仔港海口船隻較少係安平左右将弁管理毎年繳送畨銀一千二百圓北淡水通海港口雖未開設口岸亦有船隻徃來該處汛員每年繳送畨銀一千圓以上毎年共得畨銀六千六百八十八圓自逆匪滋事以後此項陋規始行停止計柴大紀任内共収畨銀一萬六千七百二十圓又五十年九月内淡水營經制外委缺出額外外委余登魁托廵捕鄭名邦向柴大紀胞弟柴大經講定酬謝畨銀八十圓轉向柴大紀説明㧞補十二月内南路營並北路左營出有額外外委二缺守備吳剛代步兵林長春即林上春劉欽懇求柴大紀允准㧞補當經林長春送畨銀一百三十圓劉欽送畨銀一百二十圓俱經廵捕鄭名邦帶同面交柴大紀收受五十年有新㧞外委甘興隆因班滿欲回内地托廵捕鄭英懇求柴大紀早給委牌送畨銀四十圓五十年八月竹塹額外外委缺出柴大紀将北路中營步兵伍永信㧞補得受畨銀六十圓係廵捕髙大㨗向柴大紀説合轉交五十一年十二月内柴大紀因步兵柴景山㧞補鎮標左營額外外委令廵捕髙大㨗索謝柴景山措備畨銀一百二十圓交柴大經轉交収受所得贜銀除厯年花用並寄回原籍及任所抄出外現今查出糖行黄梧借柴大紀畨銀一千五百圓錢王慶繳出存換錢文畨銀四百五十二圓又總兵衙門聼差兵丁舊設旗牌管班伴當材官四項頭目名下兵丁有不親自上班者每月毎名出錢三百文至六百文不等雇替當差名為包差交該班目兵収用聼其各自在外貿易營私甚至包庇娼賭並不留心約束該鎮恊等標兵房及墩臺塘汎坍塌有年亦不及時修葺四十八九五十等年經閩浙督臣富勒渾雅徳叠次札查嚴飭整頓柴大紀於五十一年調任汀州鎮旋仍調回臺灣謁見雅徳時面加申飭而柴大紀先後在任仍止應名操演全不認真倒壊兵房亦未造修完固迨至五十一年十一月間首逆林爽文在大里杙結㑹抗官聚匪滋事柴大紀適於是月初七日廵至彰化縣經副将赫昇額知縣俞峻禀請派兵查拿柴大紀藉調兵為名於初八起身十二日回至郡城僅令逰撃耿世文帶兵三百名㑹同知府孫景燧於十六日前赴彰化查緝並不親身前徃直至十二月初二日嘉義守備禀報彰化縣城失守柴大紀派令逰擊李中晹帶兵六百名赴援至初四日下晚自行帶兵出城即在演武㕔逗遛不進經永福楊廷理詢問柴大紀以人夫缺少無人擡送軍装為詞藉端支飾永福等復加催促於初五日始行起身及行至灣裡溪即聞嘉義被䧟退回鹽埕橋駐劄打仗數次剿殺賊匪尚屬出力正月内從鹽埕橋起身帶同兵民収復嘉義迨後被圍數月多係文武各員兵丁義民之力及奉到諭㫖令其酌量情形全師而出其時賊匪四面屯聚圍攻勢不能帶同義民家屬突圍他徃而城内軍民亦再三懇留不肯令其出城柴大紀因已固守數月又有大兵不日可到隨傳集義民出示曉諭仍前守禦訊問隨同守城之将備及義民首黄奠邦王得禄等所供均屬相符臣等伏思賊匪起事之初柴大紀適在彰化若平日果能整飭營伍則北路弁兵已足調用何難帶領星赴查辦即恐兵數不敷另湏派撥接應一面飛檄調取一面親徃督拿乗賊勢未張之時􅌺速辦理自可立時撲㓕乃竟回至郡城坐守二十餘日之乆及帶兵赴援又復遲滯遷延種種玩悞軍機之罪實無可置辯柴大紀於臺灣逆匪滋擾之時在鹽埕橋打仗尚為出力在嘉義守禦亦有㣲勞但係專閫大員身當海疆重任平時不思實力整飭乃敢縱容兵丁出錢替役離伍貿易包庇娼賭兵房塘汎並不及時修葺任其坍塌營務種種廢弛更復私營網利廵查婪取夫價海口得受陋規甚至㧞補外委公然受賄狥私肆行無忌已出情理之外迨至廵查彰化正值逆匪竊發之時又不立即帶兵親徃撲捕輒敢退縮回郡觀望遷延以致賊匪蔓延猖獗攻䧟城池一載以來未能蕆事皆由柴大紀玩視貽悞坐失機宜所致應照例擬斬立决派員觧送刑部請㫖即行正法劉欽林長春即林上春等營謀干進賄㧞弁缺情節甚為可惡除劉欽一犯前以臨陣退縮業經正法外林長春即林上春照例擬絞監候處决余登魁杖一百流二千五百里伍永信杖九十徒二年半守備呉剛代劉欽林長春説合賄求律應絞候業經陣亡毋庸置議柴景山杖九十甘興隆杖七十柴大經係總兵胞弟隨同在署不思安分守已與廵捕人員私相交結干預公事叠次説事過錢代兄婪賄應發徃新疆充當苦差髙大㨗鄭英業經正法陣亡應毋庸議千總羅勇把總蔡開祥充當廵捕於柴大紀婪索之時實未經手且係賊匪滋事後打仗出力㧞捕千總亦未餽送夫價得受包差錢文仍即咨部開復再查臺灣鹿耳門海口設立文武員弁防守稽查其出口回至厦門船隻例准載米二百石乾隆三十一年閩浙總督蘇昌准部行查議定同知衙門每船収取畨銀三圓武弁取錢一二百文以為辦公飯食之用經户部奏准遵行在案今柴大紀每年得受陋規至六千餘圓此外如副将及管口文武自必有任意勒索情弊均湏徹底根查當即飭調冊檔傳集經管海口各員弁及書吏人等嚴加究訊縁鹿耳門海口安設文武兩館其武館係由總兵派令安平中左右三營逰擊千總分年按季輪流管理凡船隻入口船戸送給畨銀三圓出口每船四圓又額外多帶米石毎百石給畨銀六圓毎年約収畨銀二萬圓内送給總兵陋規銀三千八百八十八圓柴大紀到任又令春季加送六百圓安平恊副将得受陋規銀二千餘圓又書吏工食紙張費用約需畨銀一千餘圓餘俱管口之逰擊千總各員収用其文館則係海防㕔同知管理入口船毎隻収取畨銀二圓出口船毎隻収畨銀三圓領取硃单每年加収畨銀九圓又各船遇有額外多帶米石毎百石收取畨銀六圓每年約收畨銀三萬餘圓除飯食紙張及設立小船引帶啇艘出入一切零星費用二千餘圓外餘俱同知収用雖海洋風信靡常臺灣年嵗亦有豐歉多寡不能畫一但調查厯年船隻出入號簿核計所得陋規約畧相等鹿仔港自四十九年經原任福州将軍永徳條奏議准添設口岸係理畨同知與安平左營守備管理船隻出入及多帶米石陋規與鹿耳門無異而船隻較少每年同知約得畨銀一萬餘圓守備約得畨銀六千餘圓送給總兵規禮一千二百圓副将向不分送至淡水八里坌海口例不准船隻出入常有私自收入港口因該處産米甚多啇販圖利順便販運出口亦有陋規並無定數該處係淡水同知與上淡水都司管理每年同知約得畨銀六七千圓都司約得畨銀四五千圓都司又於所得銀内分送總兵一千圓文武各員及書吏人等供出數目均屬相符僉稱相沿日乆實不知起自何年至乾隆五十一年賊匪滋事後此項陋規概行停止因傳訊陞任逰擊李隆守備曽紹龍陞任千總陳邦光千總黄明髙等均係五十一年以前管理海口之人俱各如數得受副将丁朝雄前在安平恊任内亦受過海口陋規陞任同知楊廷理於五十一年八月到任十一月内即值逆匪滋事止得過畨銀一千四百餘圓查載米既有定額豈容例外多帶其書吏字識人等飯食費用亦有定數何以三十一年清查定議之後復又多設欵項任意需索是廵查海口並不實力盤騐轉以商販船隻視為利藪若不嚴加懲治日甚一日伊于胡底所有現在臺灣之陞任海防同知楊廷理陞任安平恊中營逰撃李隆署安平恊右營逰擊曽紹龍陞任鹿仔港守備陳邦光署安平恊右營千總黄明髙各収受出入船户陋規銀兩雖係沿照陋習收取但該員等或係責成専管或係輪派稽查乃敢沿襲痼弊飽槖分肥實屬胆玩均應革職各杖一百流三千里從重發徃新疆充當苦差副将丁朝雄等以駐防海口大員並不鈐束備弁轉又按月分贜應請革職一併問擬杖流從重發軍臺効力贖罪以示懲儆其五十一年以前厯任臺灣總兵海防同知安平恊副将中左右三營輪管之逰擊千總鹿仔港開設口岸後管口之理畨同知鹿仔港守備有陞調他省及降革事故回籍者移咨李侍堯查明一體問擬其五十一年以前厯任淡水同知上淡水營都司及四十九年以前鹿仔港理畨同知鹿仔港守備所管口岸例禁出入乃各員並不嚴行查禁輒敢収受船戸陋規情節較重除陣亡各員外其餘均已任滿調回亦應咨明李侍堯嚴查從重治罪再臺灣田畆膏腴産米最多不特漳泉一帶藉資接濟即沿海各府地方食米亦多仰給臺灣自未便以官吏因縁為奸遽将啇販概請禁止查臺灣回至内地船隻每船止准載米二百石從前定例原屬因時制宜但情形今昔不同内地各郡生齒日繁需米較多其自厦門蚶江等處來至臺灣船隻無貨不可販運而回㠶装載只有糖米二種捨此更無他物堪以帶售啇民趨利如騖勢難禁遏與其潜滋弊竇不若明定章程俾啇販流通以臺灣有餘之米補内地民食之不足嗣後横洋船一隻應請准其載米四百石按邊船一隻准載米三百石於印照上註明實數内地收口照數查騐如例外多帶立予重究米石入官並将臺灣管口員弁查叅議處其駕徃浙粤等省船隻仍照舊例止准備帶米六十石毋許稍有浮溢各處封禁海口亦不准載米出洋以重海防至海口廵查飯食及設立小船引帶啇艘出入一切費用均不可少三十一年所定文員衙門毎船准收畨銀三圓武職衙門准收制錢自一百文至二百文不等近年食物昂貴實不敷用應請文員衙門毎船准收畨銀五圓武職衙門准收畨銀三圓以資貼補其掛騐米石等項陋例一概嚴行禁革将所定章程勒石海口倘敢仍前需索額外私増一經船户控告或廵查臺灣之将軍督撫提督查出即行據實嚴恭加等治罪至臺灣逺隔重洋督提二臣稽察實難周到全頼總兵督率将領實心訓練方足以整飭營伍寧輯地方若專閫大員首先怠玩甚至骩法貪婪則将備盡皆效尤兵丁肆無忌憚罔利營私弊何底止臣等於柴大紀案内審出収受各營廵閲夫價兵丁曠伍替役出錢包差庇縱娼賭種種弊端即行徹底嚴究况當賊匪平定諸加釐剔之時尤宜亟為整頓未便稍有輕縱除安平澎湖水師兵丁尚無前項情弊外其餘南北兩路如出一轍臣等於各營内擇其在任年乆者毎營酌調三四名來郡令将該營弊竇據實供吐逐細根究如廵查夫價一節向遇總兵廵閲時各營員備辦人夫擡送行李漸至折送酒席下程銀兩為數無多亦無一定至柴大紀廵查南北兩路即按營收取夫價視營分大小定數多寡均係該都司守備千總把總按其所得亷俸分股攤𣲖彚繳惟外委錢糧較少並不𣲖及柴大紀在任廵閲四次俱照數收受惟陸廷柱接任俸止一月有餘廵查南路一次夫價等項並未收取反覆研究各營将弁所供均屬脗合又兵丁包差一節縁各營自守備以上例有旗牌材官伴當管班四項目兵在署輪流當差其千總把總等官分管之兵或係存營差操或係看守倉庫惟彰泉兵丁與本地民人大半同鄉言語相通多有在外生理之事臺灣土産除米糖二種外無可販賣各兵原無資本不過在街市售賣㯽榔糕餅編織草鞋日積錙銖為添補衣履之用其汀州兵丁善於製造皮箱皮毯多在皮貨舖中帮做手藝得受工資亦非開行設肆該兵丁等日逐㣲利閒散自由憚於差操拘束毎月出錢六百文至三百文不等僱倩同營兵丁替代上班名為包班此項包差兵丁惟彰泉汀州最多他府較少而向來操防兵丁又不照内地原營歸整安設一營之兵分作數十處以致漳泉汀州兵丁散在各營南北兩路處處皆有包差之事其實毎營每汛不過數名所出包差錢文係代班之兵及署内四項目兵得受自柴大紀到任以後遇事婪索遂至備弁無所顧忌相率效尤各營守備及千總等於所管包差兵丁亦零星派繳錢文惟都司以上及標鎮三營城守營守備並無分肥染指情事又縱令兵丁開賭一節訊據各營将弁供稱臺灣賭風甚盛南北兩路守備千總把總等於所管汛地内派兵廵查該兵等遇有開賭之處毎處勒索錢百十文縁臺灣無籍逰民並無家室者名為羅漢脚多以賭博為事每人各帶錢數百文即於街市環坐聚賭骰牌跌錢之外更有僅用蓆片上畫十字即可羣聚壓寳雖素未識面之人皆可共賭朝東暮西並無定所該汛兵丁遇見即将攤場錢文稍為分潤毎處百餘文或數十文實不能多為婪索四十八年以後兵丁等所得錢文均與本管營員陸續分用此内惟鎮標中左右三營向設千總把總輪流值日凡遇差務及上司過往並收拾演武㕔預備總兵将備茶水㸃心不無賠累所得庇賭錢文均為添補值月之費該營守備等並不分用間有零星費用之事亦俱令值月千總把總代為備辦又城守營管理崗山羅漢門哆囉嘓等汛境地偏僻毗連内山大抵務農耕種者居多偶有賭博處所索錢更屬無多亦千總把總兵丁分得守備並無得受又兵丁窩娼一節訊據供稱戍兵來至臺灣因近年兵房坍塌無可棲止租賃民房力有不贍娼家留兵居住藉以包庇而兵丁既省房租兼可寄食並非自行窩娼亦無另得錢文查臺灣各營将弁不知勤慎操防整飭營伍乃於上司廵閲則餽送逢迎於所管兵丁則貪得餘潤縱令包差曠伍貿易甚至索取庇賭陋規不論錢數多寡自數十文至一百餘文不等遇事婪索卑鄙不堪且任聼兵丁居住娼家不加約束以致存營兵少日益廢弛其貪劣貽悞醸成巨案之罪實為重大當賊匪滋事之時該員弁等守城打仗雖各有微勞亦難相抵所有餽送夫價又得受包差開賭錢文之南路營署都司邵振綱署守備陳朝魁把總靳金樑陳國泰鄭攀鳯呉亮南路下淡水營把總葉琪英北路千總帥挺巫昆把總許朝芳北路左營把總陳國忠孫朝亮北路右營千總李進得北路右營署守備席榮千總黄廷揚北路淡水營千總張正耀譚朝亮並未餽送夫價得受兵丁包差開賭錢文之鎮標中營把總石光陞董學海蔡日助左營把總王殿開施必得鎮標右營千總鄭名邦王聫登李春奎城守營左軍千總沈祖禮把總符敦仁城守營右軍把總石生輝二十八員均請斥革從重發徃新疆効力贖罪南路營叅将瑚圖里鎮標右營逰撃左淵城守營陞任守備李步雲已革鎮標中營守備王天植雖無分用錢文但平時既不實力操演餽送柴大紀生日節禮而於種種弊端又不嚴行禁革任令所轄官兵庇賭包差明知故縱實非尋常怠玩可比瑚圖里左淵李步雲均請革職與業經恭革之王天植從重發往軍臺効力贖罪又竹塹守備董得魁於五十一年七月内到任八月内因楊光勲結㑹一案帶兵防守彰化並於竹塹交界處所查拿逸犯旋又帶兵把守大甲溪未經回署該管兵丁包差庇賭錢文雖訊未分用但於賊匪滋事之前到任業經數月並不嚴行查禁即屬容縱騐看其人亦甚平常守禦並無勞績應請革職以為玩縱兵丁廢弛營伍者戒其四十八年柴大紀到任以後查有陞調他省降革事故及班滿調回内地各員弁俱經攤派銀兩逢迎饋送包差庇賭分得錢文均屬法難寛縱應咨明李侍堯確查一體從重辦理總兵陸廷柱在任未乆並未収受夫價經雅徳扎查臺灣營伍亦将廢弛情形禀覆但柴大紀種種劣蹟並不據實掲叅究屬不合應請将陸廷柱交部嚴加議處至臺灣城守營叅将宋鼎到任未乆即值賊匪滋事適因腿上生瘡力疾前往大湖地方打仗守城殺賊頗為奮勉出力今柴大紀案内究出該員失察所屬千總把總得受包差開賭錢文自應與左淵等一律懲治但該員保䕶郡城堵禦賊匪尚有微勞且到任甫及四月情罪究屬有間應請将宋鼎交部議處鎮標左營把總翁振行於五十一年十一月到營即值逆匪滋事訊無婪索情弊應免置議至各營四項目兵及包差庇賭兵丁等原應按名查辦但念營制廢弛由於該管員弁貪縱所致節年班滿兵丁均已換回内地自林爽文滋擾以後戍兵半已傷亡所存各兵亦皆打仗守城隨同出力一載以來並無前項情弊懇免追究至永福業經請㫖革職送交刑部治罪兹復調取道府各衙門卷宗逐一研勘富勒渾於乾隆四十九年五月内札行臺灣鎮總兵及道府等以臺灣營員怠玩並不按期操演不肖兵丁多有包庇娼賭之事行令確查嚴禁並令将坍塌兵房即行查明詳估永福奉札後轉行營縣出示查禁即以並無廢弛禀覆原發正禀例存督署卷内現有批回副禀開註事由可據是年七月九月屢經富勒渾札查臺灣諸務廢弛營兵仍復滋事飭令據實禀覆永福復轉行臺灣府知府孫景燧據該府兩次禀覆内稱㑹同柴大紀加意稽查現在營員俱能鈐束兵丁並無滋事等語永福遂即據禀轉詳並未另行掲報僅将坍塌兵房勘估㑹詳及雅徳到任後以所估浮多駁令刪減分别賠修延至逆匪滋事時仍未修建亦未将營員貪劣之處禀報至海口係文武員弁同管将弁既分給總兵陋規豈有海防同知轉不饋送道員之理又柴大紀廵查南北兩路勒取各營夫價而永福亦廵查地方自不無需索陋規情事嚴訊實無分肥染指之事至廵查地方同協辦道楊廷樺去過一次沿途人夫飯食都是各㕔縣預備供應實未收受銀兩惟每年所屬三㕔四縣按照年節饋送節禮毎員毎節各送畨銀二百四十圓至三百二十圓不等該員任内共收過畨銀一萬餘圓署内供應及修理衙署等事係四縣派家人在府按月輪流承應等語臣等查永福身係滿洲為監司大員當海疆重任不思出力報効乃自到臺灣之後遇事顢頇毫無整頓且得受屬員供應節禮任令貪縱殃民不加稽察親見柴大紀廢弛營伍骫法貪婪該恭道近在同城平時既已瞻狥及至富勒渾屢次札查仍以並無廢弛具禀朦混欺飾尤為可惡自係因地方政治不修與營制廢玩相等惟恐柴大紀持其短長不得不代為容隠是柴大紀貪婪之罪竟由永福狥縱而成應與罪人同科雖自賊匪滋事以後守城尚有微勞而核其功罪斷難相抵應擬絞監候即行派委妥員觧送刑部仍應抄沒家産以為狥隠玩悞者戒所有饋送節禮各員内張貞生一員業經另案恭革其陳良翼王露二員雖守城各有微勞官聲亦好但違例供應呈送陋規均屬不合應一併革職查明該員供應饋送數目令加賠罰出充公再查副将丁朝雄於五十一年奉調引見後回至省城聞逆匪滋事即禀明常青趕回臺灣𠞰捕上年九月十七日率領兵丁進攻南路收復東港以通粤庄運米來郡節次打仗禦賊甚為勇往出力經臣保奏請補海壇鎮總兵又逰撃李隆守備曽紹龍守禦嘉義把總呉亮守禦府城外營盤復往南路追𠞰賊匪均屬奮勉守備王天植於逆匪攻擾府城時悉力堵禦並令伊子王陽春招集義民勦捕遇賊陣亡情殊可憫又在軍營帶兵之逰撃倪賔守備鄭玉楷千總袁良禧頼國振把總㳺國通藍國寳及帶領内地義民之守偹陳大成或隨臣打仗殺賊或分派駐守地方捜拿逆犯均屬始終勤奮著有勞績撤兵後業經内渡回營自應移咨李侍堯照例詳核該員等情罪分别遣發但念其搜勦逆匪帶兵打仗均為将弁中出力之員且所得海口陋規究係相沿積習餽送夫價亦由柴大紀貪縱所致以功抵罪兩不相掩不敢不據實陳明可否量為末減之處出自皇上天恩再恭将瑚圖禮之父健鋭營翼長札穆丕納出兵西路雲南金川五次賞給克爾齊克伊巴圖魯名號雲騎尉世職旋在巴朗拉陣亡加給騎都尉世職即令瑚圖禮承襲瑚圖禮在金川出兵一次由前鋒副恭領補放恭将賊匪攻擾鳯山迎勦得勝盡力窮追不顧後路另有賊匪由北面龜山乗虚撲進遂致失守旋於二十二日帶兵恢復二十四日調赴山猪毛迎取下淡各營兵丁來縣防守回至硫磺漢被賊匪阻溪攔截不能前進鳯山復䧟時瑚圖禮並未在城經常青查明並無畏葸潛逃情事至六月内該員帶領義民由小路翻山進攻南潭復隨在郡城守禦半載以來尚能出力今因饋送柴大紀夫價定擬發徃軍臺自係應得之罪但念伊父屢著勞績身沒行間該員係屬单丁尚無子嗣可否俯從寛典将瑚圖禮免其發往軍臺令在拜唐阿上行走俾得生有子息以綿勞臣宗祀再查楊廷理原係同知各州縣非其専管並無激變殃民之事迨逆匪滋事之初首先招集義民守城打仗始終保䕶無虞大兵進勦時復由三坎店帶領義民前至軍營隨同打仗始終勇往出力臺灣民刁俗悍素稱難治現在賊匪蕩平一切撫綏整頓尤頼幹才臺灣現任各員祗有楊廷理徐夢麟二員最為出色楊廷理自擢任知府以來實心實力辦事公當民情極為畏服現委署理臺灣道措置頗覺裕如今該員既經獲罪即應摘印離任但海疆要缺當民心甫定之後難以遽易生手且現在海外並無堪以接辦之人該員所得陋規究係相沿積習謹核其才具政績據實奏聞可否准其留於臺灣戴罪効力将伊所得銀數加十倍罰出充公再柴大紀永福現應解京經臣遴派汀州鎮標中營逰擊海亮臺灣府理事同知呉元琪建寧府同知楊世綸分起管解起程查海亮業經奏陞長福營叅将例應就近引見楊世綸隨常青在軍營辦事奮勉奉㫖賞戴花翎俟軍務告竣送部引見現經臣給咨赴部至呉元琪於五十二年四月補授理畨同知正值逆匪滋事仍留郡城辦事委署臺防同知自臣抵臺以來陸續拿獲有名股頭曽光裕等十三名並獲偽軍師金娘賊匪楊山等十六名起獲荘大田偽印一顆實為留心出力應請勅部一併帶領引見奏入上諭内閣曰福康安等審訊柴大紀永福等分别定擬一摺著交軍機大臣㑹同大學士九卿法司核擬具奏臺灣地隔重洋文武各員自應各矢潔清力圖整頓乃不肖員弁竟敢需索陋規廢弛營伍甚至縱令兵丁等包賭窩娼從中染指以致醸成巨案此而不嚴加懲創何以儆官邪而靖海疆至柴大紀身任臺灣總兵毎次出廵時不但令各營弁備辦供給且折收夫價銀兩贜私纍纍國家設給養亷於大員特加豐厚以備伊等因公之用若廵閲營伍時仍湏該管弁兵代辦夫馬飯食一切則内地之督撫學政提督於出廵按試時途次夫馬等項亦必令地方官代為置備又安用優給養亷為耶嗣後督撫提鎮及學政等凡遇廵查出考途次所需夫馬等項均着自行備用毋得令經過各員代辦並令文武各員互相紏察如有仍前需索擾累者即各行據實恭奏從重治罪如或狥隐不奏别經發覺朕亦必将狥隐之員一併治罪决不姑貸勿謂朕不教不誡也上又命軍機大臣傳諭李侍堯徐嗣曽曰楊廷理収受陋規自有應得之罪但念該員平時尚屬奮勉此次委辦軍務於一切運送糧餉等事辦理俱能妥協其所得陋規係在同知任内非知府大員可比且甫經平定一切事宜未便遽易生手楊廷理從寛改為革職留任如果八年之内始終出力勤奮方准開復並将伊從前所得陋規銀兩加二十倍罰出以示懲儆此係朕格外加恩棄瑕録用伊自當倍加感奮激發天良以圖勉力自効若因有罰項轉於地方藉端勒索致有肥橐殃民之事著李侍堯徐嗣曽嚴行查察據實恭奏即當立予重辟不止於發遣已也上又命軍機大臣傳諭徐嗣曽曰徐嗣曽係本省廵撫在任有年武職營伍尚可委之總督而文職内有收受陋規營私貪黷等弊即應隨時查訪據實恭奏非如福康安係特㫖簡派前徃臺灣専辦勦捕逆匪者可比總督李侍堯到任未乆隨駐劄厦門料理一切軍務未暇查辦及此魁綸亦係新任将軍徐嗣曽皆非其比乃徐嗣曽竟若忘其自為廵撫置身局外耶其於楊廷理收受陋規之事平日既漫無覺察不行查叅經福康安徹底查奏又復靦顔一同列銜而摺内竟無一語引咎之處殊不可解著徐嗣曽將因何不早行叅奏及㑹銜具奏又不自引咎之處明白囘奏上又命軍機大臣傳諭福康安魁綸徐嗣曽曰福康安奏瑚圖禮之父扎穆丕納出征陣亡該員係屬單丁可否免其發往軍臺俾得生有子息一節因詢之由臺灣軍營回京侍衛章京等稱瑚圖禮現年約三十餘嵗等語滿洲人員祖父有軍功者甚多而軍臺効力不過三年期滿即當釋回計瑚圖禮釋回時尚不滿四十嵗儘可生有子息若因此遽寛其罪将來有軍功者設其子若孫亦係單丁勢必援此紛紛聲請又復何以示懲俟議覆上時仍當将該員發徃軍臺効力欽定平定臺灣紀畧卷六十一
