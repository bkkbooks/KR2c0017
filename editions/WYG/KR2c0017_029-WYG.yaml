body:
  text: 八月初二日丁酉柴大紀奏言二月二十五二十六日北路賊目蔡福勾連南路賊目陳靈光等約有萬餘夾攻諸羅經督率官兵義民奮勇力戰賊匪被鎗打死者數百殺死者亦多生獲張淡等二十五犯迨三月初八日鳯山再失賊復䲭張自二十九至四月内賊衆叠來侵犯各營盤俱經臣督率官兵義民奮力剿殺先後共砲斃賊匪不下數千殺獲亦有千餘但賊匪雖被我兵連日殺退而首惡尚未就擒經移令總兵普吉保各帶兵一千㑹合協拏于五月初三日齊到大埔林四面捜捕查稱賊首林爽文早已潛逃大里杙匪黨俱竄入斗六沙連等處臣與普吉保是晚同駐土庫正在㑹商機宜適接據署北路副将林天洛等先後禀稱賊匪萬餘來攻鹿仔港埔心二處雖經官兵二次殺退但兵力單薄懇請囘軍初四日又據署諸羅縣陳良翼併遊擊楊起麟各禀南路賊匪數千聚集赤山一帶欲乘虚攻城民心惶惑等情臣與總兵普吉保各帶兵馳囘各保地方迨囘營盤探知諸羅賊匪南北交通隨處誘脅滋擾四月二十一日将軍臣常青派撥㕘將潘韜等帯兵一千名前徃諸羅接濟復于五月初十日飛檄酌撥官兵千名星赴蔴豈莊協剿遵即派遊擊楊起麟李隆守備黄象新等共帯兵一千五十名馳抵該處殺退賊匪囘至鹽水港又聞哆囉嘓一帯賊匪勾連賊目李七蔡福等逆黨欲佔踞鹽水港等處希圖斷絶通府道路使糧餉莫運以困縣城即飭遊擊楊起麟等將所帯之兵留駐該處防禦又鹿仔草地方亦係通府要路撥千總陳邦材把總施必得等帯兵二百名駐守派遊擊邱能成帶兵二百五十名一路哨巡接應諸羅城外各營盤共兵一千四百餘名賊多兵少所以尚未殱除凈盡又據遊擊李隆楊起麟守備黄象新等報稱本月十七日聞賊匪二千餘人離鹽水港七里之查畝營八老爺莊等處焚燒莊社隨帶隊伍前徃該處剿捕鎗砲打死賊匪甚多追至下窩莊生擒賊匪白潤林得二名賊衆由山徑四散逃走隨收兵囘劄鹽水港奪獲旗鼓短銃等項二十八日辰刻有賊匪千餘名分路來攻鹽水港分頭迎敵鎗砲打死賊匪數十名追殺至茄苳脚生擒賊匪李猫林苞二名獲大旗一桿有南路偽先鋒字様又鳥鎗弓箭等項餘匪逃竄查遊擊楊起麟屢次打仗均屬奮徃可當一面隨撥把總陳國忠帶兵二百名赴鹽水港換囘遊擊李隆仍駐劄諸羅南門外營盤兹六月初五日探得賊匪數千聚集離諸羅城十餘里之中莊山仔門等處誘脅莊民復圖肆擾隨即親率遊擊邱能成等同署諸羅縣陳良翼武舉黄奠邦及各義民飛徃至近中莊之三界埔遇賊千餘飭令齊放鎗砲打死賊匪數十人賊勢披靡官兵義民奮勇追赶至水尾仔殺死賊匪數十人生擒賊匪蔡文蕭却林顔等三名奪獲竹牌器械等項餘賊奔竄山後縁山徑﨑嶇溪坑錯雜恐有埋伏收軍所有節次拏獲賊匪白潤林得等犯審明從賊打仗並未受有偽職俱就地正法奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰柴大紀奏到情形皆係五月内及六月初四五日之事其賊目蔡福攻犯諸羅被官兵用砲撃斃並撃碎枋車殺死騎馬賊目等事前據常青李侍堯先後具奏而柴大紀摺内俱尚未經奏及至此次柴大紀奏到之摺係六月初八日拜發距今五十餘日查閲沿途驛遞牌單係于七月十九日遞至厦門是内地接遞尚無遲誤竟係由諸羅渡海阻隔四十餘日海洋風信雖屬靡常但常青藍元枚兩處馳遞之摺俱由海配渡即遇風不順偶有阻滯多者亦不過十餘日何以柴大紀此次奏摺竟在洋面躭延至四十餘日之久豈海洋獨非閩省所轄不可按日而稽耶著李侍堯即將柴大紀所發之摺渡海何以如此遲延多日嚴行查察申飭以儆将來上又命軍機大臣傳諭舒常富綱浦霖李世傑曰現在諭令福康安前來行在面授機宜令其前赴臺灣更換常青督辦軍務至臺灣前後所調兵丁自已足敷攻剿但該處山深箐宻路徑﨑嶇因思湖廣貴州兵丁前經調赴金川軍營于馳陟山險較為便㨗若調徃臺灣助剿自更得力著傳諭舒常等于湖北湖南各挑備兵二千富綱李慶棻于貴州挑備兵二千揀選曽經行陣奮勇幹練之將備帶領一切軍装火葯妥為宻行預備聴候調發如必須調遣或俟諭㫖到日或接到福康安檄調文書即行分起迅速前進其湖廣官兵即從本省由江西一路行走貴州兵丁從廣西廣東一帶行走所有沿途經過地方並著該督撫等一體預為籌備俟兵丁到境即刻迅速遄行仍須妥協經理毋致張皇擾累上又命軍機大臣傳諭保寧舒常李世傑琅玕李侍堯曰川省屯練降番素稱趫㨗前經調徃甘省剿捕逆囘甚為得力著保寧即于屯練降番内挑選二千名並揀派曾經行陣奮勇出力之将領張芝元等分起帶領從川江順流而下由湖北江南浙江一路前赴閩省所有沿途應用船隻及一切應付事宜並著舒常李世傑琅玕等預為籌備免致臨時遲悮上又諭内閣曰數月以來常青督率調度尚無過失但統領多兵駐守府城營盤雖屢有斬獲並未能痛加殱戮挪移尺寸之地相機進剿是常青雖屬無過亦不得為有功且該将軍年逾七旬究恐精神不能周到兹特命福康安前來行在面受機宜令其携帶欽差闗防馳赴臺灣更換常青督辦軍務即授福康安為将軍並授海蘭察為㕘賛大臣普尔普舒亮為領隊大臣其恒瑞藍元枚柴大紀仍著照前㕘賛軍務並揀派曾經戰陣之巴圖魯侍衛章京一百餘人分起前徃領兵征剿至臺灣初次調撥及續調官兵已有數萬嗣又于廣東浙江添調緑營及駐防兵萬餘名並于福建本省派撥兵六千現又添派四川屯練降番并于湖北湖南貴州等省挑備兵數萬陸續遄程前徃合計徴調各兵不下十餘萬福康安到臺灣後察看情形如以兵力多多益善再行添兵若干即一面檄調一面奏聞所有應用軍糈已于浙江江南江西湖廣四川等省撥運米百餘萬石軍餉火葯䒭項亦已廣為儲備著李侍堯通盤核筭妥為經理俾足敷十餘萬官兵之用毋致稍有短缺至常青剿捕賊匪雖未能蕆功奏績念伊究係年老尚無貽悞著于福康安到臺灣後即行來京陛見再赴湖廣總督之任臣等謹按常青䒭劄營城外屢有斬獲一切調度尚無貽悮我皇上早慮及其精神不能周到特命福康安前來行在以備差遣兹復授為将軍赴臺督辦厥後長驅深入一鼓蕆功良由勝算早斷自宸衷故機宜悉協迅掃賊氛如摧枯朽也初三日戊戌上命軍機大臣傳諭常青曰朕特命福康安前徃更換常青之意並非因常青辦理軍務大有貽悮寔因常青年逾七旬軍旅之事本非素練恐日久因循不能辦理完結是以特命福康安前徃接辦以期迅速蕆功福康安未到之前常青接奉前㫖不必心懐疑懼轉致遇事茫無主見遇有可進之機仍當督率将弁相機進剿若因有福康安前徃接辦之㫖心存觀望稍有懈弛不復努力前進則常青不但無功而且有過即大負朕委任之意該将軍當明喻朕意倘此時能将逆首林爽文擒獲固屬甚善即首逆尚在稽誅而賊目莊大田若能擒獲官兵已操勝勢即著該将軍用六百里加𦂳馳奏已諭福康安于途中得有㨗報即先行拆看若見常青於剿捕事宜業己得力並可無須前徃即由途次仍囘甘肅本任将來辦理善後一切原屬常青所優為更無須福康安前徃帮助也初四日己亥李侍堯奏言漳州一帶竟有私販硫磺之人並有出産之處兩月以來節據漳州鎮遊擊馬應璧于郡城外拏獲挑磺之何四何十二名磺八十斤南靖縣知縣長瞻于峯蒼嶺地方盤獲販磺之杜强吳若林二名磺四百餘斤龍岩州知州包承祚于合溪地方盤獲挑磺人巫彩鳴䒭八名磺四百四十斤又據烽火門㕘将李威光于牛鼻藇洋面追獲匪船一隻内搜出私磺一百七十餘斤䒭情經臣厯次飭府嚴訊該犯等多係寧化縣人内間有江西人一二名或稱係他人僱挑或稱係買自上杭縣郭車地方挑徃漳州府城賣與劉姓江姓吳姓銀硃店内旋據飭拏舖戸劉長等到案據供每年製造銀硃官磺偶不敷用或向不識姓名挑夫零買凑用䒭情均未訊有確供而上杭縣知縣恩古達禀稱該縣郭車鄉大岩背山内有土磺該地居民王世良等私挖煎賣當即拏獲該犯等三名並搜出煎就硫磺及鉄鑿鉄槌等物是閩省匪徒私販硫磺處處俱有或海洋盗賊買製火葯以供刼掠或奸民輾轉販賣透入賊中俱須嚴加跟究現将各起人犯親提來厦嚴訊務期水落石出查閩省向來並未查出使營中額用者反向逺省採買而本省向來之磺轉為賊人私挖煎販臣現在一面提訊並飭拏在逃各犯務獲解究并飭勘明該山繪圖詳報又本月十九日有外委陳廷標賫柴大紀奏摺送到厦門發逓查該提臣傳單係六月初八日所發而七月十九日始至厦門益覺遲擱隨傳該外委面訊據稱提督摺子因諸羅城外道路梗塞雇熟番覔小路送出于本月初一日始到鹿仔草該外委係在鹿仔草接到又由小路行至鹽水港雇小船于初三日到臺灣府城出鹿耳門初九日因風收泊澎湖十五日由澎湖放洋是以於十九日到厦等語合并陳明奏入上命軍機大臣傳諭留京辦事王大臣李侍堯雅徳富綱曰硫磺一項為軍火要需該犯等膽敢私行煎挖販賣或被海洋盗賊買製火葯以供刼掠或奸民輾轉販售透入賊中皆所必有不可不從重治罪所有拏獲之地方官亦當記功陞用至該省既有産磺地方自應開採煎用乃厯任督撫並未查辦而營中額用硝磺轉向湖南逺省採買其本地土磺一任奸民私行煎挖輾轉售賣以供盗賊刦掠之用雅徳富綱富勒渾俱任浙閩督撫于此䒭地方事務闗係軍營火葯者既未能查出就近採辦而于奸民挖煎售賣又漫無覺察以致私販紛紛所司何事除富勒渾業經革職治罪令留京辦事王大臣就近傳諭詢問令其自行登答至雅徳富綱前在閩省時地方事務廢弛若此均令其自行議罪並即據實明白囘奏初五日庚子李侍堯奏言前接將軍常青摺稿知柴大紀在諸羅被賊攻圍本月十九日又接柴大紀咨㑹係本月初一日所發其述被圍情形較之常青所奏更覺危急倘一有失事則不惟賊勢益張而全臺人心俱為揺動是以屢次札商常青務須増兵設法掘溝放水以通道路速解重圍兹于二十二日辰刻接臺灣道永福禀稱據佳興里巡檢邵宗堯禀稱赴援之兵以及糧餉軍需俱于十三日夘時由鹿仔草三路進發即于午刻直抵諸羅等語永福禀内又稱探得賊首莊大田已囘南路本月十四日常青遣兵巡哨南潭有賊匪數千聚集該處經官兵義民奮勇剿殺賊匪大潰聞荘大田有潛逃之信現在設法截拏南路賊勢日漸退散再得續請之兵三四千到郡即可長驅北路等語查續調之粤兵四千現有一千到厦已經放洋日内又有續到者臣現在厦門督催務令隨到隨即登舟其浙粤駐防兵總于本月内俱可抵厦迅速配渡前徃看來賊勢已衰而官兵之力益振滅賊不難奏入上命軍機大臣傳諭福康安常青藍元枚柴大紀李侍堯曰賊目莊大田糾合夥匪屯佔南路四出滋擾數月以來因常青等未能進剿曽經降㫖飭諭今南潭賊匪已經官兵義民奮勇剿殺莊大田已有潛逃之信是賊勢業經潰散剿捕事務大有轉機想常青之摺不日即行奏到該將軍等乘此賊人潰散兵威振作之時急應親統大兵奮力追殺若于福康安未到以前將林爽文莊大田等即時擒獲則克復全臺俱係常青之功受朕恩眷豈復可量至莊大田潰敗潛逃其勢自己窮蹙現在北路一帶鹿仔港有藍元枚在彼領兵堵截而諸羅接應之兵已經三路㑹合莊大田逃徃北路自無他處可以竊踞必逃至大里杙以為負嵎苟延之計若賊首賊目同聚一處正可聚而殱戮即使負嵎死守以大兵全力四面合圍賊人貲糧有盡無所得食自當束手就斃又何能久延殘喘耶現在添調粤兵先到厦門者已據李侍堯配渡放洋其餘浙粤官兵陸續登舟前發此時自己全抵臺灣常青處兵力日盛而諸羅鹿仔港聲勢亦漸聮絡該将軍不可不益加勉力深入長驅速行奏績但仍當酌派弁兵嚴防後路勿使餘匪得以乘隙潛出此為最要至魏大斌前經常青派令帶兵接應諸羅在鹿仔草被賊攔截小有阻滯該鎮能督率官兵透出重圍前抵諸羅與柴大紀㑹合亦奮勉出力着賞戴花翎其田藍玉特克什布張萬魁同徃接應能與魏大斌奮力剿殺直抵諸羅亦尚奮勇著常青查明何人最為出力即于前次發去花翎酌量賞給戴用以示鼓勵至李侍堯辦理軍務調度接應俱為妥協周到此次一得常青處殺散南路賊匪及柴大紀處援兵㑹合信息即行馳奏以慰朕懐亦著賞蟒袍一件大小荷包以示奨勵其常青俟奏報到日再行賞給初六日辛丑何裕城奏言江蘇海運米十萬石之後又有川米五十萬石為數已多深恐船不敷載若湖南之米又由海道轉連勢必壅積不前殊於軍需無益而五福自濬流修路以來蹊徑漸熟夫役漸衆竹篾小舟亦日辦日多即使交冬水落尚可隨宜設法多行旱路數十里前抵五福不致束手所有湖南省運米十萬石自應照湖北之式亦由長江前來行抵五福水次於江西湖北米石運竣之後接續轉運已咨覆浦霖并飭司預備屆期協力辦理臣仍隨時督率催儧不敢稍有岐視貽悞至江西之米現已運過七萬六千餘石准於九月初旬運竣可以接運湖北米石奏入上命軍機大臣傳諭舒常李侍堯閔鶚元何裕城姜晟浦霖曰此事前據舒常等奏江西省五福一路實有難辦情形是以降㫖令將湖北湖南之米俱歸江南海運今據何裕城所奏是江西陸運既屬可行則運閩米石原止須陸續源源接濟即在九月後接運亦無不可况現在江南封僱海船辦理亦覺竭蹶正需水陸分運庶可不致壅滯周章著舒常等即将湖北湖南之米一併運赴江西交何裕城竟由五福一路接運赴閩毋庸再由江南海運何裕城惟當益加勉力妥速辦理陸續轉運俾閩省足資接濟至江南海口既無需再運楚米所用船隻較少俟川省兩次撥運米石到時正可隨到隨運陸續載往海船無虞缺乏更不必將商船全行封僱致滋擾累也上又命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰本日常青賫摺差弁前來令軍機大臣詢問據稱前此瑚圖里帶領廣東莊義民到營止有一二千人其廣東莊所住民人甚多約有數萬人儘可防守等語前因瑚圖里在山猪毛帶領廣東莊義民前到大營常青等留於大營助剿恐其本莊袛係老弱或被賊人懐恨肆意摧戕曾經降㫖飭諭今據該弁所稱廣東莊所住民人有數萬餘其本庄足資捍衛此即常青時運好處現在南路賊匪已經官兵剿殺賊目莊大田思欲潛逃剿捕事務大有轉機該将軍亟當乘此賊人潰散軍威振作之時親統官兵長驅北路至大里杙係賊首巢穴四面皆山将來官兵圍攻恐路徑險峻艱於馳陟倘圍攻之後賊人尚在負嵎固守則前此派出之海蘭察普爾普舒亮所帶巴圖魯侍衛章京六十人令其分三起行走伊等俱經厯行陣勇健趫㨗一以當千是數十人已足當萬餘人之敵現已有㫖令其兼程遄徃到彼後即令帶兵攻撲更當得力至福康安於途次如見有常青等陸續奏報㨗音竟當遵照前㫖先行啟看或因所帶侍衛章京等人數較多一同行走不能迅速不妨令伊等在後儧程福康安竟先行輕騎减從早抵臺灣賛成大功多一人即添一人之益於剿捕機宜豈不更為妥速耶再川省屯練降畨逺隔數省調撥需時若常青等續有㨗報即當降㫖停止進發以省煩擾並著李侍堯續得臺灣官兵打仗得勝信息即隨時星速知㑹福康安及海蘭察等如官兵益操勝勢可以尅期集事海蘭察等當加倍儧行早抵該處即助拏逸匪亦屬甚好倘常青等統兵㑹剿未能長驅深入設有意外之虞則當仍令海蘭察等在厦門等候俟福康安到彼㑹齊全力一同配渡放洋方為妥善此則朕不自滿假居安思危之慮該将軍等不可不仰體朕意也初七日壬寅圖薩布奏言粤省駐防第二起兵船於七月初七日行至博羅縣鉄岡地方陡遇狂風兵丁急欲儧程不肯停留有正紅旗兵船猝被覆溺甲兵八名内七名及軍械俱已撈獲唯馬甲舒通阿一名被淹身死請將奉委䕶送之徳爾炳阿夏永淳鍾光哲交部議處圖薩布交部察議奏入上命軍機大臣傳諭圖薩布曰駐防兵奉調出征爭先恐後不避風險適因陡遇風暴急欲儧程以致船覆溺斃足見急公奮勇殊堪嘉憫所有淹斃之舒通阿一名著照陣亡例給與賞䘏其被溺撈獲兵丁七名俱著賞給一月錢糧以示鼓勵至兵船遭風覆溺究係猝不及防人力難施其䕶送兵丁之徳爾炳阿等尚無大過著免其交部圖薩布所請察議之處亦著寛免至該駐防兵此時自己抵閩其應賞一月錢糧即著閩省照例賞給初八日癸夘李侍堯奏言松山汛千總鄭魁報稱有浙江石門縣運閩官米船戸劉新春到汛報稱本月初八日該船駛至兩山相對不知是何洋面遇賊船刼去米數十石并押運兵役所帶鳥鎗一桿腰刀一口又據崇武汛把總趙珠成報稱有浙江新城縣運閩官米船戸林長茂本月十六日駛至莆田惠安交界之洋面被盗奪去押運兵役所帶鳥鎗二桿腰刀二口其米石並未被搶又據船戸甘發興到厦門報稱装運興化府米三百五十袋本月十七夜在崇武澚十里外被盗船二隻刼去該船戸自帶畨錢香茹等項并押運兵丁之鳥鎗二桿腰刀二口其米石並未被搶等因查洋盗見官運米石膽敢搶奪已屬目無法紀而林長茂甘發興船所遇之盗則不搶米石専搶鎗刀尤覺可疑地方文武屢接臣䕶送交替之檄何以此三船並無巡船防䕶即米船在外洋乘風迅駛本地兵役或有不及趕接䕶送之處然果平時巡緝嚴宻何至盗賊充斥如此臣惟有遵照海澄縣兵役被刼一案所奉諭㫖将該地方文武嚴㕘革去頂帶留於本任緝拏勒限半年如或不獲即請從重治罪庶於巡哨不視為具文而緝拏可得寔效再據臺灣道永福禀稱近日郡城糧食因北淡水一路漸覺寧貼時有米船到來糧價稍覺平减是臺郡民食亦當不至拮据現在内地将各省運到之米陸續運往源源接濟自不致缺乏其漳泉二府應徴錢糧臣面詢藩司覺羅伍拉納本年己未徵收各數據稱該二府錢糧雖據各屬於二八月間具報開徵縁各花戸因上年舊糧尚未完清先行趕納其本年新糧各該縣又多承辦兵差不及催徵現在並無報司完解各數等語今奉恩㫖緩徵若俟查明己未徵各數始行出示轉恐官吏開報不寔或有挪前移後之弊臣即一面出示除已徵者即提解司庫其未完之錢糧及屯米概行緩徵再漳兵已於本月二十日開洋前往鹿仔港而常青處九千兵内先派往閩粤兵四千已久到臺郡本月十八日續到之粤兵一千亦已開洋本日又有粤兵一千到厦臣亦即令配渡其浙粤二省駐防滿兵月内俱可到厦臣令隨到隨即登舟務當迅速飛渡至閩省水陸兩提督俱係漳州鎮總兵常泰暫行署理漳州地方𦂳要常泰必須駐劄該處以資彈壓而各處營務殷繁兼以海洋盗刼頻聞尤須専心料理方為有益臣雖督飭上𦂳巡拏而照料過兵接應軍需等事頭緒繁多臣自知精神漸不如前寔有不能兼顧周到之處常泰為人謹飭有餘而心思亦不能各處貫注且以一人辦一總兵兩提督之事一切整頓營伍稽查奸匪恐不免顧此失彼查浙閩二省總兵臣俱未識面惟聞有福寧鎮何俊輿論俱稱其人明白且前曾代辦水師提督事務熟悉海疆情形請将該鎮暫署水師提督移駐厦門兼徃來沿海一帶専心料理巡緝之事庶洋面搶刼等案有所責成如聖心另有可信之員派來署理更為妥善又據駐劄扈尾之守備羅禮璋禀稱七月初六日外委陳臯望見大屯山頂有數人挑擔不由正路形跡可疑隨率官兵前往盤問該匪見官兵上山即棄擔而逃不知去向遺下蔴袋竹筐俱是硫磺共十五塊重四百斤等因是北淡水果係出産硫磺若不嚴禁刨挖使賊得以私買應用所闗非細查徐鼎士現已移駐大甲距硫磺山較逺羅禮璋在扈尾可以就近防範一面檄令該備速撥兵丁晝夜巡查看守毋致稍有透漏仍移咨藍元枚隨時遣人訪察以杜私挖俟軍務告竣之後将該山作何封禁著落地方文武稽查不致透漏之處統歸入善後事宜案内妥辦奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰此等盗犯膽敢在洋面行刼官運米船寔屬目無法紀而該船戸所遇之盗又有不搶米石止搶鳥鎗腰刀者或竟係賊黨潜出滋擾亦未可定該地方文武向視巡緝為具文並不寔力查拏以致盗賊毫無忌憚肆行刼掠自應從重查辦著李侍堯督飭所属員弁務須上𦂳設法勒限查拏務獲並於拏獲逃犯時親行提訊是否係海洋刼盗抑或賊人夥黨之處嚴切跟究務得寔情用兵之時不必按例具題一面奏聞一面正法並着拏獲一案即将審辦情形先行具奏其未獲者俟拏獲審訊明確再行隨案續奏至漳泉二府應徵錢糧雖已具報開徵而各州縣因承辦兵差未及催徵報解所有未完錢糧及屯米業經該督遵㫖出示緩徵務須督飭所属嚴行稽察俾閭閻得受實恵毋任吏胥影射滋弊現在南路賊匪經官兵捜勦賊目莊大田已有潜逃之信今據李侍堯奏北淡水一路漸覺寧貼時有米船到彼糧價平減是南北兩路於勦捕之事俱有轉機該將軍等亟應趂賊匪潰散之時乘官兵新到及鋒而用各親自統領南北兩路㑹合柴大紀擒拏賊首賊目進搗賊巢迅速蕆功至李侍堯所奏守備羅禮璋外委陳臯在大屯山有挑運私磺匪徒率兵前往查拏該匪棄擔而逃不知去向是何言耶該守備既見有挑運私磺之人自係賊匪即使帶兵不多不能盡獲亦應擒拏一二人以便跟究嚴訊何至竟任該匪悉行逃散羅禮璋陳臯殊屬無能著藍元枚嚴行申飭此二人遇有勞績不准記功以示懲儆再李侍堯請将福寧鎮何俊暫署水師提督一節何俊如果熟悉海疆足資弹壓自可令暫署否則前此派出赴閩之王炳人亦明白著該督於此二人内酌其才具寔堪勝任者量委一人署理水師提督於巡緝稽查更當得力欽定平定臺灣紀畧卷二十九
