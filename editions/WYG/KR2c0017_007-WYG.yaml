  text: 欽定四庫全書欽定平定臺灣紀畧卷七
  hash: sha256:ed549b48da40d1beb14c4e26cbb4f495c803334fd7623b04ca6330a01d2cf3ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_007-1a, image: WYG0363/WYG0363-0080a.png}
body:
  text: 二月十七日乙邜任承恩奏言拏獲奸細僧人西葉心向新法三名訊供林爽文因攻府城不開聞得鹿港又有兵到恐大里杙一帯失去隨領夥衆由諸羅十六門繞回内山於十三日到大里杙就差我等前來探聼信息并約㑹陳泮等招集黨夥分抗官兵不料就彼盤獲當将該犯等正法一靣差人探知林爽文潜回屬實因𣲖逰撃海亮穆騰額署都司張奉廷領兵八百名至馬鳴山一路防禦大里杙賊匪又𣲖都司馬元勲守備常萬雄帯兵七百名留住埔心庄防範虎仔坑一路餘兵七百名留為防守鹿港海口及四路設卡應用隨據哨報賊匪擾及頭卡鎗傷防卡外委兵丁數人當飭該逰擊等速往堵禦據禀二十二日率兵至柴坑仔遇賊施放鎗砲将賊打退追至田中央賊衆齊出抗敵官兵用鎗砲打倒手執紅黒大旗二賊割獲首級一顆殺賊數十名燒燬賊庄餘賊退走大肚溪東岸因路徑窄狹天色将晚隨将官兵撤回行至䓶仔尾有賊匪從竹圍裏突出衝散把路鄉勇乗勢擁前千總葉榮吳聨貴奮勇抵禦被賊鎗傷陣亡逰擊等見賊勢逼近鎗砲難施即督籐牌兵丁奮力格殺賊衆潰散奪獲賊人大小銃鳥鎗等項至陣亡帯傷兵丁及損失軍械另容查實具報等情查賊匪雖連被官兵殺退但首惡未擒潜歸巢穴暗通匪黨恐致蔓延必湏合兵撲滅鹿港為内渡要口各處難民紛紛屯聚尤湏多兵防守已咨報督臣移咨水師提臣㑹籌辦理同日黄仕簡奏言附郡沿山各處有賊匪蜂擁甚多隨命官兵先赴四路捜追堵禦保固府城縁匪黨聚散靡常聞風各竄臣隨復遣兩路官兵進剿北路遊擊楊起麟等十八日由鐵線橋行至下加冬地方見有賊匪百餘人隨即奮力追殺生擒賊匪鄭發等六名并奪獲刀械等項審明正法又拏獲賊夥王鑑等六名南路總兵郝壮猷於十九日過大湖一帶地方有賊匪數千人前來禦敵隨督率弁兵施放鎗砲自巳刻至申刻打死賊匪三百餘人官兵奮勇追趕生擒賊夥二十五人訊明正法昏暮劄營賊匪復來撲營被官兵鎗砲打死百餘人賊夥退遁又據北路總兵柴大紀咨報正月二十一日在外山部竹地方鎗砲打死賊匪甚多生擒偽䕶駕大將軍廖東一名賊徒陳模黄啟吳章等二十一名二十二日巳時抵田洋生獲賊匪林老併畨婦留娘等共八十二名拏獲偽軍師侯辰一名併奪獲鎗砲火藥鉛子馬匹刀械等項守備邱能成攻開城門賊匪由北門而逸隨将城内賊匪搜拏净盡該總兵親往街市安民俟捜捕近庄事畢即統兵前往彰屬勦洗大里杙又郝壮猷咨報正月二十一日探得賊匪約有三四千人窩聚在西園庄地方隨派令逰擊蔡攀龍􅄁將瑚圖里副將丁朝雄等分三路夾攻用連環鎗打死賊匪三百餘人賊即奔逃搶獲鎗砲器械旗单等項隨将賊巢草寮數百間焚燬查南路鳳山一帯山徑錯雜該總兵帯領官兵由中路之大湖進剿而東路之大岡山小岡山尤為賊匪屯聚之藪必湏添兵前進方為得力二十三日督臣調委汀州鎮總兵普吉保同興化協副將格綳額復帯水師提標兵丁六百名到臺臣即於二十四日遣發將弁帶領前赴大小岡山聼總兵郝壮猷調度務將南路賊匪迅行剿除併將首匪各要犯嚴速擒觧不使一名漏􅃠臣現在南北之要衝隨時應援同日常青奏言准陸路提臣任承恩咨報拏獲奸細僧人西葉等三名訊知林爽文已潜回大里杙庄隨派令遊擊海亮等設卡防守及二十二日該遊擊等堵禦殺賊并首惡未擒恐致蔓延必湏添兵進剿伏思賊人退守巢穴匪類自必衆多若非合兵剿洗計出萬全則賊衆兵单不能得力臣正在揆度機宜飛咨妥辦旋准水師提臣黄仕簡來咨總兵柴大紀進剿北路擒獲賊夥收復諸羅縣城總兵郝壮猷進兵南路屢得勝仗現至大湖進剿尚湏添兵前進查該提臣黄仕簡派撥官兵分路收剿未及旬日之間既已收復諸羅即可直達彰化與陸路提臣聲勢相援而南路之鳯山又經總兵郝壮猷将賊匪攻㪚恢復已在指日至内地派出官兵惟徐鼎士所帶之千五百名屢因風阻現在據報陸續前赴淡水其續調之延津福寧等營官兵二千名此時俱可先後抵臺兵力已厚定可迅速蕆功再粤省撥赴潮州兵二千名臣因漳州一帶地方𦂳要暫請留駐今臺地已報有㨗音内境均極寧謐潮州之兵似可毋庸再行留駐已咨㑹兩廣督臣一併飭令歸伍均奏入上命軍機大臣傳諭常青黄仕簡任承恩曰任承恩既探知賊首林爽文潜回巢穴自應多帶弁兵親往擒捕乃分派逰擊都司等零星堵禦殺賊甚少而千總葉榮等轉被賊鎗傷陣亡更屬不成事體從來行軍制勝合則勢強分則勢弱况閩人性本剽輕若令零星打仗輕於嘗試轉恐挫失氣餒朕屢降諭㫖甚明任承恩豈不之知而乃輕分兵力以致損失威重乎前此署都司易連署守偹陳邦光以微末員弁尚能督率兵民鄉勇等多殺賊衆收復鹿港彰化竹塹等處任承恩到彼後惟就已得之處駐劄觀望僅以派員堵禦了事是誠何心任承恩著嚴行申飭至黄仕簡前以所奏南北二路殺獲賊匪情形亦係接據總兵柴大紀郝壮猷咨報並未躬率士卒迅速追剿黄仕簡所辦何事大非向日嘉予期望之意亦著嚴行申飭伊二人俱不免遲延觀望而任承恩為尤甚恐於剿捕不能得力常青速渡臺灣遵照節次所降諭㫖實力督拿以期一舉蕆事朕於軍務從來賞罰嚴明其奮勇出力者必優加甄録而畏葸退縮者亦必重治示懲黄仕簡任承恩等寧未聞知豈可自蹈重愆以致百身莫贖乎並著常青詳悉諭知該提督等俾各知儆􅅥以期帶罪圖功奮勉集事上又命軍機大臣傳諭李侍堯常青曰賊匪廖東侯辰俱受林爽文偽封名號看來賊首林爽文肆逆不法或竟有自稱為王及僣立年號之事林爽文胆敢糾衆戕官佔奪縣城已屬罪大惡極若果有此等偽僣名號該督即應據實奏聞正可明正其罪無所用其諱飾也所有現獲之廖東侯辰二犯著即派委妥員觧京審辦守備邱能成奮勇當先攻開諸羅城門並將城内餘匪殱盡甚屬可嘉著該督於事竣後送部引見此次柴大紀於官兵未到之先能督率兵民極力守禦郡城現在帯兵赴北路捜剿又能多殱賊衆收復縣城并生獲要犯甚屬出力著常青抵臺灣後先行嘉奨惟是臺灣係該鎮専管地方今有此賊匪聚衆不法之事該鎮本有應得之咎若能及此時勇往剿捕豈止可以將功抵過朕必將伊從優議敘至任承恩正值年富力強且自請前往剿賊乃亦逡巡觀望並著常青到彼察訪實在情形如任承恩尚知出力或有需該提督在彼協剿之處即令任承恩暫留臺灣隨同捜捕俟事竣後再核其功過據實具奏倘於剿捕不能得力即遵照前㫖一靣令其來京陛見一靣據實㕘奏常青固不必因有此㫖過事吹求亦不可稍存瞻徇迴䕶致令倖免其功過大概朕已知悉常青亦不能欺朕為好人也同日徐嗣曽奏言臣前因官兵阻風未渡輙親赴閩安查催實屬知識短淺不權事理輕重現在兩提臣分投捜剿賊匪自必立就殱滅此時沿海各口岸尤宜喫𦂳防範實臣分内應辦最要之事節經諄飭嚴緝本日據署漳浦縣羅澤坤盤獲匪犯陳傍即陳榜供認在臺從逆因病潜回現觧赴督臣究辦查該縣前曽獲犯陳樵經督臣審明正法今又拏獲陳榜一名可見賊匪竄回自必不少現復嚴飭文武員弁加意堵截查拏不致稍有疎忽自干重咎至臣前准督臣札㑹審辦逆匪髙文麟等犯究出起㑹根由係平和人嚴烟即荘烟過臺興起囑臣一體留心宻查嚴烟籍𨽻漳州恐其已回原籍當即宻飭查拏尚未報獲現又嚴飭宻速訪緝仍令不動聲色妥協辦理再現據漳浦縣訪獲天地匪㑹黄斷等十二犯雖據訊稱係糾約資助𦵏費並無為匪不法情事但有無不實不盡現已提省嚴行究辦兹又接准兩廣督臣咨㑹拏獲匪犯許阿協等究出該犯等先後到漳經平和縣人頼阿邉龍溪縣人梁阿步等糾其入㑹臣已宻札汀漳道朱芫㑹留心訪緝鎮静妥辦毋使兎脱奏入上命軍機大臣傳諭徐嗣曽曰前因臺灣賊匪滋事之初督臣既經前往泉州駐劄該撫自當在省静鎮弹壓乃徐嗣曽有前往閩安之奏是以降㫖申飭今臺灣賊匪業經兩提臣㑹兵搜剿縣城早經收復賊匪紛紛潰散大局已定偷越内地餘匪正復不少則此時情形又與前日不同嚴拏逸匪最為𦂳要該撫又應往來沿海各口岸親自督率擒拏不使一名漏網方合機要况省城距厦門一帯不遠就近往來仍可回省辦理一切兩不致悮乃徐嗣曽拘泥前㫖将捜捕餘匪等事僅委之文武員弁該撫轉安坐省城何總不知事體輕重緩急若此徐嗣曽著再傳㫖申飭該撫接奉此㫖即速赴海口一帯親自往來查察務将偷越餘匪嚴宻截拏勿稍留餘孽臣等謹按事有輕重緩急貴於變通隨時林爽文起事之初内地民人自必聞風疑懼我皇上於撫臣徐嗣曽前往閩安之奏深責其非盖以過涉張皇恐致民情惶惑也及兩提督渡臺賊匪紛紛逃散此信播聞即愚民皆知賊夥之易除不復更有他慮得撫臣親往海口督拏逸匪自必更為得力聖天子揆幾度務隨時變通特授機宜不設成心惟期其是益見聖謨廣運悉協時中也十八日丙辰藍元枚奏言二月初五日督臣常青等咨稱逆匪林爽文等南北蔓延派撥官兵分路剿捕經柴大紀獲賊黄余等四名審明正法楊起麟在下加冬地方生擒賊匪鄭發等六名獲賊夥王鑑等六名又郝壮猷在大湖一帶地方殺賊匪四百餘人生擒二十五人訊明正法理合奏明同日徐嗣曽奏言黄仕簡拏獲偽将軍廖東等收復諸羅林爽文現已潜回大里杙荘柴大紀收復諸羅之後即可前赴彰化一帶與提臣任承恩并力夾攻而南路鳳山一帶現又經提臣黄仕簡添派總兵普吉保帶兵馳赴大小崗山聽總兵郝壮猷調度不日亦可得有收復信息臣嚴飭沿海地方實力堵拿不使一名竄逸漏網均奏入上命軍機大臣傳諭李侍堯常青徐嗣曽曰本日藍元枚徐嗣曽奏到各摺皆係常青黄仕簡等業經奏到之事乃各用六百里馳奏徒勞驛站甚屬無謂嗣後該提督等拏獲逸犯等事應行奏聞者仍令専摺具奏外若不過接准臺灣提鎮咨報捜勦情形業經督臣提臣馳奏者均毋庸重複聲叙由驛奏報以省煩擾至常青此時自己親渡臺灣督率鎮将等實力捜剿但常青已經調任湖廣總督今以欽差前往督辦一切題陞調補若専俟本省總督李侍堯辦理則所統将弁等見常青不能専主或心中以為即奮勉出力亦不能即邀㧞擢未免稍生懈怠著傳諭常青現在臺灣将弁被賊戕害多有懸缺未補者常青到彼即應於剿賊弁兵内核其實在出力者官則酌予陞擢兵則㧞補千把一靣具奏一靣知㑹李侍堯俾常青得有事權以便䇿勵將卒呼應較靈可期迅速集事臣等謹按將帥之整肅戎行因事權之専一也督臣常青以湖廣總督督師臺灣使一切題陞調補必咨明本省督臣辦理將弁等見其不能専主必致心生懈怠皇上曲體人情明無不矚特降諭㫖令常青於軍營懸缺皆得酌量陞補不使少有掣肘真鼓勵人才之要道也十九日丁巳上諭内閣曰福建臺灣逆匪林爽文等聚衆滋事一案節經該提鎮等奏報剿捕情形摺内據稱賊匪蜂擁團聚各有萬餘及數千不等竟似現在賊衆已不下數萬而所奏每次打仗殺賊之數或稱數百或稱無數又似被殺之賊已不下數千賊人倉猝起事其糾約黨羽及沿途被脅入夥者何能即至數萬之多此必緑營将弁畏懼無能揑詞多報既可掩其恇怯又可藉以冒功不知被殺之賊俱有首級耳記屍身可騐而黨羽之多寡將來生擒林爽文等亦無難跟究確數著常青于剿捕事竣後務將所報賊數與所殺所拏賊數詳細核查據寔具奏毋任朦混至林爽文等攻犯城池戕害官民罪大惡極不特首要各犯罪應寸磔即入其黨夥者均屬法無可貸但現在賊衆雖未必如該提鎮等所報之多而林爽文等到處煽惑糾結為日稍久看此情形人數亦當有萬餘其中被賊逼脅附從者想亦不少若概予駢誅朕心有所不忍著常青于官兵勦捕時臨陣痛加殱戮不計外其續行搜獲暨賊黨畏懼縳獻乞降之犯著該督逐加審明此内如受賊偽職及曽戕害抗拒官兵者仍當即行正法其止于被脅隨行並未與官兵打仗者尚可免其一死量予逺徙該督其恪遵妥辦以副朕仰體上天好生之徳法外施仁至意臣等謹按臺匪滋事焚掠村庄到處脅從遂至蜂屯蟻聚論以叛逆之條皆屬法所難宥者我皇上不忍概予騈誅特命于搜獲乞降之犯分别其未受偽職及未與官兵打仗者免死發遣皇仁浩蕩於萬無可貸之中尚求其一綫可生之路容保無疆非所謂與天合徳者歟上又命軍機大臣傳諭常青李侍堯曰現在臺灣勦捕官兵節據常青奏報先後調派共計一萬二千餘名軍威已極壯盛任承恩等並不親臨行陣僅派委將弁零星打仗致首惡潜匿稽誅轉以賊勢蔓延必湏添兵進剿為辭可見任承恩懦怯無能不過藉此以掩飾其遷延觀望之咎昨已降㫖嚴行申飭著再傳諭常青于到臺灣時遵照前㫖留心查察據實嚴􅄁無得稍有瞻徇計此時兵力已足更無庸再議添兵至現在大兵四路㑹勦賊人勢在危急其有擒獲賊目割取首級呈獻及臨陣乞降者已諭令常青分别查辦果係被賊脅從尚可寛以一綫分别發遣新疆等處給厄魯特兵丁為奴但此時賊黨尚多此等匪徒目前冀緩誅戮恐有挾詐偽降情事尤應嚴宻防範並著常青察看確情慎重辦理毋得稍有疎忽所謂受降如受敵不可不知也上又諭内閣曰臺灣賊匪林爽文滋事一案署都司事守備易連守備邱能成署守備事千總陳邦光于克復諸羅生擒要犯及保䕶鹿港新庄等處俱能率領兵民奮勇出力甚屬可嘉所有現出臺灣鎮標中營遊擊耿世文員缺即著易連補授左營遊擊李中揚員缺即著邱能成補授北路協都司王宗武員缺即著陳邦光補授伊等率衆争先收復擒拏是以逾格超擢用示優奨其臺灣北路協副將赫生額及諸羅守備郝輝龍員缺仍著常青于帯兵各員内擇其功績最著者酌量奏請陞補以昭奬勸欽定平定臺灣紀畧卷七
