  text: 欽定四庫全書欽定平定臺灣紀畧巻二十四
  hash: sha256:615c466f1252bf560db77f2c346b526e0ef35952c1a67befe824e3f55c075adc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_024-1a, image: WYG0363/WYG0363-0263a.png}
body:
  text: 七月初五日庚午上命軍機大臣傳諭常青李侍堯藍元枚柴大紀徐嗣曾曰偶閱通鑑輯覽見魏司馬懿破襄平一事懿以公孫淵使其將率步騎數萬屯遼隊圍塹二十餘里乃欲以老師攻之正堕其計且賊大衆在此其巢穴空虚若直至襄平可期必破遂多張旗幟出其南牽綴敵勢潛濟師出其北直抵襄平遂大破之此乃兵家聲東擊西之法因思臺灣賊匪四處蔓延若紛紛堵禦處處𠞰賊則兵分勢單疲於應接轉恐不能得力若常青等於郡城外劄營處所派撥疑兵虚張聲勢佯與賊牽綴相持而該將軍統領精銳帶同侍衛章京將備或乗夜輕騎直趨南潭擒拏賊目莊大田使之猝不及偹藍元枚亦派奮勉將備於鹿仔港亦虚張聲勢堵禦附近一帶屯聚賊匪而該叅賛率領弁兵㑹同大甲溪義民熟畨前搗大里杙賊巢如此乗虚進剿出其不意使賊匪倉皇失措首尾不能相顧衆夥自必驚疑潰散是亦搗六擒渠之一䇿兵家虚實互用古人屢有出竒制勝以少擊衆者原不可不隨機應變以防株守力疲也著常青藍元枚查看情形如可相機進取竟即當照此辦理不可坐失事機以期迅速集事至柴大紀昨日奏到各摺係與普吉保在大埔林㑹商進攻聞有賊匪滋擾囘城堵禦之後拜發者賊匪雖經官兵剿殺為數無多及餘匪是否尚屯聚各處或仍遁徃山竂仍潛出攻擾柴大紀並未詳晰奏及即前次該提督與普吉保㑹靣各情節止據普吉保前摺聲敘亦未據柴大紀於摺内奏明且該提督於五月二十三日拜摺後距今又四十餘日自必與賊匪連次接仗藍元枚自㑹兵攻擊均着隨時加𦂳馳奏至未經調用之漳州有眷屬兵二千前經諭令李侍堯不必俟藍元枚囘信即行派徃此項兵丁究於何時由蚶江配渡又粤省先調預偹兵丁此時計巳早抵厦門李侍堯於何時派撥配渡着該督即行具奏漳泉一帶現今缺雨田禾黄萎小民秋收失望恐米價更有増昂甚關𦂳要前因閩省需用米石已早降㫖令浙江等省備辦起運著徐嗣曽再詳晰出示俾各屬通行曉諭市價不至踊貴方為妥善臣等謹案行兵之道以少擊衆要在隨機應變先發制人將軍常青等劄營城外賊匪仍敢時肆攻擾明係借此牽綴大軍遂得各處焚刦阻絶糧路其計狡黠我皇上屢諭常青舎南趨北直搗賊巢兹復引司馬懿破襄平之事令常青統領精銳徑襲南潭藍元枚㑹同義民熟畨直趨大里杙南北並舉出其不意若首惡成擒餘黨自潰此真扼要争竒之良策進取機宜早不出聖明洞照之中惜將軍等各有牽掣未得遵辦故剿捕不免稍稽時日也同日李世傑閔鶚元同奏言江蘇碾備之米已分作二起趕運所有四川省米二十萬石由長江來蘇計期當在江西撥米起運之後臣等惟有預督所屬將續到之船儘力截留並移㑹浙江撫臣琅玕一體截留以備運用俟川米一到臣等即派委員弁妥為照料尅日運送閩省交收斷不敢稍分畛域致有諉悮同日寶琳琅玕同奏言派調浙省駐防滿兵即飛咨署乍浦副都統舒楞額於滿營内挑選精壯兵五百名揀協領等官十員帶領即日起程來省臣等隨扵本日傳齊八旗滿兵㑹同逐加挑選共足一千名並派協領二員佐領四員防禦四員驍騎校十員分行管帶該兵等無不奮勇争先告求前徃及選派足數未經入挑者猶紛紛跪求情愿出力所有杭州滿兵一千名乍浦滿兵五百名臣等酌定以二百五十名為一起共分作六起間日行走一切軍裝火藥鉛彈器械俱令褁帶足數糧餉等項按數給發所需船隻臣琅玕當飭趕𦂳備辦兹頭起官兵已於二十六日午刻起程臣等親至江干督送其乍浦滿兵臣琅玕已派委嘉興府知府鄭交泰馳徃㑹同理事同知並派出領兵之員照料䕶送來省以便接續起程計未起官兵起程之前永慶自可到省倘不能如期趕上臣寶琳即先行督催前進俟永慶前途趕到接替􅄪行囘省至各兵經過水路各站臣琅玕已飛飭該府縣各於本境内地方照料妥辦並令在省司道帶同委員按起輪流彈壓䕶送其江山西安一帶陸路尤為𦂳要臣琅玕委令杭嘉湖道清泰㑹同金衢嚴道玉徳在彼妥辦䕶送出境均可不致遲悮均奏入報聞初六日辛未何裕城奏言碾運閩省米十五萬石當經查明新城縣五福一路轉運惟恐溪河旱道挽運不速擬由江南海船分運一面咨詢一面趕碾米石並督飭將溪河水淺之處爬沙撈挖平治􅈝隘山路於五月二十六日將碾就之米開行徃五福轉運嗣准兩江督臣李世傑來咨江蘇亦有協濟閩米由海道運徃若江西載米到彼等候不免欲速轉遲今五福一路自設法料理以後行走較便臣與藩司李承鄴輪流親徃督催並令各縣米船添僱縴夫加𦂳挽運旋准閩省咨㑹委道府佐雜在光澤縣接運五福運徃之米以八萬石運赴厦門七萬石運赴泉州盤收令江西委員帮同照料兹各縣米石全數捱帮前進截至六月二十二日運至五福米三萬五千餘石挑送水口已交閩省委員接運現在早稻收穫正畢挑夫日募日多轉運自必倍速奏入上命軍機大臣傳諭李侍堯保寧閔鶚元何裕城曰江西五福一路運送米石既可不致稽遲而江南海船又不敷裝運此項米石自應仍由江西陸路趕運該撫惟當督飭所屬上𦂳查催迅速儧運毋致􅄪有遲緩至李世傑等前因江西米石應由江南海運業經預備船隻今江西之米既由該省陸路起運毋需江南海船前諭保寧將川米備辦二十萬石由川江運至江南正需海船撥運現在江南預備分運江西米石船隻將來即當留為運送川米之用初十日乙亥李侍堯奏言連日接臺灣同知吳元琪等禀稱府城米糧向恃北路之蔴豆社笨港及南路之東港竹仔港等處沿海販運米石來府城濟用前月中蔴豆社笨港已被賊攻佔近日東港竹仔港又為賊匪張基光鄧里所據以致南北兩路無米到城而避難來郡者又多艱於覓食最為急務海邊小船并有被賊押去者現在副將丁朝雄酌派官兵并挑義民四百用船四十餘隻在沿海一帶巡拏又據知府楊廷樺禀稱柴大紀在諸羅屢次打仗尚為奮勉近因分兵徃救鹽水港等處兵力益單諸羅縣陳良翼現在禀請將軍派兵徃援各等語㸔此情形臺灣賊匪更覺滋擾府城既有難民紛集自不得不暫為周恤適有續辦薯乾十萬斤將解鹿仔港臣隨飭派四萬斤分解府城並札該道府設厰將薯乾和米煮賑善為撫恤毋致失所至臣所預調在泉厦彈壓之本省兵二千名内駐札厦門之一千名已於本月十三日隨常青之子侍衛希明放洋駐札泉州之一千名亦已催來於十五日放洋計此時俱已早到臺灣其兩廣督臣孫士毅遣來粤兵二千亦於十五六七八等日到厦今於二十四日一齊開駕查常青等與賊相持竟有不能分兵之勢此四千兵一到當先令驅剿東港等處之賊使糧路疏通則府城人心先定即可相度事機大舉剿除再常青拏獲之畨婦金娘及賊匪林紅王坑郎楊章四犯於六月初六日觧到泉州臣當即委員起解赴京外兹又據駐劄北淡水之副將徐鼎士並同知徐夢麟拏解彭喜頼樹二犯前來彭喜原係澎湖守備因軍政革職從前署北淡水都司時即與林小文相識上年十一月赴淡水向林小文索討舊欠值賊匪肆擾遂入賊黨在白石湖山教賊聚石在山擲打官兵因賊散被擒其頼樹一犯係從林小文紏約入㑹竪旗聚衆偽稱北路大將軍在新莊街抗拒官兵逃後被獲均屬罪大惡極應解刑部已於本月二十日委員將二犯解京奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰北路之蔴豆社笨港南路之東港竹仔港等處為府城販運糧米通衢今為賊匪佔踞以致南北兩路無米到城避難民人艱於覓食不可不急為設法剿除前屢經諭令該將軍或舎南趨北直搗大里杙賊窩或酌添兵丁防守府城即帶領侍衛章京等直徃南潭擒拏賊目莊大田該將軍接奉前㫖未知作何籌辦定徃何路進剿現在賊匪將南北兩路運米社港佔踞并押去海邊小船雖經副將丁朝雄等挑派官兵義民前徃巡拏究恐不能痛加剿戮此時常青或與賊相持不能分身何不於鎮將内如蔡攀龍之奮勇可恃者酌派一員令同侍衛章京一二人帶領官兵竟徃蔴豆社笨港等處先將佔踞社港賊匪悉力殱除俾道路肅清販運米糧不致阻隔仍飭該處副將丁朝雄等實力巡拏海邊船隻不使賊匪搶佔此為最要此等賊匪四處侵擾多係脅從其實賊首賊目不過數人該將軍若能將其渠魁擒獲其餘夥匪自可不攻而潰且賊首林爽文與其有名賊目各負一隅而分遣黨羽四出滋擾使官兵分路堵禦疲於應接而賊匪轉得暇逸此乃賊人奸狡之計該將軍等不可為其所愚斷無賊匪東至則於東堵禦西至又於西堵禦以一兵抵禦一賊之理若徒事紛紛堵禦稽延一日則師老一日恐官兵日久力疲致有挫失更屬不成事體柴大紀處兵力亦單自應添兵助守但常青處現在正當相機進𠞰難以分兵徃援且道路阻隔亦屬緩不濟急朕意藍元枚現駐鹿仔港距諸羅較近且該處現已添撥兵丁即日可到藍元枚前奏差弁約㑹大甲溪義民熟畨前徃大里杙之南合兵攻剿若聲勢不能連絡未經前徃此時或令普吉保駐守鹿仔港該叅賛先帶兵數千前往諸羅帮助柴大紀更可保䕶無虞著藍元枚相度情形隨宜酌辦務使柴大紀處不致稍有疎虞亦不可有顧彼失此之慮方為妥善至現在笨港蔴豆社等處有賊匪佔踞藍元枚亦應派撥將弁帶兵前徃該處奮力剿散打通糧路為要再李侍堯預偹在泉厦之兵二千已於六月十三十五等日配渡開洋粤省先到兵二千於二十四日一齊開駕此次添調官兵共計一萬一千名前已諭令李侍堯將九千名撥徃常青軍前二千名派赴藍元枚處續據李侍堯奏預偹漳州兵未經調用者二千名亦有㫖令該督派徃藍元枚處此項漳州兵究於何日配渡此外應撥藍元枚兵二千是否即將漳州兵抵數抑於前派一萬一千内再撥二千前赴鹿仔港並著李侍堯詳悉速行覆奏再臺灣府本年應徴錢糧已有㫖豁免至漳泉二府前據徐嗣曽奏春夏缺少雨澤恐至歉收且該處有過兵運糧等事亦因酌量加恩但此時巳過徴收之期其業經完納者自未便給還且恐徒為州縣吏胥肥槖若尚有普行未徴李侍堯即可一面傳㫖出示緩徴一靣據實覆奏再彭喜係恭革守備膽敢從賊抗拒官兵實屬可惡着該督等即查明該犯家屬問擬縁坐至頼樹一犯據供受賊偽職與官兵相抗該二犯既經從賊自有黨夥何以容易即被拏䕶將來解京審訊恐又如廖東等之狡供不認亦未可定並着李侍堯將彭喜頼樹如何被獲實情一并查明具奏上又命軍機大臣傳諭保寧李世傑閔鶚元曰現在臺灣軍務尚未告竣一切兵食及平糶撫䘏等事在在急需不妨多為儲偹川省素為産米之區連嵗收成豐稔積儲較裕著保寧再行採買米三十萬石如或市糧不敷採辦即於附近川江各縣常社倉内碾動榖石以足三十萬之數接續運赴江南交李世傑等一併委員運徃閩省以資接濟其碾動倉榖不妨暇時買補至此次運閩米數需用海船較多着傳諭李世傑閔鶚元將海船一項寛為預偹俟前次川米二十萬石抵江起運後所有續辦米石一經運到江省即接續配船起運以期迅速抵閩毋悮要需臣等謹案閩省軍糈民食屢經宵旰運籌不待奏請早於浙江江南江西四川等省酌撥七十餘萬石接濟嗣據督臣李侍堯奏儲偹已屬寛餘我皇上以現在添兵進剿凡鄉勇難民皆須支給撫䘏並漳泉平糶所需尤在多多益善特諭四川督臣李世傑再辦米三十萬石接續運徃不特軍餉有餘而民食益形充裕聖主軫念民依有加無已所以該省即收成稍歉而閭閻仍安堵宴如也上又諭内閣曰李侍堯奏閩省現在軍務繁多武職人員不敷差委請揀發叅將二員逰擊三員都司四員守偹六員速飭來閩以資差遣委署着留京辦事王大臣㑹同該部於候補候選及應陞人員内詳慎揀選具奏即令該員等輕騎減從􅌺速馳驛前徃福建交與李侍堯差委上又諭刑部堂官曰臺灣從賊逆匪廖東胡畨二犯前審訊時堅稱並未從賊不吐實供因該犯語言不甚明晰是以暫令解交刑部監禁着刑部堂官遴派該部司員中籍𨽻閩省通曉漳州語音者再行嚴加鞫訊務得該犯等實供毋任再有狡飭如刑部司員亦未能通曉該犯言語即傳侍衛蔡本禧㑹同派出之刑部司員嚴加詰訊據實具奏十二日丁丑常青恒瑞同奏言十四日接據柴大紀等禀逆匪自蔴豆莊殺散以後復紏合大武隴哆囉嘓各匪意欲攻踞鹽水港以絶縣城糧餉刻下諸邑四處皆為賊匪把截惟鹽水港一路可通郡城必須保固現在安兵一千餘名撥遊擊楊起麟統領駐劄又撥千總陳邦材帶兵二百名駐防鹿仔草與鹽水港犄角初五初七等日連敗賊匪初九日探得賊匪攻鹿仔草隨派遊擊李隆帶領隊伍義民一千三百名前徃夹攻行至竹仔脚大崙田洋該處離鹿仔草十餘里忽遇賊匪約八九千蜂擁而出隨飭兵丁施放鎗砲打裂大炮一門賊人愈殺愈多四面逼近兵民奮力鏖戰自辰至未鎗砲斃賊約五六百人官兵義民亦多有損傷適遊擊邱能成巡哨囘至該處鎗砲轟擊其後賊始退散收兵囘縣查㸃兵民有百餘人尚未歸伍軍裝亦有遺失統容查明另報查賊勢猖獗駐縣之兵除撥駐鹽水港鹿仔草兩處餘兵只有一千五六百名已為單薄且義民亦分守鹽水港鹿仔草縣城空虛實為可慮乞發大兵三千名多帶鎗砲速來諸羅以安纍卵又據派徃鹽水港之逰擊楊起麟禀稱同守偹黄象新晝夜督兵固守兹聞笨港汛於本月初一日被賊攻䧟焚燒各莊初十日又攻圍鹿仔草查鹿仔草離鹽水港只隔十數里於初五初七初九十一連日分路圍攻鹽水港楊起麟等竭力殺敗賊匪但鹽水港附近四圍莊社皆被賊䧟惟存鹽水港一街之地兵力甚單兼以連日打伏藥鉛存剰無幾若差徃諸羅運解路經賊巢恐有疎虞請速撥兵一千名并火藥大小鉛子應用各等情查笨港鹽水港皆係諸羅至郡水陸要路今逰擊楊起麟禀内有笨港於初一日被賊攻䧟之語何以柴大紀等並無文報恐係該逰擊得自聼聞未盡確實但細閱柴大紀等㑹禀派令逰擊李隆帶兵民尚未及與遊擊楊起麟㑹合夹攻已於中途竹仔脚等處遇賊交戰鎗砲斃賊雖多而兵民軍械俱有損失並慮縣城空虛専差星夜間道告急自屬立等赴援臣等本欲於各港口酌撥兵四五百名同義民前徃防禦今看此情形恐兵少於事無濟當即派令總兵魏大斌副將詹殿擢都司劉振唐守偹姚國泰等帶兵一千五百名飭同知楊廷理偹齊船隻即於十五日黎明上船開行並令該總兵等探聼鹽水港如尚有賊圍擾即協力進攻如賊已退即竟赴諸羅與柴大紀商同堵剿即確查笨港有無失事􅌺速馳報如笨港有失則府城徃北海道賊人又將作梗而一切糧食貨物商賈難行殊有關係且鳯山之東港在鹿耳門之左已為賊佔諸羅之笨港在鹿耳門之右又為賊擾則現在鹿耳門一口尤宜加意嚴防臣等已派撥官兵防禦至鹽水港在諸羅之南府城之北距府城不過五六十里今賊衆圍攻鹽水港固意在諸羅而實即覬覦府城臣等現在劄營府城以南自初十日賊人敗退之後伏莽潛藏至十三十五等日有賊千餘屢次來擾官兵迎擊即又奔逃臣等料其詭計希冀官軍大衆深入窮追迨去府既逺不惟妄想繞出官軍之後而鹽水港等處之賊自北趨郡必更肆無忌憚且鹿耳門一口左右有賊又當時時兼顧臣等再三籌畫現在營盤實有未可行動率行輕進之勢臣等前請添兵已咨㑹督臣孫士毅如潮州有挑偹之兵即先發二千名前來猶未據咨覆現已接據督臣李侍堯來咨業將預先調到本省兵二千名飭帶領之叅逰等員由厦門配渡計日可到臣等惟有相機剿捕仍照料郡城南北兩面以及鹿耳門要口並知㑹藍元枚柴大紀等務於各該處用心防範再查臺灣海防同知楊廷理屢次帶領義民打仗現又隨營剿賊勇徃向前又經臣常青前經奏明隨帶軍營之建寧府同知楊世綸該員曽在軍機司員行走隨臣等辦理一切要件俱能諳練勤慎奮勉出力仰懇量加鼓勵奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀孫士毅曰閲常青等奏到之摺與李侍堯昨奏大畧相同惟蔴豆社柴大紀則稱殺散李侍堯則稱被賊踞不知何故不同又鹽水港在諸羅之南笨港在諸羅之北皆為運糧要路今俱有賊匪搶佔以絶糧餉諸羅勢甚廹急所關甚重看來賊人狡計竟係因大兵俱在府城諸羅一路兵單弱故作窺伺府城以牽綴官兵使常青等不能逺離該處營盤而其意實欲斷我糧道攻逼諸羅縣城若諸羅有失則臺灣府城勢更孤懸四面受敵大有關係前曽有㫖令常青等或舎南趨北直搗大里杙賊巢或竟徃南潭擒拏賊目莊大田今看此情形該將軍等不必向南竟宜先徃北路常青此時或於總兵副將内擇其奮勇可恃者酌撥一員令其守固營盤而常青等揀選精銳親自帶領同侍衛章京將偹等數人直趨北路前至諸羅㑹同柴大紀並力擒渠搗穴或􅄪分派勁旅將鹽水港屯佔賊匪悉力殱除打通糧道此為上策藍元枚昨已有㫖令即帶兵前徃鹽水港剿殺賊匪後自南而北星赴諸羅接應柴大紀或能先將笨港一帶屯踞賊匪乗勢掃除更為妥善常青自駐劄府城未能進剿而現在營盤又未能移動豈有被賊牽綴株守坐視柴大紀受困之理今計粤先渡之兵四千早到若派勇幹大員在彼固守常青即領兵前徃北路自可無他慮而柴大紀處得此兩路兵力接應鹽水港笨港道路肅清米糧通運南北聲勢連絡人心自定似於進剿機宜極為得力著常青藍元枚酌量情形􅌺速籌辦斷不可坐失事機再用兵之道全在先聲奪人現在添調兵丁不為不多即日陸續前抵臺灣常青等不妨再行曉諭軍民以此次添調官兵之外現又有㫖於廣東及福建本省添調兵數萬接續前進俾軍民等心膽益壯兵氣益為振作且使賊人聞之亦不敢肆意鴟張此亦先聲後實之一法仍著李侍堯孫士毅廣為召募數萬多多益善以偹調遣再臺灣府城官兵糧餉火藥等項存貯甚多關係極為𦂳要常青於帶兵前徃鹽水港等處進剿時除將戰守官兵應用糧餉火藥酌量散給隨身移帶外所餘糧餉火藥若仍貯積府城該處係編竹為城恐易生賊人窺伺之心不可不慮莫若竟將所餘糧餉火藥酌量留存以偹守城之用可不至短缺外其餘悉行擕帶隨行即使府城萬一稍有不虞亦祗係空城賊人一無所獲亦不能久佔並著該將軍酌籌妥辦但此時該將軍等須宻之又宻只可暗為派撥不得稍露風聲使軍民聞之心中揺動轉多未便此為最要至鳯山之東港為賊佔踞於鹿耳門甚有關係現已據常青派撥官兵前徃防禦但恐該處官兵未能分身尚不能殱除浄盡著李侍堯於内地總兵副將内奮勇者揀派一員帶兵一二千前徃剿除佔踞東港賊匪打通糧路更可得力又同知楊廷理屢次帶領義民打仗出力楊世綸隨營辦理一切要件頗為奮勉俱着賞戴花翎俟軍務告竣再行送部引見以示鼓勵􅄪前次解到賊匪廖東胡畨二犯因屢次訊供堅稱係被義民挟嫌誣害兵役誤拏而於從賊一節狡展不認曽降㫖令該將軍等查明所供情節奏到再行辦理今思此等匪犯若非從賊為逆何致被拏豈可因其一時狡頼復徃軍營查訊况正在剿捕賊匪之時若因其狡展之詞又向兵民查訊恐兵民不無顧忌轉致遇有賊匪不敢輕拏大為未便除已降㫖將該二犯即行正法外著常青等竟無須查訊此時不但兵丁等不須向其究問而義民等更不必再行傳訊以致心存顧忌轉使賊匪得以漏網上又命軍機大臣傳諭保寧李世傑閔鶚元曰江省海口船隻業已多為預偹無虞缺悮着再諭保寧將前次撥運米二十萬石及降旨復令續採買米三十萬石務即上𦂳趕辦接續運至江省交李世傑等即行配船起運以期􅌺速抵閩毋悮要需欽定平定臺灣紀畧卷二十四
