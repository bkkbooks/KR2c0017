  text: 欽定四庫全書欽定平定臺灣紀畧卷二十
  hash: sha256:540d0aa3173468444bf6f8fdd7f5e8e12caf82218de389be0bc149f4b913e93b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_020-1a, image: WYG0363/WYG0363-0217c.png}
body:
  text: 六月初三日己亥常青奏言賊匪來去無常自四月二十五二十九等日經官兵殺散之後又於五月初三日糾衆來攻城外各營盤經臣派撥將弁帶兵截殺鎗砲打死賊三百餘人奪獲鎗刀器械二十餘件弁兵傷亡者查明賞䘏初十日差探距府二十里内外之鯽魚潭南潭中洲虎尾寮等處俱各有賊二三千分踞要路並據前已投誠之莊錫舍差人宻禀臺灣道府賊首莊大田帶領畨婦女軍師人等亦同在衆賊屯聚南潭之内可以協力擒拏臣即於十一日黎明親自統率將弁帶領粤省兵二千名飛速前往剿捕賊衆未及凖備俱各驚竄官兵向前沖撃鎗砲打死賊匪并殺死共五六百人奪獲賊械三十餘件其時莊錫舍亦帶同義民與官軍内外應合當即生擒畨婦金娘賊犯林紅二名其畨婦現有顯神助戰旗號且以符咒蠱惑匪類以及隨同打仗之林紅因姦勾結俱應與已獲訊實之賊目王坑郎楊章二犯一併解京臣約計㕘贊恒瑞藍元枚及駐防滿兵早已登舟自因守候風信尚俱未到臣惟有先將近府賊巢逐一殱除俟恒瑞等一到即親統大兵自南而北沿途一有擒獲即随時奏報再理畨同知黄嘉訓將砍殺王芬之義民陳秀成及在場証見人等同王芬首級解送前來臣等詳訊陳秀成供認明確且有擒獲王芬之鄭岱及在場之蔡運世等願具並無假冒甘結反覆究詰似無疑義至前許投誠之莊錫舍自三月二十七日随同官兵隊伍殺賊後即前往鳯山之鹽水埔莊意欲截賊歸路即將莊大田擒獻因人少不能見功又設計令人在賊中偵探信息至五月初三日莊大田來攻府敗退仍將賊衆分踞南潭中洲等處莊錫舍探知一面差人宻禀道府一面宻約義民等伏於賊隊之後十一日官軍進攻南潭賊匪大敗深以未獲莊大田為恨臣看其雖係投誠之人將來或尚有可用之處是以姑令暫留軍前聴候差遣再王坑郎楊章畨婦金娘并林紅等犯臣提齊研訊縁畨婦金娘平日以符咒治病騙人錢財適值南路逆匪莊大田等攻擾鳯山即欲假其邪說蠱惑匪衆因以畨婦為軍師稱做仙姑而畨婦亦遂毎次打仗執劍念咒作此鬼蜮伎倆欺弄鄉愚并受林爽文一品夫人偽札林紅前認畨婦為姊後與通姦并學其􅀞符治病是以打仗時跟随畨婦轎邊帮䕶至王坑即係王坑郎向充鳯山縣粮差後改皂役又名王璉莊大田要他向各殷户派銀許做副元帥又領有賊旂管辦運粮楊章一犯係賊黨許尚招入天地㑹給與小旂令其管隊許事成封為元帥該犯因此屢與官兵打仗逐加究詰各供認不現將該犯等押赴泉州交督臣李侍堯另委妥員解京各犯家屬財産分飭各該地方官照例查辦並將捜出畨婦經本偽札另封呈覽奏入上命軍機大臣傳諭常青李侍堯藍元枚曰莊錫舍自投誠後屢次随同官兵打仗殺賊兹聞莊大田帶領畨婦等屯聚南潭即宻行稟報並自帶義民與官軍内外應合當將畨婦及賊犯林紅擒獻甚屬出力可嘉莊錫舍著即賞給守備並著常青面加曉諭奬勵俾莊錫舍益知感奮力圗自効閲賊首林爽文所給畨婦札内有到府城相㑹之語是其意實欲窺伺府城特因大里杙庄係其巢穴與諸羅相近林爽文惟恐逺離該處為柴大紀所乗是以尚在諸羅一帶滋擾而莊大田屯聚南潭等處糾集夥黨分踞要路其意則専在窺伺府城此時若能先將莊大田擒獲則南路賊匪自可以次廓清現在常青於粤兵到齊後帶領出城剿捕即連得勝仗已覺壁壘一新聲威壯盛恒瑞所帶駐防滿兵及藍元枚所帶浙兵一得順風自即可遄渡常青於恒瑞等到後即可㑹同統領大兵前赴南路逐一殱除乗勝疾趨一舉蕆事至大里杙為賊首巢穴前據林小文供稱該處庄内以大毛竹為牆垣牆外有溪水環遶等語已降㫖令常青於進搗賊巢時用火攻為上䇿所需砲位如不敷用即在該處鑄造亦無不可所需火葯並著常青咨㑹李侍堯如數迅速運往寛裕接濟再朕批閲藍鼎元所著平臺紀畧藍廷珍進攻鹿耳門収復郡城不過七日而其餘黨竄逃各處乗間竊發輾轉捜捕幾及二年始能辦理完結將來常青藍元枚南北兩路進兵攻剿擒獲首逆林爽文莊大田等自應解京盡法處治其被賊協従随同附和之村莊百姓應先行曉諭令其速行改悔棄械歸農即貸其一死各為安分良民以解散其黨羽至賊目及天地㑹匪自知罪在不赦一見首逆被擒勢必紛紛竄入内山希圗茍延殘喘及大兵撤後又復勾結滋事將來辦理轉為棘手常青等於攻剿時務須嚴宻圍堵如可設法招撫者不妨權宜招致並曉諭生畨如有竄入該境者即時縳獻賞以花紅布疋如此辦理俾賊匪餘孽無所逃竄庶可浄絶根株若任其濳匿稽誅又如従前辦理朱一貴稽延日久更屬不成事體著常青務須相機妥辦以期一勞永逸上又諭内閣曰臺灣林爽文等滋事不法將民庄燒刦随即逼令附從以致農不歸耕商難復業屢經降㫖諭令常青等惟將渠魁首逆及實在黨惡不法者皆應殱戮無遺其被賊迫脅出於無奈聴従者准其悔罪自新以解散賊黨常青不妨整齊兵力前往攻剿之先即將此意遍行出示曉諭使被脅民人及従賊夥黨一經悔罪棄械投誠即可歸農各安耕種不但可免従逆死罪而且及時耕穫仍得口食自給贍養身家實屬一舉兩得且伊等亦知賊匪勢日窮蹙旦暮必就殱擒趂此時遍行曉諭將脅從賊衆安撫歸農既可解散賊黨而現在節届大暑臺灣本係産米之區每年三熟尚可趕種兩熟於軍糈民食均有禆益至臺灣地方經此次賊匪滋擾所有百姓田廬産業被其蹂躪刦掠及遷徙失業者諒必不少現在恢復各處村庄及未被賊侵擾業經挿蒔佈種者尚有若干處所並著常青查明迅速覆奏以慰厪念民依至意臣等謹案林爽文謀逆到處焚刦村莊小民貲産已絶不能自存無奈偷生從賊而一經従賊自知罪在不赦遂堅於附和蟻聚日多我皇上周知民隠深原其被脅之由巽命屢申凡従賊夥黨一經棄械投誠即可免罪並得及時歸農安業養贍身家猶慮陷賊者無由盡知復命遍行出示曉諭以開其悔罪自新之路厥後各庄投出者紛紛不絶足徴好生之徳協于民心而格外矜全真無所不至矣初五日辛丑李侍堯奏言將軍恒瑞提臣藍元枚等所帶滿兵浙兵於十四日得有順風俱即揚帆飛渡其巴圗魯侍衛章京八員亦於十八日開洋計日内俱可到臺地臣因漳浦縣械鬥一案藍元枚未及辦結随於本月十六日起程前往查辦今已將起意糾衆械鬥及傷斃人命各正犯呉春等先行拏獲另有平和縣匪徒周思等糾衆搶奪先經臣訪知飭拏兹平和營逰撃岳新泰探知各匪聚於霞寨堡内即帶兵前往圍拏各犯竟敢用鎗銃刀棍等項抗拒該逰撃督率兵丁奮勇向前拏獲周思周寛等十名並鎗斃周汚一名查械鬥一案尚未敢恃强拒捕其平和搶奪各犯既聚衆多人及官兵擒捕復敢持械抗拒致兵丁等帶傷者七人尤為目無法紀臣擬在漳州將拒捕一案凶犯訊明即正法數人以示懲警然後回至泉州其械鬥一案尚有未獲名犯現飭速拏俟到日一併審辦奏入報聞初六日壬寅上命軍機大臣傳諭常青李侍堯曰臺灣地方三面瀕海且斗六門鹿仔港及府城外南潭一帶處處俱有賊匪竄聚將來大兵捜剿賊勢窮蹙内山要隘既有官兵堵截必思乗間逸出海口四散竄逃希圗苟延殘喘亦未可定此係最要不可不預為之備現在兵丁配渡船隻已抵臺灣凡鹿仔港府城登岸之處酌派弁兵分撥各船令其離岸稍逺散布停泊留心查察不使匪犯得以偷渡兔脱方為周妥再昨據李侍堯奏前往漳州查辦械鬥搶奪兩案擬在彼審明正法數人再回至泉州等語此案兇犯已拏獲多名易於審辦設此内亦有天地㑹匪名目祗可俟將來擒獲林爽文後再行查辦此時尚非急務李侍堯毋庸在彼久駐漳州鎮常泰現署提督此等緝拏餘犯自尚能辦理李侍堯即當仍回厦門駐劄且大兵四路捜剿保無餘匪竄回内地李侍堯即應督率地方文武員弁随時查察實力擒獲初八日甲辰上命軍機大臣傳諭常青李侍堯藍元枚曰閲臺灣圗内斗六門有溪河數道俱係通海之路大埔林牛稠山一帶現在俱有賊匪竄聚斗六門前據奏久被賊匪佔據南北聲息不通經常青派令㕘將潘韜帶兵一千名前往諸羅協剿該㕘將因陸路賊多不能前進仍回至府城由海道至諸羅是沿海一帶尚無賊匪即日大兵進剿四路夾攻將斗六門大武隴等處竄踞賊匪廓清掃除設賊匪計窮勢蹙或偷覔小舟由斗六門之溪河逸出海口而洋面島溆叢襍易於竄匿希圗茍延殘喘亦未可定不可不預行設法防備着常青等務揀派得力將備帶領弁兵於通海各溪河處嚴宻防守所有通内山各要隘亦務遵節次諭㫖派兵堵截並將船隻収藏毋令近岸如此四面防堵水陸兩路俱無虞其乗間竄逸庶可捜剿無遺至恒瑞藍元枚侍衛章京等計此時早已到齊常青自己乗官兵鋭氣方盛之時統領剿賊乗勝長驅其如何調度進剿及打仗殺賊情形務随時加𦂳馳奏至藍元枚前抵鹿仔港後與普吉保作何調度籌畫曽否先將斗六門一帶賊匪剿除殱戮著藍元枚亦即將籌辦剿捕情形迅速奏聞初十日丙午李侍堯奏言粤兵四千前已俱令由厦門往常青處四月中旬全數到齊滿兵一千恒瑞帶領亦由厦門往常青處浙兵三千前令藍元枚帶二千往鹿仔港尚餘魏大斌所帶一千臣以常青稱南路賊匪甚多是以令魏大斌亦由厦門往常青處查十四日得有順風飛渡目下已俱到府城及鹿仔港兩處至臺地近日情形臣㕘閲各官稟報並訪問往來船户等僉稱賊匪所掠米穀漸次吃完現將搶掘畨薯作食所得鳯山城内火葯鉛彈亦已用盡林爽文有蓄髮親丁千餘名經諸羅屢敗之後亦十去五六鹿仔港之馬鳴山埔心庄等營盤經内地運往大砲安設之後賊匪不敢來窺伺等語是賊勢漸已衰敗今新兵俱到合之舊有之兵勢力益加壯盛常青等剋日進剿自必即有捷音再查黄仕簡任承恩起程時亦自知情罪重大實無可逭蒙皇上念黄仕簡已經老病任承恩又係殉難任舉之子且尚未有子息特加恩待以不死是於法無可貸之中更予以矜恤生全之路不惟伊二人銜感無地現在漳泉官弁兵丁無不仰頌聖主格外施仁非尋常意計所可推測共相傳說感激俱深合併據實覆奏奏入上命軍機大臣傳諭常青李侍堯曰賊匪所掠米粮火葯等物漸次用盡其勢日益窮蹙亦不過如釡底游魂茍延殘喘至林爽文竟敢令黨羽蓄髮作為親丁實屬悖逆不法必應盡數殱戮此等匪徒既經蓄髮轉易識認實屬自留証騐常青等領兵攻剿時但見有蓄髮者概行殱擒轉可不致漏網也至李侍堯應遵照前降諭㫖即速回至厦門駐劄照料一切為是十四日庚戌何裕成奏言各縣碾就之米已陸續従新城縣五福一路趕𦂳運送又檢查舊案自新城至五福溪河逆流仍須由旱路起運是以改由海運較為便捷而省脚價現在札詢兩江督撫俟查明海船咨覆到日立即分撥起運奏入上命軍機大臣傳諭何裕城曰軍糈米石闗係𦂳要自應星速撥運以濟急需前因何裕城奏或由陸路運送或由海道運閩札商李侍堯辦理殊屬推諉已降㫖飭諭令將碾出米石斟酌何路近便即定於何路迅速運閩今何裕城既查明舊案新城至五福一路溪河逆流仍須陸路起撥不便従前曽有改由海運較為便捷之案自應一面飛咨李世傑閔鶚元令其預備海船一面即將陸運未竣之米先行運至海口彼時船隻自已到齊庶可迅速起運如果米石先到江省船隻不能早行預備朕自將李世傑閔鶚元治以遲悞之罪乃何裕城計不及此竟俟該督等查明海船咨覆到日始行分撥起運則咨商往返徒稽時日豈不貽悞要需何裕城不但意存推諉而於事之輕重緩急全無主見竟係不善於推諉且不解事矣著嚴行申飭仍著將此項米石於何日運至海口裝載起運之處據實覆奏勿再延緩推諉干咎十五日辛亥常青恒瑞同奏言臣常青於十一日率兵往南潭等處捜剿後賊首莊大田等仍恃衆鴟張於離城二三十里外之大穆降中洲埤頭崙仔頂等處聚集兹於五月十四日髙亷鎮總兵梁朝桂先到㕘贊恒瑞温州鎮總兵魏大斌俱於十九日到臺灣府城其滿兵一千名惟協領額爾登布所帶五十六名未到浙江兵一千名惟把總呉森所帶七十四名未到餘皆於二十二日陸續到齊臣常青臣恒瑞查看現在帶兵鎮將足敷遣用而福州駐防併粤省浙江官兵皆勇往精壯官軍聲勢既盛宜即乗鋭前驅殄殱醜類臣等一面檄委副將丁朝雄㕘將宋鼎并派臺灣原存兵二千八百餘名防守府城八門週圍堆卡又於粤省兵四千名内酌留兵五百名浙省兵一千名内酌留兵四百名并原調兵二千餘名分撥城外三處營盤駐劄仍㑹同臺灣道府奬率義勇人等協力嚴宻防禦一面飭令随征將弁作速整齊隊伍軍火器械料理停當臣常青臣恒瑞即親統滿兵九百三十九名粤省兵三千五百名浙省兵六百名水師各營兵八百餘名督率鎮將員弁等於五月二十四日祭纛起程先往鳯山南路一帶賊人分踞之處跟踪捜剿堵截圍拏随飛飭柴大紀普吉保徐鼎士等現在㕘贊藍元枚計日已可到鹿仔港即妥商奮勇㑹剿並嚴防賊人逃入内山要路則南北匪衆自不能首尾相顧臣等迅掃南路之後即乗勝并攻北路大里杙賊人巢穴總期生擒首逆一舉蕆事又前次南路鳯山失事潰散兵二千名現退回七百餘名復有受傷帶病從沿海陸續回歸者百餘名其年力强壯技藝頗嫻者尚似可用臣初到臺灣挑選留存仍随營打仗復奉恩㫖姑暫貸其一死該兵丁等無不感激輸誠圗報但其餘未回者尚多且潰散之時亦必有為首之人容臣於事定後従重查辦以肅軍紀至逰撃鄭嵩係黄仕簡檄令前赴鳯山即往東港追剿賊匪後因郝壯猷調回縣城把守南門三月初八日該逰撃聞知賊人已入東門即帶兵迎撃被賊鎗傷左臂落馬其親随兵丁陳日中目覩該逰撃遇害乃臣於前摺内未經聲叙明晰實屬疎忽再北路蔴豆庄距府城三十餘里本係粮米相通要路近於四月間被賊侵擾臣當派革職効力之難廕守備黄喬千總盧思聰等帶兵三百名前往剿捕嗣據黄喬稟稱四月二十六二十八等日在溪􅀈地方遇賊千餘打仗殺賊二十餘人割獻賊人首級二顆賊遂敗退至五月初八日賊復糾夥數千前來圍庄官兵義民力戰施放鎗砲打死賊匪六七十人奪獲賊械各項惟千總盧思聰中箭陣亡又陣亡兵丁郭順生等四名受傷者三名義民陣亡者三名受傷者八名並請添兵應援等語臣随飛檄總兵柴大紀酌撥官兵星赴協剿經柴大紀派令逰撃李隆楊起麟等帶兵一千五十名於五月十二日馳抵蔴豆莊見賊約有二三千人該將等即率弁兵奮勇圍裹賊被鎗砲打死并殺死者百餘人又追至灣裏溪邊落水淹死者又有四五十人生擒匪犯王標等八名奪獲鳥鎗刀牌等械因溪水漲發収軍回藍水港駐劄適又聞哆囉嘓一帶賊匪欲攻鹽水港該鎮即飭逰撃李隆等暫且留兵該處截拏查守備黄喬於初八日殺敗賊人之後以所帶兵少恐賊人恃衆又來圍莊即於十一日移兵暫駐離莊數里之外以備堵截是以十二日未得與逰撃李隆㑹兵一處旋因賊已敗退即帶兵於十三日回郡奏入上命軍機大臣傳諭常青恒瑞曰此時大兵雲集將軍㕘贊乗此銳氣壯盛統領進剿自必勢如破竹但此次常青等摺係五月二十四日拜發距前次發摺之期已隔十日所奏太遲且海洋風信靡常計奏到時已閲十二日實不勝懸盼煩悶著該將軍等嗣後務於發摺後七八日即將剿賊情形具奏一次得有勝仗及擒獲賊首並有名頭目更宜随時加𦂳馳奏至常青所奏鳯山失陷兵丁逃亡未回者尚多交常青於事竣後嚴查辦理以肅軍紀再賊匪侵擾北路蔴豆莊有千總盧思聰及兵丁義民陣亡受傷者均應查明咨部照例賞䘏上又命軍機大臣傳諭常青恒瑞藍元枚曰據常青等奏統領官兵起程進剿一摺據稱先往鳯山南路一帶賊人分踞之處堵截圍拏但摺内又稱賊首莊大田等恃衆鴟張仍敢於離城二三十里之外大穆降等處聚集等語賊匪敢於附近府城各處聚集竄踞倘窺伺大兵已出乗虚滋擾雖常青等派有副將丁朝雄等帶領官兵足資堵禦究不免有後顧之虞常青先應將城外賊匪捜剿圍拏將賊首莊大田設法擒獲肅清肘腋方可乗鋭前驅至藍元枚帶領浙省官兵由蚶江配船開洋自已早到鹿仔港此時作何調度籌畫亦即迅速奏聞十六日壬子上諭内閣曰前經降㫖將藍元枚調補福建水師提督其福建陸路提督員缺令常青李侍堯於柴大紀普吉保常泰三人内察看孰為出力並才具堪勝提督者保舉一人候朕簡放今觀柴大紀自駐守諸羅以來屢次將賊敗退實屬奮勉可嘉柴大紀著即補授福建陸路提督但柴大紀任臺灣總兵已經數年於該處情形較為熟悉將來剿賊完竣所有善後事宜正須該提督随同常青悉心籌辦柴大紀著以陸路提督兼管臺灣鎮總兵事務在彼彈壓照料俟軍務告竣候朕酌量可以調回内地再行降㫖柴大紀未回任以前所有福建陸路提督事務著常泰暫行署理上又命軍機大臣傳諭李侍堯常青曰向來閩省百姓捕魚為業者甚多或載赴江浙一帶海口販賣本年臺灣逆匪滋事該處耕種已稀若漁船不能照常出洋小民更致失業該督即行查明如有因賊氛未靖不敢出口捕魚販賣應飭沿海口岸文武員弁明白曉諭仍令照常謀生毋令失業但宜細查臺灣逆匪逃亡混入内地者耳不可因噎廢食臣等謹案閩省沿海居民多以捕魚為業兹因臺匪肆逆巡察𦂳嚴諒必有不敢出口照常販賣者我皇上慮小民無以謀生特諭令海口文武員弁明白曉示仍令出口捕魚毋致失業海隅細民生計無一不在宵旰籌畫之中故百姓咸感生成不復有一夫失所也上又命軍機大臣傳諭蘇松水師總兵魏轍曰現在臺灣正在剿捕逆匪之時恐有賊黨餘匪逃逸偷渡混入内地該處雖漁汛已過海洋寜謐該鎮仍應在各海口督飭兵弁嚴宻巡查如有逸匪竄入即行堵截擒拏毋得稍生懈忽致賊匪得以混入濳匿十七日癸丑上命軍機大臣傳諭常青李侍堯藍元枚普吉保曰據常青等委員將黄仕簡任承恩解到行在令軍機大臣訊問據黄仕簡供到臺灣後實因年老患病精神昏瞀以致手足無措種種遷延貽悞任承恩供因賊多兵少曽經咨報總督請添派官兵又鹿仔港民居稠宻米粮積聚甚多未敢輕離且伊曽經親往虎仔坑八卦山同普吉保及將弁等督兵打仗彼時林爽文正攻府城聞信繞回䕶其巢穴并欲來攻鹿仔港是以在彼防守不能遽離因摺内未將自行帶兵親往之處聲叙明晰現有普吉保及將弁等皆可質訊等語所供情節如果屬實將來定案時尚可依朕前降恩㫖貸其一死但黄仕簡於上年查辦㑹匪楊光勛械鬥一案伊雖曽患病朕令伊子黄秉淳馳往看視並諭黄仕簡如果病勢難痊應令總兵何俊帮伊查辦而黄仕簡奏稱病已全愈仍令黄秉淳回任並稱無庸何俊帮辦是黄仕簡病已漸愈今又以染患風疾忽止忽發為辭恐係藉病推諉冀圗自缷重罪至任承恩正當年富力强尤非若黄仕簡之年老患病者可比伊又自請前赴臺灣剿賊乃既不能奮勇自効坐失事機且伊既咨請督臣添兵何以不行自奏况提鎮奏摺俱係字識繕冩伊平日豈無繕辦奏摺之人乃現經詰問尚復巧辭支飾則罪上加罪朕亦不能因其父兄著有微勞伊現無子嗣曲為寛貸仍即按律寘以重辟皆所應得著將所録供詞發交常青閲看查明黄仕簡何故並不帶兵親往有無飾詞缷罪並著藍元枚普吉保向將備格綳額林天洛陳邦光等詳細詢問並宻加體訪任承恩所供各節是否當日實在情形抑係虚揑狡展之處據實具奏到日再行按律定擬十八日甲寅上命軍機大臣傳諭李世傑閔鶚元曰前因何裕城辦理撥運閩省米石意存推諉且既查明改由海運較為便捷乃欲俟咨覆到日始行起運已傳㫖嚴行申飭但何裕城既經咨商李世傑等自己早經接到其如何撥派海船於何日駛至海口預備裝載之處自應一面咨覆江西一面將准咨辦理縁由迅速具奏何以何裕城奏到後已閲數日尚未據該督等奏報軍需米石闗係𦂳要今何裕城既推諉於前若李世傑又復遲延於後豈不貽悞要需著李世傑閔鶚元將此項海船於何日預備齊集派員押至海口及江西米石於何日運到裝載開行之處及因何並不先行具奏縁由一并據實覆奏欽定平定臺灣紀畧巻二十
