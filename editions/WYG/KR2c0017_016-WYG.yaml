  text: 欽定四庫全書欽定平定臺灣紀畧巻十六
  hash: sha256:fbaee8511336df0a37b25be37fba9897c3186bf49b41f07c9e2cefdaa39b1310
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_016-1a, image: WYG0363/WYG0363-0174c.png}
body:
  text: 五月初三日己巳藍元枚奏言浙兵前到蚶江尚需時日浮山民社搶奪甚至拆毁房屋砍伐樹木若不嚴加究辦各處皆将效尤其林吴二姓械鬪係三月中事現在稍覺止息且此夥内牽連長泰平和等縣天地㑹奸匪若遽行辦理恐即激成事端現當進𠞰臺匪之時應暫且緩辦至許姓搶奪不過無頼棍徒應先行辦理庻可懲一儆百是以臣暫留漳浦辦理一面宻咨督臣如浙兵到蚶江先令陸續配渡計浙兵全到時臣亦可辦完星即赶赴蚶江帶領前往鹿仔港尚不致遲悮同日琅玕奏言浙省原派兵四千名欽奉諭㫖止須調兵三千名當查添派之衢州鎮兵一千名已於初九日全數出境温州黄巖鎮兵各一千名亦已在途令即跟接前進以足三千名之數其提標及鎮海營兵一千名因距閩較逺是以行程在後即經行令撤囘旋准提臣陳大用札㑹該兵等行抵温州奉到行知即飭令歸伍其温州黄巖鎮兵二千名跟接前進俱于十八日全數出境又先准督臣李侍堯札㑹奏撥浙省米十餘萬石經臣于附近各海口之杭州嘉興湖州寜波紹興温州台州七府属酌撥倉榖二十萬石碾米十萬石派員由海運赴閩嗣據嘉興府鄭交泰乍浦同知方受疇等禀報該處封僱海船百餘隻毎船僅装米五百石内有挑出陳舊不堪應用者二十餘隻現在不敷装運等情臣當查乍浦海口與江南上海口相距百餘里往来船隻甚為近便随一面札㑹江蘇撫臣閔鶚元一面逕行飛飭江蘇松太道立即於上海口岸代僱船隻旋據該道僱覔海船三十隻委員星夜押赴乍浦當即赶𦂳装載足數應用所有杭嘉湖三府属米五萬石已于五月初二日由乍浦海口全數開行其紹興寜波府属米石據報現在装載開行温州台州府属米石亦據禀由該縣陸續起運其至海口開行日期因離省稍逺尚未據該府報到臣先已委員往催限于夏至節前務令全數出口似可不致遲悮再此時相距秋收尚逺本年浙省春收尚為豐稔米價亦漸次平減倘閩省再須採買籌偹一俟督臣李侍堯撫臣徐嗣曽酌議知㑹到時即飭令各該地方妥協照料並嚴察訪查奸商囤户如有乘機囤積抬價居竒情事即行嚴拏從重辦理不敢稍存姑息均奏入上命軍機大臣傳諭常青李侍堯藍元枚琅玕曰漳浦縣許姓搶奪一案李侍堯自能辦理現在臺灣北路鹿仔港㝡闗𦂳要着藍元枚即遵前㫖迅赴鹿仔港辦事無庸在漳浦留滯李侍堯原調浙兵本係四千今雖減去一千但朕已為添調福州駐防兵一千名不特所調兵丁仍符原調之數且該處駐防兵雖不及京城健鋭火􅄊各營之精壮然較之浙兵柔懦其勇往堅定不啻數倍更為得力該處𠞰賊情形常青于四月二十七日奏到後迄今又經數日未經續奏朕盼望軍報綦切着該将軍務将此數日内𠞰賊情形續行具奏以慰厪念再賊匪攻擾鳯山時尚帶兵二千餘名前㨿常青奏潰囬者計七百餘名其餘一千三百餘名作何下落兵丁臨陣逃脱皆應按律正法但念人數衆多㮣予駢誅在朕心究有不忍此項兵丁若􅀈逃亡潰散将来只須查明為首者數人正法其餘尚可免死分别發遣若去而從賊甚至随同抗拒官兵則竟不可一名寛貸矣賊黨與官兵抗拒其罪尚在不赦况身𨽻行伍既經臨陣潰逃復敢從賊肆逆此而不嚴行辦理何以昭憲典而肅戎行着常青俟事竣後嚴查遵辦不可稍存姑息又據琅玕奏于浙東浙西撥倉榖碾米十萬石解閩本年浙省春收豐稔米價平減倘閩省再須採買籌偹一俟李侍堯等知㑹到時即妥恊辦理恰與昨降諭㫖相合如此留心殊属可嘉現在閩省内地及臺灣支給口粮撫恤難民均須米石應用多多益善自應如此寛為籌偹俾兵粮民食均資充裕並當先行出示則奸商不致囤積居竒亦權變一法也若李侍堯酌量閩省尚須接濟即一面奏聞一面咨撥以期無悮民食方為妥善同日孫士毅奏言現需酌撥銀三四十萬兩解赴閩省應用伏思閩省集兵𠞰匪需用較多自應迅速解往但自潮至省往返二千餘里行文兑解必須半月以外頭批方得到潮是以臣即就近在潮州運同衙門應解鹽課及廣濟橋闗税並存貯府庫急需各項内凑撥銀十萬兩選派妥員即于四月十七日自潮起程先行解赴閩省偹用臣仍一面飛咨省城酌撥起解接續前進查粤海闗上年徴收正襍銀九十餘萬兩正值四月起解之期一切装銀器具及委員人等俱經早為齊備應請於此項内撥出銀四十萬兩解閩即可迅速起程臣現将在潮撥借之十萬兩查明内有六萬兩係應行解省之項即令藩運兩司扣存扺兑其餘三十四萬兩即交原派解京之員一并解潮赴閩并知㑹撫臣圖薩布監督臣佛寜如闗餉已交委員承領尚未開行即一面分撥一面起解如前批業已起程即将後批截留改撥設起解已經過半截留不足四十萬兩即於藩庫留存鹽課項下撥足解閩另行分别造冊咨部似此通融籌撥庻起運不致遲延而閩省得以早資接濟奏入報聞初五日辛未徐嗣曽奏言本月初十日馳抵入境首站之福鼎縣值浙江頭起官兵三百名亦於是日到站臣督同延建邵道元克中及該府縣照料前進至十五日統計福鼎縣過站已有一千五百名嗣奉諭㫖令福州将軍恒瑞即于駐防滿兵内挑選一千名統領前赴臺灣㑹𠞰所有口粮等事宜飭臣妥為料理即飛檄在省司道暨厦防同知先将應需口粮船隻等項妥協辦理臣兼程馳囬於十九日到省其駐防官兵並軍械一切先經恒瑞預期派撥業於十六十八等日㸃發二起毎起二百五十名臣即㑹同恒瑞於二十日将三起兵丁逐一㸃發察看該兵等踴躍奮勉較之緑營實覺不同二十二日全行起程出省統計月内俱到厦門船隻已據具報僱偹齊全可以随到随渡臣查常青到臺灣適在鳯山失律之際人心藉以安定激勵官兵義民屢次奮勇殺賊三月二十七八等日尤大挫賊鋒柴大紀亦於二十九日賊匪率衆攻犯諸羅大加剿殺現在粤兵得有順風㨿臺防同知楊廷理等稟報到郡已有一千五百名至浙省官兵准督臣李侍尭咨㑹以閩省各營上年挑剩之兵再於短中抽長轉恐不如浙省預偹戰兵較為得用奏請仍調温衢等處官兵配渡進𠞰等因咨臣查照辦理查浙兵三千名不日皆可陸續到省酌以五百名為一起俟滿兵起身後即於二十三日按起䟎赴泉州一路不致擁擠行走自較妥速臣在省一面照料各路官兵挨次進發一面将秋審及一切𦂳要事件赶𦂳查辦即馳赴泉州料理配渡現准督臣李侍尭咨㑹平和等處有匪徒械鬪之事漳浦縣浮山社亦有許姓多人搶奪之案查藍元枚現在奉命帶兵前赴臺灣㑹𠞰李侍尭駐劄泉州籌辦要務臣俟到泉州與李侍尭商酌如此案尚未完竣臣即親赴查辦又前經飭臣親往嚴緝粤省咨拏㑹匪朱洪徳洪李桃等犯飛行汀漳龍道朱芫㑹先往查緝旋據禀覆龍溪縣並無朱洪徳及洪李桃和尚亦無福蓮寺臣思該犯等狡黠異常所供夥黨姓名住址多不以實未便於臺匪未靖之先紛紛捜捕致涉張皇一切仍俟㑹晤督臣李侍堯面商妥辦期無貽悮至福寜一帶沿海口岸巡防尚為嚴宻雨水調勻田禾暢發官兵過境並無絲毫擾及閭閻體訪民情俱極安堵臣往来漳泉仍随時馳回省城赶辦一切於地方事件兩不致悮奏入上命軍機大臣傳諭常青李侍堯藍元枚徐嗣曽曰官兵分起配渡均經定有章程且粤兵業經過竣浙兵挨次進發儘可交地方官辦理毋庸李侍堯親身在彼照料如此時漳浦地方所獲許姓各犯尚未辦竣李侍堯即星赴該處就近辦理兼資弹壓如許姓各犯業經辦竣漳州現有總兵常泰在彼毋庸李侍堯親往督辦該督亦不必再往即在厦門一帶辦理渡兵之事其餘邪教人犯自應事平後再辦為是至臺灣剿捕事宜若常青不往事不可知此實上天牖啓朕𠂻倍深感激目下粤兵早已全到其駐防滿兵亦可續到浙兵諒亦陸續配渡常青自當酌量先到弁兵足敷簡調剿捕即躬親統率廓清後路直搗賊巢但該将軍於四月二十七日将三月二十七八九等日剿賊情形具奏後迄今又隔數日着即将二十九以後曽否與賊打仗及現在如何籌辦剿捕賊匪各情形迅速馳奏初八日甲戌常青奏言首逆林爽文潜囬大里杙賊巢而南路賊黨仍敢猖獗臣即欲乘賊衆敗逃之時迅速窮追截殺惟因差探南北賊窝路徑尚未得其詳悉且現存府城兵丁不過二千餘名又因鳯山再失其氣少餒急切用之未必得力是以督率将偹各帶兵丁先在附近村庄逐處捜捕初三初十十四等日在大洲等處攻剿賊巢鎗砲打死賊匪百餘人割獻首級十餘顆奪獲鎗砲旗牌等械並将賊巢焚燬臣正在需兵接濟間接督臣李侍堯札知已預調粤省兵四千名極為迅速得力内二千五百名係南澳鎮搃兵陸廷柱帶領進鹿耳門一千五百名由鹿仔港進口髙亷鎮總兵梁朝桂帶隊㑹剿而浙省之兵亦經飛調軍威倍壮賊衆自可一鼓殱擒惟是察看臺灣南北路賊勢雖首逆林爽文現在大里杙巢穴固應直攻北路但南路賊黨荘大田等烏合之衆不下萬餘近又據南淡水都司邵振綱禀稱賊匪往来攔阻上下信息現與㕘将瑚圖里極力堵禦等語若臣遽往北路不惟鳯山等處益被擾害亦恐乘虚復来犯郡轉為肘腋之患至鹿仔港原有兵三千八百名今又添粤省兵一千五百名諸羅原有兵二千名近查柴大紀堵禦北路賊匪且與賊巢相近兵力稍单臣現派㕘将潘韜等帶原調到之提標金門銅山各營兵一千一百餘名前往協助並飭普吉保與柴大紀訂期夾攻斗六門該二鎮若即将道路打通約共有兵八千復與副将徐鼎士帶赴北淡水之兵互為應援則現在鹿仔港諸羅二處俱可防禦無虞臣再四熟籌必須先将南路剿除净盡然後乘勝疾趨北路大里杙一帶以全力専注自不難掃穴擒渠兹南澳鎮縂兵陸廷柱已於十三日到臺灣所帶兵船尚有五六百名在彼一俟粤兵盡數前来以及浙省兵齊到臣即親自總統官兵先往南路自大湖大小岡山小店仔棑子頭茄藤各險要以至相近内山之淡水溪山猪毛水底寮羣賊佔踞之處搜尋撲滅則鳯山縣城可以不煩兵力自然收復至前日雖有投順之莊錫舍臣謹凛遵訓示受降如受敵仍復時加稽察不敢稍有疎忽並於臣進剿南路之時飛檄柴大紀普吉保等奮力攻擊首逆林爽文大里杙巢穴使北路之賊有所牽制不敢赴南路援救則南路之賊自可盡力殱除并不使賊匪逸入内山致有與生畨勾結情事再查㕘将瑚圖里前於進剿南路時經郝壯猷派往南淡水接應都司邵振綱官兵因鳯山復陷是以該員尚在山猪毛汎協同堵禦臣到臺灣後業将已行正法人犯開具名单附奏兹復續獲賊夥以及沿海搶刼臨陣脱逃各犯逐一訊明俱非賊目即行正法繕具名单恭呈御覧再初九日接據柴大紀禀報三月二十九及四月初四等日賊匪侵擾諸羅縣城該鎮督率官兵并民畨人等協力剿捕将賊衆殺敗鎗砲打死賊數百人生擒匪犯蔡瑞等十一名斬賊首級三十餘顆奪獲鎗砲旗牌等項詳察柴大紀尚不敢因循懈弛但斗六門道路未通一切文報俱由海道往来竟非一日此皆由黄仕簡任承恩坐守不前柴大紀亦不免少有觀望臣惟有仰懇聖恩令其帶罪軍營奮勇殺賊以贖前愆再臺灣将弁員缺令臣於出力弁兵内酌予擢用臣惟核其實在勞績以奨有功并嚴查増數謊報等弊以期信賞必罰至堪勝陸路提督員缺容臣與督臣李侍堯札商㑹奏奏入上命軍機大臣傳諭常青李侍堯曰常青奏酌籌剿賊先後事宜所見俱合機要至賊黨雖有萬餘不過么䯢烏合一俟擒獲賊首林爽文餘黨自必紛紛潰散勢如摧枯拉朽無難撲滅净盡葢聚易者散亦易原不虞其多也此時粤兵計已全抵臺灣駐防滿兵及浙兵亦即陸續到彼軍威壯盛常青即可親自總統廓清南路賊匪乘勝直搗賊巢生擒逆首林爽文迅奏膚功承受恩眷朕盼望㨗音宵旰懸切該将軍務遵前㫖隨時奏報再常青奏到審明正法續獲賊夥以及沿海搶刼脱逃各犯单内有梁必進係撥防鳯山臨陣脱逃之犯前據常青奏潰回者計七百餘名其餘一千三百餘名尚無下落是臨陣脱逃者不止梁必進一犯此等逃兵前經傳諭常青李侍堯俟事定後嚴查實在逃逸者即照金川逃兵之例辦理但此時一經隨時拏獲訊係脱逃之犯自當即行正法示衆若此時概將逃兵全行查辦該犯等自知法所難宥轉致去而從賊於事大有闗係著常青此時先宻為存記俟軍務告竣再行確切查明遵照嚴辦賊匪未靖之先不可稍露端倪也至柴大紀於賊衆攻搶諸羅時復能督率官兵民畨協力殺死賊匪數百生擒匪犯蔡瑞等十一名正法尚知感激奮勉勇往出力前經降㫖令其暫署水師提督以資䇿勵續經降㫖将任承恩所遺陸路提督一缺諭令常青㑹同李侍堯於帶兵打仗總兵内擇其㝡為出力者保奏一人候朕簡放矣着該将軍仍遵前㫖於柴大紀普吉保二人孰為奮勉出力據實㑹同秉公保奏一人候朕另行降㫖補授以示鼓勵再莊錫舍殺賊立功以圖自効固属誠心而所属二千餘人其中豈皆可信此等新降之人究不免心生疑貳見官兵勢盛連得勝仗自必懾伏威稜始終出力設我兵稍不順遂即恐心懐疑貳常青於領兵攻剿時不可心存大意務須慎之又慎揀選勇往得力素為賊所畏憚将偹伴押莊錫舍同行以防萬一不虞即可先發以制有偹無患仍勿稍露端倪致滋疑畏至莊大田現為賊目糾約萬餘人肆出滋擾㝡為不法該犯與林爽文同謀互為聲援且籍𨽻漳州自不肯遽行投順但莊大田将来或見林爽文勢日窮蹙官兵聲勢愈盛而莊錫舍投誠後復邀官職之榮欲效莊錫舍所為率衆投誠亦事理所有此等奸狡兇徒心懐叵測總不可信如果伊等棄械投出若拒而不納堅其負固死守之心既非權宜應變之道若輕信受降聼其随營自効則伊等黨羽衆多勢難防範倘或該犯等自知罪重野性難馴乘隙生心别有竊發内應情事即不致有意外之虞而兵心已先為其所亂甚属不成事體此處㝡難措置得宜惟在常青時刻留心相度情形随機應變或權時受納設法解散俾官兵之力足以鉗制管束伊等無從生變或将伊等陸續送回内地設法辦理以杜後患而儆兇頑若降者不拒設或林爽文将来勢窮投出豈亦貸其死命置之不辦乎常青於此等處務須加倍慎重再四留心斟酌以期妥善此時切不可稍露端倪不但不可使賊匪聞知即投降之莊錫舍等亦不可稍有洩漏致滋疑貳又前經派出之侍衞章京八員皆係曽經行陣奮勇之人駐防滿兵昨㨿徐嗣曽奏起程時人人勇氣百倍粤兵亦向稱勇健常青率領此項奮勇官兵廓清後路直搗賊巢擒獲首逆剿除夥黨自無難一舉集事但一切善後事宜尤須擘畫周詳如查辦逃兵安置降人捜捕餘黨清釐地界酌建城垣等事均闗𦂳要或酌看該處情形有須添設文武員弁以資控制撫馭之處均須逐一籌酌悉心辦理以期一勞永逸綏靖海疆常青受朕委任全在伊一人籌辦妥善即稍遲數月來京瞻覲亦不為遲㫁不可急於啓程致有踈漏初十日丙子琅玕奏言閩省押解臺灣逆匪林小文四犯據衢州府知府舒慶雲禀報至江山縣地方廖攀龍一犯兩脚發腫飲食少進臣随飭撥醫委員帯往迎赴前途随路醫治務痊仍令嚴行督押晝夜兼程前進兹林小文等四犯于四月二十九日過省驗明廖攀龍病漸痊愈于五月初一日押送出浙江境仍移明前途江蘇省一體撥醫随路調治其林家齊一犯先據閩省解到已于四月十九日押送出境至章京侍衛烏什哈達等已于四月二十六二十七等日先後過杭州省城臣即照料迅速前進沿途並無需索均為安静司道等官亦無餽送情事同日李侍堯奏言漳浦搶奪一案據汀漳道朱芫㑹禀稱該縣親赴浮山社将搶奪人犯拏獲二十餘名現在嚴緝逸犯等語兹于二十六日接提臣来札亦以許姓聞官府查拏多已逃散其械鬥一案因傷斃人命報縣該縣正在嚴拏兇手不致有不服拘拏等事提臣現擬于數日内即趨赴蚶江是匪徒尚知畏法不致遂成巨案臣已飭該道嚴諭該縣上緊緝捕務使案犯全獲兇徒知警一面札致提臣查辦數日即速到蚶江帶兵赴鹿仔港再粤兵自三月二十六日及四月初六初九十二等日陸續放洋縂兵陸廷柱已于本月十三日到臺灣計此時粤兵四千早已全到本省滿營兵亦将次全抵厦門浙兵亦即随滿兵之後連日䟎行前進計五月初十以内俱可到蚶江厦門兩處配渡提臣来時正可帶領前往昨據普吉保咨稱但能於打仗處出力至於調度籌畫實非所長是普吉保亦自知限於才力不能獨當一面今䝉諭㫖授藍元枚為㕘贊令其前赴鹿仔港統領提臣過泉州臣當諄切告知一到鹿仔港即相機攻剿勿蹈前人觀望該處現有兵三千八百加以浙兵二千兵力亦已厚集必可直攻賊巢至内地沿海各處臣自當加意訪察於鎮静之中宻為防備不致稍有踈虞再本月十八日黄仕簡到厦門經興泉永道萬鍾傑委員押送于二十日到泉州臣隨傳㫖拏問委員即日起解赴京任承恩于二十六日到泉州臣亦委員即日起解伊二人兩路先後過海並未㑹面又臣接據常青来咨迅于内地沿海各營酌撥大砲重二三千斤者解赴軍前偹用臣查泉州厦門等營俱有數千斤䕶城大砲恐年久銹損不堪應用随飭各營将領試演挑出十位随帶鐵子火藥等項委員運解臺灣交常青應用再查鹿仔港正近大里杙大兵既集便當直搗賊巢大砲轟摧㝡為得力復飭挑撥十位随帶鐵子火藥等項運解鹿仔港軍營偹用所有解往兩路砲位俱造就砲車随同帶去以便牛隻挽運可省人夫擡送至閩省藩庫動撥已多今粤省撥解前来接濟尤覺寛裕現准孫士毅咨稱先于潮州鹽課等銀内凑撥十萬兩就近起解随後再從省城撥解三十萬兩等因查粤省委員所解十萬兩已于本月十八日入閩境臣亦先已派員前往接解不日可到泉州又本月二十一日臺灣道永福知府楊廷樺等遣役解到匪犯廖東阮賛胡畨連清水曽錦王世昌王大年等七名前来除王大年在途患病至打盈地方身故照例戮屍外查廖東一犯據縂兵柴大紀咨稱在三部竹地方打仗生擒之偽䕶駕大将軍阮賛一犯係克復諸羅後拏獲之偽千總胡畨一犯係諸羅令陳良翼拏獲之偽督粮官連清水一犯係總兵郝壯猷拏獲之偽軍師惟曽錦王世昌二名查曽錦係僧人上年柴大紀遣兵在崁下地方拏獲供出南路賊首王啓郎遣来打探軍情隨即拏到王啓郎收禁經撫臣徐嗣曽據咨具奏奉㫖将王啓郎曽錦解京臣到任後據派往臺灣之守備林登雲禀稱道府等将王啓郎放出并伊弟王世昌同帯義民指引官兵赴南路進攻鳳山臣以王啓郎係曽錦供出南路賊首何以遽行放出隨行文催解據該道府詳稱王啓郎即監生王世英同伊弟武生王世昌俱住鳳山縣城平日甚属安分上年賊破鳳山時兄弟二人擕帯家口逃至府城為曽錦誣供差拘到案質之曽錦亦稱僧人本係王啓郎邀在泗洲佛堂作住持後仍被逐出自鳳山破後沿途乞食被兵拏獲認為奸細将兩耳割去只得自認為軍師並扳王啓郎為賊首等語旋據府城紳士游廷元等以王啓郎從前辦理黄教時從軍出力實係良民因将王啓郎保出作為嚮導帶同戰兵在大湖軍前効力拏獲王坑郎等十餘名解送郝壮猷營盤又隨同收復鳯山三月初一日奉文解京到打狗地方痰壅氣閉當即殞命是該道府所禀王啓郎兄弟並無為匪情事兼又在軍前出力不惟不應治罪並宜奨賞王啓郎已死伊弟王世昌自無庸解京但事闗匪案未便草率或係該道等一時權宜放出既令其在軍効力不免意存迴䕶亦未可知臣謹将廖東阮賛胡畨連清水四犯先行解京其曽錦王世昌二名暫緩起解一面行文常青確查該道等所禀情節是否属實咨覆到日再行分别辦理均奏入上命軍機大臣傳諭常青李侍堯藍元枚曰福建駐防滿兵心力堅定自較緑營為得力應全令由厦門配渡與粤兵四千前往常青處俾統領進剿方為有濟其續到之浙兵應令由蚶江配渡前往鹿仔港交藍元枚帶領摺内未經分晰叙明諒李侍堯在彼派撥照料自必遵照分别配渡不致舛錯也至藍元枚受朕深恩授為㕘賛且目擊黄仕簡任承恩觀望遷延身獲重譴料伊亦不敢復蹈故轍但該處現有兵三千八百名駐劄日久未免師老氣衰而浙省兵丁素性脆弱朕所素知不過藉此看守汛地以壯聲威則可若臨陣打仗不能得力且鹿仔港逼近大里杙賊巢最闗緊要若此時藍元枚到彼即領兵進剿直攻賊巢無論浙兵柔懦萬一稍有挫損軍心為其動揺固属不成事體即幸得勝仗賊匪敗退勢必潰逃四散竄入深山藍元枚所帶之兵㫁不能捜剿擒截常青帶領大兵到彼時辦理轉覺費手所謂欲急轉緩於事無濟朕意藍元枚到鹿仔港時祗須㑹同柴大紀普吉保整頓兵力或往前移駐彰化縣城作為進攻大里杙之勢以牽綴賊勢不能往南而懾伏其胆或能㑹合柴大紀普吉保先将南北通衢斗六門大武隴等處之佔據賊匪合力剿除以便常青率領各項奮勇官兵廓清後路乘勝疾趨北路全無阻擋専力直搗賊巢自無難一舉蕆功行軍之道緩急先後貴于審度機宜權衡悉當有欲速而反遲似緩而轉急者所謂行軍貴機變也再漳浦奸民械門一案該縣已将正犯拏獲二十餘名是此案該地方官即可查拏逸犯究辦完結况有縂兵常泰在彼足資弹壓不但藍元枚應遵照諭㫖速赴鹿仔港即李侍堯亦須察看情形如不必親往督辦即在厦門蚶江一帶往來照料渡兵接濟軍需為是至本日李侍堯奏到各摺所辦俱合機宜朕心深為嘉慰著賞給大小荷包以示奨勵至軍需用項除粤省撥解四十萬兩外如尚不敷用該督即據實速奏候朕降㫖續撥以資接濟臣等謹案用兵固貴神速尤在知彼知己方能制勝提臣藍元枚渡臺懲黄仕簡任承恩之獲譴必思迅速攻剿奮勉見功我皇上計及鹿仔港現存之兵守禦日久未有寸進已師老氣衰而所帶之浙兵二千又素性脆弱打仗不能得力賊首林爽文負嵎之勢已成非偏師􅁕以蕆功特諭令牽綴賊勢先剿除斗六門大武隴佔據賊匪以待大兵合力進剿數千里外之情形洞若觀火悉先時宻授機宜所以動出萬全事無不集也欽定平定臺灣紀畧卷十六
