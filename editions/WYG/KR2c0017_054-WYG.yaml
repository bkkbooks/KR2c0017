body:
  text: 二月初五日戊戌福康安海蘭察鄂輝同奏言将拏獲首逆林爽文賊目何有志及節次拏獲各要犯隔别研訊縁林爽文自㓜来臺灣趕車度日交結無賴行竊為匪乾隆五十一年八月十五日林爽文與林泮林領林水返張回何有志等在大里杙山内車輪埔飲酒結盟互相約誓有難相救結黨搶奪適有楊光勲楊媽世倡㑹械鬪案内逸犯逃在彰化經地方官差役查拏有差役黄姓傅姓訪查曽入天地㑹之人藉端索詐人心不服林泮王芬林領林里生等起意拒捕招林爽文入夥經伊族長林繞林石等勸阻将林爽文藏匿山内糞箕湖地方林泮復来糾約遂决意聚衆謀逆十一月二十七日副将赫生額逰擊耿世文知縣俞峻帶兵至大里杙查拏在大墩住宿賊匪乘夜刦營全行被害二十九日攻陷彰化縣十二月初六日攻陷諸羅縣其淡水之賊於初七日攻陷竹塹城南路之賊于十二日攻陷鳯山縣四處紛紛響應雖彰化諸羅旋經收復起事之林泮王芬林里生各犯亦被官兵義民殺死無如帶兵各員株守一方不能及時進𠞰賊匪得以從容修備将大里杙地方築城挖壕斗六門菴古坑集集埔水沙連等處要隘亦皆竪立木柵壘砌石墻屯聚粮米勒派農民等分季納租山田按一九抽收水田按二八抽收公然以北路一帶村莊属其管轄迫脅各莊民人於於辮頂之外留髪一圏以為記認林爽文見黨羽附和日衆自稱盟主偽號順天賊夥内稱林爽文為大哥彼此相稱為兄弟受過偽職之有名賊目等不下數十人令林領林水返據守附近賊巢一帶之烏日莊田中央等處陳傳拈據南北投蔡福佔據菴古坑李七佔據斗六門劉懐青董喜陳梅為之主謀林爽文自五十一年十二月三十日往犯府城未陷並未再往總在嘉義縣及笨港鹽水港地方滋擾以嘉義為全郡適中之地滋擾更甚圍困數月之乆必欲攻陷至上年十一月内嘉義圍解後林爽文連夜奔回賊巢二十二日舒亮一路官兵進至大肚溪劄營林爽文親率賊夥前往攻擾左臂中鎗從前所聞在嘉義牛稠山受傷之處係属訛傳並無其事及大兵攻克大里杙時逆首由火燄山逃至集集埔以為退守地步並希圗抄截官兵後路旋經大兵併力攻克賊之精壯能打仗者多被殱戮始竄入内山畨界此北路逆匪等起意謀逆及滋擾煽誘先後各情節也其南路逆匪亦係天地㑹内之人莊大田實為渠魁該犯雖與林爽文附和一氣䆒係各分黨類不相上下其起釁情節容俟𠞰平南路拏獲莊大田再行訊明具奏惟查林爽文狡黠性成供詞閃爍其所供聚衆滋事商同謀逆各情多有不實不盡而於天地㑹起自何人之處反覆究詰該犯匿不供吐因係解京要犯未便遽行刑訊其供出助逆賊目等姓名除業經拏獲正法外未獲各犯出示懸賞按名嚴查務期盡絶根株不使稍留餘孽再林爽文等係逆案首犯渡海觧京道路遥逺必須大員督觧舒亮人甚明幹堪以觧送現在𠞰賊大局已定軍營分路帶兵者尚不乏人即将林爽文等一起逆犯交舒亮帶領章京弁兵等押觧赴京舒亮於軍營一切情形皆所深悉亦可仰備垂詢其先後拏獲有名賊目二十名首逆眷属五名口業已分作三起㨂派妥幹員弁觧送所有各起逆犯現於鹿仔港登舟徑渡蚶江但恐風信靡常或吹至厦門崇武兩處亦未可定臣已飛咨李侍堯於各處海口地方預行派撥官兵等候不問何處登岸皆有官兵䕶送不致稍有疎虞又自進兵以来義民首等隨營進𠞰人思自効實為奮勉可嘉其中最為出力者查有嘉義縣義民首黄奠邦鄭天球王得禄元長莊義民首張源懃隨同打仗搜拏賊匪並購線招出賊目等離間賊黨又各差義民假扮賊装四出偵探賊中情事纎悉皆知得以預為籌畫甚屬勤幹能事再淡水義民王松髙振葉培英東勢角義民首曽應開熟諳内山路徑深悉畨情前經臣委令徐夢麟招致屋鰲獅子等社生畨即係王松等前往曉諭迨賊匪遁入内山之後該義民首等導引官兵進𠞰並於要隘地方嚴宻堵截不使首逆逺颺所辦均属周妥臣已将黄奠邦等八名核其勞績分别賞給翎頂以示奨勵至淡水同知徐夢麟明幹能事熟悉畨情辦理𠞰賊一切事宜甚為出力将迤北一帶生畨全行招出親至三貂險僻之處堵拏賊匪並於所属淡水地方沿山通海各要口分佈義民設卡防守極為周宻又南安縣教諭郭廷筠試用塩大使張均軍需局委員革職通判鄭一桂在厦門招集漳泉義勇隨至臺灣軍營臣以郭廷筠籍𨽻閩省於臺灣情形最為熟悉凡購線擒拏賊眷賊目及撫諭義民訪探賊情等事多交該員辦理實能不辭勞瘁認真妥辦其張均鄭一桂往来督催粮餉鉛藥運送迅速自進兵以来從無貽誤官兵在斗六門𠞰賊時張均因送鉛藥前進適遇賊匪猝至當即殺賊一名拏獲活賊黄褒一名實為奮勉可嘉懇賞給徐夢麟知府職銜郭廷筠同知職銜鄭一桂知縣職銜俟大功告竣再行送部帶領引見至張均以文職官員保䕶鉛藥親殺賊匪應請令戴用藍翎以示優奨又閩安協副将徐鼎士調赴淡水堵禦賊匪尚為出力自臣到臺灣以来遵檄由大甲溪進兵人雖不能如徐夢麟幹練勤能亦属奮勉可嘉但業已因公降調懇仍留閩省以副将補用並賞戴花翎以示奨勵又聞南路賊匪多聚鳯山縣水底寮大穆降等處地方近聞官兵𠞰平北路賊匪多在近山一帶潜匿間或至郡城及山外村庒遥放鎗砲亦不敢逼近營盤莊大田等及有名頭目佔據大武隴地方為負嵎死守之計該處大山圍繞溪深嶺峻山僻路徑處處皆通中有四十餘莊如礁吧哖街大湖庄樂陶庒后堀臘皆係賊人巢穴而虞莊加拔莊赤山保等處皆有賊人出没此時進𠞰南路賊匪必先搗大武隴賊巢覆其根本並将該處通往鳯山之路飭令山猪毛義民在旗尾莊畨薯藔要隘堵截一面令永慶帶領總兵陸廷柱巴圗魯侍衛果爾敏色副将官福等就近由府城往攻水底藔牽綴賊勢大武隴西面臣前已派蔡攀龍帶兵駐劄灣裡溪烏什哈達駐劄哆囉嘓梁朝桂駐劄茅港尾鄭國卿駐劄白水溪一帶進逼其東西一帶内山生畨已諭令熟識畨情之貢生張維光生員王宗榮通事黄彦黄三才王和等前往曉諭各社生畨協同堵𠞰並令臺灣縣知縣王露差貢生張維光宻諭大武隴内之粤庄畨社招集義勇以為内應一俟各處佈置妥協即令烏什哈達帶兵一千名内地同安義民一千名由哆囉嘓前進梁朝桂帶兵二千名繞至阿里港一帶迎頭堵截臣等即統率大兵分路進攻大武隴一破南路賊匪自成瓦解之勢至北路各處村庒民心甫定仍須酌量留兵鎮撫地方捜緝逸匪自應於𦂳要隘口分劄營盤以聫聲勢酌令普吉保留駐東埔納逰擊夏承熙留駐斗六門都司田智留駐南頭副将徐鼎士留駐大里杙都司陳士紛留駐彰化都司朱龍章留駐淡水北路一帶統共留兵四千八百名足資彈壓其餘各處營盤概行撤去聽候調遣惟鹿仔港塩水港係近海口岸地方難民寄住者甚多仍令總兵李化龍都司楊拜颺在彼稽查彈壓至淡水極北之三貂蛤仔欄地方道路險逺向為藏匿奸匪之藪臣前因逆首未獲恐其潜行逃往訪知該處有租墾畨地之吳沙許天送二人素與生畨熟悉因諭令密購生畨導引官兵入山捜捕並飭徐鼎士徐夢麟帶領兵丁直入該處堵截兹據報稱已於正月初二日前抵三貂呉沙等帶領生畨出山逺迎詞色甚為真誠並遵諭分派蛤仔欄東西勢等社生畨扮作抽籐打鹿之人分佈要路截拏首逆等語現在林爽文雖已就擒但恐逆案内有名逸犯潜逃該處亦未可定復飭知該副将等轉飭吳沙許天送嚴宻緝拏並令徐夢麟仍回淡水徐鼎士仍回大里杙捜查餘匪以靖地方再林爽文之二弟林躍興與林爽文同逃入山在打鐵藔失散據淡水兵役於竹塹小坑内捜獲觧送訊供後即将該犯歸入第四起應觧逆犯内一併觧京查林爽文家屬惟伊三弟林勇一名尚在南路潜匿大兵進𠞰時即當設法嚴拏務期必獲以盡根株又古州鎮標都司朱化英等帶領兵丁九十四名配坐陳合興船隻渡洋被風吹回金門鎮地方船隻擊碎淹斃都司朱化英千總陳汝志兵丁六十名其餘弁兵扶板漂流登岸另配船隻現在已到軍營原船内鉛藥器械俱已沈失請将淹斃人等照陣亡例議䘏其扶板得生之外委顧大成胡天祥及兵丁等俱已酌量給賞以示體䘏再提訊林爽文之父林勸供稱原住平和縣小溪火燒樓地方父母𦵏在義塚現已将原籍村庒及𦵏墳處所飛咨李侍堯俟查有確切根據即行刨挖不必将義塚内坟墓概行發掘轉致該處民人聞風驚懼李侍堯自能妥協辦理莊大田係鳯山縣篤家港人訪聞莊大田之父莊二本住嘉義縣属台斗坑莊置有田畆給與莊民黄畨耕種莊二即𦵏於該庒附近地方莊大田於莊二故後始遷往鳯山隨令柴大紀帶同知縣陳良翼至圳仔頭山仔頂地方將莊二墳墓掘開骸骨挫焚其所存台斗坑田産照例入官歸于叛産内一併辦理奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰前據福康安奏分派巴圗魯及義民屯練等改装易服於老衢﨑地方捜獲林爽文但究係何人首先擒獲未據奏及想係軍務匆遽無暇詳及又林爽文之二弟林躍興已於竹塹山坑内捜獲林躍興是何人所獲自應加以奨賞即詳查具奏嘉義縣及淡水等處義民隨同官兵打仗殺賊並購線偵探擒捕匪犯實属奮勉著福康安即向各義民等詳加詢問如伊等情愿頂帶榮身不欲出仕者各聽其便其情愿出仕者著福康安量其才具分文武咨送吏兵二部帶領引見候朕酌量補用實缺以示鼓勵又前經温州鎮總兵缺出曽諭令福康安於帶兵出力之副将徐鼎士格綳額二員内比較何人最為出力即奏請陞補兹據奏徐鼎士另案得有降調處分未便遽陞總兵請仍留閩省以副将補用並請賞戴花翎自應如所請行其温州鎮總兵一缺格綳額是否堪以勝任即據實覆奏以便降㫖又劉懐青一犯現經觧到審訊其為林爽文主謀一節皆諉之董喜林水二犯供詞狡展現仍令軍機大臣嚴行刑詢後即行正法外其供出之林水及現在究出之陳梅等已據奏拏獲均俟觧到逐一嚴審至董喜一犯據林爽文供帶病跟到集集埔已經身死所供恐不足信又劉陞一犯亦係起意糾衆之人在内山衝散不知下落該犯既起意糾衆亦未便任其漏網著福康安查明董喜是否實因病故劉陞曽否續獲毋任􅊵脱又大武隴係南路賊匪巢穴自應先行摧破使賊無所依據現在大兵四路宻佈莊大田等自不難立就生擒惟該犯見林爽文係在内山生畨地方被官兵拏獲自不敢復逃至内山潜匿惟防其由各路海口竄逸則洋面廣濶官兵乘船追捕恐擒獲有需時日前經屢諭常青令於各海口要隘嚴宻巡防著福康安再嚴飭各海口弁兵梭織防守並傳諭徐嗣曽普吉保等不時督率巡察如莊大田等由海道竄逸則惟伊等是問恐不能當此重咎也福康安于擒獲莊大田後即令海蘭察巴圗魯侍衛等先行内渡其應撤各兵即行陸續撤回福康安俟料理一切善後事宜大局已定亦即先行起程其零星未獲無關𦂳要逸犯即交徐嗣曽普吉保等在彼督率查拏再此次福康安分派鎮将在大武隴附近一帶堵截已将蔡攀龍派入而柴大紀則從未派領帶兵可見蔡攀龍在彼較為出力而柴大紀竟係懦怯狡詐無用為福康安所深憎是以不加派委柴大紀究竟如何貪縦營私廢弛不職並著據實覆奏前因林爽文糾衆肆擾勢正猖獗是以欲将伊祖墳刨挖以洩衆忿今首犯林爽文業就生擒其父母兄弟妻子合家俱被拏獲即其三弟林勇現在逃往南路将来大兵捜捕莊大田自無難一併拏獲是林爽文業罹族誅其祖坟亦不值再行查辦且據供係𦵏在義􅊘内難以辨認若因此概行刨挖未免波及無辜或致衆心惶惑著傳諭李侍堯如林爽文祖坟查明確實自應行刨挖若查無確據亦可無須辦理至臺灣奸民倡立天地㑹起自何人林爽文匿不供吐該犯係属首逆應觧京盡法處治此時福康安自不便加以刑訊閲其供詞内稱常聽得説漳泉兩府設有天地㑹邀集多人立誓結盟等語漳泉兩處民人素不相睦林爽文原籍漳州其黨羽亦多係漳州人而義民鄉勇等籍𨽻泉州者居多林爽文自係欲借此扳陷以洩其忿看来天地㑹名色竟係漳州匪犯所倡與泉州無涉俟林爽文觧到時嚴行刑鞫自無􅀙狡展臺灣𠞰捕事務剋日完竣該處一交三月氣候即已炎熱各省派調官兵難以在彼乆駐節經諭令福康安於辦理善後事宜時祇須留兵數千以資彈壓其餘官兵應行陸續撤回令其各歸本處現在福康安統兵前往南路自可即日蕆功著遵照前㫖俟大功告蕆後除臺灣應留額兵外應将素耐炎熱之貴州湖南二省兵丁酌挑數千留彼彈壓其餘次第渡回内地各歸營伍将来大兵凱旋渡洋不但福康安海蘭察及領兵大員等不可冒險輕渡即微末弁兵亦不可輕易涉險總須俟風色順利再行開駕即稍遲時日亦属無碍總期全臻穏順上又諭内閣曰此次福康安等統率官兵前往臺灣𠞰捕逆匪未及兩月即将首逆林爽文生擒觧京大功指日告竣固由福康安等調度有方所向克捷而将弁兵丁等隨同𠞰捕亦俱争先効命用能掃逆擒渠妥速集事殊属可嘉前已有㫖令福康安查明咨部議敘本日據福康安奏請将出力之侍衛章京将弁等分别賞給巴圗魯名號加陞職銜翎頂均照所請行其餘将領等仍著福康安查明咨部一併議敘兵丁等優加賞賚以示朕奨勵戎行至意上又諭内閣曰向来官兵巡洋遇風淹斃俱照陣亡例議䘏今都司朱化英千總陳汝志及隨行兵丁等調赴臺灣征𠞰逆匪渡洋遇風以致淹斃多人尤堪憫惻著交部俱照陣亡例從優議敘其扶板得生之外委顧大成胡天祥以及兵丁等並著福康安照落水得生之例從優給賞以示軫䘏初六日己亥上命軍機大臣傳諭福康安曰朕閲藍鼎元所撰平臺紀略朱一貴糾衆肆擾經官兵各路追捕朱一貴逃入民家鄉民等設法擒拏觧赴施世驃軍前朱一貴昻然而立妄自稱孤藍廷珍命捶其足始與其黨皆跪伏罪請死今福康安将逆首林爽文生擒當縳至軍前之時其語言動作如何情狀曽否跪伏乞死及其黨夥一同請罪抑尚不知畏罪懼刑肆無忌憚如朱一貴情形著福康安詳細覆奏初八日辛丑上諭内閣曰前據福康安奏調赴臺灣協𠞰之貴州吉州鎮標都司朱化英等帶領兵丁配船渡洋被風吹回撃碎船隻淹斃都司朱化英千總陳汝志並兵丁六十名已降㫖将員弁兵丁俱照陣亡例從優議䘏苐念黔省官兵向来打仗甚為得力今調赴臺灣協𠞰遭風淹斃官兵共六十餘名之多實堪憫惻除官員交部優䘏外此内兵丁原額名粮以養家口兹雖得邀優賞而粮缺業經空出其家口養贍無資生計不免拮据着再加恩交該督撫即查明被淹兵丁係馬戰步守何項額缺即照其原缺将伊子孫挑補如無子嗣者即于弟姪内㨂選挑補若係餘丁亦即挑補守兵俾資養贍臣等謹按軍志以致果為毅而奮不顧身殉于戰陣者厥有議䘏之例至于徵兵協𠞰汎涉鯨波猝遇􅄓風之變以視臨陣捐軀者似稍有間而聖慈矜惻特比于陣亡之例而優䘏之猶且念其家無仰給之資復命于其子孫内挑補名粮額缺俾得養贍盖皇仁如此其厚睿慮如此其周也凡我戎行者有不聞而倍生感勵者哉同日李侍堯奏言現在臺灣北路逆首就擒餘匪亦經𠞰除福康安等移兵南路乘勝捜捕莊大田等不日定行擒獲計凱旋之期甚近内地應行籌備事宜臣已督同總局司道次第辦理查本省及各省官兵不下四萬有餘自應分起撤回以免擁擠除咨商福康安于酌留彈壓之外何路官兵由何處開洋内渡酌定咨覆俾得預期備辦其最要者莫如船隻一項臣查福康安過臺時隨帶官兵義民及粮餉藥鉛等項共用船一百三十餘號又渡載貴州湖南官兵并續運粮米鉛藥等項共約計二百餘號是鹿仔港現有船隻已敷配載之用至鹿耳門前此渡載官兵等項船隻前經該處留船三十餘號備用又運送粮米藥鉛等項船約有四十餘號今再撥船六十號前往候渡兩路官兵俱可源源配載又前此賊匪未盡之時内地營兵自不得不寛為儲備今逆首林爽文業已擒獲觧京軍務可剋期告蕆即届征兵歸伍之期所有上年新募兵丁原係暫備差􅋵非為乆逺之用其嵗需粮餉逓年計算所費不貲自應通盤籌核俾存營無冗設之兵而内地營制繁簡適均本不至有兵單之慮即漳泉厦門一帶係濱海要區俱有提鎮大標其兵數俱足資控衛無須更議増添臣再四籌酌如将新募兵丁一時全行裁汰辦理似覺過驟然俟其出一缺方補一兵未免需時過乆仍屬多糜粮餉臣現在已通飭各營遇有額兵缺出毋庸另行招募即以新兵撥補舊額至新兵自陸續募補以来已閲半年有餘如技藝不見長進未臻嫻熟即陸續裁汰至各營所募新兵多寡不同今于新兵較少之營分遇有額兵缺出即於新兵較多之相近營分移撥抵補似亦挹彼注兹之一法其中有不願赴别營就伍者並准其辭退另為撥補臣查上年派往臺灣出征兵丁内傷亡散失約有數千名所帶餘丁甚少本不敷頂補今臣於先後所募新兵二萬名内酌留五千名為抵補征兵額缺之用其餘一千五百名即督率各標營分别兵數多寡酌量辦理如補額無需五千名亦即逓行減退似此辦理自不見有裁撤之迹而兵數仍可符原額即粮餉亦無慮日乆多糜奏入報聞初十日癸夘李侍堯奏言被賊脅從之犯陳駐等十三名訊無助賊抗拒官兵情事應給駐防滿兵為奴但福州距該犯等本籍太近擬發江寕駐防兵丁為奴奏入上命軍機大臣傳諭李侍堯曰江寜與閩省亦係一水可通之地各海岸俱有船隻来往易于逃回原籍此等人犯竟應發往吉林黒龍江兩處給兵丁為奴以防其竄逸滋事十一日甲辰福康安海蘭察鄂輝奏言正月十四日分路發兵派普爾普帶領格綳額伊常阿謝廷選等由内山僻徑直趨大武隴北面並令通事曉諭生畨協同堵截鄂輝帶領許世亨烏什哈達六十七等由西南哆囉嘓洗布埤一帶進𠞰復派㕘将特克什布逰撃葉有光沿山捜查逰擊吳秀在後接應以杜賊匪奔竄之路復探知莊大田及林爽文之弟林勇因大兵将至留賊目等看守大武隴賊巢復在郡城一帶出没並令牛庄賊匪攻擾灣􅂻溪村莊希圗截㫁郡城要路臣福康安海蘭察恒瑞即帶領袁國璜穆克登阿特勒登徹岱森寳春寜及巴圗魯侍衛等于十五日劄營灣裡溪令蔡攀龍亦就近帶兵前往十六日進至牛庒賊匪二千餘名排列迎拒臣等即分路進攻齊放鎗砲横衝賊陣賊匪支持良乆始行敗走過溪猶恃該處水深溜急阻溪抗拒不肯遽退有騎馬賊目二人往来指揮官兵一擁過溪射死賊目一人項下掛偽印一顆鐫刻定南将軍蘇魁字様官兵盡力追趕殺賊五百餘名復射死賊目一名擒獲賊目陳獻瑞等四名活賊七十餘名奪獲大小砲位鳥鎗旗幟刀矛器械無算乘勝前進於十九日直抵南潭大穆降一帶有賊匪三千餘名在沿山九社口分劄兩營臣等督率巴圗魯官兵奮勇直前賊即棄營潰散正在追赶忽有賊匪從道傍斜徑抄截官兵分投迎擊復殺賊六百餘名擒拏活賊二百七十餘名常青亦帶兵自沙岡前来㑹合臣等即在南潭劄營商令常青仍回關帝㕔營盤駐守是日有賊目許大花等七名棄械投降據稱莊大田窮蹙竄逸並無定所臣等即令許大花等前往跴探一得確信即行踪跟捜𠞰設法生擒㫁不使逺颺漏網至大武隴山内為賊匪乆佔巢穴該處粤庒畨社頗知向義前經派令貢生張維光前往曉諭粤民等即同四社畨勇自南仔山小路至噍吧哖街焚燒賊藔數百間殺賊二百餘名賊匪等見民畨効順不敢復在該處屯聚俱退至大武隴山口把截以抗官兵適鄂輝許世亨烏什哈達六十七于十九日帶兵前進賊匪競放鎗砲抵禦我兵撲上山梁先佔髙處復從山上壓下攻克本縣庄頭社赶過大武隴河賊匪大敗殺賊三百餘名拏獲活賊一百餘名奪獲大小砲位火藥砲子及鳥鎗刀矛五十餘件是日普爾普一路亦由内山大埔等處捜𠞰至大武隴隘口賊匪抵死抗拒自山溝内分作兩路来攻普爾普帶領格綳額伊常阿謝廷選及劉懐仁李自昌劉越等分路迎出力戰半日殺死賊匪四百餘名拏獲活賊一百二十餘名餘黨即行潰竄查大武隴地方路徑叢襍係賊人佔據之地必須多兵𠞰捕方可盡絶根株不致散而復聚因復令鄂輝由南面搜入普爾普由北面捜入臣等即前往岡山一帶迎頭捜捕務将大武隴賊匪盡數殱除則鳯山賊匪益孤無難尅期蕆事其嘉義以北原設各路官兵除柴大紀仍駐嘉義張萬魁仍駐阿里山彈壓地方外其餘相度地勢酌加改派令蔡攀龍駐劄灣􅂻溪巡防石仔瀨鄭國卿及守備郭朝龍駐劄哆囉嘓巡防十八重溪逰擊黄象新駐劄灣􅂻渡頭巡防三坎店聫絡聲勢直達郡城維永慶陸廷柱等原擬派往水底藔牽綴賊勢但郡城重地兵力究不可過單而水底藔在臺灣極南負山面海地勢極為險逺以郡城乆疲之兵帶往攻𠞰恐難深恃且聞該處賊匪有自行投出之信若派出官兵辦理稍不妥協或致驚颺于事轉属無益是以暫停派兵前往另行籌辦已分派永慶博清額梁朝桂尹徳禧陸廷柱帶兵堵截打狗港竹仔港海口與沿山之山猪毛義民一體截拏逸匪辦理似更為嚴宻又接據烏什哈達鄭國卿稟稱初八日有大武隴賊匪阻截十八重溪要路不許居民投出經烏什哈達鄭國卿及都司吳壯圗分路帶領官兵義民熟畨等進勦追過山後殺賊百餘名擒拏活賊二十餘名十三日賊匪又来圍搶畨社被畨勇射死賊匪甚多次日仍來肆擾烏什哈達帶兵前往接應賊匪敗走各等語查鄂輝普爾普等進勦大武隴已将賊匪全行殺散其北面之十八重溪要隘業經臣派兵巡防餘匪不致竄逸又據義民首鄭其仁稟稱水底藔庒民鄭武烈等及附近庒民黄已良楊連等同賊目陳超鄭珠陳天運陳棕陳香自行投出復倡率庒民擒殺賊目賊匪數十名奪獲鎗砲器械收復枋藔北勢各莊情愿設法擒獻莊大田立功贖罪等語水底藔等村莊極為險逺今既震懾軍威不敢負嵎抗拒自應准其投誠殺賊自効臣已派副将張芝元伍達色知府楊廷理前往曉諭因該處附近均係粤庒即派廣東兵五百名交張芝元等帶往駐守與粤庒義民互相援應堵截賊匪更可得力至臣帶兵南下沿途察看情形難民等俱搭盖草藔暫行棲止農田亦有翻犁耕種者各處留駐營盤捜緝逸匪稽查彈壓俱属嚴宻自水沙連至斗六門灣裡溪各處民人俱已歸庒搬移家具貿易往来者相属于道大兵所過庄民相率跪迎塩水港鹿仔草等庒亦有耆老逺来迎接地方均為寜謐惟水田山地尚未全行播種其灣裡溪以南一帶村庒悉被賊人焚燬居民逃散現已出示諭令歸庒即行查明撫䘏其郡城内外之義民甚属歡欣踴躍臣已逐加慰諭查明出力者分别賞賚並據山猪毛義民副理事劉繩祖黄衮邱宏章帶領防守郡城之義民前来懇請隨營打仗臣當即傳見親為奨勞先行給賞並留心察看該義民等果係勇敢強壯立心報効實與他處義民不同以之𠞰賊必能得力臣已准其隨營仍劄諭粤庒總理事舉人曽中立等在沿山一帶堵拏賊匪容俟大兵進𠞰鳯山時再當優加奨擢以示勸勵又前因北路已平逆首就獲不須復増兵力隨於初九日移咨李侍堯倘湖南兵船尚在候風即可停其開駕撤回本省兹據總兵尹徳禧禀報所帶官兵業于十二日由鹿仔港登岸若令即日撤回亦須至港口候風不能尅期逕渡此時雖大局已定不日可以竣事但南路地方内山與海岸相近水陸要衝均須多兵堵截且當逆匪初平之時官兵日益増多聲勢壯盛更足以鎮定民心是以仍令該鎮帶兵前赴軍營聽候調遣奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰官兵在牛庒地方與賊匪打仗射死賊目項上掛有定南将軍蘇魁偽印一顆射賊者係属何人著查明具奏官兵一抵南路即屢得勝仗賊匪紛紛逃竄其庒民賊目等又情愿為官兵偵探賊踪縛獻莊大田以贖其罪實屬極好機㑹而沿山沿海一帶又屢經福康安派兵分路堵截諒莊大田罪惡貫盈㫁不能復行脱或此時已将該賊目生擒捷報業經在途不日自可逓到至南路地方内山與海岸相近既須多兵堵截且官兵日増聲勢更為壯盛所有此次湖南官兵自應仍赴軍營俟擒獲莊大田再行撤回亦不為遲况湖南兵丁性能耐熱将來撤兵時即可暫留該處以資彈壓欽定平定臺灣紀畧卷五十四
