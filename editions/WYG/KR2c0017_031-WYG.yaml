  text: 欽定四庫全書欽定平定臺灣紀畧卷三十一
  hash: sha256:945ea1d43035926f32775b1fe0876d59e76daa10d85efeef1483a81ab84fd776
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_031-1a, image: WYG0363/WYG0363-0346a.png}
body:
  text: 八月十五日庚戌李侍堯奏言所募新兵入伍未及一月雖上𦂳操演而技藝尚未嫻習所製鎗械亦未齊全現挑各營舊鎗使之演放必湏一兩月後方可調用是以臣飛檄督撫兩標及水師一營城守一營現存額兵内挑凑一千派将偹管帶即由五虎門岀口赴北淡水隨同徐鼎士協力堵勦已移咨撫臣即在省城料理㸃派起程計十日内即可至北淡水至内地募兵一事臣前接臺灣道永福所禀官兵已直抵諸羅魏大斌柴大紀等裏外㑹合即可乗勢進𠞰指日不難滅賊是以臣奏明三次共募兵一萬有餘之外可毋庸再募今准常青寄來摺稿則魏大斌等進抵諸羅後又無信息恐係賊人故意撤圍俾官兵抵縣却又于後梗阻道路使所運粮餉火藥不能前往接濟是不惟柴大紀被圍而魏大斌等又在賊圍之中雖據常青已派兵前往接應但看來事勢或尚須量為預備則内地募兵必須多多益善擬于水陸各營再募兵一萬及早訓練所有鳥鎗等軍械亦飭司速撥銀両令各營分頭製造臣惟有日夜催䟎以期應用不致遲悞再臣接據副將徐鼎士同知徐夢麟等禀稱現在林爽文在諸羅攻圍未暇歸巢寔為有機可乘查鹿仔港在大里杙之南須歩歩仰攻而自大甲過溪為岸社等處係賊之背乗髙而下易于俯制若鹿仔港攻其南大甲攻其北可使賊腹背受敵又本月十一二等日聞賊營中時有砲聲探係賊夥自相攻殺該同知又訪有何清鳳與賊目何安邦交好因令何清鳳轉為開導據稱何安邦情愿立功贖罪是此時尤可乘虚進𠞰等語查徐鼎士及守偹潘國材等兵一千八百餘名已移駐大甲又有食粮義勇三千名并岸社義民熟畨共四千名今又増派官兵一千即由五虎門前往正可壮軍聲而作士氣是又増𠞰賊之一路臣一靣知㑹藍元枚相度情形或應進攻斗六門一帯或即與徐鼎士彼此訂期徑攻大里杙務當奮勇前進勿致坐失事機再漳泉一帯現在尚有早禾可食計九十月間必須平糶直至明年青黄不接之時約二三十萬石可以敷用臺地除接應兵粮及鄉勇難民外現在賊匪勢又鴟張其寔俱係脅從房屋已燒貲粮已罄不得不從賊搶擄以延旦夕近接将軍常青摺稿稱各庄民又有改悔出結歸庄者大兵進𠞰必多自拔來歸然不稍資其生計俾得暫可度日則無食之民仍無所賴未免觀望不前若來投者即加以撫䘏安挿使得重延殘喘復為良民則脅從之徒誰不相携而至是米之在漳泉固所以綏靖地方而米之到臺灣尤足以散賊黨而省兵力是宜多為觧運源源接濟今浙省所撥之十萬石将次到齊八月中浙江江南江西之米又可到一二十萬石擬先行觧往臺灣南北兩路以供支應官兵義勇口粮及招撫脅從之用其内地平糶等事九十月間各省米又必有觧到者以之分運各處平糶自可陸續應手至臺灣撫䘏安挿之事臣現咨令常青藍元枚並飭辦理粮餉之臬司李永祺及臺灣道府等官兵隨路廓清有被脅來投者隨時察看情形或就各村庄煑賑或量給錢米俾得存活一靣勸諭伊等及時補種畨薯之類以資口食則賊夥日益觧散逆首自易就擒至軍前既有隨路撫卹等事需用佐襍人員必多臣并多行挑選派令觧運銀粮前往即酌量留於該處委用内地現有揀發一等舉人陸續到閩可以差遣亦不致乏員再查澎湖係鹿耳門之門户該處距鹿耳門洋靣三百餘里塩水港笨港兩口則又在鹿耳門之北相去更逺鹿仔草係入塩水港後在内港起􅜌至諸羅之馬頭並非沿海港口今塩水港有逰擊楊起麟劄營鹿仔草亦有逰擊邱能成駐守而笨港被賊搶擄之後臣恐賊匪出海滋事已撥繒船二隻水師兵二百名前往鹿仔港防䕶近據臺灣道府禀稱府城近日有北淡水米船到來是以粮價漸平等語北淡水由海道至府城必從笨港口經過今北淡水之米可以至府則笨港尚無賊匪滋擾可知至澎湖雖添兵五百究属单薄沿海一帶並須預為防範前所續派前往鹿仔港之兵二百及鹿耳門之兵二百尚恐不敷應用一靣於新募水師兵内擇其稍習鳥鎗者酌派六百名前往澎湖及各港口協同舊派之四百名往來梭織防䕶斷不至稍有踈失再浙省駐防滿兵已到二百五十名粤省駐防滿兵已到六百名俱隨到隨即登舟候風計初十以内所有滿漢官兵皆可到齊配渡至洋靣刧案繁多實由該營員怠巡已慣視緝盗為具文近又因水師屢調之後存營兵少不能輪流更換以致曠悮是以臣前奏請於沿海各營照派往臺灣班兵之數先募補十之二三及時操練以偹巡防昨募足五千後又増募五千現又増募萬餘名俱係水陸兼募自此水師各營既有新募之兵及時操練一面即可将舊兵多為抽派廣布巡船輪流在洋嚴緝盗賊兼同地方文員所撥差役䕶送官米船隻以免疎虞查金門海壇閩安峰火門各鎮協營所轄海道相連每營不過二三百里如果各于所轄之二三百里内實力巡查則匪船自無從寄泊臣今嚴飭各營毎營派兵四百名配載繒艍各船分作兩班每班二百名専派偹弁帶領各兵于所轄之洋靣輪流出巡一月一換如有失事按照所轄之洋靣嚴􅄁治罪同日徐嗣曽奏言浙省六起滿兵已經全數過省接准督臣咨再撥兵一千名由五虎門配渡竟赴淡水接濟徐鼎士嘱臣留省料理當即督同将偹将各兵迅速挑派一靣上𦂳僱偹船隻一應粮餉軍火器械等項部署停妥適于初二日接據副将徐鼎士同知徐夢麟禀稱自抵大甲後官兵先後到齊並募集義民畨勇分隘剳營連戰克勝探聞諸羅柴大紀于六月二十八九兩日與賊鏖戰賊目葉省蔡福俱斃于砲餘賊死者無數林爽文僅以身免竄聚斗六門不敢回彰聞大里杙等處巢穴存賊尚有萬餘查大甲溪自南而西過大肚溪十餘里即近鹿仔港由北而東自犁頭店至烏日庄即逼近大里杙賊巢七月十一二等日聞賊營時有砲聲宻差偵探係犁頭店賊夥自相攻殺現在官兵一千七百餘名所募義民畨勇共七千餘名誠得鹿仔港大兵宻訂進期先在大肚溪等處聲援即分兵兩路一攻大肚以斷賊營之右一攻烏日荘以絶賊營之左烏日一破縱使大里杙勢甚完固架以大砲四靣環轟如拉枯朽更得兵一枝扎營南投隔㫁虎仔坑陳泮賊巢使其不能應援而林圯埔水沙連等處賊匪亦不敢蠢動並已預遣妥人前往結好生畨在内擒獻以絶林爽文逃入内山去路腹心之患既除餘賊以次搜捕勢如瓦觧商之各偹弁義勇人等無不衆口同聲及鋒欲試惟需添兵一二千名迅速由大安進口帮守大甲徐鼎士等即統帶官兵義勇再添募義民數千隨同進𠞰益壮聲勢並請發餉銀五萬兩以備軍需各項費用等語臣竊思大里杙一帯久為逆首盤踞深溝髙壘營巢愈宻以為将來抵死負嵎之所而南路中路鹿仔港官兵俱為賊牽掣未能分兵進逼惟淡水一路自竹塹城以北此時搜捕漸净官兵俱駐大甲溪該處迫近賊巢地勢又較便㨗果能乘隙進搗将逆黨私蓄一炬而盡使逆首勢孤力竭不難指日就擒即或攻圍稍需時日賊仍退而返頋則南路之勢已觧官兵可移而向北并力齊攻亦可迅速蕆事細核該将丞等所禀似属實有所見其禀内所請餉銀先經督臣撥銀五萬兩觧往日内定已應手惟兵力稍单正在亟需䇿應而奉㫖添兵適值該處禀到請兵之日現在船隻俱已僱齊飭令該兵等多帶火藥已於初四日登舟候風開駕復經督臣飭司添撥銀三萬兩米六千石委試用知縣王履吉押附兵船帶往粮餉已極充裕又查上年調兵渡淡水時因竹塹新庄等處皆有賊擾今兵由八里岔上岸前抵大甲溪尚有二百餘里山徑亦多迂折臣細訪路徑照依徐鼎士所禀由五虎門出口直抵大安港登岸相去大甲止有十餘里較為便㨗是以即雇募熟悉此路之舵水人等徑由該處進發以期早資接應均奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀徐嗣曽曰魏大斌援應諸羅而邱能成所押粮餉火藥仍被賊匪梗阻不能前進看來竟係賊人狡計将魏大斌放出重圍聽其入城仍将粮餉截㫁道路梗阻則柴大紀雖與魏大斌㑹合仍不能𠞰散賊匪而諸羅添此應援之兵粮餉又被截㫁更恐軍粮不給是賊匪奸計顯而易見數日待柴大紀奏摺未至正為此焦心但前據常青奏接據巡檢邵宗堯禀報鹿仔草官兵已抵縣城所有觧押餉銀隨同前進等語則又似所運粮餉等項亦已前抵諸羅如果所報属實則官兵自可無乏食之慮否則有兵無粮其勢豈不更為急迫著常青李侍堯将所運諸羅粮餉火藥究竟仍在鹿仔草或係全行運到及鹿仔草道路曽否打通不致梗阻之處迅速馳奏至柴大紀處雖援兵已到勢尚单弱且據李侍堯奏徐鼎士禀報賊首林爽文現在諸羅攻圍是該處賊勢尚熾常青急應遵照前㫖親統大兵迅赴諸羅合力攻𠞰至徐鼎士禀稱令鹿仔港大兵宻訂進期在大肚溪等處聲援而徐鼎士分兵兩路一攻大肚一攻烏日庄斷賊左右烏日一破即以大砲轟擊大里杙使賊人腹背受敵又可乘髙而下為島穴擒渠之要䇿藍元枚前已有㫖令其統兵徑赴諸羅㑹合常青柴大紀今大甲一路既有可乘之機該􅄁賛又當與徐鼎士速行訂期夹攻以期㑹合直搗賊巢用兵之道原貴相機而動不必拘泥前㫖並著李侍堯藍元枚傳諭徐鼎士若能督率兵民乘機進𠞰傾其巢穴則逆匪夥黨聞風觧體更無難迅速掃除撲滅是平臺之功徐鼎士實為第一将來受朕恩眷豈復可量耶徐鼎士務須倍加努力速成大功至徐鼎士所稱賊營中時有砲聲探係犁頭店賊夥自相攻殺又訪有何清鳳與賊目何安邦交好因令何清鳳開導何安邦立功贖罪一莭此係極好機㑹藍元枚近在該處何以並未奏及賊人夥黨既自相殘殺已有内潰之勢常青藍元枚等急應乘機招集或𠞰或撫以觧散賊黨至李侍堯所奏一切經理妥協甚愜朕懐徐嗣曽照料過兵及撥運粮餉前赴淡水所辦亦好至從前洋靣被刼各案實由該營員廢弛懈怠視巡緝為具文以致匪徒公行無忌事定後急當嚴行查㕘俾弁員知所警戒並著該督於審辦此案隨時具摺陳奏一次并将有無獲犯一併據實具奏同日琅玕奏言浙省自嘉興入境首站以至錢塘向用馬遞自富陽以至江山向用夫遞上年添設腰站每腰站一處用夫遞者撥夫八名用馬遞者撥馬四匹夫四名人夫接遞之正腰站十九處毎處酌添夫八名並因西安縣至閩省浦城縣交界計程二百四十餘里皆崇山峻嶺遞送維艱若腰站四十里始行更換人力易致疲乏飭令於正站腰站之外每十里再設夫八名接替遞送並𣲖委佐雜各員分叚専管輪流稽查刋發填報单式飭令臬司隨時查核其餘運送軍装並火藥鉛弹餉鞘䓁項需用人夫為數甚多額設扛運人夫㫁不敷用均飭隨時添雇統俟事竣後核明添雇確數按照軍需則例據實造冊報部請銷再現在福康安等馳赴臺灣自嘉興府起至衢州府属之西安縣俱係水路所有一切船隻及由省城至江口應用馬匹已飭管理驛站之臬司歸景照妥為辦理其由西安江山赴閩係属陸路所需馬匹已飛咨提臣就近酌調衢州鎮等處營馬應用至江浙運閩米石用船甚多俱係兩省合力雇辦兹欽奉諭㫖念及商販令臣等量其緩急酌籌妥辦是米石既稍可酌分緩急船隻亦從容易辦惟是海船全資風力此時将屆深秋西北風當令運閩赴南可以遄行而自南赴北自不能如夏令之便㨗現在川省米石既起運迅速其續運之米自跟接而來若兩湖之米不相照應一時發運恐船隻不敷配載致擁擠海口徒滋守候抑且各商船聞海口屯米過多致啟隠避之弊查浙省兩次運閩之米接據委員禀報在泉厦兑収者已有九萬一千一百餘石浙省採買之米及江南江西續經起運者亦可接踵而至此時閩省已有米石接濟可以無虞缺乏此等運閩米石止須源源接運以偹應用原不必同時運到懇勅下兩湖督撫臣将應運米石如已起運者聽其運赴海口臣等酌量隨時起運如尚未起運者暫停發運俟川省末起米船全行過楚後将楚省之米運赴海口換船起運如此稍為通融庶船隻可以陸續購雇不致掣肘奏入上命軍機大臣傳諭琅玕曰湖北湖南米石已一併由江西五福一帶接運赴閩現在江浙兩省雇偹海船已覺竭􅀈該撫此時祗須遵照昨降諭㫖将川省運閩之米陸續雇偹海運船隻其楚省米石即由江西陸路運往俾海陸兩路源源分運接濟以備應用自可無虞缺乏著琅玕将現在接濟川省米石出口船隻計算足敷運送者預為雇偹其楚省運米船隻毋庸封雇致滋擁擠稽遲十七日壬子藍元枚奏言賊黨近日因被官兵各路𠞰殺脅從之衆未免觧體經臣出示曉諭乘間來歸者頗不乏人惟是賊匪詭計多端恐有奸細冒充仍須嚴宻查防至臺灣南北道路被賊阻隔往來文報俱由海洋遞送經嚴飭各海口員弁寔力稽查現督臣李侍堯又派撥哨船二隻前來巡查更為有益此時鹿仔港一帯洋靣頗覺安静二林海口現有守備張奉廷帯兵五百名同義民駐劄查自二林以南村庄係賊匪出没之所第東螺西螺一帯數十庄先經臣差該地武生陳大用鍾竒英等愷切曉諭令其保守村庄各安生業本月十七日乘其不備官兵分路攻𠞰西螺賊匪該地百姓俱無助賊今臣又差武生陳大用陳飄香等分頭前往海豐港麥仔藔沿海各村庄遍貼告示靣為曉諭使沿海百姓咸知大義糾集鄉勇共禦賊匪則賊勢益孤便易設法𠞰捕奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰前以藍元枚奏殺退西螺賊匪擬即統領官兵相機勦捕又伊族人藍啟能等在彰化投出懇求安挿所辦尚属妥協方以藍元枚係本省人統本省官兵可資倚任是以加恩奨勵藍元枚自應倍加奮勉速圖奏績且前因兵力单弱奏請増添業據李侍堯奏到粤兵漳兵皆經陸續配渡開洋自己早抵鹿仔港該㕘賛正應乗其鋭氣鼓勇前進以期迅速集事今閲所奏情形止係遵㫖曉諭被脅賊衆防範海口各事宜且據稱臺灣南北道路被賊阻隔往來文報不無遲滯是則更應速領官兵前往𠞰殺打通道路乃既未前往進𠞰而於作何調度㑹合之處亦並未陳奏看其光景竟係株守鹿仔港一籌莫展矣即云持重亦不應恇怯遷延若此前此任承恩在鹿仔港時心存觀望束手無䇿以致曠日持久貽悞機宜是以降㫖革職拏問治罪藍元枚尤非若任承恩可比若復踵前轍觀望不進則藍元枚獲罪尤重不可不慎着先傳㫖嚴行申飭前因徐鼎士擬由大甲分兵攻撃大里杙之北並約㑹藍元枚從鹿仔港進兵大肚溪以期裏外應合俾賊人腹背受敵搗其巢穴因諭令藍元枚即由大肚溪進兵夾擊不知徐鼎士此䇿知㑹藍元枚否如藍元枚接奉前赴諸羅之㫖已領兵自北而南固属甚善否則亟應帯兵速赴大肚溪㑹同徐鼎士夹攻大里杙賊巢機不可失藍元枚務須加倍奮勉力圖自効勿再因循遲緩再柴大紀於魏大斌前抵諸羅後如何攻𠞰殺賊逰撃邱能成所押軍装火藥于何時在鹿仔草殺退賊匪前赴諸羅尚未據續有奏報並着常青藍元枚柴大紀各行迅速馳奏至福康安已有㫖令其星速遄行今看常青藍元枚于剿捕事宜竟無定見當必須福康安前往督辦方能蕆事福康安在途行走務須益加𦂳急及早到彼督率調度以期迅奏膚功再賊首林爽文糾衆謀逆罪大惡極覆載不容其祖墳自必近在漳州一帶着李侍堯宻委妥員将林爽文祖墳先行刨挖剉骨揚灰以申國憲而快人心亦申賊勢之一法也十九日甲寅李侍堯奏言山猪毛各粤庄義民最為勇猛賊人屢攻俱為所敗其隨同瑚圖里等到府及留在軍前助𠞰之處或出自情愿即如瑚圖里等於六月二十二日到府旋據同知吳元琪禀稱七月初三四等日逆匪荘大田遣許光來等往攻山猪毛粤庄被粤民殺退而七月十四日常青等往𠞰南潭時所留軍前之粤民最為出力看來竟係該義民自度無内顧之虞願在軍前殺賊常青前奏未曽聲叙明白是以上厪聖懐至恒瑞前往䑓灣時臣見其虚心商酌深知以國事為重到䑓灣後聞其諸事與常青和衷辦理並無意見不和此臣所深知者惟魏大斌等往援諸羅為賊所阻常青僅遣田藍玉帯兵前往及田藍玉仍不能進又遣特克什布張萬魁帯兵前往共撥兵三千九百名而常青並未親自赴援雖或因府城外賊勢有未可移動營盤之處然究不免為賊所綴未能扼要制勝兹䝉以常青是否可了此事之處垂詢臣察看此事情形總以能打通諸羅為第一關鍵如常青果能親自率兵前往打通諸羅道路與柴大紀魏大斌等㑹合則軍聲已振賊勢自衰柴大紀最為奮勇且臨機應變調度得宜既得與常青㑹合一處必能協心併力共圖進𠞰兼以内地續調之兵現在陸續配渡不日可到似即可乘勢搗穴擒渠完結此事但目下五六日内尚未得諸羅信息萬一諸羅一時不能得手則常青恐不免著忙可否於武臣中如海蘭察者授為㕘賛大臣令其前來㑹同常青督率料理賊匪雖多究係烏合之衆自不難摧敗在海蘭察久厯戎行來當重任自必期于妥辦且俱係専閫大臣同舟共濟亦無待常青駕馭然後出力而常青處事亦極明白决不肯各立意見自當坦懐商度相與有成則𠞰匪之事似即可及早告竣再廣東駐防滿兵一千五百名副都統博清額帯領已於七月三十八月初一初二初三等日全數抵厦俱已配渡現在候風開駕浙江駐防滿兵亦陸續到有四起隨即登舟江寧将軍永慶已於初五日抵厦尚有二起日内亦可到齊至粤省最後之緑營兵一千五百名隨滿兵後行走亦于初五日到厦七百名即由厦門配渡前赴鹿仔港得有順風即當放洋奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰前因常青等辦理𠞰捕事務未得把握是以諭令福康安同海蘭察等帶領巴圖魯侍衛章京等馳赴䑓灣督同進𠞰以期迅速蕆事朕非不知軍中主帥不可屢易特念此事前已悞於黄仕簡任承恩二人觀望因循以致日久未能辦結猶意此等賊匪不過么䯢草竊無難速就殱除是以就近令常青前往䑓灣更換常青到彼後籌畫調度尚俱妥協已出朕望外但究係年老未能諳練軍旅藍元枚恒瑞又更事未多駐守數月總未能相機進取因思此事一悮豈容再悮若于賊匪起事之初即𣲖福康安同海蘭察帯領巴圖魯等侍衛百餘人及早馳往則賊匪定已早就殱擒何致曠日持久尚未蕆事今已失之于前此時不得不𣲖福康安前往接辦此朕不得已之苦心現在福康安海蘭察帯同侍衛章京等兼程前往不日即可到彼所謂成事不説至福康安於途次遇有常青李侍堯等六百里加𦂳軍報仍可啟看若大里杙已經摧破林爽文荘大田等並就殱擒則福康安一聞此信或抵泉州後即可旋回其善後事宜固常青所優為無須福康安前往帮辦倘大里杙雖已摧破而賊首賊目尚未就擒或林爽文荘大田止擒獲一人未能蕆事則福康安仍當速渡臺灣督同𠞰捕以期迅奏膚功至常青等所請添兵彼時尚未全到雖進𠞰稍需時日朕亦不加責偹常青等若能於福康安未到以前将首夥各犯弋獲則平定全臺仍是伊等之功常青等不必心懐疑懼惟當悉心籌畫奮勉自効速圖奏績二十日乙夘上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰柴大紀處半月以來總未據續有奏報甚為煩悶因思魏大斌應援之兵既已㑹合柴大紀即不能進攻大里杙賊巢自應令魏大斌分兵出城将從前經過道路如鹿仔草一帯屯聚賊匪先行勦散廓清道路縱使魏大斌不能分身亦應于将弁中擇其勇幹可恃者令其帯兵出城剿捕何以魏大斌到彼柴大紀仍復漫無舉動豈添此魏大斌兵力徒令帮守縣城甘心受賊圍困而不思乘其新到鋭氣相機進𠞰耶著傳諭柴大紀急應設法籌畫倍加奮勉欽定平定臺灣紀畧卷三十一
