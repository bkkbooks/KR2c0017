body:
  text: 欽定平定臺灣紀畧卷三十八九月二十四日戊子孫永清三徳同奏言接准督臣咨調粤西預備官兵三千名赴臺協𠞰臣三徳先馳抵梧州照料㸃送所有附近東省官兵即撥五百名為一起派副将巴爾布帶領前進其餘各起官兵均依限到梧即分派将弁㸃送上船銜尾開行九月初九日已全數岀境由廣東封川縣一帶前進奏入報聞二十七日辛卯舒常姜晟同奏言川省派撥屯練降畨二千名赴閩協𠞰于本月十六十七十九二十等日所有四起屯練降畨挨次行抵漢口鎮其替換船隻先經照數按起預備差探每起将到臣等即親至該處督同司道等先為預備隨到隨㸃看更換過船将例給供支及加賚餅肉錢文等項按船散給其領屯兵各起之将備土弁等量給綢疋荷包銀錁等物當即令其開行前進臣等目擊該官兵等氣象不但整肅安静實俱踴躍奮興自漢口至黄梅縣出湖北境計程五百六十里順流而下不過三四日臣等添派㕘逰等催䕶前進逐站水台按例應付令藩司陳淮駐黄梅縣照料出境成都将軍鄂輝總兵穆克登阿俱于十九日先後行抵漢陽即日換船督催川兵前進至川省運閩米二十萬石頭二兩運業經自漢換船開行其三四運亦現在陸續抵漢陽過載又續辦米三十萬石同頭運米船據宜昌府稟報已入巴東椘境同日李慶棻奏言黔省赴閩官兵省城各營于初八日起程下逰鎮逺等各營官兵均於初九初十十一等日自營起程上逰之大定等營官兵亦于初九初十十一等日起程十六日全行經過省城臣現在親赴沿途催䟎並㑹同提臣保成飛飭領兵員弁迅速行走毋許片刻遲延約于二十四日可以全抵古州水次開船前進一路順流直下約三日即可抵廣西懐逺縣境均奏入上命軍機大臣傳諭孫士毅李侍堯何裕城孫永清徐嗣曽曰現在臺灣𠞰賊仍未能刻期蕆事尚須厚集兵力以迅奏膚功計福康安此時早經前抵臺灣鹿仔港督辦一切正須生力之兵調遣㑹𠞰逆匪所有四川屯練降畨及貴州廣西之兵務須遄程前進著傳諭孫士毅何裕城孫永清于沿途地方飭令帶兵官弁加𦂳兼程行走愈速愈妙並著李侍堯徐嗣曽先行預備船隻俟各兵到時即可迅速配渡毋使稍有遲緩同日李侍堯奏言十四日接常青来札并将恒瑞摺稿寄来臣查厦門驛站尚未有恒瑞奏摺過境想因風水不順吹往别處口岸不能即到臣等謹將原稿進呈惟是閲恒瑞摺稿蔡攀龍等抵諸羅後仍未能殺出隨同進兵之貴林楊起麟等並不知下落是此次赴援之兵又未得手幸恒瑞先帶兵一千五百已到塩水港水路尚可無虞縁經月以来海洋東風甚大内地船隻不能放洋所派赴援塩水港之本省兵三千已開駕一半其續出之一千五百名到厦門僅遲兩日即為風阻屢出屢回至今尚未出境俟風勢稍平即催令速發現准孫士毅咨稱粤西兵三千本月二十以外頭起可以入閩境臣自當料理令其隨到隨即登舟以資接濟至海蘭察等日内已陸續到厦福康安兼程行走已過省城不日亦即可到所有一切事宜臣與之悉心商酌再行具奏奏入上命軍機大臣傳諭福康安常青恒瑞李侍堯曰前據李侍堯奏蔡攀龍等已抵諸羅復又帶兵出城殺賊而常青柴大紀總未具奏連日盼望軍報甚為焦急今據李侍堯奏到各情形是此次赴援之兵又未得手貴林楊起麟係隨同蔡攀龍帶兵援應諸羅今蔡攀龍雖經柴大紀接應入城仍未能殺出而貴林楊起麟又無下落自係被賊匪攔截若有意外之虞豈不可惜恒瑞摺稿又未提及貴林楊起麟下落殊不可觧福康安于本月初五日已抵建溪計程早應前抵厦門與李侍堯㑹晤商辦一切具奏今李侍堯所發之摺係十五日拜發而福康安尚未到彼或係途中有疾是以行走遲緩但海蘭察等現據李侍堯奏已陸續前抵厦門則福康安亦當相距不逺何以此次李侍堯之摺福康安又並未啓閲豈中途或適相左未經遇見耶以此時情形而論蔡攀龍入城後雖未能得力而恒瑞已帶兵到塩水港並據恒瑞摺稿内稱已札㑹普吉保令其派員帶兵三千前赴諸羅接應而普吉保前已具奏留李化龍駐守鹿仔港伊親帶官兵由西螺斗六門前進攻𠞰此時自必在途想普吉保接到恒瑞札㑹自必星赴諸羅䇿應較之派員帶兵更為得力看来塩水港尚可無虞惟恒瑞摺稿内稱八月二十五六等日新店鹿仔草塩水港等處俱有賊匪滋擾民人被賊脅從者甚多賊匪奸計欲哄誘官兵前進仍将後路截㫁應俟恒瑞所帶兵一千五百名續行到齊将後路分頭嚴防再相機進𠞰接應諸羅等語看来塩水港附近沿海村庒雖有被賊脅從民人而義民自行果守及請兵救援者尚復不少可見百姓向義者頗多而從賊之人亦不過迫于賊勢並非甘心効逆若大兵軍威壯盛得有勝仗則人心自定較易招徠恒瑞此去如聞蔡攀龍等殺出将道路廓清伊必膽壯前進今聞蔡攀龍等又蹈魏大斌覆轍而貴林等尚無下落未免稍存疑畏是以不敢前進權在塩水港駐劄轉令普吉保發兵接應殊不思魏大斌蔡攀龍前抵諸羅時未将塩水港一帶後路肅清是以墮賊奸計仍被截斷恒瑞此時既到塩水港自應将附近海口及諸羅迤北屯聚賊匪悉力殱除庶官兵前抵諸羅無虞後顧若不先将沿途賊匪𠞰殺净盡即使恒瑞能抵諸羅又與蔡攀龍魏大斌無異不過坐糜廪餉于𠞰賊機宜仍無裨益至福康安此時自早已由蚶江配渡前抵鹿仔港朕為福康安計算該處有新到漳州兵二千又有李化龍帶往粤東兵二千俱係生力之兵又經李侍堯兩次派調閩兵四千名現又有㫖催令四川屯練及廣西貴州兵共七千名星速前進是鹿仔港兵力極為壯盛福康安此時竟當派撥巴圗魯侍衛章京二十人令舒亮帶領前往徐鼎士處若徐鼎士已由大甲溪進兵舒亮等即速往帮同𠞰賊即徐鼎士尚未進兵亦應令舒亮速往㑹同攻擊而福康安一面同海蘭察等統領巴圗魯侍衛章京督率大兵以全力往大里杙進𠞰大里杙該處係賊匪巢穴一聞大兵攻擊賊首等自必回顧諸羅之圍不觧而自觧福康安應預先知㑹柴大紀等如賊匪回救巢穴即令柴大紀恒瑞蔡攀龍等領兵出城由後跟踪追𠞰而福康安迎頭截殺使其首尾受困自可悉數成擒倘賊匪仍在諸羅不顧巢穴則福康安於掃平大里杙後即回兵移救諸羅賊匪見巢穴已傾自可不戰而潰最為善䇿此即徔前諭㫖内所引魏司馬懿欲擒公孫淵先破襄平之計福康安不可不决機制勝至普吉保如尚在諸羅一帶駐守福康安不妨将普吉保撤回鹿仔港與李化龍協同防守福康安竟帶其五千兵進搗大里杙則兵力既加更可鼓勇前進惟在福康安相度機宜酙酌妥辦再柴大紀處于蔡攀龍扺縣後總未據有奏報在恒瑞所駐塩水港距諸羅甚近着即派委妥幹員弁設法前往諸羅令柴大紀蔡攀龍将該處實在情形及如何籌辦之處詳晰聲敘仍遴委能事員弁設法賫送即行迅速馳奏又前據李侍堯奏官兵援應諸羅貴林楊起麟為首隊蔡攀龍孫全謀為二隊一路進𠞰是貴林楊起麟帶兵在前何以恒瑞摺稿内稱蔡攀龍已抵縣城而貴林楊起麟轉無下落殊不可觧著福康安查明據實具奏同日湖北布政使陳淮奏言川省頭二起屯練降畨各五百名已于九月初七日入湖北巴東縣境現由宜昌荆州一帶水路赴省其三四起官兵亦接踵而至臣自武昌起程迎赴前途查勘水站督率照料一抵漢口立即更換船隻䕶送至黄梅縣出境該處與江西交界臣即駐劄黄梅按起料理前進再湖北動撥倉榖碾運閩米一十萬石業分四起全數配船開行選派妥員按起管運出境四川先運閩省之米二十萬石已陸續運抵漢口料理換船攅運前進其續運之三十萬石頭帮米二萬石已於九月初七日入巴東縣境現亦督率沿途州縣俟其過境妥為䕶送摧䟎務須迅速遄行所需船隻漢口商販雲集易於雇覔經臣飭令地方官凡遇貨船概不雇用查有卸載之船隨時雇備以足副運送其餘船隻均聽其往来自便貨物流通商民樂業奏入報聞二十八日壬辰柴大紀奏言七月初四日巳刻逆賊糾集匪夥萬餘復来攻打諸羅東西北三門營盤臣往来督戰官兵義民奮勇迎敵各營盤鎗砲齊發俱能多中打死賊匪甚多至未刻東西門外賊匪俱被官兵殺退惟北門賊匪尚冒死冲来隨飛調逰擊李隆㕘将潘韜從畨社後轉出夾攻鎗砲打死賊匪約有百餘名赶過牛稠溪復殺死賊數十人賊始四散逃竄縁田水漲滿鳴金收軍兵民間有傷亡獲賊旂五桿鳥鎗長刀籐牌等項割取耳辮賊首生擒賊匪羅藍張本賴衆等三名訊據賴衆等供稱上月二十八日賊衆来攻諸羅賊目偽後将軍葉省在北門外與官兵打仗被大砲打傷肚腹至二十九日身死其妻王玉娘散銀糾衆欲来報讐等語初六日又探得逆首林爽文復糾集南路水底藔等處賊匪約三千餘名合共萬餘欲来侵犯臣陸續招集義民共六千餘名除歸鹿仔草塩水港等處守禦外尚有四千餘名莫不感激踴躍願効死力初七日寅刻賊衆果来環攻四門其勢比前更屬鴟張俱用車輪及大木牌擋我大砲臣飭令官兵静以待動俟賊将近齊放大砲詎賊匪恃有擋砲之具逼近各營盤大砲連發車輪倒轉打死賊匪無數将大木牌擊碎臣往來督率官兵義民奮勇力戰自寅至未東南二門賊匪打死甚多又殺死五六十人賊始退去惟西北二處賊匪抵死不懼旋退旋来隨令大砲叠轟鎗手齊出連環進歩義民分路夾攻至酉刻打死騎馬賊一名賊匪約三百餘名賊衆逃散追至五六里因大雨收軍生擒賊匪柯招林鎮等四名是夜大雨料賊必以我鎗砲難施潛来刼營隨令各義民留駐營盤協同官兵四面埋伏三更果有賊匪數千擁至西門外營内放起大號左右伏兵齊出施放鎗砲接連轟擊打死賊匪無數賊匪自相踐踏死者數十名始行逃去初八日黎明賊復率衆来攻東南西三門營盤臣往来督飭各營官兵施放大砲總以鳥鎗連環進步打死賊匪甚多官兵義民乘勢争先殺死賊匪多人至午後東南門外賊已敗走惟西門外賊尚不退戰至未刻打死賊匪百餘名賊始逃竄初九日辰刻東門外萬人塚山突出賊數千與官兵對放鎗砲隨令遊擊林光玉率領兵丁義民極力堵殺又據逰擊李隆報南門外草地尾有賊數千從山仔頂来攻臣隨飛飭㕘将潘韜同各義民飛往協𠞰而畨仔溝北社尾等處亦有賊二三千人来攻西門臣飛往督飭守備楊彲連放大砲轟擊飭把總蔡祥等帶兵丁義民從學舎邊抄出守備曽紹龍親帶官兵義民由畨社内殺出賊匪不及提防被殺二百餘人打死騎馬賊一名賊始逺竄其東南二處賊匪俱經逰擊李隆林光玉㕘将潘韜等殺退初十日夘刻賊匪又来環攻其西門外之賊俱帶沾油草把直冲畨社欲圗放火臣督令官兵施放大砲畨社内原有埋伏鎗箭一齊並發打死賊匪數十名賊勢稍怯即令鎗手向前義民長刀在後追殺斃賊數十名賊盡棄草把逺逃而東南門外之賊尚與官兵鏖戰臣往来兩處督令鎗砲連環轟擊打死賊匪甚多賊始四散奔逃打裂大砲二門署北路左營守備李進得外委黄春陽被傷十一日寅刻賊復率衆環攻各營盤鎗砲齊發官兵義民奮勇力戰自寅至午東南之賊打死百餘名各自逃竄北門外之賊被大砲打死數十名亦退惟西門外之賊尚拚命冲來復用大砲接連轟擊打死賊匪百餘人官兵義民向前趕殺詎賊衆身藏尖刀二三把回身擲来兵民間有受傷隨飭義民内牌手盡行抽出與隊伍牌手一併在前擋其擲刀次以鎗手連環叠進再以義民長柄刀𦂳隨一齊奮勇追去斃賊無數其餘四散奔竄追過三苞竹外将賊藔燒燬自初七日起至十一日止共陣亡兵丁林滔等三十八名義民劉極等十二名又兵丁薛名進等十二名義民清尾等一百四十八名畨民他匏倫等五名被傷獲賊旗竹牌半斬刀長刀等項再連日打仗官兵不暇造飯仍係紳耆舗户煮飯送食併挑送涼水官兵義民得免饑渇所有生擒羅藍等七犯隨審明正法再賊匪連日環攻諸羅雖被官兵殺退但粮餉缺乏咨請将軍臣常青添兵應援經三次添兵俱停駐鹿仔草未得前來臣将来諸羅路徑難易賊匪多寡之處繪圗貼説宻行劄知總兵魏大斌等併令預将起程日期先行通知以便帶兵前往接應魏大斌等並無回信兹本月十三日夘刻賊匪六七千復来攻縣東西二門營盤臣督率官兵義民奮勇堵殺至午後賊始退去適逺聞砲聲料係總兵魏大斌等帶兵来縣中途遇賊打仗隨飛飭㕘将潘韜逰擊李隆帶領隊伍前往接應臣親帶官兵義民繼進至外三苞竹劉厝庒地方果見官兵被賊圍困即督飭官兵奮勇向前齊放鎗砲義民併力冲殺打死賊匪數百将賊殺退接䕶魏大斌侍衛徳成額官保㕘将特克什布及帶兵之副将詹殿擢逰擊田藍玉各官兵等又㕘将張萬魁在外三苞竹田洋墜馬正在危急義民鄭乃生奮勇救出送到復有台斗坑水堀頭兩路賊匪趕来臣一面分撥官兵義民引䕶總兵魏大斌等官兵進城一面督率官兵分投抵禦鎗砲齊放又飭官兵義民繞出賊人之後併力夾攻打斃賊匪數百旋即退散兵民亦有傷亡獲賊匪大旗鳥鎗長柄刀等件臣連日與賊打仗雖大小鉛子就諸羅鎔鑄尚足敷用而火藥一項自六月二十日起至今已用去一萬餘觔正苦匱乏今總魏大斌等帶到之兵藥鉛又復全無兼之粮餉兩缺愈覺難處現在㑹商諸羅縣設法備辦以應急需併咨請将軍臣常青再撥精兵来諸羅應援再義民鄭乃生能于賊圍中救出㕘将張萬魁實屬勇往即賞給把總頂戴以示鼓勵其官兵義民搶獲鎗刀器械等項分給兵丁配用同日恒瑞奏言八月二十八日有賊萬餘將鹿仔草庄村三面攻擾經逰擊董秉燦劉鉞守備林世元等帶兵堵禦正在打仗時村内火起村民驚懼跑逸賊匪趂勢進村官兵不能拒守于是日晩間盡行退出其被傷及陣亡官兵共有一百數十人又前此魏大斌蔡攀龍兩次接應官兵雖到諸羅已傷亡大半賊匪仍行梗阻道路粮餉不能轉運現在安撫村民盡力防守俟續調官兵到鹿仔港再行酌量進𠞰並請将董秉燦降為守備劉鉞降為都司林世元革去守備仍留軍營効力均奏入上命軍機大臣傳諭福康安常青恒瑞李侍堯柴大紀蔡攀龍曰諸羅被賊攻擾柴大紀在彼激勵軍民設法堵禦并連次𠞰殺賊匪實屬出力朕既嘉其績復軫其勞但所奏皆係八月十六以前之事現在蔡攀龍已抵諸羅縣城柴大紀等作何籌辦及如何打仗殺賊之處尚未據續有奏到柴大紀惟當倍加勉力迅速成功承受恩賞至鹿仔草一帶仍有賊匪梗阻恒瑞雖駐劄塩水港所帶之兵尚未到齊不能前進未免心存疑懼漫無主見若塩水港復被賊擾稍有疎失則沿海水路亦致阻隔所關匪細因思鹿仔港距大里杙雖不過數十里但沿路村莊恐有賊匪屯聚官兵即往大里杙攻擊恐賊匪又乘間潛出将後路攔截則官兵難免返顧之虞不可不慮福康安此時應探明普吉保如已由西螺進攻斗六門打通道路直抵諸羅則大局已定固属甚善福康安即同海蘭察及巴圗魯侍衛章京等帶領鹿仔港新到之漳州粤東兵徑搗大里杙賊巢鹿仔港自藍元枚病故後並無賊匪滋擾該處新到之兵尚未與賊人打仗俱係生力新兵鋭氣方盛正可及鋒而用若此時普吉保尚未能得手仍在西螺一帶駐劄則徒守無益福康安竟應将普吉保調回鹿仔港防守現在川省屯練及廣西貴州兵俱有㫖催令迅速遄行自可陸續前抵該處福康安即帶漳州粤東兵前搗賊巢並知㑹徐鼎士兩路夾攻若鹿仔港現存之兵尚不敷用或稍待川廣黔省之兵到後再行統領前進而於鹿仔港至大里杙一帶地方仍派巴圗魯侍衛章京等數十人酌帶弁兵沿途分佈堵禦截殺净盡勿使賊人梗阻道路現在福康安等統領大兵分路進𠞰原不難尅期蕆功惟鹿仔草現有被賊滋擾之事誠恐軍心未免稍餒福康安惟應仰體朕意整頓兵威䇿勵将弁以期迅速集事雖係么䯢艸㓂亦不宜冒昧涉險也臺灣全圗前福康安起身時已繪出一分令其帶往今再将鹿仔草至大里杙一帶經朕指示之處另繪一圗發往並路徑地名粘簽註明易於展閲福康安接奉後更可按圗遵照辦理上又命軍機大臣傳諭福康安常青柴大紀曰鹿仔草至大里杙沿途地方所有村莊民人其中帮助官軍及安分良善者固多而心懐叵測或于官軍過後潜出滋擾轉為賊用者恐亦不少福康安進𠞰大里杙時該處距鹿仔港甚近僅止四十里或尚可酌留兵丁防範若将来前往諸羅或相距較逺處所設皆處處留兵守禦則兵力又分于𠞰捕不能得力著福康安于經過各莊時務須留心察看宻行體訪如係義勇良善誠實可信者自當妥為撫慰令其自行守䕶並可助官兵聲勢倘有心懐反側附從賊黨者一經查出竟應於大兵經過時即将此奸徒強悍者悉行殱戮止留老弱聽其在莊居住庶無後顧之虞福康安當隨處留心慎重妥辦但不可冒昧先露風聲轉堅其從賊死守之心至柴大紀非至萬不得已自㫁不肯委城而出若果力有難支不得不率兵突出則該處義民甚多其中如黄奠邦等現經柴大紀捜獲賊匪偽示有必欲甘心之語若柴大紀帶兵逺出此等義民必致受賊荼毒朕心更為不忍既使助義出力之人無辜受累且恐他處義民聞而生畏阻其踴躍投効之心大有關係著傳諭柴大紀如諸羅已無他慮自應悉力固守以待援應萬一實難守禦必須出城另圗進取之時務将城内義民及其家屬妥為捍衛先行送出然後振旅出城俾該處義民不致失所被賊戕害方為妥善臣等謹案諸羅被賊圍擾幾及半載義民等竭力捍禦誓死不易我皇上當援兵未集之先勅令柴大紀勿泥城存與存之説並恐大兵逺去義民等為賊所甘心復諭令将其家屬䕶衛先行俾免荼毒仰見聖主如天之仁所以為百姓䇿萬全者無微不至宜乎恩意所孚淪浹肌髓益得收衆志成城之效也二十九日癸巳上命軍機大臣傳諭福康安常青恒瑞李侍堯孫士毅柴大紀徐嗣曽曰福康安自九月初五日在建溪發摺後已逾半月計程已應早抵厦門與李侍堯㑹晤面商一切乃未據續有奏報自必係福康安途次偶有疾病行走遲緩而福康安惟恐朕心厪念不肯自行陳奏又不令李侍堯徐嗣曽具奏皆未可定著李侍堯徐嗣曽将福康安在途是否曽有疾病及因何躭延之處速行馳奏又現在臺灣𠞰捕賊匪調撥廣東兵已有一萬數千粤東與福建毗連亦係海疆重地沿海口岸甚多在在需兵巡邏防守而臺灣𠞰賊事務尚未蕆功或将来尚不無添調官兵之處閩粤係属隣省遇有調撥較為近便自應預為籌備此時粤東調赴臺灣之兵甚多該省存兵較少孫士毅此時應于附近潮州一帶地方廣為招募勤加訓練不妨多多益善既可資該省巡防之用設遇有調撥亦可就近派往但須宻籌妥辦不可稍渉張皇至粤省前後調赴臺灣官兵必有子弟人等隨往該兵丁内有在臺灣病故損失者自尚懸額未補應即于該兵丁隨行子弟内㨂選補額一體充伍食粮隨營効力亦可増添兵力着交福康安常青即行遵照辦理同日保寜奏言九月初一日起至初七日四起官兵畨練全數自重慶換船進發十二日已全出川境查𠞰捕臺灣賊匪現須厚集兵力軍行必須迅捷再飛咨成都将軍鄂輝及各起領兵鎮将督率催儹兼程前往並咨沿途各省一體督催奏入報聞三十日甲午上命軍機大臣傳諭福康安常青恒瑞李侍堯普吉保曰前據柴大紀奏到搜獲賊匪偽札内有防守海口要隘及被官兵恥笑等語因思賊人夥黨内既稱被官兵恥笑自係賊匪抗拒時屢被官兵𠞰敗心存畏懼之言其所稱防守海口亦必係慮及将来窮蹙之時希圗竄逸入海况前據孫士毅奏訪聞賊有暗造船隻之事可見賊人氣餒已預思逃竄将来官兵四路追𠞰賊匪自必由海口遁逸不可不加意嚴防著福康安常青等務須嚴飭弁兵于沿海各口岸要隘處所梭織往来巡邏稽察毋使賊人搶佔船隻得以逃往洋面致搜捕有稽時日又前據李侍堯奏鹿耳門鹿仔港等處已派撥繒艍船隻並撥鎗兵二百名前往協守此項繒船派往駐守之後該二處有無賊匪在洋面滋擾兵丁等曽否拏獲賊船總未據李侍堯奏及着該督即将該處情形據實覆奏並飭該官兵等務須實力巡防毋致稍有疎懈欽定平定臺灣紀畧卷三十八
