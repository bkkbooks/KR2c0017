  text: 欽定四庫全書欽定平定臺灣紀畧卷四十五
  hash: sha256:02ec81180ab6338395db3bd1899bdf704ac9bd2f5bbe94140647a9b528d7c906
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_045-1a, image: WYG0363/WYG0363-0530a.png}
body:
  text: 十一月十二日乙亥李侍堯奏言接奉上諭即使府城難支或竟有疎虞之事亦不難再為収復等因現在府城一両月以来並無賊擾常青遣丁朝雄前往收復東港雖南路賊匪復思煽動其黨夥决不能如逆爽之多諸羅雖被圍困昨接柴大紀摺稿知其尚在堅守今鄭國卿已到塩水港恒瑞兵約有七八千自當分兵駐守一面約普吉保並進普吉保即以後路為慮而福康安兵到可接續前進其勢必能攻透諸羅則三路㑹合軍聲大振即可就近移兵直攻賊巢勝勢已在我而不在賊此正搗穴擒渠之闗鍵全郡事勢不過數日内即大有轉機至府城尤為全臺人心所繫况數十萬糧餉火藥以及砲位等項無一不在城中若使賊得之反増其勢又鹿耳門為進兵要口府城或有疎虞則鹿耳門亦難守住將来官兵進剿并無上岸之路此事寔大有闗係現在事勢固决不至如此臣恐諭㫖一到軍營必不能秘宻萬一稍有宣洩則人心不免驚疑揺動或轉有意外之虞計此次所降常青之諭㫖厦門尚未即刻配渡臣已飛飭厦門同知追回擬將上諭内節去一段另録寄知常青並恐已經發渡追赶不及一面札知常青並將此次摺稿抄寄囑其萬勿洩露福康安處亦將此意札知矣惟府城之兵自莭次派往諸羅塩水港後兵力不免單薄臣現又在各營挑派舊兵一千名由厦配渡前往協守並前派在澎湖鹿耳門一帯往来防䕶之水師兵六百名亦知㑹常青倘海洋無事而府城或有緩急即就近調度以資堵剿再内地所解糧餉軍裝秋令暴風致有沉失除王履吉一船飄至廣東業經圖薩布具奏外尚有第六號米船一隻載米九百石飄至長道坑海口遇礁擊碎淹斃押運兵丁一名水手五名米石盡行沉失又鄭聖華一船載米八百五十石七月二十五日將進鹿耳門遭風擊破經楊廷理聞知急僱小船往救撈出濕米五百八十八包其餘二百餘包無從撈獲又船户李生財載閩縣軍米赴厦門九月二十八日二更在鼓㠘洋面遭風覆船黒夜無人救獲米盡沉失淹斃兵丁水手七名惟李生財及水手林順扶蓬飄流至嶼得生又曽長瑛船在蚶江載軍米一千石赴鹿仔港二十日遭風舵折二十一日飄至鷄膳觸礁船碎曽長瑛扶蓬浮来其餘兵役水手等同時浮水未知生死此三船沉失米石均請照王履吉之例一體豁免以示矜恤同日孫士毅奏言粤東召募新兵已有四千名入伍訓練臣查督撫提及潮州鎮四標營分較大兵家子弟夲多儘有技藝過人苦于無缺可補今已一體充伍食糧此項新兵其材具優嫻視存營之兵尤為出色日内如遇將軍福康安􅊾調即將各該營素知紀律之兵簡派前往以期得力夲營現有新兵補數無虞缺乏現在復行上𦂳召募再臣風聞逆犯林爽文攻犯諸羅身受鎗傷其西螺笨港等處均被我軍打通賊夥聞有將軍福康安帶兵十萬尅期進剿之信俱各震恐已將逆犯家口移入大武壠地方該處逼近内山大約為竄入生畨地歩至南路東港一帶聞常青亦已派員打通民間米石紛紛運至郡城逆犯莊大田遯入諸羅之石仔瀬地方未知是否確鑿再查粤東總兵帶兵赴䑓者已有梁朝桂李化龍陸廷柱三員嗣後如遇軍營徵調粤兵可否派令諳練將偹帶兵赴䑓交與該三鎮統領毋庸再派總兵帶往又黔兵二千分作四起陸續俱到黄岡令地方官多僱人夫運送軍裝随到随即啟行已于十月二十六日全數俱抵閩省詔安縣境其將偹各員臣酌給衣料弁兵賞給銀牌俱各歡忭趕𦂳遄行再貴州帶兵官因沿途俱係水陸未經帶有馬匹臣即在黄岡營内挑選膘肥馬匹分給各起總兵將偹乗騎迅速前進咨㑹黔省遇便將例馬價值解還由粤東自行買補均奏入上命軍機大臣傳諭福康安常青李侍堯孫士毅曰前因恒瑞抵塩水港後被賊梗阻府城亦在圍中而柴大紀處望援甚切是以降㫖督令福康安速往援救進𠞰賊巢原就彼時情事而言今柴大紀處兵民一心堅守可無他慮而恒瑞處已有續到官兵可以約㑹普吉保合兵前進是該處情形與前不同李侍堯接閲各官禀報見軍營各路已有轉機惟恐常青接到前㫖稍有宣露轉致府城人心揺動擬將諭㫖節録發寄並札㑹常青福康安両處深合機要殊得大臣之體李侍堯著賞戴雙眼花領以示優眷現在福康安已于十月二十八日由崇武澚得風放洋粤西屯練兵一同開駕而黔省之兵現㨿孫士毅奏於十月二十六日全抵閩境又有湖南官兵接踵進發福康安又召募漳泉義勇二千餘名軍勢已極壯盛粤東預偹之兵想來毋庸再調也大武壠地方與内山逼近今賊匪等將家口先行搬移自係聞大兵即日前進匪黨勢漸窮蹙預為竄入内山之計不可不設法堵剿絶其逃竄之路福康安到鹿仔港後自即親統大兵由普吉保一路直抵縣城接應柴大紀其大武壠一帶最闗𦂳要福康安或派令鄂輝帶兵前往搜捕或抵縣城後帶兵有人即令柴大紀前赴大武壠搜剿方可將賊匪家屬悉數拏獲不使逆黨竄入内山搜捕致稽時日上又諭内閣曰解送軍餉米船於外洋陡遇􅄓風人力難施以致船隻沉溺淹斃數人情殊可憫所有沉失米石均著免其賠補外其前後溺斃之兵丁水手人等均著該督查明照陣亡例議䘏以示體恤十六日己邜普吉保奏言夲月初八日黎明臣親率官兵進攻土庫地方賊匪蜂擁拒敵官兵奮力向前追殺賊匪敗退随有男婦老㓜投出情詞懇切臣不許官兵鄉勇滋擾傳諭出力之義民首張源懃等帶交署同知黄嘉訓妥為辦理一面將該處賊庄燒燬聞賊夥復嘯聚大崙查大崙為進諸羅之要路十一日復親率官兵鄉勇前往𠞰捕賊匪竟日拒抗官兵放鎗砲中斃甚多鄉勇乗勢放火焚燒賊藔縁該處一帶多係竹林蔗園地勢狭仄仍収軍回營十二日逆首林爽文率夥來攻臣督領逰撃海亮叅將張朝龍副將琢靈阿逰擊葉有光等率帶官兵鄉勇分路堵殺賊匪被我兵鎗砲攻擊敗退割獲首級耳記奪獲長鎗竹鋛多桿十六日探知賊匪散而復聚即於十七日親帶官兵復攻崙仔尾等處臣預料賊匪必埋伏竹林蔗園内特派逰擊海亮管帶後隊防偹官兵鄉勇正在前進賊匪果從竹林内衝出迎敵逰擊海亮帶領後隊奮力繞截其後首尾夾攻賊匪死傷無數賊衆潰敗兵丁鄉勇内亦有陣亡受傷者其附近賊庄有挈眷來歸者均交署同知黄嘉訓查明安置該員辦理勤慎安撫之中更寓防範之意現在造冊編查甚為妥協惟是賊勢分路散布我兵鎗砲急攻彼即潰敗收兵後彼仍復聚集深堪痛恨雖諸羅近日宻差妥人信息可通然彼此均有牽掣殊深憂灼現在設法極力痛𠞰以圖㑹合夾攻同日常青奏言十月十九二十四両日俱有賊二三千在郡城南門外一帶屯聚窺伺均被官兵鎗炮打敗散去約計斃賊七八十人未為痛𠞰是以前摺未經奏及兹於二十七日夘刻賊又分為三隊向營盤前來毎隊俱有賊二千餘人臣常青永慶博清額帶兵一千五百名並山猪毛義民由南潭中路前進又派侍衛塔思哈希明帶兵六百名由竹篙厝左路冲出侍衛郭爾果色副將五逹色帶兵六百名由湖仔仙右路冲出另飭縂兵陸廷柱帶兵五百名在路北山坎埋伏策應臣等一齊迅疾馳赴其左右両邉之賊望見官兵似覺畏縮不進惟中間賊隊膽敢向前與官兵對放鎗炮抵死不退自辰至午滿漢官兵施放進歩連環直前冲殺其時左右両路官兵亦皆環繞夾撃賊被鎗炮打死者約有二百餘人匪衆四散奔逃官兵分投追趕山猪毛義民乗勝争先尤為趫㨗奪獲賊人大炮一門割献首級生擒賊夥張招一名當查殺賊義民按名各賞畨銀二圓銀牌一面奪得大炮義民賞給畨銀十圓其現已賞有頂戴者俟後來有功另加奬擢共受傷兵丁十一名義民四名再㨿塩水港逰擊黄象新義民胡登髙等禀稱二十三日恒瑞統領官兵起程移剳營盤在鹿仔草又月眉莊土庫牛稠山三處係林爽文往來屯剳之所二十五日被普吉保攻開已剳營該處不過離諸羅五里等語是普吉保等之兵業已同時進攻柴大紀自必由縣攻出計日定可破賊解圍同日恒瑞奏言十月二十二等日督同烏什哈逹梁朝桂等於新店等處𠞰殺賊匪收復鹿仔草現在該處剳營將沿海一帶道路打通前赴諸羅均奏入上命軍機大臣傳諭福康安常青李侍堯柴大紀普吉保曰㨿普吉保所奏情形事機已有轉動且附近賊庒民人挈眷來歸者紛紛不已足見從賊者日少黨羽渙散普吉保遵㫖傳諭不許官兵鄉勇滋擾所辦甚是其所稱廓清賊黨㑹合夾攻之處當勉力為之勿為空言南路賊匪經常青連次𠞰殺得有勝仗而普吉保剳營處所距縣城不過五里恒瑞又已將鹿仔草收復是各路聲勢漸已聨絡縣城自更當固守無虞且福康安於十月二十八日已由崇武澳開洋計柴大紀在縣城再堅守五六日福康安即可統領大兵随後直抵該處或普吉保於福康安未到之先已帶兵抵縣殺散賊匪與柴大紀㑹兵一處則軍勢已為大振福康安一到更可併力進𠞰不難指日成功至前㨿福康安奏稱聞逆匪林爽文莊大田等各有形貎衣服相類者數人希圖將來乗隙潛逃等語可見賊匪自揣勢窮力蹙破滅不逺於紏衆滋擾之時預為改裝逃竄之計所謂天奪其魄即此為賊匪等成擒之兆即日大兵雲集四路攻𠞰惟在福康安督率將領帶同熟悉之人留心辨認不可令正犯首惡得以漏網方為萬全恒瑞在塩水港駐剳數旬未能前進今雖已克復鹿仔草稍為振作但前㨿恒瑞奏該處防守𠞰捕尚湏添兵數萬而此次奏摺將沿海一帶道路打通前赴諸羅是其前後所奏已覺自相矛盾恒瑞究属胸無定見即其所稱打通道路之語亦祗属空言恐未能望其奮勇前進又伊此次奏摺係十月二十五日拜發彼時普吉保已帶兵前進僅離縣城五里恒瑞與普吉保一路相距不逺何以常青業經具奏而恒瑞摺内尚未提及並著福康安到彼詳查是否確寔㨿寔具奏十八日辛巳常青奏言叅賛恒瑞八月間帶兵往援諸羅臣等本欲由陸路𠞰賊前往但湏過溪河數道未能便㨗適值風色順利是以改由海道較為迅速實無避賊情事現聞恒瑞在此數日内起兵進攻諒必早與柴大紀普吉保彼此知㑹乃臣現接普吉保禀稱連日探知大崙青埔等處屯聚賊匪該處為往諸羅要路随親督官兵節次𠞰捕兾通道路無如烏合之衆於覆巢處所散而復聚不得不為防偹若輕移前進恐有意外疎虞不但於應援無益且更張賊勢况帶兵前來原為救援諸羅今離諸羅二十餘里㫁無中途而止之理總以極力設法一有可乗之機㫁不敢稍有貽悮等情臣細思柴大紀保固城池一心望援而普吉保離諸羅二十餘里則帶兵五千五百名之多似更易於𠞰通况聞恒瑞之兵已動臣又專札嚴飭飛催普吉保務湏與柴大紀恒瑞同心并力不日福康安亦可到鹿仔港兵勢更為壯盛必能掃穴擒渠臣於海口各要隘分飭兵弁嚴宻巡緝毋使賊匪搶佔船隻以致逺颺並飭臺灣縣王露多偹札諭交熟練畨情之諸羅生員劉宗榮轉交伊弟劉光志宻往大武壠内後山給四社畨通事土目收執預防賊匪竄匿現在南路東港一帶雖尚未全行收復而官兵駐剳港口商販米糧賊匪不能攔阻多有装載船隻來郡糶賣者臣惟有酌量兵力並招徠義民足敷進𠞰即起兵肅清南路同日李侍堯徐嗣曽同奏言有船户金錦逺自鹿仔港回至蚶江㨿稱該船於十一月初一日在鹿仔港出口見有兵船百餘號已收到港口并遇將軍坐船之船户告稱所有兵船俱於前月二十九日齊到等語查福康安於前月二十八日申刻放洋臣等日夕占候夲月初一日又轉東風惟恐船尚未到正深懸慮今㨿該船户所稱則福康安等已於二十九日全到以數百里之洋面一晝夜間安穏飛渡寔為用兵以來所未有現在恒瑞兵已抵鹿仔草普吉保進兵離諸羅不過數里福康安等帶領新兵乗鋭殺入定當三路㑹合迅即移攻賊巢目下貴州總兵許世亨已帶頭二起兵一千名於初三四等日抵蚶江俱即配渡其三四起兵亦不日可到接續前往兵力既厚軍聲益振搗穴擒渠可計日以待同日李永祺奏言臺灣辦理軍務一切情形有迥不相同之處如内地解運糧餉軍火大砲等項船至鹿耳門内有海灘三十里重載不能前進必湏另僱小船乗潮發運然後登岸是大船之外又用小船從前歴次調援諸羅官兵皆由塩水港一路進發該處地方僻小無夫可僱一切軍裝器械係由府城僱偹長夫前往抬運因臺地夫役夲少且逺歴長途較之内地夫價亦昂又數月以來凡有限行北路各軍營往來公文因旱路不通均僱覔快船逓送如此之類不一而足皆係例所不載因地趕辦者臣已逐一詳明督撫二臣俟批到造冊咨部事竣之日核寔報銷再臺灣四面環海一交秋令以後風力甚勁早晚更覺寒冷督臣李侍堯孫士毅并浙江撫臣琅玕各在内地預辦征兵衣履運送給散祗因海洋風信靡常至十月衣船未到各兵被體止單夾之衣臣目睹情形不敢拘泥與臺灣道臣永福彼此酌量禀明將軍常青凡閩浙粤省征兵毎名各借給銀三両分交領兵將官趕造衣褲等物現已按名給領以禦風寒俟各省衣履運到仍令散給俾得益資溫煖所借銀數彚造清冊詳送督臣李侍堯查核分咨浙粤在於各兵月餉内匀扣解閩歸欵均奏入上命軍機大臣傳諭福康安常青柴大紀李侍堯曰㨿常青所奏情形是常青之意亦以普吉保不急往救援嘉義為非普吉保由鹿仔港親帶官兵打仗殺賊收復笨港固属有功而自駐元長庄後距縣城不逺且㨿柴大紀咨㑹望援甚切乃並不奮勇直前迅速進𠞰其咎亦無可辭是普吉保功過各不相掩昨㨿常青奏十月二十五日普吉保已攻開月眉莊等處在彼駐剳離縣城不過五里此摺係二十八日所發在夲日奏摺以前或普吉保接常青札飭之信已帶兵前抵縣城與柴大紀㑹合亦未可定若果能如此則柴大紀此時早與彼㑹合一處而普吉保之咎尚可從輕至南路賊匪已經撤動勢漸渙散而府城兵力已經李侍堯續行派往此時福康安又無湏常青協𠞰常青惟當專力南路至常青於海口各要隘分飭弁兵廵緝並多偹札諭令熟識畨情之生員等宻往大武隴後山發給畨社通事土目預防賊匪竄匿所辦均属妥協該處賊匪見官兵聲勢日盛賊黨漸次窮蹙自必思乗間由海道潛逃常青將海口各要隘預為防守不使賊人搶佔船隻並札諭畨社等在大武隴一帶協力擒拿賊匪絶其逃竄内山之路於𠞰捕機宜似更得力福康安於二十八日在崇武澚放洋今於二十九日即抵鹿仔港以數百里洋面一晝夜間揚帆稳渡所帶兵船百餘號同時到港實仰荷天神黙佑為成功佳兆福康安統領如許勁將强兵四路㑹合聲威百倍自當乗鋭深入惟日夕盻望㨗音更為殷切臣等謹按崇武澳距鹿仔港盖數百里而遥雖海道不可以里計而明史稱舟人以更計程毎行一晝夜謂之十更今大兵乗風揚帆不過十更耳而艨艟百餘同時抵港一若祥颷有待必遲之十月之杪而始發者正俟徵師之集俾得崇朝稳渡共慶安瀾而遲之不啻其速之也乃知天神黙佑早兆成功皆我皇上之欽承時若有以仰協天心也猗歟休哉上又命軍機大臣傳諭李永祺曰李永祺前在金川軍營曽經辦理糧餉是以專派該司前赴臺灣經管軍需各事宜且係皋司大員非府縣可比遇有運送軍裝器械火藥等項自應随時妥速給價擔當趕運又官兵酌借銀両趕製衣褲俱係該司分内應辦之事何必錙銖較量為報銷時預留站脚地歩朕於行軍要務從不靳惜費用將來大功告竣軍需報銷時設有實在當用而格於成例不准開銷之項經部核駁時朕自當酌量寛免即如從前平定両金川所用軍需内由部核駁刪减各欵經朕加恩寛免者至數十百萬之多李永祺豈未知之為此煩𤨏之奏耶着傳㫖申飭二十二日乙酉福康安奏言二十八日風色漸轉即於申時與海蘭察同舟放洋二十九日申刻已至鹿仔港因潮退不能進口夲月初一日清晨即行登岸舒亮普吉保等及巴圖魯侍衛章京船隻帶領廣西兵丁皆已随至又鄂輝穆克登阿所帶屯練兵丁由蚶江配渡者亦於是日陸續來到船戸人等皆稱向來海船開駕行走參差縂不能同時入港此次風順波恬揚帆齊至實為渡洋罕有之事鹿仔港居民遥見連檣並進聲勢壯盛互相傳說船隻約有一千餘號官兵當不下十萬有餘夾道擁觀無不同聲歡慶窃思臣等從前守風稽遲乆未開行及廣西屯練兵丁到後風色轉順千里洋面一帆即逹如此事機凑合皆仰頼聖主洪福天神黙佑海若著靈滅賊先機於此可卜臣到鹿仔港後查詢存營兵數㨿李化龍禀稱各營官兵除患病外寔有四千餘名分剳鹿仔港畨仔溝大崙二林埔心等五處随查閲鹿仔港所駐各兵尚属可用而將弁等非諳習軍旅之人不能悉心教練兵氣遂形餒怯即如鹿仔港營盤近在村庄東首相度形勢寔係不應剳營之地而營外刨挖溝濠前㨿地方官禀報深至二丈寛至一丈有餘營壘極為堅固臣猶以鹿仔港並無賊至何必如此寛深及親至該處看視溝壕不過數尺圍墻亦不甚堅實與所報情形迥異即此細事可見緑營捏餙惡習及地方官禀報虗詞全不足信詢之該鎮將等皆稱營盤地面係從前官兵舊駐之地未經移改臣以事属既往姑免深求將鎮將等嚴加飭諭另行擇地移營嗣後如不痛改積習即行㨿實叅處其畨仔溝等處營盤相距數里至二三十里不等是否係衝途要隘應行設營防守之處尚湏逐加查看再行酌定至義民一項舊存一萬餘名及臣差楊振文等招集者五千餘名臣於查閲各營後傳集義民頭目面加曉諭並將出力者慰諭賞賚將新舊義民揀選壯者五千餘名以偹随營征𠞰之用其餘仍分派要路各村守卡禦賊以省兵力至查詢賊匪情形賊目分㨿各庄互相響應聞臣等統領大兵前來彰化以西一帶近日未敢焚掠而强悍者多集諸羅以該縣勢在孤危攻圍更急恒瑞普吉保両路經臣屢次嚴催打仗殺賊較前稍屬奮勉無如道路阻隔不能㑹合一處尚未直抵諸羅頃接柴大紀咨稱諸羅㫁糧已久惟以油籸㫪末掘挖蕉根充食賊匪四面圍困不時攻擊請速派勁兵救援等語臣與海蘭察鄂輝悉心商酌諸羅乆被重圍饋運不到且地在臺灣適中之處控扼南北要路倘有疎失闗係非輕昨奉諭㫖指示令臣等以先救諸羅為要就現在情形而論自應如此辦理惟鹿仔港距大理杙較近賊人家口盡在巢中亦湏酌派官兵乗虚進搗與淡水官兵前後夾攻使其首尾不得相顧若能覆其巢穴固屬甚善即或不能一舉集事亦可牽綴賊勢將來諸羅圍解後賊人紛紛竄囬全藉此路官兵杜其逃逸之路臣等擬派舒亮帶領官兵義民往大里杙進發賊匪見大兵齊集鹿仔港必知為直搗賊巢之計今以偏師前進聲言大軍繼至而實則援救諸羅出其不意使賊匪不知我兵虗實處處防偹進𠞰更易得手若能連得數次勝仗將其精鋭盡殱自成瓦解之勢縂之賊匪夲屬無能惟恃其黨羽衆多將衝途僻徑處處佔㨿四路抄截現在進𠞰官兵既不便零星派撥分路進攻以致兵分力薄若再添調官兵又属緩不濟急惟有随時随地將賊匪屯聚之地設法截斷即以賊之巧計攻賊之人雖詭譎多端亦無所施其伎倆矣臣於夲日甫抵鹿仔港於鹿仔港五里外爽塏之地安營謹將酌籌進兵詢問賊匪大概情形先行馳奏日内即整頓兵力迅往諸羅其貴州官兵不過數日即至亦可令其續行前進所有進兵前往諸羅道路應否由元長庄一路抑由斗六門進攻之處容臣臨時酌量地勢情形再行定議再臣在崇武澳守風時江西解送火藥之吉安營叅將張兆熊禀請随往軍營効用情詞懇切尚屬奮勉業已帶至軍營聴侯調遣同日普吉保奏言夲月二十一日賊匪分路擁衆四出經臣親帶官兵鄉勇奮力赶殺鎗炮併施打死賊匪數十人自辰至申賊衆敗退割獲首級耳記髮辮并打死騎馬賊目一人官兵鄉勇社畨有受傷者當與出力兵丁分别賞䘏正在設法前進適柴大紀訂期二十六日臣帶兵至牛稠溪伊當接應随即咨覆勉圖前進又准叅賛將軍臣恒瑞咨以現在恢復鹿仔港飭令臣帶領官兵前至新埤地方㑹合應援諸羅查元長至新埤必由大崙大容庄經過縁彼處均係賊巢必湏焚𠞰净盡方可前進且業與柴大紀訂期㑹攻併探知賊匪仍復屯集崙仔尾一帶即於二十六日黎明親帶官兵分作三路進攻臣帶領逰撃海亮徑由中路叅將張朝龍守偹王徳竣由西勢潭一路䕶副將琢靈阿逰擊葉有光都司馬元勲由柴苓脚一路行至崙仔尾賊衆蔓延田野前來抗拒鎗砲横施自卯至申經官兵鄉勇鎗砲打死賊匪甚多割獲首級三顆耳記髪辮五件賊衆雖則敗退然猶散而復集潛伏於竹圍蔗林内我兵實有難以輕進之勢除將受傷出力之兵丁鄉勇分别奬賞鼔勵外伏思元長離諸羅僅二十餘里乃一月有餘叠經焚𠞰尚未能長驅直入寔深愧忿崙尾大崙俱係往諸羅要路而從大崙亦即可抵新埤大崙之賊黨𠞰除則諸羅新埤均可直逹現在差探設法奮力圖進務期將大崙道路廓清或由新埤前進與恒瑞㑹合併力夾攻更覺有益均奏入上命軍機大臣傳諭福康安常青海蘭察鄂輝柴大紀蔡攀龍李侍堯普吉保曰賊匪因嘉義縣城勢在孤危百計攻擾普吉保駐兵元長庄為日已久柴大紀被圍數月兼乏糧食兵丁饑餒自然不能出城接應伊亦並未前進實係無能其摺内所稱殺賊情形不過割獲首級三顆耳記等五件焉得謂多不過應差打仗敷衍塞責徒知愧忿亦屬無益且普吉保在元長庒距縣城不逺正應奮力前進𠞰殺賊匪乃轉欲由新埤㑹合恒瑞豈非繞逺待人而於柴大紀急望救援竟存膜視耶看來普吉保恒瑞雖現在帶兵赴援俱難望其奮勇得力此時福康安已統領大兵由鹿仔港進發自應速赴縣城援應不可再緩大里杙係賊匪巢穴福康安派令舒亮帶兵前往與淡水官兵前後夾攻使賊人首尾不能相顧為牽綴賊勢之計與朕前㫖脗合並擬將賊匪屯聚之地設法截斷即以賊之計攻賊使賊人無所施其狡詐伎倆所辦深合機要至該處帶兵將弁不能悉心教練以致兵氣餒怯為賊匪所輕而所禀報情形多不確實尤為緑營惡習今福康安到彼面加訓飭寔力整頓并於鹿仔港另行擇地移營設法防守揀選精壯義民随營𠞰賊一切籌辦均属妥恊自當壁壘一新士氣百倍想大兵所到賊匪望風胆落指日成擒尅期集事再前經降㫖以臺灣辦理一切善後事宜最為𦂳要諭令福康安於𠞰捕事竣後不必急於來京瞻覲俟善後諸務辦理完竣再行囬京並以柴大紀在臺灣日久熟悉該處情形欲令伊以水師提督兼理臺灣縂兵事務留於該處整飭彈壓俟一二年後再行更換但念福康安等逺渉重洋偹歴風濤之險現在統兵進𠞰懋著勤勞而柴大紀固守縣城不辭勞瘁此時大兵雲集㑹合進𠞰逆匪自可指日蕩平計至明嵗二月中旬朕巡幸天津時福康安等應行籌辦事務自己漸次料理應將大端面交常青接辦常青經事較乆於善後諸務自所優為柴大紀亦可將該處情形告之蔡攀龍令其在彼照料彈壓與福康安一同起程約計朕駐蹕天津時前來瞻覲雖此次𠞰捕内地逆匪與平定囬部金川不同可無湏舉行郊勞典禮但伊等蕆功奏績逺涉宣勤亦應加以宴賚用示奬眷至臺灣地方屢有械閗滋事之案如從前辦理黄敎後上年又有楊光勲楊媽世等紏約黨夥倡立㑹名之事皆由該地方文武等於查辦時並不實力嚴拿痛加懲創祗不過拿獲數人希圖化大為小將就完案以致奸徒無所儆畏且見地方武偹廢弛心存玩視逆首林爽文等遂敢紏衆倡亂乗間竊發戕官刦縣醸成巨案經此畨官兵大辦之後所有此事起釁根由及助惡夥匪著福康安等於𠞰捕事竣時務湏嚴切跟䆒從重懲治勿令稍留餘孽故智復萌庶人知畏法革面洗心該處民刁吏黷積習蒸然一變而於地方營伍尤湏寔力整飭俾紀律嚴明有偹無患以期一勞永逸綏靖海疆方為妥善欽定平定臺灣紀畧卷四十五
