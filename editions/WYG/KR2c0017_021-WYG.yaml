  text: 欽定四庫全書欽定平定臺灣紀畧卷二十一
  hash: sha256:b60b960424551b1b38ed06691a8be28bd2e44c11d02d01aa2383d4e1c8b7eb5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_021-1a, image: WYG0363/WYG0363-0229c.png}
body:
  text: 六月十九日乙夘孫士毅奏言探聞往來船户稱五月十五日以前常青帶領閩粤官兵親身督陣痛加𠞰殺該匪等畏懼官兵勇猛計窮力竭林爽文之母聞已自縊其父亦已潜逃等語現雖未接軍營捷報傳聞當必有因逆犯既已窮蹙勢必四散潰逃粤東各海口與臺地洋面處處可通此時防範捜挐尤難稍容刻懈且於數日前風聞林爽文宻遣夥逆齎帶銀錢偷越外海行刦商船並不搶奪貲財止將賊船與客船調換㸃明貨物照本付價索取船照藉圗影射入口之事此言是否確寔無従徹底追求惟既傳有此語無論虚寔總應迅速偵查以絶奸宄已飛檄管轄各海口員弁更須加倍嚴宻訪查且在洋刦船奪照等事非圗窺探軍情即係預謀兔脫若得船照貨物恃為䕶符儘可収口投稅掩其叛逆形跡倘一時查察不嚴便可逺颺漏網臣思匪犯行踪自與客商迥别小民挾貲牟利計及錙銖其投行發賣必須探訪行情坐待長落凡與行户素常交易者又必牽前撘後収賑躭延若匪徒混跡其中志不在利止圗迅速出脱以冀踪跡逺竄一切缷貨収銀倉皇急遽自與客民迥别臣於附近恵潮各屬現已加派妥員改裝易服分赴各處海口以及稅館處所不露圭角悉心探訪如有此等商船投行納税稍露破綻立即知㑹地方文武員弁帶領兵役赴船捜查即使並無違禁器具而言語支吾情形慌亂即可決其必非善類無論是否臺灣逆黨亦即迅速挐解又查辧天地㑹匪續據林功裕供出勾引人林三長係平和縣人並據大埔海陽普寜等縣訪獲尤揚等八犯現在提齊質審此外海陽潮陽嘉應州訪出之僧人洪耀珠洪秀節洪朗洪科朱立嵩等五名雖已嚴訊並無為匪情事恐其中尚有不寔不盡復飭發各該州縣嚴加管束另候訪察其餘恵来縣盤獲偷越人犯陳孟琴等七名潮陽縣盤獲偷越人犯林海瑞等二十九名應俟臺匪蕩平後咨查原籍果非逆案干連再行定擬尚有碣石南澳二鎮標恵來營逰撃盤獲閩粤二省形跡可疑之人先後共十一起計犯一百餘名内五起訊明寔係商民均已分别釋寜逓籍安挿其餘六起現在研訊有無逆黨及㑹匪在内再行分别究釋至閩省拏獲逆匪潮民従逆正法者先後共有八名咨查原籍家屬内張隆生劉寔林天球三犯因赴臺已乆止有逺房族屬並無應行縁坐之人其餘俱止有縣分並無坐落村庄住址者居多尚須逐縣挨查方免舛錯遺漏再據赴臺領兵將弁稟報陣亡病故兵丁數名已先儘軍營逓行拔補臣查出征兵丁偶遇事故所支月餉原有免其扣追之例若此時遽爾行文開缺查辦該兵家屬播傳鄉鄰同營出兵之家不免俱生惶惑况現在集兵進剿若使守汛弁兵聞風氣餒不足以奮戎行而壯聲勢是以止咨行提鎮宻記檔案所有此數名故兵應得坐糧聴其家照常支領不即行文查辦統俟凱旋後再行照例辦理同日常青恒瑞同奏言自二十四日辰刻起兵進剿南路逆匪出城未及十里即聞有賊三路糾夥萬餘前来即飭各將備帶兵迎撃自午至酉約打死賊百餘人生擒賊匪何葉等三名賊始稍退収軍察看地勢即於該處之闗帝㕔安營二十五日滿兵五十名浙兵七十餘名皆已到齊侍衛章京烏什哈達一員先到二十六日早臣等帶領衆將弁等各帶兵丁義民分隊出戰詎料賊人又連夜糾集中路大武壠等處賊黨亦約有四五千人各冒鎗砲鋒刃抵死攻犯臣等統領官兵督率調度各鎮將俱屬奮勇出力因賊人直撲左翼臣等即飛撥中隊兵三百名交那穆素里帶往協助烏什哈達又將義民數百名作為疑兵誘賊鎗砲齊發打死賊人二三百名自辰至未因暑熱収兵查陣亡守備林世春千總謝元把總林茂貴外委盧鳯等四員陣亡兵丁林進等十八名義民五名受傷兵民共三十六名現今民人被脅従賊者甚多其小庄盡被焚刦大庄之房屋俱被佔踞此外樹木宻翳之所到處潜蔵官兵一往捜捕即蜂擁而來是日臣等全軍盡力剿殺官兵義民儘數出陣至酌留府城防守之兵五千九百名因臺灣地氣潮濕時值炎熱雨水頻漲該兵丁不服水土受病者多且有挑剰軟弱者在内是以不能將此項存兵調赴軍前應用臣常青臣恒瑞據現在情形再四籌酌若非添調勁兵無以痛剿賊匪臣常青初到臺灣識見短淺僅奏請添兵七千寔屬不敷俟事竣後請將臣交部治罪今臣常青與臣恒瑞親歴行陣目撃賊勢蔓延前調兵力尚覺不敷進剿仰懇再調廣東兵四千臣等即先咨㑹督臣孫士毅如潮州有挑備兵丁先發二千來臺灣再行續發二千再調京兵一千湖廣兵四千貴州兵二千共兵一萬一千除長途倘有患病疲弱外亦得勁兵一萬餘名則臺灣賊匪即可剿捕浄盡臣等仍統現在官兵相機進剿一有勝仗即行奏報再查臺灣道府永福楊廷樺辦理軍需糧餉人夫派撥義民均無貽誤該員等兼有守城之責今調兵萬餘錢糧不無浩繁仰懇派一大員前来臺灣督辦軍需則事有責成似於軍務有益同日藍元枚奏言二十日到鹿仔港浙江官兵船隻陸續進口於二十二日亦俱到齊有義民首林凑黄奠邦蕭士旭等率領義民迎接臣以鄉音宣講聖諭曉以大義衆民感戴涕零莫不踴躍懇乞随同官兵剿捕賊匪臣安頓各官兵劄營後於次日即親到街市撫慰安集難民訪察地方賊勢情形知賊匪俱集在柴坑仔大武郡一帶窺伺鹿仔港勢甚猖獗随於二十三日夜宻㑹總兵普吉保於四更進兵帶逰撃海亮都司陳邦光守備丁士偉兵一千名在鹿仔港西南八卦山堵禦賊匪防賊従山下来截路又派守備張奉廷帶兵三百五十名并義民在鹿仔港之東北大肚溪旁堵禦防賊過溪截路臣親帶逰撃琢靈阿穆騰額守備唐昌宗潘國材兵二千三百名并義民前往柴坑仔大武郡直攻賊巢於二十四日辰刻官兵行至彰化北門望見賊匪約七八千人前来迎敵臣見四處溝圳甚多随棄馬步行在陣前率領官兵前進施放鎗砲賊分南北二隊迎敵臣即帶兵千餘在北邊對敵撥穆騰額唐昌宗帶兵千餘同義民在南邊對打鎗砲自辰至未打死賊匪約五六百人追至大肚溪旁南邊賊匪交手接戰臣見賊勢尚盛随親率北邊官兵沖殺賊不敢過溪由山邊竄走随將柴坑仔大武郡渡船頭三庄賊巢燒燬生獲賊匪王皆郭丕二名兵丁義民繳騐耳記二十六個大砲三尊竹篙鎗挑刀鳥鎗等件賊旗十桿又在庄内收獲賊書信五張總兵普吉保率同逰撃海亮帶領兩提標兵五百名守備丁士偉帶領浙兵五百名共一千名由八卦山進攻快官庄堵截賊匪辰刻到彼有賊千餘前来迎敵官兵即放鎗砲賊人敗退随將該處賊庄燒燬正在燒庄間南山梁復有二三千賊前來接應當即親率官兵齊放鎗砲奮勇前攻鎗砲打死賊人甚多賊即四散奔逃官兵奮勇追殺天晚撤兵又守備張奉廷帶領兵丁義民前赴大肚溪地方堵禦有賊衆千餘人屯聚隔溪即督令兵丁在溪邊用砲連環施放打斃手執紅旗賊目一名執籐牌賊一人騎馬賊一人又賊夥數人賊衆奔散查守備唐昌宗千總魏際隆把總羅洪燦外委潘健吉兆陣亡至傷亡兵丁義民現飭將領查寔另行咨報將軍臣常青核辦所有捜獲賊書五張送交軍機處以備存查同日普吉保奏言鹿仔港逼近大里杙賊巢賊匪不時滋擾自四月十二十三十六十八二十一等日屢來侵犯經臣帶領官兵鄉勇堵禦殺退因殺賊無多不敢陳奏業經咨報將軍常青在案四月二十五日接將軍常青札逆匪林爽文往攻諸羅現駐大埔林牛稠山一帶令臣在於鹿仔港等處駐兵内抽撥親自帶領前赴夾攻臣除留兵堵禦各營盤外酌抽兵一千於四月二十六日親率逰撃海亮守備唐昌宗帶領前赴與總兵柴大紀訂期合剿五月初五日柴大紀來至大埔林知林爽文被官兵挫敗已回大里杙伏思餘黨諒多仍在斗六門正在商議進剿旋據諸羅縣知縣陳良翼差稟南路賊匪陳靈光等率衆勾結大武壠賊匪欲攻縣城速請帶兵回縣堵禦又據副將林天洛格綳額等具禀四月二十八日五月初一日賊匪數萬分路圍攻鹿仔港馬鳴山埔心庄各營盤雖經林天洛等殺退而賊匪恃衆仍復猖獗臣即於初四日撤兵兼程回顧鹿仔港初六日到鹿仔港查訊各路賊情屬寔併將打仗殺賊情形咨報常青現在㕘賛提臣藍元枚帶領浙兵二千名於五月二十日抵鹿仔港随於二十四日調撥官兵進剿令臣帶兵一千名由八卦山進攻快官庄㕘賛藍元枚督兵分路𠞰捕田中央等處所有打仗各情形經㕘賛提臣藍元枚奏明在案至臣自到鹿仔港將及四月尚不能搗穴擒渠剋期蕆事寔屬罪無可逭乃䝉聖主天恩仍留軍營帶罪自贖臣惟有身先士卒奮勇殺賊斷不敢稍有貽悮致滋重咎同日李侍堯奏言接臺灣道府稟稱臺地風俗慣用外洋銀錢向来内地解到餉銀俱就行户易換應用時日従容尚易辦理現因大兵出征所需夫價車價等項需用繁多郡城一隅之地兼以商販罕通洋錢日少易換維艱懇將軍需銀兩在内地俱換洋錢解用等情查該處既慣用洋錢自應換解前往以便行使随發銀十五萬兩派省城及泉州漳州厦門等處分頭易換現已換得六萬圓先行起解餘俟随得随解外第閩省行使洋錢之地祗此數處恐將来再需易換民間益少或致赶接不及粤省向亦慣用洋錢廣潮二府行使最多今應奏明令兩廣督臣孫士毅撥出庫銀四十萬兩分作數起按照市價陸續易換洋錢解閩以資接濟並知㑹浙省撫臣亦於庫項内酌撥六十萬兩前來備用再本日又接江西撫臣何裕城来札知撥運之米已於五月二十六日起在新城縣五福地方起運查臣前奉諭㫖後即撥銀一萬兩委延建邵道元克中邵武府馬騰蛟前往光澤縣之上水口接収並料理僱船撥運等事又行令汀州福州二府僱備船隻前往光澤縣聴候撥用均可源源趕運不至遲誤再本日接到常青等抄録摺稿知賊匪甚多現須添兵剿捕臣前於奏調浙兵之後惟恐臺灣尚有需接濟之處随查督提兩標及上逰延津等營可以酌量抽撥因即宻令挑取二千名前来泉厦駐劄以備緩急已於五月下旬到齊今常青處既需添兵即於日内將此項兵由厦門配渡星速前往至粤省兵較多前亦已宻札兩廣督臣孫士毅再行酌量預備據稱已宻備二千在潮州守候現在常青已飛調粤兵想孫士毅即調發前来臣已飭漳州一路預備並飭厦門同知速備船隻候渡同日徐嗣曽奏言泉州回省途次接將軍臣常青㕘賛臣恒瑞咨㑹現在奏請添兵臣即星馳旋省督率各屬於建寜延平一帶過兵處所妥立章程預為備辦以期師行迅速至常青等奏請簡派大員前往臺灣督辦軍需一事竊思内地糧餉等項現經督臣李侍堯駐扎泉州盡心籌酌儲備俱已充裕惟臺灣調兵踵接錢糧動用浩繁該道府等恐難兼顧臣自問年力尚壯於該處事宜粗悉大概仰懇即令臣迅速前往督同道府辦理軍需所有巡撫印務並懇另行簡放均奏入上命軍機大臣傳諭常青恒瑞李侍堯藍元枚柴大紀普吉保曰孫士毅摺内稱林爽文之母聞己自縊其父亦已潜逃解到賊犯林家齊等亦有林爽文之父因其子為逆畏罪自縊之供常青在臺灣駐劄日久亦必得有此信何以未據該將軍奏及至常青等統兵出城進剿遇賊蜂湧前來抗拒乍見兵少賊多未免稍覺驚惶但調及京兵湖廣貴州兵丁動經數省又隔重洋未免緩不濟急臺灣更覺炎溽尤恐水土不服若簡派京兵又需大員帶往未免駭人觀聴跡涉張皇已另降諭㫖派廣東杭州駐防滿兵三千名及李侍堯摺内先行調本省兵二千名合之常青等現在咨調粤省兵四千名及孫士毅挑備兵二千名已足該將軍所奏一萬一千之數以九千名前赴常青處聴候調撥其餘二千名著往鹿仔港以助藍元枚之力自足敷南北兩路攻剿之用至藍元枚奏帶領浙兵在柴坑仔大武郡等處剿殺賊匪燒燬賊庄各情形一摺看來藍元枚一路剿賊尚覺得力至此次續調之兵一萬一千名雖皆係附近省分之兵派撥分起配渡不得即刻便能抵彼至速亦須月餘著傳諭該將軍等如有可進之機即行乗勢攻剿果南路賊勢衆多不能取勝亦不可冒昧輕進再藍元枚處附近賊巢虎仔坑大里杙一帶閲其所進圗説賊匪亦不為少雖屢得勝仗亦應持重審慎此時斗六門大武壠一帶尚有賊匪佔踞道路梗阻朕思該將軍等此次統兵出城不及十里即遇賊打仗被其攩阻尚未進剿或事勢稍定兵氣振作仍統兵前進將南路賊首莊大田拿獲恢復鳯山縣城固屬甚善倘因官兵單弱俟添調兵丁到後再行攻剿則各省調撥前往正需時日豈有在彼駐守多時按兵不動之理朕意常青現在派守郡城兵丁有五千餘名不為不多或再行抽撥數百名將備内如蔡攀龍之可靠者一二員帶領在郡城帮同嚴宻防守常青等竟統領官兵直趨北路㑹同藍元枚柴大紀普吉保打通斗六門一帶進逼大里杙覆其巢穴使賊匪聞信驚惶進無可據退無所歸脅従之衆各顧家屬自必紛紛潰亂此亦出竒制勝之一法著常青藍元枚等審度該處情形相機妥辦據寔覆奏亦不必稍存遷就之見再藍元枚進到圗説内有岸裡社熟畨三千餘人不肯従賊等語此等熟畨被賊誘脅不肯附従即與義民無異藍元枚即應速為慰撫給與馬兵糧餉令随同官兵打仗於聲勢益覺壯盛若不給與養贍該畨等庄社既為賊匪焚燬無以資生豈不去而従賊並著常青等南路如有似此不肯従賊之畨社民壯皆應招集奬撫或令入伍以壯聲威而分賊勢但須詳慎查察恐其中有賊匪混入希圖内應之事不可不加意嚴防也再現在大里杙水沙連等處賊巢内有民人十餘萬因衣食缺乏多有従賊入夥者若因其従賊打仗即不准其悔罪投誠此等脅從民人永無自新之路轉堅其従賊負固之心所闗匪細著常青藍元枚等一面出示曉諭無論従賊打仗及被賊驅使者一經棄械投誠即為良民或諭令歸耕各安本業或有随營自効剿賊立功如莊錫舍者即酌量奬拔至林爽文不但上干國法而且累及父母寔屬罪大惡極覆載不容斷無不速就殱滅即使藉詞地方官平日擾累以致伊等激成事端但地方文武俱為所戕害更復何所藉口且朕恵愛黎元休養生息雖臺灣逺隔重洋撫綏軫恤従無歧視現在被脅民人具有天良斷無始終附逆甘心従賊之理况賊匪雖猖獗皆為烏合究易潰散此時脅従者將來徒受其累同歸殱戮亦何所貪戀而不速行悔罪自新耶著常青藍元枚將此傳㫖詳悉出示曉諭俾脅従百姓及早投出歸耕賊黨自日見離散漸就窮蹙再普吉保與柴大紀訂期合剿今普吉保已將回至鹿仔港㑹同藍元枚剿賊情形奏聞而柴大紀剿賊之處未據奏到甚為厪念著傳諭柴大紀即將回至諸羅如何剿殺賊匪情形迅速具奏又據李侍堯奏現已栘咨粤省撥餉四十萬易換洋錢及撥解浙省餉銀六十萬兩並接運江西米石之處均應如此辦理並著孫士毅不拘何項即行如數易換洋錢迅速解往備用至常青等此時攻剿賊匪如得勝仗擒獲賊首所帶官兵足敷剿辦餘匪毋須多兵接濟即酌量情形一面飛咨各該省停其前往一面奏聞以省跋涉之煩上又命軍機大臣傳諭常青李侍堯存泰孫士毅寳琳琅玕徐嗣曽曰常青等於各路官兵到齊即統領將弁等分隊進剿連次殺賊因賊匪四處糾合夥黨蜂擁前来抵死抗拒現在所帶兵丁不敷攻剿奏請再行添調自屬寔在情形或因初次與賊接仗乍見賊匪勢甚鴟張現在兵力不能即時撲滅是以奏請添調亦未可定但該將軍等既以官兵尚覺單弱不敷痛剿自應再行添派以期迅速集事粤省已據常青等咨㑹孫士毅調兵四千該省原有預行挑備兵二千前後共兵六千著孫士毅即行揀派速往此外著存泰圖薩布於粤省駐防滿兵内挑選一千五百名並著寳琳琅玕等於浙省杭州駐防滿兵内挑選一千名乍浦駐防滿兵内挑選五百名派令前往著傳諭孫士毅等星即遵照挑選迅速分撥起程較前次派往者愈速愈妙所有粤省駐防滿兵著派副都統博清額帶領浙省駐防滿兵著派已陞授江寜將軍乍浦副都統永慶帶領前往其粤省緑營兵六千著孫士毅於曽經行陣之總兵内簡派一員總領前往並於各將弁内揀派諳練軍旅及曽經出兵者分起帶領孫士毅此次辦理官兵起程及一切事宜俱能經理妥辦諸凡留心甚為可嘉今所續調粤兵六千名該督更宜加意照料令其迅速起程以資征剿之用浙省駐防滿兵亦著寳琳琅玕一體妥為料理分起加𦂳遄行並著李侍堯徐嗣曽預為籌備船隻等項於各兵到時即行陸續配渡至常青等奏請派一大員前赴臺灣督辦軍需一節若由别省派往未免需時且恐呼應不靈因思李永祺曽任川省道府辦理軍需尚為熟手著即派該臬司速赴臺灣督辦軍需等務現在閩省秋審已過臬司尚無承辦要務著李侍堯於道員内揀派一人署理再閩省現辦軍務差委需人已於此次保舉道府内簡派伊轍布徳明額李滉李華國袁秉義成明於到閩後著交李侍堯酌量分派二三員前往臺灣聴候常青差遣如内地料理兵丁船隻等事需員派委即酌留二三員於内地委用以資差遣同日李侍堯徐嗣曽同奏言接准部咨臺灣道永福因前在湖北荆州府任内失察歴任知縣諱盜匿詳一案經部議革職但臺灣自上年十一月賊匪滋事該府孫景燧已在彰化被害府城中惟該道督同知縣等糾集義民與該鎮柴大紀所領弁兵悉力堵禦賊匪連次攻擾俱免疎虞本年正月初間各營征兵到臺灣之後一切糧餉皆係該道經手現在大兵進剿各路府城内外既需大員彈壓鎮撫而接應軍營糧餉正資熟手料理可否將該道暫行留任免易生手較為有益奏入上諭内閣曰永福著照該督等所請准其暫留福建臺灣道之任俟大功告竣該督等核其功過具奏到日再降諭㫖欽定平定臺灣紀畧卷二十一
