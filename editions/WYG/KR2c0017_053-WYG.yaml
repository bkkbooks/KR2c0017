  text: 欽定四庫全書欽定平定臺灣紀畧卷五十三
  hash: sha256:3ebb745fcdfd6a2a813938832de84f79fba3cb2f3c8a22499d3851802c204147
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_053-1a, image: WYG0363/WYG0363-0641c.png}
body:
  text: 二月初一日甲午福康安海蘭察鄂輝同奏言賊首逃入内山經臣等分派官兵堵截要隘令各番社生番在内山一體截拏兹據社丁杜敷報稱林爽文帶領匪衆六七千人在埔里社至埔尾沿溪山溝内逃走因東南一帶鑾鑾等社生番堵截嚴宻不敢竄往南路現已向北逃去等語臣親往各處隘口沿山搜查並催調糧餉僱夫背運入山以為追賊官兵之用一面飛飭通事王松帶領獅子頭社番於要路迎頭堵截一面商令海蘭察鄂輝帶同舒亮普爾普恒瑞普吉保袁國璜穆克登阿許世亨及巴圖魯侍衛等由歸仔頭内木栅各隘口分路進山連夜追赶臣往來各路督催官兵何處𦂳要即於何處帶兵䇿應於二十五日至麻著社一帶聞林爽文於二十四日夜間在東勢角地方被生番截殺四百餘人餘衆沿山北去查㸔賊人踪跡係兩路逃走隨將官兵分為兩路海蘭察舒亮恒瑞穆克登阿許世亨袁國璜由東勢角前進鄂輝普爾普普吉保由樸仔離東山前進山徑險窄穿林越箐不能乘馬均屬徒步登陟官兵等沿山搜捕殺死賊匪二千餘名拏獲活賊四十餘名奪獲大小砲位及鎗桿刀矛七百餘件二十七日行至獅子頭社見山溝内賊屍縱横遍地數里不絶而河内淹斃之賊亦多據王松及生番等禀稱林爽文於二十五日到獅子頭地方賊匪等因日夜行走腿脚俱已發腫過河淹斃者一千餘名社内生番堵截去路又殺死賊匪二千餘名止剰賊一二百人過山逃去大約從猫裡社逃往三貂地方生番等不認得林爽文不知可曽殺死等語隨将各生番所獻首級並拏獲活賊逐一認識俱非林爽文仍即分路帶兵馳往追捕臣查臺灣以東皆係大山越過大山數十重東面仍屬瀕海三貂社在淡水極北轉東逼近海岸與蛤仔欄社相近本係番界間有貧民前往租地耕墾今林爽文在内山逃往三貂必由蛤仔欄經過前經臣檄調副將徐鼎士同知徐夢麟帶領生熟番衆至蛤仔欄邀截徐夢麟已於本月二十五日同都司徐機至八堵地方屯劄查八堵距蛤仔欄不過二百餘里層巒叠嶂山徑陡峭步行前進約有三四日程途且該處俱係生番居住必須熟悉情形之人方能前往前已訪明居住三貂之呉沙許天送及生番通事張光彩等最為熟悉復示以重賞令其遍諭該處生番擒獻逆匪並即帶領官兵入山堵截查逆首竄逸内山隨行賊匪尚有數千官兵追赶及生番邀截業已誅戮殆盡沿途餓斃者又有千餘名現在四路圍逼逆首已無存身竄迹之地一經追及即可成擒惟獅子頭社所殺賊匪首級俱被生番割去其中不無有名頭目自應逐加識認而生番性嗜殺人所得首級皆携囘巢内以誇武勇不肯全行獻出驗過者不過數百顆兹已將出力生番按名給賞諭令將首級呈驗認非賊目再行給還庶知賊目何人被殺何人逃逸按名緝獲以期盡絶根株不留遺孽又正月初一日至各仔社一帶内山殺死奔逃賊匪二百餘名拏獲假扮林爽文之頼達一名活賊四十餘名訊據頼達供稱林爽文自獅子頭社痛𠞰之後隨行賊夥又被沿途官兵生番殺散所剰無多林爽文原欲向北逃竄見山内官兵圍截嚴宻又聞三貂等處亦有兵番截拏不敢前往在打鐵藔一帶山溝樹林内藏匿尚無一定去向等語官兵等遂至打鐵藔追捕由蝦骨社合歡社直至炭窑地方又搜獲零星賊匪百餘名查炭窑與南港仔山口相通出山不逺即係海岸惟恐林爽文被山内官兵追急潛行出山向海口逃逸復派各營官兵由復壠至中港又自竹塹至桃仔園沿山宻佈臣福康安海蘭察鄂輝舒亮普爾普恒瑞許世亨普吉保袁國璜穆克登阿特勒登徹六十七春寧及巴圖魯侍衛將弁人等各分隘口四路圍截該處草深樹宻溝磡甚多大隊官兵恐難於隠僻地方逐處查到致有遺漏兼恐逆首見官兵追至驚懼自戕不能生獲因揀巴圖魯侍衛二十員貴州廣東屯練兵丁數百名改裝易服扮作民人同淡水義民差役及社丁通事等分投搜緝於初四日在老衢﨑地方將逆首林爽文賊目何有志一同擒獲現在搜查逃竄餘匪又拏獲林琴陳傳呉萬宗頼其瓏等四名均係有名頭目一俟搜查净盡並令入山各兵休息數日即行統率大兵肅清南路至南路賊匪情形現猶屯聚大武隴赤山保大穆降水底藔等處聞官兵蕩平北路心懷畏懼黨羽漸離特恐義民截殺不敢相率投誠而被脅村民亦以賊未解散不敢遽行倡義經臣分遣熟悉南路賊情之舉人郭廷機廪生王維清等賫示撫諭村民離間賊黨並以大武隴等處與諸羅接壤行知柴大紀及叅將李隆張萬魁知縣陳良翼將投出之人妥為安輯兹據柴大紀等報有賊目何北海一名賊匪魏振元等十六名自行投出内有蕭盛頼育二名拏獲賊匪林靴林旺贖罪陳良翼報有賊匪呉雲林壓等四十八名均已自行投出又舉人郭廷機帶出南路投誠賊目許參陳送期陳吾春顔院林快士黄充來營並據賊目郭照髙為遣郭敬同來禀稱林爽文三弟林勇帶同賊夥在大武壠潛匿情愿設法擒獻再行投出臣俱已免究前罪令其拏賊自効㸔來南路賊匪黨羽已解散大兵一到無難刻日殱除其賊目李七早有歸誠之信前經拏獲該犯家屬伊兄李水情愿入山找尋至今並未投到兹已在内山拏獲該犯係賊中著名頭目不思早行投出仍隨林爽文逃入内山未便因其原有投誠之心稍為輕縱兹已嚴行㸔守同拏獲賊目等另行派員解京審訊又官兵攻克大里杙後有被賊拘禁之原署南投縣丞洪智投赴軍營據供賊匪到南投搶刼因該處並無城池汛兵九十餘名又分在各處汛地不能抵禦即時被賊攻陷隨帶兩子到民人王生家欲尋自盡王生救住送到豹尾庄廖全家居住林爽文聞知拏到大里杙呌何從龍勸降不從就帶到觀音亭交林繞㸔守又呌劉懷清威逼帮辦事件自刎兩次都被劉懷清將刀奪去手上現有奪刀傷痕可據等語訊之何從龍劉懷清供亦相符昨拏獲賊目林繞一名即係在大里杙㸔守洪智之人亦稱洪智屢被林爽文廹脅實未從賊復傳到王生等隔别硏訊均非虚揑但洪智身係職官被賊人拘禁日久兩次自刎未死仍復􅌤顔視息究屬偷生無恥未便因該犯員未經從賊稍為寛貸應請即行正法奏入上命軍機大臣傳諭福康安海蘭察鄂輝曰福康安等統率大兵分駐各隘口嚴宻堵截捜拏使首逆無從逺竄復恐林爽文見官兵勢盛驚懼自戕隨派巴圖魯侍衛及貴州廣東屯練兵丁改裝易服同差役社丁通事等分投搜緝將逆首生獲福康安等辦理妥協可謂用心周到甚屬可嘉至林爽文逃匿後固須多派兵民分頭搜捕而當其搜獲之時必有最為出力首先下手之人其人應優加奬賞着福康安將林爽文究係何人首先擒獲查明名數據實具奏候朕另降恩㫖至洪智身為職官被賊拘禁不能捐軀盡節固屬罪有應得但念該犯曾兩次自刎為賊匪劉懷清將刀奪去手有奪刀傷痕可據與􅌤顔從賊偷生者有間着加恩恕其一死發往伊犁充當苦差又前奏賊目陳泮投出後將其家屬扣留仍令伊入山勒限擒獻林爽文係被官兵捜獲而陳泮作何下落未據奏及該犯既不能將林爽文擒獻自未便因其曾行投出稍縱末減此外尚有呉領等亦係有名頭目均難寛縱並着福康安迅速按名查拏解京審辦毋令逺颺漏網上又命軍機大臣傳諭福康安李侍堯孫士毅曰據臺灣解到匪犯劉懐清林茂等供劉懷清在大里杙隨同林爽文之偽軍師董喜辦事一切聴其調度衆人稱為董仙林茂係董喜糾同入夥又據供賊人頭目林水素為林爽文信用諸事皆其主謀現封提督將來欲封作宗人府伊二人俱隨林爽文逃入内山等語董喜為賊匪軍師林水亦係林爽文信用偽封提督雖非莊大田之著名者可比但係助惡為首之犯未便任其潛逃漏網現在首逆林爽文已經拏獲董喜林水二人係随同逃竄之人如業經就獲自己随同解京倘尚未拏獲着福康安務將該二犯嚴宻搜查務獲若臺灣查無踪跡計該犯等非逃入福建内地潛匿即由海道竄入粤省並着李侍堯孫士毅一體飭屬嚴拏以期必獲解京審辦毋任其兎脱稽誅再此等黨惡要犯如本日解到之蔣挺劉懷清林茂何從龍四犯及供出之董喜林水俱係為賊主謀並得受偽職罪惡甚重其家屬俱應縁坐着福康安李侍堯等即行遵照查明辦理將來拿獲各犯有似此情節重大者俱着照此查辦再柴大紀蔡攀龍二人前據福康安奏於抵嘉義縣殺賊解圍後即留柴大紀蔡攀龍在縣城防守伊二人俱受厚恩如果思出力自効自應懇求福康安隨同帶兵打仗乃本日訊問押解匪犯到京之侍衛額爾登保據稱柴大紀蔡攀龍二人並未懇求一同帶兵前往𠞰賊似此􅌤顔安處全不思奮勉出力並懇求虚詞而無之伊等畏懼懦怯全無人心已可概見又蔡攀龍經福康安派令招致李七乃蔡攀龍並未能設法招致可見坐辦之事尚不認真安望其能隨營打仗奮勇殺賊着福康安即傳㫖詢問蔡攀龍令其自行據實明白迴奏至柴大紀於福康安自嘉義進兵時並未懇請前往一節亦着福康安一併嚴切訊問據實覆奏上又諭内閣曰福康安自鹿仔港進兵後督率將弁奮勇攻𠞰連次克㨗前於嘉義縣破賊解圍業經降㫖將福康安海蘭察晉封公爵賞給紅寳石頂四團龍褂以示優奬今逆首林爽文經福康安等設法生擒辦理周妥實屬可嘉特親解御用佩囊二個分賜福康安海蘭察用昭恩眷所有在事出力之將弁並着福康安查明咨部議叙其隨征兵丁並着福康安分别奬賞至辦理此事朕先事運籌决機發䇿自逆匪滋事以來大學士阿桂留京辦事續又差往河工及江南勘河本未承辦書諭大學士和珅始終承㫖書諭於一切清漢事件鉅細無遺懋著勤勞自應特加優賞和珅本係一等男爵着照從前大學士張廷玉之例晉封為三等伯大學士阿桂王杰尚書福長安董誥夙興夜寐一體宣勤俱着交部議叙其滿漢軍機章京並着軍機大臣查明實在出力者交部分别議叙至此次辦理軍務孫士毅以鄰省總督一聞逆匪滋事之信即親赴潮州駐劄節次派調兵丁撥運軍餉火藥鉛丸等項源源接濟迅速周妥甚為出力孫士毅業經錫予宫衘並賞戴雙眼花翎仍着照從前大學士蔣廷錫之例賞給輕車都尉世職以示嘉奬李侍堯自調任閩浙總督後於照料過兵及運送糧餉等事亦尚妥速本欲俟蕆功之日將伊原襲伯爵給還但李侍堯前抵閩省已及一年於柴大紀在總兵任内骫法營私廢弛營伍種種貪劣欵跡自已早有見聞乃竟緘黙不言並不及早據實叅奏經朕節次降㫖詢問李侍堯始行具摺陳奏明係有心徇隠豈可再膺懋賞且伊業經賞戴雙眼花翎晉加宫衘毋庸復行給還伯爵仍着交部照例議叙至柴大紀前因其固守嘉義不肯出城一節念其勤苦出力是以特封為義勇伯今據福康安李侍堯等先後遵㫖查奏柴大紀在總兵任内貪劣各欵俱已確實並守城亦非其功其前奏忍飢固守之處竟係義民等不肯放出伊轉揑詞欺飾已明降諭㫖革職拿問交福康安逐欵審明治罪矣至兵部承辦軍報之員外郎盛保在良鄉縣駐守俟候馳逓尚為奮勉本日擒渠㨗報即係該員親自賫逓着加恩賞戴花翎並在京㨗報處各員俱着交部議叙又此次軍報往來直𨽻山東江蘇浙江福建沿途各驛站馳逓並無貽悞所有沿途督撫辦理一切軍需均屬出力及驛站逓送文報之文武員弁並着查明交部分别議叙其驛站兵丁亦着酌量給賞初二日乙未上諭内閣曰黄仕簡任承恩上年朝審勾到並經格外加恩免其一死現在大功已届蕆事所有黄仕簡任承恩二犯俱着加恩釋放但伊二人身獲重愆經朕曲加矜宥全其軀命若仍􅌤顔安居輦轂之地有何面目對人俱着勒囘原籍閉戸静居思過臣等謹按黄仕簡任承恩専閫受寄恇怯逡巡實干軍律我皇上曲貸餘生俾得圜扉偷息已屬施恩格外及臺灣大功告竣復䝉矜宥釋還此非聖恩之獨優於黄仕簡任承恩兩人也祇以黄仕簡乃黄芳度之孫任承恩乃任舉之子方康熙十三年逆匪鄭錦之亂芳度闔門殉節而任舉實效命於金川之役兩人者之祖父皆以忠節著聞是故一綫可原特從曠典為臣工者益欽服聖主之權衡刑賞不假秋毫惟當激發藎誠咸知法鑒萬一重愆自蹈茍非如黄仕簡任承恩之猶有可原必不能倖邀肆赦而効忠如黄芳度任舉者雖延賞已逾百年或數十年尚足以庇其獲咎之子孫一罪一功昭然不爽載諸簡册洵足以永垂激勸云爾上又諭内閣曰此次臺灣逆匪滋事刼縣戕官肆行不法至一年之久福康安等帶兵渡洋旬月之間即將賊匪痛加殱戮搗穴擒渠各村庄得以安堵如舊該處地隔重洋五方襍處風俗素稱刁悍經此一番懲創若不明示武威恐民人等事過即忘不足令其怵目儆心常思安分畏法將來事竣後如福康安海蘭察及鄂輝普爾普舒亮等之勇略最著者應於臺灣郡城及嘉義縣兩處共建生祠塑立像貌俾該處民人望而生惕日久不忘上又命軍機大臣傳諭福康安李侍堯徐嗣曾曰前因黄仕簡帶兵渡洋並不奮勇𠞰賊惟安坐郡城因循株守以致逆匪蔓延日久曾經諭令李侍堯等將來事竣時所有多延時日糜費軍需銀兩應於黄仕簡名下責令分賠以示懲儆李侍堯何以尚未覆奏現在逆首林爽文業已生擒剿捕事務即日蕆功黄仕簡釋放回籍既邀格外寛宥而臺灣逆匪滋事年餘一切軍餉費用不貲皆黄仕簡因循貽悞所致若復令坐擁豐饒無以示懲着李侍堯於黄仕簡名下罰令繳出銀二十萬兩以備賠補軍需之用至昨據福康安奏訊據林爽文之父林勸供稱伊祖父墳墓在於義塜地内埋𦵏並無木牌難以辨認等語該犯祖墓雖埋𦵏義塜自可查訪而知着李侍堯於林爽文本籍漳州一帶嚴宻查訪不可稍渉紛擾致伊支族驚疑更不可因匪犯揑飾竟致之不辦徒事顢頇也初四日丁酉上諭内閣曰柴大紀既貪縱釀變於前復狡詐欺罔於後其前此接奉諭㫖不肯出城一節自係因郝壯猷前在鳯山棄城逃囘即於軍營正法柴大紀心懷畏懼恐罹重辟是以不敢輕離該處設非朕嚴申軍紀於鳯山失事時即將郝壯猷按律辦理則柴大紀深染緑營習氣怯懦畏葸未必不為郝壯猷之續今既查明種種劣蹟自應徹底嚴辦昨已明降諭㫖將伊革職拏問交福康安嚴行定擬具奏矣朕於臣下功罪惟視其人之自取一秉大公至正而於用兵之際有功即賞有罪即罸尤務嚴明從不絲毫假借至辦理軍務宵旰焦勞從前平定凖部回部大小金川無不炳燭幾先預􅋵成算此次林爽文等紏衆滋事雖係么䯢草竊亦並不心存忽視一本敬天凝命之念孜孜勿懈是以仰邀昊眷刻期奏績逆首生擒即如恒瑞妄請添兵數萬一摺設不斷以乾綱如宋明庸主遇事輙令廷臣聚議衆論紛紛迄無定見征調紛煩緩不濟急寧不如金世宗所云南朝集議既成北兵已可渡河之語其何以握勝算而奏鴻㨗耶着將前後辦理縁由通諭中外知之臣等伏讀御製遲速論曰兵事宜速而要於敬天明理不敬不明未有不致僨事者至哉皇言誠足以揭萬幾之要立千古之極矣夫以林爽文之糾衆滋事不過么䯢草竊耳而我皇上宵旰焦勞悉本凝命之思孜孜勿懈即遲速論所云敬天也以恒瑞恇怯之見妄請添兵數萬而斷以乾綱斥其謬議即遲速論所云明理也是惟敬天明理乃無不炳燭幾先預操成算以迅奏膚功蓋於兵事有明徴焉而豈獨於兵事然哉欽定平定臺灣紀畧卷五十三
