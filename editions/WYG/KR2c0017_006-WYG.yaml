  text: 欽定四庫全書欽定平定臺灣紀畧卷六
  hash: sha256:681f61ff6a053d4f2151eb13634832243613a0ed3a926b52337e2dcc4296a851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_006-1a, image: WYG0363/WYG0363-0072a.png}
body:
  text: 二月十三日辛亥任承恩奏言統領官兵於十二月十七日開行因風雨阻滯直至正月初四日放洋於初六日全抵鹿仔港登岸後正分派小船撥度兵械忽起風暴小船不能擺渡延至初十日始能全行上岸安營連日審察地方形勢偵探賊匪情形林爽文等仍分屯諸羅縣城及鉄線橋地方阻截南北道路署鹿仔港守備陳邦光紏約鹿仔港義民林凑等乗虚擒捉賊目收復鹿仔港彰化而賊目陳泮吴領等仍復擁衆踞住彰屬東南山之虎仔坑萬丹城一帶地方勾結内山生畨日擾四處村庄又彰屬大里杙等處係林爽文等住居起事之地其中匪夥時出滋擾臣伏思鹿仔港為臺北咽喉要口居民稠宻現今各處避難人民羣集雜處奸匪亦遂混跡其間人心時覺驚惶又逼近虎仔坑大里杙賊巢必須先行掃蕩俾要口得以寧輯臣即於十一日分派遊擊穆騰額守備潘國材帶兵五百名由員林進剿中路南投各庄遊擊海亮帶兵三百名并鄉勇熟畨人等進𠞰南路嵌頂各庄守備常萬雄帶兵三百名并鄉勇等進剿北路北投各庄以次㑹剿虎仔坑等處并派都司馬元勲帶兵三百名駐劄大加冬防範濁水溪後路兹遊擊穆騰額於十二日至許厝察上湳仔下湳仔等庄賊匪聞風逃遁當將賊庄三處盡行焚燬十三日帶兵登山行至半嶺遇賊即行佔住左山梁用鎗横擊打死賊人甚多隨即飭令署守備沈勇雲帶兵分往林厝仔施厝坪搜燬賊庄賊衆蜂擁迎拒官兵用鎗砲進攻賊人四散逃竄計燒燬賊庄六處殺賊首級八顆奪獲藤牌鎗炮等械又遊擊海亮十三日進攻嵌頂賊匪數百人踞住山梁用石打下即令藤牌前攩鎗炮伏後扒山仰攻打死賊匪十餘名賊始退走官兵追趕上山將及三條崙地方賊匪又復拒敵隨用鎗炮打斃賊人甚衆餘賊奔竄經官兵民畨奮勇追殺割獻首級耳辮奪獲鎗刀等械共燒燬内灣竹脚寮宫下仔粗坑頭三條崙松柏坑竹仔坑七處賊庄又守備常萬雄十三日進攻北投庄鎗炮打死十餘人賊匪敗退進至月眉左賊匪又來抵拒當即督兵鎗斃四人殺死二人奪獲鎗箭等械焚燬上茄老下茄老月眉左北投林仔頭溪舟等處賊庄各等情又連日據各庄義民兵役社畨人等擒獻賊偽號將軍林里生並賊夥髙玉等十三名并呈繳賊渠王芬首級一顆訊據林里生供稱林爽文封做掃北大將軍曽經攻破竹塹城又夥賊髙玉等隨同林爽文或攻彰化縣或攻諸羅縣俱各供認不諱因林里生一犯現患病沉重當即凌遲處死其餘各犯概行處斬又王芬首級訊之賊黨林里生等合認屬實舖戸居民無不稱快臣將該犯首級并林里生首級一同梟示其呈繳擒獻之各庄貢生張明義生員張植槐民人錢凌碧邱景厰蔡運世施烜光大肚社熟畨通事烏肉典岸里社熟畨通事潘明慈畨貢生潘士興兵丁方得章陳論林世忠等均行分别奬賞又據運粮官黄嘉訓訪有彰化縣兵房書辦劉志賢曽受林爽文偽封鹿仔港同知公然到任鞭朴平民擅收鹽課需索船規即親率跟役拏獲訊供不諱即日解送督臣審辦更訪得在港居民有乗機搶奪之徒未便姑容致滋騷擾當飭叅將福蘭㤗拏獲楊禮等十一犯挑斷脚筋以示懲創臣仍嚴督將偹將虎仔港一帶賊庄尅日剿平陳泮吴領二人務期拏獲再將官兵調赴大里杙一帶搜𠞰林爽文賊巢浄盡後臣即當親統官兵南下㑹同水師提臣黄仕簡商酌機宜同心并力􅌺擒首逆盡殱匪黨又到港後據被害臺灣府知府孫景燧家人丁夀呈繳臺灣府印信一顆又被害彰化縣知縣俞峻家人毛榮呈繳彰化縣印信一顆又鹿仔港被害巡檢馮啟宗之子馮廷玉呈繳鹿仔港巡檢印信一顆并僉稱各故員於未被害之前手将印信交付收藏并言我死是該當印係官物未敢遺失你速帶去逃避等大兵到日呈繳各等語隨將印信三顆騐明封固統俟克復諸羅之後委員賫交臺灣道永福收貯仍即飛咨督撫二臣查辦同日黄仕簡奏言臺灣五方雜處逆匪膽敢恣行不法罪大惡極其間或被廹脅隨行者自必不少是欲殱其渠魁必亟散其黨羽臣先經飛檄示知臺地民人現在帶領官兵進剿凡被賊匪廹脅隨行者速須解散無致悉被刑誅嚴切曉示在案先聞賊匪於正月初四五等日要來􅄪攻郡城迨臣統領官兵到臺初四五等日逆賊不敢復來迫攻緣郡城最關𦂳要臣隨將到臺官兵先即一靣分派四路堵截一靣相機發兵進剿日内陸路提臣任承恩亦即續帶官兵及金門南澳銅山等標營兵丁到臺自可調度分發南北夹攻均奏入上命軍機大臣傳諭常青曰本日據任承恩奏到派撥官兵於鹿仔港一帶焚燬賊庄擒殺匪夥一摺所辦雖畧有頭緒但殺賊甚少前經降㫖諭令任承恩俟常青到臺灣後即馳驛來京陛見但此時任承恩正在帶兵剿捕着常青於到日察看情形如果任承恩奮勉得力即令其在彼率領將弁追捕賊匪以期迅速蕆事若伊在彼不甚得力即據實具奏仍遵照前㫖飭令赴京陛見候朕靣訊一切現在該處領兵大員尚有總兵柴大紀郝壯猷普吉保三人足資帶兵𠞰捕也上又命軍機大臣傳諭李侍堯常青曰任承恩派兵分路進𠞰共有千四百名又有鄉勇等帮同𠞰捕而所殺賊人首級割取耳記為數甚少前此署守備陳邦光以微末員弁尚能督率兵民多殺賊衆並擒要犯髙文麟等四名出力可嘉任承恩等轉不及該弁寧不知愧乎現在賊衆既分屯諸羅縣城及鉄線橋地方黄仕簡任承恩二人務宜親督弁兵南北夹攻以期一舉齊事勿􅄪遲延至摺内所稱各庄生監義民人等擒獻賊目并呈繳逆渠王芬首級一顆此等擒獻賊目并呈繳逆渠如官兵未到之先本未從賊及見官兵到彼即擒賊來獻自應優加奬賞若先被賊逼脅觀望附從後見官兵勢盛懼而擒獻只可免其治罪不得令其倖功著常青於到臺灣後查明分别核辦至林爽文王芬係此案首犯今王芬雖已殱斃若林爽文復臨陣被戮或情急自戕轉使首逆倖逃憲典無以示懲著常青於到臺灣時務須設法將林爽文生擒解京方為妥善其呈出之王芬首級並著覆騐明確查明係何人所殺若此時不能詳加辨認設將來又有王芬其人尚復成何事體該督不可不慎也劉志賢身充書吏竟敢受賊偽職公然到任實屬罪大惡極凡應行緣坐者一概不可寛宥該督於訊供後一併派員妥速解京至拏獲乗機搶奪之楊禮等十一犯雖已挑斷脚筋但該犯等輒敢乗機搶奪騷擾良善即與賊匪無異僅以挑斷脚筋完結不足示儆並著常青查明搶奪屬實即將該犯正法示衆再據黄仕簡奏欲殱其渠魁必先散其黨羽等語所奏非是此等辦法或因起事之初兵少賊多為一時權宜之計則可今軍威壯盛自應趁此兵力蕩洗賊巢勿使轉留餘孽若黨羽既散將來如何按名究辦况大兵一撤賊夥散而復聚豈不更煩兵力此皆伊等平日將就完案之見此次林爽文等紏聚滋事即由從前姑息養癰所致今該犯等肆逆至此豈可不殱戮浄盡以絶根株且現據任承恩奏賊人勾結内山生畨日出滋擾可見賊人自知罪在必死負嵎煽聚非痛加剿洗勢必仍行肆擾現在兵力既盛亦不難將所結之生畨等一併𠞰辦上年戕害同知潘凱一案即係生畨滋事倘能趁此剪除將來内山等處俱成熟畨不更一勞永逸乎著傳諭常青即遵照節次所降諭㫖相機妥辦總以剿賊務盡勿留後患為要同日海壇鎮總兵郝壯猷奏言承准督臣常青照㑹令挑派精壯兵丁四百名配足軍裝器械齊集閩安前赴進𠞰隨即派兵起程於十二月十五日到閩安適副將丁朝雄恭將那穆素里管帶督標海壇閩安烽火兵丁共一千五百名陸續亦到臣即令分派船隻於十二月十九日由閩安開駕到平海放洋縁連日風暴至五十二年正月初三夜抵鹿耳門水師提臣黄仕簡船隻亦到初四日一同登岸進城即將到臺官兵分派各要隘處所嚴加堵截一靣㑹商水師提督臣黄仕簡相機帶兵進剿奏入上諭内閣曰據郝壯猷奏奉派帶兵起程到臺灣日期一摺所奏甚不明晰該總兵經總督派令前往進剿逆匪既已率領官兵於初四日登岸自應奮勉出力迅速剿捕並將賊匪現在情形詳悉聲敘方得窽要乃摺内並未敘明祇將起程及行抵臺灣日期敷衍陳奏於剿賊事宜全無頭緒郝壯猷著傳㫖嚴行申飭該總兵接奉此㫖務須奮勇殺賊毋得稍有疎懈致干咎戾上又諭内閣曰臺灣賊匪林爽文紏衆滋事現據任承恩奏臺灣府知府孫景燧彰化縣知縣俞峻鹿仔港巡檢馮啟宗同時被害各將印信令家屬呈繳等語孫景燧等守禦城池猝被戕害殊堪憐憫俱著交部從優議䘏十四日壬子上諭内閣曰此次臺灣逆匪林爽文等紏衆謀逆到處搶掠義民鄉勇人等隨同官兵奮勇殺賊守禦郡城甚屬可嘉業經降㫖令該督等查明優賞惟念逆匪滋事之初經過地方百姓田廬牲蓄被蹂􅏳刦掠及避賊遷徙流離者殊為可憫亦宜一體加恩普施惠澤所有臺灣府全屬五十二年應徴地丁錢糧悉行蠲免以副朕優加軫恤之至意並着該督撫接奉此㫖即日謄黄遍諭各處該部遵諭速行臣等謹按臺灣一嵗三熟比戸盈寧久享昇平之福兹猝被林爽文肆虐各處村左受其蹂􅏳者不少我皇上於該處鄉勇義民已捐稅錫銜恩施廣被復以賊匪所過地方被其刦掠及兵燹流離者情殊可憫如傷在抱巽命載申於臺灣府全屬五十二年錢糧悉行蠲免海外編氓無一不在皇仁㴠煦之中真與天同量矣同日常青奏言二月初一日申刻准提臣任承恩咨稱統領各兵船於正月初十日全行上岸及派撥官兵鄉勇熟畨分路進劉據遊擊穆騰額海亮守備常萬雄等稟報於十二十三日進攻各庄鎗砲打死賊人甚多各有奪獲軍械並焚燬各處賊庄俟搜剿賊巢餘匪後即統兵南下與水師提督㑹商剿捕等因查該提臣自抵鹿仔港即已分兵剿捕焚燬賊巢使匪徒無頓身之地現在南北兩路可互壯聲援併力搜洗且首逆林爽文前據臺灣鎮禀報訪聞被砲打傷早隂裭其魄而王芬係助惡大憝又經義民人等割獻首級其餘逆夥定可不日殱除􅄪臣前委署理臺灣府㕔及各縣員缺因印信尚無下落飭將府經縣丞等印信關防暫行給用今據孫景燧家人呈繳臺灣府印信一顆俞峻家人呈繳彰化縣印信一顆又鹿仔港巡檢馮啟宗之子呈繳鹿仔港巡檢印信一顆俱經騐明封固賫交臺灣道牧貯隨飭知該道分給各署員偹用將借給内地印信關防繳回仍查追理畨諸羅鳯山各㕔縣被失關防印信及武職關防務獲奏入上命軍機大臣傳諭李侍堯常青黄仕簡任承恩曰本日常青奏接據陸路提督咨報剿賊情形一摺皆係任承恩業經奏聞之事何用六百里加𦂳徒勞驛站林爽文係此案首犯必須生擒解京盡法懲治方足以伸國法而快人心據該鎮訪聞林爽文被砲打傷之語畢竟有何確據大里杙等處即係賊人巢穴林爽文又逃往何處若因林爽文有被砲打傷之語將弁等不能將首犯生擒或又揑報因傷身死希圖將就完結致首逆重犯倖逃顯戮設將來又有林爽文復出非獨黄仕簡任承恩罪無可寛即常青亦恐不能當其重戾至王芬一犯據義民等將首級呈繳亦恐不足深信昨有㫖着常青等確查覆奏若此時未經騐明確據將來他處又有王芬其人一經發覺惟常青等是問同日孫士毅奏言上年十二月接准閩省咨文挑偹戰兵以資策應臣才庸識淺不知輕重緩急惑於漳潮接壤民情疑恐親赴彈壓兹自知錯謬不禁慚悚交集現在已於正月二十一日起先將督標官兵陸續撤回歸伍其先赴閩省之水師一千名昨接閩浙督臣知㑹現在暫駐漳州用資彈壓其駐劄黄岡等處水陸兵丁現與署提臣彭承堯商酌􅄪俟得閩省𠞰賊確信亦即分起撤回惟粤省惠潮民人入天地㑹者諒復不少此種匪㑹非别項邪教止圖誆騙錢財者可比必須徹底查辦浄絶根株臬司姚棻現已行調來潮専司督緝署提臣彭承堯仍暫駐潮州督率料理臣即於正月二十六日起程回省奏入上命軍機大臣傳諭孫士毅曰前因孫士毅接准閩省咨文立即調發弁兵親赴潮州不過見其遇事急公而不權事理之輕重緩急且恐粤東内地民人心懐疑惑是以降㫖飭諭現在黄仕簡任承恩齊抵臺灣分路進攻賊匪四散逃竄各庄生監義民擒獻賊目賊夥並割取賊渠王芬首級呈繳大兵㑹剿餘黨自可即日蕩平此時大局已定孫士毅又當親往稽查彈壓况惠潮民人入天地匪㑹者不少其從外竄逃入境及内地勾引入㑹之人均應逐一搜捕不留餘孽若孫士毅徃來督緝豈不較總兵彭承堯及道府等更為有益乃該督率行囘省全不知事體緩急因時制宜何以拘泥錯謬若此着傳㫖申飭該督接奉此㫖即仍前徃潮州一帶督率辦理十六日甲寅上命軍機大臣傳諭李侍堯曰前據常青奏黄仕簡等帶兵登舟開駕以後屢被風信阻回朕當即於次日清晨齋心黙禱叩天䖍告以祈神佑嗣據該提督等節次奏報風水順利所帶官兵船隻於二月初三初六等日先後俱抵臺灣尅期進剿可見誠敬感孚聿昭靈應朕欣慰之餘益生寅凛着李侍堯即親詣天后宫䖍申報謝以荅神庥欽定平定臺灣紀畧卷六
