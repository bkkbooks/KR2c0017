  text: 欽定四庫全書欽定平定臺灣紀畧卷四十六
  hash: sha256:afde368d07668849802216d0d8594137c29e6a5459702770c63a9135c9601269
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_046-1a, image: WYG0363/WYG0363-0544a.png}
body:
  text: 十一月二十三日丙戌福康安海蘭察鄂輝同奏言連日以來確訪賊人虚實情形通盤籌畫酌定進兵道路並查各處舊駐營盤酌量移改以固後路查八卦山在彰化縣城之西地勢較髙距大里杙三十餘里為前往賊巢必經之地賊匪在該處設卡出沒不常此次派舒亮進逼賊巢必須偵深明白方可悉其形勢臣等公同商酌於初四日黎明海蘭察帶領巴圖魯侍衛總管特勒敦徹等二十人及穆塔爾丹比錫拉布等至八卦山一帶詳細跴探見對面山梁賊人設卡竪旗支架大砲當經索倫佐領阿木勒塔三等侍衛哲克首先上山迎殺賊匪抵敵不住四㪚奔逃正在追趕間又有賊匪百餘人於山下竹圍内擁出希圖抄截海蘭察率領巴圖魯等鎗箭齊發三等侍衛賽音庫射死賊匪一名藍翎侍衛薩克丹布鎗斃賊匪一名三等侍衛屯保射傷賊匪一名藍翎侍衛翁果爾海趕上拿獲餘俱奔潰查從前官兵惟知株守營中遇賊匪前來攻擾間有斬獲並未能逕到賊庄殱擒匪衆此次巴圖魯等僅止二十餘人即直抵賊人設卡之處截殺得勝擒拿活賊居民人等無不稱異士氣人心無不振奮臣等仍當步步留心不敢稍存輕視賊匪之心以期計出萬全􅌺速蕆事所有拿獲之賊匪陳曽係為賊人守卡並非頭目業於軍前正法至賊匪現在情形大半聚集諸羅自鹿仔草樹林頭收復後賊匪仍於鹽水港等處四面攻擾業經屢次飛催恒瑞普吉保迅速前進並遣妥人密赴諸羅城中咨㑹柴大紀令其守此數日以待援兵該叅贊亦屢有咨請援情形實為急迫臣等悉心商酌此時自以先救諸羅為是所有進兵道路雖可由西螺斗六門一帶行走但該二處賊匪屯佔已久而斗六門係𦂳要隘口若賊人拒險死守官兵攻克或稍須時日不能尅期赴援諸羅設有意外之虞賊勢愈張收復更難為力查元長庄笨港一帶道路較近臣等即於初六日帶兵由此路長驅直進将崙仔尾等處賊匪沿途搜勦可以徑達諸羅且臣等所帶廣西屯練兵現有五千名經過元長庄時再将普吉保所帶兵五千五百名一同帶往兵力更為壮盛賊匪聞知大兵赴援自必悉衆來迎希圖抗拒賊勢既分恒瑞探知信息即可乗機逕進諸羅解圍後各路㑹合我兵已據勝勢或南或北所向無前如斗六門屯聚之賊匪不難立時殱㓕至大里杙賊巢為彰化所属逼近内山聞賊匪修理城堡溝壕圍以䓶竹極為堅固並勾通水沙連生畨以為将來逃竄之計其賊巢附近地方自大肚溪以北大甲溪以南皆係漳人村庄半已從逆如烏日庄田中央庄犁頭店大肚社水窟頭庄猪哥庄等處賊目分路佔據為大里杙賊巢羽翼惟彰化迤西近海一帶村庄尚属義民拒守臣等此次往救諸羅鹿仔港係後路要地與各處賊庄路徑皆可相通駐守官兵不便全行撤動惟舊駐營盤兵丁尚有應行分併之處查埔心二林二處毋庸移動外其畨仔溝距賊庄稍逺並非要隘馬鳴山駐兵較多将畨仔溝營盤撤去移駐馬鳴山将馬鳴山所駐之兵移回鹿仔港地勢既得兵力又可節省即於舊存兵内撥出一千二百名義民五千八百名交舒亮帶領由烏日庄一路進兵與淡水官兵訂夾攻賊巢之策查淡水在賊巢上游徐鼎士徐夢麟所帶官兵三千名義民一萬一千名聞已越大甲溪而南在岸􅂻社牛罵庄等處駐劄臣福康安飛傳牛罵庄徐夢麟到營面加詢問該丞所禀情形極為明晰觀其遇事亦頗勇往而於曉諭生畨等事尤所諳悉並據禀稱大溪甲一帶水碓等十九庄俱已紛紛投出現在實有機㑹可乗等語臣已面授機宜派守偹徐大鵬帶鹿仔港官兵二百名又派新舊義民二千餘名同該丞前往淡水令與徐鼎士熟商妥辦将現有兵民分為兩隊一由犁頭店等處前往一由大肚山等處前往大里􅍻請示舒亮訂期南北夾攻即不能進克賊巢亦可將烏日庄田中央等處賊庄或勦或撫剪其羽翼並令徐夢麟差熟悉畨情之㕔役王松及岸􅂻畨社貢生張鳳華紀阿林等曉諭内山一帶生畨堵截逸匪並令設法至水沙連各社購以重賞不許與逆黨相通如此四面佈置處處預為防範即将來賊首賊目窮迫思逸似無難立時擒獲再查招集之義民籍隸漳泉粤東者各分畛域互相猜嫌即晉江與同安之人同属泉州一府亦復不能和睦臣已查明該義民等原籍令各庄同籍之村庄守卡禦賊不致聚集一處别滋事端其挑出隨征者選派諳悉民情稍能辦事之貟弁嚴行約束協同進勦該義民等雖非久經行陣之人然能熟悉路徑通曉賊情亦可稍助官軍聲勢再藍元枚族人藍啟能等自藍元枚病故後無人照管生計頗為拮据竊思藍姓族衆深知大義不肯甘心從賊投出後不免饑寒殊為可憫臣即傳集藍啟能等面為慰諭優加撫䘏俾得各安生業現在賊中黨羽漳人最多見臣等撫䘏歸順良民不分畛域自必紛紛就撫於勦捕機宜更為有益再昨經巴圖魯侍衛等在八卦山查看路徑擒殺賊匪臣料賊人自必潛出私探官兵消息與鄂輝商酌應選派降畨前往邀截該降畨等無不踴躍請行臣以人數衆多恐被賊人知覺即派都司額爾亨額土守偹色穆里雍中等帶領降畨九十名前往在竹圍内埋伏初五日黎明果有賊匪執械下山當經降畨等上前擒拿斫傷二賊割取首級餘賊沿溪逃奔趕跌落水淹斃賊匪六名殺死賊匪二名復有賊匪百餘人從小路撲出降畨等放鎗迎敵即行打退八卦山一帶賊匪屢經挫衂見官兵以少擊衆賊黨聞風自必益加震懼同日常青奏言先後撥兵應援諸羅之後營盤存兵四千間有因病疲弱者兵力自覺稍单乃賊匪又乗間窺伺臣惟探聞賊匪所在即親率官兵先往迎擊必不使其附近屯聚兹准福康安咨㑹令臣固守府城選派将弁将賊匪往通諸羅要路截㫁即進勦南潭一帶等因臣自應照此辦理於府城加意防範並探有通往諸羅賊踪即派官兵擒勦堵截諸羅一經打通府城均可無虞即帶兵一二千名相機南進至沿海口岸臣尤時時嚴飭将弁實力巡邏毋使賊匪竄逸又粤庄武生鍾文華帶義民四百名千總職銜鄭其仁等募出畨民一百餘名現在抵東港與副将丁朝雄共相防守並於海邊撈獲大砲四尊安置營盤民心安帖又十月二十六日有賊匪撑駕竹筏二十餘隻在海面放砲丁朝雄即派偹弁帶領兵民各坐小船夾攻親率領弁兵施放鎗砲接應打死賊匪並淹斃者三十餘人餘賊逃㪚查現今鹿耳門海口兆至鹽水港南至東港來往官兵粮餉俱各無阻同日柴大紀奏言十月二十七日辰刻賊匪萬餘仍復侵擾西北二處營盤臣同侍衛徳成額叅将特克什布等往來督戰賊匪恃有鎗砲勢甚䲭張副将蔡攀龍都司張振唐守偹曽紹龍等官兵在西門外一帶堵禦臣見賊匪甚衆隨調叅将張萬魁帶兵前往協禦總兵魏大斌副将詹殿擢等官兵堵禦東北角署守偹蔡開祥并把總等官兵堵禦北門外臣飭令各營盤静以待動視賊将近齊放連環鳥鎗打死賊匪共有數百名官兵義民隨奮勇趕出向前力戰俱能復斃多匪獲竹牌鳥鎗長刀等項縁火藥缺少兵丁枵腹難以逺追再諸羅被困四月有餘粮餉兩缺藥鉛不足所有花生地𤓰等物俱盡查民間以花生打油其渣名為油籸農人用以肥田因想花生可食其渣亦必可食詢各油車行共有油籸五萬餘塊每塊重八九觔隨取一二塊舂末篩去粗壳與蕉根同煮加以鹽糖先自嘗試尚属可食遂遍教成廂内外兵民照樣作食月初以來賴兹充腹但人多食繁亦将罄盡賊匪復連日滋擾兵民皆忍餓堵殺雖經暫退仍屯聚於附近之十四甲牛椆溪姜母寮北社尾大溪厝水堀頭﨑仔頭埤堵三苞竹等庄兹接普吉保咨稱由崙仔尾進攻因賊衆固守未得攻克當即設法得路而進又接總兵梁朝桂在鹿仔草來咨内稱先於前路添設營盤一座恒瑞雖已到此統計兩起征兵不過一千五百餘名再禀恒瑞於各營盤内酌量抽調前往㑹合普吉保再為攻進併有凡事俱由恒瑞主令事之能行與否亦不敢自專各等因是恒瑞普吉保兩路尚無來援諸羅日期惟有再行力催冀其迅速齊集併力勦捕均奏入上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯常青柴大紀曰此次海蘭察所帶巴圖魯侍衛僅止二十餘人即能直抵賊人設卡處所殺死賊匪擒拿活口士氣人心為之一振洵為事機順利極好吉兆柴大紀力桿圍城城中粮食火藥乆已缺乏今花生地𤓰等物又俱用盡兵民至以油籸充食亦恐不敷接續而恒瑞普吉保兩路又未能即時前進是柴大紀望援急迫福康安自應即由元長庄笨港一帶統兵速進勦殺沿途賊匪徑達縣城柴大紀此次奏到之摺係於十月二十九日拜發而福康安已於初六日由鹿仔港進兵至遲不過初九初十即可到彼此數日内必可保䕶無虞至普吉保自鹿仔港進兵後業經收復笨港進至元長庄又經移營距縣不過五里若能身先士卒奮力勦殺直抵縣城朕必深為嘉許施恩格外且為普吉保計即因賊勢鴟張難以輕動與其株守中途進退失據孰若力戰入城即至勢有難支與柴大紀協同固守受困猶覺稍有丈夫氣概今似此遷延現在福康安大兵已到即普吉保福分淺薄之處至恒瑞自駐兵鹽水港後為日已久所帶官兵比普吉保為多乃並無寸進亦未打仗得勝是恒瑞之咎已視普吉保為重且現據柴大紀奏接總兵梁朝桂咨稱凡事皆由恒瑞主持事之能行與否亦不敢自專等語是梁朝桂亦知柴大紀處望援甚切急應前進而語意之間似不免恒瑞有掣肘之處梁朝桂職係總兵自不能不聽候㕘贊調度其不敢自專之語自非餙詞伊見恒瑞觀望不前即禀請抽調營兵思欲攻打前進尚属具有良心何以恒瑞轉若視同膜外恐竟係心忌梁朝桂先往得功是以故為掣肘且柴大紀所奏情節惟以恒瑞普吉保不即前往援應為言而於梁朝桂禀請恒瑞撥兵之處代為聲敘是柴大紀亦知梁朝桂實有赴援之心而於恒瑞不能不疑其有心牽掣設使梁朝桂亦属虚詞何以柴大紀不一併斥言其非況梁朝桂並未與柴大紀共事一處可見其言並非有所迴䕶看來恒瑞竟係按兵不舉或因不能親自往救柴大紀而梁朝桂禀請赴援竟至有心阻止著福康安即確切查明並詢問梁朝桂及隨營将弁倘恒瑞果有此等情節即據實嚴㕘不得稍有狥隠至大甲溪一帶村庄民人咸知去逆効順各行投出賊黨自必日就潰㪚官軍聲勢倍振實為極好機㑹現今福康安派令守偹徐大鵬等帶領兵民分隊前往大里杙禀請舒亮與徐鼎士訂期南北夾攻即未能進克賊巢可将該處賊庄酌量或勦或撫剪其羽翼於勦捕機宜實為有益但該處村庄民人俱籍隸漳州既經從賊其心究不可信福康安如加以招撫仍應隨時留心以防肘腋之慮至内山一帶生畨亦經福康安令徐夢麟差熟悉畨情之人前往曉諭堵截逸匪並於水沙連各社許以重賞不令與賊黨勾通則将來賊匪窮蹙逃竄更無難隨時擒獲藍元枚族人藍啟能等福康安面為慰諭優加撫䘏所辦俱好其埋伏八卦山下殺死賊匪之屯練等能以少擊衆實属奮勇即當酌量奨賞至官弁内如有奮勇出力者亦應隨時酌賞即将前此發去花翎藍翎按其功績酌量品級分别賞戴以示鼓勵臣等謹案将之勇怯惟在一心心足以率氣則所将之士雖少而氣已奪人心不足以率氣則所将之士雖多而氣先自阻以煌煌聖訓屢以此飭勉戎行顧縁營結習難除祗知列營株守待賊之自來而禦之遂使釡底游魂久延殘喘幾至經年及海蘭察偵賊八卦山其從行之巴圖魯侍衛等不過二十人而賊之設卡於山梁圖抄截於竹圍内者經官兵勦殺不異捕鹿驅羊良以勇在一心氣自百倍則二十人無不以一當千而賊氣早為之奪也臣等觀於八卦山之役而聖訓之所以飭勉戎行者其益當恪遵而知勵也夫二十五日戊子李侍堯奏言臺灣府城四鄉尚有賊匪連日攻西港蕭隴等庄俱被兵民殺退東港亦有賊來攻擾該處有兵一千四百名義民四百名尚資守禦東港之米已陸續販運至郡每石三千一二百文将軍常青札調粤庄義民到府帶同勦捕莊大田而粤民恐起程後賊來擾庄欲先攻水底竂是以行期未果諸羅雖尚梗阻而柴大紀常遣人到鹽水港支取番銀一二千圎并聞各庄民貪利乗夜運米入城糶賣前月每斗一千七八百文今减至一千二百文又蔡攀龍寄信到府要取帳房數十架别無他語是諸羅尚可固守恒瑞已咨㑹普吉保訂于初六日由新埤地方合兵進援又聞将軍福康安初一日到鹿仔港初二日先發兵二千往普吉保處福康安亦即日帶兵續進其隨同福康安之狼山鎮總兵袁國璜四川副将張芝元所坐船隻飄至鹿耳門聞福康安已到鹿仔港因連日北風甚大難以直達是以與臬司李永祺同赴鹽水港欲隨恒瑞一路往迎福康安現在貴州總兵許世亨所帶黔兵二千於初三日起至初八日俱已到蚶江配渡一得順風即行開駕昨又接前途來信湖南兵於十月二十二日起程本月初間入江西境是兵行亦極迅速計月内當可抵蚶江所需船隻臣已預行齊偹不致有悞至臣所調接濟府城之本省兵一千名日内亦可陸續到厦登舟再閩省各府縣及海口俱有天妃廟而厦門港口一廟尤為靈應臣因祈禱順風亦嘗親至拈香即将此廟修理恭請御書匾對張掛奏入上命軍機大臣傳諭福康安常青李侍堯徐嗣曽曰據李侍堯奏到情形足見縣城尚有銀米可資接濟而恒瑞普吉保兩路於初六日先已訂期合兵進援聲勢聫絡縣城料無意外之慮昨據柴大紀奏縣城㫁糧已久花生地𤓰俱盡現取油籸舂末與蕉根同煮作食兵民藉以充腹是縣城兵民口食竟似乏絶但前據徐嗣曽奏諸羅脅從之賊貪得錢文私将米糧賣給百姓而近縣庄民懼賊不敢明助間用袋装米埋於空曠處所遺字與營中令其自行往取今李侍堯又奏庄民貪利乗夜運米入諸羅縣城糶賣米價較前月稍减若果如此則縣城米糧似尚有接濟未必如柴大紀所奏竟至匱乏而柴大紀所稱将油籸作食或過甚其詞亦未可定然朕但憐其固守並不以此怪彼也著福康安到彼密行留心查訪柴大紀力捍圍城已經數月激勵兵民竭力固守實為勤苦出力即使李侍堯徐嗣曽所奏属實亦不過零星販助為數自属有限兵民豈能果腹不必因柴大紀所言過甚稍露端倪使之疑懼特朕向來辦事不肯顢頇欲求明白近理是以諭福康安查奏明晰以釋疑耳至福康安此時統兵援應柴大紀官兵所帶行糧想來僅敷食用自不能多有寛裕若福康安援應入城城中得此新到重兵雖覺聲威壯盛而該處兵民忍飢日久方在嗷嗷待哺尚無米糧接濟是縣城之圍雖解而兵民仍不免乏食則救與不救等耳福康安勢又不能令所帶兵丁将賫帶行糧盡行資給城内兵民轉致新兵枵腹而城内之人忍飢待食又㫁無坐視之理況即将賫帶行糧勻出分食亦豈能普行贍給設縣城兵民乏食已久見新到之兵尚得飽食或竟迫於無奈致相争閧更属不成事體福康安一面統兵援應縣城一面即将鹿仔港後路所存米糧隨同大兵之後接續運送入城俾城中軍勢既振兵民口食有資或竟資糧於賊則更美善並著李侍堯将内地糧米迅速陸續運送鹿仔港軍營俾得源源接濟不致缺悞二十八日辛夘柴大紀奏言十四五等日賊匪萬餘分犯西北南三處營盤臣同侍衛徳成額㕘将特克什布等俱令各營盤官兵義民伏在溝内短墻下視賊将近齊放鳥鎗賊匪多處用行營砲轟擊各打死賊匪數十名賊稍退怯各兵民一齊趕出奮勇力殺各殺死賊匪多人南門外打傷騎紅馬賊一名各處賊衆俱退西北之賊逃入十四甲牛椆山紅瓦磘西南之賊逃入北社尾三苞竹角仔藔埤堵等庄因火藥不足兵民枵腹收軍十六日黎明賊衆於紅瓦磘庄前搭藔十數間此處離臣營盤不過里許係通彰化大路隨親率把總蔡開祥石生輝等帶官兵併武舉黄奠邦生貟吳正蘭等各義民前往燒燬庄内擁出賊匪千餘抵拒官兵義民協力向前打死賊匪數十人殺死數人賊退即将賊藔燒燬獲鳥鎗五桿火藥一十五斤籐牌長柄刀等件義民獲有些微糧食收軍回營十七十八等日賊復率衆萬餘分犯西南北營盤仍飭令官兵義民静以待動視賊逼近齊放鳥鎗各處打死賊匪數十名見賊稍退官兵義民奮勇趕殺復斃多匪賊仍逃入各庄十九夜賊衆於旗杆湖口厝宅山仔頂三處搭藔各數十間查此三處與東南門相近俱属低山義民尚可潛往採取蕉根野菜賊復搭藔阻截殊属狠惡二十日臣督率逰擊李隆㕘将孫全謀守偹哈景泰帶官兵義民前往殺退賊匪将三處草藔盡行燒燬南北兩邊各有賊匪數千由各庄内擁出侵犯營盤臣隨将官兵收回先用鳥鎗連環叠進繼以牌刀併各義民協力殺死賊匪共數百名賊逃入各庄内多有大砲打出我軍不能殺入收回二十一日午刻賊匪萬餘來犯西北二門營盤臣等俟賊将近齊放鎗砲各打死賊數十名官兵義民俱能殱斃多匪追入三苞竹十四甲頭橋等庄竹圍内俱有大砲打出我兵不能殺入連日打仗官兵義民畨民等間有傷亡者獲子砲四個併竹牌旗械等項生擒賊匪黄醮一名審明正法惟是諸羅被困四月有餘食物俱盡油籸蕉根野菜亦将無有又属冬季飢寒相兼各營盤報病故者日多危急殊甚恒瑞普吉保尚無來援日期同日恒瑞奏言詢之諸羅城内逃出民人據稱縣城糧食甚貴斗米值錢二千餘文間有與賊認識者私将米糧運入城内縣城竭力守禦止能支持數日均奏入上命軍機大臣傳諭福康安海蘭察柴大紀李侍堯曰柴大紀所奏俱係上次二十九日奏報以先之事至恒瑞既知縣城被圍甚急糧食垂盡必須與賊認識之人方能将些微米石運入城中試思城内兵民有四萬餘人此等零星搬運之米豈能供此數萬人之食且據該處逃出民人稱縣城止能支持數日是柴大紀處情形較前更加急迫恒瑞知之甚悉更應親督弁兵設法速往救援何忍再為遷延普吉保自駐兵元長庄以後距縣城甚近亦復遷延株守並不奮力勦賊速解縣城之圍是伊二人俱不免有心觀望但知保守自己而恒瑞之罪視普吉保為尤重著再傳諭福康安到彼即查明據實嚴㕘不得稍為狥隠至柴大紀前次奏到之摺係十月二十九日拜發而福康安已於初六日進兵由元長庄一路前往援應料此數日内柴大紀自能将縣城保守無虞福康安自前次發摺後已逾二旬究於何日統兵前抵縣城殺賊解圍合兵進勦擒拏賊首賊目之處想此奏早已在途二三日内即可奏到惟不免盼望焦急耳二十九日壬辰李侍堯徐嗣曽同奏言聞将軍福康安㕘贊海蘭察等於初六日由大突二林一路進援諸羅並令舒亮等於鹿仔港舊兵内挑一千二百名并義民五千餘名前往大肚溪一帶督同徐鼎士進勦又聞賊目李七雖圍諸羅縣城而私賣糧米接濟城内今為林爽文調去堵截援兵换賊目陳靈光圍城並無粒米可買正在盼望信息間接揚廷理吳元琪等禀稱海蘭察於初八日由笨港攻透諸羅福康安於初十日由新埤進諸羅恒瑞亦於是日由大崙抵諸羅速催糧餉進城接濟并聞各賊匪自行焚藔四㪚逃竄等語是諸羅道路已通三路官兵俱已㑹合大局已定即日可移搗賊巢擒拏賊首至南路情形聞十月下旬莊大田聞官兵多向諸羅又率賊夥前來牽掣莊大田剳元帥庄謝檜剳中洲蔡牛簡倫剳南潭欲來刼闗帝㕔營盤經官兵義民殺退中路賊目許尚陳意陶烏各有賊千餘已暗來約降俟大兵進勦即來歸附将軍常青擬俟内地兵到并整頓義民分兩路往勦巢穴又東港一路有水底藔賊時出滋擾武生鄭其仁令義民持賊旗假装賊夥至水底藔口擒賊五名燒賊藔數十間餘賊逃去鄭其仁現約枋藔義民彭達等訂期往洗水底藔賊巢是南路亦有摧廓之勢再藩司覺羅伍拉納隨臣往來蚶江厦門等處接應軍需事宜料理各站過兵夫役及籌偹船隻催運糧餉俱能認真辦理不辭勞瘁並無貽悞懇照臺灣道永福等之例賞戴花翎以示鼓勵奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯柴大紀徐嗣曽曰逆首林爽文等糾衆不法攻擾縣城已經數月今福康安海蘭察一抵鹿仔港即整旅長驅奮勇前進海蘭察於初八日已由笨港開通道路直抵縣城而福康安亦於是日由新埤進抵縣城並将糧餉等項催令由大崙速運入城接濟福康安海蘭察實属奮勇可嘉此時大局已定即日㑹兵攻勦搗穴擒渠功在旦夕此信係楊廷理等所禀自属確實福康安自因初抵縣城調度一切帶兵殺賊尚未暇具摺陳奏想所發之摺業已在途日内即當奏到此次臺灣勦捕逆匪雖祗係内地奸民滋事非若從前平定回部金川可比但逺涉重洋備厯風濤之險福康安到鹿仔港後督兵進勦尅日解圍殊甚嘉奨俟捷音一到自應照從前阿桂平定金川之例晉封公爵兹先賞給紅寶石頂四團龍掛以示優眷海蘭察前在金川軍營屢著勞績今復身先士卒攻透賊圍又帶兵出城往來勦殺實属勇畧過人亦應晉封公爵一體賞給紅寶石頂四團龍補掛用旌勲績海蘭察係索倫人屢立功勲叠加拔擢今特被殊恩異寵亦足令該處人貟共知鼓勵一俟福康安等奏到捷音再行頒發明降諭㫖外先将此諭知福康安海蘭察同為欣慶伊等益當倍加感奮􅌺速蕆功至恒瑞雖已由大崙催運糧餉進城但係福康安海蘭察已經入城之後恒瑞不過隨同前進豈足為功設使恒瑞普吉保於福康安等未到之先即能奮勇直前打通道路入城接應朕必施恩格外今似此怯懦無能因人成事即伊二人之無福賊目李七附從賊黨攻擾縣城固属可惡但前據李侍堯奏賊目李七有歸順之意經恒瑞遣義民柯光明等賫諭密招李七願送妻子為質等語今當縣城被困之時又私将糧米賣與兵民接濟城内尚為効順其罪自可寛宥将來拏獲時或貸其死罪酌量安挿内地亦法外施仁宥罪招徠之意伍拉納著賞戴花翎以示嘉奨至南路賊匪屢次窺伺府城經常青督率義民奮勇殺退賊目許尚等暗約投降是南路賊匪已有廓清之象常青在彼雖未能統兵進勦而節次調度派撥打仗殺賊守䕶郡城無虞亦尚有功此時李侍堯添調内地官兵到彼後常青自己乗賊黨渙㪚之時進勦大穆降等處巢穴看來南路賊匪亦無難悉數殱除昨曽有㫖以常青經事較久将來事竣後仍可用為福州将軍駕輕就熟可期勝任非比恒瑞之怯懦無能也至武生鄭其仁在東港設計擒賊焚燬賊藔並約㑹義民往勦水底藔賊匪殊属出力著常青酌量賞給頂帶以示鼓勵即以守備用亦可欽定平定臺灣紀畧卷四十六
