  text: 欽定四庫全書欽定平定臺灣紀畧卷十三
  hash: sha256:3e90c29c8592a0504c023448e31b149f5fe8f67c85680d668e41c4570cd4a406
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_013-1a, image: WYG0363/WYG0363-0141c.png}
body:
  text: 四月初五日壬寅李侍堯奏言接兩廣總督臣孫士毅咨稱前調粤兵四千名第一起於本月十六日起身計二十三四等日可到厦門臣隨於二十自泉起程往厦門料理辰刻抵南安縣接黄仕簡咨㑹知鳯山城又被賊佔戍刻行至沙縣又接常青来札備述臺地情形并增調兵七千查前據同知楊廷理禀臺地現有之兵只有一萬三千餘名而該提鎮等以之分派府城鳯山諸羅鹿仔港淡水五處本屬備多而力分毋怪左支右詘不能奏功轉致失事今鳯山既䧟郝壯猷損折之兵不下一千六七百名則兵力益覺單薄㸔來常青所請增調七千之數實不可少賊既乗鳯山之勢來攻府城據常青奏已在離城十里之外則目下第一以保守府城為要務倘稍有疎虞益難辦理幸總統大員一到人心稍定兼以所解銀餉據各委員禀報亦俱於初八九等日運至府城可籍以守禦適粤兵將次到厦門係二百五十名為一起臣擬每到兩起即令開駕一次先往助守算來事機尚可相接不致緩不及事至常青請調南澚金門銅山海壇各營兵二千名粤兵三千名浙兵二千名想係尚未接到臣先調粤兵之信今查金門銅山等營調派出征者已多本營存兵無㡬處處海疆未便再撥粤兵既調四千已過常青所請之數亦難再調惟浙省與閩省毗連從前常青曾札知撫提二臣預備兵三千今臣一面知㑹琅玕陳大用令將原派之三千名星速由陸路來閩以資接濟但郝壯猷已折耗兵一千六七百名則即增調七千亦僅多五千餘名而府城鹿仔港兩處俱係極要勢不得不分撥一經分撥則以之守禦雖有餘以之進𠞰又不足應請再增調浙兵一千於𠞰捕事宜庻更得濟惟常青所請七千名悉赴府城現令普吉保㑹同柴大紀𠞰捕斗六門之處似覺專顧府城而委鹿仔港於孤注查鹿仔港距大里杙僅四十里去冬陳邦光等之易于剋復以林爽文正在南攻府城是以得乘虛收復匪徒時出肆擾其勢更重於南路是此時之鹿仔港比舊時之鹿仔港逈然不同任承恩普吉保等雖不能奮勇𠞰殺而鹿仔港至今得以無恙究亦頼此三千八百餘兵之勢隠為形援若將此内普吉保之一千六百兵分往諸羅林爽文探知任承恩兵單來肆兇逆任承恩必不能支將鹿仔港亦不能守鹿仔港不守則蚶江遂無進兵之口於臺地全局大有闗係臣初接黄仕簡咨㑹恐府城兵少原擬將粤兵四千盡改由厦門赴府城今接常青調普吉保往攻斗六門之摺稿只得仍照原奏以粤兵二千五百赴府城一千五百赴鹿仔港俟浙兵到日或應兩路各派一半抑或多寡酌配之處俟探聼鹿仔港光景再行酌辦再查澎湖協為臺郡咽喉本有兵一千八百餘名因黄仕簡兩次調取一千名赴臺灣應用該協兵力殊覺單薄蚶江與鹿仔港相對順風一二日可以直達亦不可無兵備禦查去冬臺匪滋事時前督臣常青曾調汀州兵五百名邵武兵三百名在汀漳交界之永定上杭二縣駐劄以待調用今已另調兵前赴臺灣而澎湖蚶江二處均闗𦂳要是以臣將駐劄永定之汀州兵五百名調往澎湖駐劄上杭之邵武兵三百前往蚶江庶要地均屬有備奏入上命軍機大臣傳諭常青李侍堯琅玕陳大用曰浙省兵丁素性懦弱朕南巡時閲㸔浙閩兵丁技勇浙兵與閩兵角藝即形畏怯况現在臺灣賊匪皆係閩人之慓悍者閩兵攻𠞰尚不能勝何况浙省之兵更不如閩省調往協𠞰豈能得力是以昨據常青奏調已傳諭琅玕停止今據李侍堯奏為海疆𦂳要存兵無多請於浙省派撥所奏亦是此項浙兵止可分撥内地海口各營協防若以之進𠞰自不若本省兵丁為得濟自應遵照所降諭㫖在閩省各營先行抽撥以資接濟其浙兵到閩時竟留於内地防守亦足以資彈壓至李侍堯請調浙省兵丁四千名較之常青原調浙兵數目已多二千名昨又經朕籌及閩省駐防滿兵自較緑營為優則此一千滿兵抵浙兵二千况係常青舊屬已諭恒瑞揀選一千名帶往㑹𠞰此時李侍堯止湏調浙省三千名自屬敷用且浙省兵丁温衢地方距閩較近該處兵丁在浙省中稍為疆健著琅玕陳大用即於該二鎮所屬各營揀派兵丁三千名速赴閩省交李侍堯酌量派撥至李侍堯奏鹿仔港一路現經常青調去普吉保兵一千六百名分往諸羅恐任承恩兵單力薄不能支持等語所慮亦是但任承恩種種玩悞漫無調度即留該處亦終不能得力昨已降㫖將藍元枚授為㕘贊帶領閩兵二千前赴常青處㑹勦今思常青既有粤兵四千並駐防滿兵一千及存城各兵足敷進𠞰其藍元枚所帶兵二千名竟著由蚶江配渡前赴鹿仔港藍元枚到彼接代後將任承恩送回内地即行拿問解京再藍元枚係領兵大員自應賞戴花翎以示威重伊於江南提鎮任内如曾經賞過則已若未賞過著常青即傳㫖賞戴俾益加感奮力圖自効再常青奏賊匪攻得鳯山乗勢來犯府城已到十里之外是其自來送死雖閩兵甫經失利不足倚恃而常青可以簡其精壯鼓其勇氣未始不可以逸待勞設法堵截𠞰殺亦足破賊人之膽該將軍接奉此㫖即將如何殺退賊匪之處迅速奏聞初八日乙巳琅玕奏言准常青咨㑹臺灣賊勢䲭張所有浙省原備兵二千名仍調撥由鹿耳門進口並令刻日起程又准督臣李侍堯咨㑹奏明調撥浙省原備兵三千名再于距閩附近各營添派兵一千名由陸路分起儹行馳赴厦門配渡查浙省前經酌撥備調兵三千名雖已准咨撤令歸伍而一切戰械火藥鉛彈等項俱已備辦齊全此時即可按名調齊起程至現需添派兵一千名查衢州鎮標距閩甚近自應即于該鎮各營派調以敷四千之數當即飛咨提臣陳大用督同各鎮臣迅速調齊派委勇練將弁督押統領立即由陸路分起儹程前進沿途照例支給兵糧飭令各該道府各在本境督押照料遄行並委藩司顧學潮杭嘉湖道清泰分往各路沿途督辦查催並咨㑹閩省督撫臣飭屬一體接䕶支應奏入報聞初九日丙午孫士毅奏言前據常青究出廣東後溪鳯花亭洪二房和尚及朱姓人犯知㑹宻拿恵潮等屬並無其地惟風聞嘉應州遂鄉堡地方廟後有亭其後半被火燒燬内有洪和尚及朱姓等經姚棻宻委惠州府知府顧聲雷等馳赴確查並無遂鄉堡地名各堡内亦無曾經被燒廟宇復查靈峯寺有洪朗洪科二僧與俗家朱姓十七八嵗僧人立嵩同住與閩省來咨恰合委員隨往搜查寺僧七人並無不法字跡所供住址族屬俱在附近歴歴可查左右亦無溪亭寺後亦無曾經被燬之事寺鄰耆老保甲僉供平日並無為匪願具保結各等情又訪有海陽縣南山寺和尚耀珠俗家姓洪有子秀節現在潮陽黄隴庵為僧並據潮陽縣知縣台霖布將秀節押解到郡確訊實係安静焚修並無為匪情事此外惟潮陽一縣洪朱二姓頗多大半皆係晒丁其餘悉屬種地農民並無和尚亦無洪二房名目嗣又續獲㑹匪林功裕供出福建平和縣人林三長勾引入會曾經告以朱洪徳姓名臣在省時㑹同撫臣圖薩布提并先獲之許阿恊等對質又供有洪李桃係屬和尚家住漳浦縣榕樹脚向在龍溪縣東門外福連寺出家又有頭人李九陶是平和縣小溪鄉人等語其於洪朱等犯名姓亦似畧有端倪並知㑹閩省宻為存記臣抵潮後又據饒平海陽等縣禀獲陳阿塔余阿緒二犯所供入㑹情事與許阿恊等大畧相同臣思此等匪犯行踪詭祕斷不肯將不法字跡及往來交結等事輕露於人兹復欽奉諭㫖閩省搜出賊匪書稿現有廣東鳯花亭髙溪庵馬溪廟洪姓結盟之語鳯花亭雖現在查無下落其髙溪庵馬溪廟自必實有其地一經查得即可從此跟求臣已宻懸重賞分派妥員嚴切偵緝凢有寺廟聲音相似形跡可疑者亦即徹底跟查毋使倖脱仍知㑹李侍堯常青此後拿獲匪犯活口即就近跟究鳯花亭髙溪庵馬溪廟三處實係粤東何縣地方星速咨臣查辦則得有確實州縣查拿更易為力又查閩省徴調粤兵四千名自三月十六日起至二十二日潮州鎮標兵俱已起程計三月二十三日此一千名全數俱入閩省詔安縣境臣在潮㸃騐起程即於本日馳赴黄岡照料其餘各營水陸官兵接續前進斷無遲悞再粤省兵丁此畨渡臺𠞰捕水陸共四千名臣每起面加鼓勵察㸔情形頗知踴躍赴公似應遇有粤省派兵營分千把外委及馬戰兵丁缺出請先儘軍營拔補以示激勸奏入上命軍機大臣傳諭孫士毅曰粤省訪出之洪姓和尚等既訊明實非此案匪犯自不必累及無辜但洪姓和尚及朱姓乃倡㑹結盟要犯前經閩省拿獲偽官楊軒供出嗣搜出賊匪書稿内其所開姓名住址又復與楊軒所供相同是其人自必仍在粤省外省地方官習氣往往迴䕶前非于緝捕事件一經查無踪跡禀報之後即或續行查出慮及前此查辦疎漏恐致獲咎不肯據實稟出一以烏有完事最為可惡著孫士毅務宜詳悉開導諭以該犯等現雖查無下落如將來查有鳯花亭等地名仍當據實禀報其從前疎漏之咎俱可寛免倘從此跟求果能弋獲正犯並可仰邀陞擢若敢始終迴䕶别經發覺必當加倍治罪如此反覆曉諭庻各該員知查出後無過有功必能認真購緝不至始終迴䕶轉令要犯得以漏網十二日己酉常青奏言總兵郝壯猷帶領副將丁朝雄㕘將那穆素里遊擊蔡攀龍都司羅光照等帶領兵丁二千一百名前赴南路進𠞰在大湖劄營月餘雖間得勝仗究未能前進嗣經黄仕簡添撥遊擊延山鄭嵩各帶兵五百名助戰于二月二十一日抵鳯山縣城賊匪退走僅存空城黄仕簡因安平海口𦂳要調副將丁朝雄回安平扼守又因賊匪欲來攻臺灣府城調遊擊蔡攀龍帶澎湖兵八百名回郡堵禦郝壯猷尚帶官兵二千餘名足資堵禦乃三月初四日因㕘將瑚圖里自山猪毛被賊攔截郝壯猷派令遊擊鄭嵩帶兵接應行至硫磺溪遇賊圍截官兵䘮失甚多賊匪遂蜂擁而至郝壯猷退守縣城初八日賊衆進城官兵潰散該總兵郝壯猷㕘將那穆素里都司羅光照等陸續回到郡城潰回兵丁計七百餘名遊擊鄭嵩被鎗傷陣亡是鳯山已經收復之後旋即失守實由黄仕簡調撤失宜總兵郝壯猷不能抵禦以致敗衂該提督黄仕簡已摘去花翎解任總兵郝壯猷臣亦即飭令摘印并去花翎頂帶相應請㫖將黄仕簡郝壯猷交部治罪其㕘將那穆素里都司羅光照守備黄喬一併革職暫留軍前効力贖罪再臺灣逆匪滋擾上年十二月内叠次迫攻府城經總兵柴大紀督同臺灣道同知等率帶義民鄉勇奮力堵殺保固郡城迨柴大紀克復諸羅之後據報屢次𠞰殺賊匪生擒賊目實屬奮勉出力臣已傳㫖加恩賞戴花翎將水師提督印務交與暫署任承恩陸路提督印信暫交普吉保䕶理再臺灣本地戍守兵丁共一萬二千餘名經三縣被䧟傷亡已多其内地調來臺灣𠞰匪兵丁共一萬餘名除分撥三路進兵亦有傷亡逃散府城駐防班兵甚少業已飛咨李侍堯續調本省内地及廣東浙江共兵七千名配船渡海俟兵到三四千之後臣即親自統領由南而北務將賊匪首夥盡數擒獲其各路擒獲賊匪將要犯飭令解赴内地李侍堯審辦其餘賊黨臣即就地審明辦理奏入上命軍機大臣傳諭常青李侍堯曰郝壯猷身為總兵大員于賊匪復犯鳯山時既不能先事防禦又不能督率弁兵奮勇殺賊濳回郡城似此恇怯倖生若不明正典刑何以肅戎行而昭軍紀此豈徒交部治罪可以完事者早經降㫖令常青將伊正法以示懲儆諒常青發摺時尚未接到耳至臺灣現有兵丁經屢次挫損不免氣餒常青不可不大加振作如兵丁臨陣時有一二畏縮退避者即立時正法懲一儆百即將備内有恇怯不前者亦即一面正法一面奏聞而才能出衆奮勇殺賊之兵弁即奏請破格超擢今賞去翎子以備鼓勵戎行之用俾知死生呼吸之際退則必死進則可以殺賊立功邀恩拔擢即不幸陣亡國家自有優䘏如此賞罰嚴明自必人人知所感奮可期鼓勇集事常青雖未經行陣而行軍之道信賞必罰朕屢加訓諭該將軍尤宜遵照妥辦也至總兵柴大紀普吉保功罪原不相掩前已有㫖令柴大紀署理陸路提督普吉保仍留軍營俱令帶罪督兵以觀後效果能奮勇出力不但宥其前罪並當旌錄其功現在曾經行陣之侍衛章京内派出八員即日啓程令其晝夜星馳前往但臺灣距京較逺到彼究湏時日著傳諭常青不必待伊等到彼始行進𠞰以致稽遲俟所調粤兵四千名及駐防滿兵一千名到齊酌量可用時即行帶領直搗賊巢生擒首逆務湏奮勇持重計出萬全以期迅速蕆事藍元枚前已降㫖調補水師提督授為㕘贊令其速赴鹿仔港㑹𠞰該提督目擊黄仕簡任承恩之觀望遷延身罹重譴自當益加奮勉再前據常青奏賊匪攻得鳯山乗勢來犯府城已到十里之外等語此次摺内何以未將如何𠞰殺之處奏及朕心甚為懸切著該將軍即將如何籌畫擒殺賊匪情形迅速奏聞臣等謹按行軍紀律嚴明有功必錄有罪必誅則人人無倖生之心方克集事郝壯猷於賊匪來犯鳯山時不能督率弁兵竭力抵禦乃竟退回郡城希冀倖免我皇上立命於軍前正法並將其棄城濳回是以按軍法從事縁由明白飭諭俾三軍共知畏怯倖生必至身罹重辟羣相警戒並命於弁員内如有才能出衆奮勇殺賊者即行奏請破格超擢鼓勵戎行之道真無所不至宜將士等人人用命踴躍争先所向無敵也歟同日李侍堯奏言臺灣保聚尚完者惟府城及鹿仔港等四五處而府城為全郡根本鹿仔港亦進兵要口且近大里杙此兩處必湏保固方可措手現在粤兵到厦已有四起臣令隨到隨即登舟一候順風即行開駕但得先到數百名人心即定并知有大兵繼至更當轉怯為壯其鹿仔港一路臣現擬將粤兵内先撥一千五百名前往俟浙兵到日再派往二千名兵力既厚并可無俟常青南路之兵來㑹即直搗賊巢庻南北兩路俱有重兵𠞰殺賊勢自當潰散昨以粤兵每起二百五十名尚覺遲緩復札商孫士毅併為五百名一起計四月初十日前粤兵二千五百俱可到齊其一千五百名之赴蚶江者亦相繼入閩適署提臣藍元枚查察海口來至厦門因留伊在厦照料催䟎臣於數日内即至蚶江料理兩路均可不致遲悮再此次粤省官兵縁督臣孫士毅預行選派皆年力强壯㸔來甚可得力又於各兵内擕帶火藥三萬觔之外另備五萬觔解閩接濟查閩省雖不缺乏然火藥要器多為預備益覺寛裕將來用過若干仍可按數歸還再粤省第二起官兵自海澄縣水路赴厦兵丁曾得髙等一船到嶼仔尾地方有盗二十餘人駕船來刼兵丁受傷者六人失去鳥鎗腰刀等物查厦門係水師提督駐劄之地嶼仔尾離厦不過十餘里又臣方在厦門而盗賊已肆行無忌若此可見戎政廢弛遂使瀕海之地竟為盗數此等匪徒縱未必係臺匪黨羽而縱横洋面乆為商民之害并有盗刼兵船之事更屬目無法紀似此怠玩之文武若不嚴㕘示儆無以肅吏治而飭營伍請將海澄縣知縣侯謹度水師提標中軍守備李光輝革職留於地方協緝勒限一年如限滿不獲再行交部治罪其石瑪通判安靜水師㕘將王祖烈均有督率之責咎亦難辭請將該二員交部嚴加議處至總兵羅英笈於所轄地方全無整飭應一倂交部嚴加議處又現在押解臺灣逆匪林小文等四犯林小文蔡綱係紏衆為逆之犯廖攀龍係海口山汛把總曾將火藥四五十觔送與賊目何朝英係已革外委曾在扈尾與官兵打仗奏入上諭内閣曰沿海地方盜賊出沒最為商民之害甚至駕船行刼渡海官兵不法已極該管地方文武員弁並不能立時緝獲非尋常疎縱可比侯謹度李光輝俱著即革去頂帶暫行留任勒限半年在該處緝捕總兵羅英笈亦著即革去翎頂暫行留任在該處督緝其通判安靜㕘將王祖烈均著革去頂帶暫行留任督緝務於半年限内將盜犯按名緝獲速正刑誅如限滿不獲即著該督㨿實㕘奏分别從重治罪上又命軍機大臣傳諭常青李侍堯曰李侍堯奏洋面盜案摺内稱此等匪徒未必係臺匪黨羽所見實未周到該犯等膽敢在洋面駕船肆行刼掠甚至執持鳥鎗藤牌等械傷害商旅已屬不法且現在粤省調赴叠灣𠞰捕賊匪之兵衆所共知該犯等輒於嶼仔尾地方駕船行刼與兵丁互相格鬥安知非林爽文等探知消息令其黨羽在中途刼掠以挫鋭氣而緩行程何得僅以尋常海洋盜犯辦理李侍堯自因現在籌辦一切事緒繁多心曲紛亂未能見及於此至閩省地方文武員弁於緝捕盜犯全不認真使瀕海之地竟成盜藪廢弛已極本即應從重治罪姑念該省現值多事未便遽易生手且該文武員弁若此時即行革職轉可遽離本任置身事外是以降㫖將該員等俱革去頂帶暫行留任在該處勒限緝捕但該縣侯謹度守備李光輝于所屬地方一任盜匪縱横洋面行刼兵船已屬罪無可逭著李侍堯詳悉諭知該員等現止革去頂帶留任緝捕實屬格外從寛務湏實力查拿以圖自贖若限内不能將各犯按名拿獲則是該員等始終怠玩即應在該處正法不能再邀寛宥總兵羅英笈於所轄地方毫無整飭今暫加恩革去翎頂留任緝捕若再不能于限内督率弁兵將盜犯全行緝獲並著李侍堯於限滿時據實嚴㕘亦應寘以重典决不寛貸著李侍堯將此嚴切曉諭俾該員等各知儆畏迅速上𦂳緝拿毋致自罹重辟盖該省正當軍旅之際不可不從嚴辦理也至此等盜犯黨賊逞兇罪在不赦一經拿獲著李侍堯即行審明按名正法一面辦理一面奏聞不必照海洋尋常盜犯之例分别辦理臣等謹按緝盜安民守土之職閩省當臺匪滋擾之時海洋盜匪縱横且敢行刼兵船不法已極而怠玩之地方官實罪無可逭皇上於督臣所擬勒緝一年之期改為半年不獲即立置重典俾人知儆畏庻能實力緝捕奸宄不致漏網因時立法猛以濟寛而猶傳㫖諄諄訓飭所以大震啓其聾聵而禍福仍聼其人之自取者歟欽定平定臺灣紀畧卷十三
