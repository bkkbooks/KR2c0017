  text: 欽定四庫全書欽定平定臺灣紀畧卷四
  hash: sha256:f83f23eb24e966066f268eeff96dce18d85c144a42f6dba6a7a5733edce8c373
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_004-1a, image: WYG0363/WYG0363-0050a.png}
body:
  text: 正月二十七日丙申常青奏言遵㫖仍駐蚶江厦門一帶調度策應務期鎮静不敢少動聲色時飭沿海文武員弁慎宻廵查并與撫臣曉諭居民懸立重賞遇有賊匪潛逃回籍捕獲首報總不使餘孽得以漏網又南澳總兵陸廷柱自願赴臺𠞰賊固屬急公勇徃但南澳地方𦂳接臺灣關係𦂳要今粤省之兵既已派有李化龍帶領陸廷柱自可毋庸再往應飭令速回本任同日徐嗣曽奏言林爽文本係積賊因被拏情急起意抗拒而游手無賴之徒乘機附和烏合遂多兹據報提臣任承恩於正月初四日放洋副將徐鼎士等係正月初八日放洋到臺即有先後要亦不過數日之間提臣黄仕簡係十二月二十八日放洋先由南路鹿耳門進發直抵府城計其統轄之兵陸續已四千八百餘名兵力已厚又鹿仔港北淡水兩路之兵接續前進雖閩人不免慓輕而兵威愈壯三路夾攻必可蕆事至賊匪林爽文係漳州人恐漳人因此自疑今䝉聖明指示無論何處民人從賊者即係夥黨自應按名駢戮果能應募拒賊即係良民自應加以奬賞不應預存岐視臣現已札飭該道府等榜示城鄉明白開導現據漳浦縣羅澤坤禀報拏獲匪犯陳樵訊係賊匪遣回探聴官兵消息業經督臣常青就近提審臣以賊匪遣人探信所遣必不止一人并亦不止一處嚴飭各屬慎宻查拏此後竄逃偷渡回家亦必不少並飭加意防範仍懸賞格諭令親屬鄰佑捕拏首報至一應軍行供支糧餉火藥等項督同司道妥速辦理不敢稍有忽悞又聞黄仕簡抵臺後𠞰捕賊匪開砲打死二千餘人賊俱星散奔逃内山合併陳明再漳浦縣知縣羅澤坤浦城縣知縣鈕琨均經部議降調查漳浦縣濵臨海洋所轄舊鎮一澳與彰化縣之七鯤山相對民俗刁悍稽查不易浦城縣為上游入境首站有稽察文報之事該二縣均不便驟易生手又莆田縣亦係濵海要區為自省至泉孔道現有兵差往來候補知縣郭廷魁厯署繁缺俱能辦理裕如臣現在委令前往署理但亦已縁事降調懇准將羅澤坤鈕琨暫留漳浦浦城之任郭廷魁暫署莆田縣事候𠞰匪事竣再行交卸又閩安協副將徐鼎士亦縁事降調臣現令其帶印領兵由閩安出口前赴淡水八里坌𠞰捕賊匪均奏入上命軍機大臣傳諭李侍堯常青徐嗣曾曰現在該省兵差往來正需熟手所有降調人員自應留本任以資駕輕就熟但該省似此等降調人員自必尚有李侍堯到閩後應於𠞰捕事竣㑹同徐嗣曾核其功過分别辦理此時祗湏彚總咨部存案亦可毋庸逐員特奏也又徐嗣曾奏拏獲匪犯陳樵訊係賊匪遣回探聴官兵消息恐所遣不止一人亦不止一處現經督臣提犯審訊等語此應留心者該督等務須嚴飭各屬慎宻查拏加意防範毋任竄逸偷渡同日孫士毅奏言現在接准閩浙督臣常青咨稱天地㑹根源起於粤東有和尚洪二房及朱姓人住居後溪鳯花亭不知何府何縣地方該犯楊咏等現已解京令臣宻查辦理等因查天地㑹名目起於逆犯林爽文而根源由於該二犯平日必係素為衆匪信奉親近之人實係何府何縣人氏夥犯斷無不知之理臣一靣飭屬宻速查拏一靣札覆常青如再獲有他犯將洪朱二犯籍貫究訊明確立即移知到臣查拏更易就臣臆見總不離惠潮二府民人縁潮郡民人赴臺貿易者多恵郡次之煽惑入夥事所應有臣於上年臈底即嚴飭恵潮二府州縣宻查平日曾經赴臺貿易之人此時曾否回家有無别項詭秘縱跡現據地方官拏獲數人未經究有端倪今思洪姓朱姓此時或現在臺灣抗拒官兵或已潛回粤東惟有即於此項貿易人内切實追求自不難由影響而得實際臣已就近嚴諭潮屬州縣上𦂳設法偵拏此案逆犯將来竄逸必多必湏大員専司督辦已飛札臬司姚棻星速赴潮不動聲色専辦緝拏匪犯一事省城現無𦂳要案件藩司許祖京可以料理撫臣圖薩布二月中旬即可回任為期亦屬不逺又派赴厦門聴候調遣之南澳右營及澄海門營之兵丁五百名分作兩起先行其碣石鎮標之五百名現亦到齊接續前進計正月初十至十六日所有水師一千名俱全數入閩省境同日左翼鎮總兵李化龍奏言抵閩粤交界之黄岡地方經督臣孫士毅㑹同署提臣彭承堯將派撥水師戰兵一千名配足軍火噐械裹帶一月口糧分作四起自初十日起間日行走計十六日俱可入閩省詔安縣境臣察㸔弁兵俱各精壯踴躍臣即定於十六日自黄岡起程統領前往聴候閩浙督臣調遣均奏入報聞二十八日丁酉常青奏言聞提臣黄仕簡總兵郝壯猷副將丁朝雄等所帶兵船俱於初三日自澎湖開駕初四日進鹿耳門登岸提臣任承恩統領各營官兵船隻於初六日齊抵鹿仔港查臺灣郡城前經差探固守無虞其鹿仔港一路署守備陳邦光率同目兵義民四處搜捕焚燬賊巢復擒獲賊夥簡鳩劉實張文林天球林躭朱開六名并聞北淡水署都司易連新莊廵檢王増錞統領兵弁招集義民屢次殺賊惟淡水同知程峻竹塹廵檢張芝馨均已被害又厦門同知劉嘉㑹禀稱賊人已知大兵將到紛紛散去等語伏思賊匪本屬么䯢烏合今兩提臣俱經到臺南北兩路㑹合搜𠞰定可剋期殱滅臣惟嚴飭内地沿海各口岸加𦂳廵查以防竄逸并飛提獲解匪犯到泉究審辦理又浙粤二省前經撫臣徐嗣曾咨請酌撥戰兵原係預為准備俾資策應旋准兩廣督臣孫士毅以臺地逺隔重洋風汛靡定先撥官兵一千由陸來厦現在尚未到齊臣計兩提臣㨗音亦不日可到應否再令前往俟得有確信隨宜斟酌其餘浙粤備撥兵丁仍咨明該督撫各於本境暫駐毋庸遽行赴閩致滋䟦渉至逆首林爽文籍屬漳人臣因慮漳民或有勾串情事但匪徒糾衆豈必定為何處之人若漳泉民人果能應募拒賊即係良民臣惟有核其順逆分别誅賞斷不存岐視之見少露形跡以致漳民疑懼奏入上命軍機大臣傳諭李侍堯常青曰昨據徐嗣曾奏稱黄仕簡到臺後開砲打死賊匪二千餘人賊俱星散奔逃内山等語内山係生畨巢穴向聞遇有内地民人到彼即行殺害但現在賊匪被官兵追𠞰窮蹙逃竄明知一經官兵擒獲萬無生理或將所掠財物賄結生畨容留藏匿或恃其人衆脅制生畨而生畨畏其兇惡任聴竄處並恐將來撤兵後賊匪等轉勾結生畨潛出滋擾更為可慮尤不可不預行籌辦淨其萌孽現在水陸兩提督帶領多兵在臺㑹𠞰自應乗此兵力捜𠞰殱除勿令賊匪得以逃匿負嵎但黄仕簡與任承恩均係提督一同帶兵在彼辦理體制不相上下且水陸各有所轄難以統攝常青於辦理善後事宜自不如李侍堯之諳練而督率搜捕則常青為優著李侍堯抵閩後即駐劄蚶江常青即親自渡臺督同黄仕簡統領官弁將竄入内山賊匪餘黨盡數搜捕務淨根株仍不得因追捕賊匪或致擾動生畨方為妥善其任承恩於常青抵臺後即令先回本任以資弹壓如此庻事權歸一有所責成現在湖廣有舒常署理督常青無湏急赴新任惟當督同黄仕簡悉心妥辦鎮戢海疆以為一勞永逸之計再臺灣地方前聞楊景素在道員任内設立土牛分别内外地界其是否辦理妥協並著常青㑹同黄仕簡於𠞰捕事竣後親往履勘斟酌妥善歸於善後事宜内一併妥辦二十九日戊戌常青奏言官兵登舟之後雖因風阻不能迅速直達但節次探明臺灣郡城固守無虞其鹿仔港及臺北之艋舺等境均有官兵及義民人等互相保䕶較之從前奸民朱一貴滋事全臺失䧟一案情形已屬不同且兩提臣俱經率師前往更易辦理臣已傳知該提臣等務湏併力合攻以期一舉蕆事一俟得有收復各縣及殱匪情形即將拏獲首夥各犯在該處迅速正法并將一切善後事宜留交黄仕簡辦理奏入上命軍機大臣傳諭李侍堯常青曰本日常青由六百里加𦂳奏到一摺以為𠞰滅臺灣逆賊之信及至拆㸔祗係覆奏事件又何必由驛馳遞徒勞驛馬乎常青何不知事體輕重若此前曾有㫖令藍元枚赴閩署理陸路提督並諭常青探聴臺地消息一俟蕆功即可傳知藍元枚行抵何處速回江南本任今思任承恩在臺統兵㑹𠞰於該處情形皆所目擊而松江提督已有人署理現無𦂳要應辦之事著常青俟抵臺後即令任承恩迅速馳驛來京候朕靣加詢問一切其福建陸路提督著藍元枚仍行署理毋湏即回江南本任至林爽文王芬二犯係此案首惡渠魁如經官兵生獲著該督等派委妥幹員弁解京審辦並飭該委員等沿途小心加意防範毋得稍有疎虞致干咎戾二月初一日己亥徐嗣曾奏言聞淡水守備董得魁招集泉民𠞰捕賊匪十二月十八日有原署淡水同知程峻之幕友夀同春用計退賊㑹同俸滿廵檢李生椿及塹城書院掌教之原任榆林縣知縣孫讓率勵義勇收復竹塹追獲賊匪王作等三十餘人正法該守備馳徃塹城協同守禦又署淡水都司易連新莊廵檢王増錞於十二月二十三及二十六七八等日分路𠞰殺大姑坑等處賊匪官兵義民各皆奮勇殺賊百餘人數十人不等先後擒獲陳軒等十名正法奪獲旗桿器械義民間有受傷賊匪雖屢經𠞰殺旋散旋聚現聞提臣黄仕簡總兵郝壯猷皆於初四日由鹿仔港登岸賊匪知大兵已到紛紛散去黄仕簡定於十三日前往收復諸羅陸路提臣任承恩初六日抵鹿仔港登岸亦定於十三日分兵進𠞰查鹿仔港鹿耳門相距頗遙兩提臣先後進口皆剋期於十三日𠞰賊正與聖訓相符而鹿仔港署守備陳邦光於提臣任承恩未到之先又擒獲賊匪簡鳩等六名鹿仔港與北淡水相去較近徐鼎士等兵抵北淡水又復適當其時三路圍攻自必一舉蕆事此時沿海一帶尤宜嚴宻截拏防其竄逸但賊匪内竄必不敢由正口逕入自漳泉興化至福州福寧濵海各縣􅆜港紛岐在在皆可偷渡臣先已嚴飭文武員弁選撥兵役於凡可偷渡之處羅織廵查現復通飭以賊匪洗蕩在即加意堵防毋使一名漏網至郡城既保守無虞而彰化淡水等處又有鄉勇義民恊同𠞰禦大兵一到賊即紛紛逃潰不但無湏隣省策應即本省官兵亦不值多為調派臣知識短淺身親其事不能辨晰實深感愧奏入上命軍機大臣傳諭李侍堯常青徐嗣曽曰此等么䯢賊匪原不過一時烏合現在黄仕簡任承恩督兵㑹合搜𠞰自無難立時撲滅前因徐嗣曽輕離省城恐致人心疑駭曾降㫖飭諭此時人情大定非同前此且大兵抵臺三路圍攻賊匪自必四散潰竄恐有逃至原籍及内地者尤應於各口岸嚴宻截拏徐嗣曾不妨視其地方𦂳要間一親徃各處搜查前有㫖令李侍堯抵閩後即駐劄蚶江督辦一切常青親自渡臺督同黄仕簡等搜𠞰賊匪著傳諭該督等遵照妥協辦理常青抵臺後即令任承恩迅速馳驛來京該提督輕於舉動未免跡渉張皇然究屬遇事勇徃尚無不是今令其來京不過欲靣詢臺地事宜常青可告知該提督毋庸心生疑懼臣等謹按兵貴先聲制人兩提臣於到臺之始賊匪即已望風驚潰小醜技倆於兹可見若能兩路定期㑹𠞰直如摧枯拉朽乃觀望遷延遂使烏合之衆得乗暇廣為紏集愈肆鴟張實屬有負任使賴我皇上神幾逺爥罰不旋踵是以天威震叠即得迅掃賊氛也初二日庚子徐嗣曾奏言遣將調兵本應督臣主政乃臣於派兵赴淡水一節因廵檢王増錞禀請救援廹切急求集事竟一靣奏派一靣咨㑹督臣未及札商辦理事後捫心自訟實屬過渉張皇近於越爼咎無可辭至督臣遇有公事悉皆開誠剖示總以協力同心相為期勉即如臣調兵赴淡水未及待督臣咨覆臣之錯謬已難自解而督臣並不因此稍存意見惟以公事為重虛衷斟酌將所調省兵留省弹壓改用延建之兵由陸赴厦悉皆徃返札商議歸畫一至軍需口糧鹽菜及裹帶戰糧軍火器械船隻人夫等項先經與督臣酌定章程一切水陸運送均無遺悞本日㨿厦防同知劉嘉㑹稟報官兵到臺賊匪紛紛散去定於十三日㑹𠞰收復諸羅等處郡城内外今已照舊生理民情安堵等語官兵剋期𠞰捕自必立就撲滅誠如聖諭此時總以鎮静内地嚴拏逸匪為要臣復又嚴飭沿海文武員弁實力堵拏毋使竄逸同日松江提督藍元枚奏言正月初八日自松江起身晝夜兼程䟎赴已於十九日馳抵福州省城隨訪探臺匪情形自官兵陸續渡臺以後賊衆紛紛潰散現在郡城保守無虞兩提臣剋期㑹𠞰自可即日蕆事但恐賊匪四出竄逸逃入内山與生畨勾結引藏搜捕不免有需時日若偷渡各處海面山箐㨗便之路無不可通尤屬稽捕不易而臺灣語音與廣東之潮州相同此時北風當令海道赴粤極順恐逆匪等尤易於竄徃臣現晤撫臣徐嗣曾詢知閩省各處口岸已經設法嚴宻偵緝臣抵泉後再當與督臣常青實力查拏一面飛咨兩廣督撫提臣等并札飭文武員弁加意訪緝不致一名漏網至臣自入閩境以後察看一路民情俱各寧謐以鄉語諮詢俱似不知有臺灣用兵之事省城亦極寧貼均奏入上命軍機大臣傳諭李侍堯常青藍元枚徐嗣曽曰現在兩提督厚集兵力剋期㑹𠞰自必立時撲滅惟前據徐嗣曾奏黄仕簡到臺後開砲打死賊匪二千餘人賊俱奔逃内山而本日藍元枚亦奏及賊匪竄入内山與生畨勾結將來搜捕需時等語内山雖係生畨巢穴但賊匪窮蹙無歸或以賄結或以勢脅生畨容留藏匿將來大兵撤後潛出滋事尤屬不成事體該督等務湏乗此兵力上𦂳搜捕俾盡根株以靖海疆至賊首林爽文王芬二犯及此外有名頭目如經官兵生獲即選派員弁解京審辦以彰憲典再前已降㫖令任承恩俟常青抵臺後即馳驛來京陛見詢問該處情形其陸路提督藍元枚署理現在江南提督署理有人藍元枚俟任承恩回任後再回江南本任初四日壬寅柴大紀奏言彰屬賊匪林爽文王芬攻䧟諸彰二邑恃衆分路來攻郡城自本月初九至十三連日堵禦殺退賊匪十四日子刻接據臺灣道永福來札知鳯山又被賊䧟隨飭遊擊蔡攀龍帶兵七百名守備邱能成帶兵三百名徃南𠞰捕以復鳯山乃出城未逺即遇賊衆來犯郡城當此盗賊蜂起南北交廹郡城為全臺根本倘有踈失恢復更難查郡城並無墻圍惟以木栅箣竹環繞實不能固守必離城稍逺於各總口扼其要害方可有濟臣相形度勢南則桶盤棧地方距城十餘里可截南路賊衆兼可以應大小東門飭遊擊蔡攀龍帶兵七百名倂南路叅將瑚圖里就此劄營東則舊萬夀亭離城五里可禦中路之賊亦可以援大小南門飭守備邱能成帶兵三百名李歩雲帶兵二百名就此劄營其沿海一帶飭守備林球帶兵二百名把守三鯤身署守備張時泰駕船把守港口併提標金門等標載班兵哨船六隻俱飭駛在大港恊守則安平既嚴西門亦固至北路賊匪雖多臣仍劄鹽埕橋獨當一面倘東南門有急俱可隨時應援署遊擊王天植㕘將宋鼎同道府㕔縣等督率兵民堅守四門遊撃鄭嵩在城弹壓廵查前次城内民人聞風恐懼自鹽城連日戰勝莫不踴躍鼓舞共奮義勇出城助戰似此四靣嚴守雖南北賊勢猖獗郡城可保無虞俟内地兵到隨即長驅前往力圖恢復奏入上命軍機大臣傳諭李侍堯常青徐嗣曽曰前賊匪滋擾鳯山時瑚圖里縱馬由南而去不知下落朕以該􅄁將之不能抵禦由於兵散獨力難支與臨陣退縮者不同曽諭令常青俟事定後核其功罪分别辦理今該􅄁將業已回至郡城率兵堵禦如果奮勉殺賊則功過尚足相抵著常青俟事竣後秉公核實具奏並給咨送京候詢問臺地一切情形再柴大紀摺内稱郡城並無墻圍惟以木栅箣竹環繞官兵難以固守等語前曽諭令李侍堯於臺匪蕩平後將是否可以建城之處酌量辦理今閲柴大紀所奏體察情形彰化等三縣一㕔應否改建城垣尚可俟籌辦善後事宜時確實勘估繪圖妥議請㫖辦理至郡城為全臺根本即應速建城垣以資保障著李侍堯常青一俟事竣即熟商妥議一面奏聞一面興工辦理初五日癸邜上命軍機大臣傳諭李侍堯曰從前辦理􅃡匪時曾調福建水師兵二千名隨同進𠞰該兵丁等沿途滋事鞭責夫役甚將民夫雙耳割去當將首犯正法以示懲儆及隨京兵打仗時又復怯懦竟有聞鎗砲聲恐懼戰慄欲泅水逃避者可見該省兵丁勇於私闘怯於公戰之習牢不可破皆由該省將弁平日不能認真訓練以致軍無紀律著李侍堯於𠞰捕臺匪事竣後實心訓練申明軍律隨時懲創俾各弁兵共凛法紀有勇知方痛改從前積習以作士氣而勵戎行方為有備無患該督不可惟知辦理地方事件為重而轉置軍旅専責於不問也同日常青奏言現在水陸兩提臣俱經到臺内地加調官兵亦接續繼進兵力已屬厚集雖未接該提臣等報有進勦情形已據厦門同知劉嘉㑹差丁自臺回厦稱上年十二月二十六至三十等日官兵與賊打仗殺死賊人甚多收奪器械無數正月初四日黄仕簡官兵到臺賊匪紛紛散去聞大兵現定十二三等日長驅㑹𠞰郡城内外照舊生理民情安堵又據蚶江船户張淡等禀稱陸路提臣於正月初六日到鹿仔港上岸十一日殺死賊人七名祭旗等語是該提臣等到臺之後已自相度情形㑹齊進𠞰以期一舉蕆事正與不用零星打仗輕於嘗試之諭㫖相符再臣與撫臣徐嗣曽共事日乆一切地方公務無不和𠂻辦理今臺灣逺隔重洋匪徒竊發恨不滅此朝夕臣與徐嗣曽俱有同心袛因臣駐劄泉州距省較逺以致續調官兵稍有參差並非各存意見况軍務尤闗𦂳要臣不敢因此生嫌至該處商民等保䕶地方率先向義洵屬可嘉已咨水師提臣黄仕簡於事竣後逐一查辦又提訊盤獲匪犯陳樵㨿供籍𨽻漳浦乾隆五十一年六月渡臺在彰化縣大肚地方宰猪營生與林爽文㑹黨許溪熟識許溪邀入天地㑹陳樵應允十一月初二日該犯同郭盞呉帶陳榜呉汴李積郭却阮擇薛指林倚趙榮林載生等共十二人齊赴麻園莊王芬家内入㑹嗣林爽文攻破大墩營盤殺害官兵該犯係帶竹篙鎗在埸附和林爽文等懼内地發兵徃𠞰經許溪付給該犯畨銀十圓囑令搭船内渡探聴官兵十二月初二日陳樵赴大安港撘船於二十八日飄至漳浦古刹僻處上岸聴聞各處查拏嚴𦂳不敢回家躱匿附近之陸鰲山内於五十二年正月初三日經漳浦縣兵役拏獲至天地㑹名色不知起自何時等語審明後即將該犯正法其家屬財産及在臺匪夥分飭嚴拏照理妥辦至漳浦縣羅澤坤於陳樵上岸潛匿即經㑹營拏獲應請免議其臺灣失察偷渡之文武各職名仍俟查明另恭又弹壓臺灣府城叅将宋鼎遊擊鄭嵩等因防守小北門把總髙大㨗逃赴鹿耳門覔船内渡隨差外委鄭廷棟前徃鎻解到郡詰問㨿供懼賊勢猖獗欲赴内地隨將高大㨗即行正法辦理尚屬妥協奏入上命軍機大臣傳諭李侍堯常青徐嗣曾曰現在大兵已到賊匪望風膽落潰逃四散黄仕簡任承恩統領官兵剋期分路進𠞰㨗音何以至今遲滯未到林爽文等於光天化日之下紏衆不法攻佔城池戕害文武官弁實屬罪大惡極神人共憤所有逆惡渠魁及有名頭目務湏按名擒拏殱戮如經官兵生獲即選派員弁解京盡法處治不可任其逸八内山搜捕需時該督等更湏窮究黨羽按名從嚴辦理務使净盡以靖海疆方為妥善上又諭内閣曰緑營恇怯積習最為可惡在兵丁臨陣脱逃已屬大千軍紀况髙大㨗身係把總當臺匪滋事之時帶兵防守輙敢擅離郡城首先逃避情罪更重自應立正典刑以肅軍令該㕘將宋鼎等一聞髙大㨗逃赴鹿耳門之信立即鎻解到郡㑹同訊明正法所辦甚是武職中㕘遊等官雖非專閫大員於例不應專戮但行軍之際非尋常無事時可比該㕘將等能知事之輕重一經訊明脱逃屬實即㑹同該道將髙大㨗先行正法使在事兵弁咸知敬畏甚屬能事可嘉宋鼎鄭嵩左淵王天植俱交部議叙仍著事竣後俱給咨送部引見向來逃兵拏獲尚且即行正法况髙大㨗以武弁委城脱逃尤為可惡雖已正法尚不足蔽辜著該督查明伊子奏聞發遣並將辦理縁由著該督撫通行曉諭緑營弁兵使知避賊潛逃希圖倖免不但戮及其身即其子嗣亦難邀寛宥庻懲一儆百不敢復蹈恇怯惡習欽定平定臺灣紀畧卷四
