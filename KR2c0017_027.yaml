  text: 欽定四庫全書欽定平定臺灣紀畧卷二十七
  hash: sha256:747716740eb4343e58ff288488504cea8142e77a3bf09e7b8b34a826b0dbcfa6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_027-1a, image: WYG0363/WYG0363-0297a.png}
body:
  text: 七月二十三日戊子存泰圖薩布同奏言初四初五兩日㑹同副都統臣博清額柏廷翰傳集滿漢八旗及水師旗營各駐防官兵逐加挑選共足一千五百名察看各官兵年力俱屬强壯勇徃必能出力剿賊隨照例㪚給俸賞行裝鹽菜銀兩備足軍火噐械派定協領佐領防禦等官共三十三員分作四起行走以三百七十五名為一起七月初七頭起自省啓行按日接連前進副都統臣博清額統領第四起官兵起程由水路晝夜兼行至龍川縣起岸過山仍由水路至潮從黄岡入閩境現在河水通達船隻便利迅速至官兵自省起程臣等督同藩司許祖京及府縣等親赴河干照科登舟至龍川起岸至清溪派委肇羅道阿章阿支給人夫隨路弹壓由清溪下船至潮州派委惠潮嘉道圖畢赫撥給船隻接替䕶送仍飛咨督臣孫士毅照料出境其官兵日逐應需口粮俱飭各府州縣預備隨到隨發免致停留至此次駐防各官兵應支分例先於司庫動項支給容俟彚案造報同日圖薩布又奏言粤東所屬州縣地方民多濱臨洋海而附近省城沿海各隘口尤闗𦂳要臣節次與督臣孫士毅􅊾飭文武慎宻嚴查現在添調官兵赴臺恊勦誠恐地方稍有疎懈奸匪乘機竄逸臣現飭各州縣㑹同營汎於沿海隘口加𦂳巡查凡船隻收泊港澚遇有踪跡可疑其船户梢水若非本處歇家行店素相認識難保無臺灣逸匪及洋面奸徒一經盤查得實即行拘拿觧究務湏不動聲色嚴宻辦理使匪踪無所潛伏以靖海疆再與藩司許祖京酌商將庫貯上年潮屬觧存榖價内洋錢十四萬九千餘兩撥出凑觧將餉銀扣存司庫扺補榖價並於省城佛山二處市舖公平兊换凑足全數現在已將洋錢七萬八千圓於本月初六日委員先行批觧起程此後趕𦂳易换定於本月内全行委觧不致遲悞均奏入上諭軍機大臣傳諭李侍堯孫士毅圖薩布曰臺灣與粤省毗連非江浙遼逺者可比保無有匪犯竄逸自應嚴宻查拿但販貨商人俱係家道殷實豈肯藏匿匪徒自取重戾該督撫等遇有形跡可疑者必湏留心盤詰若遇到口商船概行查訊則商販等聞風裹足将來商販不通百貨騰貴於閭閻民食大有闗係着李侍堯孫士毅圖薩布飭屬不動聲色設法妥辦毋得紛紛悞拿徒滋擾累二十四日己丑上命軍機大臣傳諭李侍堯曰前據常青等奏恭將瑚圖里自山猪毛帯領官兵義民來營所辦錯謬之極已將常青恒瑞嚴行申飭令反覆思之常青等於此一事愈覺其辦理失當雖已諭令常青等將辦理錯悞縁由傳㫖曉諭義民令其速回本處自為守禦並令瑚圖里親自帯兵䕶送以安其心而勸来者但前降諭㫖到彼尚需時日已恐無及若賊匪等乗義民逺離本庄已將其家屬房産焚刧殘燬以致義民等受累灰心并致他處義民聞風裹足不肯踴躍投効是皆由常青等措置乖張貽悞事機朕必當將常青等從重治罪著傳諭李侍堯將此事情形是否如此其意以為何如就其所見據實宻陳此事勿得稍有宣露令常青等聞知心懐疑懼更於事無益也臣等謹按將軍常青等留廣東庄義民在營助勦並不先將願留之故奏明我皇上以義民既留大營其本庄無人守禦必致遭賊擾害既嚴加申飭指示其措置之乖方而猶慮及䕶送歸庄事或無及聖天子念切民依痌瘝在抱厥後粤庄義民始終出力不倦固因能知大義亦由感發而愈激其天良也同日李侍堯奏言臺灣額征地丁庄租鹽課等項毎年計銀五萬九千三百餘兩應行觧司兵馬建曠扣缺養亷并文武各員借支各雜項毎年又不下三四萬兩歴係扣存府庫劃兊戍兵餉銀如上兩年奏銷之銀於下兩年請領兵餉内扣収以省彼此運觧之煩着為成例上年臺灣請領五十二年分官兵俸餉養亷銀共一十七萬五千一百餘兩經署藩司李永祺照例劃扣司庫銀一十萬二千五百餘兩飭令將収存府庫銀兩撥出支放在案兹據布政使覺羅伍拉納等詳稱前項存貯府庫銀兩故守孫景燧任内墊用無存兵餉不敷支放請先行給發臣查賊匪滋事係在上年十一月以後而本年臺灣兵餉應動支五十年完觧之銀該年徵収銀兩業經奏銷全完實貯府庫並應行觧司各雜項亦俱扣收在庫與本年官庄地畆賊匪擾害無可徵收者全不相涉乃據稱孫景燧任内墊用無存其墊作何項係何員任内墊用並未有報案顯係虧空本應查明恭奏分别追賠但現當勦捕逆匪之時不使遽行查辦一面飛飭藩司將劃扣銀一十萬二千五百餘兩照數撥出委員迅觧臺灣以備支放并令查明陣傷亡故未回兵丁按照出缺日期將餉銀扣貯府庫歸入下年支放之用仍飭將支放日期官兵花名清冊并扣除亡故兵丁名數造報查核以杜影射挪移情弊又泉州府馬巷通判陸士錕於該㕔地方米船被竊並不上𦂳嚴拿盗犯任聴家丁差役私賣賍米及事主認領又不全行給領請將陸士錕革職奏入上命軍機大臣傳諭李侍堯曰臺灣庫貯銀兩原存為兵餉支放之用且係五十年徵収錢糧實貯在庫之項與去嵗冬底被賊滋擾官庄無涉何得稱墊用無存孫景燧在任釀成事端又復任意虧缺即應叅奏查辦乃該督請於事竣後再行辦理試思孫景燧業已身故將來又復向何人查究乎現已降㫖諭令琅玕將孫景燧原籍貲財嚴宻查抄以抵官項至陸士錕當軍務倥偬之際並不嚴訪盗賊乃於商船被刧轉從中侵漁吞匿是不但因該商被盗乘人之隙肆行侵隠而且乘國家有事任意貪婪似此居心真與盗賊無異僅與革職不足蔽辜着李侍堯將陸士錕即行革職拿問仍計賍科罪至李侍堯現值閩省地方廢弛之時正當寔力整飭乃於此二案辦理失之寛縱若此殊屬非是著傳㫖嚴行申飭用兵之際諸事宜嚴李侍堯不宜如此做好人也上又命軍機大臣傳諭琅玕曰臺灣府庫貯兵餉等欵銀兩係五十一年奏銷以前徵收錢糧實貯在庫與本年被賊擾累官庄無涉何得藉稱墊用無存明係孫景燧挪移虧空無疑孫景燧係臺灣知府平日於地方事務既漫無整頓以致釀成林爽文等糾衆不法肆行滋擾之事而於庫貯銀兩又復任意虧缺是其侵漁歛怨激成事端不可因已被賊害而寛其罪使其家屬仍坐享豐厚著琅玕即將孫景燧家産查封以抵官項同日李侍堯徐嗣曽同奏言本年應辦乾隆五十一年奏銷因臺匪林爽文滋事先准臺灣鎮道等以淡水諸羅鳳山彰化等㕔縣被䧟恢復倉庫欵項必湏逐一清查方可核實造報請俟勦匪事竣另行詳報而内地各案奏銷因逆匪尚未勦滅現在進兵一切軍火銀米分派各屬辦運自上年至今各員或支應差務或碾運軍粮或稽查口岸均須親身經理而於盤查倉庫核造冊籍等事一時難以兼顧且司道等又隨同在泉州辦理接應軍需事務所有奏銷案内應造冊籍俱未能隨時核辦請將閩省應辦乾隆五十一年分奏銷各欵展限兩個月其臺灣府屬各欵仍俟勦匪事竣另行飭查造報俾得寛其時日庶辦理不致錯悞奏入報聞二十五日庚寅李侍堯奏言現在粤浙等兵正當東渡臣更擬多撥銀米火藥等項稱此兵船配渡之時委員隨同觧徃尤為妥恊將来如更有續觧銀米該二處既各有派徃䕶防之兵船當亦不致疎失至就漳泉兩處募補兵丁二千名現在情應入伍者甚多不過旬日即可足數所有擬調之浙兵二千已咨明浙省撫提二臣停止調遣再臺灣殉難各官或素係貪殘則殞命亦難贖釀禍之罪或尚稱亷謹則捐軀自當邀死事之褒事闗勸懲未可草率現在留心細訪務得確實再行陳奏再查前調之閩兵二千粤兵二千目下已早到臺郡又續調之粤兵四千本日頭起五百名已到厦門其餘各起有路逺未能即到者准孫士毅扎稱現在嚴催進發又浙省之駐防滿兵已據報於六月二十六日起程粤省駐防滿兵雖未報起程日期大約本月下旬俱可到厦臣現在厦門料理自當令其隨到隨即登舟俾迅速前徃至北淡水一帯近據同知徐夢麟禀稱逆首林爽文遣賊至彰淡交界之大甲溪等處滋擾副將徐鼎士已帯兵来援藍元枚亦遣守偹潘國材帯兵由海路前来率同該處義勇於六月十八及二十一二等日連次接仗等語查所調漳州兵徃藍元枚處者現已在途俟粤兵到時再分撥二千前徃則藍元枚處新舊官兵亦不為少現令常青藍元枚等多募義民鄉勇并從賊而自㧞來歸者亦准食兵粮常青藍元枚等自必共相恊力定可逐段推廓臣惟有料理粮餉寛裕觧徃俾足供支給不敢稍有缺悞奏入報聞二十六日辛夘上命軍機大臣傳諭常青恒瑞曰本日詢問常青賫摺差弁饒成龍據稱將軍劄營在小南門外十里之桶􅌉棧地方自五月二十四日以後與賊人打仗數次因賊人四路抵禦未能前進賊目莊大田所踞南潭距桶􅌉棧營􅌉只有五里等語常青等自駐劄臺灣已經數月其桶盤棧營盤相距南潭不過五里該將軍等早應統領大兵將賊目莊大田先行勦除乃惟知結營自守似此肘腋之間任其逼處竟不思乘勢攻勦實不可觧前以為南潭離大營尚逺故屢次諭令該將軍等酌留官兵固守營盤親統大軍舍南趨北與柴大紀藍元枚㑹同進剿此時如尚未啟行該將軍等即行帯領官兵速將五里外南潭屯聚之莊大田痛加勦洗以清肘腋豈有近在數里之内而束手坐待之理且此次續調兵丁其粤兵二千昨據李侍堯奏業經配渡前徃其餘淅粤官兵自己陸續到彼常青等正當乘其新到鋭氣相機進取詎可曠日持久坐失事機上又命軍機大臣傳諭李侍堯徐嗣曽曰前因臺灣勦捕逆匪需用軍糈且漳泉一帯地方缺雨恐米粮市價昂貴民情不無拮据已有㫖諭令該撫查明妥辦並節經降㫖於浙江江西江南四川湖廣等省派辦米共一百餘萬石令該督撫等迅速運閩接濟是閩省米石日逐充盈除應付軍糈之外儘有多餘漳泉二府如有缺雨成灾處所該督撫務須詳悉查明一面奏聞一面即行督飭所屬妥為撫䘏俾閭閻均沾實惠無使一夫失所以副朕軫念民依至意二十七日壬辰常青恒瑞同奏言南路之賊仍在南潭一帯負嵎不散顯係北路賊勢鴟張故敢有心窺伺臣等於二十八日令侍衛烏什哈達等率同逰擊孫全謀並恭將瑚圖里管帶弁兵臺灣道永福亦派同知楊廷理守偹銜莊錫舍督率義民協同官兵前徃捜捕由鯽魚潭至埔姜頭庄見賊數百向前追殺直至蜈蜞潭溝焚燬賊藔十數間當有南潭賊匪三四千擁來官兵齊放鎗砲打死賊數十人殺賊十餘人賊遂敗退因該處溝徑﨑嶇不便追趕隨即収軍奪獲賊械十餘件受傷委署驍騎校哈即阿一員兵丁一名義民二名陣亡兵丁四名義民四名均各分别記功賞䘏惟被賊冲散不知存亡兵丁十五名候查明另辦又接據駐守鹽水港遊擊楊起麟禀稱二十五日賊衆千餘由蘆竹坑來攻鹽水港商令守偹黄象新帯領弁兵義民由東北勢港墘堵截施放鎗砲打死賊百餘人餘賊敗走於各賊屍身捜出偽將軍封條又據柴大紀禀二十日賊匪攻縣兵民奮力抵禦打死賊數百人内騎馬賊目一人二十四日賊忽分攻四門督率將偹分方堵禦鎗砲並施打死多人賊始懼退二十五日黎明賊匪擁衆攻環西北營盤大砲叠發打死騎馬賊目二人殱賊千餘人其餘賊匪冐死進攻官兵義民力戰至未刻稍退仍遥屯未散四野積水泥濘未敢進勦申刻雷雨盆傾至戌刻賊始散歸各庄現在多方僱覓熟識路徑之人連夜札調鹿仔草官兵前來協助至今尚未見回信各等情又諸羅縣知縣陳良翼禀稱逆匪聚衆八九千人於二十八日辰刻扛擡枋車上䝉濕綿被蜂擁圍攻西北兩門營盤東南兩門山頂各有匪衆六七百人遥為聲援即分撥僚屬守城親率各義民同將偹弁兵徃來禦敵施放鎗砲賊匪鎗砲甚多抵死擁攻官兵義民奮力攻殺賊人退而復進者三次我軍用大砲轟擊碎其枋車數座打死賊二三百人北門打死騎馬賊目一人西門殺死賊目一人梟回首級至申刻賊始潰散官兵義民損傷數十人賊雖暫退差探尚欲糾賊攻城等語查諸羅一帯賊匪浹旬不退柴大紀等既能固守又經屢次勦殺賊衆自不敢久逼圍攻但該縣係二十九日具禀是日遊擊田藍玉纔到新店是以尚未得有該遊撃帯兵恊助魏大斌之信臣等已三次嚴催魏大斌田藍玉等務即通知柴大紀迅速由鹿仔草起兵前進内外奮擊開通道路并已飭該道府添觧餉銀火藥鉛子等項委妥員運徃接濟又柴大紀及署縣陳良翼禀稱現在縣城四面道路田洋積水皆有逆匪阻絶遍挿竹簽官兵難以行動積存文報不得逓送城中粮餉鉛藥存剰無多大砲鉛子隨時鑄造已用過一萬三千餘斤現今鐵炭漸缺設法加意防禦二十五日賊目蔡福被砲打穿頷頰傷重擡回打猫街二十八日賊目葉省被砲打中右腋扛回牛稠山斃命各庄民奔報屬實遊擊田藍玉禀稱鹿仔草由東邊徃諸羅係埔心大崙等庄路被賊削小田水堵滿由南邊徃諸羅係後藔一帯各路口亦是賊匪屯劄之所俱有蔗園深溝阻碍去路現與魏大斌妥酌分兵前徃又據魏大斌禀初三日寅刻同副將詹殿擢遊撃田藍玉等帯領官兵義民前赴諸羅行至半天厝見埔心大崙各庄賊匪突出約有數萬分路殺來遂令排列隊伍施放鎗砲打死賊匪不計其數内有騎馬賊一名但賊匪愍不畏死尚敢圍攏官兵義民奮勇力戰至未刻賊匪退聚各庄路口攔截官兵勢甚猖獗難以前進查陣亡兵丁一名義民一名受傷兵丁十二名義民十九名隨將隊伍收入鹿仔草營盤再商計䇿前赴各等語臣等細閲各禀魏大斌已接柴大紀書凾則彼此自可闗㑹其賊目蔡福葉省若果被砲傷斃則賊勢亦應稍减惟是已抵鹿仔草之各官兵屢前復却皆因賊匪削小官路乗夏令多雨灌為水田又遍挿竹簽以防官兵進勦為此困守諸羅之計殊屬狡惡但查鹿仔草距諸羅僅二十餘里若我軍并力奮勇能透過十餘里城内兵民亦奮力接應尚似可以打通且埔心大崙等賊庄在諸羅西南一面十餘里之外並非四面圍住縣城若募熟識路徑之人無論水陸亦可間道疾趨期於必克臣等以柴大紀望援甚殷而該鎮將等設法應援自以兵多為善是以再行添派恭將特克什布張萬魁署都司邵振綱帯兵一千四百名并派令健鋭營章京官保徳成額恊同前徃即於初八日早仍配船由水道前抵鹿仔草並飭該鎮將等務即悉心籌畫彼此熟商或拚力直前或覓途馳赴總期速達諸羅痛殱醜孽至續添之閩省兵二千名於六月十九二十一等日先到粤省兵二千名惟配渡兵八十五名船一隻尚未到來餘已於七月初七日齊到軍營再恭贊藍元枚統領北路官兵亦以僅能守禦不敷攻勦是以奏請添兵臣等俟請添各兵陸續到齊即相機前進一經擒獲賊首賊目即隨時馳奏不敢稍遲奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰賊匪雖挖溝壕不過十餘里止係為自守之計並非險阻即官兵結營拒敵亦豈無溝壕自衛此乃行軍之常事常青等統領大兵何難督率兵民填平溝塹奮力攻擊况官兵勦賊即遇深溝髙壘勁敵當前亦將奮勇争先直前摧破豈有見此么䯢草竊挖有溝壕即畏葸不進株守坐視之理南潭近在肘腋常青等自應先將莊大田等痛加勦洗不使負嵎窺伺再行統領大兵直趨北路况續調兵丁業已陸續全抵大營聲勢倍為壯盛今常青等接據柴大紀處請援之信始則僅派魏大斌帯兵千餘前徃及魏大斌在鹿仔草被賊攔截又派田藍玉帯兵一千接應仍不能直抵諸羅似此零星派撥於事何益且常青等如見南路賊匪屯聚窺伺實有難以逺離郡城不能前徃北路之處亦應將該處情形據實奏聞乃自駐劄臺灣以來業經數月既未挪移尺寸而於如何運籌决勝擒殺賊匪及定於何路進兵之處總未據奏報似比株守因循何日可以集事耶柴大紀駐劄諸羅屢被賊人圍擾其勢甚為着重常青等早應親統大兵前徃援應殱殺賊匪㑹合進剿况常青恒瑞俱在府城營盤即該處亦屬𦂳要不能一同前徃若以一人留守以一人統兵前徃諸羅援應有何不可豈伊二人必湏同在一處不能分身耶賊目蔡福葉省既被官兵放砲打傷又擡回打猫牛稠等庄該處村庄若非賊黨則賊目受傷不應擡至彼處若該庄民人業經從賊又不應赴官奔報乃賊目受傷既擡回各庄而庄民又以賊目傷重斃命奔報豈有賊與義民同居一庄之理若該庄民人並未從賊俱屬義民是該處即不應有賊匪屯佔何以魏大斌等帯兵到彼又復被賊攔截殊不可觧究竟該庄民人是否賊黨抑係義民着常青等查明具奏上又命軍機大臣傳諭長麟李世傑琅玕李侍堯曰現已令福康安前來行在陛見面授機宜前赴臺灣督辦勦捕事務並已派海蘭察等先行帯領侍衛章京拜唐阿等分起由驛前徃每起約二十餘人所有需用車輛馬匹著長麟李世傑琅玕李侍堯等即預為籌備並令前派出管理驛站大員帮同照料但此次四起侍衛章京等不過百人需用車馬等項為數無多該督撫等務湏妥恊辦理毋得稍涉張皇致滋擾累同日何裕城奏言恊濟閩米籌辦之始原定於五福陸路轉運抵以該處溪河山路節節起駁肩挑惟恐不速擬照從前辦過成例陸海分運嗣准督臣李世傑咨覆始知江蘇亦有運閩之米海船不敷咨商浙省恊濟臣恐運米到彼等候欲速轉遲隨將碾就之米十五萬石全由五福陸路運徃該處先經爬沙挖淺多備竹筏小船兼幸上㳺得雨足資浮送又於旱路平治陡隘轉運尚覺迅速現在抵閩省光澤縣水口者已有六萬四千餘石其餘接續運赴臣仍嚴切督催務令尅期竣事不致稍有遲緩再江西運閩米石計至九月初旬可以運竣所有湖北省運閩之米行抵五福水次之日適當江西運竣之時堪以接續轉運兩不相妨一面預飭各屬候湖北委員押米入境帮同悉心料理恊力挽運一如江西運米成規不許稍存岐視再查閩省民人廣種畨薯以代米榖江西向不廣種臣今春勸民廣為種植兹届成熟之時收穫頗豐已有成效臣思江西今嵗麦禾二收俱屬豐稔尚不藉畨薯為食臺灣現在用兵食口衆多畨薯堪佐米榖之用隨陸續收買積有十萬斤於運米完竣之日帯運前去交閩省督臣李侍堯查收酌用奏入報聞欽定平定臺灣紀畧卷二十七
