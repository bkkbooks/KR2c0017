  text: 欽定四庫全書欽定平定臺灣紀略卷二十七
  hash: sha256:347fa9e92ee29b575fe4133b9815e2e634765a7e02163ab0d968dbc03305d9ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_027-1a, image: WYG0363/WYG0363-0297a.png}
body:
  text: 七月二十三日戊子存泰圖薩布同奏言初四初五兩日會同副都統臣博清額柏廷翰傳集滿漢八旗及水師旗營各駐防官兵逐加挑選共足一千五百名察看各官兵年力俱屬強壯勇往必能出力剿賊隨照例散給俸賞行裝鹽菜銀兩備足軍火器械派定協領佐領防禦等官共三十三員分作四起行走以三百七十五名為一起七月初七頭起自省啓行按日接連前進副都統臣博清額統領第四起官兵起程由水路晝夜兼行至龍川縣起岸過山仍由水路至潮從黃岡入閩境現在河水通達船隻便利迅速至官兵自省起程臣等督同藩司許祖京及府縣等親赴河干照科登舟至龍川起岸至清溪派委肇羅道阿章阿支給人夫隨路彈壓由清溪下船至潮州派委惠潮嘉道圖畢赫撥給船隻接替護送仍飛咨督臣孫士毅照料出境其官兵日逐應需口糧俱飭各府州縣預備隨到隨發免致停留至此次駐防各官兵應支分例先於司庫動項支給容俟彚案造報同日圖薩布又奏言粵東所屬州縣地方民多濱臨洋海而附近省城沿海各隘口尤關緊要臣節次與督臣孫士毅􅊾飭文武慎密嚴查現在添調官兵赴臺協勦誠恐地方稍有疏懈姦匪乘機竄逸臣現飭各州縣會同營泛於沿海隘口加緊巡查凡船隻收泊港澚遇有蹤迹可疑其船户梢水若非本處歇家行店素相認識難保無臺灣逸匪及洋面姦徒一經盤查得實即行拘拿解究務須不動聲色嚴密辦理使匪蹤無所潛伏以靖海疆再與藩司許祖京酌商將庫貯上年潮屬解存榖價內洋錢十四萬九千餘兩撥出湊解將餉銀扣存司庫扺補榖價並於省城佛山二處市鋪公平兊换湊足全數現在已將洋錢七萬八千圓於本月初六日委員先行批解起程此後趕緊易换定於本月內全行委解不致遲誤均奏入上諭軍機大臣傳諭李侍堯孫士毅圖薩布曰臺灣與粵省毗連非江浙遼逺者可比保無有匪犯竄逸自應嚴密查拿但販貨商人俱係家道殷實豈肯藏匿匪徒自取重戾該督撫等遇有形迹可疑者必須留心盤詰若遇到口商船概行查訊則商販等聞風裹足將來商販不通百貨騰貴於閭閻民食大有關係著李侍堯孫士毅圖薩布飭屬不動聲色設法妥辦毋得紛紛誤拿徒滋擾纍二十四日己丑上命軍機大臣傳諭李侍堯曰前據常青等奏恭將瑚圖里自山豬毛帶領官兵義民來營所辦錯謬之極已將常青恆瑞嚴行申飭令反覆思之常青等於此一事愈覺其辦理失當雖已諭令常青等將辦理錯誤緣由傳旨曉諭義民令其速回本處自為守禦並令瑚圖里親自帶兵護送以安其心而勸來者但前降諭旨到彼尚需時日已恐無及若賊匪等乘義民逺離本莊已將其家屬房産焚劫殘燬以致義民等受纍灰心并致他處義民聞風裹足不肯踴躍投效是皆由常青等措置乖張貽誤事機朕必當將常青等從重治罪著傳諭李侍堯將此事情形是否如此其意以為何如就其所見據實密陳此事勿得稍有宣露令常青等聞知心懷疑懼更於事無益也臣等謹按將軍常青等留廣東莊義民在營助勦並不先將願留之故奏明我皇上以義民既留大營其本莊無人守禦必致遭賊擾害既嚴加申飭指示其措置之乖方而猶慮及護送歸莊事或無及聖天子念切民依痌瘝在抱厥後粵莊義民始終出力不倦固因能知大義亦由感發而愈激其天良也同日李侍堯奏言臺灣額征地丁莊租鹽課等項每年計銀五萬九千三百餘兩應行解司兵馬建曠扣缺養亷并文武各員借支各雜項每年又不下三四萬兩歷係扣存府庫劃兊戍兵餉銀如上兩年奏銷之銀於下兩年請領兵餉內扣收以省彼此運解之煩著為成例上年臺灣請領五十二年分官兵俸餉養亷銀共一十七萬五千一百餘兩經署藩司李永祺照例劃扣司庫銀一十萬二千五百餘兩飭令將收存府庫銀兩撥出支放在案兹據布政使覺羅伍拉納等詳稱前項存貯府庫銀兩故守孫景燧任內墊用無存兵餉不敷支放請先行給發臣查賊匪滋事係在上年十一月以後而本年臺灣兵餉應動支五十年完解之銀該年徵收銀兩業經奏銷全完實貯府庫並應行解司各雜項亦俱扣收在庫與本年官莊地畝賊匪擾害無可徵收者全不相涉乃據稱孫景燧任內墊用無存其墊作何項係何員任內墊用並未有報案顯係虧空本應查明恭奏分别追賠但現當勦捕逆匪之時不使遽行查辦一面飛飭藩司將劃扣銀一十萬二千五百餘兩照數撥出委員迅解臺灣以備支放并令查明陳傷亡故未回兵丁按照出缺日期將餉銀扣貯府庫歸入下年支放之用仍飭將支放日期官兵花名清册并扣除亡故兵丁名數造報查核以杜影射挪移情弊又泉州府馬巷通判陸士錕於該廳地方米船被竊並不上緊嚴拿盜犯任聽家丁差役私賣贓米及事主認領又不全行給領請將陸士錕革職奏入上命軍機大臣傳諭李侍堯曰臺灣庫貯銀兩原存為兵餉支放之用且係五十年徵收錢糧實貯在庫之項與去嵗冬底被賊滋擾官莊無涉何得稱墊用無存孫景燧在任釀成事端又復任意虧缺即應參奏查辦乃該督請於事竣後再行辦理試思孫景燧業已身故將來又復向何人查究乎現已降旨諭令琅玕將孫景燧原籍資財嚴密查抄以抵官項至陸士錕當軍務倥偬之際並不嚴訪盜賊乃於商船被劫轉從中侵漁吞匿是不但因該商被盜乘人之隙肆行侵隱而且乘國家有事任意貪婪似此居心真與盜賊無異僅與革職不足蔽辜著李侍堯將陸士錕即行革職拿問仍計贓科罪至李侍堯現值閩省地方廢弛之時正當實力整飭乃於此二案辦理失之寬縱若此殊屬非是著傳旨嚴行申飭用兵之際諸事宜嚴李侍堯不宜如此做好人也上又命軍機大臣傳諭琅玕曰臺灣府庫貯兵餉等欵銀兩係五十一年奏銷以前徵收錢糧實貯在庫與本年被賊擾纍官莊無涉何得藉稱墊用無存明係孫景燧挪移虧空無疑孫景燧係臺灣知府平日於地方事務既漫無整頓以致釀成林爽文等糾衆不法肆行滋擾之事而於庫貯銀兩又復任意虧缺是其侵漁斂怨激成事端不可因已被賊害而寬其罪使其家屬仍坐享豐厚著琅玕即將孫景燧家産查封以抵官項同日李侍堯徐嗣曽同奏言本年應辦乾隆五十一年奏銷因臺匪林爽文滋事先準臺灣鎮道等以淡水諸羅鳳山彰化等廳縣被陷恢復倉庫欵項必須逐一清查方可核實造報請俟勦匪事竣另行詳報而內地各案奏銷因逆匪尚未勦滅現在進兵一切軍火銀米分派各屬辦運自上年至今各員或支應差務或碾運軍糧或稽查口岸均須親身經理而於盤查倉庫核造册籍等事一時難以兼顧且司道等又隨同在泉州辦理接應軍需事務所有奏銷案內應造册籍俱未能隨時核辦請將閩省應辦乾隆五十一年分奏銷各欵展限兩個月其臺灣府屬各欵仍俟勦匪事竣另行飭查造報俾得寬其時日庶辦理不致錯誤奏入報聞二十五日庚寅李侍堯奏言現在粵浙等兵正當東渡臣更擬多撥銀米火藥等項稱此兵船配渡之時委員隨同解往尤為妥協將來如更有續解銀米該二處既各有派往護防之兵船當亦不致疏失至就漳泉兩處募補兵丁二千名現在情應入伍者甚多不過旬日即可足數所有擬調之浙兵二千已咨明浙省撫提二臣停止調遣再臺灣殉難各官或素係貪殘則殞命亦難贖釀禍之罪或尚稱亷謹則捐軀自當邀死事之褒事關勸懲未可草率現在留心細訪務得確實再行陳奏再查前調之閩兵二千粵兵二千目下已早到臺郡又續調之粵兵四千本日頭起五百名已到厦門其餘各起有路逺未能即到者準孫士毅扎稱現在嚴催進發又浙省之駐防滿兵已據報於六月二十六日起程粵省駐防滿兵雖未報起程日期大約本月下旬俱可到厦臣現在厦門料理自當令其隨到隨即登舟俾迅速前往至北淡水一帶近據同知徐夢麟稟稱逆首林爽文遣賊至彰淡交界之大甲溪等處滋擾副將徐鼎士已帶兵來援藍元枚亦遣守偹潘國材帶兵由海路前來率同該處義勇於六月十八及二十一二等日連次接仗等語查所調漳州兵往藍元枚處者現已在途俟粵兵到時再分撥二千前往則藍元枚處新舊官兵亦不為少現令常青藍元枚等多募義民鄉勇并從賊而自拔來歸者亦準食兵糧常青藍元枚等自必共相協力定可逐段推廓臣惟有料理糧餉寬裕解往俾足供支給不敢稍有缺誤奏入報聞二十六日辛卯上命軍機大臣傳諭常青恆瑞曰本日詢問常青賫摺差辨饒成龍據稱將軍劄營在小南門外十里之桶􅌉棧地方自五月二十四日以後與賊人打仗數次因賊人四路抵禦未能前進賊目莊大田所踞南潭距桶􅌉棧營􅌉只有五里等語常青等自駐劄臺灣已經數月其桶盤棧營盤相距南潭不過五里該將軍等早應統領大兵將賊目莊大田先行勦除乃惟知結營自守似此肘腋之間任其逼處竟不思乘勢攻勦實不可解前以為南潭離大營尚逺故屢次諭令該將軍等酌留官兵固守營盤親統大軍舍南趨北與柴大紀藍元枚會同進剿此時如尚未啓行該將軍等即行帶領官兵速將五里外南潭屯聚之莊大田痛加勦洗以清肘腋豈有近在數里之內而束手坐待之理且此次續調兵丁其粵兵二千昨據李侍堯奏業經配渡前往其餘淅粵官兵自己陸續到彼常青等正當乘其新到鋭氣相機進取詎可曠日持久坐失事機上又命軍機大臣傳諭李侍堯徐嗣曽曰前因臺灣勦捕逆匪需用軍糈且漳泉一帶地方缺雨恐米糧市價昂貴民情不無拮據已有旨諭令該撫查明妥辦並節經降旨於浙江江西江南四川湖廣等省派辦米共一百餘萬石令該督撫等迅速運閩接濟是閩省米石日逐充盈除應付軍糈之外儘有多餘漳泉二府如有缺雨成災處所該督撫務須詳悉查明一面奏聞一面即行督飭所屬妥為撫恤俾閭閻均沾實惠無使一夫失所以副朕軫念民依至意二十七日壬辰常青恆瑞同奏言南路之賊仍在南潭一帶負嵎不散顯係北路賊勢鴟張故敢有心窺伺臣等於二十八日令侍衛烏什哈達等率同逰擊孫全謀並恭將瑚圖里管帶辨兵臺灣道永福亦派同知楊廷理守偹銜莊錫舍督率義民協同官兵前往搜捕由鯽魚潭至埔薑頭莊見賊數百向前追殺直至蜈蜞潭溝焚燬賊藔十數間當有南潭賊匪三四千擁來官兵齊放鎗炮打死賊數十人殺賊十餘人賊遂敗退因該處溝徑﨑嶇不便追趕隨即收軍奪獲賊械十餘件受傷委署驍騎校哈即阿一員兵丁一名義民二名陳亡兵丁四名義民四名均各分别記功賞恤惟被賊沖散不知存亡兵丁十五名候查明另辦又接據駐守鹽水港遊擊楊起麟稟稱二十五日賊衆千餘由蘆竹坑來攻鹽水港商令守偹黃象新帶領辨兵義民由東北勢港墘堵截施放鎗炮打死賊百餘人餘賊敗走於各賊尸身搜出偽將軍封條又據柴大紀稟二十日賊匪攻縣兵民奮力抵禦打死賊數百人內騎馬賊目一人二十四日賊忽分攻四門督率將偹分方堵禦鎗炮並施打死多人賊始懼退二十五日黎明賊匪擁衆攻環西北營盤大炮疊發打死騎馬賊目二人殱賊千餘人其餘賊匪冒死進攻官兵義民力戰至未刻稍退仍遙屯未散四野積水泥濘未敢進勦申刻雷雨盆傾至戌刻賊始散歸各莊現在多方雇覓熟識路徑之人連夜札調鹿仔草官兵前來協助至今尚未見回信各等情又諸羅縣知縣陳良翼稟稱逆匪聚衆八九千人於二十八日辰刻扛擡枋車上蒙濕綿被蜂擁圍攻西北兩門營盤東南兩門山頂各有匪衆六七百人遙為聲援即分撥僚屬守城親率各義民同將偹辨兵往來禦敵施放鎗炮賊匪鎗炮甚多抵死擁攻官兵義民奮力攻殺賊人退而復進者三次我軍用大炮轟擊碎其枋車數座打死賊二三百人北門打死騎馬賊目一人西門殺死賊目一人梟回首級至申刻賊始潰散官兵義民損傷數十人賊雖暫退差探尚欲糾賊攻城等語查諸羅一帶賊匪浹旬不退柴大紀等既能固守又經屢次勦殺賊衆自不敢久逼圍攻但該縣係二十九日具稟是日遊擊田藍玉才到新店是以尚未得有該遊擊帶兵協助魏大斌之信臣等已三次嚴催魏大斌田藍玉等務即通知柴大紀迅速由鹿仔草起兵前進內外奮擊開通道路并已飭該道府添解餉銀火藥鉛子等項委妥員運往接濟又柴大紀及署縣陳良翼稟稱現在縣城四面道路田洋積水皆有逆匪阻絶遍插竹簽官兵難以行動積存文報不得遞送城中糧餉鉛藥存剩無多大炮鉛子隨時鑄造已用過一萬三千餘斤現今鐵炭漸缺設法加意防禦二十五日賊目蔡福被炮打穿頷頰傷重擡回打貓街二十八日賊目葉省被炮打中右腋扛回牛稠山斃命各莊民奔報屬實遊擊田藍玉稟稱鹿仔草由東邊往諸羅係埔心大崙等莊路被賊削小田水堵滿由南邊往諸羅係後藔一帶各路口亦是賊匪屯劄之所俱有蔗園深溝阻礙去路現與魏大斌妥酌分兵前往又據魏大斌稟初三日寅刻同副將詹殿擢遊擊田藍玉等帶領官兵義民前赴諸羅行至半天厝見埔心大崙各莊賊匪突出約有數萬分路殺來遂令排列隊伍施放鎗炮打死賊匪不計其數內有騎馬賊一名但賊匪愍不畏死尚敢圍攏官兵義民奮勇力戰至未刻賊匪退聚各莊路口攔截官兵勢甚猖獗難以前進查陳亡兵丁一名義民一名受傷兵丁十二名義民十九名隨將隊伍收入鹿仔草營盤再商計䇿前赴各等語臣等細閲各稟魏大斌已接柴大紀書函則彼此自可關會其賊目蔡福葉省若果被炮傷斃則賊勢亦應稍減惟是已抵鹿仔草之各官兵屢前復却皆因賊匪削小官路乘夏令多雨灌為水田又遍插竹簽以防官兵進勦為此困守諸羅之計殊屬狡惡但查鹿仔草距諸羅僅二十餘里若我軍并力奮勇能透過十餘里城內兵民亦奮力接應尚似可以打通且埔心大崙等賊莊在諸羅西南一面十餘里之外並非四面圍住縣城若募熟識路徑之人無論水陸亦可間道疾趨期於必克臣等以柴大紀望援甚殷而該鎮將等設法應援自以兵多為善是以再行添派恭將特克什布張萬魁署都司邵振綱帶兵一千四百名并派令健鋭營章京官保德成額協同前往即於初八日早仍配船由水道前抵鹿仔草並飭該鎮將等務即悉心籌畫彼此熟商或拚力直前或覓途馳赴總期速達諸羅痛殱醜孽至續添之閩省兵二千名於六月十九二十一等日先到粵省兵二千名惟配渡兵八十五名船一隻尚未到來餘已於七月初七日齊到軍營再恭贊藍元枚統領北路官兵亦以僅能守禦不敷攻勦是以奏請添兵臣等俟請添各兵陸續到齊即相機前進一經擒獲賊首賊目即隨時馳奏不敢稍遲奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰賊匪雖挖溝壕不過十餘里止係為自守之計並非險阻即官兵結營拒敵亦豈無溝壕自衛此乃行軍之常事常青等統領大兵何難督率兵民填平溝塹奮力攻擊况官兵勦賊即遇深溝髙壘徑敵當前亦將奮勇爭先直前摧破豈有見此么髍草竊挖有溝壕即畏葸不進株守坐視之理南潭近在肘腋常青等自應先將莊大田等痛加勦洗不使負嵎窺伺再行統領大兵直趨北路况續調兵丁業已陸續全抵大營聲勢倍為壯盛今常青等接據柴大紀處請援之信始則僅派魏大斌帶兵千餘前往及魏大斌在鹿仔草被賊攔截又派田藍玉帶兵一千接應仍不能直抵諸羅似此零星派撥於事何益且常青等如見南路賊匪屯聚窺伺實有難以逺離郡城不能前往北路之處亦應將該處情形據實奏聞乃自駐劄臺灣以來業經數月既未挪移尺寸而於如何運籌決勝擒殺賊匪及定於何路進兵之處總未據奏報似比株守因循何日可以集事耶柴大紀駐劄諸羅屢被賊人圍擾其勢甚為著重常青等早應親統大兵前往援應殱殺賊匪會合進剿况常青恆瑞俱在府城營盤即該處亦屬緊要不能一同前往若以一人留守以一人統兵前往諸羅援應有何不可豈伊二人必須同在一處不能分身耶賊目蔡福葉省既被官兵放炮打傷又擡回打貓牛稠等莊該處村莊若非賊黨則賊目受傷不應擡至彼處若該莊民人業經從賊又不應赴官奔報乃賊目受傷既擡回各莊而莊民又以賊目傷重斃命奔報豈有賊與義民同居一莊之理若該莊民人並未從賊俱屬義民是該處即不應有賊匪屯占何以魏大斌等帶兵到彼又復被賊攔截殊不可解究竟該莊民人是否賊黨抑係義民著常青等查明具奏上又命軍機大臣傳諭長麟李世傑琅玕李侍堯曰現已令福康安前來行在陛見面授機宜前赴臺灣督辦勦捕事務並已派海蘭察等先行帶領侍衛章京拜唐阿等分起由驛前往每起約二十餘人所有需用車輛馬匹著長麟李世傑琅玕李侍堯等即預為籌備並令前派出管理驛站大員幫同照料但此次四起侍衛章京等不過百人需用車馬等項為數無多該督撫等務須妥協辦理毋得稍涉張皇致滋擾纍同日何裕城奏言協濟閩米籌辦之始原定於五福陸路轉運抵以該處溪河山路節節起駁肩挑惟恐不速擬照從前辦過成例陸海分運嗣準督臣李世傑咨覆始知江蘇亦有運閩之米海船不敷咨商浙省協濟臣恐運米到彼等候欲速轉遲隨將碾就之米十五萬石全由五福陸路運往該處先經爬沙挖淺多備竹筏小船兼幸上遊得雨足資浮送又於旱路平治陡隘轉運尚覺迅速現在抵閩省光澤縣水口者已有六萬四千餘石其餘接續運赴臣仍嚴切督催務令尅期竣事不致稍有遲緩再江西運閩米石計至九月初旬可以運竣所有湖北省運閩之米行抵五福水次之日適當江西運竣之時堪以接續轉運兩不相妨一面預飭各屬候湖北委員押米入境幫同悉心料理協力挽運一如江西運米成規不許稍存岐視再查閩省民人廣種畨薯以代米榖江西向不廣種臣今春勸民廣為種植兹屆成熟之時收穫頗豐已有成效臣思江西今嵗麥禾二收俱屬豐稔尚不藉畨薯為食臺灣現在用兵食口衆多畨薯堪佐米榖之用隨陸續收買積有十萬斤於運米完竣之日帶運前去交閩省督臣李侍堯查收酌用奏入報聞欽定平定臺灣紀略卷二十七
