  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_019-1a, image: WYG0363/WYG0363-0208c.png}
body:
  text: 五月二十七日癸巳柴大紀奏言四月二十一日探得南路賊匪千餘潛聚於離縣十餘里之柴頭港萆麻莊兩處欲截鹽水港往來之路使文報不通軍需難運臣查兩處地方相近隨即帶領署逰擊邱能成守偹楊彲武舉陳宗器併義民等馳赴柴頭港飭逰擊林光玉守偹黃象新武舉黃奠邦併義民等馳赴萆麻莊兩處一齊圍拏炮打死賊匪各數十人賊俱向西北奔逃追至水牛厝地方鳥鎗打死賊匪數十人趕過八掌溪尾賊衆四散逺竄該處竹圍錯雜又多溪坑恐有埋伏收軍惟兵丁陳連熟畨海山二名陳亡義民黃竒許杏蔡平三名受傷奪獲賊旗炮子等項生獲賊匪李興一名審明正法又探得林爽文糾衆復蟻聚於離縣十餘里之打猫東勢湖等處妄圖截路以禁薪炭入城臣於二十三日黎明親統官兵往拏正起行間賊匪數千分路來犯東北營盤隨排列隊伍對敵又據逰擊李隆報稱南路賊匪千餘來攻南門營盤即飛飭守偹黃象新將所帶兵丁併武舉黃奠邦監生李百川武生鍾習信等各義民隨逰擊李隆協力剿擊臣督率逰擊楊起麟林光玉邱能成守偹楊彲陳明德署諸羅縣陳良翼武舉陳宗器貢生張明義生貟吳正蘭監生徐宜玉等各義民在東北一帶截殺連放大炮賊亦對放鎗炮自卯至午賊被大炮打死約有百餘名尚抵拒不退臣見東邊賊勢散漫鎗炮亦少即飭逰擊林光玉守偹楊彲等冲去剿殺其正北一帶賊匪稠密鎗炮且多料林爽文或在其中隨飛馬直冲逰擊楊起麟邱能成等併各義民一齊跟隨奮勇向前殺賊十餘名賊見官兵勇猛皆拚命飛奔追趕過牛稠山後值大雨收軍其南邊逰擊李隆守偹黃象新等當賊匪來攻即率領辨兵義民放炮打死賊匪十數人殺死騎馬賊一人追過八掌溪又被鎗炮打死十數人賊隨逺遁東邊逰擊林光玉等俱能奮力追殺皆因雨收軍兵丁余振乾等二十八名及義民李魏何潘二名被傷斬獲賊首三十二顆奪獲鳥鎗炮子長短刀等項生擒賊匪陳光喜黃阿進顔鳳等三名審明正法又於二十七日探得南路賊匪復聚於離城十餘里之竹林腳龍山腳楓樹腳一帶地方該處惟竹林腳最為險要易於藏奸親統本標官兵義民等進剿由中路火燒莊前往竹林腳派令逰擊李隆參將潘韜等帶領辨兵併武舉黃奠邦各義民等從赤蘭埔至龍山腳派令逰擊楊起麟林光玉等帶領辨兵併武舉陳宗器各義民等由録麻散至楓樹腳三路官兵一齊進剿賊衆抵死分頭抗拒被官兵鎗炮打死賊匪各數十人賊隨敗走由中埔山腳四散逃竄因山箐叢雜又值大雨收軍兵丁惟陳志朝等三名義民胡阿里等五名受傷生獲賊匪李祥魏滿郭天來陳牛曽老共五名審明正法併獲大旗一桿九龍袋火藥等項奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰賊首林爽文糾集黨羽蟻集於諸羅城外之柴頭港竹林腳等處潛圖攔截復分路攻擾縣城看來竟係心恨柴大紀是以專力侵犯其鬼蜮伎倆甚奸狠可惡至藍元枚於本月初七日在蚶江配渡約計於十三四可抵鹿仔港著藍元枚將到鹿仔港後作何調度剿賊情形即行迅速馳奏至李侍堯現駐厦門一帶離臺灣較近聲息相通且該處地方官自必時有禀報所有臺灣近日情形一得禀報即隨時奏聞上又諭內閣曰柴大紀自駐守諸羅以來賊首糾合匪徒屢次攻擾該總兵督率官兵義民奮勇擊殺連得勝仗賊匪敗退實屬可嘉柴大紀著交部議敘其隨從打仗出力之逰擊楊起麟林光玉邱能成守偹楊彲陳明德署諸羅縣陳良翼武舉陳宗器黃奠邦貢監生張明義等著交常青查明具奏候朕降㫖議敘奬擢以示鼓勵二十八日甲午李侍堯奏言閩省兵額本少所有臺灣戍兵及調往征兵經去冬賊匪滋擾及本年鳳山再失之後傷亡失散者多應及早募補以實營伍苐臺灣戍兵征兵本由內地各營派往所有缺額應查明何營何兵之缺方可令原營募補現在各營本有餘丁待缺挑補兹于二月十九日即飭臺灣鎮將查造又屢次檄催嗣據柴大紀與逰擊孫全謀造報前來均係約略總數內地各營無由知某營缺少若干難以懸揣挑補十四日准將軍常青移送臺灣鎮中軍守偹王天植所造清冊前來係就現在府城各營並班滿未回留用兵內所有傷亡病故散失無著各數一一開造俱有營分及戰守名目可查共四百六十六名臣思常青接奉諭㫖自應於義民內接補臣若又令內地各原營補額恐致一缺兩補因咨常青於去嵗所調征兵內如有缺額就近於軍營餘丁或臺地義民接補其舊時輪班駐守之戍兵臣即檄飭各標營查照缺數速將餘丁內挑補如有不敷再行召募補足其諸羅鹿仔港北淡水南淡水各營該偹因信息未通尚難查造應令於大兵進剿道路相通時隨處查明造報即照此分别辦理再提臣藍元枚帶兵前往鹿仔港其水師提督印務奉㫖令漳州鎮總兵常泰暫行署理查水師提督駐劄厦門常泰應即前往該處現有金門鎮總兵羅英笈在彼彈壓且地近泉州一切地方營伍事件臣就近可以照料惟漳州一帶民情慓悍易於生事並據藍元枚訪知㑹匪多係漳屬之平和長泰等縣人是該處不可無大貟彈壓理合奏明令常泰駐劄漳州兼辦水師提督事務轉屬有益再將軍恆瑞於初八日在厦門開洋浙兵由蚶江配渡者副將琢靈阿帶兵一千於初三日開洋提臣藍元枚續帶一千於初八日開洋其最後之一千總兵魏大斌帶領亦已在厦門登舟兹探得恆瑞將至澎湖洋面被風折回於十一日仍收泊料羅其前行各兵船有收入澎湖者藍元枚琢靈阿等船欲沿海創駛至金門趂南風斜渡鹿仔港十一日亦因東風甚大寄泊濔滬俱俟風色稍順再行開洋至漳浦械鬪一案據報現多畏罪逃匿該鎮道等正在設法緝拏臣料理過兵今已竣事即於十六日起程前往察看情形指示辦理其浮山社許姓藉尸强搶一案已拏獲四十四名提解審訊適撫臣徐嗣曽巡查口岸亦到泉州就近督同藩司各道審辦臣到漳浦查辦械鬪之案回至泉州計此案亦可審有就緒臣與徐嗣曽再行㑹同嚴訊從重定擬具奏再巴圖魯侍衛章京烏什哈達等八貟於本月十一十二等日先後到泉州十四五日可到厦門登舟所需鑼鍋帳房戰箭等項臣先飭中軍希當阿預為偹辦交該貟等帶用又因臺灣營中本無馬匹亦於就近營分挑選臕壯馬每貟各給三匹以偹到彼打仗之用再前撥銀二十萬兩分路解往府城鹿仔港兩處以作雇價賑需其泉厦兩倉現貯之米暫留作兵糧等用今䝉增撥江西米石則閩省軍糈民食均已寬裕所有臺地鄉勇難民等項自須銀米兼放更覺有益除已撥銀八萬兩分解外又先撥米五萬石銀八萬兩各半分解臺灣府城及鹿仔港兩處其鹿仔港內難民一項臣前所買薯乾已解往十萬斤今又買得五萬斤解往搭配米糧均勻散給計府城鹿仔港兩處所有鄉勇既可銀米兼支而難民并有銀米薯乾三項勻配支放亦俱不致失所再各省偹貯火藥定例於額貯三年數內支出一年操演仍照動支之數逐年委貟採買補足本年閩省因預買乾隆五十三年額硝現因臺灣剿匪須用火藥甚多若照例於冬季委貟按額採買不免稽遲且不敷所用自應及早多為採買擬即行委貟於嵗需軍硝一十六萬八百九十斤十四兩零並帶買從前缺硝一萬一千斤外添辦二十萬斤內於山東省添買十萬斤湖北湖南省各買五萬斤并乘委貟赴湖南購硝之便帶辦硫磺二萬二千五百斤一面行文各該省督撫一俟該貟到日作速催令購辦齊全運回應用其動用價值水腳等項俟辦回時飭令據實造報核銷再於本月十二日接奉諭㫖令江西碾米十萬石運往福建閩省得此接濟一切軍糧平糶等項均屬充裕至此次米石應於何處接收以及雇船裝載等事飭司道查議據稱江西入閩之路有三其廣信府之鉛山縣一路有陸運四五站寧都州之瑞金縣一路更係山僻小路挽運維艱惟建昌府之新城縣由五福地方陸運八十里至閩省邵武府光澤縣之上水口即可用竹牌及小船剝運此係向來解運銅鉛之大路由上水口再四十里至光澤縣又可换大船運至省城再用海船裝運至泉厦等因是江西省之米應在光澤縣之上水口交兊查五福起岸係江省新城縣地方雇夫挑運應由江省辦理自上水口雇船及竹牌剝運應由閩省辦理仍各委大貟在上水口公同交收所有腳價各歸本省報銷除一面札商江西撫臣確按該省情形如果此路較便即由該處解運臣酌委道府前往接收轉送奏入上命軍機大臣傳諭常青李侍堯曰現在臺灣調往征兵所有額缺常青自應先於義民鄉勇內擇其奮勇出力者拔補至臺灣曩時輪班駐守之戍兵向例本由內地各營派往朕思此等戍兵由內地調遣既不免往來繁費而該兵丁等一經調派戍守更不免繫念家室必多顧戀若專用臺灣本地人充補額缺又恐日久該處情形內地不能熟悉亦非萬全無弊之道朕意嗣後此等换班兵丁一半用該處土著一半仍用內地各營抽調派往换班則內地既可稍省調遣繁費又能熟悉臺灣風土人情實為一舉兩得且逰手無藉之徒得以歸伍食糧更可化無用為有用著常青李侍堯于剿捕賊匪事竣後公同熟商遵照辦理又昨據林小文供稱天地㑹名目上年係林爽文倡起由臺灣而至內地等語林爽文設立天地㑹名目糾約多人肆行不法且現據藍元枚訪知㑹匪多係漳屬之平和長泰等縣人是林爽文不但窺伺臺灣並欲勾結漳泉一帶蔓延滋擾顯有先得臺灣便可漸入內地之意甚為奸險可惡但此時不可遽行查辦以致人情驚擾至將來剿賊事竣後常青李侍堯務將結㑹之根由及附從入教者詳悉查明痛加懲創不可稍留餘孽再恆瑞藍元枚帶領滿兵浙兵於初八日開洋後被風折回朕心深為焦急著李侍堯即將恆瑞藍元枚究於何日得風遄渡之處迅速具奏其漳浦縣强搶械鬪兩案既已獲犯多名提解審訊當以速行審辦完結為要至漳州鎮總兵常泰已令暫署水師提督現在漳州正需大貟彈壓自未便即往厦門遽離該處朕於披閲摺片之初即行批示後見該督奏明令常泰駐劄漳州兼辦水師提督與朕意吻合所見甚是至本日柴大紀賫摺把總鄭士勝來至行在隨令軍機大臣詢以該處情形應對尚為明晣並據稱曽隨柴大紀在諸羅與賊打仗數次看其人尚明白奮勉著常青即將鄭士勝拔補千總如將來該辨回至臺灣再能出力即擢授守偹亦無不可臣等謹案臺灣駐守兵丁向例由內地輪班而往此畨因正值剿匪之時未及遽行更替我皇上以戍卒逺涉重洋不免繫戀家室專用本地民人充補又恐該處情形內地無由熟悉因酌為兩用之道不特稍省調遣之繁兼令逰手無藉之徒皆得食糧歸伍地方更可陰受其益曲體人情隨宜措置聖照所周逈非淺慮所能計及也上又諭內閣曰常青自抵臺灣即慰撫義民鄉勇俾伊等共知激勸用命爭先至賊匪攻犯府城預先設法防堵並督率官兵鄉勇迎捕截殺屢次克捷甚合機宜朕心深為嘉奬常青著交部從優議敘至李侍堯駐劄厦門一帶照料官兵配渡迅速辦理軍需糧餉均能先事預籌源源接濟孫士毅挑偹粵兵遄赴閩省所有火藥鉛彈等物均能寬裕籌偹解送應用皆屬急公可嘉李侍堯孫士毅著交部議敘二十九日乙未上命軍機大臣傳諭常青李侍堯曰將來剿賊事竣柴大紀屢著勞績自應即實授提督但該鎮任臺灣總兵已經數年該處情形較為熟悉且領兵剿賊屢次克捷威望較著即日賊匪蕩平所有善後事宜皆須該鎮隨同常青悉心籌辦而臺灣經此次賊匪滋擾官兵平定之後尤宜加意整頓若將柴大紀授為提督則須駐劄內地臺灣即無熟手經理之人朕意將來事竣後應令柴大紀以提督管臺灣鎮總兵事務在彼彈壓料理二三年再調回內地於綏靖地方更為有益所有內地提督貟缺著常青李侍堯於梁朝桂陸廷柱二人中察其才具並何人最為打仗出力之處酌舉一人可以署理提督者據實具奏至常泰現署提督留駐漳州雖未經領兵打仗如量其才具堪勝提督之任並著一併奏聞候朕酌量簡署至臺灣逺隔重洋屢有械鬪搶奪之案今林爽文等竟敢立㑹糾衆劫縣殺官自係厯任道府廢弛闒冗擾纍地方以致養癰斂怨激成事端不可不嚴加治罪以警將來著傳諭常青李侍堯於剿賊事竣即將厯任道府嚴切查明據實參奏三十日丙午上命軍機大臣傳諭常青李侍堯曰朕披閲藍鼎元所著東征集係康熙年間臺灣逆匪朱一貴滋事官兵攻剿時伊在其兄藍廷珍幕中所論臺灣形勢及經理事宜其言大有可採如所稱諸羅一縣地方遼濶鞭長莫及應劃虎尾溪以上另設一縣分駐半線地方並於各要隘處所增添巡檢千把總貟辨以資防守等語後從其說添彰化一縣至該處迄今又閲六十餘年土地日闢户口日滋酌量情形有須添設文武貟辨以資控制撫馭之處前經降㫖令常青李侍堯於剿賊完竣辦理善後事宜時一併籌酌今閲藍鼎元彼時即有此議是臺灣增設官辨實為最要又覆閲總督滿保經畫疆里一書內稱臺灣地方地土廣饒糖穀之利甲天下過此四五十年即內山山後皆將為良田美産若劃定疆界將人民驅逐不許往來耕種勢難禁止等語所言亦屬有理臺灣疆土既開民安耕鑿處處成膏腴之地自楊景素議立界限之後則界外良田美産轉畀生畨而生畨以射生為業不事耕種勢必內地民人仍往偷墾日久徒滋事端是定立界限究恐不無流弊又與提督施世驃書內稱賊衆至三十萬其中畏死脅從非盡出於本願或有掛名賊黨以保身家者若盡誅之多殺生靈亦屬無益似應止殱巨魁反側皆令自新等語現在林爽文糾合匪衆所到村莊以勢迫脅如有不從者即行焚殺小民畏死偷生出於不得已勉强附從以致日積日多前後自出一轍朕於此事初起時即經降㫖諭令該督等惟將渠魁首逆及實在黨惡不法者皆應殱戮無遺其被賊迫脅出於無奈聼從者准其悔罪自新以解散賊黨藍鼎元之語適與朕意相合常青於整齊兵力進剿時不妨先將此意出示曉諭使被脅良民及從賊夥黨得以畏罪投誠亦解散賊黨先聲奪人之一法此外書內所列各條尚多可採者藍鼎元籍隸漳浦所著東征集閩省通行者必多著常青李侍堯即行購取詳閲於辦理善後時將該處情形細加察核如其書內所論各條有與現在事宜確中利弊窽要者不妨參酌採擇俾經理海疆事事悉歸盡善以為一勞永逸之計欽定平定臺灣紀略卷十九
