  text: 欽定四庫全書欽定平定臺灣紀略卷二
  hash: sha256:cb306b888815e1ce8d1a538fc2c01172c559f97309e94a1ee4fcade686a80fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_002-1a, image: WYG0363/WYG0363-0027a.png}
body:
  text: 正月初七日丙子常青奏言彰化賊匪林爽文等攻占城池先經臣派撥三路官兵赴𠞰惟是調往官兵雖有六千內水師提臣黃仕簡帶領本標及調取南澳銅山等營守兵共計二千數百名其由閩安出口派赴淡北之官兵一千五百名臣于十二月十三日據淡水同知程峻之子程必大禀報竹塹地方亦被賊人占踞因飭領兵之海壇鎮總兵郝壯猷相度情形非于新莊堵禦即赴南路應援而鹿耳為臺地咽喉尤須厚集兵力庶可近護郡城逺赴攻𠞰兹臣復添派督撫二標兵一千名檄令原任閩安協副將徐鼎士帶領由省城南臺口配船又調福寧鎮并桐山羅源等營兵一千名檄令福寧右營遊擊延山帶領于福安縣白石口配船俱從各該處出口候風直渡過臺經由鹿耳門進口交與水師提臣黃仕簡聽其調度俾軍容益昭壯盛賊匪尅期殄滅臣一面仍冉于各營兵丁內預為挑備酌量機宜隨時策應同日浙江巡撫琅玕奏言臺灣賊匪滋事先經督臣常青咨㑹臣即飛咨提鎮各臣並飭沿海各營及地方官嚴密防範毋致匪徒內竄再於接壤之江山縣起至嘉興府屬出境止酌添腰站馬匹驛夫以速郵報兹又准福建撫臣徐嗣曽咨㑹于附近水師營內酌撥備戰兵二三千名配齊器械在交界本境駐劄以便徵發亦可藉為聲援等因查浙省溫州府地方由海至閩省之厦門最為捷近自應于附近之水師營內酌派現在飛咨提鎮各臣即於提標同溫州黃巖二鎮標所屬營內共揀派練習兵三千名配齊器械㩦帶糧餉在于本境交界之處駐劄以待徵調其應派將備帶領前往一切事宜現咨提臣陳大用酌定具奏臣仍檄飭溫處道陸瑗隨同鎮臣在彼彈壓此等匪徒均係一時烏合之衆現當閩省官兵合𠞰不日即可殱盡其匪黨自必四散避遁各海口均關緊要臣已分委道府等官酌派兵丁實力盤查截拏俾無竄逸均奏入上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽琅玕曰從前𠞰捕朱一貴黃教二案調兵若干名該督自有成案可查今常青既令任承恩帶兵由鹿耳門前進又復加調官兵陸續渡臺並咨㑹粵東浙江酌備戰兵以資策應臺灣常有糾衆不法之事此次常青等何以張皇畏懼至此徐嗣曽亦有移咨鄰省一體預備之舉而琅玕此奏尚有主見不至過于惶遽著傳諭該督等務宜鎮定妥辦不可張大其事使沿海民人心生恐懼於地方大有關係至常青摺內稱探得澎湖兵於十二月十四日到臺郡安平林遊擊亦帶兵赴援現在賊勢稍退等語郡城防守嚴密全臺根本尚不致有他虞黃仕簡等務須俟各路官兵到齊約㑹日期同時並力夾攻自無難一舉蕆事𠞰捕淨盡常青徐嗣曽琅玕尤宜嚴飭沿海文武員辨截拏逸回匪犯毋使一名幸脫初八日丁丑常青奏言前派赴淡官兵因聞竹塹已被賊踞旋又據巡檢王增錞禀報於艋舺地方召募鄉勇人等設守隨又密飭統兵之總兵官郝壯猷相度情形非於新莊抵禦即赴南路應援今該撫臣又經派兵一千五百名前往實為緊要得力惟是臣續調之督撫二標兵一千名已派令副將徐鼎士帶領而撫臣所調之督撫二標兵一千五百名據稱亦派該副將帶領實緣省城距泉相隔數百里同時調派以致關㑹不及至查督撫兩標除派撥防守外統計備戰兵四千四百名現在派出之數已共三千三百名㑹垣重地尚須駐兵留守據撫臣札稱復調上遊之建寧延平鎮營兵一千名來省以備調遣應俟該二處兵丁到省即留於㑹城駐劄其撫臣所調之督撫二標兵一千五百名即令副將徐鼎士帶領前赴北淡臣隨改派在省之延平副將林天洛帶領臣續派督撫二標兵一千名仍遵前奏由省城南臺配船飛渡經由鹿耳門進口隨同水師提臣黃仕簡協力進𠞰同日徐嗣曽奏言臣以淡水地方緊要即將派備之省兵一千五百名飭令閩安協副將徐鼎士臣標逰擊吳秀等統領尅日進發連日接據蚶江通判陳惇厦門同知劉嘉㑹稟報查訊鹿仔港回棹商船鹿仔港亦有泉州興化廣東客民各用布書寫義民字樣共相守護等語復准提臣黃仕簡亦因王增錞禀報咨㑹撥兵救援臣現已雇備船隻添派督標都司朱龍章護水師營參將羅禮璋隨同副將徐鼎士等迅速領兵前赴正在候風遄發接准督臣來咨於未接臣咨之先督標撥兵六百名臣標二營撥兵四百名交副將徐鼎士統領由閩安出口至鹿耳門協𠞰等因查淡水新莊等處待援既急而鹿耳門一路誠如督臣籌酌尤當厚集兵力臣前摺奏明預調延建兵一千名原以備督臣調遣之用與督臣所調兵數適相符合應即飭令赴泉聽候督臣派員統領赴鹿耳門進𠞰查厦門對渡鹿耳門較之由閩安出口更為便捷臣飛札厦門速備船隻該兵到厦之日即可飛渡同日浙江提督陳大用奏言接准福建撫臣徐嗣曽咨㑹浙省水師兵內挑撥備戰兵二三千名前往交界處所以備調遣溫州黃巖二鎮各撥兵一千名尚少一千名于提標及所屬水師兵內酌量選撥並將一切戰船軍械妥協料理等因臣隨選派標下右營兵五百名附近之鎮海營兵五百名共足三千名之數委派署右營逰擊俞世盛左營遊擊裴起鰲馮揚鎮海營參將白國梁右營守備江得勝署守備張殿魁並千把外委三十員于十二月三十日帶領起程赴閩浙交界之平陽縣屬北關洋面處所以為聲援並即飛咨督臣常青酌量調用再查有溫州鎮總兵魏大斌瑞安營副將詹殿擢均由福建臺灣水師升補來浙彼處情形素所熟悉隨派委該鎮將作為總領統率前往其溫州地方界聯閩省現飭樂清協副將李長庚前往彈壓稽查至寧波沿海口隘均關緊要現在臣㑹同寧紹台道印憲曽選派員辨時刻留心稽察分路查緝截拏均奏入上命軍機大臣傳諭常青徐嗣曽曰總督統轄營制全省兵辨凡有調遣自當聽督臣主政巡撫雖亦有封疆之責不得稍存膜視但調發兵辨應札商督臣公同檄調况無迫不及待之情形也此乃國家體制不可紊越今徐嗣曽惟恐毫無調度跡涉推諉是以紛紛徵發以見留心努力並咨㑹廣東浙江等處挑備戰兵預資策應使本省兵辨號令兩岐事權不一且省垣重地自應多兵駐守今輾轉更調亦非慎重根本之道該撫于此案初起時尚能鎮定其後何以冒昧若此但究屬為地方起見尚無大咎亦不得因有此㫖過于畏葸而置要務于不問且督撫因此或致不睦更于公事無益徐嗣曽惟當與常青彼此和衷籌酌機宜協同妥辦以期迅速蕆事至該督等摺內所稱鹿仔港等處有客民義民共相糾集守護地方等語該處商民等激發公義保護地方甚屬可嘉著該督撫俟事竣後㑹同查明分别奬勵初十日己卯上諭內閣曰臺灣奸民林爽文等糾衆滋事一案該督常青𠞰捕逆匪一切調度堵禦機宜辦理尚屬鎮靜妥協現在水陸兩提督業經渡臺㑹𠞰逆匪自無難立時撲滅惟是海疆重地將來善後事宜均須妥協籌辦常青係初任總督恐未能料理裕如李侍堯久任封疆雖於軍旅未嫺而辦理地方事務于輕重緩急機宜較為熟練李侍堯著調補閩浙總督即馳驛前赴新任湖廣係腹地省分且地方寧謐無事常青自能勝任即著調補湖廣總督俟李侍堯到閩接印後常青即來京請訓再行赴任現在李侍堯自京啓程常青到楚往返尚需時日李封年老兼署督篆恐精神未能周到所有湖廣總督印務著舒常馳驛前往署理俟常青抵任後再行回京臣等謹案林爽文糾衆滋擾府城經該鎮道等保護無虞淡水鹿港等處又有義民幫同守禦爾時兩提督渡臺即可合兵痛𠞰而督臣常青于一切調度機宜尚無貽誤我皇上先事預籌以常青初任總督恐未能料理裕如特命李侍堯調任閩浙委以內地諸務令駐厦門用資經畫厥後總兵郝壯猷失守鳳山退回府城而黃仕簡病中昏憒人心未免驚慌次日常青即抵府城郡治得以無慮兵民咸獲安堵若非聖主知人善任算秉幾先則鳳山一失郡城必至失守迥非常情所能窺測萬一也上又命軍機大臣傳諭常青徐嗣曽曰常青甫經擢用總督即遇地方有此等案件亦其年運所致㑹逢其適但伊於辦理此案尚無不合惟是事定後一切善後要務均須妥協籌辦常青究係新任恐未能料理裕如李侍堯久任封圻能知事體之緩急輕重是以降㫖將伊與常青對調所降諭㫖俟李侍堯將次到閩時再行發抄若不然該省一聞李侍堯來閩之信常青必心疑獲咎恐欽差查辦意存畏懼轉致驚惶失措于事尤屬無益常靑接奉此㫖固不可因調任在即于調度𠞰捕一切事宜稍存觀望尤不可稍露端倪致地方文武員辨聞總督業經更換各存弛懈之見以致呼應不靈並傳諭徐嗣曽一體慎密諸事幫同常青實力妥辦若稍有泄漏致文武員辨聞知常青遇事掣肘朕必重治其罪恐徐嗣曽不能當此重戾也同日常青奏言署淡水營都司守備易連禀稱因營兵稀少先發示招募義民七千餘人鋪户捐備口糧器械實力防禦十二月初十日有八芝蘭賊首賴水郭穩等樹立大旗招匪千餘人遣夥吳異人即貢生吳志趙同胞叔吳尊伊弟吳淑夜游異等挺身到艋舺聲稱要帶兵前往接應借道經過不必驚惶阻撓等語經防禦義民報知易連將吳異人等四人拏解營中訊確隨押赴教場斬首梟示同日賊匪四處蜂起新莊賊首林小文劉長芳林三奇賴欲等下鹿仔中港厝賊黨黃祖成葉山林陳軒李壬等擺接莊賊黨賴樹賴國等戶尾八里坌長道坑等莊賊黨何馬何記吳三奇莊漢等各招匪千餘人俱竪立大旗占踞各處地方民房店房男婦老幼俱被焚殺拆毁新莊衙門易連于十二日辰刻帶領兵民先攻新莊以扼其吭守備董得魁把總蘇升等帶領義民五百名由艋舺渡河直攻下莊至草店尾大街千總席榮等帶兵三百名由草店尾河坡先斷浮橋進攻國王廟邉李因鄭追等督率義民五百名由武朥灣進攻中港厝監生黃朝陽林講等督率義民六百名由中港厝分路進攻海山頭又廣省義民邱龍四林貴陽等埋伏彭厝莊四面攻𠞰殺死賊匪五十餘人義民亦被害數十人十三日派撥户尾莊蔡才陳許林球等率領義民三百名和尚洲莊鄭忩楊景黃天麟趙暢等率領義民六百名大坪頂莊黃英王倍王步雲等率領義民等進攻户尾八里坌長道坑等處殺死賊匪五十餘人救出同知程峻並前任新莊巡檢李國楷兩家眷屬守禦港口十四日同千總張正耀等率兵三百名和尚洲莊鄭享蔡論陳唇等率領義民五百名由北投琪里岸孫立勳黃采黃辛元黃光等率領義民等由上埤頭抵內湖集攻八芝蘭殺賊五十餘名義民血戰餘賊逃散奪回大旗四捍馬一匹是夜賊匪蜂擁至擺接一帶竪立大旗扎備竹排正欲渡河時方回軍之際立即嚴行堵禦至十五日巳刻仍同各處義民分頭攻打擺接易連督同營兵三百名又陳必强徐固黃世四等督率義民六百名由溪州登岸直攻芎焦腳千總張正耀把總談朝亮等率領義民八百名由加臘仔過溪攻打南勢角林賀翁滿陳抱率領義民五百名由大坪林攻打暗坑仔等處四面㑹合殺死賊匪百餘人義民被殺五十餘人餘賊散入藤藔坑山頂等處奪得大旗鐵銃等件又派撥石頭街莊廣東義民徐勤佳戴華元等督率義民七百名三角湧莊龔東陳海陳誰李恍等督率義民七百名合攻桖仔林分投殺賊賊巢盡行燒燬但賊匪雖皆奔散現在復聚暗坑仔等處不時出沒艋舺一隅之地兵民力竭難以抵敵望速發兵由五虎門赴八里坌口進𠞰現獲賊匪劉長芳賴吞鄭昌盛蔡洪賴欲等五名已經囚禁嚴行訊供另禀等情竊思小醜竊發竟至四路響應是其蓄謀不軌必非一日其所稱天地㑹名目尤屬不經是否與諸羅匪犯楊光勳等所設之天地㑹暗樹黨援互相勾結應一面蕩平惡孽一面嚴切跟求務期水落石出至該署都司禀稱義勇殺賊事宜如果屬實尚屬奮勉勤事臣已飛檄曉諭務須共明大義志切同仇毋為賊衆搖亂至臺灣郡城為根本重地雖經探聞澎湖副將等帶兵赴援賊勢稍退而水師提臣黃仕簡計此日已可前抵鹿耳陸路提臣任承恩于十四日自蚶江登舟十七日開駕抵口天氣陰雨海道難辨不能前進二十日復起風暴連日猛烈難以放洋一俟風定立即飛渡現在兵力雖已厚集恐尚有隨宜應變之處臣密為挑備以資策應務期膚功速奏以靖海氛奏入上諭內閣曰林爽文于光天化日之下膽敢糾衆戕官占據縣城實屬罪大惡極法不容誅該署都司易連于賊夥吳異人等前往助賊時即擒拏斬梟以安民心所辦甚屬可嘉易連俟事竣後著該督給咨送部引見至該處生監商民激發公義糾衆攻殺賊匪保護地方實可嘉奬著該督等查明分别旌賞以示優奬其義民內有被賊傷害者並著該督等于事竣後查明具奏照陳亡兵丁之例一體議恤十三日壬午兩廣總督孫士毅奏言現在提臣黃仕簡帶兵渡臺督𠞰粵東與閩省水陸緊接查拏堵截更應格外加嚴現已密派妥幹辨員于各隘口商船漁艇往來處所改裝易服梭織逰巡不露圭角遇有形迹可疑之人立即盤詰究辦以絶奸匪鬼蜮伎倆至南澳一鎮與厦蚶地方互為犄角提臣黃仕簡移咨南澳鎮臣預派左營戰兵三百名以備調遣臣恐兵數太少不足以壯軍威臣現于附近閩省各鎮協營內共挑選水師戰兵一千名配定戰艋備足軍火器械裹帶一月口糧並派撥得力之統領將備員辨一一料理停妥設有徵調便于立即起程以資策應此外再于戰兵內挑選水師五百名陸路一千五百名共二千名預備調遣再查潮州府與閩省接壤聲息相通自潮州至廣州府省城尚有一千二三百里臣恐在省得信較遲除咨㑹署提臣彭承堯先赴潮州稽查彈壓臣將督撫兩署事務于數日內略為料理即親赴潮州駐劄以便遇有防範徵調事宜即可就近辦理以期迅速省㑹現有將軍都統同城臣令藩臬兩司隨同督察足資料理奏入上命軍機大臣傳諭孫士毅曰閩越境壤毗連臺灣賊匪糾衆滋事孫士毅接准咨文派兵前往預備策應及嚴飭各隘口嚴密盤詰此係當辦之事至孫士毅係鄰省總督止當鎮靜地方堵拏逸犯豈得輕離省城以致粵東內地民人心懷疑惑外省各督撫遇有此等事件每以親身前往見其急公而不權事理之輕重緩急孫士毅此時如尚未起程即毋庸前往若業已起程亦即速回省同日徐嗣曽奏言前預調建寧延平鎮營兵一千名來省以備督臣調派據准督臣咨㑹於督撫二標派兵一千名令延平協副將林天洛帶領由南臺配船至閩安出口前抵鹿耳門㑹𠞰建延官兵即留於省城駐劄等因查延平兵五百名業經到省建寧離省較逺所派官兵現尚未到臣即照督臣咨㑹於督標內派兵六百名臣標內派兵四百名備齊船隻由南臺開行至閩安候風放洋其延建兵到齊之時即留省城駐劄再查淡水新莊等處現已據都司易連禀率勵義民奮勇𠞰殺賊匪雖暫奔散現在復聚暗坑仔等處請速發兵進𠞰等情查總兵郝壯猷所帶之兵近准督臣札㑹催令仍赴淡水救援及臣所派調閩安協副將徐鼎士帶兵前後進發是淡水一路兵勢已為壯盛一渡八里坌進口便可得力臣仍另遣熟諳路徑之小船往來探報奏入報聞十四日癸未臺灣鎮總兵柴大紀奏言本月初六日賊匪占據諸羅分路來犯郡城臣于初七日拿獲奸細林馬一名嚴審供出賊匪分二起一自諸羅山下茄苳來犯府城北門一在笨港將營盤燒燬知鐵線橋一路有官兵駐劄難以經過隨往海邉拏小船由海道來犯府城西門等語臣相度形勢惟有鹽埕橋地方可以截拏水陸兩路一面將該犯林馬正法一面飛飭在城文武員辨嚴守城池並飛飭臺協水師多撥哨船沿海堵禦臣即督率官兵飛馳鹽埕察看海邉一帶已有小船數百隻浮水而來俱係賊匪飭令辨兵施放鎗炮被母子炮打沈小船數十隻餘船遠逃又見遍野賊匪萬餘蜂擁而至隨督率辨兵奮勇與戰初九日賊匪被鎗炮打死者不過數十名旋退旋來全無畏懼初十日復來自已至亥賊匪被大炮打死者約四五百名被牌鎗打死者約二三百名生擒賊匪二名即行正法賊匪稍退因在黑夜就地劄營十一日卯刻復來攻犯大營賊以綿被透濕遮牛車上向前當我鎗炮牌鎗鉛子不能入施放大炮始能打透牛車賊匪不能抵當打死甚多於未時稍退旋散而復聚又復蜂擁前來臣鼓勵辨兵奮勇力戰賊匪被鎗炮打死者亦多生擒賊匪六名立即正法奪回母子炮二尊並器械火藥鉛子甚多大紅旗一面寫順天二字餘賊前逃追至木柵二十里外天黑收兵十二日早賊衆數萬復三面擁至官兵施放鎗炮打死賊匪約有一百餘名自卯至未賊尚未退守備邱能成打死騎馬賊一名又臺灣知縣王露帶義民七八百名亦來助戰我兵益振打死賊匪二百多名賊衆畏懼始退但彼衆我寡又值黑夜海霧濃布不敢前追十三日五更飭令守備邱能成外委蔡開祥帶兵三百名潜往離營盤十餘里之大穆降埋伏候營盤炮響即轉攻其背已刻遠見賊果復來當飭官兵不許先放鎗炮俟賊漸近營盤臣隨放號炮督率官兵並臺灣義民齊力向前兵丁賴連升首先過橋放鎗打死一賊各兵隨齊放鎗炮邱能成帶兵亦經殺到前後夾攻打死賊匪百餘名殺傷騎馬賊一名賊皆四散奔逃查賊匪林爽文等係漳州人諸彰漳民所到附從且臺屬原有逰手棍徒名為羅漢腳從賊搶掠所以猝然數萬雖連日打仗被我兵打死千餘名尚不及十分之一臣鎮守海疆失陷城池罪無可逭惟有奮不顧身力圖恢復誓不與賊兩立又接臺灣道永福札稱鳳邑參將瑚圖里于十二日聞知賊匪有攻打鳳城之信即帶兵三百名劄營城外十三日天明有賊匪二千餘名直攻縣城瑚圖里施放鎗炮僅斃賊五六人賊勢稍退瑚圖里放馬直追賊匪乘虛由龜山北門撲入城內斯時官兵鎗炮莫施旋即潰散瑚圖里縱馬由南而去不知下落賊人進入縣署該縣湯大奎自刎等情隨飭澎協水師逰擊蔡攀龍帶兵七百名城守右營守備邱能成帶兵三百名前往南路𠞰捕以復鳳山臣仍劄鹽埕橋截拏北路賊匪再相度形勢自鹽埕橋以北平原百有餘里大小村莊星羅碁布俱蓄朿竹為圍賊衆奔逃諒必散匿各莊若我兵乘勝直前彼四處潜聚出而截我後路來攻郡城更屬可慮臣督率官兵各處搜捕務使各莊俱無賊匪潜藏即便長驅以進恢復諸彰二邑賊勢雖甚猖獗不過烏合之衆臣惟有竭盡駑駘以圖殱滅醜類奏入上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽柴大紀曰此次柴大紀與賊打仗奮勇得勝尚屬可嘉北路賊勢蔓延鹽埕橋係水路扼要之區該鎮自應仍在彼督率𠞰捕未便遽回郡城以致賊人踵後且南路既經該鎮派撥澎湖協及城守兵丁共一千名前往諒亦足資抵禦至林爽文等輒敢竪旗結㑹並用鎗炮攻犯城池竟屬有心謀逆此皆由從前辦理械鬭各案該地方官等止期就案完結將就了事並未徹底嚴辦以致刁民肆無忌憚釀成巨案此次惟有痛加誅𠞰以示懲創斷不可使一名幸逃顯戮但此時不可稍露端倪使賊匪自知必死負嵎固守轉于攻捕無益總之助賊者即係亂民法無可貸其不肯從賊及幫同官軍出力者無分漳泉俱係良民自應一體奬勵使賊勢日孤易于竣事欽定平定臺灣紀略卷二
