  text: 欽定四庫全書欽定平定臺灣紀略卷五十一
  hash: sha256:c74217c372d00e5214231cc84d3b6547f860e76485e44c8f66e920ea8e6755b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_051-1a, image: WYG0363/WYG0363-0617a.png}
body:
  text: 正月十二日乙亥上諭內閣曰恆瑞自臺灣帶兵赴援觀望遷延種種玩誤又妄行奏請添兵張大賊勢若治以搖惑軍心之罪即應按軍法立斬豈福康安曽經屢次出兵而于行軍紀律尚未之知幸而朕于𠞰捕事冝先機籌畫早命福康安前往督辦恆瑞奏請添兵時福康安已將次到彼人心鎮定不至為恆瑞妄誕之詞遽有搖動若彼時福康安尚未奉命前往則臺灣祗有常青一人其將領兵民等見恆瑞係恭贊大員如此張皇失措奏請添兵必為其浮言所惑心懷疑懼阻其鋭氣不但臺灣全郡俱至動搖即福建內地亦皆人心惶惑尚復成何事體恆瑞妄言惑聽本應即在軍前正法前次朕所以稍從寬辦不即將伊請兵奏摺發抄治罪者以彼時官軍𠞰賊尚未得手正值人心惶遽之時若遽將恆瑞怯懦張皇之奏宣播中外既慮有駭聽聞兼恐外間無識之徒以將軍參贊等勦捕賊匪奏請添兵朕轉靳而不與妄生議論是以未即宣示止降㫖福康安即令恆瑞回京今𠞰捕事務業已將次完竣即是不須添六七萬大兵之明驗恆瑞前此妄言之罪自應核辦試問之福康安現在豈待恆瑞請添之兵到彼始能解圍破賊攻克賊巢耶恆瑞前次所奏非妄言惑聽而何朕因念恆瑞年輕無識且係宗室姑援議親之條不即置以重典僅令回京候㫖已屬格外施恩乃福康安節次奏到之摺曲為庇護將恆瑞聮寫銜名又屢于摺內聲叙恆瑞帶兵打仗試思伊為滿洲大臣衆皆打仗伊不打仗逃往何處乎且屢經令福康安向恆瑞逐欵嚴詰妄請添兵搖惑軍心是其首罪乃福康安並不問此一條轉為之多方開脫且稱其打仗奮勉仍請留于軍營該處帶兵如鄂輝舒亮普爾普等之逺勝恆瑞者正復不少豈必須恆瑞一人其意不過遇有帶兵打仗即可將恆瑞補叙功績冀朕加恩録用又前因保寧在四川將軍總督之任足資倚任而福建將軍在目前為要缺是以將鄂輝調任福州以資鎮馭嗣因保寧補放伊犁將軍川省現無熟悉畨情之人故仍將鄂輝調回成都而以常青仍為福建將軍福康安具奏時尚未知保寧調任伊犁之信何以欲將鄂輝仍留成都福康安不過因恆瑞本係福州將軍希冀仍留恆瑞原任之意福康安自問常青不如恆瑞之為將軍耶此等處豈能逃朕洞鑒福康安由垂髫豢養經朕多年訓誨至于成人今甫經委任畀以軍旅重寄即現在𠞰捕賊匪攻克賊巢皆朕指授方略再三訓示將士等踴躍用命始能所向克捷今甫經解圍得勝朕即優加奬賞福康安自當倍加感奮迅速擒拏賊首尅日蕆功以期承受恩眷乃竟敢藉此微勞袒護親戚此等伎倆豈能于朕前嘗試耶本應從重治罪因念其現在帶兵𠞰賊業經攻克巢穴拏獲逆犯家屬姑從寬免其深究著傳㫖嚴行申飭福康安惟當益知愧懼力改前非若能將林爽文莊大田生擒解京尚可將功補過仰承恩眷至恆瑞仍著福康安遵照前㫖革去職銜伊係宗室不忍拏問令其自偹資斧速行來京交部治罪至輕亦當發往伊犁效力贖罪以示懲警是福康安愛之實所以害之也朕辦理庶政于臣下功罪賞罰嚴明惟視其人之自取而于軍旅重務有功即賞有罪必罰豫奪昭然是以人思奮勵用能平定西陲大小金川拓土開疆大功屢告即此臺灣逆匪雖係蕞爾一隅皆經朕宵旰焦勞先機决䇿未嘗以老而怠而昏而於諸臣功罪猶無一毫假借內外大臣皆當明喻朕意上又命軍機大臣傳諭福康安海蘭察曰林爽文莊大田等罪惡貫盈為渠魁首惡非若大名案內之段文經可比段文經不過一無藉奸民即使竄匿稽誅不至慮其復行滋事然日久不獲已屬不成事體况林爽文肆行不法罪大惡極今以如許重兵前往𠞰捕必應設法先擒解京極行處治豈可容其漏網遽得謂之完事乎若此時不行速獲或至逆首竄往他處將來大兵撤後復潛出煽聚更復成何事體總之福康安等若已將林爽文拏獲于上元前後奏到即係伊福分自可承受恩眷倘此數日內竟無擒渠報到朕即因伊等打仗奮勉不深究遲滯之罪伊等自思亦何顔仰􅌽茂賞耶計此㫖接到之前福康安等自己在彼設法擒拏斷不至俟此㫖到日始行上緊搜捕但朕宵旰厪懸倍深焦切不得不諄諄告誡福康安等務須益知愧奮勉圖奏績十四日丁丑福康安海蘭察鄂輝同奏言前遣社丁杜敷及投出賊目阮和等分投跴探賊踪去後兹據阮和等禀稱林爽文逃入內山尚有餘匪二千餘人聚集小半天山頂拒險死守又據杜敷稱探林爽文逃入埔裡畨社相近地方潛匿已差生畨前往密查一得確信即行飛禀各等語臣等查內山各處隘口已分派官兵防守惟小半天山頂地勢極為險峻有僻近可通內山尚為賊據必須將該處賊匪殱除招致山後生畨堵截方為嚴密隨于十八日進兵臣福康安鄂輝帶領特勒登徹穆克登阿袁國璜及巴圖魯侍衛等為一路海蘭察恆瑞帶領普吉保許世亨春寧及巴圖魯侍衛等為一路俱由前山進攻普爾普帶同副將張芝元參將吳宗茂騎都尉陳大恩都司劉懷仁率領廣東屯練兵丁等另為一路于四鼓前進繞過大山夾攻賊後三路官兵到小半天山麓時已黎明該處草深樹密路徑逼窄陡險之處攀藤方可登陟賊人在山頂竪立木柵柵內壘石作墻搭蓋草藔又將道旁大樹砍倒橫塞道路恃其地險以為久據死守之計我兵攀緣直上進至半山賊匪一齊壓下勢甚潑猛臣等傳諭各兵以山路險惡無可駐足之地今已仰攻至此有進無退辨兵等俱各踴躍用命不避鎗炮蟻附而上打死賊匪百餘名賊始竄回柵內投石放鎗抵死抗拒攻圍直至己刻普爾普率領廣東屯練官兵攀倒木柵奮勇先登賊匪登時潰散各兵盡力追殺鎗斃賊目十餘人生擒賊目林追林二林添孫東湖王若敬五名殺賊二百餘人奪獲鎗炮鉛藥器械及馬匹牛隻米榖等項將賊匪木柵草藔全行焚燬臣等即由該處查看地勢及各處隘口回營旋據義民首張源勤帶領社丁陳保並生畨頭目十餘人來見當即酌加賞賚面詢內山路徑並跟問逆首踪跡僉稱聞得林爽文現在埔裡社埔尾等處潛匿所言與杜敷跴探情形約略相同臣即令杜敷派撥鑾鑾社興武郡社鶴骨社木格社致霧社內外眉社生畨在埔裡東南沿溪堵截其埔裡東北一帶山口要隘雖已嚴密但逺在山外不能制其北竄內山之路已飛飭徐鼎士徐夢麟等帶領屋鰲等社生畨岸裡社熟畨進至內山蛤仔攔等處在東北靣堵截又令普爾普普吉保張芝元帶領兵丁由內木柵入山在西北靣堵截查內木柵係生畨地界復派通事黃寬傳集北投地方熟畨引路前進嚴飭官兵不許稍有擾纍生畨令致疑懼並一靣曉諭該畨等加以賞賚令其各撥畨丁一體幫同堵拿現在水沙連各社生畨臣等設法招徠該生畨等無不遵奉約束效力爭先一俟各路官兵㑹齊即帶領大兵由埔裡社西南隘口進山搜𠞰斷不使逆首逃匿稽誅再賊目李七係泉州府同安縣人為賊中有名頭目從前即有投誠之信曽領受恆瑞蔡攀龍檄諭臣在厦門時即聞知此事到諸羅後因蔡攀龍籍𨽻同安令其遣人招撫並令泉州義民等分投偵訪離間賊黨而李七畏罪遲疑不敢遽行投出兹據義民首馬應祖等訪獲李七之母李沈氏妻李林氏及伊兄李水解送來營據李沈氏李水供稱李七本是被賊逼迫無奈順從早想投出又懼治他從賊之罪後來逃在山裡如今願去尋他令其投到等語臣已將李七母妻暫留令李水往尋李七俟投到時再行究辦又逆匪滋事之初攻陷城鎮各該處文武官員印信多有遺失臣自進兵以來于賊莊內派員逐細搜查陸續起獲臺灣北路副將關防一顆北路都司關防一顆鹿仔港理畨同知關防一顆諸羅縣印一顆彰化縣分駐南投縣丞關防一顆彰化縣猫霧捒巡檢印一顆各印俱被賊人搶去多有捶損毁壞不堪鈐用其臺灣府印彰化縣印于城陷時經孫景燧俞峻家屬帶出並未遺失而印文甚屬糢糊亦須更换查此次賊平之後查明緊要地方添設官員酌量移駐印文字樣均應另行擬定且臺灣土語謂殺為臺而呼官字又與灣字無異臺灣二字實非吉語亦應另易嘉名容俟辦理善後事冝時酌議具奏奏入上命軍機大臣傳諭福康安海蘭察鄂輝曰前次福康安自十一月二十五日攻破賊巢遲至十二月初四日始由平林仔發兵前進使賊匪得以乘暇收合羽黨于集集埔預為布置據險扺拒已屬辦理遲緩逮官兵攻克集集埔後于十三日在水裡社拏獲逆首家屬福康安等若能及早帶兵直往小半天一帶搜捕則賊匪窮蹙奔逃救死不暇豈能收集黨夥二千餘人于山頭竪栅壘墻搭藔拒守且官兵進攻山梁時賊匪投石放鎗抵死抗拒彼時林爽文自必尚在該處潛匿若福康安等于賊匪未經布置之先即已統兵前至該處林爽文豈能據險抵禦屢次使之乘間逃逸乃福康安等又不即時前進延至十八日始帶兵分路攻𠞰距拏獲逆首家屬時中間又隔五日賊匪得預為扼險死守之計是福康安不但有失機宜且使賊匪得以乘暇設偹又須帶領官兵到處攻𠞰即福康安自為計豈非舍易而就難耶再批閲圖內于山外各路口安設營盤不下二十餘處計每處派兵四五百名已不下萬餘似此于無甚緊要處零星分派置之無用之地豈不又如從前恆瑞普吉保于鹽水港笨港一帶分兵零星堵禦致兵力以分而見單乎况福康安在東埔納駐劄距逆首逃竄之埔裡社尚逺何不前至舒亮駐劄之歸仔社劄營且現在分兵堵截自應酌留一二通內地隘口毋庸設兵使林爽文見此數處無兵防堵或由該處仍逸入內地不難四路圍截立就擒獲今將各隘口悉行設兵堵截是轉恐其入山不深驅之使入豈不失計福康安此時應將圖內硃筆㸃出各隘口酌量將官兵撤去合兵一二萬福康安竟當親自統領直入埔裡社內山跴探林爽文潛匿處所跟踪追捕即該處生畨語言不通與禽獸無異今林爽文潛匿內山亦難與生畨通語聮絡其所帶夥匪僅止一二千人尚可四處竄逸不畏生畨豈福康安帶領大兵數萬轉慮生畨野性難馴有所畏怯乎若生畨等震懾兵威將林爽文擒獻固屬甚善設使冥頑助逆即趂此兵力亦無難將生畨等痛加殱戮總之林爽文逃匿何處福康安即帶兵向該處跟踪追𠞰以期必獲此皆福康安節次辦理遲緩自貽伊戚其跋涉勞苦皆所自取福康安務奮力速進生擒逆首以副委任十六日己卯常青奏言臺灣府城北至嘉義縣一路前經福康安派令普爾普帶領官兵自縣至府復自府回縣往來追捕賊匪逃遁道路已通其府城以南臣屢次搜剿勢亦消散所有敗退竄伏之賊時或潛出搶掠覔食臣營盤雖存兵無多兹值北路大兵迅掃賊巢競思振奮一聞探報賊踪立往迎擊皆能爭先殺獲賊衆登時奔潰節准福康安來咨賊巢業已蕩平賊首尚未弋獲臣再嚴飭文武員辨兵役加緊巡查不使稍有踈漏惟查南路賊首莊大田前聞匿跡大武隴山內近又訪聞在南仔坑地方查該處與水底寮一帶係鳯山縣屬皆有匪類藏匿距東港頗近臣前派副將丁朝雄等收復東港以通糧路帶兵一千二百餘名僅可駐守今李侍堯挑派內地各營兵一千現已先到六百五十餘名不日到齊臣即酌撥六百名添赴東港後到三百餘名派守府城合計丁朝雄原帶之兵共有一千八百名再令㑹同廣東泉州等莊義民一二千相機前進開通鳯山道路就近設法擒拿莊大田並其賊目匪黨又飭令鳯山縣知縣張升吉前往該處將投出之附合脅從人等廣為招撫安插歸莊並據臺灣縣知縣王露曉諭民莊各舉紳耆聯絡附近莊衆守望相助遇賊拏解仍踪跡莊大田協擒解獻奏入上命軍機大臣傳諭福康安海蘭察鄂輝常青曰前此派令福康安赴臺灣辦理剿捕逆匪事務福康安奉命時即不免有畏難之見中途屢次奏請添兵經朕再四降㫖詳悉開導彼時朕深慮福康安未必能迅速蕆功已諭令奎林星馳赴京原欲令其前往臺灣幫同帶兵剿捕並令阿桂赴閩駐劄厦門調度一切以資䇿應及至福康安帶兵渡洋由鹿仔港進兵數日之間即能直抵嘉義縣城殺賊解圍打通道路並即攻克斗六門直抵大里杙摧破賊巢痛殱匪衆屢奏捷音朕初不料其辦理如此迅速為之喜出望外是以不次加恩以示優奬乃福康安屢與賊人以暇致失事機今林爽文業經竄入內山僅將其家屬拿獲豈得謂之蕆事又焉有官兵始終曠日持久在彼等候搜捕之理且生畨等頑獷性成直與禽獸無異祗可懾以兵威不可徒事招致與之講解况各社生畨不下數萬豈能一一感化一一賞賚搜捕機冝全貴迅速不獨擒拿逆首為然即如尋常追捕亦須趂勢及早擒拿若稍涉延緩往往乘間逺揚卒致漏網上年直𨽻大名案內首犯段文經亦因該督等不即查拿以致該犯逺遁至今未獲而林爽文一犯更非段文經可比今窮蹙之際尚敢率領夥黨二千餘人竄入內山設不即時拿獲或復行糾合南路賊匪煽聚滋擾或繞出大兵之後仍在大里杙截掠軍糧皆不可知爾等亦曽思及此否至常青本日所奏不過敷衍塞責常青在府城駐兵日久並不能督率將辨將南路賊匪痛加剿殺廓清道路竟至一籌莫展實屬無能常青亦著傳㫖嚴行申飭又昨據福康安奏臺灣二字似應另易嘉名等語所奏殊可不必前此將諸羅縣改名嘉義原因該處義民幫同官兵守城殺賊咸知大義甚堪嘉尚是以特改縣名用是旌異至臺灣地方自聖祖平定後設立府縣即以臺灣命名沿用至今其土語與字音偶有訛同之處亦無甚關係况並未之前聞自不當輕議更改即此時另改他名而臺灣二字沿習已久人亦必仍稱舊名是即更改亦屬無謂此皆捨正務而用心于無用之地矣著傳諭福康安於辦理善後章程內祇須將該處改建城垣添設丞倅辨兵一切應辦事宜悉心籌酌妥協務期一勞永逸其更改地名一節毋庸提及亦不必形之言語也十七日庚辰常青奏言府城為南北要衝此時北路竄走之賊或與南路匪夥偶通聲息希圗援救均未可定臣於營盤外近山各要隘並鹿耳門上下口岸督率巡查多為防範以期周密此現在未便分兵南下逺離府城之實在情形也所有李侍堯𣲖到舊兵一千尚未到齊其先到六百餘名已派撥添赴東港因訪聞莊大田近日潛匿南路南仔坑或大武隴二處行踪無定臣是以飭令東港帶兵將辨協同義民等固守港口仍酌量添兵就近設法相機剿捕復令地方官撫輯逺近民莊並懸重賞緝拿首夥各犯一經獲到不須多用兵力而收復鳯山肅清南路即可尅期竣事奏入上命軍機大臣傳諭福康安海蘭察鄂輝常青李侍堯曰福康安前此具奏柴大紀為人狡詐不可深信一摺於柴大紀如何貪劣如何誤事如何懼賊不進兵實跡並未列欵恭劾經節次降㫖飭諭兹據軍機大臣奏福康安有寄伊等公信一件內稱柴大紀守禦縣城並非伊之力量福康安到縣城時面見柴大紀形貌並非勞瘁馬匹亦皆臕壯城中糧食並未斷絶其接奉諭㫖不肯帶兵出城一節亦係義民等不肯將伊放出伊亦畏賊不敢出城守諸羅一事朕不忍以為柴大紀之罪至於其他聲名狼藉縱兵激變不肯帶兵剿賊柴大紀既有此等情節福康安于具摺時何不逐欵指出據實參奏即或因縣城甫經解圍未便即將柴大紀參劾亦應將以上各情節隨摺寄知軍機大臣令其代陳朕亦得以悉其原委可無須再三飭諭乃福康安既未於摺內列欵糾恭又不早寄知軍機大臣代奏試思柴大紀在縣城被圍日久其奏到接奉諭㫖不肯帶兵出城一摺披閲之下朕為之墮淚即在朝諸臣凡有人心者亦無不以柴大紀竭力守城稱其義勇是即柴大紀小有過失亦當録其大功而宥其微眚豈能據福康安所奏柴大紀為人狡詐不可深信一語遽治以無名之罪若因此籠統虛詞即將有功之人加以罪譴又何以服衆心而示天下耶此事福康安具奏含糊固難辭咎而李侍堯心存容隱其咎較之福康安為尤重前問李侍堯之諭尚未覆奏想亦難為措詞耳本日常青所奏總不過敷衍塞責殊屬無謂前因其初至郡城調度一切尚為妥協且伊已年老尚能親自帶兵打仗是以賞戴雙眼花翎以示奬勵今半載以來株守郡城毫無出力念其尚無大過與恆瑞之搖惑人心者有間伊于閩省情形尚為熟悉業經補用福州將軍伊自當照將軍職分戴用單眼花翎十八日辛巳上命軍機大臣傳諭福康安海蘭察鄂輝曰福康安等自攻克小半天後該處距埔里社不逺各路分𣲖之兵當早已㑹集合力搜捕逆首林爽文自必早就擒獲日內亦應有奏報擒渠信息何以尚未見奏到總之逆首林爽文若于此數日內奏報擒獲方為妥協設再遲延日久恐逆首輾轉潛匿搜捕較為費力此時福康安既已派兵在內山各隘口分路堵截其內山東面大洋並無口岸自無慮其逃竄而北路又有熟畨等幫同官兵堵截亦難竄逸惟向南一路山徑毗連或林爽文竟從此路逃竄與莊大田聚合一處該處俱屬內地不難分𣲖官兵悉力搜捕將賊目賊首一並擒獲福康安惟當倍加奮勉探明逆首逃往何路跟踪追捕立就擒縳毋令乘間逺逸若首惡渠魁稽誅漏網竟至全無下落尚復成何事體耶朕為此事日夕焦勞著再傳諭福康安務遵節次諭㫖直入內山將林爽文迅速拿獲毋得再事遲緩二十一日甲申上命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰福康安自十一月二十五日攻克大里杙後遲至十二月初四日始由平林仔發兵及攻克集集埔在水里社擒獲林爽文父母家屬又復延至十八日始攻剿小半天輾轉稽遲此必係福康安到彼聽信恆瑞之言以生畨素稱頑梗獷悍異常若官兵輕進必致擾動生畨别滋事端是以徐徐進兵隘口惟是招致懸立重賞冀生畨等自行擒獻殊不知此等生畨可以威懾而不可徒以利誘况各社生畨豈能一一賞賚未經得賞者又安能望其出力為官兵擒拿逆首耶計小半天地方相距林爽文竄匿之埔里社埔尾至遲不過三日路程官兵即可到彼若已將逆首擒獲自必具摺馳奏計本月十七八日即當奏到今已閲七日尚未據奏到擒渠之信又屬無望畏事之人稱內山係生畨地界不種五榖該處生畨俱係打生覔食林爽文帶領顆匪數千即在彼潛匿無從得食但自林爽文竄入內山以後于福康安前此發摺時已閲二十餘日逆首等並未因人衆乏食盡皆餓斃又豈可徒在隘口堵截林爽文一日不獲即官兵一日不撤經年纍月與賊相持雖駐兵日久經費亦屬小事但臺灣地方一交三月氣候即已炎熱所調官兵內如屯練貴州及别省兵丁素來不耐濕熱若至彼時尚在該處駐劄必致易生疾病其氣更餒或林爽文聞知官兵不習水土多有疾病竟乘間潛出滋擾或攔截官兵運送糧餉火藥之路或將官兵前往府城道路中間攔截關係甚重皆不可不慮况南路莊大田現在糾衆肆擾常青祗辦自守不能望其帶兵剿捕設林爽文又在北路逞其狡獪伎倆牽掣大軍更復成何事體耶朕意福康安此時與其在彼駐守未能直入內山將逆首即時擒獲豈可老師糜餉不為改絃易轍之計約計此㫖到日已屬二月中旬如福康安已早將逆首擒獲帶兵前往南路搜捕莊大田固屬甚善倘福康安接奉此㫖時尚未生擒逆首不可不急思變計竟當趂氣候尚未炎熱之時將各隘口官兵撤回徑趨南路將賊目莊大田拏獲收復鳯山肅清道路其北路一帶轉不妨示賊以隙使林爽文聞知大兵業已撤去或自內山逸出希冀竄往他處自尋生路則逆首竄入內地轉可易于搜剿彼時福康安于廓清南路後復移兵北向四面截拏攔其入山之路自無難將逆首一鼓成擒即使大兵撤後難保林爽文不逃入內地復行煽惑但此亦不足為慮前此林爽文在北路及嘉義滋擾各處村莊民人原俱被其煽誘迫脅而大兵一到無不立時殱除解散紛紛奔潰况林爽文當逃竄之餘豈能復行糾結即使潛相勾引該處民人已知官兵聲勢豈肯一一聽從縱有聽糾入夥者亦斷不能如前之多官兵再行搜剿自必如摧枯拉朽易于撲滅反可淨盡根株此事理之顯然者福康安如尚未拿獲逆首竟當遵㫖而行不必心存疑慮倘更有何善計較此為勝者亦不妨速行總期大功尅日告蕆原不必拘執也欽定平定臺灣紀略卷五十一
