  text: 欽定四庫全書欽定平定臺灣紀略卷五十二
  hash: sha256:b09ccbe0d5921e022d752cf04351979a7c012a38c20b270c9b4789bd50ab91f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_052-1a, image: WYG0363/WYG0363-0628c.png}
body:
  text: 正月二十三日丙戌李侍堯奏言上年赴閩途次即風聞內地派往臺灣戍兵多有賣放私回以致缺額其在臺者惟上遊延建等兵留在營中當差而漳泉兵則聽其在外營生開賭窩娼販賣私鹽恣為姦利鎮將等令其按月繳錢如該兵獲利甚厚又須再有餽送而經年並不操演逮各兵换班回來鳥鎗俱已鏽澀難用等語臣隨查臺灣戍兵本有萬餘何以賊兵猝起旬日之內連陷三城是賣放缺額之説必非無因遂於到任第三日即咨查黃仕簡柴大紀令其開造存失各兵庶可核算在臺實數常青過臺後臣又屢次札知直至四月初四日準常青將柴大紀所開清單送到臣查單內府城存兵一項有戍兵三千七八百名而據臺灣道府請兵稟內稱府城內僅有參將潘韜帶領戍兵五百餘名之語其數逈異隨又飛咨就近轉飭查核至九月二十四日始據柴大紀飭水師中軍逰擊孫全謀造報內開現在戍兵在府城及諸羅等處實共有七千五六百名此外傷亡散失者委無可查等語臣以該逰擊所報無著者竟有二千三四百名雖賊擾時不免亡失亦何至如此之多且從前亦未據報顯有情弊應再行駁查而是時正值賊勢鴟張柴大紀在嘉義縣守禦緊急之時臣若以此等未經查實之事遽行陳奏殊覺冒昧是以臣未敢具奏其柴大紀私令兵丁渡回內地貿易之處臣實未有所聞是以並未留心查察而臣所聞兵丁在外營生按月繳錢之事雖留心查察又未得有實據至前嵗賊匪滋擾一事臣亦聞賊匪將至府城柴大紀恇怯不敢出戰永福楊廷理催令出兵楊廷理并面加誚讓激以將總兵印見付我當代為殺賊柴大紀始帶兵出城其時實有此傳説及臣再加察訪則又聞柴大紀在鹽埕橋堵扼尚為出力黃仕簡到臺令其收復諸羅即能殺退賊匪克復縣城其守城數月與賊打仗往來船户亦俱稱其最為賊所畏懼所聞柴大紀恇怯無能之説又似難盡信臣與柴大紀素未謀面伊平日或有骫法侵漁之處亦係前任督臣失察臣可毋庸代為隱諱且臣於上年二月十七日到任因有戍兵缺額之風聞即於十九日咨查臺地存失兵數并於三月初八日敬陳軍營情形摺內曽經奏明是臣不敢稍存瞻徇之處並非飾説實以地隔重洋凡有風聞未得確據臺地各官與柴大紀同事者又俱在臺灣現因軍務繁多但有自內地派往之員並無自臺灣回來之員其因解餉往來者又非久在臺地得知詳悉是以無從訪確若行查該道府等又恐稍有漏泄柴大紀正在帶兵堵禦或聞之而心生疑懼轉於軍事無益是以並未敢札查及秋冬間見柴大紀力守孤城當兩路援兵俱不能進伊猶固守待援不肯捨士民而出臣實心服其為人亦不暇更事吹求留心查訪以致始終不知其有無劣迹此實臣粗踈輕信之咎懇交部嚴加議處至德成所指柴大紀不法營私釀禍之處及此外有何别項劣迹究須徹底查辦容臣再行嚴查密訪務得實迹列欵恭劾庶足以服柴大紀之心斷不敢稍有徇隱自取罪戾奏入上諭內閣曰柴大紀往嘉義縣剿捕賊匪縣城被賊圍困數月始終保守無虞是以特沛殊恩用昭懋賞嗣據福康安奏其為人狡詐不可深信朕尚以柴大紀有守城之功未便以無據空言加之罪譴昨德成查勘海塘回京據奏風聞柴大紀自復任臺灣總兵貪縱營私廢弛營務並令兵丁私回內地貿易激變貽悮玩視賊匪種種釀成巨案朕以德成自浙回京距閩不逺所聞必非無因隨降旨令福康安李侍堯琅玕各行查實具奏旋據琅玕奏風聞柴大紀私令守兵渡回內地貿易每月勒繳銀錢又駐守嘉義縣時係畏賊不出並非實心守城本日又據李侍堯奏臺灣戍兵多有賣放私回以致缺額其留營當差之兵亦聽其在外營生開賭窩娼販賣私鹽鎮將等令其每月繳錢經年並不操演經李侍堯咨查始據柴大紀開報現在戍兵實止共有七千五百名此外則以傷亡散失無可查核為辭觀之不勝駭異又稱前嵗賊匪滋擾府城時柴大紀恇怯不敢出戰經永福等面加誚讓始帶兵出城等語用兵之道當賞罰嚴明此次賊匪紏衆滋事竟由柴大紀平日廢弛貪黷積漸釀成豈可以守城微勞置之不問况柴大紀先在府城既畏賊不敢出戰又移駐嘉義縣時保護無虞全係兵民之力即所奏糧餉斷絶各情節亦多不實而其貪劣各欵現經查有確據此而不嚴加察辦何以肅軍威而警官邪柴大紀著革職拏問交福康安逐一嚴審明確定擬具奏其福建水師提督員鈌著蔡攀龍補授所遺員鈌著梁朝桂補授至常青在閩年久擢用總督亦有年餘柴大紀平日骩法侵漁廢弛營務常青豈無所聞且據李侍堯奏於常青前往臺灣時曽以該處戍兵缺少札知常青是常青渡洋時李侍堯亦必將柴大紀各欵迹一并向常青述及常青既抵臺灣見聞更確况與永福楊廷理朝夕相見斷無不將柴大紀各欵向永福等詢問永福等亦斷無不詳悉告知常青之理乃常青竟無一字奏及殊屬昧良辜恩有心徇隱常青亦著革職即交與福康安一并嚴審據實具奏其福州將軍員缺著魁綸補授魁綸資格本淺念其係尚書查弼納曽孫且人尚明白是以加恩擢用現在臺灣剿捕事宜雖即日完竣而善後各事正需人經理魁綸即由驛星速前往臺灣隨同福康安學習辦理一切事務所有四川建昌鎮總兵員缺著芝元補授臣等謹按柴大紀貪縱營私居心狡詐當嘉義被困時實因義民不肯放伊出城乃藉口於不忍數萬生靈委之賊手飾詞入告我皇上為之墮淚崇封伯爵而天實難欺其廢弛營伍婪索多贓種種劣迹不旋踵全行敗露可見天爵不可幸邀而貪縱狡詐者斷無始終不敗之理大小臣工宜何如警惕哉上又命軍機大臣傳諭福康安常青李侍堯曰柴大紀貪縱營私各欵節經諭令福康安李侍堯詳悉查明據實參奏朕即向軍機大臣言及以李侍堯在閩浙總督任內已將一載於柴大紀貪劣各欵自必早有見聞此次奉旨飭查李侍堯祗可諉為未經查訪確實及軍務緊急之時未便遽將柴大紀參奏以文其從前不即恭奏之過今據李侍堯奏到之摺果不出朕所料李侍堯受朕厚恩不意其扶同徇隱竟至於此福康安於具奏之初雖未將柴大紀實在欵迹據實指參而朕因福康安既有此奏始向德成查詢是柴大紀貪劣各迹得以逐細究出尚由福康安發其端至李侍堯調任閩浙已及一載且駐劄厦門常接臺灣地方官稟報較之鄰省傳聞更為確切既據稱到閩時即風聞臺灣戍兵多有賣放私回之事何以不即據實查恭此何等事而可從緩辦乎至其縱令兵丁在外營生甚至開賭窩娼販賣私鹽更出情理之外而柴大紀所報現存戍兵止有七千餘名此外藉稱傷亡散失委無可查更不成話此等情節李侍堯即因彼時軍務緊急柴大紀正在守城未能遽行恭辦亦應將其在任欵迹密摺奏聞俾朕得早知其誠偽則當其防守嘉義時朕即憐其出力亦不至破格加恩屢膺懋賞今柴大紀既經疊荷殊恩其貪劣欵迹始節次敗露是臺灣逆匪滋事竟由柴大紀平日貪縱廢弛營伍牟利釀成如此重案朕因此宵旰焦勞籌辦軍務經年尚未蕆事而各省派調官兵接濟糧餉所費不資且地方百姓受賊戕害擾纍者更不可勝計設非朕留心詢訪節次降旨令將柴大紀欵迹查恭李侍堯必致始終緘默不言是此等貪汚釀變之人不但幸免重戾且冒受渥恩李侍堯瞻徇容隱之罪尚復何辭又柴大紀經楊廷理誚讓始帶兵出城李侍堯既知柴大紀有此恇怯畏賊情事何難即向永福楊廷理確切札詢並將其在任各欵一一訪查得實而摺內尚稱其在鹽埕橋打仗及克復諸羅縣城最為出力前此所聞又似難以盡信為之含混支吾以掩飾其從前不及早參奏之非豈能逃朕洞鑒乎又據稱柴大紀固守待援不肯捨士民而出實心服其為人等語前據福康安札知軍機大臣以柴大紀守禦縣城並非伊之力量城中糧食並未斷絶其不肯出城一節亦係義民等不肯將伊放出伊亦畏賊不敢出城等語是此次李侍堯所奏又有訛淆更不得藉稱柴大紀有守城微勞竟置之不辦也著福康安即傳永福楊廷理二人面加詢問逐一跟究並著將柴大紀貪劣各欵據實嚴參候朕另降諭旨上又命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰前此臺灣賊匪攻擾嘉義時經常青派令魏大斌田藍玉蔡攀龍先後帶兵前往援應途中遇賊攔截隨征兵丁多有損失又貴林楊起麟由鹽水港鹿仔草前赴嘉義遇賊被害所帶兵丁俱為賊匪衝散又郝壯猷在鳯山失事駐守兵丁亦俱潰散後又有陸續投出者已節次諭令福康安常青李侍堯查明具奏此等兵丁奉派隨征及防守縣城一遇賊匪攻擾即紛紛散失緑營恇怯積習最為可惡此內除自行投出外其餘散失兵丁未必盡係被賊戕害或臨陳脫逃潛匿不出甚至投入賊黨助賊抗拒官兵皆所必有自應嚴切查明分别核辦計此旨到日剿捕事務自當早已完竣著福康安等即將前此屢次散失兵丁除陸續投出外實在陳亡者若干名查明確數交地方官上緊緝拿其從賊之兵情罪更重於從賊之民拿獲時尤應從嚴辦理至福康安攻克小半天一摺係十二月十九日拜發距今已逾一月如尚未有擒獲賊首信息則是生畨等狡獷性成始終不肯將林爽文獻出福康安徒事招賞殊屬無益昨已有旨令福康安等將各隘口之兵撤回前赴南路將賊匪搜剿淨盡再移兵向北擒拿逆首計節次調派各省駐防緑營官兵并屯練降畨及臺灣額兵約有六萬即其中有傷亡損失者存兵尚不下四五萬足敷捕剿之用即直進內山亦何所慮福康安擇其精鋭帶往南路隨營剿賊其鹿仔巷鹽水港鹿仔草各要隘處所亦酌派二三千兵分投駐守其餘傷病殘廢之兵若概留該處既不能得力且須給以口食並轉需人看守殊屬無益著福康安等細加酌量將此等無用之兵先行送回內地既可以挑去冗兵又可節減繁費此旨到日已屬二月中旬該處氣候已漸炎熱官兵在彼難以久駐福康安等務須悉心籌畫設法趕辦毋又致師老力疲蹈常青等之轍二十五日戊子李侍堯奏言據厦防同知劉嘉會稟稱有船户林允瑞初九日自後壠開駕十一日晚抵厦門據稱於正月初五日在後壠媽祖廟親見官兵將林爽文押解裝在木籠有許多官兵圍擁防護聞説是內山拿獲等語臣查此信既係該船户目睹自必確實奏入上命軍機大臣傳諭福康安海蘭察鄂輝常青曰林允瑞於初九日自後壠開駕其所供拿獲林爽文之處又係得諸目覩自必確實前因福康安等攻破賊巢後林爽文逃入內地屢經降旨嚴飭福康安等接奉諭旨心懷愧懼必將朕前次所賞寶石帽頂四團龍褂敬謹收貯不敢穿戴今首逆業經擒獲雖為時未免稍遲而辦理尚屬妥善所有朕恩賞之頂戴自當接受福康安等於拿獲林爽文後諒已遵照前旨帶兵前赴南路擒捕莊大田收復鳯山莊大田與林爽文同惡相濟之犯林爽文雖已就獲莊大田亦須生擒解京審辦方足以伸國憲而快人心况林爽文已經就獲莊大田之勢更孤自易於擒捕即使該犯逃入內山亦無難帶兵直入搜拿并勒令生畨等擒獻想福康安斷不肯因拿獲林爽文遽以為完事捨之而回若再能生擒莊大田收復鳳山朕必另有恩奬且此事亦必擒獲莊大田南北兩路賊匪全行廓清方為蕆事福康安等務宜奮勉辦理至海口一帶已有旨交常青專司堵截前據常青奏訪聞莊大田在南仔坑地方潛匿派令副將丁朝雄帶兵駐劄東港會同廣東泉州庒義民就近搜捕並相機前進恢復鳳山等語現在福康安親統大兵往南若莊大田逃竄入山福康安即可帶兵直入搜捕無虞兔脫惟防其由海道竄逸最為緊要關鍵常青昨於徇隱柴大紀骫法營私種種不法實屬辜恩昧良已降旨革職候訊但此時常青帶兵駐守府城伊本無能該處兵力又屬無多朕意不如將丁朝雄所帶之兵撤回於各海口要隘分投巡防勿任潛逸較為嚴密若莊大田乃緊要賊犯竄入內山尚可不再加常青之罪倘竟由海道逺揚稽誅則常青自問當得何罪亦不必復思來京見朕常青接奉此旨惟當倍加奮勉以期立功自贖至林爽文於初五日已押解在途何以迄今尚未據福康安奏到想又為風所阻不日即當遞至除俟福康安奏到再明降諭旨外其林爽文是否係官兵直入內山擒獲抑係生畨等遵諭縛獻諒福康安摺內自必明晰聲敘但現在尚未奏到無由知悉並著福康安查明據實具奏臣等謹按逆匪莊大田之於林爽文正如狽之倚狼卭之負巨林爽文既經就縛則莊大田已如釡底逰魂但臺灣率皆際海枕山山易於搜而海難為捕使莊大田勢窮力蹙不敢為負隅之虎妄兾為漏網之魚竟至向若潛逃漂流溟渤則茫茫偵緝未免稽誅乃蒙睿算周詳靡弗早為籌及不特以防海之事責之常青而且撤丁朝雄東港之兵分巡要隘於是環營列斾四布瀛壖莊大田遂不得為逺揚之計惟有竄走內山不啻鼠之入角無何束身俘檻卒與林爽文竿首藁街豈非聖謨素定實有計出萬全而逺矚於數千里外者乎上又命軍機大臣傳諭福康安李侍堯曰前因福康安於攻克大里杙賊巢後不即帶兵搜捕逆首致林爽文日久未獲又於覆奏恆瑞一事瞻徇親戚曲為袒護節經降旨嚴飭並諭令福康安於剿捕事竣後務將臺灣一切善後事宜全行辦竣即在臺灣多住一二年亦所應得原因福康安於搜捕逆首既失之遲緩又復有心袒護恆瑞是以令其久在臺灣示罰今據李侍堯奏林爽文已被拿獲於本月初五日在後壠地方押解進京此信得之該處船户目覩自當確實計福康安奏報之摺日內亦即可到京是福康安辦理此事雖少稽時日但逆首林爽文業已就獲大功即日完竣福康安籌辦一切尚為妥協著於南路賊匪掃除淨盡拿獲莊大田後即將臺灣逆匪滋事根由及釀成此案之文武官員並官兵散失數目一一詳悉嚴行查辦並將善後各事宜悉心籌畫辦理如內外山地界從前設立土牛未為周密應重加勘定務令界限分明勿使日久得以偷越致滋生事端又如改建城垣添設官兵等事從前該處舊有城垣俱係用藾竹等項編插原以藾竹等物雖不若磚石工程堅固足資防守但失之易復之亦易即如康熙年間有姦民朱一貴滋事臺灣全郡被陷七日之內即經收復亦因該處舊無磚石城垣賊人難以據守故能尅日奏功雍正年間吳福生滋亂時曽奉有無須改建磚石城垣諭旨亦即易失易復之意此次逆匪林爽文等起事之初雖因各縣舊無城垣得以猝為占據但現在福康安等統兵剿捕賊人望風奔潰攻克賊巢勢如破竹未始不因該處無城垣之固故賊人難以守禦目今𠞰捕事務不日完竣但臺灣逺隔重洋又係五方雜處遊民聚集之地難保其百年無事自應深思逺慮計出萬全著福康安將改建城垣一事詳悉籌酌朕意臺灣郡城為根本之地自應改建磚石城垣與該處安平鎮向有城垣互相聫絡以資扞禦至嘉義一縣朕因該處人民隨同官兵竭力守城錫以新名用示嘉奬該處城垣亦應一律或磚或石改建務宜堅固此外如彰化鳳山等縣及現在應行添設官辨駐劄處所不妨仍用藾桐竹木等類栽插惟聞各該處舊有城圍多係依傍山麓未能據扼城勢現在雖令德成前往勘辦但德成僅諳工程做法相度形勢非其所能著福康安務須詳細履勘或移建髙阜或因舊基跨山圍築即舊城難以移動亦須擇附近山頂形勝之處設立磚石卡座添設辨丁以資控制總期占據要地勿令有失形勢使四外得以俯瞰城中方為妥善福康安將應辦諸要務立定章程即可交徐嗣曽等在彼接辦福康安約於朕萬夀前趕至熱河瞻覲亦不為遲至海蘭察帶領巴圖魯侍衛章京等及應撤各兵一俟剿賊完竣即可令其陸續先回勿須守候也二十六日己丑上命軍機大臣傳諭福康安李侍堯曰現在逆首林爽文已經生獲其餘夥黨餘孽自易殱除臺灣𠞰捕事宜尅日可以完竣但該處一交三月氣候即已炎熱所有各省派調兵丁難於在彼久駐將來福康安辦理善後事宜固須酌留官兵數千以資彈壓此外兵丁為數甚多留於該處亦屬無用自應陸續撤回令其各歸本處著福康安於南北兩路一律肅清大功告蕆後除臺灣應留額兵外應將素耐炎熱之貴州湖南二省兵丁內擇其強壯得力者挑擇數千留彼彈壓其餘如屯練兵最不耐熱及傷殘病廢者俱應先撤回次則各省駐防滿兵及浙江兩廣福建緑營兵丁俱應次第令其渡回內地各歸原伍庶隨征出力兵丁既不至久留受熱以致不習水土染患疾病而福康安辦理善後有兵數千亦儘足敷應用二十七日庚寅孫士毅奏言風聞將軍福康安派兵搜剿已於正月初五日在竹塹山內拿獲賊匪林爽文初六日已經起解等因臣恐又係訛傳但思獻出逆犯家口一事現在已屬確鑿則此次拿獲林爽文所聞或竟不誣臣既有所聞若慮獲陳奏不實之咎匿不上聞問心更難自安謹先具奏奏入報聞三十日癸巳李侍堯奏言臺灣府經厯羅倫在臺灣三年且前嵗冬間賊匪攻犯郡城時該員正在彼隨同道府等守城堵禦俱所身親目擊據稱前年十一月內柴大紀巡察北路彰化一帶地方聞有賊匪滋擾經彰化縣俞竣請留柴大紀在彼調兵彈壓柴大紀托稱回郡派兵初十回至郡城委遊擊耿世文於十三日同臺灣府孫景燧帶兵三百名前赴彰化縣大墩地方劄營是月二十七日夜賊匪林爽文等攻破大墩營盤遊擊耿世文被害兵丁三百名不知下落二十八日彰化縣又被逆匪攻破十二月初一日府城得信臺灣道永福同臺防同知楊廷理催促柴大紀派兵剿捕柴大紀又派逰擊李中暘帶兵四百名前往應援柴大紀至初五日帶鎮標兵四百名午時尚未動身楊廷理向柴大紀云若將總兵印付我即當代為出戰柴大紀才起身出城三里到接官廳就住下了隨將水師逰擊林光玉等帶安平水師兵並城守營兵共一千二百三十名同往諸羅那時諸羅縣城於初五日夜間已經失陷柴大紀即駐劄鹽埕橋堵禦一月有餘到正月十三日黃仕簡撥兵二千餘名柴大紀才從鹽埕橋起身往諸羅去的臺灣城內鎮標原有額兵二千五百名原是預備聼調並無防泛當賊匪攻府城時城中兵力甚少每城門不過四五十名是實柴大紀平日聲名平常那包差賣兵之事臺灣地方都是知道的等語臣查該員所稟俱有月日地方及兵丁數目恭以臣平日風聞兩相印證其為貪縱貽誤已屬顯然柴大紀在彰化則避賊而歸及至賊攻犯郡城又復畏賊不即出城致賊匪得肆鴟張實屬罪無可逭至戍兵數目臣前因該道府所稟與原額逈異節經嚴查無著者竟有二千三四百名即亡失亦斷不至如此之多今就羅倫所稟府城存兵除柴大紀兩次𣲖撥及伊親自帶往共止一千一百名又每城門四五十名查臺郡係七門亦止三百餘名是存城額兵本屬虧短一千餘名彼時尚未有傷亡散失其為賣放網利無疑臣前此所聞在營當差者祇有延建等兵而彰泉兵則聽其在外恣為姦利餽送錢文之事即此可證至柴大紀私令班兵渡回內地貿易牟利一節臣詢之羅倫據稱實未聞此語臣思柴大紀如私令兵丁渡回貿易從鹿耳門放洋即可直抵江南之上海浙江之乍浦鎮海等處原不必收入厦門等口岸或因此故浙省俱有議論而閩省轉無傳聞方鎮大員行同市儈一經審訊自可得其底裏奏入上諭內閣曰賊匪起事之初柴大紀於巡察彰化時若一聞信息即親自帶兵剿捕何難即時撲滅乃轉托稱派兵回至郡城及聞彰化失陷柴大紀仍觀望遲徊並不速往援救直至數日始帶兵起程復於離城三里地方即行駐劄致逆匪得以輾轉蔓延日肆鴟張是柴大紀不但平日貪縱營私廢弛營伍而且怯懦遷延釀成巨案現經朕面詢押解臺灣逆匪到京之侍衛額爾登保據稱逆匪攻擾嘉義時俱係義民等出力守禦並非柴大紀之功其不肯帶兵出城一節亦係義民等不肯將伊放出柴大紀亦畏賊不敢出城等語額爾登保係在臺灣帶兵之員所言更屬確實則柴大紀前奏不忍將數萬生靈盡委賊手仍忍飢固守待援之語竟屬揑詞巧詐全不足信守城亦非其功柴大紀既貪縱釀變於前又復巧詐欺罔於後種種劣迹難以枚舉此而不加以懲治又何以肅軍紀而整官方朕辦理庶務從不預將適莫之見而信賞必罰乃用人行政大柄况現值用兵之際賞功罰罪尤貴嚴明如柴大紀前奏不肯帶兵出城一節朕以其勤苦出力甚有良心覽其摺奏之言自屬實情初不為逆詐憶不信之見而其種種揑飾之處彼時亦尚未有人摘發朕焉肯泯其勞績不加之恩賞乎所謂君子可欺以其方者此也逮柴大紀貪劣各欵迹節次敗露經李侍堯等逐欵查明俱已確鑿有據是以即將柴大紀革職拿問至常青在閩浙總督任已及年餘且渡臺灣後身為將軍近在府城豈無聞見乃於柴大紀劣迹並無一字奏及實屬辜恩特將常青交福康安審訊又李俟堯原欲俟蕆功之日給還伊原襲伯爵乃此事經朕節次降旨詢問李侍堯知難隱飾始行具摺陳奏似此有心徇隱更為辜負重恩李侍堯不應出此也前已晉加宫銜賞戴雙眼花翎已為僥幸豈可復膺懋賞并著交部嚴加議處琅玕並不自行陳奏及降旨詢問始將風聞柴大紀各欵具奏亦難辭咎琅玕亦著一并交部分别嚴加議處朕於臣下功罪輕重惟視其人之自取初不稍存成見雖不逆詐不億不信實亦先覺其李侍堯續行參奏柴大紀各欵並著交福康安一併嚴審定擬臣等謹按論語稱不逆詐不億不信伏讀經筵御論謂此語宜與誠明參看蓋人情變幻不齊使事事皆逆其詐億其不信是先以不誠待人此亦一不誠彼亦一不誠蓼擾虛偽莫可究詰欲其先覺抑亦難矣然則誠之為道實我聖主之所以御物而亦即以妙鑑空衡平之用者乎夫以柴大紀之貪縱營私固擢髮不足數罪而當夫厥罪未彰厥功可飾迹其入告之詞立言懇欵此而不加之懋賞錫以崇封將何以為登陴禦賊者勸且又烏知其所云忍飢固守者之竟屬虛辭而預逆其詐預億其不信耶厥後天不可欺垂詢所及不啻衡鑒在懸而柴大紀之巧為掩覆者仍無纎毫之或遁斯蓋中庸之所謂自誠明與論語不逆不億之旨洵足相證也夫欽定平定臺灣紀略卷五十二
