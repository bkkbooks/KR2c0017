  text: 欽定四庫全書欽定平定臺灣紀畧卷五十二
  hash: sha256:c4898d16df1635305f221013017ef6720c6405988804c5e0f7efdd04df9dde13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_052-1a, image: WYG0363/WYG0363-0628c.png}
body:
  text: 正月二十三日丙戌李侍堯奏言上年赴閩途次即風聞内地派往臺灣戍兵多有賣放私回以致缺額其在臺者惟上㳺延建等兵㽞在營中當差而漳泉兵則聽其在外營生開賭窝娼販賣私鹽恣為奸利鎮將等令其按月繳錢如該兵獲利甚厚又湏再有餽送而經年並不操演迨各兵换班回來鳥鎗俱已銹澁難用等語臣隨查臺灣戍兵本有萬餘何以賊兵猝起旬日之内連䧟三城是賣放缺額之説必非無因遂於到任第三日即咨查黄仕簡柴大紀令其開造存失各兵庶可核算在臺實數常青過臺後臣又屡次札知直至四月初四日准常青將柴大紀所開清單送到臣查單内府城存兵一項有戍兵三千七八百名而據臺灣道府請兵稟内稱府城内僅有叅將潘韜帯領戍兵五百餘名之語其數逈異隨又飛咨就近轉飭查核至九月二十四日始據柴大紀飭水師中軍逰擊孫全謀造報内開現在戍兵在府城及諸羅䓁䖏實共有七千五六百名此外傷亡㪚失者委無可查等語臣以該逰擊所報無着者竟有二千三四百名雖賊擾時不免亡失亦何至如此之多且從前亦未據報顯有情弊應再行駁查而是時正值賊勢鴟張柴大紀在嘉義縣守禦𦂳急之時臣若以此等未經查實之事遽行陳奏殊覺冐昧是以臣未敢具奏其柴大紀私令兵丁渡回内地貿易之䖏臣實未有所聞是以並未㽞心查察而臣所聞兵丁在外營生按月繳錢之事雖㽞心查察又未得有實據至前嵗賊匪滋擾一事臣亦聞賊匪將至府城柴大紀恇怯不敢出戰永福楊廷理催令出兵楊廷理并面加誚譲激以將總兵印見付我當代為殺賊柴大紀始帯兵出城其時實有此傳説及臣再加察訪則又聞柴大紀在鹽埕橋堵扼尚為出力黄仕簡到臺令其收復諸羅即能殺退賊匪克復縣城其守城數月與賊打仗往来船户亦俱稱其最為賊所畏懼所聞柴大紀恇怯無能之説又似難盡信臣與柴大紀素未謀面伊平日或有骫法侵漁之䖏亦係前任督臣失察臣可毋庸代為隠諱且臣於上年二月十七日到任因有戍兵缺額之風聞即於十九日咨查臺地存失兵數并於三月初八日敬陳軍營情形摺内曽經奏明是臣不敢稍存瞻徇之䖏並非飾説實以地隔重洋凡有風聞未得確據臺地各官與柴大紀同事者又俱在臺灣現因軍務繁多但有自内地派往之員並無自臺灣回來之員其因解餉往来者又非久在臺地得知詳悉是以無從訪確若行查該道府等又恐稍有漏泄柴大紀正在帯兵堵禦或聞之而心生疑懼轉於軍事無益是以並未敢札查及秋冬間見柴大紀力守孤城當兩路援兵俱不能進伊猶固守待援不肯捨士民而出臣實心服其為人亦不暇更事吹求㽞心查訪以致始終不知其有無劣蹟此實臣粗踈輕信之咎懇交部嚴加議䖏至徳成所指柴大紀不法營私釀祸之䖏及此外有何别項劣蹟究湏徹㡳查辦容臣再行嚴查宻訪務得實蹟列欵恭劾庶足以服柴大紀之心㫁不敢稍有徇隠自取罪戾奏入上諭内閣曰柴大紀往嘉義縣剿捕賊匪縣城被賊圍困數月始終保守無虞是以特沛殊㤙用昭懋賞嗣據福康安奏其為人狡詐不可深信朕尚以柴大紀有守城之功未便以無據空言加之罪譴昨徳成查勘海塘回京據奏風聞柴大紀自復任臺灣總兵貪縱營私廢弛營務並令兵丁私回内地貿易激變貽悮玩視賊匪種種醸成巨案朕以徳成自浙回京距閩不逺所聞必非無因隨降旨令福康安李侍堯琅玕各行查實具奏旋據琅玕奏風聞柴大紀私令守兵渡回内地貿易每月勒繳銀錢又駐守嘉義縣時係畏賊不出並非實心守城本日又據李侍堯奏臺灣戍兵多有賣放私回以致缺額其㽞營當差之兵亦聽其在外營生開賭窝娼販賣私鹽鎮將等令其每月繳錢經年並不操演經李侍堯咨查始據柴大紀開報現在戍兵實止共有七千五百名此外則以傷亡㪚失無可查核為辭觀之不勝駭異又稱前嵗賊匪滋擾府城時柴大紀恇怯不敢出戰經永福等面加誚讓始帯兵出城等語用兵之道當賞罰嚴明此次賊匪紏衆滋事竟由柴大紀平日廢弛貪黷積漸釀成豈可以守城微勞置之不問况柴大紀先在府城既畏賊不敢出戰又移駐嘉義縣時保䕶無虞全係兵民之力即所奏粮餉㫁絶各情節亦多不實而其貪劣各欵現經查有確據此而不嚴加察辦何以肅軍威而儆官邪柴大紀着革職拏問交福康安逐一嚴審明確定擬具奏其福建水師提督員鈌著蔡攀龍補授所遺員鈌著梁朝桂補授至常青在閩年久擢用總督亦有年餘柴大紀平日骩法侵漁廢弛營務常青豈無所聞且據李侍堯奏於常青前往臺灣時曽以該䖏戍兵缺少札知常青是常青渡洋時李侍堯亦必將柴大紀各欵蹟一并向常青述及常青既抵臺灣見聞更確况與永福楊廷理朝夕相見㫁無不將柴大紀各欵向永福等詢問永福等亦㫁無不詳悉告知常青之理乃常青竟無一字奏及殊属昧良辜㤙有心徇隠常青亦著革職即交與福康安一并嚴審據實具奏其福州將軍員缺著魁綸補授魁綸資格本淺念其係尚書查弼納曽孫且人尚明白是以加㤙擢用現在臺灣剿捕事宜雖即日完竣而善後各事正需人經理魁綸即由驛星速前往臺灣隨同福康安學習辦理一切事務所有四川建昌鎮總兵員缺著芝元補授臣等謹按柴大紀貪縱營私居心狡詐當嘉義被困時實因義民不肯放伊出城乃藉口於不忍數萬生靈委之賊手飾詞入告我皇上為之墮淚崇封伯爵而天實難欺其廢弛營伍婪索多贜種種劣蹟不旋踵全行敗露可見天爵不可倖邀而貪縱狡詐者㫁無始終不敗之理大小臣工宜何如儆惕哉上又命軍機大臣傳諭福康安常青李侍堯曰柴大紀貪縱營私各欵節經諭令福康安李侍堯詳悉查明據實叅奏朕即向軍機大臣言及以李侍堯在閩浙總督任内已將一載於柴大紀貪劣各欵自必早有見聞此次奉旨飭查李侍堯祗可諉為未經查訪確實及軍務𦂳急之時未便遽將柴大紀叅奏以文其從前不即恭奏之過今據李侍堯奏到之摺果不出朕所料李侍堯受朕厚恩不意其扶同徇隠竟至於此福康安於具奏之初雖未將柴大紀實在欵跡據實指叅而朕因福康安既有此奏始向徳成查詢是柴大紀貪劣各蹟得以逐細究出尚由福康安發其端至李侍堯調任閩浙已及一載且駐劄厦門常接臺灣地方官稟報較之隣省傳聞更為確切既據稱到閩時即風聞臺灣戍兵多有賣放私回之事何以不即據實查恭此何等事而可從緩辦乎至其縱令兵丁在外營生甚至開賭窝娼販賣私鹽更出情理之外而柴大紀所報現存戍兵止有七千餘名此外藉稱傷亡㪚失委無可查更不成話此等情節李侍堯即因彼時軍務𦂳急柴大紀正在守城未能遽行恭辦亦應將其在任欵跡宻摺奏聞俾朕得早知其誠偽則當其防守嘉義時朕即憐其出力亦不至破格加㤙屡膺懋賞今柴大紀既經叠荷殊㤙其貪劣欵蹟始節次敗露是臺灣逆匪滋事竟由柴大紀平日貪縱廢弛營伍牟利醸成如此重案朕因此宵旰焦勞籌辦軍務經年尚未蕆事而各省派調官兵接濟粮餉所費不貲且地方百姓受賊戕害擾累者更不可勝計設非朕㽞心詢訪節次降旨令將柴大紀欵跡查恭李侍堯必致始終緘黙不言是此等貪汚醸變之人不但倖免重戾且冒受渥㤙李侍堯瞻徇容隠之罪尚復何辭又柴大紀經楊廷理誚譲始帯兵出城李侍堯既知柴大紀有此恇怯畏賊情事何難即向永福楊廷理確切札詢並將其在任各欵一一訪查得實而摺内尚稱其在鹽埕橋打仗及克復諸羅縣城㝡為出力前此所聞又似難以盡信為之含混支吾以掩飾其從前不及早叅奏之非豈能逃朕洞鑒乎又據稱柴大紀固守待援不肯捨士民而出實心服其為人等語前據福康安札知軍機大臣以柴大紀守禦縣城並非伊之力量城中粮食並未㫁絶其不肯出城一節亦係義民等不肯將伊放出伊亦畏賊不敢出城等語是此次李侍堯所奏又有訛淆更不得藉稱柴大紀有守城微勞竟置之不辦也著福康安即傳永福楊廷理二人面加詢問逐一跟究並著將柴大紀貪劣各欵據實嚴叅候朕另降諭旨上又命軍機大臣傳諭福康安海蘭察鄂輝李侍堯曰前此臺灣賊匪攻擾嘉義時經常青派令魏大斌田藍玉蔡攀龍先後帯兵前往援應途中遇賊攔截隨征兵丁多有損失又貴林楊起麟由鹽水港鹿仔草前赴嘉義遇賊被害所帯兵丁俱為賊匪衝㪚又郝壯猷在鳯山失事駐守兵丁亦俱潰㪚後又有陸續投出者已節次諭令福康安常青李侍堯查明具奏此等兵丁奉派隨征及防守縣城一遇賊匪攻擾即紛紛㪚失緑營恇怯積習㝡為可惡此内除自行投出外其餘㪚失兵丁未必盡係被賊戕害或臨陣脱逃潜匿不出甚至投入賊黨助賊抗拒官兵皆所必有自應嚴切查明分别核辦計此旨到日剿捕事務自當早已完竣著福康安等即將前此屡次㪚失兵丁除陸續投出外實在陣亡者若干名查明確數交地方官上𦂳緝拿其從賊之兵情罪更重於從賊之民拿獲時尤應從嚴辦理至福康安攻克小半天一摺係十二月十九日拜發距今已逾一月如尚未有擒獲賊首信息則是生畨等狡獷性成始終不肯將林爽文獻出福康安徒事招賞殊属無益昨已有旨令福康安等將各隘口之兵撤回前赴南路將賊匪捜剿凈盡再移兵向北擒拿逆首計節次調派各省駐防緑營官兵并屯練降畨及臺灣額兵約有六萬即其中有傷亡損失者存兵尚不下四五萬足敷捕剿之用即直進内山亦何所慮福康安擇其精鋭帯往南路隨營剿賊其鹿仔巷鹽水港鹿仔草各要隘䖏所亦酌派二三千兵分投駐守其餘傷病殘廢之兵若概㽞該䖏既不能得力且湏給以口食並轉需人看守殊属無益著福康安等細加酌量將此䓁無用之兵先行送回内地既可以挑去冗兵又可節减繁費此旨到日已属二月中旬該䖏氣候已漸炎熱官兵在彼難以久駐福康安等務湏悉心籌畫設法赶辦毋又致師老力疲蹈常青等之轍二十五日戊子李侍堯奏言據厦防同知劉嘉㑹稟稱有船户林允瑞初九日自後壠開駕十一日晚抵厦門據稱於正月初五日在後壠媽祖廟親見官兵將林爽文押解裝在木籠有許多官兵圍擁防䕶聞説是内山拿獲䓁語臣查此信既係該船户目睹自必確實奏入上命軍機大臣傳諭福康安海蘭察鄂輝常青曰林允瑞於初九日自後壠開駕其所供拿獲林爽文之䖏又係得諸目覩自必確實前因福康安䓁攻破賊巢後林爽文逃入内地屡經降旨嚴飭福康安等接奉諭旨心懷愧懼必將朕前次所賞寳石帽頂四團龍褂敬謹收貯不敢穿戴今首逆業經擒獲雖為時未免稍遲而辦理尚屬妥善所有朕㤙賞之頂戴自當接受福康安等於拿獲林爽文後諒已遵照前㫖帯兵前赴南路擒捕莊大田收復鳯山莊大田與林爽文同惡相濟之犯林爽文雖已就獲莊大田亦須生擒解京審辦方足以伸國憲而快人心况林爽文已經就獲莊大田之勢更孤自易於擒捕即使該犯逃入内山亦無難帯兵直入搜拿并勒令生畨等擒獻想福康安㫁不肯因拿獲林爽文遽以為完事捨之而回若再能生擒莊大田收復鳳山朕必另有㤙奨且此事亦必擒獲莊大田南北兩路賊匪全行廓清方為蕆事福康安等務宜奮勉辦理至海口一帯已有旨交常青專司堵截前據常青奏訪聞莊大田在南仔坑地方潜匿派令副將丁朝雄帯兵駐劄東港㑹同廣東泉州庒義民就近捜捕並相機前進恢復鳳山等語現在福康安親統大兵往南若莊大田逃竄入山福康安即可帯兵直入捜捕無虞兎脱惟防其由海道竄逸㝡為𦂳要闗鍵常青昨於徇隠柴大紀骫法營私種種不法實屬辜㤙昧良已降旨革職候訊但此時常青帯兵駐守府城伊本無能該䖏兵力又屬無多朕意不如將丁朝雄所帯之兵撤回於各海口要隘分投廵防勿任潜逸較為嚴宻若莊大田乃𦂳要賊犯竄入内山尚可不再加常青之罪倘竟由海道逺颺稽誅則常青自問當得何罪亦不必復思来京見朕常青接奉此旨惟當倍加奮勉以期立功自贖至林爽文於初五日已押解在途何以迄今尚未據福康安奏到想又為風所阻不日即當逓至除俟福康安奏到再明降諭旨外其林爽文是否係官兵直入内山擒獲抑係生畨等遵諭縛獻諒福康安摺内自必明晰聲叙但現在尚未奏到無由知悉並著福康安查明據實具奏臣等謹按逆匪莊大田之於林爽文正如狽之倚狼卭之負巨林爽文既經就縛則莊大田已如釡底逰魂但臺灣率皆際海枕山山易於捜而海難為捕使莊大田勢窮力蹙不敢為負隅之虎妄兾為漏網之魚竟至向若潜逃漂流溟渤則茫茫偵緝未免稽誅乃䝉睿算周詳靡弗早為籌及不特以防海之事責之常青而且撤丁朝雄東港之兵分廵要隘於是環營列斾四布瀛壖莊大田遂不得為逺颺之計惟有竄走内山不啻鼠之入角無何束身俘檻卒與林爽文竿首藁街豈非聖謨素定實有計出萬全而逺矚於數千里外者乎上又命軍機大臣傳諭福康安李侍堯曰前因福康安於攻克大里杙賊巢後不即帯兵捜捕逆首致林爽文日久未獲又於覆奏恒瑞一事瞻徇親戚曲為袒䕶節經降旨嚴飭並諭令福康安於剿捕事竣後務將臺灣一切善後事宜全行辦竣即在臺灣多住一二年亦所應得原因福康安於捜捕逆首既失之遲緩又復有心袒䕶恒瑞是以令其久在臺灣示罰今據李侍堯奏林爽文已被拿獲於本月初五日在後壠地方押解進京此信得之該䖏船户目覩自當確實計福康安奏報之摺日内亦即可到京是福康安辦理此事雖少稽時日但逆首林爽文業已就獲大功即日完竣福康安籌辦一切尚為妥恊著於南路賊匪掃除凈盡拿獲莊大田後即將臺灣逆匪滋事根由及醸成此案之文武官員並官兵㪚失數目一一詳悉嚴行查辦並將善後各事宜悉心籌畫辦理如内外山地界從前設立土牛未為周宻應重加勘定務令界限分明勿使日久得以偷越致滋生事端又如改建城垣添設官兵等事從前該䖏舊有城垣俱係用䓶竹䓁項編挿原以䓶竹䓁物雖不若磚石工程堅固足資防守但失之易復之亦易即如康熙年間有奸民朱一貴滋事臺灣全郡被䧟七日之内即經收復亦因該䖏舊無磚石城垣賊人難以据守故能尅日奏功雍正年間吳福生滋亂時曽奉有無須改建磚石城垣諭旨亦即易失易復之意此次逆匪林爽文等起事之初雖因各縣舊無城垣得以猝為佔据但現在福康安等統兵剿捕賊人望風奔潰攻克賊巢勢如破竹未始不因該䖏無城垣之固故賊人難以守禦目今𠞰捕事務不日完竣但臺灣逺隔重洋又係五方雜䖏游民聚集之地難保其百年無事自應深思逺慮計出萬全著福康安將改建城垣一事詳悉籌酌朕意臺灣郡城為根本之地自應改建磚石城垣與該䖏安平鎮向有城垣互相聫絡以資扞禦至嘉義一縣朕因該䖏人民隨同官兵竭力守城錫以新名用示嘉奨該䖏城垣亦應一律或磚或石改建務宜堅固此外如彰化鳳山等縣及現在應行添設官弁駐劄䖏所不妨仍用䓶桐竹木等類栽挿惟聞各該處舊有城圍多係依傍山麓未能據扼城勢現在雖令徳成前往勘辦但徳成僅諳工程做法相度形勢非其所能著福康安務須詳細履勘或移建髙阜或因舊基跨山圍築即舊城難以移動亦須擇附近山頂形勝之䖏設立磚石卡座添設弁丁以資控制總期佔据要地勿令有失形勢使四外得以俯瞰城中方為妥善福康安將應辦諸要務立定章程即可交徐嗣曽等在彼接辦福康安約於朕萬夀前趕至熱河瞻覲亦不為遲至海蘭察帯領巴圖魯侍衛章京等及應撤各兵一俟剿賊完竣即可令其陸續先回勿湏守候也二十六日己丑上命軍機大臣傳諭福康安李侍堯曰現在逆首林爽文已經生獲其餘夥黨餘孽自易殱除臺灣𠞰捕事宜尅日可以完竣但該䖏一交三月氣候即已炎熱所有各省派調兵丁難於在彼久駐將來福康安辦理善後事宜固湏酌㽞官兵數千以資彈壓此外兵丁為數甚多㽞於該䖏亦屬無用自應陸續撤回令其各歸本䖏著福康安於南北兩路一律肅清大功告蕆後除臺灣應㽞額兵外應將素耐炎熱之貴州湖南二省兵丁内擇其强壯得力者挑擇數千㽞彼彈壓其餘如屯練兵㝡不耐熱及傷殘病廢者俱應先撤回次則各省駐防滿兵及浙江兩廣福建緑營兵丁俱應次第令其渡回内地各歸原伍庶隨征出力兵丁既不至久㽞受熱以致不習水土染患疾病而福康安辦理善後有兵數千亦儘足敷應用二十七日庚寅孫士毅奏言風聞將軍福康安派兵捜剿已於正月初五日在竹塹山内拿獲賊匪林爽文初六日已經起解䓁因臣恐又係訛傳但思獻出逆犯家口一事現在已屬確鑿則此次拿獲林爽文所聞或竟不誣臣既有所聞若慮獲陳奏不實之咎匿不上聞問心更難自安謹先具奏奏入報聞三十日癸巳李侍堯奏言臺灣府經厯羅倫在臺灣三年且前嵗冬間賊匪攻犯郡城時該員正在彼隨同道府等守城堵禦俱所身親目擊據稱前年十一月内柴大紀廵察北路彰化一帯地方聞有賊匪滋擾經彰化縣俞竣請㽞柴大紀在彼調兵彈壓柴大紀托稱回郡派兵初十回至郡城委遊擊耿世文於十三日同臺灣府孫景燧帯兵三百名前赴彰化縣大墪地方劄營是月二十七日夜賊匪林爽文等攻破大墪營盤遊擊耿世文被害兵丁三百名不知下落二十八日彰化縣又被逆匪攻破十二月初一日府城得信臺灣道永福同臺防同知楊廷理催促柴大紀派兵剿捕柴大紀又派逰擊李中暘帯兵四百名前往應援柴大紀至初五日帯鎮標兵四百名午時尚未動身楊廷理向柴大紀云若將總兵印付我即當代為出戰柴大紀纔起身出城三里到接官㕔就住下了隨將水師逰擊林光玉等帯安平水師兵並城守營兵共一千二百三十名同往諸羅那時諸羅縣城於初五日夜間已經失䧟柴大紀即駐劄鹽埕橋堵禦一月有餘到正月十三日黄仕簡撥兵二千餘名柴大紀纔從塩埕橋起身徃諸羅去的臺灣城内鎮標原有額兵二千五百名原是預備聼調並無防汎當賊匪攻府城時城中兵力甚少每城門不過四五十名是實柴大紀平日聲名平常那包差賣兵之事臺灣地方都是知道的等語臣查該員所稟俱有月日地方及兵丁數目恭以臣平日風聞兩相印証其為貪縱貽悞已屬顯然柴大紀在彰化則避賊而歸及至賊攻犯郡城又復畏賊不即出城致賊匪得肆䲭張實属罪無可逭至戍兵數目臣前因該道府所稟與原額逈異節經嚴查無著者竟有二千三四百名即亡失亦㫁不至如此之多今就羅倫所稟府城存兵除柴大紀兩次𣲖撥及伊親自帯往共止一千一百名又每城門四五十名查臺郡係七門亦止三百餘名是存城額兵本屬虧短一千餘名彼時尚未有傷亡㪚失其為賣放網利無疑臣前此所聞在營當差者祇有延建等兵而彰泉兵則聽其在外恣為奸利餽送錢文之事即此可証至柴大紀私令班兵渡回内地貿易牟利一節臣詢之羅倫據稱實未聞此語臣思柴大紀如私令兵丁渡回貿易從鹿耳門放洋即可直抵江南之上海浙江之乍浦鎮海等䖏原不必收入厦門等口岸或因此故浙省俱有議論而閩省轉無傳聞方鎮大員行同市儈一經審訊自可得其㡳裏奏入上諭内閣曰賊匪起事之初柴大紀於廵察彰化時若一聞信息即親自帯兵剿捕何難即時撲滅乃轉托稱派兵回至郡城及聞彰化失䧟柴大紀仍觀望遲徊並不速往援救直至數日始帯兵起程復於離城三里地方即行駐劄致逆匪得以輾轉蔓延日肆䲭張是柴大紀不但平日貪縱營私廢弛營伍而且怯懦遷延醸成巨案現經朕面詢押解臺灣逆匪到京之侍衛額爾登保據稱逆匪攻擾嘉義時俱係義民等出力守禦並非柴大紀之功其不肯帯兵出城一節亦係義民等不肯將伊放出柴大紀亦畏賊不敢出城等語額爾登保係在臺灣帯兵之員所言更屬確實則柴大紀前奏不忍將數萬生靈盡委賊手仍忍饑固守待援之語竟屬揑詞巧詐全不足信守城亦非其功柴大紀既貪縱醸變於前又復巧詐欺罔於後種種劣蹟難以枚舉此而不加以懲治又何以肅軍紀而整官方朕辦理庻務從不預將適莫之見而信賞必罰乃用人行政大柄况現值用兵之際賞功罰罪尤貴嚴明如柴大紀前奏不肯帯兵出城一節朕以其勤苦出力甚有良心覽其摺奏之言自屬實情初不為逆詐憶不信之見而其種種揑飾之䖏彼時亦尚未有人摘發朕焉肯冺其勞績不加之㤙賞乎所謂君子可欺以其方者此也迨柴大紀貪劣各欵蹟節次敗露經李侍堯等逐欵查明俱已確鑿有據是以即將柴大紀革職拿問至常青在閩浙總督任已及年餘且渡臺灣後身為將軍近在府城豈無聞見乃於柴大紀劣蹟並無一字奏及實屬辜㤙特將常青交福康安審訊又李俟堯原欲俟蕆功之日給還伊原襲伯爵乃此事經朕節次降旨詢問李侍堯知難隠飾始行具摺陳奏似此有心徇隠更為辜負重㤙李侍堯不應出此也前已晋加宫衘賞戴雙眼花翎已為僥倖豈可復膺懋賞并著交部嚴加議䖏琅玕並不自行陳奏及降旨詢問始將風聞柴大紀各欵具奏亦難辭咎琅玕亦著一并交部分别嚴加議䖏朕於臣下功罪輕重惟視其人之自取初不稍存成見雖不逆詐不億不信實亦先覺其李侍堯續行叅奏柴大紀各欵並著交福康安一併嚴審定擬臣等謹按論語稱不逆詐不億不信伏讀經筵御論謂此語宜與誠明叅看盖人情變幻不齊使事事皆逆其詐億其不信是先以不誠待人此亦一不誠彼亦一不誠蓼擾虚偽莫可究詰欲其先覺抑亦難矣然則誠之為道實我聖主之所以御物而亦即以妙鑑空衡平之用者乎夫以柴大紀之貪縱營私固擢髪不足數罪而當夫厥罪未彰厥功可飾跡其入告之詞立言懇欵此而不加之懋賞錫以崇封將何以為登陴禦賊者勸且又烏知其所云忍饑固守者之竟属虛辭而預逆其詐預億其不信耶厥後天不可欺垂詢所及不啻衡鑒在懸而柴大紀之巧為掩覆者仍無纎毫之或遁斯葢中庸之所謂自誠明與論語不逆不億之旨洵足相證也夫欽定平定臺灣紀畧卷五十二
