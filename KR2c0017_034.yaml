  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_034-1a, image: WYG0363/WYG0363-0379c.png}
body:
  text: 八月二十六日辛酉上命軍機大臣傳諭福康安李侍堯曰臺灣勦捕賊匪自常青接辦後續調官兵不為不多因常青零星派撥以致郡城存營之兵止有四千不敷䇿應其實添派浙粵滿漢官兵已有二三萬兵力已為厚集乃福康安於途次一見常青之摺遽為所惑是以未即準行今再四思維福康安受朕深恩委以軍旅重寄伊並非不曉事之人於調度機宜豈有不悉心籌畫何至畏難若此推原其意自因於途次接閲常青等奏報情形勢甚急迫而伊前抵厦門尚需時日若俟到彼後該處有不得不添兵之勢臨期再行奏請調撥恐致緩不濟急是以預為奏請朕厪念軍務宵旰靡寧豈不知厚集多兵可以迅速完事如果揆度情形事在難已寧於伊等所請或有靳而不豫者此亦福康安所深悉今既委福康安以勦賊之任而福康安有必須添兵之請若故違其意恐伊以兵力不給遇事不能卓有定見轉屬無益且朕於福康安恩遇周渥無不曲加體恤豈忍置伊於險地而轉於林爽文莊大田有所姑息而不欲福康安之速行勦賊無遺耶今已令保成李慶棻等速將偹調黔省兵二千令許世亨帶領速行赴閩聼候調用至湖廣兵不能如黔省之得力且逺隔數省道里紆回此時亦可無須紛紛逺調福康安既有屯練兵二千又得此黔省兵力是此四千徑兵可抵他省四萬加以節次續調之兵軍威已屬壯盛福康安亦可安心鎮靜堅持定見力圖奏續不必再存畏難怯懦之見若有此多兵福康安猶不能無所畏怯則各省之兵皆可紛紛􅊾調惟任福康安所為而已朕亦聼之想福康安斷不肯如此進退無據也現在柴大紀處雖被賊人圍困然柴大紀素能激勵將士圍守數月未必竟至不支而常青現已派委蔡攀龍帶兵前往援應蔡攀龍亦奮勇可恃非魏大斌等可比看來或竟能破賊解圍而常青藍元枚屢經諭令前赴諸羅此時會合一處亦未可定若日內得有捷音聲勢聨絡軍威振作則黔省之兵即可停止進發以免擾纍上又命軍機大臣傳諭福康安常青李侍堯藍元枚曰常青接到柴大紀等被圍緊急復派副將蔡攀龍帶兵一千六百名前往䇿應因思此事常青既未親自統兵往救諸羅若於前次柴大紀請救時即派蔡攀龍帶兵前往該副將素能奮勇為賊所憚或能將賊匪痛加勦殺打通前路所運糧餉火藥等項自不致被賊截斷乃常青計不出此僅派魏大斌前往接應魏大斌係浙省派令帶兵之員並非奮勇可恃以致在鹿仔草遇賊僅帶兵數百名前抵諸羅是常青於此事委派非人實屬錯謬至蔡攀龍自到臺灣屢次奮勇殺賊著有勞績甚屬可嘉所有海壇鎮總兵員缺前經李侍堯奏明令副將李長庚署理今即著蔡攀龍補授以示奬勵並著常青傳諭蔡攀龍令其加倍奮勉現在帶兵援應諸羅務將府城抵諸羅一帶屯聚賊匪悉力勦除廓清道路使糧餉火藥隨同官兵運送接濟無若魏大斌之被賊邀截不能兼顧致諸羅城中又添蔡攀龍所帶官兵吃用之費再賊匪狡黠若蔡攀龍領兵前往未必不又施誑誘魏大斌之計讓出道路俟官兵過後復又邀截蔡攀龍勿為所惑當探知賊匪潛匿處所往前搜勦方能痛掃無遺廓清道路此為最要常青處現存之兵新到者雖止有四千而其餘浙粵等處官兵亦經陸續配渡自早已全抵該處常青何得籍口兵單一味株守並不往北進勦况即以常青所請添調之兵而論如江西廣西兵在緑營中最為無用朕所素知今復思此二省中武偹如果可觀當必有洊擢至専閫大員者因將兵部所進提督總兵名單詳加披閲則現在提鎮中竟無一籍𨽻江西廣西者可見該二省武藝技勇實係平常常青即欲添兵亦應將黔楚之兵奏請添調若江西廣西之兵怯懦無用倘派令前往不免顧戀家室心懸兩地徒以輕試賊鋒豈能勦捕得力常青身為大員而於江西廣西兵之平常無用亦不能知悉尚得謂之留心武偹者乎再昨據孫士毅奏聞賊匪紏集亡命姦徒潛伏林莾衝犯我兵必須鎗手後緊接短兵如賊匪已在百步之內即令短兵直前撲殺等語賊人鬼蜮伎倆狡詐百出其所畏憚者係官兵鎗炮正可用以殺賊乃緑營習氣竟有未見賊匪即行施放鎗炮及賊匪猝然衝犯轉致措手不及徒有鎗炮不能得力最為可惡著常青藍元枚等嚴加訓飭或即照孫士毅所奏於鎗手後緊接短兵若賊匪相距較逺不可令其亂施鎗炮將鉛丸火藥虛擲無用之地待賊匪近前即用短兵撲殺毋令賊匪得逞狡計同日孫士毅奏言接將軍常青來札稱現在又請添調廣西兵三千名以資勦捕等語臣前因臺灣逆匪未靖恐軍營或有續調曽預偹粵西兵三千名密札廣西撫提二臣預行挑撥停妥兹已飛咨廣西撫臣孫永清提臣三德即將預偹三千名飭令將偹分帶即日起行復令於各兵隨身携帶火藥之外再偹三萬斤解赴閩省應用又正在拜摺間接閲將軍常青摺稿知諸羅賊匪勢尚猖獗提臣柴大紀又有添兵之請萬一接應稍遲關係不小何敢因粵東附近海口各營抽調已多不復再為酌撥應請於撫標廣協等營再湊足一千名飭令將偹速即帶領來潮以偹赴臺策應一面飛咨軍營俟常青等咨覆現須徴調即於粵西征兵未到之前先令此一千飛速前進奏入上命軍機大臣傳諭福康安常青李侍堯孫士毅何裕城曰添調浙粵二省官兵軍勢已屬壯盛又何必逺調廣西江西之兵乃常青率行咨調實為毫無主見今已據孫士毅會咨廣西令孫永清等派委將辨帶領起程祗可準其調往至常青於前次具奏之後即已咨調廣西官兵其江西省之兵諒亦已行文徴調江西兵較廣西更為平常且此時添調之兵不為不多斷可無庸派往著傳諭何裕城如常青已經􅊾調該撫辦理尚未起程即可停止如業經派撥起程行抵何處即於何處撤回無庸前進常青此畨冒昧調兵原託名救應諸羅試思此兵當兩三月方到諸羅尚可待乎朕令常青藍元枚等就近速帶大兵往救諸羅至今尚未奏起身之期尚欲待廣西江西無用之兵於兩三月後救諸羅是誠何意見著常青明白回奏至孫毅於撫標等營湊足一千名名調赴潮州預偹增調未免過於急公粵東節次派調之兵已及萬餘該省亦係海疆重地若派撥過多恐不足以資彈壓孫士毅所請預偹之兵一千名竟當停止毋庸再行撥調上又命軍機大臣傳諭保寧李慶棻曰臺灣尚須添兵協勦著保寧李慶棻即將挑偹兵二千名派威寧鎮總兵許世亨為總統帶領速行分起前進由廣西廣東行走迅抵閩省聼候福康安調用所有軍裝火藥等項俱著妥協偹帶勿致稍有缺乏二十七日壬戌上命軍機大臣傳諭福康安常青李侍堯藍元枚柴大紀曰魏大斌帶兵二千七百名前赴諸羅援應而所傷官兵至一千一百名之多雖據該鎮稟報因賊衆二萬餘人猝至又適遇大雨不能施放鎗炮彼此鏖戰以致傷失官兵甚多但緑營兵丁素為懦怯往往遇賊即行奔潰此項損失之兵是否俱係陳亡有無潰散從賊之處常青摺內並未聲敘明晰福康安到彼應即詳細查明辦理並著常青遇便查明覆奏又常青前摺內稱諸羅被賊圍困軍營兵力不足懇於江西廣西兩省各撥兵三千名等語是常青所請添兵之處係屬候旨定奪乃昨據孫士毅奏稱八月初十接常青札會添調廣西兵丁業經知會如數撥調常青身為將軍如遇有緊急實在兵力不敷原可自行檄調但應一面檄調一面據實具奏乃常青前摺止稱懇請添兵而于已經札知粵省省之處摺內並未聲敘即此可見其遇事糊塗漫無主見再前摺內稱附近民人漸次歸莊已召募壯丁充伍者百餘人並聞尚有賊目來投等語賊目究係何人其八月十五日續發之摺於賊目有無自行投到之處並無一語提及何以踈忽若此亦著一併據實覆奏至諸羅被賊攻圍緊急柴大紀督率兵民竭力捍禦甚屬奮勉業經常青派令蔡攀龍帶兵往援常青藍元枚亦必遵旨星速統兵前往接應蔡攀龍素為奮勇又有常青藍元枚兩路䇿應自當破賊解圍會兵一處萬一賊匪猖獗援應之兵未能會合諸羅糧食匱乏火藥不給實有難支之勢則柴大紀當酌量情形竟率領兵民出城力戰將賊匪乘勢勦殺突圍而出不可拘泥城存與存城亡與亡之見固守勿去致有意外之虞既於體統有傷且轉足以長賊人之氣於事無益柴大紀務須審度機冝完師整旅方為兩全此旨著交常青藍元枚酌量何路前赴諸羅為便即差妥幹辨兵護送迅速遞投務期必逹毋致中途遺失轉為賊人所得方為妥善二十九日甲子富綱奏言與撫提二臣於各營偹戰兵內酌量挑撥二千名每兵百名派鳥鎗兵七十名炮兵二十名弓箭十名其應帶火藥從前出師金川每鎗炮兵一名酌帶火藥十一斤四兩黔省各營額貯藥斤數甚充裕且由古州水路而下携帶亦便今酌定每兵加倍配帶火藥二十二斤八兩俾資充偹其餘軍械等項悉照例配帶大定協副將岱德人甚明幹勇往曽出師滇川經厯行陳臣即派為統領又長寨營參將札郎阿清江協逰擊魯安邦遵義協都司楊廷邦古州鎮都司朱化英貴陽守偹劉廷竒提標守偹羅世德等六員均係才具幹練曽經出師酌派分起帶領至此官兵二千名擬分作四起行走再查黔兵赴閩應由古州乘船於丙妹地方出境至廣西懷逺縣所屬之梅寨地方交替應於梅寨預偹小船接載至懷逺始換大船前進臣思與其於梅寨交替換船不免耽延不如即以黔省古州乘坐之船順流而下直送粵西懷逺再行換船前進在黔省不甚費力而廣西又省偹船交替之繁且於兵行更可迅速所有沿站應需夫船及供應等項臣現在密飭藩司就各營經由處所酌量安設尖宿各站飭各該地方官妥為預偹毋致臨時遺悮奏入報聞九月初二日丙寅李侍堯奏言粵省最後之緑營兵一千五百名并續調之一千名陸續於本月十三日全行來厦配渡緣旬日以來東南風大不能放洋所有滿漢兵船一齊停泊兹於十六日晚間風勢稍平俱已開駕滿兵向鹿耳門進發係派往常青軍前九千數內所有閩兵二千粵兵四千早已前往兹更得此滿兵三千兵力自益壯盛其粵省緑營兵二千五百係派往藍元枚軍前五千數內緣先到之粵兵五百及漢兵二千已於前月下旬開洋今續到之粵兵二千五百適總兵李化龍抵厦即令統領向鹿仔港進發又有本省兵三千名係臣因諸羅望援甚殷奏明即於泉州等處就近挑撥新舊兵徑往鹽水港援勦緣三千兵必須大員統領已飛調建寧鎮總兵鄭國卿前來而路逺尚未即到先令逰擊張旡咎等帶領前往囑其到鹽水港時即與駐劄該處之逰擊楊起麟商度事機奮勇進兵勿得稍有觀望俟鄭國卿到厦門亦即令其星夜趕往其省城所派一千兵由五虎門往北淡水者風勢大概相同想亦同時開駕至浙省撥運軍米共十六萬石已經全抵泉厦兩倉盤收清楚其江西所運之米由五福起旱已抵光澤水口者七萬餘石轉運至省亦已有三萬餘石江蘇之米亦已有五千餘石運抵厦門是米糧一項總可源源接濟惟諸羅近日情形尚未得各官稟報俟一得信息即行馳奏再察看北淡水情形地在臺灣極北不過林小文賴樹等小賊紏夥不多勢不能敵泉粵之衆是以林小文等遂先後被官兵義民拏獲昨訊據自賊中逃出渡回之陳班供稱被賊何檜捉去派在何馬寮內守更內不過四五十人三貂地方尚有賊目吳沙本年四月官兵焚燬何檜賊藔何檜已逃往吳沙處等語而何馬一犯近亦經署把總王福等拏獲是北淡水惟吳沙何檜二賊逃竄未獲此外已無賊匪其所謂難民者臣細加查訪並參閲各官稟報大抵多係漳人泉粵之人因其與賊同鄉遂不分皂白從而搶殺以致避難白石湖金包裏等處今既陸續招撫歸業補種田禾並據該地文武等官出示曉諭泉粵民人不得再有戕害是北淡水地方現已寧貼無事至徐鼎士已移駐大甲該處係淡水南境與彰化接界昨據該副將同知等稟稱林爽文方急攻諸羅未暇歸巢懇內地撥兵一二千來即可自大甲過溪攻大里杙之背等語臣查該副將處現據報有兵一千八百名又有食糧義民義畨七千名自備口糧義民一千餘名隨批令該將等既有兵民幾及一萬應即乘機進攻勿稍觀望適令臣撥兵一千即由五虎門前往接濟隨於督撫標及水師營福州城守挑派兵一千名即由省城出五虎門放洋並札撫臣徐嗣曽就近料理起程已於初四日登舟至五虎門候風今厦門各兵船於十六日晚間放洋想五虎門之船亦必同時開駕再閩省辦理兵差運送軍械等項除海運外皆係陸路踰山越嶺向無車馬惟恃雇募人夫緣平日另有一種江西及本省逰食之人専以受雇充夫為業故農民各安田畝不知有應差之事即遇重大差使農民習以為常謂各站自有充夫之人於民間無與是以州縣遇有差務俱係現雇人夫應用從不能派及里下非如陜甘雲貴等省可以按田派夫使之領價應役而此等専以充夫為業之人每值差務緊急輒一名索數名之價否則不肯就道地方官惟恐悮差不得不曲徇其意增給價值此閩省實在情形也臺灣近日雇夫尤為可異府城外鄉民沖散已無可雇即間有可雇不能無疑惟恃府城內慣用之人雇募應用既資其力又免使去而為匪是以每名雇價二百四十文臣以夫價過多於臬司李永祺前往時囑令留心查察今閩省內地既無按田派夫之例惟有仰懇量增雇價使人樂於受雇則雖素不充夫之人亦皆踴躍趨事查軍需則例夫價條內口內每站給價銀五分米一升口外每站銀八分米一升口內每站以七十里為率口外以四十里為率又注明金川例正價之外加給回空口糧折銀口內五分口外八分係奉恩旨加給未便纂為成例如果需用緊急正價不敷承辦大臣臨時酌核奏明辦理等語是正價之外如有不敷原得隨時奏請今可否閩省內地雇夫照金川口內之例正價五分口糧一升之外加給回空糧銀五分臺地雇夫照金川口外之例正價八分口糧一升之外加給回空糧銀八分設再有不敷俟事定後另於通省官員通融攤捐歸欵其內外每站里數另行咨部存案其海運雇船水腳臣前奏明海水無順逆即以順風抵順水之價按照軍需則例順水每石每站三分六釐而守候回空俱不另支口糧其别項差使往來者就船之大小可載若干石之數計算原擬暫時應用不日即可竣事是以守候回空雖不另給口糧本港各船戶已皆樂從今增兵添餉用船正多兼須雇覔外省來船方足敷用守候聼差難以尅定時日而回空時臺地已無貨可載又不能另得水腳則事前之守候事後之回空均須按照舵水人數給以口糧方不致苦纍但不定以限制又恐開浮冒之端應請守候口糧以二十日為率回空口糧以十日為率再海船全以淡水為要通海港汊皆係鹹水必須向居民購買井泉貯入水匱以供日用而沿海地方井既不多每滿一匱輒取錢十餘千所有載兵之船或有守風稽擱時日需水更多應請每載兵一名另給船户買水錢一百五十文其不載兵之船不得援以為例再前據臺灣府楊廷樺詳稱庫項已經前守孫景燧墊用無存現在兵餉無項可支請先行酌撥臣隨批飭將所墊何項係何員任內墊用是否墊用軍需抑係孫景燧侵虧查明以憑參奏分别追賠一面將應放官兵俸餉銀十萬二千五百兩先由藩庫撥解以應支放並將孫景燧墊用各項逐一查核府庫應存銀十六萬一千一百餘兩除現貯在庫並墊項內有已經扣還及雖未扣還尚有項可扣可追各欵抵算外其餘已墊作兵餉尚未收還之十萬九千九百餘兩皆係臺屬各廳縣應解之項又代墊鹽販欠課九千三百餘兩係各鹽販應繳之項府倉應存穀十六萬七千七百餘石除現存穀二萬九千四百餘石又交過穀價外實在無著穀十二萬五千六百餘石亦係各廳縣應買補解府及各殷戶已領過價值並厯任留交應補之項皆因上年賊匪滋擾各廳縣倉庫有遭搶毁即領過穀價之各殷戶及欠課之各鹽販亦未知存亡以致倉庫俱無著落但錢糧倉穀既係應行解府之項自應按期催解以歸實貯乃該故守於各廳縣應解之項並不及早嚴催遇有官兵俸餉轉將倉庫舊貯之銀穀挪移墊用而各該廳縣於應行解府之項亦並不按期批解逮上年冬間賊擾後則盡歸於無著明係平日已經虧空上下扶同作弊挪前補後致應行實貯之倉庫散失無存自應嚴辦孫景燧原籍現據浙撫臣琅玕查抄其家屬尚在閩省僑寓除札會撫臣徐嗣曽等在省城泉州等處速行查明下落將資財盡行查封毋稍隱漏外其應解不解之各廳縣一併飛咨各原藉查抄以便變抵歸欵奏入上命軍機大臣傳諭福康安常青李侍堯藍元枚曰此時正在𠞰捕賊匪之際該督惟應將調度䇿應一切緊要機宜悉心籌畫及將有官軍打仗殺賊信息隨時具奏至此鎖細之事並非目前急務該督察看情形遇有應行調辦者不妨權其輕重次第辦理何暇於此時鰓鰓過計瑣屑入告該省之意不過以此等無著庫項及增雇價值關係將來報銷惟恐不預行奏明致伊有賠纍之事殊不思臺灣逆匪兹事皆由前任督撫及地方官侵貪斂怨廢弛貽悮所致李侍堯係接任辦理軍務之人將來事定後其浮用無著欵項有應行賠補者自當於厯任督撫及該地方官名下查明在任年月著落分賠必不令接辦之李侍堯有所賠纍也其摺內所奏各欵現在實無暇計及此姑照所請行李侍堯當明諭朕意安心籌辦軍務要件其尋常細事無庸過慮預為將來地步也至常青藍元枚旬餘以來未據續有奏報而柴大紀在諸羅被賊攻圍曽否打仗得勝𠞰散賊匪日內總無信息殊為煩悶現據李侍堯奏調赴常青之閩粵兵早經前往滿兵現已配渡開洋藍元枚處應調之粵兵漳兵已於七月下旬開渡其續調之粵兵現已令李化龍統領向鹿仔港進發是常青藍元枚兩路兵力俱已厚集正當乘其新到鋭氣奮勇直前併力進勦况徐鼎士在大甲駐劄招撫難民義畨食糧充伍者甚多又經李侍堯派兵一千名前往接濟此一路亦可牽制賊匪令其首尾不能相顧若賊匪回顧家屬則諸羅之圍自解常青藍元枚尤當趂此機會迅速帶兵直抵諸羅與柴大紀會合進搗賊巢以收掃穴擒渠之效同日浦霖奏言湖南撥運兵米十萬石於改由陸運之後即已飛咨何裕城妥為籌辦隨據覆彼地接運之所據經派有専員不致遲悮除領運米二萬五千石已於八月十五日開幫其餘陸續趲運魚貫踵行總使湖南之米緊隨北省尾幫之後不許逺離自無虞遲悮奏入報聞初三日丁卯保寧奏言調派屯練降番二千名赴閩一切夫馬船隻供應等項俱預偹經理兹於八月十九日晚頭起屯練兵五百名到省臣保寧會同將軍臣鄂輝提督臣德成親加點驗俱屬精壯勇健當即曉諭鼓勵令其安靜行走奮勇出力該畨等俱踴躍遵奉查番練原無軍裝今涉逺赴閩軍容宜整臣與各司道預為捐製氈帽得勝卦並衫袴等二千副按名散給各屯員亦賞紬縀荷包等物並於例支口糧之外俱各賞給牛羊糌粑煙茶等物以壯行色其二三四起番練俱一例辦給至番練等所帶鳥鎗刀矛器械俱屬齊全惟火藥一項水路長途不特有費搬運且舟中星火宜慎現飭毋容隨帶仍咨明閩省俟該官兵到日發給其管領將辨除本管維州懋功二協副將各選派幹練都司千總外委等官並酌帶字識通事目兵以資分領所有頭起官兵支領俸餉行裝銀兩及犒賞屯練衣物等料理完畢即令維州協副將那蘇圖管領於八月二十日登舟二十一日早開行月內可抵重慶其餘二三起屯練俱即隨後進發雖新疆降番較屯練稍逺月內亦必能催趲到省接續起程不致間斷其自省至重慶自重慶至夔州之巫山縣出境派委各府州應付俱於例給口糧柴斤之外酌賞鹽茶蔬肉以供日食并令隨到隨應俾免逐程停泊稽延至重慶所需船隻已飭川東道黃軒知府趙由坤備辦倘兵至之日尚有不敷即照前奏將雇偹續運米三十萬石尾幫船隻先儘兵行不致遲滯再行江險灘甚多兵畨等均可於過灘時上岸行走不過一二里仍即下船已派重慶鎮道多派兵役及紅哨等船小心護送再川省現在辦運閩米正當秋令水平下遊商販貨船來川者較多總須至重慶缷載臣前奏催令速赴重慶原無礙於商載至宜昌荆州雇辦空船旋因客船陸續趕到可敷應用當即飛行荆宜二府停止現續辦米三十萬石之頭二兩運已自重慶開行其官兵番練所需船隻業飭將催偹米船尾幫先儘兵行隨後再辦運米約於九月中旬亦可蕆事其時正值秋收甫畢之後商販米糧仍得船載流通並無妨礙奏入報聞初四日戊辰孫士毅奏言貴州兵赴閩必須經由廣西東境內臣密飭兩省地方官酌雇船隻碾偹口糧諸凡妥協經理俟黔兵隨到隨即應付俾得迅速遄行查黔兵自古州一帶舟行入廣西境經栁潯二府直逹梧州復由梧州入廣東境俱係順流而下行程最捷再從廣東省河換船至惠州老隆過山仍從青溪下船直抵潮屬黃岡起岸即日赴閩除粵西經過地方移至撫臣孫永清酌派文員妥為辦理其標營武職由臣檄飭沿途彈壓以期安靜至粵東經由驛站稽查照料現已辦有章程自可遄行無阻其自入廣東境至惠州府撫臣圖薩布督查其自惠州至老隆過山提臣髙瑹督查其自青溪下船至潮屬黃岡起岸由臣督查點送出境總令軍行肅靜不致稍有張皇擾纍又前接將軍常青請調粵西江西兩省官兵之信即一面檄令粵西官兵分起前進八月十一日復接常青寄閲摺稿內有諸羅急需應接等語臣以粵西兵丁雖經檄調緩不濟急臣既知軍營需兵接應豈容膜視是以復就粵東撫標廣協惠協等營湊調一千名派令將偹速帶來潮前赴諸羅協同搜𠞰今奉旨令湖南湖北貴州各挑兵二千名聼候調遣自應將粵東西續調兵四千名暫停但詳閲常青等摺內情形賊匪勢尚猖獗我兵似有不敷今調楚黔兵六千名若再加兩廣兵四千名共又得生力兵一萬則福康安到彼足資調度𠞰匪自較多力臣是以擬候添調粵兵一千名到潮仍令速赴諸羅接應其粵西兵三千亦未敢遽行停止奏入上命軍機大臣傳諭李侍堯孫士毅曰臺灣𠞰捕賊匪節經派調閩省浙粵滿漢官兵及四川屯練黔省兵前往會勦兵力實已厚集乃常青因諸羅被圍緊急續行咨調廣西兵三千名因前據孫士毅奏業已咨會廣西派委將辨帶領起程是以準其調撥其孫士毅所請預備之廣東兵一千名業經有旨停止想該督接到前旨自必遵照辦理在孫士毅以鄰省總督接到該將軍等札會自不能不預為籌備但現在官軍雲集又經特派福康安及海蘭察等帶領巴圖魯侍衛等前往督勦大兵所臨勢如摧枯拉朽賊匪等鬼蜮伎窮諒不能久延殘喘該督等惟當籌度機宜鎮靜料理俾內地民人安心寧謐方為妥善同日琅玕奏言拏獲派往臺灣出征之駐防逃兵福常一名訊係中途因病潛逃畏縮藐法當即將該犯正法奏入上命軍機大臣傳諭寶琳琅玕曰福常係滿州駐防既經派令出征即應奮勇爭先力圖自效乃敢中途籍病潛逃實屬可惡該將軍等即將該犯正法尚為辦理得當至該犯之父平時漫無管教致有此等不肖之子亦不可不查明辦理以示懲警著寶琳等即查福常之父如係有職辨員即當斥革該犯之子如現在食糧當差亦即一併革去或念滿州駐防革退錢糧家屬無可資以養贍亦應俟該犯子孫一二代後再行挑食錢糧方足以昭懲創至弟兄非父子可比自可無庸查辦也欽定平定臺灣紀略卷三十四
