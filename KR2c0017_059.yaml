  text: 欽定四庫全書欽定平定臺灣紀略卷五十九
  hash: sha256:f17958fb3797789ac08e0ffd8d096e804934693115eb34067c2cb870e3a8c91d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_059-1a, image: WYG0363/WYG0363-0714a.png}
body:
  text: 四月十五日丁未福康安鄂輝同奏言廣東官兵從未調派隨征此次在臺灣剿賊幾及一載及臣等進兵後南北兩路屢次打仗殺賊在緑營中實為奮勇可嘉與黔楚兵丁不相上下軍務告竣後隨將各路帶兵將偹等官通行傳齊臣等公同逐加察看擇其打仗勇往材堪造就著有勞績者酌量升補除常青陸續奏補各缺外兹查香山協副將一缺福建督標營參將張萬魁打仗勇往曽在金川出兵駐守阿里山要隘堵截極為嚴密堪以升補又羅定協副將孫全謀已另摺奏調安平協所遺副將員缺查有江西吉安營參將張兆熊自請赴軍營效用奮勇出力堪以升補又提標中軍營參將員缺提標後營遊擊查文升堪以升補所遺逰擊員缺惠州協右營都司楊拜揚堪以升補又海門營參將員缺左翼鎮左營逰擊林起鳯堪以升補所遺逰擊員缺左翼鎮右營都司陳大髙堪以升補又大鵬營參將員缺碣石鎮中營逰擊許廷進堪以升補所遺逰擊員缺碣石鎮右營都司曽偉堪以升補又牛鎮營逰擊員缺興寧都司蕭應得堪以升補其餘都司八缺守偹十六缺均揀選軍營出力人員擬補另行繕單呈覽再查臺灣道永福係監司大員在任數年毫無整頓辦理楊光勳一案惟據屬員詳報之詞顢頇結案將天地會名目改為添弟會之處詢據該道稟稱當日署諸羅縣知縣董啓埏原稟及北頭協副將赫生額移文俱係添弟會字樣實非擅自更改等語隨檢查董啓埏等文稟俱附卷中但該員等業已身故永福係審辦之員豈得置身事外諉為不知臣等細加察訪道署幕友沈謙與諸羅縣幕友沈七係屬弟兄在上下衙門作幕已屬不合又同辦一案自難保無通同商改情弊質之永福亦屬無辭可辨沈謙前往諸羅看視伊弟適直逆匪滋事業被賊殺害未便以質證無人任其支飾是永福辦理含混意欲化大為小不問可知又柴大紀貪縱營私聲名狼籍已非一日永福身為旗員近在同城並不據實揭報督撫亦屬有心徇隱查該道於賊匪滋事之初捐資招募鄉勇固守府城復遣俸滿教官羅前蔭等前往山豬毛招集粵民一載以來辦理均屬妥協是該道堵禦賊匪固為出力但核其貽悮地方之罪究屬功不掩過應請將永福革職送交刑部治罪如此外尚有别項劣迹再行嚴參仍一靣先行摘印開缺飭委臺灣府知府楊廷理護理查臺灣府事務本繁現又有城工撫恤等事一人難以兼攝已委淡水同知徐夢麟署理府其淡水地方亦關緊要臣等於調來臺灣辦事各員內逐加揀選查有奉旨發往閩省差遣之江南泰州知州袁秉義堪以委署所有臺灣道員缺恭候簡放臬司李永祺查審此案係在已經辦結之後但既經覆審不即嚴切跟究殊屬徇縱貽悮應一併革職留於臺灣交與徐嗣曽委辦城工報銷等事效力贖罪巡撫徐嗣曽於此案毫無覺察亦難辭咎應交部嚴加議處再凱旋官兵分起渡洋內福州駐防一起官兵在鹿仔港更換大船候風放洋有領催蘇楞額等乘坐哨船已至港口未上大船陡起風暴飄至大洋正在危急忽有異鳥飛集船頭船户等謂得神佑必可無虞飄流兩日夜幸不覆溺適於黑水洋遇見他船兵丁等獲救過船軍裝搬運甫竟見原坐哨船下有數丈大魚浮出水靣原船登時沉沒奏入上諭內閣曰永福以監司大員辦理要案顢頇完結又柴大紀貪縱營私永福近在同城有奏事之責並不參奏又未據實揭報該道於堵禦賊匪固為出力究屬功不掩過永福著革職拏交刑部治罪該員如有子嗣亦著同交刑部一併治罪李永祺著革職留於臺灣交與該撫徐嗣曽委令辦理城工報銷等事效力贖罪徐嗣曽係該省巡撫咎實難辭並著交部議處所有福建按察使員缺著伊轍布補授臺灣道員缺著王右弼補授十六日戊申上諭內閣曰此次派往臺灣𠞰捕官兵及運送錢糧鉊藥等項渡洋多獲平穩前此福康安自崇武澳放洋前抵鹿仔港千里洋靣一晝夜即已遄達皆仰賴天后助順靈應垂庥實深欽感節經降旨交李侍堯等修葺廟宇并親書聨額二分於厦門興化兩處懸挂以昭靈貺兹福康安等奏福州駐防官兵內渡船隻在港口被風遇危獲安疊徴靈異覽奏為之額手現在兵船陸續內渡者尚多據福康安等奏海洋三四月間風力平和四月前儘可全數徹竣仰荷靈祗默佑官兵安穩遄歸允宜增益鴻稱褒崇封號著於舊有封號上加增顯神贊順四字用答神庥而隆妥侑并再書匾額一靣交福康安等於沿海口岸廟宇應懸處所敬謹懸挂至此項被飄船隻雖遇救援無虞但因公冒險殊堪憐念著照前次凱旋兵丁漂泊粵境之例每名賞給銀二兩以示格外體恤再救渡兵丁過船之許長發究為何人並著福康安等查明酌加奬賞臣等謹按書曰肅恭神人御製天津海神廟碑文曰康人我人咸依神庥蓋神人雖幽明殊致而罔不肅恭則敬神而佑及于人即為愛人之驗愛人而誠格于神即為敬神之實此至理之相貫徹而人之依神庥者所以即于康乂也我國家懷柔歆祀肸蠁昭融神著厥靈靡有不若即如臺灣一役自徂征以迄凱旋往來航海悉皆袵波飈帆澶湉助順甚至祥徴異鳥履險而亨誠所云咸依神庥者乎我皇上特崇美報鴻號褒稱而哨船之偶遭飄泊猶且憫其曽涉艱虞優加賞賚斯則愛人之至也夫斯則愛人以敬神之實也夫同日德成奏言二月二十九日抵鹿仔港口此處水淺海船不能直達必須小船接渡又因連日風暴小船不能出港距岸二十餘里停駐候至三月初二日風覺稍定换船登岸於初七日行抵臺灣所有酌建城垣事宜據福康安告知臺灣嘉義兩處自應就舊時基址建城其餘仍可用竹木圍插所有工程臣即會同徐嗣曽悉心估計俟詳細核明錢糧確數另行具奏奏入報聞十七日己酉福康安鄂輝同奏言連日提訊革職千總鄭名邦等據供除業經供出之劉欽林長春賄拔外委外尚有步箭兵甘興隆柴景山拔補外委柴大紀亦有得受謝禮情事並據供我跟隨柴大紀到南北兩路巡查時每營都司守偹千把總託言夫價俱有餽送總視營分之大小定銀數之多寡自畨銀六百圓至四百圓不等柴大紀曽經收受等語柴大紀以總兵大員貪縱營私毫無顧忌巡查各營並不認真操演兵丁稽查汛地轉收受夫價銀兩每營至數百兩之多而各營員辨相率斂派逄迎饋送均有應得之罪必須徹底跟究現在飛提各營將備及行賄補缺之甘興隆柴景山來郡一俟人證到齊質訊明確即一併從重定擬至官兵搜拏首逆時惟恐路徑不能諳習侍衛兵丁中亦無認識林爽文之人因選派淡水義民首及社丁通事等數十人帶道作為眼目正月初五日巴圖魯侍衛翁果爾海等四員貴州外委盧應朝廣西把總談金魁等屯練都司阿忠等搜至老衢﨑地方經義民首髙振見首逆林爽文與賊目何有志一同逃走恐其驚逸即告知侍衛翁果爾海察靈阿棍德森伯鼐外委盧應朝把總談金魁貴州廣西兵丁顔得奉等十八名屯練都司阿忠等八員屯兵額竒塔爾等五名一同圍住將林爽文拿獲解送髙振賞戴藍翎並給千總職銜圍拿之侍衛辨兵義民首等均已分别升等賞翎拔補實缺又官兵至琅嶠拿獲莊大田係侍衛博斌都司張占魁廣東把總路世遜貴州額外外委周廷亮廣西千總馬振強各帶兵丁同降畨穆塔爾丹比錫拉布等及山豬毛義民鄭福等十一名一同圍拿臣等俱已分别奬勵其林躍興一犯即係義民首髙振拏獲至杜敷係水沙連社丁擒獻林爽文家屬並派生畨在內山堵截逆首甚為出力前已奏明給豫千總職銜並酌加奬賞奏入上命軍機大臣傳諭福康安李侍堯曰柴大紀身為總兵大員平日貪縱營私毫無顧忌於拔補辨兵得受謝銀並於巡查營伍時收受夫價每營至數百兩之多以致營員相率效尤武備日益廢弛釀成巨案自應提集案內人證徹底究辦以警官邪所有鄭名邦供出各欵應即向柴大紀逐加嚴訊令其據實供吐訊取確情定擬具奏後一靣即將伊派委妥員解送來京沿途小心看押毋致有畏罪自戕等事至髙振探明逆首蹤迹首先下手拿獲又拿獲賊目林躍興一名實為出力可嘉著福康安將該義民首同前此曽中立黃奠邦等一併給咨送部引見又昨海蘭察到京據奏福康安李侍堯二人俱曽抱恙數日仍力疾辦事旋即痊愈等語沿海地方水土氣候與內地不同福康安在彼不能服習李侍堯又已年老伊二人俱偶經抱恙雖已痊愈朕心深為厪念現在大功告成不過善後事宜著傳諭福康安李侍堯務須加意調攝不可過於勞瘁其尋常細事毋庸力疾辦理或致精力就乏於要務轉不能周到惟當隨時善自調護以副朕體恤委任之意上又諭內閣曰地方官吏如果素無劣迹猝被賊害尚當豫之恤典是以長庚俞峻各員據福康安等奏其居官尚好皆即交部優恤若唐鎰等贓私纍纍骫法釀變此而因其被賊戕害遂爾不懲其貪則伊等家屬仍得坐擁豐饒無以示警將來接任各員必相率效尤復萌貪縱故智非所以警官邪而靖海疆也今當此徹底查辦後該地方官務當各矢清慎砥礪亷隅時時循思天理凛遵國法倘不知警畏惟事貪黷則唐鎰等即其前車之鑑二十日壬子徐嗣曽奏言彰化一縣難民户口陸續查明現在按户散給賑銀并分設各厰減價平糶該難民等口食有資凡從前遷避鹿仔港流離失所者以次各歸本莊務農安業臣仍遴委妥員密赴訪查不使胥役等舞弊尅扣俾沾實惠其臺灣鳯山嘉義等縣歸莊者亦漸衆多俟户口册籍造竣即行一體賑給惟北路一帶地土較寒據淡水同知徐夢麟彰化縣知縣宋學灝稟報二月初旬天氣陰冷并有微雪之處恐早禾收成不無稍減當飭據實查明歸於撫恤案內分别酌辦昨準督臣李侍堯咨會各省運閩米石其未經入境者已酌定停止臣現查臺灣存米除給發兵糧外足敷平糶之用所有內地剩米十萬餘石應留為漳泉等處接濟已咨明督臣毋庸撥運過臺至軍需各欵報銷必須核實查辦府城及鹿仔港淡水等處各有內地撥到銀米前因逆匪滋事之時臺灣南北中三路文報不通各屬支用清册尚未造齊報局查其詳報各案多有與定例懸殊者恐該員等動用浮濫任意開銷臣現在嚴􅊾飛催分飭趕緊造册具報率同臬司李永祺悉心查核一靣密為訪察倘有揑冒情弊立即嚴參究辦又查臺灣訟牘紛繁自軍興以來各屬更多積案向來徒流以上案件例解內地由司審轉兹福康安與臣商酌臣及臬司李永祺俱在臺灣當飭各該廳縣趕緊清釐詳報臣即督同李永祺就近提審分别奏咨完結以清塵案而免拖纍至府治城工連日會同福康安德成詳加履勘現在籌定估計另摺奏聞其餘一切善後事宜更當隨地隨時與福康安熟商妥辦斷不敢稍有怠忽奏入報聞二十三日乙卯福康安鄂輝魁綸徐嗣曽同奏言臺灣地土膏腴種植米麥畨薯一年三熟賊匪滋事以來民間耕種失時田畝荒廢糧價不能十分平減二月間𠞰除賊匪難民漸次歸莊東作方興之際臣等分派委員於撫恤村莊之便將繳銷器械飭縣改鑄農器給與無力貧民並商之徐嗣曽酌借籽種令其各歸農業查淡水田園俱已種齊彰化田畝向藉內山淡水灌注上年賊匪阻截水道沿海一帶不能播種今水道漸已修復田水充足禾苖暢茂三月下旬米麥市價較之三月中旬有減無增嘉義臺灣兩縣近日雨澤較少天氣炎熱而地土尚屬滋潤鳯山地在迤南氣候極早禾稻現已含漿民情甚屬安靜惟粵莊閩莊民人素不相和泉民與漳民亦多嫌隙今民人逐漸歸莊恐其藉端爭競現在剴切曉諭嚴行禁止嗣後地方官若能隨時化導有犯必懲斷不致稍滋事端至北路各處難民今已全行回莊其南路回莊者亦有十分之九焚燬村莊多已修葺房屋搭蓋草藔漸次復舊凡係通衢市集負販流通往來如織府城內外因賊匪蕩平演劇酬願者甚多各縣生童皆來府城應試臣等體察情形地方日就寧貼人心實已大定仍嚴飭文武各官上緊緝捕逆匪現又搜獲賊目林舵林柱陳理林旭初沈刋蔡丑李勝林士芳蕭田九名殺害同知王雋之逆犯張烈一名逆匪陳竟等二十八名俱已審明正法現在村莊認真查緝逃入村莊者即被拏送且有該匪犯父母親屬自行獻出者可見民人畏懼干連雖係至親亦不敢隱匿此等零星逸犯逐細搜查無難淨盡至收繳義民器械除業經繳銷外兹據臺灣道稟報收過刀矛竹鎗五千九百七十五件臺灣縣又收過各項器械二千五百二十三件俱交臺灣府銷燬改鑄農器並嚴行出示曉諭鐵匠鋪户等禁止打造刀矛等項軍器如有私藏私造者即照違禁打造軍器之例加等治罪庶可遏絶爭鬬刁風以期永臻寧謐又福建延平協副將員缺有泉州城守營參將特克什布應行升補所遺泉州城守營參將員缺有逰擊張無咎打仗奮勇營伍留心堪以升補所遺提標後營逰擊員缺有都司馬元勳打仗奮勇堪以升補所遺長福營右軍都司員缺有守偹哈景泰堪以升補所遺提標後營守偹員缺請以漳州城守營千總沈勇雲升補又長福營參將員缺有逰擊海亮打仗奮勇才具明幹應請即以升補所遺汀州鎮標中營逰擊員缺有都司談綸邦打仗奮勇堪以升補所遺興化營左營都司員缺有守偹張奉廷堪以升補所遺督標左營守偹員缺請以汀州鎮標左營千總董國瑞升補又福寧鎮標中營逰擊員缺有都司吳壯圖打仗奮勇應請即以升補所遺延平協左營都司員缺查有奉旨以都司補用之莊錫舍屢著勞績堪以請補又水師提標後營遊擊員缺有守偹謝恩詔堪以升補所遺金門鎮標左營守偹員缺請以水師提標左營千總許廷柱升補又金門鎮標左營逰擊員缺有水師守偹曽紹龍堪以升補所遺水師提標右營守偹員缺請以金門鎮標右營千總蘇大鵬升補又南澳鎮標右營逰擊員缺有水師守偹李得勝堪以升補所遺水師提標後營守偹員缺請以閩安協左營千總陳景清升補又連江營守偹員缺有守偹陳明德堪以調補所遺臺灣鎮標右營守偹員缺請以臺灣鎮標右營千總吳攀龍升補又建寧鎮標中營守偹員缺請以揀發閩省候補守偹徐萬寧補授又貴州古州鎮標右營都司員缺有守偹劉廷竒堪以陛補所遺貴陽營守偹員缺請以威寧鎮標右營千總袁斌升補又貴州提標左營守偹員缺請以遵義協左營千總李芝升補再廣東提標前營逰擊劉越前於鹿仔草失陷案內奏參降為都司仍留軍營效力尚未補缺該員被參之後頗為奮勇帶兵打仗倍加出力厯經著有勞績現已令其帶兵回粵懇將劉越仍留逰擊之任再拏獲賊目內有林舵一名搜出逆首林爽文偽石印一顆鎸刻順天大盟主印字樣訊係林爽文封為管印官審明後即行正法同日李侍堯奏言密飭漳州府知府徐鎮親詣平和廣坑地方將莊樹拏獲并伊妻林氏及房屋物件均經拘拏查封逆犯莊大田曽祖莊鼎祖莊量各墳墓均亦刨掘骸骨焚燬等情即親提該犯訊據供係逆犯莊大田同祖兄弟叔祖于雍正年間遷往臺灣彼時莊大田尚在未生乾隆三十六年七月間曽到臺灣彼時叔祖已死莊大田相待冷淡我即旋回內地嗣後並未再往從無信息相通等供又飭署平和縣知縣吕憬蒙拏獲賴應之父賴箋妻林氏子賴際會三名口據賴箋供稱賴應自幼不務正業終日賭蕩後不知去向久無音信他如何在臺從逆不法實不知道等情賴箋係賊目賴應之父莊樹係莊大田大功弟兄均應緣坐請即行正法又趙明德陳彪陳丕三人雖係廣東惠州府人但既來閩省詔安雲霄地方傳會且與居住雲霄之破臉狗往來留宿是不難得其蹤迹臣即密委汀漳龍道伊轍布星往該處督同該府縣按照單開姓名住址嚴密查緝斷不可稍有疏漏亦不可張皇務在不動聲色辦理蓋此等會匪傳習已非一日即如臣上年查辦漳浦縣匪徒張媽求一案獲犯一百四十餘名究出曽經入會者七十六犯逐細研究結會根由並無起會之人核與現在福康安在臺灣所訊情形大略相同然臣不敢以訊無起會根由遂可稍存懈弛前于獲犯究詢時又輾轉供出會匪姓名經臣審明如係會匪而又隨同搶奪者俱問擬斬決其止係會匪並非此案搶犯從重問擬外遣並尚有供出會匪六十名臣俟拏獲時即照此辦理現在已據陸續訪獲會匪陳檀等十二名訊究入會確情並更可於該犯等追究趙明德等傳會根源奏入上命軍機大臣傳諭福康安李侍堯孫士毅曰查出賊匪各項器械自應銷燬改鑄農器並飭地方官實力稽查嗣後不得私造私藏以遏爭鬬而臻寧謐又嚴煙經福康安在臺灣拏獲亦訊有洪朱二犯之供所有孫士毅查出洪朱二姓僧人即非正犯亦不可留於內地將來擬以發遣伊犁為奴以絶根株而杜煽惑仍著李侍堯孫士毅各於閩粵二省時刻留心將起會之洪朱二姓正犯跟緝務獲辦理以淨萌蘖二十四日丙辰上命軍機大臣傳諭福康安李侍堯徐嗣曽曰福康安審辦柴大紀貪縱營私各欵許久尚未據將全案定擬具奏必係為臺灣原額兵數短少一欵非徹底詳查難以得其實在是以未能即時定案即如從前鳯山嘉義等處潰散敗逃兵丁固有臨陳死事者而其間或本係空名或為賊人沖失懼罪潛逃甚至去而從賊者均難保其必無今大功雖已告成正當切實詳查不可顢頇了事福康安在彼務悉心察訪將此頂兵丁下落跟究明確雖未能一一得其實數而大假不至混淆或竟係柴大紀虛額冒餉其罪更不可恕必使水落石出方足以勵戎行而成信􅀈又賊目林泮等口供內有官兵從前查拏會匪時將伊等房屋燒燬因而糾約林爽文戕官謀逆之語官兵查拏匪犯自當堂堂正正果有拒捕傷差等事不妨督率官兵嚴密查拏即有殺傷亦無不可若如臺灣員辨查拏會匪時動輒燒人房屋是官兵先行同盜竊不但有乖體制轉令賊匪得以藉口著福康安嚴切曉諭該處文武官辨俾曉然知官兵自有紀律深以前事為戒方為妥善至福康安前奏令義民等盡將兵器繳銷改鑄農器嗣後不得私造私藏如此不動聲色自遏亂萌深合機宜但恐福康安內渡之後該處地方官日久廢弛又蹈從前因循積習並著福康安嚴諭地方文武遵照妥辦并令此後往臺灣巡查之大臣一年申奏一次實力奉行久而弗懈二十八日庚申上諭內閣曰前此林爽文之父林勸一犯拏獲奏到時朕以罪人不拏不欲因其子之惡而戮及其父嗣該犯解到後經大學士九卿等審訊以林勸曽與林爽文商量計䇿並派人守卡抗拒官兵實為助逆不法且係凶逆首犯之父奏請按律緣坐即行正法是以照擬辦理今賴箋係賴應之父伊子賴應祗受林爽文偽封不過從犯莊樹係莊大田大功堂兄亦非例應緣坐嫡屬若俱照緣坐之律問擬立斬究覺有所不忍賴箋莊樹俱著改為應斬監候臣等謹按林爽文元惡大憝於律固應孥戮而聖主體好生之德尚不欲因其子而戮及其父及再經鞫訊林勸曽與逆謀則勸實無可生之理至於賴箋莊樹因有一線可原皆得邀恩格外概豫從寬我皇上用刑之當皆由於察理之精洵足為恤刑之凖則歟五月初二日癸亥福康安德成徐嗣曽同奏言臺灣地方一廳四縣向無磚石城垣惟嘉義係屬土城餘俱用藾竹圍插賊匪起事之初雖因無險可守得以猝為占據然失陷後賊匪見竹城難以負固官兵一到即行棄城逃遁收復之易未必不由於此且地方有意外之事惟在籌備得宜足資守禦即如府城本係藾竹圍插與他縣無異經官兵義民竭力保守並無疏失即此可為明證自毋庸處處建立城垣更張舊制祗須於臺灣郡城及嘉義縣兩處改建城垣查臺灣府城西靣迫近海濵潮汐往來衝刷僅以木柵排列難於經久今既改建城垣斷無空缺一靣之理應請將南北東三面城圍仍照舊趾修建惟近海西靣一帶收進一百五十餘文一律興修保障更資嚴密其收進基址之處有礙工程者鋪户居民約有千餘間矮小者居多稍大者不過十之一二城之東北隅儘有隙地如蒙恩允照例給豫房屋酌定遷移小民不致失所至嘉義縣原係土城距山約有二里並非逼近山麓形勢尚屬扼要應即將舊城改築增髙加厚以資捍禦此外如彰化鳯山淡水等處城圍仍用藾竹栽插繞城加浚深壕足資保護查彰化城內被賊人焚劫一空近日流移漸復淡水地方陷賊未久並未遭其蹂躪該二處地勢適中毋庸另行移改其彰化縣西八卦山為北路扼要之地請於山上添設石卡一座捍衛縣城惟鳯山縣逼近龜山之麓地勢低窪氣象亦甚局促城圍及衙署民房悉被賊匪焚燬現在居民搬回者甚少訪之輿論俱願移遷應請於城東十五里埤頭地方相度髙阜移建新城仍用藾竹圍插其舊城基址地處海濵亦關緊要應在附近之龜山設立石卡一座酌派辨兵駐守以資控制所須建卡石料即就近於該處山上開採辦理所有土城工程做法臣等會同照例確切勘估另行會奏其石卡兩座工費無多臣徐嗣曽即就近確估辦理又踏看郡城舊趾周圍共長二千六百七十餘丈大小八門城臺八座舊式矮小城身通用木柵內外排插髙一丈一二尺至七八尺不等誠不足以資捍禦其東南北三面均可照依舊趾興修惟西面舊排木柵已多朽廢當潮汐往來日受沖刷之區若就此施工誠為費力即收進二三十丈修建其間又有港汊數道為商民船隻避藏颶風之處必須開留水津門方為通便苐小則不能容舟大則每座動輒數萬兩似尤不必靡費臣等公同商酌再四思維勘得小西門至小北門有南北橫街一道逺距海岸計一百五十八丈餘尺因其形勢曲折興修較舊趾可收減一百五十二丈餘尺足稱完繕但查該處土性浮鬆若用磚石成砌必須下釘樁木再立根腳未免過費况石料産自內山距城窵逺拉運維艱舟行又溪河淺狹均不能運載至磚塊一項原無難設窑燒造但以河土燒磚究屬易於酥􅀈且柴價昻貴殊費經營是一切物料自應照臺灣則例悉在內地購辦今按例核算用磚成砌約需銀二十八萬六千五百餘兩已屬帑費繁多若用石成砌更為浩大今竟築土城城身通髙一丈八尺為率頂寬一丈五尺底寬二丈舊有城臺七座上截一律加髙八九尺不等新添西門劵臺一座添築排墻鋪墁海墁並添建城樓八座卡房十六座看守兵房八座以壯觀瞻而嚴防守共計照例辦買土方工匠等價約需銀十二萬四千六十餘兩殊覺事易而功倍即土築之城日久不無殘缺該地方官例有粘修之責自當隨時整理久之地氣與土脈吻合草木根株互相盤結亦足以資聨絡必不致大有損壞嘉義縣城於郡垣較小計通長七百四十四丈餘尺自可悉照舊規加髙培厚添建城樓劵臺等項約需銀四萬三千八百餘兩奏入報聞初四日乙丑李侍堯奏言上年臺灣軍營需用錢文經臣徐嗣曽奏請於江浙兩省各撥錢十萬串附搭米船解閩以資接濟嗣據陸續搭解兹準江蘇撫臣閔鶚元咨稱浙省尚有制錢五萬串係附二批川米運往今米石業已截留其錢文是否應需之處咨詢到臣查此項錢文從前徐嗣曾因軍營需用是以奏請酌撥今軍務已經告竣閩省錢價已平自可毋需解閩臣已咨覆江省仍應解還浙省歸欵奏入報聞欽定平定臺灣紀略卷五十九
