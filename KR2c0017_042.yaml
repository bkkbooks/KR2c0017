  text: 欽定四庫全書欽定平定臺灣紀略卷四十二
  hash: sha256:7eb7e59e520560442f9dcedaea3c59f538925563536a50330fcad0f5c8e95f1a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_042-1a, image: WYG0363/WYG0363-0487a.png}
body:
  text: 十一月初一日乙未李侍堯奏言臺灣府城九月中惟十四日有賊在蔦松等處滋擾官兵一到即行逃遁其餘並未有賊自奉諭㫖准脅從者投誠並遣十萬天兵渡臺𠞰匪各官刋刻謄黄布入四鄉南路民人惟恐玉石俱焚自呈實係良民懇賞給腰牌以為識别者共一百三四十莊九月十五日又有鳯山縣竿林等莊及粤民共一萬餘人來郡遞呈將軍常青亦給以腰牌令其回莊安業莊大田因賊黨漸散將家屬移入大武壠自領親信數百人在石仔瀨潛伏常青派副將丁朝雄並臣所遣往𠞰東港之逰擊倪賓共帶兵一千二百名義民二千餘名前往東港二十五日丁朝雄潛遣人將賊所設之大砲灌濕官兵分三路登岸殺死多賊拏獲守港賊目呉豹仍請添兵進𠞰常青以無兵可撥檄令駐劄港口以通糧米入郡之路莊錫舍自帶手下義民數百往㑹粤莊殺賊粤民以其曽經從賊投誠得官共相鄙薄不與㑹合莊錫舍獨與賊打仗為賊所敗帶傷而回莊大田又約許光來等有復擾之勢此府城以南之情形也諸羅一路聞九月初五至十五日諸羅鹽水港二處賊匪連日攻擾官兵俱有勝仗十七日署諸羅縣陳良翼遣數人到鹽水港取去花銀八百圓詢據來人稱十五日賊攻縣城被官兵殺退并打死騎馬賊二人聞得林爽文於十四日手腿中傷已往牛稠山醫治賊目蔡福亦受傷等語普吉保已於十六日到笨港諸羅城外之賊抽去十之四五往禦普吉保是以攻圍稍緩三十日柴大紀又遣人到府取去花銀三千五百圓此諸羅一帶情形也鹿仔港一路除普吉保李化龍在笨港畨仔溝等處打仗業經該鎮等自行具奏外查普吉保進兵後賊又乗虚來擾牌頭等莊俱被官兵義民殺退惟二林莊被賊焚殺較甚十五日㕘將張朝龍𠞰大二崙等處三十日格綳額𠞰大武郡南仔等處俱有勝仗此鹿仔港一帶情形也看來南路賊屢攻府城不利多已退散因官兵從東港進𠞰是以復行煽聚然該處義民甚多近又赦脇從而開其自新之路益足以堅其效順之心斷不致相随為逆府城兵力亦足資守禦可無他虞鹿仔港雖屬有賊擾然該處皆泉州義民甚為齊心兼有李化龍在彼鼓勵調度亦可無虞諸羅雖未解圍然不過在十數里之外並非逼近縣城且兩次遣人往府取銀是米糧尚有可買不致甚危林爽文被傷之信固屬傳聞未必確實而攻城之賊多已撤去抵禦普吉保臣昨接普吉保寄來摺稿據稱知㑹恒瑞柴大紀訂期三路夾攻想此時已各路齊進計日可㑹合柴大紀共籌進𠞰今福康安又已開洋粤兵三千一同随往川省屯練現在陸續配渡不日繼進兵力益覺壯盛此次進𠞰必當所向無前同日徐嗣曽奏言據臺灣軍需局司道議覆淡水同知徐夢麟請餉文内以大甲之兵尚未能與鹿仔港㑹𠞰該處義民口糧過多恐滋糜費似宜酌裁請示等語臣思淡水地處上㳺此時大甲溪以北安静無擾義勇頗為出力即日將軍臣福康安督師渡港亟籌搗穴焚巢之計該處㑹合夾攻最闗𦂳要臣即飭知該司道等現在大兵逕渡鹿仔港淡水義民口糧未便議裁已于本月初十日自省添解餉銀六萬兩米六千石運往接濟一面飛札淡水文武員弁務將該義民妥為安撫于節次運往糧餉内酌量支給務期民兵併力以待大兵㑹合痛殱逆巢至銅山營宫仔汛賊船行刧粤兵棉衣鞋袴一案據營縣節次拏獲首夥各犯二十五名訊取供詞雖未據供有勾結林爽文夥黨情事但賊匪行踪詭祕所刧衣物現係解送臺灣征兵之件必須嚴究有無勾通情節毋任狡脱臣到泉州送兵後即就近馳赴漳州親自嚴審同日孫士毅奏言現聞將軍福康安㕘贊海蘭察已帶兵東渡直趨鹿仔港或嗣後有須添兵捜捕之處惟于閩粤二省就近派往庶幾呼應較靈臣現在預備之新兵四千已充伍食糧勤加訓練俟續有應募仍嚴飭將備加意挑選不得令老弱之人充數徒滋糜費至新兵器械一項先儘營中舊存銛利可用者令其按名承領認真演習其偶有必須添給之件即于舊存公費項下製備為數無多毋庸動支别欵臣意于業經入伍四千名外再得招募四千名似已足備調遣巡防之用再接准部議撥廣東地丁鹽課項下銀五十萬兩粤海闗本年税銀五十萬兩大平闗本年税銀六萬兩共一百六萬兩解往閩省備用計撫臣圖薩布監督臣佛寧此時當趕𦂳撥兑臣一面飭令藩司許祖京運司徳爾炳阿迅即派定委員眼同彈兌裝鞘即日起程解往閩省均奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯柴大紀普吉保徐嗣曽孫士毅曰廣東莊民同心嚮義視賊如仇雖以業經投誠之莊錫舍猶因其曽經從賊不肯與之㑹合此亦足以見其義憤莊錫舍因粤民不與協力𠞰賊益加激勵奮不顧身獨與賊匪打仗以致受傷甚屬出力可嘉著加都司職銜事完送部引見再賞銀一百兩以示奬勵並著曉諭廣東莊義民等以莊錫舍雖經從賊不與一同打仗固屬義舉但現在業已投誠屢次打仗殺賊即與帶兵官弁無異嗣後該義民不必心存岐視祗當共効同仇之義協力𠞰賊以期共申義忿承受恩賞賊目莊大田因其黨羽漸次解散將眷屬搬移潛伏石仔瀨地方其勢已為窮蹙丁朝雄經常青派令帶兵往𠞰灌濕賊砲殺死多賊並拏獲賊目呉豹因所帶官兵義民不敷捜𠞰向常青禀請添兵而常青以府城兵力有限未能分撥祗令其駐劄港口以通糧路府城原有之兵不為不多因節次派往諸羅鹽水港援應以致兵力稍單不能添給丁朝雄尚屬寔在情形不為大過朕亦不加責備至丁朝雄帶領兵民將東港賊匪奮勇𠞰殺寔為出力可嘉昨因副將格綳額打仗奮勇已有㫖諭令福康安將該副將同徐鼎士謝廷選一併察看酌量保奏一人陞補温州鎮總兵員缺今丁朝雄亦能奮勉並著福康安一併歸入出力之副將内比較何人功績最著即奏請陞用以示奬勵南路村莊民人見大兵雲集賊黨解體指日即就殱擒惟恐官兵一到無從自白致獲罪愆紛紛赴常青處呈請賞給腰牌以為識别可見該處民人已知賊勢窮蹙爭先自為别白率衆具呈而常青給與腰牌將來安分良民俱可辨識該民人等益可安心守業以助官軍聲勢寔為極好消息現在南路情形既係如此則北路一帶村莊民人近見福康安統領勁兵前抵鹿仔港自更必歡呼踴躍共慶更生福康安于所過地方其各村莊安分民人亦當照常青所辦賞給腰牌俾令各有識别安莊服業自為守禦既可以安輯衆心且于官兵進𠞰後路更資協助無慮賊人潛出滋擾尤為妥善至臺灣義民甚多而廣東泉州二處民人尤為急公随同官兵打仗殺賊屢經出力自康熈年間廣東莊義民𠞰賊有功經總督滿保賞給懷忠効忠等匾額是以民人等咸知嚮義踴躍自効但前次匾額祗係總督所給伊等已如此感激奮勵今將廣東莊泉州莊義民朕特皆賜匾額用旌義勇伊等自必倍加鼓舞奮力抒忠但該處莊居甚多難以徧行頒賜著福康安接到匾額後即遵照鈎摹擇其大莊羣居處所普加賞給懸設並傳㫖曉諭以伊等義勇素著出力可嘉是以欽頒匾額賞賜以示優奬俾該義民等益加感奮竭力圖効以堅其向義之心看來目下情形常青一路雖因兵力稍單未能奮迅攻𠞰但南路賊匪屢被官兵擊退將家屬搬移畏懼潛伏已無能為且該處民人爭先呈報自别賊勢日孤無難尅期捜捕至諸羅連次𠞰賊得有勝仗逆首林爽文手腿中傷賊目蔡福亦經受傷並因普吉保進兵笨港其屯聚諸羅城外之賊匪抽去十之四五前往抵拒柴大紀兩次遣人運取銀兩是道路已無梗阻米糧足資接濟不特守護無慮兵氣亦日見振作又普吉保在元長莊駐劄屢次痛𠞰賊匪打仗得勝與恒瑞柴大紀定期三路夾攻自可内外應合乗勝奮𠞰今福康安已于十月十四日開洋自已早抵鹿仔港大兵雲集尤當士氣百倍即日㑹合長驅定可一舉蕩平將來𠞰捕事竣海蘭察自應帶同巴圖魯侍衛章京等先行回京至福康安既逺渉重洋正應乗此大兵得勝之後將一切善後事宜悉心籌辦妥為區畫不必急于來京瞻覲也至淡水一帶現在並無賊擾而大甲溪逼近大里杙賊巢地方𦂳要該處義民等随同官兵堵禦防守頗為出力即日大兵進𠞰該處㑹合夾攻正當鼓勵義勇協力助𠞰若此時因伊等口糧過多輒議裁減恐義民等資糧不給或至漸行散去轉阻其急公効用之心殊屬失䇿徐嗣曽現將銀米添解接濟並令該處員弁妥為安撫酌量支給使義民等口食充裕招徠日廣將來大兵進攻正可得其協助甚合機宜所有各處義民口糧俱應照常支給不可輕議裁減為要北淡水一路逼近賊巢兵民守禦已久前此徐鼎士與藍元枚訂期合攻若無藍元枚病故之事自已定計進兵今徐鼎士徐夢麟以勢難久待已分路進攻並禀請鹿仔港軍營預備從大肚溪攻擊想徐嗣曽已寄知福康安令其就近裁酌指示機宜宻速辦理該處距賊巢甚近徐鼎士等自應領兵由大甲攻擊以牽綴賊勢但此時逆首林爽文在諸羅被官兵殺退手腿中傷現往牛稠山逃竄醫治賊目莊大田又因夥黨漸散將家屬移入大武隴自在石仔瀨潛伏是賊首賊目等屢經官兵𠞰殺正在奔潰竄匿之際福康安到鹿仔港後自必先往大里杙夾攻將林爽文等跟踪追捕以期一鼓擒獲至徐鼎士率領兵民分路進取福康安若因該處需兵濟應不妨于普爾普舒亮二人内酌派一人帶領巴圖魯侍衛章京十數人帶領二三千兵前往㑹合徐鼎士併力攻𠞰更為得力挐獲賊目呉豹俟解到内地著該督撫即派委妥員押解來京審辦臣等謹按粤莊義民随同大兵𠞰捕逆匪激於義憤視賊如仇雖以業經投誠之莊錫舍猶因其曽附賊黨屏斥不與㑹合而莊錫舍遂以獨力𠞰賊猝致被創亦可見粤民之相矜以氣節由來久也我皇上叠加奬勵示以同仇之義化其岐視之心復因康熈年間粤莊舊有懷忠効忠匾額止為督臣滿保所給特親灑宸翰寵逮窮檐所以鼓舞而作興之者至矣上又命軍機大臣傳諭李侍堯徐嗣曽曰周井等犯在洋面肆行刼掠胆敢將運送臺灣軍裝物件搶刼至一百餘簍之多甚屬可惡自當查明嚴辦但該犯等俱係漳州人而賊首林爽文又籍𨽻漳州該撫查辦此案若必將該犯等是否係屬林爽文賊夥之處詳加究訊伊等既不肯自行承認勢必展轉追究牽連波及恐該處民人不無心懷疑懼況此等盜犯審明後本應按律斬梟即使究出實係林爽文夥匪亦不過正法梟示罪無可加著徐嗣曽止須將該盜犯等行刼軍裝棉衣之案審訊明確就案完結毋庸展轉追究致滋疑擾初二日丙申柴大紀奏言九月初三日夘刻賊匪萬餘乗濃霧未散分别環攻四門營盤鎗砲甚多臣同侍衛徳成額㕘將特克什布等往來督戰各營盤鎗砲齊發官兵義民等一齊奮勇力戰約共打死賊匪二百餘名打死騎馬賊二名執大旗賊三名殺死者亦多至午後賊退逃入十四甲北社尾角子藔等莊恐有埋伏收軍初六日辰刻賊匪四五千在北門外田洋斬毁將熟禾稻臣随率把總蔡開祥石生輝帶隊伍併各義民前往趕殺鎗砲打死賊匪甚多忽山仔頂埤仔頭賊衆數千兩路圍來臣随飭總兵魏大斌等分頭抵禦施放鎗砲打死多匪至午後賊俱退逃初七日夘刻賊匪率衆萬餘復來侵犯西門營盤臣望見賊匪向前打仗後面將禾稻斬毁随督飭各將備官兵義民奮勇衝殺鎗砲連環攻擊打死賊匪數百餘名初八日辰刻賊衆復來攻西北二處營盤臣等前往督戰俱照賊多處用大砲連轟打死賊匪甚多随率官兵義民俱出田洋力戰又斃賊各數十名十二日寅刻賊匪數千分路來攻西南北三處營盤惟西門畨社口賊匪最多鎗砲逼近臣等前往督戰南北二處賊匪經大砲轟死多人官兵義民併力殺退惟西門賊匪冒死逼來臣率領弁兵將大砲移在田洋打死騎馬賊一名執黒旗賊一名併賊匪數十人兵民向前力戰殺斃多匪未刻賊始退去因火藥缺少不便逺追獲賊旗鳥鎗長刀腰刀竹牌等件火藥一桶又九月初七日夜東門雲霄厝義民賴光前挐獲奸細林培一名髪辮剃去只留兩角訊據供稱逆首林爽文因連日攻城俱被官兵殺敗差來與堂兄林觀賜約為内應俟十五日夜賊衆來攻東南西門發砲五聲為號即從城内放火亂我軍心以便取勝等情臣即親往將林觀賜拏獲供認不諱又初八日義民首孫仁拏獲奸細僧應瑞一名供認在山仔頂大衆廟遇賊夥楊七交火藥一包囑他在城内十五六等日賊衆攻城放火内應等情即將該犯等正法一面飭令城廂内外嚴加防範十五日夘刻果有賊匪萬餘放砲五聲蜂擁來攻東南西營盤臣同侍衛徳成額㕘將特克什布等督率各官兵奮勇向前鎗砲連環叠進各義民併力鏖戰至午後三處賊匪被鎗砲打死共三百餘名打傷騎青馬賊一名執大旗賊三名賊衆俱退申刻復來逺聚于東南兩邊與我兵相持一夜至十六日黎明賊拚命攻犯東南二處營盤鎗砲逼近各官兵義民奮勇堵殺鎗砲共打死賊匪三四百人東邊打死騎花馬賊一名執大旗賊一名未刻賊俱四散逺逃因火藥不足收軍獲鳥鎗竹牌賊旗等件子砲一門鉛子一包惟是諸羅被困三月有餘糧餉全無雖經㑹同署諸羅縣陳良翼多方勸捐殷寔人民共樂急公但經賊擾以後家少葢藏捐助終屬不敷所有地𤓰花生皆已食盡其附近田稻被叠次打仗踐踏至今僅有四五分成熟乃民間饑餓所迫紛紛割取難以禁止二三日即已罄盡兼之火藥缺乏就地煎硝而每日所出不過四五十斤寔不敷用勢殊危急探㕘贊恒瑞領兵已于上月二十八九等日陸續到鹽水港總兵普吉保領兵于本月十三日抵笨港已再宻差往二處訂定來諸日期以便帶兵向前接應所有官兵義民滿城百姓聞此信息莫不歡欣踴躍苦守數日兩路大兵自必齊集儘可併力𠞰洗同日常青奏言九月初七日賊目張基光洪賽等率賊二千攻擾東港之竿林等莊有義民首林成率衆堵禦殺賊八十餘人初九日張基光等復糾水底寮賊三千餘來攻又被林成㑹齊竿林内六莊義民奮力殺賊並溺斃之賊約有數百人奪回大小砲器械無數並前被賊夥林進李靜等佔踞之新園等莊亦經林成等義民同粤莊義民恢復各賊匪逃往水底寮聲言再約賊匪來攻現在義民首林成同粤籍義民等懇發官兵前抵東港情願齊心接應臣察看此時逺近莊民因賊匪勒取糧米抽分田榖俱願同心殺賊保䕶村莊既經竿林等莊義民倡率防禦自係極好機㑹況有督臣李侍堯派來進攻東港陸路兵一千名對换水師内除已派二百名交千總王國志等帶同府城義民二千前往鹽水港外現有兵八百名即于十三日派令副將丁朝雄並原派來之逰擊倪賓守備查城帶領又派守備林登雲管帶新募入伍之兵二百四十名一同起程由水路直取東港一復東港不但府城糧運大通而南路賊勢自必窮蹙至總兵梁朝桂于初九日到鹽水港劄營與恒瑞大營相近即日與賊打仗𠞰殺賊匪甚多並燒燬賊寮又恒瑞派副將謝廷選同逰擊劉越共帶兵九百名在新莊劄營于初八日與賊打仗得勝查新店係水道登岸港口為鹽水港後路既有該副將等駐守恒瑞處所需軍火糧餉自可源源運送惟接據柴大紀咨稱八月二十日副將蔡攀龍㕘將孫全謀逰擊邱能成等率領官兵來縣查副將貴林逰擊楊起麟都司杭富守備馬大雄四員及千總外委陳邦材陳洪猷等二十一名均聞在途遇害蔡攀龍等帶來官兵一千二百六十六名損失六百二十二名邱能成等帶來兵五百十二名損失一百五十六名又藤牌等兵丁九十名損失十四名其現到各兵随帶藥鉛六百餘斤運來餉畨銀一千六百三十五員守備楊彲在西門外打仗受傷身故恒瑞親統大兵已抵鹽水港柰諸羅附近各莊處處均有賊匪潛伏圖截官兵來路茍非設法分其賊勢大兵未易前來惟懇飛催鹿仔港普吉保李化龍速派勇戰兵丁義民揀選大員統領前來俾賊知鹿仔港兵動必分其黨以禦我兩路官兵則諸羅一帶賊勢自弱再差汀州義民㳺永盛等齎摺赴郡祈再給發畨銀一千三百元迅速帶回以濟急需等情臣因普吉保前咨有商留總兵李化龍在鹿仔港固守即親帶官兵前往西螺斗六門一帶打通道路之語復又飛札屢催諒該鎮此時業已起兵現又有府城義民二千情願前往而義民㳺永盛等既可陸續運送餉畨則藥鉛並可設法零運必不致于乏絶不日南北官兵義民齊到㕘贊恒瑞柴大紀總兵普吉保酌籌並舉内外合攻道路自必通暢賊首尅日可擒惟逰擊邱能成在諸羅縣城西門外畨仔溝與賊打仗被傷身故恒瑞帶往之䕶軍㕘領岱森保患病未愈臣因派撥健鋭營翼長烏什哈逹前往適值内地調赴鹽水港弁兵三千名陸續進發即令該翼長一同星速馳赴一到恒瑞軍營即與總兵梁朝桂等酌籌進攻至南路東港臣派令副將丁朝雄管帶弁兵由海道乘機進攻在鳯山縣屬之竹仔港見有賊船數隻即施放鎗砲打破賊船一隻賊匪百餘人俱各棄船奔岸逃走該副將同革職㕘將那穆素里等帶兵登岸追趕鎗砲斃賊十餘人生擒賊犯丁把洪賀二名當將各賊船燒燬仍即收兵回船候風又于十七日船抵東港暗令目兵李竒林光海浮水登岸先將賊人設防大砲灌濕將備弁兵齊到港口直攻進港賊各驚竄官兵追趕殺賊七名奪獲鎗砲弓刀等賊械又搜捕賊匪方得勝等十二名現在東港安撫百姓並哨探近港均有賊匪糾集該副將同逰擊倪賓等于路口安營堵禦並㑹商粤莊義民總理曽中立等仍曉諭各莊將米榖由港運赴郡城糶賣現有載兵之船回郡俱已裝載米榖開行臣查東港原係南路糧食赴郡之港口今官兵已經到港𠞰捕商販米谷即由回空兵船裝載來郡郡城米價現已平減但據稱近港均有賊聚則此時尚不能為收復東港之功現有粤莊義民首舉人曽中立並俸滿教官羅䕃前協同辦理一俟全行通暢併粤民等莊糧食俱可由港出口到郡無阻臣即查明官兵義民有功者分别請奬另行奏報又㕘贊柴大紀報稱福寧鎮標中營逰擊田藍玉揑稱原配鎗砲器械並無遺失迨親往查騐始據兵丁蘇得亮等供出鎗砲牌刀各有遺失蔡攀龍等帶兵來援随帶將弁接應而該逰擊不即前往屢催始帶兵在後緩行請將逰擊田藍玉革職以肅軍紀又十五日有鳯山縣屬之竿林大林浦等莊及廣東莊各民人約有七八千來營懇給告示當即給發告示腰牌又十四日有賊數千從南潭蔦松等處前來當派江寧將軍永慶廣東副都統博清額翼長烏什哈達協領豐伸佈伊清阿領隊侍衛郭爾敏色等帶領弁兵並各義民由山梁卡直向二王宫廟進𠞰遇賊接仗官兵奮勇撲擊鎗砲並施賊人四散逃竄官兵分開左右二翼兩路截殺自己至申賊人奔逃鎗砲斃賊百餘人同日恒瑞奏言賊匪連日在鹽水港攻擾營盤俱被官兵殺退該處附近村莊民人經恒瑞開導曉諭俱各安貼其造冊投誠者共有八十餘莊當給以腰牌又與賊匪打㐲時投出廖進髙一名訊係前随貴林前赴諸羅被賊搶去今因賊匪被官兵追急乗間脱出若即行究辦恐前次同時衝失之兵不敢投到是以交與梁朝桂令其随營効力都司蕭應得守備李自昌打仗出力該二員前在金川曽經出力今俱賞戴花翎其都司黄象新賞戴藍翎同日李侍堯奏言府城南至鳯山一帶賊夥漸散各莊民俱起義効順九月十一二等日山猪毛粤民㑹同泉民在新園逐賊殺溺死者甚多沿途各莊俱相随殺賊粤民劄住新園泉民劄住下牌頭合萬餘人至郡具呈并稱若大兵進𠞰伊等情願随軍効力是以將軍常青派丁朝雄倪賓等直取東港莊大田因夥黨漸散已逃往石仔瀬鳯山境内略已無賊東港之米有來至府城者市價毎石頓減七八百文是南路大勢已定惟昨據呉元琪來禀有莊錫舍殺敗逃去賊匪又欲糾煽抗拒等語然賊夥已經渙散即糾約亦未必能多而該處義民甚衆兼有丁朝雄等就近彈壓必可無虞至鹽水港自九月十五以後賊見梁朝桂等官兵及府城添雇義民二千前往兼有蕭隴等莊義民相助賊遂漸退惟阻截道路以困諸邑而不敢復攻鹽水港又有諸羅賊目李七者最為驍悍巡檢邵宗堯聞其有歸順之意因義民柯光明柯得騰懇請自効遂將二人帶赴恒瑞處即令齎諭宻招李七李七已領收并有願先送妻子為質再相機行事等語又徐鼎士亦稱十月初六日派逰擊呉秀等在岸裡社一帶進攻大里杙該副將與都司敏祿等由牛罵頭等處進攻大肚溪是各路俱已進兵賊須處處分力抵禦勢必不支又岸裡社熟畨素不從賊八月十六十九等日有賊來擾俱被該畨等殺退呉元琪已遣人傳諭該社貢生潘士興張鳯華等聨絡生畨斷賊走入内山之路則將來賊匪竄逸亦有生熟畨把截不致兎脫看來俱是極好機㑹今福康安等大兵接續前進必可得手至鄭國卿所帶之兵臣前與福康安面商以府城稍覺單薄是以奏明仍令赴常青處昨因風勢稍平該鎮業已放洋計此時已抵臺郡未便追回轉赴鹿仔港且府城南路各莊原聞有十萬大兵𠞰賊之說是以賊散而義民紛起今若無一兵添往未免觀聴所闗義民又懷疑慮賊復生心窺伺是鄭國卿之兵仍應赴常青處聴候調度較為有益至四川將軍鄂輝于本月十六日到泉州其頭二起屯練兵亦已于十六七等日到蚶江餘于二十一日可以到齊已到之兵現在支領鹽菜口糧及鑼鍋帳房馬匹等項陸續登舟配渡均奏入上命軍機大臣傳諭福康安常青海蘭察柴大紀李侍堯曰賊匪狡詐百出胆敢遣其黨夥潛約内應而林培一犯已將髪辮剃去則前此所傳林爽文有蓄髪親丁之説並不為虚經柴大紀察出即行查拿正法使賊匪無由逞其鬼蜮之技所辦甚好其拿獲奸細之義民賴光前孫仁並著酌量加賞又普吉保自到笨港後已節據奏報屢次打仗得勝𠞰散賊匪現在咨㑹柴大紀恒瑞訂期㑹攻此時福康安已抵鹿仔港軍威更盛柴大紀等更當加倍奮勉至署諸羅縣陳良翼數月以來多方勸諭殷寔之户捐助糧食民人共樂急公得資接濟陳良翼寔為出力伊已推陞知州呈明告養因病尚未回籍經常青等委令代理縣事今該員仍能奮勉自効甚屬可嘉著以知州銜即補諸羅縣知縣料理一半年令其回養徳成額特克什布于賊匪攻犯營盤時往來督戰殺賊甚多徳成額現已因其出力陞補健鋭營前鋒㕘領其特克什布著交福康安于軍營遇有應陞之副將缺出即奏明陞用魏大斌前以無能降㫖革職今據柴大紀奏伊在山仔頂處帶兵堵禦𠞰殺賊匪如果寔在出力尚可降補都司以觀後效又鳯山及廣東莊民人既悔罪投誠即為良善常青給發告示腰牌令其各回本莊互相保守其從前被賊逼脅無柰聴從之處不加深究甚屬得當民人等紛紛投營呈明並非賊黨足見賊勢已孤寔為極好消息常青正當乗此機㑹廓清南路至該處義民如舉人曽中立辦運米谷㳺永盛齎送畨銀林成在東港等處率衆堵禦殺賊均屬奮勉急公曽中立前已有㫖令福康安等查明係文舉人酌賞文職武舉人酌賞武職如人才可用即予以寔缺其㳺永盛林成二人亦著查明量加賞給職銜或酌用寔缺諸羅武舉黄奠邦督率義民在城守禦素為出力已有㫖令常青等酌量録用伊等如有情愿服官者將來事竣時不妨分别予以寔缺用示奬勵黄象新屢經打仗殺賊甚屬奮勉亦著賞戴花翎至李七係賊人頭目今既有歸順之意經恒瑞令義民齎諭往招李七愿先送妻子為質自應設法即為招致以解賊黨此事何以未據恒瑞奏及再賊首林爽文昨據李侍堯奏手腿中傷已往牛稠山醫治恒瑞所奏亦復相同其語自當確寔但林爽文中傷一事係在柴大紀處抑在普吉保處著福康安即行查明具奏至福康安逺涉重洋督辦軍務海蘭察率同巴圖魯侍衛章京等奮勇宣勤現在正值隆冬之際朕心深為軫念福康安海蘭察俱著賞給元狐暖冠各一頂柴大紀力捍圍城勞績茂著亦著賞給元狐暖冠一頂以示體恤上又諭内閣曰邱能成自𠞰捕逆匪以來節次奮勇殺賊甚為出力屢經擢陞逰擊今因傷身故寔堪憫惜著交部加一等以㕘贊銜照陣亡例議恤至援應諸羅中途被害各員除貴林楊起麟杭富業經降㫖賜䘏外其守備馬大雄及在西門外打仗傷亡之守備楊彲均著交部議給䘏典其餘千總外委陳邦材陳洪猷等各員並著該將軍等查明咨部照例議䘏以示軫惻上又諭内閣曰田藍玉帶兵前赴諸羅于兵丁遺失軍械有心揑餙迨跟随柴大紀接應蔡攀龍時又復行走遲緩寔屬狡詐怠玩僅予革職効力不足示懲田藍玉著革職即在臺灣府城永逺枷號示衆以昭儆戒上又諭内閣曰本年閩省𠞰捕臺灣逆匪所有添調各省官兵經過地方一切軍需供應俱經發帑支給絲毫不以累及閭閻惟是運送糧餉軍械等務間亦酌用民力雖並給與口糧脚價而該處民夫急公向義無不踴躍從事實堪嘉尚自宜特沛恩膏除漳泉二府因本年被旱歉收曽經降㫖加恩令該督等查明緩征並臺灣府屬本年及五十三年應征錢糧概行豁免外仍著李侍堯等將福建通省承辦軍務各州縣所有官兵經過地方就其差務繁簡出力輕重查明應如何酌量加恩分别蠲緩之處詳細核定迅速奏聞候朕另降恩㫖臣等謹按臺灣𠞰捕逆匪以來軍需供頓皆特發官帑絲毫不累閭閻且漳泉二郡被旱歉收地畆已奉㫖緩徵而臺郡一嵗正供又全予蠲免聖慈軫恤亦既無微不至乃復因民夫運送糧餉軍械急公無悞特勅將官軍所過州縣核其差役繁簡輕重分别蠲緩所由民不知兵相與感頌皇仁共安耕鑿之休也上又諭内閣曰總兵梁朝桂㕘領岱森保帶兵前往鹽水港一帶𠞰捕賊匪寔為奮勇梁朝桂著即賞給奮勇巴圖魯名號並照例賞銀一百兩岱森保著賞給副都統職銜以示奬勵欽定平定臺灣紀略卷四十二
