body:
  text: 三月二十三日乙酉李侍堯奏言閔鶚元咨稱二批川米六萬石于二月初一日開行難以停止又據湖南運員禀稱奉文停運之前已運米六萬六百餘石俱抵閩境查此次米石既已放洋赴厦挑運過山自未便令其運回應將前項米九萬五千六百餘石俱照數兑收閩省奏入上命軍機大臣傳諭李侍堯徐嗣曽曰前據李侍堯奏臺灣軍務告竣計本省各省撥運之米儘足敷用其未經運到閩境米應行截留停運是以諭令各該督撫等將浙江湖南四川未經起運米石一體截留分别辦理昨又據徐嗣曽奏臺灣存米除給發軍粮外所存無多其辦賑口粮議欲加給折色銀兩業經降㫖令該督撫嚴查辦理毋任屬員藉端浮冐今據李侍堯奏江蘇湖南續運米石業已運到閩境李侍堯即照數兑收前臺灣存貯之米果屬不敷辦理賑務正可將此二項續收之米酌運臺灣既可以接濟民食亦可免冐銷之弊較為兩有禆益二十八日庚寅上諭内閣曰被賊戕害各員如果抗節捐軀没于王事本應一例給予䘏典設其家屬因公猝遭他變亦可酌量加恩以示軫䘏劉亨基在任時肆意貪黷自知為衆怨所歸因見該處情形必滋事端即預令家屬携帶多資内渡囬籍藉為營窟之計而中途洋面遭風壊船親族人等俱被累淹斃資財漂没無存可見昩良黷貨骩法釀變之人即其身倖逃憲典亦為天理所不容報應昭然可為烱戒嗣後有守土之職者惟當各矢清慎砥礪亷隅時時循思天理凛遵國法若不知儆畏惟事貪婪則劉亨基等即其前車之鑑四月初二日甲午孫士毅奏言南澚碣石海門各營汎及饒平惠來等縣禀報臺灣凱旋官兵内渡由閩省厦門蚶江海門收口因風漂泊到境者計粤東乍浦兩處駐防及福建官兵已有八九起即飭令地方官料理分别出境歸伍奏入上諭内閣曰前因各省兵丁調往臺灣剿捕賊匪逺渡重洋究為渉險曽降㫖令將湖廣貴州廣西四川四省兵丁于内渡時每名各賞給銀二兩又留駐臺灣之廣東兵丁一千名亦經一體賞給至廣東浙江及福建本省兵丁因其鄰近海疆渡洋素所經習是以未經另行加恩今孫士毅所奏凱旋官兵多有漂入粤境此項兵丁俱由閩省内渡因遇風漂入他省境界即素習海洋究屬遭險亦堪憐憫所有臺灣漂入粤境官兵着孫士毅查明無論何省官兵如前降諭㫖内未經賞給者即着每名賞給銀二両如已離粤境各回原藉即着孫士毅行知各該督撫按名賞給嗣後如有凱旋官兵因風漂入他省查明未經得賞者俱照此賞給以示朕格外軫恤之意臣等謹按國家設有額兵原以偹徴發之用該兵等平素優給錢糧身家得資養贍一旦遇有徴調即偶經渉險亦屬分所應然我皇上於辦理臺灣軍務當事竣之時因其逺涉重洋優加賞賚復因念廣東浙江福建之兵凱旋内渡遭風漂泊又續降恩綸每名賞給銀兩所以體恤戎行者有加無已深仁厚澤浹髄淪肌衆志有不成城者哉初七日己亥李侍堯奏言臺灣全境蕩平所有南北兩路凱旋官兵一到即湏按次遄行臣前已飭行司道等酌定章程預為備辦三月初九日接准將軍福康安來咨並抄寄摺稿已令各路領兵大員分起配船載渡臣查海洋風􅰆靡常其自鹿耳門鹿仔港兩處開行或收入厦門或收入蚶江崇武􅀈均湏随風收泊臣已飛飭口岸各員于官兵登岸處即妥為辦送起程仍酌量間日行走以免沿途擁擠至四川松潘鎮總兵穆克登阿帶領屯練降畨兵丁已由厦門蚶江及銅山漳浦等處登岸接續前進二十四日即可全過泉州又江寜將軍永慶因風收泊銅山澚起岸來厦其所帶杭州乍浦駐防兵船收入厦門亦間有收南澚詔安到厦者尚有一船未到俟到齊即帶領起程又廣東副都統博清額帶領廣州駐防兵因風收入廣東惠來縣并有收入黄岡漳浦銅山者兵丁即就近取道回粤其抵厦之船及未到一船該副都統現在來厦帶領起程又鎮筸鎮總兵尹徳禧帶領湖南兵丁已由蚶江厦門收口現已照料陸續起程至巴圖魯等及福州滿兵亦接續進口遄行連日天氣晴和官兵行走俱極安妥其貴州官兵原係總兵許世亨帯領該鎮已補放浙江提督所有原帶兵丁查有貴州副將岱徳堪以管領回黔臣俟其抵岸即飭知遵照其浙江廣西廣東福建等省緑營官兵軍營分派起數本係編列在後是以尚未收口現飭妥恊預備俾得随到随行再船隻一項已節次飭撥前往並與福康安往返札商轆轤駕駛以資配載侍郎徳成于二月二十九日帶同司員等抵鹿仔港初二日登岸至福州將軍魁綸于本月十五日由崇武澚放洋此日應抵鹿仔港奏入報聞十二日甲辰福康安鄂輝同奏言臺灣逺在海外南北兩路地方極為遼濶澎湖一島控制鹿耳門為臺灣屏蔽山海汛防均闗𦂳要近年以來柴大紀貪鄙不職而各營官員亦多不得其人營伍日漸廢弛遂致釀成逆案兹當剿平賊匪之後應于軍營出力之員内不論何省慎選幹員請補方足以資整頓查臺灣鎮所屬各營内副將二缺㕘將一缺遊撃七缺均未補放有人又安平恊副將丁朝雄南路營𠫭將瑚圖里前已俸滿照例將副將李威光𠫭將曺貴調補查李威光帶領内地義民随在軍營雖知黽勉才具究屬中平曺貴尚未到營任事察其材力亦非堪勝要缺之人均應酌量更調臣等進兵時于軍營帶兵各員内随時留心察看量其人才核其勞績逐加遴選查有福建同安營㕘將福蘭泰才具眀幹辦事安詳在鹿仔港堵禦賊匪駕馭義民甚為嚴宻得體堪以陞補臺灣北路恊副將又福建督標水師營叅将潘韜熟諳營伍才堪造就調赴䑓灣日久始終出力堪以陞補澎湖協副将又廣東羅定協副将孫全謀才具明晰随征出力諳習水師于臺灣情形較熟堪以調補安平協副将又福建陸路提標前營遊撃穆騰額堵剿賊匪認真出力堪以陞補臺灣城守營恭將貴州清江恊右營遊撃魯安邦打仗奮勇曽任京營守備通曉事務堪以陞補臺灣南路營叅將又臺灣鎮中營遊撃一缺為鎮標要缺營務最繁凡挑補兵丁清查軍械等事皆其專責于都司内揀選一時實難其人查有福建陸路提標右營守備潘國才才具明幹遇事奮勉懇請將潘國才照水師守備應陞之例陞署臺灣鎮中營遊撃照例扣滿年限另請實授又福州城守左軍都司敏禄明白勤慎堪以陞補臺灣鎮標右營遊撃又廣東澄海恊都司麥瑞熟習營伍堪以陞補安平恊中營遊撃又海壇鎮標中營遊撃葉有光熟習臺灣風土堪以調補安平恊右營遊撃又福建水師提標左營遊撃黄象新打仗出力堪以調補澎湖恊右營遊撃又騎都尉陳大恩原任湖北施南恊副將縁事革任仍留騎都尉世職懇請來臺灣軍營効力該員自進兵以來打仗奮勉仰懇將陳大恩留于臺灣補放臺灣鎮太營遊撃又原任温州鎮總兵魏大斌自革職以後深知感懼守城禦賊甚屬出力但觀其才實非幹練應請將魏大斌補授安平恊左營遊撃又臺灣澎湖有應補守備八缺分防汛地管束兵丁均闗𦂳要現在整頓營伍之時亦應㨂選年力强壯打仗奮勇人員補放以收實効查有候補守備陳宗煌堪以補授臺灣鎮標中營守備廣東提標千總陳廷髙堪以陞補臺灣鎮左營守備汀州鎮標千總吳芝鳯堪以陞補臺灣城守左軍守備潮州鎮標千總吳大瑞堪以陞補北路協左軍守備福建水師提標千總李文彩堪以陞補安平協左營守備泉州城守營千總李漢陞堪以陞補安平協右營守備閩安協左營千總雷鳴揚堪以陞補澎湖協左營守備安平協千總聶世俊堪以陞補澎湖協右營守備又浙江温州鎮總兵黄岩鎮總兵二缺令將軍營出力副將揀選陞用蔡攀龍陞任提督普吉保調任臺灣所遺海壇鎮汀州鎮員缺俱係軍營所出之缺例應以軍營人員補用臣留心察看于臺灣軍營副將内逐加遴選有福建興化城守副將格綳額廣東香山協副將謝廷選屢著勞績自随同臣等打仗殺賊均屬奮勉又福建閩安協副將丁朝雄帶兵收復東港口粤庄粮米得以運至府城數月以來堵禦賊匪防守極為嚴宻以上三員俱堪任專閫之任請將謝廷選補授温州鎮總兵格綳額補授汀州鎮總兵丁朝雄補授海壇鎮總兵以示鼓勵此外軍營副將内惟貴州銅仁協副將岱徳打仗奮勇出力已奏請賞給巴圖魯名號但才具少欠開展尚湏歴練其餘並無堪勝總兵之人不敢濫行保奏所有黄岩鎮總兵員缺應請㫖簡放再浙江兵丁原係温州鎮總兵魏大斌統領前來臺灣因魏大斌業已革職派令副将詹殿擢帶領撤回但兵數衆多不敷照料查温州鎮總兵員缺現請将謝廷選陞補應即令謝廷選管帶各起兵丁回浙奏入上命軍機大臣傳諭福康安李侍堯曰柴大紀貪縱玩弛一案前經福康安訊據守備王天植及柴大紀之胞弟柴大經等録供具奏是柴大紀骩法侵貪俱有証㨿其餘各欵亦無難向柴大紀逐一研訊跟究得實何以許久尚未審訊明確即前次所奏供情亦止係就弁兵及伊弟柴大經等供出而柴大紀尚未見訊取確供着福康安即將該弁兵及柴大經等所供柴大紀聞知賊匪滋事退回府城及帶兵出城又在演武㕔駐劄並不親往剿捕並派令兵丁至内地貿易借給糖行畨銀得受兵丁銀兩㧞補外委各欵并此外種種劣蹟即向柴大紀逐一嚴加鞫訊録取確供迅速定擬具奏毋任稍有狡展再前此福康安等奏到獲犯各供詞内據莊大田供出有孫一人莊有又堂弟莊樹現在平和廣坑庄生理蔡福供出前年林爽文攻破諸羅有素識之何霜榮引進入夥等語此三犯現在曽否拏獲該犯等係逆犯親屬夥黨不可不嚴拏審辦以净根株着福康安李侍堯一體嚴飭查拏務獲上又諭内閣曰謝廷選着補授浙江温州鎮總兵格綳額補授福建汀州鎮總兵丁朝雄補授海壇鎮總兵以示鼓勵其浙江黄岩鎮總兵員缺着王柄署理俟服闋之後再行實授上又諭内閣曰前因臺灣出有武職各缺曽降㫖諭令福康安查明軍營出力人員内酌量奏補今據福康安奏請酌量補放俱着照所請其千總把總外委等缺着福康安于軍營出力弁兵内擇其才具堪以管教兵丁者酌量㧞補照例咨部至此項陞補人員若一概送部引見伊等俱在軍營奮勉出力此時臺灣逆匪初平正資人料理彈壓未免又需調署且魏大斌曽任總兵亦經素識更無湏令其來京引見所有此次陞補各員竟無庸送部上又諭内閣曰特爾敦轍派往臺灣剿捕逆匪尚屬出力業經加恩賞給副都統職銜今自閩回京于途次病故殊屬可憫着加恩賞銀二百兩以示軫恤十三日乙巳上諭内閣曰此次剿捕臺灣逆匪所有派出帶兵之巴圖魯侍衛等打仗殺賊甚為奮勇雖止係内地奸民滋事非從前平定凖噶爾回部金川可比但數旬之内生擒南北兩路逆首臺灣全郡蕩平辦理甚為迅速除軍營出力人員業經降㫖加恩分别陞用外今特爾敦轍雖已賞給副都統職銜但在途病故殊堪憫惜其巴圖魯侍衛等着福康安詳悉查明如有似此實在出力勞績懋著者據實具奏候朕降㫖交部查明伊等所得功牌酌量議給世職以示鼓勵十四日丙午福康安鄂輝同奏言臺灣民刁俗悍搶竊成風給㑹拜盟尤為惡習所有天地㑹名目起自内地輾轉私傳又有一種㳺手匪徒生事擾民名為羅漢脚以天地㑹人衆勢强利于糾搶無不聴從入㑹若非㑹内之人即行搶奪是以稍有身家及負販營生者亦多畏其搶奪不得不從以致南北兩路日聚日多一經㕔縣查拿動輙抗官拒捕此次林爽文謀逆不法即由糾合㑹匪而起其林爽文入㑹又係嚴烟傳授五十二年正月内常青訊明賊匪楊咏供詞據稱聴得嚴烟説起㑹的根源是廣東洪二房和尚居住後溪鳳花亭同一姓朱的年纔十五六嵗不知名字也不知住在那裡等語並經孫士毅逐處密查不但並無其人抑亦並無其地臣等到臺灣後屢將天地㑹根由訊問賊犯僅知取烟吃茶俱用三指説話不離本字等暗號不能備悉其詳及拿獲林爽文研究再三匿不供吐因係觧京要犯未便用刑嚴訊随思嚴烟係首先在臺灣傳㑹之犯且係有名賊目必湏嚴拿跟究當即嚴宻查緝已將該犯拿獲臣等親加研訊嚴烟即係莊烟又名嚴若海係漳州平和縣人于乾隆四十八年藉賣布為名來至臺灣四十九年在溪底阿宻里庄傳授天地㑹是年三月十五日林爽文聞知㑹内人衆便于糾搶即聴從嚴烟入㑹五十一年八月林爽文復約同林漢林領林水返張四何有志在車輪埔飲酒約㑹各處村庄互相傳習遂致拒捕戕官釀成逆案臣等以該犯既係臺灣首先傳㑹之人則天地㑹傳自何人起自何地必知備細向其逐一跟究據供這天地㑹聞説是朱姓李姓起的傳自川内年分已逺有馬九龍糾集和尚四十八人演就驅遣隂兵法術分投傳教後來四十八人死亡不全只有十三人四處起㑹那在廣東起㑹的是萬和尚俗名凃喜如今在那裡實不知道又有趙明徳陳丕陳彪三人從廣東恵州府來到漳州詔安縣雲霄地方傳㑹有個張姓不知名字因面上疤㾗甚多號破臉狗他常留趙明徳等在家居住附近髙坑菴馬坑廟丁仔峽石磜尾溪都是傳㑹之處乾隆四十八年陳彪借行醫為名到平和縣纔傳我入㑹的這些人是陳彪告訴我的其實都未見過又聞得陳丕也曽到過臺灣傳㑹如今早回内地去了等語又供凡傳㑹時在僻静地方設立香案排列刀劍令在刀下鑚過即傳給㑹内口號結為弟兄連父母妻子不許告知也不冩帖立簿那起㑹的朱姓呌朱鼎元帮他傳㑹的李姓實在不知名字他們兩家傳下一個洪字暗號所以呌做洪二房賊旗上書冩洪號字様并有五㸃二十一隱語都是取洪字的意思曉得暗號就是同㑹即素不認識之人有事都來帮助等語復嚴究此外有無不法語句據該犯供出木立斗世及李朱洪等暗號與孫士毅從前查奏之語大畧相同奸徒編造暗號邪詞藉圖煽誘實堪痛恨所云四十餘人都㑹驅遣隂兵法術甚屬妄誕不經其由川省起㑹傳至廣東等處並不能實指川省粤省是何縣分與孫士毅前奏乾隆三十二年起自漳州之語不符恐竟係逆匪等本與粤人不合又因粤人聚集義民拒賊出力希圖架詞傾陥其起㑹之朱鼎元李姓又無實在下落供詞甚為閃爍臣福康安前在四川總督任内查緝嘓匪遍加親歴並未聞天地㑹名目臣鄂輝在川年久亦未聞有此事但既有此語不可以所供無據置之不辦且天地㑹聚衆搶奪與嘓匪搶奪相近或竟係四川省傳來亦未可定現據供出趙明徳陳丕陳彪三人在詔安雲霄地方傳㑹自必深知此㑹根由即應從此跟查徹底嚴究臣等現已宻派妥弁賫信知㑹李侍堯孫士毅不動聲色嚴宻查拿俟閩廣得有確據如果起自川省即飛咨川省一體嚴宻查辦至臺灣天地㑹情形臣等連日訪察其首先傳㑹之人藉端煽惑聚衆結盟原屬心懐叵測而附從入㑹者因糾衆搶奪被惑聴從及至入㑹後科派銀錢遇有搶奪等事即湏互相帮助雖搶其戚好之家不能不随同前往是以㑹内之人有因歛錢助闘心生退悔者可見邪教惑人之事一時圖利相聚必不能始終合夥串通一氣即如阿里港殷戸陳國英原曾入㑹從逆嗣以莊大田等索銀錢不遂将伊父母殺害後逃至山猪毛粤莊願充義民因粤庄不肯收留勒交糓石氣忿身死又有本係㑹内之人因畏懼干連即充當義民随同剿賊如義民首賴水魏收等俱曾入天地㑹賊匪滋事之初即捐資招集義民打仗出力即此可知入㑹之人並非全行從賊自大兵進剿以來乘勝長驅屢次克㨗凡係助惡黨羽望風潰㪚不能復行糾集所有從賊㑹匪人數衆多業已殱除殆盡間有未獲逸犯上𦂳緝拿日有就獲者審明後即行正法此等匪徒㫁不能復行漏網至此外義民庄民等亦有曾經入㑹者經此畨大加懲創之後人情已極震懾不敢復蹈惡習若于人心甫定之時再行追究從前紛紛查辦未免易滋疑懼况天地㑹並無經像無憑指實或啟告訐訛索之端轉于地方無益惟有嚴宻確查首先傳㑹之人以絶其源其來臺灣傳㑹者除嚴烟外尚有陳丕一犯是否實已潜回内地抑尚蔵匿村庄現仍一體查拿究辦並責成地方官永逺嚴行禁止凡有拜盟立㑹即非天地㑹名目亦即嚴懲示儆不但不使有糾搶之事並不得存結㑹之名以仰副聖主綏靖海疆整飭民俗之至意至嚴拿竄逃餘匪尤為妥靖地方要務當此難民歸庄之時恐有逸匪混入其中希圖漏網經臣派撥弁兵帶同熟諳道路之人分頭跴緝兹各處口岸要隘等處駐守兵丁俱已撤回而南北兩路地方寛廣原設水陸各汛自賊匪滋事後多未安設現在一面酌定營制一面先将挑出補缺兵丁分安原設各汎飭令往來梭織巡查遇有形跡可疑之人即行拿究復揀派妥協員弁分路查緝並派山猪毛義民首劉䋲祖周敦紀等帶領生畨通事黄阿生往内山畨社捜查逸匪以期净絶根株不留遺孽現據派出官兵陸續擒拿觧送及民畨等盤獲縛献者紛紛不絶逐加嚴審或曽抗拒官兵或擾害村民肆行搶刦或賊匪經過村庄附和随行俱各供認不諱審明後即派委知府楊廷理叅将吳宗茂監視行刑將匪犯羅進等三百一十二名按名正法至大武壠一帶地方山箐深宻恐有潜逸匪犯派令六十七帶領官兵前往㑹同副將格綳額等自牛庄進山由大武壠直至崗山一路嚴宻捜查並令將各庄義民慰諭歸農乘時耕作據該員等在大武壠内一帶村庄及山溝竹圍内逐一捜查並無賊匪民人等漸次歸庄整理生業連日㴻雨優霑土膏滋潤正可及時播種其東港洋面小琉球一島亦派員查明該處止有泉州民人三十八戸撘盖草藔居住俱係良民亦無賊匪蔵匿再查各處義民俱已陸續歸庄軍器全無所用節經派委妥員分投收繳並令地方官查明原册將義民自備器械一體交官自到南路後共繳過鎗炮刀矛藤牌等項四千二百九十餘件惟是臺灣風俗剽悍軍器最多皆因械鬥私造此畨懲創之後民人等震懾兵威已甚畏懼而閩粤不和積習尚恐驟難更易惟有嚴宻查辦不准存留軍器地方官如能永逺奉行實力查禁則械鬥之風亦可不杜自息再查林水一犯已拿獲歸入第四起觧京匪犯内起觧其董喜一犯將拿獲賊目隔别訊問多稱董喜實已病故並據供稱大兵攻克集集埔後董喜病已沉重逃到山邉身死賊夥等將伊屍身即在該處掩埋等語已派委妥員往集集埔一帶嚴宻訪查董喜是否實在病斃埋𦵏何處務得確切証據方可憑信總之此等賊目助逆不法㫁難任其一名漏網臣等于進兵時随處訪查賊目姓名另行存記除臨陣殱戮及官兵捜獲之外生畨呈騐首級認出賊目又有數十人其未獲逸犯臣等已開列名單通行南北兩路一體嚴拿二月以後陸續捜獲者甚多查對名单凡係有名賊目已獲十分之九仍嚴飭各處兵役庄民等嚴拿跟究即賊中小頭目等一經訪查確實亦湏按名緝獲净絶根株不使稍留餘孽其賊目家屬人等俱係應行縁坐之犯已陸續捜獲百餘名仍再移咨徐嗣曽一體飭屬嚴查先將拿獲者陸續送赴内地交李侍堯照例辦理其家屬居住内地者亦飛咨李侍堯查明究辦奏入上命軍機大臣傳諭福康安李侍堯孫士毅曰㑹匪結盟滋事自應確查嚴禁臺灣現當人心甫定之時且據福康安奏義民中即有曽經入㑹者若再追究從前紛紛查辦實未免易滋疑懼至所供萬和尚趙明徳等犯為粤閩二省首先傳教之犯必當嚴拿務獲但内地輾轉根查又恐啟告訐訛詐之端李侍堯孫士毅惟當不動聲色飭屬宻訪嚴查以期就獲不必過甚致有株連然亦不得視為尋常緝捕具文致要犯潜踪漏網又連日訊及觧到逆犯簡添徳供有李恵一犯係南路偽軍師雖檢查福康安原奏供单内有李恵已于上年九月被府城官兵拿去正法之供但所供是否確實李恵一犯係何人拿獲並着福康安查明具奏至福康安現在所辦臺灣善後各事宜頭緒繁多若諸務完竣能于七月間内渡即應起程于萬夀前赴熱河瞻覲如一時未能辦竣聞海洋風􅰆九月内向俱停止開渡福康安不妨在彼多駐㡬時萬不可冐險開行即過九月俟風色順利再行起程亦未為遲上又諭内閣曰帶兵出力之巴圖魯侍衛等昨已降㫖交福康安查明勞績懋著者奏明交部查照功牌酌給世職此内鄂輝舒亮普爾普三人俱係大員奮勉出力朕所素知即著軍機大臣㑹同該部查明鄂輝等三人節次打仗勞績查照應得功牌酌量議給世職以示酬庸延賞之至意欽定平定臺灣紀畧卷五十八
