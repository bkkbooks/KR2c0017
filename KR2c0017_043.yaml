  text: 欽定四庫全書欽定平定臺灣紀略卷四十三
  hash: sha256:f2d6b534bd0bf48cc593b9740463605b8cfc8bb85eebc4f7d479efd28823e42c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_043-1a, image: WYG0363/WYG0363-0502a.png}
body:
  text: 十二月初三日丙寅上諭內閣曰朕于軍旅之事有功必賞有罪必誅從不肯稍存姑息即如此次臺灣帶兵之郝壯猷因賊匪復擾鳯山棄城不守不待大學士九卿核擬即將伊于軍營正法其貴林楊起麟邱能成諸人皆因奮勇勦賊臨陳捐軀即敕部從優議恤一律得給世襲刑賞昭然惟人自取今臺灣領兵各員俱能爭先效用未必不因郝壯猷覆轍在前共知警勵蓋兵可百年不用不可一日不備而信賞必罰絲毫難以假借此後身膺閫寄者當咸知凛惕遇行軍之際務須身先士卒克敵致果共曉然于功罪所分視乎勇怯如能共矢藎誠著有勞績必躬膺荗賞承受渥恩若畏怯幸生必致自蹈重愆身罹憲典庶幾人知敵愾士皆用命母負朕整飭戎行諄諄告誡之至意上又諭內閣曰臺灣逆匪林爽文糾衆倡亂以來提督柴大紀統兵剿捕收復諸羅後賊匪屢經攻擾城內義民幫同官兵奮力守禦保護無虞該處民人急公嚮義衆志成城應錫嘉名以旌斯邑著將諸羅縣改為嘉義縣俾閣縣良民倍加奮勵以昭奬勸臣等謹按逆匪林爽文糾衆倡亂以嘉義為南北兩路要衝百計滋擾當福康安援兵未集之時嘉義被圍已及五月賴城內義民多方保護危而獲安雖以柴大紀怯懦無能為義民等遮留因得堅守待援保全閣邑數萬生靈之命逮夫大兵雲集重圍立解賊人喪膽遂成破竹之勢是義民守禦之功實臺郡全局所繫國家教澤涵濡恩意周渥小民急公奉上出於至誠用能同心協力繕完守備屹若金湯我皇上旌其嚮義鍚以嘉名有勇知方洵史冊所罕覯也同日書麟奏言川省運米二十萬石沿江押護員辨稽查催儧各船俱揚帆順流而下遇晚停泊即督率兵役徹夜巡邏防範並無盜賣及攙和情弊亦不敢片刻稽延一面咨明督臣李世傑江蘇撫臣閔鶚元飭屬預偹海船接收轉運奏入報聞初四日丁卯常青奏言總兵梁朝桂帶兵一千名于二十九日由海道前往鹽水港協助想此時早已到彼計鹽水港本有之兵併𣲖去各兵共有五千餘名尚有義民等協同禦剿軍聲尚為壯盛嗣聞鹿仔草莊於八月二十八日被賊焚劫兵民退回鹽水港緣鹿仔草鹽水港二處本有逰擊楊起麟邱能成分駐防守與縣城相為犄角且柴大紀自夏秋以來賊匪不時侵擾縣城又調逰擊楊起麟邱能成往諸羅護守固以縣城為重而鹿仔草之失實因兵力單弱之所致也今鹿仔草雖失尚有小路數處可通諸羅縣城臣恐鹽水港人情惶惑飛催梁朝桂星速趕赴加意防範並飭令縣丞徐英前往安撫民人多招義勇與官兵協力堵禦再臣自南路齊𣲖官兵赴援必須鹿仔港亦𣲖官兵自北路齊赴則賊勢必將分散前已三次飛札普吉保于新到兵內酌量抽撥由笨港一帶應援諸羅又飭總兵李化龍如到鹿仔港即帶兵三千星速赴援兹據普吉保咨稱留李化龍在鹿仔港固守即親帶兵前往西螺斗六一帶打通道路臣仍飛札該鎮務與恆瑞柴大紀等預先關合訂期並舉則賊人首尾不能相顧不但可解諸羅之圍即可乘勢進𠞰立破賊巢至南路賊匪各處臣督率官兵迎擊約計鎗炮斃賊五六十人兵民受傷者十餘人現據督臣李侍堯已調水陸提標兵三千名到厦門配渡並聞督臣孫士毅已調廣西兵三千名到潮州臣已札知二督臣速發此項兵到臺灣軍營遣用此項兵到臣一面留兵守城一面帶兵攻擊北路㑹集諸羅與恭贊鎮將等合兵攻擊大里杙殱擒首逆至臣軍營官兵節次撥往諸羅一萬有餘所存營盤之兵雖止四千餘尚足防禦惟諸羅柴大紀等自副將蔡攀龍等到縣以後旬日有餘尚無文報恆瑞現駐鹽水港應俟有普吉保帶兵攻打西螺斗六門一帶之信即與柴大紀關㑹夾擊但恆瑞帶兵三千去後又𣲖總兵梁朝桂帶兵一千趕赴此時諒必一同駐劄該處尚有義民協助今府城各義民又情願往鹽水港幫同打通諸羅立功自效臣復𣲖千總王國志董國瑞帶水師兵二百名並管帶府城義民二千前往柴大紀聞知前後兵民齊到鹽水港自必與恆瑞普吉保㑹合進剿以通往來諸羅道路同日柴大紀奏言十五日辰刻賊匪率衆來攻東西北三門營盤鎗炮較前更多臣同特克什布及德成額官保等往來督戰調恭將潘韜遊擊李隆飛往西門三苞竹一帶夾攻敗匪退逃北門外賊匪從台斗坑北社尾二路繞至與官兵對放鎗炮被大炮轟斃多匪內打死執大旗賊二名又連環鳥鎗打死數十人官兵義民奮勇而前殺賊甚多賊衆四散惟東門賊匪尚不肯退臣親帶隊伍義民由臺斗坑田洋橫冲魏大斌等官兵由雲霄厝殺出逰擊林光玉由王田岡小徑斜擊殺賊數十人獲鳥鎗賊旗雜械等項二十日辰刻賊匪率夥千人在東門外之姜母藔王田岡兩處搶割稻榖臣飛飭逰擊李隆林光玉等帶領兵丁義民馳赴該處分頭剿捕臣帶兵在八掌溪墘接應逰擊李隆至姜母藔鎗炮打死十數人賊匪棄榖奔逃獲鳥鎗令旗等件榖三十餘石林光玉至王田岡賊匪數百在田割稻一半與官兵抵敵被鎗炮擊死賊匪十餘名賊盡捨所割之稻由山徑逃竄獲濕榖四十餘石均交縣收存以作軍糧兵丁義民俱無損傷二十一日巳刻賊匪數千來攻東北營盤臣同侍衛德成額等督率官兵齊放大炮打死賊匪數十名賊恃有鎗炮竟不畏懼旋退旋來魏大斌詹殿擢林光玉等督率辨兵義民在雲霄厝抵敵又報西門外店仔尾賊衆來攻營盤臣隨飛往督戰連放大炮打死賊匪數十名復調逰擊李隆參將潘韜帶隊伍義民前來夾攻打死賊匪數十名賊盡逃往各莊竹圍荗密難以前進其東北二門之賊亦經殺退追過臺斗坑因禾稻荗盛田塍狹小不便逺追俱令收軍二十三日午刻賊匪萬餘來攻東西北三處營盤臣同侍衛等往來督令鎗炮連環齊轟北門外賊匪被大炮打死十數名賊隨攏向東邊逰擊林光玉施放大炮又打死十數名臣督率官兵義民由臺斗坑前田洋攻其右逰擊林光玉帶兵從山仔頂攻其左魏大斌帶官兵自雲霄厝一直冲殺鎗炮打死數十人賊隨退逃時西門外店仔尾賊匪鎗炮甚多勢更鴟張臣飛調逰擊李隆恭將潘韜官兵義民從右殺來施放大炮打死賊匪七八十名官兵義民一同追殺賊逃過八奬溪獲賊旗賊械等項因大雨收軍二十六日巳刻賊匪萬餘復來侵犯東西北三門營盤臣同恭將特克什布等督戰逰擊林光玉施放大炮打死數十名賊隨轉向雲霄厝蜂擁前來又同魏大斌詹殿擢等督令官兵施放大炮連環叠進併飭逰擊林光玉帶兵民由山仔頂圍殺斃賊多名賊隨沿山奔逃其北門外賊匪由埤仔頭竹圍內擁出鎗炮與官兵對打把總楊起鵬連放大炮兵丁義民一齊奮勇向前協力鏖戰鎗炮打死及殺死賊匪計百餘名追過臺斗坑惟西門外賊匪鎗炮較多冒死逼近營盤臣帶把總蔡開祥併鎗炮手飛往攻擊轟死賊匪百餘名臣見賊勢稍退率恭將潘韜守偹邵振綱各官兵一齊趕出署諸羅縣陳良翼教諭江浩飭令義民奮勇向前協殺至申刻又打死賊匪百餘名二十七日辰刻賊衆復來侵犯四門營盤臣同恭將特克什布侍衛德成額官保等督率官兵義民協力堵殺先令大炮連轟各打死賊匪甚多即率鎗手併打進步連環義民緊隨協助賊被鎗打死者百餘名時東南北賊匪俱經殺敗追趕過溪四散逃匿惟西門外新店尾畨社口二處賊匪鎗炮對打雖被官兵打死多人而旋退旋來抵死不懼臣等奮勇向前力戰至未刻打死賊匪數十名內打死執大旗賊二名賊退追過田洋因田中禾盛水滿未便逺追俸滿巡檢吳元都司羅光照等被傷獲大旗二面鉛子一包火藥一桶鳥鎗及長柄刀雜械等項八月初二日辰刻逆賊糾衆復犯諸羅東北角雲霄厝營盤臣同侍衛德成額官保恭將特克什布等督率官兵義民向前抵敵逰擊林光玉施放大炮賊衆被炮打死數十隨飭帶兵從山仔頂轉來夾攻鎗炮打死賊匪百餘人忽臺斗坑擁出賊匪數千直犯北門營盤臣隨趕回督率守偹陳明德把總楊起鵬施放大炮轟擊鎗手連環進步自辰至未大炮打死賊匪甚多官兵義民奮勇爭先殺死賊匪三四十人賊衆四散逃走追過臺斗坑收軍獲賊旗賊械等項初五日巳刻賊匪七八千來攻西北營盤臣等在西門新店尾施放大炮打死賊匪多人內執大旗賊匪一名官兵義民追殺過田洋賊退入三苞竹莊內其北門外賊匪經把總楊起鵬施放大炮連環轟擊打死賊匪數十人賊逃過溪忽東邊山仔頂復擁出賊匪千餘來攻雲霄厝隨督率官兵義民前往堵禦臣復調逰擊林光玉帶隊伍從東夾攻鎗炮打死賊匪甚多賊遂奔逃恐有埋伏收軍又聞賊匪在諸羅東邊雲厝地方搬搶民間糧食隨於初九日黎明先令逰擊林光玉帶領隊伍併義民同往搜捕又調詹殿擢田藍玉等率領官兵義民往北巡哨以防賊匪前往攔截行至埤仔頭北社尾即有賊匪二三千從莊內擁出被官兵連環叠進打死賊匪百餘名賊始退去復報西門外畨保溝亦有賊匪三四千來攻新店尾及畨社口各營盤臣隨馳往該處督率官兵奮勇力戰大炮連環斃賊甚多至未刻西北二處賊衆分逃過牛攔溪三苞竹等處隨收軍回營其逰擊林光玉所帶隊伍至盧厝莊殺退賊匪搶去糧食亦經收回查義民等奪獲賊榖地瓜乾約有四百餘石賞給各義民作口糧獲賊旗賊械等項十二日巳刻賊匪萬餘復來攻西南北三門營盤臣等往來督戰各營盤大炮叠轟共斃賊匪數十名鳥鎗連環打死賊匪甚多至未刻南門外賊匪隨退惟西北二門賊匪愈殺愈多臣飛調魏大斌帶領官兵自東殺至北李隆率帶隊伍自南殺至西兩路夾攻共打死賊匪百餘名獲大旗三面併賊械等項守偹楊彲因傷重身故其所帶兵辨委員接管再諸羅被困兩月有餘八月二十九日收得義民運來畨銀一千六百三十五圓並無糧餉運到差探賊情因兩次援兵損失甚多遂思乘勢連攻以重困諸羅于本月二十一二三二十六等日率衆萬餘叠次環攻俱經臣同特克什布德成額等奮勇堵殺鎗炮打死賊匪六七百人獲賊旗五面書僞鎮南大將軍僞西路左先鋒等字樣獲行炮一門鳥鎗腰刀竹牌雜械等項賊逃入十四甲牛稠山埤堵等處竹園荗密內藏大炮外有溝渠我兵不能逼近收軍回營侍衛官保逰擊邱能成被傷生獲賊匪二名審明正法惟被賊圍困糧餉兩缺藥鉛不足兵民均以花生牛隻充腸危急情形較前愈甚而官兵義民百姓畨衆俱能忍餓禦賊並無懈志惟有益加鼓勵設法固守以待大兵齊集同日普吉保奏言克復笨港後親督官兵分𣲖恭將張朝龍海亮搜剿焚燒各賊巢計尖山宜梧等處二十六村莊其有挈眷逃出者嚴禁官兵鄉勇不得阻撓十九日探聞笨港潰散賊匪復糾約斗六西螺各路夥黨率衆萬餘分路前後繞截隨分布官兵各路抵禦自辰至酉鎗炮攻擊竟日不退賊匪蔓延田坎占住沙岡臣于東莊口率領逰擊海亮千總李漢升帶同官兵直撲上山賊匪始行潰散當被鎗炮打死百十餘人惟時各路官兵人人奮進即漳州隊內各兵亦皆踴躍直前賊匪抵敵不住適護副將琢靈阿帶同守偹宋國興由到雲厝堵截前來參將張朝龍帶同守偹王德俊由山仔腳衝殺夾攻共計打死賊匪叁百餘名奪獲長鎗器械五十餘件二十日賊匪復出滋擾臣仍督率將偹員辨帶領官兵分路堵殺自辰至未鎗炮打死賊匪一百餘名奪獲器械二十餘件元長各村居民見官兵連日剿殺賊匪歡聲動地現在紛紛來歸者不計其數均經妥為安撫惟是賊匪東散西聚出沒靡常雖屢經挫敗然蓄謀詭譎糧道後路最關緊要業經十八二十一等日密遣妥人飛禀恆瑞柴大紀訂期㑹攻尚未接准移覆一俟訂期既定後路廓清臣即親帶官兵前進再九月二十九日探得賊匪屯距附近土庫地方臣親率官兵剿捕賊匪散布田坎竟日抗拒連用鎗炮打死約有三四十人賊始退散三十日逆首林爽文復糾約賊夥三面攻擊營盤臣督率將領分𣲖官兵鄉勇奮力堵殺自辰至申鎗炮打死賊匪甚多割獲首級耳記併奪獲火藥鉛子皮牌長鎗刀械各項兵丁鄉勇亦有傷亡者十月初四日聞賊匪屯聚崙尾莊等處臣傳集熟悉道路鄉勇𣲖撥官兵定于初五日黎明進剿聞諸羅炮聲甚急隨潜行前赴崙尾埤田心仔莊一帶勦捕見該處地多竹林蔗園路徑狹窄恐有埋伏督令官兵鄉勇小心防範賊匪星散田坎赤身洗足前來迎敵橫施鎗炮官兵奮力向前正在鎗炮攻擊之際竹園內復突出賊旗數十蜂擁應援官兵鄉勇奮力抵殺用連環鳥鎗傷斃賊匪甚多餘賊漸退賊莊多係搭蓋草藔當令放火焚燒詎意賊匪散而復聚仍然抗拒又被鎗炮打死數十人併生擒賊犯六名餘賊始潰計焚燒賊藔共三百餘處割獲首級耳記奪獲器械多件併將出力各官兵鄉勇奬賞鼓勵其獲犯洪達等六名訊明正法伏思元長莊相距鹿仔港八十里後路賊匪時出滋擾糧餉藥鉛若由旱路運送恐中途被截所關匪細現有五條港水路可以舟運曽將糧餉運到一次自港登岸離營盤僅只二十里臣𣲖撥官兵沿途護衛可保無虞惟土庫之賊勾通斗六門夥黨屢要抄襲後路臣惟有身先士卒痛加剿洗以除後患均奏入上命軍機大臣傳諭福康安常青海蘭察柴大紀李侍堯普吉保曰常青自駐守府城數月以來雖未能奮力進取不免稍事因循今據節次奏到𣲖兵援應諸羅鹽水港及在府城堵禦剿賊各情形于調度機宜尚為妥協看來常青雖係年老究係經事較多尚可以資任使恆瑞到鹽水港後雖未能將附近賊匪悉力剿散打通道路而閲昨日奏到各摺伊在彼安撫莊民堵禦賊匪諸事亦尚有料理前曽諭令福康安將常青留于府城委以南路剿賊之事恆瑞著令解任回京候㫖今常青恆瑞所辦諸務俱尚能奮勉著福康安酌量情形如伊二人在彼均尚能得力不妨俱著留于該處以資協助帶兵柴大紀前次檄調楊起麟邱能成之兵赴縣亦因該處被圍緊急存城兵力無多而各路援兵不能即至亦迫于事勢之不得不然今普吉保已收復笨港與柴大紀恆瑞訂期夾攻自己早經㑹合其鹿仔草一帶屯聚賊匪無難乘勢掃除是柴大紀調用楊起鵬邱能成之兵未為大錯福康安亦不必因鹿仔草一事將柴大紀加之責偹也至粵西兵三千早經全抵厦門福康安帶領同赴鹿仔港不可又𣲖往府城其李侍堯所𣲖閩兵三千昨據李侍堯奏其先到之一千五百名已經撥赴恆瑞處現令鄭國卿帶兵一千五百名前赴常青處應用常青處既有此項兵力接濟自己足敷勦捕諸羅城外屯集賊匪于七八兩月屢次糾合夥黨肆行侵擾俱經柴大紀督率將辨等竭力堵禦殺賊甚多城內官兵義民及畨衆等同心固結並無懈志實為勤苦出力其打仗出力之將辨等俱應優加升賞內如特克什布德成額官保等于賊匪滋擾營盤時往來督戰殺死多賊最為奮勇特克什布昨已有旨令福康安于軍中遇有應升之副將缺出即行升用德成額現已因其出力升補健鋭營前鋒恭領仍著福康安留心察看此後如該員再能奮勇立功即據實奏聞即以副都統補用官保在西門勦賊被傷較重亦著福康安查明如果打仗奮勉即奏明以應升之缺升用此外在事出力員辨俱著福康安一體查核于軍營現出各缺內酌量奏請升補至魏大斌已有旨降為都司以觀後效在雲霄厝等處連次打扙殺退賊匪尚知勉力奮勇著福康安遇有軍營副將缺出即將魏大斌奏請補用俾益加感奮立功自效賊人狡詐伎倆往往于官兵後路攔截餉道今普吉保設法將糧餉火藥由水路運送極合機宜而土庫一帶賊匪勾通斗六門夥黨思欲抄截官兵後路普吉保現在帶兵將該處賊匪痛加勦洗所辦亦好現在福康安同海蘭察等帶領巴圖魯侍衛章京等前抵鹿仔港粵西川黔之兵俱陸續齊集軍威壯盛而柴大紀恆瑞普吉保各路亦俱連次得勝士氣振奮聲勢聨絡即日福康安統領重兵㑹合攻勦諒此么䯢小醜豈能茍延殘喘朕日夕盼望捷音之至上又諭內閣曰普吉保前由大突候往笨港勦賊克復笨港已降㫖交部議叙兹復督率將辨兵丁奮力勦殺前後打死賊匪五六百人奪獲器械甚多奮勇可嘉除普吉保業經議叙優賞外其隨同出力之官辨並著將軍福康安一併查明咨部分别議叙以示奬勵初五日戊辰恆瑞奏言現在賊勢甚大賊目甚夥處處俱被賊人占據民人領受腰牌者不過為後日立足地步並非其心不敢從賊臣所領之兵僅有五千只能防守鹽水港新店海口實不能向前進取普吉保亦帶兵五千駐劄笨港不能前進坐視諸羅被賊圍困不能救援倘諸羅一失鹽水港亦難防守目今全臺地方僅餘沿海一帶及府城鹽水港笨港鹿仔港等處餘俱被賊占據其勢漸大數日以來風勢又猛海中舟不能行福康安又無到來信息臣實在不勝憂懼看來此事不動大兵難以完結倘賊衆入山更費周章臺灣地方遼濶風土與內地不同臣愚以為暫守已經恢復地方與接續後路即需兵二三萬直搗大里杙水沙連大武隴等處賊巢剿捕賊目亦需兵二三萬人又接到普吉保來札稱伊若帶兵前進恐後路無兵接續並聞諸羅城內糧餉火藥不能接濟臣即使帶兵能抵諸羅亦仍不能殺出于事無益且新店海門距鹿耳門甚近倘鹽水港再有疏失其事更大臣現與梁朝桂等酌𣲖兵一千五百名駐守新店海口再𣲖兵五百名駐守鹽水港其李侍堯𣲖撥之兵已到九百名皆係召募新兵現同梁朝桂上緊訓練奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯孫士毅柴大紀普吉保曰連日據柴大紀普吉保等奏報該二處屢得勝仗現在訂期㑹合夾攻而常青處亦節次奏到屢經打仗殺賊雖未進取而自守實屬有餘是剿捕事務各路俱大有轉機何以恆瑞獨為此驚惶無措之語自係恆瑞少不更事怯懦無能是以遇事張皇茫無主見即如所稱諸羅城內糧餉火藥不能接濟若有疏失則鹽水港亦難保守等語試思柴大紀被賊圍擾已經數月城中糧餉火藥早屬不敷柴大紀激勵兵民悉力守禦並能剿殺賊匪况節據李侍堯柴大紀奏蔡攀龍等接應諸羅多雇夫役將糧餉火藥隨同運進柴大紀兩次赴府城鹽水港調運畨銀復經奪獲賊匪所割之稻四十餘石及濕榖地瓜乾四百餘石散給兵民作為口食該處糧餉火藥時有接濟雖至匱乏尚可儘力支持現在方與普吉保約㑹夾攻而福康安統領大兵即日前進聲勢壯盛正可乘鋭進剿豈有數月以來該處縣城俱能保守無虞而福康安未到十餘日之前柴大紀轉不能設法捍衛竟至委城而去之理且常青在府城駐守亦時有賊擾常青督兵堵禦屢有斬獲並未稍涉惶急形諸奏牘可見常青雖係年老究經事較多心有定見于剿捕事宜尚有把握此時大兵雲集正在振作士氣尅期進剿之時乃恆瑞過于張皇率為此奏若將士等為此言所惑以致心懷疑懼阻其鋭氣所關甚重福康安與恆瑞係屬親戚且福康安于此事本不免稍存畏難之見恆瑞所言自尤易于聽信而海蘭察及巴圖魯侍衛章京等大半與恆瑞熟識若聞恆瑞之言俱不免心存猶豫稍懷恇怯何以集事朕甚憂之著傳諭福康安務須堅持定見切勿為恆瑞之言所惑昨因恆瑞連次奏到各摺尚有料理是以諭令福康安到彼酌量如尚能得力不妨將伊暫留該處效用今觀恆瑞所奏恇怯若此徒亂人意伊雖年力尚壯而福康安現在所帶巴圖魯侍衛章京及該處鎮將等勝于恆瑞者正不乏人恆瑞竟不必留于該處矣彼雖懇求軍營效力亦不可聽著福康安即令其來京候㫖不可因係親戚稍存回護總之賊匪雖多不過一時烏合祗須于初次打仗時將賊匪痛加殱戮一二次則賊首賊目望風膽落其餘附賊黨夥自必紛紛瓦解豈有必須一兵扺一賊之理即如現在各村莊民人具呈請領腰牌可見伊等皆知賊匪易于撲滅惟恐大兵一到難以别白預為將來自全地步本係心持兩端若見官兵克捷自無不堅心歸順協力助𠞰是賊黨雖多易聚易散無難一舉蕩平何必以賊多兵少為慮若如恆瑞所奏防守攻擊動須兵五六萬毋論無此辦法且鄰近省分俱已𣲖撥多兵勢難再調其較逺省分即速行續調行走動需時日亦已緩不濟急柴大紀處豈能曠日持久待此援兵乎福康安此時竟當親統大兵鼓勇直前接應普吉保一路不必以鹿仔港為慮鹿仔港現有李化龍在彼駐守尚能保護無虞此時官軍四路雲集聲威百倍鹿仔港自更可無慮並著福康安預行知㑹普吉保一得進兵信息即先行帶兵直前奮剿速抵嘉義縣福康安亦即帶兵隨後䇿應如福康安因大兵行走不能迅速即將所帶巴圖魯侍衛章京等酌𣲖數十人令其先往幫同普吉保奮力攻剿况普吉保後路即係福康安帶兵前進之路福康安統領如許徑將强兵接踵繼進于所過地方遇有屯聚賊匪乘勢剿殺肅清道路正可聨絡一氣併力進攻且大兵所過村莊將賊匪殺散後其所積米糧即可以資兵食恆瑞所奏賊匪屢有增添之語想必係諸羅賊匪見普吉保恆瑞統領官兵密邇縣城賊匪聞風畏懼添集夥黨欲為抵禦我兵之計而恆瑞株守一隅見該處賊匪較多遂爾過甚其辭殊不知南北兩路兵氣已為振作賊匪漸有渙散之勢而福康安又統領生力新兵萬餘自當所向克捷貴州湖南徑兵又當陸續將到斷可無須再添兵力若福康安到彼或以現在官兵尚覺不敷實有必須添調之處則廣東及福建本省已諭令李侍堯孫士毅廣行召募新兵預偹調用福康安即一面先行檄調一面據實奏聞亦無不可從來行軍之道不在兵多而在將兵得人豈有福康安同海蘭察及如許巴圖魯侍衛章京將辨而不能掃穴擒渠之理乎福康安惟當悉心籌畫勿為人言所惑初六日己巳李侍堯奏言楊廷理等禀稱諸羅賊匪因鹽水港笨港兩路援兵未進自初五日至初十日晝夜攻城兵民竭力抵禦十一日賊始退踞各莊仍前梗截道路現在城中糧藥俱盡勢甚危急若遲數日援兵不至實難力守等語是本月望前兩路兵尚未進發看來普吉保欲待恆瑞同進恆瑞又欲待鄭國卿到分兵駐鹽水港始行進兵是以彼此相待又稽時日鹽水港為水路要口現在府城至諸羅之陸路久已不通惟恃此一港為進兵一門户萬一稍有疏虞更難辦理是恆瑞劄駐鹽水港或實有未可輕動之勢至普吉保離諸羅僅二十餘里所帶兵有五千餘名既聞諸羅甚急應即奮勉殺入以解重圍乃必待恆瑞同進似不免意存觀望臣前𣲖往之三千兵內逰擊張旡咎先到之一千五百名兵已于初九日赴鹽水港而鄭國卿帶領之一千五百名兵亦已放洋計此時必當全到則恆瑞自可分兵駐鹽水港一靣知㑹普吉保兩路並進但未知諸羅兵力是否尚能堅待又李永祺禀稱普吉保已移營月眉莊離諸羅不過十餘里等語亦未知是否確實臣前據各官九月中所禀似兵事大有轉機今據楊廷理所禀情形則仍未得手數日之間奏報前後不符臣實深惶悚焦急看來此事總須福康安到彼調度鼓勵方能奏效奏入上命軍機大臣傳諭福康安海蘭察李侍堯柴大紀曰昨恆瑞奏到臺灣情形所慮賊多兵少之處殊不可信恆瑞在鹽水港有兵五千據奏業經𣲖一千四百名駐守新店海口又𣲖兵五百名駐守鹽水港是恆瑞尚有兵一千餘名伊既知官兵後路亟須防範即應酌量該處情形預行設計倘有賊匪潛出滋擾即奮力堵其來路勦殺使賊匪無從逞其狡計如慮賊匪分路統截即應預先知㑹柴大紀令帶兵出城跟踪追殺內外夾擊並令梁朝桂前後策應隨時堵禦自可無虞後顧何至一籌莫展徒事張皇即如從前平定兩金川前後𣲖調之兵共有十萬而此次剿捕臺灣賊匪福建本省前後所調滿漢官兵已二萬有餘粵省節次𣲖調官兵又有一萬三四千名加以浙江川黔粵西湖南等省陸續添調之兵又不下萬四五千合之臺灣原有額設兵萬餘統計已幾及六萬兵力實為厚集况金川係土司地方畨衆久經生聚且其地勢險隘碉卡林立而官兵深入攻剿直搗巢穴展拓彊宇𨽻我版圖彼時不過需兵十萬即克奏膚功今臺灣本屬內地逆匪林爽文等不過編户細民糾衆倡亂一時蟻聚况泉州廣東義民皆屬急公效義較之平定金川難易奚啻倍蓰而恆瑞輒以賊多兵少張大其詞徒亂人意剿賊制勝之道全在主將之一心如能立志堅定胸有成算則運籌决勝自當所尚無前將士等亦俱勇氣百倍若將兵之人先不免心存猶豫中無把握即使增益多兵亦難望其勇往得力福康安當堅持定見至柴大紀一路賊匪勢尚猖獗該處屢經賊匪圍擾數月以來柴大紀激勵兵民多方捍禦縣城保護無虞此時該處賊匪因見官軍應接未至晝夜攻城雖勢在急迫但據李侍堯奏探聞普吉保現已移營月眉莊離縣城不過十餘里或普吉保已帶兵前進殺賊解圍亦未可定且柴大紀固守縣城已經數月設遇縣城力不能守之時自必遵照前旨帶兵出城非前赴恆瑞處即赴普吉保處仍可合併一路整軍再圖克復且縣城存貯糧餉火藥等項俱已用盡城內民人又俱隨出是該處止係空城即被賊匪一時搶占無所資藉亦必旋即收復至普吉保一路現有兵五千餘名雖據李侍堯奏十月望前尚未向縣城進發自係普吉保因後路官兵不能接應未敢輕進今福康安已尅期進發普吉保處有大兵隨後接應倍當奮力進剿直抵縣城與柴大紀裏外應合併力攻剿以期克捷不必以後路為慮欽定平定臺灣紀略卷四十三
