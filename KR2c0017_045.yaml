  text: 欽定四庫全書欽定平定臺灣紀略卷四十五
  hash: sha256:39185ea706ff5dff27a5fe425a05cbe9b6e47e27e7d9636c858607916bf171be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_045-1a, image: WYG0363/WYG0363-0530a.png}
body:
  text: 十一月十二日乙亥李侍堯奏言接奉上諭即使府城難支或竟有疏虞之事亦不難再為收復等因現在府城一兩月以來並無賊擾常青遣丁朝雄前往收復東港雖南路賊匪復思煽動其黨夥决不能如逆爽之多諸羅雖被圍困昨接柴大紀摺稿知其尚在堅守今鄭國卿已到鹽水港恆瑞兵約有七八千自當分兵駐守一面約普吉保並進普吉保即以後路為慮而福康安兵到可接續前進其勢必能攻透諸羅則三路㑹合軍聲大振即可就近移兵直攻賊巢勝勢已在我而不在賊此正搗穴擒渠之關鍵全郡事勢不過數日內即大有轉機至府城尤為全臺人心所繫况數十萬糧餉火藥以及炮位等項無一不在城中若使賊得之反增其勢又鹿耳門為進兵要口府城或有疏虞則鹿耳門亦難守住將來官兵進剿并無上岸之路此事實大有關係現在事勢固决不至如此臣恐諭㫖一到軍營必不能祕密萬一稍有宣泄則人心不免驚疑搖動或轉有意外之虞計此次所降常青之諭㫖厦門尚未即刻配渡臣已飛飭厦門同知追回擬將上諭內節去一段另録寄知常青並恐已經發渡追趕不及一面札知常青並將此次摺稿抄寄囑其萬勿泄露福康安處亦將此意札知矣惟府城之兵自莭次派往諸羅鹽水港後兵力不免單薄臣現又在各營挑派舊兵一千名由厦配渡前往協守並前派在澎湖鹿耳門一帶往來防護之水師兵六百名亦知㑹常青倘海洋無事而府城或有緩急即就近調度以資堵剿再內地所解糧餉軍裝秋令暴風致有沉失除王履吉一船飄至廣東業經圖薩布具奏外尚有第六號米船一隻載米九百石飄至長道坑海口遇礁擊碎淹斃押運兵丁一名水手五名米石盡行沉失又鄭聖華一船載米八百五十石七月二十五日將進鹿耳門遭風擊破經楊廷理聞知急雇小船往救撈出濕米五百八十八包其餘二百餘包無從撈獲又船户李生財載閩縣軍米赴厦門九月二十八日二更在鼓㠘洋面遭風覆船黑夜無人救獲米盡沉失淹斃兵丁水手七名惟李生財及水手林順扶蓬飄流至嶼得生又曽長瑛船在蚶江載軍米一千石赴鹿仔港二十日遭風舵折二十一日飄至雞膳觸礁船碎曽長瑛扶蓬浮來其餘兵役水手等同時浮水未知生死此三船沉失米石均請照王履吉之例一體豁免以示矜恤同日孫士毅奏言粵東召募新兵已有四千名入伍訓練臣查督撫提及潮州鎮四標營分較大兵家子弟夲多儘有技藝過人苦于無缺可補今已一體充伍食糧此項新兵其材具優嫻視存營之兵尤為出色日內如遇將軍福康安􅊾調即將各該營素知紀律之兵簡派前往以期得力夲營現有新兵補數無虞缺乏現在復行上緊召募再臣風聞逆犯林爽文攻犯諸羅身受鎗傷其西螺笨港等處均被我軍打通賊夥聞有將軍福康安帶兵十萬尅期進剿之信俱各震恐已將逆犯家口移入大武壠地方該處逼近內山大約為竄入生畨地步至南路東港一帶聞常青亦已派員打通民間米石紛紛運至郡城逆犯莊大田遁入諸羅之石仔瀨地方未知是否確鑿再查粵東總兵帶兵赴臺者已有梁朝桂李化龍陸廷柱三員嗣後如遇軍營徵調粵兵可否派令諳練將偹帶兵赴臺交與該三鎮統領毋庸再派總兵帶往又黔兵二千分作四起陸續俱到黃岡令地方官多雇人夫運送軍裝隨到隨即啓行已于十月二十六日全數俱抵閩省詔安縣境其將偹各員臣酌給衣料辨兵賞給銀牌俱各歡忭趕緊遄行再貴州帶兵官因沿途俱係水陸未經帶有馬匹臣即在黃岡營內挑選膘肥馬匹分給各起總兵將偹乘騎迅速前進咨㑹黔省遇便將例馬價值解還由粵東自行買補均奏入上命軍機大臣傳諭福康安常青李侍堯孫士毅曰前因恆瑞抵鹽水港後被賊梗阻府城亦在圍中而柴大紀處望援甚切是以降㫖督令福康安速往援救進𠞰賊巢原就彼時情事而言今柴大紀處兵民一心堅守可無他慮而恆瑞處已有續到官兵可以約㑹普吉保合兵前進是該處情形與前不同李侍堯接閲各官禀報見軍營各路已有轉機惟恐常青接到前㫖稍有宣露轉致府城人心搖動擬將諭㫖節録發寄並札㑹常青福康安兩處深合機要殊得大臣之體李侍堯著賞戴雙眼花領以示優眷現在福康安已于十月二十八日由崇武澚得風放洋粵西屯練兵一同開駕而黔省之兵現據孫士毅奏於十月二十六日全抵閩境又有湖南官兵接踵進發福康安又召募漳泉義勇二千餘名軍勢已極壯盛粵東預偹之兵想來毋庸再調也大武壠地方與內山逼近今賊匪等將家口先行搬移自係聞大兵即日前進匪黨勢漸窮蹙預為竄入內山之計不可不設法堵剿絶其逃竄之路福康安到鹿仔港後自即親統大兵由普吉保一路直抵縣城接應柴大紀其大武壠一帶最關緊要福康安或派令鄂輝帶兵前往搜捕或抵縣城後帶兵有人即令柴大紀前赴大武壠搜剿方可將賊匪家屬悉數拏獲不使逆黨竄入內山搜捕致稽時日上又諭內閣曰解送軍餉米船於外洋陡遇颶風人力難施以致船隻沉溺淹斃數人情殊可憫所有沉失米石均著免其賠補外其前後溺斃之兵丁水手人等均著該督查明照陳亡例議恤以示體恤十六日己邜普吉保奏言夲月初八日黎明臣親率官兵進攻土庫地方賊匪蜂擁拒敵官兵奮力向前追殺賊匪敗退隨有男婦老幼投出情詞懇切臣不許官兵鄉勇滋擾傳諭出力之義民首張源勤等帶交署同知黃嘉訓妥為辦理一面將該處賊莊燒燬聞賊夥復嘯聚大崙查大崙為進諸羅之要路十一日復親率官兵鄉勇前往𠞰捕賊匪竟日拒抗官兵放鎗炮中斃甚多鄉勇乘勢放火焚燒賊藔緣該處一帶多係竹林蔗園地勢狹仄仍收軍回營十二日逆首林爽文率夥來攻臣督領逰擊海亮參將張朝龍副將琢靈阿逰擊葉有光等率帶官兵鄉勇分路堵殺賊匪被我兵鎗炮攻擊敗退割獲首級耳記奪獲長鎗竹鋛多桿十六日探知賊匪散而復聚即於十七日親帶官兵復攻崙仔尾等處臣預料賊匪必埋伏竹林蔗園內特派逰擊海亮管帶後隊防偹官兵鄉勇正在前進賊匪果從竹林內衝出迎敵逰擊海亮帶領後隊奮力繞截其後首尾夾攻賊匪死傷無數賊衆潰敗兵丁鄉勇內亦有陳亡受傷者其附近賊莊有挈眷來歸者均交署同知黃嘉訓查明安置該員辦理勤慎安撫之中更寓防範之意現在造冊編查甚為妥協惟是賊勢分路散布我兵鎗炮急攻彼即潰敗收兵後彼仍復聚集深堪痛恨雖諸羅近日密差妥人信息可通然彼此均有牽掣殊深憂灼現在設法極力痛𠞰以圖㑹合夾攻同日常青奏言十月十九二十四兩日俱有賊二三千在郡城南門外一帶屯聚窺伺均被官兵鎗炮打敗散去約計斃賊七八十人未為痛𠞰是以前摺未經奏及兹於二十七日卯刻賊又分為三隊向營盤前來每隊俱有賊二千餘人臣常青永慶博清額帶兵一千五百名並山猪毛義民由南潭中路前進又派侍衛塔思哈希明帶兵六百名由竹篙厝左路冲出侍衛郭爾果色副將五逹色帶兵六百名由湖仔仙右路冲出另飭總兵陸廷柱帶兵五百名在路北山坎埋伏策應臣等一齊迅疾馳赴其左右兩邉之賊望見官兵似覺畏縮不進惟中間賊隊膽敢向前與官兵對放鎗炮抵死不退自辰至午滿漢官兵施放進步連環直前冲殺其時左右兩路官兵亦皆環繞夾擊賊被鎗炮打死者約有二百餘人匪衆四散奔逃官兵分投追趕山猪毛義民乘勝爭先尤為趫捷奪獲賊人大炮一門割獻首級生擒賊夥張招一名當查殺賊義民按名各賞畨銀二圓銀牌一面奪得大炮義民賞給畨銀十圓其現已賞有頂戴者俟後來有功另加奬擢共受傷兵丁十一名義民四名再據鹽水港逰擊黃象新義民胡登髙等禀稱二十三日恆瑞統領官兵起程移札營盤在鹿仔草又月眉莊土庫牛稠山三處係林爽文往來屯札之所二十五日被普吉保攻開已札營該處不過離諸羅五里等語是普吉保等之兵業已同時進攻柴大紀自必由縣攻出計日定可破賊解圍同日恆瑞奏言十月二十二等日督同烏什哈逹梁朝桂等於新店等處𠞰殺賊匪收復鹿仔草現在該處札營將沿海一帶道路打通前赴諸羅均奏入上命軍機大臣傳諭福康安常青李侍堯柴大紀普吉保曰據普吉保所奏情形事機已有轉動且附近賊庒民人挈眷來歸者紛紛不已足見從賊者日少黨羽渙散普吉保遵㫖傳諭不許官兵鄉勇滋擾所辦甚是其所稱廓清賊黨㑹合夾攻之處當勉力為之勿為空言南路賊匪經常青連次𠞰殺得有勝仗而普吉保札營處所距縣城不過五里恆瑞又已將鹿仔草收復是各路聲勢漸已聨絡縣城自更當固守無虞且福康安於十月二十八日已由崇武澳開洋計柴大紀在縣城再堅守五六日福康安即可統領大兵隨後直抵該處或普吉保於福康安未到之先已帶兵抵縣殺散賊匪與柴大紀㑹兵一處則軍勢已為大振福康安一到更可併力進𠞰不難指日成功至前據福康安奏稱聞逆匪林爽文莊大田等各有形貌衣服相類者數人希圖將來乘隙潛逃等語可見賊匪自揣勢窮力蹙破滅不逺於紏衆滋擾之時預為改裝逃竄之計所謂天奪其魄即此為賊匪等成擒之兆即日大兵雲集四路攻𠞰惟在福康安督率將領帶同熟悉之人留心辨認不可令正犯首惡得以漏網方為萬全恆瑞在鹽水港駐札數旬未能前進今雖已克復鹿仔草稍為振作但前據恆瑞奏該處防守𠞰捕尚須添兵數萬而此次奏摺將沿海一帶道路打通前赴諸羅是其前後所奏已覺自相矛盾恆瑞究屬胸無定見即其所稱打通道路之語亦祗屬空言恐未能望其奮勇前進又伊此次奏摺係十月二十五日拜發彼時普吉保已帶兵前進僅離縣城五里恆瑞與普吉保一路相距不逺何以常青業經具奏而恆瑞摺內尚未提及並著福康安到彼詳查是否確實據實具奏十八日辛巳常青奏言參贊恆瑞八月間帶兵往援諸羅臣等本欲由陸路𠞰賊前往但須過溪河數道未能便捷適值風色順利是以改由海道較為迅速實無避賊情事現聞恆瑞在此數日內起兵進攻諒必早與柴大紀普吉保彼此知㑹乃臣現接普吉保禀稱連日探知大崙青埔等處屯聚賊匪該處為往諸羅要路隨親督官兵節次𠞰捕兾通道路無如烏合之衆於覆巢處所散而復聚不得不為防偹若輕移前進恐有意外疏虞不但於應援無益且更張賊勢况帶兵前來原為救援諸羅今離諸羅二十餘里斷無中途而止之理總以極力設法一有可乘之機斷不敢稍有貽悮等情臣細思柴大紀保固城池一心望援而普吉保離諸羅二十餘里則帶兵五千五百名之多似更易於𠞰通况聞恆瑞之兵已動臣又專札嚴飭飛催普吉保務須與柴大紀恆瑞同心并力不日福康安亦可到鹿仔港兵勢更為壯盛必能掃穴擒渠臣於海口各要隘分飭兵辨嚴密巡緝毋使賊匪搶占船隻以致逺揚並飭臺灣縣王露多偹札諭交熟練畨情之諸羅生員劉宗榮轉交伊弟劉光志密往大武壠內後山給四社畨通事土目收執預防賊匪竄匿現在南路東港一帶雖尚未全行收復而官兵駐札港口商販米糧賊匪不能攔阻多有裝載船隻來郡糶賣者臣惟有酌量兵力並招徠義民足敷進𠞰即起兵肅清南路同日李侍堯徐嗣曽同奏言有船户金錦逺自鹿仔港回至蚶江據稱該船於十一月初一日在鹿仔港出口見有兵船百餘號已收到港口并遇將軍坐船之船户告稱所有兵船俱於前月二十九日齊到等語查福康安於前月二十八日申刻放洋臣等日夕占候夲月初一日又轉東風惟恐船尚未到正深懸慮今據該船户所稱則福康安等已於二十九日全到以數百里之洋面一晝夜間安穩飛渡實為用兵以來所未有現在恆瑞兵已抵鹿仔草普吉保進兵離諸羅不過數里福康安等帶領新兵乘鋭殺入定當三路㑹合迅即移攻賊巢目下貴州總兵許世亨已帶頭二起兵一千名於初三四等日抵蚶江俱即配渡其三四起兵亦不日可到接續前往兵力既厚軍聲益振搗穴擒渠可計日以待同日李永祺奏言臺灣辦理軍務一切情形有迥不相同之處如內地解運糧餉軍火大炮等項船至鹿耳門內有海灘三十里重載不能前進必須另雇小船乘潮發運然後登岸是大船之外又用小船從前歷次調援諸羅官兵皆由鹽水港一路進發該處地方僻小無夫可雇一切軍裝器械係由府城雇偹長夫前往抬運因臺地夫役夲少且逺歷長途較之內地夫價亦昂又數月以來凡有限行北路各軍營往來公文因旱路不通均雇覔快船遞送如此之類不一而足皆係例所不載因地趕辦者臣已逐一詳明督撫二臣俟批到造冊咨部事竣之日核實報銷再臺灣四面環海一交秋令以後風力甚徑早晚更覺寒冷督臣李侍堯孫士毅并浙江撫臣琅玕各在內地預辦征兵衣履運送給散祗因海洋風信靡常至十月衣船未到各兵被體止單夾之衣臣目睹情形不敢拘泥與臺灣道臣永福彼此酌量禀明將軍常青凡閩浙粵省征兵每名各借給銀三兩分交領兵將官趕造衣褲等物現已按名給領以禦風寒俟各省衣履運到仍令散給俾得益資溫暖所借銀數彚造清冊詳送督臣李侍堯查核分咨浙粵在於各兵月餉內勻扣解閩歸欵均奏入上命軍機大臣傳諭福康安常青柴大紀李侍堯曰據常青所奏情形是常青之意亦以普吉保不急往救援嘉義為非普吉保由鹿仔港親帶官兵打仗殺賊收復笨港固屬有功而自駐元長莊後距縣城不逺且據柴大紀咨㑹望援甚切乃並不奮勇直前迅速進𠞰其咎亦無可辭是普吉保功過各不相掩昨據常青奏十月二十五日普吉保已攻開月眉莊等處在彼駐札離縣城不過五里此摺係二十八日所發在夲日奏摺以前或普吉保接常青札飭之信已帶兵前抵縣城與柴大紀㑹合亦未可定若果能如此則柴大紀此時早與彼㑹合一處而普吉保之咎尚可從輕至南路賊匪已經撤動勢漸渙散而府城兵力已經李侍堯續行派往此時福康安又無須常青協𠞰常青惟當專力南路至常青於海口各要隘分飭辨兵巡緝並多偹札諭令熟識畨情之生員等密往大武隴後山發給畨社通事土目預防賊匪竄匿所辦均屬妥協該處賊匪見官兵聲勢日盛賊黨漸次窮蹙自必思乘間由海道潛逃常青將海口各要隘預為防守不使賊人搶占船隻並札諭畨社等在大武隴一帶協力擒拿賊匪絶其逃竄內山之路於𠞰捕機宜似更得力福康安於二十八日在崇武澚放洋今於二十九日即抵鹿仔港以數百里洋面一晝夜間揚帆穩渡所帶兵船百餘號同時到港實仰荷天神默佑為成功佳兆福康安統領如許徑將强兵四路㑹合聲威百倍自當乘鋭深入惟日夕盻望捷音更為殷切臣等謹按崇武澳距鹿仔港蓋數百里而遙雖海道不可以里計而明史稱舟人以更計程每行一晝夜謂之十更今大兵乘風揚帆不過十更耳而艨艟百餘同時抵港一若祥颷有待必遲之十月之杪而始發者正俟徵師之集俾得崇朝穩渡共慶安瀾而遲之不啻其速之也乃知天神默佑早兆成功皆我皇上之欽承時若有以仰協天心也猗歟休哉上又命軍機大臣傳諭李永祺曰李永祺前在金川軍營曽經辦理糧餉是以專派該司前赴臺灣經管軍需各事宜且係皋司大員非府縣可比遇有運送軍裝器械火藥等項自應隨時妥速給價擔當趕運又官兵酌借銀兩趕製衣褲俱係該司分內應辦之事何必錙銖較量為報銷時預留站腳地步朕於行軍要務從不靳惜費用將來大功告竣軍需報銷時設有實在當用而格於成例不准開銷之項經部核駁時朕自當酌量寬免即如從前平定兩金川所用軍需內由部核駁刪减各欵經朕加恩寬免者至數十百萬之多李永祺豈未知之為此煩瑣之奏耶著傳㫖申飭二十二日乙酉福康安奏言二十八日風色漸轉即於申時與海蘭察同舟放洋二十九日申刻已至鹿仔港因潮退不能進口夲月初一日清晨即行登岸舒亮普吉保等及巴圖魯侍衛章京船隻帶領廣西兵丁皆已隨至又鄂輝穆克登阿所帶屯練兵丁由蚶江配渡者亦於是日陸續來到船戶人等皆稱向來海船開駕行走參差總不能同時入港此次風順波恬揚帆齊至實為渡洋罕有之事鹿仔港居民遙見連檣並進聲勢壯盛互相傳說船隻約有一千餘號官兵當不下十萬有餘夾道擁觀無不同聲歡慶竊思臣等從前守風稽遲久未開行及廣西屯練兵丁到後風色轉順千里洋面一帆即逹如此事機凑合皆仰賴聖主洪福天神默佑海若著靈滅賊先機於此可卜臣到鹿仔港後查詢存營兵數據李化龍禀稱各營官兵除患病外實有四千餘名分札鹿仔港畨仔溝大崙二林埔心等五處隨查閲鹿仔港所駐各兵尚屬可用而將辨等非諳習軍旅之人不能悉心教練兵氣遂形餒怯即如鹿仔港營盤近在村莊東首相度形勢實係不應札營之地而營外刨挖溝濠前據地方官禀報深至二丈寬至一丈有餘營壘極為堅固臣猶以鹿仔港並無賊至何必如此寬深及親至該處看視溝壕不過數尺圍墻亦不甚堅實與所報情形迥異即此細事可見緑營捏飾惡習及地方官禀報虗詞全不足信詢之該鎮將等皆稱營盤地面係從前官兵舊駐之地未經移改臣以事屬既往姑免深求將鎮將等嚴加飭諭另行擇地移營嗣後如不痛改積習即行據實參處其畨仔溝等處營盤相距數里至二三十里不等是否係衝途要隘應行設營防守之處尚須逐加查看再行酌定至義民一項舊存一萬餘名及臣差楊振文等招集者五千餘名臣於查閲各營後傳集義民頭目面加曉諭並將出力者慰諭賞賚將新舊義民揀選壯者五千餘名以偹隨營征𠞰之用其餘仍分派要路各村守卡禦賊以省兵力至查詢賊匪情形賊目分據各莊互相響應聞臣等統領大兵前來彰化以西一帶近日未敢焚掠而强悍者多集諸羅以該縣勢在孤危攻圍更急恆瑞普吉保兩路經臣屢次嚴催打仗殺賊較前稍屬奮勉無如道路阻隔不能㑹合一處尚未直抵諸羅頃接柴大紀咨稱諸羅斷糧已久惟以油籸㫪末掘挖蕉根充食賊匪四面圍困不時攻擊請速派徑兵救援等語臣與海蘭察鄂輝悉心商酌諸羅久被重圍饋運不到且地在臺灣適中之處控扼南北要路倘有疏失關係非輕昨奉諭㫖指示令臣等以先救諸羅為要就現在情形而論自應如此辦理惟鹿仔港距大理杙較近賊人家口盡在巢中亦須酌派官兵乘虛進搗與淡水官兵前後夾攻使其首尾不得相顧若能覆其巢穴固屬甚善即或不能一舉集事亦可牽綴賊勢將來諸羅圍解後賊人紛紛竄回全藉此路官兵杜其逃逸之路臣等擬派舒亮帶領官兵義民往大里杙進發賊匪見大兵齊集鹿仔港必知為直搗賊巢之計今以偏師前進聲言大軍繼至而實則援救諸羅出其不意使賊匪不知我兵虗實處處防偹進𠞰更易得手若能連得數次勝仗將其精鋭盡殱自成瓦解之勢總之賊匪夲屬無能惟恃其黨羽衆多將衝途僻徑處處占據四路抄截現在進𠞰官兵既不便零星派撥分路進攻以致兵分力薄若再添調官兵又屬緩不濟急惟有隨時隨地將賊匪屯聚之地設法截斷即以賊之巧計攻賊之人雖詭譎多端亦無所施其伎倆矣臣於夲日甫抵鹿仔港於鹿仔港五里外爽塏之地安營謹將酌籌進兵詢問賊匪大概情形先行馳奏日內即整頓兵力迅往諸羅其貴州官兵不過數日即至亦可令其續行前進所有進兵前往諸羅道路應否由元長莊一路抑由斗六門進攻之處容臣臨時酌量地勢情形再行定議再臣在崇武澳守風時江西解送火藥之吉安營參將張兆熊禀請隨往軍營效用情詞懇切尚屬奮勉業已帶至軍營聽侯調遣同日普吉保奏言夲月二十一日賊匪分路擁衆四出經臣親帶官兵鄉勇奮力趕殺鎗炮併施打死賊匪數十人自辰至申賊衆敗退割獲首級耳記髮辮并打死騎馬賊目一人官兵鄉勇社畨有受傷者當與出力兵丁分别賞恤正在設法前進適柴大紀訂期二十六日臣帶兵至牛稠溪伊當接應隨即咨覆勉圖前進又准參贊將軍臣恆瑞咨以現在恢復鹿仔港飭令臣帶領官兵前至新埤地方㑹合應援諸羅查元長至新埤必由大崙大容莊經過緣彼處均係賊巢必須焚𠞰净盡方可前進且業與柴大紀訂期㑹攻併探知賊匪仍復屯集崙仔尾一帶即於二十六日黎明親帶官兵分作三路進攻臣帶領逰擊海亮徑由中路參將張朝龍守偹王德竣由西勢潭一路護副將琢靈阿逰擊葉有光都司馬元勳由柴苓腳一路行至崙仔尾賊衆蔓延田野前來抗拒鎗炮橫施自卯至申經官兵鄉勇鎗炮打死賊匪甚多割獲首級三顆耳記髮辮五件賊衆雖則敗退然猶散而復集潛伏於竹圍蔗林內我兵實有難以輕進之勢除將受傷出力之兵丁鄉勇分别奬賞鼓勵外伏思元長離諸羅僅二十餘里乃一月有餘叠經焚𠞰尚未能長驅直入實深愧忿崙尾大崙俱係往諸羅要路而從大崙亦即可抵新埤大崙之賊黨𠞰除則諸羅新埤均可直逹現在差探設法奮力圖進務期將大崙道路廓清或由新埤前進與恆瑞㑹合併力夾攻更覺有益均奏入上命軍機大臣傳諭福康安常青海蘭察鄂輝柴大紀蔡攀龍李侍堯普吉保曰賊匪因嘉義縣城勢在孤危百計攻擾普吉保駐兵元長莊為日已久柴大紀被圍數月兼乏糧食兵丁饑餒自然不能出城接應伊亦並未前進實係無能其摺內所稱殺賊情形不過割獲首級三顆耳記等五件焉得謂多不過應差打仗敷衍塞責徒知愧忿亦屬無益且普吉保在元長庒距縣城不逺正應奮力前進𠞰殺賊匪乃轉欲由新埤㑹合恆瑞豈非繞逺待人而於柴大紀急望救援竟存膜視耶看來普吉保恆瑞雖現在帶兵赴援俱難望其奮勇得力此時福康安已統領大兵由鹿仔港進發自應速赴縣城援應不可再緩大里杙係賊匪巢穴福康安派令舒亮帶兵前往與淡水官兵前後夾攻使賊人首尾不能相顧為牽綴賊勢之計與朕前㫖吻合並擬將賊匪屯聚之地設法截斷即以賊之計攻賊使賊人無所施其狡詐伎倆所辦深合機要至該處帶兵將辨不能悉心教練以致兵氣餒怯為賊匪所輕而所禀報情形多不確實尤為緑營惡習今福康安到彼面加訓飭實力整頓并於鹿仔港另行擇地移營設法防守揀選精壯義民隨營𠞰賊一切籌辦均屬妥協自當壁壘一新士氣百倍想大兵所到賊匪望風膽落指日成擒尅期集事再前經降㫖以臺灣辦理一切善後事宜最為緊要諭令福康安於𠞰捕事竣後不必急於來京瞻覲俟善後諸務辦理完竣再行回京並以柴大紀在臺灣日久熟悉該處情形欲令伊以水師提督兼理臺灣總兵事務留於該處整飭彈壓俟一二年後再行更換但念福康安等逺涉重洋偹歷風濤之險現在統兵進𠞰懋著勤勞而柴大紀固守縣城不辭勞瘁此時大兵雲集㑹合進𠞰逆匪自可指日蕩平計至明嵗二月中旬朕巡幸天津時福康安等應行籌辦事務自己漸次料理應將大端面交常青接辦常青經事較久於善後諸務自所優為柴大紀亦可將該處情形告之蔡攀龍令其在彼照料彈壓與福康安一同起程約計朕駐蹕天津時前來瞻覲雖此次𠞰捕內地逆匪與平定回部金川不同可無須舉行郊勞典禮但伊等蕆功奏績逺涉宣勤亦應加以宴賚用示奬眷至臺灣地方屢有械閗滋事之案如從前辦理黃教後上年又有楊光勳楊媽世等紏約黨夥倡立㑹名之事皆由該地方文武等於查辦時並不實力嚴拿痛加懲創祗不過拿獲數人希圖化大為小將就完案以致奸徒無所警畏且見地方武偹廢弛心存玩視逆首林爽文等遂敢紏衆倡亂乘間竊發戕官劫縣釀成巨案經此畨官兵大辦之後所有此事起釁根由及助惡夥匪著福康安等於𠞰捕事竣時務須嚴切跟䆒從重懲治勿令稍留餘孽故智復萌庶人知畏法革面洗心該處民刁吏黷積習蒸然一變而於地方營伍尤須實力整飭俾紀律嚴明有偹無患以期一勞永逸綏靖海疆方為妥善欽定平定臺灣紀略卷四十五
