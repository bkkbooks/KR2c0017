  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_008-1a, image: WYG0363/WYG0363-0089a.png}
body:
  text: 二月二十一日己未黄仕簡奏言逆首林爽文住居彰屬大里杙地方其紏匪不法多係烏合之衆但此等海外跳梁必足兵力長驅迅掃乃可以破賊膽而壮軍威若輕兵躁進不特未合機宜而小醜且轉滋抗拒臣初到臺郡因内地官兵尚未到齊隨將現到兵丁派撥四郊要路添防加𦂳堵截保固府城晝夜嚴督擒捕賊匪嗣官兵續到隨同日分遣前赴南北二路并力進𠞰二十四日據赴北路總兵柴大紀報到克復諸羅縣城池臣業經恭報在案現在惟有相機調度務期速殱醜類并嚴擒首逆各要犯解究重治以靖海疆同日任承恩奏言林爽文本係彰屬窩匪肆行不法現在回踞大里杙一帶窠巢暗通虎仔坑賊目陳泮吴領等時出滋擾焚掠泉粤村庄臣連日分派官兵督同鄉勇四路巡防截殺一面謹守内地各海口密諭畨社總通事潘明聴等通知内山生畨頭目懸立重賞令其一體截拿預防遁匿兹聞水師提臣黄仕簡督令臺灣鎮臣柴大紀克復諸羅縣城惟斗六門一帶尚為賊踞俟道路通逹南北官兵會合臣協力進攻無難撲滅至臣至愚極昧㒺識事體輕重惟有恪遵聖訓鎮定持重斷不敢稍涉張皇再本月二十七日接據都司馬元勲禀報帶領官兵七百名率同鄉勇前駐埔心庄堵禦賊匪二十六日辰刻賊衆千餘人由三路下山滋擾都司隨督同官兵分路迎敵鎗跑并施打倒執旗賊目傷斃賊黨甚多餘賊逃散等情臣當委親隨妥弁前往確查屬實均奏入上命軍機大臣傳諭黄仕簡任承恩曰前因黄仕簡任承恩奏報各摺僅派委將弁等零星打仗並未親臨行陣業屢經䧏㫖嚴行申飭然尚以黄仕簡或因年老多病猶存憐憫之念今據伊所奏摺内於現在軍務情形置若㒺聞是黄仕簡竟與任承恩互相觀望遷延時日黄仕簡不宜如此朕亦不能因其老病曲為憐宥矣至任承恩摺内有鎮定持重之語伊現在如此退縮不前竟屬怯懦無能豈可藉詞持重乎伊二人於𠞰捕賊匪種種遲延難辭貽悮之咎又任承恩知斗六門一帶有賊踞守即應督同將弁等親往追捕將賊衆痛加殱戮俾與黄仕簡一路聲息相通庶賊人聞風落胆首犯得以尅日就擒今伊等如此遷延觀望幸賊人亦如伊等畏葸無能不致更肆鴟張倘賊衆偵知官兵鬆懈復轉相紏聚逞其狡猾致大軍稍失威重尚復成何事體耶又任承恩奏稱接據都司馬元勲稟報埔心庄打仗殺斃賊目餘黨逃散當委親隨妥弁前往確查之處尤屬不成事體任承恩如果親往該處督𠞰於該都司禀報虗實何用更委員弁前往確查豈任承恩竟思安坐彰化觀望不前乎黄仕簡任承恩著再傳㫖嚴行申飭并著該提督等親帶弁兵㑹同𠞰捕勿再仍前延緩致千重戾上又命軍機大臣傳諭常青李侍堯曰本日黄仕簡任承恩六百里報到竟係覆奏諭㫖並未帶兵進𠞰且摺内有鎮重持定之語已䧏㫖將伊二人嚴行申飭矣黄仕簡之摺係正月二十七日拜發距伊二十四日拜發之摺又有三日此三日應與賊打仗何摺内竟無一字提及若云府城𦂳要從前柴大紀與永福二人尚能保䕶無虞豈此時須添黄仕簡在彼防守之理前因黄仕簡年老患病朕尚為之原諒今玩悮至此不惟不覺可原轉覺可惡矣至斗六門為南北咽喉之地任承恩即應帶兵前往奮勇𠞰殺以通要道乃任承恩尚駐劄彰化而黄仕簡又駐劄郡城一南一北互相觀望以致道路不通此明係彼此退縮畏怯安得藉詞持重乎從来用兵之道貴乎神速官兵一到即訂期夾攻使賊無暇扺拒渠魁既得其黨夥自易殱擒幸而賊匪不過么䯢草㓂亦如黄仕簡等之怯懦無能若使稍知謀畧乗隙䲭張一路之兵稍有失利其餘兵弁雖多自必因而氣餒撲滅為難尚復成何事體看來此事斷非黄仕簡任承恩二人所能辦理常青務即速赴臺灣遵照節次諭㫖相機妥辦必須堅持定見親督官兵調度指揮務使壁壘一新以期一舉集事至黄仕簡任承恩彼此推諉一味因循其貽悮之咎已無可辭豈可復行寛貸常青於抵臺灣後嚴切查明如該提督實有逗遛觀望情事即一靣據實嚴㕘一靣傳㫖將伊二人解任令回内地交李侍堯請㫖辦理所有水師提督印務交與柴大紀暫署陸路提督印務交與郝牡猷暫署候朕另䧏諭㫖朕於軍務紀律嚴明信賞必罰其有能著績成功者必格外加恩如阿桂在金川奏凱賞給寳石帽頂四團龍補服以昭寵異其老師糜餉臨陣失機者亦無不寘之重典厯厯可數豈黄仕簡任承恩尚未之知即常青雖擢用總督辦事未久然厯任中外多年自當知朕用人之道既經朕特交查辦亦不能為之瞻徇也同日孫士毅奏言閩省拏獲臺匪楊咏等供出天地會根源起於廣東和尚洪二房及朱姓人前經閩浙總督臣常青咨會臣即一靣飭拏一靣行調臬司姚棻督緝查辦在案嗣將許阿協等四犯訊供上年七月十月内有漳州人賴阿恩梁阿步勾引入會且據供歌訣内有木立斗世字様匪會係起於乾隆三十二年及詢以洪朱二犯不能據實指出臣現查後溪地名粤東饒平潮陽揭陽等處皆有凡屬後溪地方臣已密飭各該州縣並選派得力員弁逐處跟查洪朱二犯下落均稱洪姓土著之人粤東亦到處皆有而身為和尚及稱為洪二房者各處後溪地方並無其人臣以閩省来咨後溪之名雖係籠統而鳯花亭三字自屬確鑿現復嚴飭各屬將鳯花亭住址密速跴訪期於必得以便徹底究辦再許阿協賴阿恩林阿俊凃阿畨四犯節次訊供凃阿畨一犯堅供並未入㑹尚須詳加研鞫此外許阿協等三犯俱係供認入㑹並能口誦歌詞毫無疑義本應即日委員解京歸案審辦現因嚴查天地㑹夥犯恐該犯等黨羽尚多所供不實不盡且現在惠来海口又盤獲閩省漳州人陳孟琴等七名或與該犯等同屬一氣將来尚有應行質對之處是以暫緩解京奏入報聞二十二日庚申上命軍機大臣傳諭常青曰總兵柴大紀督率官兵義勇保䕶郡城最為出力可嘉郝壮猷在南路一帶督兵攻剿殺賊多人亦屬認真奮勉自應酌量加恩以示奬勵著常青查明該鎮等如未經賞過花翎即傳㫖加恩賞戴令其益加奮勵各帶官兵分投剿捕以期迅速蕆事至黄仕簡任承恩並不親臨行陣貽悮事機已䧏㫖令常青查明即行叅奏解任將水師陸路提督印務交與柴大紀郝壮猷暫署常青務須飛渡臺灣遵照節次所䧏諭㫖督率柴大紀等分帶官兵相機妥辦黄仕簡任承恩並著先即摘去花翎二十五日癸亥黄仕簡奏言節次所奉上諭又奉到恩賞隨即叩頭祇受臣自病後風症時愈時發現雖心神不足氣力不能如常惟當勉竭駑駘督率官兵奮勇剿滅賊匪以期尅日綏靖海疆奏入上命軍機大臣傳諭常青李侍堯曰連日盻望臺灣捷報甚為懸切本日黄仕簡有六百里報到朕以為必係奏報剿賊情形及加披閲係接到恩賞及覆奏諭㫖於剿捕賊匪之處竟無一字提及而任承恩連日亦無奏報是黄仕簡任承恩互相觀望皆屬一籌莫展朕前因黄仕簡年老患病一聞賊匪滋事即帶兵親赴臺灣屢䧏温㫖奬諭並令加意調挕勿過勞􅀈並賞給荷包等物以朕高年如此體恤周至黄仕簡宜何如感激圖報以慰朕懸切亦應將受恩深重雖年老病後仍當身先士卒剿滅賊匪以圖報効之處懇切聲叙即非出於中誠亦當敷衍謝恩乃竟於此等處所全無一言叙及豈朕眷念老臣而黄仕簡竟不知仰體高年之主宵盰焦勞之意乎著常青到彼即將此㫖詰問黄仕簡嚴行申飭况總兵普吉保一到臺灣即率領弁兵親往諸羅一帶㑹同柴大紀相機進剿普吉保身係滿洲遇事頗能奮勉黄仕簡在御前行走非外省提督不曉事者可比乃安然坐視並普吉保之不若乎且臺灣原設兵丁不為不多乃黄仕簡等屢次派兵進剿止令郝壮猷徐鼎士等帶往之兵分投剿捕而於臺灣本地官兵並未將作何派撥之處奏及現在普吉保已帶延建及水師兵一千六百名前赴諸羅黄仕簡即應督同親往何以僅委之該鎮黄仕簡竟若置身事外者豈竟因病氣餒觀望不前乎至任承恩年富力强尤非黄仕簡尚可以老病藉口乃駐劄彰化並不帶兵親往賊巢奮勇剿賊竟如温福在木果木將弁兵各處分散以致賊衆乗間窃發遂至僨事光景此事初起時朕尚不甚介意以為么䯢竊發黄仕簡一到即可捕滅無餘乃不意伊二人竟敢如此遷延觀望殊出意料之外現據黄仕簡奏到拏獲賊匪蔡紹等訊據供稱賊首林爽文等團聚斗六門勢尚猖獗猶思復攻諸羅而任承恩柴大紀俱有官兵單薄需撥兵接應之語雖業經普吉保率領原帶兵一千六百前往協剿但恐賊夥為數較多黄仕簡任承恩屢派弁兵分投堵禦零星打仗或一路之兵稍有失利其餘兵弁雖多自必因而氣餒倘賊匪見黄仕簡等漫無籌畫乗隙䲭張或有挫失更為可慮常青到臺灣後務須察看情形如果必須増添兵力即一靣具奏一靣咨照李侍堯於附近各營再撥二三千名速渡臺灣俾資策應李侍堯接准来咨即行飛調配渡無致遲悮至常青經朕特派前往臺灣督辦剿捕諸務固應親督官兵調渡指揮但伊係總督大臣理宜持重於臨陣打仗時亦應相度事機籌酌輕重此事已専委常青一人辦理當堅持定見勇往前進酌量事宜運籌制勝臣等謹按賊匪林爽文等團聚斗六門阻絶南北道路黄仕簡任承恩果能㑹齊官兵併力夾攻痛加剿洗烏合之衆自不難尅日殱除乃彼此遷延觀望以致賊匪全無忌憚愈肆䲭張我皇上既屢加申飭明正其罪復飭令添撥弁兵渡臺榮應數千里外之情形燎如指掌斷自宸衷預為籌􅊀故能迅奏膚功也二十七日乙丑孫士毅奏言接奉諭㫖將􅊀調兵丁撤回歸伍所有業已赴閩之水師兵一千名因准閩省来札内有交界處所官兵應暫留駐之語是以仍令暫駐黄岡及樟林兩處俟有剿除逆犯的信即行撤回奏入上命軍機大臣傳諭常青孫士毅曰前因林爽文等不過烏合匪犯聚衆滋事各省遽紛紛徵調辦理過涉張皇恐内地人民聞而生駭是以諭令停止令黄仕簡任承恩二人自到臺灣後並不親帶兵弁迅速追捕一味因循恇怯互相觀望以致賊匪尚未撲滅業令常青速往臺灣實力督率㑹剿自無難一鼓殱擒但恐賊人自知罪在不赦負嵎抗守或又有須添兵力之處是前此粤省已經派調之官兵現今自未便全令撤囬歸伍仍應於交界處所酌量暫為留駐如常青到臺灣後察看賊匪情形尚須兵力接濟即一面據實具奏一面知照孫士毅調取應用更為便速此時圖薩布諒已回任孫士毅正當在潮州一帯徃來稽察使臺灣匪犯知有總督在彼督拿不敢潜行竄入且潮州距閩較近該督親督弁兵就近駐劄更足以壯聲援而資策應即於捜捕餘匪亦為有益同日柴大紀奏言正月初四日水師提臣黄仕簡派調臣統領本標兵丁四百名城守營守􅊀邱能成兵丁一百三十名臺灣逰撃楊起麟林光玉等兵丁九百名南澳逰撃李隆兵丁三百名叅將潘韜兵丁三百名又彰化敗回兵丁二百名共二千二百三十名前往北剿正在起程之間提臣黄仕簡飭臣於十六日赴大穆䧏八甲等處與郝壮猷會捕賊匪留叅將潘韜併兵丁三百名守郡城臣統領官兵一千九百三十名於十七日前往北剿至灣裡溪拏獲賊夥黄余等三名押解提臣黄仕簡審辦二十一日至外三部竹地方賊匪數千蜂擁而至臣督率官兵齊放鎗砲武舉陳宗器諸羅縣知縣陳良翼笨港縣丞徐英各帶義民助戰鎗砲打死賊匪甚多生擒偽䕶駕大將軍廖東一名紅馬一匹賊徒陳模黄啟等二十一名二十二日抵田洋賊匪總聚於此約有萬餘人冒死相拒臣督率官兵極力攻剿自午至酉鎗砲打死賊匪無數殺死者亦多生擒賊匪林老并畨婦留娘等共八十二名拏獲偽軍師侯辰一名騾馬三匹奪回砲十一門鳥鎗三桿火藥一石鉛子一桶旂刀等械甚多餘匪四散逃走守􅊀邱能成將城門攻開我兵即時追趕入城賊匪由北門而逸飭將城内賊匪迅速捜拏派撥官兵謹守四門惟安平中營把總郭拔萃兵丁林勇言陣亡臣跟丁林道鄉被傷餘俱無損隨飭楊起麟等往查各文武衙署軍裝庫局俱被殘毀倉庫搶刼一空各官印信尚無下落臣親往街市安民仍舊開店貿易百姓莫不歡欣鼔舞但擾亂之後亟宜安撫已飛移臺灣道永福速即委員暫署知縣佐雜等缺以資經理查附近各庄尚有餘孽俟捜捕净盡即統兵前往彰屬巢洗大里杙等處賊巢奏入上命軍機大臣傳諭常青曰本日柴大紀克復諸羅縣城一摺尚係黄仕簡前日奏報情形所奏已遲至臺灣本設有重兵黄仕簡現帶有本標兵丁未經親臨行陣復將剿賊之叅將潘韜兵丁三百名留駐郡城祗圖自為䕶衛不意黄仕簡恇怯無能竟至於此現在常青自已前抵臺灣著將柴大紀摺發交常青閲看並諭令常青到彼嚴查黄仕簡所帶本標官兵及臺灣原有官兵現作何用因何復將叅將潘韜兵丁三百名留守郡城之處一併查明據實叅奏並將何日已抵臺灣作何籌辦剿捕情形迅速具奏同日郝壯猷奏言准水師提臣黄仕簡移撥各營兵丁二千餘名前赴南路進剿一路捜捕十九日過大湖一帶地方東南有賊匪數千人前来禦敵臣督率將􅊀弁兵施放鎗砲自巳至申打死賊匪三百餘人官兵奮勇追趕生擒賊夥二十五人訊明正法時已黄昏就地劄營夜間賊匪復来撲營被官兵施放鎗砲打死百餘人賊夥退遁隨即發兵捜捕併差探賊匪現窩聚新園庄地方二十三日派令各營將􅊀帶領弁兵義民三路夾攻鎗砲打死賊匪三百餘人奪獲鎗砲器械賊匪逃散隨將賊窠草藔數百間盡行燒燬仍收回大湖營盤二十四日午刻聞東南有砲聲賊匪猝至隨即派撥官兵殺賊施放鎗砲打死賊匪數十人生擒一名訊明正法臣連日發兵在各庄捜捕二十九日賊人分路前来攻營當即分兵對敵鎗砲齊發賊即敗走官兵追趕殺賊匪數十人奪獲砲位刀鎗等械二月初二日賊匪復紏集數千人大砲六七位從東北東南正南三處来攻營盤臣分遣官兵對敵自夘至午施放大砲連環鎗打死賊匪二百餘人賊始稍退生擒一人訊明正法未刻復来撲營隨放鎗砲趕殺直至戌刻方遁連日打仗我兵被賊鎗砲受傷亦有十餘人現在賊匪尚屬猖獗查南路一帶庄社俱有賊匪倚山傍海聚散靡定臣急欲前進因連日對敵俟剿洗净盡星即前赴鳯山恢復城池奏入上命軍機大臣傳諭常青曰臺灣不過海外一隅其户口不及内地之繁庻林爽文等倉猝起事該處民人必不肯盡被脅從且節據該提鎮等奏各路攻剿賊匪俱有義民鄉勇帮同出力是百姓中被賊脅誘入夥者究屬無多乃該提鎮節次奏報摺内動稱賊匪萬餘及數千不等若如所云豈非臺灣之人全係賊黨而毎次打仗又動殺賊數百或稱殺賊無算如果屬實賊匪己㡬於殱戮靡遺何以尚稱其勢猖獗看来皆由緑營將弁飾詞謊報既可掩其恇怯又可藉以冒功前己有㫖令常青秉公嚴查該督到臺灣後務遵前㫖確實查明勿任朦混至此事總由黄仕簡任承恩因循畏葸以致遷延時日賊人因得乗隙復相紏結蟻聚成羣未得速就撲滅常青到臺灣後務宜悉心調度加之鼓舞若能就現有官兵一鼓殱滅賊衆固屬甚善倘必須添兵接濟即遵昨䧏諭㫖一靣具奏一靣飛調内地暨粤省附近兵丁應用以期妥速蕆事若賊匪本不甚多竟係綠營官弁増數謊報必當據實嚴叅示儆勿稍迴䕶欽定平定臺灣紀畧卷八
