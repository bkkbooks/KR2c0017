  text: 欽定四庫全書欽定平定臺灣紀略卷六十四
  hash: sha256:7c5e1f531091bf713df30c04f7696f1cefb32c33498eaa85b1912bd7b9ec2bac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_064-1a, image: WYG0363/WYG0363-0788a.png}
body:
  text: 六月初八日己亥上諭內閣曰知府楊廷理總兵丁朝雄俱得受海口出入船户陋規銀兩經軍機大臣等議覆發往新疆及軍臺效力固屬罪所應得苐念楊廷理所得陋規係同知任內之事為數無多且逆匪滋事之初首先招集義民守城打仗保護無虞大兵進剿時復帶領義民至軍營隨同打仗始終出力丁朝雄在省聞逆匪滋事即趕回臺灣督兵剿捕復進攻南路收復東港以通運米來郡之路節次打仗禦賊甚為勇往出力楊廷理丁朝雄俱著加恩改為革職從寬留任八年無過方准開復其所得陋規仍著楊廷理照數二十倍罰出丁朝雄照數十倍罰出以示懲警至擬發新疆之逰擊李隆守偹曾紹龍把總吳亮擬發軍臺之守偹王天植或得受海口船户陋規或得受兵丁包差開賭錢文或餽送柴大紀夫價及生日節禮俱有應得之罪但李隆曾紹龍吳亮守禦府城外營盤復往南路追剿賊匪均屬奮勉王天植於逆匪攻擾府城時悉力堵禦並令伊子王陽春招集義民剿捕遇賊陳亡情尤可憫李隆曾紹龍吳亮王天植亦俱著加恩改為革職從寬留任十年無過方准開復李隆曾紹龍所得陋規銀兩仍著查明按數追賠至總兵陸廷柱恭將宋鼎俱屬大員陸廷柱雖在任未久南澳又相距不逺而於柴大紀種種劣蹟並不據實揭參宋鼎於所屬千把總得受兵丁包差開賭錢文毫無覺察罪有應得且未據福康安聲明奏請可見該二員在軍營不過隨衆同行並無奮勉出力之處陸廷柱宋鼎俱著降級調用朕於諸臣功罪辦理務酌其平固不能因其功而宥其罪亦不忍因其罪而沒其功總期斟酌歸於至當從無畸輕畸重之見也十三日甲辰上諭內閣曰博斌等隨福康安剿捕逆匪俱能奮勇出力或於北口堵截擒殺匪衆或於南路搜拏首逆各著勞績甚屬可嘉博斌阿木勒塔哲克翁果爾海德楞泰薩克丹布塞凌額西津泰特爾敦徹俱著加恩交該部查核伊等所得功牌酌與世職又官兵直抵琅嶠時烏什哈達帶領水師兵丁順風連檣而至四靣合圍水陸並進俾莊大田得以即時擒獲亦屬勇往可嘉且前在雲南打仗時甚為奮勉烏什哈達亦著一併交部查照功牌議給世職上又命軍機大臣傳諭福康安李侍堯徐嗣曾曰前因臺灣兵丁籍𨽻漳泉者居多令於分班輪換時將漳泉兵丁分駐防守以便彼此互相紏察而他府之兵與之錯處於撫綏防範俱有禆益嗣據福康安奏已於挑補班兵時通盤布置令漳泉及他府兵丁易地駐守並妥定章程交普吉保照此密辦又據福康安等奏新添戍兵一千二百名於內地督提二標及福寧汀洲各鎮標酌量抽撥將來臺灣之兵籍𨽻漳泉者較前漸少自更易於查察但恐日久廢弛不能遵照妥辦著責成每年前往巡查之將軍督撫提督等實力稽查勿任漳泉之兵仍在原籍各村莊一帶防守聚處弊混滋事至福康安等所奏軍營餘剩鉛藥派營分貯之處所辦均為妥協即照所奏辦理其磺斤一項既查明上杭縣地方所産已敷各營軍火之用則臺灣淡水磺山自不必復行開採現經福康安等嚴行封禁但恐該處仍有私行偷採及官吏等庇縱透漏情事並責成巡查之將軍督撫等一體嚴查如有似此情弊即行參奏治罪又元克中馬騰蛟俱著准其送部引見著李侍堯即將閩省是否尚需該員等差遣之處據實具奏候朕臨期酌降諭㫖十六日丁未上命軍機大臣傳諭李世傑曰從前川省嚕匪犯經大加懲治始行安靜畏法彼時查辦􅀈嚕時並未聞該處有天地㑹名目然既有此供且指出係朱姓李姓所傳未可因年分久逺且無實在下落遂置之不問自宜一體嚴密查辦以絶根株但川省自􅀈嚕畏法後地方久經寧謐著李世傑查辦此案止宜不動聲色飭屬密加查訪如有踪跡即行嚴拿務獲究辨但不可遍貼告示及派胥役人等到處搜訪俾胥役得藉端需索良民驚擾不安以致别生事端則是欲净根株而又滋萌蘖也李世傑係曉事之人自能善體朕意嚴密留心上又命軍機大臣傳諭李侍堯孫士毅曰前據福康安拿獲嚴烟後訊據供出張姓綽號破臉狗並自粵至閩傳㑹之趙明德等一面具奏一面飛咨閩粵二省查拏嗣據李侍堯將張破臉狗拏獲供有廣東大埔縣人趙明德陳丕陳棟三人亦飛咨孫士毅嚴密查緝計此時孫士毅自早已接准福康安李侍堯咨㑹且屢經降㫖飭拏何以總未據奏及且趙明德等三犯既經張破臉狗供出年貌住址更無難按名緝捕著孫士毅即將趙明德等三犯現在曾否就獲之處迅速具奏又嚴烟傳習天地㑹據該犯供稱實得自陳彪並供陳彪四十八年尚在漳州行醫又萬和尚俗名凃喜在廣東傳教雖嚴烟堅供不知該二犯住址下落但所供必非無因自必尚在閩粵一帶藏匿並著李侍堯孫士毅再行飭屬妥密緝拏務獲奸民藉端煽惑聚衆結盟原應徹底跟究但地方各官如果平日實力查辦何至邪教蔓延外省惡習往往無事之時即因循玩誤姑息養奸及一經查究即又奉行不善輒遍貼告示多派胥役到處搜查借端滋擾臺灣賊匪甫經平定內地及鄰省一帶民情寧謐若復因查拿㑹匪或致滋擾生事更屬不成事體李侍堯孫士毅俱係曉事之人須不動聲色嚴密查拏先將首先傳㑹之人如趙明德陳丕陳棟陳彪凃喜者拿獲審明從重辦理其餘有犯必懲以期淨絶根株方為妥善斷不可過事苛求跡涉張皇令胥役藉詞擾纍别滋事端十七日戊申孫士毅奏言接李侍堯咨拏獲天地㑹內嚴烟供出之張破臉狗供有廣東人趙明德陳丕陳棟三人曾到該犯家內勸令入㑹趙明德係潮州府大埔縣人在東門外下寮鄉住年約五十餘嵗陳丕陳棟亦係大埔人俱約三四十嵗當即派員前往查拏並無下寮鄉村名亦無趙姓烟户惟保安甲有趙姓兄弟三人出外十餘年未歸名字既不相同且與破臉狗四十六八兩年仍回廣東之供亦不相合至陳丕陳棟二犯遍查通縣城鄉各處亦實無其人奏入上命軍機大臣傳諭李侍堯圖薩布曰趙明德等三犯前據張破臉狗在閩供出曾到伊家勸令入㑹俱係大埔縣人且將趙明德住址供出自係實有其人必非信口妄供者何以孫士毅派員查拏又屬毫無踪跡非張破臉狗之所供住址未確即係該地方官搜查未到所致著李侍堯即派委從前承審之員將張破臉狗小心解赴廣東現在孫士毅已另有㫖令其前赴粵西查辦安南內訌之事著即將此案交與圖薩布令其將張破臉狗詳悉跟究務將趙明德陳丕陳棟等犯實在下落究出嚴拏務獲毋致要犯得以漏網如實無該犯等下落亦即將張破臉狗從前因何供出趙明德等犯及該犯等現在何地藏匿之處詳悉訊明具奏上又命軍機大臣傳諭福康安曰前因臺灣總兵缺出一時不得其人普吉保在彼帶兵剿賊尚為奮勉是以福康安奏請就近調用當令准行今臺灣剿捕事宜雖已完竣而善後各事在在需人料理且該處當柴大紀等貪黷營私之後諸務廢弛尤資幹員整頓普吉保係白衣保之子洊擢總兵使之帶兵打仗尚能得力其於外省地方情形本未諳習恐於海疆要缺人地不甚相宜計福康安於五月二十五日由泉州起身此時諒已過浙著再行酌量如普吉保竟能勝臺灣總兵之任自無容更調若普吉保不能勝任即於此次帶兵各總兵或素所深知之總兵內擇其才具堪以勝任者酌選一員據實奏聞候朕降㫖簡調又思兖州總兵柯藩此人或可用福康安於過兖州留心看此人可用否再福建水陸兩提督員缺亦屬緊要陸路所轄多係腹裡地方梁朝桂或尚能辦理其水師員缺所轄皆係外洋地方責任尤重而現任提督蔡攀龍詢之由軍回京大臣侍衛等僉稱其人平庸福康安前亦奏其未能勝任若令其久任海疆恐有貽悮朕意陜甘二提督哈當阿蘇靈俱尚能事近來甘省地方寧謐蔡攀龍至彼尚可將就勝任並著福康安於哈當阿蘇靈二人內量其才具孰與福建水師員缺相宜者即奏聞調補或此外福康安尚有知其才具堪以調用之人亦即據實具奏候朕簡調庶於海疆重任足資整理十八日己酉上諭內閣曰臺灣甫經平定一切撫綏善後事宜正資整飭普吉保帶兵打仗雖尚為奮勉恐於海疆要缺究屬人地未宜因思奎林前在伊犁所處人犯本係有罪之人其獲咎尚非貪贓玩法難於原宥者可比且伊曾經委任久厯戎行人亦體面臺灣正當需人鎮撫整飭之際不妨棄瑕録用所有臺灣鎮總兵員缺著加恩將奎林補授並著即馳馹前往奎林當倍加感激朕恩力圖報效普吉保即著留於福建遇有相當缺出再行補授上又命軍機大臣傳諭福康安曰昨因臺灣總兵員缺緊要因思奎林人尚體面且曾任都統將軍久厯戎行威名已著臺灣民風刁悍又值柴大紀貪縱廢弛之後正藉其體面風厲方能整頓是現在簡用臺灣總兵朕思無有過於奎林者奎林係福康安之兄想福康安亦必不敢將伊保奏是以業經明降諭㫖即將奎林補放並令馳馹速赴新任福康安現已起身前來熱河復命途次遇見奎林時可將臺灣地方情形及善後各事宜詳細向奎林告知令其到彼實力妥辦至水師提督員缺仍著福康安于哈當阿蘇靈及素所稔知之提督內酌量一員奏請對調再據德成奏梁朝桂才具亦屬中平打仗懦怯其於閩省提督能否勝任應否亦需簡調何人之處並著福康安一併據實覆奏二十日辛亥永慶奏言派往臺灣協剿之杭州乍浦駐防滿兵回至福建地方內有瑚圖靈阿等五名欲雇轎乘坐恐中途擡夫脫逃不能行走遂私自坐船至青龍灘地方遭風打壞船隻淹斃人口奏入上諭內閣曰滿漢兵丁遇有征調剿捕之事于車輛可通處所尚可准其更替合坐以省足力若遇山路﨑嶇車輛不能前進祗應將軍裝行李一切雇人擡送本人即當步行正可藉此習勞其或一水之便船隻可通亦必須所調之兵普律下船方可准其乘坐若中途私約數人各自下船已屬非是何得復思雇轎乘坐如兵丁可以乘轎坐兜則所調之兵一千即須預備擡夫二千名况駐防兵丁出征向俱帶有跟役設跟役等亦用轎兜所需擡夫又當再加一倍且滿兵既可用轎兜則緑營及屯練各兵又安能禁其不一體乘用兵貴習勞以不能登涉之兵尚望其衝險長驅破賊有是理乎此次臺灣剿捕賊匪檄調各省之兵不下五萬豈不竟需雇夫十萬以為應付過兵之用有是理手從前西北兩路以及大小金川用兵時從未聞有此事此必該省地方官違例應付以為將來開銷地步亦未必如數預備不過以備有轎夫一項事後即可借此多為冒銷之計耳永慶交部嚴加議處並著李侍堯琅玕即將該兵丁等過境時作何應付及因何備有兵丁等乘坐之轎是否地方官藉端開銷之處查明據實具奏至內地用兵口糧鹽菜以及運送糧餉火藥等項業定有軍需則例而兵丁等沿途行走於水陸地方如何給與舟車及舟車不通之處除兵丁本身令其行走外其擡運軍裝行李等項每兵幾名准給人夫幾名未經列入此次閩省違例應付未必不因例無明文遂思從中浮冒現在大功雖已告蕆但兵可百年不用不可一日無備著户兵二部即詳悉妥議具奏添入行兵事例二十一日壬子上命軍機大臣傳諭李侍堯曰昨據德成奏閩省械鬬之風尤熾雖內地到處皆有不特臺灣為然而械鬭之案往往紏集匪衆先議出抵償之人許於事後代為養贍家口並設牌供獻以致貧民貪利雖死不顧而奸徒恃有人代抵遂赴各村莊肆凶攢毆傷斃多命甚至放大搶劫無所不為及經到官即有私相議抵之人出頭承認既非主謀又非正凶不過按數抵償而地方官因見人衆於鬭毆之始固不敢過問逮至斃命又以有人認償即將就完結不加深究致奸民罔知忌憚日甚一日應嚴加懲創禁止等語械鬬之風雖由閩省民情慓悍但究係地方官辦理不善所致若果地方官聽訟公明遇有鼠牙細故即立豫剖斷何致小民逞忿私相爭鬪即或有桀驁不馴之輩鬬毆斃命亦無難立究正凶按律定擬何得任其私相議抵乃該省地方官向來因循玩愒於百姓訟案並不代為秉公速審致小民無從訴其曲直積忿私鬪而案情略大該地方官又思回護處分化大為小遂致奸徒無所懲創罔知法紀亟應趂此兵威之後遇案嚴辦庶械鬪之風可期漸息若復稍事姑息則刁風日長雖法令亦無從禁止勢必又生事端尚復成何事體閩省係海疆內地與臺灣均屬緊要著傳諭李侍堯務宜不時查察實力整頓如再有械鬪之案務飭究出主謀正凶並頂凶之犯一併盡法處治其地方宫員有仍前掩匿諱飾者立即從嚴參究並於奎林行抵泉州時詳細告知令其到彼加意妥辦俾械鬪之風永行斷絶方為妥善二十三日甲寅上諭內閣曰前因臺灣地方經柴大紀等貪縱廢弛之後百弊叢生特諭令福康安於剿捕完竣後將善後各事宜詳悉妥議具奏嗣據福康安等議定共十六條立法固已周密若該處文武員辨果能實力奉行原可永逺無弊但有治人無治法恐日久復視為具文或竟陽奉隂違則雖多立科條仍屬空言無益在臺灣之文武各員務當敬謹遵循力除積習以飭營伍而靖海疆至閩省民風刁悍盜劫頻聞是以降㫖凡遇該省海洋盜案應俟兩年後盜風稍戢再照舊例分别聲請昨據德成奏福建內地以及臺灣械鬬之風尤熾已有㫖令李侍堯當遇案嚴辦是此等愍不畏死之徒恐非一二年即能悛革所有閩省海洋盜案並械鬪之案俱著照新例嚴辦俟三年之後如果人知畏法該督撫等再行奏聞照舊辦理以期辟以止辟昨因臺灣總兵員缺緊要已將奎林補放朕之所以簡用奎林者原令其前往實力整頓俾該處營務吏治均有起色奎林行抵泉州李侍堯可即將應辦諸務詳悉轉傳令其到彼後恪遵妥辦毋負委任至前降諭㫖令於督撫將軍內每年輪派一員前往臺灣巡查亦恐該鎮道等扶同徇隱故智復萌有將軍督撫前往層層稽察庶共知警惕若該處總兵皆如奎林之足資委用原不必又令督撫等前往多此一畨跋涉但奎林亦不能久在彼處設有升調等事而接任者一時不能得人難保其不至貽悮自應仍責成巡查之將軍督撫方為周密乃昨據德成奏不如但令將軍提督前往督撫似可不必等語其意必以將軍提督與地方無統轄之責前往臺灣尚不至有需索供應情事若督撫前往則各州縣備辦供應及家人胥役需索門包所費又復不資即如從前富勒渾縱容家人殷士俊李世榮沿途任意勒索是其明證無怪德成之有此奏朕令該督撫等前往巡查原為稽察奸弊起見若該督撫等復縱令家人長隨胥吏等藉端需索是未受其益而先受其害更不成事體著傳諭該督撫等嗣後於前往臺灣巡查時務宜嚴禁從役等毋得有得受門包沿途需索等事如有明知故縱及漫無覺察者或經科道恭奏或經朕别有訪聞即將該督撫加倍治罪决不寬貸且不特臺灣為然即各省督撫於巡閲營伍查辦災賑時均當自行雇備夫馬毋得絲亳擾纍地方朕聞向來各省督撫內惟李世傑書麟于出巡時輕騎減從尚能不纍地方各該督撫俱受朕重恩養亷優厚何不以李世傑書麟為則效而必踵不肖督撫之覆轍乎况督撫之責在于察吏安民凡通省之利弊屬員之賢否皆所應知而其出巡時所帶家人長隨尚不能查察又安望其剔除弊竇管轄如許之官吏耶且不特督撫為然即大臣官員等奉差出外除應得廩給馹夫之外亦不應格外需索擾纍地方嗣後凡屬奉差出外及督撫出巡者俱應輕騎減從並嚴加約束毋任有違例騷擾之事若有縱令勒索毫無覺察者一經訪聞即一併從重治罪斷不為之寬貸七月二十一日辛巳上諭內閣曰柴大紀在臺灣總兵任內任意廢弛營伍縱容兵丁等在外貿易并婪索夫價及海口船隻陋規生日節禮得銀拔補外委等欵贓私纍萬盈千逮賊匪竊發並不即時帶兵親往撲滅復托詞回城調兵遷延時日以致釀成賊勢及收復嘉義縣城時又不併力追剿與賊以暇致賊人復得占據斗六門大里杙等處修築抵禦種種貽誤軍機經福康安等定擬斬决解京辦理朕以柴大紀情罪重大本應立正典刑其在嘉義奏稱不忍以十數萬生靈委之賊手情願固守之處雖查係義民不肯放出皆屬謊詞朕究念其尚有守城微勞欲俟解到覆訊後加恩從寬末減改為監候茲據福建委員將柴大紀解到令軍機大臣㑹同大學士九卿覆訊柴大紀復思狡展翻供抵賴並供稱德成前在臺灣連日審訊義民誘令如將柴大紀贓罪指出必有重賞如不實說即行治罪等語朕命將節次申諭福康安諭㫖令其閲看並經朕親行廷訊始俯首無辭而于認罪之下仍思狡飾柴大紀一案朕専交福康安徐嗣曾審辦德成不過係派往勘估該處城工並無審事之責與伊何涉妄行攀指柴大紀之意不過因此事係德成前在浙省所有風聞到京因朕詢問據實奏明始行查辦遂心懷忿恨欲乘機將德成扳陷伊或可希冀脫罪奸巧之極可惡之極柴大紀竟係天奪其魄自行取死豈可復從寬典柴大紀著照所擬即行處斬以為辜恩昧良狡詐退縮者戒上又諭內閣曰福建按察使員缺著萬鍾傑補授萬鍾傑現在臺灣該處甫經平定一切善後事宜正須人料理著仍留臺灣道員之任將地方諸務與奎林實力整頓其按察使印務著李侍堯等揀選妥協道員奏明署理俟二三年後萬鍾傑在彼料理諸務大有起色該督等再行酌量請㫖候朕簡放臺灣道有人再令萬鍾傑赴臬司之任八月初十日己亥徐嗣曾奏言逆犯大半係羅漢腳匪類流寓在臺現按照籍貫密咨內地查其財産親屬務期毌稍疏縱又臺灣吏治廢弛不能早行覺察咎實難辭請革職開缺奏入上命軍機大臣傳諭李侍堯徐嗣曾曰此等逆犯財産其在臺灣地方者自應詳晰查明盡數入官以備撥給戍兵之需至各犯在內地所置田産不必概行入官所有此項內地叛産著于各該犯族衆均勻分賞以示格外恩施而杜爭競並諭伊等此係特㫖加恩嗣後倍當安分守法勉為良善並著李侍堯接奉此㫖先于漳泉一帶遍行曉諭使知感激前因臺灣吏治廢弛徐嗣曾於屬員收受陋規不能及早覺察又不自請處分是以降㫖飭詢但徐嗣曾於辦理善後各事宜及清查叛産查緝犯屬等事尚能周到伊所請革職開缺之處著加恩寬免徐嗣曽益當倍加感激諸事悉心經理實力整頓以期毌負朕矜全委任至意九月二十六日甲申徐嗣曾奏言臺灣內山各社生畨畨目等于八月上旬陸續到郡正值萬夀慶節即令衆生畨隨班鞠跪該畨目等無不以准令進京為非常榮幸臣就其所好賞給布匹鹽茶等令其散播各社將家屬妥為安頓趕緊製綿衣行李等件以資安渡逺行查臺灣南北中三路均有畨社此次到京者北路則屋鰲等七社中路則阿里山等九社大武壠等六社南路則傀儡山等八社共計生畨頭目四名畨目二十六名通事四名社丁八名專委在臺辦事之福州同知楊紹裘帶同熟悉畨情之義民首張維光葉培英王松沿途護送進京義民首曽中立黃奠邦等同日起程一體照料均於八月二十八日自鹿耳門登舟候風開駕並將該生畨等居宿飲食所宜一切行走章程咨㑹督臣飭知經過各地方妥為預偹以利遄行計算十二月十五日以前總可趕赴抵京奏入報聞欽定平定臺灣紀略卷六十四
