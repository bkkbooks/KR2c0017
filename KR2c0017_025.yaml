  text: 欽定四庫全書欽定平定臺灣紀畧卷二十五
  hash: sha256:228b7bc8fcaed74129fb12c5ff2bb8439e186d9f41db2fbb6f40f23655833ccb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_025-1a, image: WYG0363/WYG0363-0274c.png}
body:
  text: 七月十三日戊寅常青恒瑞同奏言賊匪侵擾諸羅之鹽水港等處臣等當派總兵魏大斌等帶兵一千五百名應援詎南路賊匪聞知郡北一帯有賊已分派官兵前往胆敢于十八日夘刻糾夥約七八千圍繞大營三面又有賊三四千攻犯府城小南門外桶盤棧營盤該道府協同副𠫭等員弁在城守禦并派撥兵民出戰臣等率同侍衛烏什哈達等帯領滿漢官兵出營分路迎擊賊衆正與桶盤棧營盤對陣烏什哈達等所帶官兵横冲賊隊奮勇争先鎗砲齊發賊尚拚死抵敵官兵以排鎗直壓賊始敗走追殺六七里俱向竹箐深宻處竄逸其大營三面之賊有章京岱森寳等七員總兵梁朝桂副將蔡攀龍𠫭將特克什布等俱各奮勇督戰大小砲排鎗弓箭施放得宜至午刻賊人大敗共計鎗砲斃賊約三百餘人殺死數十人割獻首級耳記髪辮奪獲賊械二十餘件傷亡弁兵義民等分别駐冊照例賞䘏臣等查此次打仗烏什哈達奮勇倍常岱森寳等帯隊勇往又副將官福調撥官兵曉暢軍旅深有機冝且晝夜勤慎實為營中出色之員在金川軍營已賞戴花翎其副將貴林臨陣打仗身先士卒以及同知楊廷理帯領義勇倡率有方該二員現在奬以花翎又外委王國志亦能管帯義民打仗甚屬勤勉超補千總實缺並奬以藍翎至搃兵魏大斌等自十五日帯兵由水道前赴諸羅塩水港前已有官兵防禦今魏大斌帯兵前徃諒必通知柴大紀但尚未據回報臣等已飛札藍元枚柴大紀即約㑹魏大斌協力剿賊固守諸羅迅速馳報同日李侍堯奏言常青抄録奏稿内稱現在鹿耳門尤宜嚴防等語則臣前所派繒船二隻鎗兵二百名分駐兩處似尚覺单薄今查水師提標繒艍各船已無可用鎗兵除調赴臺灣所餘有限臣随飛飭海壇金門二鎮調取繒艍船各一隻並向沿海各營凑撥鎗兵二百名照前分配每船一百名分往鹿耳門鹿仔港兩處協力防範如有賊船出擾即行截殺庶糧餉到彼不至疎虞至内地沿海各營額設戰船尤當預為整理無如因循日久船泊海邊不為随時燂洗收拾多不適用其入厰修造者又不能上𦂳完工目下惟有先就可用之船亟飭修整完固其在厰修造之船一併勒限嚴催迅速報竣庶為有偹不至周章再本月二十八日蚶江通判陳惇禀稱有林源邁船自鹿仔港囘至蚶江詢據稱藍元枚于六月十五日帯兵民往大肚溪剿賊義民渉水過溪與賊打仗互有傷殺又聞十六日牛罵頭各庒義民帯同熟畨共數千人殺至大肚溪焚燒賊庄殺死賊匪甚多藍元枚亦撥兵前徃接應等語查藍元枚前奏有遣人徃大甲等社聫絡畨社之語今牛罵頭義民同熟畨攻賊想即係藍元枚遣人紏約前採買色布色絹四千餘疋分行府城鹿仔港兩處今藍元枚聫絡畨社正可得用擬再行酌買觧徃以偹接續應用至北淡水一路據副將徐鼎士等禀稱招撫難民俱已歸庄幸得時雨晚稻大半播種惟賊首呉沙盤踞三貂恃其地險尚在竄伏現在設法購線剿捕等語是北淡水一路尚屬寧貼又閩省額兵除調徃臺灣剿匪外所餘水陸各營兵丁實屬不敷應用不得不量為募補前接守偹王天植造報缺額祗就現在府城各營而南北兩路無從查造者更當數倍若俟一一查到始行補額現在内地營伍殊覺空虚應先約畧募補以資差防而偹緩急查水師提鎮協所轄各營及陸路提標興化長福省城福寧所轄各營均屬沿海要地應請照調徃輪戍臺灣兵數無論是否傷亡散失先挑補十分之三其汀邵延建各營挑補十分之二所有糧餉即按名支給俟剿賊匪事竣後統于傷亡散失截曠銀糧補欵約畧計筭亦足敷歸補如此則兵餉不致多糜而現在内地海彊得添募新兵及時􅋵練可以資守禦而裕巡防再閩省各營鳥鎗自乾隆四十二年起赴臺班兵及巡洋弁兵沉失八百八桿並有年久鎗筒澆薄膛口寛大火機火門銷蝕不堪適用者共六千四百六十八桿經前督臣雅徳莅任後查明即散飭各營修造惟督標業經造補外其餘各營因公費逐年支用無存至今尚未補造現在各營莭次調兵前徃臺灣剿匪所有堪用之鳥鎗多已帯往其存營者半屬不堪設或需用貽悮匪淺查各營鳥鎗沉失損壊七千餘捍之多又延十年之乆竟不補造理合據實恭奏將厯任之提鎮將偹交部分别嚴加議處仍着落賠補但俟追出銀兩後始行製辦又致稽延時日應請先行動項上𦂳修造所有動用銀兩容查明各該員在任乆暫鎗數多寡分别追賠至臺匪滋事後所有軍前莭次遺失之鳥鎗約有二三千桿亦請先行動項製造將來仍于各該營公費内樽節辦理陸續歸欵均奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀曰南路賊匪將官兵牽綴意欲攻掠府城狡黠顯然雖經常青等率領官兵分路剿殺僅斃賊三百餘人不為快意是常青等在府城外結營株守無益竟當遵照前㫖酌量留將偹守城直趋北路㑹合攻剿為是至藍元枚處糾集義民熟畨㑹合夹攻較為得手若令普吉保留兵固守鹿仔港自可無虞該叅賛竟率領官兵將笨港塩水港等處屯佔賊匪次第殱除廓清道路由北而南前赴諸羅接應柴大紀合兵一處似於冲堅掃穴機宜更為得力惟是南路賊匪四處屯聚現在將軍恭賛俱在一處府城外所立營盤自屬寛濶若常青帯領官兵前徃北路兵力較分營盤寛厰照應不易常青應於起身時先將營盤酌量収小以便随時堵禦可保無虞然此皆朕於數千里外思慮所及随宜指示用兵機要倐忽變換其是否可以如此辦理之處惟在該將軍等悉心籌畫随機應變不必過於拘泥節次諭令常青等曉諭附從賊匪民人令其投誠歸伍各安耕種但恐該民人等未能盡加曉諭常青等竟當刋刻騰黄令各處遍貼或射入賊巢通行曉諭則從賊民人自當紛紛投出不但賊黨可以觧散且使賊衆彼此自相猜疑生心内潰實屬不戰可勝之良策常青藍元枚即當妥速辦理一面仍奮勉攻擊不可坐視又據李侍堯奏酌補營兵一摺所辦未免拘泥前已屢經有㫖令該督廣行召募不必拘定額數如恐經費不敷即行奏請再行撥觧應用現在正須多兵接應之時内地亦當操防備用如果募得多兵既可備撥軍營以助聲勢即内地巡防調撥亦為寛裕着李侍堯即廣行添募毋庸拘定原額並着常青藍元枚各就臺灣處所一體迅速召募上又命軍機大臣傳諭李侍堯曰昨因東港笨港俱為賊佔踞滋擾恐常青𣲖撥官兵前往防禦不能殱除净盡已有旨令李侍堯于内地搃兵副將内𣲖撥一員剿散賊匪以防梗阻糧路又預偹調遣之兵不妨多多益善特降旨令李侍堯孫士毅各行廣為召募以資差防今該督俱能先事籌及可嘉之至鳥鎗為行軍利器遇有沉失自應随時補造何以各營損壊至七千餘桿之多又延至十年之久竟不赶𦂳修理祗可免其議處若不令其賠補不足以示懲儆著李侍堯即行查明厯任提鎮年分之久暫損失之多寡除黄仕簡任承恩自應著落賠補外其餘各員應如何分别賠補之處酌擬開单呈覧該督即先動項勒限赶造以資應用俟分别著落賠補再行歸欵以期無悮要需上又命軍機大臣傳諭李世傑舒常姜晟何裕城曰前據何裕城奏江西運閩米石俱由新城縣五福地方行走現在自己陸續起運所有該處山路及一切事冝想已辦有章程此次湖北所碾米石亦由江西運赴閩省不過照該督成式料理自屬便易著何裕城即將江西米石于何時可以運竣其湖北米石接續由該省運閩道路便捷之處一面酌定一面飛咨舒常令其速將碾就米石分起撥運由江西五福一路前進不可似前次推諉以致遲延如江西實有碍難辦理之處一面飛即知㑹舒常等令其將米石装載撥船由水路運往江南交李世傑等由上海出口運徃閩省但前經先後降㫖令保寧預偹米五十萬石陸續由川江載赴江南偹船運閩為數較多恐江蘇船隻驟難添僱轉恐有悮要需莫若即由五福早運為是上又諭内閣曰柴大紀自剿捕逆匪以來督率官兵義民奮勇殺賊一切調度深合機冝着授為恭賛協同將軍常青等悉心籌辦以期迅奏膚功上又諭内閣曰據舒常姜晟奏湖北省早稲豐收秋成可卜大有現在動支倉榖二十萬碾米一十萬石遴委妥員分作四起由江西一路運徃閩省以濟軍儲舒常並徃湖南與浦霖酌議動榖碾米連閩以資偹用等語現在臺灣剿捕逆匪尚未蔵事一切軍糧及撫䘏平糶等事所需糧石較多不妨寛為預偹該督等能不分畛域先事預籌殊屬急公舒常姜晟俱著交部議叙上又諭内閣曰臺灣現在剿捕賊匪尚未竣事所有軍需一切費用繁多着户部于附近隣省内酌撥銀一百萬兩令該督撫等𣲖員觧赴閩省交與該督等仍存貯偹用十四日己夘寳琳琅玕同奏言杭州滿兵第二三四起已於六月二十八七月初一初三等日先後全行起程所有乍浦兵五百名並領兵協領等官十員於初四初六先後到齊江寧將軍臣永慶亦於初四日抵省公同騐看乍浦滿營所挑兵俱年力精壮漢仗去得應需軍装器械火藥鉛弹亦俱備帯齊全臣等照前一體料理於初五初七分為二起接續起程永慶随即趕赴前途先後照料督催前進水陸程途一切船隻口糧夫馬等項先經臣琅玕𣲖員㑹同該道府預備齊全現仍委令司道分起䕶送可以迅速遄行不致稍有遲滯奏入報聞十五日庚辰藍元枚奏言現在鹿仔港四面受敵而賊匪恃衆負嵎屢來侵擾本月初五日賊匪數千來犯二林荘十一日賊匪數千分路來犯埤頭茄冬溝等荘見官兵義民趕到應援随即散去如此出沒無常防備恐難週宻又章化淡水交界之大甲溪岸裡社係在大里杙之北現亦被賊攻擾若彼處一失賊匪便可長驅直至竹塹斷絶上㳺糧道臣𣲖䕶逰擊潘國材等帯陸路提標并延平等營兵六百名由海道前去堵禦并飭副將徐鼎士酌撥官兵協同守禦兼牽綴賊勢以為諸羅聲援臣等統計兵力除不服水土患病各兵外僅敷堵禦應援而諸羅府城道路阻隔若賊匪四面來侵必須分路痛加追殺兵力未免不敷况鹿仔港最為要地尤當計出萬全懇再調福建兵二千名廣東兵三千名前來鹿仔港以備勦捕又探聞自五月初七日起賊匪陸續焚搶諸羅縣屬沿海之安溪寮龍船窩鉄線橋等荘計二十餘里以致諸羅彰化道路阻隔又聞六月初九初十等日賊匪専攻諸羅屬之鹿仔草荘查鹿仔港至斗六門六十餘里至諸羅九十餘里沿途皆有賊匪屯聚又兼東螺溪西螺溪一帯水漲進勦官兵未能直達臣是以親率官兵由鹿仔厝及中寮二路攻殺大肚王田等賊荘鎗砲打死賊匪約五六十人官兵俱無傷損惟鄉勇淹斃二名被傷八名業經臣酌量賞恤偵探諸羅賊匪於十七十八等日陸續趕囘保守大肚溪諒此時諸羅賊勢自應減少臣現在整頓兵力一面遣人由海道持札宻商柴大紀定有日期臣即親帯官兵由東螺西螺土庫等處攻殺至斗六門㑹𠞰賊匪再臣接據鎮臣普吉保報先奉將軍常青調令帯兵一千名前赴諸羅大埔林地方與鎮臣柴大紀訂期㑹攻斗六門賊匪因到彼探聞賊首林爽文已囘彰化又據鹿仔港營盤副將林天洛䕶叅將馬元勲等具禀賊匪數萬分路圍攻鹿仔港馬鳴山營盤及埔心庄官兵分路迎敵施放鎗砲打死賊匪甚多奪獲砲位刀鎗等件有福協左軍千總林孝龍把總陳鎬帯兵追趕不意賊匪埋伏溝内突然擁出衝擊隊伍各官兵禦敵至殺退賊匪查明陣亡兵丁七名失去行營砲二位鳥鎗四桿腰刀七口賊勢甚為洶湧續又據副將林天洛禀報五月初一日賊匪復出肆擾官兵奮力堵殺鎗砲傷斃賊匪甚多并奪獲鞭砲䥥鈎長鎗竹鋛生獲犯王力廖應魁邱永押交彰化縣審訊等情普吉保隨撤兵兼程於五月初六日囘港臣查普吉保撤兵仍囘鹿仔港業經請將軍臣常青核奏是以臣前次摺内未經附奏王力等三犯先據彰化縣知縣宋學灝詳報王力一名刀傷深重審明後即經病故其邱水廖應魁二犯經臣覆訊正法再查淡水彰化交界之大甲溪一帯閩粤居民雜處間有賊匪潜匿其間以致各懐疑心彼此燒毁莊社又彰化縣城内及附城莊社係民賊互相燒毀現在房屋全無以致泉民多逃出鹿仔港漳民多被賊押入山内水沙連并大里杙等荘社是以鹿仔港現有民人十餘萬人大里杙水沙連等社賊巢内亦有民人十餘萬人因衣食缺乏多有從賊入夥者是以賊勢愈形猖獗今賊匪守禦隘口音信隔斷臣細詢將弁竟不能知賊巢虚實現在嚴禁民人不許鬭殺焚搶并遣妥人乘小舟由海到大里杙等社偵探賊巢虚實并攜帯告示諄諄曉諭如民人已經從賊打仗罪無可貸若係良善未經從賊者務速歸荘乘時耕種至林爽文藉大里杙東係髙山西向大海南北俱是大溪阻隔水沙連一帯又是髙山險峻得以鳩集夥黨茍延殘喘臣現在相度機宜設法勦捕斷不敢效任承恩等觀望遷延亦不敢冒昧輕率務計萬全迅速勦滅匪黨奏入上命軍機大臣傳諭常青李侍堯藍元枚柴大紀孫士毅曰前已有㫖令李侍堯將添調兵一萬一千名内撥粤兵二千名與藍元枚又據李侍堯奏預備漳州有眷属兵二千亦有㫖令該督𣲖赴鹿仔港藍元枚此次發摺時想尚未接到前㫖其閩粤兵四千此時自己陸續前抵鹿仔港今該叅賛既請添兵五千著孫士毅再於廣東挑撥兵一千名速赴閩省並著李侍堯即於漳泉等處速行召募兵一千接濟調撥合之前調粤省應撥鹿仔港兵二千及漳州兵二千已共有六千名李侍堯酌量情形如現在添調兵丁一千先到厦門即將粤兵先行撥赴藍元枚處若漳泉召募之兵於粤兵未到之前業經召募齊集即將募兵一千撥往鹿仔港應用以足所請添兵五千之數其餘一千著李侍堯即由五虎門配渡竟赴淡水接濟徐鼎士所有此次續調粤省兵一千並著孫士毅妥協𣲖撥愈速愈妙再據藍元枚奏稱鹿仔港四面皆有賊衆滋擾而彰化淡水交界大甲溪等處又有賊屯聚昨常青又奏賊衆在桶盤棧等處圍繞大營實有不能移動之勢看來賊匪南北四出擾攘意在牽綴官兵而常青藍元枚等墮其術中竟有應接不暇之勢用兵之道合則勢盛分則勢弱今賊首林爽文賊目荘大田等明知重兵俱在常青藍元枚兩處而林爽文牽綴北路荘大田牽綴南路使我兵分投堵禦奔走不暇賊匪得以乘間蹈隙將南北兩路𦂳要各港社隘口任意搶佔賊勢轉得聫絡狡計顯然乃常青等為其所愚止知結營自守分兵防備遇賊匪擊東應東擊西應西譬之奕棋使賊人着着佔先通聫一氣而官兵止辦接應並無制勝之策轉致疲於抵禦何時方可竣事該將軍等自當統領大兵帯同侍衛章京將備等舎南趨北與柴大紀㑹合藍元枚亦應令普吉保留守鹿仔港該恭賛即帯兵由北路而南前往諸羅與常青柴大紀㑹合一處使我官兵聲勢聫絡軍威壮盛其間阻隔屯聚賊衆即可順便乘勢勦殺使南北道路相通偵探林爽文現在何處即以大兵全力前往捜捕但能將渠魁擒獲則其餘賊目如荘大田陳泮呉領等自無難迎刃而觧勢成破竹即使林爽文窮蹙竄入内山而賊目匪夥失其首逆勢必紛紛奔潰彼時我兵將賊黨痛加勦洗乘此得勝兵威再向生畨令其獻出想逆首林爽文即有翼亦難遁也此乃擒渠制勝之策該將軍等當勉力相機籌辦不可坐失事機前此黄仕簡任承恩即以因循觀望以致老師糜餉今常青等亦不免為賊牽綴止知自守即與以百萬之師而零星𣲖撥處處分防抵禦亦總不能得力斷不可不急思變計改圖以期出竒制勝况現在添調各兵俱係生力正當乘此新到鋭氣及鋒而用若再因循又致疲弱仍與不添無異至常青等如帯官兵前往北路應遵前㫖將營盤酌量收小妥設防卡便於照應更可期保固無虞又節次降㫖令常青藍元枚各就近廣為召募母論從賊與否一經應募投到即令食糧充伍此固為増添兵力觧散賊黨之計但賊匪狡獪異常其自行投到者不可不留心防備其中如有家屬尚在内地及随營打仗一二次察其情形實能出力者方可信用若乍行投到當擇素能管束兵丁之將備令其統轄或分𨽻各營令官兵箝束庶可免肘腋之患此為最要至北淡水一路現既有賊匪滋擾藍元枚應飭令副將徐鼎士加意堵禦奮力勦殺毋致稍有踈虞又據藍元枚奏前次賊匪攻擾埔心荘時有千總林孝龍把總陳鎬帯兵追趕被賊匪埋伏溝内突出衝擊經官兵殺退等語其林孝龍陳鎬二人是否囘營抑係陣亡摺内未經叙明並著查明具奏現在沿海口岸俱有賊船潜伏内地觧往臺灣等處糧米餉銀火藥鉛弹等項著李侍堯嚴飭文武員弁加意小心防範方為妥善再該叅賛所請添兵五千名現已有㫖如數發往但到彼尚需時日此時豈有株守坐待之理今藍元枚約㑹柴大紀訂期親帯官兵直趨斗六門奮力攻勦此舉畧見奮勇自應如此辦理臣等謹按賊匪蟻聚蜂屯俱係脅從非盡能打仗故一經官兵鎗砲無不奔潰因不能窮追進逼使賊散而復聚仍敢四出滋擾以為牽綴之計將軍臣常青等僅能堵禦應接不暇實墮其術中我皇上洞燭情形諭以擒渠制勝之策不啻至再至三兹以藍元枚有與柴大紀訂期合攻之語復又傳諭常青徑赴諸羅㑹齊進勦兵合則勢盛賊匪自無難悉力殱滅聖明屢示機要惜在事諸臣尚力有未逮也十六日辛巳上命軍機大臣傳諭李侍堯曰昨據藍元枚奏鹿仔港之二林埤頭等荘及彰化淡水交界處所據有賊匪攻擾已諭令該督在漳泉募兵一千名並令孫士毅再撥粤兵一千先儘五千名撥赴藍元枚處接應其餘一千名即令該督徑由五虎門配渡撥赴淡水以助徐鼎士防守之用李侍堯務須妥速召募即行分撥至粤省及彰州兵應撥往藍元枚者該督究於何時先後配渡末據奏及著即將何日可抵鹿仔港之處迅速覆奏鹽水港笨港蔴豆社等處為米糧販運通衢今被賊匪搶佔且押去海邊小船又將在海口一帯滋擾所闗甚重已節次諭令常青等務將各港社屯佔賊匪迅速勦殺打通道路為要今披閲臺灣全圖澎湖一處正與笨港鹽水港鹿仔草等處相對且相距不逺俱有港口可通現在常青藍元枚兩處酌辦勦賊無暇前往各港社痛加勦殺雖據常青柴大紀各𣲖官兵前徃攻勦恐不能得力今澎湖既相距甚近該處原駐有官兵李侍堯自應飭令駐劄澎湖將弁帯兵就近配渡前往鹿仔草笨港鹽水港一帯接應㑹攻如澎湖駐守兵丁為數不多該督亦應於内地押撥官兵由澎湖前徃協𠞰庶内外夹攻屯踞各港社賊匪自可迅速勦殺肅清道路使官兵聲勢聫絡於勦捕機宜方為有益况賊既佔踞沿海各港社保無滋擾澎湖之事亦應預為籌備常青李侍堯藍元枚等總未言及今因觀圖甚為厪念著傳諭李侍堯並將圖發交閲看酌籌妥辦迅速覆奏欽定平定臺灣紀畧卷二十五
