  text: 欽定四庫全書欽定平定臺灣紀略卷一
  hash: sha256:51f3bed44c91e084f1b97882f02ec8986f879cb91f3d7cc749474c22e807578b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_001-1a, image: WYG0363/WYG0363-0017a.png}
body:
  text: 臺灣古未𨽻中國版圖隋開皇中虎賁陳稜略澎湖三十六島元末置澎湖巡司明永樂時太監鄭和舟下東西洋至東畨其國人所居名雞籠山即臺灣地嘉靖末遭倭冦焚掠稍稍避居山後神宗末荷蘭國紅毛畨遭颶風泊舟於此愛其地築城居之復築赤嵌樓與相望設市城外而漳泉商賈往往前往漁利屹然為海外一隩區矣天啓初東洋甲螺顔思齊冦海上福建南安人鄭芝龍附之據臺灣自是劇盜繼起皆倚為固崇禎時熊文燦招芝龍降而海上諸冦猖獗如故終明之世迄未就平本朝順治三年大軍駐汀州芝龍赴軍門降其子成功率衆入海冒姓朱自稱曰國姓時時侵擾沿海諸郡縣世祖章皇帝屢敕招撫並令芝龍作書諭之成功不應議政王等奏請發兵討之因械繫芝龍於寧古塔旋以成功反覆誅芝龍及其子孫數人成功敗竄入海令其子錦守金門厦門成功死錦竊據海隅康熙十三年耿精忠反錦因襲漳泉諸郡王師平定福建聖祖仁皇帝命將討錦先取海壇諸要地又拔金厦二門賊衆大敗遁還臺灣二十年七月特命施琅為福建提督集兵申討時鄭錦已死其子克塽猶恃險負固大兵由銅山進發直取澎湖克塽等窮蹙請降遂定臺灣始設立郡縣六十年四月姦民朱一貴作亂總兵官歐陽凱率兵往捕被害臺郡全陷總督覺羅滿保聞報自福州赴厦門討之提督施世驃以舟師先抵澎湖同南澳鎮總兵官藍廷珍率將佐等攻克鹿耳門乘勝攻復安平進攻臺灣府治賊衆敗散賦首朱一貴逃匿諸羅縣為鄉民擒獻臺灣平自大兵攻鹿耳門迄事定凡七日遂以次安戢南路北路擒其餘黨杜君英陳福夀江國論等咸伏法迄雍正十年閏五月臺灣大甲西諸畨不靖姦民吳福生等因糾衆為亂戕害官兵陸路提督王郡討平之併其黨羽數十人檻致京師伏誅臺郡以寧至乾隆五十一年十一月復有姦民林爽文糾衆滋亂之事乾隆五十一年十二月二十七日丙寅閩浙總督常青奏言據署淡防廳程峻竹塹營守備董得魁會稟十一月初間聞有彰化縣匪徒林爽文結黨肆虐騷擾地方即會帶兵役於交界處堵緝并具文派撥番社飛遞道署旋據該番帶回原文並有彰邑大肚社番寄淡屬大甲社通事信內稱十一月二十七夜彰化俞知縣在大墩地方拏匪遇害彰城失陷路途梗塞不能前進等情臣隨飛咨水師提臣黃仕簡率領本標兵一千名金門鎮兵五百名南澳鎮銅山營兵五百名由鹿耳門飛渡前進派令副將丁朝雄參將那穆素里帶領臣標兵八百名海壇鎮兵四百名閩安烽火營兵三百名聽海壇鎮總兵郝壯猷調遣由閩安出口至淡水前進兩路圍攻又參將潘韜都司馬元勳帶領陸路提標兵一千名前赴鹿仔港堵禦臣即於泉州駐劄會同陸路提臣任承恩居中調度并委金門鎮總兵羅英笈前赴厦門彈壓一面通飭沿海營縣嚴密防範并咨廣東浙江等省督撫各臣於海口要隘一體嚴查不使匪徒得以竄逸同日福建巡撫徐嗣曽奏言本月十四日接據臺灣鎮總兵柴大紀及該道永福移稟內稱訪聞北路大里杙等莊有姦民林爽文王芬等結黨搶劫撥逰擊耿世文帶兵會同北協副將赫升額同知長庚彰化縣知縣俞峻前往查拏帶兵駐劄離縣城三十里之大墩泛地二十七日夜有數千人往劫大墩營盤并於大肚溪邉聚匪截路以致信息不通南北一帶亦有匪徒糾集且聞要攻縣城鎮道等會率逰擊李中揚林光玉楊起麟等帶領辨兵即於初二日早飛赴諸羅要處分路𠞰捕檄調澎湖右營逰擊蔡攀龍帶兵八百名來營聽候調用現在賊勢猖獗臺灣府城兵丁不敷調用應請多派強兵分路救援等情臣查提臣黃仕簡已帶兵由厦門出口飛渡鹿耳門督臣常青亦已駐劄蚶江與陸路提臣任承恩會商調發官兵由蚶江對渡鹿仔港進攻至省城由閩安出口直達淡水此路最為便捷亦經督臣調派副將丁朝雄那穆素里帶領官兵聽總兵郝壯猷統領進發三路官兵夾攻分頭搜捕臣現亦飛飭營縣多備火藥鉛彈雇備船隻聽候撥用但恐賊匪聞知官兵分路前進勢必四散竄匿或偷越內渡臣現飭沿海地方文武員辨嚴行截拿至臺灣向有漳泉民人在彼耕種貿易此次不法姦民定多漳泉民人在內臣密飭該道府明白曉諭各地保族鄰人等或有竄回原籍立即捕拿首報加以重賞仍飭不動聲色不得稍有張皇轉致疑駭同日福建水師提督黃仕簡奏言訪得臺灣彰化縣屬有匪徒聚衆攻破彰化縣城等事一面委令提標右營逰擊邱維揚先帶兵二百名渡臺確查一面飭令挑選提標五營員辨及備戰兵丁一千名配足軍火器械封備商哨船隻齊足臣當即力疾親赴該地𠞰捕所有厦門地方檄委金門鎮總兵羅英笈就近彈壓查省城直對淡水際此北風當令渡往甚易隨飛咨陸路提臣及水師各鎮協營立就近省營分續調官兵北路援𠞰臣直由鹿耳門郡城南路進兵會督夾攻均奏入上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽曰臺灣地隔重洋民刁俗悍屢次滋事今有彰化縣賊匪林爽文等糾衆騷擾殺害官長攻陷城池尤為罪大惡極不可不痛加殱戮以示懲創彰化知縣拏匪被害該縣不能嚴密防範雖失之踈懈但帶兵緝犯事屬因公並著該督撫查明該縣如平日並無别項劣迹及激變情事即據實奏聞候朕降旨交部議恤至黃仕簡甫經病愈一聞匪犯滋事之信即帶兵渡臺殊屬奮勉可嘉著賞給荷包等件以示優眷並著於辦理搜捕諸務外仍加意調攝勿過勞勩至賊匪么髍烏合黃仕簡到彼督率該鎮道盡力堵勦無難立就撲滅但恐餘黨四散竄逸或偷越內渡常青任承恩現駐蚶江一帶著嚴飭沿海口岸地方文武員辨實力巡防最為緊要常青徐嗣曽等總須不動聲色妥協辦理若因外洋遇有此等案件該督撫紛紛調遣迹涉張皇轉致內地民人心生疑駭殊有關係該督撫不可不處以鎮定也二十九日戊辰常青奏言於惠安途次接據泉州府知府王右弼晉江縣知縣徐夢麟稟稱十二日署淡水同知程峻之子程必大懷取淡防同知關防赴泉求救詢據程必大稱父程峻駐劄竹塹因彰化賊匪滋事會同守備董得魁帶兵赴中港地方堵禦賊匪衆多抵敵不住現在存亡未知賊匪於十二月初七日已到竹塹肆行搶虜我恐印信被搶又因彰化已被賊踞不能前往府城只得潛赴八里坌內渡求救等情又臣差往探信之守備林登雲稟報情節相符是現在北路一帶悉被賊匪占踞臺灣郡城係根本要地必先急為保護并派撥重兵協同進勦方為得力隨與提臣任承恩悉心籌畫即將提標挑出精兵一千二百名先由該提臣統領仍於鹿耳門前進再派福協興協長福等營徑兵一千名檄令參將福蘭泰統領都司馬元勳等帶往聽候調遣合計調發官兵已共六千名一面再行預為調備以資策應并檄調建寧鎮總兵鄭國卿來泉彈壓其沿海各口岸均各加兵駐守臣於泉州蚶江厦門等處往來督察相機調度所需糧􅀈事宜派委道府大員經理俾不致遲誤同日任承恩奏言現催督廳縣雇備船隻已於十二月十一十二兩日趕辦敷用並已挑派備戰兵丁一千名於十三日分配登舟候風放洋現聞督臣已自省星夜來泉一俟到日會籌妥協臣立即登舟飛渡協同黃仕簡戮力𠞰洗又一應𠞰撫善後事宜關係重大懇皇上特簡重臣臨閩鎮安督辦蕆事方能迅速均奏入上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽曰此等姦民糾衆滋事不過么髍烏合上年臺灣即有漳泉兩處匪徒械鬭滋擾等案一經黃仕簡帶兵前往督辦立即撲滅今林爽文等結黨橫行情事相等該提督到彼匪黨自必望風潰散即使該提督病後精神照料未能周到亦止可添派能事總兵一員多帶兵丁前往協𠞰乃任承恩竟欲親往豈有水陸兩提督俱逺渡重洋辦一匪類置內地於不顧之理至所稱簡派欽差督辦更不成話督撫提鎮俱有綏靖地方之責設一遇匪徒滋事輒請欽派大臣督辦又安用伊等為耶從前康熙年間臺匪朱一貴滋擾一案全臺俱已被陷維時止係水師提督施世驃帶兵渡臺進𠞰總督滿保駐劄厦門調度不及一月即已收復蕆功伊等豈竟未之聞乎又據常青馳奏詢悉淡水同知程峻之子程必大彰化失陷文報梗塞情形已派兵二千二百名令任承恩及參將福蘭泰等由鹿耳門前進會同夾攻等語與前奏大概相同任承恩本不應前往今既已渡臺亦不須拘泥回任務須實力勇往會同黃仕簡分路夾攻速擒逆匪以期剋日蕆功常青仍祇須駐劄蚶江厦門一帶調度策應此時總以鎮靜內地為要臣等謹按臺灣滋事之初止係一二姦民乘機倡亂水師提臣既督兵渡臺𠞰捕若果調度得宜設法擒其首惡散其脅從自可不勞而定原毋庸陸路提臣同時並往但任承恩業已起程若飭令回任未免又徒勞跋涉我皇上既明飭任承恩渡臺之非因其既經進發仍準前往會兵𠞰辦逮後兩提臣遷延觀望賊勢益張特簡重臣督𠞰並調集黔粵屯土各兵為一舉撲滅之計仰見睿謨廣運初不預設成心而遲速後先機宜自然吻合洵所謂無適無莫者歟正月初二日辛未上命軍機大臣傳諭兩江總督李世傑提督藍元枚曰現在臺灣彰化地方有賊匪林爽文等糾衆滋擾劫縣戕官一案水師提督黃仕簡陸路提督任承恩俱已帶兵渡臺勦捕漳泉地方緊要不可無大員彈壓藍元枚係福建世家衆所稔悉於該處情形自能熟諳著傳諭藍元枚即行馳驛迅速前往泉州署理福建陸路提督即駐劄蚶江一帶幫同常青調度接應一切事宜以期迅速蕆事所有江南提督印務著李世傑於該省總兵內揀員暫行署理同日常青奏言十二月十六日復接到鎮道會稟有賊匪數千圍攻彰化縣城於十一月二十八夜將城攻陷都司王宗武被害即要來搶鹿仔港笨港一路直犯府城請撥兵救護隨嚴飭本標遊擊李中揚千總蘇明耀魏大鵬等飛馳諸羅勦捕分飭將辨堵截各隘口職道等督同遊擊林光玉帶兵駐劄鐵線橋以便應援查賊匪係漳州人諸漳二邑漳人甚多到處附從勢甚猖獗府城為全臺根本并飭右營遊擊鄭嵩移駐彈壓等情旋又據福興泉永道萬鍾傑稟稱臺灣典史易鳳翔執持臺灣道印照同該道家人曹泰諸榮來厦當即傳詢據鳳翔稱十一月二十九日賊匪攻陷彰化十二月初六日攻陷諸羅柴大紀帶兵堵住離府城十里之三坎店臺灣道召募鄉勇緊守府城令該典史同家人二名來厦請救初七日夜出城配船放洋初十日至澎湖見署協點兵赴援約十四日可到臺灣并聞得十一日柴大紀與賊打仗大施火炮賊勢稍退等語伏思臺灣匪徒雖易聚集滋事但地方文武平日豈無防範何至一任蔓延竟至莫可抵禦今經兩提臣齊赴集勦小醜跳梁自可速期殄滅苐查逆首林爽文係漳州人其附從之徒率皆籍𨽻漳屬其中更難保無內外勾連情事臺灣既屬緊要而漳泉兩郡尤為內地根本臣惟有預設機宜倍加嚴重並於漳州連界之廣東潮州等境移會兩廣督臣一體防範一面督催渡臺官兵協力進勦務期剋日蕩平不使稍留餘孽再水師提臣黃仕簡於十五日自厦門放洋陸路提臣任承恩十四日登舟十七日乘風開駕并與臣面為議定或竟由鹿仔港進攻或由鹿耳門入口統聽該提臣察探賊情隨機應變又聞知府孫景燧自十月初間前赴諸羅緝匪今諸羅失陷業已被害查福州府海防同知楊紹裘現在隨赴泉州即飭該丞前往署理臺灣府事務并派委正佐雜職等員到彼以備隨時差委其餘在臺被害文武容俟查明再行具奏同日徐嗣曽奏言十二月十八日據興泉道萬鍾傑稟知彰化諸羅俱已失陷賊勢方張不可不厚集兵力以速蕆事現於臣標及督標水師撥兵一千五百名並調上遊之建寧延平鎮營兵一千名來省以備調遣札商督臣就近酌調南澳鎮兵赴泉聽用又飛咨廣東浙江撫提各臣於附近水師營內酌撥備戰兵二三千名各於交界本境駐劄如需策應便於徵發亦可藉為聲援至官兵褁帶口糧已分飭妥協辦理昨準督臣咨商飭司撥銀十五萬兩解赴泉州貯備緊要動用臣現飭司迅速解往并另委護糧道李振文馳往蚶江隨同督臣籌辦一切其沿海要隘口岸諄飭文武員辨嚴密截拿以防竄逸又淡防新莊巡檢王增錞稟稱彰城已陷賊人移踞後壠現在招集鄉勇前往勦捕初八日已刻敗兵逃回俱稱塹城已失程同知被賊圍住不知著落新莊止有直街一道並無險要可據因思艋舺距新莊五里西北兩面有大河二道兼有淡防倉厫一座淡水都司全營兵丁俱駐艋舺隨商同都司易連派兵分守要隘保護地方倉厫但查淡營額設兵丁止有五百四十名恐賊匪一至兵力單薄當即傳軍工匠首黃世恭業户董再興召募泉民七千餘名其器械口糧係各鋪户自行捐備現有竹塹守備千把總三員即令其管領鄉勇分守堵禦惟望迅速發兵由淡水八里坌進口大有濟益等情臣查淡水地方險阻為臺灣北路要區現在既有艋舺地方經該巡檢王增錞召募鄉勇竭力保護自應迅速發兵救援即將現派備調之省兵一千五百名飭令閩安協副將徐鼎士撫標右營逰擊吳秀統領多帶軍火器械剋日由閩安出口直抵淡水協同守禦并多帶賞犒奬勵泉州鄉勇相機勦捕亦可為南路遙結聲援均奏入上命軍機大臣傳諭常青恆瑞黃仕簡任承恩徐嗣曽柴大紀曰常青此次所奏派兵勦捕各事宜較從前稍有主見略知鎮定但常青摺內稱逆首林爽文係漳州人其附從之徒率皆籍𨽻漳屬其中難保無內外勾連情事等語此等匪徒糾衆滋事無論何處民人其從賊者即係夥黨自應按名駢戮若漳泉民人鄉勇果能應募拒賊出力堵禦防守即係良民自應加以奬賞不應預存岐視稍露形迹轉致漳民心生惶懼别滋事端此時水陸兩提督先後帶兵渡臺已有六千餘名徐嗣曽又經派撥兵丁一千五百名渡臺協𠞰兵力不為不厚但閩人性本慓輕若零星打仗致有挫失是輕為嘗試轉足以張賊勢而餒官軍之氣於事尤屬無益著黃仕簡任承恩務須俟各路兵丁到齊約會日期同時併力夾攻自無難一舉蕆事該督等總須鎮定持重再徐嗣曽奏飛咨廣東浙江二省督撫提督於附近水師營內酌撥戰兵二三千名各於交界本境駐劄如需策應便於徵發亦可藉為聲援等語此時似可無需鄰省接濟兵力然備撥亦可總宜不動聲色密為布置不可稍涉矜張驚動衆聽至臺地會匪究係何會興有幾年聚衆數千蔓延滋擾劫縣戕官該地方文武平日所司何事豈竟漫無覺察並著常青於事定後查明嚴參示警但非目前急務此時惟當鎮輯內地速𠞰賊匪為要正月初三日壬申上命軍機大臣傳諭常青黃仕簡任承恩徐嗣曽曰臺灣賊匪林爽文等聚衆滋事劫縣戕官一事前據黃仕簡任承恩各奏俱帶兵前後渡臺進勦朕初以此等匪徒不過一時烏合不值水陸兩提督前往同辦嗣據常青奏黃仕簡於十二月十五日自厦門放洋任承恩於十七日登舟開行會同進𠞰等語任承恩既已同往務須與黃仕簡同心協力鎮定持重努力𠞰捕若能剋期撲滅迅速蕆事是即有功而無過朕必將該提督等加恩奬賞其出力員辨兵丁等亦必從優議敘至昨據常青徐嗣曽等奏到各摺內稱總兵柴大紀帶兵堵住離府城十里之三坎店召募鄉勇緊守府城十一日與賊打仗大施火炮賊勢稍退是現在府城業經嚴密防守可保無虞俟大兵到齊同時并力夾攻自可即日蕩平所有首夥各犯拏獲之日即在該處迅速正法一面奏聞毋庸再行分别請旨辦理致滋耽延臣等謹按兵貴一鼓作氣方水陸兩提臣會同進𠞰若俟各路官兵到齊約會日期同時并力夾攻則賊衆膽落自成破竹之勢皇上於進兵之始早慮及閩人秉性慓輕勇於私鬬怯於公戰豫以不可零星打仗輕為嘗試丁寧訓誡至於再三厥後黃仕簡任承恩等惟事分路堵禦兵力見單士氣不振以致重煩徵調益仰見聖明坐照如神實為洞燭幾先也欽定平定臺灣紀略卷一
