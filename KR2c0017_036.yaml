  text: 欽定四庫全書欽定平定臺灣紀畧卷三十六
  hash: sha256:73e095ef639fc5f6e7e2bed6b07fd20b14526ca369bf7cb17651b52fb49e4ca5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0017_WYG_036-1a, image: WYG0363/WYG0363-0407c.png}
body:
  text: 九月初七日辛未阿桂奏言臣與福康安前在金川軍營相處日久四十九年又同在石峯堡剿賊深知其辦理軍務及臨陣克敵並非畏葸怯懦之人此次前赴臺灣督辦其主見如何臣雖無由得知但悉心揣度其奏請添兵自為速於完事起見縁逆匪林爽文等滋擾以來為時既久前後調往官兵雖已不少然其中如福建本省兵丁竟難深信即如該提鎮等遇賊打仗屢報多兵不知下落此項兵丁豈盡死傷逃亡未必不因與賊同鄉遂爾附從此外浙兵素又愞弱所可信者惟駐防滿兵及粤兵二項統計不過一萬四千餘名現在賊匪猖獗鴟張設福康安到彼後現有兵力尚不敷剿捕維時再請添兵臺灣逺隔重洋往返動需數月倘不能冬春蕆事則臺地炎熱雨濕辦理彌形棘手福康安身肩巨任思欲剋朝蕆事故有預行調備之請方今帑藏充盈皇上於辦理軍務從無靳惜且福康安請調之黔楚兵六千名俱可由水路赴閩沿途應付似亦不至於勞費再查鹿仔港距大里杙較近且聞臺灣彰化以北産米較廣若北路打通粮運亦易辦理是官兵由蚶江配渡往北進剿實為得力即臣前摺亦曽請于虎仔坑等處分路進攻大里杙賊巢惟現在臺灣藍元枚駐劄鹿仔港所帶之兵本屬無多而撥給常青處續調之粤浙各兵此時皆已到彼至内地兵丁其新募者既未經訓練即舊有者均係挑選所餘福康安現在前往臺灣無兵可帶若由蚶江配渡而大兵俱在南路轉恐未能得濟臣愚以為目下急務總在打通諸羅為要諸羅一通則南北聲勢聫絡維時可南可北視賊聚集處所或以全力専注或用分路夹攻搗穴擒渠蕆功自易而就現在情形再四審酌福康安似宜仍由厦門配渡以便統率大兵前往諸羅于捕剿方能得力同日福建按察使李永琪奏言八月初五日由鹿耳門到臺灣府城查軍需一切先經督臣李侍堯委員源源運送盡屬充裕所有粮餉藥鉊等項除臺灣府道支放外現在存貯餉銀二十一萬兩有零兵米六萬一千餘石火藥八萬九千餘斤鎗子六萬一千餘斤砲子一千八百餘顆火䋲一十二萬三千四百餘盤均足敷應用臣到後連次赴城外營盤見将軍常青精神照舊强健叅賛恒瑞同在一處城外營盤甚為整齊嚴肅城内民居安貼舖户貿易如常臣現與臺灣道永福同文武各官督率義勇兵民日則慎宻稽查夜則嚴謹巡邏與城外官兵相為聲應凡存貯軍火處所撥兵防守仍不時親往查看以免疎虞至鹿仔港軍營應需一切粮餉藥鉛臣前經過厦門時查閲局内檔案所有歴次委員撥運過銀米鉛藥并火䋲砲子等項甚屬寛裕兹又添兵五千亦足敷用臣一靣飛查支存各數以備考核仍一靣飛移内地總局再行撥運務使充足有餘不敢稍有缺誤均奏入報聞初八日壬申上命軍機大臣傳諭福康安常青李侍堯曰附近府城南潭一帶屯佔賊匪前據常青等奏經官兵将賊人蓬藔草屋悉行燒燬竹箐隨路砍伐賊目莊大田已有潛逃之信常青等即應乗勢捜剿痛加殱戮方得機要乃即行撤兵轉與賊人以暇以致現在該處尚有賊匪糾聚窺伺不能徑趋北路今常青既因府城存貯糧餉火藥及難民甚多恐官兵往北賊又乗間窺伺難免後顧之虞意欲先清南路賊匪就目前情形而論亦祇可如此辦理常青此時竟當胸有定見留恒瑞駐守府城親自速領官兵先将南潭一帶賊匪奮力殱除所有賊寮竹箐悉行焚毁擒挐賊目荘大田即趂勢恢復鳯山縣城俾府城以南道路肅清計彼時福康安已由鹿仔港前扺諸羅破賊觧圍與柴大紀會合矣且川黔兩省之兵自已早到該處軍威更為壯盛常青将南路廓清即徑赴諸羅會同直搗賊巢以成破竹之勢務須倍加奮勉為要至福康安已屢經有㫖令其速赴鹿仔港决策制勝况藍元枚平日在彼督率調度雖有條理究不敵福康安海蘭察二人之智勇兼濟且藍元枚所轄将弁等亦逺不如舒亮普爾普等之久經行陣奮勇可恃加以巴圖魯侍衛章京等百餘人驍勇趫捷俱可一以當千福康安統領如許勇将勁兵又當賊匪猜疑渙散之勢何堅不摧何險不破又何所疑畏稍有瞻前顧後之見耶且朕前𣲖福康安等前往督辦時初不料藍元枚猝有疾病不能辦理軍務之事而藍元枚今忽因染病遂至不起設非早𣲖福康安等前往則鹿仔港一路統率竟至無人其勢必至掣肘今甫有藍元枚身故之信而福康安已即日可扺鹿仔港督率籌辦又值新調官兵雲集士氣振作壁壘更為一新此即上天嘉佑黙牖朕衷於端倪未兆之時而有先事預籌之計朕實感謝天恩黙深慶慰即以此事會而論實屬機宜凑合已有成功先兆諒此么䯢草竊又有何伎倆能久延殘喘負嵎抗拒乎福康安尤當堅持定識乗機鼔勇以期迅奏膚功副朕委任臣等謹按常青藍元枚分駐府城鹿仔港等處一切調度尚有條理我皇上先㡬决䇿特命福康安前往督辦並令統率大兵徑扺鹿仔港而其時藍元枚適以病卒於軍賴福康安剋期到彼預定鹿仔港進兵之計是以徵師迅集壁壘一新遂克速奏膚功悉如睿算此皆欽承奉若之意有以上格天心而凡所為察地之宜用人之道亦莫不與天心相契合也夫初九日癸酉常青恒瑞同奏言現已𣲖令總兵梁朝桂副将丁朝雄叅将宋鼎曹貴逰擊左淵等再留兵二千名同道府共守郡城營盤適八月初七日添調粤省緑營兵一千名已到軍營臣等即将𣲖守府城内外各弁兵交梁朝桂等妥協防䕶一面将因雨冲壊城柵修固一面将闗帝㕔各營盤收小即於八月十六日統領侍衛章京鎮将等帶兵五千名起程由旱路三坎店木柵灣裡溪一帶赴北一至鐡線橋将附近塩水港等處匪衆殱除即知會柴大紀内外夾擊直達諸羅此時藍元枚亦必前來會合以大兵全力往攻賊巢再臬司李永祺已於八月初五日到臺灣府城臣等現赴諸羅一切軍需要務更可倚恃又查附近民莊前已漸有歸荘耕種者而沿海小港汊亦有可通糧食之處是以郡城糧價不致昻貴至附從賊匪民人臣等已出示曉諭現復刋刻謄黄於各路通行曉諭使賊中附賊之衆咸知悔罪現又招募民人入伍已得六百餘名分𣲖能事将弁帶領打仗仍留心察看至山猪毛義民實與他處義民不同㩀該義民副理劉繩祖周敦紀曽秀等二十餘人連名呈稱粤民等祖父自康熙六十年雍正十年逆匪朱一貴呉福生等先後倡亂屢從征剿皆邀議敘職䘖因號為懐忠里又建立義亭嘉奨匾額今賊首林爽文荘大田等南北肆擾上年十二月間鳯山初䧟粤民未及防􅊀被賊燒燬沿邉各荘粤民等因遵康熙雍正年間各義民祖父設堆堵禦之例推舉人曽中立為總理分設六堆統計義民八千餘人屢經打仗殺賊今聞大兵齊集懐忠各里公議排出一千三百餘人俱各安頓家室情愿隨營征剿立功今将軍叅賛傳㫖䕶送粤民等仍回本處自為守禦粤民等無不深感流涕但現在義民在家公議時誓願殺賊若非倚仗官軍聲勢恐難以伸其公憤至其家室里中公同照料即本處各荘防禦事宜人衆心齊賊匪已不敢輕犯仍懇准令隨征等語臣等察其實係真情合無懇仍准伊等隨營報効立功至臣等現赴北路到處皆有義民投到惟當令其各在本庄防守於官兵剿賊之時共助聲勢再查現𣲖赴應援諸羅之副将蔡攀龍貴林等因風雨阻滯尚未得有到彼信息數日内諸羅亦無文報臣等先經諭令駐劄塩水港之遊擊楊起麟務須設法将火藥送往諸羅兹據該逰擊稟稱已宻差兵丁押同畨民間道零星運送是諸羅鉛藥尚可接濟至添調浙粤滿洲官兵已到厦門配渡約計數日内俱先後可到臺灣兹查郡城外營盤雖已收小仍宜嚴宻滿洲兵到時擬留永慶帶廣東滿兵五百名浙江滿兵五百名駐剳闗帝㕔營盤臣等剳知梁朝桂令其靣交永慶俾敷守禦再臺灣府知府楊廷樺自扺臺灣任事一切堵禦巡防經理粮餉屢次得力兹於八月初六日病故會商督臣李侍堯即以臺灣府海防同知楊廷理暫行署理同日普吉保奏言藍元枚沾患痢疾一面移咨督臣李侍堯併飛禀将軍臣常青指示機宜速撥大員迅來鹿仔港會同辦理臣仍回馬鳴山軍營嗣據行營中軍叅将福蘭泰稟稱藍元枚病故伏查添𣲖漳州粤東之兵漳州兵已到一千三百餘名粤東兵僅到四百六十名鹿仔港一帶軍營統理乏員誠恐逆匪乗虚來擾闗係匪輕臣不得不先事預防故仍駐馬鳴山軍營以為鹿仔港捍衛其沿海一帶口岸嚴飭各員弁留心堵禦稽查以候常青𣲖撥大員并添調之兵到日會合攻剿均奏入上命軍機大臣傳諭福康安常青海蘭察李侍堯曰山猪毛粤東義民聞知賊匪滋擾公議挑出一千三百餘人俱各安頓家室隨同官軍打仗殺賊隨營報効實屬義勇可嘉自應優加撫奨令其殺賊立功所有總理此事之舉人曽中立著常青等查明如係文舉人即酌量賞給文官若係武舉人即賞給武弁如果人才可用即予以實缺亦無不可此外義民中尚有充當頭目隊長者亦著查明量給頂戴以示奨勵俾伊等倍知感奮踴躍從事以廣招徕又諸羅被賊圍擾前據柴大紀咨報常青城中火藥漸形短缺今該遊擊已将火藥宻差兵民從間道運送諸羅正可以資接濟想柴大紀自能保䕶無虞畧為慰藉福康安海蘭察等此時自己前扺蚶江即應遵照屢降諭㫖配渡速赴鹿仔港與柴大紀會合進剿而常青廓清南路亦即可由南往北剿殺沿途賊匪前扺諸羅福康安等務須倍加勉力鼔勇直前以期捷音速奏又普吉保駐守鹿仔港並未寸進及藍元枚患病已将官兵交伊管束伊並未将該處情形如何料理處専摺具奏至藍元枚病故普吉保正應激勵将弁督率兵民悉心籌辦奮力自効即自欲見長亦所當然乃轉移咨常青等𣲖撥大員前赴鹿仔港試思普吉保身係總兵豈非大員於剿捕賊匪寧非伊分内之事即使提督印信不敢擅用亦豈得旁觀坐視一籌莫展伊在彼所司何事著福康安将此情莭一併向普吉保靣加詰詢令其明白登答據實覆奏看来普吉保竟沒志氣将來在彼恐屬無益即總兵亦不能勝任徒令坐享俸㢘不足示儆俟事竣後福康安即飭伊回京候㫖令其前往新疆換班以贖前愆臣等謹案逆匪滋事之初臺灣義民率多隨同官兵剿賊而山猪毛粤民自其祖父以來急公嚮義屢從征剿今林爽文莊大田南北兩路肆擾蹂躪村莊粤民等公議設堆堵禦咸願隨營自効我皇上體恤備至諭令各歸本處防守而粤民等先已安戢室家誓願殺賊立功合詞籲請益以見國家恩徳涵濡至深且厚故小民忠愛激發出於至誠有不待官為驅䇿而自踴躍從行争先恐後者逮乎剿捕事竣義民等叨荷渥恩或賚以職級或表厥宅里褒功之典奨義之方盖自古未有也上又諭内閣曰藍元枚業經加恩以示軫恤所有應襲輕車都尉雲騎尉世職著伊長子藍誠即行承襲仍俟百日服滿該督咨送到部帶領引見用昭優䘏勤勞有加無已至意上又諭内閣曰楊廷樺自扺臺灣任事後於一切堵禦巡防及經理糧餉等事均屬奮勉出力楊廷樺著給還布政使原銜以示優䘏楊廷理隨營剿捕甚屬奮勉前已降㫖賞戴花翎所有臺灣府知府員缺即著楊廷理補授初十日甲戌上命軍機大臣傳諭留京王大臣刑部堂官曰藍元枚病勢沈重之時猶知以軍務為重黄仕簡身為公爵受朕厚恩較之藍元枚更為優渥且伊在提督任亦較藍元枚更久伊從前株守郡城一籌莫展即㩀稱實係患病亦應即奏明将軍務另𣲖人料理如藍元枚據實陳奏自請罷斥効力方為稍有人心乃何以計不出此一味因循恇怯藉病支飾辜負朕恩其罪實無可觧免著将藍元枚前後奏到之摺抄寄留京辦事王大臣會同刑部堂官即監提黄仕簡将此㫖並二摺給與閲㸔並嚴加詰訊令其明白登答㩀實具奏十一日乙亥常青恒瑞同奏言八月十八日探有賊人聚集府城北門外十里之三坎店一帶焚刼臣等於十九日夘刻親率侍衛章京鎮将協領等各帶弁兵前扺離營十里之大灣塘劄住隊伍當𣲖烏什哈達岱森寶果爾敏色希明陸廷柱謝廷選楊廷理等帶兵二千五百名城内義民一千廣東義民一千於辰刻到三坎店有賊三四千人對放鎗砲移時不退因該處溪水漲後週圍泥濘是以賊人恃險但泥水只深一二尺烏什哈達岱森寶希明等帶領官兵過河鎗砲並施賊人敗逃計鎗砲弓箭共斃賊二百餘人奪獲虎尾砲一尊賊械二十餘人燒燬賊寮二百餘間地𤓰乾六十餘担米二十餘担分賞義民傷亡兵民照例賞䘏臣等帶兵五百名正在大灣塘接應令鎮将等分路追剿旋㩀梁朝桂官福差報南潭中洲一帶有賊三四千攻犯營盤并分攻桶盤棧臣等隨帶兵五百名飛赴營盤迎擊當經梁朝桂等施放鎗砲将賊打退其小南門之桶盤棧有副将丁朝雄叅将宋鼎并司道李永祺永福共率兵民排齊鎗砲賊即不敢前進退入竹箐時已未刻地盡汙泥收兵回營至𣲖赴應援諸羅之叅将孫全謀係初五日已到新店現擬與駐劄鹿仔草之逰擊邱能成商同将先到兵八百名前往塩水港與逰擊楊起麟會救諸羅而副将貴林蔡攀龍都司杭富俱未見到兹於十九日接㩀㕘賛柴大紀十三十五等日小字文報内稱賊匪四處搭寮逼近縣城外庄現在激勵兵民竭力固守又稱暫撤鹿仔草塩水港之兵以救縣城俟縣城圍觧再行打通道路分兵駐守等語是諸羅賊勢仍未少減查副将貴林蔡攀龍等雖阻風雨今閲兩旬計此時亦必齊到又有楊起麟邱能成合兵向前定可直透諸羅痛殱賊衆至逺近民人多有呈請歸庄者當即散給腰牌令其各安本業並有連庄具呈俟大兵一到情愿齊心捕賊者其沿海安平等處投充入營者頗多已㩀守備林登雲募得年壮新兵一千餘名又郡城義民首亦時有呈送入伍并有欲求投誠之人雖少費稽查防範然從此離間觧散自有得力之處再現在江寧将軍永慶廣東副都統博清額於二十一日已到軍營帶到滿兵四百餘名其在後滿兵二千餘名亦計日即到臣等悉心籌酌臣恒瑞即親帶侍衛章京岱森寶富克精額副将謝廷選逰擊林起鳯劉越等共統領滿漢官兵三千名於八月二十二日起程赴援諸羅仍由海道前赴塩水港鹿仔草相機前進若副将貴林蔡攀龍叅將孫全謀等所帶兵丁一千六百名已同駐塩水港逰擊楊起麟駐鹿仔草逰擊邱能成等将圍困諸羅之賊殺散臣恒瑞即將沿途賊踞之庒悉力剿除使道路通順前扺諸羅與柴大紀面商或𣲖官兵守塩水港鹿仔草或調新到之兵夹攻斗六門均俟臨時酌定臣常青仍帶現有之兵五千餘名捜剿南潭中洲大穆降一帶賊巢奏入上命軍機大臣傳諭福康安常青恒瑞李侍堯孫士毅曰本日常青等奏到各摺係八月二十二日拜發因船隻被風打至廣東潮州經孫士毅另由江西一路加𦂳馳逓奏到頗為迅速所辦甚好朕盻望軍報日深厪切此次常青奏摺若因風打至潮州後仍令由閩省發逓則往返稽延轉多時日今孫士毅即由江西一路迅速奏到實屬曉事可嘉著賞給大小荷包鹿肉以示奬勵仍著該督得有臺灣剿賊信息隨時速奏至常青等久駐府城營盤未得寸進其因循觀望實應自知慚愧今恒瑞旣親帶官兵前往自應由陸路遇有賊匪即痛加剿殺速扺諸羅今轉由海道行走竟是避賊且道里紆迴未免又致遲緩著常青等即将何以不由陸路往援之處據實具奏又所稱接據柴大紀咨稱欲暫撤鹿仔草塩水港之兵以救諸羅俟諸羅圍解再行分兵駐守等語鹿仔草塩水港二處係府城前往諸羅要路現尚有賊匪滋擾自應留兵駐守未可輕撤若此時該二處尚未撤兵即不必輕易撤動倘柴大紀因縣城圍急已經調往則恒瑞於帶兵往援時即應分𣲖将弁酌留兵丁在彼加意駐守為是邱能成楊起麟屢經帶兵殺賊甚屬奮勉邱能成已由守備超擢其逰擊楊起麟著交福康安查明如遇有叅将缺出即奏明陞補以示鼓勵至藍元枚所遺水師提督員缺朕意欲即令柴大紀調補今因鹿仔港一路乏人經理是以先令蔡攀龍署理又恐蔡攀龍未能即扺鹿仔港續經降㫖令李化龍暫行署理至陸路提督一缺朕意蔡攀龍屢次帶兵剿賊且為賊匪所畏最為出力将來自可擢用但伊甫由遊擊超擢副将又陞總兵為時不過㡬月若遽任提督未免稍驟並著福康安留心察㸔如果蔡攀龍實能打通諸羅道路接應柴大紀打仗奮勉著有勞績即奏明将伊陞擢否則於軍前總兵内擇其實在奮勇出力者保奏一員補授以示奨勵常青等所奏在三坎店與賊打仗廣東義民隨同官兵殺賊頗為出力其陣亡者皆當査明賜䘏而隨軍之義民亦應給予口粮又㩀常青奏該處溪水漲發道路泥濘雖係臺灣地方非北方可比但此時已届深秋天氣日漸髙爽雨水亦已稀少正應迅速進兵擒渠掃穴不可藉詞稍有遷延致失事機此為最要又本日據鑲藍旗都統奏接准李侍堯等咨文将該旗被賊戕害之原任同知長庚家産查封一摺此事李侍堯等所辦殊屬漫無區别著傳㫖申飭前因孫景燧在臺灣府任内将庫貯銀兩侵虧至十餘萬之多該員貪黷歛怨釀成事端又復任意虧缺其罪甚重不得以其身故即置不問是以降㫖将伊家産查抄以備扺項至此外被賊戕害各員究屬因公被害如在任内並無别項劣蹟尚應仍與恩䘏用昭激勸至長庚止係同知自不應有經管庫項今已被賊害若又将伊家産查封則該員等既不能仰邀䘏典轉致家産抄沒豈為事理之平除已另降諭㫖令該旗將長庚家産即行給還外其任所貲財著李侍堯毋庸查辦此外被害各員並著李侍堯一體查明如伊等任内實有侵貪欵蹟者自應奏明将伊家産查扺若並無别項劣蹟者俱著無庸咨查辦理臣等謹按臺灣奸民糾衆滋事皆由地方文武貪黷歛怨釀成事端其虧缺庫項自應籍其家貲以扺官帑至被賊戕害各員在任時或貪聲素著或劣蹟無聞所當核其平昔彰善癉惡以示大公我皇上權衡至當於貪劣之員即飭令查抄而平日居官尚無過失臨事猝遭慘害者既免其抄産復特加恩䘏煌煌聖訓所以儆貪吏而䘏死事者仁之至義之盡矣十二日丙子上命軍機大臣傳諭福康安曰昨據常青等奏柴大紀咨稱賊匪四處搭寮逼近縣城欲暫撤鹿仔草塩水港之兵以救縣城俟縣城圍觧再行打通道路分兵駐守等語朕披覧之下即覺其辦理紕繆已降㫖訓諭今復輾轉思維此事大有關係柴大紀乃有籌算之人伊豈不知從前魏大斌前往諸羅時将軍装火藥留於鹿仔草交邱能成等看守若官兵一移賊匪必致搶刼乃為此撤調之言明係因諸羅圍困常青等縂不肯發大兵往救故為此言以激動常青等之意而常青無所可否僅以一奏塞責實為負朕委任若常青等稍有見識自當将鹿仔草現存軍装火藥甚為𦂳要若将官兵撤動轉被賊人搶去更屬不成事體之語飛檄柴大紀令其不可輕撤一靣即自統兵由府城至諸羅陸路速往救援仍遵前㫖留恒瑞駐守府城方合機要乃竟計不出此常青不往北而往南恒瑞不由陸而由海繞道避賊竟置鹿仔草塩水港於不問且前此蔡攀龍等數次接應皆由海道繞往已為非是恒瑞親統三千大兵何向不克正可将沿路賊匪痛加殱戮縱使少遲一二日再到諸羅方無後顧之虞而乃又踵恇怯故轍繞海而行㫁不能将鹿仔草軍装火藥帶往是諸羅又添三千吃飯之人豈不又成笑話且摺内又不将是否撤調軍装火藥有無妨碍及因何由海道繞往不由陸路剿除之處詳晰奏聞看来伊二人於軍旅之事全然不能措置即留於臺灣亦屬無用著福康安将此㫖向常青恒瑞靣加訊詰㩀實具奏現在海蘭察等及各鎮将多人不乏領兵之員福康安當察看情形若南路實帶兵乏人不妨仍留伊二人在彼令其立功贖罪若實在不能得力留彼亦屬無益即一面據實具奏一面令其回京候㫖但常青等昨日奏到之摺係上月二十二日所發計接到此㫖又須二十餘日是來往已在四旬之外誠恐緩不濟急朕既思及此處知常青等辦理失䇿不得不明切指示著福康安於扺諸羅後将塩水港鹿仔草之兵曽否撤動前逰擊楊起麟邱能成具報将火藥由間道陸續運送是否完竣之處嚴行查詢據實具奏同日福康安奏言臣因南路賊匪既未剿除諸羅被困危急常青等株守郡城尺寸不能前進調度失宜兵氣餒弱似應徵調得力新兵前往進剿臣原擬先行速渡臺灣激勵将弁相機辦理若於此項兵丁未到之先已經摧破賊巢即可飛咨停止設或尚稽時日彼時再行徴調更恐緩不濟急且賊黨多籍𨽻漳泉内地消息頗通見官兵添調甚多先聲所至必聞風膽落是以専摺直陳今䝉訓示始知前奏冒昧連日啟㸔南來軍報常青恒瑞奏於十六日前往諸羅留兵二千交梁朝桂看守府城揚言十三日起程而賊匪即於是日各要路四出攔截仍復收軍不能前進等語竊思南路賊匪尚在屯聚該将軍等自當一人留駐郡城廓清南路一人帶兵直扺諸羅方為妥協乃常青恒瑞一同前往毫無措置且起身日期定於十六日倡言於外正應移後數日使賊人猝不及防乃聲稱十三日起程轉令賊匪預先准備以致梗阻道路而柴大紀被困諸羅雖能盡力捍禦但環營刨挖溝濠係札營後即應辦理之事何至受困日久始令武舉黄奠邦等畫辦及此看來常青恒瑞柴大紀於行軍之事措置均屬乖方茫無頭緒即此數端已可概見藍元枚駐守鹿仔港又已患病身故此時南北兩路官兵僅能株守支持㫁難望其振作臣惟有趕赴厦門相度情形速往臺灣另行申明軍紀立使該處弁兵氣象改觀一洗從前委靡之習並與海蘭察等通盤布置整頓兵力先操必勝之勢務期初次接仗即将賊匪痛加剿殺一面追捕一面出示剴切曉諭妥為安撫觧散賤黨想賊首賊黨自不難即就殱擒再査屯練兵丁赴閩路程據巡撫琅玕按察使歸景照僉稱自江西至浙江常山縣徑達閩省較之由江南行走程途計近一千三百餘里等語臣已咨明經過各省先行預備并行知帶領總兵穆克登阿一體遵照奏入上命軍機大臣傳諭福康安李侍堯曰福康安正當堅持定見鼓勇直前奮力進剿乃摺内尚稱現在兼程馳赴厦門察㸔情形如鹿仔港有機可乗即由蚶江配渡等語是不免尚有猶豫之見此時必應遵照節次所降諭㫖决計迅赴鹿仔港統領官兵安定人心振作士氣直搗大里杙賊巢方合機宜此乃一定不易之理豈可尚有㳺移林爽文以愚賤編氓乃敢紏衆倡亂刼縣戕官荼毒百姓豈有上蒼不黙鍳朕衷仁愛斯民而轉令此等逆匪肆逆滋擾久延殘喘之理且黨羽不過漳州一處之人較之粤東泉州義勇百姓僅止三分之一即以臺灣之人攻臺灣之賊已屬事半功倍况加以如許官兵更復何往不克又况陸續添調之兵源源接應耶且林爽文所有粮食火藥等項止係在臺灣各處搶掠隨用隨盡豈能久支而官兵粮餉軍械鉛彈火藥絡繹運送用之不竭是賊人之力量有盡而官軍之接濟無窮賊匪又何能負固一嵎相持日久乎此福康安尤可恃以無恐者福康安既以朕心宵旰靡寧為念倍當决機鼓勇迅速籌辦以慰朕懐福康安之志定則朕之心亦安不可不善體朕意勉圗奏績看來目下情形臺灣郡城及柴大紀處轉可無慮而朕之所最懸念者實在鹿仔港一路藍元枚係漳州人今甫經病故該處領兵乏人賊匪自必聞知心生窺伺設使鹿仔港稍有疎虞則諸羅之勢更孤倍難守禦所闗甚重福康安竟當直由蚶江速赴鹿仔港激勵官兵鼓勇直前為是同日何裕城奏言四川屯練降畨兵二千名赴閩進剿必須行程倍加迅速今㩀浙江巡撫琅玕以川兵原定於江南浙江行走若改由江西之九江府等處從常玉山入浙省之衢州府達閩計程較近一千餘里咨臣預備催䟎前進等因臣查琅玕擬改之路程固可減省行程但川兵自江西之九江府入境經過南康南昌饒州等府扺廣信府之河口鎮係江西入浙入閩分路之處若如琅玕所擬從河口鎮起身度常玉山經由浙江之衢州再度仙霞嶺扺閩省之建寕府計程九百九十五里如不經由浙江即從河口鎮起旱由鉛山縣過嶺徑入閩省之崇安縣逹建寕府前進計程四百三十里較琅玕所擬路程尚可少行五百六十餘里兼可少過一嶺更為便捷臣不敢拘泥浙省所擬路程繞道稽緩除行司在於河口鎮至崇安縣一路及水陸經過各屬預偹船隻夫馬口粮等項以資應付届期飭令藩司李承鄴赴河口鎮督率經理臬司額勒春在省城上船處督率照料并知會南昌鎮臣永安帶同官兵沿途彈壓臣一俟入境有信馳赴九江府首站於官兵起旱處所躬親督率料理奏入上命軍機大臣傳諭何裕城曰此次屯練各兵行期𦂳急若早到臺灣一日即可得一日之用今由鉛山旱道入閩路程既較琅玕所擬之路為近自應即改從此路行走以免稽遲何裕城能不拘泥浙省來咨通融籌辦俾軍行倍得迅速甚屬可嘉著賞給大小荷包以示奨勵仍著飭令所屬於川兵入境後妥為照料迅速前進欽定平定臺灣紀畧卷三十六
